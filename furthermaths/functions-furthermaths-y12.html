<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}
.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

/* ── Topic card ─────────────────────────────────── */

.tc-tags{display:flex;flex-wrap:wrap;gap:6px;}
.tc-tag{font-size:12px;background:var(--cream);border:1px solid var(--line);border-radius:3px;padding:3px 9px;color:#555;}

<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function round2(x){return Math.round(x*100)/100;}
function tryIt(genFn){
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.01;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function ARR(x1,y1,x2,y2,c,w){c=c||'#C0272D';w=w||2;var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);if(len<1)return '';var ux=dx/len,uy=dy/len,ax=x2-10*ux,ay=y2-10*uy,px=-uy,py=ux;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+ax+'" y2="'+ay+'" stroke="'+c+'" stroke-width="'+w+'"/><polygon points="'+(ax+5*px)+','+(ay+5*py)+' '+x2+','+y2+' '+(ax-5*px)+','+(ay-5*py)+'" fill="'+c+'"/>';}

// ── Session values ──────────────────────────────────────────
var V={};
(function(){
  V.q1a=rnd(2,5);V.q1b=rnd(1,8);   // f(x)=ax+b
  V.q1x=rnd(1,6);
  V.q1fx=V.q1a*V.q1x+V.q1b;

  V.q2a=rnd(2,4);V.q2b=rnd(1,6);V.q2c=rnd(1,4); // f(x)=ax+b, g(x)=x²+c
  V.q2x=rnd(1,5);
  V.q2gx=V.q2x*V.q2x+V.q2c;
  V.q2fgx=V.q2a*V.q2gx+V.q2b;
  V.q2fx=V.q2a*V.q2x+V.q2b;
  V.q2gfx=V.q2fx*V.q2fx+V.q2c;

  V.q3a=rnd(2,5);V.q3b=rnd(1,9);   // f(x)=ax+b  → f⁻¹(x)=(x-b)/a
  V.q3y=rnd(10,30);
  V.q3inv=round2((V.q3y-V.q3b)/V.q3a);

  V.q4a=rnd(1,4);V.q4b=rnd(1,6);   // domain restriction for inverse

  V.q5a=rnd(2,5);V.q5b=rnd(1,6);   // onto / codomain
})();

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'f(x) = '+V.q1a+'x + '+V.q1b+'  —  function machine','#C0272D',13,'middle',true));
  // machine diagram
  o.push(R(140,60,200,70,'#e8f4ff','#1a5a8a',2));
  o.push(T(240,88,'f(x) = '+V.q1a+'x + '+V.q1b,'#1a5a8a',13,'middle',true));
  o.push(T(240,108,'multiply by '+V.q1a+', add '+V.q1b,'#888',10,'middle'));
  o.push(ARR(60,95,140,95,'#888',2));o.push(T(100,88,'x','#241A17',14,'middle',true));
  o.push(ARR(340,95,420,95,'#C0272D',2));o.push(T(380,88,'f(x)','#C0272D',14,'middle',true));
  if(p>=1){
    o.push(R(40,148,120,50,'#fff5f0','#C0272D',1.5));
    o.push(T(100,166,'input','#888',10,'middle'));o.push(T(100,184,'x = '+V.q1x,'#C0272D',15,'middle',true));
  }
  if(p>=2){
    o.push(ARR(162,173,200,173,'#C8922A',2));
    o.push(R(204,148,240,50,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(324,166,'f('+V.q1x+') = '+V.q1a+'\u00d7'+V.q1x+' + '+V.q1b,'#888',11,'middle'));
    o.push(T(324,184,'= '+V.q1fx,'#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'f(x)='+V.q2a+'x+'+V.q2b+'  g(x)=x\u00b2+'+V.q2c+'  at x='+V.q2x,'#C0272D',12,'middle',true));
  // fg flow
  if(p>=1){
    o.push(R(30,56,100,44,'#e8f4ff','#1a5a8a',1.5));o.push(T(80,72,'x='+V.q2x,'#1a5a8a',13,'middle',true));o.push(T(80,88,'input','#888',9,'middle'));
    o.push(ARR(130,78,180,78,'#888',1.5));
    o.push(R(180,56,120,44,'#fff5f0','#C0272D',1.5));o.push(T(240,72,'g','#C0272D',14,'middle',true));o.push(T(240,88,'x\u00b2+'+V.q2c,'#888',9,'middle'));
    o.push(ARR(300,78,350,78,'#888',1.5));
    o.push(R(350,56,100,44,'#fff5f0','#C0272D',1.5));o.push(T(400,72,'f','#C0272D',14,'middle',true));o.push(T(400,88,V.q2a+'x+'+V.q2b,'#888',9,'middle'));
  }
  if(p>=2){
    o.push(T(240,124,'g('+V.q2x+') = '+V.q2x+'\u00b2 + '+V.q2c+' = '+V.q2gx,'#241A17',12,'middle'));
    o.push(T(240,144,'fg('+V.q2x+') = f('+V.q2gx+') = '+V.q2a+'\u00d7'+V.q2gx+' + '+V.q2b+' = '+V.q2fgx,'#C0272D',12,'middle',true));
  }
  if(p>=3){
    o.push(R(14,158,452,2,'#eee','none',0));
    o.push(T(240,174,'gf: apply f first, then g','#888',11,'middle'));
    o.push(T(240,192,'f('+V.q2x+') = '+V.q2fx+'   \u2192   g('+V.q2fx+') = '+V.q2fx+'\u00b2 + '+V.q2c+' = '+V.q2gfx,'#1a5a8a',12,'middle',true));
    o.push(R(80,208,320,40,'#fff8e8','#C8922A',1));
    o.push(T(240,234,'fg \u2260 gf in general — ORDER MATTERS','#C8922A',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Find f\u207b\u00b9(x) for f(x) = '+V.q3a+'x + '+V.q3b,'#C0272D',13,'middle',true));
  var steps=[
    'y = '+V.q3a+'x + '+V.q3b,
    'y \u2212 '+V.q3b+' = '+V.q3a+'x',
    'x = (y \u2212 '+V.q3b+') \u00f7 '+V.q3a,
    'f\u207b\u00b9(x) = (x \u2212 '+V.q3b+') \u00f7 '+V.q3a
  ];
  var notes=['Write y = f(x)','Subtract '+V.q3b+' from both sides','Divide by '+V.q3a,'Replace y with x'];
  steps.forEach(function(st,i){
    if(p>=i){
      var last=i===3;
      o.push(R(60,55+i*48,360,38,last?'#e8f8ee':'#fff',last?'#1a7a3a':'#C0272D',last?2:1));
      o.push(T(240,74+i*48,st,last?'#1a7a3a':'#241A17',last?15:13,'middle',last));
      if(i>0)o.push(T(430,74+i*48,notes[i],'#888',9,'end'));
    }
  });
  if(p>=4){
    o.push(R(60,252,360,30,'#e8f4ff','#1a5a8a',1));
    o.push(T(240,272,'Verify: f\u207b\u00b9('+V.q3y+') = ('+V.q3y+'\u2212'+V.q3b+')\u00f7'+V.q3a+' = '+V.q3inv,'#1a5a8a',11,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'One-to-one vs Many-to-one functions','#C0272D',13,'middle',true));
  var ox=60,oy=210,sc=28;
  // axes
  o.push(ARR(ox,oy,ox+320,oy,'#888',1.5));o.push(T(ox+324,oy,'x','#888',12,'start'));
  o.push(ARR(ox,oy,ox,oy-180,'#888',1.5));o.push(T(ox,oy-184,'y','#888',12,'middle'));
  // linear f(x)=2x+1 — one-to-one
  if(p>=1){
    var pts=[];for(var xi=-1;xi<=5;xi++)pts.push((ox+xi*sc)+','+(oy-(2*xi+1)*sc));
    o.push('<polyline points="'+pts.join(' ')+'" fill="none" stroke="#C0272D" stroke-width="2.5"/>');
    o.push(T(ox+5*sc+8,oy-11*sc,'f(x)=2x+1','#C0272D',10,'start',true));
    o.push(T(ox+5*sc+8,oy-11*sc+14,'one-to-one \u2713','#C0272D',9,'start'));
  }
  // quadratic g(x)=x²-1 — many-to-one
  if(p>=2){
    var pts2=[];for(var xj=-4;xj<=4;xj++)pts2.push((ox+xj*sc+120)+','+(oy-(xj*xj-1)*sc));
    o.push('<polyline points="'+pts2.join(' ')+'" fill="none" stroke="#1a5a8a" stroke-width="2.5"/>');
    o.push(T(ox+120+4*sc+8,oy-15*sc,'g(x)=x\u00b2\u22121','#1a5a8a',10,'start',true));
    o.push(T(ox+120+4*sc+8,oy-15*sc+14,'many-to-one \u2717','#1a5a8a',9,'start'));
    // horizontal line test
    o.push(L(ox+120-4*sc,oy-2*sc,ox+120+4*sc,oy-2*sc,'#C8922A',1.5,'4,3'));
    o.push(T(ox+120+4*sc+5,oy-2*sc+4,'horizontal','#C8922A',9,'start'));
    o.push(T(ox+120+4*sc+5,oy-2*sc+14,'line test','#C8922A',9,'start'));
  }
  if(p>=3){
    o.push(R(14,228,452,24,'#fff8e8','#C8922A',1));
    o.push(T(240,244,'Inverse exists only if f is one-to-one (horizontal line meets graph once)','#C8922A',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Domain, Codomain and Range','#C0272D',13,'middle',true));
  // mapping diagram
  var lx=80,rx=330,ty=55,by=220;
  o.push(R(lx,ty,120,by-ty,'#e8f4ff','#1a5a8a',1.5));
  o.push(R(rx,ty,120,by-ty,'#e8f8ee','#1a7a3a',1.5));
  o.push(T(lx+60,ty-10,'Domain','#1a5a8a',11,'middle',true));
  o.push(T(rx+60,ty-10,'Codomain','#1a7a3a',11,'middle',true));
