<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}

.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}
.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}

.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}

.ar{display:flex;gap:8px;margin-top:6px;}

.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}

.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}

<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(genFn){
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn'
    +' <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'
    +'<div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.01;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

// ── Session values ──────────────────────────────────────────
var V={};
(function(){
  // Q1 simplify √n
  var perfect=[4,9,16,25,36,49];
  V.q1big=pick([8,12,18,20,27,32,45,48,50,72,75,98]);
  // find largest perfect square factor
  var bests=1,bestk=V.q1big;
  perfect.forEach(function(p){if(V.q1big%p===0&&p>bests){bests=p;bestk=V.q1big/p;}});
  V.q1a=Math.sqrt(bests); V.q1b=bestk; // √q1big = q1a√q1b

  // Q2 addition/subtraction of surds
  V.q2k=pick([2,3,5,6,7]);
  V.q2a=rnd(2,6); V.q2b=rnd(2,6);
  V.q2sum=V.q2a+V.q2b; V.q2dif=Math.abs(V.q2a-V.q2b);

  // Q3 multiply surds
  V.q3a=rnd(2,5); V.q3b=rnd(2,5);
  V.q3k1=rnd(2,4); V.q3k2=rnd(2,4);
  V.q3prod=V.q3a*V.q3b; V.q3kprod=V.q3k1*V.q3k2;
  // simplify √(q3prod) if possible
  var ps2=[4,9,16,25];var bs2=1,bk2=V.q3prod;
  ps2.forEach(function(p){if(V.q3prod%p===0&&p>bs2){bs2=p;bk2=V.q3prod/p;}});
  V.q3outer=V.q3kprod*Math.sqrt(bs2); V.q3inner=bk2;

  // Q4 rationalise 1/√n
  V.q4n=pick([2,3,5,6,7,10]);

  // Q5 rationalise a/(b+√n)
  V.q5a=rnd(2,6); V.q5b=rnd(1,4); V.q5n=pick([2,3,5,6,7]);
  V.q5conj=V.q5b*V.q5b-V.q5n; // denominator after rationalising

  // Q6 expand (a+√b)(c+√d)
  V.q6a=rnd(1,4); V.q6b=pick([2,3,5,6,7]); V.q6c=rnd(1,4); V.q6d=V.q6b;
  V.q6int=V.q6a*V.q6c+V.q6b; // ac + b (since √b·√b=b)
  V.q6surd=(V.q6a+V.q6c); // surd coeff

  // Q7 solve surd equation √(ax+b)=c
  V.q7a=rnd(1,4); V.q7c=rnd(2,6);
  V.q7b=rnd(0,5);
  V.q7x=(V.q7c*V.q7c-V.q7b)/V.q7a;
})();

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Simplify \u221a'+V.q1big,'#C0272D',14,'middle',true));
  // factor tree visual
  if(p>=1){
    o.push(R(160,56,160,36,'#fff5f0','#C0272D',1.5));
    o.push(T(240,80,'\u221a'+V.q1big+' = \u221a('+V.q1a*V.q1a+' \u00d7 '+V.q1b+')','#241A17',13,'middle'));
    o.push(L(210,96,165,126,'#888',1.5));o.push(L(270,96,315,126,'#888',1.5));
    o.push(R(130,128,80,36,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(170,152,'\u221a'+V.q1a*V.q1a,'#1a5a8a',13,'middle',true));
    o.push(R(270,128,80,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(310,152,'\u221a'+V.q1b,'#1a7a3a',13,'middle',true));
  }
  if(p>=2){
    o.push(T(170,182,'= '+V.q1a,'#1a5a8a',14,'middle',true));
    o.push(T(310,182,'stays','#1a7a3a',11,'middle'));
  }
  if(p>=3){
    o.push(R(140,200,200,40,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,226,'\u221a'+V.q1big+' = '+V.q1a+'\u221a'+V.q1b,'#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,V.q2a+'\u221a'+V.q2k+' + '+V.q2b+'\u221a'+V.q2k+' and '+V.q2a+'\u221a'+V.q2k+' \u2212 '+V.q2b+'\u221a'+V.q2k,'#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(40,56,180,80,'#fff5f0','#C0272D',1.5));
    o.push(T(130,80,'Addition','#C0272D',12,'middle',true));
    o.push(T(130,102,V.q2a+'\u221a'+V.q2k+' + '+V.q2b+'\u221a'+V.q2k,'#241A17',13,'middle'));
    o.push(T(130,122,'= ('+V.q2a+'+'+V.q2b+')\u221a'+V.q2k,'#888',12,'middle'));
    o.push(R(260,56,180,80,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(350,80,'Subtraction','#1a5a8a',12,'middle',true));
    o.push(T(350,102,V.q2a+'\u221a'+V.q2k+' \u2212 '+V.q2b+'\u221a'+V.q2k,'#241A17',13,'middle'));
    o.push(T(350,122,'= ('+V.q2a+'\u2212'+V.q2b+')\u221a'+V.q2k,'#888',12,'middle'));
  }
  if(p>=2){
    o.push(R(40,152,180,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(130,170,'= '+V.q2sum+'\u221a'+V.q2k,'#1a7a3a',18,'middle',true));
    o.push(R(260,152,180,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(350,170,'= '+V.q2dif+'\u221a'+V.q2k,'#1a7a3a',18,'middle',true));
  }
  if(p>=3){
    o.push(R(14,214,452,36,'#fff8e8','#C8922A',1.5));
    o.push(T(240,236,'Only like surds can be added or subtracted — same number under \u221a','#C8922A',11,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,V.q3k1+'\u221a'+V.q3a+' \u00d7 '+V.q3k2+'\u221a'+V.q3b,'#C0272D',14,'middle',true));
  if(p>=1){
    o.push(R(60,56,360,40,'#f8f8f8','#ccc',1));
    o.push(T(240,82,'Multiply numbers together, multiply surds together','#888',11,'middle'));
  }
  if(p>=2){
    o.push(R(60,106,360,44,'#fff5f0','#C0272D',1.5));
    o.push(T(240,134,'('+V.q3k1+'\u00d7'+V.q3k2+') \u00d7 (\u221a'+V.q3a+' \u00d7 \u221a'+V.q3b+') = '+V.q3kprod+'\u221a'+V.q3prod,'#241A17',13,'middle'));
  }
  if(p>=3){
    var simp=V.q3inner===1?''+V.q3outer:''+V.q3outer+(V.q3outer%1===0?'':'')+'\u221a'+V.q3inner;
    if(V.q3inner===1){
      o.push(R(140,162,200,50,'#e8f8ee','#1a7a3a',2));
      o.push(T(240,193,'= '+V.q3outer,'#1a7a3a',20,'middle',true));
    } else {
      o.push(T(240,168,V.q3kprod+'\u221a'+V.q3prod+' = '+simp+' (simplified)','#1a7a3a',13,'middle',true));
      o.push(R(120,178,240,50,'#e8f8ee','#1a7a3a',2));
      o.push(T(240,208,simp,'#1a7a3a',20,'middle',true));
    }
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Rationalise: 1 / \u221a'+V.q4n,'#C0272D',14,'middle',true));
  if(p>=1){
    o.push(R(80,56,320,50,'#f8f8f8','#ccc',1));
    o.push(T(240,76,'Multiply top and bottom by \u221a'+V.q4n,'#888',12,'middle'));
    o.push(T(240,96,'(this removes the surd from the denominator)','#888',10,'middle'));
  }
  if(p>=2){
    o.push(R(80,116,320,60,'#fff5f0','#C0272D',1.5));
    o.push(T(240,140,'1       \u221a'+V.q4n,'#241A17',13,'middle'));
    o.push(T(240,158,'\u2015\u2015 \u00d7 \u2015\u2015\u2015','#241A17',13,'middle'));
    o.push(T(240,172,'\u221a'+V.q4n+'     \u221a'+V.q4n,'#241A17',13,'middle'));
  }
  if(p>=3){
    o.push(R(140,188,200,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,210,'\u221a'+V.q4n+' / '+V.q4n,'#1a7a3a',18,'middle',true));
    o.push(T(240,238,'denominator is now rational \u2713','#888',11,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,V.q5a+' / ('+V.q5b+' + \u221a'+V.q5n+') — rationalise','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(40,56,400,40,'#f8f8f8','#ccc',1));
    o.push(T(240,82,'Conjugate of ('+V.q5b+' + \u221a'+V.q5n+') is ('+V.q5b+' \u2212 \u221a'+V.q5n+')','#888',12,'middle'));
  }
  if(p>=2){
    o.push(R(40,106,400,50,'#fff5f0','#C0272D',1.5));
    o.push(T(240,126,V.q5a+'('+V.q5b+' \u2212 \u221a'+V.q5n+')','#241A17',13,'middle'));
    o.push(L(40,134,440,134,'#ccc',1));
    o.push(T(240,150,'('+V.q5b+' + \u221a'+V.q5n+')('+V.q5b+' \u2212 \u221a'+V.q5n+')','#241A17',13,'middle'));
  }
  if(p>=3){
    var denom=V.q5b*V.q5b-V.q5n;
    o.push(R(40,166,400,60,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,186,'Denominator: '+V.q5b+'\u00b2 \u2212 '+V.q5n+' = '+denom,'#1a7a3a',12,'middle'));
    o.push(T(240,208,V.q5a+'('+V.q5b+' \u2212 \u221a'+V.q5n+') / '+denom,'#1a7a3a',14,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
