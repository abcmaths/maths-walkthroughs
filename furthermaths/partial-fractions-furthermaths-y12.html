    {lb:'Set up the identity',dr:dQ1,ht:'<div class="fm">3x + 5 = A(x+2) + B(x+1)</div><p>This must hold for ALL values of x.</p>'},
    {lb:'Find A and B by substitution',dr:dQ1,ht:'<p>Substitute roots of each factor:</p><div class="fm">x = \u22121: 2 = A(1) \u2234 A = 2</div><div class="fm">x = \u22122: \u22121 = B(\u22121) \u2234 B = 1</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){
      // (Ax+B)/((x+p)(x+q)) — pick nice numbers
      var p=rnd(1,3),q=rnd(p+1,p+4),A=rnd(1,4),B=rnd(1,4);
      // num at x=-p: A*(-p)+B in original... use substitution method
      // let's make A,B the partial fraction answers directly
      // f(x)/((x+p)(x+q)) = A/(x+p) + B/(x+q)
      // f(x) = A(x+q)+B(x+p)
      // num at x=-p: A(q-p), at x=-q: B(p-q)
      return {question:'In ('+A+'x+'+(A*q+B*p)+') / [(x+'+p+')(x+'+q+')], the partial fraction A/(x+'+p+') has numerator A. Find A by substituting x = \u2212'+p+'.',
        hints:['Substitute x = \u2212'+p+' into the numerator '+A+'x+'+(A*q+B*p),'The factor (x+'+q+') gives ('+(q-p)+') at this point'],
        ans:A,tol:0,unit:'',working:'At x=\u2212'+p+': '+A+'(\u2212'+p+')+'+(A*q+B*p)+' = '+(A*q+B*p-A*p)+' = A\u00d7'+(q-p)+' \u2234 A='+A};
    })}
   ]},

  {ey:'Q2 \u00b7 Partial Fractions \u00b7 Further Maths',ti:'Another Two-Factor Example',
   su:'Express (5x \u2212 1) / [(x\u22121)(x+3)] in partial fractions.',
   steps:[
    {lb:'Set up',dr:dQ2,ht:'<div class="fm">(5x\u22121)/[(x\u22121)(x+3)] = A/(x\u22121) + B/(x+3)</div><p>Multiply both sides: 5x\u22121 = A(x+3) + B(x\u22121)</p>'},
    {lb:'Find A and B',dr:dQ2,ht:'<div class="fm">x = 1: 4 = 4A \u2234 A = 1</div><div class="fm">x = \u22123: \u221216 = \u22124B \u2234 B = 4</div>'},
    {lb:'Answer and check',dr:dQ2,ht:'<div class="fm">1/(x\u22121) + 4/(x+3)</div><p>Verify: [1(x+3) + 4(x\u22121)] / [(x\u22121)(x+3)] = (5x\u22121)/[(x\u22121)(x+3)] \u2713</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){
      var a=rnd(1,4),b=rnd(1,4);
      // (A+B)x + (3A-B) over (x-1)(x+3), so find B given A
      // at x=1: (a+b)*1+(3a-b) wait, let's just ask to find B
      // fraction = a/(x-1) + b/(x+3) -> num = a(x+3)+b(x-1) = (a+b)x+(3a-b)
      var num1=a+b,num0=3*a-b;
      return {question:'('+num1+'x + '+num0+') / [(x\u22121)(x+3)] = A/(x\u22121) + B/(x+3). Find B by substituting x = \u22123.',
        hints:['At x=\u22123 the term with A vanishes','Substitute into the numerator: '+num1+'\u00d7(\u22123) + '+num0],
        ans:b,tol:0,unit:'',working:'At x=\u22123: '+(num1*(-3)+num0)+' = B\u00d7(\u22124) \u2234 B='+b};
    })}
   ]},

  {ey:'Q3 \u00b7 Partial Fractions \u00b7 Further Maths',ti:'Repeated Linear Factor',
   su:'Express (2x + 3) / (x+1)\u00b2 in partial fractions.',
   steps:[
    {lb:'Repeated factor rule',dr:dQ3,ht:'<p>When a factor is <b>squared</b>, you need <b>two terms</b>:</p><div class="fm">(2x+3)/(x+1)\u00b2 = A/(x+1) + B/(x+1)\u00b2</div><p>This is because (x+1)\u00b2 is a repeated root — you need to account for both powers.</p>'},
    {lb:'Find A and B',dr:dQ3,ht:'<div class="fm">2x+3 = A(x+1) + B</div><div class="fm">x = \u22121: 1 = B \u2234 B = 1</div><div class="fm">Coefficient of x: 2 = A \u2234 A = 2</div>'},
    {lb:'Answer',dr:dQ3,ht:'<div class="fm">2/(x+1) + 1/(x+1)\u00b2</div><p>Check: [2(x+1) + 1]/(x+1)\u00b2 = (2x+3)/(x+1)\u00b2 \u2713</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){
      var A=rnd(1,4),B=rnd(1,6);
      // (Ax + A+B)/(x+1)² -- at x=-1, num = -A+A+B = B
      var numStr=A+'x+'+(A+B);
      return {question:'('+numStr+') / (x+1)\u00b2 = A/(x+1) + B/(x+1)\u00b2. Find B (substitute x = \u22121).',
        hints:['At x=\u22121: '+numStr+' with x=\u22121 gives \u2026','B is the value of the numerator at x=\u22121'],
        ans:B,tol:0,unit:'',working:'At x=\u22121: '+A+'\u00d7(\u22121)+'+(A+B)+' = '+B+' = B'};
    })}
   ]},

  {ey:'Q4 \u00b7 Partial Fractions \u00b7 Further Maths',ti:'Improper Fractions',
   su:'What to do when the numerator degree \u2265 denominator degree.',
   steps:[
    {lb:'Degree check',dr:dQ4,ht:'<p>Partial fractions only work directly when the fraction is <b>proper</b> (numerator degree < denominator degree). If improper, do <b>polynomial long division first</b>.</p>'},
    {lb:'Divide first',dr:dQ4,ht:'<div class="fm">(x\u00b2+3x+4) \u00f7 (x\u00b2+3x+2)</div><p>Quotient = 1 (leading terms match), remainder = 2.</p><div class="fm">= 1 + 2/[(x+1)(x+2)]</div>'},
    {lb:'Decompose the remainder',dr:dQ4,ht:'<div class="fm">2/[(x+1)(x+2)] = A/(x+1) + B/(x+2)</div><p>Sub x=\u22121: 2 = A(1) \u2234 A=2. Sub x=\u22122: 2=B(\u22121) \u2234 B=\u22122.</p>'},
    {lb:'Final answer',dr:dQ4,ht:'<div class="fm">1 + 2/(x+1) \u2212 2/(x+2)</div>'}
   ]},

  {ey:'Q5 \u00b7 Partial Fractions \u00b7 Further Maths',ti:'Three Linear Factors',
   su:'f(x) / [(x+1)(x+2)(x+3)] — set up with three unknowns.',
   steps:[
    {lb:'Three terms needed',dr:dQ5,ht:'<p>Three distinct linear factors require three partial fraction terms:</p><div class="fm">f(x)/[(x+1)(x+2)(x+3)] = A/(x+1) + B/(x+2) + C/(x+3)</div>'},
    {lb:'Multiply and substitute',dr:dQ5,ht:'<div class="fm">f(x) = A(x+2)(x+3) + B(x+1)(x+3) + C(x+1)(x+2)</div><p>Substitute x = \u22121, \u22122, \u22123 in turn to find A, B, C.</p>'},
    {lb:'The pattern',dr:dQ5,ht:'<p>Each substitution makes two of the three terms vanish, leaving one equation in one unknown. Efficient and clean.</p>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){
      // simple: how many unknowns for n distinct linear factors?
      var n=rnd(3,5);
      return {question:'How many unknown constants do you need for partial fractions with '+n+' distinct linear factors?',
        hints:['One constant per factor'],
        ans:n,tol:0,unit:'constants',working:'One constant per distinct linear factor: '+n+' factors \u2192 '+n+' constants'};
    })}
   ]},

  {ey:'Q6 \u00b7 Partial Fractions \u00b7 Further Maths',ti:'Verify by Recombining',
   su:'Always check your answer by putting the partial fractions back together.',
   steps:[
    {lb:'Why check?',dr:dQ6,ht:'<p>Combining fractions back to a single fraction is the surest way to check partial fractions. It catches sign errors and arithmetic slips. Takes 30 seconds and prevents lost marks.</p>'},
    {lb:'Recombine 2/(x+1) + 1/(x+2)',dr:dQ6,ht:'<div class="fm">[2(x+2) + 1(x+1)] / [(x+1)(x+2)]</div><div class="fm">= (2x+4+x+1) / [(x+1)(x+2)]</div>'},
    {lb:'Confirm',dr:dQ6,ht:'<div class="fm">= (3x+5) / [(x+1)(x+2)] \u2713</div><p>Matches the original — answer confirmed.</p>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){
      var A=rnd(1,5),B=rnd(1,5),p=rnd(1,3),q=rnd(p+1,p+4);
      // A/(x+p)+B/(x+q) = [A(x+q)+B(x+p)]/... num at x=0 = Aq+Bp
      var val=A*q+B*p;
      return {question:'Combine '+A+'/(x+'+p+') + '+B+'/(x+'+q+') into one fraction. What is the constant term in the numerator?',
        hints:['Multiply out: '+A+'(x+'+q+') + '+B+'(x+'+p+')','Collect the constant terms'],
        ans:val,tol:0,unit:'',working:A+'(x+'+q+')+'+B+'(x+'+p+') = '+(A+B)+'x+'+(A*q+B*p)+'. Constant = '+(A*q+B*p)};
    })}
   ]}
];
