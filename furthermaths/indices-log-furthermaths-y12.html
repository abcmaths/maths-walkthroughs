<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}

.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}

.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}

.btn.p{background:var(--red);color:#fff;}

.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}
.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}

.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}

.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}

.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function round4(x){return Math.round(x*10000)/10000;}
function round2(x){return Math.round(x*100)/100;}
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);}
function buildTry(id,o){var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');var ph='Answer'+(o.unit?' ('+o.unit+')':'');return '<div class="try" data-tryid="'+id+'"><div class="try-t">\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div><div class="try-q">'+o.question+'</div><ul class="hl">'+(h||'')+'</ul><div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/><button class="ck try-ck" data-tryid="'+id+'">Check</button></div><div class="try-fb" data-tryid="'+id+'"></div><details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
document.addEventListener('click',function(e){var el=e.target;if(el.classList.contains('nq-btn')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;}if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.01;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}}});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

var V={};
(function(){
  V.q1base=pick([2,3,4,5]);V.q1m=rnd(2,4);V.q1n=rnd(2,4);
  V.q1prod=V.q1m+V.q1n;V.q1diff=V.q1m-V.q1n;V.q1pow=V.q1m*V.q1n;

  V.q2b=pick([2,3,4]);V.q2x=rnd(2,5);
  V.q2val=Math.pow(V.q2b,V.q2x);

  V.q3base=pick([2,3,10]);V.q3val=Math.pow(V.q3base,rnd(2,4));
  V.q3log=Math.log(V.q3val)/Math.log(V.q3base);

  V.q4p=rnd(2,5);V.q4q=rnd(2,5);
  V.q4base=2;

  V.q5base=pick([2,3,10]);V.q5rhs=rnd(2,6);
  V.q5ans=round4(Math.log(V.q5rhs)/Math.log(V.q5base));
})();

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Laws of Indices  —  base: '+V.q1base,'#C0272D',13,'middle',true));
  var laws=[
    {rule:V.q1base+'\u1d50 \u00d7 '+V.q1base+'\u207f = '+V.q1base+'\u1d50\u207a\u207f',ex:V.q1base+'\u00b2 \u00d7 '+V.q1base+'\u00b3 = '+V.q1base+'\u2075',col:'#C0272D'},
    {rule:V.q1base+'\u1d50 \u00f7 '+V.q1base+'\u207f = '+V.q1base+'\u1d50\u207b\u207f',ex:V.q1base+'\u2075 \u00f7 '+V.q1base+'\u00b2 = '+V.q1base+'\u00b3',col:'#1a5a8a'},
    {rule:'('+V.q1base+'\u1d50)\u207f = '+V.q1base+'\u1d50\u207f',ex:'('+V.q1base+'\u00b2)\u00b3 = '+V.q1base+'\u2076',col:'#1a7a3a'},
    {rule:V.q1base+'\u2070 = 1',ex:'any base to power 0 = 1',col:'#C8922A'},
    {rule:V.q1base+'\u207b\u207f = 1/'+V.q1base+'\u207f',ex:V.q1base+'\u207b\u00b2 = 1/'+V.q1base+'\u00b2',col:'#888'}
  ];
  laws.forEach(function(lw,i){
    if(p>=i){
      o.push(R(30,52+i*40,420,34,'#fff',lw.col,1));
      o.push(T(180,70+i*40,lw.rule,lw.col,12,'middle',true));
      o.push(T(380,70+i*40,lw.ex,'#888',10,'middle'));
    }
  });
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Solving '+V.q2b+'\u02e3 = '+V.q2val,'#C0272D',14,'middle',true));
  if(p>=1){
    o.push(R(60,56,360,44,'#f8f8f8','#ccc',1));
    o.push(T(240,72,'Recognise '+V.q2val+' as a power of '+V.q2b,'#888',11,'middle'));
    o.push(T(240,90,V.q2val+' = '+V.q2b+'\u00b9 \u00d7 ...',?'#241A17':''||'#241A17',12,'middle'));
  }
  var powers=[];for(var i=1;i<=6;i++)powers.push({n:i,v:Math.pow(V.q2b,i)});
  if(p>=2){
    powers.forEach(function(pw,i){
      var match=pw.v===V.q2val;
      o.push(R(30+i*70,108,62,36,match?'#e8f8ee':'#fff',match?'#1a7a3a':'#ddd',match?2:1));
      o.push(T(61+i*70,132,V.q2b+'\u1d3a\u1d35='+(match?'':''),match?'#1a7a3a':'#888',9,'middle'));
      o.push(T(61+i*70,118,V.q2b+pw.n.toString().sup().replace('<sup>','').replace('</sup>',''),match?'#1a7a3a':'#888',10,'middle'));
      o.push(T(61+i*70,128,'='+pw.v,match?'#1a7a3a':'#aaa',9,'middle'));
    });
  }
  if(p>=3){
    o.push(R(140,160,200,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,178,'x = '+V.q2x,'#1a7a3a',22,'middle',true));
    o.push(T(240,198,V.q2b+' to the power '+V.q2x+' = '+V.q2val+' \u2713','#888',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Evaluate log\u209b('+V.q3val+')  where b = '+V.q3base,'#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(60,52,360,44,'#f8f8f8','#ccc',1));
    o.push(T(240,68,'log\u209b(x) asks: "'+V.q3base+' to what power gives x?"','#888',12,'middle'));
    o.push(T(240,86,'Equivalently: log\u209b(x) = y  \u21d4  '+V.q3base+'\u02b8 = x','#241A17',12,'middle',true));
  }
  if(p>=2){
    o.push(R(60,108,360,44,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,124,V.q3base+' to what power gives '+V.q3val+'?','#1a5a8a',12,'middle'));
    o.push(T(240,142,V.q3base+'\u00b9='+V.q3base+', '+V.q3base+'\u00b2='+V.q3base*V.q3base+', '+V.q3base+'\u00b3='+V.q3base*V.q3base*V.q3base+'...','#888',11,'middle'));
  }
  if(p>=3){
    o.push(R(140,166,200,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,184,'log\u209b('+V.q3val+') = '+V.q3log,'#1a7a3a',20,'middle',true));
    o.push(T(240,208,V.q3base+'\u00b3 = '+V.q3val+' \u2713','#888',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Laws of Logarithms','#C0272D',13,'middle',true));
  var laws=[
    {rule:'log(mn) = log m + log n',ex:'log('+V.q4p+'\u00d7'+V.q4q+') = log '+V.q4p+' + log '+V.q4q},
    {rule:'log(m/n) = log m \u2212 log n',ex:'log('+V.q4p+'/'+V.q4q+') = log '+V.q4p+' \u2212 log '+V.q4q},
    {rule:'log(m\u207f) = n log m',ex:'log('+V.q4p+'\u00b3) = 3 log '+V.q4p},
    {rule:'log\u1d47(b) = 1',ex:'log\u2082(2) = 1  \u2502  log(10) = 1'},
    {rule:'log\u1d47(1) = 0',ex:'log of 1 is always 0'},
    {rule:'Change of base: log\u1d47(x) = ln x / ln b',ex:'log\u2082(5) = ln5/ln2'}
  ];
  laws.forEach(function(lw,i){
    if(p>=i){
      o.push(R(30,52+i*33,420,28,'#fff','#ddd',1));
      o.push(T(200,68+i*33,lw.rule,'#C0272D',11,'middle',true));
      o.push(T(380,68+i*33,lw.ex,'#888',9,'middle'));
    }
  });
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Solve: '+V.q5base+'\u02e3 = '+V.q5rhs,'#C0272D',14,'middle',true));
  if(p>=1){
    o.push(R(60,52,360,40,'#f8f8f8','#ccc',1));
    o.push(T(240,68,'Take log of both sides (use same base or ln)','#888',11,'middle'));
    o.push(T(240,82,'log('+V.q5base+'\u02e3) = log('+V.q5rhs+')','#241A17',12,'middle',true));
  }
  if(p>=2){
    o.push(R(60,100,360,40,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,116,'x log('+V.q5base+') = log('+V.q5rhs+')','#1a5a8a',13,'middle',true));
    o.push(T(240,132,'x = log('+V.q5rhs+') / log('+V.q5base+')','#241A17',12,'middle'));
  }
  if(p>=3){
    o.push(R(140,150,200,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,168,'x = '+V.q5ans,'#1a7a3a',20,'middle',true));
    o.push(T(240,192,'(to 4 d.p.)','#888',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ6(p){
  // graph of y=b^x and y=log_b(x)
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Graphs of y = 2\u02e3 and y = log\u2082(x)','#C0272D',13,'middle',true));
  var ox=140,oy=180,sc=28;
  o.push(L(ox-80,oy,ox+280,oy,'#ccc',1));o.push(T(ox+282,oy,'x','#888',10,'start'));
  o.push(L(ox,oy+50,ox,oy-160,'#ccc',1));o.push(T(ox,oy-164,'y','#888',10,'middle'));
  o.push(T(ox-6,oy+6,'0','#aaa',10,'end'));
  // y=2^x
  if(p>=1){
    var pts=[];for(var xi=-2;xi<=5;xi+=0.5)pts.push((ox+xi*sc)+','+(oy-Math.pow(2,xi)*sc));
    o.push('<polyline points="'+pts.join(' ')+'" fill="none" stroke="#C0272D" stroke-width="2.5"/>');
    o.push(T(ox+5*sc+5,oy-32*sc/10,'y=2\u02e3','#C0272D',10,'start',true));
  }
  // y=log2(x)
  if(p>=2){
    var pts2=[];for(var xi2=0.2;xi2<=8;xi2+=0.3)pts2.push((ox+xi2*sc)+','+(oy-(Math.log(xi2)/Math.log(2))*sc));
    o.push('<polyline points="'+pts2.join(' ')+'" fill="none" stroke="#1a5a8a" stroke-width="2.5"/>');
    o.push(T(ox+8*sc+4,oy+3,'y=log\u2082x','#1a5a8a',10,'start',true));
  }
  // y=x mirror line
  if(p>=3){
    o.push(L(ox-2*sc,oy+2*sc,ox+5*sc,oy-5*sc,'#ddd',1,'4,3'));
    o.push(T(ox+5*sc+5,oy-5*sc-4,'y=x','#aaa',9,'start'));
    o.push(R(14,228,452,24,'#e8f8ee','#1a7a3a',1));
    o.push(T(240,244,'Reflections in y=x — exponential and log are inverses of each other','#1a7a3a',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Simplify: log 8 + log 25 \u2212 log 5','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(T(240,58,'Apply log laws step by step','#888',11,'middle'));
    o.push(R(40,68,400,38,'#f8f8f8','#ccc',1));
    o.push(T(240,82,'log 8 + log 25 = log(8\u00d725) = log 200','#241A17',12,'middle',true));
  }
  if(p>=2){
