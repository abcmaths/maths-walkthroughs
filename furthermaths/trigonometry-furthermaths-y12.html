<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}
.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function round2(x){return Math.round(x*100)/100;}
function round4(x){return Math.round(x*10000)/10000;}
function fact(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r;}
function nCr(n,r){if(r<0||r>n)return 0;return fact(n)/(fact(r)*fact(n-r));}
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);}
function buildTry(id,o){var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');var ph='Answer'+(o.unit?' ('+o.unit+')':'');return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn <button class="nq-btn" data-tryid="'+id+'">↻ New</button></div><div class="try-q">'+o.question+'</div><ul class="hl">'+(h||'')+'</ul><div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/><button class="ck try-ck" data-tryid="'+id+'">Check</button></div><div class="try-fb" data-tryid="'+id+'"></div><details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
document.addEventListener('click',function(e){var el=e.target;if(el.classList.contains('nq-btn')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;}if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.01;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='✓ Correct!  '+o.working;}else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}}}); 
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

var V={};
(function(){
  V.ang1=pick([30,45,60]);
  var vals={30:{sin:'1/2',cos:'\u221a3/2',tan:'1/\u221a3',sinv:0.5,cosv:0.866,tanv:0.5774},
            45:{sin:'1/\u221a2',cos:'1/\u221a2',tan:'1',sinv:0.7071,cosv:0.7071,tanv:1},
            60:{sin:'\u221a3/2',cos:'1/2',tan:'\u221a3',sinv:0.866,cosv:0.5,tanv:1.732}};
  V.v1=vals[V.ang1];

  V.sinA=round4(Math.random()*0.6+0.3);  // sin A in (0.3,0.9)
  V.angA=round4(Math.asin(V.sinA)*180/Math.PI);

  V.a3=rnd(3,8);V.b3=rnd(3,8);V.C3=pick([30,45,60]);
  var Cr=V.C3*Math.PI/180;
  V.c3sq=V.a3*V.a3+V.b3*V.b3-2*V.a3*V.b3*Math.cos(Cr);
  V.c3=round4(Math.sqrt(V.c3sq));

  V.a4=rnd(4,9);V.b4=rnd(4,9);V.c4=round4(Math.sqrt(V.a4*V.a4+V.b4*V.b4-2*V.a4*V.b4*Math.cos(Math.PI/3)));
  V.sinR4=round4(V.a4*Math.sin(Math.PI/3)/V.c4);

  V.ang5=pick([0,30,90,180,270,360]);
})();

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Special angles: '+V.ang1+'\u00b0','#C0272D',13,'middle',true));
  // right triangle diagram
  var ox=80,oy=210,adj=150,opp=adj*Math.tan(V.ang1*Math.PI/180);
  o.push(L(ox,oy,ox+adj,oy,'#241A17',2));
  o.push(L(ox+adj,oy,ox+adj,oy-opp,'#241A17',2));
  o.push(L(ox,oy,ox+adj,oy-opp,'#C0272D',2.5));
  o.push(T(ox+adj/2,oy+16,'adjacent','#888',10,'middle'));
  o.push(T(ox+adj+22,oy-opp/2,'opposite','#888',9,'middle'));
  o.push(T(ox+adj/2-10,oy-opp/2-8,'hypotenuse','#C0272D',10,'middle'));
  o.push('<path d="M '+(ox+28)+' '+oy+' A 28 28 0 0 0 '+(ox+28*Math.cos(V.ang1*Math.PI/180))+' '+(oy-28*Math.sin(V.ang1*Math.PI/180))+'" fill="none" stroke="#C0272D" stroke-width="1.5"/>');
  o.push(T(ox+38,oy-10,V.ang1+'\u00b0','#C0272D',11,'start'));
  if(p>=1){
    o.push(R(280,50,160,160,'#fff5f0','#C0272D',1.5));
    o.push(T(360,72,'sin '+V.ang1+'\u00b0 = '+V.v1.sin,'#C0272D',12,'middle',true));
    o.push(T(360,96,'cos '+V.ang1+'\u00b0 = '+V.v1.cos,'#1a5a8a',12,'middle',true));
    o.push(T(360,120,'tan '+V.ang1+'\u00b0 = '+V.v1.tan,'#1a7a3a',12,'middle',true));
  }
  if(p>=2){
    o.push(R(280,130,160,60,'#fff8e8','#C8922A',1));
    o.push(T(360,148,'SOHCAHTOA:','#C8922A',10,'middle',true));
    o.push(T(360,164,'Sin=Opp/Hyp','#888',9,'middle'));
    o.push(T(360,178,'Cos=Adj/Hyp','#888',9,'middle'));
    o.push(T(360,192,'Tan=Opp/Adj','#888',9,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Trigonometric identities','#C0272D',13,'middle',true));
  var ids=[
    'sin\u00b2\u03b8 + cos\u00b2\u03b8 = 1',
    'tan\u03b8 = sin\u03b8 / cos\u03b8',
    '1 + tan\u00b2\u03b8 = sec\u00b2\u03b8',
    '1 + cot\u00b2\u03b8 = cosec\u00b2\u03b8',
    'sin(A\u00b1B) = sinAcosB \u00b1 cosAsinB',
    'cos(A\u00b1B) = cosAcosB \u2213 sinAsinB'
  ];
  ids.forEach(function(id,i){
    if(p>=i){
      o.push(R(30,50+i*34,420,28,'#fff',i<2?'#C0272D':i<4?'#1a5a8a':'#1a7a3a',1));
      o.push(T(240,64+i*34,id,i<2?'#C0272D':i<4?'#1a5a8a':'#1a7a3a',12,'middle',true));
    }
  });
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Cosine rule: c\u00b2 = a\u00b2 + b\u00b2 \u2212 2ab cos C','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(T(240,58,'a='+V.a3+', b='+V.b3+', C='+V.C3+'\u00b0','#241A17',12,'middle'));
    o.push(R(30,68,420,40,'#f8f8f8','#ccc',1));
    o.push(T(240,82,'c\u00b2 = '+V.a3+'\u00b2 + '+V.b3+'\u00b2 \u2212 2\u00d7'+V.a3+'\u00d7'+V.b3+'\u00d7cos('+V.C3+'\u00b0)','#241A17',12,'middle'));
    o.push(T(240,98,'= '+(V.a3*V.a3)+' + '+(V.b3*V.b3)+' \u2212 '+(2*V.a3*V.b3)+' \u00d7 '+round4(Math.cos(V.C3*Math.PI/180)),'#888',11,'middle'));
  }
  if(p>=2){
    o.push(R(30,110,420,40,'#e8f4ff','#1a5a8a',1.5));

  }
  if(p>=3){
    o.push(R(140,158,200,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,174,'c = '+V.c3,'#1a7a3a',20,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Sine rule: a/sin A = b/sin B = c/sin C','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(30,52,420,40,'#f8f8f8','#ccc',1));
    o.push(T(240,66,'Use sine rule when you know a pair (side, opposite angle) + one more','#888',11,'middle'));
    o.push(T(240,82,'a='+V.a4+', C=60\u00b0, c='+V.c4+' — find angle A','#241A17',12,'middle',true));
  }
  if(p>=2){
    o.push(R(30,100,420,40,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,114,'sin A / '+V.a4+' = sin 60\u00b0 / '+V.c4,'#1a5a8a',12,'middle'));
    o.push(T(240,132,'sin A = '+V.a4+' \u00d7 sin60\u00b0 / '+V.c4+' = '+V.sinR4,'#888',11,'middle'));
  }
  if(p>=3){
    o.push(R(120,150,240,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,166,'A = sin\u207b\u00b9('+V.sinR4+') = '+round4(Math.asin(V.sinR4)*180/Math.PI)+'\u00b0','#1a7a3a',14,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Area of a triangle: \u00bd ab sin C','#C0272D',13,'middle',true));
  var a=6,b=8,C=30;
  var area=0.5*a*b*Math.sin(C*Math.PI/180);
  if(p>=1){
    o.push(R(30,52,420,36,'#f8f8f8','#ccc',1));

    o.push(T(240,82,'Area = \u00bd ab sin C','#241A17',13,'middle',true));
  }
  if(p>=2){

    o.push(T(240,132,'Area = \u00bd \u00d7 '+a+' \u00d7 '+b+' \u00d7 sin('+C+'\u00b0)','#888',11,'middle'));
  }
  if(p>=3){
    o.push(R(140,152,200,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,168,'= \u00bd \u00d7 48 \u00d7 0.5 = '+area,'#1a7a3a',18,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ6(p){
  // graphs of sin, cos, tan
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Graphs of sin, cos, tan','#C0272D',13,'middle',true));
  var ox=40,oy=150,sc=1.3;  // scale
  o.push(L(ox,oy,ox+400,oy,'#ccc',1));
  // x labels
  [0,90,180,270,360].forEach(function(deg,i){
    o.push(T(ox+i*400/4,oy+12,''+deg+'\u00b0','#888',8,'middle'));
  });
  // sin in red
  if(p>=1){
    var pts=[];
    for(var d=0;d<=360;d+=5){
      pts.push((ox+d*400/360)+','+(oy-Math.sin(d*Math.PI/180)*60));
    }
    o.push('<polyline points="'+pts.join(' ')+'" fill="none" stroke="#C0272D" stroke-width="2"/>');
    o.push(T(ox+400+4,oy-60,'sin','#C0272D',10,'start',true));
  }
  // cos in blue
  if(p>=2){
    var pts2=[];
    for(var d2=0;d2<=360;d2+=5){
      pts2.push((ox+d2*400/360)+','+(oy-Math.cos(d2*Math.PI/180)*60));
    }
    o.push('<polyline points="'+pts2.join(' ')+'" fill="none" stroke="#1a5a8a" stroke-width="2"/>');
    o.push(T(ox+400+4,oy-60+16,'cos','#1a5a8a',10,'start',true));
  }
  if(p>=3){
    o.push(R(14,212,452,40,'#fff8e8','#C8922A',1));
    o.push(T(240,228,'sin is 0 at 0\u00b0,180\u00b0,360\u00b0  \u2502  cos is 0 at 90\u00b0,270\u00b0','#C8922A',10,'middle',true));
    o.push(T(240,244,'Both have period 360\u00b0 and amplitude 1','#C8922A',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Solve: sin\u03b8 = '+round4(V.sinA)+' for 0\u00b0 \u2264 \u03b8 \u2264 360\u00b0','#C0272D',13,'middle',true));
  var sec=round4(V.angA);var sec2=round4(180-V.angA);
