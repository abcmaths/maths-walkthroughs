:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}

.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}

.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function round2(x){return Math.round(x*100)/100;}
function round4(x){return Math.round(x*10000)/10000;}
function fact(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r;}
function nCr(n,r){if(r<0||r>n)return 0;return fact(n)/(fact(r)*fact(n-r));}
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);}
function buildTry(id,o){var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');var ph='Answer'+(o.unit?' ('+o.unit+')':'');return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn <button class="nq-btn" data-tryid="'+id+'">↻ New</button></div><div class="try-q">'+o.question+'</div><ul class="hl">'+(h||'')+'</ul><div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/><button class="ck try-ck" data-tryid="'+id+'">Check</button></div><div class="try-fb" data-tryid="'+id+'"></div><details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
document.addEventListener('click',function(e){var el=e.target;if(el.classList.contains('nq-btn')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;}if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.01;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='✓ Correct!  '+o.working;}else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}}}); 
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

var V={};
(function(){
  V.p1=pick([2,3,4,5,6]);V.q1=6;   // P(A)=p1/6 for dice
  V.p1f=V.p1/V.q1;

  V.p2a=pick([2,3,4]);V.p2b=pick([2,3,4]);  // independent events
  V.p2and=round4(V.p2a/6*V.p2b/6);

  V.p3n=rnd(3,5);V.p3k=rnd(1,V.p3n-1);V.p3p=pick([0.5,0.25,0.75,1/3]);
  // binomial: nCk * p^k * (1-p)^(n-k)
  function nCr(n,r){var f=function(x){var r=1;for(var i=2;i<=x;i++)r*=i;return r;};return f(n)/(f(r)*f(n-r));}
  V.p3ans=round4(nCr(V.p3n,V.p3k)*Math.pow(V.p3p,V.p3k)*Math.pow(1-V.p3p,V.p3n-V.p3k));

  V.p4n=rnd(4,7);V.p4r=rnd(2,V.p4n-1);V.p4p=0.5;
  V.p4mean=round4(V.p4n*V.p4p);V.p4var=round4(V.p4n*V.p4p*(1-V.p4p));

  // conditional
  V.pA=round4(rnd(2,4)/10);V.pB=round4(rnd(2,4)/10);
  V.pAandB=round4(V.pA*V.pB);
  V.pBgivenA=round4(V.pAandB/V.pA);
})();

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Basic Probability — rolling a die','#C0272D',13,'middle',true));
  // dice face visual
  var faces=[1,2,3,4,5,6];
  if(p>=1){
    faces.forEach(function(f,i){
      var hi=f<=V.p1&&p>=2;
      o.push(R(30+i*72,58,60,60,hi?'#C0272D':'#fff',hi?'#C0272D':'#ccc',hi?2:1));
      o.push(T(60+i*72,94,''+f,hi?'#fff':'#241A17',20,'middle',true));
    });
  }
  if(p>=2){
    o.push(R(30,132,420,40,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,148,'P(result \u2264 '+V.p1+') = '+V.p1+'/6 = '+round4(V.p1/6),'#1a5a8a',13,'middle',true));
  }
  if(p>=3){
    o.push(R(30,182,420,56,'#fff8e8','#C8922A',1));
    o.push(T(240,198,'Probability scale: 0 (impossible) to 1 (certain)','#C8922A',11,'middle',true));
    o.push(T(240,214,'P(A) + P(A\u2019) = 1  (complementary events)','#C8922A',11,'middle'));
    o.push(T(240,230,'P(not \u2264 '+V.p1+') = 1 \u2212 '+V.p1+'/6 = '+(6-V.p1)+'/6','#C8922A',11,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Addition and Multiplication Rules','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(30,52,420,60,'#fff5f0','#C0272D',1.5));
    o.push(T(240,68,'Addition rule (mutually exclusive events):','#C0272D',11,'middle',true));
    o.push(T(240,84,'P(A \u222a B) = P(A) + P(B)','#241A17',13,'middle',true));
    o.push(T(240,100,'General: P(A\u222aB) = P(A)+P(B)\u2212P(A\u2229B)','#888',10,'middle'));
  }
  if(p>=2){
    o.push(R(30,120,420,60,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,136,'Multiplication rule (independent events):','#1a5a8a',11,'middle',true));
    o.push(T(240,152,'P(A \u2229 B) = P(A) \u00d7 P(B)','#241A17',13,'middle',true));
    o.push(T(240,168,'General: P(A\u2229B) = P(A)\u00d7P(B|A)','#888',10,'middle'));
  }
  if(p>=3){
    o.push(R(30,190,420,62,'#e8f8ee','#1a7a3a',1));
    o.push(T(240,206,'Two fair dice: P(both show '+V.p2b+' or more)','#1a7a3a',11,'middle',true));
    o.push(T(240,222,'= P(die1 \u2265 '+V.p2b+') \u00d7 P(die2 \u2265 '+V.p2b+')',  '#241A17',11,'middle'));
    o.push(T(240,238,'= ('+V.p2b+'/6)\u00d7('+V.p2b+'/6) = '+round4(V.p2b/6*V.p2b/6),'#1a7a3a',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Conditional Probability','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(30,52,420,40,'#f8f8f8','#ccc',1));
    o.push(T(240,66,'P(B|A) = P(A\u2229B) / P(A)','#241A17',14,'middle',true));
    o.push(T(240,82,'"Probability of B given A has occurred"','#888',10,'middle'));
  }
  if(p>=2){
    o.push(R(30,100,420,54,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,116,'P(A) = '+V.pA+',  P(B) = '+V.pB+',  A and B independent','#241A17',11,'middle'));
    o.push(T(240,132,'P(A\u2229B) = '+V.pA+'\u00d7'+V.pB+' = '+V.pAandB,'#1a5a8a',12,'middle'));
    o.push(T(240,148,'P(B|A) = '+V.pAandB+'/'+V.pA+' = '+V.pBgivenA,'#1a5a8a',13,'middle',true));
  }
  if(p>=3){
    o.push(R(30,164,420,40,'#e8f8ee','#1a7a3a',1));
    o.push(T(240,180,'When A and B are independent: P(B|A) = P(B)','#1a7a3a',12,'middle',true));
    o.push(T(240,196,'(knowing A happened gives no info about B)','#888',10,'middle'));
    o.push(R(14,212,452,40,'#fff8e8','#C8922A',1));
    o.push(T(240,228,"Bayes' Theorem: P(A|B) = P(B|A)\u00d7P(A) / P(B)",'#C8922A',11,'middle',true));
    o.push(T(240,244,'Allows reversing conditional probabilities','#888',9,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Tree Diagrams','#C0272D',13,'middle',true));
  // draw tree
  var ox=50,oy=130;
  o.push(L(ox,oy,ox+100,oy-60,'#C0272D',2));
  o.push(L(ox,oy,ox+100,oy+60,'#1a5a8a',2));
  if(p>=1){
    o.push(T(ox+50,oy-60,'0.4','#C0272D',11,'middle'));
    o.push(T(ox+50,oy+50,'0.6','#1a5a8a',11,'middle'));
    o.push(T(ox+108,oy-64,'A','#C0272D',13,'start',true));
    o.push(T(ox+108,oy+64,'A\u2019','#1a5a8a',13,'start',true));
  }
  if(p>=2){
    o.push(L(ox+110,oy-60,ox+210,oy-100,'#C0272D',1.5));
    o.push(L(ox+110,oy-60,ox+210,oy-20,'#1a5a8a',1.5));
    o.push(L(ox+110,oy+60,ox+210,oy+20,'#C0272D',1.5));
    o.push(L(ox+110,oy+60,ox+210,oy+100,'#1a5a8a',1.5));
    o.push(T(ox+160,oy-100,'0.3','#C0272D',9,'middle'));o.push(T(ox+218,oy-104,'B','#C0272D',11,'start'));
    o.push(T(ox+160,oy-20,'0.7','#1a5a8a',9,'middle'));o.push(T(ox+218,oy-24,'B\u2019','#1a5a8a',11,'start'));
    o.push(T(ox+160,oy+20,'0.5','#C0272D',9,'middle'));o.push(T(ox+218,oy+16,'B','#C0272D',11,'start'));
    o.push(T(ox+160,oy+100,'0.5','#1a5a8a',9,'middle'));o.push(T(ox+218,oy+96,'B\u2019','#1a5a8a',11,'start'));
  }
  if(p>=3){
    o.push(R(260,50,210,160,'#fff5f0','#C0272D',1));
    o.push(T(365,66,'Outcomes','#888',9,'middle',true));
    o.push(T(365,84,'P(A\u2229B) = 0.4\u00d70.3 = 0.12','#C0272D',10,'middle'));
    o.push(T(365,100,'P(A\u2229B\u2019) = 0.4\u00d70.7 = 0.28','#888',10,'middle'));
    o.push(T(365,116,'P(A\u2019\u2229B) = 0.6\u00d70.5 = 0.30','#888',10,'middle'));
    o.push(T(365,132,'P(A\u2019\u2229B\u2019) = 0.6\u00d70.5 = 0.30','#888',10,'middle'));
    o.push(L(260,140,470,140,'#ccc',1));
    o.push(T(365,158,'Total = 1.00 \u2713','#1a7a3a',11,'middle',true));
    o.push(T(365,176,'P(B) = 0.12+0.30 = 0.42','#1a5a8a',10,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Binomial Distribution B(n,p)','#C0272D',13,'middle',true));
  var pr=V.p3p===0.5?'1/2':V.p3p===0.25?'1/4':V.p3p===0.75?'3/4':'1/3';
  if(p>=1){
    o.push(R(30,52,420,40,'#f8f8f8','#ccc',1));
    o.push(T(240,66,'Conditions: fixed n trials, constant p, independent, 2 outcomes','#888',11,'middle'));
    o.push(T(240,82,'P(X=k) = \u207f\u1d9c\u1d58 \u00d7 p^k \u00d7 (1\u2212p)^(n\u2212k)','#241A17',13,'middle',true));
  }
  if(p>=2){
    o.push(R(30,100,420,50,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,116,'X\u223cB('+V.p3n+', '+pr+'): P(X='+V.p3k+')','#1a5a8a',12,'middle',true));
    o.push(T(240,134,V.p3n+'C'+V.p3k+' \u00d7 '+pr+'^'+V.p3k+' \u00d7 (1\u2212'+pr+')^'+(V.p3n-V.p3k),'#888',11,'middle'));
  }
  if(p>=3){
    o.push(R(130,160,220,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,178,'= '+V.p3ans,'#1a7a3a',20,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Binomial Mean and Variance','#C0272D',13,'middle',true));
  if(p>=1){
