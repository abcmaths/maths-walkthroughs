<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function fact(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r;}
function nCr(n,r){if(r<0||r>n)return 0;return fact(n)/(fact(r)*fact(n-r));}
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);}
function buildTry(id,o){var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');var ph='Answer'+(o.unit?' ('+o.unit+')':'');return '<div class="try" data-tryid="'+id+'"><div class="try-t">\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div><div class="try-q">'+o.question+'</div><ul class="hl">'+(h||'')+'</ul><div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/><button class="ck try-ck" data-tryid="'+id+'">Check</button></div><div class="try-fb" data-tryid="'+id+'"></div><details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
document.addEventListener('click',function(e){var el=e.target;if(el.classList.contains('nq-btn')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;}if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}}});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function L(x1,y1,x2,y2,c,w){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"/>';}

// Session values
var V={};
(function(){
  V.n1=rnd(3,5); // Pascal's triangle row
  // row for (1+x)^n: coefficients are nC0, nC1,...nCn
  V.row1=[];for(var i=0;i<=V.n1;i++)V.row1.push(nCr(V.n1,i));

  V.n2=rnd(3,5);V.a2=rnd(1,3);V.b2=rnd(1,3);
  // (a+bx)^n2 â€” pick specific term r=2
  V.r2=2;
  V.coeff2=nCr(V.n2,V.r2)*Math.pow(V.a2,V.n2-V.r2)*Math.pow(V.b2,V.r2);

  V.n3=rnd(4,6);
  // find term independent of x in (x + 1/x)^n3
  // term r: nCr * x^(n3-r) * x^(-r) = nCr * x^(n3-2r) â†’ ind when n3=2r
  V.r3=V.n3/2; // only integer if n3 even
  V.n3even=(V.n3%2===0);
  if(!V.n3even){V.n3=V.n3+1;V.r3=V.n3/2;}
  V.indterm3=nCr(V.n3,V.r3);

  V.n4=rnd(3,5);V.a4=rnd(1,3);
  // approximation: (1+x)^n â‰ˆ 1 + nx for small x
  // use x=0.01, a4=1
  V.xsmall=0.01;
  V.approx4=1+V.n4*V.xsmall;
  V.exact4=Math.round(Math.pow(1+V.xsmall,V.n4)*10000)/10000;
})();

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,"Pascal's Triangle â€” row "+V.n1,'#C0272D',13,'middle',true));
  // draw Pascal's triangle rows 0..n1
  var rows=[];for(var r=0;r<=V.n1;r++){var row=[];for(var k=0;k<=r;k++)row.push(nCr(r,k));rows.push(row);}
  var startY=50,rowH=32,cellW=36;
  rows.forEach(function(row,ri){
    var totalW=row.length*cellW;var startX=(480-totalW)/2;
    row.forEach(function(val,ci){
      var cx=startX+ci*cellW+cellW/2;var cy=startY+ri*rowH;
      var isHighlight=(ri===V.n1)&&p>=2;
      if(p>=ri){
        o.push('<circle cx="'+cx+'" cy="'+cy+'" r="13" fill="'+(isHighlight?'#C0272D':'#fff')+'" stroke="'+(isHighlight?'#C0272D':'#E4D6CE')+'" stroke-width="1.5"/>');
        o.push(T(cx,cy+5,''+val,isHighlight?'#fff':'#241A17',11,'middle',true));
      }
    });
  });
  if(p>=2){
    o.push(R(14,232,452,20,'#fff8e8','#C8922A',1));
    o.push(T(240,246,'Row '+V.n1+' coefficients: '+V.row1.join(', '),'#C8922A',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Expand ('+V.a2+' + '+V.b2+'x)^'+V.n2,'#C0272D',14,'middle',true));
  // general term: nCr * a^(n-r) * (bx)^r = nCr * a^(n-r) * b^r * x^r
  var terms=[];
  for(var r=0;r<=V.n2;r++){
    var c=nCr(V.n2,r)*Math.pow(V.a2,V.n2-r)*Math.pow(V.b2,r);
    terms.push({r:r,c:c});
  }
  if(p>=1){
    o.push(R(30,52,420,36,'#f8f8f8','#ccc',1));
    o.push(T(240,66,'General term (r+1)th: \u207f\u1d9c\u1d63 \u00d7 a\u207f\u207b\u1d63 \u00d7 (bx)\u1d63','#888',11,'middle'));
    o.push(T(240,82,'= \u207f\u1d9c\u1d63 \u00d7 '+V.a2+'\u207f\u207b\u1d63 \u00d7 '+V.b2+'\u1d63 \u00d7 x\u1d63','#241A17',11,'middle',true));
  }
  if(p>=2){
    terms.slice(0,4).forEach(function(t,i){
      var xp=t.r===0?'':t.r===1?'x':'x\u00b2\u00b3\u2074\u2075\u2076'.charAt(t.r-1)||'x^'+t.r;
      o.push(R(20+i*110,100,102,48,'#fff5f0','#C0272D',1));
      o.push(T(71+i*110,118,'r='+t.r,'#888',9,'middle'));
      o.push(T(71+i*110,140,t.c+xp,'#C0272D',13,'middle',true));
    });
  }
  if(p>=3){
    o.push(R(14,162,452,54,'#e8f8ee','#1a7a3a',1.5));
    var exp=terms.map(function(t){var xp=t.r===0?'':t.r===1?'x':'x^'+t.r;return t.c+xp;}).join(' + ');
    o.push(T(240,184,'Expansion:','#1a7a3a',11,'middle'));
    o.push(T(240,206,exp,'#1a7a3a',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Find a specific term in a binomial expansion','#C0272D',13,'middle',true));
  // (2+3x)^5 â€” find term in x^2
  var nn=5,aa=2,bb=3,rr=2;
  var ans=nCr(nn,rr)*Math.pow(aa,nn-rr)*Math.pow(bb,rr);
  if(p>=1){
    o.push(R(30,52,420,40,'#f8f8f8','#ccc',1));
    o.push(T(240,66,'Find the term in x\u00b2 in (2 + 3x)^5','#241A17',12,'middle',true));
    o.push(T(240,82,'The term in x\u02b3 corresponds to r = 2 in the general term','#888',10,'middle'));
  }
  if(p>=2){
    o.push(R(30,100,420,48,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,116,'\u2075\u1d9c\u2082 \u00d7 2\u00b3 \u00d7 (3x)\u00b2','#1a5a8a',13,'middle',true));
    o.push(T(240,134,'= '+nCr(5,2)+' \u00d7 '+Math.pow(2,3)+' \u00d7 9x\u00b2','#888',12,'middle'));
  }
  if(p>=3){
    o.push(R(130,158,220,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,174,'= '+ans+'x\u00b2','#1a7a3a',20,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Term independent of x in (x + 1/x)^'+V.n3,'#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(30,52,420,40,'#f8f8f8','#ccc',1));
    o.push(T(240,66,'General term: \u207f\u1d9c\u1d63 \u00d7 x^(n\u2212r) \u00d7 (1/x)^r = \u207f\u1d9c\u1d63 \u00d7 x^(n\u22122r)','#888',11,'middle'));
    o.push(T(240,82,'Set power of x to 0: n \u2212 2r = 0 \u2192 r = n/2','#241A17',12,'middle',true));
  }
  if(p>=2){
    o.push(R(30,100,420,40,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,116,'n = '+V.n3+' \u2192 r = '+V.r3,'#1a5a8a',13,'middle',true));
    o.push(T(240,132,'(n must be even for an integer r to exist)','#888',10,'middle'));
  }
  if(p>=3){
    o.push(R(130,148,220,50,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,164,'Term = \u207f\u1d9c\u1d63 = '+V.n3+'C'+V.r3+' = '+V.indterm3,'#1a7a3a',16,'middle',true));
    o.push(T(240,188,'(coefficient of x\u2070 â€” no x in this term)','#888',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Approximation using binomial expansion','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(30,52,420,36,'#f8f8f8','#ccc',1));
    o.push(T(240,66,'For small x: (1+x)\u207f \u2248 1 + nx + n(n\u22121)x\u00b2/2! + \u2026','#888',11,'middle'));
    o.push(T(240,82,'First two terms: (1+x)\u207f \u2248 1 + nx  (linear approximation)','#241A17',12,'middle',true));
  }
  if(p>=2){
    o.push(T(240,108,'Estimate (1.01)^'+V.n4+' using x = 0.01:','#241A17',12,'middle'));
    o.push(R(30,118,420,40,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,134,'(1+0.01)^'+V.n4+' \u2248 1 + '+V.n4+'\u00d70.01 = '+V.approx4,'#1a5a8a',14,'middle',true));
  }
  if(p>=3){
    o.push(R(30,166,420,40,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,182,'Exact value: '+V.exact4,'#1a7a3a',13,'middle'));

  }

}

function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'nCr symmetry and the binomial theorem formula','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(30,52,420,40,'#f8f8f8','#ccc',1));
    o.push(T(240,66,'(a + b)^n = \u03a3 \u207f\u1d9c\u1d63 a^(n\u2212r) b^r  for r = 0 to n','#241A17',13,'middle',true));
    o.push(T(240,82,'The sum of all coefficients = 2^n (set a=b=1)','#888',10,'middle'));
  }
  if(p>=2){
    o.push(R(30,100,420,40,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,116,'\u207f\u1d9c\u1d63 = \u207f\u1d9c\u207f\u207b\u1d63  (symmetry)','#1a5a8a',13,'middle',true));
    o.push(T(240,132,'5C2 = 5C3 = 10  (choosing 2 same as leaving out 2)','#888',11,'middle'));
  }
  if(p>=3){
    o.push(R(30,148,420,40,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,164,'Sum of row n in Pascal\'s triangle = 2^n','#1a7a3a',12,'middle',true));

    o.push(R(14,204,452,48,'#fff8e8','#C8922A',1));
    o.push(T(240,224,'Alternating sum: \u03a3(\u22121)^r \u207f\u1d9c\u1d63 = 0  (set a=1, b=\u22121)','#C8922A',11,'middle',true));
    o.push(T(240,240,'Row 4: 1\u22124+6\u22124+1 = 0 \u2713','#C8922A',10,'middle'));

  s.innerHTML=o.join('');
}

var QS=[
  {ey:"Q1 \u00b7 Binomial Theorem \u00b7 Further Maths",ti:"Pascal's Triangle",
   su:"Row "+V.n1+" gives coefficients for (a+b)^"+V.n1+".",
   steps:[
    {lb:"Pascal's Triangle",dr:dQ1,ht:'<p>Each entry is the sum of the two entries directly above it. Row n gives the coefficients of (a+b)^n.</p><div class="fm">Row 0: 1 &ensp; Row 1: 1 1 &ensp; Row 2: 1 2 1 &ensp; Row 3: 1 3 3 1</div>'},
    {lb:'Build row '+V.n1,dr:dQ1,ht:'<p>Add adjacent entries from row '+(V.n1-1)+' to get row '+V.n1+'. Alternatively, use nCr: the kth entry in row n is nCk.</p>'},
    {lb:'Read the coefficients',dr:dQ1,ht:'<p>Row '+V.n1+' coefficients: <b>'+V.row1.join(', ')+'</b></p><div class="fm">(a+b)^'+V.n1+' = '+V.row1.map(function(c,r){return c+'a^'+(V.n1-r)+'b^'+r;}).join(' + ')+'</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){
      var n=rnd(3,6),r=rnd(0,n);
      return {question:'What is the coefficient of a^'+(n-r)+'b^'+r+' in the expansion of (a+b)^'+n+'? (= '+n+'C'+r+')',
        hints:[n+'C'+r+' = '+n+'! / ('+r+'! \u00d7 '+(n-r)+'!)'],
        ans:nCr(n,r),tol:0,unit:'',working:n+'C'+r+' = '+nCr(n,r)};
    })}
   ]},

  {ey:'Q2 \u00b7 Binomial Theorem \u00b7 Further Maths',ti:'Expanding (a + bx)^n',
   su:'Expand ('+V.a2+' + '+V.b2+'x)^'+V.n2+' term by term.',
   steps:[
    {lb:'General term formula',dr:dQ2,ht:'<p>The (r+1)th term of (a+bx)^n is:</p><div class="fm">T(r+1) = \u207f\u1d9c\u1d63 \u00d7 a^(n\u2212r) \u00d7 (bx)^r</div>'},
    {lb:'Write out each term',dr:dQ2,ht:'<p>Substitute r = 0, 1, 2, ... to get each term. The power of x in the (r+1)th term is r.</p>'},
    {lb:'Full expansion',dr:dQ2,ht:'<p>All terms combined give the expansion. Check: the sum of indices of a and bx in each term always equals n.</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){
      var n=rnd(3,5),a=rnd(1,3),b=rnd(1,3),r=rnd(1,n-1);
      var ans=nCr(n,r)*Math.pow(a,n-r)*Math.pow(b,r);
      return {question:'In ('+a+' + '+b+'x)^'+n+', find the coefficient of x^'+r+'.',
        hints:['Use T(r+1) = '+n+'C'+r+' \u00d7 '+a+'^'+(n-r)+' \u00d7 '+b+'^'+r],
        ans:ans,tol:0,unit:'',working:n+'C'+r+' \u00d7 '+Math.pow(a,n-r)+' \u00d7 '+Math.pow(b,r)+' = '+ans};
    })}
   ]},

  {ey:'Q3 \u00b7 Binomial Theorem \u00b7 Further Maths',ti:'Finding a Specific Term',
   su:'Find the term in x\u00b2 in (2 + 3x)^5.',
   steps:[
    {lb:'Identify r',dr:dQ3,ht:'<p>The term in x^k has r = k. For the x\u00b2 term, r = 2.</p><div class="fm">T(3) = \u2075\u1d9c\u2082 \u00d7 2^3 \u00d7 (3x)^2</div>'},
    {lb:'Calculate',dr:dQ3,ht:'<div class="fm">= 10 \u00d7 8 \u00d7 9x\u00b2 = 720x\u00b2</div>'},
    {lb:'Answer',dr:dQ3,ht:'<div class="fm">The term in x\u00b2 is 720x\u00b2</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){
      var n=rnd(4,6),a=rnd(1,3),b=rnd(1,3),r=rnd(2,3);

        hints:[n+'C'+r+' \u00d7 '+a+'^'+(n-r)+' \u00d7 '+b+'^'+r],
        ans:ans,tol:0,unit:'',working:n+'C'+r+'\u00d7'+Math.pow(a,n-r)+'\u00d7'+Math.pow(b,r)+'='+ans};
    })}
   ]},

  {ey:'Q4 \u00b7 Binomial Theorem \u00b7 Further Maths',ti:'Term Independent of x',
   su:'Find the constant term in (x + 1/x)^'+V.n3+'.',
   steps:[
    {lb:'General term',dr:dQ4,ht:'<p>The general term of (x + x\u207b\u00b9)^n is:</p><div class="fm">\u207f\u1d9c\u1d63 \u00d7 x^(n\u2212r) \u00d7 x^\u207b\u1d63 = \u207f\u1d9c\u1d63 \u00d7 x^(n\u22122r)</div>'},
    {lb:'Set power = 0',dr:dQ4,ht:'<div class="fm">n \u2212 2r = 0 \u21d2 r = n/2 = '+V.r3+'</div><p>This gives the term with no x (the constant term).</p>'},
    {lb:'Calculate',dr:dQ4,ht:'<div class="fm">'+V.n3+'C'+V.r3+' = '+V.indterm3+'</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){
      var n=pick([4,6,8]);var r=n/2;
      return {question:'Find the constant term in (x + 1/x)^'+n+'.',
        hints:['Set n \u2212 2r = 0 to find r','Then calculate nCr'],
        ans:nCr(n,r),tol:0,unit:'',working:'r='+r+', '+n+'C'+r+'='+nCr(n,r)};
    })}
   ]},

  {ey:'Q5 \u00b7 Binomial Theorem \u00b7 Further Maths',ti:'Binomial Approximation',
   su:'Use (1+x)^n \u2248 1 + nx for small x to estimate (1.01)^'+V.n4+'.',
   steps:[
    {lb:'The approximation',dr:dQ5,ht:'<p>For small x, higher powers of x are negligible. Taking only the first two terms:</p><div class="fm">(1+x)^n \u2248 1 + nx</div>'},
    {lb:'Apply with x = 0.01',dr:dQ5,ht:'<div class="fm">(1.01)^'+V.n4+' = (1+0.01)^'+V.n4+' \u2248 1 + '+V.n4+'\u00d70.01 = '+V.approx4+'</div>'},
    {lb:'Compare with exact',dr:dQ5,ht:'<p>Exact: '+V.exact4+'. Approximation: '+V.approx4+'. Error is tiny because (0.01)^2 = 0.0001 is negligible.</p>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){
      var n=rnd(3,6);
      return {question:'Estimate (1.02)^'+n+' using the linear binomial approximation (1+x)^n \u2248 1+nx.',
        hints:['x = 0.02, n = '+n],
        ans:Math.round((1+n*0.02)*1000)/1000,tol:0.001,unit:'',working:'1 + '+n+'\u00d70.02 = '+(1+n*0.02)};
    })}
   ]},

  {ey:'Q6 \u00b7 Binomial Theorem \u00b7 Further Maths',ti:'Sum of Coefficients and Symmetry',
   su:'Key results: sum = 2^n, symmetry nCr = nC(n\u2212r).',
   steps:[
    {lb:'Sum of coefficients',dr:dQ6,ht:'<p>Setting a = b = 1 in (a+b)^n = 1^n = 1, and the expansion gives sum of all nCr = 2^n.</p><div class="fm">\u03a3\u207f\u1d9c\u1d63 = 2^n</div>'},
    {lb:'Symmetry property',dr:dQ6,ht:'<div class="fm">\u207f\u1d9c\u1d63 = \u207f\u1d9c\u207f\u207b\u1d63</div><p>The triangle is symmetric. Choosing r items from n is the same as choosing which (n\u2212r) to leave out.</p>'},
    {lb:'Alternating sum = 0',dr:dQ6,ht:'<p>Setting a = 1, b = \u22121: sum of coefficients with alternating signs = 0.</p><div class="fm">1 \u2212 n + \u2026 = 0</div>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){
      var n=rnd(4,7);
      return {question:'What is the sum of all the binomial coefficients in row '+n+' of Pascal\'s triangle?',
        hints:['Sum of row n = 2^n'],
        ans:Math.pow(2,n),tol:0,unit:'',working:'2^'+n+' = '+Math.pow(2,n)};
    })}
   ]}
];
