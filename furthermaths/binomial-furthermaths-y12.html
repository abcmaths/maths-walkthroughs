<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function fact(n){var r=1;for(var i=2;i<=n;i++)r*=i;return r;}
function nCr(n,r){if(r<0||r>n)return 0;return fact(n)/(fact(r)*fact(n-r));}
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);}
function buildTry(id,o){var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');var ph='Answer'+(o.unit?' ('+o.unit+')':'');return '<div class="try" data-tryid="'+id+'"><div class="try-t">\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div><div class="try-q">'+o.question+'</div><ul class="hl">'+(h||'')+'</ul><div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/><button class="ck try-ck" data-tryid="'+id+'">Check</button></div><div class="try-fb" data-tryid="'+id+'"></div><details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
document.addEventListener('click',function(e){var el=e.target;if(el.classList.contains('nq-btn')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;}if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;var o=en.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}}});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function L(x1,y1,x2,y2,c,w){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"/>';}

// Session values

// ── Binomial coefficient helper ─────────────────────────────────────────
// Draws the bracket notation  ( n )  centred at (cx, cy)
//                              ( r )
function binom(cx, cy, n, r, col, sz) {
  col = col || '#C0272D'; sz = sz || 15;
  var sm = Math.round(sz * 0.72);
  return '<rect x="'+(cx-22)+'" y="'+(cy-sz-2)+'" width="44" height="'+(sz*2+6)+'" fill="none" stroke="'+col+'" stroke-width="1.5" rx="3"/>'
    + T(cx, cy - 1, n, col, sz, 'middle', true)
    + T(cx, cy + sm + 5, r, col, sm, 'middle');
}

var V={};
(function(){
  V.n1=rnd(3,5);
  V.row1=[];for(var i=0;i<=V.n1;i++)V.row1.push(nCr(V.n1,i));
  V.n2=rnd(3,5);V.a2=rnd(1,3);V.b2=rnd(1,3);
  V.coeff2=nCr(V.n2,2)*Math.pow(V.a2,V.n2-2)*Math.pow(V.b2,2);
  V.n3=rnd(4,6);
  if(V.n3%2!==0)V.n3++;
  V.r3=V.n3/2;
  V.indterm3=nCr(V.n3,V.r3);
  V.n4=rnd(3,5);
  V.approx4=Math.round((1+V.n4*0.01)*1000)/1000;
  V.exact4=Math.round(Math.pow(1.01,V.n4)*10000)/10000;
})();

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 270');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,"Pascal's Triangle — row "+V.n1,'#C0272D',13,'middle',true));
  var rows=[];for(var r=0;r<=V.n1;r++){var row=[];for(var k=0;k<=r;k++)row.push(nCr(r,k));rows.push(row);}
  var startY=56,rowH=34,cellW=38;
  rows.forEach(function(row,ri){
    var totalW=row.length*cellW;var startX=(480-totalW)/2;
    row.forEach(function(val,ci){
      var cx=startX+ci*cellW+cellW/2;var cy=startY+ri*rowH;
      var hi=(ri===V.n1)&&p>=2;
      if(p>=ri){
        o.push('<circle cx="'+cx+'" cy="'+cy+'" r="14" fill="'+(hi?'#C0272D':'#fff')+'" stroke="'+(hi?'#C0272D':'#E4D6CE')+'" stroke-width="1.5"/>');
        o.push(T(cx,cy+5,''+val,hi?'#fff':'#241A17',11,'middle',true));
      }
    });
  });
  if(p>=2){
    o.push(R(14,238,452,24,'#fff8e8','#C8922A',1));
    o.push(T(240,254,'Row '+V.n1+':  '+V.row1.join('  ')+'   — coefficients of (a+b)^'+V.n1,'#C8922A',10,'middle'));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 270');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Expanding ('+V.a2+' + '+V.b2+'x)^'+V.n2,'#C0272D',14,'middle',true));
  var terms=[];
  for(var r=0;r<=V.n2;r++) terms.push({r:r,c:nCr(V.n2,r)*Math.pow(V.a2,V.n2-r)*Math.pow(V.b2,r)});
  if(p>=1){
    o.push(R(30,52,420,54,'#f8f8f8','#ccc',1));
    o.push(T(55,66,'(r+1)th term:','#888',10,'start'));
    o.push(binom(160,72,'n','r','#C0272D',14));
    o.push(T(190,74,' \u00d7 a^(n\u2212r) \u00d7 (bx)^r','#241A17',12,'start'));
    o.push(T(55,96,'The bracket','#888',9,'start'));
    o.push(binom(148,96,'n','r','#888',11));
    o.push(T(173,98,'means n! \u00f7 [r! \u00d7 (n\u2212r)!]  — also written nCr','#888',9,'start'));
  }
  if(p>=2){
    terms.slice(0,Math.min(4,V.n2+1)).forEach(function(t,i){
      var xp=t.r===0?'':t.r===1?'x':'x^'+t.r;
      o.push(R(18+i*115,114,107,56,'#fff5f0','#C0272D',1));
      o.push(T(71+i*115,126,'r='+t.r,'#888',9,'middle'));
      o.push(binom(71+i*115,142,''+V.n2,''+t.r,'#C0272D',12));
      o.push(T(71+i*115,162,t.c+''+xp,'#C0272D',12,'middle',true));
    });
  }
  if(p>=3){
    o.push(R(14,178,452,52,'#e8f8ee','#1a7a3a',1.5));
    var exp=terms.map(function(t){var xp=t.r===0?'':t.r===1?'x':'x^'+t.r;return t.c+xp;}).join(' + ');
    o.push(T(240,196,'Expansion:','#1a7a3a',10,'middle'));
    o.push(T(240,216,exp,'#1a7a3a',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 270');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Find the term in x\u00b2 in (2+3x)^5','#C0272D',13,'middle',true));

    o.push(T(240,146,'= 10 \u00d7 8 \u00d7 9x\u00b2','#888',12,'middle'));

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 270');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));

  }

  }
  if(p>=4){

    o.push(T(240,218,'When r = '+V.r3+': x^('+V.n3+'\u22122\u00d7'+V.r3+') = x^0 = 1','#1a7a3a',11,'middle'));
    o.push(T(240,234,'The x terms cancel completely \u2014 leaving just the number','#1a7a3a',11,'middle'));
    o.push(T(240,250,'Constant term = '+V.indterm3,'#1a7a3a',14,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 270');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));

function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 270');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Notation summary and key results','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(R(30,52,420,74,'#fff5f0','#C0272D',1.5));
    o.push(T(240,66,'All three mean the same thing:','#888',10,'middle',true));
    // Show all three notations side by side
    o.push(binom(90,88,'n','r','#C0272D',18));
    o.push(T(118,92,'=  nCr  =  C(n,r)  =  ','#241A17',13,'start',true));
    o.push(T(280,92,'n!','#241A17',12,'middle'));
    o.push(T(330,83,'n!','#241A17',12,'middle'));
    // draw a fraction for n!/r!(n-r)!
