<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Division &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;letter-spacing:.05em;}
.f{background:#1a5a8a;color:#fff;}.e{background:#C0272D;color:#fff;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Division &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round2(x){return Math.round(x*100)/100;}
function round1(x){return Math.round(x*10)/10;}

var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +(h?'<ul class="hl">'+h+'</ul>':'')
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 try again.';}
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

// ── Random values ──
var q1=(function(){var b=rnd(2,9),q=rnd(10,50),a=b*q;return{a:a,b:b,q:q};})();
var q2=(function(){var b=rnd(3,8),q=rnd(12,40),r=rnd(1,b-1),a=b*q+r;return{a:a,b:b,q:q,r:r};})();
var q3=(function(){// short division 3-digit ÷ 1-digit exact
  var b=rnd(3,8),q=rnd(12,60),a=b*q;return{a:a,b:b,q:q};})();
var q4=(function(){// decimal ÷ integer
  var b=rnd(2,5),q=rnd(11,40),a=b*q/10;return{a:a,b:b,ans:round2(a/b)};})();
var q5=(function(){// dividing by 10, 100, 1000
  var a=rnd(240,8500),p=pick([10,100,1000]);return{a:a,p:p,ans:a/p};})();
var q6=(function(){// dividing decimal by 10 or 100
  var a=rnd(15,990)/10,p=pick([10,100]);return{a:a,p:p,ans:round2(a/p)};})();
var q7=(function(){// dividing by a fraction: a ÷ (1/b) = a×b
  var a=rnd(4,12),b=rnd(2,6);return{a:a,b:b,ans:a*b};})();
var q8=(function(){// dividing negative: positive ÷ negative
  var b=-rnd(2,6),q=rnd(4,12),a=b*q;return{a:a,b:b,ans:q};})();
var q9=(function(){// long division 3-digit ÷ 2-digit
  var b=rnd(11,19),q=rnd(10,30),a=b*q;return{a:a,b:b,q:q};})();
var q10=(function(){// convert remainder to decimal
  var b=rnd(4,8),q=rnd(12,40),r=pick([b/2,b/4].filter(function(x){return x===Math.floor(x);}));
  if(!r||r<=0)r=pick([1,2]);r=Math.min(r,b-1);
  var a=b*q+r;return{a:a,b:b,q:q,r:r,ans:round2(q+r/b)};})();

// ── Diagram functions ──
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q1.a+' \u00f7 '+q1.b,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(240,76,'How many times does '+q1.b+' go into '+q1.a+'?','#888',12,'middle',false));
    // bus stop layout
    var cx=220,cy=100;
    o.push(L(cx-10,cy-20,cx-10,cy+10,'#241A17',2));
    o.push(L(cx-10,cy+10,cx+80,cy+10,'#241A17',2));
    o.push(T(cx-26,cy+5,q1.b,'#C0272D',18,'middle',true));
    o.push(T(cx+36,cy+5,String(q1.a),'#241A17',18,'middle',false));
  }
  if(p>=2){
    o.push(T(240,136,'Think: '+q1.b+' \u00d7 ? = '+q1.a,'#888',12,'middle',false));
    o.push(T(240,155,q1.b+' \u00d7 '+q1.q+' = '+q1.a,'#888',12,'middle',false));
    o.push(R(150,168,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,196,q1.q,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q2.a+' \u00f7 '+q2.b,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(240,74,''+q2.a+' does not divide exactly by '+q2.b+'. Find quotient and remainder.','#888',11,'middle',false));
    o.push(T(240,96,q2.b+' \u00d7 '+q2.q+' = '+(q2.b*q2.q)+' (closest multiple of '+q2.b+' without going over '+q2.a+')','#888',11,'middle',false));
  }
  if(p>=2){
    o.push(T(240,120,q2.a+' \u2212 '+(q2.b*q2.q)+' = '+q2.r+' (remainder)','#1a5a8a',12,'middle',false));
    o.push(R(60,132,360,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,160,q2.a+' \u00f7 '+q2.b+' = '+q2.q+' remainder '+q2.r,'#1a7a3a',16,'middle',true));
  }
  if(p>=3){o.push(T(240,200,'Check: ('+q2.q+' \u00d7 '+q2.b+') + '+q2.r+' = '+(q2.q*q2.b+q2.r)+' \u2713','#888',11,'middle',false));}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q3.a+' \u00f7 '+q3.b+' (short division)','#C0272D',18,'middle',true));
  if(p>=1){
    // bus stop with working digits
    var cx=180,cy=90;
    o.push(L(cx-10,cy-20,cx-10,cy+12,'#241A17',2));
    o.push(L(cx-10,cy+12,cx+100,cy+12,'#241A17',2));
    o.push(T(cx-26,cy+6,q3.b,'#C0272D',18,'middle',true));
    var digs=String(q3.a).split('');
    digs.forEach(function(d,i){
      o.push(T(cx+14+i*28,cy+6,d,'#241A17',18,'middle',false));
    });
    o.push(T(240,122,'Divide into each digit from left to right.','#888',11,'middle',false));
    o.push(T(240,140,'Carry any remainder to the next digit.','#888',11,'middle',false));
  }
  if(p>=2){
    o.push(R(150,154,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,182,q3.q,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q4.a+' \u00f7 '+q4.b,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(240,74,'Divide as normal. The decimal point in the answer goes directly above the decimal point in the dividend.','#888',11,'middle',false));
    o.push(R(40,88,400,36,'#fff5f0','#C0272D',1.5));
    o.push(T(240,110,''+q4.a+' \u00f7 '+q4.b+': keep decimal point aligned','#C0272D',12,'middle',false));
  }
  if(p>=2){
    o.push(R(150,138,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,166,q4.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q5.a+' \u00f7 '+q5.p,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(240,74,'Dividing by a power of 10: digits shift RIGHT.','#888',11,'middle',false));
    o.push(R(40,84,400,36,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,106,'Each \u00f710 shifts all digits one place to the right','#1a5a8a',12,'middle',false));
  }
  if(p>=2){
    o.push(T(240,136,'Shift '+Math.log10(q5.p)+' place(s): '+q5.a+' becomes '+q5.ans,'#888',12,'middle',false));
    o.push(R(150,148,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,176,q5.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q6.a+' \u00f7 '+q6.p,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(240,74,'Dividing a decimal by '+q6.p+': move decimal point LEFT.','#888',11,'middle',false));
    o.push(R(40,84,400,36,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,106,'Move decimal '+Math.log10(q6.p)+' place(s) to the left','#1a5a8a',12,'middle',false));
  }
  if(p>=2){
    o.push(T(240,136,q6.a+' \u00f7 '+q6.p+' \u2192 '+q6.ans,'#888',12,'middle',false));
    o.push(R(150,148,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,176,q6.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q7.a+' \u00f7 (1/'+q7.b+')','#C0272D',20,'middle',true));
  if(p>=1){
    o.push(R(20,56,440,56,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,74,'Dividing by a fraction: multiply by its reciprocal.','#1a5a8a',13,'middle',true));
    o.push(T(240,96,q7.a+' \u00f7 (1/'+q7.b+') = '+q7.a+' \u00d7 '+q7.b,'#1a5a8a',12,'middle',false));
  }
  if(p>=2){
    o.push(T(240,128,'How many one-'+q7.b+'ths fit in '+q7.a+'? Answer: '+q7.b+' times as many.','#888',11,'middle',false));
    o.push(R(150,140,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,168,q7.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q8.a+' \u00f7 ('+q8.b+')','#C0272D',20,'middle',true));
  if(p>=1){
    o.push(R(20,56,440,50,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,74,'Sign rules for division match multiplication:','#1a5a8a',12,'middle',true));
    o.push(T(240,96,'positive \u00f7 negative = negative | negative \u00f7 negative = positive','#1a5a8a',11,'middle',false));
  }
  if(p>=2){
    o.push(T(240,126,'Ignore signs: '+Math.abs(q8.a)+' \u00f7 '+Math.abs(q8.b)+' = '+q8.ans,'#888',12,'middle',false));
    o.push(T(240,146,'Signs: negative \u00f7 negative = positive','#888',11,'middle',false));
    o.push(R(150,158,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,186,q8.ans+' (positive)','#1a7a3a',22,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q9.a+' \u00f7 '+q9.b+' (long division)','#C0272D',18,'middle',true));
  if(p>=1){
    o.push(T(240,74,'Long division steps: Divide, Multiply, Subtract, Bring down (DMSB).','#888',11,'middle',false));
    var cx=200,cy=90;
    o.push(L(cx-10,cy-20,cx-10,cy+12,'#241A17',2));
    o.push(L(cx-10,cy+12,cx+80,cy+12,'#241A17',2));
    o.push(T(cx-30,cy+6,q9.b,'#C0272D',16,'middle',true));
    o.push(T(cx+36,cy+6,String(q9.a),'#241A17',16,'middle',false));
  }
  if(p>=2){
    o.push(T(240,126,'How many times does '+q9.b+' go into the first digits of '+q9.a+'?','#888',11,'middle',false));
    o.push(T(240,144,''+q9.b+' \u00d7 '+q9.q+' = '+q9.a,'#888',12,'middle',false));
    o.push(R(150,156,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,184,q9.q,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ10(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));

  if(p>=1){
    o.push(T(240,74,'When there is a remainder, carry it forward as a decimal.','#888',11,'middle',false));
    o.push(T(240,94,q10.a+' \u00f7 '+q10.b+' = '+q10.q+' remainder '+q10.r,'#C0272D',13,'middle',false));
  }
  if(p>=2){
    o.push(T(240,116,'Convert remainder: '+q10.r+' \u00f7 '+q10.b+' = '+round2(q10.r/q10.b),'#1a5a8a',12,'middle',false));
    o.push(T(240,136,'Add to quotient: '+q10.q+' + '+round2(q10.r/q10.b)+' = '+q10.ans,'#1a5a8a',12,'middle',false));
    o.push(R(150,148,180,44,'#e8f8ee','#1a7a3a',2));

// ── Your Turn functions ──
function yt1(){var b=rnd(2,9),q=rnd(10,50),a=b*q;
  return tryIt({question:'Calculate <b>'+a+' \u00f7 '+b+'</b>.',hints:['Think: '+b+' \u00d7 ? = '+a],ans:q,tol:0,unit:'',working:a+' \u00f7 '+b+' = '+q});}
function yt2(){var b=rnd(3,8),q=rnd(12,40),r=rnd(1,b-1),a=b*q+r;
  return tryIt({question:'Calculate <b>'+a+' \u00f7 '+b+'</b>. Enter the quotient (not remainder).',hints:['Find largest multiple of '+b+' not exceeding '+a,'Remainder = '+a+' \u2212 ('+b+' \u00d7 quotient)'],ans:q,tol:0,unit:'',working:a+' \u00f7 '+b+' = '+q+' remainder '+r});}
function yt3(){var b=rnd(3,8),q=rnd(12,60),a=b*q;
  return tryIt({question:'Calculate <b>'+a+' \u00f7 '+b+'</b> using short division.',hints:['Divide each digit from left to right','Carry remainders to the next digit'],ans:q,tol:0,unit:'',working:a+' \u00f7 '+b+' = '+q});}
function yt4(){var b=rnd(2,5),q=rnd(11,40),a=b*q/10;
  return tryIt({question:'Calculate <b>'+a+' \u00f7 '+b+'</b>.',hints:['Keep decimal point aligned in the answer'],ans:round2(a/b),tol:0.01,unit:'',working:a+' \u00f7 '+b+' = '+round2(a/b)});}
function yt5(){var a=rnd(240,8500),p=pick([10,100,1000]),ans=a/p;
  return tryIt({question:'Calculate <b>'+a+' \u00f7 '+p+'</b>.',hints:['Shift digits '+Math.log10(p)+' place(s) right'],ans:ans,tol:0.001,unit:'',working:a+' \u00f7 '+p+' = '+ans});}
function yt6(){var a=rnd(15,990)/10,p=pick([10,100]),ans=round2(a/p);
  return tryIt({question:'Calculate <b>'+a+' \u00f7 '+p+'</b>.',hints:['Move decimal point '+Math.log10(p)+' place(s) left'],ans:ans,tol:0.001,unit:'',working:a+' \u00f7 '+p+' = '+ans});}
function yt7(){var a=rnd(4,12),b=rnd(2,6),ans=a*b;
  return tryIt({question:'Calculate <b>'+a+' \u00f7 (1/'+b+')</b>.',hints:['Dividing by 1/'+b+' = multiplying by '+b],ans:ans,tol:0,unit:'',working:a+' \u00d7 '+b+' = '+ans});}
function yt8(){var b=-rnd(2,6),q=rnd(4,12),a=b*q;
  return tryIt({question:'Calculate <b>'+a+' \u00f7 ('+b+')</b>.',hints:['Apply sign rules','negative \u00f7 negative = positive'],ans:q,tol:0,unit:'',working:Math.abs(a)+' \u00f7 '+Math.abs(b)+' = '+q+' (both negative \u2192 positive)'});}
function yt9(){var b=rnd(11,19),q=rnd(10,30),a=b*q;
  return tryIt({question:'Calculate <b>'+a+' \u00f7 '+b+'</b> using long division.',hints:['DMSB: Divide, Multiply, Subtract, Bring down','How many times does '+b+' go into the first digits?'],ans:q,tol:0,unit:'',working:a+' \u00f7 '+b+' = '+q});}
function yt10(){var b=rnd(4,8),q=rnd(12,40),r=rnd(1,b-1),a=b*q+r,ans=round2(q+r/b);
  return tryIt({question:'Calculate <b>'+a+' \u00f7 '+b+'</b>. Give your answer as a decimal.',hints:['First find: '+a+' \u00f7 '+b+' = '+q+' rem '+r,'Then convert remainder: '+r+' \u00f7 '+b+' = '+round2(r/b)],ans:ans,tol:0.01,unit:'',working:a+' \u00f7 '+b+' = '+q+' r '+r+' = '+ans});}

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);

function bDT(){var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').innerHTML=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
