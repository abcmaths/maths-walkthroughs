<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algebra · Year 8 · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.bc{background:#fff3cd;color:#7a5a00;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.lc{background:#fff3cd;color:#7a5a00;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">← All Topics</a>
  <div class="ht">Algebra — Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 280"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">← Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next →</button>
    </div>
  </div>
</div>
<script>
var ST={};
function tryIt(o){var id='t'+Math.random().toString(36).slice(2);ST[id]=o;var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');return '<div class="try"><div class="try-t">&#10002; Your Turn</div><p>'+o.question+'</p><ul class="hl">'+h+'</ul><div class="ar"><input type="number" step="any" placeholder="Answer ('+o.unit+')" id="'+id+'_i"/><button class="ck" onclick="ck(\''+id+'\')">Check</button></div><div class="fb" id="'+id+'_f"></div><details class="wk"><summary>Show full working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
function ck(id){var o=ST[id],v=parseFloat(document.getElementById(id+'_i').value),f=document.getElementById(id+'_f');if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}if(Math.abs(v-o.ans)<=(o.exact||0.05)){f.className='fb ok';f.textContent='Correct! Answer: '+o.ans+' '+o.unit;}else{f.className='fb er';f.textContent='Not quite \u2014 check your working and try again.';}}
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

/* Q1 Substitution with negatives */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,22,'Expression: 3a\u00b2 \u2212 2b + 5   where a = \u22122, b = 4','#C0272D',14,undefined,true));
  var steps=[
    {lbl:'Write out',txt:'3(\u22122)\u00b2 \u2212 2(4) + 5',col:'#241A17'},
    {lbl:'Square first',txt:'3 \u00d7 4 \u2212 8 + 5',col:'#1a5a8a',note:'(\u22122)\u00b2 = +4 \u2014 negative squared is positive'},
    {lbl:'Multiply',txt:'12 \u2212 8 + 5',col:'#241A17'},
    {lbl:'Final answer',txt:'= 9',col:'#1a7a3a'}
  ];
  steps.forEach(function(st,i){
    if(p>=i+1){
      o.push(R(60,45+i*52,360,44,i===3?'#e8f8ee':'#fff5f0',i===3?'#1a7a3a':'#C0272D',i===3?2:1.5));
      o.push(T(240,62+i*52,st.txt,st.col,15,undefined,i===3));
      if(st.note)o.push(T(240,76+i*52,st.note,'#C8922A',10));
    }
  });
  s.innerHTML=o.join('');
}

/* Q2 Expanding and simplifying */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,22,'Expand and simplify: 3(2x + 4) + 2(x \u2212 3)','#C0272D',14,undefined,true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push(R(40,42,180,44,'#fff5f0','#C0272D',2));o.push(T(130,59,'3(2x+4)','#C0272D',14,undefined,true));o.push(T(130,74,'= 6x + 12','#C0272D',13));
    o.push(R(260,42,180,44,'#e8f4ff','#1a5a8a',2));o.push(T(350,59,'2(x\u22123)','#1a5a8a',14,undefined,true));o.push(T(350,74,'= 2x \u2212 6','#1a5a8a',13));
  }
  if(p>=2){
    o.push(T(240,110,'Collect like terms:','#888',12));
    o.push(R(80,122,320,44,'#fff5f0','#C0272D',1.5));
    o.push(T(240,139,'6x + 12 + 2x \u2212 6','#241A17',15));
    o.push(T(240,157,'x terms: 6x + 2x = 8x   |   numbers: 12\u22126 = 6','#888',11));
  }
  if(p>=3){
    o.push(R(140,174,200,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,201,'= 8x + 6','#1a7a3a',18,undefined,true));
  }
  s.innerHTML=o.join('');
}

/* Q3 Factorising into single bracket */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,22,'Factorise fully: 12x\u00b2 + 8x','#C0272D',16,undefined,true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push(T(240,55,'Step 1: Find HCF of 12x\u00b2 and 8x','#888',13));
    o.push(R(80,68,140,44,'#fce8d8','#C0272D',1.5));o.push(T(150,85,'12x\u00b2','#C0272D',16));o.push(T(150,98,'= 4\u00d73\u00d7x\u00d7x','#888',10));
    o.push(R(260,68,140,44,'#e8f4ff','#1a5a8a',1.5));o.push(T(330,85,'8x','#1a5a8a',16));o.push(T(330,98,'= 4\u00d72\u00d7x','#888',10));
    o.push(T(240,126,'HCF = 4x','#C8922A',14,undefined,true));
  }
  if(p>=2){
    o.push(T(240,150,'Step 2: Divide each term by 4x','#888',12));
    o.push(T(240,170,'12x\u00b2 \u00f7 4x = 3x   |   8x \u00f7 4x = 2','#241A17',13));
  }
  if(p>=3){
    o.push(R(130,188,220,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,215,'= 4x(3x + 2)','#1a7a3a',18,undefined,true));
    o.push(T(240,252,'Check: 4x\u00d73x=12x\u00b2, 4x\u00d72=8x \u2713','#888',12));
  }
  s.innerHTML=o.join('');
}

/* Q4 Solving with unknowns on both sides */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,22,'Solve: 5x \u2212 3 = 2x + 9','#C0272D',16,undefined,true));
  var steps=[
    {lbl:'Start',left:'5x \u2212 3',right:'2x + 9'},
    {lbl:'Subtract 2x',left:'3x \u2212 3',right:'9',note:'\u2212 2x from both sides'},
    {lbl:'Add 3',left:'3x',right:'12',note:'+ 3 to both sides'},
    {lbl:'Divide by 3',left:'x',right:'4',note:'\u00f7 3 both sides'}
  ];
  steps.forEach(function(st,i){
    if(p>=i+1){
      var y=42+i*52,hi=(i===3);
      o.push(R(40,y,170,44,hi?'#e8f8ee':'#fff5f0',hi?'#1a7a3a':'#C0272D',hi?2:1.5));
      o.push(T(125,y+27,st.left,hi?'#1a7a3a':'#C0272D',15,undefined,hi));
      o.push(T(240,y+27,'=','#888',16));
      o.push(R(270,y,170,44,hi?'#e8f8ee':'#e8f4ff',hi?'#1a7a3a':'#1a5a8a',hi?2:1.5));
      o.push(T(355,y+27,st.right,hi?'#1a7a3a':'#1a5a8a',15,undefined,hi));
      if(st.note)o.push(T(240,y+40,st.note,'#C8922A',10));
    }
  });
  s.innerHTML=o.join('');
}

/* Q5 Sequences — nth term and position-to-term */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  var terms=[5,9,13,17,21];
  terms.forEach(function(v,i){
    var x=52+i*80,show=(p>=1);
    o.push(R(x-26,40,52,46,show?'#fff5f0':'#f8f8f8',show?'#C0272D':'#ddd',show?2:1));
    o.push(T(x,58,'n='+(i+1),'#888',10));
    o.push(T(x,78,v,show?'#C0272D':'#aaa',17));
  });
  if(p>=1){
    o.push(T(52,108,'+4','#C8922A',12));o.push(T(132,108,'+4','#C8922A',12));o.push(T(212,108,'+4','#C8922A',12));o.push(T(292,108,'+4','#C8922A',12));
    o.push(T(240,128,'Common difference = 4, so nth term starts with 4n','#241A17',12));
  }
  if(p>=2){
    o.push(R(60,142,360,40,'#fff5f0','#C0272D',1.5));
    o.push(T(240,167,'When n=1: 4(1)+c=5  \u2192  c = 1','#241A17',13));
  }
  if(p>=3){
    o.push(R(120,192,240,40,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,217,'nth term = 4n + 1','#1a7a3a',17,undefined,true));
  }
  if(p>=4){
    o.push(T(240,250,'Term 20 = 4(20)+1 = 81   |   Is 65 a term? (65\u22121)/4=16 \u2713','#888',11));
  }
  s.innerHTML=o.join('');
}

/* Q6 Straight line graphs y=mx+c */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  var ox=60,oy=210,sx=35,sy=25;
  o.push(L(ox,20,ox,oy+10,'#ccc',1.5));o.push(L(ox-10,oy,420,oy,'#ccc',1.5));
  for(var i=-1;i<=8;i++){o.push(T(ox+i*sx,oy+14,i,'#aaa',9));}
  [-2,-1,0,1,2,3,4,5,6].forEach(function(v){var y=oy-v*sy;o.push(L(ox,y,420,y,'#f0f0f0',1));o.push(T(ox-8,y+4,v,'#aaa',9,'end'));});
  // y = 2x + 1
  if(p>=1){
    o.push(L(ox+0*sx,oy-1*sy,ox+5*sx,oy-11*sy,'#C0272D',2.5));
    o.push(T(ox+5*sx+8,oy-11*sy-6,'y=2x+1','#C0272D',12,'start'));
  }
  // y = -x + 4
  if(p>=2){
    o.push(L(ox-1*sx,oy-5*sy,ox+6*sx,oy-(-2)*sy,'#1a5a8a',2.5));
    o.push(T(ox+6*sx+8,oy-(-2)*sy+6,'y=\u2212x+4','#1a5a8a',12,'start'));
  }
  if(p>=1)o.push(T(240,22,'y=2x+1: gradient=2, y-intercept=1','#C0272D',11,undefined,true));
  if(p>=2)o.push(T(240,36,'y=\u2212x+4: gradient=\u22121, y-intercept=4','#1a5a8a',11,undefined,true));
  if(p>=3){
    // intersection at x=1, y=3
    var ix=ox+1*sx,iy=oy-3*sy;
    o.push('<circle cx="'+ix+'" cy="'+iy+'" r="6" fill="#C8922A" stroke="#fff" stroke-width="1.5"/>');
    o.push(T(ix+10,iy-10,'(1, 3)','#C8922A',12,'start',true));
  }
  s.innerHTML=o.join('');
}

/* Q7 Inequalities on a number line */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,22,'Solve and show on a number line: 4 \u2212 3x \u2265 \u221a2 + x','#C0272D',13,undefined,true));
  // number line
  var lx=50,y=130,sx=38;
  o.push(L(lx,y,430,y,'#ccc',2));
  for(var i=-2;i<=8;i++){o.push(L(lx+i*sx,y-6,lx+i*sx,y+6,'#888',1.5));o.push(T(lx+i*sx,y+20,i,'#888',11));}
  var steps=[
    '4 \u2212 3x \u2265 2 + x',
    '4 \u2212 2 \u2265 x + 3x   (collect x right, numbers left)',
    '2 \u2265 4x',
    'x \u2264 0.5'
  ];
  steps.forEach(function(st,i){if(p>=i+1)o.push(T(240,50+i*20,st,i===3?'#C0272D':'#241A17',i===3?15:13,undefined,i===3));});
  if(p>=4){
    var ub=lx+0.5*sx;
    o.push('<circle cx="'+ub+'" cy="'+y+'" r="7" fill="#C0272D" stroke="#C0272D" stroke-width="2"/>');
    o.push(L(lx,y,ub-7,y,'#C0272D',3));
    o.push('<polygon points="'+lx+','+y+' '+(lx+12)+','+(y-6)+' '+(lx+12)+','+(y+6)+'" fill="#C0272D"/>');
    o.push(T(ub,y-22,'x \u2264 0.5','#C0272D',13,undefined,true));
    o.push(T(ub,y+38,'Filled circle = included (\u2264)','#888',11));
  }
  s.innerHTML=o.join('');
}

/* Q8 Substitution into formula — speed */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  // speed triangle
  o.push('<polygon points="240,30 140,160 340,160" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push(L(240,30,240,160,'#C0272D',1.5,'4,3'));
  o.push(L(140,160,340,160,'#C0272D',2));
  o.push(T(240,105,'S','#C0272D',24,undefined,true));
  o.push(T(175,152,'D','#1a5a8a',20,undefined,true));
  o.push(T(305,152,'T','#1a7a3a',20,undefined,true));
  o.push(T(240,185,'Speed = Distance \u00f7 Time','#888',12,undefined,true));
  if(p>=1){
    o.push(R(40,202,120,40,'#fce8d8','#C0272D',1.5));o.push(T(100,227,'D = S \u00d7 T','#C0272D',13,undefined,true));
    o.push(R(180,202,120,40,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,227,'S = D \u00f7 T','#1a5a8a',13,undefined,true));
    o.push(R(320,202,120,40,'#e8f8ee','#1a7a3a',1.5));o.push(T(380,227,'T = D \u00f7 S','#1a7a3a',13,undefined,true));
  }
  if(p>=2){
    o.push(T(240,258,'D=150 km, T=2.5 hrs \u2192 S=150\u00f72.5=60 km/h','#C0272D',13,undefined,true));
  }
  s.innerHTML=o.join('');
}

/* Q9 Expanding double brackets + difference of squares */
function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,20,'Expand (x + 5)(x \u2212 5) and (2x + 3)\u00b2','#C0272D',14,undefined,true));
  // difference of two squares
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push(R(30,36,200,90,'#fff5f0','#C0272D',2));
    o.push(T(130,52,'(x+5)(x\u22125)','#C0272D',13,undefined,true));
    o.push(T(130,72,'= x\u00b2\u22125x+5x\u221225','#241A17',13));
    o.push(T(130,90,'= x\u00b2 \u2212 25','#C0272D',14,undefined,true));
    o.push(T(130,108,'Difference of 2 squares!','#C8922A',10));
  }
  // perfect square
  if(p>=2){
    o.push(R(250,36,200,90,'#e8f4ff','#1a5a8a',2));
    o.push(T(350,52,'(2x+3)\u00b2','#1a5a8a',13,undefined,true));
    o.push(T(350,72,'= (2x+3)(2x+3)','#241A17',13));
