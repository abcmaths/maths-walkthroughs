<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Place Value &amp; Rounding &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;}
.f{background:#1a5a8a;color:#fff;}.e{background:#C0272D;color:#fff;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Place Value &amp; Rounding &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +(h?'<ul class="hl">'+h+'</ul>':'')
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

// Q1 Place value table
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var cols=['Millions','Hund. Th.','Ten Th.','Thousands','Hundreds','Tens','Units'];
  var vals=[0,0,3,4,7,2,6]; // 347,276 displayed partially
  var cw=66;
  cols.forEach(function(c,i){
    o.push(R(14+i*cw,20,cw,36,'#C0272D','#C0272D',1));
    o.push(T(14+i*cw+cw/2,43,c,'#fff',8,'middle',true));
  });
  vals.forEach(function(v,i){
    if(p>=1){
      o.push(R(14+i*cw,58,cw,46,i===4?'#fff5f0':i===5?'#e8f0ff':i===6?'#e8f8ee':'#fff','#E4D6CE',1));
      o.push(T(14+i*cw+cw/2,87,v>0?v:'—','#241A17',22,'middle',true));
    }
  });
  if(p>=2){o.push(T(240,130,'3 in Ten Thousands place = 30,000','#C0272D',13,'middle',true));
    o.push(T(240,150,'7 in Hundreds place = 700','#1a5a8a',13,'middle',true));}
  if(p>=3){o.push(R(40,168,400,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,191,'Number = 347,276','#1a7a3a',17,'middle',true));}
  s.innerHTML=o.join('');}

// Q2 Rounding to decimal places
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var num='3.8 4 7 6';
  var digits=['3','.','8','4','7','6'];
  var labels=['units','','tenths','hundredths','thousandths','ten-th.'];
  digits.forEach(function(d,i){
    var col=p>=1&&i===2?'#C0272D':p>=2&&i===3?'#C8922A':'#241A17';
    o.push(R(40+i*68,30,60,50,i===2&&p>=1?'#fff5f0':i===3&&p>=2?'#fffbe8':'#fff','#E4D6CE',1.5));
    o.push(T(70+i*68,62,d,col,26,'middle',true));
    if(labels[i])o.push(T(70+i*68,95,labels[i],'#888',9,'middle',false));
  });
  if(p>=1){o.push(T(240,120,'Round to 1 d.p. → look at 2nd decimal (4)','#888',12,'middle',false));
    o.push(T(240,138,'4 < 5 → round DOWN → keep 8','#C0272D',13,'middle',true));}
  if(p>=2){o.push(T(240,162,'Round to 2 d.p. → look at 3rd decimal (7)','#888',12,'middle',false));
    o.push(T(240,180,'7 ≥ 5 → round UP → 84 → 85','#C8922A',13,'middle',true));}
  if(p>=3){o.push(R(80,198,320,40,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,213,'1 d.p.: 3.8   2 d.p.: 3.85','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');}

// Q3 Rounding to sig figs
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var digits=['0','.','0','0','6','4','7'];
  var sf=[false,false,false,false,true,true,true];
  digits.forEach(function(d,i){
    var highlight=p>=1&&sf[i];
    o.push(R(20+i*66,30,58,50,highlight?'#fff5f0':'#fff','#E4D6CE',1.5));
    o.push(T(49+i*66,62,d,highlight?'#C0272D':'#888',22,'middle',highlight));
  });
  if(p>=1){o.push(T(240,105,'Leading zeros are NOT significant','#888',12,'middle',false));
    o.push(T(240,122,'First sig fig = 6 (first non-zero digit)','#C0272D',13,'middle',true));}
  if(p>=2){o.push(T(240,148,'2 sig figs: 0.0064','#1a5a8a',14,'middle',true));}
  if(p>=3){o.push(R(80,165,320,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,188,'3 sig figs: 0.00647','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');}

// Q4 Estimating by rounding
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Estimate: 38.7 × 4.92 ÷ 9.8','#C0272D',16,'middle',true));
  if(p>=1){
    o.push(R(40,46,400,40,'#fff5f0','#C0272D',1.5));
    o.push(T(240,71,'Round each to 1 s.f.: 40 × 5 ÷ 10','#C0272D',14,'middle',false));
  }
  if(p>=2){o.push(R(100,96,280,40,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,121,'40 × 5 = 200','#1a5a8a',16,'middle',true));}
  if(p>=3){o.push(R(130,146,220,40,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,171,'200 ÷ 10 = 20','#1a7a3a',18,'middle',true));}
  if(p>=4){o.push(T(240,210,'Exact answer ≈ 19.4  Estimate: 20 ✓','#888',12,'middle',false));}
  s.innerHTML=o.join('');}

// Q5 Standard form (large numbers)
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Write 340,000 in standard form','#241A17',15,'middle',false));
  if(p>=1){o.push(T(240,65,'Move decimal after first digit: 3.4','#888',13,'middle',false));
    o.push(R(100,75,280,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,99,'3.4 × 10?','#C0272D',16,'middle',true));}
  if(p>=2){o.push(T(240,132,'Count places moved: 3 4 0 0 0 0 → 5 places','#888',12,'middle',false));
    o.push(R(100,144,280,38,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,168,'3.4 × 10⁵','#1a7a3a',20,'middle',true));}
  if(p>=3){o.push(T(240,210,'Standard form: a × 10ⁿ where 1 ≤ a < 10','#888',12,'middle',false));
    o.push(T(240,230,'Large number → positive power','#888',11,'middle',false));}
  s.innerHTML=o.join('');}

// Q6 Standard form (small numbers)
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Write 0.000057 in standard form','#241A17',15,'middle',false));
  if(p>=1){o.push(T(240,65,'Move decimal right to after first sig fig: 5.7','#888',13,'middle',false));
    o.push(R(100,75,280,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,99,'5.7 × 10?','#C0272D',16,'middle',true));}
  if(p>=2){o.push(T(240,132,'Moved 5 places right → power is −5','#888',12,'middle',false));
    o.push(R(100,144,280,38,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,168,'5.7 × 10⁻⁵','#1a7a3a',20,'middle',true));}
  if(p>=3){o.push(T(240,210,'Small number < 1 → negative power','#888',12,'middle',false));}
  s.innerHTML=o.join('');}

// Q7 Calculating with standard form
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'(3.2 × 10⁴) × (2.5 × 10³)','#C0272D',17,'middle',true));
  if(p>=1){o.push(T(240,68,'Multiply the numbers: 3.2 × 2.5','#888',13,'middle',false));
    o.push(R(100,78,280,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,102,'3.2 × 2.5 = 8.0','#C0272D',16,'middle',true));}
  if(p>=2){o.push(T(240,136,'Add the powers: 4 + 3 = 7','#888',13,'middle',false));
    o.push(R(100,146,280,38,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,170,'8.0 × 10⁷','#1a5a8a',18,'middle',true));}
  if(p>=3){o.push(T(240,210,'Check: 1 ≤ 8.0 < 10 ✓ Answer is in standard form','#888',12,'middle',false));}
  s.innerHTML=o.join('');}

// Q8 Upper and lower bounds
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'A length is 4.7 cm to 1 d.p. Find bounds.','#241A17',14,'middle',false));
  o.push(L(60,130,420,130,'#333',2));
  if(p>=1){
    o.push(L(200,120,200,140,'#1a5a8a',2));o.push(T(200,112,'4.65','#1a5a8a',13,'middle',true));o.push(T(200,155,'LB','#1a5a8a',11,'middle',false));
    o.push(L(310,120,310,140,'#C0272D',2));o.push(T(310,112,'4.75','#C0272D',13,'middle',true));o.push(T(310,155,'UB','#C0272D',11,'middle',false));
    o.push(T(255,130,'4.7','#1a7a3a',14,'middle',true));
  }
  if(p>=2){o.push(R(60,170,360,36,'#fff5f0','#C0272D',1.5));
    o.push(T(240,193,'Error interval: 4.65 ≤ l < 4.75','#C0272D',14,'middle',true));}
  if(p>=3){o.push(T(240,225,'Half the unit of measurement = 0.05','#888',12,'middle',false));
    o.push(T(240,245,'LB = 4.7 − 0.05   UB = 4.7 + 0.05','#888',12,'middle',false));}
  s.innerHTML=o.join('');}

// Q9 Ordering decimals/fractions
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var nums=[0.7,0.73,0.703,0.73];
  var strs=['0.7','0.73','0.703','7/10'];
  o.push(T(240,22,'Order smallest to largest: 0.7, 0.73, 0.703, 7/10','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,55,'Convert all to same decimal places:','#888',12,'middle',false));
    strs.forEach(function(n,i){
      o.push(R(20+i*112,65,100,40,'#fff5f0','#C0272D',1.5));
      o.push(T(70+i*112,90,n,'#241A17',13,'middle',false));
    });
  }
  if(p>=2){var conv=['0.700','0.730','0.703','0.700'];
    conv.forEach(function(n,i){o.push(T(70+i*112,120,n,'#1a5a8a',12,'middle',true));});}
  if(p>=3){o.push(R(40,135,400,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,158,'0.7 = 7/10 < 0.703 < 0.73','#1a7a3a',14,'middle',true));}
  if(p>=4){o.push(T(240,200,'7/10 = 0.7 — equal to the first value!','#888',12,'middle',false));}
  s.innerHTML=o.join('');}

// Q10 Truncation vs rounding
function dQ10(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Compare: round 3.876 and truncate 3.876 to 2 d.p.','#241A17',13,'middle',false));
  if(p>=1){o.push(R(30,44,420,50,'#fff5f0','#C0272D',1.5));
    o.push(T(240,62,'Rounding: look at 3rd d.p. (6 ≥ 5) → round UP','#C0272D',13,'middle',false));
    o.push(T(240,80,'3.876 rounded to 2 d.p. = 3.88','#C0272D',15,'middle',true));}
  if(p>=2){o.push(R(30,104,420,50,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,122,'Truncation: simply remove digits after 2nd d.p.','#1a5a8a',13,'middle',false));
    o.push(T(240,140,'3.876 truncated to 2 d.p. = 3.87','#1a5a8a',15,'middle',true));}
  if(p>=3){o.push(R(30,164,420,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,187,'Truncation always rounds toward zero','#1a7a3a',13,'middle',false));}
  if(p>=4){o.push(T(240,220,'Rounded: 3.88  Truncated: 3.87','#241A17',14,'middle',true));}
  s.innerHTML=o.join('');}

function yt1(){var d=rnd(10000,999999);
  var digits=String(d).split('');
  var places=['millions','hundred thousands','ten thousands','thousands','hundreds','tens','units'];
  var pidx=rnd(0,digits.length-1);
  var pval=parseInt(digits[pidx])*Math.pow(10,digits.length-1-pidx);
  return tryIt({question:'What is the value of the digit <b>'+digits[pidx]+'</b> in the number <b>'+d.toLocaleString()+'</b>?',
    hints:['Count place from right','Position: '+(places[7-digits.length+pidx])],
    ans:pval,tol:pval*0.001,unit:'',working:'The digit '+digits[pidx]+' is in the '+(places[7-digits.length+pidx])+' place = '+pval.toLocaleString()});}

function yt2(){var n=rnd(1000,9999)/100;
  var r1=Math.round(n*10)/10,r2=Math.round(n*100)/100;
  return tryIt({question:'Round <b>'+n.toFixed(3)+'</b> to <b>2 decimal places</b>.',
    hints:['Look at the 3rd decimal place','If ≥ 5, round up; if < 5, round down'],
    ans:r2,tol:0.001,unit:'',working:n.toFixed(3)+' → 3rd d.p. is '+Math.floor((n*1000)%10)+' → '+r2.toFixed(2)});}

function yt3(){var n=rnd(1,999)/10000;
  var s=n.toPrecision(2);
  return tryIt({question:'Round <b>'+n.toFixed(5)+'</b> to <b>2 significant figures</b>.',
    hints:['Find the first non-zero digit','Count 2 sig figs from there'],
    ans:parseFloat(s),tol:parseFloat(s)*0.01,unit:'',working:n.toFixed(5)+' → 2 s.f. = '+s});}

function yt4(){var a=rnd(18,49),b=rnd(3,9)+0.1*rnd(1,9);
  var est=Math.round(a/10)*10*Math.round(b);
  return tryIt({question:'Estimate <b>'+a+' × '+b.toFixed(1)+'</b> by rounding to 1 significant figure.',
    hints:['Round '+a+' to '+Math.round(a/10)*10,'Round '+b.toFixed(1)+' to '+Math.round(b)],
    ans:est,tol:Math.abs(est)*0.05,unit:'',working:Math.round(a/10)*10+' × '+Math.round(b)+' = '+est});}

function yt5(){var m=rnd(1,9)+rnd(1,9)/10,p=rnd(2,6);
  return tryIt({question:'Write <b>'+m.toFixed(1)+' × 10^'+p+'</b> as an ordinary number.',
    hints:['Multiply by 10^'+p,'Move decimal '+p+' places right'],
    ans:m*Math.pow(10,p),tol:m*Math.pow(10,p)*0.001,unit:'',working:m.toFixed(1)+' × 10^'+p+' = '+(m*Math.pow(10,p))});}

function yt6(){var m=rnd(1,9)+rnd(1,9)/10,p=rnd(2,5);
  return tryIt({question:'Write <b>'+m.toFixed(1)+' × 10^−'+p+'</b> as an ordinary number. Give your answer as a decimal.',
    hints:['Move decimal '+p+' places LEFT'],
    ans:m*Math.pow(10,-p),tol:m*Math.pow(10,-p)*0.01,unit:'',working:m.toFixed(1)+' × 10^−'+p+' = '+(m*Math.pow(10,-p)).toFixed(p+1)});}

function yt7(){var a=rnd(2,8)+rnd(1,9)/10,pa=rnd(2,4),b=rnd(2,5)+rnd(1,9)/10,pb=rnd(1,3);
  var ans=(a*b)*Math.pow(10,pa+pb);var m=a*b;
  var pf=pa+pb;if(m>=10){m/=10;pf++;}
  return tryIt({question:'Calculate <b>('+a.toFixed(1)+' × 10^'+pa+') × ('+b.toFixed(1)+' × 10^'+pb+')</b>. Give the power of 10 in your answer.',
    hints:['Multiply the numbers: '+a.toFixed(1)+' × '+b.toFixed(1),'Add the powers: '+pa+' + '+pb],
    ans:pf,tol:0,unit:'(power of 10)',working:a.toFixed(1)+' × '+b.toFixed(1)+' = '+(a*b).toFixed(2)+', powers: '+pa+'+'+pb+' → answer power = '+pf});}

function yt8(){var n=rnd(30,99)/10;
  var lb=n-0.05,ub=n+0.05;
  return tryIt({question:'A length is measured as <b>'+n.toFixed(1)+' cm</b> to 1 d.p. What is the upper bound?',
    hints:['Upper bound = measurement + half the unit','Half of 0.1 = 0.05'],
    ans:ub,tol:0.001,unit:'cm',working:n.toFixed(1)+' + 0.05 = '+ub.toFixed(2)+' cm'});}

function yt9(){var opts=[[0.4,0.04,0.404,'2/5'],[0.6,0.061,0.61,'3/5'],[0.8,0.08,0.801,'4/5']];
  var q=pick(opts);
  var sorted=[q[0],q[1],q[2],parseFloat(q[3].split('/')[0])/parseFloat(q[3].split('/')[1])].sort(function(a,b){return a-b;});
  return tryIt({question:'Order smallest to largest: '+q[0]+', '+q[1]+', '+q[2]+', '+q[3]+'. What is the <b>largest</b> value as a decimal?',
    hints:['Convert all to decimals with same decimal places'],
    ans:sorted[3],tol:0.001,unit:'',working:'Sorted: '+sorted.map(function(x){return x.toFixed(3);}).join(' < ')+'. Largest = '+sorted[3]});}

function yt10(){var n=(rnd(100,999)/100);
  var tr=Math.floor(n*10)/10;
  return tryIt({question:'Truncate <b>'+n.toFixed(2)+'</b> to 1 decimal place.',
    hints:['Simply remove digits after the 1st decimal place','Do NOT round up'],
    ans:tr,tol:0.001,unit:'',working:'Remove digits after 1st d.p.: '+tr.toFixed(1)});}

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').innerHTML=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
