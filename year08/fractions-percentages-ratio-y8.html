<style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">‚úî Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +(h?'<ul class="hl">'+h+'</ul>':'')
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){
      fb.className='try-fb fb ok';fb.innerHTML='‚úì Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite ‚Äî try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Fraction bar diagram 3/4 + 1/3
  for(var i=0;i<12;i++){o.push(R(20+i*37,20,35,36,i<9?'#C0272D44':'#fff','#C0272D',1.5));}
  o.push(T(240,72,'Twelfths: 9/12 + 4/12','#888',12,'middle',false));
  if(p>=1){o.push(T(240,92,'LCM(4,3) = 12','#888',12,'middle',false));
    o.push(T(240,110,'3/4 = 9/12   1/3 = 4/12','#C0272D',13,'middle',true));}
  if(p>=2){o.push(R(100,124,280,38,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,148,'9/12 + 4/12 = 13/12 = 1  1/12','#1a7a3a',15,'middle',true));}
  if(p>=3){o.push(T(240,185,'For subtraction, use same LCM process','#888',12,'middle',false));
    o.push(T(240,205,'5/6 ‚àí 1/4: LCM=12 ‚Üí 10/12 ‚àí 3/12 = 7/12','#C0272D',12,'middle',false));}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Multiplying fractions: 3/4 √ó 2/5','#C0272D',16,'middle',true));
  if(p>=1){o.push(R(30,42,420,44,'#fff5f0','#C0272D',1.5));

  o.push(T(240,25,'Simplifying and sharing a ratio','#C0272D',15,'middle',true));
  if(p>=1){o.push(T(240,55,'Share ¬£180 in ratio 2:3:5','#241A17',14,'middle',false));

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Fractions, decimals and percentages','#C0272D',15,'middle',true));
  var rows=[['1/4','0.25','25%'],['1/3','0.333...','33.3%'],['3/8','0.375','37.5%'],['2/5','0.4','40%']];

      o.push(R(20,y,440,40,ri%2===0?'#fff5f0':'#fff','#E4D6CE',1));

    }
  });
  s.innerHTML=o.join('');}

function yt1(){var n1=rnd(1,4),d1=pick([4,5,6,8]),n2=rnd(1,3),d2=pick([3,4,5]);
  var l=d1*d2/gcd(d1,d2),a=n1*l/d1+n2*l/d2,g2=gcd(a,l);
  return tryIt({question:'Calculate <b>'+n1+'/'+d1+' + '+n2+'/'+d2+'</b>. Enter the numerator of the answer in its lowest terms.',
    hints:['LCM('+d1+','+d2+') = '+l,'Convert both fractions to /'+l],
    ans:a/g2,tol:0,unit:'(numerator)',working:n1+'/'+d1+' + '+n2+'/'+d2+' = '+(n1*l/d1)+'/'+(l)+' + '+(n2*l/d2)+'/'+l+' = '+a/g2+'/'+(l/g2)});}
function yt2(){var n1=rnd(1,5),d1=pick([4,5,6,8]),n2=rnd(1,4),d2=pick([3,4,6]);
  var prod=n1*n2,dprod=d1*d2,g2=gcd(prod,dprod);
  return tryIt({question:'Calculate <b>'+n1+'/'+d1+' √ó '+n2+'/'+d2+'</b>. Enter the numerator in lowest terms.',
    hints:['Multiply numerators: '+n1+'√ó'+n2,'Multiply denominators: '+d1+'√ó'+d2,'Simplify'],
    ans:prod/g2,tol:0,unit:'(numerator)',working:n1+'/'+d1+' √ó '+n2+'/'+d2+' = '+prod+'/'+dprod+' = '+prod/g2+'/'+(dprod/g2)});}
function yt3(){var pct=pick([10,15,20,25,30,35,40]),amt=rnd(4,20)*10;
  return tryIt({question:'Find <b>'+pct+'%</b> of <b>¬£'+amt+'</b>.',
    hints:['Multiply: '+pct/100+' √ó '+amt],
    ans:pct*amt/100,tol:0.01,unit:'¬£',working:pct+'% of ¬£'+amt+' = '+pct/100+' √ó '+amt+' = ¬£'+(pct*amt/100).toFixed(2)});}
function yt4(){var orig=rnd(5,20)*10,chg=rnd(1,5)*5;var pct=chg/orig*100;
  return tryIt({question:'A price rises from <b>¬£'+orig+'</b> to <b>¬£'+(orig+chg)+'</b>. What is the percentage increase?',
    hints:['Change = ¬£'+chg,'% change = change √∑ original √ó 100'],
    ans:pct,tol:0.1,unit:'%',working:'('+chg+' √∑ '+orig+') √ó 100 = '+pct+'%'});}
