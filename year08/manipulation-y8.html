<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algebraic Manipulation &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;letter-spacing:.05em;}
.f{background:#1a5a8a;color:#fff;}.e{background:#C0272D;color:#fff;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Algebraic Manipulation &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +(h?'<ul class="hl">'+h+'</ul>':'')
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — try again.';}
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

// ── Random values generated once on page load ──
var q1=(function(){var a=rnd(2,6),b=rnd(2,6),c=rnd(1,5),k=rnd(1,7);return{a:a,b:b,c:c,k:k,ans:a+b+c};})();
var q2=(function(){var f=rnd(2,6),t1=1,t2=rnd(2,8);return{f:f,t1:t1,t2:t2,ft1:f*t1,ft2:f*t2};})();
var q3=(function(){var a=rnd(2,5),b=rnd(1,8),x=pick([-3,-2,-1,2,3,4]);return{a:a,b:b,x:x,ans:a*x+b};})();
var q4=(function(){var a=rnd(1,3),b=rnd(1,4),x=pick([-3,-2,2,3]);return{a:a,b:b,x:x,ans:a*x*x-b*x};})();
var q5=(function(){var p=rnd(1,6),q=rnd(1,6);return{p:p,q:q,coeff:p+q,con:p*q};})();
var q6=(function(){var f=pick([2,3,4,5,6]),a=rnd(2,7),b=rnd(1,5);return{f:f,a:a,b:b,fa:f*a,fb:f*b};})();
var q7=(function(){var a=rnd(2,6),x=rnd(2,8),b=rnd(2,9);return{a:a,b:b,c:a*x+b,ans:x};})();
var q8=(function(){
  var diff=rnd(1,3),x=rnd(2,6),a=diff+rnd(2,4),c=a-diff,b=rnd(1,5),d=b+diff*x;
  return{a:a,b:b,c:c,d:d,ans:x};
})();
var q9=(function(){
  var d=rnd(1,3),x=rnd(4,9),tot=3*x+3*d;
  return{d:d,x:x,tot:tot,s2:x+d,s3:x+2*d};
})();
var q10=(function(){var a=rnd(2,5),b=rnd(2,4),c=rnd(1,3);return{a:a,b:b,c:c,add:a+b,sub:a-c,pow:a*2};})();

// ── Draw functions ──
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,30,q1.a+'x + '+q1.b+'x − '+q1.k+' + '+q1.c+'x','#C0272D',19,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    [q1.a+'x',q1.b+'x',q1.c+'x'].forEach(function(t,i){
      o.push(R(20+i*138,50,118,38,'#fff5f0','#C0272D',1.5));
      o.push(T(79+i*138,74,t,'#C0272D',16,'middle',true));
    });
    o.push(R(20,98,118,36,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(79,120,'−'+q1.k,'#1a5a8a',16,'middle',true));
    o.push(T(240,150,'Collect x terms: '+q1.a+'x + '+q1.b+'x + '+q1.c+'x','#888',13,'middle',false));
  }
  if(p>=2){o.push(R(110,164,260,42,'#e8f8ee','#1a7a3a',2));o.push(T(240,191,q1.ans+'x − '+q1.k,'#1a7a3a',22,'middle',true));}
  if(p>=3){o.push(T(240,230,'Only like terms (same letter & power) can be combined','#888',11,'middle',false));}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Expand: '+q2.f+'(x + '+q2.t2+')','#C0272D',20,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push(T(130,80,q2.f,'#C0272D',22,'middle',true));
    o.push(T(186,80,'(x + '+q2.t2+')','#241A17',20,'middle',false));
    o.push('<defs><marker id="ar1" markerWidth="7" markerHeight="7" refX="3.5" refY="3.5" orient="auto"><path d="M0,0 L7,3.5 L0,7 Z" fill="#C0272D"/></marker></defs>');
    o.push('<path d="M 138,65 Q 190,38 215,66" fill="none" stroke="#C0272D" stroke-width="2" marker-end="url(#ar1)"/>');
    o.push('<path d="M 140,65 Q 240,30 285,66" fill="none" stroke="#C0272D" stroke-width="2" marker-end="url(#ar1)"/>');
    o.push(T(185,44,q2.f+'×x','#C0272D',11,'middle',false));
    o.push(T(258,36,q2.f+'×'+q2.t2,'#C0272D',11,'middle',false));
  }
  if(p>=2){o.push(R(100,106,280,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,134,q2.ft1+'x + '+q2.ft2,'#1a7a3a',22,'middle',true));}
  if(p>=3){o.push(T(240,180,'Multiply the factor outside by EACH term inside','#888',13,'middle',false));}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var xd=(q3.x<0?'('+q3.x+')':String(q3.x));
  o.push(T(240,28,'x = '+q3.x+' into '+q3.a+'x + '+q3.b,'#241A17',15,'middle',false));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){o.push(T(240,65,'Replace x with '+xd,'#888',13,'middle',false));
    o.push(R(80,76,320,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,100,q3.a+xd+' + '+q3.b,'#C0272D',17,'middle',true));}
  if(p>=2){o.push(T(240,145,'= '+(q3.a*q3.x)+' + '+q3.b,'#1a5a8a',16,'middle',true));}
  if(p>=3){o.push(R(150,163,180,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,188,'= '+q3.ans,'#1a7a3a',24,'middle',true));}
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var xd=(q4.x<0?'('+q4.x+')':String(q4.x));
  o.push(T(240,28,'x = '+q4.x+' into '+q4.a+'x² − '+q4.b+'x','#241A17',15,'middle',false));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){o.push(T(240,62,'Replace x with '+xd+' — use brackets!','#888',12,'middle',false));
    o.push(R(60,73,360,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,97,q4.a+xd+'² − '+q4.b+xd,'#C0272D',17,'middle',true));}
  if(p>=2){var sq=q4.x*q4.x;
    o.push(T(240,138,'('+q4.x+')² = '+sq,'#888',12,'middle',false));
    o.push(R(60,148,360,38,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,172,q4.a+'('+sq+') − '+q4.b+'('+q4.x+') = '+(q4.a*sq)+' − '+(q4.b*q4.x),'#1a5a8a',14,'middle',true));}
  if(p>=3){o.push(R(160,198,160,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,223,'= '+q4.ans,'#1a7a3a',22,'middle',true));}
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,26,'Expand: (x + '+q5.p+')(x + '+q5.q+')','#C0272D',19,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    var lbls=['First','Outer','Inner','Last'],cols=['#C0272D','#1a5a8a','#C8922A','#1a7a3a'];
    var terms=['x²','+'+q5.q+'x','+'+q5.p+'x','+'+q5.con];
    terms.forEach(function(t,i){
      o.push(R(18+i*112,46,100,44,cols[i]+'22',cols[i],1.5));
      o.push(T(68+i*112,60,lbls[i],cols[i],9,'middle',false));
      o.push(T(68+i*112,80,t,cols[i],14,'middle',true));
    });
  }
  if(p>=2){o.push(T(240,114,'Collect x terms: '+q5.q+'x + '+q5.p+'x = '+q5.coeff+'x','#888',12,'middle',false));
    o.push(R(90,125,300,42,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,151,'x² + '+q5.coeff+'x + '+q5.con,'#1a7a3a',20,'middle',true));}
  if(p>=3){o.push(T(240,192,'Coefficient of x = sum of the two numbers ('+q5.p+'+'+q5.q+'='+q5.coeff+')','#888',11,'middle',false));
    o.push(T(240,210,'Constant = product of the two numbers ('+q5.p+'×'+q5.q+'='+q5.con+')','#888',11,'middle',false));}
  s.innerHTML=o.join('');}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Factorise: '+q6.fa+'x + '+q6.fb,'#C0272D',20,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){o.push(T(240,65,'Find the HCF of '+q6.fa+' and '+q6.fb,'#888',13,'middle',false));
    o.push(R(140,75,200,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,99,'HCF = '+q6.f,'#C0272D',16,'middle',true));}
  if(p>=2){o.push(T(240,138,'Divide each term by '+q6.f,'#888',12,'middle',false));
    o.push(T(240,156,q6.fa+'x ÷ '+q6.f+' = '+q6.a+'x      '+q6.fb+' ÷ '+q6.f+' = '+q6.b,'#1a5a8a',13,'middle',false));}
  if(p>=3){o.push(R(100,170,280,42,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,196,q6.f+'('+q6.a+'x + '+q6.b+')','#1a7a3a',22,'middle',true));}
  if(p>=4){o.push(T(240,232,'Check: '+q6.f+'×'+q6.a+'x + '+q6.f+'×'+q6.b+' = '+q6.fa+'x + '+q6.fb+' ✔','#888',11,'middle',false));}
  s.innerHTML=o.join('');}

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Solve: '+q7.a+'x + '+q7.b+' = '+q7.c,'#C0272D',20,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){o.push(T(240,65,'Step 1: Subtract '+q7.b+' from both sides','#888',12,'middle',false));
    o.push(R(90,75,300,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,99,q7.a+'x = '+(q7.c-q7.b),'#C0272D',18,'middle',true));}
  if(p>=2){o.push(T(240,132,'Step 2: Divide both sides by '+q7.a,'#888',12,'middle',false));
    o.push(R(160,143,160,42,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,170,'x = '+q7.ans,'#1a7a3a',24,'middle',true));}
  if(p>=3){o.push(T(240,208,'Check: '+q7.a+'×'+q7.ans+' + '+q7.b+' = '+(q7.a*q7.ans+q7.b)+' ✔','#888',12,'middle',false));}
  s.innerHTML=o.join('');}

function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Solve: '+q8.a+'x + '+q8.b+' = '+q8.c+'x + '+q8.d,'#C0272D',17,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){o.push(T(240,65,'Move x terms left, numbers right','#888',12,'middle',false));
    o.push(R(60,75,360,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,99,q8.a+'x − '+q8.c+'x = '+q8.d+' − '+q8.b,'#C0272D',15,'middle',true));}
  if(p>=2){var diff=q8.a-q8.c,rhs=q8.d-q8.b;
    o.push(R(90,120,300,38,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,144,diff+'x = '+rhs,'#1a5a8a',18,'middle',true));}
  if(p>=3){o.push(R(160,168,160,42,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,195,'x = '+q8.ans,'#1a7a3a',22,'middle',true));}

// ── Your Turn generators (fresh random each call) ──
function yt1(){var a=rnd(2,5),b=rnd(2,5),c=rnd(1,4),k=rnd(1,7);
  return tryIt({question:'Simplify <b>'+a+'x + '+b+'x − '+k+' + '+c+'x</b>. Enter the coefficient of x.',
    hints:['Collect all x terms','The constant −'+k+' stays separate'],
    ans:a+b+c,tol:0,unit:'(coefficient of x)',working:(a+b+c)+'x − '+k+'. Coefficient = '+(a+b+c)});}

function yt2(){var f=rnd(2,7),t=rnd(2,9),c=rnd(1,8);
  return tryIt({question:'Expand <b>'+f+'('+t+'x + '+c+')</b>. Enter the constant term.',
    hints:[f+' × '+t+'x = '+f*t+'x',f+' × '+c+' = '+f*c],
    ans:f*c,tol:0,unit:'(constant term)',working:f*t+'x + '+f*c+'. Constant = '+f*c});}

function yt3(){var a=rnd(2,6),b=rnd(1,9),x=pick([-3,-2,-1,2,3,4,5]);
  return tryIt({question:'Substitute <b>x = '+x+'</b> into <b>'+a+'x + '+b+'</b>.',
    hints:['Replace x with '+(x<0?'('+x+')':x)],
    ans:a*x+b,tol:0,unit:'',working:a+'('+x+')+'+b+' = '+(a*x+b)});}

function yt4(){var a=rnd(1,3),b=rnd(1,5),x=pick([-2,-1,2,3]);
  return tryIt({question:'Substitute <b>x = '+x+'</b> into <b>'+a+'x² + '+b+'x</b>.',
    hints:['('+x+')² = '+(x*x),''+a*x*x+' + '+(b*x)],
    ans:a*x*x+b*x,tol:0,unit:'',working:a+'('+x+')²+'+b+'('+x+') = '+a*x*x+'+('+(b*x)+') = '+(a*x*x+b*x)});}

function yt5(){var p=rnd(1,7),q=rnd(1,7);
  return tryIt({question:'Expand <b>(x + '+p+')(x + '+q+')</b>. What is the constant term?',
    hints:['Last × Last: '+p+' × '+q],
    ans:p*q,tol:0,unit:'(constant)',working:'x² + '+(p+q)+'x + '+p*q+'. Constant = '+p*q});}

function yt6(){var f=pick([2,3,4,5,6]),a=rnd(2,6),b=rnd(1,5);
  return tryIt({question:'Factorise <b>'+(f*a)+'x + '+(f*b)+'</b>. What is the HCF (the factor outside the bracket)?',
    hints:['Find HCF of '+(f*a)+' and '+(f*b)],
    ans:f,tol:0,unit:'(HCF)',working:'HCF = '+f+'. Answer: '+f+'('+a+'x + '+b+')'});}

function yt7(){var a=rnd(2,6),x=rnd(2,9),b=rnd(2,10);
  return tryIt({question:'Solve <b>'+a+'x + '+b+' = '+(a*x+b)+'</b>.',
    hints:['Subtract '+b+' from both sides','Divide by '+a],
    ans:x,tol:0,unit:'',working:a+'x = '+(a*x)+', x = '+x});}

function yt8(){var diff=rnd(1,3),x=rnd(2,5),a=diff+rnd(2,3),c=a-diff,b=rnd(1,5),d=b+diff*x;
  return tryIt({question:'Solve <b>'+a+'x + '+b+' = '+c+'x + '+d+'</b>.',
    hints:['Move x terms: '+(a-c)+'x = '+(d-b)],
    ans:x,tol:0,unit:'',working:(a-c)+'x = '+(d-b)+', x = '+x});}

function yt9(){var d=rnd(1,4),x=rnd(4,8),tot=3*x+3*d;
  return tryIt({question:'A triangle has sides <b>x</b>, <b>x+'+d+'</b> and <b>x+'+2*d+'</b> cm. Perimeter = '+tot+' cm. Find x.',
    hints:['3x + '+3*d+' = '+tot],
    ans:x,tol:0,unit:'cm',working:'3x = '+(tot-3*d)+', x = '+x});}

    ans:a+b,tol:0,unit:'(power)',working:'y'+a+' × y'+b+' = y'+(a+b)+'. Power = '+(a+b)});}

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');
    w.appendChild(d);
  });
}
function render(){
  bSB();
  var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;
  document.getElementById('ti').innerHTML=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
