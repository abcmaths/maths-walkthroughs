<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perimeter, Area &amp; Volume &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;}
.f{background:#1a5a8a;color:#fff;}.e{background:#C0272D;color:#fff;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Perimeter, Area &amp; Volume &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +(h?'<ul class="hl">'+h+'</ul>':'')
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Trapezium
  o.push('<polygon points="100,200 380,200 340,80 140,80" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){o.push(T(240,215,'a = 8cm','#888',11,'middle',false));o.push(T(240,72,'b = 5cm','#888',11,'middle',false));o.push(T(88,145,'h','#888',11,'end',false));o.push(L(100,80,100,200,'#C8922A',2,'4,2'));o.push(T(88,140,'6cm','#C8922A',11,'end',false));}
  if(p>=2){o.push(R(30,218,420,34,'#fff5f0','#C0272D',1.5));o.push(T(240,239,'Area = ½(a+b)h = ½(8+5)×6','#C0272D',13,'middle',false));}
  if(p>=3){o.push(R(100,226,280,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,246,'= ½ × 13 × 6 = 39 cm²','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');}
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var cx=240,cy=120,r=80;
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){o.push(L(cx,cy,cx+r,cy,'#C8922A',2));o.push(T(cx+r/2,cy-10,'r = 5','#C8922A',12,'middle',true));}
  if(p>=2){o.push(R(40,212,180,38,'#fff5f0','#C0272D',1.5));o.push(T(130,234,'C = 2πr = 31.4cm','#C0272D',12,'middle',true));}
  if(p>=3){o.push(R(260,212,180,38,'#e8f8ee','#1a7a3a',1.5));o.push(T(350,234,'A = πr² = 78.5cm²','#1a7a3a',12,'middle',true));}
  s.innerHTML=o.join('');}
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Cylinder
  o.push('<ellipse cx="240" cy="80" rx="100" ry="20" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push('<ellipse cx="240" cy="190" rx="100" ry="20" fill="#e8e8e8" stroke="#888" stroke-width="1.5"/>');
  o.push(L(140,80,140,190,'#888',1.5));o.push(L(340,80,340,190,'#888',1.5));
  if(p>=1){o.push(L(240,80,340,80,'#C8922A',2));o.push(T(290,70,'r = 4','#C8922A',12,'middle',true));
    o.push(L(350,80,350,190,'#1a5a8a',2,'4,2'));o.push(T(368,135,'h = 10','#1a5a8a',12,'middle',false));}
  if(p>=2){o.push(R(20,212,440,36,'#fff5f0','#C0272D',1.5));o.push(T(240,232,'V = πr²h = π × 16 × 10','#C0272D',13,'middle',false));}
  if(p>=3){o.push(R(100,222,280,26,'#e8f8ee','#1a7a3a',1));o.push(T(240,240,'= 502.7 cm³','#1a7a3a',15,'middle',true));}
  s.innerHTML=o.join('');}
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // L-shape composite
  o.push('<polygon points="60,60 260,60 260,140 160,140 160,200 60,200" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){o.push(T(160,48,'10cm','#888',11,'middle',false));o.push(T(270,100,'4cm','#888',11,'start',false));o.push(T(110,210,'5cm','#888',11,'middle',false));o.push(T(48,130,'7cm','#888',11,'end',false));}
  if(p>=2){o.push(L(60,140,160,140,'#1a5a8a',1.5,'4,3'));o.push(T(110,155,'Split here','#1a5a8a',9,'middle',false));
    o.push(T(300,95,'Top: 10×4=40','#C0272D',11,'start',false));o.push(T(300,112,'Bottom: 5×3=15','#C8922A',11,'start',false));}
  if(p>=3){o.push(R(60,218,360,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,242,'Total area = 40 + 15 = 55 cm²','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');}
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Cuboid surface area
  o.push('<polygon points="80,180 200,180 200,80 80,80" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push('<polygon points="200,80 280,40 280,140 200,180" fill="#ffe8e8" stroke="#C0272D" stroke-width="2"/>');
  o.push('<polygon points="80,80 160,40 280,40 200,80" fill="#ffcece" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){o.push(T(140,192,'l=6','#888',11,'middle',false));o.push(T(214,130,'w=4','#888',11,'start',false));o.push(T(100,60,'h=3','#888',11,'middle',false));}
  if(p>=2){o.push(R(20,210,440,36,'#fff5f0','#C0272D',1.5));o.push(T(240,230,'SA = 2(lw+lh+wh) = 2(24+18+12)','#C0272D',12,'middle',false));}
  if(p>=3){o.push(R(100,220,280,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,239,'= 2 × 54 = 108 cm²','#1a7a3a',15,'middle',true));}
  s.innerHTML=o.join('');}
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var cx=240,cy=120,r=90;
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push('<path d="M '+cx+' '+cy+' L '+cx+' '+(cy-r)+' A '+r+' '+r+' 0 0 1 '+(cx+r)+' '+cy+' Z" fill="#C0272D44" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){o.push(T(cx+r/2+10,cy-r/2,'Sector','#C0272D',12,'middle',false));
    o.push(T(cx+20,cy-10,'90°','#C8922A',13,'middle',true));}
  if(p>=2){o.push(R(20,222,440,30,'#fff5f0','#C0272D',1.5));o.push(T(240,242,'Arc = (90/360)×2πr   Sector area = (90/360)×πr²','#C0272D',11,'middle',false));}
  if(p>=3){o.push(T(240,218,'r=6: Arc = ¼ × 37.7 = 9.42cm   Sector = ¼ × 113 = 28.3cm²','#1a7a3a',11,'middle',true));}
  s.innerHTML=o.join('');}
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Volume of a prism','#C0272D',15,'middle',true));
  o.push('<polygon points="100,200 200,200 200,100 100,100" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push('<polygon points="200,100 280,60 280,160 200,200" fill="#ffe8e8" stroke="#C0272D" stroke-width="2"/>');
  o.push('<polygon points="100,100 180,60 280,60 200,100" fill="#ffcece" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){o.push(T(150,215,'Cross-section','#888',10,'middle',false));o.push(T(248,130,'length','#888',10,'start',false));}
  if(p>=2){o.push(R(20,218,440,34,'#fff5f0','#C0272D',1.5));o.push(T(240,238,'Volume = Area of cross-section × length','#C0272D',13,'middle',false));}
  if(p>=3){o.push(T(240,210,'e.g. triangular prism: V = ½bh × l','#888',11,'middle',false));}
  s.innerHTML=o.join('');}
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Area and circumference recap','#C0272D',15,'middle',true));
  var formulae=[['Circumference','C = πd = 2πr'],['Area of circle','A = πr²'],['Arc length','(θ/360) × 2πr'],['Sector area','(θ/360) × πr²']];
  formulae.forEach(function(f,i){if(p>=i+1){o.push(R(20,40+i*50,440,40,i%2===0?'#fff5f0':'#fff','#E4D6CE',1.5));
    o.push(T(130,66+i*50,f[0],'#888',12,'middle',false));o.push(T(320,66+i*50,f[1],'#C0272D',13,'middle',true));}});
  s.innerHTML=o.join('');}
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Perimeter of compound shapes','#C0272D',15,'middle',true));
  o.push('<polygon points="80,200 320,200 320,130 220,130 220,80 80,80" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){o.push(T(200,214,'6cm','#888',11,'middle',false));o.push(T(330,165,'3.5cm','#888',11,'start',false));
    o.push(T(270,142,'2.5cm','#888',11,'middle',false));o.push(T(210,105,'2.5cm','#888',11,'end',false));o.push(T(68,140,'6cm','#888',11,'end',false));}
  if(p>=2){o.push(R(30,220,420,30,'#fff5f0','#C0272D',1.5));o.push(T(240,240,'Add all outer sides only — internal lines don\'t count','#C0272D',12,'middle',false));}
  if(p>=3){o.push(T(240,215,'P = 6+3.5+2.5+2.5+3.5+6 = 24cm','#1a7a3a',13,'middle',true));}
  s.innerHTML=o.join('');}
function dQ10(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Converting area and volume units','#C0272D',14,'middle',true));
  if(p>=1){o.push(R(20,40,440,44,'#fff5f0','#C0272D',1.5));o.push(T(240,58,'Length: 1m = 100cm','#C0272D',13,'middle',false));
    o.push(T(240,74,'Area: 1m² = 100² cm² = 10,000 cm²','#C0272D',13,'middle',false));}
  if(p>=2){o.push(R(20,94,440,44,'#e8f0ff','#1a5a8a',1.5));o.push(T(240,112,'Volume: 1m³ = 100³ cm³ = 1,000,000 cm³','#1a5a8a',13,'middle',false));
    o.push(T(240,128,'1 litre = 1000 cm³   1 ml = 1 cm³','#1a5a8a',12,'middle',false));}
  if(p>=3){o.push(R(20,148,440,44,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,166,'5.2 m² = 5.2 × 10,000 = 52,000 cm²','#1a7a3a',14,'middle',true));
    o.push(T(240,182,'Square the conversion factor for area','#888',11,'middle',false));}
  s.innerHTML=o.join('');}

function yt1(){var a=rnd(6,14),b=rnd(3,10),h=rnd(4,8);return tryIt({question:'Find the area of a trapezium with parallel sides <b>'+a+' cm</b> and <b>'+b+' cm</b>, height <b>'+h+' cm</b>.',hints:['Area = ½(a+b)h','a='+a+', b='+b+', h='+h],ans:0.5*(a+b)*h,tol:0.1,unit:'cm²',working:'½('+a+'+'+b+')×'+h+' = ½×'+(a+b)+'×'+h+' = '+0.5*(a+b)*h+' cm²'});}
function yt2(){var r=rnd(3,9);var c=2*Math.PI*r,a=Math.PI*r*r;return tryIt({question:'A circle has radius <b>'+r+' cm</b>. Find the area (use π = 3.142, give 1 d.p.).',hints:['A = πr²','r² = '+r*r],ans:Math.round(a*10)/10,tol:0.2,unit:'cm²',working:'π × '+r+'² = π × '+r*r+' = '+(a).toFixed(1)+' cm²'});}
function yt3(){var r=rnd(2,6),h=rnd(5,12);var v=Math.PI*r*r*h;return tryIt({question:'Find the volume of a cylinder with radius <b>'+r+' cm</b> and height <b>'+h+' cm</b> (1 d.p.).',hints:['V = πr²h'],ans:Math.round(v*10)/10,tol:0.5,unit:'cm³',working:'π × '+r+'² × '+h+' = '+(v).toFixed(1)+' cm³'});}
function yt4(){var l=rnd(8,14),w=rnd(5,8),indent=rnd(2,4),ih=rnd(2,4);var tot=l*w-indent*ih;return tryIt({question:'An L-shape is made from a '+l+'×'+w+' rectangle with a '+indent+'×'+ih+' rectangle removed. Find the area.',hints:['Full rectangle − removed piece',''+l+'×'+w+' − '+indent+'×'+ih],ans:tot,tol:0.1,unit:'cm²',working:l+'×'+w+' − '+indent+'×'+ih+' = '+l*w+' − '+indent*ih+' = '+tot+' cm²'});}
function yt5(){var l=rnd(3,8),w=rnd(2,6),h=rnd(2,5);var sa=2*(l*w+l*h+w*h);return tryIt({question:'Find the surface area of a cuboid with l=<b>'+l+'</b>, w=<b>'+w+'</b>, h=<b>'+h+'</b> cm.',hints:['SA = 2(lw + lh + wh)'],ans:sa,tol:0.1,unit:'cm²',working:'2('+l*w+'+'+l*h+'+'+w*h+') = 2×'+(l*w+l*h+w*h)+' = '+sa+' cm²'});}
function yt6(){var r=rnd(4,9),th=pick([60,90,120,45]);var arc=th/360*2*Math.PI*r;return tryIt({question:'Find the arc length of a sector with radius <b>'+r+' cm</b> and angle <b>'+th+'°</b> (1 d.p.).',hints:['Arc = ('+th+'/360) × 2πr'],ans:Math.round(arc*10)/10,tol:0.2,unit:'cm',working:'('+th+'/360) × 2π × '+r+' = '+arc.toFixed(1)+' cm'});}
function yt7(){var base=rnd(4,10),ht=rnd(3,8),len=rnd(5,12);var v=0.5*base*ht*len;return tryIt({question:'Triangular prism: triangle base <b>'+base+' cm</b>, height <b>'+ht+' cm</b>, length <b>'+len+' cm</b>. Find volume.',hints:['V = ½ × base × height × length'],ans:v,tol:0.1,unit:'cm³',working:'½ × '+base+' × '+ht+' × '+len+' = '+v+' cm³'});}
function yt8(){var r=rnd(3,8);var a=Math.PI*r*r;return tryIt({question:'Circle radius <b>'+r+' cm</b>. Find area in cm² (1 d.p.).',hints:['A = πr²'],ans:Math.round(a*10)/10,tol:0.2,unit:'cm²',working:'π × '+r*r+' = '+a.toFixed(1)+' cm²'});}
function yt9(){var a=rnd(4,10),b=rnd(3,8),c=rnd(5,10),d=rnd(2,6);return tryIt({question:'A shape has outer sides: <b>'+a+', '+b+', '+c+', '+d+', '+a+', '+b+'</b> cm. Find the perimeter.',hints:['Add all outer sides'],ans:a+b+c+d+a+b,tol:0,unit:'cm',working:a+'+'+b+'+'+c+'+'+d+'+'+a+'+'+b+' = '+(a+b+c+d+a+b)+' cm'});}
function yt10(){var m2=rnd(2,9);return tryIt({question:'Convert <b>'+m2+' m²</b> to cm².',hints:['1 m² = 10,000 cm²','Multiply by 10,000'],ans:m2*10000,tol:0,unit:'cm²',working:m2+' × 10,000 = '+m2*10000+' cm²'});}

var QS=[
  {ey:'Q1 · Year 8 · Area',ti:'Area of a Trapezium <span class="badge f">F</span>',su:'Find the area of a trapezium with parallel sides 8 cm and 5 cm, height 6 cm.',steps:[{lb:'Formula',dr:dQ1,ht:'<div class="fm">Area = ½(a + b) × h</div><p>where a and b are the parallel sides and h is the perpendicular height.</p>'},{lb:'Substitute',dr:dQ1,ht:'<div class="fm">= ½(8 + 5) × 6 = ½ × 13 × 6</div>'},{lb:'Calculate',dr:dQ1,ht:'<div class="fm">= 39 cm²</div>'},{lb:'Your turn',dr:dQ1,ht:yt1}]},

  {ey:'Q5 · Year 8 · Volume',ti:'Surface Area of a Cuboid <span class="badge f">F</span>',su:'Find the surface area of a cuboid with l=6, w=4, h=3 cm.',steps:[{lb:'Formula',dr:dQ5,ht:'<div class="fm">SA = 2(lw + lh + wh)</div><p>There are 3 pairs of faces.</p>'},{lb:'Substitute',dr:dQ5,ht:'<div class="fm">= 2(24 + 18 + 12) = 2 × 54</div>'},{lb:'Calculate',dr:dQ5,ht:'<div class="fm">= 108 cm²</div>'},{lb:'Your turn',dr:dQ5,ht:yt5}]},
  {ey:'Q6 · Year 8 · Area',ti:'Arc Length &amp; Sector Area <span class="badge e">E</span>',su:'Find the arc length and area of a 90° sector with radius 6 cm.',steps:[{lb:'Fraction of a circle',dr:dQ6,ht:'<p>A sector is a fraction of a full circle. That fraction is angle ÷ 360.</p>'},{lb:'Formulae',dr:dQ6,ht:'<div class="fm">Arc = (θ/360) × 2πr</div><div class="fm">Sector area = (θ/360) × πr²</div>'},{lb:'Substitute θ=90, r=6',dr:dQ6,ht:'<div class="fm">Arc = ¼ × 2π×6 = 9.42 cm</div><div class="fm">Sector = ¼ × π×36 = 28.3 cm²</div>'},{lb:'Your turn',dr:dQ6,ht:yt6}]},

  {ey:'Q10 · Year 8 · Measurement',ti:'Converting Area &amp; Volume Units <span class="badge e">E</span>',su:'Convert 5.2 m² to cm².',steps:[{lb:'Length conversion',dr:dQ10,ht:'<div class="fm">1 m = 100 cm</div>'},{lb:'Area conversion',dr:dQ10,ht:'<div class="fm">1 m² = 100 × 100 = 10,000 cm²</div><p>Square the linear conversion factor.</p>'},{lb:'Apply',dr:dQ10,ht:'<div class="fm">5.2 m² = 5.2 × 10,000 = 52,000 cm²</div>'},{lb:'Your turn',dr:dQ10,ht:yt10}]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').innerHTML=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
