<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Addition &amp; Subtraction &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;letter-spacing:.05em;}
.f{background:#1a5a8a;color:#fff;}.e{background:#C0272D;color:#fff;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Addition &amp; Subtraction &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +(h?'<ul class="hl">'+h+'</ul>':'')
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 try again.';}
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

// ── Column addition helper: draws digits stacked with carrying ──
function colAdd(nums, x0, y0, o) {
  // nums: array of numbers to add, drawn as column
  var strs = nums.map(function(n){return String(n);});
  var maxLen = Math.max.apply(null, strs.map(function(s){return s.length;}));
  var cw = 22, rh = 30;
  // right-align each number
  strs.forEach(function(s,i){
    for(var j=0;j<s.length;j++){
      var col = maxLen - s.length + j;
      o.push(T(x0+col*cw+cw/2, y0+i*rh, s[j], i===strs.length-1?'#C0272D':'#241A17', 18, 'middle', i===strs.length-1));
    }
  });
  // line under last number
  o.push(L(x0-4, y0+(strs.length-1)*rh+6, x0+maxLen*cw+4, y0+(strs.length-1)*rh+6, '#241A17', 1.5));
}

// ── Random values ──
var q1=(function(){var a=rnd(234,789),b=rnd(123,456);return{a:a,b:b,ans:a+b};})();
var q2=(function(){var a=rnd(500,900),b=rnd(100,399);return{a:a,b:b,ans:a-b};})();
var q3=(function(){
  // decimal addition: tenths
  var a=rnd(10,50)/10, b=rnd(10,50)/10;
  return{a:a,b:b,ans:round2(a+b)};
})();
var q4=(function(){
  // decimal subtraction: tenths
  var b=rnd(10,40)/10, a=round2(b+rnd(10,40)/10);
  return{a:a,b:b,ans:round2(a-b)};
})();
var q5=(function(){
  // decimal addition: hundredths (different dp)
  var a=rnd(10,99)/10, b=rnd(10,99)/100;
  return{a:a,b:b,ans:round2(a+b)};
})();
var q6=(function(){
  // negative integers: a + b where b is negative
  var a=rnd(5,15), b=-rnd(3,12);
  return{a:a,b:b,ans:a+b};
})();
var q7=(function(){
  // negative integers: a - b where b is negative (two negatives)
  var a=rnd(2,10), b=-rnd(2,8);
  return{a:a,b:b,ans:a-b};
})();
var q8=(function(){
  // addition with carrying across columns
  var a=rnd(350,699), b=rnd(250,499);
  return{a:a,b:b,ans:a+b};
})();
var q9=(function(){
  // subtraction with borrowing
  var b=rnd(145,399), a=b+rnd(50,200);
  return{a:a,b:b,ans:a-b};
})();
var q10=(function(){
  // mixed: positive + negative + positive
  var a=rnd(5,15), b=-rnd(2,8), c=rnd(1,6);
  return{a:a,b:b,c:c,ans:a+b+c};
})();

// ── Diagram functions ──
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q1.a+' + '+q1.b,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(80,90,'Column method:','#888',12,'start',false));
    colAdd([q1.a, q1.b], 180, 80, o);
    o.push(T(80,160,'Line up digits in columns: ones under ones, tens under tens.','#888',11,'start',false));
  }
  if(p>=2){
    o.push(T(240,185,'Add each column right to left. Carry any tens.','#888',12,'middle',false));
    o.push(R(160,194,160,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,222,q1.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q2.a+' \u2212 '+q2.b,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(80,90,'Column method:','#888',12,'start',false));
    colAdd([q2.a, q2.b], 180, 80, o);
    o.push(T(240,145,'Subtract each column right to left. Borrow if needed.','#888',11,'middle',false));
  }
  if(p>=2){
    o.push(T(240,168,'Borrowing: take 1 from the next column and add 10.','#888',11,'middle',false));
    o.push(R(160,178,160,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,206,q2.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q3.a+' + '+q3.b,'#C0272D',20,'middle',true));
  if(p>=1){
    // place value columns for decimals
    var cols=['Ones','.','Tenths'],cw=70,cx=120;
    cols.forEach(function(c,i){
      o.push(R(cx+i*cw,56,cw-2,22,'#e0e0e0','#888',1));
      o.push(T(cx+i*cw+cw/2-1,71,c,'#555',9,'middle',false));
    });
    var strs=[String(q3.a),String(q3.b)];
    strs.forEach(function(s2,ri){
      s2.split('').forEach(function(ch,ci){
        var col=ch==='.'?1:null;
        if(col===null) col=s2.indexOf('.')>ci?0:2;
        o.push(R(cx+col*cw,80+ri*32,cw-2,30,'#fff8f6','#E4D6CE',1));
        o.push(T(cx+col*cw+cw/2-1,100+ri*32,ch,ch==='.'?'#888':'#241A17',16,'middle',true));
      });
    });
    o.push(T(240,160,'Line up decimal points \u2014 then add column by column.','#888',11,'middle',false));
  }
  if(p>=2){
    o.push(R(150,172,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,200,q3.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q4.a+' \u2212 '+q4.b,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(240,75,'Line up decimal points vertically:','#888',12,'middle',false));
    var cx=200,rh=30;
    [String(q4.a),String(q4.b)].forEach(function(s2,i){
      o.push(T(cx,100+i*rh,s2,'#241A17',18,'middle',true));
    });
    o.push(L(cx-50,135,cx+50,135,'#241A17',1.5));
    o.push(T(cx-60,130,'\u2212','#C0272D',18,'end',true));
  }
  if(p>=2){
    o.push(T(240,170,'Subtract column by column. Borrow across the decimal point if needed.','#888',11,'middle',false));
    o.push(R(150,182,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,210,q4.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q5.a+' + '+q5.b,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(240,72,'Different numbers of decimal places \u2014 use a placeholder zero.','#888',11,'middle',false));
    var a2=q5.a.toFixed(2), b2=q5.b.toFixed(2);
    o.push(T(240,100,a2,'#241A17',18,'middle',true));
    o.push(T(240,126,b2,'#241A17',18,'middle',true));
    o.push(L(170,134,310,134,'#241A17',1.5));
    o.push(T(160,128,'+','#C0272D',18,'end',true));
    o.push(T(240,98+56,'Write '+q5.b+' as '+b2+' (add a zero so columns align)','#888',10,'middle',false));
  }
  if(p>=2){
    o.push(R(150,160,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,188,q5.ans,'#1a7a3a',24,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q6.a+' + ('+q6.b+')','#C0272D',20,'middle',true));
  if(p>=1){
    // number line
    var nlx=40,nly=130,nlw=400,zero=nlx+q6.a/(q6.a+Math.abs(q6.b)+2)*nlw;
    var sc=nlw/(q6.a+Math.abs(q6.b)+2);
    o.push(L(nlx,nly,nlx+nlw,nly,'#333',2));
    // ticks and labels
    for(var t=Math.min(0,q6.ans)-1;t<=q6.a+1;t++){
      var tx=nlx+(t-Math.min(0,q6.ans)+1)*sc;
      o.push(L(tx,nly-5,tx,nly+5,'#888',1));
      if(t%2===0||Math.abs(t)<=2)o.push(T(tx,nly+16,t,'#888',9,'middle',false));
    }
    // start dot
    var sx=nlx+(q6.a-Math.min(0,q6.ans)+1)*sc;
    o.push('<circle cx="'+sx+'" cy="'+nly+'" r="6" fill="#C0272D"/>');
    o.push(T(sx,nly-14,q6.a,'#C0272D',11,'middle',true));
    o.push(T(240,170,'Adding a negative number moves LEFT on the number line.','#888',11,'middle',false));
  }
  if(p>=2){
    var sx2=nlx+(q6.a-Math.min(0,q6.ans)+1)*sc;
    var ex=nlx+(q6.ans-Math.min(0,q6.ans)+1)*sc;
    o.push('<line x1="'+sx2+'" y1="'+(nly-8)+'" x2="'+ex+'" y2="'+(nly-8)+'" stroke="#1a5a8a" stroke-width="2"/>');
    o.push('<circle cx="'+ex+'" cy="'+nly+'" r="6" fill="#1a7a3a"/>');
    o.push(T(ex,nly-22,q6.ans,'#1a7a3a',12,'middle',true));
    o.push(R(150,186,180,40,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,212,'Answer: '+q6.ans,'#1a7a3a',18,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q7.a+' \u2212 ('+q7.b+')','#C0272D',20,'middle',true));
  if(p>=1){
    o.push(R(20,56,440,56,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,74,'Rule: subtracting a negative = adding a positive','#1a5a8a',13,'middle',true));
    o.push(T(240,100,q7.a+' \u2212 ('+q7.b+') = '+q7.a+' + '+Math.abs(q7.b),'#241A17',15,'middle',false));
  }
  if(p>=2){
    o.push(T(240,130,'Two negatives make a positive.','#888',12,'middle',false));
    o.push(T(240,150,'Think of it as: removing a debt is the same as gaining money.','#888',11,'middle',false));
    o.push(R(150,164,180,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,192,q7.a+' + '+Math.abs(q7.b)+' = '+q7.ans,'#1a7a3a',18,'middle',true));
  }
  s.innerHTML=o.join('');}

function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,35,'Calculate: '+q8.a+' + '+q8.b,'#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(80,72,'Show all carries clearly:','#888',12,'start',false));
    // column layout with carry markers
    var cx=200,cy=90;
    o.push(T(cx,cy,String(q8.a),'#241A17',18,'middle',false));
    o.push(T(cx,cy+28,String(q8.b),'#241A17',18,'middle',false));
    o.push(L(cx-50,cy+36,cx+50,cy+36,'#241A17',1.5));
    o.push(T(cx-58,cy+30,'+','#C0272D',18,'end',true));
    // carry annotations
    var ones=(q8.a%10+q8.b%10);
    var tens=Math.floor(q8.a/10)%10+Math.floor(q8.b/10)%10;
    if(ones>=10)o.push(T(cx-8,cy-8,'1','#C8922A',11,'middle',true));
