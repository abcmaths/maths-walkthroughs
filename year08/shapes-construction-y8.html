<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shapes &amp; Construction &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;}
.f{background:#1a5a8a;color:#fff;}.e{background:#C0272D;color:#fff;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Shapes &amp; Construction &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Lines of symmetry','#C0272D',15,'middle',true));
  var shapes=[{pts:[[100,50],[180,50],[180,130],[100,130]],label:'Square: 4',cx:140,cy:90},
    {pts:[[260,50],[380,50],[360,130],[280,130]],label:'Rect: 2',cx:320,cy:90}];
  shapes.forEach(function(sh,si){
    o.push(poly(sh.pts,'#fff5f0','#C0272D',2));
    if(p>=1){o.push(T(sh.cx,sh.cy+58,sh.label,'#888',10,'middle',false));}
  });
  if(p>=1){// dashed symmetry lines on square
    o.push(L(100,90,180,90,'#1a5a8a',1.5,'4,3'));o.push(L(140,50,140,130,'#1a5a8a',1.5,'4,3'));
    o.push(L(100,50,180,130,'#C8922A',1.5,'4,3'));o.push(L(180,50,100,130,'#C8922A',1.5,'4,3'));}
  if(p>=2){// rectangle: only 2
    o.push(L(260,90,380,90,'#1a5a8a',1.5,'4,3'));o.push(L(320,50,320,130,'#1a5a8a',1.5,'4,3'));}
  if(p>=3){o.push(R(40,148,400,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,171,'Regular n-gon has n lines of symmetry','#1a7a3a',13,'middle',false));}
  s.innerHTML=o.join('');}
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Perpendicular bisector construction','#C0272D',14,'middle',true));
  o.push(L(80,130,400,130,'#241A17',2));o.push(T(80,142,'A','#241A17',11,'middle',false));o.push(T(400,142,'B','#241A17',11,'middle',false));
  if(p>=1){// compass arcs from A
    o.push('<path d="M 80,90 A 180,180 0 0,1 80,170" fill="none" stroke="#C0272D" stroke-width="1.5" stroke-dasharray="4,3"/>');
    o.push('<path d="M 400,90 A 180,180 0 0,0 400,170" fill="none" stroke="#1a5a8a" stroke-width="1.5" stroke-dasharray="4,3"/>');
    o.push(T(100,80,'Same radius','#888',9,'start',false));}
  if(p>=2){o.push('<circle cx="240" cy="80" r="4" fill="#C8922A"/>');o.push('<circle cx="240" cy="180" r="4" fill="#C8922A"/>');
    o.push(L(240,50,240,210,'#1a7a3a',2,'4,3'));}
  if(p>=3){o.push(R(40,220,400,32,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,241,'Bisector is perpendicular to AB at its midpoint','#1a7a3a',12,'middle',false));}
  s.innerHTML=o.join('');}
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Angle bisector construction','#C0272D',14,'middle',true));
  var vx=100,vy=200;
  o.push(L(vx,vy,vx+240,vy-40,'#241A17',2));o.push(L(vx,vy,vx+200,vy-160,'#241A17',2));
  if(p>=1){o.push('<path d="M 180,196 A 80,80 0 0,1 140,115" fill="none" stroke="#C0272D" stroke-width="1.5" stroke-dasharray="4,3"/>');
    o.push(T(220,170,'Same radius from V','#888',9,'start',false));}
  if(p>=2){o.push('<circle cx="206" cy="158" r="4" fill="#C8922A"/>');o.push('<circle cx="180" cy="140" r="4" fill="#C8922A"/>');
    o.push(L(vx,vy,vx+220,vy-130,'#1a7a3a',2,'4,3'));}
  if(p>=3){o.push(R(40,218,400,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,241,'Bisector divides the angle exactly in half','#1a7a3a',12,'middle',false));}
  s.innerHTML=o.join('');}
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Loci — equidistant from a point','#C0272D',14,'middle',true));
  var cx=240,cy=130,r=80;
  if(p>=1){o.push('<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#C8922A"/>');o.push(T(cx+10,cy-12,'Point P','#C8922A',10,'start',false));}
  if(p>=2){o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#C0272D" stroke-width="2" stroke-dasharray="6,3"/>');
    o.push(T(cx+r+8,cy,'r = 5cm','#C0272D',10,'start',false));}
  if(p>=3){o.push(R(40,218,400,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,241,'Locus = circle centred on P with given radius','#1a7a3a',12,'middle',false));}
  s.innerHTML=o.join('');}
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Pythagoras\' theorem','#C0272D',15,'middle',true));
  o.push('<polygon points="100,200 340,200 100,80" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push('<rect x="100" y="192" width="8" height="8" fill="none" stroke="#888" stroke-width="1"/>');
  if(p>=1){o.push(T(220,215,'a = 6','#888',12,'middle',false));o.push(T(88,140,'b = 8','#888',12,'end',false));o.push(T(230,130,'c = ?','#C8922A',14,'middle',true));}
  if(p>=2){o.push(R(140,220,200,32,'#fff5f0','#C0272D',1.5));o.push(T(240,241,'c² = 6² + 8² = 36 + 64 = 100','#C0272D',13,'middle',false));}
  if(p>=3){o.push(R(160,226,160,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,244,'c = √100 = 10 cm','#1a7a3a',15,'middle',true));}
  s.innerHTML=o.join('');}
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Properties of polygons','#C0272D',15,'middle',true));
  var rows=[['Square','4 equal sides, 4 right angles, 4 lines sym.'],['Rectangle','2 pairs equal sides, 4 right angles'],['Rhombus','4 equal sides, opposite angles equal'],['Parallelogram','2 pairs parallel sides, no right angles'],['Kite','2 pairs adjacent equal sides']];
  rows.forEach(function(r,i){if(p>=1){o.push(R(20,38+i*42,460,38,i%2===0?'#fff5f0':'#fff','#E4D6CE',1));
    o.push(T(80,62+i*42,r[0],'#C0272D',12,'middle',true));o.push(T(280,62+i*42,r[1],'#888',10,'middle',false));}});
  s.innerHTML=o.join('');}
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'3D shapes — nets','#C0272D',15,'middle',true));
  // Cube net
  var cells=[[1,0],[0,1],[1,1],[2,1],[3,1],[1,2]];var sz=48,ox=80,oy=40;
  cells.forEach(function(c){if(p>=1){o.push(R(ox+c[0]*sz,oy+c[1]*sz,sz,sz,'#fff5f0','#C0272D',1.5));}});
  if(p>=1){o.push(T(ox+2*sz,oy+4*sz+14,'Net of a cube (6 squares)','#888',10,'middle',false));}
  if(p>=2){o.push(R(320,40,130,130,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(385,80,'Cuboid net:','#1a5a8a',10,'middle',false));o.push(T(385,100,'2 × (l×w)','#1a5a8a',10,'middle',false));
    o.push(T(385,116,'2 × (l×h)','#1a5a8a',10,'middle',false));o.push(T(385,132,'2 × (w×h)','#1a5a8a',10,'middle',false));}
  if(p>=3){o.push(R(40,218,400,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,241,'A net folds up to make the 3D shape','#1a7a3a',12,'middle',false));}
  s.innerHTML=o.join('');}
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Plans and elevations','#C0272D',15,'middle',true));
  if(p>=1){// Simple 3D box views
    o.push(R(40,50,120,100,'#fff5f0','#C0272D',2));o.push(T(100,160,'Plan (top)','#888',10,'middle',false));
    o.push(R(200,50,100,100,'#e8f0ff','#1a5a8a',2));o.push(T(250,160,'Front elev.','#888',10,'middle',false));
    o.push(R(340,50,80,100,'#e8f8ee','#1a7a3a',2));o.push(T(380,160,'Side elev.','#888',10,'middle',false));}
  if(p>=2){o.push(T(100,180,'Width × Depth','#888',9,'middle',false));
    o.push(T(250,180,'Width × Height','#888',9,'middle',false));
    o.push(T(380,180,'Depth × Height','#888',9,'middle',false));}
  if(p>=3){o.push(R(40,200,400,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,223,'3 views needed to fully describe a 3D solid','#1a7a3a',12,'middle',false));}
  s.innerHTML=o.join('');}
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Order of rotational symmetry','#C0272D',15,'middle',true));
  var cx=240,cy=120;
  // Equilateral triangle
  var pts=[];for(var i=0;i<3;i++){var a=(i*120-90)*Math.PI/180;pts.push([cx+90*Math.cos(a),cy+90*Math.sin(a)]);}
  o.push(poly(pts,'#fff5f0','#C0272D',2));
  if(p>=1){o.push('<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#C8922A"/>');
    o.push(T(cx+10,cy-10,'Centre','#888',9,'start',false));}
  if(p>=2){o.push(T(cx,cy+108,'Order 3 — looks the same 3 times in 360°','#888',10,'middle',false));
    o.push(T(cx,cy+122,'Rotated 120°, 240°, 360°','#888',9,'middle',false));}
  if(p>=3){o.push(R(40,210,400,44,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,228,'Square: order 4   Rectangle: order 2','#1a7a3a',12,'middle',false));
    o.push(T(240,244,'Regular n-gon: order n','#1a7a3a',12,'middle',false));}
  s.innerHTML=o.join('');}
function dQ10(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Pythagoras — finding a shorter side','#C0272D',14,'middle',true));
  o.push('<polygon points="100,200 340,200 340,80" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push('<rect x="332" y="192" width="8" height="8" fill="none" stroke="#888" stroke-width="1"/>');
  if(p>=1){o.push(T(220,215,'?','#C8922A',16,'middle',true));o.push(T(355,140,'5','#888',12,'middle',false));o.push(T(200,130,'13','#888',12,'middle',false));}
  if(p>=2){o.push(R(60,224,360,28,'#fff5f0','#C0272D',1));o.push(T(240,243,'a² + 5² = 13²   a² = 169 − 25 = 144','#C0272D',12,'middle',false));}
  if(p>=3){o.push(R(140,226,200,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,244,'a = √144 = 12 cm','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');}

function yt1(){var shapes=[['equilateral triangle',3],['square',4],['regular pentagon',5],['regular hexagon',6],['rectangle',2],['isosceles triangle',1]];
  var q=pick(shapes);return tryIt({question:'How many lines of symmetry does a <b>'+q[0]+'</b> have?',hints:['Regular n-gon has n lines'],ans:q[1],tol:0,unit:'lines',working:'A '+q[0]+' has '+q[1]+' line(s) of symmetry'});}
function yt2(){var a=rnd(3,9),b=rnd(3,9),c=Math.sqrt(a*a+b*b);return tryIt({question:'Right-angled triangle: shorter sides <b>'+a+' cm</b> and <b>'+b+' cm</b>. Find the hypotenuse (1 d.p.).',hints:['c² = '+a+'² + '+b+'²','c² = '+a*a+' + '+b*b],ans:Math.round(c*10)/10,tol:0.2,unit:'cm',working:'c = √('+(a*a+b*b)+') = '+c.toFixed(1)+' cm'});}
function yt3(){var c=pick([5,10,13,15,17]),a=pick([3,6,5,9,8]).valueOf();var b=Math.sqrt(c*c-a*a);if(b===Math.floor(b)){return tryIt({question:'Hypotenuse = <b>'+c+' cm</b>, one leg = <b>'+a+' cm</b>. Find the other leg.',hints:['b² = '+c+'² − '+a+'²','b² = '+(c*c-a*a)],ans:b,tol:0.1,unit:'cm',working:'b = √('+(c*c-a*a)+') = '+b+' cm'});}
  else{var a2=rnd(3,8),c2=Math.round(Math.sqrt(a2*a2+64)*10)/10;return tryIt({question:'Hypotenuse ≈ <b>'+c2+' cm</b>, one leg = <b>'+a2+' cm</b>. Find the other leg (1 d.p.).',hints:['b² = hyp² − leg²'],ans:8,tol:0.2,unit:'cm',working:'b = √('+c2+'² − '+a2+'²) ≈ 8 cm'});}}
function yt4(){
  var scenarios=[
    {q:'A point moves so it is always <b>equidistant from two fixed points A and B</b>. What is this locus? Enter <b>1</b> = perpendicular bisector, <b>2</b> = angle bisector, <b>3</b> = circle.',a:1,w:'The perpendicular bisector of AB — every point on it is equidistant from A and B.'},
    {q:'A point moves so it is always <b>equidistant from two intersecting lines</b>. What is this locus? Enter <b>1</b> = perpendicular bisector, <b>2</b> = angle bisector, <b>3</b> = circle.',a:2,w:'The angle bisector — every point on it is equidistant from both lines.'},
    {q:'A point moves so it is always a <b>fixed distance from a fixed point</b>. What is this locus? Enter <b>1</b> = straight line, <b>2</b> = angle bisector, <b>3</b> = circle.',a:3,w:'A circle centred on the fixed point, with radius equal to the fixed distance.'},
    {q:'A point moves so it is always <b>equidistant from a fixed line</b>. What is this locus? Enter <b>1</b> = parallel line, <b>2</b> = angle bisector, <b>3</b> = circle.',a:1,w:'A line parallel to the fixed line, at the same distance on either side.'}
  ];

function yt5(){var n=pick([3,4,5,6,8]);return tryIt({question:'What is the order of rotational symmetry of a regular <b>'+n+'-sided polygon</b>?',hints:['Regular n-gon has order n'],ans:n,tol:0,unit:'',working:'Regular '+n+'-gon: order of rotational symmetry = '+n});}
function yt6(){var l=rnd(3,8),w=rnd(2,5),h=rnd(2,4);return tryIt({question:'How many faces does a cuboid with l='+l+', w='+w+', h='+h+' have?',hints:['A cuboid has 3 pairs of rectangular faces'],ans:6,tol:0,unit:'faces',working:'All cuboids have 6 faces (3 pairs)'});}
function yt7(){var sides=pick([3,4,5,6]);var name=['triangle','quadrilateral','pentagon','hexagon'][sides-3];return tryIt({question:'A <b>'+name+'</b> has '+sides+' sides. How many diagonals does it have? (Formula: n(n−3)/2)',hints:['n = '+sides,''+sides+'('+sides+'−3)/2'],ans:sides*(sides-3)/2,tol:0,unit:'diagonals',working:sides+'('+sides+'−3)/2 = '+sides*(sides-3)/2+' diagonals'});}
function yt8(){var a=rnd(3,10),b=rnd(3,10),c=Math.sqrt(a*a+b*b);return tryIt({question:'Is a triangle with sides <b>'+a+', '+b+', '+Math.round(c)+'</b> right-angled? Enter 1 for yes, 0 for no.',hints:['Check: does a²+b² = c²?',a+'²+'+b+'² = '+(a*a+b*b)],ans:Math.abs(Math.round(c)-c)<0.01?1:0,tol:0,unit:'(1=yes,0=no)',working:a+'²+'+b+'² = '+(a*a+b*b)+', '+Math.round(c)+'² = '+Math.round(c)*Math.round(c)+'. '+(Math.abs(Math.round(c)-c)<0.01?'Yes, right-angled.':'Not exactly right-angled.')});}
function yt9(){
  var shapes=[
    {n:'triangular prism',faces:5,w:'2 triangular ends + 3 rectangular sides = 5 faces.'},
