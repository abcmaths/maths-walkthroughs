<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mensuration · Maths Walkthroughs</title>
<style>
:root{ --red:#C0272D; --dark-red:#7A1418; --cream:#FBF6F1; --ink:#241A17; --line:#E4D6CE; --gold:#C8922A; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--cream); color:var(--ink); font-family:'Helvetica Neue',Arial,sans-serif; }
header{
  background:var(--red); color:#fff; height:56px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px; position:sticky; top:0; z-index:100;
}
.back-btn{
  font-size:13px; font-weight:600; color:#fff;
  background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.35);
  padding:5px 12px; border-radius:3px; cursor:pointer; text-decoration:none;
}
.back-btn:hover{ background:rgba(255,255,255,.3); }
.header-title{ font-size:15px; font-weight:700; }
.layout{ display:flex; max-width:1100px; margin:0 auto; padding:28px 20px 60px; gap:28px; }
.sidebar{ width:200px; flex-shrink:0; display:flex; flex-direction:column; gap:6px; }
.sidebar-label{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#888; font-weight:700; margin-bottom:4px; }
.q-list-btn{ text-align:left; background:#fff; border:1px solid var(--line); border-radius:4px; padding:9px 12px; cursor:pointer; font-size:13px; transition:.15s; color:var(--ink); }
.q-list-btn:hover{ border-color:var(--red); color:var(--red); }
.q-list-btn.active{ background:var(--red); color:#fff; border-color:var(--red); }
.q-list-btn .q-num{ font-weight:700; font-size:11px; display:block; opacity:.7; }
.q-list-btn .q-name{ font-size:13px; }
.main{ flex:1; min-width:0; }
@media(max-width:640px){
  .layout{ flex-direction:column; }
  .sidebar{ width:100%; flex-direction:row; flex-wrap:wrap; }
  .q-list-btn{ flex:1; min-width:80px; }
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← All Topics</a>
  <div class="header-title">Mensuration</div>
  <div style="width:80px"></div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-label">Questions</div>
  </div>
  <div class="main">
    <div id="app"></div>
  </div>
</div>

<script src="engine.js"></script>

<script>
/* ═══════════════════════════════════
   DRAWING FUNCTIONS
═══════════════════════════════════ */
function getSVG(){ return document.getElementById('app_svg'); }

function drawTrapPrism(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 300');
  const fx1=80,fy1=240,fx2=300,fy2=240,fx3=260,fy3=120,fx4=120,fy4=120,dx=60,dy=-30;
  const bx1=fx1+dx,by1=fy1+dy,bx2=fx2+dx,by2=fy2+dy,bx3=fx3+dx,by3=fy3+dy,bx4=fx4+dx,by4=fy4+dy;
  let o=[];
  o.push(`<polygon points="${bx1},${by1} ${bx2},${by2} ${bx3},${by3} ${bx4},${by4}" fill="#f5e6dd" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>`);
  [[fx1,fy1,bx1,by1],[fx2,fy2,bx2,by2],[fx3,fy3,bx3,by3],[fx4,fy4,bx4,by4]].forEach(([x1,y1,x2,y2])=>o.push(`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#aaa" stroke-width="1"/>`));
  if(phase>=1)o.push(`<polygon points="${fx4},${fy4} ${fx3},${fy3} ${bx3},${by3} ${bx4},${by4}" fill="#fce8d8" stroke="#C0272D" stroke-width="1.5"/>`);
  o.push(`<polygon points="${fx1},${fy1} ${fx2},${fy2} ${fx3},${fy3} ${fx4},${fy4}" fill="${phase>=1?'#fff0e8':'#fff'}" stroke="#C0272D" stroke-width="2"/>`);
  if(phase>=1){
    o.push(`<text x="${(fx4+fx3)/2}" y="${fy4-8}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">a=10</text>`);
    o.push(`<text x="${(fx1+fx2)/2}" y="${fy1+16}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">b=21</text>`);
    o.push(`<text x="${fx2+12}" y="${(fy2+fy3)/2}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600">h=8</text>`);
  }
  if(phase>=2)o.push(`<text x="${(fx2+bx2)/2+5}" y="${(fy2+by2)/2+14}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600">l=20</text>`);
  s.innerHTML=o.join('');
}

function drawRatio(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 300');
  const cx=130,cy=240,cr=55,ch=150;let o=[];
  o.push(`<ellipse cx="${cx}" cy="${cy}" rx="${cr}" ry="14" fill="#e8d8cc" stroke="#bbb" stroke-width="1"/>`);
  o.push(`<rect x="${cx-cr}" y="${cy-ch}" width="${cr*2}" height="${ch}" fill="${phase===1?'#fce8d8':'#fff0f0'}" stroke="#C0272D" stroke-width="2"/>`);
  o.push(`<ellipse cx="${cx}" cy="${cy-ch}" rx="${cr}" ry="14" fill="${phase===1?'#ffc6a8':'#ffe0d0'}" stroke="#C0272D" stroke-width="2"/>`);
  o.push(`<text x="${cx}" y="${cy+28}" font-size="12" font-family="Arial" fill="#6b5750" text-anchor="middle">Cylinder r=6</text>`);
  if(phase>=1)o.push(`<text x="${cx}" y="${cy-ch/2}" font-size="14" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">36πh</text>`);
  const bx=310,by=240,bw=90,bh=150,bd=30;
  o.push(`<polygon points="${bx},${by} ${bx+bw},${by} ${bx+bw+bd},${by-bd} ${bx+bd},${by-bd}" fill="#c8e0d0" stroke="#bbb" stroke-width="1"/>`);
  o.push(`<polygon points="${bx+bw},${by} ${bx+bw},${by-bh} ${bx+bw+bd},${by-bh-bd} ${bx+bw+bd},${by-bd}" fill="#daeee2" stroke="#bbb" stroke-width="1"/>`);
  o.push(`<rect x="${bx}" y="${by-bh}" width="${bw}" height="${bh}" fill="${phase===2?'#d8f0e8':'#f0fff8'}" stroke="#0a7a3a" stroke-width="2"/>`);
  o.push(`<text x="${bx+bw/2}" y="${by+28}" font-size="12" font-family="Arial" fill="#6b5750" text-anchor="middle">Cuboid 13×8</text>`);
  if(phase>=2)o.push(`<text x="${bx+bw/2}" y="${by-bh/2}" font-size="14" font-family="Arial" fill="#0a7a3a" text-anchor="middle">104h</text>`);
  if(phase>=3)o.push(`<text x="240" y="285" font-size="15" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">Ratio: 9π : 26</text>`);
  s.innerHTML=o.join('');
}

function drawConeInCyl(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 300');
  const cx=240,cy=260,r=85,h=190;let o=[];
  o.push(`<rect x="${cx-r}" y="${cy-h}" width="${r*2}" height="${h}" fill="${phase===1?'#fce8d8':'#fff5f0'}" stroke="#C0272D" stroke-width="2"/>`);
  o.push(`<ellipse cx="${cx}" cy="${cy}" rx="${r}" ry="15" fill="#e8d0c8" stroke="#C0272D" stroke-width="1.5"/>`);
  o.push(`<ellipse cx="${cx}" cy="${cy-h}" rx="${r}" ry="15" fill="${phase===1?'#fce8d8':'#fff5f0'}" stroke="#C0272D" stroke-width="1.5"/>`);
  o.push(`<polygon points="${cx-r},${cy} ${cx+r},${cy} ${cx},${cy-h}" fill="${phase===2?'#f8d0b8':'rgba(200,100,80,0.12)'}" stroke="#7A1418" stroke-width="1.8" stroke-dasharray="6,4"/>`);
  o.push(`<ellipse cx="${cx}" cy="${cy}" rx="${r}" ry="15" fill="none" stroke="#7A1418" stroke-width="1.5" stroke-dasharray="5,4"/>`);
  o.push(`<text x="${cx+r+8}" y="${cy-h/2}" font-size="12" font-family="Arial" fill="#6b5750">h=15</text>`);
  o.push(`<text x="${cx}" y="${cy+28}" font-size="12" font-family="Arial" fill="#6b5750" text-anchor="middle">r=7</text>`);
  if(phase>=3)o.push(`<text x="${cx}" y="${cy-h/2-10}" font-size="14" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">490π cm³</text>`);
  s.innerHTML=o.join('');
}

function drawKite(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 320');
  const ax=240,ay=40,bx=110,by=180,cx2=370,cy2=180,dx=240,dy=290;
  const rad=Math.hypot(bx-ax,by-ay);let o=[];
  o.push(`<circle cx="${ax}" cy="${ay}" r="${rad}" fill="none" stroke="#ddd" stroke-width="1.5" stroke-dasharray="5,4"/>`);
  if(phase>=1){
    o.push(`<line x1="${ax}" y1="${ay}" x2="${dx}" y2="${dy}" stroke="#C8922A" stroke-width="1.5" stroke-dasharray="5,4"/>`);
    o.push(`<line x1="${bx}" y1="${by}" x2="${cx2}" y2="${cy2}" stroke="#C8922A" stroke-width="1.5" stroke-dasharray="5,4"/>`);
  }
  o.push(`<polygon points="${ax},${ay} ${bx},${by} ${dx},${dy} ${cx2},${cy2}" fill="${phase>=3?'#fce8d8':'#fff8f5'}" stroke="#C0272D" stroke-width="2"/>`);
  [[ax,ay,'A'],[bx,by,'B'],[cx2,cy2,'C'],[dx,dy,'D']].forEach(([x,y,l])=>{
    o.push(`<circle cx="${x}" cy="${y}" r="4" fill="#C0272D"/>`);
    const off=l==='A'?[0,-14]:l==='B'?[-16,0]:l==='C'?[14,0]:[0,14];
    o.push(`<text x="${x+off[0]}" y="${y+off[1]}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">${l}</text>`);
  });
  if(phase>=2)o.push(`<text x="${ax+8}" y="${ay+60}" font-size="13" font-family="Arial" fill="#C0272D">r=10</text>`);
  s.innerHTML=o.join('');
}

function drawFrustum(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 320');
  const cx=240,R=110,r=40,yBot=270,yTop=150;let o=[];
  if(phase>=1){
    o.push(`<polygon points="${cx-r},${yTop} ${cx+r},${yTop} ${cx},${yTop-40}" fill="#ffe0cc" stroke="#C8922A" stroke-width="1.5" stroke-dasharray="5,4"/>`);
    o.push(`<text x="${cx}" y="${yTop-48}" font-size="11" font-family="Arial" fill="#888" text-anchor="middle">Small cone H≈2.86</text>`);
  }
  o.push(`<polygon points="${cx-R},${yBot} ${cx+R},${yBot} ${cx+r},${yTop} ${cx-r},${yTop}" fill="${phase>=3?'#fce8d8':'#fff5f0'}" stroke="#C0272D" stroke-width="2"/>`);
  o.push(`<ellipse cx="${cx}" cy="${yBot}" rx="${R}" ry="16" fill="#e0c8bc" stroke="#C0272D" stroke-width="1.5"/>`);
  o.push(`<ellipse cx="${cx}" cy="${yTop}" rx="${r}" ry="8" fill="${phase>=1?'#ffd0b8':'#ffe8e0'}" stroke="#C0272D" stroke-width="1.5"/>`);
  o.push(`<text x="${cx+R+8}" y="${yBot}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600">R=11</text>`);
  o.push(`<text x="${cx+r+6}" y="${yTop-2}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600">r=4</text>`);
  o.push(`<line x1="${cx-R-20}" y1="${yBot}" x2="${cx-R-20}" y2="${yTop}" stroke="#bbb" stroke-width="1"/>`);
  o.push(`<text x="${cx-R-38}" y="${(yBot+yTop)/2+5}" font-size="11" font-family="Arial" fill="#6b5750" transform="rotate(-90,${cx-R-38},${(yBot+yTop)/2})">h=5</text>`);
  s.innerHTML=o.join('');
}

function drawSphere(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 300');
  const cx=240,cy=150,r=100;let o=[];
  o.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${phase>=2?'#fce8d8':'#fff5f0'}" stroke="#C0272D" stroke-width="2"/>`);
  o.push(`<ellipse cx="${cx}" cy="${cy}" rx="${r}" ry="18" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,4"/>`);
  if(phase>=1){
    o.push(`<line x1="${cx}" y1="${cy}" x2="${cx+r}" y2="${cy}" stroke="#C0272D" stroke-width="2"/>`);
    o.push(`<text x="${cx+r/2}" y="${cy-8}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">r≈8.38</text>`);
  }
  if(phase>=2)o.push(`<text x="${cx}" y="${cy+r+24}" font-size="13" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">SA≈881.8 cm²</text>`);
  o.push(`<text x="${cx}" y="${cy+r+40}" font-size="12" font-family="Arial" fill="#6b5750" text-anchor="middle">V=2463 cm³</text>`);
  s.innerHTML=o.join('');
}

function drawHemiCups(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 300');
  const cx=160,cy=180,R=100;let o=[];
  o.push(`<path d="M ${cx-R} ${cy} A ${R} ${R} 0 0 0 ${cx+R} ${cy}" fill="${phase===1?'#a8d8f8':'#ddeef8'}" stroke="#1a6ea8" stroke-width="2"/>`);
  o.push(`<ellipse cx="${cx}" cy="${cy}" rx="${R}" ry="14" fill="#c8e4f4" stroke="#1a6ea8" stroke-width="1.5"/>`);
  o.push(`<text x="${cx}" y="${cy+30}" font-size="12" font-family="Arial" fill="#6b5750" text-anchor="middle">Hemisphere R=17</text>`);
  if(phase>=1)o.push(`<text x="${cx}" y="${cy-50}" font-size="13" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">≈10296 cm³</text>`);
  if(phase>=2){
    for(let i=0;i<3;i++){
      const ccx=330+i*44,ccy=200,cr2=14,ch=50;
      o.push(`<rect x="${ccx-cr2}" y="${ccy-ch}" width="${cr2*2}" height="${ch}" fill="#fce8d8" stroke="#C0272D" stroke-width="1.5"/>`);
      o.push(`<ellipse cx="${ccx}" cy="${ccy}" rx="${cr2}" ry="5" fill="#e8c8b4" stroke="#C0272D" stroke-width="1"/>`);
      o.push(`<ellipse cx="${ccx}" cy="${ccy-ch}" rx="${cr2}" ry="5" fill="#fce8d8" stroke="#C0272D" stroke-width="1"/>`);
    }
    o.push(`<text x="352" y="232" font-size="11" font-family="Arial" fill="#6b5750" text-anchor="middle">r=2, h=9</text>`);
  }
  if(phase>=3)o.push(`<text x="352" y="268" font-size="15" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">90 complete cups</text>`);
  s.innerHTML=o.join('');
}

function drawCuboidPyramid(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 320');
  const ox=160,oy=260,w=130,h=80,d=50;let o=[];
  o.push(`<polygon points="${ox},${oy-h} ${ox+w},${oy-h} ${ox+w+d},${oy-h-d} ${ox+d},${oy-h-d}" fill="#e8e0d8" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>`);
  o.push(`<polygon points="${ox+w},${oy} ${ox+w+d},${oy-d} ${ox+w+d},${oy-h-d} ${ox+w},${oy-h}" fill="#f0e8e0" stroke="#C0272D" stroke-width="1.5"/>`);
  o.push(`<rect x="${ox}" y="${oy-h}" width="${w}" height="${h}" fill="${phase===1?'#fce8d8':'#fff5f0'}" stroke="#C0272D" stroke-width="2"/>`);
  o.push(`<line x1="${ox}" y1="${oy}" x2="${ox+w}" y2="${oy}" stroke="#C0272D" stroke-width="2"/>`);
  const apx=ox+w/2+d/2,apy=oy-h-d-90;
  const p1=[ox+d,oy-h-d],p2=[ox+w+d,oy-h-d],p3=[ox+w,oy-h],p4=[ox,oy-h];
  const pf=phase>=2?'#fce0c8':'#ffe8d8';
  [[apx,apy,p1,p2],[apx,apy,p2,p3],[apx,apy,p3,p4],[apx,apy,p4,p1]].forEach(([ax,ay,pa,pb])=>{
    o.push(`<polygon points="${ax},${ay} ${pa[0]},${pa[1]} ${pb[0]},${pb[1]}" fill="${pf}" stroke="#C0272D" stroke-width="1.5"/>`);
  });
  if(phase>=1)o.push(`<text x="${ox+w/2}" y="${oy+16}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">10×10, h=6</text>`);
  if(phase>=2)o.push(`<text x="${apx+10}" y="${apy+55}" font-size="12" font-family="Arial" fill="#C0272D">l=13</text>`);
  s.innerHTML=o.join('');
}

function drawAnnulus(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 300');
  const cx=240,cy=150,R=110,r=40;let o=[];
  o.push(`<circle cx="${cx}" cy="${cy}" r="${R}" fill="${phase>=1?'#fce8d8':'#fff0ea'}" stroke="#C0272D" stroke-width="2.5"/>`);
  o.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${phase>=2?'#e0f0ff':'#f5f0ff'}" stroke="#6060aa" stroke-width="2"/>`);
  o.push(`<line x1="${cx}" y1="${cy}" x2="${cx+R}" y2="${cy}" stroke="#C0272D" stroke-width="1.5"/>`);
  o.push(`<line x1="${cx}" y1="${cy}" x2="${cx-r}" y2="${cy}" stroke="#6060aa" stroke-width="1.5"/>`);
  o.push(`<text x="${cx+R/2}" y="${cy-8}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">R=8</text>`);
  o.push(`<text x="${cx-r/2}" y="${cy-8}" font-size="12" font-family="Arial" fill="#6060aa" text-anchor="middle">r=3</text>`);
  if(phase>=3)o.push(`<text x="${cx}" y="${cy+R+24}" font-size="13" font-family="Arial" fill="#C0272D" font-weight="600" text-anchor="middle">Area=55π≈172.8 cm²</text>`);
  s.innerHTML=o.join('');
}

function drawConeHemi(phase){
  const s=getSVG();if(!s)return;s.setAttribute('viewBox','0 0 480 320');
  const cx=240,baseY=210,R=90,tipY=50,hemiBottomY=baseY+76;let o=[];
  o.push(`<path d="M ${cx-R} ${baseY} A ${R} ${R*0.85} 0 0 0 ${cx+R} ${baseY}" fill="${phase===4||phase>=5?'#F0D9E0':'#fdf2ea'}" stroke="${phase===4||phase>=5?'#7A1418':'#bb8f78'}" stroke-width="${phase>=4?2.5:1.5}"/>`);
  o.push(`<polygon points="${cx-R},${baseY} ${cx},${tipY} ${cx+R},${baseY}" fill="${phase===3||phase>=5?'#F6D9C9':'#fff'}" stroke="${phase===3||phase>=5?'#C0272D':'#bb8f78'}" stroke-width="${phase>=3?2.5:1.5}"/>`);
  o.push(`<ellipse cx="${cx}" cy="${baseY}" rx="${R}" ry="15" fill="none" stroke="#aaa" stroke-width="1.2" stroke-dasharray="5,3"/>`);
  if(phase===2){
    o.push(`<line x1="${cx}" y1="${baseY}" x2="${cx}" y2="${tipY}" stroke="#C8922A" stroke-width="1.5" stroke-dasharray="4,3"/>`);
    o.push(`<line x1="${cx}" y1="${baseY}" x2="${cx+R}" y2="${baseY}" stroke="#C8922A" stroke-width="1.5" stroke-dasharray="4,3"/>`);
    o.push(`<line x1="${cx+R}" y1="${baseY}" x2="${cx}" y2="${tipY}" stroke="#C0272D" stroke-width="2.5"/>`);
    o.push(`<text x="${cx+8}" y="${(baseY+tipY)/2}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600">h=24</text>`);
    o.push(`<text x="${cx+R/2-8}" y="${baseY+18}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600">r=7</text>`);
    o.push(`<text x="${cx+R/2+16}" y="${(baseY+tipY)/2-28}" font-size="12" font-family="Arial" fill="#C0272D" font-weight="600">l=25</text>`);
  } else {
    o.push(`<text x="${cx}" y="${hemiBottomY+20}" font-size="12" font-family="Arial" fill="#6b5750" text-anchor="middle">r=7 cm</text>`);
    if(phase>=1)o.push(`<text x="${cx+R+10}" y="${(baseY+tipY)/2}" font-size="12" font-family="Arial" fill="#6b5750">h=24</text>`);
  }
  s.innerHTML=o.join('');
}
</script>

<!-- ═══════════════════════════════════
     QUESTION DATA
═══════════════════════════════════ -->
<script>
const questions = [
  {
    eyebrow:"Question 1 · Mensuration", title:"Volume of a Trapezoidal Prism",
    sub:"Find the volume of a prism with trapezoidal cross-section.",
    steps:[
      { label:"The solid", draw:drawTrapPrism,
        html:`<p>A prism has a <b>trapezoidal cross-section</b>. Parallel sides <b>a = 10 cm</b> and <b>b = 21 cm</b>, perpendicular height <b>h = 8 cm</b>, prism length <b>l = 20 cm</b>.</p><p>Volume = cross-sectional area × length.</p>`},
      { label:"Step 1 — Area of the trapezium", draw:drawTrapPrism,
        html:`<div class="wt-formula">A = ½ × (a+b) × h = ½ × (10+21) × 8 = <b>124 cm²</b></div>`},
      { label:"Step 2 — Volume", draw:drawTrapPrism,
        html:`<div class="wt-formula">V = A × l = 124 × 20 = <b>2480 cm³</b></div>`},
      { label:"Your turn", draw:drawTrapPrism,
        html:WalkthroughEngine.tryIt({ question:"A trapezoidal prism has parallel sides <b>6 cm</b> and <b>14 cm</b>, trapezium height <b>5 cm</b>, and prism length <b>12 cm</b>. Find its volume.", hints:["Find the trapezium area: ½ × (6+14) × 5","Multiply by the length: area × 12"], answer:600, unit:"cm³", working:"A = ½ × (6+14) × 5 = 50 cm²<br><b>V = 50 × 12 = 600 cm³</b>" })}
    ]
  },
  {
    eyebrow:"Question 2 · Mensuration", title:"Cylinder to Cuboid Volume Ratio",
    sub:"Same height — compare the two volumes.",
    steps:[
      { label:"The two solids", draw:drawRatio,

/* ── Sidebar ── */
function buildSidebar(){
  const sb=document.getElementById('sidebar');
  const lbl=sb.querySelector('.sidebar-label');
  sb.innerHTML=''; sb.appendChild(lbl);
  questions.forEach((q,i)=>{
    const b=document.createElement('button');
    b.className='q-list-btn'+(i===0?' active':'');
    b.id='sb_'+i;
    b.innerHTML=`<span class="q-num">Q${i+1}</span><span class="q-name">${q.title}</span>`;
    b.onclick=()=>{
      document.querySelectorAll('.q-list-btn').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      WalkthroughEngine.init({ containerId:'app', questions:[questions[i]] });
    };
    sb.appendChild(b);
  });
}

buildSidebar();
WalkthroughEngine.init({ containerId:'app', questions:[questions[0]] });
</script>
