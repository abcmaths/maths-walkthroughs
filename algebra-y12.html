<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"\u203a";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
var ST={};
function tryIt(o){var id='t'+Math.random().toString(36).slice(2);ST[id]=o;var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');return '<div class="try"><div class="try-t">\u2714 Your Turn</div><p>'+o.question+'</p><ul class="hl">'+h+'</ul><div class="ar"><input type="number" step="any" placeholder="Answer ('+o.unit+')" id="'+id+'_i"/><button class="ck" onclick="ck(\''+id+'\')">Check</button></div><div class="fb" id="'+id+'_f"></div><details class="wk"><summary>Show full working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
function ck(id){var o=ST[id],v=parseFloat(document.getElementById(id+'_i').value),f=document.getElementById(id+'_f');if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}var tol=(o.tol||2)/100;if(Math.abs(v-o.ans)<=Math.abs(o.ans*tol)+0.05){f.className='fb ok';f.textContent='Correct! Answer: '+o.ans+' '+o.unit;}else{f.className='fb er';f.textContent='Not quite \u2014 check your working and try again.';}}

function LN(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

  if(p>=3){o.push(B(60,126,360,46,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,144,'S(n) = a(r\u207f \u2212 1) / (r \u2212 1)   when r > 1','#1a5a8a',14,'middle',true));o.push(T(240,164,'or  a(1 \u2212 r\u207f) / (1 \u2212 r)   when r < 1','#888',11));}

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

var QS=[

    {lb:'Write the equation',dr:dQ1,ht:'<div class="fm">y = 3x</div>'},
    {lb:'Find y when x=10',dr:dQ1,ht:'<div class="fm">y = 3 \u00d7 10 = 30</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt({question:'y \u221d x. When x=5, y=20. Find y when x=8.',hints:['k = y/x = 20/5 = 4','y = 4x','y = 4 \u00d7 8'],ans:32,unit:'',working:'k=4, y=4x. y=4\u00d78=32'})}
  ]},
  {ey:'Q2 \u00b7 Variation \u00b7 WAEC',ti:'Variation with Powers',su:'y \u221d x\u00b2. When x=3, y=45. Find y when x=5.',lv:'F',steps:[
    {lb:'Set up',dr:dQ2,ht:'<span class="lt lf">Foundation</span><p>When y varies as a power of x: <b>y = kx\u207f</b>. Substitute the known values to find k.</p>'},
    {lb:'Find k',dr:dQ2,ht:'<div class="fm">45 = k \u00d7 3\u00b2 = 9k  \u2192  k = 5</div>'},
    {lb:'Write the equation',dr:dQ2,ht:'<div class="fm">y = 5x\u00b2</div>'},
    {lb:'Find y when x=5',dr:dQ2,ht:'<div class="fm">y = 5 \u00d7 25 = 125</div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt({question:'y \u221d x\u00b3. When x=2, y=24. Find y when x=3.',hints:['24 = k \u00d7 8  \u2192  k=3','y = 3x\u00b3','y = 3 \u00d7 27'],ans:81,unit:'',working:'k=3, y=3x\u00b3. y=3\u00d727=81'})}
  ]},
  {ey:'Q3 \u00b7 Polynomials \u00b7 WAEC',ti:'The Remainder Theorem',su:'f(x) = x\u00b3 + 2x\u00b2 \u2212 5x + 1. Find the remainder when divided by (x \u2212 2).',lv:'F',steps:[
    {lb:'The theorem',dr:dQ3,ht:'<span class="lt lf">Foundation</span><p>When a polynomial f(x) is divided by (x\u2212a), the <b>remainder = f(a)</b>. You substitute x=a instead of doing long division.</p>'},
    {lb:'Identify a',dr:dQ3,ht:'<div class="fm">Divisor: (x\u22122)  \u2192  a = 2</div>'},
    {lb:'Substitute',dr:dQ3,ht:'<div class="fm">f(2) = 8 + 8 \u2212 10 + 1 = 7</div>'},
    {lb:'Factor theorem bonus',dr:dQ3,ht:'<p>If the remainder is <b>zero</b>, (x\u2212a) is a factor. Here remainder = 7 \u2260 0, so (x\u22122) is not a factor.</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt({question:'f(x) = x\u00b3 \u2212 3x + 2. Find the remainder when divided by (x \u2212 2).',hints:['Substitute x=2','f(2) = 8 \u2212 6 + 2'],ans:4,unit:'',working:'f(2) = 8\u22126+2 = 4'})}
  ]},
  {ey:'Q4 \u00b7 Polynomials \u00b7 WAEC',ti:'The Factor Theorem',su:'Show (x\u22122) is a factor of x\u00b3+x\u00b2\u22124x\u22124 and fully factorise.',lv:'F',steps:[
    {lb:'The factor theorem',dr:dQ4,ht:'<span class="lt lf">Foundation</span><p>If f(a) = 0, then (x\u2212a) is a factor. Try factors of the constant term (\u00b11, \u00b12, \u00b14) until you find one that gives zero.</p>'},
    {lb:'Verify f(2)=0',dr:dQ4,ht:'<div class="fm">f(2) = 8 + 4 \u2212 8 \u2212 4 = 0 \u2713</div>'},
    {lb:'Divide to find the quotient',dr:dQ4,ht:'<div class="fm">x\u00b3+x\u00b2\u22124x\u22124 \u00f7 (x\u22122) = x\u00b2+3x+2</div>'},
    {lb:'Factorise fully',dr:dQ4,ht:'<div class="fm">(x\u22122)(x\u00b2+3x+2) = (x\u22122)(x+1)(x+2)</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt({question:'f(x) = x\u00b3 \u2212 6x\u00b2 + 11x \u2212 6. Given (x\u22121) is a factor, find the other two roots.',hints:['Divide by (x\u22121) to get x\u00b2\u22125x+6','Factorise: (x\u22122)(x\u22123)','Roots: x=1, x=2, x=3'],ans:3,unit:'(largest root)',working:'(x\u22121)(x\u22122)(x\u22123). Largest root = 3'})}
  ]},
  {ey:'Q5 \u00b7 Sequences \u00b7 WAEC',ti:'Arithmetic Progression',su:'AP: first term a=5, common difference d=3, n=20 terms. Find T\u2082\u2080 and S\u2082\u2080.',lv:'F',steps:[
    {lb:'The formulae',dr:dQ5,ht:'<span class="lt lf">Foundation</span><div class="fm">T(n) = a + (n\u22121)d</div><div class="fm">S(n) = n/2 \u00d7 (2a + (n\u22121)d)</div>'},
    {lb:'Find T\u2082\u2080',dr:dQ5,ht:'<div class="fm">T(20) = 5 + 19\u00d73 = 5 + 57 = 62</div>'},
    {lb:'Find S\u2082\u2080',dr:dQ5,ht:'<div class="fm">S(20) = 20/2 \u00d7 (5 + 62) = 10 \u00d7 67 = 670</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt({question:'An AP has a=3, d=4. Find the sum of the first 15 terms.',hints:['S(n) = n/2 \u00d7 (2a+(n\u22121)d)','S(15) = 15/2 \u00d7 (6 + 56)'],ans:465,unit:'',working:'S(15)=15/2\u00d762=15\u00d731=465'})}
  ]},
  {ey:'Q6 \u00b7 Sequences \u00b7 WAEC',ti:'Geometric Progression',su:'GP: first term a=2, common ratio r=3, n=6. Find T\u2086 and S\u2086.',lv:'F',steps:[
    {lb:'The formulae',dr:dQ6,ht:'<span class="lt lf">Foundation</span><div class="fm">T(n) = ar^(n\u22121)</div><div class="fm">S(n) = a(r\u207f\u22121)/(r\u22121)  when r > 1</div>'},
    {lb:'Find T\u2086',dr:dQ6,ht:'<div class="fm">T(6) = 2 \u00d7 3\u2075 = 2 \u00d7 243 = 486</div>'},
    {lb:'Find S\u2086',dr:dQ6,ht:'<div class="fm">S(6) = 2(3\u2076\u22121)/(3\u22121) = 2\u00d7728/2 = 728</div>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt({question:'GP: a=1, r=2. Find S\u2088 (sum of 8 terms).',hints:['S(n)=a(r\u207f\u22121)/(r\u22121)','S(8)=1(2\u2078\u22121)/(2\u22121)','2\u2078=256'],ans:255,unit:'',working:'S(8)=(256\u22121)/1=255'})}
  ]},
  {ey:'Q7 \u00b7 Logarithms \u00b7 WAEC',ti:'Laws of Logarithms',su:'Solve log\u2082(x\u00b2) + log\u2082(8) = 7.',lv:'E',steps:[
    {lb:'The log laws',dr:dQ7,ht:'<span class="lt le">Extended</span><div class="fm">log(AB) = log A + log B</div><div class="fm">log(A/B) = log A \u2212 log B</div><div class="fm">log(A\u207f) = n log A</div>'},
    {lb:'Combine logs',dr:dQ7,ht:'<div class="fm">log\u2082(x\u00b2) + log\u2082(8) = log\u2082(8x\u00b2) = 7</div>'},
    {lb:'Convert',dr:dQ7,ht:'<div class="fm">8x\u00b2 = 2\u2077 = 128  \u2192  x\u00b2 = 16</div>'},
    {lb:'Solve',dr:dQ7,ht:'<div class="fm">x = 4  (take positive root as x must be > 0 for log to exist)</div>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt({question:'Solve log\u2083(x) + log\u2083(x\u22122) = 1.',hints:['log\u2083(x(x\u22122)) = 1','x(x\u22122) = 3\u00b9 = 3','x\u00b2\u22122x\u22123=0'],ans:3,unit:'(positive solution)',working:'x\u00b2\u22122x\u22123=(x\u22123)(x+1)=0. x=3 (positive).'})}
  ]},
  {ey:'Q8 \u00b7 Indices \u00b7 WAEC',ti:'Exponential Equations',su:'Solve 3^(2x\u22121) = 27.',lv:'F',steps:[
    {lb:'Same base method',dr:dQ8,ht:'<span class="lt lf">Foundation</span><p>If both sides can be written as powers of the same base, equate the exponents.</p>'},
    {lb:'Express 27 as a power of 3',dr:dQ8,ht:'<div class="fm">27 = 3\u00b3</div>'},
    {lb:'Equate exponents',dr:dQ8,ht:'<div class="fm">3^(2x\u22121) = 3\u00b3  \u2192  2x\u22121 = 3</div>'},
    {lb:'Solve',dr:dQ8,ht:'<div class="fm">2x = 4  \u2192  x = 2</div>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt({question:'Solve 2^(3x+1) = 64.',hints:['64 = 2\u2076','3x+1 = 6'],ans:5/3,tol:3,unit:'(exact: 5/3)',working:'3x+1=6  \u2192  3x=5  \u2192  x=5/3\u22481.667'})}
  ]},
  {ey:'Q9 \u00b7 Binomial Theorem \u00b7 WAEC',ti:'Binomial Expansion',su:'Expand (1+x)\u2074 fully. Then find the first four terms of (2+x)\u2074.',lv:'E',steps:[
    {lb:'Pascal\'s triangle / \u207fC\u1d63',dr:dQ9,ht:'<span class="lt le">Extended</span><p>The coefficients in the expansion of (a+b)\u207f are given by Pascal\'s triangle or \u207fC\u1d63 = n! / (r!(n\u2212r)!).</p>'},
    {lb:'Expand (1+x)\u2074',dr:dQ9,ht:'<div class="fm">(1+x)\u2074 = 1 + 4x + 6x\u00b2 + 4x\u00b3 + x\u2074</div>'},
    {lb:'Expand (2+x)\u2074 using \u207fC\u1d63',dr:dQ9,ht:'<div class="fm">= \u2074C\u2080\u00d72\u2074 + \u2074C\u2081\u00d72\u00b3x + \u2074C\u2082\u00d72\u00b2x\u00b2 + \u2074C\u2083\u00d72x\u00b3 + x\u2074</div>'},
    {lb:'Simplify',dr:dQ9,ht:'<div class="fm">= 16 + 32x + 24x\u00b2 + 8x\u00b3 + x\u2074</div>'},
    {lb:'Your turn',dr:dQ9,ht:tryIt({question:'In the expansion of (1+x)\u2075, what is the coefficient of x\u00b3?',hints:['\u2075C\u2083 = 5!/(3!2!)','\u2075C\u2083 = (5\u00d74)/(2\u00d71)'],ans:10,unit:'',working:'\u2075C\u2083 = 10'})}
  ]},
  {ey:'Q10 \u00b7 Indices & Equations \u00b7 WAEC',ti:'Exponential Equation by Substitution',su:'Solve 4x \u2212 3(2x) + 2 = 0.',lv:'E',steps:[
    {lb:'Spot the hidden quadratic',dr:dQ10,ht:'<span class="lt le">Extended</span><p>Notice that 4x = (2\u00b2)x = (2x)\u00b2. Let <b>u = 2x</b> to convert this into a quadratic.</p>'},
    {lb:'Substitute u = 2x',dr:dQ10,ht:'<div class="fm">u\u00b2 \u2212 3u + 2 = 0</div>'},
    {lb:'Factorise and solve for u',dr:dQ10,ht:'<div class="fm">(u\u22121)(u\u22122) = 0  \u2192  u = 1  or  u = 2</div>'},
    {lb:'Reverse the substitution',dr:dQ10,ht:'<div class="fm">2x = 1 = 2\u2070  \u2192  x = 0</div><div class="fm">2x = 2 = 2\u00b9  \u2192  x = 1</div>'},
    {lb:'Your turn',dr:dQ10,ht:tryIt({question:'Solve 9x \u2212 4(3x) + 3 = 0. What is the larger solution?',hints:['9x = (3x)\u00b2. Let u = 3x','u\u00b2\u22124u+3=0','(u\u22121)(u\u22123)=0  \u2192  u=1 or u=3','3x=3  \u2192  x=1'],ans:1,unit:'',working:'u=1: 3x=1\u2192x=0. u=3: 3x=3\u2192x=1. Larger solution = 1'})}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti+'<br><span class="badge '+(q.lv==='F'?'bf':'be')+'">'+(q.lv==='F'?'Foundation':'Extended')+'</span>';b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
</body>
</html>
