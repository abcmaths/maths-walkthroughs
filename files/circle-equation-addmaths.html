<script>

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function r2(x){return Math.round(x*100)/100;}
function r3(x){return Math.round(x*1000)/1000;}
var ST={};
function tryIt(genFn){
  if(typeof genFn!=='function'){var _o=genFn;genFn=function(){return _o;};}
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t" style="display:flex;justify-content:space-between;align-items:center;">'
    +'\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o,inp=document.querySelector('.try-inp[data-tryid="'+id+'"]'),fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}
function axes(o,ox,oy,sx,sy,xlo,xhi,ylo,yhi){
  o.push(L(ox+xlo*sx,oy,ox+xhi*sx,oy,'#888',1.5));
  o.push(L(ox,oy-ylo*sy,ox,oy-yhi*sy,'#888',1.5));
  for(var i=xlo;i<=xhi;i++){o.push(L(ox+i*sx,oy-3,ox+i*sx,oy+3,'#888',1));if(i!==0)o.push(T(ox+i*sx,oy+12,''+i,'#888',8));}
  for(var j=ylo+1;j<=yhi;j++){if(j!==0){o.push(L(ox-3,oy-j*sy,ox+3,oy-j*sy,'#888',1));o.push(T(ox-8,oy-j*sy+4,''+j,'#888',8,'end'));}}
}


var V={};
(function(){
  // Q1 standard form (x-a)^2+(y-b)^2=r^2
  V.a=rnd(-3,4);V.b=rnd(-2,4);V.r=rnd(2,6);
  // Q2 find centre and radius from expanded form x^2+y^2+Dx+Ey+F=0
  // (x-a)^2+(y-b)^2=r^2 => x^2+y^2-2ax-2by+(a^2+b^2-r^2)=0
  V.ca=rnd(1,4);V.cb=rnd(1,3);V.cr=rnd(3,6);
  V.D=-2*V.ca;V.E=-2*V.cb;V.F=V.ca*V.ca+V.cb*V.cb-V.cr*V.cr;
  // Q3 does point lie on/inside/outside circle?
  V.pa=rnd(1,3);V.pb=rnd(1,3);V.pr=rnd(3,5);
  V.ptx=V.pa+rnd(1,V.pr-1);V.pty=V.pb; // on x-axis from centre, inside
  V.ptdist2=(V.ptx-V.pa)*(V.ptx-V.pa)+(V.pty-V.pb)*(V.pty-V.pb);
  // Q4 tangent to circle at a point
  V.ta=rnd(-2,3);V.tb=rnd(-2,3);V.tr=rnd(2,5);
  // Point on circle: centre + (r,0)
  V.tpx=V.ta+V.tr;V.tpy=V.tb;
  // Radius to point has gradient 0 (horizontal), so tangent is vertical x=tpx... use better point
  V.tpx=V.ta+V.tr-1;V.tpy=r2(V.tb+Math.sqrt(V.tr*V.tr-1));
  var radGrad=r2((V.tpy-V.tb)/(V.tpx-V.ta));
  V.tanGrad=radGrad===0?999:r2(-1/radGrad);
  V.tanC=r2(V.tpy-V.tanGrad*V.tpx);
  // Q5 line meets circle - intersection
  V.im=rnd(1,2);V.ic=rnd(0,3);
  // Circle at origin radius 5: x^2+y^2=25, y=mx+c
  V.ir=5;
  // x^2+(mx+c)^2=25 => (1+m^2)x^2+2mcx+c^2-25=0
  var A=1+V.im*V.im,B=2*V.im*V.ic,Cc=V.ic*V.ic-V.ir*V.ir;
  V.idisc=r2(B*B-4*A*Cc);
  V.ix1=r2((-B+Math.sqrt(V.idisc))/(2*A));
  V.ix2=r2((-B-Math.sqrt(V.idisc))/(2*A));
  V.iy1=r2(V.im*V.ix1+V.ic);V.iy2=r2(V.im*V.ix2+V.ic);
  // Q6 circle through three points (use Pythagorean approach)
  // Easier: give centre and ask for equation
  V.qa=rnd(-2,3);V.qb=rnd(-2,3);
  V.qpx=V.qa+3;V.qpy=V.qb+4;V.qr=5; // 3-4-5 triangle
  // Q7 tangent from external point - length
  V.ea=rnd(0,2);V.eb=rnd(0,2);V.er=rnd(2,4);
  V.epx=V.ea+V.er+rnd(2,4);V.epy=V.eb;
  V.edist=r2(Math.sqrt(Math.pow(V.epx-V.ea,2)+Math.pow(V.epy-V.eb,2)));
  V.etanlen=r2(Math.sqrt(V.edist*V.edist-V.er*V.er));
  // Q8 chord midpoint property
  V.ma=rnd(0,2);V.mb=rnd(0,2);V.mr=rnd(3,5);
  V.mc1x=V.ma+rnd(1,2);V.mc1y=r2(V.mb+Math.sqrt(V.mr*V.mr-(V.mc1x-V.ma)*(V.mc1x-V.ma)));
  V.mc2x=V.ma+rnd(1,2);V.mc2y=r2(V.mb-Math.sqrt(V.mr*V.mr-(V.mc2x-V.ma)*(V.mc2x-V.ma)));
  V.midchx=r2((V.mc1x+V.mc2x)/2);V.midchy=r2((V.mc1y+V.mc2y)/2);
})();

function circle(o,cx,cy,r,col,fill){
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'none')+'" stroke="'+(col||'#C0272D')+'" stroke-width="2"/>');
}

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Circle: centre ('+V.a+','+V.b+'), radius '+V.r,'#C0272D',13,'middle',true));
  var ox=200,oy=140,sc=18;
  if(p>=1){
    o.push(L(ox-100,oy,ox+100,oy,'#888',1));o.push(L(ox,oy+100,ox,oy-100,'#888',1));
    circle(o,ox+V.a*sc,oy-V.b*sc,V.r*sc,'#C0272D','rgba(192,39,45,0.08)');
    o.push(C(ox+V.a*sc,oy-V.b*sc,4,'#C0272D','#C0272D',0));
    o.push(T(ox+V.a*sc+6,oy-V.b*sc-6,'('+V.a+','+V.b+')','#C0272D',8,'start',true));
    o.push(L(ox+V.a*sc,oy-V.b*sc,ox+V.a*sc+V.r*sc,oy-V.b*sc,'#888',1.5,'4,3'));
    o.push(T(ox+V.a*sc+V.r*sc/2,oy-V.b*sc-6,'r='+V.r,'#888',8,'middle',false));}
  if(p>=2){o.push(R(280,180,186,38,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(373,193,'(x\u2212'+V.a+')\u00b2+(y\u2212'+V.b+')\u00b2','#1a5a8a',11,'middle',false));
    o.push(T(373,209,'= '+V.r*V.r,'#1a5a8a',13,'middle',true));}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Find centre and radius: x\u00b2+y\u00b2+'+V.D+'x+'+V.E+'y+'+V.F+' = 0','#C0272D',11,'middle',true));
  if(p>=1){o.push(T(240,62,'Complete the square in x and y:','#888',11,'middle',false));
    o.push(R(14,72,452,30,'#f8f8f8','#888',1));
    o.push(T(240,91,'(x+'+V.D/2+')\u00b2\u2212'+(V.D/2)*(V.D/2)+' + (y+'+V.E/2+')\u00b2\u2212'+(V.E/2)*(V.E/2)+'+'+V.F+' = 0','#888',10,'middle',false));}
  if(p>=2){o.push(R(14,112,452,30,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,131,'(x\u2212'+V.ca+')\u00b2+(y\u2212'+V.cb+')\u00b2 = '+V.cr*V.cr,'#1a5a8a',13,'middle',true));}
  if(p>=3){o.push(R(28,152,210,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(133,173,'Centre: ('+V.ca+','+V.cb+')','#1a7a3a',12,'middle',true));
    o.push(R(258,152,180,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(348,173,'Radius: '+V.cr,'#1a7a3a',12,'middle',true));}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Does ('+V.ptx+','+V.pty+') lie on, inside or outside the circle?','#C0272D',11,'middle',true));
  var ox=220,oy=150,sc=20;
  if(p>=1){circle(o,ox+V.pa*sc,oy-V.pb*sc,V.pr*sc,'#C0272D','rgba(192,39,45,0.06)');
    o.push(C(ox+V.pa*sc,oy-V.pb*sc,3,'#C0272D','#C0272D',0));
    o.push(T(ox+V.pa*sc+5,oy-V.pb*sc-5,'C('+V.pa+','+V.pb+')','#C0272D',8,'start',false));
    o.push(C(ox+V.ptx*sc,oy-V.pty*sc,4,'#1a5a8a','#1a5a8a',0));
    o.push(T(ox+V.ptx*sc+5,oy-V.pty*sc-5,'P('+V.ptx+','+V.pty+')','#1a5a8a',8,'start',false));
    o.push(L(ox+V.pa*sc,oy-V.pb*sc,ox+V.ptx*sc,oy-V.pty*sc,'#1a5a8a',1.5,'4,3'));}
  if(p>=2){o.push(R(14,192,452,30,'#e8f4ff','#1a5a8a',1.5));
    var d2=(V.ptx-V.pa)*(V.ptx-V.pa)+(V.pty-V.pb)*(V.pty-V.pb);
    o.push(T(240,211,'d\u00b2 = '+(V.ptx-V.pa)+'\u00b2+'+(V.pty-V.pb)+'\u00b2 = '+d2+'. r\u00b2 = '+V.pr*V.pr,'#1a5a8a',11,'middle',false));}
  if(p>=3){var d2=(V.ptx-V.pa)*(V.ptx-V.pa)+(V.pty-V.pb)*(V.pty-V.pb);
    var where=d2<V.pr*V.pr?'INSIDE':d2===V.pr*V.pr?'ON':'OUTSIDE';
    o.push(R(130,230,220,26,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,247,where+' the circle','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Tangent to circle at point ('+V.tpx+','+r2(V.tpy)+')','#C0272D',12,'middle',true));
  var ox=200,oy=150,sc=16;
  if(p>=1){circle(o,ox+V.ta*sc,oy-V.tb*sc,V.tr*sc,'#C0272D','rgba(192,39,45,0.06)');
    o.push(C(ox+V.ta*sc,oy-V.tb*sc,3,'#C0272D','#C0272D',0));
    o.push(C(ox+V.tpx*sc,oy-V.tpy*sc,4,'#1a7a3a','#1a7a3a',0));
    o.push(L(ox+V.ta*sc,oy-V.tb*sc,ox+V.tpx*sc,oy-V.tpy*sc,'#888',1.5,'4,3'));
    o.push(T(ox+V.tpx*sc+6,oy-V.tpy*sc,'P','#1a7a3a',9,'start',true));}

}
