<style>
:root{--acc:#6A1B9A;--dark:#4A148C;--cream:#F3E5F5;--ink:#2a1a2e;--line:#CE93D8;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--acc);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--acc);color:var(--acc);}
.qb.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--acc);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,var(--cream));padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:16px;background:var(--cream);border-left:4px solid var(--acc);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--acc);background:#fff;color:var(--acc);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--acc);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--acc);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:var(--ink);margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.nq{margin-top:12px;font-size:13px;font-weight:600;padding:6px 14px;border-radius:3px;border:1px solid #aaa;background:#f5f5f5;color:#444;cursor:pointer;}
.nq:hover{background:#e0e0e0;}
.wk-ans{margin-top:8px;font-size:14px;line-height:1.6;}
.wk summary{cursor:pointer;color:var(--acc);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;}
.mc-opts{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.mc-opt{padding:9px 14px;border:1.5px solid var(--line);border-radius:4px;cursor:pointer;font-size:14px;background:#fff;text-align:left;transition:.15s;font-family:inherit;}
.mc-opt:hover{border-color:var(--acc);background:var(--cream);}
.mc-opt.correct{border-color:#2e7d32;background:#e8f8ee;color:#1a7a3a;font-weight:600;}
.mc-opt.wrong{border-color:#C0272D;background:#fde8e8;color:#a01820;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>

var ST={};
function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;return genTry(id,fn());
}
function genTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">&#10004; Your Turn</div><p>'+o.question+'</p>'+
    '<div class="ar"><input type="number" step="any" placeholder="Your answer" id="'+id+'_i"/>'+
    '<button class="ck" onclick="ck(\''+id+'\')">&#10003; Check</button></div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk"><summary>Show working</summary><div class="wk-b">'+
    (h?'<ul class="hl">'+h+'</ul>':'')+
    '<div class="wk-ans">'+o.working+'</div></div></details>'+
    '<button class="nq" data-tryid="'+id+'">New question</button></div>';
}
function ck(id){
  var fn=ST[id];var o=typeof fn==='function'?fn():fn;
  var v=parseFloat(document.getElementById(id+'_i').value);
  var f=document.getElementById(id+'_f');
  if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}
  var tol=o.tol!==undefined?o.tol:0.5;
  if(Math.abs(v-o.ans)<=tol){
    f.className='fb ok';f.textContent='\u2713 Correct! Answer: '+o.ans+(o.unit?' '+o.unit:'');
  }else{f.className='fb er';f.textContent='Not quite \u2014 check your working and try again.';}
}
function tryItMC(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;return genTryMC(id,fn());
}
function genTryMC(id,o){
  var opts=o.options.map(function(opt,i){
    return '<button class="mc-opt" onclick="ckMC(\''+id+'\','+i+','+o.correct+')">'+opt+'</button>';
  }).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">&#10004; Your Turn</div><p>'+o.question+'</p>'+
    '<div class="mc-opts" id="'+id+'_opts">'+opts+'</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk"><summary>Show answer</summary><div class="wk-b"><div class="wk-ans">'+o.working+'</div></div></details>'+
    '<button class="nq" data-tryid="'+id+'_mc">New question</button></div>';
}
function ckMC(id,chosen,correct){
  var opts=document.getElementById(id+'_opts').querySelectorAll('.mc-opt');
  opts.forEach(function(b,i){
    if(i===correct)b.classList.add('correct');
    else if(i===chosen)b.classList.add('wrong');
    b.disabled=true;
  });
  var f=document.getElementById(id+'_f');
  if(chosen===correct){f.className='fb ok';f.textContent='\u2713 Correct!';}
  else{f.className='fb er';f.textContent='Not quite \u2014 the correct answer is highlighted in green.';}
}
document.addEventListener('click',function(e){
  var b=e.target.closest('.nq');if(!b)return;
  var rawId=b.getAttribute('data-tryid');
  var id=rawId.replace('_mc','');
  var fn=ST[id];if(typeof fn!=='function')return;
  var wrap=b.closest('.try');if(!wrap)return;
  var isMC=(rawId.indexOf('_mc')>=0);
  var fresh=isMC?genTryMC(id,fn()):genTry(id,fn());
  var tmp=document.createElement('div');tmp.innerHTML=fresh;
  wrap.parentNode.replaceChild(tmp.firstChild,wrap);
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#333';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw,rx){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#333')+'" stroke-width="'+(sw||2)+'" rx="'+(rx||0)+'"/>';}
function circ(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#333')+'" stroke-width="'+(sw||2)+'"/>';}
function ellipse(cx,cy,rx,ry,fill,stroke,sw){return '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#333')+'" stroke-width="'+(sw||2)+'"/>';}
function arr(x1,y1,x2,y2,c,w){
  c=c||'#555';w=w||1.5;
  var ang=Math.atan2(y2-y1,x2-x1);
  var hs=8;
  var p1x=x2-hs*Math.cos(ang-0.4),p1y=y2-hs*Math.sin(ang-0.4);
  var p2x=x2-hs*Math.cos(ang+0.4),p2y=y2-hs*Math.sin(ang+0.4);
  return L(x1,y1,x2,y2,c,w)+'<polygon points="'+x2+','+y2+' '+p1x.toFixed(1)+','+p1y.toFixed(1)+' '+p2x.toFixed(1)+','+p2y.toFixed(1)+'" fill="'+c+'"/>';
}


var QS=[
{ey:'Y8 Chemistry \u2022 Q1',ti:'Solubility and Concentration',su:'How much dissolves?',steps:[
{sl:'Solubility',p:'<b>Solubility</b> is the maximum mass of solute that dissolves in 100 g of solvent at a given temperature. Most solid solutes become <b>more soluble</b> at higher temperatures; most gases become <b>less soluble</b>.',
draw:function(){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
o.push(T(240,22,'Solubility curves','#6A1B9A',12,'middle',true));
o.push(arr(40,260,440,260,'#555',1.5));o.push(arr(40,260,40,20,'#555',1.5));
o.push(T(240,285,'Temperature (\u00b0C)','#555',9,'middle',false));o.push(T(18,140,'Solubility\n(g/100g)','#555',8,'middle',false));
o.push('<polyline points="40,240 100,215 160,185 220,150 280,112 340,78 400,52" fill="none" stroke="#6A1B9A" stroke-width="2.5"/>');
o.push('<polyline points="40,120 100,128 160,136 220,145 280,155 340,165 400,178" fill="none" stroke="#1565C0" stroke-width="2" stroke-dasharray="6,3"/>');
o.push(T(410,48,'NaNO\u2083 (solid)','#6A1B9A',8,'start',false));
o.push(T(410,178,'O\u2082 (gas, decreases)','#1565C0',8,'start',false));
s.innerHTML=o.join('');}},
{sl:'Concentration',p:'<b>Concentration</b> is the amount of solute dissolved per unit volume of solution:<br><br><span class="fm">Concentration (g/dm\u00b3) = Mass of solute (g) \u00f7 Volume of solution (dm\u00b3)</span>A concentrated solution has a lot of solute; a dilute solution has little.',
draw:function(){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
o.push(R(80,80,120,160,'#e3f2fd','#1565C0',2,4));o.push(T(140,200,'Dilute','#1565C0',10,'middle',true));
for(var i=0;i<5;i++)o.push(circ(100+rInt(0,80),100+rInt(0,120),5,'#9c27b0','#6A1B9A',1));
o.push(R(280,80,120,160,'#e1bee7','#6A1B9A',2,4));o.push(T(340,200,'Concentrated','#6A1B9A',10,'middle',true));
for(var j=0;j<20;j++)o.push(circ(290+rInt(0,100),90+rInt(0,140),5,'#9c27b0','#6A1B9A',1));
o.push(T(240,265,'Concentration = mass \u00f7 volume','#555',10,'middle',false));
s.innerHTML=o.join('');}},
{sl:'Crystals and crystallisation',p:'<b>Crystallisation</b> is a purification technique and a way of obtaining a solute from solution.<br><br>Steps: heat solution until concentrated \u2192 allow to cool slowly \u2192 crystals form as solubility decreases \u2192 filter and dry the crystals.',
draw:function(){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
var steps=['1. Heat solution to concentrate','2. Cool slowly','3. Crystals form','4. Filter and dry'];var cols=['#C0272D','#1565C0','#6A1B9A','#2E7D32'];
steps.forEach(function(st,i){o.push(R(60,40+i*58,360,44,cols[i]+'22',cols[i],1.5,4));o.push(T(240,67+i*58,st,cols[i],10,'middle',true));if(i<3)o.push(arr(240,84+i*58,240,98+i*58,'#555',1.5));});
s.innerHTML=o.join('');}},
{sl:'Try it',p:''+tryItMC(function(){var qs=[{question:'A solution contains 15 g of salt dissolved in 0.5 dm\u00b3. What is the concentration?',options:['30 g/dm\u00b3','7.5 g/dm\u00b3','15 g/dm\u00b3','0.5 g/dm\u00b3'],correct:0,working:'Concentration = mass \u00f7 volume = 15 \u00f7 0.5 = <b>30 g/dm\u00b3</b>.'},{question:'How does temperature affect the solubility of a solid solute?',options:['Solubility increases with temperature','Solubility decreases with temperature','Temperature has no effect','Solubility first increases then decreases'],correct:0,working:'For most solid solutes, <b>solubility increases with temperature</b>. More solute dissolves in hot water than cold water because the increased energy helps break apart the solute\'s crystal lattice.'},{question:'What is a saturated solution?',options:['A solution that cannot dissolve any more solute at that temperature','A very concentrated solution','A solution at 100\u00b0C','A solution with excess solvent'],correct:0,working:'A <b>saturated solution</b> contains the maximum possible amount of dissolved solute at a given temperature. Any additional solute added will remain undissolved at the bottom of the container.'}];return rPick(qs);}),draw:function(){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
o.push(T(240,40,'Concentration = mass \u00f7 volume','#6A1B9A',14,'middle',true));
var rows=[['Dilute','Few solute particles per dm\u00b3','#1565C0'],['Concentrated','Many solute particles per dm\u00b3','#6A1B9A'],['Saturated','Cannot dissolve any more solute','#C0272D'],['Unsaturated','Could dissolve more solute','#2E7D32']];
rows.forEach(function(r,i){o.push(R(20,90+i*48,440,36,r[2]+'18',r[2],1.5,3));o.push(T(120,113+i*48,r[0],r[2],10,'start',true));o.push(T(310,113+i*48,r[1],'#555',9,'middle',false));});
s.innerHTML=o.join('');}}
]},
{ey:'Y8 Chemistry \u2022 Q2',ti:'Rates of Reaction',su:'How fast do reactions go?',steps:[
{sl:'Measuring rate',p:'The <b>rate of reaction</b> measures how quickly reactants are converted into products.<br><br><span class="fm">Rate = quantity of product formed \u00f7 time taken</span>We can measure rate by tracking: gas produced, mass lost, colour change, or disappearance of a precipitate.',
draw:function(){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
o.push(arr(40,250,440,250,'#555',1.5));o.push(arr(40,250,40,20,'#555',1.5));
o.push(T(240,275,'Time (s)','#555',11,'middle',false));o.push(T(18,135,'Product\nformed','#555',9,'middle',false));
o.push('<path d="M40,240 C80,230 120,190 160,150 C200,110 230,80 260,65 C300,50 360,46 440,45" fill="none" stroke="#6A1B9A" stroke-width="2.5"/>');
o.push(T(350,40,'Reaction complete\n(no more product)','#888',8,'start',false));
o.push(T(120,175,'Fast rate\n(steep gradient)','#6A1B9A',8,'middle',false));
s.innerHTML=o.join('');}},
{sl:'Factors affecting rate',p:'Four factors increase the rate of reaction:<br><br>1. <b>Concentration</b>: more particles in same volume \u2192 more frequent collisions<br>2. <b>Temperature</b>: particles move faster \u2192 more collisions with more energy<br>3. <b>Surface area</b>: smaller particles \u2192 more surface exposed<br>4. <b>Catalyst</b>: lowers activation energy without being used up',
draw:function(){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
var factors=['Higher concentration','\u2191 Temperature','Greater surface area','Add a catalyst'];var cols=['#6A1B9A','#C0272D','#2E7D32','#C8922A'];
factors.forEach(function(f,i){o.push(R(30,40+i*58,420,44,cols[i]+'22',cols[i],2,4));o.push(T(50,67+i*58,'\u2191 '+f+' \u2192 faster rate',cols[i],11,'start',false));});
s.innerHTML=o.join('');}},
{sl:'Collision theory',p:'Reactions occur when particles collide with <b>sufficient energy</b> (greater than activation energy).<br><br>Any factor that increases the number of successful collisions increases the reaction rate.<br><br>Higher temperature \u2192 particles have more kinetic energy \u2192 more collisions exceed the activation energy.',
draw:function(){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
o.push(T(120,22,'Low temp (slow)','#1565C0',10,'middle',true));
for(var i=0;i<8;i++)o.push(circ(40+rInt(0,160),50+rInt(0,160),8,'#bbdefb','#1565C0',1.5));
o.push(T(360,22,'High temp (fast)','#C0272D',10,'middle',true));
for(var j=0;j<8;j++){o.push(circ(280+rInt(0,160),50+rInt(0,160),8,'#ffcdd2','#C0272D',1.5));var a=rInt(0,360)*Math.PI/180;var r=20;o.push(arr(280+rInt(0,160),50+rInt(0,160),280+rInt(0,160)+r*Math.cos(a),50+rInt(0,160)+r*Math.sin(a),'#C0272D',1));}
o.push(T(240,260,'More collisions with sufficient energy = faster rate','#555',10,'middle',false));
s.innerHTML=o.join('');}},
{sl:'Try it',p:''+tryItMC(function(){var qs=[{question:'Marble chips react with hydrochloric acid. How can you increase the rate WITHOUT changing temperature?',options:['Use powdered marble (larger surface area)','Use less acid','Cool the acid','Remove the marble chips'],correct:0,working:'Powdered marble has a much <b>larger surface area</b> than chips, exposing more particles to the acid at once. More collisions per second \u2192 faster rate. This is why fine powders react faster than lumps.'},{question:'What is a catalyst?',options:['A substance that increases reaction rate without being used up','A substance that slows reactions down','A product of the reaction','A reactant that speeds up the reaction'],correct:0,working:'A <b>catalyst</b> increases the rate of a reaction by providing an alternative reaction pathway with a lower activation energy. Crucially, it is <b>not used up</b> — the same catalyst can be used over and over.'},{question:'Why does increasing temperature increase reaction rate?',options:['Particles move faster, so more collisions have enough energy to react','Particles become larger','The activation energy decreases','Concentration increases'],correct:0,working:'Higher temperature gives particles more <b>kinetic energy</b>. They move faster, collide more often, AND a greater fraction of collisions have energy exceeding the <b>activation energy</b> — so both frequency and success of collisions increase.'}];return rPick(qs);}),draw:function(){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];

var qi=0,si=0;
function buildSidebar(){
  var sb=document.getElementById('sb');
  sb.innerHTML='<div class="sb-lbl">Topics</div>';
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}
function render(){
  var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  document.getElementById('pn').className='pnl fi';
  document.getElementById('pn').innerHTML='<div class="sl">'+st.sl+'</div><div>'+st.p+'</div>';
  st.draw();
  var dt=document.getElementById('dt');
  dt.innerHTML=q.steps.map(function(_,i){return '<div class="dot'+(i===si?' on':i<si?' dn':'')+'"></div>';}).join('');
  document.getElementById('pb').disabled=(qi===0&&si===0);
  var last=(qi===QS.length-1&&si===q.steps.length-1);
  document.getElementById('nb').textContent=last?'Finished \u2713':'Next \u2192';
  document.getElementById('nb').disabled=false;
  document.querySelectorAll('.qb').forEach(function(b,i){b.classList.toggle('on',i===qi);});
}
document.getElementById('nb').onclick=function(){
  var q=QS[qi];
  if(si<q.steps.length-1){si++;}
  else if(qi<QS.length-1){qi++;si=0;}
  render();
};
document.getElementById('pb').onclick=function(){
  if(si>0){si--;}
  else if(qi>0){qi--;si=QS[qi].steps.length-1;}
  render();
};
buildSidebar();render();

</script>
