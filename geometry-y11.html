<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geometry Y11 - Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.nq{margin-top:12px;font-size:13px;font-weight:600;padding:6px 14px;border-radius:3px;border:1px solid #aaa;background:#f5f5f5;color:#444;cursor:pointer;}
.nq:hover{background:#e0e0e0;}
.wk-ans{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Geometry</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;
  return genTry(id,fn());
}
function genTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">✔ Your Turn</div>'+
    '<p>'+o.question+'</p>'+
    '<div class="ar">'+
      '<input type="number" step="any" placeholder="Your answer" id="'+id+'_i"/>'+
      '<button class="ck" onclick="ck(\''+id+'\')">✓ Check</button>'+
    '</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk">'+
      '<summary>Show working</summary>'+
      '<div class="wk-b">'+
        (h?'<ul class="hl">'+h+'</ul>':'')+
        '<div class="wk-ans">'+o.working+'</div>'+
      '</div>'+
    '</details>'+
    '<button class="nq" data-tryid="'+id+'">New question</button>'+
  '</div>';
}
function tryItStatic(o){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=function(){return o;};
  return genTry(id,o);
}

function ck(id){
  var fn=ST[id];
  var o=typeof fn==='function'?fn():fn;
  var v=parseFloat(document.getElementById(id+'_i').value);
  var f=document.getElementById(id+'_f');
  if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}
  var tol=o.tol!==undefined?o.tol:0.5;
  if(Math.abs(v-o.ans)<=tol){
    f.className='fb ok';f.textContent='✓ Correct! Answer: '+o.ans+(o.unit?' '+o.unit:'');
  }else{
    f.className='fb er';f.textContent='Not quite — check your working and try again.';
  }
}
document.addEventListener('click',function(e){
  var b=e.target.closest('.nq');
  if(!b)return;
  var id=b.getAttribute('data-tryid');
  var fn=ST[id];
  if(typeof fn!=='function')return;
  var wrap=b.closest('.try');
  if(wrap){
    var fresh=genTry(id,fn());
    var tmp=document.createElement('div');
    tmp.innerHTML=fresh;
    var nd=tmp.firstChild;
    wrap.parentNode.replaceChild(nd,wrap);
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function circ(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'"  />';}
function dot(cx,cy,c){return circ(cx,cy,4,c||'#C0272D','#fff',2);}
function sectorPath(cx,cy,r,a1deg,a2deg,fill){
  var a1=a1deg*Math.PI/180,a2=a2deg*Math.PI/180;
  var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
  var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
  var laf=((a2deg-a1deg+360)%360)>180?1:0;
  return '<path d="M'+cx+','+cy+' L'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+laf+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+(fill||'#fce8d8')+'" stroke="#C0272D" stroke-width="1.5"/>';
}
function arcPath(cx,cy,r,a1deg,a2deg,c,w){
  var a1=a1deg*Math.PI/180,a2=a2deg*Math.PI/180;
  var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
  var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
  var laf=((a2deg-a1deg+360)%360)>180?1:0;
  return '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+laf+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+'" fill="none" stroke="'+(c||'#C8922A')+'" stroke-width="'+(w||1.5)+'" />';
}
function ptOnCirc(cx,cy,r,adeg){var a=adeg*Math.PI/180;return [cx+r*Math.cos(a),cy+r*Math.sin(a)];}

/* Q1 Angle in semicircle */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=170,r=130;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  // diameter AB horizontal
  var A=[cx-r,cy],B=[cx+r,cy];
  o.push(L(A[0],A[1],B[0],B[1],'#241A17',2));
  o.push(T(A[0]-14,A[1]+4,'A','#241A17',13,'end',true));
  o.push(T(B[0]+14,B[1]+4,'B','#241A17',13,'start',true));
  // point C on upper semicircle
  var C=ptOnCirc(cx,cy,r,-110);
  o.push(dot(C[0],C[1],'#1a5a8a'));
  o.push(T(C[0]-14,C[1]-10,'C','#1a5a8a',13,'end',true));
  if(p>=1){
    o.push(L(A[0],A[1],C[0],C[1],'#C0272D',2));
    o.push(L(B[0],B[1],C[0],C[1],'#C0272D',2));
  }
  if(p>=2){
    // right angle mark at C
    var dx1=A[0]-C[0],dy1=A[1]-C[1],l1=Math.hypot(dx1,dy1);
    var ux1=dx1/l1*12,uy1=dy1/l1*12;
    var dx2=B[0]-C[0],dy2=B[1]-C[1],l2=Math.hypot(dx2,dy2);
    var ux2=dx2/l2*12,uy2=dy2/l2*12;
    var mx=C[0]+ux1+ux2,my=C[1]+uy1+uy2;
    o.push('<polyline points="'+(C[0]+ux1).toFixed(1)+','+(C[1]+uy1).toFixed(1)+' '+mx.toFixed(1)+','+my.toFixed(1)+' '+(C[0]+ux2).toFixed(1)+','+(C[1]+uy2).toFixed(1)+'" fill="none" stroke="#C0272D" stroke-width="1.5"/>');
    o.push(T(C[0]+20,C[1]+30,'90\u00b0','#C0272D',13,'middle',true));
  }
  if(p>=3){o.push(T(cx,cy+r+28,'Angle in a semicircle = 90\u00b0  (AB is diameter)','#C0272D',13,'middle',true));}
  s.innerHTML=o.join('');
}

/* Q2 Angle at centre = twice angle at circumference */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=155,r=120;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  o.push(dot(cx,cy,'#888'));o.push(T(cx+10,cy+4,'O','#888',12,'start',false));
  var A=ptOnCirc(cx,cy,r,210),B=ptOnCirc(cx,cy,r,-30),D=ptOnCirc(cx,cy,r,-150);
  o.push(dot(A[0],A[1],'#C0272D'));o.push(T(A[0]-12,A[1]+4,'A','#C0272D',12,'end',true));
  o.push(dot(B[0],B[1],'#C0272D'));o.push(T(B[0]+12,B[1]+4,'B','#C0272D',12,'start',true));
  o.push(dot(D[0],D[1],'#1a5a8a'));o.push(T(D[0]-12,D[1]-8,'D','#1a5a8a',12,'end',true));
  if(p>=1){
    o.push(L(cx,cy,A[0],A[1],'#C8922A',2));
    o.push(L(cx,cy,B[0],B[1],'#C8922A',2));
    o.push(T(cx,cy-24,'\u2220AOB = 80\u00b0','#C8922A',12,'middle',true));
  }
  if(p>=2){
    o.push(L(D[0],D[1],A[0],A[1],'#1a5a8a',2));
    o.push(L(D[0],D[1],B[0],B[1],'#1a5a8a',2));
    o.push(T(D[0]-30,D[1]+30,'\u2220ADB','#1a5a8a',12,'end',false));
  }
  if(p>=3){
    o.push(T(cx,cy+r+26,'\u2220ADB = \u00bd \u00d7 80\u00b0 = 40\u00b0  (angle at centre = twice at circumference)','#C0272D',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q3 Angles in same segment */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=160,r=120;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  var A=ptOnCirc(cx,cy,r,200),B=ptOnCirc(cx,cy,r,-20);
  var C=ptOnCirc(cx,cy,r,-110),D=ptOnCirc(cx,cy,r,-140);
  o.push(dot(A[0],A[1],'#241A17'));o.push(T(A[0]-12,A[1]+6,'A','#241A17',12,'end',true));
  o.push(dot(B[0],B[1],'#241A17'));o.push(T(B[0]+12,B[1]+6,'B','#241A17',12,'start',true));
  o.push(dot(C[0],C[1],'#C0272D'));o.push(T(C[0]+12,C[1]-8,'C','#C0272D',12,'start',true));
  o.push(dot(D[0],D[1],'#1a5a8a'));o.push(T(D[0]-12,D[1]-8,'D','#1a5a8a',12,'end',true));
  if(p>=1){
    o.push(L(A[0],A[1],C[0],C[1],'#C0272D',1.5));
    o.push(L(B[0],B[1],C[0],C[1],'#C0272D',1.5));
  }
  if(p>=2){
    o.push(L(A[0],A[1],D[0],D[1],'#1a5a8a',1.5));
    o.push(L(B[0],B[1],D[0],D[1],'#1a5a8a',1.5));
  }
  if(p>=3){
    o.push(T(cx,cy+r+26,'\u2220ACB = \u2220ADB  (same segment, same arc AB)','#C0272D',13,'middle',true));
    o.push(T(cx,cy,'Both = 35\u00b0','#241A17',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q4 Cyclic quadrilateral */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=155,r=120;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  var A=ptOnCirc(cx,cy,r,-60),B=ptOnCirc(cx,cy,r,30),C=ptOnCirc(cx,cy,r,150),D=ptOnCirc(cx,cy,r,230);
  var verts=[A,B,C,D];
  o.push('<polygon points="'+verts.map(function(v){return v[0].toFixed(1)+','+v[1].toFixed(1);}).join(' ')+'" fill="rgba(192,39,45,0.06)" stroke="#C0272D" stroke-width="1.5"/>');
  [['A',A,12,-8],['B',B,12,10],['C',C,-14,4],['D',D,-14,4]].forEach(function(x){o.push(dot(x[1][0],x[1][1],'#C0272D'));o.push(T(x[1][0]+x[2],x[1][1]+x[3],x[0],'#C0272D',12,'middle',true));});
  if(p>=1){
    o.push(T(A[0]+20,A[1]-16,'110\u00b0','#C8922A',13,'start',true));
    o.push(T(C[0]-20,C[1]+4,'x','#1a5a8a',15,'end',true));
  }
  if(p>=2){o.push(T(cx,cy+r+26,'Opposite angles of a cyclic quadrilateral sum to 180\u00b0','#241A17',12,'middle',true));}
  if(p>=3){o.push(T(cx,cy,'x = 180 \u2212 110 = 70\u00b0','#C0272D',14,'middle',true));}
  s.innerHTML=o.join('');
}

/* Q5 Tangent-radius 90 degrees */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=220,cy=160,r=110;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  // tangent at right-most point
  var tx=cx+r,ty=cy;
  o.push(L(tx,ty-130,tx,ty+100,'#1a5a8a',2.5));
  o.push(T(tx+14,ty-120,'Tangent','#1a5a8a',12,'start',false));
  if(p>=1){
    o.push(L(cx,cy,tx,ty,'#C8922A',2));
    o.push(T((cx+tx)/2,cy-14,'radius r','#C8922A',12,'middle',true));
    o.push(dot(tx,ty,'#C0272D'));
    o.push(T(tx+14,ty+14,'T','#C0272D',12,'start',true));
  }
  if(p>=2){
    // right angle mark
    o.push('<polyline points="'+(tx-14)+','+(ty)+' '+(tx-14)+','+(ty-14)+' '+(tx)+','+(ty-14)+'" fill="none" stroke="#C0272D" stroke-width="1.5"/>');
    o.push(T(cx,cy+r+26,'Tangent \u22a5 radius at point of contact','#C0272D',13,'middle',true));
  }
  if(p>=3){
    // external point P, two tangents
    var P=[cx+r+90,cy];
    o.push(dot(P[0],P[1],'#888'));o.push(T(P[0]+12,P[1]+4,'P','#888',12,'start',true));
    var ang=Math.acos(r/Math.hypot(P[0]-cx,P[1]-cy));
    var baseAng=Math.atan2(P[1]-cy,P[0]-cx);
    var T1=ptOnCirc(cx,cy,r,(baseAng+ang)*180/Math.PI);
    var T2=ptOnCirc(cx,cy,r,(baseAng-ang)*180/Math.PI);
    o.push(L(P[0],P[1],T1[0],T1[1],'#888',1.5,'4,3'));
    o.push(L(P[0],P[1],T2[0],T2[1],'#888',1.5,'4,3'));
    o.push(T(cx,cy-14,'PT\u2081 = PT\u2082','#888',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q6 Alternate segment theorem */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=165,r=120;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  // chord AB, tangent at A
  var A=ptOnCirc(cx,cy,r,210),B=ptOnCirc(cx,cy,r,-30);
  var C=ptOnCirc(cx,cy,r,-110);
  o.push(dot(A[0],A[1],'#C0272D'));o.push(T(A[0]-14,A[1]+8,'A','#C0272D',12,'end',true));
  o.push(dot(B[0],B[1],'#C0272D'));o.push(T(B[0]+12,B[1]+8,'B','#C0272D',12,'start',true));
  o.push(dot(C[0],C[1],'#1a5a8a'));o.push(T(C[0]+8,C[1]-14,'C','#1a5a8a',12,'start',true));
  // tangent at A
  var tangDir=[-Math.sin(210*Math.PI/180),Math.cos(210*Math.PI/180)];
  o.push(L(A[0]-tangDir[0]*80,A[1]-tangDir[1]*80,A[0]+tangDir[0]*120,A[1]+tangDir[1]*120,'#C8922A',2));
  o.push(T(A[0]+tangDir[0]*130,A[1]+tangDir[1]*130,'tangent','#C8922A',11,'start',false));
  if(p>=1){o.push(L(A[0],A[1],B[0],B[1],'#241A17',1.5));}
  if(p>=2){
    o.push(L(A[0],A[1],C[0],C[1],'#1a5a8a',1.5));
    o.push(L(B[0],B[1],C[0],C[1],'#1a5a8a',1.5));
  }
  if(p>=3){
    o.push(T(cx,cy+r+26,'\u2220 between tangent & chord AB = \u2220ACB (alternate segment)','#C0272D',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q7 Equal chords equidistant from centre */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=155,r=120;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  o.push(dot(cx,cy,'#888'));o.push(T(cx+8,cy+4,'O','#888',12,'start',false));
  // two equal chords
  var A=ptOnCirc(cx,cy,r,230),B=ptOnCirc(cx,cy,r,310);
  var C=ptOnCirc(cx,cy,r,50),D=ptOnCirc(cx,cy,r,130);
  o.push(L(A[0],A[1],B[0],B[1],'#C0272D',2.5));
  o.push(L(C[0],C[1],D[0],D[1],'#1a5a8a',2.5));
  o.push(T((A[0]+B[0])/2,(A[1]+B[1])/2+16,'AB','#C0272D',12,'middle',true));
  o.push(T((C[0]+D[0])/2,(C[1]+D[1])/2-14,'CD','#1a5a8a',12,'middle',true));
  if(p>=1){
    // perp from O to each chord
    var m1x=(A[0]+B[0])/2,m1y=(A[1]+B[1])/2;
    var m2x=(C[0]+D[0])/2,m2y=(C[1]+D[1])/2;
    o.push(L(cx,cy,m1x,m1y,'#C8922A',1.5,'4,3'));
    o.push(L(cx,cy,m2x,m2y,'#C8922A',1.5,'4,3'));
    o.push(dot(m1x,m1y,'#C8922A'));
    o.push(dot(m2x,m2y,'#C8922A'));
  }
  if(p>=2){
    o.push(T(cx,cy+r+26,'Equal chords \u2192 equal perpendicular distances from centre','#C0272D',12,'middle',true));
    o.push(T(cx,cy+r+44,'(Perpendicular also bisects the chord)','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q8 Perpendicular bisector of chord through centre */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=155,r=120;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  o.push(dot(cx,cy,'#888'));o.push(T(cx+10,cy+4,'O','#888',12,'start',false));
  var A=ptOnCirc(cx,cy,r,240),B=ptOnCirc(cx,cy,r,300);
  var M=[(A[0]+B[0])/2,(A[1]+B[1])/2];
  o.push(L(A[0],A[1],B[0],B[1],'#C0272D',2.5));
  o.push(T(A[0]-12,A[1]+8,'A','#C0272D',12,'end',true));
  o.push(T(B[0]+12,B[1]+8,'B','#C0272D',12,'start',true));
  if(p>=1){
    o.push(L(cx,cy,M[0],M[1],'#C8922A',2));
    o.push(dot(M[0],M[1],'#C8922A'));
    o.push(T(M[0],M[1]+14,'M','#C8922A',12,'middle',true));
    // right angle at M
    var dx=B[0]-A[0],dy=B[1]-A[1],len=Math.hypot(dx,dy);
    var ux=dx/len*10,uy=dy/len*10,px=-uy,py=ux;
    o.push('<polyline points="'+(M[0]+ux)+','+(M[1]+uy)+' '+(M[0]+ux+px)+','+(M[1]+uy+py)+' '+(M[0]+px)+','+(M[1]+py)+'" fill="none" stroke="#C8922A" stroke-width="1.5"/>');
  }
  if(p>=2){o.push(T(cx,cy+r+26,'OM \u22a5 AB and M is the midpoint of AB','#C0272D',13,'middle',true));}
  if(p>=3){o.push(T(cx,cy+r+44,'The perpendicular bisector of any chord passes through the centre','#241A17',12,'middle',false));}
  s.innerHTML=o.join('');
}

/* Q9 Tangents from external point */
function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=200,cy=155,r=100;
  o.push(circ(cx,cy,r,'#fff5f0','#C0272D',2));
  o.push(dot(cx,cy,'#888'));o.push(T(cx,cy-12,'O','#888',12,'middle',false));
  var P=[cx+220,cy];
  o.push(dot(P[0],P[1],'#1a5a8a'));o.push(T(P[0]+14,P[1]+4,'P','#1a5a8a',13,'start',true));
  var ang=Math.acos(r/Math.hypot(P[0]-cx,P[1]-cy));
  var baseAng=Math.atan2(P[1]-cy,P[0]-cx);
  var T1=[cx+r*Math.cos(baseAng+ang-Math.PI/2+Math.PI/2),cy+r*Math.sin(baseAng+ang-Math.PI/2+Math.PI/2)];
  // simpler fixed geometry
  var T1f=ptOnCirc(cx,cy,r,-35),T2f=ptOnCirc(cx,cy,r,35);
  if(p>=1){
    o.push(L(P[0],P[1],T1f[0],T1f[1],'#C0272D',2));
    o.push(L(P[0],P[1],T2f[0],T2f[1],'#C0272D',2));
    o.push(dot(T1f[0],T1f[1],'#C0272D'));o.push(T(T1f[0]+8,T1f[1]-12,'T\u2081','#C0272D',12,'start',true));
    o.push(dot(T2f[0],T2f[1],'#C0272D'));o.push(T(T2f[0]+8,T2f[1]+16,'T\u2082','#C0272D',12,'start',true));
  }
  if(p>=2){
    o.push(L(cx,cy,T1f[0],T1f[1],'#C8922A',1.5,'4,3'));
    o.push(L(cx,cy,T2f[0],T2f[1],'#C8922A',1.5,'4,3'));
  }
  if(p>=3){
    o.push(T(cx,cy+r+26,'PT\u2081 = PT\u2082  (tangents from external point are equal)','#C0272D',13,'middle',true));
    o.push(T(cx,cy+r+44,'OT\u2081P = OT\u2082P = 90\u00b0  (tangent \u22a5 radius)','#888',12,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q10 Pythagoras in 3D */
function dQ10(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Cuboid: l=8, w=6, h=5
  var ox=70,oy=240,l=180,w=100,h=110,d=55;
  // back faces
  o.push('<polygon points="'+ox+','+(oy-h)+' '+(ox+d)+','+(oy-h-d)+' '+(ox+l+d)+','+(oy-h-d)+' '+(ox+l)+','+(oy-h)+'" fill="#e8e8f8" stroke="#aaa" stroke-width="1"/>');
  o.push('<polygon points="'+(ox+l)+','+(oy)+' '+(ox+l+d)+','+(oy-d)+' '+(ox+l+d)+','+(oy-h-d)+' '+(ox+l)+','+(oy-h)+'" fill="#d8d8f0" stroke="#aaa" stroke-width="1"/>');
  // front face
  o.push('<rect x="'+ox+'" y="'+(oy-h)+'" width="'+l+'" height="'+h+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push(L(ox,oy,ox+l,oy,'#C0272D',2));
  if(p>=1){
    o.push(T(ox+l/2,oy+16,'l = 8 cm','#C0272D',12,'middle',true));
    o.push(T(ox-18,oy-h/2,'h = 5 cm','#C0272D',12,'middle',true));
    o.push(T(ox+l+d/2+8,oy-d/2+4,'w = 6 cm','#888',11,'start',false));
  }
  if(p>=2){
    // face diagonal
    o.push(L(ox,oy,ox+l,oy-h,'#C8922A',2,'5,3'));
    o.push(T(ox+l/2+10,oy-h/2+10,'d\u2081 = \u221a(8\u00b2+5\u00b2)','#C8922A',11,'start',false));
    o.push(T(ox+l/2+10,oy-h/2+24,'= \u221a89 \u2248 9.43','#C8922A',11,'start',false));
  }
  if(p>=3){
    // space diagonal to back-top-right corner
    var bx=ox+l+d,by=oy-h-d;
    o.push(L(ox,oy,bx,by,'#1a5a8a',2,'5,3'));
    o.push(T(ox+l/2+d/2,oy-h/2-d/2-14,'Space diagonal','#1a5a8a',12,'middle',true));
    o.push(T(ox+l/2+d/2,oy-h/2-d/2+2,'= \u221a(8\u00b2+6\u00b2+5\u00b2) = \u221a125 \u2248 11.18 cm','#1a5a8a',11,'middle',false));
  }
  s.innerHTML=o.join('');
}
