<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Constructions - Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Constructions and Loci</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function tryIt(o){var id='t'+Math.random().toString(36).slice(2);ST[id]=o;var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');return '<div class="try"><div class="try-t">Your Turn</div><p>'+o.question+'</p><ul class="hl">'+h+'</ul><div class="ar"><input type="number" step="any" placeholder="Answer ('+o.unit+')" id="'+id+'_i"/><button class="ck" onclick="ck(\''+id+'\')">Check</button></div><div class="fb" id="'+id+'_f"></div><details class="wk"><summary>Show full working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
function ck(id){var o=ST[id],v=parseFloat(document.getElementById(id+'_i').value),f=document.getElementById(id+'_f');if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}if(Math.abs(v-o.ans)<=(o.exact||0.05)){f.className='fb ok';f.textContent='Correct! Answer: '+o.ans+' '+o.unit;}else{f.className='fb er';f.textContent='Not quite - check your working and try again.';}}
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function arc(cx,cy,r,a1,a2,c,w,d){var D=Math.PI/180;var x1=cx+r*Math.cos(a1*D),y1=cy+r*Math.sin(a1*D),x2=cx+r*Math.cos(a2*D),y2=cy+r*Math.sin(a2*D);var lg=Math.abs(a2-a1)>180?1:0;var sw=d?'stroke-dasharray="'+d+'"':'';return '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+lg+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+'" fill="none" stroke="'+(c||'#C8922A')+'" stroke-width="'+(w||1.5)+'" '+sw+'/>';}

/* Q1 - Perpendicular bisector */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=120,ay=160,bx=360,by=160;
  o.push(L(ax,ay,bx,by,'#241A17',2));
  o.push(T(ax-14,ay+4,'A','#241A17',13,'end',true));o.push(T(bx+14,by+4,'B','#241A17',13,'start',true));
  var mx=(ax+bx)/2,my=(ay+by)/2;
  if(p>=1){
    o.push(arc(ax,ay,90,-60,60,'#C8922A',1.5,'5,3'));
    o.push(arc(bx,by,90,120,240,'#C8922A',1.5,'5,3'));
    o.push(T(ax+30,ay-96,'r','#C8922A',10,'middle',false));
    o.push(T(bx-30,ay-96,'r','#C8922A',10,'middle',false));
  }
  if(p>=2){
    var ix1=mx,iy1=my-80,ix2=mx,iy2=my+80;
    o.push(L(ix1,iy1,ix2,iy2,'#C0272D',2));
    o.push('<circle cx="'+mx+'" cy="'+(my-80)+'" r="4" fill="#C0272D"/>');
    o.push('<circle cx="'+mx+'" cy="'+(my+80)+'" r="4" fill="#C0272D"/>');
  }
  if(p>=3){
    o.push('<rect x="'+(mx-8)+'" y="'+(my-8)+'" width="16" height="16" fill="none" stroke="#1a5a8a" stroke-width="1.5"/>');
    o.push(T(mx,my+30,'Midpoint of AB','#1a5a8a',10,'middle',false));
    o.push(T(mx,my-96,'Perpendicular bisector','#C0272D',10,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q2 - Angle bisector */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var vx=120,vy=220;
  var ang1=-30*Math.PI/180, ang2=-80*Math.PI/180;
  var len=220;
  var ax=vx+len*Math.cos(ang1),ay=vy+len*Math.sin(ang1);
  var bx=vx+len*Math.cos(ang2),by=vy+len*Math.sin(ang2);
  o.push(L(vx,vy,ax,ay,'#241A17',2));
  o.push(L(vx,vy,bx,by,'#241A17',2));
  o.push(T(ax+10,ay,'ray 1','#888',10,'start',false));o.push(T(bx+8,by,'ray 2','#888',10,'start',false));
  o.push(T(vx-14,vy+4,'V','#241A17',13,'end',true));
  if(p>=1){
    o.push(arc(vx,vy,70,-80,-30,'#C8922A',1.5,'5,3'));
    var q1x=vx+70*Math.cos(ang1),q1y=vy+70*Math.sin(ang1);
    var q2x=vx+70*Math.cos(ang2),q2y=vy+70*Math.sin(ang2);
    o.push('<circle cx="'+q1x.toFixed(1)+'" cy="'+q1y.toFixed(1)+'" r="4" fill="#C8922A"/>');
    o.push('<circle cx="'+q2x.toFixed(1)+'" cy="'+q2y.toFixed(1)+'" r="4" fill="#C8922A"/>');
  }
  if(p>=2){
    o.push(arc(q1x,q1y,55,80,180,'#C8922A',1,'5,3'));
    o.push(arc(q2x,q2y,55,-10,90,'#C8922A',1,'5,3'));
  }
  if(p>=3){
    var midAng=(-30-80)/2*Math.PI/180;
    var bisX=vx+200*Math.cos(midAng),bisY=vy+200*Math.sin(midAng);
    o.push(L(vx,vy,bisX,bisY,'#C0272D',2));
    o.push(T(bisX+8,bisY-10,'Angle bisector','#C0272D',10,'start',true));
  }
  s.innerHTML=o.join('');
}

/* Q3 - Triangle SSS */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=80,ay=240,bx=280,by=240;
  // triangle: AB=6cm (200px), AC=5cm (167px), BC=4cm (133px)
  // scale: 1cm=33px. A(80,240), B(280,240)
  // C: AC=5->165, BC=4->132. Solve: Cx=(200^2+165^2-132^2)/(2*200)=200*(200^2+165^2-132^2)/(2*200^2)
  var AB=200,AC=165,BC=132;
  var cosA=(AB*AB+AC*AC-BC*BC)/(2*AB*AC);
  var angA=Math.acos(cosA);
  var cx=ax+AC*Math.cos(angA),cy=ay-AC*Math.sin(angA);
  o.push(L(ax,ay,bx,by,'#241A17',2));
  o.push(T(ax-14,ay+4,'A','#C0272D',13,'end',true));o.push(T(bx+10,by+4,'B','#C0272D',13,'start',true));
  o.push(T((ax+bx)/2,ay+16,'6 cm','#241A17',11,'middle',false));
  if(p>=1){o.push(arc(ax,ay,AC,-45,45,'#C8922A',1.5,'5,3'));o.push(T(ax+80,ay-140,'5 cm radius','#C8922A',9,'start',false));}
  if(p>=2){o.push(arc(bx,by,BC,130,230,'#1a5a8a',1.5,'5,3'));o.push(T(bx-80,ay-110,'4 cm radius','#1a5a8a',9,'end',false));}
  if(p>=3){
    o.push(L(ax,ay,cx,cy,'#C0272D',2));o.push(L(bx,by,cx,cy,'#C0272D',2));
    o.push('<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="5" fill="#C0272D" stroke="#fff" stroke-width="1.5"/>');
    o.push(T(cx.toFixed(1),(cy-14).toFixed(1),'C','#C0272D',13,'middle',true));
    o.push(T((ax+cx)/2-14,(ay+cy)/2,'5 cm','#888',10,'end',false));
    o.push(T((bx+cx)/2+10,(by+cy)/2,'4 cm','#888',10,'start',false));
  }
  s.innerHTML=o.join('');
}

/* Q4 - Triangle SAS */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=100,ay=240,bx=340,by=240;
  // AB=7cm (240px), angle A=50deg, AC=5cm (171px)
  var scale=240/7;
  var AC=5*scale;
  var angA=50*Math.PI/180;
  var cx=ax+AC*Math.cos(angA),cy=ay-AC*Math.sin(angA);
  o.push(L(ax,ay,bx,by,'#241A17',2));
  o.push(T(ax-14,ay+4,'A','#C0272D',13,'end',true));o.push(T(bx+10,by+4,'B','#C0272D',13,'start',true));
  o.push(T((ax+bx)/2,ay+16,'7 cm','#241A17',11,'middle',false));
  if(p>=1){
    o.push(arc(ax,ay,55,0,-50,'#C8922A',1.5,'5,3'));
    o.push(T(ax+70,ay-20,'50°','#C8922A',11,'start',false));
  }
  if(p>=2){
    o.push(L(ax,ay,cx,cy,'#C0272D',2.5));
    o.push(T((ax+cx)/2-16,(ay+cy)/2,'5 cm','#C0272D',11,'end',false));
  }
  if(p>=3){
    o.push(L(bx,by,cx,cy,'#1a5a8a',2));
    o.push('<circle cx="'+cx.toFixed(1)+'" cy="'+cy.toFixed(1)+'" r="5" fill="#C0272D" stroke="#fff" stroke-width="1.5"/>');
    o.push(T(cx.toFixed(1),(cy-14).toFixed(1),'C','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q5 - Locus: equidistant from two points */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=140,ay=150,bx=340,by=150;
  o.push('<circle cx="'+ax+'" cy="'+ay+'" r="6" fill="#C0272D" stroke="#fff" stroke-width="2"/>');
  o.push('<circle cx="'+bx+'" cy="'+by+'" r="6" fill="#1a5a8a" stroke="#fff" stroke-width="2"/>');
  o.push(T(ax-14,ay-16,'A','#C0272D',13,'end',true));o.push(T(bx+14,ay-16,'B','#1a5a8a',13,'start',true));
  if(p>=1){
    o.push(arc(ax,ay,80,-80,80,'#C8922A',1,'5,3'));
    o.push(arc(bx,by,80,100,260,'#C8922A',1,'5,3'));
  }
  if(p>=2){
    var mx=(ax+bx)/2;
    o.push(L(mx,20,mx,280,'#C0272D',2));
    o.push(T(mx,14,'Perpendicular bisector of AB','#C0272D',10,'middle',true));
  }
  if(p>=3){
    o.push(R(60,175,360,80,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,205,'Locus = all points equidistant from A and B','#1a7a3a',12,'middle',true));
    o.push(T(240,225,'= perpendicular bisector of AB','#1a7a3a',12,'middle',true));
    o.push(T(240,245,'Every point on this line is the same distance from A as from B','#888',10,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q6 - Locus: equidistant from two lines */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var vx=120,vy=260;
  var r1x=vx+300,r1y=vy,r2x=vx+200,r2y=vy-240;
  o.push(L(vx,vy,r1x,r1y,'#241A17',2));
  o.push(L(vx,vy,r2x,r2y,'#241A17',2));
  o.push(T(vx-14,vy+4,'V','#241A17',12,'end',true));
  if(p>=1){o.push(arc(vx,vy,80,-50,0,'#C8922A',1.5,'5,3'));o.push(T(vx+90,vy-20,'angle','#C8922A',9,'start',false));}
  if(p>=2){
    var angBis=Math.atan2(r2y-vy,r2x-vx)/2+Math.atan2(r1y-vy,r1x-vx)/2;
    var bisX=vx+280*Math.cos(angBis),bisY=vy+280*Math.sin(angBis);
    o.push(L(vx,vy,bisX,bisY,'#C0272D',2));
    o.push(T(bisX+8,bisY,'Angle bisector','#C0272D',10,'start',true));
  }
  if(p>=3){
    o.push(R(40,20,400,80,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,45,'Locus = all points equidistant from both lines','#1a7a3a',12,'middle',true));
    o.push(T(240,65,'= angle bisector of the angle between the two lines','#1a7a3a',12,'middle',true));
    o.push(T(240,82,'Every point on this bisector is the same distance from each line','#888',10,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q7 - Locus: fixed distance from a point (circle) */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=160,r=100;
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#C0272D" stroke="#fff" stroke-width="2"/>');
  o.push(T(cx+10,cy-10,'P','#C0272D',13,'start',true));
  if(p>=1){
    [0,45,90,135,180,225,270,315].forEach(function(ang){
      var D=Math.PI/180;
      var px=cx+r*Math.cos(ang*D),py=cy+r*Math.sin(ang*D);
      o.push(L(cx,cy,px,py,'#C8922A',1,'4,3'));
      o.push('<circle cx="'+px.toFixed(1)+'" cy="'+py.toFixed(1)+'" r="3" fill="#C8922A"/>');
    });
    o.push(T(cx+r/2+10,cy-12,'r','#C8922A',12,'start',false));
  }
  if(p>=2){o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#C0272D" stroke-width="2.5"/>');o.push(T(cx,cy+r+18,'Circle radius r from P','#C0272D',11,'middle',true));}
  if(p>=3){
    o.push(R(40,20,400,44,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,47,'Locus of points exactly r from P = circle, centre P, radius r','#1a7a3a',11,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q8 - Combined locus region */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=120,ay=200,bx=360,by=200;
  o.push('<circle cx="'+ax+'" cy="'+ay+'" r="5" fill="#C0272D" stroke="#fff" stroke-width="2"/>');
  o.push('<circle cx="'+bx+'" cy="'+by+'" r="5" fill="#1a5a8a" stroke="#fff" stroke-width="2"/>');
  o.push(T(ax-14,ay+14,'A','#C0272D',12,'end',true));o.push(T(bx+14,by+14,'B','#1a5a8a',12,'start',true));
  o.push(L(ax,ay,bx,by,'#888',1,'4,3'));o.push(T((ax+bx)/2,ay+14,'AB = 6 cm (scale)','#888',10,'middle',false));
  if(p>=1){
    o.push('<circle cx="'+ax+'" cy="'+ay+'" r="80" fill="none" stroke="#C0272D" stroke-width="1.5" stroke-dasharray="5,3"/>');
    o.push(T(ax-88,ay,'< 4 cm from A','#C0272D',9,'end',false));
  }
  if(p>=2){
    var mx=(ax+bx)/2;
    o.push(L(mx,30,mx,270,'#1a5a8a',1.5,'5,3'));
    o.push(T(mx+6,36,'Closer to A','#1a5a8a',9,'start',false));
  }
  if(p>=3){
    // shade intersection region: left of perp bisector AND inside circle from A
    o.push('<clipPath id="clip1"><circle cx="'+ax+'" cy="'+ay+'" r="80"/></clipPath>');
    o.push('<rect x="'+ax+'" y="30" width="'+(mx-ax)+'" height="240" fill="#fce8d8" opacity="0.5" clip-path="url(#clip1)"/>');
    o.push(T(ax+20,ay-30,'Shaded = satisfies both conditions','#C8922A',9,'start',false));
  }
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 - Constructions',ti:'Perpendicular Bisector',su:'Construct the perpendicular bisector of line segment AB using compass and ruler only.',steps:[
    {lb:'What it is',dr:dQ1,ht:'<p>The <b>perpendicular bisector</b> of AB is a line that crosses AB at its midpoint at exactly 90 degrees. Every point on it is equidistant from A and B.</p>'},
    {lb:'Step 1 - Set the compass',dr:dQ1,ht:'<p>Open the compass to <b>more than half the length</b> of AB. Place the point on A and draw an arc above and below the line.</p>'},
    {lb:'Step 2 - Repeat from B',dr:dQ1,ht:'<p>Keep the same compass width. Place the point on B and draw arcs that cross the first arcs. The intersection points are where the bisector passes.</p>'},
    {lb:'Step 3 - Draw the line',dr:dQ1,ht:'<p>Draw a straight line through the two intersection points. This is the perpendicular bisector. The right angle confirms it is perpendicular.</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt({question:'The perpendicular bisector of a line of length 10 cm passes through the midpoint. How far is the midpoint from each endpoint?',hints:['The midpoint divides the line equally','10 cm / 2 = ?'],ans:5,exact:0.1,unit:'cm',working:'10 / 2 = <b>5 cm</b> from each endpoint.'})}
  ]},
  {ey:'Q2 - Constructions',ti:'Angle Bisector',su:'Construct the bisector of a given angle using compass and ruler only.',steps:[

    {lb:'Step 1 - Arc from vertex',dr:dQ2,ht:'<p>Place compass on vertex V. Draw an arc that crosses both rays. Mark the two crossing points.</p>'},
    {lb:'Step 2 - Arcs from crossing points',dr:dQ2,ht:'<p>Place compass on each crossing point and draw arcs of the same radius inside the angle. The arcs must intersect.</p>'},
    {lb:'Step 3 - Draw the bisector',dr:dQ2,ht:'<p>Draw a straight line from V through the intersection of the inner arcs. This line bisects the angle exactly.</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt({question:'If an angle of 80 degrees is bisected, what is the size of each half?',hints:['Divide the angle by 2','80 / 2 = ?'],ans:40,exact:0.1,unit:'degrees',working:'80 / 2 = <b>40 degrees</b> each side.'})}
  ]},
  {ey:'Q3 - Constructions',ti:'Constructing a Triangle: SSS',su:'Construct triangle ABC with AB = 6 cm, BC = 4 cm, AC = 5 cm.',steps:[
    {lb:'SSS means all three sides given',dr:dQ3,ht:'<p>When all three sides are known (SSS), draw one side as the base, then use a compass set to each of the other two sides to locate the third vertex.</p>'},
    {lb:'Step 1 - Draw the base AB',dr:dQ3,ht:'<p>Draw AB = 6 cm as a horizontal line. Mark A and B clearly.</p>'},
    {lb:'Step 2 - Arc from A',dr:dQ3,ht:'<p>Set the compass to 5 cm (length AC). Place on A and draw an arc above the line. All points on this arc are 5 cm from A.</p>'},
    {lb:'Step 3 - Arc from B and find C',dr:dQ3,ht:'<p>Set compass to 4 cm (length BC). Place on B and draw an arc. Where the two arcs cross is point C. Draw AC and BC to complete the triangle.</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt({question:'In a triangle with sides 6, 4 and 5 cm, which side would you draw as the base first?',hints:['Conventionally draw the longest side, or the one whose two connecting sides are both given','Any side works, but the longest is often easiest'],ans:6,exact:0.5,unit:'cm (the longest side)',working:'Draw AB = <b>6 cm</b> as the base. Then use arcs of 5 cm and 4 cm to find C.'})}
  ]},
  {ey:'Q4 - Constructions',ti:'Constructing a Triangle: SAS',su:'Construct triangle ABC with AB = 7 cm, angle A = 50 degrees, AC = 5 cm.',steps:[
    {lb:'SAS means two sides and included angle',dr:dQ4,ht:'<p>When two sides and the angle between them (SAS) are given, draw one side, use a protractor to mark the angle, then measure along the second side.</p>'},
    {lb:'Step 1 - Draw AB = 7 cm',dr:dQ4,ht:'<p>Draw a horizontal line 7 cm long. Label A on the left and B on the right.</p>'},

    {lb:'Your turn',dr:dQ4,ht:tryIt({question:'In a SAS construction with angle A = 50 degrees, the angle is measured from which line using the protractor?',hints:['The angle is at vertex A','It is between the two given sides AB and AC','Measure from AB'],ans:50,exact:1,unit:'degrees from AB',working:'The <b>50 degree</b> angle is measured from line AB at vertex A, opening towards where C will be.'})}
  ]},
  {ey:'Q5 - Loci',ti:'Locus: Equidistant from Two Points',su:'Describe and construct the locus of points equidistant from A and B.',steps:[
    {lb:'What is a locus?',dr:dQ5,ht:'<p>A <b>locus</b> (plural: loci) is the set of all points satisfying a given condition. It forms a line, curve or region.</p>'},
    {lb:'Step 1 - Consider the condition',dr:dQ5,ht:'<p>We want all points P such that PA = PB (equally far from A and B). How do we find them?</p>'},
    {lb:'Step 2 - Construct it',dr:dQ5,ht:'<p>Draw arcs from A and B of the same radius. Where they cross, those points are equidistant from A and B. Join them.</p>'},
    {lb:'Step 3 - The answer',dr:dQ5,ht:'<div class="fm">Locus = perpendicular bisector of AB</div><p>The locus is a straight line, perpendicular to AB, passing through its midpoint.</p>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt({question:'If AB = 10 cm, how far is any point on the perpendicular bisector from A? (Hint: think about the midpoint only.)',hints:['The midpoint of AB is on the locus','Midpoint is 5 cm from each end','Other points on the bisector are further away'],ans:5,exact:0.5,unit:'cm (minimum distance, at midpoint)',working:'The midpoint is exactly <b>5 cm</b> from A. Points elsewhere on the bisector are further away.'})}
  ]},
  {ey:'Q6 - Loci',ti:'Locus: Equidistant from Two Lines',su:'Describe the locus of points equidistant from two intersecting lines.',steps:[
    {lb:'The condition',dr:dQ6,ht:'<p>We want all points equally far from two straight lines that meet at a vertex. The perpendicular distance from a point to a line is what we measure.</p>'},
    {lb:'Step 1 - Think about it',dr:dQ6,ht:'<p>The point must be the same perpendicular distance from each line. This is similar to bisecting the angle between the lines.</p>'},
    {lb:'Step 2 - Construct it',dr:dQ6,ht:'<p>Use the angle bisector construction. The bisector passes through the vertex and divides the angle equally.</p>'},
    {lb:'Step 3 - The answer',dr:dQ6,ht:'<div class="fm">Locus = angle bisector of the angle between the two lines</div><p>If the two lines form two pairs of angles, there are actually TWO bisectors, perpendicular to each other.</p>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt({question:'Two lines meet at 80 degrees. The angle bisector divides this into two equal angles. What is each angle?',hints:['80 / 2 = ?'],ans:40,exact:0.5,unit:'degrees',working:'80 / 2 = <b>40 degrees</b> on each side of the bisector.'})}
  ]},
  {ey:'Q7 - Loci',ti:'Locus: Fixed Distance from a Point',su:'Describe the locus of points exactly r cm from a fixed point P.',steps:[
    {lb:'The condition',dr:dQ7,ht:'<p>We want all points exactly <b>r cm from point P</b>. Think about how many such points there are and what shape they form.</p>'},
    {lb:'Step 1 - Consider a few points',dr:dQ7,ht:'<p>A point r cm north of P qualifies. So does a point r cm east, west, south, or at any direction. There are infinitely many.</p>'},
    {lb:'Step 2 - The locus',dr:dQ7,ht:'<div class="fm">Locus = a circle, centre P, radius r</div><p>The circle passes through every point exactly r from P.</p>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt({question:'A dog is on a lead of length 3 m attached to a post. What is the area of the region the dog can reach?',hints:['The boundary of the region is the locus (a circle)','Area of circle = pi x r^2','r = 3 m'],ans:28.3,exact:0.5,unit:'m^2',working:'Area = pi x 3^2 = 9pi = <b>28.3 m^2</b>'})}
  ]},
  {ey:'Q8 - Loci',ti:'Combined Loci',su:'Find and shade the region within 4 cm of A and closer to A than B.',steps:[
    {lb:'Two conditions',dr:dQ8,ht:'<p>Some loci problems have two conditions that must both be satisfied. The answer is the <b>intersection</b> (overlap) of the two regions.</p>'},
    {lb:'Condition 1: within 4 cm of A',dr:dQ8,ht:'<div class="fm">Locus 1: circle, centre A, radius 4 cm</div><p>The region is the inside of this circle (including the boundary).</p>'},
    {lb:'Condition 2: closer to A than B',dr:dQ8,ht:'<div class="fm">Locus 2: perpendicular bisector of AB</div><p>The region closer to A than B is the half-plane on A\'s side of the bisector.</p>'},
    {lb:'Combined region',dr:dQ8,ht:'<p>The shaded region satisfies BOTH conditions: it is inside the circle around A AND on A\'s side of the perpendicular bisector of AB.</p>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt({question:'If A and B are 10 cm apart and the region must be within 3 cm of A AND closer to A than B, is the point exactly 3 cm from A and 4 cm from B in the region? Answer 1 for yes, 0 for no.',hints:['Check condition 1: is it within 3 cm of A? (exactly 3 = on boundary, so yes)','Check condition 2: is it closer to A (3 cm) than B (4 cm)? 3 < 4, so yes'],ans:1,exact:0.1,unit:'(1=yes, 0=no)',working:'3 cm from A (on boundary, so included). 3 < 4, so closer to A. Both conditions met. Answer = <b>1</b> (yes)'})}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
