<style>
:root{--red:#6A1B9A;--dark:#4a148c;--cream:#F3E5F5;--ink:#0d1b2a;--line:#E1BEE7;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F3E5F5);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F3E5F5';stroke=stroke||'#6A1B9A';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#6A1B9A')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#6A1B9A')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F3E5F5')+'" stroke="'+(stroke||'#6A1B9A')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Exothermic vs endothermic','#6A1B9A',13,'middle',true));
o.push(R(10,40,222,190,'#fde8e8','#C0272D',2));o.push(T(121,62,'EXOTHERMIC','#C0272D',12,'middle',true));

['Energy absorbed from surroundings','Temperature of surroundings falls','\u0394H is positive','Thermal decomposition'].forEach(function(x,i){if(i<p)o.push(T(359,82+i*30,x,'#333',9,'middle',false));});}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Energy profile — exothermic','#6A1B9A',13,'middle',true));

o.push(T(254,258,'Reaction progress','#333',9,'middle',false));o.push(T(25,130,'Energy','#333',9,'middle',false));
o.push(L(58,100,148,100,'#1565C0',2.5));
if(p>=1){for(var i=0;i<30;i++){var x1=148+i*4,x2=148+(i+1)*4,y1=100-i*3-i*i*0.1,y2=100-(i+1)*3-(i+1)*(i+1)*0.1;if(y1>30&&y2>30)o.push(L(x1,y1,x2,y2,'#6A1B9A',2.5));}
o.push(T(200,28,'Activation energy (Ea)','#6A1B9A',9,'middle',false));}
if(p>=2){for(var j=0;j<30;j++){var x1=268+j*4,x2=268+(j+1)*4,y1=30+j*4+j*j*0.08,y2=30+(j+1)*4+(j+1)*(j+1)*0.08;if(y1<200&&y2<200)o.push(L(x1,y1,x2,y2,'#6A1B9A',2.5));}
o.push(L(378,200,450,200,'#C0272D',2.5));o.push(T(420,216,'products','#C0272D',9,'middle',false));}
if(p>=3){o.push(L(100,100,100,200,'#C0272D',1.5,'4,3'));o.push(L(420,200,420,100,'#C0272D',1.5,'4,3'));o.push(arw(100,150,418,150,'#C0272D',1.5));o.push(T(260,144,'\u0394H < 0 (exo)','#C0272D',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Energy profile — endothermic','#6A1B9A',13,'middle',true));
o.push(L(48,240,48,22,'#333',2));o.push(L(48,240,450,240,'#333',2));
o.push(L(58,200,148,200,'#1565C0',2.5));
if(p>=1){for(var i=0;i<30;i++){var x1=148+i*4,x2=148+(i+1)*4,y1=200-i*4-i*i*0.1,y2=200-(i+1)*4-(i+1)*(i+1)*0.1;if(y1>30&&y2>30)o.push(L(x1,y1,x2,y2,'#6A1B9A',2.5));}
o.push(T(200,28,'Ea (always\u2265\u0394H)','#6A1B9A',9,'middle',false));}
if(p>=2){for(var j=0;j<30;j++){var x1=268+j*4,x2=268+(j+1)*4,y1=30+j*3+j*j*0.07,y2=30+(j+1)*3+(j+1)*(j+1)*0.07;if(y1<130&&y2<130)o.push(L(x1,y1,x2,y2,'#6A1B9A',2.5));}
o.push(L(370,120,450,120,'#2E7D32',2.5));o.push(T(420,110,'products','#2E7D32',9,'middle',false));}
if(p>=3){o.push(L(100,200,100,120,'#2E7D32',1.5,'4,3'));o.push(L(420,200,420,120,'#2E7D32',1.5,'4,3'));o.push(arw(420,164,102,164,'#2E7D32',1.5));o.push(T(260,158,'\u0394H > 0 (endo)','#2E7D32',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Bond energies and \u0394H','#6A1B9A',12,'middle',true));
o.push(R(10,40,460,56,'#f3e5f5','#6A1B9A',1.5));o.push(T(240,60,'\u0394H = \u03a3(bonds broken) \u2212 \u03a3(bonds formed)','#6A1B9A',12,'middle',true));o.push(T(240,78,'Breaking bonds: endothermic (+). Forming bonds: exothermic (\u2212).','#555',9,'middle',false));
if(p>=1){o.push(R(10,112,460,112,'#fff','#E1BEE7',1));o.push(T(240,128,'Example: H\u2082 + Cl\u2082 \u2192 2HCl','#333',10,'middle',false));o.push(T(240,148,'Broken: H\u2014H (432) + Cl\u2014Cl (242) = 674 kJ/mol','#C0272D',10,'middle',false));o.push(T(240,166,'Formed: 2\u00d7H\u2014Cl = 2\u00d7431 = 862 kJ/mol','#2E7D32',10,'middle',false));o.push(T(240,186,'Energy','#6A1B9A',9,'middle',false));}
if(p>=2){o.push(T(240,206,'\u0394H = 674 \u2212 862 = \u2212188 kJ/mol (exothermic)','#6A1B9A',12,'middle',true));}
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Hess\u2019 Law','#6A1B9A',13,'middle',true));
o.push(R(10,40,460,60,'#f3e5f5','#6A1B9A',2));o.push(T(240,64,'\u0394H is independent of the route taken','#6A1B9A',12,'middle',true));o.push(T(240,78,'(as long as start and end states are the same)','#555',9,'middle',false));
if(p>=1){o.push(T(240,120,'A \u2192 C directly: \u0394H\u2081','#333',11,'middle',false));o.push(T(240,144,'A \u2192 B \u2192 C: \u0394H\u2082 + \u0394H\u2083','#333',11,'middle',false));o.push(T(240,170,'\u0394H\u2081 = \u0394H\u2082 + \u0394H\u2083','#6A1B9A',13,'middle',true));}
if(p>=2){o.push(T(240,218,'Use to find unknown \u0394H from known values','#555',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ2(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ5(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Energetics summary','#6A1B9A',13,'middle',true));
[['Exothermic','\u0394H < 0; energy released to surroundings'],['Endothermic','\u0394H > 0; energy absorbed from surroundings'],['Ea','activation energy; always positive'],['Bond energies','\u0394H = bonds broken \u2212 bonds formed'],["Hess' Law",'\u0394H independent of route taken'],['Catalysts','lower Ea; do not change \u0394H']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#f3e5f5','#E1BEE7',1));o.push(T(120,55+i*33,r[0],'#6A1B9A',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Exothermic and Endothermic',su:'Classify reactions as exothermic or endothermic. Recall examples.',steps:[
  {lb:'Energy transfer',dr:dQ1,ht:'<p><b>Exothermic:</b> reaction releases energy to surroundings. Temperature of surroundings rises. \u0394H is negative. Examples: combustion, neutralisation, oxidation.</p><p><b>Endothermic:</b> reaction absorbs energy from surroundings. Temperature of surroundings falls. \u0394H is positive. Examples: thermal decomposition, dissolving ammonium nitrate.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Burning methane (combustion). Exothermic or endothermic?',a:1,w:'Combustion releases energy \u2192 exothermic, \u0394H<0. Answer: 1.'},{q:'Thermal decomposition of limestone (CaCO\u2083 \u2192 CaO + CO\u2082). Which?',a:2,w:'Requires heating \u2192 endothermic, \u0394H>0. Answer: 2.'},{q:'Neutralisation of acid and alkali. Exothermic or endothermic?',a:1,w:'Neutralisation releases energy \u2192 exothermic. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+' 1=exothermic, 2=endothermic.',hints:['Exo: releases heat (\u0394H<0). Endo: absorbs heat (\u0394H>0).'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Energy Profile (Exothermic)',su:'Sketch and interpret the energy profile for an exothermic reaction.',steps:[
  {lb:'The profile',dr:dQ2,ht:'<p>On an energy profile: reactants start high (endothermic) or low (exothermic), a peak = <b>transition state</b> (activation energy Ea), then products.</p><p>Exothermic: products are at LOWER energy than reactants. \u0394H = products \u2212 reactants < 0.</p>'},
  {lb:'Activation energy',dr:dQ2,ht:'<p><b>Activation energy (Ea)</b> is the minimum energy colliding particles must have for a reaction to occur. A catalyst provides an alternative pathway with lower Ea.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'On an exothermic profile, are products at higher or lower energy than reactants?',a:2,w:'Products are at lower energy (energy released). Answer: 2.'},{q:'What does activation energy (Ea) represent on an energy profile?',a:1,w:'Ea = height of peak above reactant energy level. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+' 1=height of peak above reactants, 2=lower than reactants.',hints:['Exothermic: energy flows out; products lower than reactants.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Energy Profile (Endothermic)',su:'Sketch and interpret the energy profile for an endothermic reaction.',steps:[
  {lb:'Endothermic profile',dr:dQ3,ht:'<p>Endothermic: products are at HIGHER energy than reactants. \u0394H > 0. Energy is absorbed from surroundings. The shape shows the same activation energy peak, but products finish higher than reactants.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'For an endothermic reaction, \u0394H is: 1=positive (+), 2=negative (-)',a:1,w:'Endothermic: absorbs energy, \u0394H > 0. Answer: 1.'},{q:'On an endothermic profile, products are at: 1=higher energy than reactants, 2=lower',a:1,w:'Products end up at higher energy (energy absorbed). Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Endothermic: absorbs energy from surroundings'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Bond Energies',su:'Use bond energies to calculate \u0394H for a reaction.',steps:[
  {lb:'Bond energies',dr:dQ4,ht:'<p>Breaking bonds requires energy (endothermic). Forming bonds releases energy (exothermic).</p><div class="fm">\u0394H = \u03a3 bond energies broken \u2212 \u03a3 bond energies formed</div>'},
  {lb:'Worked example',dr:dQ4,ht:'<p>H\u2082 + Cl\u2082 \u2192 2HCl. &nbsp;Break: H\u2014H (432) + Cl\u2014Cl (242) = 674. &nbsp;Form: 2\u00d7H\u2014Cl (431) = 862. &nbsp;\u0394H = 674 \u2212 862 = \u2212188 kJ/mol.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var broken=rnd(200,600)+rnd(100,400),formed=broken+rnd(-200,200);var dH=broken-formed;return{question:'Bonds broken: <b>'+broken+' kJ</b>. Bonds formed: <b>'+formed+' kJ</b>. Find \u0394H.',hints:['\u0394H = bonds broken \u2212 bonds formed'],ans:dH,tol:0.5,unit:'kJ/mol',working:'\u0394H = '+broken+' \u2212 '+formed+' = '+dH+' kJ/mol'};})},
]},
{ey:'Q5 \u2022 Y10 Chemistry \u2022 Energetics',ti:"Hess' Law",su:"Apply Hess' Law to find unknown enthalpy changes.",steps:[
  {lb:"Hess' Law",dr:dQ5,ht:"<p>Hess' Law: the total enthalpy change is the same regardless of the route taken, provided the start and end states are identical.</p><div class='fm'>\u0394H\u2081 = \u0394H\u2082 + \u0394H\u2083</div>"},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var H2=rnd(-300,-50),H3=rnd(-200,-20),H1=H2+H3;return{question:'\u0394H\u2082 = <b>'+H2+' kJ</b>, \u0394H\u2083 = <b>'+H3+' kJ</b>. Find \u0394H\u2081 (Hess\' Law).',hints:['\u0394H\u2081 = \u0394H\u2082 + \u0394H\u2083'],ans:H1,tol:0.5,unit:'kJ',working:'\u0394H\u2081 = '+H2+' + '+H3+' = '+H1+' kJ'};})},
]},
{ey:'Q6 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Catalysts and Activation Energy',su:'Explain how a catalyst lowers Ea without changing \u0394H.',steps:[
  {lb:'Catalysts',dr:dQ6,ht:'<p>A catalyst provides an alternative reaction pathway with a <b>lower activation energy</b>. This increases the rate of reaction without affecting the enthalpy change (\u0394H stays the same).</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Adding a catalyst changes: 1=\u0394H, 2=Ea, 3=both.',a:2,w:'Catalyst lowers Ea only. \u0394H unchanged. Answer: 2.'},{q:'A catalyst increases reaction rate by: 1=increasing temperature, 2=lowering Ea, 3=increasing \u0394H.',a:2,w:'Catalyst lowers Ea \u2192 more particles have enough energy. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Catalyst = alternative pathway, lower Ea, same \u0394H'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Combustion and Calorimetry',su:'Calculate energy released using q = mc\u0394T.',steps:[
  {lb:'Calorimetry',dr:dQ7,ht:'<p>Energy released by burning fuel heats water:</p><div class="fm">q = m \u00d7 c \u00d7 \u0394T</div><p>m = mass of water (g), c = 4.18 J/(g\u00b0C), \u0394T = temperature rise (\u00b0C).</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var m=rnd(50,200)*5,dT=rnd(5,30),c=4.18,q=parseFloat((m*c*dT).toFixed(0));return{question:'m = <b>'+m+' g</b> water, \u0394T = <b>'+dT+'\u00b0C</b>, c=4.18. Find energy released (q).',hints:['q = mc\u0394T'],ans:q,tol:q*0.01,unit:'J',working:'q = '+m+'\u00d74.18\u00d7'+dT+' = '+q+' J'};})},
]},
{ey:'Q8 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Neutralisation Enthalpy',su:'Describe and calculate enthalpy of neutralisation.',steps:[
  {lb:'Neutralisation',dr:dQ8,ht:'<p>Neutralisation of strong acid and strong alkali: H\u207a(aq) + OH\u207b(aq) \u2192 H\u2082O(l). Always exothermic. \u0394H\u00b0 \u2248 \u221257 kJ/mol for strong acid + strong base.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var n=rnd(1,4)*0.5,dH=57*n;return{question:'Neutralisation \u0394H = \u221257 kJ/mol. Energy released by <b>'+n+' mol</b> of water formed?',hints:['energy = n \u00d7 |\u0394H|'],ans:dH,tol:0.5,unit:'kJ',working:'Energy = '+n+'\u00d757 = '+dH+' kJ'};})},
]},
{ey:'Q9 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Bond Energy Calculations',su:'Calculate \u0394H from bond energy data for unfamiliar molecules.',steps:[
  {lb:'Full bond energy calculation',dr:dQ9,ht:'<p>List all bonds broken (reactants) and all bonds formed (products). Sum each group. \u0394H = broken \u2212 formed. Negative = exothermic.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var n_broken=rnd(2,5),BE_broken=rnd(200,500),n_formed=rnd(2,5),BE_formed=rnd(200,500);var total_b=n_broken*BE_broken,total_f=n_formed*BE_formed,dH=total_b-total_f;return{question:n_broken+' bonds broken ('+BE_broken+' each) and '+n_formed+' bonds formed ('+BE_formed+' each). Find \u0394H.',hints:['\u0394H = (n\u00d7BE\u1d47\u02b3\u1d52\u02b7\u1d49\u207f) \u2212 (n\u00d7BE\u1da0\u1d52\u02b3\u1d50\u1d49\u1d48)'],ans:dH,tol:0.5,unit:'kJ/mol',working:n_broken+'\u00d7'+BE_broken+' \u2212 '+n_formed+'\u00d7'+BE_formed+' = '+total_b+' \u2212 '+total_f+' = '+dH+' kJ/mol'};})},
]},
{ey:'Q10 \u2022 Y10 Chemistry \u2022 Energetics',ti:'Mixed Energetics',su:'Exo/endothermic, bond energies, Ea and calorimetry combined.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>Exo: \u0394H<0; endo: \u0394H>0. Bond energies: \u0394H=broken\u2212formed. q=mc\u0394T. Catalyst lowers Ea. Hess\u2019 Law: \u0394H independent of route.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['classify','bonds','cal']);if(type==='classify'){var qs=[{q:'Combustion of propane. Exo or endo?',a:1,w:'Combustion = exothermic (\u0394H<0). Answer: 1.'},{q:'Dissolving ammonium chloride (feels cold). Exo or endo?',a:2,w:'Feels cold = absorbs energy = endothermic. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=exothermic, 2=endothermic.',hints:['Temperature rise=exo; fall=endo'],ans:qq.a,tol:0,unit:'',working:qq.w};}if(type==='bonds'){var b=rnd(400,800),f=rnd(400,800),dH=b-f;return{question:'Bonds broken: <b>'+b+' kJ</b>, bonds formed: <b>'+f+' kJ</b>. Find \u0394H.',hints:['\u0394H = broken \u2212 formed'],ans:dH,tol:0.5,unit:'kJ/mol',working:'\u0394H = '+b+' \u2212 '+f+' = '+dH+' kJ/mol'};}var m=rnd(100,300),dT=rnd(5,20);return{question:'Water: m=<b>'+m+' g</b>, \u0394T=<b>'+dT+'\u00b0C</b>, c=4.18. Find q.',hints:['q = mc\u0394T'],ans:parseFloat((m*4.18*dT).toFixed(0)),tol:5,unit:'J',working:'q = '+m+'\u00d74.18\u00d7'+dT+' = '+parseFloat((m*4.18*dT).toFixed(0))+' J'};})}
]},
];
