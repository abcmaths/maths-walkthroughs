<style>
:root{--red:#6A1B9A;--dark:#4a148c;--cream:#F3E5F5;--ink:#0d1b2a;--line:#E1BEE7;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F3E5F5);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F3E5F5';stroke=stroke||'#6A1B9A';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#6A1B9A')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#6A1B9A')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F3E5F5')+'" stroke="'+(stroke||'#6A1B9A')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Atomic structure','#6A1B9A',13,'middle',true));
o.push('<circle cx="240" cy="140" r="50" fill="#f3e5f5" stroke="#6A1B9A" stroke-width="2"/>');
if(p>=1){o.push(T(240,130,'Nucleus','#6A1B9A',10,'middle',true));o.push('<circle cx="240" cy="140" r="12" fill="#6A1B9A"/>');o.push(T(240,143,'p⁺ n','#fff',8,'middle',false));}
if(p>=2){for(var i=0;i<3;i++){var a=i*2.094,x=240+45*Math.cos(a),y=140+45*Math.sin(a);o.push('<circle cx="'+x+'" cy="'+y+'" r="6" fill="#C8922A"/>');}}
if(p>=3){o.push(T(240,210,'Electrons orbit nucleus in shells','#555',9,'middle',false));o.push(T(310,148,'e\u207b','#C8922A',9,'start',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Elements, Compounds, Mixtures','#6A1B9A',13,'middle',true));
[['Element','One type of atom. Cannot be broken down chemically.','H\u2082, O\u2082, Fe, Cu'],['Compound','Two+ elements chemically bonded. Fixed ratio.','H\u2082O, NaCl, CO\u2082'],['Mixture','Two+ substances not chemically combined.','Air, sea water, alloys']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*66,460,58,'#f3e5f5','#E1BEE7',1));o.push(T(85,65+i*66,r[0],'#6A1B9A',12,'middle',true));o.push(T(280,65+i*66,r[1],'#333',9,'middle',false));o.push(T(415,82+i*66,r[2],'#C8922A',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Protons, neutrons, electrons','#6A1B9A',13,'middle',true));
[['Proton','nucleus','+1','~1'],['Neutron','nucleus','0','~1'],['Electron','shells','-1','~0']].forEach(function(r,i){o.push(R(10,42+i*60,460,52,'#f3e5f5','#E1BEE7',1));if(i<p+1){o.push(T(80,72+i*60,r[0],'#6A1B9A',11,'middle',true));o.push(T(200,72+i*60,r[1],'#555',10,'middle',false));o.push(T(320,72+i*60,r[2],'#C0272D',12,'middle',true));o.push(T(430,72+i*60,r[3],'#333',10,'middle',false));}});
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Atomic number and mass number','#6A1B9A',13,'middle',true));
o.push(R(80,40,320,100,'#f3e5f5','#6A1B9A',2));
o.push(T(130,80,'12','#6A1B9A',30,'middle',true));
o.push(T(130,108,'6','#6A1B9A',18,'middle',false));
o.push(T(280,68,'Mass number (A)','#333',11,'start',false));
o.push(T(280,92,'= p + n','#6A1B9A',11,'start',false));
o.push(T(280,116,'Atomic number (Z) = p','#333',11,'start',false));
if(p>=1){o.push(T(240,170,'Carbon-12: 6p, 6n, 6e\u207b','#555',11,'middle',false));}
if(p>=2){o.push(T(240,195,'Neutrons = A \u2212 Z = 12 \u2212 6 = 6','#6A1B9A',11,'middle',true));}
if(p>=3){o.push(T(240,226,'Isotopes: same Z, different A (different neutrons)','#555',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electron shells (energy levels)','#6A1B9A',13,'middle',true));
o.push('<circle cx="240" cy="148" r="14" fill="#6A1B9A"/>');
[26,50,78].forEach(function(r,i){if(i<p+1)o.push('<circle cx="240" cy="148" r="'+r+'" fill="none" stroke="#ce93d8" stroke-width="1.5" stroke-dasharray="4,3"/>');});
var shells=[[2,26],[8,50],[8,78]];
shells.forEach(function(s,si){if(si<p){for(var i=0;i<s[0];i++){var a=i*6.283/s[0],x=240+s[1]*Math.cos(a),y=148+s[1]*Math.sin(a);o.push('<circle cx="'+x+'" cy="'+y+'" r="4" fill="#C8922A"/>');}}});
if(p>=3){o.push(T(240,244,'2,8,8 — max per shell: 2, 8, 8 (first three shells)','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ5(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Atoms summary','#6A1B9A',13,'middle',true));
[['Proton','in nucleus, charge +1, mass 1'],['Neutron','in nucleus, charge 0, mass 1'],['Electron','in shells, charge \u22121, mass ~0'],['Atomic number Z','= number of protons'],['Mass number A','= p + n'],['Neutrons','= A \u2212 Z'],['Isotopes','same Z, different A']].forEach(function(r,i){if(i<p+1){o.push(R(10,36+i*30,460,24,'#f3e5f5','#E1BEE7',1));o.push(T(120,52+i*30,r[0],'#6A1B9A',10,'middle',true));o.push(T(340,52+i*30,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Atomic Structure',su:'Describe the structure of an atom: nucleus, protons, neutrons and electrons.',steps:[
  {lb:'The atom',dr:dQ1,ht:'<p>An atom has a tiny, dense, positive <b>nucleus</b> (containing protons and neutrons) surrounded by electrons in shells.</p>'},
  {lb:'Particles',dr:dQ1,ht:'<p><b>Proton:</b> +1 charge, mass 1. <b>Neutron:</b> 0 charge, mass 1. <b>Electron:</b> \u22121 charge, negligible mass.</p><p>Atoms are electrically neutral: number of protons = number of electrons.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Which sub-atomic particle has a +1 charge and is found in the nucleus?',a:1,w:'<b>Proton</b> \u2014 in nucleus, +1 charge. Answer: 1.'},{q:'Which sub-atomic particle has a negative charge and orbits the nucleus?',a:3,w:'<b>Electron</b> \u2014 in shells, \u22121 charge. Answer: 3.'},{q:'Which sub-atomic particle has no charge?',a:2,w:'<b>Neutron</b> \u2014 in nucleus, charge 0. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=proton, 2=neutron, 3=electron.',hints:['Match charge to particle'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Elements, Compounds and Mixtures',su:'Classify substances as elements, compounds or mixtures.',steps:[
  {lb:'Three types',dr:dQ2,ht:'<p><b>Element:</b> contains only one type of atom. Cannot be broken down chemically. <b>Compound:</b> two or more elements chemically joined in a fixed ratio. <b>Mixture:</b> two or more substances not chemically combined.</p>'},
  {lb:'Examples',dr:dQ2,ht:'<p>Elements: O\u2082, Fe, Cu. &nbsp;Compounds: H\u2082O, NaCl, CO\u2082. &nbsp;Mixtures: air, sea water, alloys (e.g. brass, steel).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[['Water (H\u2082O)',2,'compound'],['Pure iron (Fe)',1,'element'],['Air (N\u2082+O\u2082+...)',3,'mixture'],['Salt (NaCl)',2,'compound'],['Sea water',3,'mixture'],['Gold (Au)',1,'element']];var q=pick(qs);return{question:'Classify "<b>'+q[0]+'</b>". 1=element, 2=compound, 3=mixture.',hints:['Element: one atom type. Compound: chemically joined. Mixture: not joined.'],ans:q[1],tol:0,unit:'',working:q[0]+' is a <b>'+q[2]+'</b>. Answer: '+q[1]+'.'};})},
]},
{ey:'Q3 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Protons, Neutrons and Electrons',su:'State the charge and relative mass of each sub-atomic particle.',steps:[
  {lb:'The three particles',dr:dQ3,ht:'<p>Proton: charge +1, relative mass 1. Neutron: charge 0, mass 1. Electron: charge \u22121, mass ~1/1836 (essentially 0).</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Relative mass of a proton?',a:1,u:'',w:'Proton relative mass = 1.'},{q:'Relative mass of an electron?',a:0,u:'',w:'Electron mass \u2248 0 (negligible). Answer: 0.'},{q:'Charge of a neutron?',a:0,u:'',w:'Neutron has no charge. Answer: 0.'},{q:'Charge of a proton?',a:1,u:'',w:'Proton has +1 charge. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Proton: +1, mass 1. Neutron: 0, mass 1. Electron: \u22121, mass 0'],ans:qq.a,tol:0,unit:qq.u,working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Atomic Number and Mass Number',su:'Use Z and A to find number of protons, neutrons and electrons.',steps:[
  {lb:'Z and A',dr:dQ4,ht:'<p><b>Atomic number (Z)</b> = number of protons (= number of electrons in neutral atom).<br><b>Mass number (A)</b> = protons + neutrons.</p><div class="fm">Neutrons = A \u2212 Z</div>'},

  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var elems=[['Carbon',6,12],['Oxygen',8,16],['Sodium',11,23],['Chlorine',17,35],['Iron',26,56],['Calcium',20,40]];var el=pick(elems);var type=pick(['p','n','e']);if(type==='p')return{question:'Element <b>'+el[0]+'</b> (Z='+el[1]+', A='+el[2]+'). How many protons?',hints:['Protons = Z'],ans:el[1],tol:0,unit:'',working:'Protons = Z = '+el[1]+'.'};if(type==='n')return{question:'Element <b>'+el[0]+'</b> (Z='+el[1]+', A='+el[2]+'). How many neutrons?',hints:['Neutrons = A \u2212 Z'],ans:el[2]-el[1],tol:0,unit:'',working:'Neutrons = '+el[2]+'\u2212'+el[1]+' = '+(el[2]-el[1])+'.'};return{question:'Neutral atom of <b>'+el[0]+'</b> (Z='+el[1]+'). How many electrons?',hints:['In neutral atom: electrons = protons = Z'],ans:el[1],tol:0,unit:'',working:'Electrons = Z = '+el[1]+' (neutral atom).'};})},
]},
{ey:'Q5 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Electron Shells',su:'Write electron configurations for the first 20 elements.',steps:[
  {lb:'Shell filling rules',dr:dQ5,ht:'<p>Electrons fill shells in order. Maximum per shell: shell 1 = 2; shell 2 = 8; shell 3 = 8 (for first 20 elements).</p><p>Sodium (Z=11): 2,8,1. Chlorine (Z=17): 2,8,7. Calcium (Z=20): 2,8,8,2.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var configs=[[1,'H',1],[2,'He',2],[3,'Li',3],[6,'C',6],[8,'O',8],[10,'Ne',10],[11,'Na',11],[12,'Mg',12],[17,'Cl',17],[18,'Ar',18],[19,'K',19],[20,'Ca',20]];var el=pick(configs);var Z=el[0];var s1=Math.min(Z,2),s2=Math.min(Math.max(0,Z-2),8),s3=Math.min(Math.max(0,Z-10),8),s4=Math.max(0,Z-18);var outer=s4>0?s4:s3>0?s3:s2>0?s2:s1;return{question:'Electron configuration of <b>'+el[1]+'</b> (Z='+Z+'). How many electrons are in the outermost shell?',hints:['Fill shells: 2, then 8, then 8'],ans:outer,tol:0,unit:'',working:'Z='+Z+'. Config: '+[s1,s2,s3,s4].filter(function(x){return x>0;}).join(',')+'. Outer shell: '+outer+'.'};})},
]},
{ey:'Q6 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Pure Substances and Mixtures',su:'Distinguish pure substances (elements/compounds) from mixtures.',steps:[
  {lb:'Pure substance',dr:dQ6,ht:'<p>A <b>pure substance</b> contains only one type of particle (element or compound). It has a sharp melting point. A <b>mixture</b> melts over a range of temperatures.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Pure water melts at exactly 0\u00b0C. Is it: 1=pure substance, 2=mixture.',a:1,w:'Sharp melting point = pure substance. Answer: 1.'},{q:'Seawater melts over a range. Is it: 1=pure substance, 2=mixture.',a:2,w:'Melts over range = mixture. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Pure: sharp mp. Mixture: range of mp.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Isotopes',su:'Define isotopes and explain their properties.',steps:[
  {lb:'What are isotopes?',dr:dQ7,ht:'<p><b>Isotopes</b> are atoms of the same element that have the same number of protons (same Z) but different numbers of neutrons (different A).</p><p>Same chemical properties (same electrons), different physical properties (different mass).</p>'},
  {lb:'Examples',dr:dQ7,ht:'<p>Carbon: \u00b9\u00b2C (6p, 6n) and \u00b9\u2074C (6p, 8n). &nbsp;Chlorine: \u00b3\u2075Cl and \u00b3\u2077Cl (75%:25% ratio gives Ar = 35.5). &nbsp;Hydrogen: H, D (deuterium), T (tritium).</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){return{question:'Carbon-12 and Carbon-14 are isotopes. What is the same in both? 1=mass number, 2=atomic number, 3=neutron number.',hints:['Isotopes: same element = same atomic number Z'],ans:2,tol:0,unit:'',working:'Same element = same atomic number (protons). Different mass number = different neutrons. Answer: 2.'};})},
]},
{ey:'Q8 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Relative Atomic Mass',su:'Calculate relative atomic mass from isotope data.',steps:[
  {lb:'What is Ar?',dr:dQ8,ht:'<p>Relative atomic mass (Ar) is the weighted average mass of naturally occurring isotopes of an element.</p><div class="fm">Ar = \u03a3(isotope mass \u00d7 % abundance) / 100</div>'},
  {lb:'Chlorine example',dr:dQ8,ht:'<p>Cl: 75% of \u00b3\u2075Cl, 25% of \u00b3\u2077Cl.</p><div class="fm">Ar = (35\u00d775 + 37\u00d725)/100 = (2625+925)/100 = 35.5</div>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var examples=[[[10,90],[11,10],10.1],[[6,94],[7,6],6.06],[[63,69],[65,31],63.62]];var ex=pick(examples);var A1=ex[0][0],pc1=ex[0][1],A2=ex[1][0],pc2=ex[1][1],Ar=ex[2];return{question:'Isotope '+A1+' ('+pc1+'%) and isotope '+A2+' ('+pc2+'%). Find Ar.',hints:['Ar = (A1\u00d7pc1 + A2\u00d7pc2)/100'],ans:Ar,tol:0.05,unit:'',working:'Ar = ('+A1+'\u00d7'+pc1+' + '+A2+'\u00d7'+pc2+')/100 = '+Ar};})},
]},
{ey:'Q9 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Separating Mixtures',su:'Choose appropriate separation technique for different mixtures.',steps:[
  {lb:'Techniques',dr:dQ9,ht:'<p><b>Filtration:</b> insoluble solid from liquid. <b>Crystallisation:</b> soluble solid from solution. <b>Distillation:</b> liquid from solution (different bp). <b>Fractional distillation:</b> liquids with different bp. <b>Chromatography:</b> dissolved substances by solubility.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var qs=[{q:'Separating sand from water.',a:1,w:'Sand is insoluble \u2192 filtration. Answer: 1.'},{q:'Separating salt from salt water.',a:2,w:'Salt is soluble \u2192 crystallisation (evaporate). Answer: 2.'},{q:'Obtaining pure water from salt water.',a:3,w:'Distillation collects the pure water vapour. Answer: 3.'},{q:'Separating ethanol from water.',a:4,w:'Different boiling points \u2192 fractional distillation. Answer: 4.'}];var qq=pick(qs);return{question:qq.q+' 1=filtration, 2=crystallisation, 3=distillation, 4=fractional distillation.',hints:['Match the technique to the separation needed'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q10 \u2022 Y10 Chemistry \u2022 Atoms',ti:'Mixed Atoms Questions',su:'Combined atomic structure, classification and isotope questions.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>Proton=+1 in nucleus. Neutron=0 in nucleus. Electron=\u22121 in shells. Z=protons, A=p+n, n=A\u2212Z. Isotopes: same Z, different A. Ar = weighted average.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['neutrons','config','classify']);if(type==='neutrons'){var Z=pick([6,8,11,17,20]),A=pick([12,16,23,35,40]);var n=A-Z;return{question:'Z=<b>'+Z+'</b>, A=<b>'+A+'</b>. How many neutrons?',hints:['Neutrons = A \u2212 Z'],ans:n,tol:0,unit:'',working:'Neutrons = '+A+'\u2212'+Z+' = '+n+'.'};};if(type==='config'){var Zs=[[6,'C'],[8,'O'],[11,'Na'],[17,'Cl']];var el=pick(Zs);var Z2=el[0];var outer=Z2<=2?Z2:Z2<=10?Z2-2:Z2<=18?Z2-10:Z2-18;return{question:'Outer shell electrons for <b>'+el[1]+'</b> (Z='+Z2+')?',hints:['Fill shells: 2, 8, 8'],ans:outer,tol:0,unit:'',working:el[1]+' (Z='+Z2+'): outer shell has '+outer+' electrons.'};};var qs=[['NaCl',2,'compound'],['Fe',1,'element'],['Air',3,'mixture'],['H\u2082O',2,'compound']];var q=pick(qs);return{question:'Classify <b>'+q[0]+'</b>. 1=element, 2=compound, 3=mixture.',hints:['Element: one atom type. Compound: chemically bonded. Mixture: not bonded.'],ans:q[1],tol:0,unit:'',working:q[0]+' is a <b>'+q[2]+'</b>. Answer: '+q[1]+'.'};})}
]},
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
