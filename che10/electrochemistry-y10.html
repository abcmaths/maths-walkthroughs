<style>
:root{--red:#6A1B9A;--dark:#4a148c;--cream:#F3E5F5;--ink:#0d1b2a;--line:#E1BEE7;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F3E5F5);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F3E5F5';stroke=stroke||'#6A1B9A';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#6A1B9A')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#6A1B9A')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F3E5F5')+'" stroke="'+(stroke||'#6A1B9A')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electrolysis setup','#6A1B9A',13,'middle',true));
o.push(R(80,50,320,150,'#e3f2fd','#6A1B9A',2));
if(p>=1){o.push(R(110,30,40,110,'#ccc','#555',2));o.push(T(130,18,'cathode \u2212','#C0272D',9,'middle',false));
o.push(R(330,30,40,110,'#ccc','#555',2));o.push(T(350,18,'anode +','#2E7D32',9,'middle',false));}
if(p>=2){o.push(arw(140,60,140,96,'#C0272D',2));o.push(T(155,74,'cations','#C0272D',9,'start',false));
o.push(arw(350,96,350,60,'#2E7D32',2));o.push(T(365,78,'anions','#2E7D32',9,'start',false));}
if(p>=3){o.push(T(240,228,'Electrolyte: ions free to move (molten or dissolved)','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electrolysis of molten NaCl','#6A1B9A',13,'middle',true));
if(p>=1){o.push(R(10,44,460,54,'#fde8e8','#C0272D',1.5));o.push(T(240,58,'CATHODE (\u2212): Na\u207a + e\u207b \u2192 Na','#C0272D',11,'middle',true));o.push(T(240,80,'reduction (gain electrons)','#555',9,'middle',false));}
if(p>=2){o.push(R(10,112,460,54,'#e8f5e9','#2E7D32',1.5));o.push(T(240,126,'ANODE (+): 2Cl\u207b \u2192 Cl\u2082 + 2e\u207b','#2E7D32',11,'middle',true));o.push(T(240,148,'oxidation (lose electrons)','#555',9,'middle',false));}
if(p>=3){o.push(R(10,182,460,52,'#f3e5f5','#6A1B9A',1));o.push(T(240,202,'OIL RIG: Oxidation Is Loss, Reduction Is Gain','#6A1B9A',11,'middle',true));o.push(T(240,222,'Cathode: reduction. Anode: oxidation.','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electrolysis of copper sulfate (aqueous)','#6A1B9A',12,'middle',true));
if(p>=1){o.push(R(10,44,460,54,'#fde8e8','#C0272D',1.5));o.push(T(240,58,'CATHODE: Cu\u00b2\u207a + 2e\u207b \u2192 Cu (deposit copper)','#C0272D',11,'middle',true));}
if(p>=2){o.push(R(10,112,460,54,'#e8f5e9','#2E7D32',1.5));o.push(T(240,126,'ANODE (inert): 2H\u2082O \u2192 O\u2082 + 4H\u207a + 4e\u207b','#2E7D32',11,'middle',true));}
if(p>=3){o.push(R(10,180,460,54,'#f3e5f5','#6A1B9A',1));o.push(T(240,194,'Copper anode: Cu \u2192 Cu\u00b2\u207a + 2e\u207b (dissolves)','#6A1B9A',11,'middle',true));o.push(T(240,214,'Used in electroplating and copper purification','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electroplating','#6A1B9A',13,'middle',true));
o.push(R(80,50,320,150,'#e3f2fd','#6A1B9A',2));
if(p>=1){o.push(R(230,30,40,130,'#b87333','#7a4a1e',3));o.push(T(250,18,'anode: copper','#b87333',9,'middle',false));}
if(p>=2){o.push(R(138,60,70,90,'#aaa','#555',2));o.push(T(173,18,'object to plate\n(cathode)','#555',9,'middle',false));}
if(p>=3){o.push(arw(230,110,208,110,'#C8922A',2));o.push(T(218,102,'Cu\u00b2\u207a','#C8922A',8,'middle',false));
o.push(T(240,238,'Object gains copper layer; anode dissolves to maintain Cu\u00b2\u207a level','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Selective discharge in aqueous solutions','#6A1B9A',12,'middle',true));
if(p>=1){o.push(R(10,40,460,60,'#f3e5f5','#6A1B9A',1));o.push(T(240,60,'Cathode: cation highest in reactivity series discharged last','#333',10,'middle',false));o.push(T(240,78,'H\u207a < Cu\u00b2\u207a: so Cu deposits (not H\u2082 gas)','#6A1B9A',10,'middle',false));}
if(p>=2){o.push(R(10,110,460,60,'#f3e5f5','#6A1B9A',1));o.push(T(240,130,'If metal above H: H\u2082 gas at cathode (dilute solution)','#333',10,'middle',false));o.push(T(240,148,'Na\u207a + e\u207b \u2192 no; H\u207a + e\u207b \u2192 \u00bdH\u2082 \u2713','#C0272D',10,'middle',false));}
if(p>=3){o.push(R(10,182,460,60,'#e8f5e9','#2E7D32',1));o.push(T(240,202,'Anode (conc. Cl\u207b): Cl\u2082 gas produced','#2E7D32',10,'middle',false));o.push(T(240,220,'Anode (dilute/not Cl\u207b): O\u2082 gas produced','#333',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ5(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electrochemistry summary','#6A1B9A',13,'middle',true));
[['Cathode','negative electrode; reduction (gain e\u207b)'],['Anode','positive electrode; oxidation (lose e\u207b)'],['OIL RIG','Oxidation Is Loss, Reduction Is Gain'],['Electrolyte','ionic solution or molten compound'],['Electroplating','object is cathode; plating metal is anode'],['Discharge order','least reactive cation discharged first']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#f3e5f5','#E1BEE7',1));o.push(T(110,55+i*33,r[0],'#6A1B9A',10,'middle',true));o.push(T(335,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Electrolysis Basics',su:'Define electrolysis and name the electrodes and their roles.',steps:[
  {lb:'What is electrolysis?',dr:dQ1,ht:'<p><b>Electrolysis</b> is the decomposition of an electrolyte using an electric current. The electrolyte must be <b>molten</b> or <b>dissolved in water</b> (ions must be free to move).</p>'},
  {lb:'Electrodes',dr:dQ1,ht:'<p><b>Cathode (\u2212)</b>: positive ions (cations) are attracted here and gain electrons (\u2192 reduction).<br><b>Anode (+)</b>: negative ions (anions) are attracted here and lose electrons (\u2192 oxidation).</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Which electrode do cations move towards?',a:1,w:'Cations (+) move to cathode (\u2212). Answer: 1.'},{q:'Which electrode is the negative electrode?',a:1,w:'Cathode is negative. Answer: 1.'},{q:'Where does oxidation occur?',a:2,w:'Oxidation (loss of e\u207b) occurs at the anode (+). Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=cathode, 2=anode.',hints:['Cathode: \u2212, attracts cations. Anode: +, attracts anions.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Electrolysis of Molten NaCl',su:'Predict and write half-equations for molten NaCl electrolysis.',steps:[
  {lb:'Half-equations',dr:dQ2,ht:'<p>Cathode: Na\u207a + e\u207b \u2192 Na (reduction). Anode: 2Cl\u207b \u2192 Cl\u2082 + 2e\u207b (oxidation).</p><p>OIL RIG: Oxidation Is Loss (of electrons), Reduction Is Gain (of electrons).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'At the cathode during NaCl electrolysis, what is produced?',a:1,w:'Na\u207a + e\u207b \u2192 Na. Sodium metal. Answer: 1.'},{q:'At the anode during NaCl electrolysis, what is produced?',a:2,w:'2Cl\u207b \u2192 Cl\u2082 + 2e\u207b. Chlorine gas. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=sodium metal, 2=chlorine gas, 3=hydrogen gas.',hints:['Cathode: reduction. Anode: oxidation.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Electrolysis of Aqueous Solutions',su:'Predict products at each electrode for aqueous solutions.',steps:[
  {lb:'Aqueous solutions',dr:dQ3,ht:'<p>In aqueous solution, both the dissolved ions AND water molecules are present. The product depends on the relative reactivity (discharge order).</p>'},
  {lb:'CuSO\u2084 solution',dr:dQ3,ht:'<p>Cu\u00b2\u207a is less reactive than H\u207a: Cu deposits at cathode. With inert anode: O\u2082 produced. With copper anode: copper dissolves (Cu \u2192 Cu\u00b2\u207a + 2e\u207b).</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Electrolysis of CuSO\u2084(aq) with inert electrodes. Cathode product?',a:1,w:'Cu\u00b2\u207a is less reactive than H\u207a \u2192 copper deposits. Answer: 1.'},{q:'Electrolysis of dilute H\u2082SO\u2084(aq). Cathode product?',a:2,w:'H\u207a + e\u207b \u2192 \u00bdH\u2082. Hydrogen gas at cathode. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=copper, 2=hydrogen gas, 3=oxygen gas.',hints:['Less reactive metal deposits at cathode; H\u2082 if metal more reactive than H'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Electroplating',su:'Describe how electroplating works and its uses.',steps:[
  {lb:'Electroplating',dr:dQ4,ht:'<p>Electroplating coats an object with a thin layer of metal using electrolysis.</p><p>Setup: object = cathode; plating metal = anode; solution of plating metal salt = electrolyte.</p>'},
  {lb:'Uses',dr:dQ4,ht:'<p>Preventing corrosion (chromium plating cars), decoration (silver plating cutlery), improving conductivity (gold plating contacts), reducing cost (cheaper base metal with expensive coating).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){return{question:'In electroplating, the object to be plated is connected to: 1=cathode (-), 2=anode (+).',hints:['Object gains metal (cations are reduced there)'],ans:1,tol:0,unit:'',working:'Object is cathode. Metal ions are reduced (gain e\u207b) onto the surface. Answer: 1.'};})},
]},
{ey:'Q5 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Selective Discharge',su:'Predict which ion is discharged preferentially using reactivity.',steps:[
  {lb:'Cathode: least reactive cation wins',dr:dQ5,ht:'<p>When multiple cations are present, the <b>least reactive</b> is discharged first at the cathode (gains electrons more readily). Cu\u00b2\u207a is less reactive than H\u207a, so Cu deposits from CuSO\u2084.</p>'},
  {lb:'Anode: Cl\u207b vs OH\u207b',dr:dQ5,ht:'<p>At anode: Cl\u207b is preferentially discharged if concentration is high (Cl\u2082 gas). Otherwise OH\u207b is discharged (O\u2082 gas). Dilute HCl or Na\u2082SO\u2084 \u2192 O\u2082.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Electrolysis of concentrated NaCl(aq). Anode product?',a:2,w:'High [Cl\u207b] \u2192 Cl\u2082 at anode. Answer: 2.'},{q:'Electrolysis of dilute NaCl(aq) (inert electrodes). Cathode product?',a:1,w:'Na is more reactive than H, so H\u2082 at cathode. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+' 1=H\u2082, 2=Cl\u2082, 3=O\u2082, 4=Na.',hints:['Cathode: least reactive ion. Anode: Cl\u207b (conc) or O\u2082 (dilute).'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Half-Equations',su:'Write and balance half-equations for electrode reactions.',steps:[
  {lb:'Writing half-equations',dr:dQ6,ht:'<p>Cathode (reduction): add electrons to left side. Anode (oxidation): add electrons to right side. Balance atoms then charge.</p><p>Cu\u00b2\u207a + 2e\u207b \u2192 Cu (cathode). 2Cl\u207b \u2192 Cl\u2082 + 2e\u207b (anode).</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Half-equation at cathode: Cu\u00b2\u207a + ? e\u207b \u2192 Cu. How many electrons?',a:2,w:'Cu\u00b2\u207a + 2e\u207b \u2192 Cu. Two electrons. Answer: 2.'},{q:'Half-equation at anode: Al \u2192 Al\u00b3\u207a + ? e\u207b. How many electrons?',a:3,w:'Al \u2192 Al\u00b3\u207a + 3e\u207b. Three electrons. Answer: 3.'}];var qq=pick(qs);return{question:qq.q,hints:['Balance charge using electron count'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Industrial Electrolysis',su:'Describe the extraction of aluminium and chlorine by electrolysis.',steps:[
  {lb:'Aluminium extraction',dr:dQ7,ht:'<p>Aluminium is extracted from molten Al\u2082O\u2083 (bauxite) dissolved in cryolite (to lower mp). Cathode: Al\u00b3\u207a + 3e\u207b \u2192 Al. Anode: 2O\u00b2\u207b \u2192 O\u2082 + 4e\u207b. Carbon anode burns away in O\u2082.</p>'},
  {lb:'Chlor-alkali industry',dr:dQ7,ht:'<p>Electrolysis of brine (NaCl solution): cathode \u2192 H\u2082; anode \u2192 Cl\u2082; solution becomes NaOH (sodium hydroxide). Three useful products from one process.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'In aluminium extraction, what is produced at the cathode?',a:1,w:'Al\u00b3\u207a + 3e\u207b \u2192 Al. Aluminium metal. Answer: 1.'},{q:'In the chlor-alkali process, what gas forms at the cathode?',a:2,w:'2H\u207a + 2e\u207b \u2192 H\u2082. Hydrogen gas. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=aluminium metal, 2=hydrogen gas, 3=chlorine gas.',hints:['Cathode: reduction. Al\u00b3\u207a or H\u207a gains electrons.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Faraday\u2019s Laws (Qualitative)',su:'Explain how current and time affect the amount of product.',steps:[
  {lb:'Faraday and moles of product',dr:dQ8,ht:'<p>More current or longer time \u2192 more charge \u2192 more product. The amount of product is proportional to the charge (Q = I \u00d7 t) passed.</p><p>Charge of 1 mole of electrons = 1 faraday = 96 500 C.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var I=rnd(1,4),t=rnd(60,600),Q=I*t;return{question:'Current <b>'+I+' A</b> for <b>'+t+' s</b>. Find total charge (Q = I\u00d7t).',hints:['Q = I \u00d7 t (coulombs)'],ans:Q,tol:0.5,unit:'C',working:'Q = '+I+'\u00d7'+t+' = '+Q+' C'};})},
]},
{ey:'Q9 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'OIL RIG Summary',su:'Apply OIL RIG (Oxidation Is Loss, Reduction Is Gain) to electrochemistry.',steps:[
  {lb:'OIL RIG',dr:dQ9,ht:'<p><b>OIL RIG</b>: Oxidation Is Loss (of electrons) \u2014 happens at anode. Reduction Is Gain (of electrons) \u2014 happens at cathode.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var qs=[{q:'Zn \u2192 Zn\u00b2\u207a + 2e\u207b. This is: 1=oxidation, 2=reduction.',a:1,w:'Loss of electrons = oxidation. Answer: 1.'},{q:'Fe\u00b3\u207a + e\u207b \u2192 Fe\u00b2\u207a. This is: 1=oxidation, 2=reduction.',a:2,w:'Gain of electrons = reduction. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['OIL RIG: Oxidation Is Loss, Reduction Is Gain'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q10 \u2022 Y10 Chemistry \u2022 Electrolysis',ti:'Mixed Electrochemistry',su:'Combined electrolysis questions on electrodes, products and half-equations.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>Cathode (\u2212): reduction, cations discharged. Anode (+): oxidation, anions discharged. OIL RIG. Products depend on solution concentration and reactivity order.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['electrode','discharge','charge']);if(type==='electrode'){var qs=[{q:'Where does reduction occur?',a:1,w:'Cathode: reduction. Answer: 1.'},{q:'Where do anions go during electrolysis?',a:2,w:'Anions go to anode (+). Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=cathode, 2=anode.',hints:['Cathode: \u2212, reduction. Anode: +, oxidation.'],ans:qq.a,tol:0,unit:'',working:qq.w};}if(type==='discharge'){return{question:'Electrolysis of CuSO\u2084(aq). What forms at the cathode? 1=Cu, 2=H\u2082, 3=O\u2082.',hints:['Cu\u00b2\u207a less reactive than H\u207a'],ans:1,tol:0,unit:'',working:'Cu\u00b2\u207a discharged preferentially. Answer: 1.'};};var I=rnd(2,5),t=rnd(60,300);return{question:'I=<b>'+I+' A</b>, t=<b>'+t+' s</b>. Find charge Q.',hints:['Q = I \u00d7 t'],ans:I*t,tol:0.5,unit:'C',working:'Q = '+I+'\u00d7'+t+' = '+(I*t)+' C'};})}
]},
];
