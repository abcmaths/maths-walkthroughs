<style>
:root{--red:#6A1B9A;--dark:#4a148c;--cream:#F3E5F5;--ink:#0d1b2a;--line:#E1BEE7;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F3E5F5);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F3E5F5';stroke=stroke||'#6A1B9A';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#6A1B9A')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#6A1B9A')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F3E5F5')+'" stroke="'+(stroke||'#6A1B9A')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Moles and Avogadro\u2019s number','#6A1B9A',13,'middle',true));
o.push(R(40,40,400,60,'#f3e5f5','#6A1B9A',2));o.push(T(240,64,'1 mole = 6.02 \u00d7 10\u00b2\u00b3 particles','#0d47a1',14,'middle',true));
if(p>=1){o.push(R(40,116,180,60,'#f3e5f5','#E1BEE7',1));o.push(T(130,146,'n = m / M','#6A1B9A',14,'middle',true));o.push(T(130,168,'moles = mass / Mr','#555',9,'middle',false));}
if(p>=2){o.push(R(258,116,180,60,'#f3e5f5','#E1BEE7',1));o.push(T(348,146,'Mr(H\u2082O) = 18','#6A1B9A',12,'middle',true));o.push(T(348,168,'36 g \u00f7 18 = 2 mol','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Balancing equations','#6A1B9A',13,'middle',true));
if(p>=1){o.push(R(10,44,460,42,'#f3e5f5','#6A1B9A',1));o.push(T(240,58,'Unbalanced:  H\u2082 + O\u2082 \u2192 H\u2082O','#333',11,'middle',false));o.push(T(240,76,'   O: 2 on left, 1 on right \u2718','#C0272D',9,'middle',false));}
if(p>=2){o.push(R(10,100,460,42,'#e8f5e9','#2E7D32',1));o.push(T(240,116,'Balanced:  2H\u2082 + O\u2082 \u2192 2H\u2082O','#2E7D32',13,'middle',true));o.push(T(240,134,'   H: 4=4 \u2713 O: 2=2 \u2713','#2E7D32',9,'middle',false));}
if(p>=3){o.push(T(240,180,'Molar ratio: 2 mol H\u2082 : 1 mol O\u2082 : 2 mol H\u2082O','#555',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Mole calculations: n = m/Mr','#6A1B9A',13,'middle',true));
o.push(R(40,40,400,72,'#f3e5f5','#6A1B9A',2));
[['n','moles','mol','#6A1B9A',100],['m','mass','g','#C0272D',240],['Mr','molar mass','g/mol','#2E7D32',390]].forEach(function(r){o.push(T(r[4],64,r[0],r[3],16,'middle',true));o.push(T(r[4],86,r[2],'#555',8,'middle',false));});
if(p>=1){o.push(T(240,132,'n = m / Mr','#6A1B9A',14,'middle',true));o.push(T(240,154,'m = n \u00d7 Mr','#333',11,'middle',false));o.push(T(240,172,'Mr = m / n','#333',11,'middle',false));}
if(p>=2){o.push(R(40,192,400,52,'#fff','#ccc',1));o.push(T(240,210,'Mr(NaCl) = 23+35.5 = 58.5','#333',11,'middle',false));o.push(T(240,232,'n = 117/58.5 = 2 mol','#6A1B9A',12,'middle',true));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Gas molar volume: 24 dm\u00b3 per mole (RTP)','#6A1B9A',12,'middle',true));
o.push(R(40,40,400,60,'#f3e5f5','#6A1B9A',2));o.push(T(240,65,'At RTP: 1 mole of any gas = 24 dm\u00b3','#333',12,'middle',false));
if(p>=1){o.push(R(40,114,180,52,'#f3e5f5','#E1BEE7',1));o.push(T(130,138,'n = V / 24','#6A1B9A',13,'middle',true));o.push(T(130,158,'V in dm\u00b3','#555',9,'middle',false));}
if(p>=2){o.push(R(258,114,180,52,'#f3e5f5','#E1BEE7',1));o.push(T(348,138,'V = n \u00d7 24','#6A1B9A',13,'middle',true));o.push(T(348,158,'V in dm\u00b3','#555',9,'middle',false));}
if(p>=3){o.push(R(40,180,400,50,'#fff','#ccc',1));o.push(T(240,198,'2 mol CO\u2082 at RTP:','#333',10,'middle',false));o.push(T(240,218,'V = 2 \u00d7 24 = 48 dm\u00b3','#6A1B9A',12,'middle',true));}
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Limiting reagent and % yield','#6A1B9A',12,'middle',true));
if(p>=1){o.push(R(10,40,460,60,'#f3e5f5','#6A1B9A',1));o.push(T(240,60,'Limiting reagent: runs out first \u2192 stops reaction','#333',11,'middle',false));o.push(T(240,80,'Excess reagent: some left over','#555',9,'middle',false));}
if(p>=2){o.push(R(10,114,460,60,'#f3e5f5','#6A1B9A',1));o.push(T(240,134,'% yield = actual yield / theoretical yield \u00d7 100','#6A1B9A',11,'middle',true));o.push(T(240,152,'< 100%: product lost in transfer, side reactions etc.','#555',9,'middle',false));}
if(p>=3){o.push(R(10,188,460,52,'#fff','#ccc',1));o.push(T(240,208,'Theoretical: 5.0 g. Actual: 3.5 g.','#333',10,'middle',false));o.push(T(240,228,'% yield = 3.5/5.0 \u00d7 100 = 70%','#6A1B9A',12,'middle',true));}
s.innerHTML=o.join('');}
function dQ6(p){dQ3(p);}
function dQ7(p){dQ4(p);}
function dQ8(p){dQ5(p);}
function dQ9(p){dQ2(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Stoichiometry summary','#6A1B9A',13,'middle',true));
[['n = m/Mr','moles from mass and molar mass'],['Mr','sum of Ar of all atoms in formula'],['Gas at RTP','1 mol = 24 dm\u00b3'],['% yield','actual/theoretical \u00d7 100'],['Avogadro','6.02\u00d710\u00b2\u00b3 particles per mole']].forEach(function(r,i){if(i<p+1){o.push(R(10,44+i*38,460,30,'#f3e5f5','#E1BEE7',1));o.push(T(120,63+i*38,r[0],'#6A1B9A',11,'middle',true));o.push(T(345,63+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Moles and Avogadro',su:'Use n = m/Mr to calculate moles from mass.',steps:[
  {lb:'The mole',dr:dQ1,ht:'<p>One mole of any substance contains <b>6.02 \u00d7 10\u00b2\u00b3</b> particles (Avogadro\u2019s number). The molar mass (Mr) in g/mol is numerically equal to the relative formula mass.</p><div class="fm">n = m / Mr</div>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var type=pick(['n','m','Mr']);var M=pick([18,44,58.5,40,28,32]);var n=rnd(1,5),m=n*M;if(type==='n')return{question:'m = <b>'+m+' g</b>, Mr = <b>'+M+'</b>. Find moles.',hints:['n = m/Mr'],ans:n,tol:0.01,unit:'mol',working:'n = '+m+'/'+M+' = '+n+' mol'};if(type==='m'){var n2=rnd(1,4),m2=n2*M;return{question:'n = <b>'+n2+' mol</b>, Mr = <b>'+M+'</b>. Find mass.',hints:['m = n \u00d7 Mr'],ans:m2,tol:0.1,unit:'g',working:'m = '+n2+'\u00d7'+M+' = '+m2+' g'};}var m3=rnd(2,10)*M,M2=parseFloat((m3/(rnd(1,5))).toFixed(1));return{question:'n = 2 mol, m = <b>'+(2*M)+' g</b>. Find Mr.',hints:['Mr = m/n'],ans:M,tol:0.1,unit:'g/mol',working:'Mr = '+(2*M)+'/2 = '+M+' g/mol'};})}
]},
{ey:'Q2 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Balancing Equations',su:'Balance chemical equations and identify molar ratios.',steps:[
  {lb:'Why balance?',dr:dQ2,ht:'<p>Atoms are neither created nor destroyed in a chemical reaction. The number of each type of atom must be the same on both sides.</p>'},
  {lb:'Method',dr:dQ2,ht:'<p>Adjust coefficients (not subscripts). Check each element in turn. Molar ratio from coefficients tells you how many moles react together.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'2H\u2082 + O\u2082 \u2192 2H\u2082O. How many moles of O\u2082 react with 4 moles of H\u2082?',a:2,w:'Ratio 2:1 so 4 mol H\u2082 needs 2 mol O\u2082. Answer: 2.'},{q:'N\u2082 + 3H\u2082 \u2192 2NH\u2083. Moles of NH\u2083 from 6 mol H\u2082?',a:4,w:'Ratio H\u2082:NH\u2083 = 3:2. 6 mol H\u2082 \u2192 4 mol NH\u2083. Answer: 4.'}];var qq=pick(qs);return{question:qq.q,hints:['Use the molar ratio from coefficients'],ans:qq.a,tol:0,unit:'mol',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Mole Calculations',su:'Calculate n = m/Mr, m = nMr, and find Mr from formula.',steps:[
  {lb:'n = m/Mr',dr:dQ3,ht:'<p>Find Mr by adding Ar of all atoms: Mr(H\u2082O) = 2(1)+16 = 18. Mr(NaCl) = 23+35.5 = 58.5. Then n = m/Mr.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var subs=[['H\u2082O',18],['CO\u2082',44],['NaCl',58.5],['CaCO\u2083',100],['NaOH',40]];var sub=pick(subs);var n=rnd(1,5),m=parseFloat((n*sub[1]).toFixed(1));var type=pick(['n','m']);if(type==='n')return{question:'Mass = <b>'+m+' g</b> of <b>'+sub[0]+'</b> (Mr='+sub[1]+'). Find moles.',hints:['n = m/Mr'],ans:n,tol:0.01,unit:'mol',working:'n = '+m+'/'+sub[1]+' = '+n+' mol'};return{question:'n = <b>'+n+' mol</b> of <b>'+sub[0]+'</b> (Mr='+sub[1]+'). Find mass.',hints:['m = n\u00d7Mr'],ans:m,tol:0.1,unit:'g',working:'m = '+n+'\u00d7'+sub[1]+' = '+m+' g'};})}
]},
{ey:'Q4 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Gas Molar Volume',su:'Use 1 mole = 24 dm\u00b3 at RTP to calculate volumes and moles of gases.',steps:[
  {lb:'At RTP (25\u00b0C, 1 atm)',dr:dQ4,ht:'<p>At RTP, 1 mole of any gas occupies <b>24 dm\u00b3</b> (= 24 000 cm\u00b3).</p><div class="fm">n = V \u00f7 24 &nbsp;&nbsp;&nbsp; V = n \u00d7 24</div>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var type=pick(['n_from_V','V_from_n']);var n=rnd(1,6);var V=n*24;if(type==='n_from_V')return{question:'Volume of gas at RTP: <b>'+V+' dm\u00b3</b>. Find moles.',hints:['n = V \u00f7 24'],ans:n,tol:0.01,unit:'mol',working:'n = '+V+'/24 = '+n+' mol'};return{question:'n = <b>'+n+' mol</b> of gas at RTP. Find volume.',hints:['V = n \u00d7 24'],ans:V,tol:0.1,unit:'dm\u00b3',working:'V = '+n+'\u00d724 = '+V+' dm\u00b3'};})}
]},
{ey:'Q5 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Percentage Yield',su:'Calculate % yield = (actual/theoretical) \u00d7 100.',steps:[
  {lb:'Yield',dr:dQ5,ht:'<p>In practice, less product is obtained than theory predicts due to: incomplete reactions, side reactions, losses during transfer, reversible equilibria.</p><div class="fm">% yield = actual yield / theoretical yield \u00d7 100</div>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var theor=rnd(4,20)*0.5,pct=rnd(50,95),actual=parseFloat((theor*pct/100).toFixed(2));var type=pick(['pct','actual','theor']);if(type==='pct')return{question:'Theoretical = <b>'+theor+' g</b>, actual = <b>'+actual+' g</b>. Find % yield.',hints:['% yield = actual/theoretical \u00d7 100'],ans:pct,tol:1,unit:'%',working:actual+'/'+theor+'\u00d7100 = '+pct+'%'};if(type==='actual'){var pct2=rnd(50,90),theor2=rnd(4,20)*0.5,actual2=parseFloat((theor2*pct2/100).toFixed(2));return{question:'Theoretical = <b>'+theor2+' g</b>, % yield = <b>'+pct2+'%</b>. Find actual yield.',hints:['actual = theoretical \u00d7 pct/100'],ans:actual2,tol:0.05,unit:'g',working:theor2+'\u00d7'+pct2+'/100 = '+actual2+' g'};}var pct3=rnd(50,90),actual3=rnd(2,10)*0.5,theor3=parseFloat((actual3*100/pct3).toFixed(2));return{question:'Actual = <b>'+actual3+' g</b>, % yield = <b>'+pct3+'%</b>. Find theoretical yield.',hints:['theoretical = actual \u00d7 100 / pct'],ans:theor3,tol:0.1,unit:'g',working:'theoretical = '+actual3+'\u00d7100/'+pct3+' = '+theor3+' g'};})}
]},
{ey:'Q6 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Reacting Masses',su:'Use mole ratios from balanced equations to find reacting masses.',steps:[
  {lb:'Method',dr:dQ6,ht:'<p>1. Write balanced equation. 2. Find Mr of substances. 3. Find moles. 4. Use mole ratio. 5. Convert back to mass.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var type=pick(['simple','ratio']);if(type==='simple'){var M=pick([18,44,58.5,40]);var n=rnd(1,4),m=n*M;return{question:'Mr = <b>'+M+' g/mol</b>, n = <b>'+n+' mol</b>. Find mass.',hints:['m = n \u00d7 Mr'],ans:m,tol:0.1,unit:'g',working:'m = '+n+'\u00d7'+M+' = '+m+' g'};}var coeff1=rnd(1,3),coeff2=coeff1*rnd(1,2),n1=rnd(1,4),n2=parseFloat((n1*coeff2/coeff1).toFixed(1));return{question:'Equation has ratio '+coeff1+':'+coeff2+'. You have <b>'+n1+' mol</b> of reactant. Find moles of product.',hints:['moles product = moles reactant \u00d7 (coeff2/coeff1)'],ans:n2,tol:0.05,unit:'mol',working:'n\u2082 = '+n1+'\u00d7'+coeff2+'/'+coeff1+' = '+n2+' mol'};})}
]},
{ey:'Q7 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Percentage Composition',su:'Calculate percentage composition by mass.',steps:[
  {lb:'% composition',dr:dQ7,ht:'<p>% by mass of element = (total Ar of that element in formula / Mr of compound) \u00d7 100.</p><p>Example: % O in H\u2082O = 16/18 \u00d7 100 = 88.9%</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var subs=[['H\u2082O',16,18],['CO\u2082',32,44],['NaCl',35.5,58.5],['CaCO\u2083',48,100]];var sub=pick(subs);var pct=parseFloat((sub[1]/sub[2]*100).toFixed(1));return{question:'% O (or other non-metal) in <b>'+sub[0]+'</b> (Mr='+sub[2]+', mass of target='+sub[1]+')?',hints:['% = (part/total) \u00d7 100'],ans:pct,tol:0.2,unit:'%',working:sub[1]+'/'+sub[2]+'\u00d7100 = '+pct+'%'};})}
]},
{ey:'Q8 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Empirical Formula',su:'Find empirical formula from percentage composition or mass data.',steps:[
  {lb:'Method',dr:dQ8,ht:'<p>1. Divide % (or mass) by Ar to get mole ratio. 2. Divide by smallest. 3. If needed, multiply to give whole numbers.</p><p>Example: 40% Ca, 12% C, 48% O \u2192 40/40:12/12:48/16 = 1:1:3 \u2192 CaCO\u2083</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var combos=[{q:'H:O ratio 2:1 from mole data. Empirical formula has how many H per O?',a:2,w:'H\u2082O: 2 H per O. Answer: 2.'},{q:'Na:Cl ratio 1:1 from mole data. How many Na per Cl in empirical formula?',a:1,w:'NaCl: 1 Na per Cl. Answer: 1.'},{q:'Mg:O ratio 1:1 from mole data. How many Mg per O?',a:1,w:'MgO: 1 Mg per O. Answer: 1.'}];var qq=pick(combos);return{question:qq.q,hints:['Already given the mole ratio'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Concentration and Moles',su:'Use n = c \u00d7 v (mol = mol/dm\u00b3 \u00d7 dm\u00b3) for solutions.',steps:[
  {lb:'Concentration',dr:dQ9,ht:'<p>Concentration in mol/dm\u00b3:</p><div class="fm">n = c \u00d7 V &nbsp;&nbsp;&nbsp; c = n/V &nbsp;&nbsp;&nbsp; V = n/c</div><p>V in dm\u00b3. 1 dm\u00b3 = 1000 cm\u00b3. 250 cm\u00b3 = 0.25 dm\u00b3.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var type=pick(['n','c','V']);var c=rnd(1,5)*0.5,V=rnd(1,8)*0.25,n=parseFloat((c*V).toFixed(3));if(type==='n')return{question:'c = <b>'+c+' mol/dm\u00b3</b>, V = <b>'+V+' dm\u00b3</b>. Find moles.',hints:['n = c \u00d7 V'],ans:n,tol:0.01,unit:'mol',working:'n = '+c+'\u00d7'+V+' = '+n+' mol'};if(type==='c'){var n2=rnd(1,5)*0.25,V2=rnd(1,4)*0.5,c2=parseFloat((n2/V2).toFixed(2));return{question:'n = <b>'+n2+' mol</b>, V = <b>'+V2+' dm\u00b3</b>. Find concentration.',hints:['c = n/V'],ans:c2,tol:0.02,unit:'mol/dm\u00b3',working:'c = '+n2+'/'+V2+' = '+c2+' mol/dm\u00b3'};}var n3=rnd(1,5)*0.25,c3=rnd(1,4)*0.5,V3=parseFloat((n3/c3).toFixed(2));return{question:'n = <b>'+n3+' mol</b>, c = <b>'+c3+' mol/dm\u00b3</b>. Find volume.',hints:['V = n/c'],ans:V3,tol:0.02,unit:'dm\u00b3',working:'V = '+n3+'/'+c3+' = '+V3+' dm\u00b3'};})}
]},
{ey:'Q10 \u2022 Y10 Chemistry \u2022 Stoichiometry',ti:'Mixed Stoichiometry',su:'Combined mole calculations, yield and gas volume questions.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>n=m/Mr \u2022 m=nMr \u2022 Gas at RTP: V=n\u00d724 \u2022 % yield=actual/theoretical\u00d7100 \u2022 n=cV (concentration).</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['moles','gas','yield']);if(type==='moles'){var M=pick([18,44,40,58.5]);var n=rnd(1,5),m=n*M;return{question:'Mr=<b>'+M+'</b>, m=<b>'+m+' g</b>. Find moles.',hints:['n = m/Mr'],ans:n,tol:0.01,unit:'mol',working:'n = '+m+'/'+M+' = '+n+' mol'};}if(type==='gas'){var n2=rnd(1,5);return{question:'<b>'+n2+' mol</b> gas at RTP. Find volume.',hints:['V = n \u00d7 24'],ans:n2*24,tol:0.1,unit:'dm\u00b3',working:'V = '+n2+'\u00d724 = '+(n2*24)+' dm\u00b3'};}var theor=rnd(4,16)*0.5,pct=rnd(60,90),actual=parseFloat((theor*pct/100).toFixed(2));return{question:'Theoretical=<b>'+theor+' g</b>, actual=<b>'+actual+' g</b>. Find % yield.',hints:['% yield = actual/theoretical \u00d7 100'],ans:pct,tol:1,unit:'%',working:actual+'/'+theor+'\u00d7100 = '+pct+'%'};})}
]},
];
