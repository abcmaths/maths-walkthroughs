<style>
:root{--red:#6A1B9A;--dark:#4a148c;--cream:#F3E5F5;--ink:#0d1b2a;--line:#E1BEE7;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F3E5F5);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F3E5F5';stroke=stroke||'#6A1B9A';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#6A1B9A')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#6A1B9A')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F3E5F5')+'" stroke="'+(stroke||'#6A1B9A')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Ionic bonding: electron transfer','#6A1B9A',12,'middle',true));
o.push('<circle cx="130" cy="140" r="36" fill="#f3e5f5" stroke="#6A1B9A" stroke-width="2"/>');
o.push(T(130,144,'Na','#6A1B9A',14,'middle',true));
if(p>=1){o.push('<circle cx="158" cy="112" r="8" fill="#C8922A"/>');o.push(T(175,104,'e\u207b','#C8922A',9,'start',false));}
if(p>=2){o.push(arw(200,140,260,140,'#C0272D',2));o.push(T(230,130,'transfer','#C0272D',8,'middle',false));}
if(p>=3){o.push('<circle cx="340" cy="140" r="44" fill="#e8f5e9" stroke="#2E7D32" stroke-width="2"/>');o.push(T(340,144,'Cl','#2E7D32',14,'middle',true));}
if(p>=4){o.push(T(130,200,'Na\u207a (lost e\u207b)','#6A1B9A',9,'middle',false));o.push(T(340,200,'Cl\u207b (gained e\u207b)','#2E7D32',9,'middle',false));o.push(T(240,238,'Na\u207a + Cl\u207b \u2192 ionic bond: electrostatic attraction','#333',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Covalent bonding: electron sharing','#6A1B9A',12,'middle',true));
o.push('<circle cx="190" cy="140" r="44" fill="none" stroke="#6A1B9A" stroke-width="2" stroke-dasharray="5,3"/>');
o.push('<circle cx="290" cy="140" r="44" fill="none" stroke="#6A1B9A" stroke-width="2" stroke-dasharray="5,3"/>');
o.push(T(160,144,'H','#6A1B9A',14,'middle',false));o.push(T(320,144,'H','#6A1B9A',14,'middle',false));
if(p>=1){o.push('<circle cx="222" cy="130" r="8" fill="#C8922A"/>');o.push('<circle cx="258" cy="150" r="8" fill="#2E7D32"/>');o.push(T(240,188,'Shared pair = covalent bond','#555',9,'middle',false));}
if(p>=2){o.push(R(40,210,400,40,'#f3e5f5','#6A1B9A',1));o.push(T(240,232,'Both atoms gain a full outer shell','#333',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Metallic bonding','#6A1B9A',12,'middle',true));
var pts=[[100,80],[160,80],[220,80],[280,80],[340,80],[380,80],[100,130],[160,130],[220,130],[280,130],[340,130],[380,130],[100,180],[160,180],[220,180],[280,180],[340,180],[380,180]];
pts.forEach(function(pt){if(p>=1)o.push('<circle cx="'+pt[0]+'" cy="'+pt[1]+'" r="14" fill="#ce93d8" stroke="#6A1B9A" stroke-width="1.5"/>');});
if(p>=2){o.push(T(240,124,'<tspan fill="#6A1B9A">M\u207a</tspan>','#6A1B9A',9,'middle',false));
for(var i=0;i<8;i++){var ex=40+i*50,ey=90+Math.sin(i)*30;o.push('<circle cx="'+ex+'" cy="'+ey+'" r="4" fill="#C8922A"/>');}}
if(p>=3){o.push(T(240,238,'Positive ions in sea of delocalised electrons \u2192 conducts electricity','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Properties of ionic compounds','#6A1B9A',12,'middle',true));
[['High mp/bp','strong ionic lattice, much energy to break'],['Brittle','ion layers shift \u2192 like repel, shatters'],['Conduct when molten/dissolved','ions free to move and carry charge'],['Do NOT conduct when solid','ions fixed in lattice, cannot move']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*50,460,44,'#f3e5f5','#E1BEE7',1));o.push(T(140,68+i*50,r[0],'#6A1B9A',11,'middle',true));o.push(T(355,68+i*50,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Properties of covalent molecules','#6A1B9A',12,'middle',true));
[['Low mp/bp','weak intermolecular forces between molecules'],['Do not conduct electricity','no free ions or electrons'],['Often gases/liquids at room T','small molecules, weak forces'],['Bond itself is strong','covalent bond within molecule is strong']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*50,460,44,'#f3e5f5','#E1BEE7',1));o.push(T(140,68+i*50,r[0],'#6A1B9A',11,'middle',true));o.push(T(355,68+i*50,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ2(p);}
function dQ8(p){dQ3(p);}
function dQ9(p){dQ4(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Bonding summary','#6A1B9A',13,'middle',true));
[['Ionic','electron TRANSFER; high mp; conducts when molten'],['Covalent','electron SHARING; low mp; does not conduct'],['Metallic','ions + sea of e\u207b; conducts; malleable'],['Giant ionic','NaCl lattice, strong, brittle'],['Giant covalent','diamond, graphite, SiO\u2082, very high mp']].forEach(function(r,i){if(i<p+1){o.push(R(10,40+i*38,460,30,'#f3e5f5','#E1BEE7',1));o.push(T(80,59+i*38,r[0],'#6A1B9A',11,'middle',true));o.push(T(320,59+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Chemistry \u2022 Bonding',ti:'Ionic Bonding',su:'Describe ionic bonding as electron transfer forming oppositely charged ions.',steps:[
  {lb:'Electron transfer',dr:dQ1,ht:'<p>In ionic bonding, one atom <b>loses</b> electrons (becomes positive ion) and another <b>gains</b> those electrons (becomes negative ion). The opposite charges attract.</p>'},
  {lb:'NaCl example',dr:dQ1,ht:'<p>Na has 1 outer electron: loses it \u2192 Na\u207a. Cl has 7 outer electrons: gains 1 \u2192 Cl\u207b. Electrostatic attraction between Na\u207a and Cl\u207b = ionic bond.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'In ionic bonding, metal atoms lose electrons. They become:',a:1,w:'Metal loses e\u207b \u2192 positive ion. Answer: 1.'},{q:'In ionic bonding, non-metal atoms gain electrons. They become:',a:2,w:'Non-metal gains e\u207b \u2192 negative ion. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=positive ion, 2=negative ion.',hints:['Lose e\u207b = positive. Gain e\u207b = negative.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Chemistry \u2022 Bonding',ti:'Covalent Bonding',su:'Describe covalent bonding as electron sharing. Draw dot-and-cross diagrams.',steps:[
  {lb:'Electron sharing',dr:dQ2,ht:'<p>In covalent bonding, atoms <b>share</b> pairs of electrons. Each shared pair = one covalent bond. Both atoms achieve a full outer shell.</p>'},
  {lb:'Examples',dr:dQ2,ht:'<p>H\u2082: one shared pair (single bond). O\u2082: two shared pairs (double bond). N\u2082: three shared pairs (triple bond). H\u2082O: oxygen shares with two H atoms.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'How many covalent bonds does H\u2082 have?',a:1,w:'H\u2082: one shared pair = one single bond. Answer: 1.'},{q:'How many covalent bonds does O\u2082 have?',a:2,w:'O\u2082: two shared pairs = double bond. Answer: 2.'},{q:'How many covalent bonds does N\u2082 have?',a:3,w:'N\u2082: three shared pairs = triple bond. Answer: 3.'}];var qq=pick(qs);return{question:qq.q,hints:['Count the shared pairs of electrons'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Chemistry \u2022 Bonding',ti:'Metallic Bonding',su:'Describe metallic bonding as a lattice of positive ions in a sea of delocalised electrons.',steps:[
  {lb:'Metallic bonding',dr:dQ3,ht:'<p>Metal atoms release their outer electrons into a shared "sea" of <b>delocalised electrons</b>. This leaves a regular lattice of positive ions attracted to the electron sea.</p>'},
  {lb:'Properties explained',dr:dQ3,ht:'<p>Conducts electricity: free electrons carry charge. High mp: strong attraction. Malleable/ductile: layers of ions can slide (electrons maintain bonding). Shiny: delocalised electrons reflect light.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){return{question:'Why do metals conduct electricity? 1=free ions, 2=delocalised electrons, 3=free molecules.',hints:['Delocalised electrons move and carry charge'],ans:2,tol:0,unit:'',working:'Delocalised electrons are free to move and carry electrical charge. Answer: 2.'};})},
]},
{ey:'Q4 \u2022 Y10 Chemistry \u2022 Bonding',ti:'Properties of Ionic Compounds',su:'Explain properties of ionic compounds in terms of structure.',steps:[
  {lb:'Ionic properties',dr:dQ4,ht:'<p>Ionic compounds form a giant lattice of alternating + and \u2212 ions. This leads to: high melting point, brittleness, and electrical conduction only when molten or dissolved.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Does solid NaCl conduct electricity?',a:2,w:'Solid NaCl: ions fixed in lattice, cannot move \u2192 does not conduct. Answer: 2.'},{q:'Does molten NaCl conduct electricity?',a:1,w:'Molten NaCl: ions free to move \u2192 conducts electricity. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+' 1=yes, 2=no.',hints:['Ions must be free to move to conduct'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Chemistry \u2022 Bonding',ti:'Properties of Covalent Molecules',su:'Explain why simple covalent molecules have low melting points.',steps:[
  {lb:'Simple molecular substances',dr:dQ5,ht:'<p>Simple molecular substances (e.g. H\u2082O, CO\u2082, CH\u2084) have <b>low melting and boiling points</b> because the <b>intermolecular forces</b> between molecules are weak (even though covalent bonds within molecules are strong).</p>'},
  {lb:'Do they conduct?',dr:dQ5,ht:'<p>Simple covalent molecules do <b>not</b> conduct electricity because they have no free electrons or ions. Exception: some dissolve in water to form ions (e.g. HCl \u2192 H\u207a + Cl\u207b).</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Why does water have a relatively low boiling point for a compound?',a:1,w:'Weak intermolecular forces between water molecules \u2192 low energy needed. Answer: 1.'},{q:'Can pure water conduct electricity?',a:2,w:'Pure water has no free ions or electrons \u2192 does not conduct. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=weak intermolecular forces, 2=no (does not conduct).',hints:['Simple molecules: weak forces between them'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Chemistry \u2022 Bonding',ti:'Giant Covalent Structures',su:'Describe the structures of diamond, graphite and silicon dioxide.',steps:[
  {lb:'Giant covalent structures',dr:dQ6,ht:'<p>In giant covalent structures, atoms form millions of strong covalent bonds throughout. This gives very high melting points and hardness.</p><p>Examples: diamond (hard, no conduction), graphite (soft layers, conducts), SiO\u2082 (sand, very hard, high mp).</p>'},
  {lb:'Diamond vs graphite',dr:dQ6,ht:'<p><b>Diamond:</b> each C bonded to 4 others, tetrahedral. Very hard. No conduction (all electrons bonded).<br><b>Graphite:</b> each C bonded to 3 others in layers. Layers can slide (lubricant). Conducts (1 delocalised e\u207b per C).</p>'},
