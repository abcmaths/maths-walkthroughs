<style>
:root{--red:#6A1B9A;--dark:#4a148c;--cream:#F3E5F5;--ink:#0d1b2a;--line:#E1BEE7;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F3E5F5);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F3E5F5';stroke=stroke||'#6A1B9A';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#6A1B9A')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#6A1B9A')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F3E5F5')+'" stroke="'+(stroke||'#6A1B9A')+'" stroke-width="1.5"/>';}

[['Uncombined element','0 (always)'],['H in compounds','+1 (except metal hydrides: \u22121)'],['O in compounds','\u22122 (except peroxides: \u22121)'],['Sum in neutral compound','0'],['Sum in ion','= charge of ion']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*38,460,30,'#f3e5f5','#E1BEE7',1));o.push(T(175,61+i*38,r[0],'#6A1B9A',10,'middle',true));o.push(T(380,61+i*38,r[1],'#555',9,'middle',false));}});

var metals=[['K',10],['Ca',20],['Mg',30],['Al',40],['Zn',50],['Fe',60],['Cu',70],['Ag',80]];
metals.forEach(function(m,i){if(i<p+2){o.push(R(30,36+i*25,150,20,'#ce93d8','#6A1B9A',1));o.push(T(105,51+i*25,m[0],'#6A1B9A',10,'middle',true));var w=m[1]+30;o.push(R(188,36+i*25,w,20,'#f3e5f5','#6A1B9A',1));o.push(T(390,51+i*25,'more reactive\u2192','#555',8,'end',false));}});

[['OIL RIG','Oxidation Is Loss; Reduction Is Gain (of electrons)'],['Oxidation state','shows gain/loss of electrons'],['Oxidising agent','gains electrons (itself reduced)'],['Reducing agent','loses electrons (itself oxidised)'],['Displacement','more reactive metal displaces less reactive']].forEach(function(r,i){if(i<p+1){o.push(R(10,40+i*38,460,30,'#f3e5f5','#E1BEE7',1));o.push(T(130,59+i*38,r[0],'#6A1B9A',10,'middle',true));o.push(T(360,59+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Chemistry \u2022 Redox',ti:'OIL RIG',su:'Apply OIL RIG: Oxidation Is Loss, Reduction Is Gain of electrons.',steps:[
  {lb:'OIL RIG',dr:dQ1,ht:'<p><b>OIL RIG</b>: Oxidation Is Loss (of electrons). Reduction Is Gain (of electrons). In a redox reaction, both happen simultaneously \u2014 one species loses electrons, another gains them.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Zn \u2192 Zn\u00b2\u207a + 2e\u207b. This is: 1=oxidation, 2=reduction.',a:1,w:'Loss of electrons = oxidation. Answer: 1.'},{q:'Cl\u2082 + 2e\u207b \u2192 2Cl\u207b. This is: 1=oxidation, 2=reduction.',a:2,w:'Gain of electrons = reduction. Answer: 2.'},{q:'Fe\u00b3\u207a + e\u207b \u2192 Fe\u00b2\u207a. This is: 1=oxidation, 2=reduction.',a:2,w:'Gain of e\u207b = reduction. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['OIL: oxidation = loss. RIG: reduction = gain.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},

{ey:'Q6 \u2022 Y10 Chemistry \u2022 Redox',ti:'Changes in Oxidation State',su:'Use oxidation state changes to identify oxidation and reduction.',steps:[
  {lb:'Using oxidation states',dr:dQ6,ht:'<p>Oxidation = increase in oxidation state. Reduction = decrease in oxidation state. Find oxidation state before and after to identify what changed.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Fe goes from +2 to +3. Is this oxidation or reduction?',a:1,w:'Oxidation state increases \u2192 oxidation. Answer: 1.'},{q:'Cl goes from 0 to -1. Is this oxidation or reduction?',a:2,w:'Oxidation state decreases \u2192 reduction. Answer: 2.'},{q:'Mn goes from +7 to +2. Is this oxidation or reduction?',a:2,w:'Oxidation state decreases \u2192 reduction. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=oxidation, 2=reduction.',hints:['Increase in ox. state = oxidation. Decrease = reduction.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Chemistry \u2022 Redox',ti:'Rusting and Corrosion',su:'Describe and explain rusting as a redox process.',steps:[
  {lb:'Rusting',dr:dQ7,ht:'<p>Rusting is the oxidation of iron in the presence of both oxygen and water.</p><p>Fe \u2192 Fe\u00b2\u207a/Fe\u00b3\u207a (oxidation). Prevention: painting, galvanising (Zn coating), sacrificial anode, stainless steel.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Rusting requires: 1=oxygen only, 2=water only, 3=both oxygen and water.',a:3,w:'Both O\u2082 and H\u2082O needed for iron to rust. Answer: 3.'},{q:'Galvanising protects iron by: 1=painting with Zn, 2=coating with Zn (sacrificial), 3=adding salt.',a:2,w:'Zn coating sacrificially corrodes instead of Fe. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Rusting: Fe oxidised by O\u2082 in presence of water'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Chemistry \u2022 Redox',ti:'Redox in Industry',su:'Apply redox concepts to industrial processes.',steps:[
  {lb:'Industrial redox',dr:dQ8,ht:'<p>Blast furnace: Fe\u2082O\u2083 + 3CO \u2192 2Fe + 3CO\u2082 (iron ore reduced by CO). Electrolysis: Al extracted from molten Al\u2082O\u2083. Haber process: N\u2082 + 3H\u2082 \u2192 2NH\u2083 (nitrogen reduced).</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'In the blast furnace, Fe\u2082O\u2083 + 3CO \u2192 2Fe + 3CO\u2082. Is Fe\u2082O\u2083 oxidised or reduced?',a:2,w:'Fe goes from +3 to 0 (decrease) = reduction. Fe\u2082O\u2083 is reduced. Answer: 2.'},{q:'In the blast furnace, CO is the: 1=oxidising agent, 2=reducing agent.',a:2,w:'CO causes reduction of Fe\u2082O\u2083 (CO itself is oxidised to CO\u2082). CO is the reducing agent. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+(qq.a===1?' 1=oxidising, 2=reducing.':' 1=oxidised, 2=reduced.'),hints:['Oxidised: ox. state increases. Reduced: decreases.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Chemistry \u2022 Redox',ti:'Identifying Redox Reactions',su:'Distinguish redox from non-redox reactions.',steps:[
  {lb:'Is it redox?',dr:dQ9,ht:'<p>A reaction is a redox reaction if oxidation states change. A reaction is NOT redox if all oxidation states stay the same (e.g. acid-base neutralisation in many cases, simple dissolving).</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var qs=[{q:'NaOH + HCl \u2192 NaCl + H\u2082O. Is this redox? 1=yes, 2=no.',a:2,w:'Na=+1, O=-2, H=+1, Cl=-1 throughout. No change in oxidation state. Answer: 2.'},{q:'Zn + 2HCl \u2192 ZnCl\u2082 + H\u2082. Is this redox? 1=yes, 2=no.',a:1,w:'Zn: 0\u2192+2 (oxidised). H: +1\u21920 (reduced). Redox. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Check if any oxidation state changes'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q10 \u2022 Y10 Chemistry \u2022 Redox',ti:'Mixed Redox Questions',su:'OIL RIG, oxidation states, displacement and half-equations.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>OIL RIG \u2022 Oxidation state rules \u2022 Oxidising/reducing agents \u2022 Displacement = redox \u2022 Half-equations \u2022 Changes in ox. state.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['oilrig','oxstate','displacement']);if(type==='oilrig'){var qs=[{q:'Na \u2192 Na\u207a + e\u207b is: 1=oxidation, 2=reduction.',a:1,w:'Loss of e\u207b = oxidation. Answer: 1.'},{q:'O\u2082 + 4e\u207b \u2192 2O\u00b2\u207b is: 1=oxidation, 2=reduction.',a:2,w:'Gain of e\u207b = reduction. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['OIL: loss=oxidation; RIG: gain=reduction'],ans:qq.a,tol:0,unit:'',working:qq.w};}if(type==='oxstate'){var qs2=[{q:'Oxidation state of N in NO\u2083\u207b (O=-2)?',a:5,w:'3\u00d7(-2)+N=-1 \u2192 N=+5. Answer: 5.'},{q:'Oxidation state of Cr in Cr\u2082O\u2087\u00b2\u207b (O=-2)?',a:6,w:'7\u00d7(-2)+2Cr=-2 \u2192 2Cr=+12 \u2192 Cr=+6. Answer: 6.'}];var qq2=pick(qs2);return{question:qq2.q,hints:['Sum of ox. states = ion charge'],ans:qq2.a,tol:0,unit:'',working:qq2.w};}var pairs=[{a:'Cu',b:'AgNO\u2083',disp:1,w:'Cu more reactive than Ag \u2192 displaces. Answer: 1.'},{a:'Ag',b:'CuSO\u2084',disp:2,w:'Ag less reactive than Cu \u2192 no reaction. Answer: 2.'}];var p=pick(pairs);return{question:'Does <b>'+p.a+'</b> displace metal from <b>'+p.b+'</b>? 1=yes, 2=no.',hints:['More reactive metal displaces less reactive'],ans:p.disp,tol:0,unit:'',working:p.w};})}
]},
];
