<style>
:root{--red:#6A1B9A;--dark:#4a148c;--cream:#F3E5F5;--ink:#0d1b2a;--line:#E1BEE7;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F3E5F5);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F3E5F5';stroke=stroke||'#6A1B9A';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#6A1B9A')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#6A1B9A')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F3E5F5')+'" stroke="'+(stroke||'#6A1B9A')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Factors affecting rate','#6A1B9A',13,'middle',true));
[['Temperature','more collisions, more energy per collision'],['Concentration','more particles per volume \u2192 more collisions'],['Surface area','more exposed particles \u2192 more collisions'],['Catalyst','lower activation energy'],['Pressure (gases)','same as concentration for gases']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*38,460,30,'#f3e5f5','#E1BEE7',1));o.push(T(140,61+i*38,r[0],'#6A1B9A',11,'middle',true));o.push(T(370,61+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Collision theory','#6A1B9A',13,'middle',true));
if(p>=1){o.push(R(10,44,460,60,'#f3e5f5','#6A1B9A',1));o.push(T(240,64,'Reaction occurs only when particles collide with sufficient energy','#333',10,'middle',false));o.push(T(240,82,'(at least the activation energy, Ea)','#555',9,'middle',false));}
if(p>=2){o.push(R(10,120,460,60,'#e8f5e9','#2E7D32',1));o.push(T(240,140,'Rate = frequency of successful collisions','#2E7D32',11,'middle',true));o.push(T(240,158,'Increase temperature: MORE collisions with E \u2265 Ea','#555',9,'middle',false));}
if(p>=3){o.push(R(10,196,460,50,'#fde8e8','#C0272D',1));o.push(T(240,224,'Maxwell-Boltzmann: at higher T, peak shifts right','#C0272D',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Rate = change in amount \u00f7 time','#6A1B9A',13,'middle',true));
o.push(L(48,230,48,22,'#333',2));o.push(L(48,230,450,230,'#333',2));
o.push(T(254,248,'time (s)','#333',9,'middle',false));o.push(T(25,130,'volume gas','#333',9,'middle',false));
for(var t=0;t<150;t++){var v1=80*(1-Math.exp(-t/30)),v2=80*(1-Math.exp(-(t+1)/30));o.push(L(48+t*2.7,230-v1*2.5,48+(t+1)*2.7,230-v2*2.5,'#6A1B9A',2));}
if(p>=1){for(var t2=0;t2<150;t2++){var v3=80*(1-Math.exp(-t2/12)),v4=80*(1-Math.exp(-(t2+1)/12));o.push(L(48+t2*2.7,230-v3*2.5,48+(t2+1)*2.7,230-v4*2.5,'#C0272D',2));}
o.push(T(390,80,'Higher\n[acid]','#C0272D',8,'middle',false));o.push(T(390,120,'Lower\n[acid]','#6A1B9A',8,'middle',false));}
if(p>=2){o.push(T(240,232,'Same final volume; steeper curve = faster rate','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Effect of temperature on rate','#6A1B9A',13,'middle',true));
o.push(L(48,230,48,22,'#333',2));o.push(L(48,230,450,230,'#333',2));
o.push(T(254,248,'E (energy)','#333',9,'middle',false));
for(var e=0;e<150;e++){var y1=90*Math.sqrt(e/8)*Math.exp(-e/30),y2=90*Math.sqrt((e+1)/8)*Math.exp(-(e+1)/30);o.push(L(48+e*2.7,230-y1*3,48+(e+1)*2.7,230-y2*3,'#6A1B9A',1.5));}
if(p>=1){for(var e2=0;e2<150;e2++){var y3=75*Math.sqrt(e2/10)*Math.exp(-e2/42),y4=75*Math.sqrt((e2+1)/10)*Math.exp(-(e2+1)/42);o.push(L(48+e2*2.7,230-y3*3,48+(e2+1)*2.7,230-y4*3,'#C0272D',1.5));}
o.push(T(355,54,'Higher T','#C0272D',8,'middle',false));o.push(T(220,54,'Lower T','#6A1B9A',8,'middle',false));}
if(p>=2){o.push(L(330,230,330,22,'#E65100',1.5,'5,4'));o.push(T(338,30,'Ea','#E65100',9,'start',false));o.push(T(240,248,'More area right of Ea at higher T','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ5(p){dQ1(p);}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Rates of reaction summary','#6A1B9A',13,'middle',true));
[['Rate increases with','T, [conc], surface area, catalyst, pressure'],['Collision theory','need E \u2265 Ea for reaction'],['Measuring rate','volume of gas, mass loss, colour change'],['Catalyst','lowers Ea; unchanged at end'],['Rate expression','rate = k[A]^m[B]^n (Higher only)']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*38,460,30,'#f3e5f5','#E1BEE7',1));o.push(T(155,61+i*38,r[0],'#6A1B9A',10,'middle',true));o.push(T(370,61+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Chemistry \u2022 Rates',ti:'Factors Affecting Rate',su:'Explain how temperature, concentration, surface area and catalysts affect rate.',steps:[
  {lb:'Four key factors',dr:dQ1,ht:'<p>Reaction rate increases when: (1) temperature increases; (2) concentration (or pressure for gases) increases; (3) surface area increases (solid particles are smaller); (4) a catalyst is added.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Marble chips with dilute HCl: use powder instead of lumps. Rate: 1=increases, 2=decreases, 3=stays same.',a:1,w:'Powder has greater surface area \u2192 more collisions \u2192 faster rate. Answer: 1.'},{q:'Same reaction but temperature is halved. Rate: 1=increases, 2=decreases.',a:2,w:'Lower T \u2192 fewer particles with E\u2265Ea \u2192 slower rate. Answer: 2.'},{q:'Same reaction: add a catalyst. Rate: 1=increases, 2=decreases.',a:1,w:'Catalyst lowers Ea \u2192 more successful collisions \u2192 faster rate. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Think about collision frequency and energy'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Chemistry \u2022 Rates',ti:'Collision Theory',su:'Explain reaction rate using collision theory and activation energy.',steps:[
  {lb:'Collision theory',dr:dQ2,ht:'<p>For a reaction to occur, particles must <b>collide</b> with sufficient energy (at least the <b>activation energy, Ea</b>). Increasing factors that increase the frequency of successful collisions raises the rate.</p>'},
  {lb:'Temperature and Ea',dr:dQ2,ht:'<p>Higher temperature: more particles have energy \u2265 Ea. The Maxwell-Boltzmann distribution shifts right, so more successful collisions occur per second even if the total collision frequency changes little.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){return{question:'Why does increasing temperature increase rate? 1=more particles have E\u2265Ea, 2=Ea decreases, 3=particles become smaller.',hints:['Think about kinetic energy distribution'],ans:1,tol:0,unit:'',working:'Higher T \u2192 more particles with E\u2265Ea \u2192 more successful collisions. Answer: 1.'};})},
]},
{ey:'Q3 \u2022 Y10 Chemistry \u2022 Rates',ti:'Measuring Rate',su:'Calculate rate from graphs of volume of gas or mass vs time.',steps:[
  {lb:'Rate = change/time',dr:dQ3,ht:'<p>Rate can be measured by: volume of gas produced, mass lost (if gas escapes), colour change (colorimetry), disappearance of precipitate (cross method).</p><div class="fm">rate = change in quantity / time</div>'},
  {lb:'From a graph',dr:dQ3,ht:'<p>Rate at a point = gradient of tangent. Steeper gradient early on = faster initial rate. Flatter at the end (as reactant is used up).</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var dV=rnd(20,80),dt=rnd(20,120),rate=parseFloat((dV/dt).toFixed(2));return{question:'Gas produced: <b>'+dV+' cm\u00b3</b> in <b>'+dt+' s</b>. Find average rate.',hints:['rate = volume / time'],ans:rate,tol:0.05,unit:'cm\u00b3/s',working:'rate = '+dV+'/'+dt+' = '+rate+' cm\u00b3/s'};})},
]},
{ey:'Q4 \u2022 Y10 Chemistry \u2022 Rates',ti:'Maxwell-Boltzmann Distribution',su:'Interpret energy distribution diagrams to explain effect of T on rate.',steps:[
  {lb:'The distribution',dr:dQ4,ht:'<p>The Maxwell-Boltzmann distribution shows the spread of energies of particles in a gas. At higher temperature: the peak shifts to higher energy and the curve broadens. More particles have energy above Ea.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'On a Maxwell-Boltzmann diagram at higher temperature, the peak: 1=moves right and down, 2=moves left and up, 3=stays the same.',a:1,w:'Higher T: peak moves right (higher energy) and down (more spread). Answer: 1.'},{q:'What does the area to the right of Ea on the M-B diagram represent?',a:1,w:'Area to right of Ea = fraction of particles with enough energy to react. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+(qq.a===1&&qq.q.includes('represent')?'':'')+' (1='+['moves right and down','fraction of particles with E\u2265Ea'][qq.a>1?0:0]+', 2='+['moves left and up','fraction with insufficient energy'][0]+')',hints:['More T = more particles above Ea'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Chemistry \u2022 Rates',ti:'Catalysts',su:'Explain how a catalyst increases rate by lowering activation energy.',steps:[
  {lb:'How catalysts work',dr:dQ5,ht:'<p>A catalyst provides an alternative reaction pathway with <b>lower activation energy</b>. This means more particles have enough energy to react at the same temperature, so the rate increases. The catalyst is not consumed and is unchanged at the end.</p>'},
  {lb:'Types',dr:dQ5,ht:'<p>Heterogeneous catalyst: different phase to reactants (e.g. iron in Haber process). Homogeneous: same phase. Biological catalysts = enzymes.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'A catalyst is NOT consumed in the reaction: 1=true, 2=false.',a:1,w:'Catalysts are unchanged and can be reused. Answer: 1.'},{q:'A catalyst increases rate by: 1=increasing temperature, 2=lowering Ea, 3=providing more reactant.',a:2,w:'Catalyst lowers Ea \u2192 more particles can react. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Catalyst: alternative pathway, lower Ea, unchanged at end'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Chemistry \u2022 Rates',ti:'Concentration and Rate',su:'Explain how concentration affects rate in terms of collision theory.',steps:[
  {lb:'Concentration and collisions',dr:dQ6,ht:'<p>Higher concentration means more particles per unit volume. This increases the <b>frequency of collisions</b>, including successful ones. Rate is approximately proportional to concentration (at constant T).</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var rate1=rnd(1,5),conc1=rnd(1,3),conc2=conc1*rnd(2,4),rate2=rate1*conc2/conc1;return{question:'Rate is proportional to concentration. If [conc] doubles from <b>'+conc1+'</b> to <b>'+conc2+'</b> mol/dm\u00b3, and original rate = <b>'+rate1+' cm\u00b3/s</b>, find new rate.',hints:['Rate \u221d concentration'],ans:rate2,tol:0.1,unit:'cm\u00b3/s',working:'Rate \u00d7 ('+conc2+'/'+conc1+') = '+rate1+'\u00d7'+(conc2/conc1)+' = '+rate2+' cm\u00b3/s'};})},
]},
{ey:'Q7 \u2022 Y10 Chemistry \u2022 Rates',ti:'Surface Area',su:'Explain how surface area affects rate.',steps:[
  {lb:'Surface area',dr:dQ7,ht:'<p>A smaller particle size gives more surface area for a given mass. More surface area means more particles exposed to the other reactant \u2192 more collisions per second \u2192 faster rate.</p><p>Example: flour dust can explode (huge surface area); lump of flour is safe.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){return{question:'Marble chips of mass 5 g vs marble powder of the same mass react with HCl. Which is faster? 1=chips, 2=powder.',hints:['Smaller particle = greater surface area'],ans:2,tol:0,unit:'',working:'Powder has much greater surface area \u2192 faster rate. Answer: 2.'};})},
]},
{ey:'Q8 \u2022 Y10 Chemistry \u2022 Rates',ti:'Rate Calculations',su:'Calculate average rate from experimental data.',steps:[
  {lb:'Calculations',dr:dQ8,ht:'<p>Average rate = total change / total time. Initial rate = gradient at t=0 (steepest part of curve). Units: cm\u00b3/s, g/s, mol/dm\u00b3/s.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var mass_lost=rnd(10,50)*0.1,time=rnd(30,300),rate=parseFloat((mass_lost/time).toFixed(4));return{question:'Mass lost: <b>'+mass_lost.toFixed(1)+' g</b> in <b>'+time+' s</b>. Find average rate of mass loss.',hints:['rate = change/time'],ans:rate,tol:rate*0.05,unit:'g/s',working:'rate = '+mass_lost.toFixed(1)+'/'+time+' = '+rate+' g/s'};})},
]},
{ey:'Q9 \u2022 Y10 Chemistry \u2022 Rates',ti:'Comparing Experiments',su:'Interpret and compare rate experiments from graphical data.',steps:[
  {lb:'Reading rate graphs',dr:dQ9,ht:'<p>Steeper curve early on = faster initial rate. Same total volume/mass change = same total moles reacted (same amount of limiting reagent). Reaction stops when one reagent is used up.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var qs=[{q:'Two experiments produce the same volume of gas but curve A finishes sooner. Which has the faster average rate? 1=A, 2=B.',a:1,w:'Same product in less time = faster. Answer: 1.'},{q:'Adding a catalyst does not change the final amount of product: 1=true, 2=false.',a:1,w:'Catalyst only increases rate; same product amount. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Rate = amount per time; same amount in less time = faster'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q10 \u2022 Y10 Chemistry \u2022 Rates',ti:'Mixed Rates Questions',su:'Combined rate factors, calculations and collision theory.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>Rate factors: T, [conc], SA, catalyst. Collision theory: need E\u2265Ea. Rate = change/time. Catalyst: lowers Ea, same \u0394H, not consumed.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['factor','calc','catalyst']);if(type==='factor'){var qs=[{q:'Rate increases when concentration increases: 1=true, 2=false.',a:1,w:'Higher [conc] = more collisions = faster rate. Answer: 1.'},{q:'A catalyst changes \u0394H: 1=true, 2=false.',a:2,w:'Catalyst changes Ea only; \u0394H unchanged. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Recall the four rate factors'],ans:qq.a,tol:0,unit:'',working:qq.w};}if(type==='calc'){var dV=rnd(30,90),dt=rnd(30,180);return{question:'Gas collected: <b>'+dV+' cm\u00b3</b> in <b>'+dt+' s</b>. Find rate.',hints:['rate = V/t'],ans:parseFloat((dV/dt).toFixed(2)),tol:0.05,unit:'cm\u00b3/s',working:'rate = '+dV+'/'+dt+' = '+parseFloat((dV/dt).toFixed(2))+' cm\u00b3/s'};}return{question:'A catalyst increases rate by: 1=increasing T, 2=lowering Ea, 3=increasing concentration.',hints:['Catalyst provides alternative lower-Ea pathway'],ans:2,tol:0,unit:'',working:'Catalyst lowers Ea \u2192 more successful collisions. Answer: 2.'};})}
]},
];

render();
