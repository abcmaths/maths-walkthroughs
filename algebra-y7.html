<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Year 7 Algebra · Maths Walkthroughs</title>
<style>
:root{ --red:#C0272D; --dark-red:#7A1418; --cream:#FBF6F1; --ink:#241A17; --line:#E4D6CE; --gold:#C8922A; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{ background:var(--cream); color:var(--ink); font-family:'Helvetica Neue',Arial,sans-serif; }
header{ background:var(--red); color:#fff; height:56px; display:flex; align-items:center; justify-content:space-between; padding:0 20px; position:sticky; top:0; z-index:100; }
.back-btn{ font-size:13px; font-weight:600; color:#fff; background:rgba(255,255,255,.2); border:1px solid rgba(255,255,255,.35); padding:5px 12px; border-radius:3px; cursor:pointer; text-decoration:none; }
.header-title{ font-size:15px; font-weight:700; }
.layout{ display:flex; max-width:1100px; margin:0 auto; padding:28px 20px 60px; gap:28px; }
.sidebar{ width:210px; flex-shrink:0; display:flex; flex-direction:column; gap:6px; }
.sidebar-label{ font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#888; font-weight:700; margin-bottom:4px; }
.q-list-btn{ text-align:left; background:#fff; border:1px solid var(--line); border-radius:4px; padding:9px 12px; cursor:pointer; font-size:12px; transition:.15s; color:var(--ink); }
.q-list-btn:hover{ border-color:var(--red); color:var(--red); }
.q-list-btn.active{ background:var(--red); color:#fff; border-color:var(--red); }
.q-list-btn .q-num{ font-weight:700; font-size:10px; display:block; opacity:.7; }
.q-badge{ display:inline-block; font-size:9px; font-weight:700; padding:1px 5px; border-radius:8px; margin-top:3px; }
.badge-f{ background:#e8f4ff; color:#1a5a8a; }
.badge-e{ background:#fce8d8; color:#7A1418; }
.main{ flex:1; min-width:0; }
.wt-stage{ background:#fff; border:1px solid var(--line); border-radius:4px; overflow:hidden; width:100%; max-width:760px; }
.wt-canvas{ background:linear-gradient(180deg,#fff,#fdf7f4); padding:14px 0 4px; display:flex; justify-content:center; }
.wt-canvas svg{ width:100%; max-width:520px; height:auto; }
.wt-panel{ padding:20px 24px 24px; border-top:1px solid var(--line); min-height:160px; }
.wt-step-label{ font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:6px; }
.wt-panel p{ font-size:16px; line-height:1.55; margin:0 0 8px; }
.wt-formula{ font-family:'Cambria Math','Georgia',serif; font-size:17px; background:var(--cream); border-left:4px solid var(--red); padding:9px 13px; margin:8px 0; display:block; }
.wt-controls{ width:100%; max-width:760px; display:flex; justify-content:space-between; align-items:center; margin-top:16px; }
.wt-btn{ font-size:14px; font-weight:600; padding:9px 18px; border-radius:3px; border:1px solid var(--red); background:#fff; color:var(--red); cursor:pointer; transition:.15s; font-family:'Helvetica Neue',Arial,sans-serif; }
.wt-btn.primary{ background:var(--red); color:#fff; }
.wt-btn:disabled{ opacity:.3; cursor:default; }
.wt-btn:not(:disabled):hover{ background:var(--dark-red); color:#fff; border-color:var(--dark-red); }
.wt-dots{ display:flex; gap:6px; }
.wt-dot{ width:8px; height:8px; border-radius:50%; background:var(--line); }
.wt-dot.active{ background:var(--red); }
.wt-dot.done{ background:var(--gold); }
.wt-fadein{ animation:wtFade .45s ease; }
@keyframes wtFade{ from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);} }
.wt-try{ background:#fff; border:2px solid var(--gold); border-radius:6px; padding:18px 20px; margin-top:4px; }
.wt-try-title{ font-size:12px; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); font-weight:700; margin-bottom:10px; }
.wt-hints{ font-size:14px; color:#3a2a24; margin:8px 0 12px; padding-left:4px; list-style:none; }
.wt-hints li{ margin-bottom:5px; padding-left:18px; position:relative; }
.wt-hints li::before{ content:"›"; position:absolute; left:0; color:var(--gold); font-weight:700; }
.wt-answer-row{ display:flex; gap:8px; margin-top:6px; }
.wt-answer-row input{ flex:1; font-size:15px; padding:8px 12px; border:1px solid var(--line); border-radius:3px; outline:none; font-family:'Helvetica Neue',Arial,sans-serif; }
.wt-answer-row input:focus{ border-color:var(--gold); }
.wt-check{ font-size:14px; font-weight:600; padding:8px 16px; background:var(--gold); color:#fff; border:none; border-radius:3px; cursor:pointer; white-space:nowrap; font-family:'Helvetica Neue',Arial,sans-serif; }
.wt-check:hover{ background:#a07018; }
.wt-feedback{ margin-top:10px; font-size:14px; padding:9px 12px; border-radius:3px; display:none; font-family:'Helvetica Neue',Arial,sans-serif; }
.wt-feedback.ok{ background:#e8f8ee; color:#1a7a3a; border:1px solid #a8dbb8; display:block; }
.wt-feedback.err{ background:#fde8e8; color:#a01820; border:1px solid #f0b8b8; display:block; }
.wt-working summary{ cursor:pointer; color:var(--red); font-weight:600; font-size:14px; }
.wt-working-body{ margin-top:8px; font-size:14px; line-height:1.6; color:#3a2a24; }
.level-tag{ display:inline-block; font-size:11px; font-weight:700; padding:2px 8px; border-radius:10px; margin-bottom:8px; }
.level-f{ background:#e8f4ff; color:#1a5a8a; }
.level-e{ background:#fff3cd; color:#7a5a00; }
@media(max-width:640px){ .layout{ flex-direction:column; } .sidebar{ width:100%; flex-direction:row; flex-wrap:wrap; } .q-list-btn{ flex:1; min-width:80px; } }
</style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← All Topics</a>
  <div class="header-title">Year 7 — Basic Algebra</div>
  <div style="width:80px"></div>
</header>

<div class="layout">
  <div class="sidebar" id="sidebar"><div class="sidebar-label">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="wtEyebrow" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="wtTitle" style="font-family:'Georgia',serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="wtSub" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="wt-stage">
      <div class="wt-canvas"><svg id="diagram" viewBox="0 0 480 260"></svg></div>
      <div class="wt-panel wt-fadein" id="panel"></div>
    </div>
    <div class="wt-controls">
      <button class="wt-btn" id="prevBtn">← Back</button>
      <div class="wt-dots" id="dots"></div>
      <button class="wt-btn primary" id="nextBtn">Next →</button>
    </div>
  </div>
</div>

<script>
/* ── Try It ── */
const _store={};
function tryIt(opts){
  const id='ti_'+Math.random().toString(36).slice(2);_store[id]=opts;
  const hints=(opts.hints||[]).map(h=>`<li>${h}</li>`).join('');
  return `<div class="wt-try"><div class="wt-try-title">✎ Your Turn</div><p>${opts.question}</p><ul class="wt-hints">${hints}</ul><div class="wt-answer-row"><input type="number" step="any" placeholder="Your answer (${opts.unit})" id="${id}_inp"/><button class="wt-check" onclick="chk('${id}')">Check</button></div><div class="wt-feedback" id="${id}_fb"></div><details class="wt-working"><summary>Show full working</summary><div class="wt-working-body">${opts.working}</div></details></div>`;
}
function chk(id){
  const o=_store[id],val=parseFloat(document.getElementById(id+'_inp').value),fb=document.getElementById(id+'_fb');
  if(isNaN(val)){fb.className='wt-feedback err';fb.textContent='Please enter a number first.';return;}
  const tol=(o.tolerance||1)/100,lo=o.answer*(1-tol),hi=o.answer*(1+tol);
  if(Math.abs(val-o.answer)<=(o.exact||0.05)){fb.className='wt-feedback ok';fb.textContent='✓ Correct! Well done — the answer is '+o.answer+' '+o.unit;}
  else{fb.className='wt-feedback err';fb.textContent='✗ Not quite. Check your working and try again!';}
}

/* ── SVG helpers ── */
function S(){return document.getElementById('diagram');}
function tx(x,y,txt,col='#241A17',sz=13,anc='middle',bold=false){
  return `<text x="${x}" y="${y}" font-size="${sz}" font-family="Georgia,serif" fill="${col}" text-anchor="${anc}" font-weight="${bold?700:400}">${txt}</text>`;
}
function bx(x,y,w,h,fill='#fff5f0',stroke='#C0272D',sw=2){
  return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" rx="5"/>`;
}
function ln(x1,y1,x2,y2,col='#C0272D',w=2,dash=''){
  return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${w}" ${dash?`stroke-dasharray="${dash}"`:''}/>`;
}
function circ(cx,cy,r,fill='#fce8d8',stroke='#C0272D',sw=2){
  return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" stroke="${stroke}" stroke-width="${sw}"/>`;
}

/* ══════════════════════════════════════
   DRAWING FUNCTIONS
══════════════════════════════════════ */

/* Q1 Writing Expressions — bags of apples */
function drawQ1(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  // draw n bags each with 5 apples shown as dots
  const bags=[[100,120],[200,120],[300,120]];
  bags.forEach(([cx,cy],i)=>{
    o.push(bx(cx-35,cy-45,70,80,'#fff8f0','#C0272D',2));
    o.push(tx(cx,cy+25,'bag','#888',11));
    // 5 apple dots
    [[0,-20],[−12,0],[12,0],[−6,15],[6,15]].forEach(([dx,dy])=>{
      o.push(circ(cx+dx,cy+dy,6,'#ff9a6c','#C0272D',1.5));
    });
  });
  o.push(tx(240,28,'n bags, each with 5 apples','#888',13));
  if(p>=1){
    o.push(bx(155,175,170,40,'#fff5f0','#C0272D',2));
    o.push(tx(240,200,'Total apples = 5 × n = 5n','#C0272D',15,'middle',true));
  }
  if(p>=2){
    o.push(bx(60,225,360,25,'#e8f8ee','#1a7a3a',1.5));
    o.push(tx(240,243,'5n means 5 × n — we drop the × sign in algebra','#1a7a3a',12));
  }
  s.innerHTML=o.join('');
}

/* Q2 Substitution — number machine */
function drawQ2(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  // input → × 3 → + 4 → output
  const boxes=[{x:80,label:'Input\nx = 5'},{x:190,label:'× 3'},{x:300,label:'+ 4'},{x:390,label:'Output\n?'}];
  boxes.forEach((b,i)=>{
    const col = i===0?'#1a5a8a':i===3?'#1a7a3a':'#C0272D';
    const fill= i===0?'#e8f4ff':i===3?'#e8f8ee':'#fff5f0';
    o.push(bx(b.x-40,90,80,60,fill,col,2));
    b.label.split('\n').forEach((line,j)=>o.push(tx(b.x,113+j*18,line,col,13)));
    if(i<3) o.push(ln(b.x+40,120,b.x+110,120,'#C8922A',2));
    // arrow head
    if(i<3) o.push(`<polygon points="${b.x+110},${120} ${b.x+102},${115} ${b.x+102},${125}" fill="#C8922A"/>`);
  });
  o.push(tx(240,40,'Machine rule: 3x + 4','#C0272D',16,'middle',true));
  if(p>=1){
    o.push(tx(240,185,'Substitute x = 5:','#241A17',14));
    o.push(tx(240,205,'3 × 5 + 4','#241A17',15));
  }
  if(p>=2){
    o.push(tx(240,225,'= 15 + 4 = 19','#C0272D',16,'middle',true));
    // show output box answer
    o.push(tx(390,113,'Output','#1a7a3a',13));o.push(tx(390,131,'19','#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q3 Simplifying — sorting coloured tiles */
function drawQ3(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  o.push(tx(240,28,'3x + 2y + 5x + y','#C0272D',18,'middle',true));
  o.push(tx(240,52,'Sort the tiles by colour (type):','#888',12));

  // x-tiles (red) and y-tiles (blue)
  const xtiles=[80,130,180,310,360,410];
  const ytiles=[230,280,340,390];

  if(p>=1){
    // show all tiles scattered
    [80,130,180].forEach(x=>{ o.push(bx(x-22,70,44,36,'#fce8d8','#C0272D',2)); o.push(tx(x,93,'x','#C0272D',18)); });
    [230,280].forEach(x=>{ o.push(bx(x-22,70,44,36,'#e8f4ff','#1a5a8a',2)); o.push(tx(x,93,'y','#1a5a8a',18)); });
    [340,390,440].forEach(x=>{ o.push(bx(x-22,70,44,36,'#fce8d8','#C0272D',2)); o.push(tx(x,93,'x','#C0272D',18)); });
    o.push(bx(100,118,44,36,'#e8f4ff','#1a5a8a',2)); o.push(tx(122,141,'y','#1a5a8a',18));
  }
  if(p>=2){
    // group x terms together
    o.push(tx(240,175,'Group x terms: 3x + 5x','#C0272D',14));
    o.push(tx(240,198,'Group y terms: 2y + y','#1a5a8a',14));
  }
  if(p>=3){
    o.push(bx(130,215,220,34,'#e8f8ee','#1a7a3a',2));
    o.push(tx(240,237,'= 8x + 3y','#1a7a3a',18,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q4 Expanding single brackets — rectangle area */
function drawQ4(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  // rectangle: width = 3, height = (x + 4)
  const rx=120,ry=60,rw=240,rh=130;
  const split=rx+70; // divide at x part and 4 part
  o.push(bx(rx,ry,rw,rh,'#fff5f0','#C0272D',2));
  // vertical divider
  if(p>=1) o.push(ln(split,ry,split,ry+rh,'#C0272D',1.5,'5,3'));
  // top labels
  o.push(tx(rx+rw/2,ry-14,'3','#C0272D',16));
  // side labels
  o.push(tx(rx-18,(ry+ry+rh)/2,'x','#1a5a8a',16,'end'));
  if(p>=1) o.push(tx(rx-18,(ry+ry+rh)/2+28,'+4','#1a7a3a',15,'end'));
  // cell labels
  if(p>=2){
    o.push(tx((rx+split)/2,(ry+ry+rh)/2,'3x','#1a5a8a',20));
  }
  if(p>=3){
    o.push(tx((split+rx+rw)/2,(ry+ry+rh)/2,'12','#1a7a3a',20));
    o.push(bx(110,210,260,36,'#e8f8ee','#1a7a3a',2));
    o.push(tx(240,233,'3(x + 4) = 3x + 12','#1a7a3a',17,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q5 One-step equation — balance */
function drawQ5(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  // beam
  o.push(ln(80,130,400,130,'#C0272D',3));
  o.push(ln(240,130,240,175,'#888',2));
  o.push(`<polygon points="220,195 260,195 240,175" fill="#888"/>`);
  // pans
  o.push(bx(60,78,110,52,'#fff5f0','#C0272D',2));
  o.push(tx(115,96,'x + 6','#C0272D',16));
  o.push(ln(80,78,80,130,'#aaa',1.5));o.push(ln(168,78,168,130,'#aaa',1.5));
  o.push(bx(310,78,110,52,'#e8f4ff','#1a5a8a',2));
  o.push(tx(365,96,'14','#1a5a8a',16));
  o.push(ln(310,78,310,130,'#aaa',1.5));o.push(ln(420,78,420,130,'#aaa',1.5));
  // steps
  if(p>=1){
    o.push(tx(115,148,'− 6','#C8922A',14));
    o.push(tx(365,148,'− 6','#C8922A',14));
    o.push(tx(240,170,'Subtract 6 from both sides','#888',12));
  }
  if(p>=2){
    o.push(bx(60,198,110,40,'#fff5f0','#C0272D',1.5));o.push(tx(115,223,'x','#C0272D',17));
    o.push(bx(310,198,110,40,'#e8f4ff','#1a5a8a',1.5));o.push(tx(365,223,'8','#1a5a8a',17));
  }
  if(p>=3){
    o.push(bx(155,245,170,0,'#fff','#fff',0));
    o.push(tx(240,245,'x = 8   ✓  Check: 8 + 6 = 14','#1a7a3a',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q6 Two-step equation — bar model */
function drawQ6(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  o.push(tx(240,30,'2x + 3 = 11','#C0272D',20,'middle',true));

  // bar model: total bar = 11
  o.push(bx(60,55,360,38,'#e8f4ff','#1a5a8a',2));
  o.push(tx(240,79,'11','#1a5a8a',16,'middle',true));

  if(p>=1){
    // split: 2x part and +3 part
    o.push(bx(60,108,270,38,'#fce8d8','#C0272D',2));
    o.push(tx(195,132,'2x','#C0272D',16));
    o.push(bx(333,108,87,38,'#fff3cd','#C8922A',2));
    o.push(tx(376,132,'3','#C8922A',16));
    o.push(tx(240,162,'Step 1: subtract 3 → 2x = 8','#241A17',14));
  }
  if(p>=2){
    o.push(bx(60,170,360,38,'#fce8d8','#C0272D',1.5));
    // 2 equal parts
    o.push(ln(240,170,240,208,'#C0272D',1.5,'4,3'));
    o.push(tx(150,194,'x','#C0272D',16));o.push(tx(330,194,'x','#C0272D',16));
    o.push(tx(240,220,'Step 2: divide by 2 → x = 4','#241A17',14));
  }
  if(p>=3){
    o.push(bx(150,232,180,22,'#e8f8ee','#1a7a3a',1.5));
    o.push(tx(240,248,'x = 4   ✓  Check: 2(4)+3 = 11','#1a7a3a',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q7 Forming expressions — tickets */
function drawQ7(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  // ticket icons
  [[100,80],[200,80],[300,80],[400,80]].forEach(([cx,cy])=>{
    o.push(bx(cx-38,cy-25,76,50,'#fff8f0','#C8922A',2));
    o.push(tx(cx,cy+5,'🎟','#C8922A',22));
  });
  o.push(tx(240,28,'Adult tickets cost £a each. Child tickets cost £c each.','#241A17',13));
  o.push(tx(240,135,'3 adult tickets and 4 child tickets','#888',13));
  if(p>=1){
    o.push(bx(80,150,140,38,'#fce8d8','#C0272D',2));
    o.push(tx(150,174,'3 × a = 3a','#C0272D',14));
    o.push(bx(260,150,140,38,'#e8f4ff','#1a5a8a',2));
    o.push(tx(330,174,'4 × c = 4c','#1a5a8a',14));
  }
  if(p>=2){
    o.push(bx(120,200,240,38,'#e8f8ee','#1a7a3a',2));
    o.push(tx(240,224,'Total = 3a + 4c','#1a7a3a',17,'middle',true));
  }
  if(p>=3){
    o.push(tx(240,250,'If a = 8 and c = 5: 3(8) + 4(5) = 24 + 20 = £44','#888',12));
  }
  s.innerHTML=o.join('');
}

/* Q8 Simplifying with negatives */
function drawQ8(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  o.push(tx(240,30,'5x − 2y − 2x + 4y','#C0272D',18,'middle',true));
  o.push(tx(240,55,'Identify each term and its sign:','#888',13));

  const terms=[
    {lbl:'5x',col:'#C0272D',fill:'#fce8d8',x:60},
    {lbl:'−2y',col:'#1a5a8a',fill:'#e8f4ff',x:150},
    {lbl:'−2x',col:'#C0272D',fill:'#fce8d8',x:250},
    {lbl:'+4y',col:'#1a5a8a',fill:'#e8f4ff',x:350},
  ];
  if(p>=1) terms.forEach(t=>{ o.push(bx(t.x-35,68,70,40,t.fill,t.col,2)); o.push(tx(t.x,94,t.lbl,t.col,15)); });

  if(p>=2){
    o.push(tx(240,132,'x terms: 5x − 2x = 3x','#C0272D',15));
    o.push(tx(240,158,'y terms: −2y + 4y = 2y','#1a5a8a',15));
  }
  if(p>=3){
    o.push(bx(140,175,200,38,'#e8f8ee','#1a7a3a',2));
    o.push(tx(240,199,'= 3x + 2y','#1a7a3a',18,'middle',true));
  }
  if(p>=4){
    o.push(tx(240,232,'Be careful: −2y + 4y = +2y (not −2y)','#C8922A',12));
  }
  s.innerHTML=o.join('');
}

/* Q9 Sequences — dot pattern */
function drawQ9(p){
  const s=S();s.setAttribute('viewBox','0 0 480 260');let o=[];
  // show pattern 1, 2, 3, 4
  const patterns=[
    {n:1,dots:[[0,0]]},
    {n:2,dots:[[-8,0],[8,0],[0,0]]},
    {n:3,dots:[[-16,0],[0,0],[16,0],[-8,14],[8,14]]},
    {n:4,dots:[[-16,-8],[0,-8],[16,-8],[-24,8],[0,8],[24,8],[−8,24],[8,24]]},
  ];
  const cx=[80,180,290,400];
  patterns.forEach((pat,i)=>{
    o.push(tx(cx[i],200,`Term ${pat.n}`,'#888',12));
