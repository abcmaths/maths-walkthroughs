<head>

<title>Number · Year 7 · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"\u203a";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>

<script>
var ST={};
function tryIt(o){var id='t'+Math.random().toString(36).slice(2);ST[id]=o;var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');return '<div class="try"><div class="try-t">\u2714 Your Turn</div><p>'+o.question+'</p><ul class="hl">'+h+'</ul><div class="ar"><input type="number" step="any" placeholder="Answer ('+o.unit+')" id="'+id+'_i"/><button class="ck" onclick="ck(\''+id+'\')">Check</button></div><div class="fb" id="'+id+'_f"></div><details class="wk"><summary>Show full working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
function ck(id){var o=ST[id],v=parseFloat(document.getElementById(id+'_i').value),f=document.getElementById(id+'_f');if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}if(Math.abs(v-o.ans)<=(o.tol||0.05)){f.className='fb ok';f.textContent='Correct! Answer: '+o.ans+' '+o.unit;}else{f.className='fb er';f.textContent='Not quite \u2014 check your working and try again.';}}
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

/* Q1 Ordering */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var nums=[[-5,'#C0272D'],[-1.8,'#1a5a8a'],[0,'#888'],[3.2,'#1a7a3a']];
  var ox=60,oy=150,sc=70;
  o.push(L(ox-20,oy,ox+5*sc+20,oy,'#333',2));
  for(var i=-1;i<=5;i++){o.push(L(ox+i*sc,oy-6,ox+i*sc,oy+6,'#555',1.5));o.push(T(ox+i*sc,oy+20,i-2,'#555',12));}
  o.push(T(ox+5*sc+28,oy+4,'\u2192','#333',14,'start'));
  if(p>=1){
    nums.forEach(function(n){
      var x=ox+(n[0]+2)*sc;
      o.push('<circle cx="'+x+'" cy="'+oy+'" r="8" fill="'+n[1]+'" stroke="#fff" stroke-width="2"/>');
      o.push(T(x,oy-18,n[0],n[1],12,'middle',true));
    });
  }
  if(p>=2){o.push(T(240,50,'Ordered smallest \u2192 largest:','#241A17',13,'middle',false));o.push(T(240,74,'\u22125,  \u22121.8,  0,  3.2','#C0272D',16,'middle',true));}
  if(p>=3){o.push(T(240,230,'Tip: negatives are always less than zero. More negative = smaller.','#888',11,'middle',false));}
  s.innerHTML=o.join('');
}

/* Q2 Rounding */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,30,'Round 37.486','#C0272D',20,'middle',true));
  var rows=[
    {label:'to 1 d.p.',val:'37.5',note:'4th digit is 8 \u2265 5, round up'},
    {label:'to 2 d.p.',val:'37.49',note:'3rd digit is 6 \u2265 5, round up'},
    {label:'to nearest whole',val:'37',note:'1st decimal digit is 4 < 5, round down'},
    {label:'to nearest 10',val:'40',note:'Units digit is 7 \u2265 5, round up'}
  ];
  rows.forEach(function(r,i){
    if(p>=i+1){
      o.push(R(40,50+i*48,200,38,'#fff5f0','#C0272D',1.5));
      o.push(T(140,66+i*48,r.label,'#241A17',13,'middle',false));
      o.push(R(250,50+i*48,180,38,'#e8f8ee','#1a7a3a',1.5));
      o.push(T(340,66+i*48,r.val,'#1a7a3a',15,'middle',true));
      o.push(T(240,82+i*48,r.note,'#888',10,'middle',false));
    }
  });
  s.innerHTML=o.join('');
}

/* Q3 Negative numbers */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=60,oy=140,sc=36;
  o.push(L(ox-10,oy,ox+11*sc+10,oy,'#333',2));
  for(var i=-2;i<=9;i++){o.push(L(ox+(i+2)*sc,oy-6,ox+(i+2)*sc,oy+6,'#555',1.5));o.push(T(ox+(i+2)*sc,oy+18,i,'#555',11));}
  o.push(T(ox+13*sc,oy+4,'\u2192','#333',14,'start'));
  if(p>=1){
    o.push('<circle cx="'+(ox+2*sc+3*sc)+'" cy="'+oy+'" r="7" fill="#C0272D" stroke="#fff" stroke-width="2"/>');
    o.push(T(ox+5*sc,oy-20,'\u22127','#C0272D',12,'middle',true));
    o.push(T(240,40,'\u22127 + 12','#C0272D',18,'middle',true));
  }
  if(p>=2){
    o.push(L(ox+2*sc,oy-2,ox+2*sc+12*sc,oy-2,'#C8922A',3));
    o.push(T(ox+8*sc,oy-18,'+ 12 steps right','#C8922A',11,'middle',false));
    o.push('<polygon points="'+(ox+2*sc+12*sc)+','+(oy-2)+' '+(ox+2*sc+12*sc-8)+','+(oy-8)+' '+(ox+2*sc+12*sc-8)+','+(oy+4)+'" fill="#C8922A"/>');
  }
  if(p>=3){
    o.push('<circle cx="'+(ox+2*sc+12*sc)+'" cy="'+oy+'" r="7" fill="#1a7a3a" stroke="#fff" stroke-width="2"/>');
    o.push(T(ox+2*sc+12*sc,oy-20,'5','#1a7a3a',12,'middle',true));
    o.push(R(140,200,200,38,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,223,'\u22127 + 12 = 5','#1a7a3a',17,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q4 HCF and LCM */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'HCF and LCM of 18 and 24','#C0272D',16,'middle',true));
  if(p>=1){
    o.push(T(120,50,'Factors of 18:','#241A17',13,'middle',true));
    [1,2,3,6,9,18].forEach(function(f,i){o.push(R(40+i*42,58,36,28,(f===6||f===18)?'#fce8d8':'#fff','#C0272D',1.5));o.push(T(58+i*42,77,f,'#C0272D',13));});
    o.push(T(120,106,'Factors of 24:','#241A17',13,'middle',true));
    [1,2,3,4,6,8,12,24].forEach(function(f,i){o.push(R(40+i*42,114,36,28),(f===6)?'#fce8d8':'#fff','#C0272D',1.5);o.push(T(58+i*42,133,f,'#C0272D',13));});
  }
  if(p>=2){
    o.push(T(240,162,'Common factors: 1, 2, 3, 6','#1a5a8a',13,'middle',false));
    o.push(R(140,172,200,34,'#e8f4ff','#1a5a8a',2));
    o.push(T(240,194,'HCF = 6','#1a5a8a',16,'middle',true));
  }
  if(p>=3){
    o.push(T(240,220,'LCM: 18\u00d71=18, \u00d72=36, \u00d74=72 \u2014 24 goes into 72? 72\u00f724=3 \u2713','#888',11,'middle',false));
    o.push(R(310,172,140,34,'#e8f8ee','#1a7a3a',2));
    o.push(T(380,194,'LCM = 72','#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q5 Squares cubes roots */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var items=[
    {q:'6\u00b2',a:'36',note:'6\u00d76'},
    {q:'\u221a144',a:'12',note:'12\u00d712=144'},
    {q:'4\u00b3',a:'64',note:'4\u00d74\u00d74'},
    {q:'\u221b216',a:'6',note:'6\u00d76\u00d76=216'}
  ];
  items.forEach(function(item,i){
    o.push(R(40,20+i*56,160,44,(p>=i+1)?'#fff5f0':'#f8f8f8','#C0272D',(p>=i+1)?2:1));
    o.push(T(120,48+i*56,item.q,'#C0272D',18,'middle',p>=i+1));
    if(p>=i+1){
      o.push(R(220,20+i*56,130,44,'#e8f8ee','#1a7a3a',2));
      o.push(T(285,48+i*56,'= '+item.a,'#1a7a3a',18,'middle',true));
      o.push(T(380,48+i*56,item.note,'#888',11,'middle',false));
    }
  });
  s.innerHTML=o.join('');
}

/* Q6 Fractions simplifying */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Simplify  18/24','#C0272D',20,'middle',true));
  if(p>=1){o.push(T(240,66,'Find the HCF of 18 and 24 \u2192 HCF = 6','#241A17',13));
    o.push(R(60,78,160,44,'#fff5f0','#C0272D',1.5));o.push(T(140,104,'18 \u00f7 6 = 3','#C0272D',15,'middle',false));
    o.push(R(260,78,160,44,'#fff5f0','#C0272D',1.5));o.push(T(340,104,'24 \u00f7 6 = 4','#C0272D',15,'middle',false));
  }
  if(p>=2){o.push(R(160,136,160,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,162,'18/24 = 3/4','#1a7a3a',20,'middle',true));}
  if(p>=3){
    o.push(T(240,202,'Equivalent fractions: multiply or divide both parts by the same number.','#888',11,'middle',false));
    o.push(T(240,220,'3/4 = 6/8 = 9/12 = 12/16 = \u2026','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q7 Adding fractions */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Calculate  2/5 + 1/10','#C0272D',20,'middle',true));
  if(p>=1){o.push(T(240,62,'Find a common denominator: LCD of 5 and 10 = 10','#241A17',13));}
  if(p>=2){
    o.push(R(60,74,140,44,'#fff5f0','#C0272D',1.5));o.push(T(130,100,'2/5 = 4/10','#C0272D',15,'middle',true));
    o.push(R(280,74,140,44,'#e8f4ff','#1a5a8a',1.5));o.push(T(350,100,'1/10 = 1/10','#1a5a8a',15,'middle',true));
  }
  if(p>=3){o.push(T(240,138,'4/10 + 1/10 = 5/10','#241A17',15,'middle',false));}
  if(p>=4){o.push(R(160,150,160,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,176,'= 1/2','#1a7a3a',22,'middle',true));}
  s.innerHTML=o.join('');
}

/* Q8 Fraction of amount */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Find  \u00be  of  80','#C0272D',20,'middle',true));
  if(p>=1){
    o.push(T(240,62,'Step 1: Find \u00bc first (divide by 4)','#241A17',13));
    o.push(R(140,72,200,38,'#fff5f0','#C0272D',1.5));o.push(T(240,95,'80 \u00f7 4 = 20','#C0272D',16,'middle',true));
  }
  if(p>=2){
    o.push(T(240,126,'Step 2: Multiply by 3 (for \u00be)','#241A17',13));
    o.push(R(140,136,200,38,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,159,'20 \u00d7 3 = 60','#1a5a8a',16,'middle',true));
  }
  if(p>=3){o.push(R(140,186,200,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,212,'\u00be of 80 = 60','#1a7a3a',20,'middle',true));}
  s.innerHTML=o.join('');
}

/* Q9 Percentages */
function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Find 15% of \u20a6800  and  Increase \u20a6120 by 10%','#C0272D',14,'middle',true));
  if(p>=1){
    o.push(T(120,62,'15% of \u20a6800','#241A17',13,'middle',true));
    o.push(T(120,82,'10% = \u20a680','#888',12,'middle',false));
    o.push(T(120,100,'5% = \u20a640','#888',12,'middle',false));
    o.push(R(40,110,160,38,'#fff5f0','#C0272D',1.5));o.push(T(120,133,'15% = \u20a6120','#C0272D',15,'middle',true));
  }
  if(p>=2){
    o.push(T(360,62,'Increase \u20a6120 by 10%','#241A17',13,'middle',true));
    o.push(T(360,82,'10% of 120 = 12','#888',12,'middle',false));
    o.push(R(280,110,160,38,'#e8f8ee','#1a7a3a',1.5));o.push(T(360,133,'120 + 12 = \u20a6132','#1a7a3a',15,'middle',true));
  }
  if(p>=3){o.push(T(240,200,'Multiplier method: \u00d70.15 for 15%,  \u00d71.10 for +10%','#888',11,'middle',false));
    o.push(T(240,220,'800\u00d70.15=120 \u2713   120\u00d71.10=132 \u2713','#888',11,'middle',false));}
  s.innerHTML=o.join('');
}

/* Q10 Ratio */
function dQ10(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Divide \u20a684 in the ratio 3:4','#C0272D',18,'middle',true));
  if(p>=1){o.push(T(240,62,'Total parts = 3 + 4 = 7','#241A17',13));
    o.push(R(120,72,240,38,'#fff5f0','#C0272D',1.5));o.push(T(240,95,'1 part = 84 \u00f7 7 = 12','#C0272D',16,'middle',true));}
  if(p>=2){
    o.push(R(40,124,180,38,'#e8f4ff','#1a5a8a',1.5));o.push(T(130,147,'3 parts = 36','#1a5a8a',15,'middle',true));
    o.push(R(260,124,180,38,'#e8f8ee','#1a7a3a',1.5));o.push(T(350,147,'4 parts = 48','#1a7a3a',15,'middle',true));
  }
  if(p>=3){o.push(T(240,186,'Check: 36 + 48 = 84 \u2713','#888',12,'middle',false));
    o.push(T(240,210,'Also simplify ratio: 3:4 is already in simplest form (HCF=1)','#888',11,'middle',false));}
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 \u00b7 Year 7 \u00b7 Number',ti:'Ordering Integers and Decimals',su:'Put \u22125, 0, 3.2, \u22121.8 in order from smallest to largest.',steps:[
    {lb:'The number line',dr:dQ1,ht:'<p>Use a <b>number line</b> to help. Numbers get <b>larger</b> as you move right and <b>smaller</b> as you move left. Negative numbers are always less than zero.</p>'},
    {lb:'Place each number',dr:dQ1,ht:'<p>Place each number on the line: \u22125 is furthest left, then \u22121.8, then 0, then 3.2.</p>'},
    {lb:'Write in order',dr:dQ1,ht:'<div class="fm">\u22125 &lt; \u22121.8 &lt; 0 &lt; 3.2</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt({question:'Which is smaller: <b>\u22123.5</b> or <b>\u22122.1</b>? Enter the smaller one as a number.',hints:['Both are negative','On a number line, \u22123.5 is further left than \u22122.1'],ans:-3.5,tol:0.05,unit:'',working:'\u22123.5 is smaller because it is further from zero in the negative direction.'})}
  ]},
  {ey:'Q2 \u00b7 Year 7 \u00b7 Number',ti:'Rounding',su:'Round 37.486 to 1 d.p., 2 d.p., nearest whole number, and nearest 10.',steps:[
    {lb:'The rule',dr:dQ2,ht:'<p>Look at the digit <b>after</b> the place you are rounding to. If it is <b>5 or more</b>, round up. If it is <b>less than 5</b>, round down (leave the digit the same).</p>'},
    {lb:'To 1 decimal place',dr:dQ2,ht:'<div class="fm">37.486 \u2192 37.5</div><p>The 2nd decimal digit is 8 \u2265 5, so the 1st decimal digit rounds up: 4 \u2192 5.</p>'},
    {lb:'To 2 decimal places',dr:dQ2,ht:'<div class="fm">37.486 \u2192 37.49</div><p>The 3rd decimal digit is 6 \u2265 5, so 8 rounds up to 9.</p>'},
    {lb:'Nearest whole and nearest 10',dr:dQ2,ht:'<div class="fm">Nearest whole: 37 (4 &lt; 5, round down)</div><div class="fm">Nearest 10: 40 (7 \u2265 5, round up)</div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt({question:'Round <b>6.847</b> to 1 decimal place.',hints:['Look at the 2nd decimal digit','8 \u2265 5, so round up'],ans:6.8,tol:0.05,unit:'',working:'2nd decimal is 4... wait: 6.847 \u2192 1 d.p.: look at 2nd decimal = 4 < 5, so 6.8. Answer: 6.8'})}
  ]},
  {ey:'Q3 \u00b7 Year 7 \u00b7 Number',ti:'Negative Numbers',su:'Calculate \u22127 + 12. Show on a number line.',steps:[
    {lb:'Negative numbers',dr:dQ3,ht:'<p>Negative numbers are <b>less than zero</b>. On a number line, adding a positive number means moving <b>right</b>. Subtracting means moving <b>left</b>.</p>'},
    {lb:'Start at \u22127',dr:dQ3,ht:'<p>Place a marker at \u22127 on the number line.</p>'},
    {lb:'Add 12 — move right 12 steps',dr:dQ3,ht:'<p>Move 12 steps to the right from \u22127.</p>'},
    {lb:'Answer',dr:dQ3,ht:'<div class="fm">\u22127 + 12 = 5</div><p>Also: a temperature falls from 4\u00b0C to \u22126\u00b0C \u2014 change = \u22126 \u2212 4 = \u221210\u00b0C (a drop of 10 degrees).</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt({question:'Calculate <b>\u22124 + 9</b>.',hints:['Start at \u22124 on the number line','Move 9 steps right'],ans:5,tol:0.05,unit:'',working:'\u22124 + 9 = 5'})}
  ]},
  {ey:'Q4 \u00b7 Year 7 \u00b7 Number',ti:'HCF and LCM',su:'Find the HCF and LCM of 18 and 24.',steps:[
    {lb:'What are HCF and LCM?',dr:dQ4,ht:'<p><b>HCF</b> (Highest Common Factor): the largest number that divides exactly into both numbers.<br><b>LCM</b> (Lowest Common Multiple): the smallest number that both numbers divide into exactly.</p>'},
    {lb:'List the factors',dr:dQ4,ht:'<p>Factors of 18: 1, 2, 3, 6, 9, 18<br>Factors of 24: 1, 2, 3, 4, 6, 8, 12, 24<br>Common factors: 1, 2, 3, 6</p>'},
    {lb:'HCF',dr:dQ4,ht:'<div class="fm">HCF(18, 24) = 6</div>'},
    {lb:'LCM',dr:dQ4,ht:'<div class="fm">Multiples of 18: 18, 36, 54, 72 \u2026</div><div class="fm">Multiples of 24: 24, 48, 72 \u2026</div><div class="fm">LCM(18, 24) = 72</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt({question:'Find the HCF of <b>12 and 30</b>.',hints:['Factors of 12: 1, 2, 3, 4, 6, 12','Factors of 30: 1, 2, 3, 5, 6, 10, 15, 30','Common factors: 1, 2, 3, 6'],ans:6,tol:0.05,unit:'',working:'HCF(12, 30) = 6'})}
  ]},
  {ey:'Q5 \u00b7 Year 7 \u00b7 Number',ti:'Squares, Cubes and Roots',su:'Find 6\u00b2, \u221a144, 4\u00b3 and \u221b216.',steps:[
    {lb:'Powers and roots',dr:dQ5,ht:'<p><b>Square</b>: multiply a number by itself. <b>Cube</b>: multiply by itself three times.<br><b>Square root</b>: reverse of squaring. <b>Cube root</b>: reverse of cubing.</p>'},
    {lb:'6\u00b2 and \u221a144',dr:dQ5,ht:'<div class="fm">6\u00b2 = 6 \u00d7 6 = 36</div><div class="fm">\u221a144 = 12  (because 12 \u00d7 12 = 144)</div>'},
    {lb:'4\u00b3 and \u221b216',dr:dQ5,ht:'<div class="fm">4\u00b3 = 4 \u00d7 4 \u00d7 4 = 64</div><div class="fm">\u221b216 = 6  (because 6 \u00d7 6 \u00d7 6 = 216)</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt({question:'Find <b>\u221a225</b>.',hints:['Think: what number times itself gives 225?','15 \u00d7 15 = ?'],ans:15,tol:0.05,unit:'',working:'15 \u00d7 15 = 225, so \u221a225 = 15'})}
  ]},
  {ey:'Q6 \u00b7 Year 7 \u00b7 Number',ti:'Equivalent Fractions and Simplifying',su:'Simplify 18/24.',steps:[
    {lb:'Equivalent fractions',dr:dQ6,ht:'<p><b>Equivalent fractions</b> have the same value but different numerators and denominators. To simplify, divide both by their HCF.</p>'},
    {lb:'Find the HCF',dr:dQ6,ht:'<div class="fm">HCF(18, 24) = 6</div>'},
    {lb:'Divide both by 6',dr:dQ6,ht:'<div class="fm">18 \u00f7 6 = 3</div><div class="fm">24 \u00f7 6 = 4</div>'},
    {lb:'Result',dr:dQ6,ht:'<div class="fm">18/24 = 3/4</div><p>Check: multiply both by 6 to get back to 18/24 \u2713</p>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt({question:'Simplify <b>20/35</b>. What is the denominator of the simplified fraction?',hints:['HCF of 20 and 35','Both divisible by 5'],ans:7,tol:0.05,unit:'(denominator)',working:'HCF(20,35)=5. 20/5=4, 35/5=7. Answer: 4/7'})}
  ]},
  {ey:'Q7 \u00b7 Year 7 \u00b7 Number',ti:'Adding and Subtracting Fractions',su:'Calculate 2/5 + 1/10.',steps:[
    {lb:'Common denominator',dr:dQ7,ht:'<p>To add or subtract fractions, first make the <b>denominators the same</b>. Find the Lowest Common Denominator (LCD).</p>'},
    {lb:'Convert 2/5',dr:dQ7,ht:'<div class="fm">LCD(5, 10) = 10</div><div class="fm">2/5 = 4/10  (multiply top and bottom by 2)</div>'},
    {lb:'Add',dr:dQ7,ht:'<div class="fm">4/10 + 1/10 = 5/10</div>'},
    {lb:'Simplify',dr:dQ7,ht:'<div class="fm">5/10 = 1/2</div>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt({question:'Calculate <b>3/4 \u2212 1/8</b>. What is the answer as a fraction? Enter the numerator.',hints:['LCD of 4 and 8 is 8','3/4 = 6/8','6/8 \u2212 1/8 = ?'],ans:5,tol:0.05,unit:'over 8',working:'6/8 \u2212 1/8 = 5/8. Numerator = 5.'})}
  ]},
  {ey:'Q8 \u00b7 Year 7 \u00b7 Number',ti:'Fraction of an Amount',su:'Find \u00be of 80.',steps:[
    {lb:'The method',dr:dQ8,ht:'<p>To find a fraction of an amount: <b>divide by the denominator</b> (bottom), then <b>multiply by the numerator</b> (top).</p>'},
    {lb:'Divide by 4',dr:dQ8,ht:'<div class="fm">80 \u00f7 4 = 20  (this gives \u00bc)</div>'},
    {lb:'Multiply by 3',dr:dQ8,ht:'<div class="fm">20 \u00d7 3 = 60  (this gives \u00be)</div>'},
    {lb:'Answer',dr:dQ8,ht:'<div class="fm">\u00be of 80 = 60</div>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt({question:'Find <b>2/5 of 60</b>.',hints:['Divide 60 by 5 first','Then multiply by 2'],ans:24,tol:0.05,unit:'',working:'60 \u00f7 5 = 12. 12 \u00d7 2 = 24.'})}
  ]},
  {ey:'Q9 \u00b7 Year 7 \u00b7 Number',ti:'Percentages of Quantities',su:'Find 15% of \u20a6800. Then increase \u20a6120 by 10%.',steps:[
    {lb:'Finding a percentage',dr:dQ9,ht:'<p>To find a percentage of an amount: find <b>10%</b> first (divide by 10), then build up from there. Or multiply by the decimal equivalent.</p>'},
    {lb:'15% of \u20a6800',dr:dQ9,ht:'<div class="fm">10% of 800 = 80</div><div class="fm">5% of 800 = 40</div><div class="fm">15% = 80 + 40 = \u20a6120</div>'},
    {lb:'Increase \u20a6120 by 10%',dr:dQ9,ht:'<div class="fm">10% of 120 = 12</div><div class="fm">120 + 12 = \u20a6132</div>'},
    {lb:'Multiplier method',dr:dQ9,ht:'<div class="fm">15% of 800 = 800 \u00d7 0.15 = 120</div><div class="fm">+10%: 120 \u00d7 1.10 = 132</div>'},
    {lb:'Your turn',dr:dQ9,ht:tryIt({question:'Find <b>20% of \u20a6350</b>.',hints:['10% of 350 = 35','20% = 2 \u00d7 35'],ans:70,tol:0.05,unit:'\u20a6',working:'10% = 35. 20% = 70.'})}
  ]},
  {ey:'Q10 \u00b7 Year 7 \u00b7 Number',ti:'Sharing in a Ratio',su:'Divide \u20a684 in the ratio 3:4.',steps:[
    {lb:'The method',dr:dQ10,ht:'<p>To share in a ratio: add the parts to get the total number of parts, find the value of one part, then multiply.</p>'},
    {lb:'Total parts',dr:dQ10,ht:'<div class="fm">3 + 4 = 7 parts total</div><div class="fm">1 part = 84 \u00f7 7 = 12</div>'},
    {lb:'Each share',dr:dQ10,ht:'<div class="fm">3 parts = 3 \u00d7 12 = \u20a636</div><div class="fm">4 parts = 4 \u00d7 12 = \u20a648</div>'},
    {lb:'Check',dr:dQ10,ht:'<div class="fm">36 + 48 = 84 \u2713</div>'},
    {lb:'Your turn',dr:dQ10,ht:tryIt({question:'Share <b>\u20a660</b> in the ratio <b>2:3</b>. What is the larger share?',hints:['Total parts = 2+3 = 5','1 part = 60\u00f75 = 12','Larger share = 3 parts'],ans:36,tol:0.05,unit:'\u20a6',working:'1 part = 12. Larger share = 3\u00d712 = \u20a636.'})}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
</body>
</html>
