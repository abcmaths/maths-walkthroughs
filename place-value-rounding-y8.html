<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Place Value &amp; Rounding &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Place Value &amp; Rounding &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function tryIt(o){var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');var ph='Answer'+(o.unit?' ('+o.unit+')':'');return '<div class="try" data-tryid="'+id+'"><div class="try-t">\u2714 Your Turn</div><div class="try-q">'+o.question+'</div>'+(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/><button class="ck try-ck" data-tryid="'+id+'">Check</button></div><div class="try-fb" data-tryid="'+id+'"></div><details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
document.addEventListener('click',function(e){if(e.target.classList.contains('try-ck')){var id=e.target.getAttribute('data-tryid'),o=ST[id].o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! '+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 try again.';}}});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

/* Q1 Significant figures */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Display the number with digit boxes
  var digits=['0','.','0','0','6','7','4','3'];
  var cols=['#ccc','#ccc','#ccc','#ccc','#C0272D','#1a5a8a','#888','#888'];
  digits.forEach(function(d,i){
    var x=40+i*52,w=d==='.'?20:44;
    if(d!=='.'){
      o.push(R(x,30,44,50,p>=1&&i>=4?'#fff5f0':'#fafafa',cols[i],(p>=1&&i>=4)?2:1));
    }
    o.push(T(x+(d==='.'?10:22),62,d,cols[i],d==='.'?14:20,'middle',i>=4&&p>=1));
  });
  if(p>=1){
    o.push(T(252,100,'1st s.f.','#C0272D',11,'middle',true));
    o.push(T(304,100,'2nd s.f.','#1a5a8a',11,'middle',true));
    o.push(L(252,88,252,82,'#C0272D',1.5));
    o.push(L(304,88,304,82,'#1a5a8a',1.5));
  }
  if(p>=2){
    o.push(T(240,128,'Next digit after 2nd s.f. is 4 \u2192 round DOWN (keep 7)','#888',12,'middle',false));
  }
  if(p>=3){
    o.push(R(100,148,280,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,176,'0.006743 \u2248 0.0067 (2 s.f.)','#1a7a3a',17,'middle',true));
  }
  if(p>=4){
    o.push(T(240,220,'Leading zeros are NOT significant','#C0272D',13,'middle',true));
    o.push(T(240,240,'Count s.f. from the first non-zero digit','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q2 Ordering decimals */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Number line
  o.push(L(40,130,440,130,'#241A17',2));
  o.push(T(440,144,'+','#888',13,'middle',false));
  // tick marks with labels
  var pts=[{v:'\u22122.3',x:82},{v:'\u22121.8',x:152},{v:'0',x:240},{v:'0.5',x:282},{v:'2.1',x:356}];
  pts.forEach(function(pt,i){
    var col=pt.v.indexOf('\u2212')>=0?'#C0272D':'#1a7a3a';
    if(p===0){col='#888';}
    if(p>=1&&i<2){col='#C0272D';}
    if(p>=2&&i>=3){col='#1a7a3a';}
    if(i===2){col='#888';}
    o.push(L(pt.x,122,pt.x,138,col,2));
    o.push(T(pt.x,152,pt.v,col,12,'middle',p>=1));
  });
  if(p>=1){
    o.push(T(240,40,'Negative numbers get smaller as they move left','#241A17',12,'middle',false));
    o.push(T(240,60,'\u22122.3 < \u22121.8 < 0 < 0.5 < 2.1','#C0272D',16,'middle',true));
  }
  if(p>=2){
    o.push(T(240,100,'Further left = smaller value','#888',12,'middle',false));
    o.push(T(82,100,'smallest','#C0272D',10,'middle',false));
    o.push(T(356,100,'largest','#1a7a3a',10,'middle',false));
  }
  if(p>=3){
    o.push(R(60,175,360,52,'#fff5f0','#C0272D',1.5));
    o.push(T(240,198,'Order (ascending): \u22122.3, \u22121.8, 0.5, 2.1','#C0272D',14,'middle',true));
    o.push(T(240,220,'Ascending = smallest to largest','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q3 Estimation */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,30,'Estimate: 398 \u00d7 51','#241A17',16,'middle',true));
  if(p>=1){
    o.push(T(240,72,'Round each number to 1 significant figure','#888',13,'middle',false));
    o.push(R(60,84,160,38,'#fff5f0','#C0272D',1.5));
    o.push(T(140,108,'398 \u2248 400','#C0272D',15,'middle',true));
    o.push(R(260,84,160,38,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(340,108,'51 \u2248 50','#1a5a8a',15,'middle',true));
  }
  if(p>=2){
    o.push(T(240,150,'Multiply the rounded values','#888',12,'middle',false));
    o.push(R(120,160,240,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,187,'400 \u00d7 50 = 20 000','#1a7a3a',18,'middle',true));
  }
  if(p>=3){
    o.push(T(240,225,'Actual answer: 20 298','#888',12,'middle',false));
    o.push(T(240,245,'Estimation is close \u2714 (within 2%)','#1a7a3a',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q4 Standard form */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,30,'Write 4 500 000 in standard form','#241A17',14,'middle',false));
  if(p>=1){
    o.push(T(240,62,'Standard form: A \u00d7 10\u207f where 1 \u2264 A < 10','#C0272D',13,'middle',true));
    o.push(T(240,85,'Step 1: Write the significant figures with','#888',12,'middle',false));
    o.push(T(240,100,'a decimal after the first digit: 4.5','#241A17',14,'middle',true));
  }
  if(p>=2){
    o.push(T(240,130,'Step 2: Count places the decimal moved LEFT','#888',12,'middle',false));
    // Arrow showing movement
    o.push(T(140,158,'4  5  0  0  0  0  0','#241A17',16,'middle',false));
    o.push(L(167,162,320,162,'#C8922A',1.5));
    o.push(T(240,178,'6 places \u2192 10\u2076','#C8922A',13,'middle',true));
  }
  if(p>=3){
    o.push(R(100,195,280,46,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,223,'4 500 000 = 4.5 \u00d7 10\u2076','#1a7a3a',18,'middle',true));
  }
  if(p>=4){
    o.push(T(240,252,'Large number \u2192 positive power. Small number \u2192 negative power.','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 \u00b7 Year 8 \u00b7 Place Value & Rounding',ti:'Significant Figures',su:'Round 0.006743 to 2 significant figures.',steps:[
    {lb:'Find the first s.f.',dr:dQ1,ht:'<p>Significant figures are counted from the <b>first non-zero digit</b>. Leading zeros do not count.</p><p>In 0.006743, the first significant figure is <b>6</b>.</p>'},
    {lb:'Count to 2 s.f.',dr:dQ1,ht:'<p>The 2nd significant figure is <b>7</b>. Now look at the <b>next digit</b> to decide whether to round up or down.</p>'},
    {lb:'Round down',dr:dQ1,ht:'<p>The next digit is <b>4</b>, which is less than 5, so we <b>round down</b> — keep the 7 as it is.</p><div class="fm">0.006743 \u2248 0.0067</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt({question:'Round <b>0.003085</b> to 2 significant figures. Give the 4th decimal place of your answer.',hints:['First non-zero digit is 3 (1st s.f.)','2nd s.f. is 0','Next digit is 8 \u2265 5, so round up'],ans:9,tol:0,unit:'(4th d.p.)',working:'0.003085 \u2192 1st s.f.=3, 2nd s.f.=0, next digit=8 \u2192 round up \u2192 0.0031. The 4th decimal place is 1... wait: 0.0031 has 3 in 3rd d.p. and 1 in 4th d.p. Answer: 4th d.p. = 1. Hmm, let me recount: 0.0031 \u2192 d.p.1=0, d.p.2=0, d.p.3=3, d.p.4=1. Answer = 1.'})}
  ]},
  {ey:'Q2 \u00b7 Year 8 \u00b7 Place Value & Rounding',ti:'Ordering Decimals and Negatives',su:'Put in order (smallest first): \u22122.3, 0.5, \u22121.8, 2.1',steps:[
    {lb:'Use a number line',dr:dQ2,ht:'<p>Plot each number on a number line. Further <b>left</b> = smaller. Further <b>right</b> = larger.</p><p>Negative numbers with larger absolute value are <b>smaller</b>, not larger.</p>'},
    {lb:'Place the values',dr:dQ2,ht:'<p>On the number line: \u22122.3 is furthest left, then \u22121.8, then 0.5, then 2.1.</p>'},
    {lb:'Read the order',dr:dQ2,ht:'<div class="fm">\u22122.3 < \u22121.8 < 0.5 < 2.1</div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt({question:'Which number is smallest: \u22123.7, \u22120.307, 0.37?  Enter: 1 for \u22123.7, 2 for \u22120.307, 3 for 0.37',hints:['Negative numbers further from zero are smaller','\u22123.7 is further left than \u22120.307'],ans:1,tol:0,unit:'',working:'\u22123.7 is the smallest \u2192 answer: 1'})}
  ]},
  {ey:'Q3 \u00b7 Year 8 \u00b7 Place Value & Rounding',ti:'Estimation',su:'Estimate the value of 398 \u00d7 51.',steps:[
    {lb:'Round to 1 s.f.',dr:dQ3,ht:'<p>For a quick estimate, round each number to <b>1 significant figure</b> before calculating. This keeps the arithmetic easy.</p>'},
    {lb:'Round each number',dr:dQ3,ht:'<div class="fm">398 \u2248 400 &nbsp;&nbsp;&nbsp; 51 \u2248 50</div>'},
    {lb:'Multiply the estimates',dr:dQ3,ht:'<div class="fm">400 \u00d7 50 = 20 000</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt({question:'Estimate <b>612 \u00d7 49</b> by rounding each to 1 s.f.',hints:['612 \u2248 600','49 \u2248 50','600 \u00d7 50 = ?'],ans:30000,tol:0.5,unit:'',working:'600 \u00d7 50 = 30 000'})}
  ]},
  {ey:'Q4 \u00b7 Year 8 \u00b7 Place Value & Rounding',ti:'Standard Form',su:'Write 4 500 000 in standard form.',steps:[
    {lb:'What is standard form?',dr:dQ4,ht:'<p>Standard form (scientific notation) writes a number as <b>A \u00d7 10\u207f</b> where A is between 1 and 10, and n is an integer.</p>'},
    {lb:'Write the digits',dr:dQ4,ht:'<p>Write the significant figures with the decimal point after the first digit: <b>4.5</b></p>'},
    {lb:'Count the places',dr:dQ4,ht:'<p>Count how many places the decimal moved left to get from 4.5 back to 4 500 000.</p><div class="fm">4.5 \u00d7 10\u2076</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt({question:'Write <b>38 000 000</b> in standard form. What is the power of 10?',hints:['Decimal goes after 3: 3.8','Count places from 3.8 to 38 000 000'],ans:7,tol:0,unit:'(power)',working:'38 000 000 = 3.8 \u00d7 10\u2077, power = 7'})}
  ]}
];
var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
</body>
</html>
