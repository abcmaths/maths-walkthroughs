<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Percentages - Year 11 IGCSE</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.nq-btn:hover{background:var(--gold);color:#fff;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}

@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Percentages — Year 11 IGCSE</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn'
    +' <button class="nq-btn" data-tryid="'+id+'">↻ New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar">'
    +'<input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'
    +'<div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid');
    var en=ST[id]; if(!en)return;
    var o=en.fn(); en.o=o; ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var en=ST[id]; if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct!  '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}


function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Finding a percentage: 35% of 240','#C0272D',13,'middle',true));
  var methods=[
    {label:'Method 1: decimal multiplier',val:'0.35 \u00d7 240 = 84'},
    {label:'Method 2: fraction',val:'35/100 \u00d7 240 = 84'},
    {label:'Method 3: build up',val:'10%=24, 5%=12, 35%=3\u00d724+12=84'}
  ];
  methods.forEach(function(m,i){
    if(p>=i+1){
      o.push(R(28,58+i*56,424,46,'#f8f8f8','#1a5a8a',1.5));
      o.push(T(48,80+i*56,m.label,'#1a5a8a',11,'start',true));
      o.push(T(48,96+i*56,m.val,'#241A17',13,'start',false));
    }
  });
  if(p>=4){o.push(R(130,226,220,26,'#e8f8ee','#1a7a3a',2));o.push(T(240,243,'35% of 240 = 84','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Percentage increase and decrease','#C0272D',13,'middle',true));
  // Bar showing original and new value
  var bx=30,by=80,bw=300,bh=40;
  o.push(R(bx,by,bw,bh,'#e8f4ff','#1a5a8a',2));
  o.push(T(bx+bw/2,by+bh/2+5,'Original: \u00a3200','#1a5a8a',13,'middle',true));
  if(p>=1){
    // Increase by 15%: new = 200*1.15 = 230
    var newW=bw*1.15;
    o.push(R(bx,by+52,Math.min(newW,424),bh,'#e8f8ee','#1a7a3a',2));
    o.push(T(bx+Math.min(newW,424)/2,by+52+bh/2+5,'New: \u00a3200\u00d71.15 = \u00a3230 (+15%)','#1a7a3a',12,'middle',true));
  }
  if(p>=2){
    o.push(R(bx,by+112,bw*0.80,bh,'#fce8d8','#C0272D',2));
    o.push(T(bx+bw*0.40,by+112+bh/2+5,'After \u221220%: \u00a3200\u00d70.80=\u00a3160','#C0272D',12,'middle',true));
  }
  if(p>=3){
    o.push(R(14,202,452,50,'#fffbe8','#C8922A',1.5));
    o.push(T(240,220,'Increase by r%: multiply by (1 + r/100)','#C8922A',12,'middle',true));
    o.push(T(240,240,'Decrease by r%: multiply by (1 \u2212 r/100)','#C8922A',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Reverse percentage: price after 20% increase = \u00a3360','#C0272D',12,'middle',true));
  var steps=[
    '\u00a3360 = 120% of original price',
    '1% = \u00a3360 \u00f7 120 = \u00a33',
    'Original = 100% = \u00a33 \u00d7 100 = \u00a3300'
  ];
  steps.forEach(function(st,i){
    if(p>=i+1){
      o.push(R(28,62+i*54,424,44,'#f8f8f8','#1a5a8a',1+(i===2?0.5:0)));
      o.push(T(48,88+i*54,st,i===2?'#1a7a3a':'#241A17',i===2?15:13,'start',i===2));
    }
  });
  if(p>=4){o.push(R(14,224,452,30,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,243,'Original price = \u00a3300','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Compound interest: \u00a31000 at 5% p.a. for 3 years','#C0272D',12,'middle',true));
  var rows=[['Year 1','1000 \u00d7 1.05','1050.00'],['Year 2','1050 \u00d7 1.05','1102.50'],['Year 3','1102.50 \u00d7 1.05','1157.63']];
  rows.forEach(function(r,i){
    if(p>=i+1){
      ['#fce8d8','#fff5e0','#e8f8ee'].forEach(function(fill,ci){
        o.push(R(28+ci*148,62+i*46,144,38,fill,'#888',1));
        o.push(T(100+ci*148,85+i*46,r[ci],'#241A17',ci===2?12:11,'middle',ci===2));
      });
    }
  });
  if(p>=4){
    o.push(R(14,202,452,50,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,222,'Formula: A = P(1 + r/100)\u207f','#1a5a8a',13,'middle',true));
    o.push(T(240,244,'A = 1000(1.05)\u00b3 = \u00a31157.63','#1a5a8a',13,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Expressing as a percentage: 18 out of 24','#C0272D',13,'middle',true));
  var steps=['18/24 \u00d7 100','= 0.75 \u00d7 100','= 75%'];
  steps.forEach(function(st,i){
    if(p>=i+1){o.push(R(130,62+i*52,220,42,i===2?'#e8f8ee':'#f8f8f8',i===2?'#1a7a3a':'#888',i===2?2:1));
    o.push(T(240,87+i*52,st,i===2?'#1a7a3a':'#241A17',i===2?18:14,'middle',i===2));}
  });
  if(p>=4){o.push(T(240,228,'Percentage change = (change \u00f7 original) \u00d7 100','#C8922A',12,'middle',false));}
  s.innerHTML=o.join('');
}


var QS=[
  {ey:'Q1 \u00b7 Percentages \u00b7 IGCSE',ti:'Finding a Percentage of an Amount',su:'Calculate 35% of 240.',lv:'F',steps:[
    {lb:'Three methods',dr:dQ1,ht:'<p>There are three reliable methods for finding a percentage of an amount. The <b>decimal multiplier</b> is fastest.</p>'},
    {lb:'Method 1: Decimal',dr:dQ1,ht:'<div class="fm">35% = 0.35<br>0.35 \u00d7 240 = 84</div>'},
    {lb:'Method 2: Fraction',dr:dQ1,ht:'<div class="fm">35/100 \u00d7 240 = 8400/100 = 84</div>'},
    {lb:'Method 3: Build up',dr:dQ1,ht:'<div class="fm">10% of 240 = 24<br>5% = 12<br>35% = 3\u00d724 + 12 = 84</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){
      var percs=[5,10,15,20,25,30,35,40,45,50,60,70,75,80];
      var pc=pick(percs); var amts=[80,120,160,200,240,300,400,500];
      var amt=pick(amts); var ans=pc*amt/100;
      return {question:'Calculate <b>'+pc+'% of '+amt+'</b>.',
        hints:['Convert: '+pc+'% = '+(pc/100),'Multiply: '+(pc/100)+' \u00d7 '+amt],
        ans:ans,tol:0.01,unit:'',working:pc+'% of '+amt+' = '+(pc/100)+'\u00d7'+amt+' = '+ans};
    })}
  ]},
  {ey:'Q2 \u00b7 Percentages \u00b7 IGCSE',ti:'Percentage Increase and Decrease',su:'Increase \u00a3200 by 15%. Decrease \u00a3200 by 20%.',lv:'F',steps:[
    {lb:'Multiplier method',dr:dQ2,ht:'<p>Use a <b>multiplier</b>: add the % to 100 (increase) or subtract from 100 (decrease), then divide by 100.</p>'},
    {lb:'Increase by 15%',dr:dQ2,ht:'<div class="fm">Multiplier = 1 + 0.15 = 1.15<br>\u00a3200 \u00d7 1.15 = \u00a3230</div>'},
    {lb:'Decrease by 20%',dr:dQ2,ht:'<div class="fm">Multiplier = 1 \u2212 0.20 = 0.80<br>\u00a3200 \u00d7 0.80 = \u00a3160</div>'},
    {lb:'The rule',dr:dQ2,ht:'<div class="fm">Increase r%: \u00d7 (1 + r/100)<br>Decrease r%: \u00d7 (1 \u2212 r/100)</div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){
      var pc=pick([5,10,12,15,20,25,30]);
      var amt=pick([80,120,150,200,250,300,400,500]);
      var isInc=pick([true,false]);
      var ans=isInc?amt*(1+pc/100):amt*(1-pc/100);
      return {question:(isInc?'Increase':'Decrease')+' \u00a3'+amt+' by '+pc+'%.',
        hints:['Multiplier = '+(isInc?'1 + ':'1 \u2212 ')+(pc/100),''+amt+' \u00d7 '+(isInc?1+pc/100:1-pc/100)],
        ans:Math.round(ans*100)/100,tol:0.01,unit:'\u00a3',
        working:amt+'\u00d7'+(isInc?1+pc/100:1-pc/100)+' = '+Math.round(ans*100)/100};
    })}
  ]},
  {ey:'Q3 \u00b7 Percentages \u00b7 IGCSE',ti:'Reverse Percentage',su:'A price after a 20% increase is \u00a3360. Find the original price.',lv:'E',steps:[
    {lb:'The concept',dr:dQ3,ht:'<p>After a 20% increase, the new price is <b>120%</b> of the original. We are given the result, so we work backwards.</p>'},
    {lb:'Set up',dr:dQ3,ht:'<div class="fm">120% = \u00a3360<br>1% = \u00a3360 \u00f7 120 = \u00a33</div>'},
    {lb:'Find original',dr:dQ3,ht:'<div class="fm">100% = \u00a33 \u00d7 100 = \u00a3300</div>'},
    {lb:'Or use the multiplier',dr:dQ3,ht:'<div class="fm">Original = 360 \u00f7 1.20 = \u00a3300</div><p>Dividing by the multiplier reverses the percentage change.</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){
      var pc=pick([10,15,20,25,30]); var orig=pick([100,120,150,200,250]);
      var after=Math.round(orig*(1+pc/100));
      return {question:'After a '+pc+'% increase the price is \u00a3'+after+'. Find the original price.',
        hints:['The new price is '+(100+pc)+'% of original','\u00a3'+after+' \u00f7 '+(1+pc/100)],
        ans:orig,tol:0.5,unit:'\u00a3',working:after+'\u00f7'+(1+pc/100)+' = '+orig};
    })}
  ]},
  {ey:'Q4 \u00b7 Percentages \u00b7 IGCSE',ti:'Compound Interest',su:'\u00a31000 invested at 5% per annum compound interest for 3 years.',lv:'E',steps:[
    {lb:'Simple vs compound',dr:dQ4,ht:'<p><b>Simple interest</b> applies only to the principal. <b>Compound interest</b> applies to the growing total each year \u2014 interest earns interest.</p>'},
    {lb:'Year by year',dr:dQ4,ht:'<div class="fm">Year 1: 1000 \u00d7 1.05 = 1050<br>Year 2: 1050 \u00d7 1.05 = 1102.50<br>Year 3: 1102.50 \u00d7 1.05 = 1157.63</div>'},
    {lb:'Formula',dr:dQ4,ht:'<div class="fm">A = P(1 + r/100)\u207f</div><div class="fm">A = 1000(1.05)\u00b3 = 1157.63</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){
      var P=pick([500,800,1000,1200,2000]);
      var r=pick([2,3,4,5,6,8,10]);
      var n=pick([2,3,4]);
      var ans=Math.round(P*Math.pow(1+r/100,n)*100)/100;
      return {question:'\u00a3'+P+' invested at '+r+'% compound interest for '+n+' year'+(n>1?'s':'')+'. Find the total amount.',
        hints:['A = P(1 + r/100)\u207f','= '+P+'\u00d7('+( 1+r/100)+')\u207f','Calculate to 2 d.p.'],
        ans:ans,tol:0.05,unit:'\u00a3',working:''+P+'\u00d7('+( 1+r/100)+')\u207f = \u00a3'+ans};
    })}
  ]},
  {ey:'Q5 \u00b7 Percentages \u00b7 IGCSE',ti:'Expressing as a Percentage / Percentage Change',su:'Express 18 out of 24 as a percentage. Find the % change from 80 to 100.',lv:'F',steps:[
    {lb:'Part as % of whole',dr:dQ5,ht:'<div class="fm">18 \u00f7 24 \u00d7 100 = 75%</div><p>Divide the part by the whole, then multiply by 100.</p>'},
    {lb:'Percentage change',dr:dQ5,ht:'<div class="fm">Change = 100 \u2212 80 = 20<br>% change = 20 \u00f7 80 \u00d7 100 = 25%</div>'},
    {lb:'The formula',dr:dQ5,ht:'<div class="fm">% change = (new \u2212 old) \u00f7 old \u00d7 100</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){
      var old_v=pick([40,50,60,80,100,120,150]);
      var pcs=[5,10,15,20,25,30,40,50];
      var pc=pick(pcs);
      var new_v=old_v+Math.round(old_v*pc/100);
      var ans=Math.round((new_v-old_v)/old_v*100*10)/10;
      return {question:'Find the percentage change from '+old_v+' to '+new_v+'.',
        hints:['Change = '+new_v+' \u2212 '+old_v+' = '+(new_v-old_v),'Divide by original: '+(new_v-old_v)+' \u00f7 '+old_v,'\u00d7 100'],
        ans:ans,tol:0.1,unit:'%',working:'('+(new_v-old_v)+')/'+old_v+'\u00d7100 = '+ans+'%'};
    })}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
