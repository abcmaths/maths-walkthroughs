<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Angles &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.newq-btn{float:right;font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.newq-btn:hover{background:var(--gold);color:#fff;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Angles &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +(h?'<ul class="hl">'+h+'</ul>':'')
    +'<div class="ar">'
    +'<input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'
    +'<div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid');
    var o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! '+o.working;
    }else{
      fb.className='try-fb fb er';fb.textContent='Not quite \u2014 try again.';
    }
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}
function arc(cx,cy,r,a1,a2,c,w){var r1=a1*Math.PI/180,r2=a2*Math.PI/180;var x1=cx+r*Math.cos(r1),y1=cy-r*Math.sin(r1),x2=cx+r*Math.cos(r2),y2=cy-r*Math.sin(r2);var laf=((a2-a1+360)%360)>180?1:0;return '<path d="M '+x1.toFixed(1)+','+y1.toFixed(1)+' A '+r+','+r+' 0 '+laf+',0 '+x2.toFixed(1)+','+y2.toFixed(1)+'" fill="none" stroke="'+(c||'#C8922A')+'" stroke-width="'+(w||1.5)+'" />';}

/* Q1: Alternate angles */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Two parallel lines
  o.push(L(40,90,440,90,'#241A17',2.5));
  o.push(L(40,180,'440','180','#241A17',2.5));
  // Arrow marks
  o.push(T(400,84,'\u203a','#241A17',18,'middle',true));
  o.push(T(400,175,'\u203a','#241A17',18,'middle',true));
  // Transversal
  o.push(L(140,20,300,240,'#555',2));
  // Intersection points approx
  var x1=176,y1=90,x2=244,y2=180;
  if(p>=1){
    // Alternate angle at top (below-left of upper intersection)
    o.push(arc(x1,y1,38,200,250,'#C0272D',2.5));
    o.push(T(x1-46,y1+30,'65\u00b0','#C0272D',14,'middle',true));
  }
  if(p>=2){
    // Z-shape highlight
    o.push(L(x1-18,y1+36,x2+18,y2-36,'#C8922A',1,'6,3'));
    o.push(T(212,135,'Z','#C8922A',20,'middle',true));
  }
  if(p>=3){
    // Alternate angle at bottom (above-right of lower intersection)
    o.push(arc(x2,y2,38,20,70,'#1a5a8a',2.5));
    o.push(T(x2+46,y2-30,'65\u00b0','#1a5a8a',14,'middle',true));
  }
  if(p>=4){
    o.push(T(240,248,'Alternate angles are equal (Z-angles)','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q2: Corresponding angles */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(L(40,90,440,90,'#241A17',2.5));
  o.push(L(40,180,440,180,'#241A17',2.5));
  o.push(T(400,84,'\u203a','#241A17',18,'middle',true));
  o.push(T(400,175,'\u203a','#241A17',18,'middle',true));
  o.push(L(140,20,300,240,'#555',2));
  var x1=176,y1=90,x2=244,y2=180;
  if(p>=1){
    o.push(arc(x1,y1,38,250,360,'#C0272D',2.5));
    o.push(T(x1+46,y1+22,'112\u00b0','#C0272D',13,'middle',true));
    o.push(T(x1-20,y1-28,'F-shape','#C8922A',11,'middle',false));
  }
  if(p>=2){
    o.push(L(x1-20,y1-20,x2+20,y2+20,'#C8922A',1,'6,3'));
    o.push(L(x1-20,y1+8,x1+30,y1+8,'#C8922A',1,'6,3'));
    o.push(L(x2-20,y2+8,x2+30,y2+8,'#C8922A',1,'6,3'));
  }
  if(p>=3){
    o.push(arc(x2,y2,38,250,360,'#1a5a8a',2.5));
    o.push(T(x2+46,y2+22,'112\u00b0','#1a5a8a',13,'middle',true));
  }
  if(p>=4){
    o.push(T(240,248,'Corresponding angles are equal (F-angles)','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q3: Co-interior angles */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(L(40,90,440,90,'#241A17',2.5));
  o.push(L(40,180,440,180,'#241A17',2.5));
  o.push(T(400,84,'\u203a','#241A17',18,'middle',true));
  o.push(T(400,175,'\u203a','#241A17',18,'middle',true));
  o.push(L(140,20,300,240,'#555',2));
  var x1=176,y1=90,x2=244,y2=180;
  if(p>=1){
    o.push(arc(x1,y1,40,250,360,'#C0272D',2.5));
    o.push(T(x1+48,y1+24,'a','#C0272D',16,'middle',true));
  }
  if(p>=2){
    o.push(arc(x2,y2,40,180,250,'#1a5a8a',2.5));
    o.push(T(x2-42,y2-28,'b','#1a5a8a',16,'middle',true));
    o.push(T(215,136,'C','#C8922A',20,'middle',true));
  }
  if(p>=3){
    o.push(T(240,30,'a + b = 180\u00b0   (co-interior / C-angles)','#C0272D',14,'middle',true));
    o.push(T(240,52,'They are supplementary \u2014 they add to 180\u00b0','#888',12,'middle',false));
  }
  if(p>=4){
    o.push(T(240,248,'Co-interior angles add to 180\u00b0 (same side of transversal)','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q4: Interior angles of polygon */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Draw a pentagon
  var cx=160,cy=135,r=90,n=5;
  var pts=[];
  for(var i=0;i<n;i++){var a=(i*2*Math.PI/n)-Math.PI/2;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  o.push('<polygon points="'+pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ')+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){
    o.push(T(cx,cy,'Pentagon','#C0272D',13,'middle',true));
    o.push(T(cx,cy+18,'n = 5','#888',11,'middle',false));
  }
  if(p>=2){
    o.push(T(340,80,'Sum of interior angles:','#241A17',13,'start',false));
    o.push(T(340,100,'(n \u2212 2) \u00d7 180\u00b0','#C0272D',15,'start',true));
    o.push(T(340,124,'= (5 \u2212 2) \u00d7 180','#241A17',13,'start',false));
    o.push(T(340,144,'= 3 \u00d7 180','#241A17',13,'start',false));
    o.push(T(340,168,'= 540\u00b0','#C0272D',18,'start',true));
  }
  if(p>=3){
    // 9-sided shape worked example
    o.push(T(340,200,'9-sided: (9\u22122)\u00d7180','#1a5a8a',12,'start',false));
    o.push(T(340,218,'= 7 \u00d7 180 = 1260\u00b0','#1a5a8a',14,'start',true));
  }
  if(p>=4){
    o.push(T(240,248,'Formula: (n \u2212 2) \u00d7 180\u00b0 for any polygon','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q5: Exterior angles */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Regular hexagon
  var cx=180,cy=135,r=85,n=6;
  var pts=[];
  for(var i=0;i<n;i++){var a=(i*2*Math.PI/n)-Math.PI/2;pts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  o.push('<polygon points="'+pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ')+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){
    // Extend one side to show exterior angle
    var p0=pts[0],p1=pts[1];
    var dx=p1[0]-p0[0],dy=p1[1]-p0[1];
    o.push(L(p1[0],p1[1],p1[0]+dx*0.6,p1[1]+dy*0.6,'#1a5a8a',2,''));
    o.push(arc(p1[0],p1[1],36,260,320,'#1a5a8a',2));
    o.push(T(p1[0]+44,p1[1]-10,'ext.','#1a5a8a',11,'middle',false));
    o.push(T(p1[0]+44,p1[1]+4,'angle','#1a5a8a',11,'middle',false));
  }
  if(p>=2){
    o.push(T(360,70,'Exterior angle of','#241A17',13,'start',false));
    o.push(T(360,88,'regular polygon:','#241A17',13,'start',false));
    o.push(T(360,112,'360\u00b0 \u00f7 n','#C0272D',16,'start',true));
    o.push(T(360,136,'Hexagon (n=6):','#241A17',12,'start',false));
    o.push(T(360,154,'360 \u00f7 6 = 60\u00b0','#C0272D',15,'start',true));
  }
  if(p>=3){
    o.push(T(360,185,'Interior + exterior','#888',12,'start',false));
    o.push(T(360,201,'= 180\u00b0 always','#888',12,'start',false));
    o.push(T(360,221,'Interior = 180\u221260 = 120\u00b0','#1a5a8a',13,'start',true));
  }
  if(p>=4){
    o.push(T(240,248,'All exterior angles of any polygon sum to 360\u00b0','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 \u00b7 Year 8 \u00b7 Angles',ti:'Alternate Angles',su:'Two parallel lines are cut by a transversal. One angle is 65\u00b0. Find the alternate angle.',steps:[
    {lb:'Parallel lines & transversal',dr:dQ1,ht:'<p>When a <b>transversal</b> crosses two parallel lines it creates several pairs of angles. The arrow marks on the lines show they are parallel.</p>'},
    {lb:'Spot the Z-shape',dr:dQ1,ht:'<p>Alternate angles sit on <b>opposite sides</b> of the transversal, between the parallel lines. They form a Z (or N) shape.</p>'},
    {lb:'The alternate angle',dr:dQ1,ht:'<div class="fm">Alternate angle = 65\u00b0</div><p>Alternate angles are always <b>equal</b>.</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt({question:'Two parallel lines are cut by a transversal. One alternate angle is <b>73\u00b0</b>. Find the other alternate angle.',hints:['Alternate angles are equal','No calculation needed'],ans:73,tol:0.5,unit:'\u00b0',working:'Alternate angles are equal \u2192 73\u00b0'})}
  ]},
  {ey:'Q2 \u00b7 Year 8 \u00b7 Angles',ti:'Corresponding Angles',su:'A transversal crosses two parallel lines. One angle is 112\u00b0. Find the corresponding angle.',steps:[
    {lb:'Corresponding angles',dr:dQ2,ht:'<p>Corresponding angles are on the <b>same side</b> of the transversal, one at each parallel line. They form an F-shape.</p>'},
    {lb:'The F-shape',dr:dQ2,ht:'<p>Find the F: the two angles sit in matching positions at their respective intersections.</p>'},
    {lb:'Equal angles',dr:dQ2,ht:'<div class="fm">Corresponding angle = 112\u00b0</div><p>Corresponding angles are always <b>equal</b> when lines are parallel.</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt({question:'A corresponding angle to one of <b>58\u00b0</b> is formed when a transversal crosses two parallel lines. What is its size?',hints:['Corresponding angles are equal (F-angles)'],ans:58,tol:0.5,unit:'\u00b0',working:'Corresponding angles are equal \u2192 58\u00b0'})}
  ]},
  {ey:'Q3 \u00b7 Year 8 \u00b7 Angles',ti:'Co-interior Angles',su:'Two co-interior angles are (3x + 10)\u00b0 and (2x + 20)\u00b0. Find x and both angles.',steps:[
    {lb:'Co-interior (C-angles)',dr:dQ3,ht:'<p>Co-interior angles (also called allied or same-side interior angles) are <b>between</b> the parallel lines on the <b>same side</b> of the transversal. They form a C-shape.</p>'},
    {lb:'They add to 180\u00b0',dr:dQ3,ht:'<div class="fm">Co-interior angles add to 180\u00b0</div><p>Unlike alternate and corresponding, these are <b>supplementary</b>, not equal.</p>'},
    {lb:'Set up the equation',dr:dQ3,ht:'<div class="fm">(3x + 10) + (2x + 20) = 180</div><div class="fm">5x + 30 = 180</div><div class="fm">x = 30</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt({question:'Two co-interior angles are <b>(4x + 5)\u00b0</b> and <b>(3x + 15)\u00b0</b>. Find x.',hints:['Co-interior angles add to 180\u00b0','4x + 5 + 3x + 15 = 180','7x + 20 = 180'],ans:23,tol:0.5,unit:'',working:'7x + 20 = 180 \u2192 7x = 160 \u2192 x \u2248 22.9 \u2248 23'})}
  ]},
  {ey:'Q4 \u00b7 Year 8 \u00b7 Angles',ti:'Interior Angles of a Polygon',su:'Find the sum of interior angles of a 9-sided polygon.',steps:[
    {lb:'The formula',dr:dQ4,ht:'<p>The interior angles of any polygon add up to a fixed total that depends only on the number of sides.</p><div class="fm">Sum = (n \u2212 2) \u00d7 180\u00b0</div>'},
    {lb:'Why it works',dr:dQ4,ht:'<p>Any polygon can be cut into triangles from one vertex. An n-sided shape makes (n\u22122) triangles, each with 180\u00b0.</p>'},
    {lb:'Apply to 9 sides',dr:dQ4,ht:'<div class="fm">(9 \u2212 2) \u00d7 180 = 7 \u00d7 180 = 1260\u00b0</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt({question:'Find the sum of interior angles of a <b>12-sided polygon</b>.',hints:['Use (n \u2212 2) \u00d7 180\u00b0','n = 12'],ans:1800,tol:0.5,unit:'\u00b0',working:'(12 \u2212 2) \u00d7 180 = 10 \u00d7 180 = 1800\u00b0'})}
  ]},
  {ey:'Q5 \u00b7 Year 8 \u00b7 Angles',ti:'Exterior Angles of a Regular Polygon',su:'Find the exterior angle and interior angle of a regular hexagon.',steps:[
    {lb:'Exterior angles',dr:dQ5,ht:'<p>An <b>exterior angle</b> is formed by extending one side of the polygon. For a <b>regular</b> polygon all exterior angles are equal and they always sum to 360\u00b0.</p>'},
    {lb:'The formula',dr:dQ5,ht:'<div class="fm">Each exterior angle = 360\u00b0 \u00f7 n</div><p>For a regular hexagon (n = 6): 360 \u00f7 6 = <b>60\u00b0</b></p>'},
    {lb:'Find the interior angle',dr:dQ5,ht:'<div class="fm">Interior = 180\u00b0 \u2212 exterior</div><div class="fm">= 180 \u2212 60 = 120\u00b0</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt({question:'Each exterior angle of a regular polygon is <b>24\u00b0</b>. How many sides does it have?',hints:['Exterior angle = 360 \u00f7 n','Rearrange: n = 360 \u00f7 exterior angle'],ans:15,tol:0,unit:'sides',working:'n = 360 \u00f7 24 = 15 sides'})}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
