<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Probability &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;}
.f{background:#1a5a8a;color:#fff;}.e{background:#C0272D;color:#fff;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Probability &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function frac(n,d){var g=gcd(n,d);return (n/g)+'/'+(d/g);}

var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.01)){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — try again.';}
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

// ── Worked-example data ──
var q1={r:5,b:3,g:2,tot:10};  // bag of marbles
var q2={heads:18,tails:12,tot:30};  // coin experiment
// Spinner: 4 equal sections
var q3={sections:['Red','Blue','Green','Yellow'],counts:[3,2,2,1],tot:8};
// Two-way table: pets
var q4={dogs:8,cats:6,fish:4,tot:18};
// Listing outcomes: two coins
var q5={};  // no random needed, fixed
// Mutually exclusive
var q6={pa:0.3,pb:0.25};
// Expected frequency
var q7={p:0.4,n:200};
// Sample space diagram: two dice
var q8={};
// Tree diagram: bag draw twice (with replacement)
var q9={r:3,b:2,tot:5};
// Venn diagram: two events
var q10={a:12,b:8,both:3,tot:30};

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(L(30,85,450,85,'#241A17',2));
  o.push(T(30,100,'0','#241A17',12,'middle',true));o.push(T(240,100,'0.5','#241A17',12,'middle',true));o.push(T(450,100,'1','#241A17',12,'middle',true));
  o.push(L(30,78,30,92,'#241A17',2));o.push(L(240,78,240,92,'#241A17',2));o.push(L(450,78,450,92,'#241A17',2));
  o.push(T(30,70,'Impossible','#C0272D',10,'middle',false));o.push(T(240,70,'Even chance','#C8922A',10,'middle',false));o.push(T(450,70,'Certain','#1a7a3a',10,'middle',false));
  if(p>=1){
    o.push('<circle cx="240" cy="175" r="62" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
    o.push(T(240,148,'Bag','#888',11,'middle',false));
    o.push(T(240,166,q1.r+' red','#C0272D',13,'middle',true));
    o.push(T(240,182,q1.b+' blue','#1a5a8a',13,'middle',true));
    o.push(T(240,198,q1.g+' green','#1a7a3a',13,'middle',true));
    o.push(T(240,220,'Total = '+q1.tot,'#888',12,'middle',false));
  }
  if(p>=2){o.push(T(90,240,'P(blue) = '+q1.b+'/'+q1.tot+' = '+(q1.b/q1.tot).toFixed(2),'#1a5a8a',13,'middle',true));}
  if(p>=3){o.push(T(340,240,'P(not green) = '+(q1.tot-q1.g)+'/'+q1.tot,'#C0272D',13,'middle',true));}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(20,20,440,30,'#C0272D','#C0272D',1));
  o.push(T(100,40,'Outcome','#fff',12,'middle',true));o.push(T(220,40,'Frequency','#fff',12,'middle',true));o.push(T(340,40,'Rel. Freq.','#fff',12,'middle',true));o.push(T(440,40,'Theoretical','#fff',12,'middle',true));
  var rows=[{out:'Heads',freq:q2.heads,rel:(q2.heads/q2.tot).toFixed(2),th:'0.50'},{out:'Tails',freq:q2.tails,rel:(q2.tails/q2.tot).toFixed(2),th:'0.50'}];
  rows.forEach(function(r,i){
    if(p>=i+1){
      var y=58+i*36;
      o.push(R(20,y,440,34,i===0?'#fff5f0':'#fff','#E4D6CE',1));
      o.push(T(100,y+22,r.out,'#241A17',12,'middle',false));
      o.push(T(220,y+22,r.freq,'#241A17',12,'middle',false));
      o.push(T(340,y+22,r.rel,'#C0272D',12,'middle',true));
      o.push(T(440,y+22,r.th,'#1a5a8a',12,'middle',false));
    }
  });
  if(p>=3){o.push(T(240,152,'Rel. freq. ≠ theoretical → possible bias, or too few trials','#C8922A',11,'middle',true));}
  if(p>=4){o.push(T(240,175,'More trials → experimental prob. approaches theoretical','#888',11,'middle',false));
    o.push(T(240,195,q2.tot+' trials is not enough to be certain about bias','#888',11,'middle',false));}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Spinner: 8 equal sections, 3R 2B 2G 1Y
  var cx=130,cy=140,r=90;
  var cols=['#C0272D','#1a5a8a','#1a7a3a','#C8922A'];
  var starts=[0];
  q3.counts.forEach(function(c,i){starts.push(starts[i]+c*45);});
  q3.counts.forEach(function(c,i){
    var a1=starts[i]-90,a2=starts[i+1]-90;
    var r1=a1*Math.PI/180,r2=a2*Math.PI/180;
    var laf=(a2-a1)>180?1:0;
    var x1=cx+r*Math.cos(r1),y1=cy+r*Math.sin(r1);
    var x2=cx+r*Math.cos(r2),y2=cy+r*Math.sin(r2);
    o.push('<path d="M '+cx+','+cy+' L '+x1.toFixed(1)+','+y1.toFixed(1)+' A '+r+','+r+' 0 '+laf+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+' Z" fill="'+cols[i]+'44" stroke="'+cols[i]+'" stroke-width="2"/>');
    var mid=(starts[i]+starts[i+1])/2-90;
    var rm=r*0.65,mr=mid*Math.PI/180;
    o.push(T((cx+rm*Math.cos(mr)).toFixed(0),(cy+rm*Math.sin(mr)+5).toFixed(0),q3.sections[i],cols[i],11,'middle',true));
  });
  if(p>=1){o.push(T(320,60,'Total sections: '+q3.tot,'#888',12,'start',false));
    o.push(T(320,80,'P(Red) = '+q3.counts[0]+'/'+q3.tot,'#C0272D',14,'start',true));}
  if(p>=2){o.push(T(320,110,'P(Blue) = '+q3.counts[1]+'/'+q3.tot,'#1a5a8a',14,'start',true));}
  if(p>=3){o.push(T(320,140,'P(not Yellow) = '+(q3.tot-q3.counts[3])+'/'+q3.tot,'#1a7a3a',14,'start',true));}
  if(p>=4){o.push(T(320,175,'All probabilities sum to 1:','#888',11,'start',false));
    o.push(T(320,192,q3.counts.map(function(c){return c+'/'+q3.tot;}).join('+'),'#888',10,'start',false));
    o.push(T(320,210,'= '+q3.tot+'/'+q3.tot+' = 1 ✔','#1a7a3a',11,'start',false));}
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Two-way table: pets × gender
  var hdr=['','Boys','Girls','Total'],rows2=[['Dogs',5,3,8],['Cats',2,4,6],['Fish',1,3,4],['Total',8,10,18]];
  o.push(R(20,20,440,30,'#C0272D','#C0272D',1));
  hdr.forEach(function(h,i){o.push(T(20+i*110+55,40,h,'#fff',12,'middle',true));});
  rows2.forEach(function(r,ri){
    if(p>=ri){
      var y=56+ri*40;
      o.push(R(20,y,440,38,ri===3?'#fff5f0':'#fff','#E4D6CE',1));
      r.forEach(function(cell,ci){
        var col=ri===3?'#C0272D':(ci===0?'#241A17':'#1a5a8a');
        o.push(T(20+ci*110+55,y+24,cell,col,12,'middle',ri===3||ci===0));
      });
    }
  });
  if(p>=4){o.push(T(240,230,'P(girl likes cats) = 4/18 = 2/9','#1a7a3a',13,'middle',true));}
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Sample space: H/T × H/T
  var outcomes=[['HH','HT'],['TH','TT']],rowlbl=['H','T'],collbl=['H','T'];
  o.push(T(240,18,'Sample space: flipping two coins','#241A17',13,'middle',false));
  o.push(R(80,30,80,36,'#C0272D','#C0272D',1));o.push(T(120,53,'Coin 1','#fff',11,'middle',true));
  o.push(R(80,30,360,36,'#C0272D','#C0272D',1));o.push(T(240,53,'Coin 2','#fff',11,'middle',true));
  collbl.forEach(function(l,i){
    o.push(R(160+i*160,30,160,36,'#C0272D22','#C0272D',1));
    o.push(T(240+i*160,53,l,'#C0272D',14,'middle',true));
  });
  rowlbl.forEach(function(l,ri){
    o.push(R(80,66+ri*60,80,58,ri===0?'#fff5f0':'#fff','#E4D6CE',1));
    o.push(T(120,100+ri*60,l,'#C0272D',14,'middle',true));
    outcomes[ri].forEach(function(out,ci){
      if(p>=ri*2+ci+1){
        o.push(R(160+ci*160,66+ri*60,160,58,'#fff','#E4D6CE',1));
        o.push(T(240+ci*160,100+ri*60,out,'#1a5a8a',14,'middle',true));
      }
    });
  });
  if(p>=4){o.push(T(240,210,'P(2 heads) = 1/4','#1a7a3a',14,'middle',true));
    o.push(T(240,230,'P(at least 1 head) = 3/4','#C0272D',13,'middle',false));}
  s.innerHTML=o.join('');}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Mutually Exclusive Events','#C0272D',16,'middle',true));
  if(p>=1){
    o.push(R(30,40,190,140,'#fff5f0','#C0272D',2));
    o.push(T(125,58,'Event A','#C0272D',12,'middle',true));
    o.push(T(125,80,'P(A) = '+q6.pa,'#C0272D',15,'middle',true));
    o.push(R(260,40,190,140,'#e8f0ff','#1a5a8a',2));
    o.push(T(355,58,'Event B','#1a5a8a',12,'middle',true));
    o.push(T(355,80,'P(B) = '+q6.pb,'#1a5a8a',15,'middle',true));
    o.push(T(240,110,'Cannot happen at the same time','#888',11,'middle',false));
    o.push(T(240,128,'No overlap → mutually exclusive','#888',11,'middle',false));
  }
  if(p>=2){o.push(R(90,155,300,40,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,180,'P(A or B) = '+q6.pa+' + '+q6.pb+' = '+(q6.pa+q6.pb).toFixed(2),'#1a7a3a',15,'middle',true));}
  if(p>=3){o.push(T(240,215,'P(neither A nor B) = 1 − '+(q6.pa+q6.pb).toFixed(2)+' = '+(1-q6.pa-q6.pb).toFixed(2),'#888',13,'middle',false));}
  s.innerHTML=o.join('');}

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Expected Frequency','#C0272D',16,'middle',true));
  if(p>=1){
    o.push(R(30,40,420,46,'#fff5f0','#C0272D',1.5));
    o.push(T(240,58,'P(event) = '+q7.p,'#C0272D',14,'middle',false));
    o.push(T(240,76,'Number of trials n = '+q7.n,'#241A17',14,'middle',false));
  }
  if(p>=2){
    o.push(R(60,100,360,40,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(240,118,'Expected freq = P(event) × n','#1a5a8a',14,'middle',false));
    o.push(T(240,136,'= '+q7.p+' × '+q7.n,'#1a5a8a',13,'middle',false));
  }
  if(p>=3){
    o.push(R(140,152,200,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,180,'= '+(q7.p*q7.n),'#1a7a3a',24,'middle',true));
  }
  if(p>=4){o.push(T(240,222,'This is an expectation — actual result may differ','#888',11,'middle',false));}
  s.innerHTML=o.join('');}

function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Sample space: two dice, show grid
  o.push(T(240,15,'Sample space: two dice (total)','#241A17',12,'middle',false));
  var ox=55,oy=30,cw=58,ch=32;
  // Headers
  for(var i=1;i<=6;i++){
    o.push(R(ox+i*cw,oy,cw,ch,'#C0272D','#C0272D',1));
    o.push(T(ox+i*cw+cw/2,oy+20,i,'#fff',12,'middle',true));
    o.push(R(ox,oy+i*ch,cw,ch,'#C0272D','#C0272D',1));
    o.push(T(ox+cw/2,oy+i*ch+20,i,'#fff',12,'middle',true));
  }
  for(var r=1;r<=6;r++){
    for(var c=1;c<=6;c++){
      var tot=r+c;
      var fill=(p>=2&&tot===7)?'#e8f8ee':(p>=3&&tot>9)?'#fff5f0':'#fff';
      var col=(p>=2&&tot===7)?'#1a7a3a':(p>=3&&tot>9)?'#C0272D':'#888';
      if(p>=1){
        o.push(R(ox+c*cw,oy+r*ch,cw,ch,fill,'#E4D6CE',1));
        o.push(T(ox+c*cw+cw/2,oy+r*ch+20,tot,col,11,'middle',p>=2||p>=3));
      }
    }
  }
  s.innerHTML=o.join('');}

// ── Your Turn generators ──
function yt1(){var r=rnd(3,7),b=rnd(2,5),g=rnd(1,4),tot=r+b+g;
  return tryIt({question:'A bag has <b>'+r+' red, '+b+' blue and '+g+' green</b> marbles. Enter P(red) as a decimal (2 d.p.).',
    hints:['Total = '+tot,'P(red) = '+r+'/'+tot],
    ans:Math.round(r/tot*100)/100,tol:0.01,unit:'decimal',
    working:r+'/'+tot+' = '+(r/tot).toFixed(2)});}

function yt2(){var h=rnd(12,20),tot=rnd(25,40),t=tot-h;
  return tryIt({question:'A coin is flipped '+tot+' times; '+h+' heads. Enter the experimental P(heads) as a decimal (2 d.p.).',
    hints:['Rel. freq. = frequency ÷ trials'],
    ans:Math.round(h/tot*100)/100,tol:0.01,unit:'decimal',
    working:h+'/'+tot+' ≈ '+(h/tot).toFixed(2)});}

function yt3(){var sec=rnd(5,12),hit=rnd(1,sec-1);
  return tryIt({question:'A spinner has <b>'+sec+'</b> equal sections, <b>'+hit+'</b> of which are red. Enter P(red) as a decimal (2 d.p.).',
    hints:['P(red) = '+hit+'/'+sec],
    ans:Math.round(hit/sec*100)/100,tol:0.01,unit:'decimal',
    working:hit+'/'+sec+' ≈ '+(hit/sec).toFixed(2)});}

function yt4(){var b=rnd(3,8),g=rnd(3,8),tot=b+g,likeB=rnd(1,b),likeG=rnd(1,g);
  return tryIt({question:'A class has '+b+' boys and '+g+' girls. '+likeB+' boys and '+likeG+' girls like football. What is P(randomly chosen pupil likes football)? Enter as a decimal (2 d.p.).',
    hints:['Total who like football: '+(likeB+likeG),'Total pupils: '+tot],
    ans:Math.round((likeB+likeG)/tot*100)/100,tol:0.01,unit:'decimal',
    working:(likeB+likeG)+'/'+tot+' ≈ '+((likeB+likeG)/tot).toFixed(2)});}

function yt5(){
  var scenarios=[
    {q:'Two fair coins are flipped. How many outcomes are in the full sample space?',a:4,w:'HH, HT, TH, TT → 4 outcomes. (2 coins × 2 sides = 2² = 4)'},
    {q:'A coin is flipped and a dice is rolled. How many outcomes are in the sample space?',a:12,w:'2 coin outcomes × 6 dice outcomes = 12 total outcomes.'},
    {q:'Three fair coins are flipped. How many outcomes are in the full sample space?',a:8,w:'2³ = 8 outcomes: HHH, HHT, HTH, HTT, THH, THT, TTH, TTT.'},
    {q:'A dice is rolled twice. How many outcomes are in the full sample space?',a:36,w:'6 × 6 = 36 outcomes (6 first dice outcomes × 6 second dice outcomes).'},
    {q:'A fair coin is flipped. How many outcomes are in the sample space?',a:2,w:'Heads or Tails → 2 outcomes.'}
  ];
  var sc=pick(scenarios);
  return tryIt({question:sc.q,hints:['Multiply the number of outcomes for each event','Or list all combinations systematically'],ans:sc.a,tol:0,unit:'outcomes',working:sc.w});}

function yt6(){var pa=pick([0.1,0.15,0.2,0.25,0.3,0.35]),pb=pick([0.1,0.15,0.2,0.25]);
  var s=(pa+pb);
  return tryIt({question:'Two mutually exclusive events: P(A) = '+pa+', P(B) = '+pb+'. Find P(A or B).',
    hints:['Add the probabilities: '+pa+' + '+pb],
    ans:Math.round(s*100)/100,tol:0.01,unit:'',
    working:pa+' + '+pb+' = '+s.toFixed(2)});}

function yt7(){var p=pick([0.2,0.25,0.3,0.4,0.5]),n=pick([50,100,150,200,250]);
  return tryIt({question:'P(winning a prize) = '+p+'. You play <b>'+n+'</b> times. How many wins do you expect?',
    hints:['Expected = P × n = '+p+' × '+n],
    ans:p*n,tol:0.5,unit:'wins',
    working:p+' × '+n+' = '+p*n});}

function yt8(){
  var targets=[
    {t:7,pairs:[[1,6],[2,5],[3,4],[4,3],[5,2],[6,1]],n:6},
    {t:8,pairs:[[2,6],[3,5],[4,4],[5,3],[6,2]],n:5},
    {t:6,pairs:[[1,5],[2,4],[3,3],[4,2],[5,1]],n:5},
    {t:9,pairs:[[3,6],[4,5],[5,4],[6,3]],n:4},
    {t:10,pairs:[[4,6],[5,5],[6,4]],n:3},
    {t:5,pairs:[[1,4],[2,3],[3,2],[4,1]],n:4}
  ];
  var sc=pick(targets);
  var pairStr=sc.pairs.map(function(p){return '('+p[0]+','+p[1]+')';}).join(', ');
  return tryIt({question:'Two dice are rolled. How many outcomes give a total of <b>'+sc.t+'</b>?',
    hints:['List all pairs that add to '+sc.t,'Work systematically: start with the lowest first die'],
    ans:sc.n,tol:0,unit:'outcomes',
    working:pairStr+' → '+sc.n+' outcomes. P('+sc.t+') = '+sc.n+'/36'});}

function yt9(){var r=rnd(2,5),b=rnd(1,4),tot=r+b;var pr=r/tot;
  return tryIt({question:'Bag: <b>'+r+' red, '+b+' blue</b>. Draw twice WITH replacement. Find P(both red) as a decimal (2 d.p.).',
    hints:['P(R) = '+r+'/'+tot,'Multiply: '+r+'/'+tot+' × '+r+'/'+tot],
    ans:Math.round(pr*pr*100)/100,tol:0.01,unit:'',
    working:'('+r+'/'+tot+')² = '+(r*r)+'/'+tot*tot+' ≈ '+(pr*pr).toFixed(2)});}

function yt10(){var a=rnd(5,12),b=rnd(3,8),both=rnd(1,Math.min(a,b)-1),tot=rnd(a+b,30);
  var onlyA=a-both,onlyB=b-both;
  return tryIt({question:'In a Venn diagram: A only = '+onlyA+', B only = '+onlyB+', both = '+both+'. Total = '+tot+'. Find P(A or B) as a decimal (2 d.p.).',
    hints:['P(A or B) = (A only + B only + both) / total','='+(onlyA+onlyB+both)+'/'+tot],
    ans:Math.round((onlyA+onlyB+both)/tot*100)/100,tol:0.01,unit:'',
    working:(onlyA+onlyB+both)+'/'+tot+' ≈ '+((onlyA+onlyB+both)/tot).toFixed(2)});}

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').innerHTML=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
