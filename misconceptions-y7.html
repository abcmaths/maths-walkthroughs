<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;
  --bg:#1a1a2e;--card:#16213e;--card2:#0f3460;--accent:#C0272D;--ok:#1a7a3a;--er:#a01820;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:#e8e0d8;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.hero{text-align:center;padding:36px 20px 28px;background:linear-gradient(180deg,#0f0f23,#1a1a2e);}
.hero h1{font-size:clamp(18px,3vw,26px);font-weight:800;color:#fff;margin-bottom:6px;}

.topic-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;
  background:rgba(192,39,45,0.2);color:#e8a0a4;border:1px solid rgba(192,39,45,0.4);cursor:pointer;transition:.15s;}
.topic-badge:hover,.topic-badge.on{background:var(--red);color:#fff;border-color:var(--red);}
.arena{max-width:640px;margin:32px auto 60px;padding:0 16px;}
.q-card{background:var(--card);border:1px solid #2a2a4e;border-radius:8px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);}
.q-top{background:var(--card2);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#a09890;}
.q-num{font-size:11px;color:#6a6a8a;}
.q-body{padding:28px 24px 20px;}
.q-stem{font-size:18px;line-height:1.5;color:#e8e0d8;margin-bottom:22px;}
.q-stem b{color:#fff;font-size:20px;}
.answer-area{display:flex;flex-direction:column;gap:10px;}
.choice{display:flex;align-items:center;gap:14px;background:#0f0f23;border:2px solid #2a2a4e;
  border-radius:6px;padding:14px 16px;cursor:pointer;transition:.2s;font-size:15px;color:#d0c8c0;}
.choice:hover{border-color:var(--gold);color:#fff;}
.choice.selected{border-color:var(--gold);background:rgba(200,146,42,0.1);color:#fff;}
.choice.correct{border-color:#2e7d32;background:rgba(26,122,58,0.15);color:#a8e6b8;}
.choice.wrong{border-color:#a01820;background:rgba(160,24,32,0.15);color:#f0a0a8;}
.choice-lbl{width:28px;height:28px;border-radius:50%;background:#1a1a3e;border:2px solid #3a3a5e;

  color:#888;flex-shrink:0;transition:.2s;}
.choice.selected .choice-lbl{background:var(--gold);border-color:var(--gold);color:#fff;}
.choice.correct .choice-lbl{background:#1a7a3a;border-color:#1a7a3a;color:#fff;}
.choice.wrong .choice-lbl{background:#a01820;border-color:#a01820;color:#fff;}
.submit-area{padding:0 24px 24px;display:flex;gap:10px;align-items:center;}
.submit-btn{font-size:14px;font-weight:700;padding:11px 28px;border-radius:4px;border:none;
  background:var(--red);color:#fff;cursor:pointer;transition:.15s;font-family:inherit;opacity:.4;pointer-events:none;}
.submit-btn.ready{opacity:1;pointer-events:auto;}
.submit-btn.ready:hover{background:var(--dark);}
.skip-btn{font-size:12px;color:#6a6a8a;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;}
.skip-btn:hover{color:#a09890;}
.result{padding:24px;display:none;}
.result.show{display:block;}
.correct-panel{background:rgba(26,122,58,0.12);border:2px solid #2e7d32;border-radius:6px;padding:20px 22px;}
.correct-panel .icon{font-size:32px;margin-bottom:8px;}
.correct-panel h3{color:#4caf50;font-size:18px;font-weight:800;margin-bottom:6px;}
.correct-panel p{font-size:14px;color:#a8e6b8;line-height:1.6;}
.correct-panel .why{margin-top:12px;font-size:13px;background:rgba(0,0,0,.2);
  border-left:3px solid #2e7d32;padding:10px 14px;color:#c0e8c8;border-radius:0 4px 4px 0;line-height:1.6;}
.wrong-panel{border-radius:6px;overflow:hidden;}
.wrong-top{background:rgba(160,24,32,0.2);border:2px solid #a01820;border-bottom:none;
  border-radius:6px 6px 0 0;padding:18px 22px;}
.wrong-top .icon{font-size:28px;margin-bottom:6px;}
.wrong-top h3{color:#f48080;font-size:16px;font-weight:800;margin-bottom:4px;}
.wrong-top p{font-size:13px;color:#d09090;line-height:1.5;}
.breakdown{background:#0d0d20;border:2px solid #a01820;border-top:none;border-radius:0 0 6px 6px;}
.step{padding:16px 20px;border-bottom:1px solid #1a1a30;display:none;}
.step.show{display:block;}
.step-hdr{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-title{font-size:13px;font-weight:700;color:#e8a0a4;letter-spacing:.05em;text-transform:uppercase;}
.step-body{font-size:14px;color:#c8c0b8;line-height:1.65;}
.step-body b{color:#fff;}
.step-body .em{display:block;background:rgba(192,39,45,0.15);border:1px solid rgba(192,39,45,0.4);
  padding:8px 14px;border-radius:4px;margin:8px 0;font-family:'Cambria Math',Georgia,serif;font-size:15px;color:#ffb8b8;}
.step-body .ok{display:block;background:rgba(26,122,58,0.15);border:1px solid rgba(26,122,58,0.4);
  padding:8px 14px;border-radius:4px;margin:8px 0;font-family:'Cambria Math',Georgia,serif;font-size:15px;color:#a8e6b8;}
.step-body .nl{display:flex;gap:0;margin:10px 0;border:1px solid #2a2a4e;border-radius:4px;overflow:hidden;}
.step-body .nl span{flex:1;text-align:center;padding:6px 2px;font-size:11px;border-right:1px solid #2a2a4e;}
.step-body .nl span.nneg{background:rgba(192,39,45,0.12);color:#e8a0a4;}
.step-body .nl span.npos{background:rgba(26,122,58,0.12);color:#a8e6b8;}
.step-body .nl span.nz{background:#1a1a3e;color:#888;font-weight:700;}
.step-body .nl span.nhi{outline:2px solid var(--gold);font-weight:700;color:#fff;}
.reveal-btn{margin:14px 20px 16px;display:block;font-size:13px;font-weight:600;padding:8px 18px;border-radius:4px;
  border:1px solid #a01820;background:transparent;color:#e8a0a4;cursor:pointer;font-family:inherit;transition:.15s;}
.reveal-btn:hover{background:rgba(192,39,45,0.2);}
.next-area{padding:16px 24px 24px;display:none;}
.next-area.show{display:flex;gap:10px;align-items:center;}
.next-btn{font-size:14px;font-weight:700;padding:11px 28px;border-radius:4px;
  background:var(--card2);color:#e8e0d8;border:1px solid #3a3a6e;cursor:pointer;font-family:inherit;transition:.15s;}
.next-btn:hover{background:#1a3060;border-color:var(--gold);color:#fff;}
.progress{font-size:11px;color:#6a6a8a;flex:1;text-align:right;}
@media(max-width:500px){.choice{padding:11px 12px;font-size:14px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Common Misconceptions &mdash; Year 7</div>
  <div style="width:80px"></div>
</header>
<div class="hero">
  <h1>&#x26A0;&#xFE0F; Common Misconceptions &mdash; Year 7</h1>
  <p>Answer each question first &mdash; then see <em>exactly</em> why common wrong answers go wrong, with a step-by-step breakdown.</p>
  <div class="badge-strip" id="topicStrip"></div>
</div>
<div class="arena">
  <div class="q-card" id="qcard">
    <div class="q-top">
      <span class="q-tag" id="qtag"></span>
      <span class="q-num" id="qnum"></span>
    </div>
    <div class="q-body">
      <div class="q-stem" id="qstem"></div>
      <div class="answer-area" id="choices"></div>
    </div>
    <div class="submit-area">
      <button class="submit-btn" id="submitBtn" onclick="submit()">Check my answer</button>
      <button class="skip-btn" onclick="nextQ()">Skip &rarr;</button>
    </div>
    <div class="result" id="resultPanel"></div>
    <div class="next-area" id="nextArea">
      <button class="next-btn" onclick="nextQ()">&rarr; Next misconception</button>
      <span class="progress" id="progText"></span>
    </div>
  </div>
</div>
<script>
var selectedIdx=-1,answered=false,qi=0,order=[],revealStep=0;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function nl(lo,hi,marks){
  var s='<div class="nl">';
  for(var v=lo;v<=hi;v++){
    var cls=(v<0?'nneg':v===0?'nz':'npos')+(marks&&marks.indexOf(v)>=0?' nhi':'');
    s+='<span class="'+cls+'">'+v+'</span>';
  }
  return s+'</div>';
}

function buildMisconceptions(){
var M=[];

// ─── NEGATIVE NUMBERS ──────────────────────────────────────────────────────

// N1: Ordering negatives — thinking −8 > −3 because 8 > 3
(function(){
  var a=-rnd(5,9),b=-rnd(1,4); // a < b
  M.push({topic:'Negative Numbers',tag:'Ordering on a Number Line',
    stem:'Which is correct?',
    choices:[
      {text:a+' > '+b+', because '+Math.abs(a)+' is bigger than '+Math.abs(b),correct:false,
       trap:'This confuses the SIZE of the digit with the VALUE on the number line.'},
      {text:b+' > '+a+', because '+b+' is closer to zero (further right)',correct:true},
      {text:'They are equal because both are negative',correct:false,
       trap:'Two numbers are equal only if they are identical — not just because they share a sign.'}
    ],
    celebrate:'<p><b>Correct!</b> '+b+' > '+a+' because on the number line '+b+' sits to the <b>right</b> of '+a+'. Numbers always increase from left to right — negative numbers are no exception.</p><div class="why">Key rule: <b>the further right on the number line, the greater the value</b>. Negative numbers with larger digits are <em>smaller</em>, not larger.</div>',
    breakdown:[
      {title:'The misconception',body:'Because 8 > 3 as digits, students write <b>'+a+' > '+b+'</b>. But the negative sign flips the comparison. Larger digit = <em>more negative</em> = <em>smaller value</em>.'},
      {title:'See it on a number line',body:'Here are both numbers on a number line:'+nl(-9,2,[a,b])+'<b>'+a+'</b> is to the LEFT of <b>'+b+'</b>. Left = smaller. Always.'},
      {title:'Think temperature',body:'<span class="em">'+a+'°C is colder than '+b+'°C</span>The colder temperature is the smaller number. <b>'+b+'°C</b> (less cold) is the <b>greater</b> value.'},
      {title:'The rule',body:'<span class="ok">For negatives: larger digit → smaller value</span>−9 < −5 < −1 < 0 < 1 < 5 < 9<br>Always draw or imagine the number line when comparing negatives.'}
    ]
  });
})();

// N2: 5 − (−2) = 3 (confusing subtraction of a negative)
(function(){
  var a=rnd(4,9),b=rnd(1,4);
  M.push({topic:'Negative Numbers',tag:'Subtracting a Negative',
    stem:'What is <b>'+a+' − (−'+b+')</b>?',
    choices:[
      {text:''+(a-b)+' — subtracting '+b+' as normal',correct:false,
       trap:'The bracket contains −'+b+', not +'+b+'. Subtracting a negative is not the same as subtracting the positive.'},
      {text:''+(a+b)+' — two negatives make a positive',correct:true},
      {text:'−'+(b-a)+' — the negative sign takes over',correct:false,
       trap:'The larger positive number dominates here, and the result is positive.'}
    ],
    celebrate:'<p><b>Right!</b> '+a+' − (−'+b+') = '+a+' + '+b+' = <b>'+(a+b)+'</b>. Subtracting a negative is the same as adding the positive.</p><div class="why">− (−) = + &nbsp; Two negatives next to each other always combine to make a positive. Think of removing a debt: if someone removes a −£'+b+' charge, you gain £'+b+'.</div>',
    breakdown:[
      {title:'The misconception',body:'Students see "'+a+' minus something" and just subtract '+b+', getting <b>'+(a-b)+'</b>. But the "something" is <em>negative '+b+'</em>, not positive '+b+'.'},
      {title:'The sign rule',body:'<span class="em">− (−b) = + b</span>When two minus signs appear next to each other, they combine to form a plus. This is a firm rule, not optional.'},
      {title:'Correct working',body:'<span class="ok">'+a+' − (−'+b+') = '+a+' + '+b+' = '+(a+b)+'</span>Remove the brackets by combining the signs: − × − = +'},
      {title:'Number line check',body:'Start at <b>'+a+'</b>. Subtracting a negative means moving <b>right</b> (more positive), not left.'+nl(-1,a+b+1,[a,a+b])+'Land on <b>'+(a+b)+'</b>. ✓'}
    ]
  });
})();

// N3: Two negatives always make a positive (overgeneralisation)
(function(){
  var a=rnd(2,8),b=rnd(1,a-1);
  M.push({topic:'Negative Numbers',tag:'Two Negatives — Always Positive?',
    stem:'A student says: <b>"Two negatives always make a positive."</b><br>Which example <em>disproves</em> this rule?',
    choices:[
      {text:'(−3) × (−4) = +12 — this makes a positive',correct:false,
       trap:'This one does make a positive — it does not disprove the claim.'},
      {text:'(−'+a+') + (−'+b+') = −'+(a+b)+' — still negative',correct:true},
      {text:'(−3) ÷ (−3) = +1 — positive again',correct:false,
       trap:'Division of two negatives also gives a positive — this still does not disprove the rule.'}
    ],
    celebrate:'<p><b>Exactly right!</b> (−'+a+') + (−'+b+') = −'+(a+b)+' — <em>negative</em>. The "two negatives make a positive" rule only applies to <b>multiplication</b> and <b>division</b>, not addition.</p><div class="why"><b>Multiplication/division</b>: − × − = + &nbsp; ✓<br><b>Addition</b>: − + − = − &nbsp; (more negative!)<br>The rule depends entirely on the <em>operation</em>.</div>',
    breakdown:[
      {title:'The misconception',body:'Students overgeneralise from the multiplication rule. <b>Two negatives make a positive</b> is only true for × and ÷, not for + and −.'},
      {title:'Adding two negatives',body:'<span class="em">(−'+a+') + (−'+b+') = −'+(a+b)+'</span>Adding two negatives goes <em>further left</em> on the number line — more negative, not positive.'},
      {title:'The complete picture',body:'<span class="ok">× and ÷: same signs → positive</span><span class="em">+ and −: same signs → more of that sign</span>(−3) + (−4) = −7 &nbsp;|&nbsp; (−3) × (−4) = +12'},
      {title:'Rule to remember',body:'<span class="ok">Ask yourself: what operation am I doing?<br>× or ÷ negative pairs → positive<br>+ negative numbers → more negative</span>'}
    ]
  });
})();

// ─── BIDMAS ──────────────────────────────────────────────────────────────────

// B1: Addition before multiplication (left to right)
(function(){
  var a=rnd(2,6),b=rnd(2,5),c=rnd(2,4);
  var wrong=(a+b)*c, correct=a+b*c;
  M.push({topic:'BIDMAS',tag:'Multiplication Before Addition',
    stem:'Calculate <b>'+a+' + '+b+' × '+c+'</b>',
    choices:[
      {text:''+(a+b)+' × '+c+' = '+wrong+' (added '+a+' and '+b+' first)',correct:false,
       trap:'Left to right order ignores BIDMAS — multiplication must come before addition.'},
      {text:a+' + '+b*c+' = '+correct+' (multiplied '+b+' and '+c+' first)',correct:true},
      {text:''+( a*b+c)+' (multiplied '+a+' × '+b+' first, then added '+c+')',correct:false,
       trap:'The multiplication applies to '+b+' and '+c+', not to '+a+' and '+b+'.'}
    ],
    celebrate:'<p><b>Correct!</b> '+b+' × '+c+' = '+b*c+' first, then '+a+' + '+b*c+' = <b>'+correct+'</b>.</p><div class="why">BIDMAS: Brackets → Indices → Division/Multiplication → Addition/Subtraction. × and ÷ always come before + and −, regardless of position.</div>',
    breakdown:[
      {title:'The misconception',body:'Reading left to right: <b>'+a+' + '+b+' = '+(a+b)+'</b>, then <b>× '+c+' = '+wrong+'</b>. This ignores the agreed order of operations.'},
      {title:'BIDMAS order',body:'<b>B</b>rackets &bull; <b>I</b>ndices &bull; <b>D</b>ivision &amp; <b>M</b>ultiplication &bull; <b>A</b>ddition &amp; <b>S</b>ubtraction<br><br>× and ÷ are always done <em>before</em> + and −.'},
      {title:'Correct working',body:'<span class="ok">Step 1: '+b+' × '+c+' = '+b*c+'</span><span class="ok">Step 2: '+a+' + '+b*c+' = '+correct+'</span>'},
      {title:'Using brackets to override',body:'If you <em>wanted</em> to add first, you would write <b>('+a+' + '+b+') × '+c+' = '+wrong+'</b>. Brackets change the order.'}
    ]
  });
})();

// B2: Brackets only affect the number immediately next to them
(function(){
  var a=rnd(2,5),b=rnd(2,4),c=rnd(2,4);
  var correct=(a+b)*c, wrong=a+b*c;
  M.push({topic:'BIDMAS',tag:'What Do Brackets Affect?',
    stem:'A student says: "In <b>('+a+' + '+b+') × '+c+'</b>, the bracket only affects the '+b+'."<br>What is the correct answer?',
    choices:[
      {text:''+wrong+' — the bracket just means "do '+b+' × '+c+' first"',correct:false,
       trap:'Brackets group everything inside them — both '+a+' and '+b+' are inside, so both are multiplied by '+c+'.'},
      {text:''+correct+' — everything inside the bracket is calculated first, then × '+c,correct:true},
      {text:''+( a*(b+c))+' — the '+a+' gets the bracket too, multiplied by ('+b+'+'+c+')',correct:false,
       trap:'Only what is written inside the brackets is grouped. The '+a+' and '+b+' are the contents; '+c+' is outside.'}
    ],
    celebrate:'<p><b>Correct!</b> ('+a+' + '+b+') × '+c+' — first work out the bracket: <b>'+(a+b)+'</b>, then × '+c+' = <b>'+correct+'</b>. Brackets group <em>everything inside</em> them.</p><div class="why">A bracket is like a bag: everything inside it is evaluated together before the outside operation is applied.</div>',
    breakdown:[
      {title:'The misconception',body:'Students sometimes think the bracket only "touches" the number right next to the × sign. In fact, brackets group <b>everything inside</b> — here, both <b>'+a+'</b> and <b>'+b+'</b>.'},
      {title:'What brackets mean',body:'<span class="em">('+a+' + '+b+') × '+c+'</span>The bracket is a <b>grouping symbol</b>. Evaluate everything inside it first:<span class="ok">'+a+' + '+b+' = '+(a+b)+'</span>Then apply the × '+c+':'},
      {title:'Complete working',body:'<span class="ok">('+a+' + '+b+') × '+c+' = '+(a+b)+' × '+c+' = '+correct+'</span>'},
      {title:'Compare without brackets',body:'Without brackets: '+a+' + '+b+' × '+c+' = '+a+' + '+b*c+' = '+wrong+'<br>The bracket changes the answer from <b>'+wrong+'</b> to <b>'+correct+'</b>.'}
    ]
  });
})();

// ─── FACTORS AND MULTIPLES ────────────────────────────────────────────────

// F1: Confusing factors and multiples
(function(){
  var n=pick([6,8,10,12,15,18,20]);
  M.push({topic:'Factors & Multiples',tag:'Factors vs Multiples',
    stem:'Which of the following is a <b>factor</b> of '+n+' (not a multiple)?',
    choices:[
      {text:''+(n*2)+' — it contains '+n,correct:false,
       trap:n*2+' is a multiple of '+n+' ('+n+' × 2 = '+n*2+'). Multiples are bigger; factors are smaller or equal.'},
      {text:''+(n*3)+' — '+n+' goes into it',correct:false,
       trap:n*3+' is also a multiple of '+n+'. Factors divide INTO '+n+', not the other way round.'},
      {text:pick(function(){var fs=[];for(var i=2;i<n;i++)if(n%i===0)fs.push(i);return fs.length?fs:['(no small factor — try a different number)'];}())
        +' — it divides exactly into '+n,correct:true}
    ],
    celebrate:'<p><b>Correct!</b> A <b>factor</b> divides <em>into</em> '+n+' with no remainder. A <b>multiple</b> is '+n+' multiplied by something.</p><div class="why"><b>Factors</b> of '+n+': numbers that divide into '+n+' exactly.<br><b>Multiples</b> of '+n+': '+n+', '+(n*2)+', '+(n*3)+'… (keep multiplying).</div>',
    breakdown:[
      {title:'The misconception',body:'Students mix these up. A helpful way: the word <b>factor</b> comes from "factory" — factors are the things that <em>make</em> a number by multiplying together.'},
      {title:'Factors — go IN',body:'A <b>factor of '+n+'</b> divides INTO '+n+' with no remainder.<span class="ok">Factors of '+n+': '+function(){var fs=[];for(var i=1;i<=n;i++)if(n%i===0)fs.push(i);return fs.join(', ');}()+'</span>'},
      {title:'Multiples — come OUT',body:'A <b>multiple of '+n+'</b> is the result of multiplying '+n+' by a whole number.<span class="em">Multiples of '+n+': '+n+', '+(n*2)+', '+(n*3)+', '+(n*4)+'…</span>'},
      {title:'Memory trick',body:'<span class="ok">Factors are FEWER than or equal to the number.<br>Multiples are MORE than or equal to the number.</span>'}
    ]
  });
})();

// F2: Thinking 1 is prime / thinking prime means odd
(function(){
  var oddNonPrime=pick([9,15,21,25,27,35]);
  M.push({topic:'Factors & Multiples',tag:'Prime Numbers',
    stem:'Which statement about prime numbers is <b>correct</b>?',
    choices:[
      {text:'1 is a prime number because it has no factors other than itself',correct:false,
       trap:'1 has only ONE factor (itself). Prime numbers must have EXACTLY TWO factors: 1 and themselves.'},
      {text:'All odd numbers are prime (e.g. '+oddNonPrime+' is prime)',correct:false,
       trap:oddNonPrime+' = '+function(){var f=[];for(var i=2;i<oddNonPrime;i++)if(oddNonPrime%i===0){f.push(i);break;}return f[0]+'×'+(oddNonPrime/f[0]);}()+' — it has more than two factors, so it is NOT prime.'},
      {text:'2 is the only even prime number; 1 is not prime',correct:true}
    ],
    celebrate:'<p><b>Correct!</b> A prime number has <b>exactly two factors</b>: 1 and itself. <b>1</b> has only one factor (itself), so it is not prime. <b>2</b> is the only even prime.</p><div class="why">The first few primes: 2, 3, 5, 7, 11, 13, 17, 19, 23…</div>',
    breakdown:[
      {title:'Why 1 is NOT prime',body:'A prime must have <b>exactly 2 factors</b>: 1 and the number itself.<br><br>Factors of 1: just {1} — only <b>one</b> factor. So 1 fails the definition.<span class="em">1 is neither prime nor composite.</span>'},
      {title:'Not all odd numbers are prime',body:'<span class="em">'+oddNonPrime+' is odd but NOT prime</span>'+function(){var fs=[];for(var i=1;i<=oddNonPrime;i++)if(oddNonPrime%i===0)fs.push(i);return 'Factors of '+oddNonPrime+': {'+fs.join(', ')+'}  — more than 2 factors.';}()},
      {title:'2 is prime — and it\'s even',body:'<span class="ok">2 is the only even prime number.</span>Factors of 2: {1, 2} — exactly two. Every other even number is divisible by 2, so no other even number is prime.'},
      {title:'The definition',body:'<span class="ok">Prime: exactly 2 factors (1 and itself).<br>Examples: 2, 3, 5, 7, 11, 13…<br>NOT prime: 1 (one factor), 4, 6, 9… (more than 2 factors)</span>'}
    ]
  });
})();

// ─── FRACTIONS ───────────────────────────────────────────────────────────────

// FR1: Equivalent fractions — adding instead of multiplying
(function(){
  var n=rnd(1,4),d=rnd(n+1,6),k=rnd(2,4);
  var addN=n+k, addD=d+k;
  var mulN=n*k, mulD=d*k;
  M.push({topic:'Fractions',tag:'Equivalent Fractions',
    stem:'To make an equivalent fraction to <b>'+n+'/'+d+'</b>, a student adds '+k+' to both top and bottom, giving <b>'+addN+'/'+addD+'</b>.<br>Is this correct?',
    choices:[
      {text:'Yes — adding the same number keeps it equivalent',correct:false,
       trap:'Adding the same number to top and bottom changes the value. Only multiplying (or dividing) both by the same number keeps the fraction equivalent.'},
      {text:'No — '+addN+'/'+addD+' ≠ '+n+'/'+d+'. You must multiply, not add',correct:true},
      {text:'It only works when '+k+' is added, not for other numbers',correct:false,
       trap:'Adding ANY number to numerator and denominator (other than 0) changes the value. This never works.'}
    ],
    celebrate:'<p><b>Correct!</b> '+addN+'/'+addD+' ≠ '+n+'/'+d+'. Check: '+n+'/'+d+' = '+(n/d).toFixed(3)+'… but '+addN+'/'+addD+' = '+(addN/addD).toFixed(3)+'… Different values!</p><div class="why">Equivalent fractions require multiplying <b>both</b> numerator and denominator by the <b>same number</b>:<br>'+n+'/'+d+' = '+mulN+'/'+mulD+' (×'+k+')</div>',
    breakdown:[
      {title:'Why adding fails',body:'Try with a simple example: <b>1/2 + 1 to both = 2/3</b>. But 1/2 = 0.5 and 2/3 ≈ 0.667. They are <em>not equal</em>.<span class="em">'+n+'/'+d+' → adding '+k+' → '+addN+'/'+addD+' ≠ '+n+'/'+d+'</span>'},
      {title:'Why multiplying works',body:'When you multiply top and bottom by the same number, you are multiplying by 1 (in disguise):<span class="ok">'+n+'/'+d+' × '+k+'/'+k+' = '+mulN+'/'+mulD+'</span>'+n+'/'+d+' and '+mulN+'/'+mulD+' are the same value.'},
      {title:'The rule',body:'<span class="ok">To make equivalent fractions: MULTIPLY (or divide) both top and bottom by the SAME number.</span>Never add or subtract — that changes the value.'},
      {title:'Check using decimals',body:''+n+'/'+d+' = '+(n/d).toFixed(4)+'<br>'+mulN+'/'+mulD+' = '+(mulN/mulD).toFixed(4)+' ✓ Equal<br>'+addN+'/'+addD+' = '+(addN/addD).toFixed(4)+' ✗ Different'}
    ]
  });
})();

// FR2: Adding fractions — adding numerators AND denominators
(function(){
  var pairs=[[1,2,1,3],[1,2,1,4],[1,3,1,4],[2,3,1,4],[1,2,2,5],[1,3,1,5]];
  var p=pick(pairs);var n1=p[0],d1=p[1],n2=p[2],d2=p[3];
  var wrongN=n1+n2,wrongD=d1+d2;
  var lcd=d1*d2; // denominators are coprime in chosen pairs
  var correctN=n1*d2+n2*d1;
  M.push({topic:'Fractions',tag:'Adding Fractions',
    stem:'What is <b>'+n1+'/'+d1+' + '+n2+'/'+d2+'</b>?',
    choices:[
      {text:wrongN+'/'+wrongD+' — add tops, add bottoms',correct:false,
       trap:'You cannot add denominators. Check: 1/2 + 1/2 this way gives 2/4 = 1/2, but the real answer is 1.'},
      {text:correctN+'/'+lcd+' — find a common denominator first',correct:true},
      {text:'1/'+(d1*d2)+' — multiply top and bottom',correct:false,
       trap:'That is what you do for multiplication (1/'+d1+' × 1/'+d2+' = 1/'+(d1*d2)+'). For addition, find a common denominator.'}
    ],
    celebrate:'<p><b>Correct!</b> '+n1+'/'+d1+' + '+n2+'/'+d2+' = '+n1*d2+'/'+lcd+' + '+n2*d1+'/'+lcd+' = <b>'+correctN+'/'+lcd+'</b>.</p><div class="why">To add fractions: find a common denominator, convert both fractions, then add numerators only. <b>Never</b> add denominators.</div>',
    breakdown:[
      {title:'The misconception',body:'<span class="em">'+n1+'/'+d1+' + '+n2+'/'+d2+' = '+wrongN+'/'+wrongD+' ✗</span>Proof this is wrong: try 1/2 + 1/2 = 2/4 = 1/2? No — the real answer is 1.'},
      {title:'Find a common denominator',body:'The denominators are '+d1+' and '+d2+'. LCD = '+lcd+'.<span class="ok">'+n1+'/'+d1+' = '+(n1*d2)+'/'+lcd+'</span><span class="ok">'+n2+'/'+d2+' = '+(n2*d1)+'/'+lcd+'</span>'},
      {title:'Add numerators only',body:'<span class="ok">'+(n1*d2)+'/'+lcd+' + '+(n2*d1)+'/'+lcd+' = '+correctN+'/'+lcd+'</span>The denominator <b>stays as '+lcd+'</b>. Only the tops are added.'},
      {title:'The rule',body:'<span class="ok">Step 1: find LCD<br>Step 2: convert fractions<br>Step 3: add tops only<br>Step 4: simplify if needed</span>'}
    ]
  });
})();

// FR3: Mixed numbers — treating whole and fraction separately when multiplying
(function(){
  var w=rnd(1,4),n=pick([1,2,3]),d=pick([3,4,5]);
  while(n>=d)n=pick([1,2,3]);
  var mult=rnd(2,4);
  var wrongW=w*mult, wrongN=n*mult;
  var correctTop=(w*d+n)*mult;
  M.push({topic:'Fractions',tag:'Multiplying Mixed Numbers',
    stem:'What is <b>'+w+' '+n+'/'+d+' × '+mult+'</b>?',
    choices:[
      {text:wrongW+' '+wrongN+'/'+d+' — multiplied whole number and fraction separately',correct:false,
       trap:'You must convert to an improper fraction first. Multiplying parts separately gives the wrong answer because '+wrongN+'/'+d+' may need simplifying or the whole part is wrong.'},
      {text:''+Math.floor(correctTop/d)+(correctTop%d?' '+correctTop%d+'/'+d:'')+'  — converted to improper fraction first',correct:true},
      {text:wrongW+' '+n+'/'+d+' — only multiplied the whole number',correct:false,
       trap:'The fraction part must also be multiplied. You cannot leave it unchanged.'}
    ],
    celebrate:'<p><b>Well done!</b> Convert: '+w+' '+n+'/'+d+' = '+(w*d+n)+'/'+d+'. Then × '+mult+' = '+correctTop+'/'+d+' = <b>'+Math.floor(correctTop/d)+(correctTop%d?' '+correctTop%d+'/'+d:'')+'</b>.</p><div class="why">Always convert mixed numbers to improper fractions before multiplying. Then convert back at the end.</div>',
    breakdown:[
      {title:'The misconception',body:'<span class="em">'+w+' '+n+'/'+d+' × '+mult+' = '+wrongW+' '+wrongN+'/'+d+' ✗</span>This looks plausible but is wrong because the whole part and fraction are <b>not independent</b> — they form a single number.'},
      {title:'Convert to improper fraction first',body:'<span class="ok">'+w+' '+n+'/'+d+' = ('+(w*d)+' + '+n+') / '+d+' = '+(w*d+n)+'/'+d+'</span>'},
      {title:'Multiply',body:'<span class="ok">'+(w*d+n)+'/'+d+' × '+mult+' = '+correctTop+'/'+d+'</span>'},
      {title:'Convert back',body:'<span class="ok">'+correctTop+'/'+d+' = '+Math.floor(correctTop/d)+(correctTop%d?' and '+correctTop%d+'/'+d:'')+'</span>The rule: <b>always convert mixed numbers before calculating</b>.'}
    ]
  });
})();

// ─── GEOMETRY — ANGLES ───────────────────────────────────────────────────────

// G1: Angles depend on side length / bigger shape = bigger angle
(function(){
  M.push({topic:'Geometry',tag:'Angles and Side Length',
    stem:'Two equilateral triangles: Triangle A has sides 3 cm, Triangle B has sides 10 cm.<br>What is the size of each interior angle in Triangle B?',
    choices:[
      {text:'More than 60° — because the sides are longer',correct:false,
       trap:'Angle size has nothing to do with side length. These are both equilateral triangles.'},
      {text:'60° — the same as Triangle A, because it is still equilateral',correct:true},
      {text:'Cannot be determined without measuring',correct:false,
       trap:'An equilateral triangle always has three 60° angles, regardless of side length.'}
    ],
    celebrate:'<p><b>Correct!</b> Both triangles are equilateral — three equal sides, three equal angles. All equilateral triangles have 60° angles, no matter the side length.</p><div class="why"><b>Angles describe shape (rotation), not size.</b> A bigger triangle is an enlargement — sides scale up but angles stay identical.</div>',
    breakdown:[
      {title:'The misconception',body:'Students think a bigger shape must have bigger angles. This confuses <b>size</b> with <b>shape</b>. Enlargement changes size but <b>preserves all angles</b>.'},
      {title:'What angles actually measure',body:'An angle measures the amount of <b>rotation</b> between two lines — nothing to do with how long the lines are. A 60° angle is 60° whether the arms are 1 mm or 100 km.'},
      {title:'Equilateral triangles always have 60°',body:'<span class="ok">Sum of angles in any triangle = 180°<br>Equilateral: all 3 angles equal → 180° ÷ 3 = 60°</span>This is true for a triangle of ANY size.'},
      {title:'The rule',body:'<span class="ok">Scaling a shape changes lengths but NOT angles.<br>Angle size ≠ side length.</span>'}
    ]
  });
})();

// G2: Forgetting angles on a straight line = 180°
(function(){
  var a=rnd(30,80),b=rnd(20,60);
  var c=180-a-b;
  if(c<=0||c>=180){a=40;b=50;c=90;}
  M.push({topic:'Geometry',tag:'Angles on a Straight Line',
    stem:'Three angles sit on a straight line: '+a+'°, '+b+'° and x.<br>Find x.',
    choices:[
      {text:''+(360-a-b)+'° — angles on a straight line sum to 360°',correct:false,
       trap:'360° is the sum of angles around a point, not on a straight line.'},
      {text:''+(a+b)+'° — x equals the sum of the other two',correct:false,
       trap:'If x equalled '+a+' + '+b+', the total would be '+( 2*(a+b))+'° — much more than 180°.'},
      {text:''+c+'° — angles on a straight line sum to 180°',correct:true}
    ],
    celebrate:'<p><b>Correct!</b> '+a+' + '+b+' + x = 180°, so x = 180 − '+a+' − '+b+' = <b>'+c+'°</b>.</p><div class="why">Angles on a straight line always sum to 180°. A straight line is a 180° rotation.</div>',
    breakdown:[
      {title:'The misconception',body:'Students confuse "straight line" (180°) with "full turn" (360°). A straight line is <em>half</em> a full rotation.'},
      {title:'The rule',body:'<span class="ok">Angles on a straight line = 180°</span><span class="em">Angles around a point = 360°</span>These are different!'},
      {title:'Solve for x',body:'<span class="ok">'+a+'° + '+b+'° + x = 180°</span><span class="ok">x = 180 − '+a+' − '+b+' = '+c+'°</span>'},
      {title:'Check',body:''+a+' + '+b+' + '+c+' = '+(a+b+c)+'° ✓'}
    ]
  });
})();

// ─── AREA AND PERIMETER ───────────────────────────────────────────────────────

// AP1: Confusing area and perimeter
(function(){
  var l=rnd(4,9),w=rnd(3,7);
  var P=2*(l+w), A=l*w;
  M.push({topic:'Area & Perimeter',tag:'Area vs Perimeter',
    stem:'Rectangle: length '+l+' cm, width '+w+' cm.<br>A student says the area is <b>'+(2*(l+w))+'</b> and the perimeter is <b>'+(l*w)+'</b>. What did they do wrong?',
    choices:[
      {text:'Nothing — both answers are correct',correct:false,
       trap:'Area = length × width = '+l+' × '+w+' = '+A+' cm². Perimeter = 2(length + width) = '+P+' cm. The student has swapped them.'},
      {text:'They swapped them: area = '+A+' cm² and perimeter = '+P+' cm',correct:true},
      {text:'Perimeter needs to include the diagonal too',correct:false,
       trap:'Perimeter only includes the outer edges — four sides for a rectangle. There is no diagonal in the perimeter.'}
    ],
    celebrate:'<p><b>Right!</b> Area = '+l+' × '+w+' = <b>'+A+' cm²</b> (space inside). Perimeter = 2('+l+' + '+w+') = <b>'+P+' cm</b> (distance around).</p><div class="why"><b>Area</b>: space inside the shape — measured in units² (square units).<br><b>Perimeter</b>: distance around the edge — measured in units (same as length).</div>',
    breakdown:[
      {title:'The misconception',body:'Students frequently swap the formulas. One way this happens: they add when they should multiply (for area) or multiply when they should add (for perimeter).'},
      {title:'Perimeter = add all sides',body:'<span class="ok">Perimeter = '+l+' + '+w+' + '+l+' + '+w+' = 2 × ('+l+' + '+w+') = '+P+' cm</span>Units: cm (linear — just length)'},
      {title:'Area = multiply length × width',body:'<span class="ok">Area = '+l+' × '+w+' = '+A+' cm²</span>Units: cm² (square — always squared for area)'},
      {title:'Memory trick',body:'<span class="ok">Perimeter → P for Path (walk around the edge)<br>Area → A for Amount of space inside</span>The units tell you which is which: cm vs cm².'}
    ]
  });
})();

// AP2: Adding instead of multiplying for area
(function(){
  var l=rnd(4,10),w=rnd(3,8);
  var wrong=l+w, correct=l*w;
  M.push({topic:'Area & Perimeter',tag:'Calculating Area',
    stem:'Find the area of a rectangle with length <b>'+l+' cm</b> and width <b>'+w+' cm</b>.',
    choices:[
      {text:''+(l+w)+' cm² — added the dimensions',correct:false,
       trap:'Adding gives '+l+' + '+w+' = '+(l+w)+'. But area requires multiplying — and the units should be cm², not cm.'},
      {text:''+(2*(l+w))+' cm² — doubled the sum of dimensions',correct:false,
       trap:'2('+l+' + '+w+') = '+(2*(l+w))+' cm is the perimeter, not the area.'},
      {text:''+correct+' cm² — multiplied length × width',correct:true}
    ],
    celebrate:'<p><b>Correct!</b> Area = '+l+' × '+w+' = <b>'+correct+' cm²</b>. Area always uses multiplication because it fills a 2D space.</p><div class="why">Imagine '+l+' rows of '+w+' squares — that is '+correct+' squares in total. Multiplication counts them all at once.</div>',
    breakdown:[
      {title:'The misconception',body:'<span class="em">'+l+' + '+w+' = '+(l+w)+' cm² ✗</span>Adding only gives the sum of two sides — not the 2D space inside the shape.'},
      {title:'Why multiplication is needed',body:'Area fills a two-dimensional space. Think of it as a grid: '+l+' columns × '+w+' rows = '+correct+' small squares.<span class="ok">Area = length × width = '+l+' × '+w+' = '+correct+' cm²</span>'},
      {title:'Units are the giveaway',body:'Area is always in <b>square units</b> (cm², m², etc.) because we are counting squares. Perimeter uses linear units (cm, m). If your answer has cm² and you added, something is wrong.'},
      {title:'The formulas',body:'<span class="ok">Area of rectangle = length × width</span><span class="em">Perimeter of rectangle = 2(length + width)</span>'}
    ]
  });
})();

return M;
}

var MISCONCEPTIONS=buildMisconceptions();
var topics=[...new Set(MISCONCEPTIONS.map(function(m){return m.topic;}))];

(function(){
  var strip=document.getElementById('topicStrip');
  function makeBtn(label,topic){
    var b=document.createElement('button');
    b.className='topic-badge'+(topic==='all'?' on':'');
    b.textContent=label;
    b.onclick=function(){setTopic(topic,b);};
    strip.appendChild(b);
  }
  makeBtn('All topics','all');
  topics.forEach(function(t){makeBtn(t,t);});
})();

var activeTopic='all';
function setTopic(t,btn){
  activeTopic=t;
  document.querySelectorAll('.topic-badge').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  buildOrder();loadQ();
}
function buildOrder(){
  var pool=MISCONCEPTIONS.map(function(_,i){return i;})
    .filter(function(i){return activeTopic==='all'||MISCONCEPTIONS[i].topic===activeTopic;});
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  order=pool;qi=0;
}
buildOrder();

function loadQ(){
  selectedIdx=-1;answered=false;revealStep=0;
  var m=MISCONCEPTIONS[order[qi%order.length]];
  document.getElementById('qtag').textContent=m.topic+' \u00b7 '+m.tag;
  document.getElementById('qnum').textContent='Q'+(qi+1)+' of '+order.length;
  document.getElementById('qstem').innerHTML=m.stem;
  var cs=m.choices.map(function(c,i){return {c:c,i:i};});
  for(var i=cs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cs[i];cs[i]=cs[j];cs[j]=t;}
  var area=document.getElementById('choices');area.innerHTML='';
  var labs='ABCD';
  cs.forEach(function(ch,idx){
    var d=document.createElement('div');d.className='choice';
    d.innerHTML='<div class="choice-lbl">'+labs[idx]+'</div><div>'+ch.c.text+'</div>';
    d.dataset.correct=ch.c.correct?'1':'0';
    d.dataset.trap=ch.c.trap||'';
    d.onclick=function(){selectChoice(this,idx);};
    area.appendChild(d);
  });
  document.getElementById('submitBtn').className='submit-btn';
  document.getElementById('submitBtn').style.display='';
  document.getElementById('resultPanel').className='result';
  document.getElementById('resultPanel').innerHTML='';
  document.getElementById('nextArea').className='next-area';
}

function selectChoice(el,idx){
  if(answered)return;
  selectedIdx=idx;
  document.querySelectorAll('.choice').forEach(function(c){c.classList.remove('selected');});
  el.classList.add('selected');
  document.getElementById('submitBtn').className='submit-btn ready';
}

function submit(){
  if(selectedIdx<0||answered)return;
  answered=true;
  var m=MISCONCEPTIONS[order[qi%order.length]];
  var choices=document.querySelectorAll('.choice');
  var chosen=choices[selectedIdx];
  var isCorrect=chosen.dataset.correct==='1';
  choices.forEach(function(c){
    if(c.dataset.correct==='1')c.classList.add('correct');
    else if(c===chosen)c.classList.add('wrong');
  });
  document.getElementById('submitBtn').style.display='none';
  var panel=document.getElementById('resultPanel');
  panel.className='result show';
  if(isCorrect){
    panel.innerHTML='<div class="correct-panel"><div class="icon">\uD83D\uDE80</div><h3>Cool maths student!</h3>'+m.celebrate+'</div>';
  } else {
    var trap=chosen.dataset.trap;
    var stepsHTML=m.breakdown.map(function(st,i){
      return '<div class="step" id="step'+i+'"><div class="step-hdr"><div class="step-n">'+(i+1)+'</div><div class="step-title">'+st.title+'</div></div><div class="step-body">'+st.body+'</div></div>';
    }).join('');
    panel.innerHTML='<div class="wrong-panel">'
      +'<div class="wrong-top"><div class="icon">\u26A0\uFE0F</div><h3>Not quite \u2014 let\u2019s fix that thinking</h3>'
      +(trap?'<p>\u201c'+trap+'\u201d</p>':'')
      +'</div><div class="breakdown">'+stepsHTML
      +'<button class="reveal-btn" id="revealBtn" onclick="revealNext()">Show step 1 \u2192</button>'
      +'</div></div>';
    revealNext();
  }
  document.getElementById('nextArea').className='next-area show';
  document.getElementById('progText').textContent=(qi+1)+' of '+order.length+' done';
}

function revealNext(){
  var steps=document.querySelectorAll('.step');
  if(revealStep<steps.length)steps[revealStep++].classList.add('show');
  var btn=document.getElementById('revealBtn');
  if(btn){if(revealStep>=steps.length)btn.style.display='none';else btn.textContent='Show step '+( revealStep+1)+' \u2192';}
}
function nextQ(){
  qi++;if(qi>=order.length){qi=0;buildOrder();}loadQ();
}
loadQ();
</script>
