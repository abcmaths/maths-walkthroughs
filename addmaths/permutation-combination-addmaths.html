function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function r2(x){return Math.round(x*100)/100;}

function tryIt(genFn){
  if(typeof genFn!=='function'){var _o=genFn;genFn=function(){return _o;};}

var V={};
(function(){
  function fact(n){var f=1;for(var i=2;i<=n;i++)f*=i;return f;}
  function nPr(n,r){return fact(n)/fact(n-r);}
  function nCr(n,r){return fact(n)/(fact(r)*fact(n-r));}
  V.fact=fact; V.nPr=nPr; V.nCr=nCr;
  V.n1=rnd(4,7); V.r1=rnd(1,V.n1-1); V.perm1=nPr(V.n1,V.r1);
  V.n2=rnd(5,9); V.r2=rnd(2,4); V.comb2=nCr(V.n2,V.r2);
  V.n3=rnd(4,6); V.perm_all=fact(V.n3);
  V.n4=rnd(5,8); V.r4=rnd(2,3); V.comb4=nCr(V.n4,V.r4);
  V.n5=rnd(5,9); V.r5=rnd(2,3);
  V.n6=rnd(3,5); V.n7=rnd(4,7); V.r7=rnd(2,3);
  V.n8=rnd(4,7); V.r8=rnd(2,3);
})();

function bfact(o,n,val){
  var s='';for(var i=n;i>=1;i--)s+=(i<n?'\u00d7':'')+i;
  o.push(R(28,100,420,34,'#f8f8f8','#888',0.5));
  o.push(T(240,121,n+'! = '+s+' = '+val,'#241A17',12,'middle',false));
}

  if(p>=3){bx(o,144,'= '+V.comb2,true);}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

  if(p>=3){bx(o,144,V.n3+' objects: '+V.perm_all+' arrangements',true);}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){
      return{question:'Forming a 4-digit PIN from digits 1-9 (no repeats). Perm(1) or Comb(0)?',
        hints:['PIN 1234 \u2260 PIN 4321'],ans:1,tol:0,unit:'',working:'Permutation \u2014 order matters for PINs'};})}
  ]},
  {ey:'Q6 \u00b7 Add Maths Y11 \u00b7 Perm & Comb',ti:'Arrangements with Restrictions',
   su:V.n6+' people in a row. One specific person must be first. How many arrangements?',
   steps:[
    {lb:'Fix the restriction',dr:dQ6,ht:'<p>Place the specific person first. Then arrange the remaining '+(V.n6-1)+' people in the other positions.</p>'},
    {lb:'Count remaining',dr:dQ6,ht:'<div class="fm">'+(V.n6-1)+'! = '+V.fact(V.n6-1)+' arrangements</div>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var n=rnd(3,6);
      var f=1;for(var i=2;i<=n-1;i++)f*=i;
      return{question:''+n+' people in a row, one must be first. How many arrangements?',
        hints:['Fix first, arrange remaining '+(n-1)],ans:f,tol:0,unit:'',working:(n-1)+'! = '+f};})}
  ]},
  {ey:'Q7 \u00b7 Add Maths Y11 \u00b7 Perm & Comb',ti:'Probability with Combinations',
   su:'Select '+V.r7+' from '+V.n7+'. Probability of including a specific person.',
   steps:[
    {lb:'Complementary counting',dr:dQ7,ht:'<div class="fm">P(included) = 1 \u2212 P(not included)</div>'},
    {lb:'Calculate',dr:dQ7,ht:'<div class="fm">P(not included) = C('+(V.n7-1)+','+V.r7+') / C('+V.n7+','+V.r7+') = '+r2(V.nCr(V.n7-1,V.r7)/V.nCr(V.n7,V.r7))+'</div>'},
    {lb:'Result',dr:dQ7,ht:'<div class="fm">P(included) = '+r2(1-V.nCr(V.n7-1,V.r7)/V.nCr(V.n7,V.r7))+'</div>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt(function(){
      function f(n){var v=1;for(var i=2;i<=n;i++)v*=i;return v;}
      function C(n,r){return f(n)/(f(r)*f(n-r));}
      var n=rnd(5,8),r=rnd(2,3);
      var p=r2(1-C(n-1,r)/C(n,r));
      return{question:'Select '+r+' from '+n+'. P(specific person included)?',hints:['1 - C('+(n-1)+','+r+')/C('+n+','+r+')'],ans:p,tol:0.01,unit:'',working:'P = '+p};})}
  ]},
  {ey:'Q8 \u00b7 Add Maths Y11 \u00b7 Perm & Comb',ti:'Committee Selection',
   su:'How many ways to choose a committee of '+V.r8+' from '+V.n8+' candidates?',
   steps:[
    {lb:'Identify combination',dr:dQ8,ht:'<p>A committee is a selection where order doesn\u2019t matter.</p>'},
    {lb:'Calculate',dr:dQ8,ht:'<div class="fm">^'+V.n8+'C_'+V.r8+' = '+V.nCr(V.n8,V.r8)+' committees</div>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt(function(){
      function f(n){var v=1;for(var i=2;i<=n;i++)v*=i;return v;}
      var n=rnd(5,9),r=rnd(2,4);while(r>n)r--;
      var c=f(n)/(f(r)*f(n-r));
      return{question:'Committee of '+r+' from '+n+'. Ways?',hints:['^'+n+'C_'+r],ans:c,tol:0,unit:'',working:'= '+c};})}
  ]}
];

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);
  });
}
function render(){
  bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=(si===0);
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){
  var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();
});
render();
</script></body></html>
