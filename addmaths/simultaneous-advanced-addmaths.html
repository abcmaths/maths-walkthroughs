<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simultaneous Equations &middot; Add Maths 0606 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}
.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}
.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}
.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.nq-btn:hover{background:var(--gold);color:#fff;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Simultaneous Equations &mdash; Add Maths (0606)</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function r2(x){return Math.round(x*100)/100;}
function r3(x){return Math.round(x*1000)/1000;}
var ST={};
function tryIt(genFn){
  if(typeof genFn!=='function'){var _o=genFn;genFn=function(){return _o;};}
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t" style="display:flex;justify-content:space-between;align-items:center;">'
    +'\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! <details class="wk" style="margin-top:6px"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>';}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}

var V={};
(function(){
  // Q1 linear-linear elimination
  V.s1x=rnd(1,5);V.s1y=rnd(1,5);
  V.s1a=rnd(1,3);V.s1b=rnd(1,3);
  V.s1c=V.s1a*V.s1x+V.s1b*V.s1y;V.s1d=V.s1x+V.s1y;
  // Q2 linear-quadratic substitution: y=mx+k, y=x^2
  V.s2m=rnd(1,4);V.s2k=rnd(1,6);
  var disc2=V.s2m*V.s2m+4*V.s2k;
  V.s2x1=r2((V.s2m+Math.sqrt(disc2))/2);V.s2x2=r2((V.s2m-Math.sqrt(disc2))/2);
  V.s2y1=r2(V.s2x1*V.s2x1);V.s2y2=r2(V.s2x2*V.s2x2);
  // Q3 number of solutions discriminant
  V.s3c=rnd(2,8);V.s3disc=1+4*V.s3c;
  // Q4 line meets circle x^2+y^2=r^2, y=mx through origin
  V.s4r=rnd(3,6);V.s4m=pick([1,2]);
  V.s4x1=r2(V.s4r/Math.sqrt(1+V.s4m*V.s4m));V.s4x2=-V.s4x1;
  // Q5 tangent condition: y=ax+k tangent to y=x^2 when disc=0
  V.s5a=rnd(2,5);V.s5ktang=r2(-V.s5a*V.s5a/4);
  V.s5kgiven=rnd(1,4); // not a tangent
  // Q6 word problem 2 unknowns
  V.s6t=pick([4,5,6,8]);V.s6s=pick([2,3,4]);
  V.s6p1=3*V.s6t+2*V.s6s;V.s6p2=2*V.s6t+4*V.s6s;
  // Q7 substitution with a quadratic: full pair of solutions
  V.s7p=rnd(1,3);V.s7q=rnd(1,4);
  // y = px + q, y = x^2
  var d7=V.s7p*V.s7p+4*V.s7q;
  V.s7x1=r2((V.s7p+Math.sqrt(d7))/2);V.s7x2=r2((V.s7p-Math.sqrt(d7))/2);
  V.s7y1=r2(V.s7x1*V.s7x1);V.s7y2=r2(V.s7x2*V.s7x2);
  // Q8 3-variable (simple reduction)
  V.s8x=rnd(1,4);V.s8y=rnd(1,4);V.s8z=rnd(1,4);
  V.s8A=V.s8x+V.s8y+V.s8z;
  V.s8B=V.s8x+2*V.s8y+V.s8z;
  V.s8C=2*V.s8x+V.s8y+V.s8z;
})();

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Simultaneous linear equations \u2014 elimination','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,64,V.s1a+'x + '+V.s1b+'y = '+V.s1c+'   \u00b7\u00b7\u00b7(1)','#241A17',13,'middle',false));
    o.push(T(240,82,'x + y = '+V.s1d+'   \u00b7\u00b7\u00b7(2)','#241A17',13,'middle',false));}
  if(p>=2){o.push(T(240,106,'Multiply (2) by '+V.s1a+', subtract from (1):','#888',10,'middle',false));
    o.push(R(14,116,452,30,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,135,'('+V.s1b+'\u2212'+V.s1a+')y = '+(V.s1c-V.s1a*V.s1d)+'  \u21d2  y = '+V.s1y,'#1a5a8a',13,'middle',true));}
  if(p>=3){o.push(R(100,156,280,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,178,'x = '+V.s1x+',  y = '+V.s1y,'#1a7a3a',18,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Linear-quadratic: y='+V.s2m+'x+'+V.s2k+' and y=x\u00b2','#C0272D',12,'middle',true));
  if(p>=1){o.push(T(240,62,'Substitute the linear into the quadratic:','#888',10,'middle',false));
    o.push(R(14,72,452,32,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,92,'x\u00b2\u2212'+V.s2m+'x\u2212'+V.s2k+' = 0','#1a5a8a',14,'middle',true));}
  if(p>=2){o.push(T(240,118,'Solve by formula: x = '+V.s2x1+' or x = '+V.s2x2,'#888',12,'middle',false));}
  if(p>=3){o.push(R(14,132,452,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,154,'('+V.s2x1+', '+V.s2y1+')  and  ('+V.s2x2+', '+V.s2y2+')','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Number of solutions: y = x+'+V.s3c+' and y = x\u00b2','#C0272D',12,'middle',true));
  var ox=180,oy=190,sx=32,sy=14;
  o.push(L(ox-4*sx,oy,ox+4*sx,oy,'#888',1.5));o.push(L(ox,oy+sy,ox,oy-6*sy,'#888',1.5));
  if(p>=1){var pp='';for(var x=-3;x<=4;x+=0.05){var y=x*x;if(y<=6)pp+=(pp===''?'M':'L')+(ox+x*sx)+','+(oy-y*sy)+' ';}
    if(pp)o.push('<path d="'+pp+'" fill="none" stroke="#C0272D" stroke-width="2"/>');
    var lp='';for(var x=-3;x<=4;x+=0.1){var y2=x+V.s3c;if(y2>=0&&y2<=6)lp+=(lp===''?'M':'L')+(ox+x*sx)+','+(oy-y2*sy)+' ';}
    if(lp)o.push('<path d="'+lp+'" fill="none" stroke="#1a5a8a" stroke-width="2"/>');
    o.push(T(ox+3.5*sx,oy-4*sy,'y=x\u00b2','#C0272D',8,'end',true));
    o.push(T(ox+3.5*sx,oy-(3.5+V.s3c)*sy,'y=x+'+V.s3c,'#1a5a8a',8,'end',true));}
  if(p>=2){o.push(R(14,202,452,24,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,217,'\u0394 = 1+4\u00d7'+V.s3c+' = '+V.s3disc+' > 0 \u21d2 two intersection points','#1a5a8a',11,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Line meets circle: x\u00b2+y\u00b2 = '+V.s4r*V.s4r+', y = '+V.s4m+'x','#C0272D',12,'middle',true));
  var ox=200,oy=150,sc=12;
  if(p>=1){o.push('<circle cx="'+ox+'" cy="'+oy+'" r="'+V.s4r*sc+'" fill="none" stroke="#C0272D" stroke-width="2"/>');
    o.push(L(ox-100,oy-V.s4m*100,ox+100,oy+V.s4m*100,'#1a5a8a',2));
    o.push(T(ox-90,oy-V.s4m*90-8,'y='+V.s4m+'x','#1a5a8a',9,'start',true));}
  if(p>=2){o.push(C(ox+V.s4x1*sc,oy-V.s4m*V.s4x1*sc,5,'#1a7a3a','#1a7a3a',0));
    o.push(C(ox+V.s4x2*sc,oy-V.s4m*V.s4x2*sc,5,'#1a7a3a','#1a7a3a',0));}
  if(p>=3){o.push(R(14,214,452,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,236,'x = '+V.s4x1+' or x = '+V.s4x2,'#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Tangent condition: y = '+V.s5a+'x + k tangent to y = x\u00b2','#C0272D',11,'middle',true));
  if(p>=1){o.push(T(240,62,'Tangent \u21d4 exactly one solution \u21d4 \u0394 = 0','#888',11,'middle',false));
    o.push(R(14,72,452,34,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,93,'x\u00b2\u2212'+V.s5a+'x\u2212k = 0,  \u0394 = '+V.s5a*V.s5a+'+4k = 0','#1a5a8a',12,'middle',false));}
  if(p>=2){o.push(R(14,116,452,34,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,137,'k = \u2212'+V.s5a*V.s5a+'/4 = '+V.s5ktang,'#1a7a3a',16,'middle',true));}
  if(p>=3){o.push(R(14,160,452,30,'#fff8e8','#C8922A',1));
    o.push(T(240,179,'With k = '+V.s5kgiven+': \u0394 = '+(V.s5a*V.s5a+4*V.s5kgiven)+' \u2260 0, so NOT a tangent.','#C8922A',11,'middle',false));}
  s.innerHTML=o.join('');
}

function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Word problem \u2192 simultaneous equations','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,62,'3t + 2s = '+V.s6p1+'   \u00b7\u00b7\u00b7(1)','#241A17',13,'middle',false));
    o.push(T(240,80,'2t + 4s = '+V.s6p2+'   \u00b7\u00b7\u00b7(2)','#241A17',13,'middle',false));}
  if(p>=2){o.push(T(240,104,'(2)\u00f72: t+2s='+Math.floor(V.s6p2/2)+'. Subtract from (1): 2t='+( V.s6p1-Math.floor(V.s6p2/2)),'#888',11,'middle',false));
    o.push(R(14,116,452,32,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,136,'t = '+V.s6t,'#1a5a8a',16,'middle',true));}
  if(p>=3){o.push(R(100,158,280,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,180,'t = '+V.s6t+',  s = '+V.s6s,'#1a7a3a',18,'middle',true));}
  s.innerHTML=o.join('');
}

function makeQ8Try(){
  var x=rnd(1,4),y=rnd(1,4),z=rnd(1,4);
  var A=x+y+z, B=x+2*y+z, C=2*x+y+z;
  var id='q8t'+Math.random().toString(36).slice(2);
  // store answers keyed by id
  window._q8ans=window._q8ans||{};
  window._q8ans[id]={x:x,y:y,z:z,A:A,B:B,C:C};
  return '<div class="try" id="'+id+'">'
    +'<div class="try-t" style="display:flex;justify-content:space-between;align-items:center;">'
    +'\u2714 Your Turn'
    +' <button class="nq-btn" onclick="refreshQ8Try(\''+id+'\')"> \u21bb New</button>'
    +'</div>'
    +'<div class="try-q" style="font-size:15px;margin:10px 0 6px;">'
    +'Solve this system. Find x, y and z.'
    +'</div>'
    +'<div class="fm" style="line-height:2;font-size:15px;">'
    +'x + y + z = '+A+'<br>'
    +'x + 2y + z = '+B+'<br>'
    +'2x + y + z = '+C
    +'</div>'
    +'<div style="display:flex;gap:10px;margin:12px 0 8px;flex-wrap:wrap;">'
    +'<label style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;">x =<input type="number" id="'+id+'_x" class="q8-inp" style="width:60px;font-size:15px;padding:6px 8px;border:1px solid #d4c4be;border-radius:3px;font-family:inherit;" step="any"/></label>'
    +'<label style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;">y =<input type="number" id="'+id+'_y" class="q8-inp" style="width:60px;font-size:15px;padding:6px 8px;border:1px solid #d4c4be;border-radius:3px;font-family:inherit;" step="any"/></label>'
    +'<label style="font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px;">z =<input type="number" id="'+id+'_z" class="q8-inp" style="width:60px;font-size:15px;padding:6px 8px;border:1px solid #d4c4be;border-radius:3px;font-family:inherit;" step="any"/></label>'
    +'<button class="ck" onclick="checkQ8Try(\''+id+'\')" style="padding:6px 16px;font-size:14px;">Check</button>'
    +'</div>'
    +'<div id="'+id+'_fb" style="font-size:14px;padding:0;margin-top:2px;"></div>'
    +'<details class="wk" id="'+id+'_wk" style="margin-top:8px;display:none;">'
    +'<summary>Show working</summary>'
    +'<div class="wk-b">'
    +'(2)\u2212(1): y = '+(B-A)+'<br>'
    +'(3)\u2212(1): x = '+(C-A)+'<br>'
    +'z = '+A+'\u2212'+x+'\u2212'+y+' = '+z
    +'</div></details>'
    +'</div>';
}
function refreshQ8Try(id){
  var wrap=document.getElementById(id);
  if(!wrap)return;
  var tmp=document.createElement('div');
  tmp.innerHTML=makeQ8Try();
  wrap.parentNode.replaceChild(tmp.firstChild,wrap);
}
function checkQ8Try(id){
  var ans=window._q8ans&&window._q8ans[id];
  if(!ans)return;
  var vx=parseFloat(document.getElementById(id+'_x').value);
  var vy=parseFloat(document.getElementById(id+'_y').value);
  var vz=parseFloat(document.getElementById(id+'_z').value);
  var fb=document.getElementById(id+'_fb');
  var wk=document.getElementById(id+'_wk');
  if(isNaN(vx)||isNaN(vy)||isNaN(vz)){
    fb.style.cssText='color:#a01820;background:#fde8e8;border:1px solid #f0b8b8;padding:8px 12px;border-radius:3px;';
    fb.textContent='Enter a value for x, y and z.';return;
  }
  var ok=vx===ans.x&&vy===ans.y&&vz===ans.z;
  var partial=(vx===ans.x?1:0)+(vy===ans.y?1:0)+(vz===ans.z?1:0);
  if(ok){
    fb.style.cssText='color:#1a7a3a;background:#e8f8ee;border:1px solid #a8dbb8;padding:8px 12px;border-radius:3px;';
    fb.textContent='\u2713 Correct!  x='+ans.x+', y='+ans.y+', z='+ans.z;
    wk.style.display='block';
  } else {
    fb.style.cssText='color:#a01820;background:#fde8e8;border:1px solid #f0b8b8;padding:8px 12px;border-radius:3px;';
    fb.textContent='Not quite \u2014 '+partial+' of 3 correct. Check your subtractions.';
  }
}

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);
  });
}
function render(){
  bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=(si===0);
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){
  var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();
});
render();
