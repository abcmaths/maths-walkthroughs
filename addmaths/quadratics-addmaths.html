<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quadratic Functions &middot; Add Maths (0606) &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}
.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}
.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}
.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.nq-btn:hover{background:var(--gold);color:#fff;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Quadratic Functions &mdash; Add Maths (0606)</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function r2(x){return Math.round(x*100)/100;}
function r3(x){return Math.round(x*1000)/1000;}
var ST={};
function tryIt(genFn){
  if(typeof genFn!=='function'){var _o=genFn;genFn=function(){return _o;};}
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t" style="display:flex;justify-content:space-between;align-items:center;">'
    +'\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o,inp=document.querySelector('.try-inp[data-tryid="'+id+'"]'),fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}

var V={};
(function(){
  // Q1 sketch/roots — quadratic with two real roots
  V.q1p=rnd(1,4);V.q1q=rnd(1,4);
  V.q1B=-(V.q1p+V.q1q);V.q1C=V.q1p*V.q1q;
  V.q1vx=r2((V.q1p+V.q1q)/2);V.q1vy=r2(-(V.q1p-V.q1q)*(V.q1p-V.q1q)/4);
  // Q2 completing the square: x²+bx+c → (x+b/2)²+c-b²/4
  V.q2b=pick([-6,-4,-2,2,4,6,8]);V.q2c=rnd(1,10);
  V.q2h=-V.q2b/2;V.q2k=r2(V.q2c-V.q2b*V.q2b/4);
  // Q3 quadratic formula: ax²+bx+c=0
  V.q3a=1;V.q3b=pick([-5,-4,-3,3,4,5]);V.q3c=rnd(1,4);
  V.q3disc=V.q3b*V.q3b-4*V.q3a*V.q3c;
  if(V.q3disc<0){V.q3b=-5;V.q3c=4;V.q3disc=9;}
  V.q3r1=r2((-V.q3b+Math.sqrt(V.q3disc))/(2*V.q3a));
  V.q3r2=r2((-V.q3b-Math.sqrt(V.q3disc))/(2*V.q3a));
  // Q4 discriminant and nature of roots
  V.q4b=rnd(2,6);V.q4c=rnd(1,8);
  V.q4d1=V.q4b*V.q4b-4*V.q4c;
  V.q4d2=V.q4b*V.q4b-4*(V.q4b*V.q4b/4+1); // always negative
  // Q5 quadratic inequality: x²+Bx+C > 0
  V.q5p=rnd(1,4);V.q5q=V.q5p+rnd(1,3);
  V.q5B=-(V.q5p+V.q5q);V.q5C=V.q5p*V.q5q;
  // Q6 completing the square with leading coeff
  V.q6a=pick([2,3]);V.q6b=rnd(2,8);V.q6c=rnd(1,10);
  // ax²+bx+c = a(x+b/2a)² + c - b²/4a
  V.q6h=r2(-V.q6b/(2*V.q6a));V.q6k=r2(V.q6c-V.q6b*V.q6b/(4*V.q6a));
  // Q7 max/min of quadratic
  V.q7a=pick([-2,-1,1,2]);V.q7h=rnd(-3,3);V.q7k=rnd(-4,4);
  // Q8 quadratic model: projectile h=at²+bt+c
  V.q8a=-pick([2,3,4]);V.q8b=pick([10,12,15,20]);V.q8c=0;
  // max height at t=-b/2a
  V.q8tmax=r2(-V.q8b/(2*V.q8a));V.q8hmax=r2(V.q8a*V.q8tmax*V.q8tmax+V.q8b*V.q8tmax);
})();

function plotParabola(o,ox,oy,sx,sy,a,h,k,col){
  var pts='';
  for(var i=-5;i<=5;i+=0.1){var x=i,y=a*(x-h)*(x-h)+k;if(y>=-1&&y<=8){pts+=(pts===''?'M':'L')+(ox+x*sx)+','+(oy-y*sy)+' ';}}
  if(pts)o.push('<path d="'+pts+'" fill="none" stroke="'+(col||'#C0272D')+'" stroke-width="2.5"/>');
}

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Quadratic graph: y = (x\u2212'+V.q1p+')(x\u2212'+V.q1q+')','#C0272D',12,'middle',true));
  var ox=240,oy=180,sx=36,sy=24;
  o.push(L(ox-5*sx,oy,ox+5*sx,oy,'#888',1.5));o.push(L(ox,oy+sy,ox,oy-5*sy,'#888',1.5));
  if(p>=1){
    plotParabola(o,ox,oy,sx,sy,1,V.q1vx,V.q1vy);
    o.push(C(ox+(V.q1p-V.q1vx)*sx+(-V.q1vx)*sx,oy-0,5,'#C0272D','#C0272D',0));
    // roots
    o.push(C(ox+(V.q1p-0)*sx,oy,5,'#1a5a8a','#1a5a8a',0));
    o.push(C(ox+(V.q1q-0)*sx,oy,5,'#1a5a8a','#1a5a8a',0));
    o.push(T(ox+V.q1p*sx,oy+14,''+V.q1p,'#1a5a8a',10,'middle',true));
    o.push(T(ox+V.q1q*sx,oy+14,''+V.q1q,'#1a5a8a',10,'middle',true));
  }
  if(p>=2){
    o.push(C(ox+V.q1vx*sx,oy-V.q1vy*sy,5,'#1a7a3a','#1a7a3a',0));
    o.push(T(ox+V.q1vx*sx+12,oy-V.q1vy*sy-6,'('+V.q1vx+', '+V.q1vy+')','#1a7a3a',9,'start',true));
  }
  if(p>=3){
    o.push(R(300,56,168,60,'#f8f8f8','#888',1));
    o.push(T(384,72,'Roots: x='+V.q1p+', x='+V.q1q,'#1a5a8a',10,'middle',false));
    o.push(T(384,88,'Vertex: ('+V.q1vx+', '+V.q1vy+')','#1a7a3a',10,'middle',false));
    o.push(T(384,104,'y-int: y='+V.q1C,'#888',10,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Completing the square: x\u00b2 + '+V.q2b+'x + '+V.q2c,'#C0272D',12,'middle',true));
  var steps=[
    'x\u00b2 + '+V.q2b+'x + '+V.q2c,
    '(x + '+V.q2b/2+')\u00b2 \u2212 ('+V.q2b/2+')\u00b2 + '+V.q2c,
    '(x + '+V.q2b/2+')\u00b2 \u2212 '+r2(V.q2b*V.q2b/4)+' + '+V.q2c,
    '(x + '+V.q2b/2+')\u00b2 + '+V.q2k
  ];
  if(p>=1){
    steps.forEach(function(st,i){
      o.push(R(28,56+i*44,420,36,i===3?'#e8f8ee':'#f8f8f8',i===3?'#1a7a3a':'#888',i===3?2:1));
      o.push(T(240,77+i*44,st,i===3?'#1a7a3a':'#241A17',i===3?16:13,'middle',i===3));
    });
  }
  if(p>=2){
    o.push(R(14,240,452,16,'#e8f4ff','#1a5a8a',1));
    o.push(T(240,251,'Vertex: (\u2212'+V.q2b/2+', '+V.q2k+').  Min value = '+V.q2k,' (#1a5a8a',9,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Quadratic formula: x\u00b2 + '+V.q3b+'x + '+V.q3c+' = 0','#C0272D',12,'middle',true));
  if(p>=1){
    o.push(R(28,56,420,34,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,77),'x = [\u2212b \u00b1 \u221a(b\u00b2\u22124ac)] / 2a','#1a5a8a',14,'middle',true);
  }
  if(p>=2){
    o.push(T(240,104),'b\u00b2\u22124ac = '+V.q3b*V.q3b+' \u2212 '+4*V.q3c+' = '+V.q3disc,' (\u221a = '+r2(Math.sqrt(V.q3disc))+')', '#888',11,'middle',false);
    o.push(R(28,116,420,36,'#f8f8f8','#888',1));
    o.push(T(240,138),'x = (\u2212('+V.q3b+') \u00b1 '+r2(Math.sqrt(V.q3disc))+') / 2','#888',13,'middle',false);
  }
  if(p>=3){
    o.push(R(28,164,210,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(133,186),'x = '+V.q3r1,'#1a7a3a',16,'middle',true);
    o.push(R(252,164,200,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(352,186),'x = '+V.q3r2,'#1a7a3a',16,'middle',true);
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Discriminant \u0394 = b\u00b2 \u2212 4ac and nature of roots','#C0272D',12,'middle',true));
  var rows=[
    ['\u0394 > 0','Two distinct real roots','Graph crosses x-axis twice','#1a7a3a'],
    ['\u0394 = 0','One repeated real root','Graph touches x-axis','#1a5a8a'],
    ['\u0394 < 0','No real roots','Graph does not cross x-axis','#C0272D']
  ];
  if(p>=1){
    rows.forEach(function(r,i){
      o.push(R(14,56+i*52,452,44,r[3]==='#1a7a3a'?'rgba(26,122,58,0.06)':r[3]==='#1a5a8a'?'rgba(26,90,138,0.06)':'rgba(192,39,45,0.06)',r[3],1.5));
      o.push(T(100,82+i*52,r[0],r[3],13,'middle',true));
      o.push(T(290,74+i*52,r[1],'#241A17',11,'middle',false));
      o.push(T(290,90+i*52,r[2],'#555',9,'middle',false));
    });
  }
  if(p>=2){
    o.push(R(14,216,452,30,'#fff8e8','#C8922A',1));
    o.push(T(240,235),'For x\u00b2+'+V.q4b+'x+'+V.q4c+': \u0394 = '+V.q4b*V.q4b+'\u22124\u00d7'+V.q4c+' = '+V.q4d1+(V.q4d1>0?' (two roots)':V.q4d1===0?' (one root)':' (no real roots)'),'#C8922A',11,'middle',false);
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Quadratic inequality: (x\u2212'+V.q5p+')(x\u2212'+V.q5q+') < 0','#C0272D',12,'middle',true));
  var ox=240,oy=180,sx=36,sy=22;
  o.push(L(ox-5*sx,oy,ox+5*sx,oy,'#888',1.5));o.push(L(ox,oy+sy,ox,oy-4*sy,'#888',1.5));
  if(p>=1){
    plotParabola(o,ox,oy,sx,sy,1,r2((V.q5p+V.q5q)/2),r2(-(V.q5p-V.q5q)*(V.q5p-V.q5q)/4));
    o.push(C(ox+V.q5p*sx,oy,5,'#1a5a8a','#1a5a8a',0));
    o.push(C(ox+V.q5q*sx,oy,5,'#1a5a8a','#1a5a8a',0));

var qi=0,si=0;

  var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);
  });
}
function render(){
  bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=(si===0);
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){
  var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();
});
render();
