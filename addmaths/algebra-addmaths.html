<!DOCTYPE html>

<head>

<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"\u203a";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
var ST={};
function tryIt(o){var id='t'+Math.random().toString(36).slice(2);ST[id]=o;var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');return '<div class="try"><div class="try-t">\u2714 Your Turn</div><p>'+o.question+'</p><ul class="hl">'+h+'</ul><div class="ar"><input type="number" step="any" placeholder="Answer ('+o.unit+')" id="'+id+'_i"/><button class="ck" onclick="ck(\''+id+'\')">Check</button></div><div class="fb" id="'+id+'_f"></div><details class="wk"><summary>Show full working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
function ck(id){var o=ST[id],v=parseFloat(document.getElementById(id+'_i').value),f=document.getElementById(id+'_f');if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}var tol=(o.tol||2)/100;if(Math.abs(v-o.ans)<=Math.abs(o.ans*tol)+0.05){f.className='fb ok';f.textContent='Correct! Answer: '+o.ans+' '+o.unit;}else{f.className='fb er';f.textContent='Not quite \u2014 check your working and try again.';}}
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?'700':'400')+'">'+txt+'</text>';}
function B(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function LN(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,24,'Surds: Simplify and Rationalise','#C0272D',16,'middle',true));
  if(p>=1){o.push(B(60,36,360,50,'#fff5f0','#C0272D',1.5));o.push(T(240,56,'\u221a48 = \u221a(16\u00d73) = 4\u221a3','#C0272D',15,'middle',true));o.push(T(240,78,'Find largest perfect square factor','#888',11));}
  if(p>=2){o.push(T(240,108,'Rationalise: 5/\u221a3 = 5\u221a3/3','#241A17',14,'middle',true));o.push(T(240,126,'Multiply top and bottom by \u221a3','#888',11));}
  if(p>=3){o.push(T(240,156,'(2+\u221a3)(2\u2212\u221a3) = 4\u22123 = 1','#241A17',14,'middle',true));o.push(T(240,174,'Conjugate pair: (a+b)(a\u2212b) = a\u00b2\u2212b\u00b2','#888',11));}
  if(p>=4){o.push(B(80,190,320,50,'#e8f8ee','#1a7a3a',2));o.push(T(240,207,'6/(3+\u221a3) = 6(3\u2212\u221a3)/6 = 3\u2212\u221a3','#1a7a3a',14,'middle',true));o.push(T(240,230,'Multiply by (3\u2212\u221a3)/(3\u2212\u221a3)','#888',10));}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Binomial Theorem: General Term','#C0272D',16,'middle',true));
  o.push(T(240,42,'Find the term in x\u00b3 in (2+3x)\u2075','#241A17',13));
  if(p>=1){o.push(B(60,54,360,50,'#fff5f0','#C0272D',1.5));o.push(T(240,73,'General term T(r+1) = \u207fC\u1d63 a^(n\u2212r) b\u1d63','#C0272D',14,'middle',true));o.push(T(240,95,'n=5, a=2, b=3x','#888',11));}
  if(p>=2){o.push(T(240,122,'For x\u00b3: need b\u1d63 = (3x)\u00b3, so r=3','#241A17',13));o.push(T(240,142,'T(4) = \u2075C\u2083 \u00d7 2\u00b2 \u00d7 (3x)\u00b3','#1a5a8a',14));}

  if(p>=4){o.push(B(130,184,220,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,211,'= 1080x\u00b3','#1a7a3a',18,'middle',true));}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Partial Fractions (Linear Denominators)','#C0272D',15,'middle',true));
  o.push(T(240,42,'Express (5x+1)/[(x+1)(x\u22122)] in partial fractions','#241A17',12));
  if(p>=1){o.push(B(60,56,360,44,'#fff5f0','#C0272D',1.5));o.push(T(240,73,'A/(x+1) + B/(x\u22122) = (5x+1)/[(x+1)(x\u22122)]','#C0272D',13,'middle',true));o.push(T(240,92,'Assume this form, find A and B','#888',10));}
  if(p>=2){o.push(T(240,118,'Multiply through by (x+1)(x\u22122):','#241A17',13));o.push(T(240,138,'A(x\u22122) + B(x+1) = 5x + 1','#241A17',14));}
  if(p>=3){o.push(T(240,162,'x=2:  3B=11  \u2192  B=11/3... let\'s use x=\u22121: \u22123A=\u22124 \u2192 A=4/3','#888',11));o.push(T(240,182,'Actually: x=\u22121: \u22123A=\u22124 \u2192 A=4/3   x=2: 3B=11 \u2192 B=11/3','#1a5a8a',12));}
  if(p>=4){o.push(B(60,198,360,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,215,'(4/3)/(x+1)  +  (11/3)/(x\u22122)','#1a7a3a',15,'middle',true));o.push(T(240,234,'Check by recombining','#888',10));}
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Partial Fractions: Improper & Repeated','#C0272D',14,'middle',true));

  if(p>=2){o.push(T(240,118,'Degree of numerator \u2265 denominator \u2192 improper','#1a5a8a',12));o.push(T(240,136,'Do polynomial division first: x\u00b2+3x+1 \u00f7 x\u00b2+2x+1','#241A17',12));o.push(T(240,154,'= 1 + (x) / (x+1)\u00b2','#241A17',13));}
  if(p>=3){o.push(T(240,178,'x/(x+1)\u00b2 = A/(x+1) + B/(x+1)\u00b2','#241A17',13));o.push(T(240,196,'x = A(x+1) + B. x=\u22121: \u22121=B. Coeff x: 1=A','#888',11));}
  if(p>=4){o.push(B(60,210,360,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,234,'1 + 1/(x+1) \u2212 1/(x+1)\u00b2','#1a7a3a',15,'middle',true));}
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Polynomial Division','#C0272D',16,'middle',true));
  o.push(T(240,42,'Divide x\u00b3 + 2x\u00b2 \u2212 x \u2212 2  by  (x\u22121)','#241A17',13));
  if(p>=1){
    o.push(T(80,70,'x\u00b3 + 2x\u00b2 \u2212 x \u2212 2','#241A17',13,'start'));
    o.push(T(80,70,'    \u00f7 (x \u2212 1)','#1a5a8a',13,'start'));
    o.push(LN(60,78,420,78,'#ccc',1));
  }
  if(p>=2){o.push(T(240,104,'x\u00b3 \u00f7 x = x\u00b2   \u2192   quotient starts with x\u00b2','#241A17',13));o.push(T(240,124,'x\u00b2(x\u22121) = x\u00b3\u2212x\u00b2   \u2192   subtract','#888',12));o.push(T(240,144,'Remainder: 3x\u00b2 \u2212 x \u2212 2','#C0272D',13));}
  if(p>=3){o.push(T(240,164,'3x\u00b2 \u00f7 x = 3x.  3x(x\u22121) = 3x\u00b2\u22123x  \u2192  remainder: 2x\u22122','#241A17',12));o.push(T(240,184,'2x \u00f7 x = 2.  2(x\u22121) = 2x\u22122  \u2192  remainder: 0','#888',12));}
  if(p>=4){o.push(B(100,198,280,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,224,'x\u00b3+2x\u00b2\u2212x\u22122 = (x\u22121)(x\u00b2+3x+2)','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Simultaneous with 3 Unknowns','#C0272D',14,'middle',true));
  o.push(T(240,42,'x+y+z=6,  2x\u2212y+z=3,  x+2y\u22122z=2','#241A17',12));
  if(p>=1){o.push(B(60,56,360,46,'#fff5f0','#C0272D',1.5));o.push(T(240,73,'Step 1: Eliminate one variable between pairs','#C0272D',13));o.push(T(240,91,'Eq1\u2212Eq2: \u2212x+2y\u22122z=3... No, let\'s use elimination','#888',10));}
  if(p>=2){o.push(T(240,116,'Add Eq1+Eq2: 3x+2z=9  \u2026(A)','#1a5a8a',13));o.push(T(240,134,'Eq1\u22122\u00d7Eq3: \u2212x\u22123y+5z=2... careful substitution','#888',11));}
  if(p>=3){o.push(T(240,158,'Solution: x=1, y=2, z=3','#241A17',14,'middle',true));o.push(T(240,176,'Check: 1+2+3=6\u2713, 2\u22122+3=3\u2713, 1+4\u22126=\u22121\u2260 2...','#888',10));}
  if(p>=4){o.push(B(80,192,320,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,206,'Use systematic elimination or matrix methods','#1a7a3a',13,'middle',true));o.push(T(240,228,'Always verify solution in all three equations','#888',11));}
  s.innerHTML=o.join('');}

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Modulus Functions: |f(x)|','#C0272D',16,'middle',true));
  var ox=60,oy=190,sx=30,sy=30;
  o.push(LN(ox,30,ox,oy+10,'#ddd',1.5));o.push(LN(ox-8,oy,ox+11*sx+20,oy,'#ddd',1.5));
  for(var i=-2;i<=8;i++)o.push(T(ox+i*sx+2*sx,oy+14,i,'#aaa',9));
  o.push(T(ox-12,oy+4,'0','#aaa',9,'end'));
  if(p>=1){
    var pts1=[];for(var xi=-2;xi<=8;xi+=0.2){var yi=xi-3;pts1.push([ox+(xi+2)*sx,oy-yi*sy]);}
    var path1='M';pts1.forEach(function(pt,i){path1+=(i?'L':'')+pt[0].toFixed(1)+','+pt[1].toFixed(1);});
    o.push('<path d="'+path1+'" fill="none" stroke="#C0272D" stroke-width="1.5" stroke-dasharray="5,3"/>');
    o.push(T(ox+10*sx,oy-5*sy-8,'y=x\u22123','#C0272D',10,'start'));
  }
  if(p>=2){
    var pts2=[];for(var xi=-2;xi<=8;xi+=0.2){var yi=Math.abs(xi-3);if(yi<=6)pts2.push([ox+(xi+2)*sx,oy-yi*sy]);}
    var path2='M';pts2.forEach(function(pt,i){path2+=(i?'L':'')+pt[0].toFixed(1)+','+pt[1].toFixed(1);});
    o.push('<path d="'+path2+'" fill="none" stroke="#1a7a3a" stroke-width="2.5"/>');
    o.push(T(ox+10*sx,oy-5*sy+8,'y=|x\u22123|','#1a7a3a',10,'start'));
  }
  if(p>=3){o.push('<circle cx="'+(ox+5*sx)+'" cy="'+oy+'" r="4" fill="#C8922A"/>');o.push(T(ox+5*sx,oy+20,'(3, 0) vertex','#C8922A',10,'middle'));}
  s.innerHTML=o.join('');}

function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Exponential Growth and Decay','#C0272D',15,'middle',true));
  o.push(T(240,42,'P = P\u2080 e^(kt).  P\u2080=1000, P=2000 when t=5. Find k.','#241A17',12));
  if(p>=1){o.push(B(60,54,360,44,'#fff5f0','#C0272D',1.5));o.push(T(240,71,'2000 = 1000 e^(5k)','#C0272D',15,'middle',true));o.push(T(240,91,'Substitute known values','#888',11));}

  if(p>=4){o.push(B(100,180,280,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,198,'k \u2248 0.139 (3 s.f.)','#1a7a3a',15,'middle',true));o.push(T(240,238,'Decay: k is negative. Half-life: t = ln(2)/|k|','#888',11));}
  s.innerHTML=o.join('');}

function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Change of Base and Log Equations','#C0272D',14,'middle',true));
  o.push(T(240,42,'Solve: log\u2084(x) = log\u2082(x) \u2212 3/2','#241A17',13));

  if(p>=2){o.push(T(240,116,'Let u = log\u2082(x)  \u2192  u/2 = u \u2212 3/2','#241A17',13));o.push(T(240,136,'u/2 \u2212 u = \u22123/2  \u2192  \u2212u/2 = \u22123/2','#241A17',13));}
  if(p>=3){o.push(T(240,162,'u = 3  \u2192  log\u2082(x) = 3  \u2192  x = 2\u00b3 = 8','#1a5a8a',14,'middle',true));}
  if(p>=4){o.push(B(150,178,180,42,'#e8f8ee','#1a7a3a',2));o.push(T(240,203,'x = 8','#1a7a3a',18,'middle',true));}
