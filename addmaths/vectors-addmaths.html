<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round4(x){return Math.round(x*10000)/10000;}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t" style="display:flex;justify-content:space-between;align-items:center;">'
    +'\u2714 Your Turn'
    +'<button class="nq-btn" data-tryid="'+id+'" style="font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;">\u21bb New</button>'
    +'</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}
// Arrow: draws a line with an arrowhead at (x2,y2)
function ARR(x1,y1,x2,y2,c,w){
  c=c||'#C0272D';w=w||2;
  var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);
  if(len<1)return '';
  var ux=dx/len,uy=dy/len;
  var ax=x2-10*ux,ay=y2-10*uy;
  var px=-uy,py=ux;
  var pts=(ax+5*px)+','+(ay+5*py)+' '+x2+','+y2+' '+(ax-5*px)+','+(ay-5*py);
  return '<line x1="'+x1+'" y1="'+y1+'" x2="'+ax+'" y2="'+ay+'" stroke="'+c+'" stroke-width="'+w+'"/>'
        +'<polygon points="'+pts+'" fill="'+c+'"/>';
}

// ─── SESSION VALUES ────────────────────────────────────
var V={};
(function(){
  // Q1 Vector notation
  V.q1a=rnd(2,6); V.q1b=rnd(1,5);
  V.q1c=rnd(-4,-1); V.q1d=rnd(2,6);
  V.q1mag=round2(Math.sqrt(V.q1a*V.q1a+V.q1b*V.q1b));

  // Q2 Addition and subtraction
  V.q2a=rnd(1,5); V.q2b=rnd(1,5);
  V.q2c=rnd(-4,-1); V.q2d=rnd(1,5);
  V.q2sumX=V.q2a+V.q2c; V.q2sumY=V.q2b+V.q2d;
  V.q2difX=V.q2a-V.q2c; V.q2difY=V.q2b-V.q2d;

  // Q3 Scalar multiplication and magnitude
  V.q3a=rnd(2,4); V.q3b=rnd(1,4);
  V.q3k=rnd(2,5);
  V.q3magOrig=round2(Math.sqrt(V.q3a*V.q3a+V.q3b*V.q3b));
  V.q3magScaled=round2(V.q3k*V.q3magOrig);

  // Q4 Unit vectors
  V.q4a=rnd(3,5); V.q4b=pick([3,4]);
  V.q4mag=Math.sqrt(V.q4a*V.q4a+V.q4b*V.q4b); // keep exact for clean unit vector
  V.q4magR=round2(V.q4mag);
  V.q4ux=round4(V.q4a/V.q4mag); V.q4uy=round4(V.q4b/V.q4mag);

  // Q5 Position vectors and midpoint
  V.q5ax=rnd(1,4); V.q5ay=rnd(1,4);
  V.q5bx=rnd(5,9); V.q5by=rnd(5,9);
  V.q5mx=round2((V.q5ax+V.q5bx)/2); V.q5my=round2((V.q5ay+V.q5by)/2);
  V.q5abx=V.q5bx-V.q5ax; V.q5aby=V.q5by-V.q5ay;
  V.q5abMag=round2(Math.sqrt(V.q5abx*V.q5abx+V.q5aby*V.q5aby));

  // Q6 Resultant velocity / velocity addition
  V.q6vx=rnd(3,7); V.q6vy=rnd(3,7);
  V.q6wx=rnd(-4,-1); V.q6wy=rnd(1,4);
  V.q6rx=V.q6vx+V.q6wx; V.q6ry=V.q6vy+V.q6wy;
  V.q6speed=round2(Math.sqrt(V.q6rx*V.q6rx+V.q6ry*V.q6ry));

  // Q7 Particle position from velocity
  V.q7px=rnd(0,3); V.q7py=rnd(0,3);
  V.q7vx=rnd(2,5); V.q7vy=rnd(1,4);
  V.q7t=rnd(2,5);
  V.q7qx=V.q7px+V.q7t*V.q7vx; V.q7qy=V.q7py+V.q7t*V.q7vy;
  V.q7dist=round2(Math.sqrt(Math.pow(V.q7qx-V.q7px,2)+Math.pow(V.q7qy-V.q7py,2)));

  // Q8 Collision / equal position vectors
  V.q8ax=rnd(1,4); V.q8ay=rnd(1,3);
  V.q8bx=rnd(5,9); V.q8by=rnd(5,9);
  // particle A: rA = (q8ax, q8ay) + t*(vAx, vAy); particle B: rB = (q8bx, q8by) + t*(vBx, vBy)
  V.q8t=rnd(2,4);
  // Work backwards: choose a collision point, derive velocities
  V.q8cx=rnd(7,12); V.q8cy=rnd(4,8);
  V.q8vAx=round2((V.q8cx-V.q8ax)/V.q8t); V.q8vAy=round2((V.q8cy-V.q8ay)/V.q8t);
  V.q8vBx=round2((V.q8cx-V.q8bx)/V.q8t); V.q8vBy=round2((V.q8cy-V.q8by)/V.q8t);
})();

// ─── tryIt generators ──────────────────────────────────
function yt1(){return tryIt(function(){
  var a=rnd(2,8),b=rnd(1,7);
  var ans=round2(Math.sqrt(a*a+b*b));
  return {
    question:'Vector <b>p</b> = ('+a+'<b>i</b> + '+b+'<b>j</b>). Find |<b>p</b>| to 2 d.p.',
    hints:['Use |p| = √(a² + b²)'],
    ans:ans, tol:0.01,
    working:'|<b>p</b>| = √('+a+'² + '+b+'²) = √'+(a*a+b*b)+' = '+ans
  };
});}

function yt2(){return tryIt(function(){
  var a=rnd(1,5),b=rnd(1,5),c=rnd(-4,-1),d=rnd(1,5);
  var sx=a+c,sy=b+d;
  var mag=round2(Math.sqrt(sx*sx+sy*sy));
  return {
    question:'<b>a</b> = ('+a+', '+b+') and <b>b</b> = ('+c+', '+d+'). Find |<b>a</b> + <b>b</b>| to 2 d.p.',
    hints:['Add components first, then find the magnitude'],
    ans:mag, tol:0.01,
    working:'<b>a</b>+<b>b</b> = ('+sx+', '+sy+')  →  |<b>a</b>+<b>b</b>| = √('+sx+'²+'+sy+'²) = '+mag
  };
});}

function yt3(){return tryIt(function(){
  var a=rnd(2,6),b=rnd(1,5),k=rnd(2,5);
  var mag=round2(k*Math.sqrt(a*a+b*b));
  return {
    question:'<b>v</b> = ('+a+'<b>i</b> + '+b+'<b>j</b>). Find |'+k+'<b>v</b>| to 2 d.p.',
    hints:['|kv| = k|v| — scale the magnitude, or find the scaled vector first'],
    ans:mag, tol:0.01,
    working:k+'<b>v</b> = ('+(k*a)+'<b>i</b> + '+(k*b)+'<b>j</b>)  →  magnitude = √('+(k*a)+'²+'+(k*b)+'²) = '+mag
  };
});}

function yt4(){return tryIt(function(){
  var a=rnd(3,8),b=rnd(1,6);
  var mag=Math.sqrt(a*a+b*b);
  var ux=round4(a/mag); var mag2=round2(mag);
  return {
    question:'Find the x-component of the unit vector in the direction of ('+a+', '+b+'). Give your answer to 4 d.p.',
    hints:['Divide the vector by its magnitude'],
    ans:ux, tol:0.0005,
    working:'|<b>v</b>| = √('+a+'²+'+b+'²) = '+mag2+'  →  x-component of û = '+a+'/'+mag2+' = '+ux
  };
});}

function yt5(){return tryIt(function(){
  var ax=rnd(1,4),ay=rnd(1,4),bx=rnd(5,9),by=rnd(5,9);
  var abmag=round2(Math.sqrt(Math.pow(bx-ax,2)+Math.pow(by-ay,2)));
  return {
    question:'A = ('+ax+', '+ay+') and B = ('+bx+', '+by+'). Find |AB\u20D7| to 2 d.p.',
    hints:['AB\u20D7 = OB\u20D7 \u2212 OA\u20D7, then find magnitude'],
    ans:abmag, tol:0.01,
    working:'AB\u20D7 = ('+(bx-ax)+', '+(by-ay)+')  →  |AB\u20D7| = √('+(bx-ax)+'²+'+(by-ay)+'²) = '+abmag
  };
});}

function yt6(){return tryIt(function(){
  var vx=rnd(3,8),vy=rnd(1,5),wx=rnd(-5,-1),wy=rnd(1,5);
  var rx=vx+wx,ry=vy+wy;
  var speed=round2(Math.sqrt(rx*rx+ry*ry));
  return {
    question:'Velocity <b>v</b> = ('+vx+'<b>i</b> + '+vy+'<b>j</b>) ms⁻¹ and wind <b>w</b> = ('+wx+'<b>i</b> + '+wy+'<b>j</b>) ms⁻¹. Find the resultant speed to 2 d.p.',
    hints:['Add velocity vectors component by component, then find magnitude'],
    ans:speed, tol:0.01,
    working:'Resultant = ('+rx+'<b>i</b> + '+ry+'<b>j</b>)  →  speed = √('+rx+'²+'+ry+'²) = '+speed+' ms⁻¹'
  };
});}

function yt7(){return tryIt(function(){
  var px=rnd(0,4),py=rnd(0,4),vx=rnd(2,6),vy=rnd(1,5),t=rnd(2,6);
  var qx=px+t*vx,qy=py+t*vy;
  var dist=round2(Math.sqrt(Math.pow(qx-px,2)+Math.pow(qy-py,2)));
  return {
    question:'A particle starts at ('+px+', '+py+') with velocity ('+vx+', '+vy+') m/s. Find its distance from the start after '+t+' s.',
    hints:['Position = initial position + t × velocity','Distance = |displacement|'],
    ans:dist, tol:0.01,
    working:'New position = ('+(qx)+', '+(qy)+')  →  displacement = ('+(qx-px)+', '+(qy-py)+')  →  distance = '+dist+' m'
  };
});}

function yt8(){return tryIt(function(){
  var t=rnd(2,4);
  var ax=rnd(0,3),ay=rnd(0,3),cx=rnd(6,12),cy=rnd(4,9);
  var bx=rnd(5,10),by=rnd(5,10);
  var vax=round2((cx-ax)/t),vay=round2((cy-ay)/t);
  return {
    question:'Particle A starts at ('+ax+', '+ay+') with velocity ('+vax+', '+vay+'). Find its x-coordinate after '+t+' s.',
    hints:['x = initial x + t × velocity x-component'],
    ans:cx, tol:0.01,
    working:'x = '+ax+' + '+t+'×'+vax+' = '+cx
  };
});}

// ─── DRAW FUNCTIONS ────────────────────────────────────
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Vector notation: column vector, unit vector form, bold letter','#C0272D',12,'middle',true));
  // Axes
  var ox=60,oy=200,sc=30;
  o.push(ARR(ox,oy,ox+180,oy,'#888',1.5));o.push(T(ox+185,oy,'x','#888',12,'start'));
  o.push(ARR(ox,oy,ox,oy-140,'#888',1.5));o.push(T(ox-4,oy-145,'y','#888',12,'end'));
  o.push(T(ox-5,oy+4,'O','#888',11,'end'));
  // Grid dots at integer coords
  for(var i=1;i<=4;i++){
    o.push(C(ox+i*sc,oy,2,'#ddd','#ddd'));
    o.push(T(ox+i*sc,oy+14,''+i,'#aaa',9,'middle'));
  }
  for(var j=1;j<=4;j++){
    o.push(C(ox,oy-j*sc,2,'#ddd','#ddd'));
    o.push(T(ox-8,oy-j*sc+4,''+j,'#aaa',9,'end'));
  }
  // Vector a = (V.q1a, V.q1b)
  var ax=ox,ay=oy,bx=ox+V.q1a*sc,by=oy-V.q1b*sc;

   su:'a = ('+V.q2a+', '+V.q2b+')  and  b = ('+V.q2c+', '+V.q2d+'). Find a+b and a\u2212b.',
   steps:[
    {lb:'Component-wise rule',dr:dQ2,ht:'<p>Add (or subtract) vectors <b>component by component</b>. The diagram shows the triangle law: place vectors head to tail to find the resultant.</p><div class="fm">a + b = ('+V.q2a+'+'+V.q2c+', '+V.q2b+'+'+V.q2d+') = ('+V.q2sumX+', '+V.q2sumY+')</div>'},
    {lb:'The triangle law visually',dr:dQ2,ht:'<p>On the diagram, <b>b</b> is placed at the tip of <b>a</b>. The resultant (gold arrow) goes from the start of <b>a</b> to the tip of <b>b</b>.</p>'},
    {lb:'Subtraction',dr:dQ2,ht:'<p>Subtract component by component. Equivalently, add the negative of <b>b</b>.</p><div class="fm">a \u2212 b = ('+V.q2a+'\u2212('+V.q2c+'), '+V.q2b+'\u2212'+V.q2d+') = ('+V.q2difX+', '+V.q2difY+')</div>'},

  {ey:'Q3 \u00b7 Add Maths 0606 \u00b7 Vectors in 2D',

   su:'v = ('+V.q3a+', '+V.q3b+'). Find '+V.q3k+'v and its magnitude.',

    {lb:'Magnitude of '+V.q3k+'v',dr:dQ3,ht:'<div class="fm">|'+V.q3k+'v| = '+V.q3k+' \u00d7 |v| = '+V.q3k+' \u00d7 '+V.q3magOrig+' = '+V.q3magScaled+'</div><p>Shortcut: |kv| = k|v| — you can scale the magnitude directly without computing the new vector first.</p>'},
    {lb:'Key rules',dr:dQ3,ht:'<ul class="hl"><li>k &gt; 0: same direction, scaled magnitude</li><li>k &lt; 0: opposite direction, scaled magnitude</li><li>k = 0: the zero vector</li><li>|kv| = |k| &times; |v| always</li></ul>'},

  {ey:'Q4 \u00b7 Add Maths 0606 \u00b7 Vectors in 2D',
   ti:'Unit Vectors',
   su:'a = ('+V.q4a+', '+V.q4b+'). Find the unit vector in the direction of a.',
   steps:[
    {lb:'What is a unit vector?',dr:dQ4,ht:'<p>A <b>unit vector</b> has magnitude 1. It points in the same direction as the original vector. We write it as <b>\u00e2</b> (a-hat).</p><div class="fm">\u00e2 = <b>a</b> / |<b>a</b>|</div>'},
    {lb:'Calculate',dr:dQ4,ht:'<div class="fm">|<b>a</b>| = &radic;('+V.q4a+'&sup2; + '+V.q4b+'&sup2;) = '+V.q4magR+'</div><div class="fm">\u00e2 = ('+V.q4a+' / '+V.q4magR+',  '+V.q4b+' / '+V.q4magR+')</div><div class="fm">= ('+V.q4ux+', '+V.q4uy+')</div>'},
    {lb:'Check: verify |\u00e2| = 1',dr:dQ4,ht:'<div class="fm">|\u00e2| = &radic;('+V.q4ux+'&sup2; + '+V.q4uy+'&sup2;) = 1 \u2713</div><p>The unit vectors <b>i</b> = (1, 0) and <b>j</b> = (0, 1) are the standard examples.</p>'},

  {ey:'Q5 \u00b7 Add Maths 0606 \u00b7 Vectors in 2D',

   steps:[
    {lb:'Position vectors',dr:dQ5,ht:'<p>The <b>position vector</b> of a point P is the vector from the origin O to P, written <b>OP</b> or simply <b>p</b>.</p><div class="fm">OA\u20D7 = ('+V.q5ax+', '+V.q5ay+')&ensp;&ensp;OB\u20D7 = ('+V.q5bx+', '+V.q5by+')</div>'},
    {lb:'Finding AB\u20D7',dr:dQ5,ht:'<p>Use the key result: <b>AB = OB \u2212 OA</b>.</p><div class="fm">AB\u20D7 = ('+V.q5bx+'\u2212'+V.q5ax+', '+V.q5by+'\u2212'+V.q5ay+') = ('+V.q5abx+', '+V.q5aby+')</div><div class="fm">|AB| = &radic;('+V.q5abx+'&sup2; + '+V.q5aby+'&sup2;) = '+V.q5abMag+'</div>'},
    {lb:'Midpoint of AB',dr:dQ5,ht:'<p>The position vector of the midpoint M is:</p><div class="fm">OM\u20D7 = \u00bd(OA\u20D7 + OB\u20D7) = \u00bd('+V.q5ax+'+'+V.q5bx+', '+V.q5ay+'+'+V.q5by+') = ('+V.q5mx+', '+V.q5my+')</div>'},

  {ey:'Q6 \u00b7 Add Maths 0606 \u00b7 Vectors in 2D',

    {lb:'Resultant speed',dr:dQ6,ht:'<p><b>Speed</b> is the magnitude of the velocity vector.</p><div class="fm">Speed = |R| = &radic;('+V.q6rx+'&sup2; + '+V.q6ry+'&sup2;) = '+V.q6speed+' units/s</div>'},
    {lb:'Full summary',dr:dQ6,ht:yt6()}

  {ey:'Q7 \u00b7 Add Maths 0606 \u00b7 Vectors in 2D',

    {lb:'Distance from start',dr:dQ7,ht:'<div class="fm">displacement = ('+V.q7qx+'\u2212'+V.q7px+', '+V.q7qy+'\u2212'+V.q7py+') = ('+(V.q7qx-V.q7px)+', '+(V.q7qy-V.q7py)+')</div><div class="fm">distance = &radic;('+(V.q7qx-V.q7px)+'&sup2; + '+(V.q7qy-V.q7py)+'&sup2;) = '+V.q7dist+' m</div>'},

];

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');
    w.appendChild(d);
  });
}
function render(){
  bSB();
  var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=(si===0);
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){
  var q=QS[qi];
  si=si===q.steps.length-1?0:si+1;
  render();
});
render();
</script>
