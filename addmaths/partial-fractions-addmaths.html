<script>

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function r2(x){return Math.round(x*100)/100;}
function r3(x){return Math.round(x*1000)/1000;}
var ST={};
function tryIt(genFn){
  if(typeof genFn!=='function'){var _o=genFn;genFn=function(){return _o;};}
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t" style="display:flex;justify-content:space-between;align-items:center;">'
    +'\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o,inp=document.querySelector('.try-inp[data-tryid="'+id+'"]'),fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}


var V={};
(function(){
  // Q1 type A/(x+a) + B/(x+b)  — distinct linear factors
  V.a1=rnd(1,4); V.b1=rnd(1,4); while(V.b1===V.a1)V.b1=rnd(1,4);
  V.A1=rnd(1,5); V.B1=rnd(1,5);
  // combined numerator: A1(x+b1)+B1(x+a1) = (A1+B1)x + (A1*b1+B1*a1)
  V.num1p=V.A1+V.B1; V.num1q=V.A1*V.b1+V.B1*V.a1;
  // Q2 type with repeated factor: A/(x+a) + B/(x+a)^2
  V.a2=rnd(1,4); V.A2=rnd(1,5); V.B2=rnd(1,6);
  // combined: A2(x+a2)+B2 over (x+a2)^2 → numerator A2*x + A2*a2+B2
  V.num2p=V.A2; V.num2q=V.A2*V.a2+V.B2;
  // Q3 improper fraction — degree of numerator >= denominator
  // (x^2+px+q)/(x+a)(x+b) — do polynomial division first
  V.a3=rnd(1,3); V.b3=rnd(1,3); while(V.b3===V.a3)V.b3=rnd(1,3);
  // make it: x^2 + cx + d divided by (x+a3)(x+b3) = x^2+(a3+b3)x+a3*b3
  // so quotient 1, remainder = c-(a3+b3) x + d-a3*b3
  V.c3=rnd(2,6); V.d3=rnd(1,8);
  V.rem3p=V.c3-(V.a3+V.b3); V.rem3q=V.d3-V.a3*V.b3;
  // Q4 cover-up method demo
  V.a4=rnd(1,4); V.b4=rnd(1,4); while(V.b4===V.a4)V.b4=rnd(1,4);
  V.N4=rnd(2,8);
  // A = N4/(b4-a4) at x=-a4... B = N4/(a4-b4) at x=-b4
  // Use N=5, a=1,b=2 as concrete example always
  V.cvN=rnd(3,9); V.cva=rnd(1,3); V.cvb=V.cva+rnd(1,3);
  V.cvA=r2(V.cvN/(V.cvb-V.cva)); V.cvB=r2(V.cvN/(V.cva-V.cvb));
  // Q5 three distinct linear factors
  V.a5=1; V.b5=2; V.c5=3;
  V.A5=rnd(1,4); V.B5=rnd(1,4); V.C5=rnd(1,4);
  // Q6 quadratic denominator (x+a)(x^2+b^2) — A/(x+a) + (Bx+C)/(x^2+b^2)
  V.a6=rnd(1,3); V.b6=rnd(1,3);
  V.A6=rnd(1,4); V.B6=rnd(1,3); V.C6=rnd(1,5);
  // Q7 finding A,B by substitution
  V.a7=rnd(1,3); V.b7=rnd(2,5); while(V.b7===V.a7)V.b7=rnd(2,5);
  // (3x+k)/[(x-a7)(x-b7)] = A/(x-a7)+B/(x-b7)
  // A: sub x=a7: 3*a7+k = A(a7-b7) -> A=(3a7+k)/(a7-b7)
  V.k7=rnd(1,6);
  V.A7=r2((3*V.a7+V.k7)/(V.a7-V.b7)); V.B7=r2((3*V.b7+V.k7)/(V.b7-V.a7));
  // Q8 use partial fractions to integrate
  // integral of 1/[(x+a)(x+b)] dx = 1/(b-a)[ln|x+a|-ln|x+b|]+C
  V.a8=rnd(1,3); V.b8=V.a8+rnd(1,3);
  // A=1/(b8-a8) B=-1/(b8-a8)
  V.pf8=r2(1/(V.b8-V.a8));
})();

function box(o,y,txt,col,bg){o.push(R(28,y,420,32,bg||'#f8f8f8',col||'#888',col?1.5:0.5));o.push(T(240,y+20,txt,col||'#241A17',13,'middle',!!col));}
function box2(o,y,txt,col){o.push(R(100,y,280,36,'rgba(26,122,58,0.08)','#1a7a3a',2));o.push(T(240,y+22,txt,'#1a7a3a',16,'middle',true));}

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Partial fractions: distinct linear factors','#C0272D',12,'middle',true));
  if(p>=1){box(o,56,'Express ('+V.num1p+'x+'+V.num1q+') / [(x+'+V.a1+')(x+'+V.b1+')] as partial fractions','#1a5a8a','#e8f4ff');}
  if(p>=2){box(o,98,'Let = A/(x+'+V.a1+') + B/(x+'+V.b1+')  \u21d2  A(x+'+V.b1+') + B(x+'+V.a1+') = '+V.num1p+'x+'+V.num1q,null,null);}
  if(p>=3){box(o,138,'Sub x=\u2212'+V.a1+': A\u00d7'+(V.b1-V.a1)+' = '+r2(V.num1p*(-V.a1)+V.num1q)+'  \u21d2  A = '+V.A1,null,null);
    box(o,178,'Sub x=\u2212'+V.b1+': B\u00d7'+(V.a1-V.b1)+' = '+r2(V.num1p*(-V.b1)+V.num1q)+'  \u21d2  B = '+V.B1,null,null);}
  if(p>=4){box2(o,220,V.A1+'/(x+'+V.a1+') + '+V.B1+'/(x+'+V.b1+')');}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Repeated factor: A/(x+'+V.a2+') + B/(x+'+V.a2+')\u00b2','#C0272D',12,'middle',true));
  if(p>=1){box(o,56,'('+V.num2p+'x+'+V.num2q+') / (x+'+V.a2+')\u00b2','#1a5a8a','#e8f4ff');}
  if(p>=2){box(o,98,'= A/(x+'+V.a2+') + B/(x+'+V.a2+')\u00b2  \u21d2  A(x+'+V.a2+') + B = '+V.num2p+'x+'+V.num2q,null,null);}
  if(p>=3){box(o,138,'Equate x coefficients: A = '+V.A2,null,null);
    box(o,178,'Sub x=\u2212'+V.a2+': B = '+V.num2q+'\u2212'+V.A2*V.a2+' = '+V.B2,null,null);}
  if(p>=4){box2(o,220,V.A2+'/(x+'+V.a2+') + '+V.B2+'/(x+'+V.a2+')\u00b2');}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Improper fraction: divide first','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,62,'(x\u00b2+'+V.c3+'x+'+V.d3+') \u00f7 [(x+'+V.a3+')(x+'+V.b3+')] \u2014 numerator degree = denominator degree','#888',10,'middle',false));
    box(o,74,'Step 1: polynomial long division \u21d2 quotient = 1','#1a5a8a','#e8f4ff');}
  if(p>=2){box(o,116,'Remainder = ('+V.c3+'\u2212'+(V.a3+V.b3)+')x + ('+V.d3+'\u2212'+V.a3*V.b3+') = '+V.rem3p+'x+'+V.rem3q,null,null);}
  if(p>=3){box(o,156,'Now decompose remainder / [(x+'+V.a3+')(x+'+V.b3+')]','#1a7a3a','rgba(26,122,58,0.08)');}
  if(p>=4){box2(o,196,'= 1 + [partial fractions of remainder]');}
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Cover-up method: '+V.cvN+' / [(x+'+V.cva+')(x+'+V.cvb+')]','#C0272D',12,'middle',true));
  if(p>=1){o.push(T(240,62,'Cover up (x+'+V.cva+'), set x=\u2212'+V.cva+':','#888',10,'middle',false));
    box(o,72,'A = '+V.cvN+' / (\u2212'+V.cva+'+'+V.cvb+') = '+V.cvN+' / '+(V.cvb-V.cva)+' = '+V.cvA,'#1a5a8a','#e8f4ff');}
  if(p>=2){o.push(T(240,118,'Cover up (x+'+V.cvb+'), set x=\u2212'+V.cvb+':','#888',10,'middle',false));
    box(o,128,'B = '+V.cvN+' / (\u2212'+V.cvb+'+'+V.cva+') = '+V.cvN+' / '+(V.cva-V.cvb)+' = '+V.cvB,'#1a7a3a','rgba(26,122,58,0.08)');}
  if(p>=3){box2(o,170,V.cvA+'/(x+'+V.cva+') + '+V.cvB+'/(x+'+V.cvb+')');}
  if(p>=4){o.push(R(14,216,452,28,'#fff8e8','#C8922A',1));
    o.push(T(240,234,'Cover-up: hide the factor, substitute the root of that factor.','#C8922A',10,'middle',false));}
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Three distinct linear factors','#C0272D',13,'middle',true));
  if(p>=1){box(o,56,'f(x) / [(x+1)(x+2)(x+3)] = A/(x+1) + B/(x+2) + C/(x+3)','#1a5a8a','#e8f4ff');}
  if(p>=2){box(o,98,'Multiply through: f(x) = A(x+2)(x+3) + B(x+1)(x+3) + C(x+1)(x+2)',null,null);}
  if(p>=3){box(o,138,'Cover-up for each: set x=\u22121,\u22122,\u22123 in turn',null,null);
    box(o,178,'A=f(\u22121)/[1\u22c52], B=f(\u22122)/[(\u22121)\u22c51], C=f(\u22123)/[(\u22122)(\u22121)]',null,null);}
  if(p>=4){box2(o,220,'A/(x+1) + B/(x+2) + C/(x+3)');}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
