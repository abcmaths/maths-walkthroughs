<script>

function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function r2(x){return Math.round(x*100)/100;}
function r3(x){return Math.round(x*1000)/1000;}
var ST={};
function tryIt(genFn){
  if(typeof genFn!=='function'){var _o=genFn;genFn=function(){return _o;};}
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t" style="display:flex;justify-content:space-between;align-items:center;">'
    +'\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o,inp=document.querySelector('.try-inp[data-tryid="'+id+'"]'),fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}
function axes(o,ox,oy,sx,sy,xlo,xhi,ylo,yhi){
  o.push(L(ox+xlo*sx,oy,ox+xhi*sx,oy,'#888',1.5));
  o.push(L(ox,oy-ylo*sy,ox,oy-yhi*sy,'#888',1.5));
  for(var i=xlo;i<=xhi;i++){o.push(L(ox+i*sx,oy-3,ox+i*sx,oy+3,'#888',1));if(i!==0)o.push(T(ox+i*sx,oy+12,''+i,'#888',8));}
  for(var j=ylo+1;j<=yhi;j++){if(j!==0){o.push(L(ox-3,oy-j*sy,ox+3,oy-j*sy,'#888',1));o.push(T(ox-8,oy-j*sy+4,''+j,'#888',8,'end'));}}
}


var V={};
(function(){
  // Q1 gradient from two points
  V.x1=rnd(0,2);V.y1=rnd(0,4);V.x2=rnd(4,7);V.y2=rnd(5,10);
  V.m=r2((V.y2-V.y1)/(V.x2-V.x1));
  V.c=r2(V.y1-V.m*V.x1);
  // Q2 equation from point and gradient
  V.pm=pick([-3,-2,-1,1,2,3]);V.px=rnd(1,4);V.py=rnd(1,6);
  V.pc=r2(V.py-V.pm*V.px);
  // Q3 parallel lines — same gradient
  V.qm=pick([2,3,-2,-1]);V.qc=pick([-4,-3,-2,-1,0,1,2,3,4]);
  V.qpx=rnd(1,4);V.qpy=rnd(1,6);
  V.qpc=r2(V.qpy-V.qm*V.qpx);
  // Q4 perpendicular lines — gradient = -1/m
  V.rm=pick([2,3,-2,-3]);V.rpm=-1/V.rm;
  V.rpx=rnd(1,4);V.rpy=rnd(1,6);
  V.rpc=r2(V.rpy-V.rpm*V.rpx);
  // Q5 midpoint and length
  V.ax=rnd(0,4);V.ay=rnd(0,4);V.bx=rnd(5,9);V.by=rnd(5,9);
  V.mx=r2((V.ax+V.bx)/2);V.my=r2((V.ay+V.by)/2);
  V.len=r2(Math.sqrt(Math.pow(V.bx-V.ax,2)+Math.pow(V.by-V.ay,2)));
  // Q6 intersection of two lines
  // y=m1x+c1 and y=m2x+c2 => x=(c2-c1)/(m1-m2)
  V.m1=rnd(1,3);V.c1=rnd(0,4);V.m2=pick([-3,-2,-1]);V.c2=rnd(2,8);
  V.ix=r2((V.c2-V.c1)/(V.m1-V.m2));V.iy=r2(V.m1*V.ix+V.c1);
  // Q7 perpendicular bisector
  V.p1x=rnd(0,3);V.p1y=rnd(0,3);V.p2x=rnd(5,8);V.p2y=rnd(5,8);
  V.pbmx=r2((V.p1x+V.p2x)/2);V.pbmy=r2((V.p1y+V.p2y)/2);
  V.pbsg=r2((V.p2y-V.p1y)/(V.p2x-V.p1x));
  V.pbm=r2(-1/V.pbsg);
  V.pbc=r2(V.pbmy-V.pbm*V.pbmx);
  // Q8 area of triangle from vertices
  V.t1x=0;V.t1y=0;V.t2x=rnd(3,6);V.t2y=0;V.t3x=rnd(1,4);V.t3y=rnd(3,6);
  V.tarea=r2(0.5*Math.abs(V.t1x*(V.t2y-V.t3y)+V.t2x*(V.t3y-V.t1y)+V.t3x*(V.t1y-V.t2y)));
})();

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Gradient from two points: ('+V.x1+','+V.y1+') and ('+V.x2+','+V.y2+')','#C0272D',12,'middle',true));
  var ox=80,oy=200,sx=28,sy=18;
  if(p>=1){axes(o,ox,oy,sx,sy,-1,8,0,9);
    o.push(C(ox+V.x1*sx,oy-V.y1*sy,5,'#1a5a8a','#1a5a8a',0));
    o.push(T(ox+V.x1*sx+8,oy-V.y1*sy-6,'('+V.x1+','+V.y1+')','#1a5a8a',8,'start',true));
    o.push(C(ox+V.x2*sx,oy-V.y2*sy,5,'#1a5a8a','#1a5a8a',0));
    o.push(T(ox+V.x2*sx+8,oy-V.y2*sy-6,'('+V.x2+','+V.y2+')','#1a5a8a',8,'start',true));
    o.push(L(ox+V.x1*sx,oy-V.y1*sy,ox+V.x2*sx,oy-V.y2*sy,'#C0272D',2));}
  if(p>=2){o.push(R(270,56,196,56,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(368,72,'m = ('+V.y2+'\u2212'+V.y1+')/('+V.x2+'\u2212'+V.x1+')','#1a5a8a',10,'middle',false));
    o.push(T(368,90,'= '+(V.y2-V.y1)+'/'+(V.x2-V.x1)+' = '+V.m,'#1a5a8a',12,'middle',true));}
  if(p>=3){o.push(R(270,122,196,36,'#e8f8ee','#1a7a3a',2));
    var cs=V.c>=0?'+'+V.c:V.c;
    o.push(T(368,144,'y = '+V.m+'x '+cs,'#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Equation from point ('+V.px+','+V.py+') and gradient '+V.pm,'#C0272D',12,'middle',true));
  if(p>=1){o.push(T(240,62,'Use y\u2212y\u2081 = m(x\u2212x\u2081):','#888',11,'middle',false));
    o.push(R(14,72,452,32,'#f8f8f8','#888',1));
    o.push(T(240,92,'y \u2212 '+V.py+' = '+V.pm+'(x \u2212 '+V.px+')','#241A17',13,'middle',false));}
  if(p>=2){o.push(R(14,114,452,32,'#f8f8f8','#888',1));
    o.push(T(240,134,'y = '+V.pm+'x + '+V.pm*(-V.px)+' + '+V.py,'#888',12,'middle',false));}
  if(p>=3){o.push(R(100,156,280,38,'#e8f8ee','#1a7a3a',2));
    var cs=V.pc>=0?'+'+V.pc:V.pc;
    o.push(T(240,179,'y = '+V.pm+'x '+cs,'#1a7a3a',18,'middle',true));}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Parallel lines: same gradient','#C0272D',13,'middle',true));
  var ox=160,oy=190,sx=28,sy=18;
  if(p>=1){axes(o,ox,oy,sx,sy,-2,6,0,7);
    var cs1=V.qc>=0?'+'+V.qc:V.qc;
    var cs2=V.qpc>=0?'+'+V.qpc:V.qpc;
    for(var x=-1;x<=5;x+=0.1){var y1=V.qm*x+V.qc;var y2=V.qm*x+V.qpc;
      if(y1>=0&&y1<=7){}if(y2>=0&&y2<=7){}}
    var p1='',p2='';
    for(var x=-2;x<=6;x+=0.1){
      var y1=V.qm*x+V.qc;if(y1>=0&&y1<=7)p1+=(p1===''?'M':'L')+(ox+x*sx)+','+(oy-y1*sy)+' ';
      var y2=V.qm*x+V.qpc;if(y2>=0&&y2<=7)p2+=(p2===''?'M':'L')+(ox+x*sx)+','+(oy-y2*sy)+' ';}
    if(p1)o.push('<path d="'+p1+'" fill="none" stroke="#C0272D" stroke-width="2"/>');
    if(p2)o.push('<path d="'+p2+'" fill="none" stroke="#1a5a8a" stroke-width="2"/>');
    o.push(T(ox+5*sx,oy-(V.qm*5+V.qc)*sy-8,'y='+V.qm+'x'+cs1,'#C0272D',8,'end',true));
    o.push(T(ox+5*sx,oy-(V.qm*5+V.qpc)*sy-8,'parallel','#1a5a8a',8,'end',true));}
  if(p>=2){o.push(R(14,196,452,30,'#e8f4ff','#1a5a8a',1.5));
    var cs2=V.qpc>=0?'+'+V.qpc:V.qpc;
    o.push(T(240,215,'Parallel line through ('+V.qpx+','+V.qpy+'): y = '+V.qm+'x '+cs2,'#1a5a8a',12,'middle',true));}
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Perpendicular lines: m\u2081 \u00d7 m\u2082 = \u22121','#C0272D',13,'middle',true));
  if(p>=1){o.push(R(14,56,452,40,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,68,'If gradient of L\u2081 = '+V.rm+', perpendicular gradient = \u22121\u00f7'+V.rm+' = '+V.rpm,'#1a5a8a',12,'middle',false));
    o.push(T(240,84,'Product check: '+V.rm+' \u00d7 '+V.rpm+' = '+r2(V.rm*V.rpm),'#1a5a8a',10,'middle',false));}
  if(p>=2){o.push(T(240,114,'Line through ('+V.rpx+','+V.rpy+') with gradient '+V.rpm+':','#888',11,'middle',false));
    o.push(R(14,124,452,32,'#f8f8f8','#888',1));
    o.push(T(240,144,'y \u2212 '+V.rpy+' = '+V.rpm+'(x \u2212 '+V.rpx+')','#241A17',12,'middle',false));}
  if(p>=3){o.push(R(100,166,280,38,'#e8f8ee','#1a7a3a',2));
    var cs=V.rpc>=0?'+'+V.rpc:V.rpc;
    o.push(T(240,189,'y = '+V.rpm+'x '+cs,'#1a7a3a',17,'middle',true));}
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
