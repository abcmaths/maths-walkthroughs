function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function r2(x){return Math.round(x*100)/100;}
function r3(x){return Math.round(x*1000)/1000;}
var ST={};
function tryIt(genFn){
  if(typeof genFn!=='function'){var _o=genFn;genFn=function(){return _o;};}
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();ST[id]={o:o,fn:genFn};return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t" style="display:flex;justify-content:space-between;align-items:center;">'
    +'\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o,inp=document.querySelector('.try-inp[data-tryid="'+id+'"]'),fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}
function bx(o,y,txt,hi){
  o.push(R(28,y,420,34,hi?'#e8f8ee':'#f8f8f8',hi?'#1a7a3a':'#888',hi?2:0.5));
  o.push(T(240,y+21,txt,hi?'#1a7a3a':'#241A17',hi?15:12,'middle',hi));
}
function hdr(o,txt){o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));o.push(T(240,30,txt,'#C0272D',12,'middle',true));}
function inf(o,y,txt){o.push(R(14,y,452,34,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,y+21,txt,'#1a5a8a',12,'middle',false));}
function warn(o,y,txt){o.push(R(14,y,452,28,'#fff8e8','#C8922A',1));o.push(T(240,y+18,txt,'#C8922A',10,'middle',false));}

var V={};
(function(){
  V.a1=rnd(2,8); V.d1=rnd(2,6); V.n1=rnd(5,12);
  V.Sn1=r2(V.n1/2*(2*V.a1+(V.n1-1)*V.d1));
  V.a2=rnd(2,5); V.r2=pick([2,3,0.5,0.25]); V.n2=rnd(4,7);
  V.Sn2=r2(V.a2*(1-Math.pow(V.r2,V.n2))/(1-V.r2));
  V.a3=rnd(2,6); V.r3=pick([0.5,0.25,0.2,1/3]); V.Sinf=r2(V.a3/(1-V.r3));
  V.a4=rnd(2,8); V.d4=rnd(2,5); V.tn=rnd(15,30);
  V.nth4=V.a4+(V.tn-1)*V.d4;
  V.a5=rnd(2,5); V.r5=rnd(2,3);V.n5=rnd(3,5);
  V.a6=rnd(3,8); V.d6=rnd(2,5); V.target=rnd(100,300);
  V.a7=rnd(2,6); V.d7=rnd(1,4); V.n7=rnd(4,8);
  V.sum7=r2(V.n7/2*(V.a7+V.a7+(V.n7-1)*V.d7));
  V.a8=rnd(2,5); V.r8=pick([0.5,0.25,0.2]);
  V.Sinf8=r2(V.a8/(1-V.r8));
})();

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  hdr(o,'AP: a='+V.a1+', d='+V.d1+'. Sum of '+V.n1+' terms');
  if(p>=1){inf(o,56,'S_n = n/2 (2a + (n\u22121)d) = n/2 (first + last)');}
  if(p>=2){bx(o,100,'= '+V.n1+'/2 \u00d7 (2\u00d7'+V.a1+' + '+( V.n1-1)+'\u00d7'+V.d1+') = '+V.n1+'/2 \u00d7 '+(2*V.a1+(V.n1-1)*V.d1),false);}
  if(p>=3){bx(o,144,'S_'+V.n1+' = '+V.Sn1,true);}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  hdr(o,'GP: a='+V.a2+', r='+V.r2+'. Sum of '+V.n2+' terms');
  if(p>=1){inf(o,56,'S_n = a(1\u2212r^n)/(1\u2212r)  [for r\u22601]');}
  if(p>=2){bx(o,100,'= '+V.a2+'\u00d7(1\u2212'+V.r2+'^'+V.n2+')/(1\u2212'+V.r2+')',false);}
  if(p>=3){bx(o,144,'S_'+V.n2+' = '+V.Sn2,true);}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  hdr(o,'Sum to infinity: a='+V.a3+', r='+V.r3);
  if(p>=1){inf(o,56,'S_\u221e = a/(1\u2212r)  \u2014  only exists when |r| < 1');}
  if(p>=2){bx(o,100,'= '+V.a3+'/(1\u2212'+V.r3+') = '+V.a3+'/'+( 1-V.r3),false);}
  if(p>=3){bx(o,144,'S_\u221e = '+V.Sinf,true);}
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  hdr(o,'AP nth term: a='+V.a4+', d='+V.d4+'. Find T_'+V.tn);
  if(p>=1){inf(o,56,'T_n = a + (n\u22121)d  \u2014  the general term of an AP');}
  if(p>=2){bx(o,100,'T_'+V.tn+' = '+V.a4+' + '+(V.tn-1)+'\u00d7'+V.d4,false);}
  if(p>=3){bx(o,144,'T_'+V.tn+' = '+V.nth4,true);}
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  hdr(o,'GP nth term: a='+V.a5+', r='+V.r5+'. Find T_'+V.n5);
  if(p>=1){inf(o,56,'T_n = ar^(n\u22121)  \u2014  the general term of a GP');}
  if(p>=2){bx(o,100,'T_'+V.n5+' = '+V.a5+'\u00d7'+V.r5+'^'+(V.n5-1)+' = '+V.a5+'\u00d7'+Math.pow(V.r5,V.n5-1),false);}
  if(p>=3){bx(o,144,'T_'+V.n5+' = '+r2(V.a5*Math.pow(V.r5,V.n5-1)),true);}
  s.innerHTML=o.join('');}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  hdr(o,'How many terms for AP sum > '+V.target+'?');
  if(p>=1){inf(o,56,'Set S_n = n/2(2\u00d7'+V.a6+'+(n\u22121)\u00d7'+V.d6+') > '+V.target+' and solve for n');}
  if(p>=2){bx(o,100,'Form quadratic in n: '+V.d6+'n\u00b2 + '+(2*V.a6-V.d6)+'n \u2212 2\u00d7'+V.target+' > 0',false);}
  if(p>=3){var n=1;while(n/2*(2*V.a6+(n-1)*V.d6)<V.target)n++;
    bx(o,144,'First n where S_n > '+V.target+': n = '+n,true);}
  s.innerHTML=o.join('');}

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  hdr(o,'AP sigma notation: \u2211 from r=1 to '+V.n7+' of ('+V.a7+'+'+(V.d7)+'r)');
  if(p>=1){inf(o,56,'This is an AP with first term '+(V.a7+V.d7)+' and common difference '+V.d7);}
  var actual_a=V.a7+V.d7;
  var actual_sum=r2(V.n7/2*(2*actual_a+(V.n7-1)*V.d7));
  if(p>=2){bx(o,100,'a = '+actual_a+', d = '+V.d7+', n = '+V.n7,false);}
  if(p>=3){bx(o,144,'Sum = '+actual_sum,true);}
  s.innerHTML=o.join('');}

function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  hdr(o,'Convergent GP: a='+V.a8+', r='+V.r8+'. S_\u221e = ?');
  if(p>=1){inf(o,56,'Convergent when |r| < 1. S_\u221e = a/(1\u2212r).');}
  if(p>=2){bx(o,100,'= '+V.a8+'/(1\u2212'+V.r8+') = '+V.a8+'/'+(1-V.r8),false);}
  if(p>=3){bx(o,144,'S_\u221e = '+V.Sinf8,true);}
  s.innerHTML=o.join('');}

var QS=[
  {ey:'Q1 \u00b7 Add Maths Y11 \u00b7 Series',ti:'Sum of an Arithmetic Progression',
   su:'AP: first term '+V.a1+', common difference '+V.d1+'. Find S_'+V.n1+'.',
   steps:[
    {lb:'AP sum formula',dr:dQ1,ht:'<div class="fm">S_n = n/2 [2a + (n\u22121)d]</div>'},
    {lb:'Substitute',dr:dQ1,ht:'<div class="fm">= '+V.n1+'/2 \u00d7 ['+(2*V.a1)+' + '+(V.n1-1)+'\u00d7'+V.d1+']</div>'},
    {lb:'Result',dr:dQ1,ht:'<div class="fm">S_'+V.n1+' = '+V.Sn1+'</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var a=rnd(2,8),d=rnd(1,6),n=rnd(5,12);
      var S=r2(n/2*(2*a+(n-1)*d));
      return{question:'AP: a='+a+', d='+d+'. S_'+n+'?',hints:['n/2(2a+(n-1)d)'],ans:S,tol:0.5,unit:'',working:'S = '+S};})}
  ]},
  {ey:'Q2 \u00b7 Add Maths Y11 \u00b7 Series',ti:'Sum of a Geometric Progression',
   su:'GP: a='+V.a2+', r='+V.r2+'. Find S_'+V.n2+'.',
   steps:[
    {lb:'GP sum formula',dr:dQ2,ht:'<div class="fm">S_n = a(1\u2212r^n)/(1\u2212r)</div>'},
    {lb:'Substitute',dr:dQ2,ht:'<div class="fm">= '+V.a2+'(1\u2212'+V.r2+'^'+V.n2+')/(1\u2212'+V.r2+')</div>'},
    {lb:'Result',dr:dQ2,ht:'<div class="fm">S_'+V.n2+' = '+V.Sn2+'</div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var a=rnd(2,5),r=pick([2,3]),n=rnd(3,6);
      var S=r2(a*(Math.pow(r,n)-1)/(r-1));
      return{question:'GP: a='+a+', r='+r+'. S_'+n+'?',hints:['a(r^n-1)/(r-1) when r>1'],ans:S,tol:0.5,unit:'',working:'S = '+S};})}
  ]},
  {ey:'Q3 \u00b7 Add Maths Y11 \u00b7 Series',ti:'Sum to Infinity',
   su:'GP: a='+V.a3+', r='+V.r3+'. Find S_\u221e.',
   steps:[
    {lb:'Condition for convergence',dr:dQ3,ht:'<p>The sum to infinity only exists when |r| < 1. As n\u2192\u221e, r^n\u21920.</p>'},
    {lb:'Formula',dr:dQ3,ht:'<div class="fm">S_\u221e = a/(1\u2212r) = '+V.a3+'/(1\u2212'+V.r3+') = '+V.Sinf+'</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var a=rnd(2,8),r=pick([0.5,0.25,0.2]);
      return{question:'S_\u221e for a='+a+', r='+r+'?',hints:['a/(1\u2212r)'],ans:r2(a/(1-r)),tol:0.1,unit:'',working:'= '+r2(a/(1-r))};})}
  ]},
  {ey:'Q4 \u00b7 Add Maths Y11 \u00b7 Series',ti:'AP nth Term',
   su:'AP: a='+V.a4+', d='+V.d4+'. Find the '+V.tn+'th term.',
   steps:[
    {lb:'Formula',dr:dQ4,ht:'<div class="fm">T_n = a + (n\u22121)d</div>'},
    {lb:'Substitute',dr:dQ4,ht:'<div class="fm">T_'+V.tn+' = '+V.a4+' + '+(V.tn-1)+'\u00d7'+V.d4+' = '+V.nth4+'</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var a=rnd(2,8),d=rnd(2,5),n=rnd(10,25);
      var tn=a+(n-1)*d;return{question:'AP: a='+a+', d='+d+'. T_'+n+'?',hints:['a+(n-1)d'],ans:tn,tol:0,unit:'',working:'T_'+n+' = '+tn};})}
  ]},
  {ey:'Q5 \u00b7 Add Maths Y11 \u00b7 Series',ti:'GP nth Term',
   su:'GP: a='+V.a5+', r='+V.r5+'. Find T_'+V.n5+'.',
   steps:[
    {lb:'Formula',dr:dQ5,ht:'<div class="fm">T_n = ar^(n\u22121)</div>'},
    {lb:'Substitute',dr:dQ5,ht:'<div class="fm">T_'+V.n5+' = '+V.a5+'\u00d7'+V.r5+'^'+(V.n5-1)+' = '+r2(V.a5*Math.pow(V.r5,V.n5-1))+'</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var a=rnd(2,5),r=rnd(2,3),n=rnd(3,5);
      return{question:'GP: a='+a+', r='+r+'. T_'+n+'?',hints:['ar^(n-1)'],ans:r2(a*Math.pow(r,n-1)),tol:0.1,unit:'',working:'= '+r2(a*Math.pow(r,n-1))};})}
  ]},
  {ey:'Q6 \u00b7 Add Maths Y11 \u00b7 Series',ti:'Finding How Many Terms',
   su:'AP: a='+V.a6+', d='+V.d6+'. Find smallest n such that S_n > '+V.target+'.',
   steps:[
    {lb:'Set up inequality',dr:dQ6,ht:'<div class="fm">n/2(2\u00d7'+V.a6+'+(n\u22121)\u00d7'+V.d6+') > '+V.target+'</div>'},
    {lb:'Rearrange to quadratic',dr:dQ6,ht:'<p>Expand and rearrange to get a quadratic in n. Solve and take ceiling.</p>'},
    {lb:'Result',dr:dQ6,ht:function(){var n=1;while(n/2*(2*V.a6+(n-1)*V.d6)<V.target)n++;return'<div class="fm">n = '+n+'</div>';}},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var a=rnd(3,8),d=rnd(2,5),T=rnd(80,200);
      var n=1;while(n/2*(2*a+(n-1)*d)<T)n++;
      return{question:'AP a='+a+', d='+d+'. Smallest n for S_n > '+T+'?',hints:['Try values of n'],ans:n,tol:0,unit:'',working:'n = '+n};})}
  ]},
  {ey:'Q7 \u00b7 Add Maths Y11 \u00b7 Series',ti:'Sigma Notation',
   su:'Evaluate \u2211_{r=1}^{'+V.n7+'} ('+V.a7+' + '+V.d7+'r).',
   steps:[
    {lb:'Identify the series',dr:dQ7,ht:'<p>Write out terms: r=1 gives '+(V.a7+V.d7)+', r=2 gives '+(V.a7+2*V.d7)+' \u2014 this is an AP.</p>'},
    {lb:'AP parameters',dr:dQ7,ht:'<div class="fm">a = '+(V.a7+V.d7)+', d = '+V.d7+', n = '+V.n7+'</div>'},
    {lb:'Sum',dr:dQ7,ht:function(){var a=V.a7+V.d7;return'<div class="fm">= '+r2(V.n7/2*(2*a+(V.n7-1)*V.d7))+'</div>';}},
    {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var a=rnd(1,5),d=rnd(1,4),n=rnd(4,8);
      var S=r2(n/2*(2*(a+d)+(n-1)*d));
      return{question:'\u2211_{r=1}^{'+n+'} ('+a+'+'+d+'r). Value?',hints:['First term: '+(a+d)+', d='+d],ans:S,tol:0.5,unit:'',working:'S = '+S};})}
  ]},
  {ey:'Q8 \u00b7 Add Maths Y11 \u00b7 Series',ti:'Infinite Geometric Series',
   su:'Show the GP a='+V.a8+', r='+V.r8+' converges and find S_\u221e.',
   steps:[
    {lb:'Check |r| < 1',dr:dQ8,ht:'<div class="fm">|r| = '+V.r8+' < 1 \u2714  The series converges.</div>'},
    {lb:'Apply formula',dr:dQ8,ht:'<div class="fm">S_\u221e = '+V.a8+'/(1\u2212'+V.r8+') = '+V.Sinf8+'</div>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var a=rnd(3,10),r=pick([0.5,0.25,0.2,1/3]);
      return{question:'S_\u221e for a='+a+', r='+r2(r)+'?',hints:['a/(1-r)'],ans:r2(a/(1-r)),tol:0.1,unit:'',working:'= '+r2(a/(1-r))};})}
  ]}
];

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);
  });
}
function render(){
  bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=(si===0);
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){
  var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();
});
render();
</script>
