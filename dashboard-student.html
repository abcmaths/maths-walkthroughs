<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Maths — My Dashboard</title>
  <style>

    header { background: #C0272D; color: white; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }

    .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }
    .subtitle { font-size: 0.85rem; opacity: 0.85; border-left: 1px solid rgba(255,255,255,0.4); padding-left: 14px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .user-name { font-size: 0.9rem; opacity: 0.9; }
    .btn-signout { background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px; padding: 5px 12px; font-size: 0.82rem; cursor: pointer; }
    .btn-signout:hover { background: rgba(255,255,255,0.3); }
    .btn-chpwd { background: none; color: white; border: none; font-size: 0.82rem; cursor: pointer; opacity: 0.8; text-decoration: underline; }
    .btn-chpwd:hover { opacity: 1; }
    /* Change password modal */
    .cp-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; font-family: 'Segoe UI', Arial, sans-serif; }
    .cp-overlay.open { display: flex; }
    .cp-modal { background: white; border-radius: 10px; width: 90%; max-width: 380px; padding: 28px; box-shadow: 0 8px 40px rgba(0,0,0,0.2); }
    .cp-modal h2 { font-size: 1.1rem; font-weight: 700; color: #333; margin-bottom: 20px; }
    .cp-modal label { display: block; font-size: 0.8rem; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    .cp-modal input { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 5px; font-size: 0.9rem; margin-bottom: 14px; box-sizing: border-box; font-family: inherit; }
    .cp-modal input:focus { outline: none; border-color: #C0272D; }
    .cp-btns { display: flex; gap: 10px; margin-top: 4px; }
    .cp-submit { background: #C0272D; color: white; border: none; border-radius: 5px; padding: 10px 20px; font-size: 0.9rem; font-weight: 700; cursor: pointer; font-family: inherit; }
    .cp-submit:disabled { background: #ccc; cursor: not-allowed; }
    .cp-cancel { background: none; border: 1.5px solid #ddd; border-radius: 5px; padding: 10px 14px; font-size: 0.9rem; color: #888; cursor: pointer; font-family: inherit; }
    .cp-msg { margin-top: 12px; padding: 10px 14px; border-radius: 5px; font-size: 0.85rem; display: none; }
    .cp-msg.error   { background: #fde8e8; color: #a01f24; display: block; }
    .cp-msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    main { flex: 1; max-width: 960px; width: 100%; margin: 0 auto; padding: 28px 16px; }
    .welcome { margin-bottom: 24px; }
    .welcome h1 { font-size: 1.5rem; color: #222; font-weight: 700; }
    .welcome p { font-size: 0.9rem; color: #666; margin-top: 4px; }
    .summary-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .summary-card { background: white; border-radius: 8px; padding: 20px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); text-align: center; }
    .summary-card .big { font-size: 2rem; font-weight: 700; color: #C0272D; line-height: 1; }
    .summary-card .label { font-size: 0.8rem; color: #777; margin-top: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
    .aoc-banner { background: white; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); padding: 20px 24px; margin-bottom: 28px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap; }
    .aoc-banner h2 { font-size: 1rem; color: #333; font-weight: 700; flex: 1; min-width: 160px; }
    .aoc-item { text-align: center; }
    .aoc-item .val { font-size: 1.6rem; font-weight: 700; color: #C0272D; }
    .aoc-item .lbl { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 0.4px; }
    .aoc-none { color: #aaa; font-size: 0.88rem; font-style: italic; }
    .section-title { font-size: 1rem; font-weight: 700; color: #333; margin-bottom: 14px; }
    .strands { background: white; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); padding: 20px 24px; margin-bottom: 28px; }
    .strand-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .strand-row:last-child { margin-bottom: 0; }
    .strand-name { width: 130px; font-size: 0.85rem; color: #444; font-weight: 600; flex-shrink: 0; }
    .bar-bg { flex: 1; background: #eee; border-radius: 99px; height: 10px; overflow: hidden; }
    .bar-fill { height: 100%; background: #C0272D; border-radius: 99px; transition: width 0.6s ease; }
    .strand-pct { width: 40px; text-align: right; font-size: 0.82rem; color: #888; flex-shrink: 0; }
    .topics-section { background: white; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); padding: 20px 24px; margin-bottom: 28px; }
    .topics-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
    .year-selector { display: flex; align-items: center; gap: 8px; }
    .year-selector label { font-size: 0.82rem; font-weight: 600; color: #555; white-space: nowrap; }
    .year-selector select { padding: 7px 10px; border: 1.5px solid #ddd; border-radius: 5px; font-size: 0.88rem; color: #333; background: white; cursor: pointer; }
    .year-selector select:focus { outline: none; border-color: #C0272D; }
    .topic-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
    .topic-card { border: 1.5px solid #eee; border-radius: 6px; padding: 12px 14px; cursor: pointer; transition: all 0.18s; }
    .topic-card:hover { border-color: #C0272D; box-shadow: 0 2px 8px rgba(192,39,45,0.12); transform: translateY(-1px); }
    .topic-card.completed { border-color: #a5d6a7; background: #f1f8f1; }
    .topic-card.started   { border-color: #ffe082; background: #fffde7; }
    .topic-card .t-name   { font-size: 0.88rem; font-weight: 600; color: #333; margin-bottom: 4px; }
    .topic-card .t-strand { font-size: 0.75rem; color: #888; }
    .topic-card .t-test { font-size: 0.72rem; color: #1a56b0; margin-top: 4px; }
    .t-btns { display: flex; gap: 6px; margin-top: 8px; }
    .t-btn-walk { flex: 1; padding: 5px 8px; background: #C0272D; color: white; border: none; border-radius: 4px; font-size: 0.72rem; font-weight: 700; cursor: pointer; }
    .t-btn-walk:hover { background: #a01f24; }
    .t-btn-test { flex: 1; padding: 5px 8px; background: white; color: #C0272D; border: 1.5px solid #C0272D; border-radius: 4px; font-size: 0.72rem; font-weight: 700; cursor: pointer; }
    .t-btn-test:hover { background: #fde8e8; }
    .topic-card.completed .t-status { color: #2e7d32; }
    .topic-card.started   .t-status { color: #f57f17; }
    .topic-card.not-started .t-status { color: #bbb; }
    .no-topics { text-align: center; color: #aaa; padding: 32px; font-size: 0.9rem; font-style: italic; }
    .t-new-badge { display: inline-block; font-size: 0.65rem; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; background: #C0272D; color: #fff; padding: 1px 6px; border-radius: 8px; margin-left: 5px; vertical-align: middle; }
    .loading { text-align: center; color: #aaa; padding: 40px; font-size: 0.95rem; }
    .error-box { background: #fde8e8; color: #a01f24; border-radius: 8px; padding: 20px; margin: 20px 0; font-size: 0.9rem; }
    footer { text-align: center; padding: 16px; font-size: 0.78rem; color: #aaa; }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="logo">ABC</div>
    <a href="index.html" class="subtitle" style="color:#fff;text-decoration:none;">Maths Portal</a>
  </div>
  <div class="header-right">
    <span class="user-name" id="header-name"></span>
    <button class="btn-chpwd" onclick="openChangePwd()">Change Password</button>
    <button class="btn-signout" onclick="signOut()">Sign out</button>
  </div>
</header>

<!-- Change Password Modal -->
<div class="cp-overlay" id="cp-overlay">
  <div class="cp-modal">
    <h2>Change Password</h2>
    <label>New Password</label>
    <input type="password" id="cp-new" placeholder="At least 6 characters">
    <label>Confirm New Password</label>
    <input type="password" id="cp-confirm" placeholder="Repeat new password">
    <div class="cp-btns">
      <button class="cp-submit" id="cp-submit-btn" onclick="submitChangePwd()">Update Password</button>
      <button class="cp-cancel" onclick="closeChangePwd()">Cancel</button>
    </div>
    <div class="cp-msg" id="cp-msg"></div>
  </div>
</div>

<main>
  <div id="loading" class="loading">Loading your dashboard…</div>
  <div id="error-section" style="display:none"><div class="error-box" id="error-msg"></div></div>
  <div id="dashboard" style="display:none">

    <div class="welcome">
      <h1 id="welcome-name"></h1>
      <p id="welcome-sub"></p>
    </div>

    <div class="summary-row">
      <div class="summary-card"><div class="big" id="stat-total">—</div><div class="label">My Topics</div></div>
      <div class="summary-card"><div class="big" id="stat-completed">—</div><div class="label">Completed</div></div>
      <div class="summary-card"><div class="big" id="stat-started">—</div><div class="label">In Progress</div></div>
      <div class="summary-card"><div class="big" id="stat-pct">—</div><div class="label">My Progress</div></div>
    </div>

    <div class="aoc-banner">
      <h2>End-of-Year Assessment (AOC)</h2>
      <div id="aoc-content" class="aoc-none">No result recorded yet.</div>
    </div>

    <div class="strands">
      <div class="section-title">My Progress by Strand</div>
      <div id="strand-bars"></div>
    </div>

    <div class="topics-section">
      <div class="topics-header">
        <div class="section-title" style="margin-bottom:0">Browse Topics</div>
        <div class="year-selector">
          <label>Viewing:</label>
          <select id="year-select" onchange="renderTopics()">
            <option value="own">My Year</option>
            <option value="7">Year 7</option>
            <option value="8">Year 8</option>
            <option value="9">Year 9</option>
            <option value="10">Year 10</option>
            <option value="11">Year 11</option>
            <option value="12">Year 12</option>
            <option value="13">Add Maths</option>
          </select>
        </div>
      </div>
      <div id="viewing-label" style="font-size:0.82rem;color:#888;margin-bottom:14px"></div>
      <div class="topic-grid" id="topic-grid"></div>
    </div>

  </div>
</main>

<footer>© Adorable British College — ABC Maths Portal</footer>

    // Year 12
    'Y12-ALG-01': 'year12/algebra-y12.html',
    'Y12-GEO-01': 'year12/geometry-y12.html',
    'Y12-CAL-01': 'year12/calculus-y12.html',

    'Y12-ALG-03': 'year12/matrices-y12.html',
    'Y12-ALG-04': 'year12/sets-y12.html',
    // Add Maths
    'AM-ALG-01': 'addmaths/algebra-addmaths.html',
    'AM-ALG-02': 'addmaths/equations-inequalities-addmaths.html',
    'AM-ALG-03': 'addmaths/quadratics-advanced-addmaths.html',
    'AM-ALG-04': 'addmaths/polynomials-addmaths.html',

    'AM-ALG-07': 'addmaths/surds-addmaths.html',
    'AM-ALG-08': 'addmaths/series-addmaths.html',
    'AM-FUN-01': 'addmaths/functions-addmaths.html',
    'AM-LOG-01': 'addmaths/log-exp-addmaths.html',
    'AM-GEO-01': 'addmaths/straight-lines-addmaths.html',
    'AM-GEO-02': 'addmaths/circle-equation-addmaths.html',
    'AM-CAL-01': 'addmaths/differentiation-addmaths.html',
    'AM-CAL-02': 'addmaths/integration-addmaths.html',
    'AM-TRI-01': 'addmaths/trigonometry-addmaths.html',
    'AM-TRI-02': 'addmaths/trig-identities-addmaths.html',
    'AM-TRI-03': 'addmaths/circular-measure-addmaths.html',
    'AM-STA-01': 'addmaths/permutation-combination-addmaths.html',
  };

  let allTopics   = [];
  let progressMap = {};
  let testResultsMap = {};
  let myYearGroup = 7;
  let userId      = null;

  function showError(msg) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-msg').textContent = msg;
    document.getElementById('error-section').style.display = 'block';
  }

  async function init() {
    try {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = 'login.html'; return; }
      userId = session.user.id;

      const { data: profile, error: profileError } = await supabase
        .from('profiles').select('*').eq('id', userId).maybeSingle();

      if (profileError) { showError('Error loading profile: ' + profileError.message); return; }
      if (!profile)     { showError('No profile found. Please contact your teacher.'); return; }

      if (profile.role === 'admin' || profile.role === 'teacher') {
        window.location.href = 'dashboard-staff.html'; return;
      }

      myYearGroup = profile.year_group || 7;

      document.getElementById('header-name').textContent = profile.full_name;
      document.getElementById('welcome-name').textContent = 'Hello, ' + profile.full_name.split(' ')[0] + '!';
      document.getElementById('welcome-sub').textContent = 'Year ' + myYearGroup + (profile.form_class ? ' · ' + profile.form_class : '') + ' · Maths';

      // Load all topics
      const { data: topics } = await supabase
        .from('topics').select('*').order('year_group').order('sort_order');
      allTopics = topics || [];

      // Load progress
      const { data: progress } = await supabase
        .from('walkthrough_progress').select('*').eq('student_id', userId);
      (progress || []).forEach(p => { progressMap[p.topic_id] = p.status; });

      // Load best test result per topic
      const { data: testResults } = await supabase
        .from('test_results').select('topic_id, grade, percentage, level')
        .eq('student_id', userId).order('percentage', { ascending: false });
      (testResults || []).forEach(r => {
        if (!testResultsMap[r.topic_id]) testResultsMap[r.topic_id] = r;
      });

      // AOC
      const { data: aoc } = await supabase
        .from('eoy_aoc_results').select('*').eq('student_id', userId)
        .order('academic_year', { ascending: false }).limit(1).maybeSingle();

      // Summary cards (own year)
      const myTopics  = allTopics.filter(t => t.year_group === myYearGroup);
      const total     = myTopics.length;
      const completed = myTopics.filter(t => progressMap[t.id] === 'completed').length;
      const started   = myTopics.filter(t => progressMap[t.id] === 'started').length;
      const pct       = total > 0 ? Math.round((completed / total) * 100) : 0;

      document.getElementById('stat-total').textContent     = total;
      document.getElementById('stat-completed').textContent = completed;
      document.getElementById('stat-started').textContent   = started;
      document.getElementById('stat-pct').textContent       = pct + '%';

      // AOC banner
      if (aoc) {
        const aocEl = document.getElementById('aoc-content');
        aocEl.className = '';
        aocEl.innerHTML = `
          <div class="aoc-item"><div class="val">${aoc.total_marks}/${aoc.max_marks}</div><div class="lbl">Marks</div></div>
          <div class="aoc-item"><div class="val">${aoc.percentage}%</div><div class="lbl">Percentage</div></div>
          <div class="aoc-item"><div class="val">${aoc.grade || '—'}</div><div class="lbl">Grade</div></div>
          <div class="aoc-item"><div class="val" style="font-size:0.9rem;color:#555">${aoc.academic_year}</div><div class="lbl">Academic Year</div></div>`;
      }

      // Strand bars (own year)
      const strands = {};
      myTopics.forEach(t => {
        const s = t.strand || 'Other';
        if (!strands[s]) strands[s] = { total: 0, completed: 0 };
        strands[s].total++;
        if (progressMap[t.id] === 'completed') strands[s].completed++;
      });

      document.getElementById('strand-bars').innerHTML = Object.entries(strands).length > 0
        ? Object.entries(strands).map(([name, data]) => {
            const p = data.total > 0 ? Math.round((data.completed / data.total) * 100) : 0;
            return `<div class="strand-row">
              <div class="strand-name">${name}</div>
              <div class="bar-bg"><div class="bar-fill" style="width:${p}%"></div></div>
              <div class="strand-pct">${p}%</div>
            </div>`;
          }).join('')
        : '<div class="no-topics">No topics added for your year group yet.</div>';

      // Set default selector and render
      document.getElementById('year-select').value = 'own';
      window.renderTopics();

      document.getElementById('loading').style.display  = 'none';
      document.getElementById('dashboard').style.display = 'block';

    } catch(err) {
      console.error('Dashboard error:', err);
      showError('Something went wrong: ' + err.message);
    }
  }

  window.renderTopics = function() {
    const value = document.getElementById('year-select').value;
    let filtered, label;

    if (value === 'own') {
      filtered = allTopics.filter(t => t.year_group === myYearGroup);
      label    = 'Showing your Year ' + myYearGroup + ' topics';
    } else if (value === '13') {
      filtered = allTopics.filter(t => t.year_group === 13);
      label    = 'Showing Add Maths topics';
    } else {
      const yr = parseInt(value);
      filtered = allTopics.filter(t => t.year_group === yr);
      label    = 'Showing Year ' + yr + ' topics' + (yr !== myYearGroup ? ' — browsing another year' : '');
    }

    document.getElementById('viewing-label').textContent = label;

    const grid = document.getElementById('topic-grid');
    if (filtered.length === 0) {
      grid.innerHTML = '<div class="no-topics">No topics available here yet — check back soon!</div>';
      return;
    }

    grid.innerHTML = filtered.map(t => {
      const status = progressMap[t.id] || 'not-started';
      const lbl    = status === 'completed' ? '✓ Completed' : status === 'started' ? '▶ In Progress' : '○ Not started';
      const file   = WALKTHROUGH_FILES[t.topic_code] || '#';
      const testResult = testResultsMap[t.id];
      const testBadge  = testResult
        ? `<div class="t-test">Last test: <strong>${testResult.grade}</strong> (${testResult.percentage}%)</div>`
        : '';
      const NEW_TOPICS = new Set(['Y9-NUM-02','Y10-NUM-02','Y10-NUM-03','Y10-ALG-03','Y10-GEO-05','Y11-GEO-04','Y11-ALG-03','Y11-ALG-04','Y11-STA-01','Y10-NUM-04','Y11-GEO-05','Y11-PRO-01','Y10-GEO-06','Y11-SET-01','Y11-NUM-02']);
      const newBadge = NEW_TOPICS.has(t.topic_code) && status === 'not-started' ? '<span class="t-new-badge">New</span>' : '';
      return `<div class="topic-card ${status}">
        <div class="t-name">${t.topic_name}${newBadge}</div>
        <div class="t-strand">${t.strand || ''}</div>
        <div class="t-status">${lbl}</div>
        ${testBadge}
        <div class="t-btns">
          <button class="t-btn-walk" onclick="openTopic('${t.id}','${file}')">Walkthrough</button>
          <button class="t-btn-test" onclick="openTest('${t.id}')">Take a Test</button>
        </div>
      </div>`;
    }).join('');
  };

  window.openTest = function(topicId) {
    // Pass topic ID to test page via URL parameter
    window.location.href = 'test.html?topic=' + topicId;
  };

  window.openTopic = async function(topicId, file) {
    if (file === '#') { alert('This walkthrough is coming soon!'); return; }
    if (progressMap[topicId] !== 'completed') {
      await supabase.from('walkthrough_progress').upsert({
        student_id: userId, topic_id: parseInt(topicId),
        status: 'started', last_visited_at: new Date().toISOString(),
      }, { onConflict: 'student_id,topic_id' });
      progressMap[topicId] = 'started';
    }
    window.location.href = file;
  };

  window.openChangePwd = function() {
    document.getElementById('cp-new').value     = '';
    document.getElementById('cp-confirm').value = '';
    document.getElementById('cp-msg').className = 'cp-msg';
    document.getElementById('cp-msg').textContent = '';
    document.getElementById('cp-overlay').classList.add('open');
  };

  window.closeChangePwd = function() {
    document.getElementById('cp-overlay').classList.remove('open');
  };

  window.submitChangePwd = async function() {
    const newPwd     = document.getElementById('cp-new').value;
    const confirmPwd = document.getElementById('cp-confirm').value;
    const msg        = document.getElementById('cp-msg');
    const btn        = document.getElementById('cp-submit-btn');

    if (newPwd.length < 6) {
      msg.className = 'cp-msg error';
      msg.textContent = 'Password must be at least 6 characters.';
      return;
    }
    if (newPwd !== confirmPwd) {
      msg.className = 'cp-msg error';
      msg.textContent = 'Passwords do not match.';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Updating…';

    const { error } = await supabase.auth.updateUser({ password: newPwd });

    if (error) {
      msg.className = 'cp-msg error';
      msg.textContent = 'Error: ' + error.message;
      btn.disabled = false;
      btn.textContent = 'Update Password';
      return;
    }

    msg.className = 'cp-msg success';
    msg.textContent = '✓ Password updated successfully!';
    btn.disabled = false;
    btn.textContent = 'Update Password';
    setTimeout(closeChangePwd, 2000);
  };

  window.signOut = async function() {
    await supabase.auth.signOut();
    window.location.href = 'login.html';
  };

  init();
</script>

</body>
</html>
