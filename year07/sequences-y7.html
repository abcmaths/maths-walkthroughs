<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sequences · Year 7 · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

.newq-btn{float:right;font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.newq-btn:hover{background:var(--gold);color:#fff;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Sequences &mdash; Year 7</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>

var ST={};

function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function htmlFrac(num,den,col,lbl){
  col=col||'#C0272D';
  return '<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 3px;line-height:1.1;">'
    +(lbl?'<span style="font-size:10px;color:#888;font-style:italic;line-height:1.2;">numerator</span>':'')
    +'<span style="font-size:17px;font-weight:700;color:'+col+';border-bottom:2px solid '+col+';padding:0 4px 1px;min-width:18px;text-align:center;">'+num+'</span>'
    +'<span style="font-size:17px;color:'+col+';padding:1px 4px 0;min-width:18px;text-align:center;">'+den+'</span>'
    +(lbl?'<span style="font-size:10px;color:#888;font-style:italic;line-height:1.2;">denominator</span>':'')
    +'</span>';
}

function tryIt(genFn){
  if(typeof genFn==='object'){var _o=genFn;genFn=function(){return _o;};}
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}

function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class=\"hl\">'+h+'</ul>':'')+'<div class=\"wk-b\">'+o.working+'</div>';
  var ex=o.extraHTML||'';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn'
    +' <button class="newq-btn" data-tryid="'+id+'">↻ New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +ex
    +'<div class="ar">'
    +'<input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'
    +'<div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}

function newQ(id){
  var e=ST[id]; if(!e||!e.genFn)return;
  var o=e.genFn(); e.o=o;
  var box=document.querySelector('.try[data-tryid="'+id+'"]');
  if(!box)return;
  var tmp=document.createElement('div');
  tmp.innerHTML=buildTry(id,o);
  box.parentNode.replaceChild(tmp.firstChild,box);
  ST[id]={o:o,genFn:e.genFn};
}

function ckById(id){
  var e=ST[id]; if(!e)return;
  var o=e.o;
  var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
  var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
  if(!inp||!fb)return;
  var v=parseFloat(inp.value);
  if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
  if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){
    fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! '+o.working;
  }else{
    fb.className='try-fb fb er';fb.textContent='Not quite — try again.';
  }
}

document.addEventListener('click',function(e){
  var btn=e.target;
  if(btn.classList.contains('newq-btn')){
    newQ(btn.getAttribute('data-tryid'));
  } else if(btn.classList.contains('try-ck')){
    ckById(btn.getAttribute('data-tryid'));
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

function termBox(x,y,val,col,highlight){
  var fill=highlight?col+'33':'#fff';
  var stroke=highlight?col:'#ddd';
  var o=R(x,y,52,42,fill,stroke,highlight?2:1);
  o+=T(x+26,y+26,val,highlight?col:'#555',18,'middle',highlight);
  return o;
}

/* Q1 Arithmetic sequence */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var seq=[5,8,11,14,17,20,23];
  seq.forEach(function(v,i){o+=termBox(30+i*60,90,v,'#C0272D',p>=1&&i<5);});
  o+=termBox(30+5*60,90,'?','#1a7a3a',p>=2);
  o+=termBox(30+6*60,90,'?','#1a7a3a',p>=3);
  o+=T(240,22,'Term-to-term rule: +3 each time','#C0272D',13,'middle',true);
  o+=R(14,10,452,28,'#fff5f0','#C0272D',1.5);
if(p>=1){
    for(var i=0;i<4;i++){o+=T(64+i*60,80,'+3','#C8922A',11,'middle',false);}
    o+=T(240,50,'Common difference = +3','#C8922A',13,'middle',true);
  }
  if(p>=2){o+=termBox(30+5*60,90,'20','#1a7a3a',true);}
  if(p>=3){o+=termBox(30+6*60,90,'23','#1a7a3a',true);}
  if(p>=3){o+=T(240,200,'Continue: keep adding 3 each time','#888',11,'middle',false);}
  s.innerHTML=o;
}

/* Q2 Term-to-term rules */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var seqs=[
    {terms:[3,6,12,24],rule:'\u00d72',col:'#C0272D'},
    {terms:[100,50,25,12.5],rule:'\u00f72',col:'#1a5a8a'},
    {terms:[1,4,9,16],rule:'+3,+5,+7\u2026',col:'#C8922A'}
  ];
  seqs.forEach(function(seq,si){
    var y=30+si*72;
    seq.terms.forEach(function(v,i){o+=termBox(40+i*80,y,v,seq.col,p>=si+1);});
    if(p>=si+1){o+=T(240+seq.terms.length*40,y+22,seq.rule,seq.col,12,'start',true);}
  });
  if(p>=3){o+=T(240,248,'Different rules: multiply, divide, or adding different amounts','#888',11,'middle',false);}
  s.innerHTML=o;
}

/* Q3 Matchstick pattern */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,32,'Matchstick squares: how many sticks for n squares?','#C0272D',13,'middle',true));
  // Draw squares progressively
  var sq=function(x,y,n,col){
    for(var i=0;i<n;i++){
      o.push(L(x+i*28,y,x+i*28+28,y,col||'#C0272D',2));
      o.push(L(x+i*28,y+28,x+i*28+28,y+28,col||'#C0272D',2));
      o.push(L(x+i*28,y,x+i*28,y+28,col||'#C0272D',2));
    }
    o.push(L(x+n*28,y,x+n*28,y+28,col||'#C0272D',2));
  };
  if(p>=1){sq(40,56,1);o.push(T(54,100,'n=1','#888',10,'middle'));o.push(T(54,114,'4 sticks','#C0272D',10,'middle',true));}
  if(p>=2){sq(130,56,2,'#1a5a8a');o.push(T(158,100,'n=2','#888',10,'middle'));o.push(T(158,114,'7 sticks','#1a5a8a',10,'middle',true));}
  if(p>=3){sq(252,56,3,'#1a7a3a');o.push(T(294,100,'n=3','#888',10,'middle'));o.push(T(294,114,'10 sticks','#1a7a3a',10,'middle',true));}
  if(p>=4){
    o.push(T(240,140,'Pattern: each new square adds 3 sticks (left side already shared)','#241A17',11,'middle',false));
    o.push(T(240,158,'n=1: 4   n=2: 4+3=7   n=3: 4+3+3=10','#888',11,'middle',false));
    o.push(T(240,174,'That is 1 + 3n... but check: n=1 gives 1+3=4 ✓','#888',11,'middle',false));
    o.push(R(130,182,220,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,204,'nth term = 3n + 1','#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,28,'Square and Triangle Numbers','#C0272D',13,'middle',true));
  // Square numbers: grid dots
  if(p>=1){
    [[1,1],[2,4],[3,9],[4,16],[5,25]].forEach(function(sq,i){
      var gx=20+i*88,gy=60,n=sq[0];
      for(var r=0;r<n;r++) for(var c=0;c<n;c++)
        o.push('<circle cx="'+(gx+c*10)+'" cy="'+(gy+r*10)+'" r="3.5" fill="#C0272D"/>');
      o.push(T(gx+n*5-5,gy+n*10+12,sq[1],'#C0272D',11,'middle',true));
      o.push(T(gx+n*5-5,gy+n*10+24,n+'²','#888',9,'middle',false));
    });
    o.push(T(240,52,'Square numbers (1, 4, 9, 16, 25…)','#C0272D',10,'middle',false));
  }
  // Triangle numbers: triangular dot patterns
  if(p>=2){
    [[1,1],[2,3],[3,6],[4,10],[5,15]].forEach(function(tr,i){
      var gx=20+i*88,gy=162,n=tr[0];
      for(var r=0;r<n;r++){
        var rowOff=(n-1-r)*5;
        for(var c=0;c<=r;c++)
          o.push('<circle cx="'+(gx+rowOff+c*10)+'" cy="'+(gy+r*10)+'" r="3.5" fill="#1a5a8a"/>');
      }
      o.push(T(gx+n*5-5,gy+n*10+10,tr[1],'#1a5a8a',11,'middle',true));
    });
    o.push(T(240,152,'Triangle numbers (1, 3, 6, 10, 15…)','#1a5a8a',10,'middle',false));
  }
  if(p>=3){
    o.push(R(290,152,176,96,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(378,168,'T(n) = 1+2+3+…+n','#1a7a3a',11,'middle',true));
    o.push(T(378,186,'n(n+1) ÷ 2','#1a7a3a',13,'middle',true));
    o.push(T(378,208,'T(5) = 5×6÷2 = 15','#888',10,'middle',false));
    o.push(T(378,224,'T(6) = 6×7÷2 = 21','#888',10,'middle',false));
    o.push(T(378,240,'T(7) = 7×8÷2 = 28','#888',10,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Find the missing term in: 5,  ?,  17,  23,  29','#C0272D',14,'middle',true));
  var terms=[5,null,17,23,29];
  var cx=[80,180,280,370,450];
  if(p>=1){
    terms.forEach(function(v,i){
      var filled=(v!==null);
      o.push(R(cx[i]-36,60,72,38,filled?'#fff5f0':'#f0f0f0',filled?'#C0272D':'#888',filled?2:1.5));
      o.push(T(cx[i],83,filled?v:'?',filled?'#C0272D':'#888',filled?18:22,'middle',filled));
    });
    // Show only one gap arrow
    o.push(L(cx[1]-36,100,cx[1]+36,100,'#C8922A',1));
    o.push(T(cx[1],116,'find this','#C8922A',10,'middle',false));
  }
  if(p>=2){
    // Show the common difference from known neighbours
    o.push(T(240,136,'Common difference: 23−17 = 6, or 29−23 = 6','#1a5a8a',12,'middle',false));
    o.push(T(240,154,'So d = 6','#1a5a8a',14,'middle',true));
  }
  if(p>=3){
    o.push(R(cx[1]-42,60,84,38,'#e8f8ee','#1a7a3a',2));
    o.push(T(cx[1],83,'11','#1a7a3a',20,'middle',true));
    o.push(T(240,178,'Missing term = 17 − 6 = 11','#1a7a3a',14,'middle',true));
    o.push(T(240,198,'Check: 5, 11, 17, 23, 29 ✓ (all differ by 6)','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Sequence:  4,  7,  10,  13,  16, …','#C0272D',15,'middle',true));
  var seq=[4,7,10,13,16];
  if(p>=1){
    seq.forEach(function(v,i){
      o.push(R(40+i*78,56,60,36,'#fff5f0','#C0272D',1.5));
      o.push(T(70+i*78,79,v,'#C0272D',16,'middle',true));
      o.push(T(40+i*78,50,'n='+(i+1),'#888',9,'start',false));
    });
  }
  if(p>=2){
    // Show multiples of 3 underneath
    o.push(T(40,108,'Multiples of 3:','#1a5a8a',11,'start',false));
    [3,6,9,12,15].forEach(function(v,i){
      o.push(R(40+i*78,114,60,34,'#e8f4ff','#1a5a8a',1.5));
      o.push(T(70+i*78,135,v,'#1a5a8a',14,'middle',false));
    });
    o.push(T(240,102,'Common difference = 3, so compare to 3×n:','#241A17',11,'middle',false));
  }
  if(p>=3){
    o.push(T(240,164,'Each term is 1 MORE than the matching multiple of 3:','#241A17',11,'middle',false));
    o.push(T(240,180,'4 = 3×1 + 1    7 = 3×2 + 1    10 = 3×3 + 1','#888',11,'middle',false));
    o.push(R(130,192,220,38,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,215,'nth term = 3n + 1','#1a7a3a',16,'middle',true));
    o.push(T(240,240,'The common difference (3) tells you the coefficient of n','#888',10,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o+=T(240,28,'nth term = 3n + 1','#C0272D',18,'middle',true);
  var ns=[1,5,10,20,100];
  var results=[4,16,31,61,301];
  ns.forEach(function(n,i){
    if(p>=i+1){
      o+=R(40,50+i*38,140,32,'#fff5f0','#C0272D',1.5);o+=T(110,70+i*38,'n = '+n,'#C0272D',13,'middle',false);
      o+=R(200,50+i*38,240,32,'#e8f8ee','#1a7a3a',1.5);
      o+=T(320,70+i*38,'3('+n+')+1 = '+results[i],'#1a7a3a',13,'middle',true);
    }
  });
  s.innerHTML=o;
}

/* Q8 Fibonacci */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var fib=[1,1,2,3,5,8,13,21];
