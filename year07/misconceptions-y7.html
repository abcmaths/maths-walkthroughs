<style>

body{background:var(--bg);color:#e8e0d8;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;}

.ht{font-size:15px;font-weight:700;}
.hero{text-align:center;padding:36px 20px 28px;background:linear-gradient(180deg,#0f0f23,#1a1a2e);}

.pvt td.hi{background:rgba(192,39,45,0.2);color:#ffb8b8;font-weight:700;font-size:16px;}

<script>
var selectedIdx=-1,answered=false,qi=0,order=[],revealStep=0;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function nl(lo,hi,marks){
  var s='<div class="nl">';
  for(var v=lo;v<=hi;v++){
    var cls=(v<0?'nneg':v===0?'nz':'npos')+(marks&&marks.indexOf(v)>=0?' nhi':'');
    s+='<span class="'+cls+'">'+v+'</span>';
  }
  return s+'</div>';
}
function pvRow(cells,type){
  return '<tr>'+cells.map(function(c){return '<td class="'+(type||'')+'" >'+c+'</td>';}).join('')+'</tr>';
}
function pv(headers,wrong,right){
  return '<table class="pvt"><tr>'+headers.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr>'
    +'<tr>'+wrong.map(function(c,i){return '<td class="hi">'+c+'</td>';}).join('')+'</tr>'
    +'<tr>'+right.map(function(c,i){return '<td class="ok2">'+c+'</td>';}).join('')+'</tr></table>';
}

function buildMisconceptions(){
var M=[];

var M=[];

// в”Ђв”Ђв”Ђ NEGATIVE NUMBERS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

// N1: Ordering negatives вЂ” thinking в€’8 > в€’3 because 8 > 3
(function(){
  var a=-rnd(5,9),b=-rnd(1,4); // a < b
  M.push({topic:'Negative Numbers',tag:'Ordering on a Number Line',
    stem:'Which is correct?',
    choices:[
      {text:a+' > '+b+', because '+Math.abs(a)+' is bigger than '+Math.abs(b),correct:false,
       trap:'This confuses the SIZE of the digit with the VALUE on the number line.'},
      {text:b+' > '+a+', because '+b+' is closer to zero (further right)',correct:true},
      {text:'They are equal because both are negative',correct:false,
       trap:'Two numbers are equal only if they are identical вЂ” not just because they share a sign.'}
    ],
    celebrate:'<p><b>Correct!</b> '+b+' > '+a+' because on the number line '+b+' sits to the <b>right</b> of '+a+'. Numbers always increase from left to right вЂ” negative numbers are no exception.</p><div class="why">Key rule: <b>the further right on the number line, the greater the value</b>. Negative numbers with larger digits are <em>smaller</em>, not larger.</div>',
    breakdown:[
      {title:'The misconception',body:'Because 8 > 3 as digits, students write <b>'+a+' > '+b+'</b>. But the negative sign flips the comparison. Larger digit = <em>more negative</em> = <em>smaller value</em>.'},
      {title:'See it on a number line',body:'Here are both numbers on a number line:'+nl(-9,2,[a,b])+'<b>'+a+'</b> is to the LEFT of <b>'+b+'</b>. Left = smaller. Always.'},
      {title:'Think temperature',body:'<span class="em">'+a+'В°C is colder than '+b+'В°C</span>The colder temperature is the smaller number. <b>'+b+'В°C</b> (less cold) is the <b>greater</b> value.'},
      {title:'The rule',body:'<span class="ok">For negatives: larger digit в†’ smaller value</span>в€’9 < в€’5 < в€’1 < 0 < 1 < 5 < 9<br>Always draw or imagine the number line when comparing negatives.'}
    ]
  });
})();

// N2: 5 в€’ (в€’2) = 3 (confusing subtraction of a negative)
(function(){
  var a=rnd(4,9),b=rnd(1,4);
  M.push({topic:'Negative Numbers',tag:'Subtracting a Negative',
    stem:'What is <b>'+a+' в€’ (в€’'+b+')</b>?',
    choices:[
      {text:''+(a-b)+' вЂ” subtracting '+b+' as normal',correct:false,
       trap:'The bracket contains в€’'+b+', not +'+b+'. Subtracting a negative is not the same as subtracting the positive.'},
      {text:''+(a+b)+' вЂ” two negatives make a positive',correct:true},
      {text:'в€’'+(b-a)+' вЂ” the negative sign takes over',correct:false,
       trap:'The larger positive number dominates here, and the result is positive.'}
    ],
    celebrate:'<p><b>Right!</b> '+a+' в€’ (в€’'+b+') = '+a+' + '+b+' = <b>'+(a+b)+'</b>. Subtracting a negative is the same as adding the positive.</p><div class="why">в€’ (в€’) = + &nbsp; Two negatives next to each other always combine to make a positive. Think of removing a debt: if someone removes a в€’ВЈ'+b+' charge, you gain ВЈ'+b+'.</div>',
    breakdown:[
      {title:'The misconception',body:'Students see "'+a+' minus something" and just subtract '+b+', getting <b>'+(a-b)+'</b>. But the "something" is <em>negative '+b+'</em>, not positive '+b+'.'},
      {title:'The sign rule',body:'<span class="em">в€’ (в€’b) = + b</span>When two minus signs appear next to each other, they combine to form a plus. This is a firm rule, not optional.'},
      {title:'Correct working',body:'<span class="ok">'+a+' в€’ (в€’'+b+') = '+a+' + '+b+' = '+(a+b)+'</span>Remove the brackets by combining the signs: в€’ Г— в€’ = +'},
      {title:'Number line check',body:'Start at <b>'+a+'</b>. Subtracting a negative means moving <b>right</b> (more positive), not left.'+nl(-1,a+b+1,[a,a+b])+'Land on <b>'+(a+b)+'</b>. вњ“'}
    ]
  });
})();

// N3: Two negatives always make a positive (overgeneralisation)
(function(){
  var a=rnd(2,8),b=rnd(1,a-1);
  M.push({topic:'Negative Numbers',tag:'Two Negatives вЂ” Always Positive?',
    stem:'A student says: <b>"Two negatives always make a positive."</b><br>Which example <em>disproves</em> this rule?',
    choices:[
      {text:'(в€’3) Г— (в€’4) = +12 вЂ” this makes a positive',correct:false,
       trap:'This one does make a positive вЂ” it does not disprove the claim.'},
      {text:'(в€’'+a+') + (в€’'+b+') = в€’'+(a+b)+' вЂ” still negative',correct:true},
      {text:'(в€’3) Г· (в€’3) = +1 вЂ” positive again',correct:false,
       trap:'Division of two negatives also gives a positive вЂ” this still does not disprove the rule.'}
    ],
    celebrate:'<p><b>Exactly right!</b> (в€’'+a+') + (в€’'+b+') = в€’'+(a+b)+' вЂ” <em>negative</em>. The "two negatives make a positive" rule only applies to <b>multiplication</b> and <b>division</b>, not addition.</p><div class="why"><b>Multiplication/division</b>: в€’ Г— в€’ = + &nbsp; вњ“<br><b>Addition</b>: в€’ + в€’ = в€’ &nbsp; (more negative!)<br>The rule depends entirely on the <em>operation</em>.</div>',
    breakdown:[
      {title:'The misconception',body:'Students overgeneralise from the multiplication rule. <b>Two negatives make a positive</b> is only true for Г— and Г·, not for + and в€’.'},
      {title:'Adding two negatives',body:'<span class="em">(в€’'+a+') + (в€’'+b+') = в€’'+(a+b)+'</span>Adding two negatives goes <em>further left</em> on the number line вЂ” more negative, not positive.'},
      {title:'The complete picture',body:'<span class="ok">Г— and Г·: same signs в†’ positive</span><span class="em">+ and в€’: same signs в†’ more of that sign</span>(в€’3) + (в€’4) = в€’7 &nbsp;|&nbsp; (в€’3) Г— (в€’4) = +12'},
      {title:'Rule to remember',body:'<span class="ok">Ask yourself: what operation am I doing?<br>Г— or Г· negative pairs в†’ positive<br>+ negative numbers в†’ more negative</span>'}
    ]
  });
})();

// в”Ђв”Ђв”Ђ BIDMAS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

// B1: Addition before multiplication (left to right)
(function(){
  var a=rnd(2,6),b=rnd(2,5),c=rnd(2,4);
  var wrong=(a+b)*c, correct=a+b*c;
  M.push({topic:'BIDMAS',tag:'Multiplication Before Addition',
    stem:'Calculate <b>'+a+' + '+b+' Г— '+c+'</b>',
    choices:[
      {text:''+(a+b)+' Г— '+c+' = '+wrong+' (added '+a+' and '+b+' first)',correct:false,
       trap:'Left to right order ignores BIDMAS вЂ” multiplication must come before addition.'},
      {text:a+' + '+b*c+' = '+correct+' (multiplied '+b+' and '+c+' first)',correct:true},
      {text:''+( a*b+c)+' (multiplied '+a+' Г— '+b+' first, then added '+c+')',correct:false,
       trap:'The multiplication applies to '+b+' and '+c+', not to '+a+' and '+b+'.'}
    ],
    celebrate:'<p><b>Correct!</b> '+b+' Г— '+c+' = '+b*c+' first, then '+a+' + '+b*c+' = <b>'+correct+'</b>.</p><div class="why">BIDMAS: Brackets в†’ Indices в†’ Division/Multiplication в†’ Addition/Subtraction. Г— and Г· always come before + and в€’, regardless of position.</div>',
    breakdown:[
      {title:'The misconception',body:'Reading left to right: <b>'+a+' + '+b+' = '+(a+b)+'</b>, then <b>Г— '+c+' = '+wrong+'</b>. This ignores the agreed order of operations.'},
      {title:'BIDMAS order',body:'<b>B</b>rackets &bull; <b>I</b>ndices &bull; <b>D</b>ivision &amp; <b>M</b>ultiplication &bull; <b>A</b>ddition &amp; <b>S</b>ubtraction<br><br>Г— and Г· are always done <em>before</em> + and в€’.'},
      {title:'Correct working',body:'<span class="ok">Step 1: '+b+' Г— '+c+' = '+b*c+'</span><span class="ok">Step 2: '+a+' + '+b*c+' = '+correct+'</span>'},
      {title:'Using brackets to override',body:'If you <em>wanted</em> to add first, you would write <b>('+a+' + '+b+') Г— '+c+' = '+wrong+'</b>. Brackets change the order.'}
    ]
  });
})();

// B2: Brackets only affect the number immediately next to them
(function(){
  var a=rnd(2,5),b=rnd(2,4),c=rnd(2,4);
  var correct=(a+b)*c, wrong=a+b*c;
  M.push({topic:'BIDMAS',tag:'What Do Brackets Affect?',
    stem:'A student says: "In <b>('+a+' + '+b+') Г— '+c+'</b>, the bracket only affects the '+b+'."<br>What is the correct answer?',
    choices:[
      {text:''+wrong+' вЂ” the bracket just means "do '+b+' Г— '+c+' first"',correct:false,
       trap:'Brackets group everything inside them вЂ” both '+a+' and '+b+' are inside, so both are multiplied by '+c+'.'},
      {text:''+correct+' вЂ” everything inside the bracket is calculated first, then Г— '+c,correct:true},
      {text:''+( a*(b+c))+' вЂ” the '+a+' gets the bracket too, multiplied by ('+b+'+'+c+')',correct:false,
       trap:'Only what is written inside the brackets is grouped. The '+a+' and '+b+' are the contents; '+c+' is outside.'}
    ],
    celebrate:'<p><b>Correct!</b> ('+a+' + '+b+') Г— '+c+' вЂ” first work out the bracket: <b>'+(a+b)+'</b>, then Г— '+c+' = <b>'+correct+'</b>. Brackets group <em>everything inside</em> them.</p><div class="why">A bracket is like a bag: everything inside it is evaluated together before the outside operation is applied.</div>',

  topics.forEach(function(t){makeBtn(t,t);});
})();
var activeTopic='all';
function setTopic(t,btn){
  activeTopic=t;
  document.querySelectorAll('.topic-badge').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');buildOrder();loadQ();
}
function buildOrder(){
  var pool=MISCONCEPTIONS.map(function(_,i){return i;})
    .filter(function(i){return activeTopic==='all'||MISCONCEPTIONS[i].topic===activeTopic;});
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  order=pool;qi=0;
}
buildOrder();
function loadQ(){
  selectedIdx=-1;answered=false;revealStep=0;
  var m=MISCONCEPTIONS[order[qi%order.length]];
  document.getElementById('qtag').textContent=m.topic+' В· '+m.tag;
  document.getElementById('qnum').textContent='Q'+(qi+1)+' of '+order.length;
  document.getElementById('qstem').innerHTML=m.stem;
  var cs=m.choices.map(function(c,i){return {c:c,i:i};});
  for(var i=cs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cs[i];cs[i]=cs[j];cs[j]=t;}
  var area=document.getElementById('choices');area.innerHTML='';
  var labs='ABCD';
  cs.forEach(function(ch,idx){
    var d=document.createElement('div');d.className='choice';
    d.innerHTML='<div class="choice-lbl">'+labs[idx]+'</div><div>'+ch.c.text+'</div>';
    d.dataset.correct=ch.c.correct?'1':'0';d.dataset.trap=ch.c.trap||'';
    d.onclick=function(){selectChoice(this,idx);};area.appendChild(d);
  });
  document.getElementById('submitBtn').className='submit-btn';
  document.getElementById('submitBtn').style.display='';
  document.getElementById('resultPanel').className='result';
  document.getElementById('resultPanel').innerHTML='';
  document.getElementById('nextArea').className='next-area';
}
function selectChoice(el,idx){
  if(answered)return;selectedIdx=idx;
  document.querySelectorAll('.choice').forEach(function(c){c.classList.remove('selected');});
  el.classList.add('selected');
  document.getElementById('submitBtn').className='submit-btn ready';
}
function submit(){
  if(selectedIdx<0||answered)return;answered=true;
  var m=MISCONCEPTIONS[order[qi%order.length]];
  var choices=document.querySelectorAll('.choice');
  var chosen=choices[selectedIdx];
  var isCorrect=chosen.dataset.correct==='1';
  choices.forEach(function(c){
    if(c.dataset.correct==='1')c.classList.add('correct');
    else if(c===chosen)c.classList.add('wrong');
  });
  document.getElementById('submitBtn').style.display='none';
  var panel=document.getElementById('resultPanel');
  panel.className='result show';
  if(isCorrect){
    panel.innerHTML='<div class="correct-panel"><div class="icon">&#x1F680;</div><h3>Cool maths student!</h3>'+m.celebrate+'</div>';
  }else{
    var trap=chosen.dataset.trap;
    var stepsHTML=m.breakdown.map(function(st,i){
      return '<div class="step" id="step'+i+'"><div class="step-hdr"><div class="step-n">'+(i+1)+'</div><div class="step-title">'+st.title+'</div></div><div class="step-body">'+st.body+'</div></div>';
    }).join('');
    panel.innerHTML='<div class="wrong-panel">'
      +'<div class="wrong-top"><div class="icon">вљ пёЏ</div><h3>Not quite вЂ” letвЂ™s fix that thinking</h3>'
      +(trap?'<p>вЂњ'+trap+'вЂќ</p>':'')
      +'</div><div class="breakdown">'+stepsHTML
      +'<button class="reveal-btn" id="revealBtn" onclick="revealNext()">Show step 1 в†’</button>'
      +'</div></div>';
    revealNext();
  }
  document.getElementById('nextArea').className='next-area show';
  document.getElementById('progText').textContent=(qi+1)+' of '+order.length+' done';
}
function revealNext(){
  var steps=document.querySelectorAll('.step');
  if(revealStep<steps.length)steps[revealStep++].classList.add('show');
  var btn=document.getElementById('revealBtn');
  if(btn){if(revealStep>=steps.length)btn.style.display='none';else btn.textContent='Show step '+(revealStep+1)+' в†’';}
}
function nextQ(){qi++;if(qi>=order.length){qi=0;buildOrder();}loadQ();}
loadQ();
</script>
