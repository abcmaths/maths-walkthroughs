<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geometry ┬Ę Year 7 ┬Ę Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"ŌĆ║";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

.newq-btn{float:right;font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.newq-btn:hover{background:var(--gold);color:#fff;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Geometry &mdash; Year 7</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>

var ST={};

function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function htmlFrac(num,den,col,lbl){
  col=col||'#C0272D';
  return '<span style="display:inline-flex;flex-direction:column;align-items:center;vertical-align:middle;margin:0 3px;line-height:1.1;">'
    +(lbl?'<span style="font-size:10px;color:#888;font-style:italic;line-height:1.2;">numerator</span>':'')
    +'<span style="font-size:17px;font-weight:700;color:'+col+';border-bottom:2px solid '+col+';padding:0 4px 1px;min-width:18px;text-align:center;">'+num+'</span>'
    +'<span style="font-size:17px;color:'+col+';padding:1px 4px 0;min-width:18px;text-align:center;">'+den+'</span>'
    +(lbl?'<span style="font-size:10px;color:#888;font-style:italic;line-height:1.2;">denominator</span>':'')
    +'</span>';
}

function tryIt(genFn){
  if(typeof genFn==='object'){var _o=genFn;genFn=function(){return _o;};}
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}

function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class=\"hl\">'+h+'</ul>':'')+'<div class=\"wk-b\">'+o.working+'</div>';
  var ex=o.extraHTML||'';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">Ō£ö Your Turn'
    +' <button class="newq-btn" data-tryid="'+id+'">Ōå╗ New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +ex
    +'<div class="ar">'
    +'<input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'
    +'<div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}

function newQ(id){
  var e=ST[id]; if(!e||!e.genFn)return;
  var o=e.genFn(); e.o=o;
  var box=document.querySelector('.try[data-tryid="'+id+'"]');
  if(!box)return;
  var tmp=document.createElement('div');
  tmp.innerHTML=buildTry(id,o);
  box.parentNode.replaceChild(tmp.firstChild,box);
  ST[id]={o:o,genFn:e.genFn};
}

function ckById(id){
  var e=ST[id]; if(!e)return;
  var o=e.o;
  var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
  var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
  if(!inp||!fb)return;
  var v=parseFloat(inp.value);
  if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
  if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){
    fb.className='try-fb fb ok';fb.innerHTML='Ō£ō Correct! '+o.working;
  }else{
    fb.className='try-fb fb er';fb.textContent='Not quite ŌĆö try again.';
  }
}

document.addEventListener('click',function(e){
  var btn=e.target;
  if(btn.classList.contains('newq-btn')){
    newQ(btn.getAttribute('data-tryid'));
  } else if(btn.classList.contains('try-ck')){
    ckById(btn.getAttribute('data-tryid'));
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}
function arc(cx,cy,r,a1,a2,c,w){var r1=a1*Math.PI/180,r2=a2*Math.PI/180;var x1=cx+r*Math.cos(r1),y1=cy-r*Math.sin(r1),x2=cx+r*Math.cos(r2),y2=cy-r*Math.sin(r2);var laf=((a2-a1+360)%360)>180?1:0;return '<path d="M '+x1.toFixed(1)+','+y1.toFixed(1)+' A '+r+','+r+' 0 '+laf+',0 '+x2.toFixed(1)+','+y2.toFixed(1)+'" fill="none" stroke="'+(c||'#C8922A')+'" stroke-width="'+(w||1.5)+'" />';}

/* Q1 Angles on a line */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(L(60,160,420,160,'#241A17',2.5));
  var rx=60+130*Math.cos(-40*Math.PI/180);var ry=160-130*Math.sin(-40*Math.PI/180);
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Triangle: 45┬░ and 65┬░ ŌĆö find the third angle x.','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(arc(ax,ay,36,0,48,'#C8922A',1.5));o.push(T(ax+50,ay-22,'45\u00b0','#C8922A',12,'middle',true));
    o.push(arc(bx,by,36,108,180,'#1a5a8a',1.5));o.push(T(bx-52,by-22,'65\u00b0','#1a5a8a',12,'middle',true));
  }
  if(p>=2){o.push(arc(cx,cy,36,226,322,'#C0272D',1.5));o.push(T(cx,cy+52,'x','#C0272D',15,'middle',true));}
  if(p>=3){o.push(T(240,248,'x = 180 \u2212 45 \u2212 65 = 70\u00b0','#C0272D',14,'middle',true));o.push(T(240,16,'Angle sum of triangle = 180\u00b0','#241A17',12,'middle',false));}
  s.innerHTML=o.join('');
}

/* Q4 Symmetry */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Square
  var sx=60,sy=60,sw=120;
  o.push(R(sx,sy,sw,sw,'#fff5f0','#C0272D',2));
  o.push(T(sx+sw/2,sy+sw+16,'Square','#241A17',11,'middle',false));
  if(p>=1){
    o.push(L(sx+sw/2,sy-8,sx+sw/2,sy+sw+8,'#C8922A',1.5,'5,3'));
    o.push(L(sx-8,sy+sw/2,sx+sw+8,sy+sw/2,'#C8922A',1.5,'5,3'));
    o.push(L(sx-6,sy-6,sx+sw+6,sy+sw+6,'#C8922A',1.5,'5,3'));
    o.push(L(sx+sw+6,sy-6,sx-6,sy+sw+6,'#C8922A',1.5,'5,3'));
    o.push(T(sx+sw/2,sy+sw+30,'4 lines of symmetry','#C8922A',11,'middle',true));
  }
  // Equilateral triangle
  var tx=300,ty=180,ts=120;
  var t1=[tx,ty-ts*0.866],t2=[tx-ts/2,ty],t3=[tx+ts/2,ty];
  o.push('<polygon points="'+t1+' '+t2+' '+t3+'" fill="#e8f0ff" stroke="#1a5a8a" stroke-width="2"/>');
  o.push(T(tx,ty+16,'Equilateral \u25b3','#241A17',11,'middle',false));
  if(p>=2){
    [[t1,[(t2[0]+t3[0])/2,(t2[1]+t3[1])/2]],[t2,[(t1[0]+t3[0])/2,(t1[1]+t3[1])/2]],[t3,[(t1[0]+t2[0])/2,(t1[1]+t2[1])/2]]].forEach(function(seg){o.push(L(seg[0][0],seg[0][1],seg[1][0],seg[1][1],'#1a5a8a',1.5,'5,3'));});
    o.push(T(tx,ty+30,'3 lines of symmetry','#1a5a8a',11,'middle',true));
  }
  if(p>=3){
    var rx=60,ry=200,rw=120,rh=50;
    o.push(R(rx,ry,rw,rh,'#e8ffe8','#1a7a3a',2));
    o.push(T(rx+rw/2,ry+rh+14,'Rectangle','#241A17',11,'middle',false));
    o.push(L(rx+rw/2,ry-6,rx+rw/2,ry+rh+6,'#1a7a3a',1.5,'5,3'));
    o.push(L(rx-6,ry+rh/2,rx+rw+6,ry+rh/2,'#1a7a3a',1.5,'5,3'));
    o.push(T(rx+rw/2,ry+rh+28,'2 lines','#1a7a3a',11,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q5 Perimeter compound */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=80,oy=220,sc=20;
  // L-shape: 10x8 with 4x3 cut from top right
  var W=10*sc,H=8*sc,cw=4*sc,ch=3*sc;
  var pts=ox+','+oy+' '+(ox+W)+','+oy+' '+(ox+W)+','+(oy-H+ch)+' '+(ox+W-cw)+','+(oy-H+ch)+' '+(ox+W-cw)+','+(oy-H)+' '+ox+','+(oy-H);
  o.push('<polygon points="'+pts+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'L-shape: outer 10├Ś8 cm. Find the perimeter.','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(T(ox+W/2,oy+14,'10 cm','#C0272D',11,'middle',true));
    o.push(T(ox-14,oy-H/2,'8 cm','#C0272D',11,'middle',true));
    o.push(T(ox+W-cw/2,oy-H-8,'4 cm','#888',10,'middle',false));
    o.push(T(ox+W+10,oy-H+ch/2,'3 cm','#888',10,'start',false));
  }
  if(p>=2){
    o.push(T(ox+W-cw,oy-H+ch/2-4,'5 cm','#1a5a8a',10,'end',false));
    o.push(T(ox+(W-cw)/2,oy-H-8,'6 cm','#1a5a8a',10,'middle',false));
    o.push(T(240,30,'Missing sides: 8\u22123=5 cm and 10\u22124=6 cm','#1a5a8a',12,'middle',false));
  }
  if(p>=3){o.push(T(240,54,'P = 10+8+4+3+6+5 = 36 cm','#C0272D',14,'middle',true));}
  s.innerHTML=o.join('');
}

/* Q6 Area */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Rectangle
  o.push(R(40,60,180,100,'#fff5f0','#C0272D',2));
  o.push(T(130,50,'9 cm','#C0272D',12,'middle',true));
  o.push(T(22,112,'5 cm','#C0272D',12,'middle',true));
  if(p>=1){o.push(T(130,115,'A = 9 \u00d7 5 = 45 cm\u00b2','#C0272D',13,'middle',true));}
  // Triangle
  var tx=300,ty=190,tb=160,th=110;
  o.push('<polygon points="'+tx+','+ty+' '+(tx+tb)+','+ty+' '+(tx+80)+','+(ty-th)+'" fill="#e8f4e8" stroke="#1a7a3a" stroke-width="2"/>');
  o.push(T(tx+tb/2,ty+14,'12 cm','#1a7a3a',12,'middle',true));
  o.push(L(tx+80,ty,tx+80,ty-th,'#aaa',1,'4,3'));
  o.push(T(tx+80+10,ty-th/2,'8 cm','#1a7a3a',12,'start',true));
  if(p>=2){o.push(T(tx+tb/2-10,ty-th/2,'\u00bd\u00d712\u00d78','#1a7a3a',13,'middle',false));o.push(T(tx+tb/2-10,ty-th/2+16,'= 48 cm\u00b2','#1a7a3a',13,'middle',true));}
  if(p>=3){o.push(T(240,238,'Rectangle: l\u00d7w    Triangle: \u00bd\u00d7base\u00d7height','#888',11,'middle',false));}
  s.innerHTML=o.join('');
}

/* Q7 Volume cuboid */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=100,oy=220,l=180,h=100,d=55;
  o.push('<polygon points="'+ox+','+(oy-h)+' '+(ox+d)+','+(oy-h-d)+' '+(ox+l+d)+','+(oy-h-d)+' '+(ox+l)+','+(oy-h)+'" fill="#e8e8f8" stroke="#aaa" stroke-width="1"/>');
  o.push('<polygon points="'+(ox+l)+','+oy+' '+(ox+l+d)+','+(oy-d)+' '+(ox+l+d)+','+(oy-h-d)+' '+(ox+l)+','+(oy-h)+'" fill="#d8d8f0" stroke="#aaa" stroke-width="1"/>');
  o.push('<rect x="'+ox+'" y="'+(oy-h)+'" width="'+l+'" height="'+h+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push(L(ox,oy,ox+l,oy,'#C0272D',2));
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Cuboid 8├Ś4├Ś5. Find the volume.','#C0272D',13,'middle',true));
  if(p>=1){
    o.push(T(ox+l/2,oy+14,'8 cm','#C0272D',12,'middle',true));
    o.push(T(ox-14,oy-h/2,'5 cm','#C0272D',12,'middle',true));
    o.push(T(ox+l+d/2+8,oy-d/2,'4 cm','#888',11,'start',false));
  }
  if(p>=2){o.push(T(340,130,'V = l \u00d7 w \u00d7 h','#241A17',13,'start',true));o.push(T(340,152,'= 8 \u00d7 4 \u00d7 5','#241A17',13,'start',false));}
  if(p>=3){o.push(T(340,178,'= 160 cm\u00b3','#C0272D',16,'start',true));}
  s.innerHTML=o.join('');
}

/* Q8 Net of cuboid */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Net of a simple 3x2x2 cuboid
  var sc=30,ox=120,oy=130;
  var W=3*sc,H=2*sc,D=2*sc;
  // Top face
  o.push(R(ox,oy-D-H,W,H,'#fce8d8','#C0272D',1.5));o.push(T(ox+W/2,oy-D-H/2,'top','#888',10));
  // Front face
  o.push(R(ox,oy-H,W,H,'#fff5f0','#C0272D',2));o.push(T(ox+W/2,oy-H/2,'front','#C0272D',10));
  // Bottom face
  o.push(R(ox,oy,W,H,'#fce8d8','#C0272D',1.5));o.push(T(ox+W/2,oy+H/2,'bottom','#888',10));
  // Left face
  o.push(R(ox-D,oy-H,D,H,'#e8f4ff','#1a5a8a',1.5));o.push(T(ox-D/2,oy-H/2,'left','#888',10));
  // Right face
  o.push(R(ox+W,oy-H,D,H,'#e8f4ff','#1a5a8a',1.5));o.push(T(ox+W+D/2,oy-H/2,'right','#888',10));
  // Back face always shown
  o.push(R(ox,oy+H,W,H,'#e8ffe8','#1a7a3a',1.5));o.push(T(ox+W/2,oy+H+H/2,'back','#888',10));
  o.push(R(14,8,452,32,'#fff5f0','#C0272D',1.5));o.push(T(240,25,'Net of a cuboid ŌĆö all 6 faces shown flat','#C0272D',12,'middle',true));

/* Q9 Reflection */
function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 290');var o=[];
  var cx=240,cy=145,sc=30;
  o.push(L(40,cy,440,cy,'#ddd',1.5));o.push(L(cx,20,cx,240,'#ddd',1.5));
  for(var i=-4;i<=4;i++){if(i!==0){o.push(T(cx+i*sc,cy+14,i,'#aaa',9));o.push(T(cx-10,cy-i*sc+4,i,'#aaa',9,'end'));}}
  // Triangle A in Q1
  var A=[[cx+sc,cy-2*sc],[cx+3*sc,cy-2*sc],[cx+2*sc,cy-4*sc]];
  o.push('<polygon points="'+A.map(function(p){return p[0]+','+p[1];}).join(' ')+'" fill="#fce8d8" stroke="#C0272D" stroke-width="2"/>');
  o.push(T(cx+2*sc,cy-2*sc-10,'A','#C0272D',11,'middle',true));
  if(p>=1){
    // Reflect in y-axis: x -> -x
    var B=A.map(function(pt){return [cx-(pt[0]-cx),pt[1]];});
    o.push('<polygon points="'+B.map(function(p){return p[0]+','+p[1];}).join(' ')+'" fill="#e8f4ff" stroke="#1a5a8a" stroke-width="2"/>');
    o.push(T(cx-2*sc,cy-2*sc-10,"A'","#1a5a8a",11,'middle',true));
    o.push(T(cx,cy-4*sc-14,'y-axis mirror','#888',10,'middle',false));
  }
  if(p>=2){
    // Reflect in x-axis: y -> -y
    var C=A.map(function(pt){return [pt[0],cy-(pt[1]-cy)];});
    o.push('<polygon points="'+C.map(function(p){return p[0]+','+p[1];}).join(' ')+'" fill="#e8ffe8" stroke="#1a7a3a" stroke-width="2"/>');
    o.push(T(cx+2*sc,cy+2*sc+10,'A"','#1a7a3a',11,'middle',true));
    o.push(T(320,cy+14,'x-axis mirror','#888',10,'start',false));
  }
  if(p>=3){o.push(T(240,248,'Each point is the same distance from the mirror line on the other side','#888',10,'middle',false));}
  s.innerHTML=o.join('');
}
