<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Levels of organisation','#2E7D32',13,'middle',true));
[['Cell','smallest unit of life'],['Tissue','group of similar cells with same function'],['Organ','group of tissues working together'],['Organ system','group of organs with related function'],['Organism','complete living thing']].forEach(function(r,i){if(i<p+1){o.push(R(10,44+i*38,460,30,'#F1F8F1','#C8E6C9',1));o.push(T(110,62+i*38,r[0],'#2E7D32',12,'middle',true));o.push(T(330,62+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Animal cell vs plant cell','#2E7D32',13,'middle',true));
o.push(R(10,40,222,198,'#F1F8F1','#2E7D32',2));o.push(T(121,60,'ANIMAL','#2E7D32',11,'middle',true));
o.push(R(248,40,222,198,'#e8f5e9','#2E7D32',2));o.push(T(359,60,'PLANT','#2E7D32',11,'middle',true));
var animal=['nucleus','cell membrane','cytoplasm','mitochondria','ribosomes'];
var plant=['nucleus','cell membrane','cytoplasm','mitochondria','ribosomes','cell wall (cellulose)','large vacuole','chloroplasts'];
animal.forEach(function(v,i){if(i<p+1)o.push(T(121,80+i*24,v,'#333',9,'middle',false));});
plant.forEach(function(v,i){if(i<p+1&&i<5)o.push(T(359,80+i*24,v,'#333',9,'middle',false));});
if(p>=4)['cell wall','vacuole','chloroplasts'].forEach(function(v,i){o.push(T(359,200+i*18,v,'#2E7D32',8,'middle',false));});
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Cell organelles and functions','#2E7D32',13,'middle',true));
[['Nucleus','contains DNA; controls cell activity'],['Mitochondria','aerobic respiration; produce ATP'],['Ribosomes','protein synthesis'],['Cell membrane','controls what enters and leaves'],['Chloroplast','photosynthesis; contains chlorophyll'],['Vacuole','stores cell sap; maintains turgor']].forEach(function(r,i){if(i<p+1){o.push(R(10,40+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(110,57+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(335,57+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Specialised cells','#2E7D32',13,'middle',true));
[['Red blood cell','no nucleus, biconcave, carries O\u2082'],['Sperm cell','flagellum, many mitochondria, small'],['Root hair cell','long extension, no chloroplast, absorbs water'],['Palisade cell','tall, many chloroplasts, photosynthesis'],['Guard cell','controls stomata opening/closing']].forEach(function(r,i){if(i<p+1){o.push(R(10,40+i*38,460,30,'#F1F8F1','#C8E6C9',1));o.push(T(120,58+i*38,r[0],'#2E7D32',10,'middle',true));o.push(T(340,58+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ5(p){dQ1(p);}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Cell organisation summary','#2E7D32',13,'middle',true));
[['Levels','cell\u2192tissue\u2192organ\u2192organ system\u2192organism'],['Plant only','cell wall, chloroplasts, large vacuole'],['Animal only','no cell wall, no chloroplasts, small vacuole'],['Nucleus','DNA, controls cell activity'],['Mitochondria','aerobic respiration, ATP production'],['Ribosomes','protein synthesis (all cells)']].forEach(function(r,i){if(i<p+1){o.push(R(10,40+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(120,57+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,57+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Cells',ti:'Levels of Organisation',su:'State the five levels from cell to organism.',steps:[
  {lb:'Five levels',dr:dQ1,ht:'<p>Cell \u2192 Tissue \u2192 Organ \u2192 Organ system \u2192 Organism. Each level builds on the one below. Example: heart muscle cells \u2192 cardiac muscle tissue \u2192 heart \u2192 circulatory system \u2192 human body.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Heart muscle cells \u2192 cardiac muscle tissue \u2192 ? Which level is "cardiac muscle tissue"?',a:2,w:'Cardiac muscle tissue is at the tissue level. Answer: 2.'},{q:'The circulatory system (heart, blood vessels, blood) is at which level?',a:4,w:'Heart+blood vessels+blood = organ system. Answer: 4.'},{q:'A single liver cell is at which level?',a:1,w:'A single cell = cell level. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+' 1=cell, 2=tissue, 3=organ, 4=organ system, 5=organism.',hints:['Cell\u2192tissue\u2192organ\u2192organ system\u2192organism'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Cells',ti:'Animal and Plant Cells',su:'Compare animal and plant cells. List features unique to each.',steps:[
  {lb:'Common features',dr:dQ2,ht:'<p>Both have: nucleus, cell membrane, cytoplasm, mitochondria, ribosomes.</p>'},
  {lb:'Plant only',dr:dQ2,ht:'<p>Plant cells also have: <b>cell wall</b> (cellulose, gives rigidity), <b>large permanent vacuole</b> (maintains turgor), <b>chloroplasts</b> (contain chlorophyll for photosynthesis).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Which feature is found in plant cells but NOT animal cells?',a:1,w:'Cellulose cell wall is only in plant cells. Answer: 1.'},{q:'Which organelle carries out aerobic respiration in both plant and animal cells?',a:3,w:'Mitochondria carry out aerobic respiration in both. Answer: 3.'},{q:'Which organelle is only found in cells that photosynthesise?',a:2,w:'Chloroplasts are only in photosynthetic plant cells. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=cell wall, 2=chloroplast, 3=mitochondria, 4=nucleus.',hints:['Think about which cells photosynthesise and which have rigid walls'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Cells',ti:'Cell Organelles',su:'Name organelles and give their functions.',steps:[
  {lb:'Organelles and functions',dr:dQ3,ht:'<p>Nucleus: DNA, controls cell. Mitochondria: aerobic respiration, ATP. Ribosomes: protein synthesis. Cell membrane: selective barrier. Chloroplast: photosynthesis. Vacuole: turgor, storage.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Which organelle controls cell activity by containing DNA?',a:1,w:'Nucleus contains DNA and controls cell. Answer: 1.'},{q:'Where does protein synthesis occur?',a:2,w:'Ribosomes carry out protein synthesis. Answer: 2.'},{q:'Which organelle is the site of aerobic respiration?',a:3,w:'Mitochondria are the site of aerobic respiration. Answer: 3.'}];var qq=pick(qs);return{question:qq.q+' 1=nucleus, 2=ribosomes, 3=mitochondria, 4=chloroplast.',hints:['Match organelle to function'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Cells',ti:'Specialised Cells',su:'Describe how specialised cells are adapted for their function.',steps:[
  {lb:'Specialisation',dr:dQ4,ht:'<p>During development, cells differentiate (specialise). Their structure matches their function. Specialised cells may lose organelles they don\u2019t need and gain features that help their role.</p>'},
  {lb:'Examples',dr:dQ4,ht:'<p>Red blood cell: no nucleus (more room for haemoglobin), biconcave (large surface area). Sperm: flagellum, many mitochondria. Root hair: extension for absorption. Palisade: many chloroplasts. Guard cell: controls stomatal opening.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Why do red blood cells have no nucleus?',a:1,w:'No nucleus = more room for haemoglobin to carry O\u2082. Answer: 1.'},{q:'Which cell has a long extension (hair-like) to absorb water?',a:2,w:'Root hair cell has a long extension to increase absorption surface. Answer: 2.'},{q:'Which cell has many mitochondria to power swimming?',a:3,w:'Sperm cells need lots of energy (ATP) from mitochondria. Answer: 3.'}];var qq=pick(qs);return{question:qq.q+' 1=more room for haemoglobin, 2=root hair cell, 3=sperm cell.',hints:['Match structural adaptation to function'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Cells',ti:'Stem Cells',su:'Describe the properties and uses of stem cells.',steps:[
  {lb:'What are stem cells?',dr:dQ5,ht:'<p><b>Stem cells</b> are undifferentiated cells that can divide to produce more stem cells or differentiate into specialised cells. They are found in embryos (embryonic stem cells) and in some adult tissues (e.g. bone marrow).</p>'},
  {lb:'Uses and issues',dr:dQ5,ht:'<p>Potential uses: treating leukaemia (bone marrow), replacing damaged tissues. Ethical issue: embryonic stem cells involve destruction of embryos. Adult stem cells avoid this but are more limited.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Stem cells can: 1=only divide, 2=differentiate into specialised cells, 3=photosynthesise.',a:2,w:'Stem cells can differentiate into specialised cells. Answer: 2.'},{q:'Which type of stem cell is more ethically controversial?',a:1,w:'Embryonic stem cells involve destroying embryos, more controversial. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+(qq.a===1?' 1=embryonic, 2=adult.':''),hints:['Stem cells are undifferentiated; can specialise'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Cells',ti:'Magnification and Scale',su:'Calculate magnification using image size / actual size.',steps:[
  {lb:'Magnification formula',dr:dQ6,ht:'<p>Microscopes magnify images of cells.</p><div class="fm">Magnification = Image size / Actual size</div><p>Rearranged: Actual = Image / Mag. Image = Actual \u00d7 Mag. Always use same units (e.g. mm or \u03bcm).</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var type=pick(['mag','actual','image']);var actual=rnd(10,200),mag=rnd(5,100)*10,img=actual*mag;if(type==='mag')return{question:'Image = <b>'+img+' \u03bcm</b>, actual = <b>'+actual+' \u03bcm</b>. Find magnification.',hints:['Mag = image/actual'],ans:mag,tol:0,unit:'\u00d7',working:'Mag = '+img+'/'+actual+' = '+mag+'\u00d7'};if(type==='actual')return{question:'Image = <b>'+img+' \u03bcm</b>, mag = <b>'+mag+'\u00d7</b>. Find actual size.',hints:['Actual = image/mag'],ans:actual,tol:0,unit:'\u03bcm',working:'Actual = '+img+'/'+mag+' = '+actual+' \u03bcm'};var actual2=rnd(10,50),mag2=rnd(10,50)*10,img2=actual2*mag2;return{question:'Actual = <b>'+actual2+' \u03bcm</b>, mag = <b>'+mag2+'\u00d7</b>. Find image size.',hints:['Image = actual \u00d7 mag'],ans:img2,tol:0,unit:'\u03bcm',working:'Image = '+actual2+'\u00d7'+mag2+' = '+img2+' \u03bcm'};})}
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Cells',ti:'Organ Systems',su:'Name the major organ systems and their organs.',steps:[
  {lb:'Major systems',dr:dQ7,ht:'<p>Digestive system: mouth, oesophagus, stomach, small intestine, large intestine. Respiratory: trachea, bronchi, lungs. Circulatory: heart, blood vessels. Nervous: brain, spinal cord, nerves. Excretory: kidneys, ureters, bladder.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'The heart and blood vessels are part of which system?',a:1,w:'Heart + blood vessels = circulatory system. Answer: 1.'},{q:'The kidneys, ureters and bladder are part of which system?',a:3,w:'Kidneys etc. = excretory/urinary system. Answer: 3.'},{q:'The brain and spinal cord are part of which system?',a:2,w:'Brain + spinal cord = nervous system. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=circulatory, 2=nervous, 3=excretory, 4=digestive.',hints:['Match organs to system'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Cells',ti:'Plant Organisation',su:'Describe tissues and organs in plants.',steps:[
  {lb:'Plant organisation',dr:dQ8,ht:'<p>Plant organs: leaf (photosynthesis), stem (support/transport), root (anchorage/absorption).<br>Plant tissues: <b>xylem</b> (water transport, dead cells), <b>phloem</b> (dissolved sugar transport, living cells), <b>meristem</b> (actively dividing, at tips).</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'Which plant tissue transports water and minerals?',a:1,w:'Xylem transports water and minerals up the plant. Answer: 1.'},{q:'Which plant tissue transports dissolved sugars?',a:2,w:'Phloem transports dissolved sugars. Answer: 2.'},{q:'Where are meristem cells found in a plant?',a:3,w:'Meristem cells are at the growing tips (root tip, shoot tip). Answer: 3.'}];var qq=pick(qs);return{question:qq.q+' 1=xylem, 2=phloem, 3=growing tips.',hints:['Xylem: water. Phloem: food/sugars. Meristem: growing tips.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Biology \u2022 Cells',ti:'Electron Microscopy',su:'Compare light and electron microscopes. Explain why electron microscopes have higher resolution.',steps:[
  {lb:'Light vs electron',dr:dQ9,ht:'<p><b>Light microscope:</b> uses light, living specimens, colour, max ~\u00d71500, resolution ~200 nm.<br><b>Electron microscope:</b> uses electrons, dead specimens, black and white, magnification up to \u00d7500 000, resolution 0.1 nm. Reveals organelles like ribosomes and ER.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var qs=[{q:'Which microscope can be used with living cells? 1=light, 2=electron.',a:1,w:'Light microscope can view living cells. Answer: 1.'},{q:'Which has higher magnification? 1=light, 2=electron.',a:2,w:'Electron microscope has much higher magnification. Answer: 2.'},{q:'Which produces black and white images only? 1=light, 2=electron.',a:2,w:'Electron microscopes produce black and white (no colour) images. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Electron: higher mag, dead specimens, b&w. Light: living, colour, lower mag.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q10 \u2022 Y10 Biology \u2022 Cells',ti:'Mixed Cell Organisation',su:'Combined questions on levels, organelles, specialisation and magnification.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>Levels: cell\u2192tissue\u2192organ\u2192system\u2192organism. Plant extras: cell wall, vacuole, chloroplasts. Organelles: nucleus=control, mitochondria=respiration, ribosomes=protein synthesis. Mag = image/actual.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['level','organelle','mag']);if(type==='level'){var qs=[{q:'Group of similar cells with same function:',a:2,w:'Tissue. Answer: 2.'},{q:'Group of organs with related function:',a:4,w:'Organ system. Answer: 4.'}];var qq=pick(qs);return{question:qq.q+' 1=cell, 2=tissue, 3=organ, 4=organ system.',hints:['Cell\u2192tissue\u2192organ\u2192system'],ans:qq.a,tol:0,unit:'',working:qq.w};}if(type==='organelle'){var qs2=[{q:'Which organelle controls cell activity?',a:1,w:'Nucleus. Answer: 1.'},{q:'Which is the site of aerobic respiration?',a:2,w:'Mitochondria. Answer: 2.'}];var qq2=pick(qs2);return{question:qq2.q+' 1=nucleus, 2=mitochondria, 3=ribosomes.',hints:['Match organelle to function'],ans:qq2.a,tol:0,unit:'',working:qq2.w};}var actual=rnd(10,100),mag=rnd(5,50)*10,img=actual*mag;return{question:'Actual = <b>'+actual+' \u03bcm</b>, mag = <b>'+mag+'</b>. Find image size.',hints:['Image = actual \u00d7 mag'],ans:img,tol:0,unit:'\u03bcm',working:'Image = '+actual+'\u00d7'+mag+' = '+img+' \u03bcm'};})}
]},
];

document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
