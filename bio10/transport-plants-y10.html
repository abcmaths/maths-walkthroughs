<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Xylem and Phloem','#2E7D32',13,'middle',true));
o.push(R(10,44,222,196,'#F1F8F1','#2E7D32',2));o.push(T(121,64,'XYLEM','#2E7D32',12,'middle',true));
o.push(R(248,44,222,196,'#e8f5e9','#2E7D32',2));o.push(T(359,64,'PHLOEM','#2E7D32',12,'middle',true));
var xy=['Carries water + minerals','Moves upward only','Dead cells (hollow)','Lignified walls','Non-living'];
var ph=['Carries dissolved sugars','Moves both ways','Living cells','Sieve plates','Contains companion cells'];
xy.forEach(function(v,i){if(i<p+1)o.push(T(121,86+i*26,v,'#333',9,'middle',false));});
ph.forEach(function(v,i){if(i<p+1)o.push(T(359,86+i*26,v,'#333',9,'middle',false));});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Transpiration','#2E7D32',13,'middle',true));
o.push(R(10,44,460,56,'#F1F8F1','#2E7D32',1.5));o.push(T(240,64,'Evaporation of water from leaves through stomata','#2E7D32',11,'middle',true));o.push(T(240,82,'Creates transpiration pull; draws water up xylem','#555',9,'middle',false));
if(p>=1){[['Higher temperature','faster (more evaporation)'],['Higher light intensity','stomata open wider'],['More wind','removes water vapour, steeper gradient'],['Higher humidity','slower (less gradient)']].forEach(function(r,i){if(i<p){o.push(R(10,104+i*32,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(170,119+i*32,r[0],'#2E7D32',9,'middle',false));o.push(T(380,119+i*32,r[1],'#555',8,'middle',false));}});}
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Translocation (phloem)','#2E7D32',12,'middle',true));
o.push(R(10,44,460,56,'#F1F8F1','#2E7D32',1.5));o.push(T(240,64,'Transport of dissolved sugars (sucrose) through phloem','#2E7D32',11,'middle',true));o.push(T(240,82,'From leaves (source) to roots/storage/growing tissue (sink)','#555',9,'middle',false));
if(p>=1){o.push(T(240,118,'Can move in BOTH directions (up and down)','#333',10,'middle',false));o.push(T(240,138,'Requires living cells and energy (active process)','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ5(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Transport in plants summary','#2E7D32',13,'middle',true));
[['Xylem','water + minerals; upward; dead cells; lignified'],['Phloem','sucrose; both ways; living cells; sieve plates'],['Transpiration','water loss from leaves; drives xylem flow'],['Transpiration factors','T, light, wind, humidity'],['Translocation','sugars; source to sink; phloem'],['Root hair cells','increase SA for water and mineral uptake']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(120,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Transport',ti:'Xylem and Phloem',su:'Compare xylem and phloem tissue in terms of structure and function.',steps:[
  {lb:'Two transport tissues',dr:dQ1,ht:'<p><b>Xylem:</b> transports water and minerals. One direction (root to leaf). Dead hollow cells with lignified walls (no cell contents).<br><b>Phloem:</b> transports dissolved sugars. Both directions. Living cells. Sieve tubes with companion cells.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Which tissue transports water and minerals? 1=xylem, 2=phloem.',a:1,w:'Xylem transports water and minerals. Answer: 1.'},{q:'Which tissue transports sugars in both directions? 1=xylem, 2=phloem.',a:2,w:'Phloem transports sugars (both directions). Answer: 2.'},{q:'Which tissue is made of dead cells? 1=xylem, 2=phloem.',a:1,w:'Xylem cells are dead (hollow, lignified). Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Xylem: water, dead. Phloem: sugars, living.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Transport',ti:'Transpiration',su:'Define transpiration. Describe factors that affect transpiration rate.',steps:[
  {lb:'Transpiration',dr:dQ2,ht:'<p>Transpiration is the loss of water vapour from leaves through stomata. Water evaporates from mesophyll cells \u2192 draws more water up from roots via xylem (transpiration stream).</p>'},
  {lb:'Factors',dr:dQ2,ht:'<p>Faster with: higher temperature, higher light intensity, more wind, lower humidity. Slower with: higher humidity, lower temperature, darkness (stomata close).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Which increases the rate of transpiration? 1=higher humidity, 2=higher temperature.',a:2,w:'Higher T increases evaporation = faster transpiration. Answer: 2.'},{q:'On a windy day, transpiration is: 1=faster, 2=slower.',a:1,w:'Wind removes water vapour, steepens gradient = faster. Answer: 1.'},{q:'When stomata close at night, transpiration: 1=increases, 2=decreases.',a:2,w:'Stomata closed = water cannot escape = transpiration decreases. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['More T, wind, light = faster. More humidity = slower.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Transport',ti:'The Transpiration Stream',su:'Describe the pathway of water from roots to leaves.',steps:[
  {lb:'Transpiration stream',dr:dQ3,ht:'<p>Water is absorbed by root hair cells (osmosis). Water moves through root cortex (osmosis) into xylem. Xylem carries water up the stem. Water evaporates from mesophyll into air spaces. Leaves through stomata.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Water enters root hair cells by: 1=active transport, 2=osmosis.',a:2,w:'Water moves from soil (high water potential) into root hair (lower WP) by osmosis. Answer: 2.'},{q:'Water moves up the stem through: 1=phloem, 2=xylem.',a:2,w:'Xylem carries water from roots to leaves. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Osmosis: water in. Xylem: water up.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Transport',ti:'Stomata and Guard Cells',su:'Explain how guard cells control stomatal opening and closing.',steps:[
  {lb:'Guard cells',dr:dQ4,ht:'<p>Stomata are pores surrounded by two guard cells. In light: guard cells photosynthesise, producing sugar \u2192 water enters by osmosis \u2192 guard cells become turgid \u2192 stomata open. In dark: water leaves \u2192 flaccid \u2192 stomata close.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Stomata open in: 1=light, 2=darkness.',a:1,w:'Light: guard cells make sugar \u2192 turgid \u2192 stomata open. Answer: 1.'},{q:'When guard cells are turgid, stomata: 1=open, 2=close.',a:1,w:'Turgid guard cells = stomata open. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Light \u2192 turgid \u2192 open. Dark \u2192 flaccid \u2192 close.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Transport',ti:'Translocation',su:'Describe translocation of sugars through phloem.',steps:[
  {lb:'Translocation',dr:dQ5,ht:'<p>Translocation = transport of dissolved sugars (mainly sucrose) through phloem. Moves from <b>source</b> (leaves, where sugar is made) to <b>sink</b> (roots, fruits, growing tips). Goes both up and down. Requires energy (active process).</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Translocation moves sugars from: 1=roots to leaves, 2=source (leaf) to sink (root/fruit).',a:2,w:'Source=leaves (make sugar), sink=roots/fruits/growing tips. Answer: 2.'},{q:'Translocation requires: 1=energy, 2=no energy (passive).',a:1,w:'Translocation is an active process requiring energy. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Source: where sugar is made. Sink: where it is used/stored.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Transport',ti:'Xerophytes',su:'Describe adaptations of xerophytes to reduce water loss.',steps:[
  {lb:'Xerophyte adaptations',dr:dQ6,ht:'<p>Xerophytes are plants adapted to dry environments. Adaptations to reduce water loss: thick waxy cuticle, sunken stomata, rolled leaves (trap humid air), fewer stomata, spines instead of leaves (cacti), large water-storing vacuoles.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Sunken stomata in a xerophyte reduce: 1=water loss, 2=light absorption.',a:1,w:'Sunken stomata trap humid air \u2192 less transpiration. Answer: 1.'},{q:'Cactus spines are modified: 1=stems, 2=leaves.',a:2,w:'Cactus spines are modified leaves (reduce SA for water loss). Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Xerophytes: reduce water loss in dry environments'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Transport',ti:'Potometer',su:'Use a potometer to measure transpiration rate.',steps:[
  {lb:'Potometer',dr:dQ7,ht:'<p>A potometer measures the rate of water uptake (approximates transpiration rate). An air bubble in the capillary tube moves as the plant takes up water. Rate = distance moved / time.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var d=rnd(20,80),t=rnd(2,10),rate=parseFloat((d/t).toFixed(1));return{question:'Bubble moves <b>'+d+' mm</b> in <b>'+t+' min</b>. Find rate of water uptake.',hints:['Rate = distance / time'],ans:rate,tol:0.1,unit:'mm/min',working:'Rate = '+d+'/'+t+' = '+rate+' mm/min'};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Transport',ti:'Mineral Uptake',su:'Explain how mineral ions are absorbed by roots.',steps:[
  {lb:'Mineral uptake',dr:dQ8,ht:'<p>Mineral ions (e.g. nitrate, magnesium) are absorbed by root hair cells by <b>active transport</b> \u2014 against their concentration gradient. This requires energy (ATP from respiration).</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'Mineral ion uptake by roots uses: 1=osmosis, 2=active transport, 3=diffusion.',a:2,w:'Minerals are absorbed by active transport (against gradient). Answer: 2.'},{q:'Which gas is needed for active transport of minerals in roots? 1=CO\u2082 (for photosynthesis), 2=O\u2082 (for aerobic respiration to make ATP).',a:2,w:'Aerobic respiration needs O\u2082 to make ATP for active transport. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Active transport: against gradient, needs ATP'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Biology \u2022 Transport',ti:'Xylem Structure',su:'Explain how xylem structure is adapted for water transport.',steps:[
  {lb:'Xylem adaptations',dr:dQ9,ht:'<p>Xylem vessels are long, hollow tubes formed from dead cells. The walls are strengthened with lignin (waterproof). No cell contents (maximises flow). Water moves up by cohesion-tension (water molecules stick together, pulled by transpiration).</p>'},
