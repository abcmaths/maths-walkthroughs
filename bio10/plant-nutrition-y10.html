<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Photosynthesis equation','#2E7D32',13,'middle',true));
o.push(R(10,44,460,56,'#F1F8F1','#2E7D32',2));o.push(T(240,66,'6CO\u2082 + 6H\u2082O \u2192 C\u2086H\u2081\u2082O\u2086 + 6O\u2082','#2E7D32',14,'middle',true));o.push(T(240,84,'(light energy and chlorophyll needed)','#555',9,'middle',false));
if(p>=1){o.push(R(10,112,222,56,'#e8f5e9','#2E7D32',1.5));o.push(T(121,132,'INPUTS','#2E7D32',11,'middle',true));o.push(T(121,150,'CO\u2082, H\u2082O, light','#555',9,'middle',false));}
if(p>=2){o.push(R(248,112,222,56,'#fde8e8','#C0272D',1.5));o.push(T(359,132,'OUTPUTS','#C0272D',11,'middle',true));o.push(T(359,150,'glucose, O\u2082','#555',9,'middle',false));}
if(p>=3){o.push(T(240,210,'Light absorbed by chlorophyll in chloroplasts','#555',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Factors affecting rate of photosynthesis','#2E7D32',12,'middle',true));
[['Light intensity','more light \u2192 faster rate (up to saturation)'],['CO\u2082 concentration','more CO\u2082 \u2192 faster rate (limiting factor)'],['Temperature','higher T \u2192 faster (to ~30\u00b0C), then enzymes denature'],['Chlorophyll','more chlorophyll \u2192 more light absorbed']].forEach(function(r,i){if(i<p+1){o.push(R(10,44+i*46,460,38,'#F1F8F1','#C8E6C9',1));o.push(T(140,66+i*46,r[0],'#2E7D32',11,'middle',true));o.push(T(350,66+i*46,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Light intensity and rate graph','#2E7D32',12,'middle',true));
o.push(L(48,232,48,22,'#333',2));o.push(L(48,232,452,232,'#333',2));
o.push(T(254,250,'Light intensity','#333',9,'middle',false));o.push(T(25,130,'Rate PS','#333',9,'middle',false));
for(var x=0;x<100;x++){var y1=140*(1-Math.exp(-x/22)),y2=140*(1-Math.exp(-(x+1)/22));o.push(L(48+x*4,232-y1,48+(x+1)*4,232-y2,'#2E7D32',2.5));}
if(p>=1){o.push(L(48,92,452,92,'#E65100',1.5,'5,3'));o.push(T(400,82,'max rate (CO\u2082 limited)','#E65100',9,'end',false));}
if(p>=2){o.push(T(240,248,'Plateau: CO\u2082 or temperature is now the limiting factor','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Leaf structure for photosynthesis','#2E7D32',12,'middle',true));
o.push(R(10,40,460,30,'#a5d6a7','#2E7D32',2));o.push(T(240,60,'Upper epidermis (waxy cuticle)','#555',9,'middle',false));
o.push(R(10,74,460,44,'#2E7D32','#1b5e20',2));o.push(T(240,100,'Palisade mesophyll (many chloroplasts)','#fff',9,'middle',false));
o.push(R(10,122,460,40,'#66bb6a','#388e3c',2));o.push(T(240,146,'Spongy mesophyll (air spaces)','#fff',9,'middle',false));
if(p>=1){o.push(R(10,166,460,30,'#a5d6a7','#2E7D32',2));o.push(T(240,186,'Lower epidermis + stomata (CO\u2082 in, O\u2082 out)','#555',9,'middle',false));}
if(p>=2){o.push(T(240,232,'Palisade: near top for max light; many chloroplasts','#333',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ5(p){dQ1(p);}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Plant nutrition summary','#2E7D32',13,'middle',true));
[['Photosynthesis','6CO\u2082+6H\u2082O \u2192 C\u2086H\u2081\u2082O\u2086+6O\u2082 (light+chlorophyll)'],['Limiting factors','light, CO\u2082, temperature'],['Glucose used for','respiration, starch, cellulose, sucrose, proteins, lipids'],['Minerals needed','nitrates (protein), magnesium (chlorophyll)'],['Chloroplast','site of photosynthesis; contains chlorophyll'],['Stomata','open in light; CO\u2082 in, O\u2082 + water vapour out']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(130,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(350,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Plant Nutrition',ti:'Photosynthesis Equation',su:'Write and interpret the overall equation for photosynthesis.',steps:[
  {lb:'The equation',dr:dQ1,ht:'<p>Photosynthesis converts light energy into chemical energy (glucose).</p><div class="fm">6CO\u2082 + 6H\u2082O \u2192 C\u2086H\u2081\u2082O\u2086 + 6O\u2082</div><p>Requires light energy and chlorophyll. Occurs in chloroplasts.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'What are the raw materials (reactants) for photosynthesis? 1=glucose and O\u2082, 2=CO\u2082 and water.',a:2,w:'Reactants: CO\u2082 and H\u2082O. Answer: 2.'},{q:'What gas is released as a by-product of photosynthesis?',a:1,w:'Oxygen (O\u2082) is released. Answer: 1.'},{q:'How many CO\u2082 molecules are needed to make one glucose?',a:6,w:'6CO\u2082 + 6H\u2082O \u2192 C\u2086H\u2081\u2082O\u2086. Six CO\u2082. Answer: 6.'}];var qq=pick(qs);return{question:qq.q+(qq.a===1?' 1=O\u2082, 2=CO\u2082, 3=glucose.':''),hints:['6CO\u2082 + 6H\u2082O \u2192 C\u2086H\u2081\u2082O\u2086 + 6O\u2082'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Plant Nutrition',ti:'Limiting Factors',su:'Identify and explain limiting factors for photosynthesis.',steps:[
  {lb:'Limiting factors',dr:dQ2,ht:'<p>A <b>limiting factor</b> is a factor that limits the rate of photosynthesis even when others are in excess. The three key limiting factors are: light intensity, CO\u2082 concentration, and temperature.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'A plant is given lots of light and water but rate is still low. What is the likely limiting factor?',a:1,w:'CO\u2082 concentration is likely limiting. Answer: 1.'},{q:'Increasing which factor would NOT increase photosynthesis in bright light with warm temperature?',a:1,w:'If CO\u2082 is already saturating, more light won\'t help. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+(qq.a===1?' 1=CO\u2082 concentration, 2=more light, 3=more water.':''),hints:['Limiting factor: the one in shortest supply'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Plant Nutrition',ti:'Light Intensity Graph',su:'Interpret rate of photosynthesis vs light intensity graphs.',steps:[
  {lb:'The graph',dr:dQ3,ht:'<p>As light intensity increases, rate of photosynthesis increases. The rate then levels off (plateau) \u2014 at this point another factor (CO\u2082 or temperature) has become limiting.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'The rate of photosynthesis levels off at high light intensity because: 1=CO\u2082 or T becomes limiting, 2=all light is reflected.',a:1,w:'At plateau, CO\u2082 or temperature is now the limiting factor. Answer: 1.'},{q:'To increase the rate at the plateau, you should: 1=increase light further, 2=increase CO\u2082 concentration.',a:2,w:'CO\u2082 is now limiting \u2192 increase CO\u2082. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Plateau: another factor is now limiting (not light)'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Plant Nutrition',ti:'Leaf Structure',su:'Relate leaf structure to efficient photosynthesis.',steps:[
  {lb:'Leaf adaptations',dr:dQ4,ht:'<p>Leaves are adapted for photosynthesis: <b>broad, flat</b> (large SA for light), <b>thin</b> (short diffusion path for gases), <b>transparent upper epidermis</b>, <b>palisade mesophyll</b> (many chloroplasts near top), <b>air spaces</b> in spongy mesophyll (gas diffusion), <b>stomata</b> (gas exchange).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Which layer of the leaf has the most chloroplasts for photosynthesis?',a:1,w:'Palisade mesophyll (near top, max light). Answer: 1.'},{q:'Stomata allow: 1=CO\u2082 in and O\u2082 out, 2=water to be stored.',a:1,w:'Stomata: CO\u2082 enters, O\u2082 and water vapour leave. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+(qq.a===1&&qq.q.includes('chloroplasts')?' 1=palisade mesophyll, 2=spongy mesophyll, 3=epidermis.':''),hints:['Palisade: many chloroplasts. Stomata: gas exchange.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Plant Nutrition',ti:'Uses of Glucose',su:'List the ways plants use glucose from photosynthesis.',steps:[
  {lb:'Glucose uses',dr:dQ5,ht:'<p>Plants use glucose produced by photosynthesis for: <b>respiration</b> (energy), converted to <b>starch</b> (storage), <b>cellulose</b> (cell walls), <b>sucrose</b> (transport), combined with nitrates to make <b>amino acids/proteins</b>, used to make <b>lipids</b>.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'How is glucose stored in plants? 1=as starch, 2=as protein, 3=as fat.',a:1,w:'Glucose is converted to starch for storage. Answer: 1.'},{q:'For making new cell walls, glucose is converted to: 1=cellulose, 2=starch, 3=protein.',a:1,w:'Cellulose is the structural carbohydrate in cell walls. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Starch: storage. Cellulose: cell walls. Sucrose: transport.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Plant Nutrition',ti:'Mineral Requirements',su:'Explain why plants need nitrates and magnesium.',steps:[
  {lb:'Minerals',dr:dQ6,ht:'<p><b>Nitrates (NO\u2083\u207b):</b> needed to make amino acids and proteins. Deficiency: stunted growth, yellow leaves.<br><b>Magnesium (Mg\u00b2\u207a):</b> needed to make chlorophyll. Deficiency: pale/yellow leaves (chlorosis).<br>Plants also need phosphates (DNA, ATP) and potassium (enzyme function).</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'A plant has yellow leaves due to lack of chlorophyll. The missing mineral is: 1=nitrate, 2=magnesium, 3=potassium.',a:2,w:'Magnesium is needed for chlorophyll. Deficiency = chlorosis. Answer: 2.'},{q:'Nitrates are needed for: 1=making chlorophyll, 2=making amino acids and proteins.',a:2,w:'Nitrates provide nitrogen for amino acids and proteins. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Nitrates: protein. Magnesium: chlorophyll.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},

{ey:'Q7 \u2022 Y10 Biology \u2022 Plant Nutrition',ti:'Starch Test and Photosynthesis Investigation',su:'Describe the iodine test for starch. Plan a variegated leaf experiment.',steps:[
