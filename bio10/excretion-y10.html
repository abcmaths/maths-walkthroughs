<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Excretion — removing metabolic waste','#2E7D32',13,'middle',true));
[['CO\u2082','from respiration; removed by lungs'],['Urea','from amino acid deamination in liver; removed by kidneys'],['Water','from respiration/metabolism; kidneys, lungs, skin'],['Excess mineral ions','kidneys (in urine)'],['Bile pigments','from haemoglobin breakdown; removed in bile (faeces)']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*38,460,30,'#F1F8F1','#C8E6C9',1));o.push(T(110,60+i*38,r[0],'#2E7D32',10,'middle',true));o.push(T(330,60+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The kidney — nephron','#2E7D32',12,'middle',true));
var parts=['Glomerulus: high pressure filtration','Bowman\'s capsule: collects filtrate','Proximal convoluted tubule: reabsorption of glucose, amino acids, salts','Loop of Henl\u00e9: water reabsorption; creates salt gradient','Distal convoluted tubule: fine regulation','Collecting duct: water reabsorption (ADH controlled)'];
parts.forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(240,55+i*33,r,'#2E7D32',8,'middle',false));}});
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Osmoregulation: ADH','#2E7D32',12,'middle',true));
o.push(R(10,44,460,56,'#F1F8F1','#2E7D32',1.5));o.push(T(240,64,'ADH (antidiuretic hormone) = water regulation','#2E7D32',11,'middle',true));o.push(T(240,82,'Made in hypothalamus; released by pituitary','#555',9,'middle',false));
if(p>=1){o.push(R(10,114,222,56,'#fde8e8','#C0272D',1.5));o.push(T(121,134,'DEHYDRATED','#C0272D',11,'middle',true));o.push(T(121,152,'More ADH \u2192 more water reabsorbed \u2192 less urine (more concentrated)','#555',8,'middle',false));}
if(p>=2){o.push(R(248,114,222,56,'#e8f5e9','#2E7D32',1.5));o.push(T(359,134,'WELL HYDRATED','#2E7D32',11,'middle',true));o.push(T(359,152,'Less ADH \u2192 less water reabsorbed \u2192 more urine (dilute)','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ5(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Excretion summary','#2E7D32',13,'middle',true));
[['Excretion','removal of METABOLIC waste (not egestion)'],['CO\u2082','lungs (via blood)'],['Urea','kidneys (urine); made from amino acids in liver'],['Kidneys','filter blood; regulate water, ions, pH'],['ADH','more ADH = more water reabsorbed = concentrated urine'],['Dialysis','artificial kidney; removes urea by diffusion through membrane']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(110,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Excretion',ti:'What is Excretion?',su:'Define excretion. Distinguish excretion from egestion.',steps:[
  {lb:'Excretion',dr:dQ1,ht:'<p><b>Excretion</b> = removal of <b>metabolic waste</b> produced by chemical reactions in cells. NOT egestion (removal of undigested food). Excretory products: CO\u2082 (from respiration), urea (from amino acid deamination), water (from respiration).</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Excretion removes: 1=undigested food, 2=metabolic waste products.',a:2,w:'Excretion = metabolic waste. Egestion = undigested food. Answer: 2.'},{q:'Urea is produced by: 1=digestion of protein, 2=deamination of amino acids in the liver.',a:2,w:'Liver deaminates excess amino acids \u2192 urea. Answer: 2.'},{q:'CO\u2082 is excreted via: 1=kidneys, 2=lungs.',a:2,w:'CO\u2082 is excreted through the lungs (breathing). Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Excretion: metabolic waste. CO\u2082: lungs. Urea: kidneys.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Excretion',ti:'The Kidneys',su:'Describe the functions of the kidneys.',steps:[
  {lb:'Kidney functions',dr:dQ2,ht:'<p>Kidneys: filter blood to remove urea; regulate water content (osmoregulation); regulate ion concentration; regulate blood pH. Blood enters via renal artery, filtered blood leaves via renal vein, urine leaves via ureter to bladder.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Urine leaves each kidney via the: 1=renal artery, 2=renal vein, 3=ureter.',a:3,w:'Ureter carries urine from kidney to bladder. Answer: 3.'},{q:'The kidneys are involved in osmoregulation, which means: 1=regulating water content, 2=making enzymes.',a:1,w:'Osmoregulation = regulating water content of the body. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Ureter: urine to bladder. Osmoregulation: water balance.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Excretion',ti:'The Nephron',su:'Describe ultrafiltration, selective reabsorption and secretion in the nephron.',steps:[
  {lb:'Nephron stages',dr:dQ3,ht:'<p>1. <b>Ultrafiltration:</b> high pressure in glomerulus forces small molecules (water, glucose, urea, ions) into Bowman\u2019s capsule. 2. <b>Selective reabsorption:</b> all glucose, amino acids, most water and salts reabsorbed in PCT. 3. <b>Osmoregulation:</b> loop of Henl\u00e9 and collecting duct regulate final water content.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Ultrafiltration occurs in the: 1=loop of Henl\u00e9, 2=glomerulus/Bowman\'s capsule.',a:2,w:'High pressure filtration in glomerulus into Bowman\'s capsule. Answer: 2.'},{q:'Glucose is reabsorbed in the: 1=proximal convoluted tubule, 2=collecting duct.',a:1,w:'PCT: glucose and amino acids selectively reabsorbed. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Filtration: glomerulus. Reabsorption: PCT. Water: collecting duct.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Excretion',ti:'Osmoregulation and ADH',su:'Explain how ADH controls water reabsorption in the kidneys.',steps:[
  {lb:'ADH',dr:dQ4,ht:'<p>ADH (antidiuretic hormone): made by hypothalamus, released by pituitary gland. When blood is too concentrated: more ADH released \u2192 collecting duct more permeable \u2192 more water reabsorbed \u2192 less, more concentrated urine.</p>'},
  {lb:'Negative feedback',dr:dQ4,ht:'<p>This is a <b>negative feedback</b> system: when blood water content returns to normal, ADH release is reduced. Well hydrated: less ADH \u2192 dilute urine (more volume).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'When you are dehydrated, ADH levels: 1=increase, 2=decrease.',a:1,w:'Dehydrated = concentrated blood = more ADH released. Answer: 1.'},{q:'More ADH causes: 1=more urine (dilute), 2=less urine (concentrated).',a:2,w:'More ADH = more water reabsorbed = less, concentrated urine. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Dehydrated: more ADH. More ADH: less urine, more concentrated.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Excretion',ti:'Liver and Urea',su:'Describe the role of the liver in amino acid metabolism.',steps:[
  {lb:'Liver and deamination',dr:dQ5,ht:'<p>Excess amino acids cannot be stored. The liver removes the amino group (<b>deamination</b>): amino group \u2192 ammonia \u2192 combined with CO\u2082 \u2192 <b>urea</b>. The remaining carbon skeleton is used for energy or converted to fat/glycogen. Urea enters blood \u2192 kidneys \u2192 excreted in urine.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Urea is produced from: 1=excess glucose, 2=excess amino acids (deamination).',a:2,w:'Deamination of amino acids in the liver produces urea. Answer: 2.'},{q:'Urea is excreted by the: 1=lungs, 2=kidneys in urine.',a:2,w:'Urea is filtered out of blood by kidneys into urine. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Deamination: amino acids\u2192urea in liver. Urea: kidneys.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Excretion',ti:'Kidney Dialysis',su:'Describe how dialysis replaces kidney function.',steps:[
  {lb:'Dialysis',dr:dQ6,ht:'<p>Haemodialysis: blood from patient circulates through dialysis machine. Dialysis fluid has same concentration of useful substances as normal blood. Urea (and other waste) diffuses across semi-permeable membrane into dialysis fluid. Blood returned to patient.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'In dialysis, urea moves from blood to dialysis fluid by: 1=active transport, 2=diffusion.',a:2,w:'Urea diffuses down its concentration gradient. Answer: 2.'},{q:'The dialysis membrane is: 1=semi-permeable, 2=fully permeable.',a:1,w:'Semi-permeable: allows urea but not cells or proteins through. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Dialysis: urea diffuses out; semi-permeable membrane'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Excretion',ti:'Kidney Transplant',su:'Compare dialysis and kidney transplant as treatments.',steps:[
  {lb:'Transplant vs dialysis',dr:dQ7,ht:'<p>Transplant: donor kidney implanted; patient needs immunosuppressants to prevent rejection. Advantages: more freedom, better quality of life. Disadvantages: risk of rejection, surgery, donor shortage.<br>Dialysis: 3x/week for 4-6 hours each; restricts diet/lifestyle; no rejection risk.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'After a kidney transplant, immunosuppressants are needed to: 1=cause rejection, 2=prevent rejection of donor kidney.',a:2,w:'Immunosuppressants prevent immune system attacking donor kidney. Answer: 2.'},{q:'Dialysis must be done: 1=once a year, 2=several times per week.',a:2,w:'Haemodialysis: typically 3 times per week. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Transplant: rejection risk, immunosuppressants. Dialysis: 3x/week.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Excretion',ti:'The Liver',su:'Describe the functions of the liver.',steps:[
  {lb:'Liver functions',dr:dQ8,ht:'<p>Liver: deamination of amino acids \u2192 urea. Detoxification of alcohol and drugs. Glycogen storage (glucose \u2190\u2192 glycogen: blood glucose regulation). Bile production (fat emulsification). Heat generation (high metabolic rate). Destroys old red blood cells \u2192 bile pigments.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'The liver stores glucose as: 1=starch, 2=glycogen.',a:2,w:'Liver stores glycogen (animal storage polysaccharide). Answer: 2.'},{q:'Bile is produced by the: 1=liver, 2=pancreas.',a:1,w:'Liver produces bile (stored in gall bladder). Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Liver: glycogen storage, bile production, deamination, detox'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
