<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Aerobic respiration','#2E7D32',13,'middle',true));
o.push(R(10,44,460,60,'#F1F8F1','#2E7D32',2));o.push(T(240,66,'C\u2086H\u2081\u2082O\u2086 + 6O\u2082 \u2192 6CO\u2082 + 6H\u2082O + ATP','#2E7D32',13,'middle',true));o.push(T(240,84,'(in mitochondria; releases ~38 ATP per glucose)','#555',9,'middle',false));
if(p>=1){[['Glucose','fuel; from food'],['Oxygen','from breathing'],['CO\u2082','breathed out'],['Water','breathed out / excreted'],['ATP','energy for cell processes']].forEach(function(r,i){o.push(R(10,104+i*28,460,22,'#F1F8F1','#C8E6C9',1));o.push(T(120,118+i*28,r[0],'#2E7D32',10,'middle',true));o.push(T(310,118+i*28,r[1],'#555',9,'middle',false));});}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Anaerobic respiration','#2E7D32',13,'middle',true));
o.push(R(10,44,222,80,'#F1F8F1','#2E7D32',2));o.push(T(121,64,'ANIMALS','#2E7D32',12,'middle',true));o.push(T(121,84,'glucose \u2192 lactic acid','#555',9,'middle',false));o.push(T(121,100,'(2 ATP)','#555',9,'middle',false));
o.push(R(248,44,222,80,'#e8f5e9','#2E7D32',2));o.push(T(359,64,'PLANTS/YEAST','#2E7D32',12,'middle',true));o.push(T(359,84,'glucose \u2192 ethanol + CO\u2082','#555',9,'middle',false));o.push(T(359,100,'(2 ATP)','#555',9,'middle',false));
if(p>=1){o.push(T(240,148,'Anaerobic: no oxygen needed; less efficient (2 ATP vs 38)','#333',10,'middle',false));}
if(p>=2){o.push(T(240,172,'Oxygen debt: extra O\u2082 needed after exercise to oxidise lactic acid','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'ATP and energy','#2E7D32',12,'middle',true));
o.push(R(80,44,320,56,'#F1F8F1','#2E7D32',2));o.push(T(240,66,'ATP \u2192 ADP + P\u1d35 + energy','#2E7D32',12,'middle',true));o.push(T(240,84,'(ATP hydrolysis)','#555',9,'middle',false));
if(p>=1){o.push(R(80,110,320,56,'#e8f5e9','#2E7D32',2));o.push(T(240,132,'ADP + P\u1d35 + energy \u2192 ATP','#2E7D32',12,'middle',true));o.push(T(240,150,'(made during respiration)','#555',9,'middle',false));}
if(p>=2){o.push(T(240,198,'Uses of ATP: muscle contraction, active transport, synthesis, maintaining body temp','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ2(p);}
function dQ8(p){dQ5(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Respiration summary','#2E7D32',13,'middle',true));
[['Aerobic','C\u2086H\u2081\u2082O\u2086+6O\u2082\u21926CO\u2082+6H\u2082O+ATP; ~38 ATP/glucose'],['Anaerobic (animal)','glucose\u2192lactic acid; 2 ATP; O\u2082 debt'],['Anaerobic (yeast)','glucose\u2192ethanol+CO\u2082; 2 ATP; fermentation'],['Mitochondria','site of aerobic respiration (inner membrane)'],['ATP','energy currency; used for all cell processes'],['Oxygen debt','lactic acid oxidised after exercise; need extra O\u2082']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(130,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(350,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Respiration',ti:'Aerobic Respiration',su:'Write and interpret the equation for aerobic respiration.',steps:[
  {lb:'Aerobic respiration',dr:dQ1,ht:'<p>Aerobic respiration releases energy from glucose in the presence of oxygen.</p><div class="fm">C\u2086H\u2081\u2082O\u2086 + 6O\u2082 \u2192 6CO\u2082 + 6H\u2082O + ATP</div><p>Occurs in mitochondria. Releases ~38 ATP per glucose. Provides energy for all cellular processes.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Products of aerobic respiration are: 1=glucose+O\u2082, 2=CO\u2082+H\u2082O+ATP.',a:2,w:'Products: CO\u2082, water, and ATP. Answer: 2.'},{q:'Aerobic respiration occurs in the: 1=chloroplast, 2=mitochondria.',a:2,w:'Aerobic respiration: mitochondria. Answer: 2.'},{q:'Aerobic respiration requires: 1=O\u2082 + glucose, 2=CO\u2082 + water.',a:1,w:'Reactants: glucose and oxygen. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['C\u2086H\u2081\u2082O\u2086 + 6O\u2082 \u2192 6CO\u2082 + 6H\u2082O + ATP'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Respiration',ti:'Anaerobic Respiration',su:'Describe anaerobic respiration in animals and in yeast.',steps:[
  {lb:'Anaerobic respiration',dr:dQ2,ht:'<p>Anaerobic respiration: no oxygen. <b>Animals:</b> glucose \u2192 lactic acid + 2 ATP. Causes muscle fatigue.<br><b>Yeast/plants:</b> glucose \u2192 ethanol + CO\u2082 + 2 ATP. Used in baking and brewing.</p>'},
  {lb:'Comparison with aerobic',dr:dQ2,ht:'<p>Anaerobic is much less efficient: 2 ATP vs 38 ATP per glucose. After exercise, "oxygen debt" must be repaid to oxidise lactic acid (conversion to CO\u2082 + H\u2082O in liver).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'In animals, anaerobic respiration produces: 1=ethanol+CO\u2082, 2=lactic acid.',a:2,w:'Animal anaerobic: glucose\u2192lactic acid. Answer: 2.'},{q:'In yeast, anaerobic respiration produces: 1=lactic acid, 2=ethanol+CO\u2082.',a:2,w:'Yeast: glucose\u2192ethanol+CO\u2082 (fermentation). Answer: 2.'},{q:'Anaerobic respiration produces: 1=more ATP than aerobic, 2=less ATP than aerobic.',a:2,w:'Anaerobic: 2 ATP vs aerobic: 38 ATP. Much less. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Animals: lactic acid. Yeast: ethanol+CO\u2082. Less ATP than aerobic.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},

{ey:'Q3 \u2022 Y10 Biology \u2022 Respiration',ti:'ATP',su:'Describe the role of ATP as the energy currency of cells.',steps:[
  {lb:'ATP',dr:dQ3,ht:'<p>ATP (adenosine triphosphate) is the universal energy carrier. Energy released when ATP is hydrolysed: ATP \u2192 ADP + Pi. Energy from respiration re-makes ATP. Used for: muscle contraction, active transport, biosynthesis.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'ATP releases energy when: 1=it gains a phosphate, 2=a phosphate group is removed.',a:2,w:'ATP \u2192 ADP + Pi releases energy. Answer: 2.'},{q:'ATP is regenerated during: 1=respiration, 2=excretion.',a:1,w:'Respiration re-makes ATP from ADP + Pi. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['ATP\u2192ADP+Pi: releases energy. Respiration: makes ATP.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Respiration',ti:'Respiration and Exercise',su:'Explain changes in breathing and heart rate during exercise.',steps:[
  {lb:'Exercise response',dr:dQ4,ht:'<p>During exercise: muscles need more ATP \u2192 more glucose and O\u2082 needed \u2192 heart rate and breathing rate increase. If O\u2082 demand exceeds supply \u2192 anaerobic respiration begins \u2192 lactic acid accumulates \u2192 muscle fatigue.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'During exercise, breathing rate increases to: 1=provide more O\u2082 and remove CO\u2082, 2=decrease heart rate.',a:1,w:'More O\u2082 in, more CO\u2082 out for aerobic respiration. Answer: 1.'},{q:'Lactic acid accumulates during hard exercise because: 1=too much O\u2082, 2=not enough O\u2082 for aerobic respiration.',a:2,w:'O\u2082 deficit \u2192 anaerobic \u2192 lactic acid. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Exercise: more O\u2082 needed. O\u2082 deficit: anaerobic, lactic acid.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Respiration',ti:'Oxygen Debt',su:'Explain oxygen debt after exercise.',steps:[
  {lb:'Oxygen debt',dr:dQ5,ht:'<p>After intense exercise, extra O\u2082 is needed to break down accumulated lactic acid (lactic acid \u2192 glucose \u2192 CO\u2082 + H\u2082O, or converted in liver). This "debt" explains why you continue to breathe hard after exercise stops.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Oxygen debt is repaid by: 1=drinking water, 2=continued heavy breathing to provide extra O\u2082.',a:2,w:'Continued breathing provides O\u2082 to oxidise lactic acid. Answer: 2.'},{q:'Where is lactic acid mainly converted after exercise? 1=lungs, 2=liver.',a:2,w:'Liver reconverts lactic acid to glucose or CO\u2082+H\u2082O. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['O\u2082 debt: repay by heavy breathing; lactic acid converted in liver'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Respiration',ti:'Mitochondria Structure',su:'Relate mitochondria structure to aerobic respiration.',steps:[
  {lb:'Mitochondria',dr:dQ6,ht:'<p>Mitochondria: double membrane (outer + inner). Inner membrane is highly folded (<b>cristae</b>) \u2014 large SA for ATP synthesis. Matrix: fluid inside, contains enzymes for Krebs cycle. Cells with high energy demands have more mitochondria (e.g. muscle cells).</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Cristae (folded inner membrane) in mitochondria: 1=increase surface area for ATP synthesis, 2=decrease volume.',a:1,w:'Cristae increase SA for ATP synthase and electron transport. Answer: 1.'},{q:'Which cells have the most mitochondria? 1=fat storage cells, 2=muscle cells.',a:2,w:'Muscle cells have high energy demand \u2192 many mitochondria. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Cristae: large SA. More mitochondria: high energy demand.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},

{ey:'Q7 \u2022 Y10 Biology \u2022 Respiration',ti:'Fermentation',su:'Describe fermentation and its uses in food and drink production.',steps:[

  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'CO\u2082 produced by yeast fermentation is useful in baking because: 1=it makes bread rise, 2=it flavours the bread.',a:1,w:'CO\u2082 bubbles = bread rises. Answer: 1.'},{q:'Ethanol in beer is produced by: 1=aerobic respiration, 2=fermentation (anaerobic) by yeast.',a:2,w:'Yeast fermentation: glucose\u2192ethanol+CO\u2082. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Fermentation: yeast, anaerobic, glucose\u2192ethanol+CO\u2082'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
