<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The alimentary canal','#2E7D32',13,'middle',true));
var organs=['Mouth (teeth, amylase)','Oesophagus (peristalsis)','Stomach (HCl, protease)','Small intestine (lipase, protease, amylase, bile)','Large intestine (water absorption)','Rectum / Anus (egestion)'];
organs.forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*34,460,28,'#F1F8F1','#C8E6C9',1));o.push(T(240,55+i*34,r,'#2E7D32',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Enzymes of digestion','#2E7D32',13,'middle',true));
[['Amylase','starch \u2192 maltose; saliva + pancreas'],['Protease','proteins \u2192 amino acids; stomach + pancreas'],['Lipase','lipids \u2192 glycerol + fatty acids; pancreas + SI'],['Bile','emulsifies fat; made in liver, stored in gall bladder']].forEach(function(r,i){if(i<p+1){o.push(R(10,44+i*46,460,38,'#F1F8F1','#C8E6C9',1));o.push(T(110,66+i*46,r[0],'#2E7D32',11,'middle',true));o.push(T(350,66+i*46,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Small intestine: absorption','#2E7D32',12,'middle',true));
o.push(T(240,50,'Villi increase surface area enormously','#555',10,'middle',false));
if(p>=1){o.push(T(240,80,'Each villus: single cell layer (thin), capillary network, lacteal (fat)','#555',10,'middle',false));}
if(p>=2){o.push(T(240,110,'Glucose + amino acids \u2192 blood capillaries','#2E7D32',10,'middle',false));o.push(T(240,128,'Fatty acids + glycerol \u2192 lacteal (lymph)','#2E7D32',10,'middle',false));}
if(p>=3){o.push(T(240,158,'Microvilli on villi cells \u2192 even more SA','#555',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ5(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Human nutrition summary','#2E7D32',13,'middle',true));
[['Amylase','starch\u2192maltose; mouth+pancreas'],['Protease','protein\u2192amino acids; stomach+pancreas'],['Lipase','fats\u2192glycerol+FA; pancreas'],['Bile','emulsifies fat; liver\u2192gall bladder\u2192SI'],['Villi','increase SA; capillaries+lacteals'],['Peristalsis','muscular contractions move food along']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(110,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Nutrition',ti:'The Digestive System',su:'Identify organs of the alimentary canal and their roles.',steps:[
  {lb:'Organs',dr:dQ1,ht:'<p>Mouth (mechanical digestion, amylase) \u2192 Oesophagus (peristalsis) \u2192 Stomach (HCl pH 2, protease/pepsin) \u2192 Small intestine (enzymes, bile, absorption) \u2192 Large intestine (water absorption) \u2192 Rectum/Anus.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Where does protein digestion begin? 1=mouth, 2=stomach, 3=small intestine.',a:2,w:'Stomach: HCl activates pepsin (protease). Answer: 2.'},{q:'Where is water absorbed from food? 1=stomach, 2=small intestine, 3=large intestine.',a:3,w:'Large intestine absorbs water. Answer: 3.'},{q:'Which organ produces bile? 1=liver, 2=pancreas, 3=gall bladder.',a:1,w:'Liver produces bile; gall bladder stores it. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Match organ to function'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Nutrition',ti:'Digestive Enzymes',su:'Name digestive enzymes, substrates and products.',steps:[
  {lb:'Three enzymes',dr:dQ2,ht:'<p>Amylase: starch \u2192 maltose. Protease: proteins \u2192 amino acids. Lipase: lipids \u2192 glycerol + fatty acids. Bile emulsifies fat (increases SA for lipase).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Amylase breaks down: 1=protein, 2=starch, 3=fat.',a:2,w:'Amylase: starch\u2192maltose. Answer: 2.'},{q:'Lipase produces: 1=amino acids, 2=glucose, 3=glycerol and fatty acids.',a:3,w:'Lipase: fats\u2192glycerol+fatty acids. Answer: 3.'},{q:'Bile is produced by the: 1=liver, 2=pancreas, 3=stomach.',a:1,w:'Liver produces bile. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Amylase=starch, Protease=protein, Lipase=fat'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Nutrition',ti:'Peristalsis',su:'Describe peristalsis and its role in moving food along the gut.',steps:[
  {lb:'Peristalsis',dr:dQ3,ht:'<p>Peristalsis: wave of muscular contractions along the wall of the oesophagus and intestines. Circular muscles contract behind the food; longitudinal muscles contract in front. Pushes food through the digestive tract.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){return{question:'Peristalsis involves: 1=secretion of enzymes, 2=wave of muscular contractions moving food along.',hints:['Peri- = around; stalsis = standing/contraction'],ans:2,tol:0,unit:'',working:'Peristalsis = wave of muscle contractions. Answer: 2.'};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Nutrition',ti:'The Role of Bile',su:'Explain emulsification and its importance for lipid digestion.',steps:[
  {lb:'Bile',dr:dQ4,ht:'<p>Bile is produced in the liver, stored in the gall bladder, released into the small intestine. It emulsifies fat: breaks large fat droplets into smaller ones, increasing surface area for lipase to act on. Bile is alkaline (neutralises stomach acid).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Bile emulsification increases the surface area of fat for: 1=amylase, 2=lipase, 3=protease.',a:2,w:'Lipase digests fat; emulsification increases its efficiency. Answer: 2.'},{q:'Bile is stored in the: 1=liver, 2=gall bladder, 3=small intestine.',a:2,w:'Bile is stored in the gall bladder before release. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Bile: emulsifies fat; made in liver, stored in gall bladder'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Nutrition',ti:'Absorption in the Small Intestine',su:'Describe how villi are adapted for absorption.',steps:[
  {lb:'Villi adaptations',dr:dQ5,ht:'<p>Villi: finger-like projections in the small intestine wall. Adaptations: huge surface area, single cell layer (thin, short diffusion distance), rich capillary network (maintain gradient), lacteals for fat absorption.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Glucose and amino acids are absorbed into: 1=lacteals, 2=blood capillaries.',a:2,w:'Glucose and amino acids go into blood capillaries. Answer: 2.'},{q:'Fatty acids and glycerol are absorbed into: 1=lacteals (lymph), 2=blood capillaries.',a:1,w:'Fat products enter lacteals (lymphatic system). Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Glucose/amino acids: blood. Fats: lacteals (lymph).'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Nutrition',ti:'Teeth and Mechanical Digestion',su:'Describe the role of teeth and mechanical digestion.',steps:[
  {lb:'Teeth',dr:dQ6,ht:'<p>Incisors (cutting), canines (tearing), premolars and molars (grinding). Chewing (mastication) = mechanical digestion: increases surface area for enzymes. Saliva: amylase + mucus + water.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Which teeth are used for grinding food? 1=incisors, 2=canines, 3=molars.',a:3,w:'Molars (and premolars) grind food. Answer: 3.'},{q:'Saliva contains: 1=lipase, 2=amylase, 3=protease.',a:2,w:'Salivary amylase starts starch digestion. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Molars: grinding. Saliva: amylase.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Nutrition',ti:'Nutrients and Their Functions',su:'State the roles of carbohydrates, proteins, lipids, vitamins and minerals.',steps:[
  {lb:'Nutrients',dr:dQ7,ht:'<p>Carbohydrates: energy source. Proteins: growth, repair. Lipids: long-term energy, insulation, cell membranes. Vitamins (e.g. C: immune, D: bones). Minerals (e.g. calcium: bones, iron: haemoglobin).</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Which nutrient is the primary energy source for cells? 1=fat, 2=carbohydrate, 3=protein.',a:2,w:'Carbohydrates (glucose) are the primary energy source. Answer: 2.'},{q:'Iron is needed to make: 1=bones, 2=haemoglobin, 3=cell walls.',a:2,w:'Iron is in haemoglobin (oxygen-carrying protein). Answer: 2.'},{q:'Vitamin D is needed for: 1=immune system, 2=healthy bones and teeth.',a:2,w:'Vitamin D aids calcium absorption for bones. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Match nutrient or mineral to function'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Nutrition',ti:'Stomach Function',su:'Explain the role of the stomach in digestion.',steps:[
  {lb:'Stomach',dr:dQ8,ht:'<p>Stomach: muscular bag that churns food. Produces HCl (pH 2): kills bacteria, activates pepsin (protease). Pepsin breaks proteins into polypeptides. Produces mucus to protect stomach lining.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'What does HCl in the stomach do? 1=digests fat, 2=kills bacteria and activates pepsin, 3=neutralises food.',a:2,w:'HCl: kills bacteria, activates pepsin. Answer: 2.'},{q:'What protects the stomach lining from HCl? 1=mucus, 2=bile, 3=amylase.',a:1,w:'Mucus protects the stomach wall. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Stomach: HCl, pepsin, mucus'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Biology \u2022 Nutrition',ti:'Assimilation and Egestion',su:'Distinguish assimilation from egestion.',steps:[
  {lb:'Terms',dr:dQ9,ht:'<p><b>Ingestion:</b> taking food into the mouth. <b>Digestion:</b> breaking food down. <b>Absorption:</b> food enters the blood. <b>Assimilation:</b> absorbed food used by body cells. <b>Egestion:</b> removing undigested material (faeces) \u2014 not excretion!</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var qs=[{q:'Assimilation is: 1=removing undigested food, 2=using absorbed nutrients in cells.',a:2,w:'Assimilation = cells using absorbed nutrients. Answer: 2.'},{q:'Egestion is: 1=excretion of metabolic waste, 2=removal of undigested material as faeces.',a:2,w:'Egestion = removal of undigested food as faeces. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Egestion: undigested food (faeces). Assimilation: cells using absorbed food.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
