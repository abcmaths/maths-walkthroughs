<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The heart','#2E7D32',13,'middle',true));
o.push(R(130,44,220,60,'#fde8e8','#C0272D',2));o.push(T(240,66,'RIGHT SIDE','#C0272D',11,'middle',true));o.push(T(240,84,'deoxygenated blood to lungs','#555',9,'middle',false));
o.push(R(130,118,220,60,'#e8f5e9','#2E7D32',2));o.push(T(240,140,'LEFT SIDE','#2E7D32',11,'middle',true));o.push(T(240,158,'oxygenated blood to body','#555',9,'middle',false));
if(p>=1){o.push(T(240,194,'4 chambers: R atrium, R ventricle, L atrium, L ventricle','#333',10,'middle',false));}
if(p>=2){o.push(T(240,216,'Valves (tricuspid, bicuspid, semilunar): prevent backflow','#333',10,'middle',false));}
if(p>=3){o.push(T(240,240,'Coronary arteries supply heart muscle with O\u2082','#555',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Blood vessels','#2E7D32',13,'middle',true));
[['Artery','thick muscular wall; carries blood away from heart; high pressure'],['Vein','thinner wall, valves; carries blood to heart; low pressure'],['Capillary','one cell thick; site of exchange; between arteries and veins']].forEach(function(r,i){if(i<p+1){o.push(R(10,44+i*64,460,56,'#F1F8F1','#C8E6C9',1.5));o.push(T(90,68+i*64,r[0],'#2E7D32',12,'middle',true));o.push(T(325,68+i*64,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Blood components','#2E7D32',13,'middle',true));
[['Red blood cells','carry O\u2082; haemoglobin; no nucleus; biconcave'],['White blood cells','immune defence; phagocytosis and antibodies'],['Platelets','tiny cell fragments; blood clotting'],['Plasma','liquid; carries dissolved substances']].forEach(function(r,i){if(i<p+1){o.push(R(10,44+i*46,460,38,'#F1F8F1','#C8E6C9',1));o.push(T(130,66+i*46,r[0],'#2E7D32',11,'middle',true));o.push(T(355,66+i*46,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ5(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Circulatory system summary','#2E7D32',13,'middle',true));
[['Double circulation','pulmonary (lungs) + systemic (body)'],['Arteries','thick wall, high pressure, away from heart'],['Veins','valves, low pressure, to heart'],['Capillaries','one cell thick, gas/nutrient exchange'],['Red blood cells','haemoglobin, no nucleus, biconcave'],['Heart valves','prevent backflow of blood']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(120,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Transport',ti:'The Heart',su:'Describe the structure and function of the heart.',steps:[
  {lb:'Four chambers',dr:dQ1,ht:'<p>The heart has 4 chambers: right atrium, right ventricle (pump to lungs), left atrium, left ventricle (pump to body). Valves (bicuspid, tricuspid, semilunar) prevent backflow.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'The left ventricle pumps blood: 1=to the lungs, 2=to the rest of the body.',a:2,w:'Left ventricle: oxygenated blood to body. Answer: 2.'},{q:'The right side of the heart contains: 1=oxygenated blood, 2=deoxygenated blood.',a:2,w:'Right side: deoxygenated blood (from body to lungs). Answer: 2.'},{q:'Heart valves prevent: 1=blood flow, 2=backflow of blood.',a:2,w:'Valves prevent backflow, ensuring one-way flow. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Left: oxygenated to body. Right: deoxygenated to lungs.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Transport',ti:'Blood Vessels',su:'Compare arteries, veins and capillaries in structure and function.',steps:[
  {lb:'Three types',dr:dQ2,ht:'<p>Arteries: thick muscular wall, no valves, carry blood AWAY from heart at high pressure. Veins: thinner wall, have valves, carry blood TO heart at low pressure. Capillaries: one cell thick, site of exchange between blood and tissues.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Which vessel has valves to prevent backflow? 1=artery, 2=vein, 3=capillary.',a:2,w:'Veins have valves. Answer: 2.'},{q:'Where does gas exchange occur between blood and tissues? 1=arteries, 2=veins, 3=capillaries.',a:3,w:'Capillaries: one cell thick = gas/nutrient exchange. Answer: 3.'},{q:'Arteries carry blood: 1=to the heart, 2=away from the heart.',a:2,w:'Arteries carry blood away from the heart. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Artery: away, thick, high P. Vein: to heart, valves. Capillary: exchange.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Transport',ti:'Double Circulation',su:'Describe the two circuits of the mammalian circulatory system.',steps:[
  {lb:'Double circulation',dr:dQ3,ht:'<p>Mammals have a <b>double circulation</b>: (1) <b>Pulmonary:</b> right heart \u2192 lungs \u2192 left heart (oxygenation). (2) <b>Systemic:</b> left heart \u2192 body \u2192 right heart (delivery).</p><p>Advantage: maintains high blood pressure to body organs.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'In pulmonary circulation, blood travels: 1=heart\u2192body\u2192heart, 2=heart\u2192lungs\u2192heart.',a:2,w:'Pulmonary = heart to lungs and back. Answer: 2.'},{q:'Blood leaving the left ventricle is: 1=oxygenated, 2=deoxygenated.',a:1,w:'Left ventricle pumps oxygenated blood to the body. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Pulmonary: to lungs. Systemic: to body.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Transport',ti:'Blood Components',su:'Describe red blood cells, white blood cells, platelets and plasma.',steps:[
  {lb:'Four components',dr:dQ4,ht:'<p>Red blood cells (RBCs): haemoglobin, no nucleus, biconcave (large SA). White blood cells: immune defence. Platelets: clotting. Plasma: liquid transporting dissolved glucose, CO\u2082, urea, hormones.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Red blood cells have no nucleus in order to: 1=carry more haemoglobin, 2=resist disease.',a:1,w:'No nucleus = more space for haemoglobin to carry O\u2082. Answer: 1.'},{q:'Which blood component is involved in blood clotting? 1=red blood cells, 2=white blood cells, 3=platelets.',a:3,w:'Platelets help clot blood. Answer: 3.'},{q:'Plasma transports: 1=only O\u2082, 2=dissolved glucose, CO\u2082, urea, hormones.',a:2,w:'Plasma carries dissolved substances. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['RBCs: O\u2082. WBCs: immune. Platelets: clotting. Plasma: dissolved substances.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Transport',ti:'Haemoglobin and Oxygen Transport',su:'Explain how haemoglobin transports oxygen.',steps:[
  {lb:'Haemoglobin',dr:dQ5,ht:'<p>Haemoglobin (Hb) in red blood cells binds O\u2082 in the lungs to form oxyhaemoglobin. Releases O\u2082 at respiring tissues (lower O\u2082 concentration).</p><div class="fm">Hb + 4O\u2082 \u21cc HbO\u2088 (oxyhaemoglobin)</div>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Haemoglobin picks up O\u2082 in the: 1=lungs, 2=tissues.',a:1,w:'O\u2082 binds to Hb in the lungs (high O\u2082). Answer: 1.'},{q:'Oxyhaemoglobin releases O\u2082 where: 1=O\u2082 concentration is high, 2=O\u2082 concentration is low.',a:2,w:'O\u2082 released at tissues where O\u2082 is low (being used). Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Loads O\u2082 in lungs; unloads at tissues'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Transport',ti:'The Cardiac Cycle',su:'Describe the sequence of events in one heartbeat.',steps:[
  {lb:'Cardiac cycle',dr:dQ6,ht:'<p>Diastole: heart relaxes, chambers fill with blood. Atrial systole: atria contract, push blood into ventricles. Ventricular systole: ventricles contract, push blood out (to lungs and body). The cycle repeats ~70 times/min at rest.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'During ventricular systole: 1=ventricles relax, 2=ventricles contract and push blood out.',a:2,w:'Ventricular systole = ventricles contract. Answer: 2.'},{q:'Normal resting heart rate is approximately: 1=20 bpm, 2=70 bpm, 3=200 bpm.',a:2,w:'Normal resting HR \u2248 70 beats per minute. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Systole = contraction. Diastole = relaxation.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Transport',ti:'Coronary Heart Disease',su:'Describe causes and treatments of coronary heart disease.',steps:[
  {lb:'CHD',dr:dQ7,ht:'<p>Coronary arteries supply heart muscle with O\u2082. CHD: fatty plaques (atherosclerosis) narrow arteries \u2192 reduced blood flow. Risk factors: high cholesterol, smoking, high blood pressure, obesity, diet.</p><p>Treatments: angioplasty, stents, bypass surgery, statins (reduce cholesterol).</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Coronary heart disease is caused by: 1=fatty plaques narrowing coronary arteries, 2=too many red blood cells.',a:1,w:'Atherosclerosis narrows coronary arteries. Answer: 1.'},{q:'Statins are drugs that: 1=lower blood cholesterol, 2=increase heart rate.',a:1,w:'Statins reduce blood cholesterol levels. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['CHD: plaques, narrowed arteries. Statins: lower cholesterol.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Transport',ti:'Blood Pressure',su:'Define blood pressure. Explain the health implications of high blood pressure.',steps:[
  {lb:'Blood pressure',dr:dQ8,ht:'<p>Blood pressure = force of blood against artery walls. Measured as systolic/diastolic (e.g. 120/80 mmHg). High blood pressure (hypertension): damages artery walls \u2192 increased risk of heart attack, stroke.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'High blood pressure increases risk of: 1=diabetes, 2=heart attack and stroke.',a:2,w:'Hypertension damages arteries \u2192 heart attack/stroke risk. Answer: 2.'},{q:'Systolic pressure is measured when the heart: 1=relaxes, 2=contracts.',a:2,w:'Systolic = when ventricles contract (highest pressure). Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Systolic: heart contracting. High BP: damages vessels.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Biology \u2022 Transport',ti:'Lymphatic System',su:'Describe the role of the lymphatic system.',steps:[
