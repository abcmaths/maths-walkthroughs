:root{--acc:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0a1a0a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--acc);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:14px;font-weight:700;max-width:400px;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:8px 10px;cursor:pointer;font-size:11.5px;line-height:1.3;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--acc);color:var(--acc);}
.qb.on{background:var(--acc);color:#fff;border-color:var(--acc);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--acc);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--acc);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:22px;margin:4px 0 3px;line-height:1.2;}
.sub{font-size:13px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,var(--cream));padding:10px 0 2px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:18px 22px 22px;border-top:1px solid var(--line);min-height:140px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:15px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:15px;background:var(--cream);border-left:4px solid var(--acc);padding:8px 12px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:14px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--acc);background:#fff;color:var(--acc);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--acc);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--acc);}.dot.dn{background:var(--gold);}
.fi{animation:fi .35s ease;}
@keyframes fi{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:16px 18px;margin-top:6px;}
.try-t{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:8px;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;}
.ck:hover{background:#a07018;}
.fb{margin-top:8px;font-size:14px;padding:8px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--acc);font-weight:600;font-size:13px;margin-top:8px;display:block;}
.wk-b{margin-top:6px;font-size:13px;line-height:1.6;}
.wk-ans{margin-top:4px;}
.mc-opts{display:flex;flex-direction:column;gap:7px;margin-top:10px;}
.mc-opt{padding:9px 14px;border:1.5px solid var(--line);border-radius:4px;cursor:pointer;font-size:14px;background:#fff;text-align:left;transition:.15s;font-family:inherit;}
.mc-opt:hover:not(:disabled){border-color:var(--acc);background:var(--cream);}
.mc-opt.correct{border-color:#2e7d32;background:#e8f8ee;color:#1a7a3a;font-weight:600;}
.mc-opt.wrong{border-color:#C0272D;background:#fde8e8;color:#a01820;}
@media(max-width:680px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:90px;}}

<script>

var ST={};
function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(a){return a[Math.floor(Math.random()*a.length)];}
function tryItMC(fn){var id='t'+Math.random().toString(36).slice(2);ST[id]=fn;return genTryMC(id,fn());}
function genTryMC(id,o){
  var opts=o.options.map(function(opt,i){
    return '<button class="mc-opt" onclick="ckMC(\''+id+'\','+i+','+o.correct+')">'+opt+'</button>';
  }).join('');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><p>'+o.question+'</p>'+
    '<div class="mc-opts">'+opts+'</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk"><summary>Show answer</summary><div class="wk-b"><div class="wk-ans">'+o.working+'</div></div></details></div>';
}
function ckMC(id,chosen,correct){
  var btns=document.querySelectorAll('[data-tryid="'+id+'"] .mc-opt');
  btns.forEach(function(b){b.disabled=true;});
  var fb=document.getElementById(id+'_f');
  if(chosen===correct){btns[chosen].classList.add('correct');fb.className='fb ok';fb.textContent='Correct! \u2713';}
  else{btns[chosen].classList.add('wrong');btns[correct].classList.add('correct');fb.className='fb er';fb.textContent='Not quite \u2014 see the correct answer above.';}
}
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);ST[id]=fn;return genTry(id,fn());}
function genTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="try"><div class="try-t">&#10004; Your Turn</div><p>'+o.question+'</p>'+
    (h?'<ul class="hl">'+h+'</ul>':'')+
    '<div class="ar"><input type="number" step="any" placeholder="Your answer" id="'+id+'_i"/>'+
    '<button class="ck" onclick="ck(\''+id+'\')">&#10003; Check</button></div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk"><summary>Show working</summary><div class="wk-b"><div class="wk-ans">'+o.working+'</div></div></details></div>';
}
function ck(id){
  var v=parseFloat(document.getElementById(id+'_i').value);
  var o=ST[id]();var fb=document.getElementById(id+'_f');
  var tol=o.tol||0.01;
  if(Math.abs(v-o.ans)<=tol){fb.className='fb ok';fb.textContent='Correct! \u2713';}
  else{fb.className='fb er';fb.textContent='Not quite. Try again or see working below.';}
}
function g(){return document.getElementById('dg');}
function T(x,y,txt,col,sz,anchor,bold){return '<text x="'+x+'" y="'+y+'" fill="'+col+'" font-size="'+sz+'" text-anchor="'+(anchor||'start')+'"'+(bold?' font-weight="700"':'')+'>'+txt+'</text>';}
function L(x1,y1,x2,y2,col,sw){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="'+(sw||1.5)+'"/>';}
function R(x,y,w,h,fill,stroke,sw,rx){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'" rx="'+(rx||2)+'"/>';}
function circ(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}
function arr(x1,y1,x2,y2,col,sw){return '<defs><marker id="ah'+x1+y1+'" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="'+col+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+col+'" stroke-width="'+(sw||1.5)+'" marker-end="url(#ah'+x1+y1+')"/>';}

var QS=[{ey:'Y10 Biology • Y10-CLA-01',ti:'Characteristics and Classification of Living Organisms',su:'Cambridge IGCSE',steps:[{sl:'MRS GREN: seven life processes',p:'<b>MRS GREN: seven life processes</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 1 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'MRS GREN: seven life processes','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Species definition',p:'<b>Species definition</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 2 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'Species definition','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Binomial naming system',p:'<b>Binomial naming system</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 3 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'Binomial naming system','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Classification hierarchy',p:'<b>Classification hierarchy</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 4 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'Classification hierarchy','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Five kingdoms',p:'<b>Five kingdoms</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 5 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'Five kingdoms','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Kingdom Plantae features',p:'<b>Kingdom Plantae features</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 6 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'Kingdom Plantae features','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Kingdom Animalia features',p:'<b>Kingdom Animalia features</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 7 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'Kingdom Animalia features','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Vertebrate groups',p:'<b>Vertebrate groups</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 8 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'Vertebrate groups','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Arthropod groups',p:'<b>Arthropod groups</b><br><br>Key content for <em>Characteristics and Classifica</em>, subtopic 9 of 10.',draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(R(20,60,480,80,'#f5f5f5','#ccc',1.5,6));o.push(T(260,105,'Arthropod groups','#2E7D32',11,'middle',true));o.push(R(20,155,480,80,'#f9f9f9','#ddd',1,4));o.push(T(260,200,'Full walkthrough content goes here','#aaa',10,'middle',false));s.innerHTML=o.join('');}},{sl:'Your turn',p:'Test your understanding of Characteristics and Classifica.'+tryItMC(function(){var qs=[{question:'What is the function of mitochondria?',options:['Photosynthesis','Protein synthesis','Aerobic respiration','Store DNA'],correct:2,working:'Mitochondria are the sites of <b>aerobic respiration</b>, producing ATP from glucose and oxygen.'},{question:'Which process moves substances against a concentration gradient?',options:['Diffusion','Osmosis','Active transport','Evaporation'],correct:2,working:'<b>Active transport</b> moves molecules from low to high concentration, requiring energy (ATP) from respiration.'},{question:'What does osmosis describe?',options:['Movement of any particles down concentration gradient','Net movement of water through a partially permeable membrane','Movement against a concentration gradient','Bulk movement of fluid'],correct:1,working:'Osmosis is the net movement of <b>water molecules</b> from a higher to lower water potential through a <b>partially permeable membrane</b>.'}];return rPick(qs);}),draw:function(){var s=g(),o=[];s.setAttribute('viewBox','0 0 520 280');o.push(T(260,140,'Characteristics and Classifica','#2E7D32',12,'middle',true));s.innerHTML=o.join('');}}]}];

var qi=0,si=0;
function buildSidebar(){
  var sb=document.getElementById('sb');
  sb.innerHTML='<div class="sb-lbl">Subtopics</div>';
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}
function render(){
  var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su||'';
  document.getElementById('pn').className='pnl fi';
  document.getElementById('pn').innerHTML='<div class="sl">'+st.sl+'</div><div>'+st.p+'</div>';
  if(st.draw)st.draw();
  var dt=document.getElementById('dt');
  dt.innerHTML=q.steps.map(function(_,i){return '<div class="dot'+(i===si?' on':i<si?' dn':'')+'"></div>';}).join('');
  document.getElementById('pb').disabled=(qi===0&&si===0);
  var last=(qi===QS.length-1&&si===q.steps.length-1);
  document.getElementById('nb').textContent=last?'Mark Complete \u2713':'Next \u2192';
  document.getElementById('nb').onclick=last?markComplete:advance;
  document.getElementById('nb').disabled=false;
  document.querySelectorAll('.qb').forEach(function(b,i){b.classList.toggle('on',i===qi);});
}
function advance(){
  var q=QS[qi];
  if(si<q.steps.length-1){si++;}
  else if(qi<QS.length-1){qi++;si=0;}
  render();
}
document.getElementById('pb').onclick=function(){
  if(si>0){si--;}
  else if(qi>0){qi--;si=QS[qi].steps.length-1;}
  render();
};
buildSidebar();render();

</script>
