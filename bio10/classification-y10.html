<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Kingdoms of life','#2E7D32',13,'middle',true));
[['Animalia','multicellular, no cell wall, heterotroph'],['Plantae','multicellular, cell wall (cellulose), autotroph'],['Fungi','cell wall (chitin), absorptive nutrition'],['Protoctista','mostly unicellular eukaryotes'],['Prokaryotae','no nucleus, unicellular (bacteria)']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*38,460,30,'#F1F8F1','#C8E6C9',1));o.push(T(100,60+i*38,r[0],'#2E7D32',11,'middle',true));o.push(T(335,60+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Hierarchy: K-P-C-O-F-G-S','#2E7D32',12,'middle',true));
var levels=[['Kingdom','broadest grouping'],['Phylum','e.g. Chordata (vertebrates)'],['Class','e.g. Mammalia'],['Order','e.g. Primates'],['Family','e.g. Hominidae'],['Genus','e.g. Homo'],['Species','narrowest — can interbreed']];
levels.forEach(function(r,i){if(i<p+1){var w=460-i*30;o.push(R(10+i*15,40+i*28,w,22,'#F1F8F1','#2E7D32',1));o.push(T(240,55+i*28,r[0]+': '+r[1],'#2E7D32',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Binomial nomenclature','#2E7D32',13,'middle',true));
o.push(R(40,42,400,56,'#F1F8F1','#2E7D32',2));o.push(T(240,65,'Homo sapiens','#2E7D32',18,'middle',true));o.push(T(240,84,'Genus    Species','#555',9,'middle',false));
if(p>=1){o.push(T(240,120,'Always italicised (or underlined in handwriting)','#555',10,'middle',false));o.push(T(240,140,'Genus starts with CAPITAL; species starts with lower case','#555',10,'middle',false));}
if(p>=2){[['Homo sapiens','Humans'],['Panthera leo','Lion'],['Rosa canina','Dog rose'],['Escherichia coli','E. coli bacterium']].forEach(function(r,i){if(i<p-1){o.push(T(140,168+i*22,r[0],'#2E7D32',10,'middle',false));o.push(T(360,168+i*22,r[1],'#555',10,'middle',false));}});}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Vertebrates vs invertebrates','#2E7D32',13,'middle',true));
o.push(R(10,40,225,198,'#F1F8F1','#2E7D32',2));o.push(T(122,60,'VERTEBRATES','#2E7D32',11,'middle',true));
o.push(R(245,40,225,198,'#e8f5e9','#2E7D32',2));o.push(T(358,60,'INVERTEBRATES','#2E7D32',11,'middle',true));
var verts=['Fish','Amphibia','Reptiles','Birds','Mammals'];
var inverts=['Insects','Arachnids','Crustaceans','Molluscs','Annelids'];
verts.forEach(function(v,i){if(i<p)o.push(T(122,82+i*26,v,'#333',10,'middle',false));});
inverts.forEach(function(v,i){if(i<p)o.push(T(358,82+i*26,v,'#333',10,'middle',false));});
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Dichotomous keys','#2E7D32',12,'middle',true));
if(p>=1){o.push(R(130,44,220,30,'#F1F8F1','#2E7D32',2));o.push(T(240,64,'Does it have legs?','#333',10,'middle',false));o.push(arw(180,74,100,110,'#2E7D32',1.5));o.push(arw(300,74,390,110,'#2E7D32',1.5));o.push(T(100,106,'YES','#2E7D32',9,'middle',false));o.push(T(390,106,'NO','#C0272D',9,'middle',false));}
if(p>=2){o.push(R(20,114,130,26,'#F1F8F1','#2E7D32',1));o.push(T(85,132,'How many legs?','#333',9,'middle',false));o.push(R(320,114,130,26,'#F1F8F1','#C0272D',1));o.push(T(385,132,'Has wings?','#333',9,'middle',false));}
if(p>=3){o.push(T(40,172,'6 \u2192 insect','#333',8,'start',false));o.push(T(40,188,'8 \u2192 arachnid','#333',8,'start',false));o.push(T(330,172,'Yes\u2192bird','#333',8,'start',false));o.push(T(330,188,'No\u2192fish/worm','#333',8,'start',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ2(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ5(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Classification summary','#2E7D32',13,'middle',true));
[['5 kingdoms','Animalia, Plantae, Fungi, Protoctista, Prokaryotae'],['Hierarchy','Kingdom\u2192Phylum\u2192Class\u2192Order\u2192Family\u2192Genus\u2192Species'],['Binomial','Genus species (italics; capital G, lower s)'],['Species','can interbreed and produce fertile offspring'],['Dichotomous key','yes/no questions to identify organisms']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*38,460,30,'#F1F8F1','#C8E6C9',1));o.push(T(120,61+i*38,r[0],'#2E7D32',10,'middle',true));o.push(T(340,61+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Classification',ti:'Five Kingdoms',su:'Name and describe the five kingdoms of living organisms.',steps:[
  {lb:'Five kingdoms',dr:dQ1,ht:'<p><b>Animalia:</b> multicellular, no cell wall, heterotroph. <b>Plantae:</b> cell wall (cellulose), autotroph. <b>Fungi:</b> cell wall (chitin), absorptive nutrition. <b>Protoctista:</b> mostly unicellular eukaryotes. <b>Prokaryotae:</b> bacteria, no nucleus.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Which kingdom has cells with no nucleus?',a:5,w:'Prokaryotae (bacteria) have no nucleus. Answer: 5.'},{q:'Which kingdom has cell walls made of chitin?',a:3,w:'Fungi have chitin cell walls. Answer: 3.'},{q:'Which kingdom has cell walls made of cellulose and is autotrophic?',a:2,w:'Plantae: cellulose cell walls, photosynthetic. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=Animalia, 2=Plantae, 3=Fungi, 4=Protoctista, 5=Prokaryotae.',hints:['Match the key feature to the kingdom'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Classification',ti:'Taxonomic Hierarchy',su:'State the levels of the taxonomic hierarchy and give examples.',steps:[
  {lb:'KPCOFGS',dr:dQ2,ht:'<p>Kingdom \u2192 Phylum \u2192 Class \u2192 Order \u2192 Family \u2192 Genus \u2192 Species. Each level contains fewer organisms and they share more features. Mnemonic: "King Philip Came Over For Good Soup".</p>'},
  {lb:'Humans',dr:dQ2,ht:'<p>Kingdom Animalia, Phylum Chordata, Class Mammalia, Order Primates, Family Hominidae, Genus Homo, Species sapiens.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Which level of classification is the most specific?',a:7,w:'Species is the narrowest level. Answer: 7 (7th level).'},{q:'Which level is broader: Class or Order?',a:1,w:'Class is broader than Order. Answer: 1.'},{q:'Which level comes between Family and Species?',a:1,w:'Family \u2192 Genus \u2192 Species. Genus is between Family and Species. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+(qq.a===7?' (1=Kingdom, 7=Species)':qq.a===1&&qq.q.includes('broader')?' 1=Class, 2=Order':' 1=Genus, 2=Order'),hints:['KPCOFGS \u2014 Kingdom Phylum Class Order Family Genus Species'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Classification',ti:'Binomial Nomenclature',su:'Explain the binomial system. Write scientific names correctly.',steps:[
  {lb:'The binomial system',dr:dQ3,ht:'<p>Each organism has a unique two-part name: <b>Genus species</b>. Always italicised (or underlined). Genus starts with a capital letter; species starts with lower case.</p><p>Example: <i>Homo sapiens</i>.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'The scientific name for a lion is Panthera leo. Which part is the genus?',a:1,w:'Panthera is the genus (first part, capital letter). Answer: 1.'},{q:'The scientific name for a lion is Panthera leo. Which part is the species?',a:2,w:'leo is the species (second part, lowercase). Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=Panthera, 2=leo.',hints:['Genus: first part, capital. Species: second part, lower case.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Classification',ti:'Vertebrates and Invertebrates',su:'Compare the five classes of vertebrates and key invertebrate groups.',steps:[
  {lb:'Vertebrates',dr:dQ4,ht:'<p>Vertebrates have a backbone. Five classes: <b>Fish</b> (gills, scales), <b>Amphibia</b> (moist skin, lay eggs in water), <b>Reptiles</b> (dry scales, lay eggs on land), <b>Birds</b> (feathers, warm-blooded), <b>Mammals</b> (hair, suckle young, warm-blooded).</p>'},
  {lb:'Invertebrates',dr:dQ4,ht:'<p>No backbone. Key groups: <b>Insects</b> (6 legs, 3 body parts), <b>Arachnids</b> (8 legs), <b>Crustaceans</b> (exoskeleton, 10+ legs), <b>Molluscs</b> (soft body, often shell), <b>Annelids</b> (segmented worms).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'A spider has 8 legs. Which invertebrate group?',a:2,w:'8 legs = arachnid. Answer: 2.'},{q:'A frog has moist skin and lays eggs in water. Which vertebrate class?',a:2,w:'Moist skin, lays eggs in water = amphibia. Answer: 2.'},{q:'Which mammal feature is used to identify mammals?',a:1,w:'Mammals suckle young with milk (and have hair). Answer: 1.'}];var qq=pick(qs);return{question:qq.q+(qq.a===2&&qq.q.includes('spider')?' 1=insect, 2=arachnid, 3=crustacean.':qq.a===2?' 1=fish, 2=amphibia, 3=reptile.':' 1=suckle young with milk, 2=lay eggs, 3=have scales.'),hints:['Match key features to group'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Classification',ti:'Dichotomous Keys',su:'Use and construct a dichotomous key to identify organisms.',steps:[
  {lb:'What is a dichotomous key?',dr:dQ5,ht:'<p>A <b>dichotomous key</b> is a series of yes/no questions used to identify an unknown organism. At each step, you choose between two options based on observable features.</p>'},
  {lb:'How to use a key',dr:dQ5,ht:'<p>Start at question 1. Observe the organism. Choose the option that matches. Follow the instructions to the next question or to a name.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Dichotomous means: 1=branching into two, 2=branching into many.',a:1,w:'Dichotomous = two options at each step. Answer: 1.'},{q:'A key question is "Does it have 6 legs?". An insect would answer: 1=YES, 2=NO.',a:1,w:'Insects have 6 legs. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Dichotomous = two choices; yes or no at each step'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Classification',ti:'Eukaryotes vs Prokaryotes',su:'Compare eukaryotic and prokaryotic cells.',steps:[
  {lb:'Key differences',dr:dQ6,ht:'<p><b>Eukaryotes</b> (animals, plants, fungi, protoctists): have membrane-bound nucleus, mitochondria, 80S ribosomes, larger cells.<br><b>Prokaryotes</b> (bacteria): no nucleus (DNA free in cytoplasm), no mitochondria, 70S ribosomes, cell wall (not cellulose), often have plasmids and flagella.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Bacteria have no: 1=cell wall, 2=membrane-bound nucleus, 3=cell membrane.',a:2,w:'Bacteria (prokaryotes) have no membrane-bound nucleus. Answer: 2.'},{q:'Which type of cell has mitochondria?',a:1,w:'Eukaryotic cells have mitochondria. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+(qq.a===1?' 1=eukaryotic, 2=prokaryotic.':''),hints:['Prokaryotes: no nucleus, no mitochondria, smaller, 70S ribosomes'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Classification',ti:'Viruses',su:'Describe the structure of a virus and why they are not classified as living.',steps:[
  {lb:'Viruses',dr:dQ7,ht:'<p>Viruses are <b>not classified as living</b> organisms because they: cannot reproduce independently, have no cells, carry out no metabolism. They consist of a protein coat (<b>capsid</b>) and nucleic acid (DNA or RNA).</p><p>Viruses are parasitic \u2014 they inject DNA into a host cell, which then produces more virus particles.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Why are viruses not classified as living? 1=they have no cells, 2=they are too small, 3=they live in water.',a:1,w:'Viruses have no cells and cannot reproduce independently. Answer: 1.'},{q:'What is the protein coat of a virus called?',a:1,w:'The protein coat is called the capsid. Answer: 1.'}];var qq=pick(qs);return{question:qq.q+(qq.a===1&&qq.q.includes('protein')?' 1=capsid, 2=nucleus, 3=cell wall.':''),hints:['Viruses: no cells, no independent reproduction'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Classification',ti:'Natural vs Artificial Classification',su:'Distinguish natural from artificial classification systems.',steps:[
  {lb:'Natural classification',dr:dQ8,ht:'<p><b>Natural classification</b> is based on evolutionary relationships and shared ancestry (phylogeny). Modern systems use DNA analysis. Groups reflect genuine evolutionary relatedness.</p><p><b>Artificial classification</b> groups organisms by superficial features (e.g. "all flying things together" \u2014 bats and birds and butterflies).</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'Grouping bats with birds because both fly is: 1=natural classification, 2=artificial classification.',a:2,w:'Based on superficial feature (flying) = artificial. Answer: 2.'},{q:'Grouping organisms based on DNA similarity is: 1=natural, 2=artificial.',a:1,w:'Based on evolutionary relatedness = natural classification. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Natural = based on evolutionary relationships. Artificial = based on visible features.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Biology \u2022 Classification',ti:'Species Definition',su:'Define species and explain the biological species concept.',steps:[
  {lb:'What is a species?',dr:dQ9,ht:'<p>A <b>species</b> is a group of organisms that share common features and can interbreed to produce <b>fertile offspring</b>.</p><p>A horse and donkey can breed (mule) but mules are sterile \u2014 so horses and donkeys are different species.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var qs=[{q:'A horse and donkey breed to produce a sterile mule. Are they the same species? 1=yes, 2=no.',a:2,w:'Offspring must be fertile for parents to be same species. Mule is sterile \u2192 different species. Answer: 2.'},{q:'Two organisms that interbreed and produce fertile offspring are: 1=same species, 2=different species.',a:1,w:'Fertile offspring = same species. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Species: can interbreed and produce fertile offspring'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q10 \u2022 Y10 Biology \u2022 Classification',ti:'Mixed Classification',su:'Combined questions on kingdoms, hierarchy, binomial system and species.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>5 kingdoms \u2022 KPCOFGS hierarchy \u2022 Genus species (binomial) \u2022 Species = fertile offspring \u2022 Eukaryote vs prokaryote \u2022 Viruses not living.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['kingdom','hierarchy','species']);if(type==='kingdom'){var qs=[{q:'Which kingdom has no membrane-bound nucleus?',a:5,w:'Prokaryotae. Answer: 5.'},{q:'Which kingdom has cell walls of chitin?',a:3,w:'Fungi. Answer: 3.'},{q:'Which kingdom is multicellular, autotrophic with cellulose cell walls?',a:2,w:'Plantae. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=Animalia, 2=Plantae, 3=Fungi, 4=Protoctista, 5=Prokaryotae.',hints:['Match feature to kingdom'],ans:qq.a,tol:0,unit:'',working:qq.w};}if(type==='hierarchy'){return{question:'Which comes first in KPCOFGS? 1=Genus, 2=Family, 3=Kingdom.',hints:['Kingdom is the broadest level'],ans:3,tol:0,unit:'',working:'Kingdom is first (broadest). Answer: 3.'};};return{question:'Two organisms breed but produce sterile offspring. Are they: 1=same species, 2=different species?',hints:['Same species = fertile offspring required'],ans:2,tol:0,unit:'',working:'Sterile offspring \u2192 different species. Answer: 2.'};})}
]},
];
