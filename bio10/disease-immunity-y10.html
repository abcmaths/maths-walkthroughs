<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}

.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Types of disease','#2E7D32',13,'middle',true));
[['Infectious','caused by pathogens: bacteria, viruses, fungi, protists'],['Non-infectious','cancer, genetic disorders, nutritional, autoimmune'],['Bacteria','prokaryotes; reproduce rapidly; cause disease by toxins'],['Viruses','not cells; inject DNA into host; cause cell death'],['Fungi','e.g. athlete\'s foot, ringworm'],['Protists','e.g. Plasmodium (malaria)']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(110,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(330,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Immune response','#2E7D32',13,'middle',true));
if(p>=1){o.push(R(10,44,460,56,'#F1F8F1','#2E7D32',1.5));o.push(T(240,64,'1. Pathogen enters; antigens detected','#333',10,'middle',false));o.push(T(240,82,'2. Phagocytes engulf pathogens (phagocytosis)','#333',10,'middle',false));}
if(p>=2){o.push(R(10,114,460,56,'#e8f5e9','#2E7D32',1.5));o.push(T(240,134,'3. B-lymphocytes produce specific antibodies','#2E7D32',11,'middle',true));o.push(T(240,152,'4. Antibodies bind to antigens \u2192 clump / destroy','#555',9,'middle',false));}
if(p>=3){o.push(R(10,184,460,56,'#fde8e8','#C0272D',1));o.push(T(240,204,'5. Memory cells formed \u2192 faster response next time','#C0272D',10,'middle',true));o.push(T(240,222,'This is the basis of immunity and vaccination','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Vaccination','#2E7D32',13,'middle',true));
o.push(R(10,44,460,160,'#F1F8F1','#2E7D32',1.5));
o.push(T(240,72,'Inject dead/weakened/antigen of pathogen','#2E7D32',11,'middle',false));
if(p>=1){o.push(T(240,102,'Immune system responds: produces antibodies + memory cells','#333',10,'middle',false));}
if(p>=2){o.push(T(240,130,'Future infection: memory cells respond rapidly','#333',10,'middle',false));o.push(T(240,150,'Antibodies produced before disease develops','#555',9,'middle',false));}
if(p>=3){o.push(T(240,194,'Herd immunity: enough vaccinated \u2192 pathogen cannot spread','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ5(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Disease & immunity summary','#2E7D32',13,'middle',true));
[['Bacteria','prokaryotes; toxins; treated with antibiotics'],['Viruses','not cells; need host; antivirals (limited)'],['Antibodies','specific to antigen; produced by B-lymphocytes'],['Memory cells','faster secondary response'],['Vaccination','introduces antigens; prevents disease'],['Antibiotics','kill bacteria; NOT effective against viruses']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(110,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Disease',ti:'Types of Disease',su:'Classify diseases as infectious or non-infectious. Name the four pathogen types.',steps:[
  {lb:'Pathogens',dr:dQ1,ht:'<p>Infectious diseases are caused by <b>pathogens</b>: bacteria (e.g. TB, salmonella), viruses (e.g. influenza, HIV), fungi (e.g. athlete\u2019s foot), protists (e.g. Plasmodium causes malaria).</p><p>Non-infectious: cancer, genetic disorders, nutritional deficiency, autoimmune diseases.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Malaria is caused by a: 1=bacterium, 2=virus, 3=protist.',a:3,w:'Plasmodium (a protist) causes malaria. Answer: 3.'},{q:'Influenza (flu) is caused by a: 1=bacterium, 2=virus, 3=fungus.',a:2,w:'Flu is caused by a virus. Answer: 2.'},{q:'Athlete\'s foot is caused by a: 1=bacterium, 2=virus, 3=fungus.',a:3,w:"Athlete's foot = fungal infection. Answer: 3."}];var qq=pick(qs);return{question:qq.q,hints:['Match disease to type of pathogen'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Disease',ti:'The Immune Response',su:'Describe the non-specific and specific immune responses.',steps:[
  {lb:'Non-specific defence',dr:dQ2,ht:'<p>First line: skin (barrier), mucus, cilia, stomach acid. Second line: phagocytes (white blood cells) engulf and destroy pathogens by phagocytosis (non-specific).</p>'},
  {lb:'Specific immunity',dr:dQ2,ht:'<p>Antigens on pathogens trigger B-lymphocytes to produce specific antibodies. Antibodies bind to antigens \u2192 clump bacteria or neutralise toxins. Memory cells remain for a faster secondary response.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Antibodies are produced by: 1=phagocytes, 2=B-lymphocytes, 3=red blood cells.',a:2,w:'B-lymphocytes produce antibodies. Answer: 2.'},{q:'Memory cells allow: 1=a faster response to a future infection, 2=antibiotics to work.',a:1,w:'Memory cells enable faster secondary immune response. Answer: 1.'},{q:'Phagocytosis is: 1=the engulfing and digestion of pathogens, 2=production of antibodies.',a:1,w:'Phagocytosis = engulfing pathogens. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['B-lymphocytes: antibodies. Phagocytes: engulf. Memory cells: fast response.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Disease',ti:'Antibiotics and Antiviral Drugs',su:'Explain why antibiotics are ineffective against viruses.',steps:[
  {lb:'Antibiotics',dr:dQ3,ht:'<p>Antibiotics kill bacteria by targeting bacterial structures (cell wall, ribosomes). They do <b>not</b> work on viruses \u2014 viruses use the host cell\u2019s machinery, so drugs that kill viruses would also harm the host. Misuse \u2192 antibiotic-resistant bacteria (e.g. MRSA).</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Antibiotics are effective against: 1=bacteria, 2=viruses, 3=both.',a:1,w:'Antibiotics only kill bacteria. Answer: 1.'},{q:'Antibiotic resistance develops because: 1=bacteria evolve, 2=viruses become bacteria.',a:1,w:'Bacteria with resistance survive and reproduce \u2192 resistant population. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Antibiotics kill bacteria (not viruses). Resistance: natural selection.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Disease',ti:'Vaccination',su:'Explain how vaccination provides immunity.',steps:[
  {lb:'How vaccines work',dr:dQ4,ht:'<p>A vaccine contains dead/weakened pathogen or antigens. The immune system responds: B-lymphocytes make antibodies + memory cells form. Future infection: memory cells respond quickly \u2192 antibodies made before disease develops.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'What is injected in a vaccine? 1=live active pathogen, 2=dead/weakened pathogen or antigens.',a:2,w:'Dead/weakened pathogen or just antigens. Answer: 2.'},{q:'After vaccination, if the real pathogen invades: 1=memory cells give rapid response, 2=you must be vaccinated again.',a:1,w:'Memory cells produce rapid secondary response. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Vaccine: triggers immune response without causing disease'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Disease',ti:'Herd Immunity',su:'Explain the concept of herd immunity and why it matters.',steps:[
  {lb:'Herd immunity',dr:dQ5,ht:'<p>When a high proportion of a population is immune (vaccinated or previously infected), the pathogen cannot easily spread \u2014 even non-immune individuals are protected. This breaks the chain of transmission.</p><p>~95% need to be immune for herd immunity to work for measles.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Herd immunity occurs when: 1=everyone is vaccinated, 2=enough people are immune to prevent pathogen spread.',a:2,w:'Herd immunity does not require 100% but a threshold. Answer: 2.'},{q:'Herd immunity protects: 1=only those vaccinated, 2=also vulnerable people who cannot be vaccinated.',a:2,w:'Herd immunity protects vulnerable people (babies, immunocompromised) too. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Herd immunity: enough immune \u2192 breaks transmission chain'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Disease',ti:'Transmission of Disease',su:'Describe routes of transmission of infectious diseases.',steps:[
  {lb:'Transmission routes',dr:dQ6,ht:'<p>Airborne: droplets (coughing/sneezing \u2014 flu, TB). Contact: direct touch (athlete\u2019s foot). Food/water: contamination (salmonella, cholera). Vectors: animal carriers (mosquito \u2192 malaria). Sexual: HIV. Blood: HIV, hepatitis.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Malaria is transmitted by: 1=contaminated water, 2=mosquito bite, 3=airborne droplets.',a:2,w:'Mosquito is the vector for malaria (Plasmodium). Answer: 2.'},{q:'HIV is transmitted by: 1=airborne droplets, 2=blood or sexual contact.',a:2,w:'HIV transmitted via blood or sexual contact. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Match disease to transmission route'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Disease',ti:'Monoclonal Antibodies',su:'Describe how monoclonal antibodies are produced and used.',steps:[
  {lb:'Monoclonal antibodies',dr:dQ7,ht:'<p>Monoclonal antibodies are identical antibodies all specific to one antigen. Produced from hybridoma cells (B-lymphocyte fused with tumour cell). Used in: pregnancy tests, cancer treatment (carry drugs to tumour), HIV testing.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Monoclonal antibodies are: 1=produced by bacteria, 2=identical antibodies specific to one antigen.',a:2,w:'Monoclonal = all identical, specific to one antigen. Answer: 2.'},{q:'Monoclonal antibodies can treat cancer by: 1=killing bacteria, 2=carrying drugs to cancer cells.',a:2,w:'Can be attached to drugs to target cancer cells specifically. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Monoclonal: identical, specific to one antigen; many uses'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Disease',ti:'Plant Disease',su:'Describe how plants defend against pathogens.',steps:[
  {lb:'Plant defences',dr:dQ8,ht:'<p>Physical: waxy cuticle (barrier), bark, cell walls. Chemical: antimicrobial compounds (e.g. nicotine, tannins). Mechanical: thorns, curling leaves. Plants also produce enzymes that kill pathogens.</p><p>Examples of plant diseases: rose black spot (fungus), tobacco mosaic virus (virus).</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'Rose black spot is caused by a: 1=bacterium, 2=virus, 3=fungus.',a:3,w:'Rose black spot is a fungal disease. Answer: 3.'},{q:'Which is a physical defence of plants against disease? 1=waxy cuticle, 2=antibodies.',a:1,w:'Waxy cuticle is a physical barrier. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Plants: waxy cuticle (physical), antimicrobial chemicals (chemical)'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Biology \u2022 Disease',ti:'Clinical Trials',su:'Describe the stages of drug testing: preclinical and clinical trials.',steps:[
  {lb:'Drug testing stages',dr:dQ9,ht:'<p>1. Preclinical: tested on cells and animals. 2. Phase 1 trial: small group of healthy humans (safety). 3. Phase 2: small group of patients (effectiveness + dosage). 4. Phase 3: large group, randomised controlled trial (double-blind, placebo). 5. Monitoring after release.</p>'},

]},
{ey:'Q10 \u2022 Y10 Biology \u2022 Disease',ti:'Mixed Disease & Immunity',su:'Combined pathogens, immune response, vaccination and antibiotics questions.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>Bacteria: antibiotics. Viruses: not antibiotics. Antibodies: specific, from B-lymphocytes. Memory cells: fast response. Vaccines: antigens trigger immunity. Herd immunity: breaks chain.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['pathogen','antibody','vaccine']);if(type==='pathogen'){var qs=[{q:'Malaria is caused by: 1=a bacterium, 2=a virus, 3=a protist.',a:3,w:'Plasmodium = protist. Answer: 3.'},{q:'Influenza is caused by: 1=a bacterium, 2=a virus.',a:2,w:'Flu = virus. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Match disease to pathogen type'],ans:qq.a,tol:0,unit:'',working:qq.w};}if(type==='antibody'){var qs2=[{q:'Antibodies are produced by: 1=phagocytes, 2=B-lymphocytes.',a:2,w:'B-lymphocytes. Answer: 2.'},{q:'Memory cells lead to: 1=a slower response, 2=a faster response to future infection.',a:2,w:'Memory cells = faster secondary response. Answer: 2.'}];var qq2=pick(qs2);return{question:qq2.q,hints:['B-lymphocytes: antibodies. Memory: faster response.'],ans:qq2.a,tol:0,unit:'',working:qq2.w};}return{question:'Antibiotics are effective against: 1=bacteria only, 2=viruses only, 3=both.',hints:['Antibiotics kill bacteria, not viruses'],ans:1,tol:0,unit:'',working:'Antibiotics kill bacteria only. Answer: 1.'};})}
