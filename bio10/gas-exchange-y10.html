<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The respiratory system','#2E7D32',13,'middle',true));
var parts=['Nasal cavity (warms, moistens air)','Trachea (carries air to lungs)','Bronchi (two main airways into lungs)','Bronchioles (smaller airways)','Alveoli (site of gas exchange)','Intercostal muscles + diaphragm (ventilation)'];
parts.forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(240,55+i*33,r,'#2E7D32',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Alveoli — gas exchange','#2E7D32',12,'middle',true));
o.push('<circle cx="240" cy="148" r="80" fill="#e8f5e9" stroke="#2E7D32" stroke-width="2"/>');
o.push(T(240,148,'ALVEOLUS','#2E7D32',10,'middle',true));
if(p>=1){o.push(arw(320,110,380,80,'#C0272D',2));o.push(T(400,72,'CO\u2082 out','#C0272D',9,'start',false));o.push(arw(380,130,320,150,'#2E7D32',2));o.push(T(400,140,'O\u2082 in','#2E7D32',9,'start',false));}
if(p>=2){o.push('<ellipse cx="360" cy="140" rx="40" ry="22" fill="#fde8e8" stroke="#C0272D" stroke-width="1.5"/>');o.push(T(360,144,'blood capillary','#C0272D',8,'middle',false));}
if(p>=3){o.push(T(240,250,'Thin walls, large SA, moist, rich blood supply','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Breathing in and out (ventilation)','#2E7D32',12,'middle',true));
o.push(R(10,44,222,196,'#F1F8F1','#2E7D32',2));o.push(T(121,64,'INHALE','#2E7D32',12,'middle',true));
o.push(R(248,44,222,196,'#e8f5e9','#2E7D32',2));o.push(T(359,64,'EXHALE','#C0272D',12,'middle',true));
var inh=['Diaphragm contracts (flattens)','External intercostals contract','Thorax volume increases','Pressure decreases','Air flows in'];
var exh=['Diaphragm relaxes (domes up)','Intercostals relax','Thorax volume decreases','Pressure increases','Air flows out'];
inh.forEach(function(v,i){if(i<p+1)o.push(T(121,86+i*28,v,'#333',8,'middle',false));});
exh.forEach(function(v,i){if(i<p+1)o.push(T(359,86+i*28,v,'#333',8,'middle',false));});
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ5(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Gas exchange summary','#2E7D32',13,'middle',true));
[['Inhale','diaphragm flattens, thorax volume up, pressure down'],['Exhale','diaphragm domes, thorax volume down, pressure up'],['Alveoli','large SA, thin wall, moist, good blood supply'],['Gas exchange','O\u2082 in, CO\u2082 out; by diffusion'],['Tidal volume','volume of air per breath (~500 cm\u00b3)'],['Vital capacity','maximum air that can be breathed in/out']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(120,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Gas Exchange',ti:'Respiratory System',su:'Name and describe the organs of the respiratory system.',steps:[
  {lb:'Organs',dr:dQ1,ht:'<p>Nose/mouth \u2192 trachea \u2192 bronchi \u2192 bronchioles \u2192 alveoli. The lungs contain millions of alveoli \u2014 the site of gas exchange. The diaphragm and intercostal muscles drive ventilation.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Gas exchange occurs in the: 1=trachea, 2=bronchi, 3=alveoli.',a:3,w:'Alveoli are the site of gas exchange. Answer: 3.'},{q:'The diaphragm and intercostal muscles are involved in: 1=gas exchange, 2=ventilation (breathing).',a:2,w:'Diaphragm + intercostals control breathing movements. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Alveoli: gas exchange. Diaphragm: ventilation.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Gas Exchange',ti:'Alveoli Adaptations',su:'Explain how alveoli are adapted for efficient gas exchange.',steps:[
  {lb:'Alveolar adaptations',dr:dQ2,ht:'<p>Alveoli are adapted for fast gas exchange: <b>huge surface area</b> (millions of alveoli), <b>one cell thick wall</b> (short diffusion distance), <b>moist lining</b> (gases dissolve), <b>rich capillary network</b> (maintains concentration gradient).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Alveoli walls are one cell thick to: 1=slow diffusion, 2=decrease diffusion distance (faster exchange).',a:2,w:'Thin wall = shorter diffusion distance = faster. Answer: 2.'},{q:'O\u2082 moves from alveoli into blood by: 1=active transport, 2=diffusion.',a:2,w:'O\u2082 diffuses from high (alveoli) to low (blood) concentration. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Alveoli: thin, large SA, moist, good blood supply'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Gas Exchange',ti:'Composition of Inhaled vs Exhaled Air',su:'Compare the composition of inhaled and exhaled air.',steps:[
  {lb:'Composition',dr:dQ3,ht:'<p>Inhaled: O\u2082 ~21%, CO\u2082 ~0.04%, N\u2082 ~78%, water vapour (variable).<br>Exhaled: O\u2082 ~16%, CO\u2082 ~4%, N\u2082 ~78%, water vapour (more, saturated).</p><p>Key change: more CO\u2082, less O\u2082, more water vapour in exhaled air.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Exhaled air compared to inhaled air has: 1=more O\u2082, 2=more CO\u2082.',a:2,w:'CO\u2082 increases from ~0.04% to ~4% in exhaled air. Answer: 2.'},{q:'% of N\u2082 in inhaled vs exhaled air: 1=changes significantly, 2=stays about the same.',a:2,w:'N\u2082 is not used or produced; stays ~78%. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Exhaled: less O\u2082, more CO\u2082, more water vapour'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Gas Exchange',ti:'Ventilation Mechanism',su:'Describe how breathing movements are produced.',steps:[
  {lb:'Breathing in (inhalation)',dr:dQ4,ht:'<p><b>Inhalation:</b> diaphragm contracts (flattens) + external intercostals contract \u2192 thorax volume increases \u2192 pressure drops \u2192 air flows in.</p>'},
  {lb:'Breathing out (exhalation)',dr:dQ4,ht:'<p><b>Exhalation:</b> diaphragm relaxes (domes up) + intercostals relax \u2192 thorax volume decreases \u2192 pressure increases \u2192 air flows out.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'During inhalation, the diaphragm: 1=domes up (relaxes), 2=flattens (contracts).',a:2,w:'Diaphragm contracts = flattens = increases thorax volume. Answer: 2.'},{q:'When thorax volume increases, pressure: 1=increases, 2=decreases.',a:2,w:'More volume = less pressure = air flows in. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Inhale: diaphragm flat, volume up, pressure down. Exhale: reverse.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Gas Exchange',ti:'Gas Exchange in Plants',su:'Describe how CO\u2082 and O\u2082 move in and out of leaves.',steps:[
  {lb:'Plant gas exchange',dr:dQ5,ht:'<p>During photosynthesis (daytime): CO\u2082 enters stomata, O\u2082 leaves. During respiration (always): O\u2082 enters, CO\u2082 leaves. At night (no PS): net CO\u2082 release. Air spaces in spongy mesophyll facilitate diffusion.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'During the day (bright light), a plant takes in: 1=O\u2082, 2=CO\u2082 for photosynthesis.',a:2,w:'Photosynthesis: CO\u2082 enters for use. Answer: 2.'},{q:'At night, a plant releases: 1=O\u2082 by photosynthesis, 2=CO\u2082 by respiration.',a:2,w:'No PS at night; only respiration \u2192 CO\u2082 released. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['PS: take in CO\u2082. Respiration: release CO\u2082.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Gas Exchange',ti:'Gas Exchange in Fish',su:'Describe how gills are adapted for gas exchange.',steps:[
  {lb:'Gills',dr:dQ6,ht:'<p>Fish have <b>gills</b> for gas exchange. Gills: lots of gill lamellae (large SA), thin walls, good blood supply. Water flows over gills in opposite direction to blood (<b>countercurrent system</b>) \u2014 maximises O\u2082 diffusion along entire length.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'The countercurrent system in fish gills ensures: 1=water and blood always flow in the same direction, 2=maximum O\u2082 diffusion along the entire gill length.',a:2,w:'Countercurrent = maximum O\u2082 uptake. Answer: 2.'},{q:'Fish gills are adapted by having: 1=thick walls, 2=large surface area (gill lamellae).',a:2,w:'Large SA from gill lamellae. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Countercurrent: maximises diffusion. Gill lamellae: large SA.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Gas Exchange',ti:'Smoking and the Lungs',su:'Explain the effects of smoking on the respiratory system.',steps:[
  {lb:'Effects of smoking',dr:dQ7,ht:'<p>Tobacco smoke: nicotine (addictive), tar (carcinogen, coats cilia), CO (reduces O\u2082 transport). Effects: cilia paralysed (mucus not cleared, infection), emphysema (alveoli walls break down, reduced SA), lung cancer, chronic bronchitis.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Tar in cigarettes paralyses cilia, leading to: 1=faster gas exchange, 2=build-up of mucus and infection.',a:2,w:'Cilia paralysed \u2192 mucus not cleared \u2192 infection risk. Answer: 2.'},{q:'Emphysema is caused by: 1=alveoli walls breaking down (reduced SA), 2=blood vessel thickening.',a:1,w:'Emphysema: alveoli walls break \u2192 fewer, larger spaces \u2192 less SA. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Smoking: tar=cilia, emphysema=alveoli walls, CO=O2 transport'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Gas Exchange',ti:'Lung Volumes',su:'Define tidal volume, vital capacity and residual volume.',steps:[
  {lb:'Lung volumes',dr:dQ8,ht:'<p><b>Tidal volume:</b> air breathed in and out at rest (~500 cm\u00b3). <b>Vital capacity:</b> maximum air breathed in and out in one breath (~5000 cm\u00b3). <b>Residual volume:</b> air always remaining in lungs (cannot be fully expelled). Spirometer measures lung volumes.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var TV=rnd(400,600),RR=rnd(12,18),vent=TV*RR;return{question:'Tidal volume = <b>'+TV+' cm\u00b3</b>, breathing rate = <b>'+RR+'/min</b>. Find ventilation rate.',hints:['Ventilation rate = TV \u00d7 breathing rate'],ans:vent,tol:50,unit:'cm\u00b3/min',working:'Ventilation = '+TV+'\u00d7'+RR+' = '+vent+' cm\u00b3/min'};})},
