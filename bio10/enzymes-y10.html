<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Enzyme = biological catalyst (protein)','#2E7D32',12,'middle',true));
o.push(R(80,44,320,60,'#F1F8F1','#2E7D32',2));o.push(T(240,66,'Lock and Key Model','#2E7D32',14,'middle',true));o.push(T(240,84,'Active site shape is complementary to substrate','#555',9,'middle',false));
if(p>=1){o.push(R(60,122,100,80,'#a5d6a7','#2E7D32',2));o.push(T(110,118,'Enzyme','#2E7D32',9,'middle',false));
o.push(R(82,138,56,46,'#fff','#C0272D',2));o.push(T(110,188,'active site','#C0272D',8,'middle',false));}
if(p>=2){o.push(R(200,130,60,50,'#ffcc80','#E65100',2));o.push(T(230,118,'substrate','#E65100',9,'middle',false));o.push(arw(190,156,195,162,'#333',1.5));}
if(p>=3){o.push(R(340,130,60,50,'#c8e6c9','#2E7D32',2));o.push(R(362,138,56,46,'#a5d6a7','#2E7D32',1));o.push(arw(290,156,336,162,'#2E7D32',1.5));o.push(T(370,118,'products','#2E7D32',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Effect of temperature on enzyme rate','#2E7D32',12,'middle',true));
o.push(L(48,232,48,22,'#333',2));o.push(L(48,232,452,232,'#333',2));
o.push(T(254,250,'Temperature (\u00b0C)','#333',9,'middle',false));o.push(T(25,130,'Rate','#333',9,'middle',false));
for(var t=0;t<80;t++){var r1=t*0.9*(1-Math.exp(-t/15)),r2=(t+1)*0.9*(1-Math.exp(-(t+1)/15));o.push(L(48+t*4.8,232-r1*2.6,48+(t+1)*4.8,232-r2*2.6,'#2E7D32',2.5));}
if(p>=1){o.push(L(278,232,278,22,'#C0272D',1.5,'5,3'));o.push(T(286,50,'Optimum\n~37\u00b0C','#C0272D',8,'start',false));}
if(p>=2){o.push(T(240,248,'Above optimum: enzyme DENATURES (active site changes shape)','#C0272D',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Effect of pH on enzyme rate','#2E7D32',12,'middle',true));
o.push(L(48,232,48,22,'#333',2));o.push(L(48,232,452,232,'#333',2));o.push(T(254,250,'pH','#333',9,'middle',false));
for(var ph=0;ph<80;ph++){var r1=160*Math.exp(-0.5*Math.pow((ph-40)/12,2)),r2=160*Math.exp(-0.5*Math.pow(((ph+1)-40)/12,2));o.push(L(48+ph*4.8,232-r1,48+(ph+1)*4.8,232-r2,'#2E7D32',2.5));}
if(p>=1){o.push(L(238,232,238,42,'#C0272D',1.5,'5,3'));o.push(T(246,40,'Optimum pH','#C0272D',8,'start',false));}
if(p>=2){o.push(T(240,248,'Away from optimum: fewer ES complexes; denaturation at extremes','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Effect of substrate concentration','#2E7D32',12,'middle',true));
o.push(L(48,232,48,22,'#333',2));o.push(L(48,232,452,232,'#333',2));
o.push(T(254,250,'[substrate]','#333',9,'middle',false));o.push(T(25,130,'Rate','#333',9,'middle',false));
for(var c=0;c<90;c++){var r1=140*(1-Math.exp(-c/18)),r2=140*(1-Math.exp(-(c+1)/18));o.push(L(48+c*4.4,232-r1,48+(c+1)*4.4,232-r2,'#2E7D32',2.5));}
if(p>=1){o.push(L(48,72,452,72,'#E65100',1.5,'5,3'));o.push(T(400,62,'V\u2098\u2090\u2093 (max rate)','#E65100',9,'end',false));}
if(p>=2){o.push(T(240,248,'At high [S]: all active sites occupied (enzyme is saturated)','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ5(p){dQ1(p);}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Enzymes summary','#2E7D32',13,'middle',true));
[['Enzyme','protein, biological catalyst, not consumed'],['Active site','specific shape; complementary to substrate'],['Optimum T','~37\u00b0C (human); higher \u2192 denature'],['Optimum pH','varies: pepsin pH 2, salivary amylase pH 7'],['Denaturation','irreversible shape change; no longer active'],['Saturation','all active sites full; adding more S has no effect']].forEach(function(r,i){if(i<p+1){o.push(R(10,40+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(110,57+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,57+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Enzymes',ti:'Enzyme Structure',su:'Describe the lock and key model. Explain specificity.',steps:[
  {lb:'Enzymes as catalysts',dr:dQ1,ht:'<p>Enzymes are <b>biological catalysts</b> \u2014 they speed up reactions without being used up. They are proteins with a specific <b>active site</b> that binds the substrate. One enzyme can only catalyse one type of reaction (specificity).</p>'},
  {lb:'Lock and key model',dr:dQ1,ht:'<p>The substrate fits exactly into the active site (like a key into a lock). An enzyme-substrate complex forms. Products are released. The enzyme is unchanged and can act again.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Enzymes are made of: 1=lipids, 2=proteins, 3=carbohydrates.',a:2,w:'Enzymes are proteins. Answer: 2.'},{q:'The region of an enzyme that binds the substrate is the: 1=active site, 2=binding site, 3=template.',a:1,w:'Active site. Answer: 1.'},{q:'After the reaction, the enzyme active site: 1=is destroyed, 2=is unchanged and can be reused.',a:2,w:'Enzyme is a catalyst \u2014 unchanged, can be reused. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Enzymes are proteins; active site is specific to one substrate'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Enzymes',ti:'Temperature and Enzyme Rate',su:'Explain how temperature affects enzyme activity. Define denaturation.',steps:[
  {lb:'Effect of temperature',dr:dQ2,ht:'<p>As temperature rises: more kinetic energy \u2192 more enzyme-substrate collisions \u2192 faster rate. Above the optimum temperature: the enzyme <b>denatures</b> (shape of active site changes permanently) \u2192 rate falls to zero.</p>'},
  {lb:'Denaturation',dr:dQ2,ht:'<p>At high temperature (or extreme pH), hydrogen bonds in the protein break \u2192 3D shape changes \u2192 active site no longer fits substrate. This is <b>irreversible</b>.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Human enzymes work best at ~37\u00b0C. What happens above this? 1=rate increases further, 2=enzyme denatures.',a:2,w:'Above optimum T, enzyme denatures \u2192 rate falls. Answer: 2.'},{q:'Denaturation is: 1=reversible, 2=irreversible.',a:2,w:'Denaturation is irreversible (bonds broken). Answer: 2.'},{q:'Which has a higher optimum temperature: human amylase, or a deep-sea hot-spring bacterium enzyme?',a:2,w:'Hot-spring enzyme adapted to much higher temperature. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+(qq.a===2&&qq.q.includes('higher')?' 1=human amylase, 2=hot-spring enzyme.':''),hints:['Optimum T: fastest rate. Above it: denaturation.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Enzymes',ti:'pH and Enzyme Rate',su:'Explain how pH affects enzyme activity. Give examples.',steps:[
  {lb:'Effect of pH',dr:dQ3,ht:'<p>Each enzyme has an optimum pH. Away from optimum: ionic attractions in protein change \u2192 shape distorted \u2192 fewer ES complexes \u2192 slower rate. Extreme pH denatures the enzyme.</p>'},
  {lb:'Examples',dr:dQ3,ht:'<p>Pepsin (stomach protease): optimum pH 2 (acidic). Salivary amylase: optimum pH 7 (neutral). Trypsin (small intestine): optimum pH 8 (slightly alkaline).</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Pepsin works best at pH 2. It is active in the: 1=stomach, 2=small intestine, 3=mouth.',a:1,w:'pH 2 = acid = stomach. Answer: 1.'},{q:'Salivary amylase (pH 7 optimum) is most active in the: 1=stomach, 2=mouth, 3=blood.',a:2,w:'pH 7 = neutral = mouth. Answer: 2.'},{q:'Extreme pH causes enzyme denaturation: 1=true, 2=false.',a:1,w:'True \u2014 extreme pH changes enzyme shape permanently. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Match optimum pH to location in body'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Enzymes',ti:'Substrate Concentration',su:'Explain the effect of substrate concentration on enzyme rate.',steps:[
  {lb:'Substrate concentration',dr:dQ4,ht:'<p>Increasing substrate concentration increases rate (more ES complexes formed per second). But above a certain point, all active sites are occupied (<b>saturation</b>) \u2192 rate cannot increase further even if more substrate is added.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'At low substrate concentration, increasing [S] causes rate to: 1=increase, 2=decrease, 3=stay same.',a:1,w:'More substrate = more ES complexes = faster. Answer: 1.'},{q:'When enzyme is saturated: 1=all active sites are occupied, 2=enzyme denatures.',a:1,w:'Saturation = all active sites full; adding more S has no effect. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['More substrate = faster until saturation; then limited by enzyme amount'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Enzymes',ti:'Induced Fit Model',su:'Describe the induced fit model as a development of lock and key.',steps:[
  {lb:'Induced fit',dr:dQ5,ht:'<p>The <b>induced fit model</b> is an update of lock and key. The active site is flexible and changes shape slightly when the substrate binds, improving the fit. This is more accurate \u2014 explains why active sites aren\u2019t perfectly rigid.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'In the induced fit model, the active site: 1=changes shape slightly to fit the substrate, 2=is rigid and unchanging.',a:1,w:'Active site is flexible \u2014 changes shape slightly on substrate binding. Answer: 1.'},{q:'The induced fit model is: 1=older than lock and key, 2=a more up-to-date model than lock and key.',a:2,w:'Induced fit is a more modern, more accurate model. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Induced fit: flexible active site, shape changes slightly on binding'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Enzymes',ti:'Enzyme Inhibitors',su:'Describe competitive and non-competitive inhibitors.',steps:[
  {lb:'Inhibitors',dr:dQ6,ht:'<p><b>Competitive inhibitor:</b> similar shape to substrate; binds to active site; blocks substrate entry. Effect reduced by increasing substrate concentration.<br><b>Non-competitive inhibitor:</b> binds to another part of enzyme (allosteric site); changes shape of active site. Cannot be overcome by more substrate.</p>'},
