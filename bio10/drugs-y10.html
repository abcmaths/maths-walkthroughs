<style>
:root{--red:#2E7D32;--dark:#1b5e20;--cream:#F1F8F1;--ink:#0d1b2a;--line:#C8E6C9;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#F1F8F1);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#F1F8F1';stroke=stroke||'#2E7D32';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#2E7D32')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#2E7D32')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#F1F8F1')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Types of drugs','#2E7D32',13,'middle',true));
[['Medicinal','treat disease; e.g. antibiotics, statins, aspirin'],['Recreational','taken for pleasure; e.g. alcohol, nicotine, cannabis'],['Performance-enhancing','improve athletic performance; e.g. anabolic steroids'],['Stimulants','increase brain activity; e.g. caffeine, cocaine, ecstasy'],['Depressants','slow CNS activity; e.g. alcohol, sedatives, heroin']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*38,460,30,'#F1F8F1','#C8E6C9',1));o.push(T(120,60+i*38,r[0],'#2E7D32',10,'middle',true));o.push(T(350,60+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Alcohol and its effects','#2E7D32',13,'middle',true));
[['CNS depressant','slows reaction time; impairs judgement'],['Short-term effects','impaired coordination, slurred speech, nausea'],['Long-term effects','liver disease (cirrhosis), brain damage, addiction'],['Blood alcohol','measured in mg/100 mL; legal driving limit UK: 80 mg']].forEach(function(r,i){if(i<p+1){o.push(R(10,46+i*46,460,38,'#F1F8F1','#C8E6C9',1));o.push(T(130,68+i*46,r[0],'#2E7D32',10,'middle',true));o.push(T(360,68+i*46,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Addiction and tolerance','#2E7D32',12,'middle',true));
o.push(R(10,44,460,56,'#F1F8F1','#2E7D32',1.5));o.push(T(240,64,'Tolerance: need increasing doses to get same effect','#2E7D32',11,'middle',false));o.push(T(240,82,'Addiction: physical/psychological dependence on drug','#555',9,'middle',false));
if(p>=1){o.push(R(10,114,460,56,'#fde8e8','#C0272D',1.5));o.push(T(240,134,'Withdrawal symptoms: unpleasant effects when drug stopped','#C0272D',10,'middle',false));o.push(T(240,152,'e.g. shaking, sweating, anxiety, cravings','#555',9,'middle',false));}
if(p>=2){o.push(T(240,196,'Drugs can be legal (caffeine, alcohol) or illegal (heroin, cocaine)','#333',10,'middle',false));o.push(T(240,216,'Gateway hypothesis: some drugs may lead to harder drugs','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ5(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Drugs summary','#2E7D32',13,'middle',true));
[['Stimulants','increase CNS activity; e.g. caffeine, cocaine'],['Depressants','slow CNS; e.g. alcohol, heroin, sedatives'],['Alcohol','depressant; liver disease, addiction'],['Nicotine','addictive; in tobacco; stimulant'],['Antibiotics','kill bacteria; not viruses; resistance risk'],['Statins','lower blood cholesterol; reduce CHD risk']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#F1F8F1','#C8E6C9',1));o.push(T(110,55+i*33,r[0],'#2E7D32',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Biology \u2022 Drugs',ti:'Types of Drugs',su:'Classify drugs as medicinal, recreational or performance-enhancing.',steps:[
  {lb:'Drug categories',dr:dQ1,ht:'<p>Drugs are substances that affect body chemistry. Medicinal: treat/prevent disease. Recreational: affect mood/perception. Performance-enhancing: improve sport. Stimulants speed up CNS; depressants slow CNS.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Alcohol is a: 1=stimulant, 2=depressant, 3=performance enhancer.',a:2,w:'Alcohol is a CNS depressant. Answer: 2.'},{q:'Caffeine is a: 1=stimulant, 2=depressant, 3=hallucinogen.',a:1,w:'Caffeine is a stimulant (increases CNS activity). Answer: 1.'},{q:'Antibiotics are: 1=medicinal drugs, 2=recreational drugs.',a:1,w:'Antibiotics treat bacterial infection (medicinal). Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Stimulant: speeds up CNS. Depressant: slows CNS.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y10 Biology \u2022 Drugs',ti:'Alcohol',su:'Describe the short-term and long-term effects of alcohol.',steps:[
  {lb:'Alcohol effects',dr:dQ2,ht:'<p>Short-term: impaired coordination, slowed reactions, impaired judgement, slurred speech, blurred vision. Long-term: liver damage (cirrhosis), brain damage, addiction, cardiovascular disease.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Alcohol impairs reaction time because it is a: 1=stimulant, 2=depressant.',a:2,w:'Alcohol slows CNS = slower reactions. Answer: 2.'},{q:'Long-term heavy alcohol use damages the: 1=liver, 2=lungs.',a:1,w:'Liver disease (cirrhosis) is a long-term effect. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Alcohol: depressant, slows reactions, liver damage long-term'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y10 Biology \u2022 Drugs',ti:'Tobacco and Nicotine',su:'Describe the effects of smoking on health.',steps:[
  {lb:'Nicotine',dr:dQ3,ht:'<p>Nicotine: stimulant in tobacco; highly addictive. Tar: coats airway cilia, causes cancer. CO: combines with haemoglobin, reduces O\u2082 transport. Effects: lung cancer, COPD/emphysema, cardiovascular disease, addiction.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Nicotine is: 1=an addictive stimulant, 2=a carcinogen that causes cancer.',a:1,w:'Nicotine is the addictive stimulant in tobacco. Tar causes cancer. Answer: 1.'},{q:'Carbon monoxide in tobacco smoke: 1=increases O\u2082 transport, 2=reduces O\u2082 transport in blood.',a:2,w:'CO binds haemoglobin, reducing O\u2082 carried. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Nicotine: addictive stimulant. CO: reduces O\u2082. Tar: cancer.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y10 Biology \u2022 Drugs',ti:'Drug Addiction and Tolerance',su:'Define tolerance and addiction. Explain withdrawal symptoms.',steps:[
  {lb:'Tolerance and addiction',dr:dQ4,ht:'<p><b>Tolerance:</b> body adapts, more drug needed for same effect. <b>Addiction:</b> physical or psychological dependence. <b>Withdrawal:</b> unpleasant symptoms when drug is stopped (shaking, sweating, cravings).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Tolerance means: 1=the drug has no effect, 2=increasing doses needed for same effect.',a:2,w:'Tolerance = need more drug for same effect. Answer: 2.'},{q:'Withdrawal symptoms occur when: 1=too much drug is taken, 2=an addictive drug is stopped.',a:2,w:'Withdrawal: symptoms when addictive drug is stopped. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Tolerance: more needed. Withdrawal: symptoms on stopping.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y10 Biology \u2022 Drugs',ti:'Performance-Enhancing Drugs',su:'Evaluate the use of performance-enhancing drugs in sport.',steps:[
  {lb:'Performance-enhancing drugs',dr:dQ5,ht:'<p>Anabolic steroids: increase muscle growth; side effects: liver damage, heart disease, aggression, masculinisation. EPO (erythropoietin): increases RBC production; increases O\u2082 delivery; banned. Beta-blockers: reduce heart rate; used in archery/shooting; banned.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Anabolic steroids increase: 1=red blood cells, 2=muscle mass.',a:2,w:'Anabolic steroids promote muscle growth. Answer: 2.'},{q:'EPO is banned in sport because it: 1=reduces performance, 2=artificially increases O\u2082 delivery.',a:2,w:'EPO increases RBCs \u2192 more O\u2082 \u2192 unfair advantage. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Anabolic steroids: muscle. EPO: RBCs, O\u2082 delivery.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y10 Biology \u2022 Drugs',ti:'Cannabis and Other Recreational Drugs',su:'Describe the effects of cannabis on the body and brain.',steps:[
  {lb:'Cannabis',dr:dQ6,ht:'<p>Cannabis: contains THC (tetrahydrocannabinol). Short-term: relaxation, altered perception, impaired short-term memory. Long-term: mental health issues (psychosis, schizophrenia link), respiratory damage if smoked, addiction (psychological). Classified as a controlled substance.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Cannabis contains the active compound: 1=nicotine, 2=THC.',a:2,w:'THC (tetrahydrocannabinol) is the active component of cannabis. Answer: 2.'},{q:'Long-term cannabis use has been linked to: 1=improved memory, 2=mental health issues.',a:2,w:'Cannabis linked to psychosis and mental health problems. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Cannabis: THC, mental health risks, addiction'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Biology \u2022 Drugs',ti:'Antibiotic Resistance',su:'Explain how antibiotic resistance develops and why it is a problem.',steps:[
  {lb:'Antibiotic resistance',dr:dQ7,ht:'<p>Bacteria can mutate and become resistant to antibiotics. If antibiotics are overused or misused, resistant bacteria survive and reproduce \u2014 natural selection. MRSA (methicillin-resistant Staphylococcus aureus) is a well-known example.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Antibiotic resistance develops by: 1=natural selection of resistant bacteria, 2=bacteria deliberately changing.',a:1,w:'Resistant bacteria survive antibiotics and reproduce. Answer: 1.'},{q:'To slow antibiotic resistance, antibiotics should: 1=be used as often as possible, 2=only be used when necessary and full courses completed.',a:2,w:'Responsible use reduces selection pressure. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Resistance: natural selection. Slow it: use responsibly.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Biology \u2022 Drugs',ti:'Statins',su:'Describe how statins reduce the risk of cardiovascular disease.',steps:[
  {lb:'Statins',dr:dQ8,ht:'<p>Statins are drugs that lower blood cholesterol levels by inhibiting the enzyme that produces cholesterol in the liver. Lower cholesterol \u2192 less atherosclerosis (plaque buildup in arteries) \u2192 reduced risk of heart attack and stroke.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'Statins work by: 1=increasing blood cholesterol, 2=lowering blood cholesterol.',a:2,w:'Statins lower cholesterol by inhibiting its synthesis. Answer: 2.'},{q:'Lower cholesterol reduces the risk of: 1=atherosclerosis and heart attack, 2=lung cancer.',a:1,w:'Less cholesterol = less plaque = reduced CVD risk. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Statins: lower cholesterol, reduce CVD risk'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y10 Biology \u2022 Drugs',ti:'Drug Testing and Development',su:'Describe the stages of drug development and clinical trials.',steps:[
  {lb:'Drug testing stages',dr:dQ9,ht:'<p>1. Preclinical: computer models, cell cultures, animals. 2. Phase 1: small number of healthy volunteers (safety, dose). 3. Phase 2: small patient group (effectiveness, side effects). 4. Phase 3: large randomised double-blind controlled trial. 5. Monitoring after approval.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var qs=[{q:'A placebo in a drug trial is: 1=the real drug, 2=an inactive substance given to the control group.',a:2,w:'Placebo = inactive dummy; controls for psychological effects. Answer: 2.'},{q:'Why is a double-blind trial conducted? 1=so no one knows who gets the drug, reducing bias, 2=to make trials cheaper.',a:1,w:'Double-blind: neither patient nor doctor knows \u2192 removes bias. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Placebo: inactive. Double-blind: removes bias.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
