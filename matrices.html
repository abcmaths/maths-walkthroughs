<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Matrices - Year 12 WAEC</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Matrices - Year 12 WAEC</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function tryIt(o){var id='t'+Math.random().toString(36).slice(2);ST[id]=o;var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');return '<div class="try"><div class="try-t">Your Turn</div><p>'+o.question+'</p><ul class="hl">'+h+'</ul><div class="ar"><input type="number" step="any" placeholder="Answer ('+o.unit+')" id="'+id+'_i"/><button class="ck" onclick="ck(\''+id+'\')">Check</button></div><div class="fb" id="'+id+'_f"></div><details class="wk"><summary>Show full working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
function ck(id){var o=ST[id],v=parseFloat(document.getElementById(id+'_i').value),f=document.getElementById(id+'_f');if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}if(Math.abs(v-o.ans)<=(o.exact||0.05)){f.className='fb ok';f.textContent='Correct! Answer: '+o.ans+' '+o.unit;}else{f.className='fb er';f.textContent='Not quite - check your working and try again.';}}
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function bkt(o,mx,my,M,label,col,show){
  o.push(T(mx+50,my-14,label,col,13,'middle',true));
  o.push(L(mx,my,mx,my+80,col,2.5));o.push(L(mx+100,my,mx+100,my+80,col,2.5));
  o.push(L(mx,my,mx+8,my,col,2));o.push(L(mx,my+80,mx+8,my+80,col,2));
  o.push(L(mx+100,my,mx+92,my,col,2));o.push(L(mx+100,my+80,mx+92,my+80,col,2));
  if(show){M.forEach(function(row,r){row.forEach(function(v,c){o.push(T(mx+25+c*50,my+25+r*38,v,col,18));});});}
}

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var A=[[2,-1],[3,4]],B=[[5,2],[-1,3]];
  bkt(o,20,60,A,'A','#C0272D',true);
  o.push(T(138,100,'+','#888',22));
  bkt(o,155,60,B,'B','#1a5a8a',true);
  if(p>=1){
    o.push(T(272,100,'=','#888',22));
    var C=[[7,1],[2,7]];
    bkt(o,288,60,C,'A+B','#1a7a3a',p>=2);
    if(p<2)o.push(T(338,100,'?','#aaa',22));
  }
  if(p>=2)o.push(T(240,180,'Add corresponding elements in each position','#888',12,'middle',true));
  if(p>=3){o.push(T(60,210,'Scalar 3A =','#241A17',13,'start'));bkt(o,200,196,[[6,-3],[9,12]],'3A','#C8922A',true);}
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var A=[[1,2],[3,4]],B=[[2,0],[1,3]];
  o.push(T(240,18,'Matrix multiplication: A x B','#C0272D',14,'middle',true));
  function bkt2(mx,my,M,label,col){
    o.push(T(mx+44,my-14,label,col,12,'middle',true));
    o.push(L(mx,my,mx,my+74,col,2.5));o.push(L(mx+88,my,mx+88,my+74,col,2.5));
    o.push(L(mx,my,mx+8,my,col,2));o.push(L(mx,my+74,mx+8,my+74,col,2));
    o.push(L(mx+88,my,mx+80,my,col,2));o.push(L(mx+88,my+74,mx+80,my+74,col,2));
    M.forEach(function(row,r){row.forEach(function(v,c){o.push(T(mx+22+c*44,my+20+r*36,v,col,17));});});
  }
  bkt2(22,50,A,'A','#C0272D');o.push(T(126,88,'x','#888',20));bkt2(140,50,B,'B','#1a5a8a');o.push(T(246,88,'=','#888',20));
  var Cshow=[[p>=3?4:'?',p>=4?6:'?'],[p>=3?10:'?',p>=4?12:'?']];
  if(p>=1)bkt2(262,50,Cshow,'AB','#1a7a3a');
  if(p>=2){o.push(R(22,148,436,36,'#fff5f0','#C0272D',1.5));o.push(T(240,171,'Row 1 x Col 1: (1x2)+(2x1) = 2+2 = 4','#C0272D',12,'middle',true));}
  if(p>=3){o.push(R(22,192,436,36,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,215,'Row 1 x Col 2: (1x0)+(2x3) = 0+6 = 6','#1a5a8a',12,'middle',true));}
  if(p>=4){o.push(R(22,236,436,52,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,254,'Row 2 x Col 1: (3x2)+(4x1) = 10','#1a7a3a',12,'middle',true));o.push(T(240,272,'Row 2 x Col 2: (3x0)+(4x3) = 12','#1a7a3a',12,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(T(240,18,'Determinant and inverse of M = [[3,2],[1,4]]','#C0272D',14,'middle',true));
  o.push(L(60,40,60,110,'#C0272D',2.5));o.push(L(180,40,180,110,'#C0272D',2.5));
  o.push(L(60,40,68,40,'#C0272D',2));o.push(L(60,110,68,110,'#C0272D',2));
  o.push(L(180,40,172,40,'#C0272D',2));o.push(L(180,110,172,110,'#C0272D',2));
  o.push(T(100,72,'3','#C0272D',22));o.push(T(145,72,'2','#C0272D',22));
  o.push(T(100,100,'1','#C0272D',22));o.push(T(145,100,'4','#C0272D',22));
  if(p>=1){o.push(R(210,40,260,44,'#fff5f0','#C0272D',1.5));o.push(T(340,58,'det = ad - bc','#241A17',13,'middle',true));o.push(T(340,76,'= (3x4)-(2x1) = 10','#888',11));}
  if(p>=2){o.push(R(210,96,260,44,'#e8f4ff','#1a5a8a',1.5));o.push(T(340,114,'Swap 3 and 4','#1a5a8a',12,'middle',true));o.push(T(340,130,'Negate 2 and 1','#1a5a8a',12));}
  if(p>=3){
    o.push(T(60,158,'M-inv = (1/10) x','#1a7a3a',13,'start'));
    o.push(L(215,145,215,210,'#1a7a3a',2.5));o.push(L(320,145,320,210,'#1a7a3a',2.5));
    o.push(L(215,145,223,145,'#1a7a3a',2));o.push(L(215,210,223,210,'#1a7a3a',2));
    o.push(L(320,145,312,145,'#1a7a3a',2));o.push(L(320,210,312,210,'#1a7a3a',2));
    o.push(T(248,168,'4','#1a7a3a',18));o.push(T(292,168,'-2','#1a7a3a',18));
    o.push(T(248,196,'-1','#1a7a3a',18));o.push(T(292,196,'3','#1a7a3a',18));
  }
  if(p>=4){o.push(R(30,224,420,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,247,'M x M-inverse = I = [[1,0],[0,1]]  (identity)','#1a7a3a',12,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(T(240,18,'Use the inverse to solve: [[3,2],[1,4]] x [[x],[y]] = [[8],[7]]','#C0272D',12,'middle',true));
  if(p>=1){o.push(R(30,38,420,44,'#fff5f0','#C0272D',1.5));o.push(T(240,56,'Step 1: find M-inverse','#241A17',13,'middle',true));o.push(T(240,72,'det = 10, M-inv = (1/10)[[4,-2],[-1,3]]','#888',11));}
  if(p>=2){
    o.push(R(30,94,420,44,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,112,'Step 2: multiply both sides by M-inverse on left','#1a5a8a',12,'middle',true));
    o.push(T(240,128,'[[x],[y]] = M-inv x [[8],[7]]','#241A17',11));
  }
  if(p>=3){
    o.push(R(30,150,420,44,'#fff5f0','#C0272D',1.5));
    o.push(T(240,168,'x = (1/10)(4x8 + (-2)x7) = (1/10)(32-14) = 18/10','#C0272D',12,'middle',true));
    o.push(T(240,184,'y = (1/10)((-1)x8 + 3x7) = (1/10)(-8+21) = 13/10','#888',11));
  }
  if(p>=4){
    o.push(R(100,206,280,52,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,226,'x = 1.8','#1a7a3a',16,'middle',true));
    o.push(T(240,248,'y = 1.3','#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 - Matrices',ti:'Addition and Scalar Multiplication',su:'Add two 2x2 matrices and multiply by a scalar.',steps:[
    {lb:'What is a matrix?',dr:dQ1,ht:'<p>A <b>2x2 matrix</b> is a grid of 4 numbers in 2 rows and 2 columns. To <b>add matrices</b>, add the element in each matching position.</p>'},
    {lb:'Step 1 - Add A + B',dr:dQ1,ht:'<div class="fm">Top-left: 2+5=7  Top-right: -1+2=1</div><div class="fm">Bottom-left: 3+(-1)=2  Bottom-right: 4+3=7</div>'},
    {lb:'Step 2 - Result',dr:dQ1,ht:'<div class="fm">A + B = [[7, 1], [2, 7]]</div>'},
    {lb:'Step 3 - Scalar multiplication',dr:dQ1,ht:'<p>Multiply <b>every element</b> by the scalar number:</p><div class="fm">3A = [[6, -3], [9, 12]]</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt({question:'Matrix C = [[4,1],[2,3]]. Find the top-right element of <b>2C</b>.',hints:['Multiply every element by 2','Top-right of C is 1'],ans:2,exact:0.1,unit:'(top-right)',working:'2C=[[8,2],[4,6]]. Top-right = <b>2</b>'})}
  ]},
  {ey:'Q2 - Matrices',ti:'Matrix Multiplication',su:'Multiply two 2x2 matrices A x B using the row-by-column rule.',steps:[
    {lb:'The rule',dr:dQ2,ht:'<p>Each element of the result = <b>row of A</b> multiplied by <b>column of B</b> (multiply pairs, then add). This is the row-by-column rule.</p>'},
    {lb:'Step 1 - Row 1 x Col 1',dr:dQ2,ht:'<div class="fm">(1x2) + (2x1) = 2+2 = <b>4</b> (top-left)</div>'},
    {lb:'Step 2 - Row 1 x Col 2',dr:dQ2,ht:'<div class="fm">(1x0) + (2x3) = 0+6 = <b>6</b> (top-right)</div>'},
    {lb:'Step 3 - Complete AB',dr:dQ2,ht:'<div class="fm">Row 2 x Col 1: (3x2)+(4x1) = <b>10</b></div><div class="fm">Row 2 x Col 2: (3x0)+(4x3) = <b>12</b></div><div class="fm">AB = [[4,6],[10,12]]</div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt({question:'For the result AB = [[4,6],[10,12]], what is the sum of all four elements?',hints:['Add 4+6+10+12'],ans:32,exact:0.1,unit:'',working:'4+6+10+12 = <b>32</b>'})}
  ]},
  {ey:'Q3 - Matrices',ti:'Determinant and Inverse',su:'Find the inverse of M = [[3,2],[1,4]].',steps:[
    {lb:'The formula',dr:dQ3,ht:'<p>For matrix M = [[a,b],[c,d]], the inverse exists only if <b>det(M) = ad - bc</b> is non-zero.</p><div class="fm">M-inverse = (1/det) x [[d,-b],[-c,a]]</div>'},
    {lb:'Step 1 - Determinant',dr:dQ3,ht:'<div class="fm">det = (3x4) - (2x1) = 12-2 = <b>10</b></div>'},
    {lb:'Step 2 - Swap and negate',dr:dQ3,ht:'<p>Swap the diagonal (3 and 4 become 4 and 3). Negate the other two (2 becomes -2, 1 becomes -1).</p>'},
    {lb:'Step 3 - Divide by det',dr:dQ3,ht:'<div class="fm">M-inverse = (1/10) x [[4,-2],[-1,3]]</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt({question:'Find the determinant of N = [[5,3],[2,4]].',hints:['det = ad - bc','a=5, b=3, c=2, d=4'],ans:14,exact:0.1,unit:'',working:'(5x4)-(3x2) = 20-6 = <b>14</b>'})}
  ]},
  {ey:'Q4 - Matrices',ti:'Solving Simultaneous Equations Using Matrices',su:'Solve [[3,2],[1,4]] x [[x],[y]] = [[8],[7]] using the inverse matrix.',steps:[
    {lb:'The method',dr:dQ4,ht:'<p>Any system of two simultaneous equations can be written as <b>Mx = b</b>. Multiply both sides on the left by M-inverse to find x.</p>'},
    {lb:'Step 1 - Find M-inverse',dr:dQ4,ht:'<div class="fm">det=10, M-inv = (1/10)[[4,-2],[-1,3]]</div>'},
    {lb:'Step 2 - Multiply',dr:dQ4,ht:'<p>x = M-inverse x b. Multiply the inverse matrix by the column vector [[8],[7]].</p>'},
    {lb:'Step 3 - Calculate',dr:dQ4,ht:'<div class="fm">x = (1/10)(4x8 + (-2)x7) = 18/10 = 1.8</div><div class="fm">y = (1/10)((-1)x8 + 3x7) = 13/10 = 1.3</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt({question:'Check the solution by substituting x=1.8 and y=1.3 into the first equation 3x + 2y. What do you get?',hints:['3 x 1.8 = 5.4','2 x 1.3 = 2.6','5.4 + 2.6 = ?'],ans:8,exact:0.1,unit:'',working:'3(1.8)+2(1.3) = 5.4+2.6 = <b>8</b> (correct)'})}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
</body>
</html>
