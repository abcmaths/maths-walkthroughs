<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EOY Assessment of Competency &middot; Year 10 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-q{font-size:15px;margin:8px 0 10px;}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin-left:6px;vertical-align:middle;}
.f{background:#1a5a8a;color:#fff;}.e{background:#C0272D;color:#fff;}
.aoc-banner{background:linear-gradient(135deg,#7A1418,#C0272D);color:#fff;padding:12px 20px;border-radius:4px;margin-bottom:16px;font-size:13px;line-height:1.5;max-width:760px;}
.aoc-banner strong{font-size:14px;display:block;margin-bottom:4px;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">EOY Assessment of Competency &mdash; Year 10</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="aoc-banner">
      <strong>End of Year Assessment of Competency</strong>
      20 exam-style questions covering all Year 10 topics. Numbers are randomised — different from your exam paper. Work through each step, then attempt the Your Turn question with fresh values.
    </div>
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
// ── utilities ──────────────────────────────────────────────────────────────
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function gcd(a,b){return b===0?a:gcd(b,a%b);}
function lcm(a,b){return a*b/gcd(a,b);}
function isPrime(n){if(n<2)return false;for(var i=2;i<=Math.sqrt(n);i++)if(n%i===0)return false;return true;}
function primeFactors(n){var f=[];var d=2;while(d*d<=n){while(n%d===0){f.push(d);n=Math.floor(n/d);}d++;}if(n>1)f.push(n);return f;}

// ── tryIt widget ───────────────────────────────────────────────────────────
var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +(h?'<ul class="hl">'+h+'</ul>':'')
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working.';}
  }
});

// ── SVG helpers ────────────────────────────────────────────────────────────
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

// ══════════════════════════════════════════════════════════════════════════
// QUESTION DATA — each question generates fresh random values when called
// ══════════════════════════════════════════════════════════════════════════

// Generate all random values for this page session at load time
var V={};
(function generateValues(){
  // Q1 HCF/Surds
  var hcfPairs=[[36,60],[48,80],[24,56],[60,90],[72,108]];
  var p=pick(hcfPairs);V.q1a=p[0];V.q1b=p[1];
  var g1=gcd(p[0],p[1]);V.q1hcf=g1;
  var surdBases=[12,18,20,27,28,32,45,48,50,72,75,98];
  V.q1surd=pick(surdBases);
  // simplify √n: find largest perfect square factor
  function simpSurd(n){for(var k=Math.floor(Math.sqrt(n));k>=2;k--){if(n%(k*k)===0)return [k,n/(k*k)];}return[1,n];}
  var ss=simpSurd(V.q1surd);V.q1sA=ss[0];V.q1sB=ss[1];

  // Q2 Standard form + indices
  var sfOpts=[[0.000023,2.3,-5],[0.0000047,4.7,-6],[0.000000081,8.1,-8],[0.000056,5.6,-5],[0.000000034,3.4,-8]];
  var sf=pick(sfOpts);V.q2num=sf[0];V.q2a=sf[1];V.q2p=sf[2];
  V.q2b1=rnd(2,6);V.q2b2=rnd(2,5);V.q2b3=rnd(1,4);
  V.q2bans=Math.pow(V.q2b1,V.q2b2-V.q2b3);

  // Q3 Completing the square: x²+bx+c → (x+p)²+q, p=b/2, q=c-p²
  var bOpts=[4,6,8,10,-4,-6];V.q3b=pick(bOpts);
  V.q3c=rnd(-5,10);
  V.q3p=V.q3b/2;V.q3q=V.q3c-V.q3p*V.q3p;

  // Q4 Bar chart: 5 subjects, random frequencies
  var subjects=['Maths','English','Science','History','Art'];
  V.q4freqs=[rnd(20,40),rnd(15,35),rnd(10,30),rnd(8,25),rnd(10,28)];
  V.q4total=V.q4freqs.reduce(function(a,b){return a+b;},0);
  V.q4subj=subjects;
  // science is index 2
  var sg=gcd(V.q4freqs[2],V.q4total);V.q4sciNum=V.q4freqs[2]/sg;V.q4sciDen=V.q4total/sg;
  V.q4diff=V.q4freqs[0]-V.q4freqs[3]; // maths vs history

  // Q5 Percentages
  V.q5orig=rnd(12,25)*10000; // original price
  V.q5pct=pick([10,15,20,25]);
  V.q5sale=V.q5orig*(1-V.q5pct/100);
  V.q5revFinal=pick([360,480,540,600,720]);
  V.q5revPct=pick([20,25,50]);
  V.q5revOrig=V.q5revFinal/(1+V.q5revPct/100);

  // Q6 Algebraic fractions: simplify (x²-a²)/(x+a)
  V.q6a=pick([2,3,4,5,6,7]);
  // combine fractions: 2/(x+a) + 3/(x-b)
  V.q6n1=pick([2,3,4]);V.q6d1=pick([2,3,4]);V.q6n2=pick([2,3,5]);V.q6d2=pick([3,4,5]);
  while(V.q6d1===V.q6d2)V.q6d2=pick([3,4,5]);

  // Q7 Simultaneous equations: ax+by=c, dx+ey=f
  // Generate from solution x,y
  V.q7x=rnd(1,6);V.q7y=rnd(-3,5);
  V.q7a1=rnd(2,5);V.q7b1=rnd(1,3);V.q7c1=V.q7a1*V.q7x+V.q7b1*V.q7y;
  V.q7a2=rnd(1,4);V.q7b2=rnd(1,4);
  while(V.q7a1*V.q7b2===V.q7a2*V.q7b1){V.q7a2=rnd(1,4);}
  V.q7c2=V.q7a2*V.q7x-V.q7b2*V.q7y;// second eq: a2x-b2y=c2

  // Q8 Quadratic: ax²+bx+c=0 that factors
  // pick roots p,q → x²-(p+q)x+pq
  var roots=pick([[2,-6],[3,-4],[1,-5],[2,4],[-1,6],[3,5],[-2,-3],[4,-1]]);
  V.q8r1=roots[0];V.q8r2=roots[1];
  V.q8B=-(V.q8r1+V.q8r2);V.q8C=V.q8r1*V.q8r2;

  // Q9 Direct/indirect proportion
  V.q9x1=pick([2,3,4,5]);V.q9y1=rnd(20,60);
  V.q9k=V.q9y1/(V.q9x1*V.q9x1); // y=kx²
  V.q9x2=rnd(V.q9x1+1,V.q9x1+4);
  V.q9y2=V.q9k*V.q9x2*V.q9x2;
  V.q9workers=pick([6,8,10,12]);V.q9days=pick([12,15,18,20]);
  V.q9w2=pick([9,12,15,16]);
  V.q9d2=V.q9workers*V.q9days/V.q9w2;

  // Q10 Straight line graphs
  V.q10m=pick([2,3,-2,-3,0.5,-0.5]);V.q10c=rnd(-4,5);
  // parallel line through (0,k)
  V.q10pk=rnd(-5,6);
  while(V.q10pk===V.q10c)V.q10pk=rnd(-5,6);

  // Q11 Inequalities: ax-b<cx+d
  V.q11a=rnd(3,6);V.q11b=rnd(2,8);V.q11c=rnd(1,V.q11a-1);V.q11d=rnd(3,12);
  V.q11ans=V.q11b+V.q11d; // x < (b+d)/(a-c)
  V.q11denom=V.q11a-V.q11c;
  V.q11lim=V.q11ans/V.q11denom;
  // bounds
  V.q11meas=(rnd(30,120)/10);
  V.q11lb=V.q11meas-0.05;V.q11ub=V.q11meas+0.05;

  // Q12 Area/perimeter
  V.q12a=rnd(6,12);V.q12b=rnd(V.q12a+2,V.q12a+8);V.q12h=rnd(4,9);
  V.q12trapArea=0.5*(V.q12a+V.q12b)*V.q12h;
  V.q12rw=rnd(8,14);V.q12rh=rnd(4,8);
  V.q12semiPerim=2*V.q12rh+V.q12rw+Math.PI*V.q12rw/2;

  // Q13 Circle mensuration
  V.q13r=rnd(4,10);V.q13theta=pick([45,60,72,90,120,135,150]);
  V.q13arc=V.q13theta/360*2*Math.PI*V.q13r;
  V.q13sector=V.q13theta/360*Math.PI*V.q13r*V.q13r;
  V.q13perim=V.q13arc+2*V.q13r;

  // Q14 Surface area and volume: cuboid l×w×h
  V.q14l=rnd(3,8);V.q14w=rnd(2,6);V.q14h=rnd(2,5);
  V.q14sa=2*(V.q14l*V.q14w+V.q14l*V.q14h+V.q14w*V.q14h);
  V.q14vol=V.q14l*V.q14w*V.q14h;
  V.q14cr=rnd(3,7);V.q14ch=rnd(6,14);
  V.q14csa=2*Math.PI*V.q14cr*(V.q14cr+V.q14ch);

  // Q15 Bearings: bearing from A to B, find back bearing
  V.q15bear=rnd(30,250);
  V.q15back=V.q15bear<180?V.q15bear+180:V.q15bear-180;

  // Q16 Circle theorems
  var ctOpts=[
    {aoc:rnd(80,160),type:'centre'},// angle at centre = 2× circumference
    {opp:rnd(60,110),type:'cyclic'}// opposite angles in cyclic quad
  ];
  V.q16ct=pick(ctOpts);
  if(V.q16ct.type==='centre'){V.q16aoc=V.q16ct.aoc;V.q16abc=V.q16ct.aoc/2;}
  else{V.q16dab=V.q16ct.opp;V.q16bcd=180-V.q16ct.opp;}

  // Q17 Grouped data: 5 classes, random
  var classes=[150,155,160,165,170,175];
  V.q17freqs=[rnd(3,7),rnd(7,12),rnd(12,18),rnd(6,10),rnd(2,6)];
  V.q17n=V.q17freqs.reduce(function(a,b){return a+b;},0);
  var mids=[152.5,157.5,162.5,167.5,172.5];
  var sumfx=0;for(var i=0;i<5;i++)sumfx+=V.q17freqs[i]*mids[i];
  V.q17mean=sumfx/V.q17n;V.q17mids=mids;
  V.q17modal=mids[V.q17freqs.indexOf(Math.max.apply(null,V.q17freqs))];

  // Q18 Box plot: min, Q1, median, Q3, max
  V.q18min=rnd(10,20);V.q18q1=V.q18min+rnd(5,10);V.q18med=V.q18q1+rnd(5,10);
  V.q18q3=V.q18med+rnd(5,10);V.q18max=V.q18q3+rnd(5,10);
  V.q18iqr=V.q18q3-V.q18q1;

  // Q19 Probability
  var bagTotal=rnd(8,15);
  var r=rnd(3,6),b=rnd(2,4),g=bagTotal-r-b;
  while(g<1){bagTotal++;g=bagTotal-r-b;}
  V.q19r=r;V.q19b=b;V.q19g=g;V.q19tot=bagTotal;
  V.q19pBlue=b/bagTotal;
  V.q19pBothRed=r/bagTotal*(r-1)/(bagTotal-1);
  // third attempt pass
  V.q19pPass=pick([0.6,0.65,0.7,0.75,0.8]);
  V.q19pFail=1-V.q19pPass;
  V.q19pThird=V.q19pFail*V.q19pFail*V.q19pPass;

  // Q20 Ratio and proportion
  var ratios=[[3,5,4],[2,3,5],[1,2,3],[4,5,6],[3,4,5]];
  var rt=pick(ratios);V.q20ra=rt[0];V.q20rb=rt[1];V.q20rc=rt[2];
  V.q20total=(rt[0]+rt[1]+rt[2])*pick([2000,3000,4000,5000,6000]);
  V.q20pp=V.q20total/(rt[0]+rt[1]+rt[2]);
  V.q20scale=pick([50000,25000,100000]);
  V.q20mapDist=rnd(3,12);
  V.q20realKm=V.q20mapDist*V.q20scale/100000;
})();

// ══════════════════════════════════════════════════════════════════════════
// DIAGRAM FUNCTIONS
// ══════════════════════════════════════════════════════════════════════════

function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var a=V.q1a,b=V.q1b,h=V.q1hcf,sn=V.q1surd,sa=V.q1sA,sb=V.q1sB;
  o.push(T(240,22,'HCF and Simplifying Surds','#C0272D',15,'middle',true));
  if(p>=1){o.push(R(20,36,440,44,'#fff5f0','#C0272D',1.5));
    o.push(T(240,54,'HCF of '+a+' and '+b,'#C0272D',14,'middle',false));
    o.push(T(240,72,'Prime factors: '+a+' = '+primeFactors(a).join('×')+'   '+b+' = '+primeFactors(b).join('×'),'#888',12,'middle',false));}
  if(p>=2){o.push(R(100,90,280,38,'#e8f0ff','#1a5a8a',1.5));o.push(T(240,114,'HCF = '+h,'#1a5a8a',20,'middle',true));}
  if(p>=3){o.push(R(20,138,440,44,'#fff5f0','#C0272D',1.5));
    o.push(T(240,156,'Simplify √'+sn,'#C0272D',14,'middle',false));
    o.push(T(240,174,'Largest square factor of '+sn+' = '+sa*sa,'#888',12,'middle',false));}
  if(p>=4){o.push(R(100,190,280,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,213,'√'+sn+' = '+sa+'√'+sb,'#1a7a3a',20,'middle',true));}
  s.innerHTML=o.join('');}

// NAVIGATION
// ══════════════════════════════════════════════════════════════════════════
var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').innerHTML=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
