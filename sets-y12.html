<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sets - Year 12 WAEC</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.nq-btn:hover{background:var(--gold);color:#fff;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}

@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Sets — Year 12 WAEC</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn'
    +' <button class="nq-btn" data-tryid="'+id+'">↻ New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar">'
    +'<input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'
    +'<div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid');
    var en=ST[id]; if(!en)return;
    var o=en.fn(); en.o=o; ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var en=ST[id]; if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct!  '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}


function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Universal set rectangle
  o.push(R(20,20,440,260,'#fff5f0','#C0272D',2));
  o.push(T(50,42,'U','#C0272D',14,'middle',true));
  // Circle A and B
  o.push(C(180,148,85,'rgba(192,39,45,0.12)','#C0272D',2));
  o.push(C(300,148,85,'rgba(26,90,138,0.12)','#1a5a8a',2));
  o.push(T(130,95,'A','#C0272D',18,'middle',true));
  o.push(T(350,95,'B','#1a5a8a',18,'middle',true));
  if(p>=1){
    // Region labels
    o.push(T(130,152,'only A','#C0272D',11,'middle',false));
    o.push(T(240,152,'A\u2229B','#888',11,'middle',false));
    o.push(T(350,152,'only B','#1a5a8a',11,'middle',false));
    o.push(T(440,252,'U only','#888',10,'end',false));
  }
  if(p>=2){
    // Number example: |A|=10, |B|=8, |A∩B|=3
    o.push(T(145,175,'7','#C0272D',20,'middle',true));
    o.push(T(240,175,'3','#555',18,'middle',true));
    o.push(T(335,175,'5','#1a5a8a',20,'middle',true));
    o.push(T(430,260,'5','#888',14,'middle',false));
    o.push(R(20,258,166,34,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(103,278,'|U|=7+3+5+5=20','#1a5a8a',11,'middle',false));
  }
  if(p>=3){
    o.push(R(230,242,230,40,'#e8f8ee','#1a7a3a',2));
    o.push(T(345,262,'|A\u222aB| = 7+3+5 = 15','#1a7a3a',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  // 3-set Venn diagram
  var s=g();s.setAttribute('viewBox','0 0 480 320');var o=[];
  o.push(R(14,8,452,304,'#fff5f0','#C0272D',2));
  o.push(T(36,28,'U','#C0272D',14,'middle',true));
  // Three circles: A(top-left), B(top-right), C(bottom)
  var Ax=185,Ay=130,Bx=295,By=130,Cx=240,Cy=210,r=80;
  o.push(C(Ax,Ay,r,'rgba(192,39,45,0.10)','#C0272D',2));
  o.push(C(Bx,By,r,'rgba(26,90,138,0.10)','#1a5a8a',2));
  o.push(C(Cx,Cy,r,'rgba(26,122,58,0.10)','#1a7a3a',2));
  o.push(T(138,72,'A','#C0272D',16,'middle',true));
  o.push(T(342,72,'B','#1a5a8a',16,'middle',true));
  o.push(T(240,306,'C','#1a7a3a',16,'middle',true));
  if(p>=1){
    // Region labels (7 regions)
    o.push(T(158,135,'a','#C0272D',13,'middle',true));   // only A
    o.push(T(322,135,'b','#1a5a8a',13,'middle',true));   // only B
    o.push(T(240,262,'c','#1a7a3a',13,'middle',true));   // only C
    o.push(T(240,115,'d','#888',13,'middle',false));     // A∩B only
    o.push(T(195,210,'e','#888',13,'middle',false));     // A∩C only
    o.push(T(285,210,'f','#888',13,'middle',false));     // B∩C only
    o.push(T(240,178,'\u03b5','#C8922A',14,'middle',true)); // A∩B∩C
  }
  if(p>=2){
    // Concrete numbers: a=5,b=4,c=6,d=3,e=2,f=2,ε=1
    var vals=['5','4','6','3','2','2','1'];
    var pos=[[158,135],[322,135],[240,262],[240,115],[195,210],[285,210],[240,178]];
    var cols=['#C0272D','#1a5a8a','#1a7a3a','#555','#555','#555','#C8922A'];
    pos.forEach(function(pt,i){o.push(T(pt[0],pt[1],vals[i],cols[i],15,'middle',true));});
    o.push(T(438,290,'2','#888',13,'middle',false)); // outside
    o.push(R(14,276,200,30,'#f0f0f0','#888',1));
    o.push(T(114,295,'Outside all circles: 2','#888',10,'middle',false));
  }
  if(p>=3){
    o.push(R(220,276,226,30,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(333,295,'|U| = 5+4+6+3+2+2+1+2 = 25','#1a7a3a',10,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ3(p){
  // 3-set problem: In a class of 40 students...
  var s=g();s.setAttribute('viewBox','0 0 480 320');var o=[];
  o.push(R(14,8,452,304,'#fff5f0','#C0272D',2));
  o.push(T(36,28,'U = 40 students','#C0272D',12,'start',true));
  var Ax=185,Ay=130,Bx=295,By=130,Cx=240,Cy=210,r=78;
  o.push(C(Ax,Ay,r,'rgba(192,39,45,0.10)','#C0272D',2));
  o.push(C(Bx,By,r,'rgba(26,90,138,0.10)','#1a5a8a',2));
  o.push(C(Cx,Cy,r,'rgba(26,122,58,0.10)','#1a7a3a',2));
  o.push(T(140,70,'Maths','#C0272D',13,'middle',true));
  o.push(T(340,70,'English','#1a5a8a',13,'middle',true));
  o.push(T(240,308,'Science','#1a7a3a',13,'middle',true));
  if(p>=1){
    // Start filling from centre outward
    o.push(T(240,178,'2','#C8922A',15,'middle',true));  // all three
    o.push(T(240,122,'4','#555',13,'middle',true));    // M∩E only
    o.push(T(196,210,'3','#555',13,'middle',true));    // M∩S only
    o.push(T(284,210,'5','#555',13,'middle',true));    // E∩S only
  }
  if(p>=2){
    // |M|=20,|E|=18,|S|=16, intersections above, fill in only regions
    // only M = 20-(4+2+3)=11, only E=18-(4+2+5)=7, only S=16-(3+2+5)=6
    o.push(T(155,135,'11','#C0272D',14,'middle',true));
    o.push(T(325,135,'7','#1a5a8a',14,'middle',true));
    o.push(T(240,265,'6','#1a7a3a',14,'middle',true));
    o.push(T(436,292,'2','#888',13,'middle',false));  // neither
  }
  if(p>=3){
    o.push(R(14,276,452,30,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,295,'Total = 11+7+6+4+3+5+2+2 = 40 \u2713','#1a7a3a',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ4(p){
  // Complement and difference using 2-set
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(20,20,440,260,'#fff5f0','#C0272D',2));
  o.push(T(50,42,'U','#C0272D',14,'middle',true));
  var Ax=185,Ay=148,Bx=295,By=148,r=85;
  // Shade A' (everything NOT in A) at p>=1
  if(p>=1){o.push(R(20,20,440,260,'rgba(26,90,138,0.15)','none',0));}
  o.push(C(Ax,Ay,r,'rgba(255,255,255,0.9)','#C0272D',2.5));
  if(p>=1){o.push(C(Ax,Ay,r,'rgba(255,255,255,0.9)','#C0272D',2.5));}
  o.push(C(Bx,By,r,'rgba(26,90,138,0.12)','#1a5a8a',2));
  o.push(T(130,95,'A','#C0272D',18,'middle',true));
  o.push(T(350,95,'B','#1a5a8a',18,'middle',true));
  if(p>=1){
    o.push(T(430,50,"A'","#1a5a8a",13,'middle',true));
    o.push(T(430,70,'(shaded)','#1a5a8a',10,'middle',false));
  }
  if(p>=2){
    // A\B = A minus intersection — shade only-A region
    o.push(T(145,148,'A\\B','#C0272D',13,'middle',true));
    o.push(T(145,168,'(only A)','#C0272D',10,'middle',false));
  }
  if(p>=3){
    o.push(R(60,230,360,40,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,248,"A' = everything NOT in A","#1a7a3a",12,'middle',false));
    o.push(T(240,264,'A\\B = elements in A but NOT in B','#1a7a3a',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  // WAEC-style word problem with 3-set
  var s=g();s.setAttribute('viewBox','0 0 480 320');var o=[];
  o.push(R(14,8,452,304,'#fff5f0','#C0272D',2));
  o.push(T(240,26,'100 students: French(F), Igbo(I), Yoruba(Y)','#C0272D',11,'middle',true));
  var Ax=185,Ay=135,Bx=295,By=135,Cx=240,Cy=210,r=76;
  o.push(C(Ax,Ay,r,'rgba(192,39,45,0.08)','#C0272D',2));
  o.push(C(Bx,By,r,'rgba(26,90,138,0.08)','#1a5a8a',2));
  o.push(C(Cx,Cy,r,'rgba(26,122,58,0.08)','#1a7a3a',2));
  o.push(T(140,66,'F','#C0272D',16,'middle',true));
  o.push(T(340,66,'I','#1a5a8a',16,'middle',true));
  o.push(T(240,306,'Y','#1a7a3a',16,'middle',true));
  if(p>=1){
    // Given: |F|=40,|I|=35,|Y|=30, F∩I=12, F∩Y=10, I∩Y=8, all three=5
    o.push(T(240,180,'5','#C8922A',15,'middle',true));
    o.push(T(240,118,'7','#555',13,'middle',true));   // F∩I only = 12-5=7
    o.push(T(195,210,'5','#555',13,'middle',true));   // F∩Y only = 10-5=5
    o.push(T(285,210,'3','#555',13,'middle',true));   // I∩Y only = 8-5=3
  }
  if(p>=2){
    // only F=40-(7+5+5)=23, only I=35-(7+5+3)=20, only Y=30-(5+5+3)=17
    o.push(T(155,140,'23','#C0272D',14,'middle',true));
    o.push(T(325,140,'20','#1a5a8a',14,'middle',true));
    o.push(T(240,262,'17','#1a7a3a',14,'middle',true));
    // outside = 100-(23+20+17+7+5+3+5) = 20
    o.push(T(440,294,'20','#888',13,'middle',false));
  }
  if(p>=3){
    o.push(R(14,276,452,30,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,295,'Check: 23+20+17+7+5+3+5+20 = 100 \u2713','#1a7a3a',10,'middle',false));
  }
  s.innerHTML=o.join('');
}


var QS=[
  {ey:'Q1 \u00b7 Sets \u00b7 WAEC',ti:'Two-Set Venn Diagram',su:'In a group of 20 people, 10 like Maths, 8 like English, 3 like both. Draw a Venn diagram and find |A\u222aB|.',lv:'F',steps:[
    {lb:'The diagram',dr:dQ1,ht:'<p>A Venn diagram shows sets as overlapping circles inside a rectangle (the universal set U). The <b>intersection</b> A\u2229B goes in the middle.</p>'},
    {lb:'Label regions',dr:dQ1,ht:'<p>Four regions: only A, A\u2229B, only B, and outside both (in U only). Every element goes in exactly one region.</p>'},
    {lb:'Fill in numbers',dr:dQ1,ht:'<div class="fm">A\u2229B = 3 (given)<br>Only A = 10 \u2212 3 = 7<br>Only B = 8 \u2212 3 = 5<br>Outside = 20 \u2212 7 \u2212 3 \u2212 5 = 5</div>'},
    {lb:'Find |A\u222aB|',dr:dQ1,ht:'<div class="fm">|A\u222aB| = 7 + 3 + 5 = 15</div><p>Or use the formula: |A\u222aB| = |A| + |B| \u2212 |A\u2229B| = 10 + 8 \u2212 3 = 15</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){
      var aOnly=rnd(5,15),bOnly=rnd(5,12),both=rnd(2,6),out=rnd(1,8);
      var A=aOnly+both,B=bOnly+both,U=aOnly+bOnly+both+out;
      return {question:'In a group of '+U+' people, |A|='+A+', |B|='+B+', |A\u2229B|='+both+'. Find |A\u222aB|.',
        hints:['|A\u222aB| = |A| + |B| \u2212 |A\u2229B|',A+' + '+B+' \u2212 '+both],
        ans:A+B-both,tol:0,unit:'',working:'|A\u222aB| = '+A+'+'+B+'\u2212'+both+' = '+(A+B-both)};
    })}
  ]},
  {ey:'Q2 \u00b7 Sets \u00b7 WAEC',ti:'Three-Set Venn Diagram',su:'Three overlapping sets A, B, C with values in each region. Find |U|.',lv:'F',steps:[
    {lb:'The seven regions',dr:dQ2,ht:'<p>Three circles create <b>7 regions</b> inside them (plus the area outside all three). Label each region with a letter.</p>'},
    {lb:'Fill in values',dr:dQ2,ht:'<p>Values: only A=5, only B=4, only C=6, A\u2229B only=3, A\u2229C only=2, B\u2229C only=2, A\u2229B\u2229C=1, outside=2.</p>'},
    {lb:'Find |U|',dr:dQ2,ht:'<div class="fm">|U| = 5+4+6+3+2+2+1+2 = 25</div><p>Add ALL regions including outside the circles.</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){
      var a=rnd(4,10),b=rnd(3,9),c=rnd(3,8),ab=rnd(1,4),ac=rnd(1,3),bc=rnd(1,3),abc=rnd(1,2),out=rnd(1,5);
      return {question:'Three sets have regions: only A='+a+', only B='+b+', only C='+c+', A\u2229B only='+ab+', A\u2229C only='+ac+', B\u2229C only='+bc+', A\u2229B\u2229C='+abc+', outside='+out+'. Find |U|.',
        hints:['Add all 8 regions',''+a+'+'+b+'+'+c+'+'+ab+'+'+ac+'+'+bc+'+'+abc+'+'+out],
        ans:a+b+c+ab+ac+bc+abc+out,tol:0,unit:'',working:'Sum = '+(a+b+c+ab+ac+bc+abc+out)};
    })}
  ]},
  {ey:'Q3 \u00b7 Sets \u00b7 WAEC',ti:'3-Set Word Problem',su:'In a class of 40: 20 like Maths, 18 like English, 16 like Science. M\u2229E=6, M\u2229S=5, E\u2229S=7, all three=2. Find how many like none.',lv:'E',steps:[
    {lb:'Start from the centre',dr:dQ3,ht:'<p>With 3-set problems, always fill in from the <b>innermost region first</b>: the intersection of all three. Then work outward.</p>'},
    {lb:'Fill intersections',dr:dQ3,ht:'<div class="fm">All three = 2 (given)<br>M\u2229E only = 6\u22122=4<br>M\u2229S only = 5\u22122=3<br>E\u2229S only = 7\u22122=5</div>'},
    {lb:'Fill individual regions',dr:dQ3,ht:'<div class="fm">Only M = 20\u2212(4+2+3) = 11<br>Only E = 18\u2212(4+2+5) = 7<br>Only S = 16\u2212(3+2+5) = 6</div>'},
    {lb:'Find those who like none',dr:dQ3,ht:'<div class="fm">Total accounted = 11+7+6+4+3+5+2 = 38<br>None = 40 \u2212 38 = 2</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){
      var abc=rnd(1,3);
      var abO=rnd(2,5),acO=rnd(2,4),bcO=rnd(2,4);
      var aO=rnd(5,12),bO=rnd(4,10),cO=rnd(4,9);
      var total=aO+bO+cO+abO+acO+bcO+abc;
      var none=rnd(1,6); var U=total+none;
      return {question:'|U|='+U+'. Only A='+aO+', only B='+bO+', only C='+cO+', A\u2229B only='+abO+', A\u2229C only='+acO+', B\u2229C only='+bcO+', A\u2229B\u2229C='+abc+'. How many are in none of the sets?',
        hints:['Add all accounted-for elements','Total in sets = '+(total),'None = '+U+' \u2212 '+total],
        ans:none,tol:0,unit:'',working:U+' \u2212 '+total+' = '+none};
    })}
  ]},
  {ey:'Q4 \u00b7 Sets \u00b7 WAEC',ti:'Complement and Set Difference',su:"Given U={1..10}, A={2,4,6,8,10}, B={1,3,5,7,9}. Find A', A\\B, and |A'\u222aB|.",lv:'F',steps:[
    {lb:'Complement A\'',dr:dQ4,ht:"<p>The <b>complement</b> A' is everything in U that is NOT in A.</p><div class=\"fm\">A' = {1,3,5,7,9} = B in this case</div>"},
    {lb:'Set difference A\\B',dr:dQ4,ht:"<p><b>A\\B</b> (A minus B) contains elements in A that are NOT in B.</p><div class=\"fm\">A\\B = {2,4,6,8,10} \u2212 {1,3,5,7,9} = {2,4,6,8,10} = A</div>"},
    {lb:'A\'\u222aB',dr:dQ4,ht:"<div class=\"fm\">A' = {1,3,5,7,9} = B<br>A'\u222aB = B\u222aB = B = {1,3,5,7,9}</div><div class=\"fm\">|A'\u222aB| = 5</div>"},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){
      var n=rnd(8,14);
      var aSize=rnd(3,n-2); var A=[];
      while(A.length<aSize){var x=rnd(1,n);if(A.indexOf(x)<0)A.push(x);}
      A.sort(function(a,b){return a-b;});
      var compA=[]; for(var i=1;i<=n;i++){if(A.indexOf(i)<0)compA.push(i);}
      return {question:'U = {1 to '+n+'}, A = {'+A.join(',')+'}. How many elements does A\u2019 have?',
        hints:["A' = U minus A",'|U| = '+n+', |A| = '+A.length],
        ans:compA.length,tol:0,unit:'elements',working:"A' has "+compA.length+" elements: {"+compA.join(',')+"}."};
    })}
  ]},
  {ey:'Q5 \u00b7 Sets \u00b7 WAEC',ti:'3-Set Word Problem (WAEC Style)',su:'100 students study French, Igbo or Yoruba. French=40, Igbo=35, Yoruba=30, F\u2229I=12, F\u2229Y=10, I\u2229Y=8, all three=5. Find those studying none.',lv:'E',steps:[
    {lb:'Set up the diagram',dr:dQ5,ht:'<p>Place the 3 circles. Start with A\u2229B\u2229C = 5. Then find each pair-only intersection.</p>'},
    {lb:'Pair intersections',dr:dQ5,ht:'<div class="fm">F\u2229I only = 12\u22125 = 7<br>F\u2229Y only = 10\u22125 = 5<br>I\u2229Y only = 8\u22125 = 3</div>'},
    {lb:'Individual regions',dr:dQ5,ht:'<div class="fm">Only F = 40\u2212(7+5+5)=23<br>Only I = 35\u2212(7+5+3)=20<br>Only Y = 30\u2212(5+5+3)=17</div>'},
    {lb:'Find those studying none',dr:dQ5,ht:'<div class="fm">In sets = 23+20+17+7+5+3+5 = 80<br>None = 100 \u2212 80 = 20</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){
      var abc=rnd(2,5);
      var ab=rnd(abc+1,abc+6),ac=rnd(abc+1,abc+5),bc=rnd(abc+1,abc+5);
      var abO=ab-abc,acO=ac-abc,bcO=bc-abc;
      var aO=rnd(8,16),bO=rnd(7,14),cO=rnd(6,12);
      var A=aO+abO+acO+abc,B=bO+abO+bcO+abc,C=cO+acO+bcO+abc;
      var inSets=aO+bO+cO+abO+acO+bcO+abc;
      var none=rnd(3,12); var U=inSets+none;
      return {question:'|U|='+U+'. |A|='+A+', |B|='+B+', |C|='+C+', A\u2229B='+ab+', A\u2229C='+ac+', B\u2229C='+bc+', A\u2229B\u2229C='+abc+'. Find the number in none of the three sets.',
        hints:['Start with A\u2229B\u2229C = '+abc,'Find each pair-only: A\u2229B only = '+(ab-abc),
               'Find each single region: only A = '+A+'\u2212('+(abO+acO+abc)+') = '+aO,
               'Total in sets = '+inSets],
        ans:none,tol:0,unit:'',working:'Total in sets = '+inSets+'. None = '+U+'\u2212'+inSets+' = '+none};
    })}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
