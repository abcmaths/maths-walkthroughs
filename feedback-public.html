<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ABC Maths — Student Feedback</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; flex-direction: column; }
    header { background: #C0272D; color: white; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 1.3rem; font-weight: 700; letter-spacing: 1px; }
    .subtitle { font-size: 0.85rem; opacity: 0.85; border-left: 1px solid rgba(255,255,255,0.4); padding-left: 14px; }
    .back-link { font-size: 0.85rem; color: white; opacity: 0.85; text-decoration: none; }
    .back-link:hover { opacity: 1; }
    main { flex: 1; max-width: 900px; width: 100%; margin: 0 auto; padding: 28px 16px; }
    h1 { font-size: 1.4rem; color: #222; font-weight: 700; margin-bottom: 6px; }
    .intro { font-size: 0.9rem; color: #666; margin-bottom: 28px; }
    .filter-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .filter-bar select { padding: 7px 10px; border: 1.5px solid #ddd; border-radius: 5px; font-size: 0.88rem; color: #333; background: white; }
    .filter-bar select:focus { outline: none; border-color: #C0272D; }
    .topic-block { background: white; border-radius: 8px; box-shadow: 0 1px 6px rgba(0,0,0,0.08); padding: 20px 24px; margin-bottom: 20px; }
    .topic-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; flex-wrap: wrap; gap: 8px; }
    .topic-name { font-size: 1rem; font-weight: 700; color: #333; }
    .topic-meta { font-size: 0.78rem; color: #888; }
    .rating-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .bar-bg { flex: 1; background: #eee; border-radius: 99px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; background: #2e7d32; border-radius: 99px; }
    .rating-label { font-size: 0.82rem; color: #555; white-space: nowrap; }
    .comments { display: flex; flex-direction: column; gap: 10px; }
    .comment-card { background: #f9f9f9; border-radius: 6px; padding: 12px 14px; }
    .comment-text { font-size: 0.88rem; color: #333; line-height: 1.5; }
    .comment-meta { font-size: 0.75rem; color: #aaa; margin-top: 6px; }
    .no-comments { font-size: 0.85rem; color: #bbb; font-style: italic; }
    .loading { text-align: center; color: #aaa; padding: 40px; }
    footer { text-align: center; padding: 16px; font-size: 0.78rem; color: #aaa; }
  </style>
</head>
<body>
<header>
  <div class="header-left">
    <div class="logo">ABC</div>
    <div class="subtitle">Student Feedback</div>
  </div>
  <a href="index.html" class="back-link">← Back to walkthroughs</a>
</header>

<main>
  <h1>What students say</h1>
  <p class="intro">Approved feedback from ABC students on the maths walkthroughs.</p>

  <div class="filter-bar">
    <select id="filter-year" onchange="renderFeedback()">
      <option value="">All Year Groups</option>
      <option value="7">Year 7</option>
      <option value="8">Year 8</option>
      <option value="9">Year 9</option>
      <option value="10">Year 10</option>
      <option value="11">Year 11</option>
      <option value="12">Year 12</option>
      <option value="13">Add Maths</option>
    </select>
    <select id="filter-rating" onchange="renderFeedback()">
      <option value="">All Ratings</option>
      <option value="up">👍 Positive only</option>
      <option value="down">👎 Critical only</option>
    </select>
  </div>

  <div id="content"><div class="loading">Loading feedback…</div></div>
</main>

<footer>© Adorable British College — ABC Maths Portal</footer>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL  = 'https://lnwinoghbefmjpvmixzo.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxud2lub2doYmVmbWpwdm1peHpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODIxNzQsImV4cCI6MjA5Nzk1ODE3NH0.ubKHVLrxlxQd-w3n5pS3O6YMAI7I--ndEkI2xWM9qCo';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  let allFeedback = [];
  let allTopics   = [];

  async function init() {
    const [{ data: feedback }, { data: topics }] = await Promise.all([
      supabase.from('feedback')
        .select('*, topics(topic_name, strand, year_group), profiles(year_group)')
        .eq('status', 'approved')
        .order('submitted_at', { ascending: false }),
      supabase.from('topics').select('*').order('year_group').order('sort_order')
    ]);

    allFeedback = feedback || [];
    allTopics   = topics   || [];

    window.renderFeedback();
  }

  window.renderFeedback = function() {
    const yearFilter   = document.getElementById('filter-year').value;
    const ratingFilter = document.getElementById('filter-rating').value;

    // Filter topics that have approved feedback
    let filtered = allFeedback.filter(f => {
      const matchYear   = !yearFilter   || String(f.topics?.year_group) === yearFilter;
      const matchRating = !ratingFilter || f.rating === ratingFilter;
      return matchYear && matchRating;
    });

    // Group by topic
    const byTopic = {};
    filtered.forEach(f => {
      const tid = f.topic_id;
      if (!byTopic[tid]) byTopic[tid] = { topic: f.topics, items: [] };
      byTopic[tid].items.push(f);
    });

    const content = document.getElementById('content');

    if (Object.keys(byTopic).length === 0) {
      content.innerHTML = '<div class="loading">No approved feedback yet.</div>';
      return;
    }

    content.innerHTML = Object.values(byTopic).map(({ topic, items }) => {
      const ups   = items.filter(f => f.rating === 'up').length;
      const downs = items.filter(f => f.rating === 'down').length;
      const total = ups + downs;
      const pct   = total > 0 ? Math.round((ups / total) * 100) : 0;

      const comments = items.filter(f => f.comment);
      const yearLabel = topic?.year_group === 13 ? 'Add Maths' : `Year ${topic?.year_group}`;

      return `
        <div class="topic-block">
          <div class="topic-header">
            <div>
              <div class="topic-name">${topic?.topic_name || '—'}</div>
              <div class="topic-meta">${yearLabel} · ${topic?.strand || ''}</div>
            </div>
            <div style="text-align:right;font-size:0.85rem;color:#555">
              👍 ${ups} &nbsp; 👎 ${downs}
            </div>
          </div>
          <div class="rating-bar">
            <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
            <div class="rating-label">${pct}% positive</div>
          </div>
          ${comments.length > 0 ? `
            <div class="comments">
              ${comments.map(f => `
                <div class="comment-card">
                  <div class="comment-text">${f.comment}</div>
                  <div class="comment-meta">Year ${f.profiles?.year_group || '?'} student · ${f.rating === 'up' ? '👍' : '👎'}</div>
                </div>`).join('')}
            </div>` : '<div class="no-comments">No comments yet.</div>'}
        </div>`;
    }).join('');
  };

  init();
</script>
</body>
</html>
