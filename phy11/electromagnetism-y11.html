<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Force on a current-carrying conductor','#1565C0',12,'middle',true));
o.push(R(100,80,280,100,'#e3f2fd','#1565C0',2));
if(p>=1){o.push(arw(240,80,240,22,'#C0272D',2.5));o.push(T(260,50,'F (force)','#C0272D',9,'start',false));}
if(p>=2){o.push(arw(100,130,300,130,'#2E7D32',2));o.push(T(200,120,'I (current)','#2E7D32',9,'middle',false));}
if(p>=3){o.push(arw(50,80,50,180,'#1565C0',2));o.push(T(18,132,'B (field)','#1565C0',9,'middle',false));
o.push(T(240,240,'F = BIL &nbsp;&nbsp; Fleming\'s Left-Hand Rule','#0d47a1',11,'middle',true));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electromagnetic induction','#1565C0',12,'middle',true));
o.push(R(160,100,160,60,'#e3f2fd','#1565C0',2));
for(var i=0;i<7;i++){var x=170+i*20;o.push(L(x,100,x,160,'#1565C0',2));}
if(p>=1){o.push(arw(80,130,158,130,'#2E7D32',2));o.push(T(60,120,'magnet\nmoving in','#2E7D32',8,'middle',false));}
if(p>=2){o.push(R(330,80,30,100,'#C8922A','#a07018',2));o.push(L(240,130,328,130,'#333',1.5));o.push(L(360,130,420,130,'#333',1.5));o.push(T(345,140,'G','#C8922A',8,'middle',false));o.push(T(240,248,'Changing flux \u2192 induced EMF \u2192 current in circuit','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The AC generator (alternator)','#1565C0',12,'middle',true));
o.push(R(150,100,180,60,'#e3f2fd','#1565C0',2));
for(var i=0;i<8;i++){var x=155+i*22;o.push(L(x,100,x-11,80,'#1565C0',2));o.push(L(x,160,x-11,180,'#1565C0',2));}
if(p>=1){o.push(arw(48,132,148,132,'#C0272D',2));o.push(T(98,122,'B field','#C0272D',8,'middle',false));}
if(p>=2){o.push(T(48,52,'slip rings','#555',8,'middle',false));o.push(L(80,60,150,100,'#555',1,'3,2'));o.push(T(240,50,'coil rotates in field \u2192 changing flux \u2192 AC output','#333',9,'middle',false));}
if(p>=3){o.push(T(240,248,'Output frequency = rotation frequency. More turns/speed/B \u2192 greater EMF.','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ2(p);}
function dQ8(p){dQ5(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electromagnetism summary','#1565C0',13,'middle',true));
[['F = BIL','force on conductor in field (N)'],['Fleming\'s LHR','1st=B field, 2nd=current, thumb=force (motor)'],['Induction','change in flux \u2192 induced EMF (Faraday)'],['Lenz\'s Law','induced current opposes change causing it'],['Generator','coil rotating in field \u2192 AC output'],['Transformer','Vp/Vs = Np/Ns; VpIp = VsIs (AC only)']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#e3f2fd','#BBDEFB',1));o.push(T(120,55+i*33,r[0],'#1565C0',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'Force on a Current-Carrying Conductor',su:'Apply F = BIL and Fleming\'s left-hand rule.',steps:[
  {lb:'F = BIL',dr:dQ1,ht:'<p>A wire carrying current I in a magnetic field B of length L experiences a force F.</p><div class="fm">F = B \u00d7 I \u00d7 L</div><p>Direction: Fleming\u2019s Left-Hand Rule (thumb=force, 1st finger=B field, 2nd finger=current).</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var B=rnd(1,5)*0.1,I=rnd(1,10),L=rnd(5,20)*0.05;var F=parseFloat((B*I*L).toFixed(3));var type=pick(['F','I','B']);if(type==='F')return{question:'B=<b>'+B+' T</b>, I=<b>'+I+' A</b>, L=<b>'+L.toFixed(2)+' m</b>. Find force.',hints:['F = BIL'],ans:F,tol:F*0.02,unit:'N',working:'F = '+B+'\u00d7'+I+'\u00d7'+L.toFixed(2)+' = '+F+' N'};if(type==='I'){var F2=rnd(1,10)*0.1,I2=parseFloat((F2/(B*L)).toFixed(2));return{question:'F=<b>'+F2+' N</b>, B=<b>'+B+' T</b>, L=<b>'+L.toFixed(2)+' m</b>. Find I.',hints:['I = F/(BL)'],ans:I2,tol:I2*0.02,unit:'A',working:'I = '+F2+'/('+B+'\u00d7'+L.toFixed(2)+') = '+I2+' A'};}var F3=rnd(1,10)*0.1,B3=parseFloat((F3/(I*L)).toFixed(3));return{question:'F=<b>'+F3+' N</b>, I=<b>'+I+' A</b>, L=<b>'+L.toFixed(2)+' m</b>. Find B.',hints:['B = F/(IL)'],ans:B3,tol:B3*0.02,unit:'T',working:'B = '+F3+'/('+I+'\u00d7'+L.toFixed(2)+') = '+B3+' T'};})}
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'Electromagnetic Induction',su:'Describe and explain electromagnetic induction. Apply Faraday\'s and Lenz\'s laws.',steps:[
  {lb:'Faraday and Lenz',dr:dQ2,ht:"<p><b>Faraday's Law:</b> the induced EMF is proportional to the rate of change of magnetic flux through the circuit. <b>Lenz's Law:</b> the induced current always opposes the change that causes it (conservation of energy).</p>"},
  {lb:'Ways to increase induced EMF',dr:dQ2,ht:'<p>Move magnet faster; use stronger magnet; use more turns; increase area of coil.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'A magnet is pushed into a coil faster. The induced EMF: 1=decreases, 2=increases.',a:2,w:'Faster change in flux \u2192 larger induced EMF. Answer: 2.'},{q:'The induced current opposes the incoming magnet (Lenz\'s law). This is an example of: 1=conservation of energy, 2=conservation of charge.',a:1,w:'Lenz\'s law is a consequence of conservation of energy. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:["Faraday: faster/stronger = more EMF. Lenz: opposes change."],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'The DC Motor',su:'Describe the structure and operation of a DC electric motor.',steps:[
  {lb:'DC motor',dr:dQ3,ht:'<p>A coil in a magnetic field. Current flows through coil \u2192 force on each side (F=BIL) \u2192 creates torque \u2192 coil rotates. Split-ring commutator reverses current direction each half-turn to maintain continuous rotation. Carbon brushes maintain contact.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'The split-ring commutator ensures: 1=the coil only rotates half a turn, 2=the torque always acts in the same rotational direction.',a:2,w:'Commutator reverses current \u2192 torque always same direction. Answer: 2.'},{q:'To increase the speed of a DC motor: 1=reduce the current, 2=increase the current or use stronger magnets.',a:2,w:'More current or stronger B \u2192 larger force \u2192 faster spin. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Commutator: reverses current. More I/B: faster.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'The AC Generator',su:'Describe how a generator produces AC. State factors affecting output.',steps:[
  {lb:'AC generator (alternator)',dr:dQ4,ht:'<p>A coil rotates in a magnetic field. As the coil rotates, the flux through it changes \u2192 EMF induced (Faraday). The EMF changes direction each half-turn \u2192 AC output. <b>Slip rings</b> (not split-ring commutator) maintain contact and allow AC output.</p>'},
  {lb:'Factors affecting EMF',dr:dQ4,ht:'<p>Greater EMF with: more turns, faster rotation, stronger magnetic field, larger coil area. Frequency of AC = frequency of rotation.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'A generator uses slip rings (not a commutator) in order to: 1=produce DC, 2=produce AC (allow reversal of current direction).',a:2,w:'Slip rings allow AC; commutator produces DC. Answer: 2.'},{q:'Rotating the coil faster in a generator: 1=increases EMF and frequency, 2=only increases frequency.',a:1,w:'Faster rotation: more flux change per second \u2192 larger EMF AND higher frequency. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Generator: slip rings, AC output. Faster = more EMF + higher f.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'Transformers',su:'Explain transformer operation. Apply the transformer equations.',steps:[
  {lb:'Transformer equations',dr:dQ5,ht:'<div class="fm">V\u209a/V\u209b = N\u209a/N\u209b &nbsp;&nbsp;&nbsp; V\u209a I\u209a = V\u209b I\u209b</div><p>Step-up: V\u209b > V\u209a (N\u209b > N\u209a). Step-down: V\u209b < V\u209a (N\u209b < N\u209a). Transformers only work with <b>AC</b>.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var Np=rnd(100,500),Ns=rnd(200,2000),Vp=rnd(12,240);var Vs=parseFloat((Vp*Ns/Np).toFixed(1));var type=pick(['Vs','Ns','Ip']);if(type==='Vs')return{question:'N\u209a=<b>'+Np+'</b>, N\u209b=<b>'+Ns+'</b>, V\u209a=<b>'+Vp+' V</b>. Find V\u209b.',hints:['V\u209b = V\u209a\u00d7N\u209b/N\u209a'],ans:Vs,tol:Vs*0.01,unit:'V',working:'V\u209b = '+Vp+'\u00d7'+Ns+'/'+Np+' = '+Vs+' V'};if(type==='Ns'){var Vs2=rnd(50,1000),Ns2=Math.round(Np*Vs2/Vp);return{question:'N\u209a=<b>'+Np+'</b>, V\u209a=<b>'+Vp+' V</b>, V\u209b=<b>'+Vs2+' V</b>. Find N\u209b.',hints:['N\u209b = N\u209a\u00d7V\u209b/V\u209a'],ans:Ns2,tol:1,unit:'turns',working:'N\u209b = '+Np+'\u00d7'+Vs2+'/'+Vp+' = '+Ns2};}var Is=rnd(1,10),Ip=parseFloat((Vs*Is/Vp).toFixed(2));return{question:'V\u209a=<b>'+Vp+' V</b>, V\u209b=<b>'+Vs+' V</b>, I\u209b=<b>'+Is+' A</b>. Find I\u209a.',hints:['V\u209aI\u209a = V\u209bI\u209b'],ans:Ip,tol:Ip*0.02,unit:'A',working:'I\u209a = '+Vs+'\u00d7'+Is+'/'+Vp+' = '+Ip+' A'};})}
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'National Grid',su:'Explain power transmission in the National Grid.',steps:[
  {lb:'Why high voltage?',dr:dQ6,ht:'<p>Power stations generate at ~25 kV. Step-up transformers increase to ~400 kV for long-distance transmission. High V \u2192 low I \u2192 less power lost as heat (P=I\u00b2R). Step-down transformers reduce to 230 V for homes.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var I=rnd(1,20),R=rnd(2,20),P=I*I*R;return{question:'Transmission cable: I=<b>'+I+' A</b>, R=<b>'+R+' \u03a9</b>. Power wasted?',hints:['P = I\u00b2R'],ans:P,tol:P*0.01,unit:'W',working:'P = '+I+'\u00b2\u00d7'+R+' = '+P+' W'};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'Loudspeakers',su:'Explain how a loudspeaker uses the motor effect.',steps:[
  {lb:'Loudspeaker',dr:dQ7,ht:'<p>An alternating current passes through a coil attached to a paper cone. The coil is inside a magnetic field. The varying current creates a varying force (motor effect) \u2192 cone vibrates \u2192 produces sound waves matching the electrical signal frequency.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'A loudspeaker converts: 1=sound to electrical signals, 2=electrical signals to sound.',a:2,w:'Loudspeaker: electrical \u2192 sound (motor effect). Answer: 2.'},{q:'In a loudspeaker, the coil vibrates because: 1=the magnetic field vibrates, 2=the alternating current creates a varying force on the coil.',a:2,w:'AC in coil \u2192 alternating force \u2192 vibration \u2192 sound. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Loudspeaker: AC + motor effect \u2192 vibration \u2192 sound'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'Microphones',su:'Explain how a microphone uses electromagnetic induction.',steps:[
  {lb:'Microphone',dr:dQ8,ht:'<p>A microphone converts sound to electrical signals. Sound waves vibrate a diaphragm attached to a coil. The coil moves in a magnetic field \u2192 changing flux \u2192 induced EMF \u2192 electrical signal (AC) matching the sound frequency and amplitude.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'A microphone converts: 1=electrical signals to sound, 2=sound to electrical signals.',a:2,w:'Microphone: sound \u2192 electrical (induction). Answer: 2.'},{q:'The induced signal in a microphone is: 1=DC, 2=AC.',a:2,w:'Moving coil = alternating induced EMF = AC. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Microphone: induction, sound\u2192electrical, AC output'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'Mixed EM Calculations',su:'F=BIL, transformer equations and power loss calculations.',steps:[
  {lb:'Strategy',dr:dQ9,ht:'<p>F=BIL \u2022 Vp/Vs=Np/Ns \u2022 VpIp=VsIs \u2022 P=I\u00b2R (cable loss). Match the quantities given to the right equation.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var type=pick(['force','transformer','loss']);if(type==='force'){var B=rnd(1,5)*0.1,I=rnd(1,10),L=rnd(5,20)*0.05;return{question:'F=BIL. B=<b>'+B+' T</b>, I=<b>'+I+' A</b>, L=<b>'+L.toFixed(2)+' m</b>.',hints:['F = BIL'],ans:parseFloat((B*I*L).toFixed(3)),tol:parseFloat((B*I*L).toFixed(3))*0.02,unit:'N',working:'F = '+B+'\u00d7'+I+'\u00d7'+L.toFixed(2)+' = '+parseFloat((B*I*L).toFixed(3))+' N'};}if(type==='transformer'){var Np=rnd(100,500),Ns=rnd(500,2000),Vp=rnd(12,100);var Vs=parseFloat((Vp*Ns/Np).toFixed(1));return{question:'N\u209a=<b>'+Np+'</b>, N\u209b=<b>'+Ns+'</b>, V\u209a=<b>'+Vp+'</b>. V\u209b?',hints:['V\u209b = V\u209a\u00d7N\u209b/N\u209a'],ans:Vs,tol:Vs*0.02,unit:'V',working:'V\u209b = '+Vp+'\u00d7'+Ns+'/'+Np+' = '+Vs+' V'};}var I2=rnd(2,15),R2=rnd(2,10);return{question:'Cable: I=<b>'+I2+' A</b>, R=<b>'+R2+' \u03a9</b>. Power loss?',hints:['P = I\u00b2R'],ans:I2*I2*R2,tol:I2*I2*R2*0.01,unit:'W',working:'P = '+I2+'\u00b2\u00d7'+R2+' = '+(I2*I2*R2)+' W'};})}
]},
{ey:'Q10 \u2022 Y11 Physics \u2022 Electromagnetism',ti:'Electromagnetism Summary',su:'Motor effect, induction, generators, transformers and the grid.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>F=BIL (motor). Fleming LHR. Induction: change flux. Generator: coil in field \u2192 AC. Transformer: Vp/Vs=Np/Ns. Grid: high V, low I, low I\u00b2R loss.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['force','transformer','grid']);if(type==='force'){var B=rnd(1,3)*0.2,I=rnd(2,8),L=rnd(1,5)*0.1;var F=parseFloat((B*I*L).toFixed(3));return{question:'F=BIL: B=<b>'+B+'</b>, I=<b>'+I+'</b>, L=<b>'+L+'</b>.',hints:['F = BIL'],ans:F,tol:F*0.02,unit:'N',working:'F = '+F+' N'};}if(type==='transformer'){var Np=200,Ns=rnd(400,2000),Vp=100,Vs=parseFloat((Vp*Ns/Np).toFixed(0));return{question:'N\u209a=200, N\u209b=<b>'+Ns+'</b>, V\u209a=100 V. Find V\u209b.',hints:['V\u209b = V\u209a\u00d7N\u209b/N\u209a'],ans:Vs,tol:1,unit:'V',working:'V\u209b = 100\u00d7'+Ns+'/200 = '+Vs+' V'};}return{question:'National Grid uses high voltage to: 1=increase current, 2=reduce current and therefore reduce power loss.',hints:['P = I\u00b2R; lower I = less loss'],ans:2,tol:0,unit:'',working:'High V \u2192 low I \u2192 less I\u00b2R loss. Answer: 2.'};})},
]},
];

render();
</script>
