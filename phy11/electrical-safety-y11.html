<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Electrical Safety — Year 11 Physics</title>
<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'UK 3-pin plug','#1565C0',12,'middle',true));
o.push(R(80,50,320,180,'#e3f2fd','#1565C0',2));
if(p>=1){o.push(R(100,80,60,50,'#C0272D','#C0272D',0));o.push(T(130,148,'LIVE\n(brown)','#C0272D',8,'middle',false));}
if(p>=2){o.push(R(210,80,60,50,'#1565C0','#1565C0',0));o.push(T(240,148,'NEUTRAL\n(blue)','#1565C0',8,'middle',false));}
if(p>=3){o.push(R(320,80,60,50,'#2E7D32','#2E7D32',0));o.push(T(350,148,'EARTH\n(green/yellow)','#2E7D32',8,'middle',false));}
if(p>=4){o.push(R(100,200,240,30,'#C8922A','#a07018',2));o.push(T(220,218,'FUSE (in live wire)','#C8922A',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Why earthing and fuses protect us','#1565C0',12,'middle',true));
if(p>=1){o.push(R(10,44,460,56,'#F1F8F1','#1565C0',1.5));o.push(T(240,64,'Fault: live wire touches metal case','#C0272D',10,'middle',false));o.push(T(240,82,'Large current flows to earth \u2192 fuse blows \u2192 circuit breaks','#333',9,'middle',false));}
if(p>=2){o.push(R(10,114,460,56,'#F1F8F1','#1565C0',1.5));o.push(T(240,134,'Without earth: case stays live \u2192 person touching it gets a shock','#C0272D',10,'middle',false));}
if(p>=3){o.push(R(10,184,460,56,'#e8f5e9','#2E7D32',1.5));o.push(T(240,204,'Double insulation: no earth needed (plastic case)','#2E7D32',10,'middle',false));o.push(T(240,222,'RCD: detects current imbalance in <30ms \u2192 safer than fuse','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){dQ2(p);}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ2(p);}
function dQ8(p){dQ1(p);}
function dQ9(p){dQ2(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electrical safety summary','#1565C0',13,'middle',true));
[['Live wire','brown; 230 V AC; dangerous'],['Neutral wire','blue; 0 V; completes circuit'],['Earth wire','green+yellow; safety; 0 V normally'],['Fuse','in live wire; melts if excess current'],['RCD','trips in <30 ms; detects imbalance'],['Double insulation','plastic case \u2192 no earth needed'],['AC frequency','50 Hz in UK; 230 V RMS mains']].forEach(function(r,i){if(i<p+1){o.push(R(10,36+i*30,460,24,'#e3f2fd','#BBDEFB',1));o.push(T(120,52+i*30,r[0],'#1565C0',10,'middle',true));o.push(T(340,52+i*30,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Safety',ti:'The Three-Pin Plug',su:'Describe the wires in a three-pin plug and their functions.',steps:[
  {lb:'Three wires',dr:dQ1,ht:'<p><b>Live (brown):</b> carries the alternating voltage (~230 V). Most dangerous.<br><b>Neutral (blue):</b> completes the circuit, normally at 0 V.<br><b>Earth (green+yellow):</b> safety wire, connected to metal case. Normally no current flows.</p>'},
  {lb:'Fuse position',dr:dQ1,ht:'<p>The fuse is in the <b>live wire</b>. If the fuse were in the neutral wire, the appliance would still be at high voltage even after the fuse blows.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'What colour is the live wire in a UK plug? 1=blue, 2=brown, 3=green/yellow.',a:2,w:'Live = brown. Answer: 2.'},{q:'The earth wire is: 1=blue, 2=brown, 3=green and yellow.',a:3,w:'Earth = green and yellow striped. Answer: 3.'},{q:'The fuse is placed in: 1=the neutral wire, 2=the earth wire, 3=the live wire.',a:3,w:'Fuse must be in live wire to disconnect dangerous voltage. Answer: 3.'}];var qq=pick(qs);return{question:qq.q,hints:['Live: brown. Neutral: blue. Earth: green+yellow.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Safety',ti:'Earthing and Fuses',su:'Explain how earthing and fuses protect against electric shock.',steps:[
  {lb:'How they work together',dr:dQ2,ht:'<p>If a fault makes the metal case live: current flows through the low-resistance earth wire \u2192 large current \u2192 fuse blows \u2192 live wire disconnected. Case is safe again.</p>'},
  {lb:'Without earthing',dr:dQ2,ht:'<p>Without the earth wire: fault current flows through the person instead \u2192 electric shock. The fuse may not blow because the resistance of the person limits the current.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'The purpose of the earth wire is to: 1=increase current, 2=provide a low-resistance path for fault current to blow the fuse.',a:2,w:'Earth wire provides low-R path \u2192 large current \u2192 fuse blows. Answer: 2.'},{q:'A fuse protects by: 1=increasing resistance, 2=melting to break the circuit when current is too high.',a:2,w:'Fuse wire melts \u2192 breaks circuit \u2192 protects from overload. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Earth: low-R path for fault current. Fuse: melts on excess current.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Safety',ti:'RCDs (Residual Current Devices)',su:'Describe how an RCD works and why it is safer than a fuse.',steps:[
  {lb:'RCD',dr:dQ3,ht:'<p>An RCD (residual current device) monitors the current in the live and neutral wires. Normally they should be equal. If they differ (e.g. current flows through a person), the RCD trips and disconnects the circuit in less than <b>30 milliseconds</b> \u2014 fast enough to prevent serious injury.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'An RCD is safer than a fuse because: 1=it can carry more current, 2=it responds much faster (< 30 ms).',a:2,w:'RCD trips in < 30 ms vs fuse which is slower. Answer: 2.'},{q:'An RCD detects a fault when: 1=current in live and neutral wires are different, 2=voltage drops.',a:1,w:'Imbalance between live and neutral = current leaking elsewhere = RCD trips. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['RCD: compares live and neutral currents; trips in <30 ms'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Safety',ti:'Double Insulation',su:'Explain why some appliances do not need an earth wire.',steps:[
  {lb:'Double insulation',dr:dQ4,ht:'<p><b>Double insulated</b> appliances (marked with the square-within-a-square symbol) have a plastic casing. Even if a fault makes the live wire contact the casing, the outer plastic is an insulator \u2014 the user cannot be shocked. No earth wire is needed.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'A plastic-cased hairdryer is double insulated. It needs: 1=an earth wire, 2=no earth wire.',a:2,w:'Double insulation: plastic case = no path for fault current to user. Answer: 2.'},{q:'Double insulation is safe because: 1=plastic case cannot become live and dangerous, 2=plastic conducts electricity well.',a:1,w:'Plastic is an insulator \u2192 cannot give electric shock. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Double insulated: plastic case, no earth needed'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Safety',ti:'AC vs DC',su:'Compare alternating current and direct current.',steps:[
  {lb:'AC and DC',dr:dQ5,ht:'<p><b>DC (direct current):</b> current flows in one direction only. From batteries and cells.<br><b>AC (alternating current):</b> current direction alternates. UK mains: 50 Hz, 230 V (RMS). AC is used for mains because it can be stepped up/down with transformers for efficient transmission.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'UK mains frequency is: 1=50 Hz, 2=60 Hz, 3=100 Hz.',a:1,w:'UK mains = 50 Hz. Answer: 1.'},{q:'AC is used for mains because: 1=it is safer than DC, 2=it can be transformed to high voltage for efficient transmission.',a:2,w:'Transformers only work with AC \u2192 high-voltage transmission possible. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['UK mains: 50 Hz, 230 V AC. AC can be transformed.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Safety',ti:'Choosing the Right Fuse',su:'Select appropriate fuse ratings for appliances.',steps:[
  {lb:'Selecting fuse ratings',dr:dQ6,ht:'<p>Normal operating current I = P/V. Choose the fuse with the next rating above this current (common UK ratings: 3 A, 5 A, 10 A, 13 A). Too small \u2192 blows unnecessarily. Too large \u2192 won\u2019t protect effectively.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var P=rnd(5,30)*100,V=230,I=parseFloat((P/V).toFixed(1));var fuse=I<=3?3:I<=5?5:I<=10?10:13;return{question:'Appliance: <b>'+P+' W</b>, 230 V. Choose correct fuse: 3 A, 5 A, 10 A or 13 A.',hints:['I = P/V; choose next rating above'],ans:fuse,tol:0,unit:'A',working:'I = '+P+'/230 = '+I+' A. Choose '+fuse+' A fuse.'};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Safety',ti:'Electric Shock',su:'Describe the conditions that make electric shock dangerous.',steps:[
  {lb:'Electric shock hazards',dr:dQ7,ht:'<p>Shock is more dangerous when: higher voltage, lower body resistance (wet skin), current through the heart. At 50 mA through the heart: fatal. Dry skin resistance: 100 k\u03a9. Wet skin: as low as 1 k\u03a9.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var R_dry=100000,R_wet=1000,V=230;var I_dry=parseFloat((V/R_dry*1000).toFixed(1)),I_wet=parseFloat((V/R_wet*1000).toFixed(0));return{question:'Dry skin R = 100 k\u03a9, V = 230 V. Find current through body (mA).',hints:['I = V/R; convert to mA (\u00d71000)'],ans:I_dry,tol:0.1,unit:'mA',working:'I = 230/100000 = '+I_dry+' mA (safe). Wet skin: '+I_wet+' mA (dangerous!)'};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Safety',ti:'Power Cables and Resistance',su:'Explain why thick cables are used for high-power appliances.',steps:[
  {lb:'Cable resistance',dr:dQ8,ht:'<p>Thicker cable has lower resistance (more cross-sectional area). High-power appliances carry large currents \u2192 thin cable has high I\u00b2R losses \u2192 cable heats up \u2192 fire risk. Longer cables also have more resistance: R = \u03c1L/A.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var I=rnd(5,15),R=rnd(1,5)*0.1,P=parseFloat((I*I*R).toFixed(1));return{question:'Extension cable: I=<b>'+I+' A</b>, R=<b>'+R+' \u03a9</b>. Power wasted as heat?',hints:['P = I\u00b2R'],ans:P,tol:P*0.02,unit:'W',working:'P = '+I+'\u00b2\u00d7'+R+' = '+P+' W'};})},
]},
{ey:'Q9 \u2022 Y11 Physics \u2022 Safety',ti:'Circuit Breakers',su:'Compare fuses and circuit breakers.',steps:[
  {lb:'Circuit breakers',dr:dQ9,ht:'<p>A circuit breaker (MCB) is an electromagnetic switch that trips when current exceeds the rated value. Advantages over fuse: can be reset (no replacement needed), responds faster, more precise rating. RCDs respond even faster (< 30 ms) and detect much smaller current imbalances.</p>'},
