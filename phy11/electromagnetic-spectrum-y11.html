<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Electromagnetic Spectrum — Year 11 Physics</title>
<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The electromagnetic spectrum','#1565C0',12,'middle',true));
var waves=[['Radio','\u03bb up to km','#6A1B9A'],['Microwave','mm-cm','#1565C0'],['Infrared','0.7\u03bcm-1mm','#C0272D'],['Visible','400-700nm','#C8922A'],['UV','10-400nm','#2E7D32'],['X-ray','0.01-10nm','#E65100'],['Gamma','\u03bb < 0.01nm','#333']];
waves.forEach(function(r,i){if(i<p+2){o.push(R(10+i*66,44,62,50,r[2],r[2],0));o.push(T(41+i*66,74,r[0],r[2]==='\u2019'?'#fff':'#fff',7,'middle',true));o.push(T(41+i*66,88,r[1],'#333',6,'middle',false));}});
if(p>=4){o.push(T(240,130,'All travel at c = 3\u00d710\u2078 m/s in vacuum','#0d47a1',11,'middle',true));o.push(T(240,150,'Increasing frequency \u2192 (left to right above)','#555',9,'middle',false));o.push(T(240,168,'Decreasing wavelength \u2192','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'EM spectrum uses','#1565C0',13,'middle',true));
[['Radio','broadcasting, radar, MRI'],['Microwave','cooking, satellite comm, mobile phones'],['Infrared','remote controls, thermal imaging, optical fibres'],['Visible','sight, photography, optical fibres'],['UV','sterilisation, bank note checking, tanning'],['X-ray','medical imaging, airport security, CT scans'],['Gamma','cancer treatment, sterilising equipment, PET scans']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*30,460,24,'#e3f2fd','#BBDEFB',1));o.push(T(70,54+i*30,r[0],'#1565C0',10,'middle',true));o.push(T(300,54+i*30,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Dangers of EM radiation','#1565C0',12,'middle',true));
[['Microwave','internal heating of body tissue'],['Infrared','skin burns'],['UV','sunburn, skin cancer, eye damage'],['X-ray','ionises cells, cancer, mutations'],['Gamma','ionises cells, cancer, mutations (most dangerous)']].forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*38,460,30,'#fde8e8','#C0272D',1));o.push(T(90,60+i*38,r[0],'#C0272D',10,'middle',true));o.push(T(320,60+i*38,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ5(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'EM spectrum summary','#1565C0',13,'middle',true));
[['All EM waves','travel at c = 3\u00d710\u2078 m/s in vacuum; transverse'],['Order (low\u2192high f)','radio, micro, IR, visible, UV, X-ray, gamma'],['Radio','longest \u03bb, lowest f, lowest energy'],['Gamma','shortest \u03bb, highest f, highest energy; most ionising'],['Ionising','UV, X-ray, gamma can ionise atoms'],['v = f\u03bb','applies to all EM waves; c = f\u03bb in vacuum']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#e3f2fd','#BBDEFB',1));o.push(T(120,55+i*33,r[0],'#1565C0',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 EM Spectrum',ti:'The EM Spectrum',su:'Order the EM waves by frequency and wavelength. State the speed of all EM waves.',steps:[
  {lb:'The spectrum',dr:dQ1,ht:'<p>In order of increasing frequency (decreasing wavelength): radio \u2192 microwave \u2192 infrared \u2192 visible \u2192 ultraviolet \u2192 X-ray \u2192 gamma.</p><p>All EM waves travel at c = 3\u00d710\u2078 m/s in a vacuum. All are transverse.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Which EM wave has the longest wavelength? 1=gamma, 2=radio, 3=X-ray.',a:2,w:'Radio waves have the longest wavelength. Answer: 2.'},{q:'Which EM wave has the highest frequency? 1=radio, 2=infrared, 3=gamma.',a:3,w:'Gamma rays have the highest frequency. Answer: 3.'},{q:'All EM waves travel at the same speed in vacuum: 1=true, 2=false.',a:1,w:'All EM waves travel at c = 3\u00d710\u2078 m/s. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Radio: longest \u03bb, lowest f. Gamma: shortest \u03bb, highest f.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 EM Spectrum',ti:'Uses of EM Waves',su:'Match each region of the EM spectrum to its uses.',steps:[
  {lb:'Applications',dr:dQ2,ht:'<p>Radio: broadcasting, MRI. Microwave: cooking, satellite. IR: remote controls, thermal imaging. Visible: sight, cameras. UV: sterilisation, fluorescence. X-ray: medical imaging. Gamma: cancer treatment, sterilisation.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Which EM wave is used in microwave ovens? 1=infrared, 2=microwave, 3=radio.',a:2,w:'Microwaves heat food by causing water molecules to vibrate. Answer: 2.'},{q:'Which EM wave is used in medical X-rays? 1=UV, 2=gamma, 3=X-ray.',a:3,w:'X-rays pass through soft tissue but are absorbed by bone. Answer: 3.'},{q:'Gamma rays are used to: 1=broadcast TV, 2=sterilise medical equipment and treat cancer.',a:2,w:'Gamma rays kill bacteria and cancer cells. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Match wave to application'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 EM Spectrum',ti:'EM Wave Calculations',su:'Apply v = f\u03bb using c = 3\u00d710\u2078 m/s for EM waves.',steps:[
  {lb:'c = f\u03bb',dr:dQ3,ht:'<div class="fm">c = f \u00d7 \u03bb &nbsp;&nbsp;&nbsp; c = 3 \u00d7 10\u2078 m/s</div><p>All EM waves: same speed in vacuum. f = c/\u03bb, \u03bb = c/f.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var type=pick(['f_from_lam','lam_from_f']);var lam=pick([0.001,0.01,500e-9,100e-9,0.1,0.03]);var f=parseFloat((3e8/lam).toFixed(0));var lam_str=lam<1e-6?(lam*1e9).toFixed(0)+' nm':lam<0.001?(lam*100).toFixed(1)+' cm':lam+' m';if(type==='f_from_lam')return{question:'\u03bb = <b>'+lam_str+'</b>. Find frequency. (c=3\u00d710\u2078)',hints:['f = c/\u03bb'],ans:f,tol:f*0.02,unit:'Hz',working:'f = 3\u00d710\u2078/'+lam+' = '+f.toExponential(2)+' Hz'};var lam2=parseFloat((3e8/f).toFixed(10));return{question:'f = <b>'+f.toExponential(2)+' Hz</b>. Find \u03bb. (c=3\u00d710\u2078)',hints:['\u03bb = c/f'],ans:lam,tol:lam*0.02,unit:'m',working:'\u03bb = 3\u00d710\u2078/'+f.toExponential(2)+' = '+lam+' m'};})}
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 EM Spectrum',ti:'Dangers of EM Radiation',su:'Describe the hazards of UV, X-ray and gamma radiation.',steps:[
  {lb:'Ionising radiation',dr:dQ4,ht:'<p>Higher frequency EM waves carry more energy per photon. UV, X-rays and gamma rays are <b>ionising</b> \u2014 they can remove electrons from atoms, damaging DNA and causing cancer/mutations. Gamma is most dangerous.</p>'},
  {lb:'Protection',dr:dQ4,ht:'<p>UV: sunscreen, UV-blocking glass. X-ray: lead shielding, minimise exposure time. Gamma: thick lead or concrete shielding, distance, time limits for workers.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Which EM radiation causes sunburn? 1=infrared, 2=UV, 3=radio.',a:2,w:'UV radiation causes sunburn and skin cancer. Answer: 2.'},{q:'Which is most effective at shielding gamma rays? 1=paper, 2=aluminium, 3=thick lead/concrete.',a:3,w:'Gamma rays require thick lead or concrete shielding. Answer: 3.'},{q:'X-rays and gamma rays are dangerous because they: 1=heat tissue, 2=ionise atoms and damage DNA.',a:2,w:'Ionising radiation removes electrons from atoms, damaging DNA. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['UV, X, gamma are ionising. Gamma most penetrating.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 EM Spectrum',ti:'Radio Waves and Communication',su:'Explain how radio and microwaves are used in communication.',steps:[
  {lb:'Radio waves',dr:dQ5,ht:'<p>Long-wave radio: diffracts around Earth\u2019s surface. Short-wave radio: reflects off ionosphere \u2192 long-range. FM/TV (VHF/UHF): line-of-sight. Microwaves: used for satellite communication and mobile phones; pass through atmosphere easily.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Why can long-wave radio signals be received around the world? 1=they travel faster, 2=they diffract around the Earth\'s surface.',a:2,w:'Long wavelength \u2192 diffraction around large obstacles (Earth\'s surface). Answer: 2.'},{q:'Microwaves are used for satellite communication because: 1=they reflect off the ionosphere, 2=they pass easily through the atmosphere.',a:2,w:'Microwaves penetrate the atmosphere \u2192 reach satellites. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Long wave: diffraction. Microwaves: pass through atmosphere.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 EM Spectrum',ti:'Infrared Radiation',su:'Describe emission, absorption and uses of infrared.',steps:[
  {lb:'Infrared',dr:dQ6,ht:'<p>All objects above 0 K emit infrared radiation. Hotter objects emit more IR and at shorter wavelengths. Dark matt surfaces: best emitters and absorbers. IR uses: thermal cameras, remote controls, optical fibre communications, heating.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'Which surface emits most infrared? 1=shiny silver, 2=dark matt black.',a:2,w:'Dark matt black: best IR emitter. Answer: 2.'},{q:'A remote control uses: 1=radio waves, 2=infrared.',a:2,w:'TV remote controls use infrared pulses. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Dark matt: best IR emitter/absorber. Remote: infrared.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 EM Spectrum',ti:'X-rays and Gamma Rays',su:'Compare X-rays and gamma rays in terms of origin, properties and uses.',steps:[
  {lb:'X-rays vs gamma',dr:dQ7,ht:'<p><b>X-rays:</b> produced by firing electrons at a metal target (deceleration). Used in: medical imaging, airport security, CT scans. <b>Gamma rays:</b> produced by nuclear decay (radioactive nuclei). Used in: cancer treatment (radiotherapy), sterilisation of medical equipment, PET scans.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Gamma rays originate from: 1=electron deceleration, 2=nuclear decay.',a:2,w:'Gamma rays are emitted by radioactive nuclei. Answer: 2.'},{q:'X-rays are used in medical imaging because: 1=they pass through soft tissue but are absorbed by bone, 2=they heat tissue.',a:1,w:'X-rays absorbed by dense bone \u2192 shadow image. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Gamma: nuclear decay. X-rays: electron deceleration. Both ionising.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 EM Spectrum',ti:'UV Radiation',su:'Describe the effects and uses of ultraviolet radiation.',steps:[
  {lb:'UV radiation',dr:dQ8,ht:'<p>UV is just beyond visible light (higher frequency than violet). Effects: sunburn, skin cancer, eye damage, vitamin D production in skin. Uses: sterilisation (kills bacteria), detecting forged bank notes (fluorescence), tanning lamps.</p>'},
