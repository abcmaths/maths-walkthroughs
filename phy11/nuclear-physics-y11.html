<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The nucleus and radioactive decay','#1565C0',12,'middle',true));
o.push(circ(240,130,50,'#e3f2fd','#1565C0'));o.push(T(240,130,'nucleus','#1565C0',9,'middle',false));
if(p>=1){[['alpha \u03b1','2p+2n, He-4 nucleus, charge +2','#C0272D',100,80],['beta \u03b2\u207b','fast electron, charge -1','#2E7D32',390,80],['gamma \u03b3','EM radiation, no charge, no mass','#6A1B9A',240,220]].forEach(function(r){o.push(arw(240,130,r[3],r[4],r[2],2));o.push(T(r[3],r[4]<130?r[4]-12:r[4]+12,r[0],r[2],8,'middle',false));});}
if(p>=2){o.push(T(240,22,'','#1565C0',13,'middle',false));
[['Alpha (A-4, Z-2)','Beta (A, Z+1)','Gamma (no change)']].forEach(function(r){r.forEach(function(v,i){o.push(T(80+i*160,242,v,'#555',7,'middle',false));});});}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Properties of radiation','#1565C0',13,'middle',true));
[['Type','Charge','Mass','Range in air','Stopped by'],['Alpha (\u03b1)','  +2','~4 u','few cm','paper/skin'],['Beta (\u03b2)','  \u22121','\u22480','~1 m','3mm aluminium'],['Gamma (\u03b3)','  0','0','km','thick lead/concrete']].forEach(function(r,i){var fill=i===0?'#0d47a1':i===1?'#C0272D':i===2?'#2E7D32':'#6A1B9A';if(i<p+2){o.push(R(10,38+i*38,460,30,'#e3f2fd','#BBDEFB',1));r.forEach(function(v,j){o.push(T(46+j*88,58+i*38,v,i===0?'#fff':fill,i===0?9:8,'middle',i===0));});}});
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Half-life','#1565C0',12,'middle',true));
o.push(L(48,220,48,22,'#333',2));o.push(L(48,220,450,220,'#333',2));
o.push(T(254,238,'time (t\u00bd units)','#333',9,'middle',false));o.push(T(25,130,'Activity / count','#333',9,'middle',false));
var pts=[[48,38]];for(var i=1;i<8;i++)pts.push([48+i*56,38+182*(1-Math.pow(0.5,i))]);
for(var i=0;i<pts.length-1;i++)o.push(L(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1],'#1565C0',2.5));
if(p>=1){o.push(L(48,38,104,38,'#C0272D',1.5,'4,3'));o.push(L(104,38,104,220,'#C0272D',1.5,'4,3'));o.push(T(76,30,'N\u2080','#C0272D',8,'middle',false));
o.push(L(48,119,104,119,'#2E7D32',1.5,'4,3'));o.push(L(48,119,48,119,'#2E7D32',1.5,'4,3'));o.push(T(20,119,'N\u2080/2','#2E7D32',8,'middle',false));}
if(p>=2){o.push(T(240,252,'After n half-lives: N = N\u2080 \u00d7 (1/2)^n','#0d47a1',10,'middle',true));}
s.innerHTML=o.join('');}
function dQ4(p){dQ1(p);}
function dQ5(p){dQ2(p);}
function dQ6(p){dQ3(p);}
function dQ7(p){dQ1(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ3(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Nuclear physics summary','#1565C0',13,'middle',true));
[['Alpha (\u03b1)','He-4 nucleus; +2; stopped by paper; range few cm'],['Beta (\u03b2\u207b)','electron; -1; stopped by 3 mm Al; range ~1 m'],['Gamma (\u03b3)','EM wave; 0 charge; stopped by thick lead; km range'],['Half-life','time for activity to halve; N=N\u2080\u00d7(1/2)^n'],['Background','cosmic rays, radon gas, medical, nuclear industry'],['Nuclear equation','A and Z both conserved in all decay equations']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#e3f2fd','#BBDEFB',1));o.push(T(100,55+i*33,r[0],'#1565C0',10,'middle',true));o.push(T(330,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Nuclear',ti:'Radioactive Decay',su:'Describe alpha, beta and gamma decay. Write decay equations.',steps:[
  {lb:'Three types of decay',dr:dQ1,ht:'<p><b>Alpha (\u03b1):</b> emits He-4 nucleus (2p, 2n). A decreases by 4, Z decreases by 2.<br><b>Beta-minus (\u03b2\u207b):</b> neutron \u2192 proton + electron + antineutrino. A unchanged, Z increases by 1.<br><b>Gamma (\u03b3):</b> high-energy EM radiation emitted. A and Z unchanged.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var type=pick(['alpha_A','alpha_Z','beta_Z']);if(type==='alpha_A'){var A=rnd(200,240),Z=rnd(80,95);return{question:'Alpha decay of nucleus (A=<b>'+A+'</b>, Z=<b>'+Z+'</b>). New mass number A?',hints:['Alpha: A decreases by 4'],ans:A-4,tol:0,unit:'',working:'A\u2081 = '+A+' - 4 = '+(A-4)};}if(type==='alpha_Z'){var A2=rnd(200,240),Z2=rnd(80,95);return{question:'Alpha decay of nucleus (A=<b>'+A2+'</b>, Z=<b>'+Z2+'</b>). New atomic number Z?',hints:['Alpha: Z decreases by 2'],ans:Z2-2,tol:0,unit:'',working:'Z\u2081 = '+Z2+' - 2 = '+(Z2-2)};}var A3=rnd(100,200),Z3=rnd(30,80);return{question:'Beta-minus decay of nucleus (A=<b>'+A3+'</b>, Z=<b>'+Z3+'</b>). New Z?',hints:['Beta-minus: Z increases by 1, A unchanged'],ans:Z3+1,tol:0,unit:'',working:'Z\u2081 = '+Z3+' + 1 = '+(Z3+1)};})}
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Nuclear',ti:'Properties of Alpha, Beta and Gamma',su:'Compare penetration, ionisation and range of the three radiations.',steps:[
  {lb:'Comparison',dr:dQ2,ht:'<p>Alpha: most ionising, least penetrating (stopped by paper/few cm air). Beta: moderate (stopped by 3 mm aluminium). Gamma: least ionising, most penetrating (reduced by thick lead/concrete). Charge: \u03b1=+2, \u03b2\u207b=-1, \u03b3=0.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Which radiation is stopped by a sheet of paper? 1=alpha, 2=beta, 3=gamma.',a:1,w:'Alpha has very short range and is stopped by paper. Answer: 1.'},{q:'Which radiation is most ionising? 1=alpha, 2=beta, 3=gamma.',a:1,w:'Alpha is the most ionising (large, slow, charged). Answer: 1.'},{q:'3 mm of aluminium stops: 1=alpha only, 2=beta particles.',a:2,w:'3 mm Al stops beta; alpha is stopped by paper alone; gamma needs lead. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['\u03b1: paper. \u03b2: 3mm Al. \u03b3: thick lead.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Nuclear',ti:'Half-Life',su:'Define half-life. Calculate remaining activity or number of half-lives.',steps:[
  {lb:'Half-life',dr:dQ3,ht:'<p><b>Half-life (t\u00bd):</b> the time for the activity (or number of undecayed nuclei) to fall to half its initial value. Radioactive decay is random and spontaneous.</p><div class="fm">N = N\u2080 \u00d7 (1/2)\u207f</div><p>n = number of half-lives elapsed = t / t\u00bd.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var N0=rnd(4,16)*100,n=rnd(1,5),N=N0*Math.pow(0.5,n);var t_half=rnd(2,20),t=n*t_half;var type=pick(['N_from_n','n_from_t','N_from_t']);if(type==='N_from_n')return{question:'N\u2080=<b>'+N0+'</b>, after <b>'+n+'</b> half-lives. Find N.',hints:['N = N\u2080\u00d7(1/2)^n'],ans:N,tol:N*0.01,unit:'',working:'N = '+N0+'\u00d7(1/2)^'+n+' = '+N};if(type==='n_from_t')return{question:'t\u00bd = <b>'+t_half+' s</b>, total time = <b>'+t+' s</b>. How many half-lives?',hints:['n = t/t\u00bd'],ans:n,tol:0,unit:'',working:'n = '+t+'/'+t_half+' = '+n};var N2=N0*Math.pow(0.5,n);return{question:'N\u2080=<b>'+N0+'</b>, t\u00bd=<b>'+t_half+' s</b>, t=<b>'+t+' s</b>. Find N.',hints:['n = t/t\u00bd, then N = N\u2080\u00d7(1/2)^n'],ans:N2,tol:N2*0.01,unit:'',working:'n='+n+'. N = '+N0+'\u00d7(1/2)^'+n+' = '+N2};})}
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Nuclear',ti:'Background Radiation',su:'Describe sources of background radiation.',steps:[
  {lb:'Background radiation',dr:dQ4,ht:'<p>Background radiation is always present from: radon gas (largest natural source, from rocks), cosmic rays, rocks/soil, food and drink, medical (X-rays, nuclear medicine), nuclear industry. Measurements must subtract background count.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'The largest natural source of background radiation in the UK is: 1=cosmic rays, 2=radon gas from rocks.',a:2,w:'Radon gas is the largest source of background radiation. Answer: 2.'},{q:'To find the count rate from a source alone: 1=add background, 2=subtract background count rate.',a:2,w:'Corrected count = measured count - background. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Radon: biggest natural source. Always subtract background.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Nuclear',ti:'Uses and Hazards of Radioactivity',su:'Describe uses of radioisotopes and safety precautions.',steps:[
  {lb:'Uses',dr:dQ5,ht:'<p>Alpha: smoke detectors (Am-241). Beta: thickness gauges (paper/foil). Gamma: cancer treatment (radiotherapy), sterilising medical equipment, tracers. Carbon-14: radiocarbon dating. All: nuclear power stations.</p>'},
  {lb:'Safety precautions',dr:dQ5,ht:'<p>Never point sources at people. Handle with long tongs. Lead-lined containers for storage. Minimise exposure time. Dosimeters to monitor dose. Gamma: stay behind lead/concrete shields.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Smoke detectors use alpha radiation because: 1=it ionises air between plates, allowing current; smoke absorbs alpha and breaks circuit, 2=it penetrates through the whole detector.',a:1,w:'Alpha ionises air \u2192 current flows. Smoke absorbs alpha \u2192 no ionisation \u2192 alarm. Answer: 1.'},{q:'Gamma is used in cancer radiotherapy because: 1=it can penetrate deep into tissue to kill cancer cells, 2=it is stopped by skin.',a:1,w:'Gamma penetrates deep to reach tumours. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Match radiation type to use based on properties'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Nuclear',ti:'Nuclear Fission',su:'Describe nuclear fission and how it is used in nuclear reactors.',steps:[
  {lb:'Nuclear fission',dr:dQ6,ht:'<p><b>Fission:</b> a large nucleus (e.g. U-235) absorbs a neutron and splits into two smaller nuclei + more neutrons + energy. The extra neutrons trigger more fissions \u2014 a <b>chain reaction</b>. In a reactor, control rods (boron) absorb excess neutrons to control the rate.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'In a nuclear reactor, control rods: 1=slow down neutrons, 2=absorb neutrons to control the chain reaction.',a:2,w:'Control rods absorb neutrons \u2192 regulate rate of fission. Answer: 2.'},{q:'Nuclear fission of U-235 requires: 1=a proton to be absorbed, 2=a neutron to be absorbed.',a:2,w:'U-235 absorbs a slow neutron \u2192 becomes unstable \u2192 splits. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Fission: neutron absorbed, nucleus splits, more neutrons released'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Nuclear',ti:'Nuclear Fusion',su:'Describe nuclear fusion and why it is difficult to achieve.',steps:[
  {lb:'Nuclear fusion',dr:dQ7,ht:'<p><b>Fusion:</b> two light nuclei combine to form a heavier nucleus + release a large amount of energy. Example: H-2 + H-3 \u2192 He-4 + neutron. The Sun\u2019s energy comes from fusion. Very difficult to achieve on Earth \u2014 requires extremely high temperature and pressure to overcome electrostatic repulsion.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Nuclear fusion is difficult on Earth because: 1=it requires extremely high temperature/pressure, 2=the nuclei are too heavy.',a:1,w:'High T needed to give nuclei enough energy to overcome repulsion. Answer: 1.'},{q:'In nuclear fusion, energy comes from: 1=breaking apart atoms, 2=combining light nuclei.',a:2,w:'Fusion: light nuclei combine \u2192 mass defect \u2192 energy released. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Fusion: combine light nuclei; needs extreme T and P'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Nuclear',ti:'Half-Life Calculations',su:'Multi-step half-life problems including corrected count rates.',steps:[
  {lb:'Half-life calculations',dr:dQ8,ht:'<p>Always subtract background first. N = N\u2080\u00d7(1/2)^n. Find t\u00bd from a graph: time for activity to halve.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var background=rnd(10,30),N0_corrected=rnd(400,1600),n=rnd(1,4),t_half=rnd(2,10);var N_corrected=N0_corrected*Math.pow(0.5,n);var N_measured=N_corrected+background;var type=pick(['find_N','find_n']);if(type==='find_N'){return{question:'N\u2080(corrected)=<b>'+N0_corrected+'</b>, t\u00bd=<b>'+t_half+' s</b>, n=<b>'+n+'</b> half-lives. Corrected count?',hints:['N = N\u2080\u00d7(1/2)^n'],ans:N_corrected,tol:N_corrected*0.01,unit:'',working:'N = '+N0_corrected+'\u00d7(1/2)^'+n+' = '+N_corrected};}return{question:'Measured count = <b>'+N_measured+'</b>, background = <b>'+background+'</b>. Corrected count?',hints:['Corrected = measured - background'],ans:N_corrected,tol:0,unit:'',working:'Corrected = '+N_measured+' - '+background+' = '+N_corrected};})}
]},
{ey:'Q9 \u2022 Y11 Physics \u2022 Nuclear',ti:'Nuclear Equations',su:'Balance nuclear decay equations. Conserve A and Z.',steps:[
  {lb:'Balancing equations',dr:dQ9,ht:'<p>In all nuclear reactions: mass number A is conserved; atomic number Z is conserved. Alpha: loses \u2074He (A-4, Z-2). Beta-minus: gains proton (A same, Z+1). Gamma: no change.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var type=pick(['alpha_A','alpha_Z','beta_Z']);if(type==='alpha_A'){var A=rnd(200,240),Z=rnd(80,95);return{question:'\u00b2\u00b9\u2077Ra undergoes alpha decay. New A if A\u2080=<b>'+A+'</b>?',hints:['\u03b1: A decreases by 4'],ans:A-4,tol:0,unit:'',working:'A\u2081 = '+A+' - 4 = '+(A-4)};}if(type==='alpha_Z'){var A2=rnd(200,240),Z2=rnd(80,95);return{question:'Alpha decay from (A='+A2+', Z=<b>'+Z2+'</b>). New Z?',hints:['\u03b1: Z decreases by 2'],ans:Z2-2,tol:0,unit:'',working:'Z\u2081 = '+Z2+' - 2 = '+(Z2-2)};}var A3=rnd(100,180),Z3=rnd(30,70);return{question:'Beta-minus decay (Z=<b>'+Z3+'</b>). New Z?',hints:['\u03b2\u207b: Z increases by 1'],ans:Z3+1,tol:0,unit:'',working:'Z\u2081 = '+Z3+'+1 = '+(Z3+1)};})}
]},
{ey:'Q10 \u2022 Y11 Physics \u2022 Nuclear',ti:'Mixed Nuclear Physics',su:'Decay types, half-life, fission and fusion combined.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>\u03b1: A-4,Z-2; paper. \u03b2: A same, Z+1; Al. \u03b3: no change; lead. Half-life: N=N\u2080\u00d7(1/2)^n. Fission: heavy nucleus splits. Fusion: light nuclei join.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['decay','halflife','fission']);if(type==='decay'){var qs=[{q:'Alpha decay: nucleus A decreases by: 1=2, 2=4.',a:2,w:'Alpha particle = He-4: A decreases by 4. Answer: 2.'},{q:'Beta-minus: atomic number Z: 1=decreases by 1, 2=increases by 1.',a:2,w:'Beta-minus: neutron\u2192proton: Z increases by 1. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['\u03b1: A-4, Z-2. \u03b2\u207b: A same, Z+1.'],ans:qq.a,tol:0,unit:'',working:qq.w};}if(type==='halflife'){var N0=rnd(4,16)*100,n=rnd(1,4),N=N0*Math.pow(0.5,n);return{question:'N\u2080=<b>'+N0+'</b>, after <b>'+n+'</b> half-lives. Find N.',hints:['N = N\u2080\u00d7(1/2)^n'],ans:N,tol:N*0.01,unit:'',working:'N = '+N0+'\u00d7(1/2)^'+n+' = '+N};}return{question:'Nuclear fission produces energy by: 1=combining light nuclei, 2=splitting heavy nuclei.',hints:['Fission = splitting. Fusion = combining.'],ans:2,tol:0,unit:'',working:'Fission splits heavy nuclei (e.g. U-235). Answer: 2.'};})},
]},
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
