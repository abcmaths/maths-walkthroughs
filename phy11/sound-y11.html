<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sound — Year 11 Physics</title>
<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Sound as a longitudinal wave','#1565C0',12,'middle',true));
for(var i=0;i<480;i++){var compress=0.5+0.5*Math.sin(i*0.055);o.push(L(i,22,i,258,'rgba(21,101,192,'+compress.toFixed(2)+')',1));}
if(p>=1){o.push(R(40,88,100,84,'#e3f2fd','#1565C0',1.5));o.push(T(90,88,'compression','#1565C0',7,'middle',false));
o.push(R(240,88,100,84,'#fff','#1565C0',1.5));o.push(T(290,88,'rarefaction','#555',7,'middle',false));}
if(p>=2){o.push(T(240,220,'Sound cannot travel through vacuum (needs medium)','#555',9,'middle',false));o.push(T(240,238,'v\u209b\u2092\u2097\u1d35\u1d30 \u2248 340 m/s; v\u209f\u2091\u2090\u209c\u2091\u1d3f \u2248 1500 m/s','#1565C0',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Pitch and loudness','#1565C0',12,'middle',true));
o.push(T(120,50,'HIGH PITCH','#1565C0',10,'middle',true));
for(var i=0;i<240;i++)o.push(L(i,90+20*Math.sin(i*0.22),i+1,90+20*Math.sin((i+1)*0.22),'#1565C0',1.5));
o.push(T(360,50,'LOW PITCH','#2E7D32',10,'middle',true));
for(var i=0;i<240;i++)o.push(L(240+i,90+20*Math.sin(i*0.08),241+i,90+20*Math.sin((i+1)*0.08),'#2E7D32',1.5));
if(p>=1){o.push(T(120,160,'LOUD','#C0272D',10,'middle',true));
for(var i=0;i<240;i++)o.push(L(i,200+40*Math.sin(i*0.15),i+1,200+40*Math.sin((i+1)*0.15),'#C0272D',1.5));
o.push(T(360,160,'QUIET','#aaa',10,'middle',true));
for(var i=0;i<240;i++)o.push(L(240+i,200+8*Math.sin(i*0.15),241+i,200+8*Math.sin((i+1)*0.15),'#aaa',1.5));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Speed of sound calculations','#1565C0',12,'middle',true));
o.push(R(80,40,320,56,'#e3f2fd','#1565C0',2));o.push(T(240,62,'v = f \u00d7 \u03bb','#0d47a1',18,'middle',true));o.push(T(240,80,'v \u2248 340 m/s in air','#555',9,'middle',false));
if(p>=1){o.push(R(40,102,400,44,'#e3f2fd','#1565C0',1.5));o.push(T(240,120,'Echo: d = v \u00d7 t / 2','#0d47a1',13,'middle',true));o.push(T(240,138,'(sound travels there AND back)','#555',9,'middle',false));}
if(p>=2){o.push(R(40,154,400,56,'#fff','#ccc',1));o.push(T(240,174,'Echo heard 0.6 s later: d = 340\u00d70.6/2 = 102 m','#333',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Ultrasound','#1565C0',12,'middle',true));
o.push(T(240,50,'Frequency > 20 000 Hz (above human hearing)','#555',9,'middle',false));
[['Medical scanning','baby scans, detecting tumours'],['SONAR','measuring sea depth, detecting submarines'],['Industrial','detecting cracks in metals (non-destructive)'],['Cleaning','ultrasonic cleaning baths']].forEach(function(r,i){if(i<p+1){o.push(R(10,70+i*42,460,34,'#e3f2fd','#BBDEFB',1));o.push(T(120,90+i*42,r[0],'#1565C0',10,'middle',true));o.push(T(340,90+i*42,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
function dQ5(p){dQ1(p);}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Sound summary','#1565C0',13,'middle',true));
[['Longitudinal wave','compressions + rarefactions parallel to travel'],['Speed in air','\u2248340 m/s; faster in liquids and solids'],['Pitch','determined by frequency'],['Loudness','determined by amplitude'],['Echo','d = v\u00d7t/2'],['Ultrasound','f > 20 000 Hz; medical, SONAR, industrial'],['Range of hearing','20 Hz \u2013 20 000 Hz (humans)']].forEach(function(r,i){if(i<p+1){o.push(R(10,36+i*30,460,24,'#e3f2fd','#BBDEFB',1));o.push(T(120,52+i*30,r[0],'#1565C0',10,'middle',true));o.push(T(340,52+i*30,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Sound',ti:'Sound as a Longitudinal Wave',su:'Describe how sound travels. Explain compressions and rarefactions.',steps:[
  {lb:'How sound travels',dr:dQ1,ht:'<p>Sound is a <b>longitudinal mechanical wave</b>. Vibrating objects create alternating regions of high pressure (<b>compressions</b>) and low pressure (<b>rarefactions</b>) in the medium. These travel outward as a wave.</p><p>Sound requires a medium \u2014 it cannot travel through a vacuum.</p>'},
  {lb:'Speed in different media',dr:dQ1,ht:'<p>Sound travels faster in denser, stiffer media: air \u2248 340 m/s, water \u2248 1500 m/s, steel \u2248 5000 m/s. Speed increases with temperature.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Sound cannot travel through: 1=water, 2=vacuum, 3=steel.',a:2,w:'Sound requires a medium \u2014 cannot travel through vacuum. Answer: 2.'},{q:'Sound travels fastest through: 1=air, 2=water, 3=steel.',a:3,w:'Steel (solid, stiff) \u2192 fastest sound. Answer: 3.'}];var qq=pick(qs);return{question:qq.q,hints:['Sound: longitudinal, needs medium. Faster in denser/stiffer.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Sound',ti:'Pitch and Loudness',su:'Relate pitch to frequency and loudness to amplitude.',steps:[
  {lb:'Pitch and loudness',dr:dQ2,ht:'<p><b>Pitch:</b> determined by frequency. Higher frequency = higher pitch. <b>Loudness:</b> determined by amplitude. Larger amplitude = louder sound (more energy).<br>Human hearing range: 20 Hz to 20 000 Hz.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'A louder sound has: 1=higher frequency, 2=greater amplitude.',a:2,w:'Loudness = amplitude. Louder = larger amplitude. Answer: 2.'},{q:'A higher-pitched sound has: 1=higher frequency, 2=greater amplitude.',a:1,w:'Pitch = frequency. Higher pitch = higher frequency. Answer: 1.'},{q:'Human hearing range is approximately: 1=0-1000 Hz, 2=20-20000 Hz.',a:2,w:'Humans hear 20 Hz to 20 kHz. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Pitch = frequency. Loudness = amplitude.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Sound',ti:'Speed of Sound and Echoes',su:'Calculate distances using echoes. Apply v = d/t.',steps:[
  {lb:'Echo calculations',dr:dQ3,ht:'<p>An echo is a reflected sound wave. Sound travels to the reflecting surface and back.</p><div class="fm">d = v \u00d7 t / 2</div><p>v = 340 m/s in air. The factor of 2 accounts for the return journey.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var type=pick(['echo_d','echo_t','v_fl']);if(type==='echo_d'){var t=rnd(2,20)*0.1,d=parseFloat((340*t/2).toFixed(1));return{question:'Echo returns after <b>'+t.toFixed(1)+' s</b>. v=340 m/s. Find distance to wall.',hints:['d = v\u00d7t/2'],ans:d,tol:1,unit:'m',working:'d = 340\u00d7'+t.toFixed(1)+'/2 = '+d+' m'};}if(type==='echo_t'){var d2=rnd(50,500),t2=parseFloat((2*d2/340).toFixed(2));return{question:'Wall is <b>'+d2+' m</b> away. v=340 m/s. How long until echo returns?',hints:['t = 2d/v'],ans:t2,tol:0.02,unit:'s',working:'t = 2\u00d7'+d2+'/340 = '+t2+' s'};}var f=rnd(200,2000),lam=parseFloat((340/f).toFixed(3));return{question:'f = <b>'+f+' Hz</b>, v=340 m/s. Find wavelength of sound.',hints:['\u03bb = v/f'],ans:lam,tol:lam*0.02,unit:'m',working:'\u03bb = 340/'+f+' = '+lam+' m'};})}
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Sound',ti:'Ultrasound',su:'Define ultrasound. Describe its uses in medicine and industry.',steps:[
  {lb:'Ultrasound',dr:dQ4,ht:'<p>Ultrasound: frequencies above 20 000 Hz (above human hearing). Ultrasound pulses are emitted and the time for reflections to return is measured \u2192 distance calculated. Safe (non-ionising), can penetrate tissue, reflects at boundaries between tissues.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Ultrasound frequencies are: 1=below 20 Hz, 2=above 20 000 Hz.',a:2,w:'Ultrasound: f > 20 000 Hz. Answer: 2.'},{q:'Ultrasound is preferred for baby scans over X-rays because: 1=it is cheaper, 2=it is non-ionising and safe for soft tissue.',a:2,w:'Ultrasound is non-ionising \u2192 safe for use on babies. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Ultrasound: f > 20 kHz, non-ionising, safe'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Sound',ti:'Ultrasound Calculations',su:'Calculate depth/distance using ultrasound pulse timing.',steps:[
  {lb:'SONAR calculation',dr:dQ5,ht:'<p>Same principle as echo: ultrasound pulse travels to boundary, reflects back.</p><div class="fm">d = v \u00d7 t / 2</div><p>v in tissue \u2248 1500 m/s. Time is measured from transmission to reception.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var v=pick([1500,340,5000]),t=rnd(2,20)*0.0001,d=parseFloat((v*t/2).toFixed(3));return{question:'Ultrasound pulse returns after <b>'+t.toFixed(4)+' s</b>. v=<b>'+v+' m/s</b>. Find depth.',hints:['d = v\u00d7t/2'],ans:d,tol:d*0.02,unit:'m',working:'d = '+v+'\u00d7'+t.toFixed(4)+'/2 = '+d+' m'};})},
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Sound',ti:'The Oscilloscope',su:'Interpret oscilloscope traces for sound waves.',steps:[
  {lb:'Reading oscilloscope traces',dr:dQ6,ht:'<p>An oscilloscope displays sound as a transverse wave pattern (voltage vs time). <b>Amplitude</b> = height of wave on screen. <b>Period</b> = width of one complete cycle \u00d7 time/div setting. <b>Frequency</b> = 1/T.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var divPerCycle=rnd(2,5),timePerDiv=pick([0.001,0.002,0.0005,0.005]);var T=divPerCycle*timePerDiv,f=parseFloat((1/T).toFixed(1));return{question:'Oscilloscope: 1 cycle takes <b>'+divPerCycle+' divisions</b>, time/div = <b>'+timePerDiv+' s</b>. Find frequency.',hints:['T = divs \u00d7 time/div, then f = 1/T'],ans:f,tol:f*0.02,unit:'Hz',working:'T = '+divPerCycle+'\u00d7'+timePerDiv+' = '+T+' s. f = 1/'+T+' = '+f+' Hz'};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Sound',ti:'Sound and Resonance',su:'Describe resonance and how it affects sound production.',steps:[
  {lb:'Resonance',dr:dQ7,ht:'<p>Resonance occurs when a system vibrates at its natural frequency due to a driving force at the same frequency. Energy is transferred efficiently. Applications: musical instruments, radio tuning. Can cause structural damage if frequency matches natural frequency of a structure.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Resonance occurs when the driving frequency equals the: 1=amplitude, 2=natural frequency of the system.',a:2,w:'Resonance: driving frequency = natural frequency. Answer: 2.'},{q:'A tuning fork causes resonance in a glass when: 1=the fork is louder than the glass, 2=the fork vibrates at the same frequency as the glass.',a:2,w:'Resonance when frequencies match. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Resonance: driving frequency = natural frequency'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Sound',ti:'Noise and Hearing',su:'Describe sound intensity and its effects on hearing.',steps:[
  {lb:'Sound intensity and decibels',dr:dQ8,ht:'<p>Sound intensity is measured in decibels (dB). 0 dB = threshold of hearing. 60 dB = normal conversation. 85+ dB = hearing damage over time. 120+ dB = pain threshold.</p><p>Noise-cancelling headphones generate an anti-phase wave to cancel noise.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var qs=[{q:'Prolonged exposure to sounds above about 85 dB can cause: 1=improved hearing, 2=permanent hearing damage.',a:2,w:'85+ dB over time damages hair cells in cochlea. Answer: 2.'},{q:'Normal conversation is approximately: 1=20 dB, 2=60 dB, 3=120 dB.',a:2,w:'Normal conversation \u2248 60 dB. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['85+ dB: hearing damage risk. 60 dB: normal conversation.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q9 \u2022 Y11 Physics \u2022 Sound',ti:'Sound Wave Calculations',su:'Mixed speed, frequency, wavelength and echo problems.',steps:[
  {lb:'Strategy',dr:dQ9,ht:'<p>v = f\u03bb (all waves). Echo: d = vt/2. Oscilloscope: T = divs \u00d7 s/div, f = 1/T. v in air \u2248 340 m/s; in water \u2248 1500 m/s.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var type=pick(['v_fl','echo','oscillo']);if(type==='v_fl'){var f=rnd(200,2000),v=340,lam=parseFloat((v/f).toFixed(3));return{question:'Sound: f=<b>'+f+' Hz</b>, v=340 m/s. Find \u03bb.',hints:['\u03bb = v/f'],ans:lam,tol:lam*0.02,unit:'m',working:'\u03bb = 340/'+f+' = '+lam+' m'};}if(type==='echo'){var t=rnd(1,10)*0.1,d=parseFloat((340*t/2).toFixed(1));return{question:'Echo: t=<b>'+t.toFixed(1)+' s</b>, v=340. Distance to wall?',hints:['d = v\u00d7t/2'],ans:d,tol:1,unit:'m',working:'d = 340\u00d7'+t.toFixed(1)+'/2 = '+d+' m'};}var divs=rnd(2,5),tpd=pick([0.001,0.002,0.005]);var T=divs*tpd,f2=parseFloat((1/T).toFixed(1));return{question:'Oscilloscope: '+divs+' div per cycle, '+tpd+' s/div. Find f.',hints:['T = divs\u00d7s/div, f=1/T'],ans:f2,tol:f2*0.02,unit:'Hz',working:'T='+T+' s. f='+f2+' Hz'};})}
]},
{ey:'Q10 \u2022 Y11 Physics \u2022 Sound',ti:'Sound Summary',su:'All sound concepts: longitudinal, speed, pitch, loudness, echo, ultrasound.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>Longitudinal wave. v\u2248340 m/s air. Pitch=frequency. Loudness=amplitude. Echo: d=vt/2. Ultrasound f>20kHz, non-ionising. Oscilloscope: read T and f.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['echo','pitch','ultrasound']);if(type==='echo'){var t=rnd(2,20)*0.1,d=parseFloat((340*t/2).toFixed(1));return{question:'Echo after <b>'+t.toFixed(1)+' s</b>. Distance?',hints:['d = 340\u00d7t/2'],ans:d,tol:1,unit:'m',working:'d = 340\u00d7'+t.toFixed(1)+'/2 = '+d+' m'};}if(type==='pitch'){var qs=[{q:'Higher pitch = higher: 1=amplitude, 2=frequency.',a:2,w:'Pitch = frequency. Higher pitch = higher frequency. Answer: 2.'},{q:'Louder sound = greater: 1=amplitude, 2=frequency.',a:1,w:'Loudness = amplitude. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Pitch=frequency. Loudness=amplitude.'],ans:qq.a,tol:0,unit:'',working:qq.w};}return{question:'Ultrasound is safe for baby scans because: 1=it is ionising, 2=it is non-ionising.',hints:['Non-ionising = no DNA damage'],ans:2,tol:0,unit:'',working:'Ultrasound is non-ionising \u2192 safe. Answer: 2.'};})},
]},
];

document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
