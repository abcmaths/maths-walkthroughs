<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Series circuit','#1565C0',12,'middle',true));
o.push(R(40,90,400,80,'#e3f2fd','#1565C0',2));
if(p>=1){o.push(R(60,106,60,48,'#C8922A','#C8922A',0));o.push(T(90,132,'R\u2081','#C8922A',9,'middle',false));
o.push(R(200,106,60,48,'#C8922A','#C8922A',0));o.push(T(230,132,'R\u2082','#C8922A',9,'middle',false));
o.push(R(340,106,60,48,'#C8922A','#C8922A',0));o.push(T(370,132,'R\u2083','#C8922A',9,'middle',false));}
if(p>=2){o.push(T(240,196,'I same everywhere','#1565C0',10,'middle',true));o.push(T(240,214,'V\u209c\u2092\u209c\u2090\u2097 = V\u2081+V\u2082+V\u2083','#C0272D',10,'middle',true));o.push(T(240,232,'R\u209c\u2092\u209c\u2090\u2097 = R\u2081+R\u2082+R\u2083','#2E7D32',10,'middle',true));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Parallel circuit','#1565C0',12,'middle',true));
o.push(L(40,80,40,220,'#1565C0',2));o.push(L(440,80,440,220,'#1565C0',2));
o.push(L(40,80,440,80,'#1565C0',2));o.push(L(40,220,440,220,'#1565C0',2));
if(p>=1){[['R\u2081',130],['R\u2082',230],['R\u2083',330]].forEach(function(r){o.push(L(r[1],80,r[1],220,'#C8922A',3));o.push(T(r[1],250,r[0],'#C8922A',9,'middle',false));});}
if(p>=2){o.push(T(240,60,'V same across each branch','#C0272D',10,'middle',true));o.push(T(240,36,'I\u209c\u2092\u209c\u2090\u2097 = I\u2081+I\u2082+I\u2083','#1565C0',10,'middle',true));}
if(p>=3){o.push(T(240,270,'1/R\u209c\u2092\u209c = 1/R\u2081 + 1/R\u2082 + 1/R\u2083','#2E7D32',10,'middle',true));}
s.innerHTML=o.join('');}
function dQ3(p){dQ1(p);}
function dQ4(p){dQ2(p);}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Potential divider','#1565C0',12,'middle',true));
o.push(L(240,22,240,248,'#1565C0',2));
o.push(R(175,50,130,60,'#e3f2fd','#1565C0',2));o.push(T(240,82,'R\u2081','#1565C0',11,'middle',false));
o.push(R(175,132,130,60,'#fde8e8','#C0272D',2));o.push(T(240,164,'R\u2082','#C0272D',11,'middle',false));
if(p>=1){o.push(arw(320,162,400,162,'#C0272D',1.5));o.push(T(440,162,'V\u2092\u1d41\u209c = V\u1d35\u2099 \u00d7 R\u2082/(R\u2081+R\u2082)','#C0272D',9,'start',false));}
if(p>=2){o.push(T(240,228,'V\u2092\u1d41\u209c increases when R\u2082 increases','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ2(p);}
function dQ8(p){dQ5(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Circuit summary','#1565C0',13,'middle',true));
[['Series R','R\u209c = R\u2081+R\u2082+\u2026'],['Parallel R','1/R\u209c = 1/R\u2081+1/R\u2082+\u2026'],['Series I','same throughout'],['Series V','V\u209c = V\u2081+V\u2082+\u2026'],['Parallel V','same across each branch'],['Parallel I','I\u209c = I\u2081+I\u2082+\u2026'],['Potential divider','V\u2092\u1d41\u209c = V\u1d35\u2099\u00d7R\u2082/(R\u2081+R\u2082)']].forEach(function(r,i){if(i<p+1){o.push(R(10,34+i*30,460,24,'#e3f2fd','#BBDEFB',1));o.push(T(110,50+i*30,r[0],'#1565C0',10,'middle',true));o.push(T(330,50+i*30,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Circuits',ti:'Series Circuits',su:'Apply rules for current, voltage and resistance in series.',steps:[
  {lb:'Series rules',dr:dQ1,ht:'<p>In a series circuit: current (I) is the same throughout. Voltages add up: V\u209c = V\u2081+V\u2082+\u2026. Resistances add: R\u209c = R\u2081+R\u2082+\u2026</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var R1=rnd(2,10),R2=rnd(2,10),R3=rnd(2,10);var Rt=R1+R2+R3;var V=rnd(9,24);var I=parseFloat((V/Rt).toFixed(2));var type=pick(['Rt','I','V1']);if(type==='Rt')return{question:'Series: R\u2081=<b>'+R1+'</b>, R\u2082=<b>'+R2+'</b>, R\u2083=<b>'+R3+' \u03a9</b>. Find R\u209c.',hints:['R\u209c = R\u2081+R\u2082+R\u2083'],ans:Rt,tol:0,unit:'\u03a9',working:'R\u209c = '+R1+'+'+R2+'+'+R3+' = '+Rt+' \u03a9'};if(type==='I')return{question:'V=<b>'+V+' V</b>, R\u209c=<b>'+Rt+' \u03a9</b>. Find current.',hints:['I = V/R'],ans:I,tol:0.02,unit:'A',working:'I = '+V+'/'+Rt+' = '+I+' A'};var V1=parseFloat((I*R1).toFixed(2));return{question:'I=<b>'+I+' A</b>, R\u2081=<b>'+R1+' \u03a9</b>. Find V\u2081.',hints:['V = IR'],ans:V1,tol:0.05,unit:'V',working:'V\u2081 = '+I+'\u00d7'+R1+' = '+V1+' V'};})}
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Circuits',ti:'Parallel Circuits',su:'Apply rules for current, voltage and resistance in parallel.',steps:[
  {lb:'Parallel rules',dr:dQ2,ht:'<p>In a parallel circuit: voltage (V) is the same across each branch. Currents add: I\u209c = I\u2081+I\u2082+\u2026. Resistance: 1/R\u209c = 1/R\u2081+1/R\u2082+\u2026 (total R is less than smallest branch R).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var R1=rnd(4,20),R2=rnd(4,20);var Rt=parseFloat((R1*R2/(R1+R2)).toFixed(2));var V=rnd(6,24);var I1=parseFloat((V/R1).toFixed(2)),I2=parseFloat((V/R2).toFixed(2));var type=pick(['Rt','It','I1']);if(type==='Rt')return{question:'Parallel: R\u2081=<b>'+R1+'</b>, R\u2082=<b>'+R2+' \u03a9</b>. Find R\u209c.',hints:['1/R\u209c = 1/R\u2081 + 1/R\u2082'],ans:Rt,tol:0.05,unit:'\u03a9',working:'1/R\u209c = 1/'+R1+'+1/'+R2+'. R\u209c = '+Rt+' \u03a9'};if(type==='It')return{question:'V=<b>'+V+' V</b>, R\u2081=<b>'+R1+'</b>, R\u2082=<b>'+R2+' \u03a9</b>. Find total current.',hints:['I\u209c = V/R\u2081 + V/R\u2082'],ans:parseFloat((I1+I2).toFixed(2)),tol:0.05,unit:'A',working:'I\u209c = '+I1+'+'+I2+' = '+parseFloat((I1+I2).toFixed(2))+' A'};return{question:'V=<b>'+V+' V</b>, R\u2081=<b>'+R1+' \u03a9</b>. Find I\u2081.',hints:['I\u2081 = V/R\u2081'],ans:I1,tol:0.02,unit:'A',working:'I\u2081 = '+V+'/'+R1+' = '+I1+' A'};})}
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Circuits',ti:'Series vs Parallel',su:'Compare series and parallel circuits. Explain advantages of parallel.',steps:[
  {lb:'Comparison',dr:dQ3,ht:'<p>Series: components share voltage; if one fails, all fail; R\u209c increases with more components. Parallel: components share current; each has full voltage; if one fails, others work; R\u209c decreases with more branches. Household circuits are parallel.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'In a series circuit, if one bulb fails: 1=others keep working, 2=all go out.',a:2,w:'Series: all in one loop \u2014 break anywhere stops all. Answer: 2.'},{q:'Household wiring uses parallel circuits so that: 1=each appliance gets full mains voltage, 2=all appliances share the voltage.',a:1,w:'Parallel: each appliance gets full 230 V. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Series: all fail. Parallel: each gets full V.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Circuits',ti:'Potential Divider',su:'Calculate output voltage of a potential divider.',steps:[
  {lb:'Potential divider',dr:dQ4,ht:'<div class="fm">V\u2092\u1d41\u209c = V\u1d35\u2099 \u00d7 R\u2082 / (R\u2081 + R\u2082)</div><p>Two resistors in series across a supply. Output taken across R\u2082. Increasing R\u2082 increases V\u2092\u1d41\u209c.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var Vin=rnd(6,24),R1=rnd(2,20),R2=rnd(2,20),Vout=parseFloat((Vin*R2/(R1+R2)).toFixed(2));return{question:'V\u1d35\u2099=<b>'+Vin+' V</b>, R\u2081=<b>'+R1+' \u03a9</b>, R\u2082=<b>'+R2+' \u03a9</b>. Find V\u2092\u1d41\u209c.',hints:['V\u2092\u1d41\u209c = V\u1d35\u2099\u00d7R\u2082/(R\u2081+R\u2082)'],ans:Vout,tol:0.05,unit:'V',working:'V\u2092\u1d41\u209c = '+Vin+'\u00d7'+R2+'/('+R1+'+'+R2+') = '+Vout+' V'};})},
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Circuits',ti:'Internal Resistance',su:'Apply V = \u03b5 - Ir to cells with internal resistance.',steps:[
  {lb:'Internal resistance',dr:dQ5,ht:'<p>Real cells have internal resistance (r) which causes a voltage drop when current flows.</p><div class="fm">V = \u03b5 - I \u00d7 r &nbsp;&nbsp;&nbsp; \u03b5 = V + Ir</div><p>\u03b5 = EMF (open circuit voltage), V = terminal voltage, I = current, r = internal resistance.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var emf=rnd(6,24),r=rnd(1,5)*0.1,I=rnd(1,10),V=parseFloat((emf-I*r).toFixed(2));var type=pick(['V','r','emf']);if(type==='V')return{question:'\u03b5=<b>'+emf+' V</b>, r=<b>'+r+' \u03a9</b>, I=<b>'+I+' A</b>. Find terminal V.',hints:['V = \u03b5 - Ir'],ans:V,tol:0.05,unit:'V',working:'V = '+emf+' - '+I+'\u00d7'+r+' = '+V+' V'};if(type==='r'){var r2=parseFloat(((emf-V)/I).toFixed(2));return{question:'\u03b5=<b>'+emf+' V</b>, V=<b>'+V+' V</b>, I=<b>'+I+' A</b>. Find r.',hints:['r = (\u03b5-V)/I'],ans:r2,tol:0.05,unit:'\u03a9',working:'r = ('+emf+'-'+V+')/'+I+' = '+r2+' \u03a9'};}var emf2=parseFloat((V+I*r).toFixed(2));return{question:'V=<b>'+V+' V</b>, I=<b>'+I+' A</b>, r=<b>'+r+' \u03a9</b>. Find \u03b5.',hints:['\u03b5 = V + Ir'],ans:emf2,tol:0.05,unit:'V',working:'\u03b5 = '+V+'+'+I+'\u00d7'+r+' = '+emf2+' V'};})}
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Circuits',ti:'Circuit Symbols',su:'Identify and use standard circuit symbols.',steps:[
  {lb:'Common symbols',dr:dQ6,ht:'<p>Cell, battery, resistor, variable resistor, LDR, thermistor, diode, LED, bulb, ammeter (series), voltmeter (parallel), switch, motor, generator, capacitor, fuse.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'An ammeter should be connected: 1=in series with the component, 2=in parallel with the component.',a:1,w:'Ammeter in series (to measure current through component). Answer: 1.'},{q:'A voltmeter should be connected: 1=in series, 2=in parallel with the component.',a:2,w:'Voltmeter in parallel (to measure voltage across component). Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Ammeter: series. Voltmeter: parallel.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Circuits',ti:'Kirchhoff\'s Laws',su:'Apply Kirchhoff\'s current and voltage laws.',steps:[
  {lb:"Kirchhoff's laws",dr:dQ7,ht:"<p><b>KCL (Current Law):</b> the sum of currents entering a junction = sum leaving. Conservation of charge.<br><b>KVL (Voltage Law):</b> the sum of EMFs around a loop = sum of voltage drops. Conservation of energy.</p>"},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var I1=rnd(2,8),I2=rnd(1,I1-1),I3=I1-I2;return{question:'Current entering junction: <b>'+I1+' A</b>. One branch takes <b>'+I2+' A</b>. Find current in second branch.',hints:['KCL: currents into junction = currents out'],ans:I3,tol:0,unit:'A',working:'I\u2083 = '+I1+' - '+I2+' = '+I3+' A'};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Circuits',ti:'Capacitors',su:'Describe how capacitors store charge. Apply Q = CV.',steps:[
  {lb:'Capacitors',dr:dQ8,ht:'<p>A capacitor stores electrical charge on two parallel plates separated by an insulator. When charged, energy is stored in the electric field between plates.</p><div class="fm">Q = C \u00d7 V</div><p>Q = charge (C), C = capacitance (F), V = voltage (V). Energy stored: E = \u00bdCV\u00b2.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var C=rnd(1,100)*1e-6,V=rnd(6,100),Q=parseFloat((C*V).toFixed(6));var type=pick(['Q','C','E']);if(type==='Q')return{question:'C=<b>'+(C*1e6).toFixed(0)+' \u03bcF</b>, V=<b>'+V+' V</b>. Find charge Q.',hints:['Q = CV; convert \u03bcF to F first'],ans:Q,tol:Q*0.02,unit:'C',working:'Q = '+C+'\u00d7'+V+' = '+Q.toExponential(2)+' C'};if(type==='C'){var C2=parseFloat((Q/V).toFixed(6));return{question:'Q=<b>'+Q.toExponential(2)+' C</b>, V=<b>'+V+' V</b>. Find C.',hints:['C = Q/V'],ans:C2,tol:C2*0.02,unit:'F',working:'C = '+Q.toExponential(2)+'/'+V+' = '+C2.toExponential(2)+' F'};}var E=parseFloat((0.5*C*V*V).toFixed(6));return{question:'C=<b>'+(C*1e6).toFixed(0)+' \u03bcF</b>, V=<b>'+V+' V</b>. Find energy.',hints:['E = \u00bdCV\u00b2'],ans:E,tol:E*0.02,unit:'J',working:'E = 0.5\u00d7'+C+'\u00d7'+V+'\u00b2 = '+E.toExponential(2)+' J'};})}
]},
{ey:'Q9 \u2022 Y11 Physics \u2022 Circuits',ti:'Fuses and Safety',su:'Explain how fuses and circuit breakers protect circuits.',steps:[
  {lb:'Fuses and circuit breakers',dr:dQ9,ht:'<p>A fuse contains a thin wire that melts if the current exceeds a set value, breaking the circuit. A circuit breaker (MCB) does the same but can be reset. Always choose the fuse rating just above the normal operating current.</p><div class="fm">Choose fuse: I\u209f = P/V &nbsp;\u2192\u200b&nbsp; pick next rating up</div>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var P=rnd(5,30)*100,V=230,I=parseFloat((P/V).toFixed(1));var fuse=I<=3?3:I<=5?5:I<=10?10:13;return{question:'Appliance: <b>'+P+' W</b>, 230 V. Normal current = <b>'+I+' A</b>. Which fuse? (3 A, 5 A, 10 A or 13 A)',hints:['Normal current = P/V; choose next rating above this'],ans:fuse,tol:0,unit:'A',working:'I = '+P+'/230 = '+I+' A. Choose '+fuse+' A fuse.'};})},
]},
{ey:'Q10 \u2022 Y11 Physics \u2022 Circuits',ti:'Mixed Circuit Problems',su:'Series, parallel, potential divider, internal resistance.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>Series: R\u209c=\u03a3R, I same, V shared. Parallel: 1/R\u209c=\u03a31/R, V same, I shared. V\u2092\u1d41\u209c=V\u1d35\u2099R\u2082/(R\u2081+R\u2082). V=\u03b5-Ir.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['series','parallel','potdiv']);if(type==='series'){var R1=rnd(2,10),R2=rnd(2,10),V=rnd(9,24);var Rt=R1+R2,I=parseFloat((V/Rt).toFixed(2));return{question:'Series: R\u2081=<b>'+R1+'</b>, R\u2082=<b>'+R2+' \u03a9</b>, V=<b>'+V+' V</b>. Find I.',hints:['R\u209c = R\u2081+R\u2082, I = V/R\u209c'],ans:I,tol:0.02,unit:'A',working:'R\u209c='+Rt+'. I='+V+'/'+Rt+'='+I+' A'};}if(type==='parallel'){var R1=rnd(4,20),R2=rnd(4,20);var Rt=parseFloat((R1*R2/(R1+R2)).toFixed(2));return{question:'Parallel: R\u2081=<b>'+R1+'</b>, R\u2082=<b>'+R2+' \u03a9</b>. Find R\u209c.',hints:['1/R\u209c = 1/R\u2081+1/R\u2082'],ans:Rt,tol:0.05,unit:'\u03a9',working:'R\u209c = '+R1+'\u00d7'+R2+'/('+R1+'+'+R2+') = '+Rt+' \u03a9'};}var Vin=rnd(9,24),R1=rnd(2,10),R2=rnd(2,10);var Vout=parseFloat((Vin*R2/(R1+R2)).toFixed(2));return{question:'Pot divider: V\u1d35\u2099=<b>'+Vin+'</b>, R\u2081=<b>'+R1+'</b>, R\u2082=<b>'+R2+' \u03a9</b>. Find V\u2092\u1d41\u209c.',hints:['V\u2092\u1d41\u209c = V\u1d35\u2099\u00d7R\u2082/(R\u2081+R\u2082)'],ans:Vout,tol:0.05,unit:'V',working:'V\u2092\u1d41\u209c = '+Vin+'\u00d7'+R2+'/('+R1+'+'+R2+') = '+Vout+' V'};})},
]},
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
