<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The Solar System','#1565C0',12,'middle',true));
var bodies=[['Sun','center',240,130,30,'#C8922A'],['Mercury','0.4 AU',90,130,5,'#888'],['Venus','0.7 AU',120,130,7,'#C8922A'],['Earth','1 AU',155,130,8,'#1565C0'],['Mars','1.5 AU',190,130,6,'#C0272D'],['Jupiter','5.2 AU',250,130,18,'#C8922A'],['Saturn','9.5 AU',320,130,14,'#6A1B9A']];
bodies.forEach(function(b){if(p>=1||b[0]==='Sun'){o.push(circ(b[2],b[3],b[5]===b[5]?b[5]:10,b[5]));if(p>=1)o.push(T(b[2],b[3]+b[5]+12,b[0],'#555',7,'middle',false));}});
if(p>=2){o.push(T(240,248,'Order: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The life cycle of stars','#1565C0',12,'middle',true));
var stages=[['Nebula',48,60],['Protostar',148,60],['Main sequence',248,60],['Red giant',348,60],['?',448,60]];
stages.forEach(function(s2,i){if(i<p+1){o.push(circ(s2[1],s2[2],i===2?20:i===3?28:14,'#C8922A','#E65100'));o.push(T(s2[1],s2[2]+36,s2[0],'#555',7,'middle',false));if(i<stages.length-1&&i<p)o.push(arw(s2[1]+18,s2[2],s2[1]+70,s2[2],'#1565C0',1.5));}});
if(p>=3){o.push(T(240,130,'Small star: White Dwarf. Large star: Supernova \u2192 Neutron Star or Black Hole','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The Big Bang and expansion of universe','#1565C0',12,'middle',true));
if(p>=1){o.push(circ(240,140,10,'#C0272D'));o.push(T(240,122,'Big Bang','#C0272D',8,'middle',false));}
if(p>=2){for(var a=0;a<360;a+=30){var r=60+p*20,x=240+r*Math.cos(a*Math.PI/180),y=140+r*Math.sin(a*Math.PI/180);o.push(circ(x,y,4,'#C8922A'));o.push(arw(240+(r-40)*Math.cos(a*Math.PI/180),140+(r-40)*Math.sin(a*Math.PI/180),x,y,'#1565C0',1));}}
if(p>=3){o.push(T(240,248,'Redshift: galaxies moving apart; v = H\u2080d (Hubble\'s Law)','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){dQ1(p);}
function dQ5(p){dQ2(p);}
function dQ6(p){dQ3(p);}
function dQ7(p){dQ1(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ3(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Space physics summary','#1565C0',13,'middle',true));
[['Solar System','Sun + 8 planets (Mercury to Neptune)'],['Light year','distance light travels in 1 year'],['Star lifecycle','nebula\u2192protostar\u2192main sequence\u2192giant\u2192(death)'],['Small star death','white dwarf'],['Large star death','supernova\u2192neutron star or black hole'],['Big Bang','~13.8 billion years ago; universe is expanding'],['Redshift','galaxies moving apart; v=H\u2080d']].forEach(function(r,i){if(i<p+1){o.push(R(10,36+i*30,460,24,'#e3f2fd','#BBDEFB',1));o.push(T(120,52+i*30,r[0],'#1565C0',10,'middle',true));o.push(T(340,52+i*30,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Space',ti:'The Solar System',su:'Name the planets in order. Describe the Solar System.',steps:[
  {lb:'The Solar System',dr:dQ1,ht:'<p>The Solar System consists of the Sun (a star) and everything orbiting it: 8 planets, dwarf planets (e.g. Pluto), moons, comets, asteroids. Planets in order: Mercury, Venus, Earth, Mars, Jupiter, Saturn, Uranus, Neptune.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Which is the closest planet to the Sun? 1=Venus, 2=Mercury, 3=Earth.',a:2,w:'Mercury is closest to the Sun. Answer: 2.'},{q:'Which planet is 5th from the Sun? 1=Jupiter, 2=Saturn, 3=Mars.',a:1,w:'Mercury, Venus, Earth, Mars, Jupiter. Jupiter is 5th. Answer: 1.'},{q:'Which is the largest planet? 1=Saturn, 2=Jupiter, 3=Earth.',a:2,w:'Jupiter is the largest planet. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['My Very Educated Mother Just Served Us Nachos'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Space',ti:'The Life Cycle of Stars',su:'Describe how stars are born, live and die.',steps:[
  {lb:'Star lifecycle',dr:dQ2,ht:'<p>Nebula (dust+gas) \u2192 protostar (gravity contracts, heats) \u2192 main sequence star (stable, H \u2192 He fusion for billions of years) \u2192 red giant/supergiant \u2192 death depends on mass:</p><p>Small star: planetary nebula \u2192 white dwarf. Massive star: supernova \u2192 neutron star or black hole.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'A star like the Sun will eventually become a: 1=black hole, 2=white dwarf.',a:2,w:'Sun-like (small) star: planetary nebula \u2192 white dwarf. Answer: 2.'},{q:'A very massive star ends its life as a: 1=white dwarf, 2=supernova then neutron star or black hole.',a:2,w:'Massive star: supernova explosion \u2192 neutron star or black hole. Answer: 2.'},{q:'Stars spend most of their life in the: 1=red giant phase, 2=main sequence phase.',a:2,w:'Main sequence: longest stable phase (H fusion). Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Small star: white dwarf. Massive star: supernova, neutron star/black hole.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Space',ti:'The Big Bang',su:'Describe evidence for the Big Bang and the expanding universe.',steps:[
  {lb:'Big Bang theory',dr:dQ3,ht:'<p>The universe began ~13.8 billion years ago from a hot, dense point (the Big Bang). Evidence: (1) <b>Redshift</b> of galaxies \u2014 all galaxies moving away; (2) <b>Cosmic Microwave Background Radiation</b> (CMBR) \u2014 thermal afterglow of the Big Bang.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Redshift of distant galaxies shows: 1=galaxies are moving towards us, 2=galaxies are moving away from us.',a:2,w:'Redshift: wavelengths stretched \u2192 source moving away. Answer: 2.'},{q:'CMBR (cosmic microwave background) is evidence that: 1=the universe was once very hot and dense, 2=the universe has always been the same.',a:1,w:'CMBR: thermal echo of the Big Bang. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Redshift: moving away. CMBR: evidence for hot, dense origin.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Space',ti:'Orbits and Gravity',su:'Explain how gravity keeps planets in orbit. Apply v = 2\u03c0r/T.',steps:[
  {lb:'Orbits',dr:dQ4,ht:'<p>Gravity provides the centripetal force to keep planets in orbit. For a circular orbit:</p><div class="fm">v = 2\u03c0r / T</div><p>v = orbital speed (m/s), r = orbital radius (m), T = period (s). Closer planets move faster and have shorter periods (Kepler\u2019s 3rd law: T\u00b2 \u221d r\u00b3).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var r=rnd(1,10)*1e10,T=rnd(1,12)*30*24*3600;var v=parseFloat((2*Math.PI*r/T).toFixed(1));var type=pick(['v','T']);if(type==='v')return{question:'r = <b>'+r.toExponential(1)+' m</b>, T = <b>'+T.toExponential(1)+' s</b>. Find orbital speed.',hints:['v = 2\u03c0r/T'],ans:v,tol:v*0.02,unit:'m/s',working:'v = 2\u03c0\u00d7'+r.toExponential(1)+'/'+T.toExponential(1)+' = '+v+' m/s'};var v2=parseFloat((2*Math.PI*r/T).toFixed(1)),T2=T;return{question:'r = <b>'+r.toExponential(1)+' m</b>, v = <b>'+v2+' m/s</b>. Find period T.',hints:['T = 2\u03c0r/v'],ans:T2,tol:T2*0.02,unit:'s',working:'T = 2\u03c0\u00d7'+r.toExponential(1)+'/'+v2+' = '+T2.toExponential(2)+' s'};})}
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Space',ti:'The Sun and Fusion',su:'Describe how the Sun produces energy by nuclear fusion.',steps:[
  {lb:'Solar energy',dr:dQ5,ht:'<p>The Sun is powered by nuclear fusion in its core. Hydrogen nuclei (protons) fuse under extreme temperature and pressure to form helium, releasing vast amounts of energy.</p><p>4H-1 \u2192 He-4 + energy. The Sun has enough hydrogen to last ~5 billion more years.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'The Sun produces energy by: 1=nuclear fission, 2=nuclear fusion.',a:2,w:'The Sun fuses hydrogen to helium (fusion). Answer: 2.'},{q:'Nuclear fusion in the Sun requires: 1=low temperature and pressure, 2=extremely high temperature and pressure.',a:2,w:'Extreme T and P needed to overcome proton repulsion. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Sun: fusion. Requires extreme T and P.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Space',ti:'Redshift and Hubble\'s Law',su:'Explain redshift and apply Hubble\'s Law: v = H\u2080d.',steps:[
  {lb:"Hubble's Law",dr:dQ6,ht:'<p>Distant galaxies show redshift \u2014 their light is shifted to longer wavelengths because they are moving away. The further the galaxy, the faster it recedes.</p><div class="fm">v = H\u2080 \u00d7 d</div><p>v = recession speed (km/s), H\u2080 \u2248 70 km/s/Mpc, d = distance (Mpc).</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var H0=70,d=rnd(10,500),v=H0*d;return{question:'Galaxy at d = <b>'+d+' Mpc</b>. H\u2080 = 70 km/s/Mpc. Find recession speed.',hints:['v = H\u2080\u00d7d'],ans:v,tol:v*0.01,unit:'km/s',working:'v = 70\u00d7'+d+' = '+v+' km/s'};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Space',ti:'Light Years and Distances',su:'Convert between light years and metres. Use astronomical units.',steps:[
  {lb:'Units of distance',dr:dQ7,ht:'<p>1 light year (ly) = distance light travels in 1 year = 9.46\u00d710\u00b9\u2075 m. The nearest star (Proxima Centauri) is ~4.2 ly away. 1 AU (astronomical unit) = Earth-Sun distance = 1.5\u00d710\u00b9\u00b9 m. 1 parsec (pc) = 3.26 ly.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var ly=rnd(2,20),m=parseFloat((ly*9.46e15).toFixed(0));return{question:'Distance = <b>'+ly+' light years</b>. Convert to metres. (1 ly = 9.46\u00d710\u00b9\u2075 m)',hints:['metres = light years \u00d7 9.46\u00d710\u00b9\u2075'],ans:m,tol:m*0.02,unit:'m',working:ly+' \u00d7 9.46\u00d710\u00b9\u2075 = '+m.toExponential(2)+' m'};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Space',ti:'Satellites',su:'Describe uses of artificial satellites. Distinguish geostationary from polar orbits.',steps:[
  {lb:'Satellite orbits',dr:dQ8,ht:'<p><b>Geostationary:</b> period = 24 hours, orbits above equator, appears fixed in sky. Uses: TV/communications satellites. <b>Polar orbit:</b> low altitude, passes over poles, scans whole Earth surface. Uses: weather satellites, spy satellites, Google Earth.</p>'},
