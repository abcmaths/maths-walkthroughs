<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electric charge and current','#1565C0',12,'middle',true));
o.push(R(80,40,320,56,'#e3f2fd','#1565C0',2));o.push(T(240,62,'I = Q / t','#0d47a1',20,'middle',true));o.push(T(240,80,'current (A) = charge (C) \u00f7 time (s)','#555',9,'middle',false));
if(p>=1){[['I','current','A (amperes)','#1565C0',80],['Q','charge','C (coulombs)','#C0272D',240],['t','time','s (seconds)','#2E7D32',400]].forEach(function(r){o.push(R(r[4]-48,106,104,40,'#e3f2fd','#1565C0',1));o.push(T(r[4],128,r[0],r[3],16,'middle',true));o.push(T(r[4],156,r[2],'#555',8,'middle',false));});}
if(p>=2){o.push(R(50,172,380,56,'#fff','#ccc',1));o.push(T(240,192,'5 A for 10 s: Q = 5\u00d710 = 50 C','#333',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Ohm\'s Law: V = I \u00d7 R','#1565C0',13,'middle',true));
o.push(R(80,40,320,56,'#e3f2fd','#1565C0',2));o.push(T(240,62,'V = I \u00d7 R','#0d47a1',20,'middle',true));o.push(T(240,80,'voltage (V) = current (A) \u00d7 resistance (\u03a9)','#555',9,'middle',false));
if(p>=1){[['V','voltage','V (volts)','#C0272D',80],['I','current','A (amperes)','#1565C0',240],['R','resistance','\u03a9 (ohms)','#2E7D32',400]].forEach(function(r){o.push(R(r[4]-48,106,104,40,'#e3f2fd','#1565C0',1));o.push(T(r[4],128,r[0],r[3],16,'middle',true));o.push(T(r[4],156,r[2],'#555',8,'middle',false));});}
if(p>=2){o.push(R(50,172,380,56,'#fff','#ccc',1));o.push(T(240,192,'V=12 V, R=4 \u03a9: I = V/R = 12/4 = 3 A','#333',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Power equations','#1565C0',12,'middle',true));
[['P = I \u00d7 V','P = I\u00b2R','P = V\u00b2/R']].forEach(function(r){r.forEach(function(eq,i){o.push(R(20+i*155,44,140,44,'#e3f2fd','#1565C0',2));o.push(T(90+i*155,68,eq,'#0d47a1',13,'middle',true));});});
if(p>=1){o.push(T(240,112,'P = power (W), I = current (A), V = voltage (V), R = resistance (\u03a9)','#555',9,'middle',false));}
if(p>=2){o.push(R(40,128,400,44,'#fff','#ccc',1));o.push(T(240,148,'12 V lamp, 2 A: P = 12\u00d72 = 24 W','#333',10,'middle',false));}
if(p>=3){o.push(R(40,184,400,44,'#e3f2fd','#1565C0',1));o.push(T(240,204,'Energy: E = P \u00d7 t &nbsp;&nbsp; E = V \u00d7 Q','#0d47a1',12,'middle',true));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Resistance and temperature','#1565C0',12,'middle',true));
o.push(L(48,232,48,22,'#333',2));o.push(L(48,232,452,232,'#333',2));
o.push(T(254,250,'Voltage (V)','#333',9,'middle',false));o.push(T(25,130,'I (A)','#333',9,'middle',false));
for(var i=0;i<120;i++)o.push(L(48+i*3.3,232-i*1.6,48+(i+1)*3.3,232-(i+1)*1.6,'#1565C0',2));
if(p>=1){for(var i=0;i<120;i++){var y=2*i-0.008*i*i;o.push(L(48+i*3.3,232-y,48+(i+1)*3.3,232-(2*(i+1)-0.008*(i+1)*(i+1)),'#C0272D',2));}
o.push(T(380,80,'Ohmic (constant R)','#1565C0',8,'start',false));o.push(T(380,140,'Filament lamp (R increases with T)','#C0272D',8,'start',false));}
s.innerHTML=o.join('');}
function dQ5(p){dQ1(p);}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electricity summary','#1565C0',13,'middle',true));
[['I = Q/t','current = charge/time (A = C/s)'],["Ohm's Law",'V = IR (ohmic conductor: constant R)'],['Power','P = IV = I\u00b2R = V\u00b2/R (watts)'],['Energy','E = Pt = VIt = VQ (joules)'],['Filament lamp','R increases with temperature (non-ohmic)'],['LDR','resistance decreases in bright light'],['Thermistor','resistance decreases as temperature rises']].forEach(function(r,i){if(i<p+1){o.push(R(10,36+i*30,460,24,'#e3f2fd','#BBDEFB',1));o.push(T(120,52+i*30,r[0],'#1565C0',10,'middle',true));o.push(T(340,52+i*30,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Electricity',ti:'Charge and Current',su:'Apply I = Q/t. Understand charge carriers.',steps:[
  {lb:'Current and charge',dr:dQ1,ht:'<p>Electric current is the rate of flow of charge.</p><div class="fm">I = Q / t</div><p>I in amperes (A), Q in coulombs (C), t in seconds (s). In metals, current is a flow of electrons. In solutions (electrolytes), current is ions.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var type=pick(['Q','I','t']);var I=rnd(1,10),t=rnd(5,60),Q=I*t;if(type==='Q')return{question:'I = <b>'+I+' A</b>, t = <b>'+t+' s</b>. Find charge.',hints:['Q = I\u00d7t'],ans:Q,tol:0.5,unit:'C',working:'Q = '+I+'\u00d7'+t+' = '+Q+' C'};if(type==='I'){var Q2=rnd(10,200),t2=rnd(5,40),I2=parseFloat((Q2/t2).toFixed(2));return{question:'Q = <b>'+Q2+' C</b>, t = <b>'+t2+' s</b>. Find current.',hints:['I = Q/t'],ans:I2,tol:0.05,unit:'A',working:'I = '+Q2+'/'+t2+' = '+I2+' A'};}var Q3=rnd(10,200),I3=rnd(1,10),t3=parseFloat((Q3/I3).toFixed(1));return{question:'Q = <b>'+Q3+' C</b>, I = <b>'+I3+' A</b>. Find time.',hints:['t = Q/I'],ans:t3,tol:0.1,unit:'s',working:'t = '+Q3+'/'+I3+' = '+t3+' s'};})}
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Electricity',ti:"Ohm's Law",su:'Apply V = IR. Identify ohmic and non-ohmic conductors.',steps:[
  {lb:"Ohm's Law",dr:dQ2,ht:"<p>For an ohmic conductor, voltage is proportional to current at constant temperature.</p><div class='fm'>V = I \u00d7 R</div><p>Ohmic: straight line through origin on I-V graph (e.g. resistor at constant temperature). Non-ohmic: filament lamp (R increases with T), diode (only allows current one way).</p>"},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var type=pick(['V','I','R']);var V=rnd(1,24),R=rnd(1,20),I=parseFloat((V/R).toFixed(2));if(type==='V'){var I2=rnd(1,10),R2=rnd(1,20);return{question:'I = <b>'+I2+' A</b>, R = <b>'+R2+' \u03a9</b>. Find V.',hints:['V = IR'],ans:I2*R2,tol:0.1,unit:'V',working:'V = '+I2+'\u00d7'+R2+' = '+(I2*R2)+' V'};}if(type==='I')return{question:'V = <b>'+V+' V</b>, R = <b>'+R+' \u03a9</b>. Find current.',hints:['I = V/R'],ans:I,tol:0.02,unit:'A',working:'I = '+V+'/'+R+' = '+I+' A'};var V3=rnd(1,24),I3=rnd(1,10),R3=parseFloat((V3/I3).toFixed(2));return{question:'V = <b>'+V3+' V</b>, I = <b>'+I3+' A</b>. Find R.',hints:['R = V/I'],ans:R3,tol:0.05,unit:'\u03a9',working:'R = '+V3+'/'+I3+' = '+R3+' \u03a9'};})}
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Electricity',ti:'Electrical Power',su:'Calculate power using P = IV, P = I²R and P = V²/R.',steps:[
  {lb:'Power equations',dr:dQ3,ht:'<p>Electrical power is the rate of energy transfer.</p><div class="fm">P = I \u00d7 V &nbsp;&nbsp;&nbsp; P = I\u00b2R &nbsp;&nbsp;&nbsp; P = V\u00b2/R</div><p>Also: E = P\u00d7t (energy in joules) and E = V\u00d7Q.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var type=pick(['P_IV','P_I2R','P_V2R']);var I=rnd(1,10),V=rnd(6,24),R=parseFloat((V/I).toFixed(1));if(type==='P_IV')return{question:'I = <b>'+I+' A</b>, V = <b>'+V+' V</b>. Find power.',hints:['P = IV'],ans:I*V,tol:0.5,unit:'W',working:'P = '+I+'\u00d7'+V+' = '+(I*V)+' W'};if(type==='P_I2R'){var I2=rnd(1,5),R2=rnd(2,20);return{question:'I = <b>'+I2+' A</b>, R = <b>'+R2+' \u03a9</b>. Find power.',hints:['P = I\u00b2R'],ans:I2*I2*R2,tol:0.5,unit:'W',working:'P = '+I2+'\u00b2\u00d7'+R2+' = '+(I2*I2*R2)+' W'};}var V3=rnd(6,24),R3=rnd(2,20),P3=parseFloat((V3*V3/R3).toFixed(1));return{question:'V = <b>'+V3+' V</b>, R = <b>'+R3+' \u03a9</b>. Find power.',hints:['P = V\u00b2/R'],ans:P3,tol:0.2,unit:'W',working:'P = '+V3+'\u00b2/'+R3+' = '+P3+' W'};})}
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Electricity',ti:'I-V Characteristics',su:'Interpret and draw I-V graphs for different components.',steps:[
  {lb:'I-V graphs',dr:dQ4,ht:'<p><b>Ohmic resistor:</b> straight line through origin (constant R). <b>Filament lamp:</b> curve \u2014 gradient decreases at high V (R increases as filament heats up). <b>Diode:</b> only conducts in forward direction; very high R in reverse.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'An ohmic resistor has an I-V graph that is: 1=a curve, 2=a straight line through origin.',a:2,w:'Ohmic: straight line through origin (constant R). Answer: 2.'},{q:'A filament lamp\'s resistance increases with temperature. Its I-V graph: 1=is a straight line, 2=curves (steepness decreasing).',a:2,w:'Non-linear curve: as T rises, R increases, gradient decreases. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Ohmic: straight. Lamp: curve (R increases with T).'],ans:qq.a,tol:0,unit:'',working:qq.w};})},

{ey:'Q5 \u2022 Y11 Physics \u2022 Electricity',ti:'LDRs and Thermistors',su:'Describe how LDRs and thermistors change resistance.',steps:[
