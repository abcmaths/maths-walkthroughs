<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Magnetic field of a bar magnet','#1565C0',12,'middle',true));
o.push(R(160,100,160,60,'#e3f2fd','#1565C0',2));o.push(T(200,135,'N','#C0272D',14,'middle',true));o.push(T(280,135,'S','#1565C0',14,'middle',true));
if(p>=1){var lines=[[150,130,60,130],[150,110,80,80],[150,150,80,180],[170,100,140,50],[170,165,140,218],[320,110,390,80],[320,150,390,180],[320,130,420,130]];lines.forEach(function(l){o.push(arw(l[0],l[1],l[2],l[3],'#2E7D32',1.5));});}
if(p>=2){o.push(T(240,248,'Field lines: from N to S outside magnet; closer = stronger','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Magnetic field of a wire (current)','#1565C0',12,'middle',true));
o.push(circ(240,130,8,'#C0272D'));o.push(T(240,134,'\u25cf','#fff',10,'middle',false));o.push(T(240,155,'current out','#555',8,'middle',false));
if(p>=1){for(var r=30;r<=120;r+=25)o.push('<circle cx="240" cy="130" r="'+r+'" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="'+(r>60?'4,3':'2,2')+'"/>');}
if(p>=2){o.push(arw(240,100,268,100,'#1565C0',1.5));o.push(T(240,40,'Right-hand grip rule:\nthumb = current, fingers = field direction','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Electromagnet','#1565C0',12,'middle',true));
o.push(R(150,100,180,60,'#aaa','#555',2));o.push(T(240,135,'iron core','#555',9,'middle',false));
for(var i=0;i<8;i++){var x=155+i*22;o.push(L(x,100,x-11,80,'#C0272D',2));o.push(L(x,160,x-11,178,'#C0272D',2));}
if(p>=1){o.push(arw(48,132,148,132,'#2E7D32',2));o.push(T(98,122,'current','#2E7D32',8,'middle',false));o.push(arw(332,132,430,132,'#C0272D',2));o.push(T(381,122,'field','#C0272D',8,'middle',false));}
if(p>=2){[['Increase current','stronger field'],['More turns','stronger field'],['Iron core','much stronger field'],['Switch off','loses magnetism (soft iron)']].forEach(function(r,i){if(i<p-1){o.push(R(10,176+i*18,460,14,'#e3f2fd','#BBDEFB',1));o.push(T(130,186+i*18,r[0],'#1565C0',8,'middle',false));o.push(T(350,186+i*18,r[1],'#555',8,'middle',false));}});}
s.innerHTML=o.join('');}
function dQ4(p){dQ1(p);}
function dQ5(p){dQ2(p);}
function dQ6(p){dQ3(p);}
function dQ7(p){dQ1(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ3(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Magnetism summary','#1565C0',13,'middle',true));
[['Permanent magnet','field from N to S (outside); poles attract opposite'],['Magnetic materials','iron, steel, nickel, cobalt'],['Soft iron','easily magnetised and demagnetised'],['Hard steel','keeps magnetism (permanent magnets)'],['Electromagnet','solenoid + current; stronger with more turns, current, iron core'],['Field of a wire','concentric circles; right-hand grip rule']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#e3f2fd','#BBDEFB',1));o.push(T(130,55+i*33,r[0],'#1565C0',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Magnetism',ti:'Magnetic Field Lines',su:'Draw and interpret magnetic field patterns around magnets.',steps:[
  {lb:'Field lines',dr:dQ1,ht:'<p>Magnetic field lines: show direction and strength of field. Direction: from N to S outside the magnet. Closer lines = stronger field. Lines never cross.</p>'},
  {lb:'Poles',dr:dQ1,ht:'<p>Like poles repel, unlike poles attract. Magnetic materials: iron, steel, nickel, cobalt. Soft iron: easily magnetised/demagnetised. Hard steel: keeps magnetism (permanent magnets).</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Magnetic field lines point from: 1=S to N outside magnet, 2=N to S outside magnet.',a:2,w:'Field lines go from N to S outside the magnet. Answer: 2.'},{q:'Closer magnetic field lines indicate: 1=weaker field, 2=stronger field.',a:2,w:'Closer lines = stronger field. Answer: 2.'},{q:'Two N poles: 1=attract, 2=repel.',a:2,w:'Like poles repel. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['N to S outside. Closer = stronger. Like poles repel.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Magnetism',ti:'Magnetic Field of a Wire',su:'Describe the magnetic field pattern around a current-carrying wire.',steps:[
  {lb:'Field around a wire',dr:dQ2,ht:'<p>A current-carrying wire produces a magnetic field in concentric circles around the wire. <b>Right-hand grip rule:</b> point thumb in direction of current, fingers curl in direction of field.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'The magnetic field around a straight wire is: 1=straight lines, 2=concentric circles.',a:2,w:'Concentric circles around the wire. Answer: 2.'},{q:'Reversing the current in a wire: 1=doubles the field, 2=reverses the direction of the field.',a:2,w:'Reversing current reverses field direction. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Wire: concentric circles. Reverse current: reverse field.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Magnetism',ti:'Electromagnets',su:'Describe how an electromagnet works. State ways to increase field strength.',steps:[
  {lb:'Electromagnets',dr:dQ3,ht:'<p>An electromagnet is a solenoid (coil of wire) with a current. The field is like a bar magnet. Strength increased by: more current, more turns of wire, adding an iron core.</p><p>Soft iron core: greatly increases field strength; loses magnetism when switched off.</p>'},
  {lb:'Uses',dr:dQ3,ht:'<p>Electric bells, relays, circuit breakers, MRI machines, maglev trains, scrap metal cranes, loudspeakers.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'How can you increase the strength of an electromagnet? 1=use a copper core, 2=increase the current.',a:2,w:'More current \u2192 stronger field. Answer: 2.'},{q:'Why is a soft iron core used in an electromagnet rather than steel? 1=steel is too heavy, 2=soft iron loses magnetism when current is switched off.',a:2,w:'Soft iron demagnetises easily when current stops. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['More current/turns/iron core: stronger. Soft iron: temporary.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Magnetism',ti:'The Motor Effect',su:'Describe the force on a current-carrying conductor in a magnetic field.',steps:[
  {lb:'The motor effect',dr:dQ4,ht:'<p>A current-carrying conductor in a magnetic field experiences a force. <b>Fleming\u2019s left-hand rule:</b> thumb = force (motion), index = field, middle = current.</p><div class="fm">F = B \u00d7 I \u00d7 L</div><p>F = force (N), B = field strength (T), I = current (A), L = length (m).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var B=rnd(1,5)*0.1,I=rnd(1,10),L=rnd(1,5)*0.1,F=parseFloat((B*I*L).toFixed(3));var type=pick(['F','B','I']);if(type==='F')return{question:'B=<b>'+B+' T</b>, I=<b>'+I+' A</b>, L=<b>'+L+' m</b>. Find force.',hints:['F = BIL'],ans:F,tol:F*0.02,unit:'N',working:'F = '+B+'\u00d7'+I+'\u00d7'+L+' = '+F+' N'};if(type==='B'){var F2=rnd(1,10)*0.1,B2=parseFloat((F2/(I*L)).toFixed(3));return{question:'F=<b>'+F2+' N</b>, I=<b>'+I+' A</b>, L=<b>'+L+' m</b>. Find B.',hints:['B = F/(IL)'],ans:B2,tol:B2*0.02,unit:'T',working:'B = '+F2+'/('+I+'\u00d7'+L+') = '+B2+' T'};}var F3=rnd(1,10)*0.1,I3=parseFloat((F3/(B*L)).toFixed(2));return{question:'F=<b>'+F3+' N</b>, B=<b>'+B+' T</b>, L=<b>'+L+' m</b>. Find I.',hints:['I = F/(BL)'],ans:I3,tol:I3*0.02,unit:'A',working:'I = '+F3+'/('+B+'\u00d7'+L+') = '+I3+' A'};})}
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Magnetism',ti:'Fleming\'s Left-Hand Rule',su:'Apply Fleming\'s left-hand rule to find force direction.',steps:[
  {lb:"Fleming's LHR",dr:dQ5,ht:"<p>Left hand: <b>F</b>irst finger = magnetic <b>F</b>ield direction, se<b>C</b>ond finger = <b>C</b>urrent direction, thu<b>M</b>b = <b>M</b>otion (force direction).</p><p>The force is always perpendicular to both the current and the field.</p>"},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var qs=[{q:'Current flows East, field points North. Force direction is: 1=up, 2=down, 3=South.',a:1,w:'E current, N field \u2192 upward force (Fleming\'s LHR). Answer: 1.'},{q:'Reversing the current direction: 1=doubles the force, 2=reverses the force direction.',a:2,w:'Reversing current reverses force direction. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:["Fleming's LHR: 1st=field, 2nd=current, thumb=force"],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Magnetism',ti:'The DC Motor',su:'Describe how a DC electric motor works.',steps:[
  {lb:'DC motor',dr:dQ6,ht:'<p>A DC motor uses the motor effect. A coil in a magnetic field experiences a force \u2192 torque \u2192 rotation. A <b>split-ring commutator</b> reverses current every half-turn to keep the coil spinning in the same direction. Brushes maintain electrical contact.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'The split-ring commutator in a DC motor: 1=increases current, 2=reverses current direction every half-turn.',a:2,w:'Commutator reverses current \u2192 coil keeps spinning same way. Answer: 2.'},{q:'To increase the speed of a DC motor: 1=increase current or field strength, 2=use a longer wire.',a:1,w:'More current or stronger field \u2192 larger force \u2192 faster spin. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Commutator: reverses current. Faster: more I or B.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Magnetism',ti:'Induced EMF',su:'Describe electromagnetic induction. Apply Faraday\'s law.',steps:[
  {lb:'Electromagnetic induction',dr:dQ7,ht:'<p>A voltage (EMF) is induced in a conductor when there is a <b>change in magnetic flux</b> through it. The induced EMF increases when: magnet moves faster, stronger magnet, more turns of coil.</p><p><b>Lenz\u2019s law:</b> the induced current opposes the change causing it.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'To increase the induced EMF in a coil: 1=move magnet slower, 2=use a stronger magnet.',a:2,w:'Stronger magnet \u2192 greater rate of flux change \u2192 larger EMF. Answer: 2.'},{q:'If a N pole approaches a coil, the induced current produces a field that: 1=attracts the approaching magnet, 2=repels the approaching magnet.',a:2,w:'Lenz\'s law: induced current opposes the change. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:["Faraday: rate of flux change = EMF. Lenz: opposes change."],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Magnetism',ti:'Transformers',su:'Describe how a transformer works. Apply the transformer equation.',steps:[
  {lb:'Transformer',dr:dQ8,ht:'<p>A transformer uses electromagnetic induction to change AC voltage. Alternating current in the primary coil creates a changing magnetic field in the iron core \u2192 induces an EMF in the secondary coil.</p><div class="fm">V\u209a/V\u209b = N\u209a/N\u209b &nbsp;&nbsp;&nbsp; V\u209aI\u209a = V\u209bI\u209b</div><p>Step-up: N\u209b > N\u209a. Step-down: N\u209b < N\u209a.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var Np=rnd(100,1000),Ns=rnd(100,2000),Vp=rnd(12,240);var Vs=parseFloat((Vp*Ns/Np).toFixed(1));var type=pick(['Vs','Ns','Ip_from_Is']);if(type==='Vs')return{question:'N\u209a=<b>'+Np+'</b>, N\u209b=<b>'+Ns+'</b>, V\u209a=<b>'+Vp+' V</b>. Find V\u209b.',hints:['V\u209b = V\u209a\u00d7N\u209b/N\u209a'],ans:Vs,tol:Vs*0.01,unit:'V',working:'V\u209b = '+Vp+'\u00d7'+Ns+'/'+Np+' = '+Vs+' V'};if(type==='Ns'){var Vs2=rnd(12,500),Ns2=Math.round(Np*Vs2/Vp);return{question:'N\u209a=<b>'+Np+'</b>, V\u209a=<b>'+Vp+' V</b>, V\u209b=<b>'+Vs2+' V</b>. Find N\u209b.',hints:['N\u209b = N\u209a\u00d7V\u209b/V\u209a'],ans:Ns2,tol:1,unit:'turns',working:'N\u209b = '+Np+'\u00d7'+Vs2+'/'+Vp+' = '+Ns2};}var Is=rnd(1,10),Ip=parseFloat((Vs*Is/Vp).toFixed(2));return{question:'V\u209a=<b>'+Vp+' V</b>, V\u209b=<b>'+Vs+' V</b>, I\u209b=<b>'+Is+' A</b>. Find I\u209a.',hints:['V\u209aI\u209a = V\u209bI\u209b'],ans:Ip,tol:Ip*0.02,unit:'A',working:'I\u209a = '+Vs+'\u00d7'+Is+'/'+Vp+' = '+Ip+' A'};})}
]},
{ey:'Q9 \u2022 Y11 Physics \u2022 Magnetism',ti:'Power Transmission',su:'Explain why the National Grid uses high voltage for power transmission.',steps:[
  {lb:'National Grid',dr:dQ9,ht:'<p>Power stations generate electricity at ~25 kV. Step-up transformers increase to ~400 kV for transmission. High voltage \u2192 low current \u2192 less power lost as heat in wires (P = I\u00b2R). Step-down transformers reduce to safe levels for homes (230 V).</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var I=rnd(1,20),R=rnd(1,10),P=I*I*R;return{question:'Current in cable: <b>'+I+' A</b>, resistance: <b>'+R+' \u03a9</b>. Find power wasted as heat.',hints:['P = I\u00b2R'],ans:P,tol:P*0.01,unit:'W',working:'P = '+I+'\u00b2\u00d7'+R+' = '+P+' W'};})},
]},
{ey:'Q10 \u2022 Y11 Physics \u2022 Magnetism',ti:'Mixed Magnetism',su:'Motors, transformers, induction and F=BIL combined.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>F=BIL (motor effect). Fleming\'s LHR. Transformer: Vp/Vs=Np/Ns, VpIp=VsIs. Induction: change in flux. Lenz: opposes change. High voltage transmission: low current, low I\u00b2R loss.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['force','transformer','grid']);if(type==='force'){var B=rnd(1,5)*0.1,I=rnd(1,10),L=rnd(1,5)*0.1,F=parseFloat((B*I*L).toFixed(3));return{question:'F=BIL. B=<b>'+B+' T</b>, I=<b>'+I+' A</b>, L=<b>'+L+' m</b>. Find F.',hints:['F = BIL'],ans:F,tol:F*0.02,unit:'N',working:'F = '+B+'\u00d7'+I+'\u00d7'+L+' = '+F+' N'};}if(type==='transformer'){var Np=rnd(100,500),Ns=rnd(500,2000),Vp=rnd(12,100);var Vs=parseFloat((Vp*Ns/Np).toFixed(1));return{question:'N\u209a=<b>'+Np+'</b>, N\u209b=<b>'+Ns+'</b>, V\u209a=<b>'+Vp+' V</b>. Find V\u209b.',hints:['V\u209b = V\u209a\u00d7N\u209b/N\u209a'],ans:Vs,tol:Vs*0.02,unit:'V',working:'V\u209b = '+Vp+'\u00d7'+Ns+'/'+Np+' = '+Vs+' V'};}var I2=rnd(1,20),R2=rnd(1,10);return{question:'Cable: I=<b>'+I2+' A</b>, R=<b>'+R2+' \u03a9</b>. Power lost?',hints:['P = I\u00b2R'],ans:I2*I2*R2,tol:I2*I2*R2*0.01,unit:'W',working:'P = '+I2+'\u00b2\u00d7'+R2+' = '+(I2*I2*R2)+' W'};})},
]},
];

var qi=0,si=0;

function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
