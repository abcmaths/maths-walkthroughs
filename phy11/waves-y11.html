<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Wave properties','#1565C0',13,'middle',true));
var pts=[];for(var i=0;i<480;i++)pts.push([i,110+50*Math.sin(i*0.055)]);
for(var i=0;i<pts.length-1;i++)o.push(L(pts[i][0],pts[i][1],pts[i+1][0],pts[i+1][1],'#1565C0',2));
if(p>=1){o.push(L(48,60,162,60,'#C0272D',1.5,'4,3'));o.push(arw(48,60,48,110,'#C0272D',1.5));o.push(arw(48,60,162,60,'#C0272D',1.5));o.push(T(105,50,'wavelength \u03bb','#C0272D',9,'middle',false));o.push(T(20,86,'A','#E65100',9,'middle',false));o.push(L(20,110,20,60,'#E65100',1.5,'3,2'));o.push(T(20,55,'A','#E65100',8,'middle',false));}
if(p>=2){o.push(T(240,200,'f = 1/T   v = f\u03bb   T = 1/f','#0d47a1',12,'middle',true));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Transverse vs longitudinal','#1565C0',13,'middle',true));
o.push(T(120,50,'TRANSVERSE','#1565C0',10,'middle',true));
for(var i=0;i<200;i++)o.push(L(i,80+30*Math.sin(i*0.1),i+1,80+30*Math.sin((i+1)*0.1),'#1565C0',2));
o.push(T(120,148,'oscillation \u22a5 direction of travel','#555',8,'middle',false));
if(p>=1){o.push(T(370,50,'LONGITUDINAL','#2E7D32',10,'middle',true));
var cx=260;for(var j=0;j<6;j++){var x=cx+j*36+Math.sin(j*1.2)*14;o.push(L(x,90,x,140,'#2E7D32',2));o.push(circ(x,115,5,'#2E7D32','#1b5e20'));}
o.push(T(370,148,'oscillation || direction of travel','#555',8,'middle',false));}
if(p>=2){o.push(T(240,200,'EM waves: transverse. Sound: longitudinal.','#333',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'v = f \u00d7 \u03bb','#1565C0',13,'middle',true));
o.push(R(80,40,320,56,'#e3f2fd','#1565C0',2));o.push(T(240,62,'v = f \u00d7 \u03bb','#0d47a1',20,'middle',true));o.push(T(240,80,'speed (m/s) = frequency (Hz) \u00d7 wavelength (m)','#555',9,'middle',false));
if(p>=1){[['v','wave speed','m/s','#C0272D',80],['f','frequency','Hz','#1565C0',240],['\u03bb','wavelength','m','#2E7D32',400]].forEach(function(r){o.push(R(r[4]-48,106,104,40,'#e3f2fd','#1565C0',1));o.push(T(r[4],128,r[0],r[3],16,'middle',true));o.push(T(r[4],156,r[2],'#555',8,'middle',false));});}
if(p>=2){o.push(R(50,172,380,56,'#fff','#ccc',1));o.push(T(240,192,'f=440 Hz, \u03bb=0.77 m: v=440\u00d70.77=338.8 m/s','#333',10,'middle',false));o.push(T(240,214,'Speed of sound in air \u2248 340 m/s','#1565C0',11,'middle',true));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Reflection of waves','#1565C0',12,'middle',true));
o.push(L(240,22,240,248,'#aaa',1,'4,3'));
o.push(L(48,248,432,248,'#333',2));o.push(T(240,258,'mirror / boundary','#555',8,'middle',false));
if(p>=1){o.push(arw(80,60,240,248,'#1565C0',2));o.push(T(130,130,'incident ray','#1565C0',9,'middle',false));
o.push(L(80,60,240,60,'#aaa',1,'3,2'));o.push(T(168,50,'i','#1565C0',9,'middle',false));}
if(p>=2){o.push(arw(240,248,400,60,'#C0272D',2));o.push(T(355,130,'reflected ray','#C0272D',9,'middle',false));o.push(T(312,50,'r','#C0272D',9,'middle',false));o.push(T(240,200,'angle i = angle r (both from normal)','#0d47a1',10,'middle',true));}
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Refraction of waves','#1565C0',12,'middle',true));
o.push(R(0,130,480,130,'#bbdefb','#1565C0',1));o.push(T(400,100,'less dense','#1565C0',8,'end',false));o.push(T(400,200,'more dense','#1565C0',8,'end',false));
o.push(L(240,22,240,260,'#aaa',1,'4,3'));
if(p>=1){o.push(arw(100,30,240,130,'#1565C0',2));o.push(T(130,70,'incident','#1565C0',9,'middle',false));}
if(p>=2){o.push(arw(240,130,310,250,'#C0272D',2));o.push(T(310,200,'refracted\n(bends towards normal)','#C0272D',8,'middle',false));o.push(T(240,240,'enters denser medium: bends towards normal, slows down','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Diffraction','#1565C0',12,'middle',true));
o.push(R(0,100,180,10,'#333','#333',0));o.push(R(300,100,180,10,'#333','#333',0));
if(p>=1){for(var i=0;i<8;i++)o.push(L(20+i*20,0,20+i*20,100,'#1565C0',1.5));
o.push(T(100,50,'plane waves','#1565C0',8,'middle',false));}
if(p>=2){var cx=240,cy=110;for(var a=0;a<180;a+=12){var rad=a*Math.PI/180;for(var r2=20;r2<120;r2+=20)o.push(circ(cx+r2*Math.cos(rad),cy+r2*Math.sin(rad)*0.8,2,'#1565C0','none'));}
o.push(T(240,240,'waves spread through gap; most spreading when gap \u2248 \u03bb','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ4(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Waves summary','#1565C0',13,'middle',true));
[['v = f\u03bb','wave speed = frequency \u00d7 wavelength'],['f = 1/T','frequency = 1 / period'],['Transverse','oscillation perpendicular to travel (EM, water)'],['Longitudinal','oscillation parallel to travel (sound)'],['Reflection','angle i = angle r (from normal)'],['Refraction','bends at boundary; denser = slower'],['Diffraction','spreading at gaps; max when gap \u2248 \u03bb']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*30,460,24,'#e3f2fd','#BBDEFB',1));o.push(T(120,54+i*30,r[0],'#1565C0',10,'middle',true));o.push(T(340,54+i*30,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Waves',ti:'Wave Properties',su:'Define amplitude, wavelength, frequency and period.',steps:[
  {lb:'Key terms',dr:dQ1,ht:'<p><b>Amplitude (A):</b> maximum displacement from rest position (m). <b>Wavelength (\u03bb):</b> distance between two successive identical points (m). <b>Frequency (f):</b> number of complete waves per second (Hz). <b>Period (T):</b> time for one complete wave (s).</p><div class="fm">f = 1/T</div>'},
  {lb:'The wave equation',dr:dQ1,ht:'<div class="fm">v = f \u00d7 \u03bb</div><p>v = wave speed (m/s), f = frequency (Hz), \u03bb = wavelength (m). All waves obey this equation.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var f=rnd(100,2000),lam=rnd(1,20)*0.1,v=parseFloat((f*lam).toFixed(1));var type=pick(['v','f','lam']);if(type==='v')return{question:'f = <b>'+f+' Hz</b>, \u03bb = <b>'+lam.toFixed(1)+' m</b>. Find wave speed.',hints:['v = f\u03bb'],ans:v,tol:v*0.01,unit:'m/s',working:'v = '+f+'\u00d7'+lam.toFixed(1)+' = '+v+' m/s'};if(type==='f'){var v2=rnd(200,3000),l2=rnd(1,20)*0.1,f2=parseFloat((v2/l2).toFixed(1));return{question:'v = <b>'+v2+' m/s</b>, \u03bb = <b>'+l2.toFixed(1)+' m</b>. Find frequency.',hints:['f = v/\u03bb'],ans:f2,tol:f2*0.01,unit:'Hz',working:'f = '+v2+'/'+l2.toFixed(1)+' = '+f2+' Hz'};}var v3=rnd(200,3000),f3=rnd(100,1000),l3=parseFloat((v3/f3).toFixed(3));return{question:'v = <b>'+v3+' m/s</b>, f = <b>'+f3+' Hz</b>. Find wavelength.',hints:['\u03bb = v/f'],ans:l3,tol:l3*0.02,unit:'m',working:'\u03bb = '+v3+'/'+f3+' = '+l3+' m'};})}
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Waves',ti:'Transverse and Longitudinal Waves',su:'Distinguish transverse from longitudinal waves. Give examples.',steps:[
  {lb:'Two types',dr:dQ2,ht:'<p><b>Transverse:</b> oscillation is perpendicular (at 90°) to direction of energy transfer. Examples: all EM waves, water waves, waves on a string.<br><b>Longitudinal:</b> oscillation is parallel to direction of energy transfer. Compressions and rarefactions. Example: sound.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var qs=[{q:'Sound waves are: 1=transverse, 2=longitudinal.',a:2,w:'Sound: oscillation parallel to travel = longitudinal. Answer: 2.'},{q:'Light waves are: 1=transverse, 2=longitudinal.',a:1,w:'All EM waves (including light) are transverse. Answer: 1.'},{q:'Water waves are: 1=transverse, 2=longitudinal.',a:1,w:'Water waves are transverse. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Sound: longitudinal. EM waves and water: transverse.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Waves',ti:'Wave Speed Calculations',su:'Apply v = f\u03bb and f = 1/T to solve problems.',steps:[
  {lb:'v = f\u03bb and f = 1/T',dr:dQ3,ht:'<p>Speed of sound in air \u2248 340 m/s. Speed of light = 3\u00d710\u2078 m/s. All EM waves travel at c in a vacuum.</p><div class="fm">v = f \u00d7 \u03bb &nbsp;&nbsp;&nbsp; f = 1/T &nbsp;&nbsp;&nbsp; T = 1/f</div>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var T=rnd(2,20)*0.001,f=parseFloat((1/T).toFixed(1));var lam=rnd(1,10)*0.1,v=parseFloat((f*lam).toFixed(1));var type=pick(['period_to_f','full_v']);if(type==='period_to_f')return{question:'Period T = <b>'+T.toFixed(3)+' s</b>. Find frequency.',hints:['f = 1/T'],ans:f,tol:f*0.01,unit:'Hz',working:'f = 1/'+T.toFixed(3)+' = '+f+' Hz'};return{question:'T = <b>'+T.toFixed(3)+' s</b>, \u03bb = <b>'+lam.toFixed(1)+' m</b>. Find wave speed.',hints:['f = 1/T, then v = f\u03bb'],ans:v,tol:v*0.02,unit:'m/s',working:'f = '+f+' Hz. v = '+f+'\u00d7'+lam.toFixed(1)+' = '+v+' m/s'};})}
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Waves',ti:'Reflection',su:'Apply the law of reflection. Explain how images form in plane mirrors.',steps:[
  {lb:'Law of reflection',dr:dQ4,ht:'<p>Angle of incidence = angle of reflection (both measured from the <b>normal</b> \u2014 a line perpendicular to the surface at the point of incidence).</p><p>Plane mirror image: same size, same distance behind mirror, laterally inverted, virtual.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var i=rnd(10,80);return{question:'Angle of incidence = <b>'+i+'\u00b0</b>. Find angle of reflection.',hints:['Angle of incidence = angle of reflection'],ans:i,tol:0,unit:'\u00b0',working:'Angle of reflection = angle of incidence = '+i+'\u00b0'};})},
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Waves',ti:'Refraction',su:'Explain refraction. Apply Snell\'s law: n = sin\u03b8\u2081/sin\u03b8\u2082.',steps:[
  {lb:'Why waves refract',dr:dQ5,ht:'<p>Refraction occurs when waves cross a boundary between media of different densities. The wave changes speed \u2192 changes direction (unless hitting at 90°).</p><p>Entering denser medium: slows down, bends <b>towards</b> normal. Leaving denser medium: speeds up, bends <b>away</b> from normal.</p>'},
  {lb:"Snell's law",dr:dQ5,ht:'<div class="fm">n\u2081 sin\u03b8\u2081 = n\u2082 sin\u03b8\u2082</div><p>n = refractive index (dimensionless). Larger n = denser medium = slower wave.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var n=pick([1.5,1.33,2.42,1.9]);var th1=rnd(20,60);var sin2=Math.sin(th1*Math.PI/180)/n;var th2=parseFloat((Math.asin(sin2)*180/Math.PI).toFixed(1));return{question:'n\u2081=1 (air), n\u2082=<b>'+n+'</b>, \u03b8\u2081=<b>'+th1+'\u00b0</b>. Find angle of refraction \u03b8\u2082.',hints:['n\u2081sin\u03b8\u2081 = n\u2082sin\u03b8\u2082','sin\u03b8\u2082 = sin\u03b8\u2081/n\u2082'],ans:th2,tol:0.5,unit:'\u00b0',working:'sin\u03b8\u2082 = sin'+th1+'/'+n+' = '+sin2.toFixed(3)+'. \u03b8\u2082 = '+th2+'\u00b0'};})}
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Waves',ti:'Total Internal Reflection',su:'Explain TIR and critical angle. Give applications.',steps:[
  {lb:'TIR',dr:dQ6,ht:'<p>When light travels from a denser to a less dense medium, above the <b>critical angle</b> it is totally internally reflected instead of refracting out.</p><div class="fm">sin c = 1/n &nbsp;&nbsp; (where n = refractive index of denser medium)</div><p>Applications: optical fibres, diamond sparkle, periscopes.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var n=pick([1.5,1.33,1.9,2.42]);var c=parseFloat((Math.asin(1/n)*180/Math.PI).toFixed(1));return{question:'Refractive index n = <b>'+n+'</b>. Find the critical angle.',hints:['sin c = 1/n'],ans:c,tol:0.5,unit:'\u00b0',working:'sin c = 1/'+n+' = '+parseFloat((1/n).toFixed(3))+'. c = '+c+'\u00b0'};})}
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Waves',ti:'Diffraction',su:'Describe diffraction and explain when it is most significant.',steps:[
  {lb:'Diffraction',dr:dQ7,ht:'<p>Diffraction is the spreading of waves as they pass through a gap or around an obstacle. It is most significant when the gap width is approximately equal to the wavelength.</p><p>Wider gap or shorter wavelength \u2192 less diffraction. Narrower gap or longer wavelength \u2192 more diffraction.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Maximum diffraction occurs when gap width is: 1=much larger than \u03bb, 2=approximately equal to \u03bb.',a:2,w:'Gap \u2248 \u03bb gives maximum spreading. Answer: 2.'},{q:'Radio waves (long \u03bb) diffract more than light (short \u03bb) around buildings: 1=true, 2=false.',a:1,w:'Longer wavelength = more diffraction relative to obstacles. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Gap \u2248 \u03bb = maximum diffraction'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Waves',ti:'Wave Calculations Practice',su:'Mixed v=f\u03bb, period, frequency and speed calculations.',steps:[
  {lb:'Strategy',dr:dQ8,ht:'<p>v=f\u03bb \u2022 f=1/T \u2022 T=1/f. Speed of sound \u2248 340 m/s. Speed of light = 3\u00d710\u2078 m/s. Always check units.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var type=pick(['echo','light','sound']);if(type==='echo'){var d=rnd(50,500),t=parseFloat((2*d/340).toFixed(2));return{question:'Echo heard <b>'+t.toFixed(2)+' s</b> after shout (v=340 m/s). Find distance to wall.',hints:['d = v\u00d7t/2 (sound travels there and back)'],ans:d,tol:2,unit:'m',working:'d = 340\u00d7'+t.toFixed(2)+'/2 = '+d+' m'};}if(type==='light'){var f=rnd(4,8)*1e14,lam=parseFloat((3e8/f).toFixed(9));return{question:'f = <b>'+f.toExponential(0)+' Hz</b> (light). Find \u03bb. (c = 3\u00d710\u2078 m/s)',hints:['\u03bb = c/f'],ans:parseFloat(lam.toFixed(9)),tol:lam*0.02,unit:'m',working:'\u03bb = 3\u00d710\u2078/'+f.toExponential(0)+' = '+lam.toExponential(2)+' m'};}var f2=rnd(200,1000),lam2=parseFloat((340/f2).toFixed(2));return{question:'Sound: f = <b>'+f2+' Hz</b>, v=340 m/s. Find wavelength.',hints:['\u03bb = v/f'],ans:lam2,tol:0.01,unit:'m',working:'\u03bb = 340/'+f2+' = '+lam2+' m'};})}
]},
{ey:'Q9 \u2022 Y11 Physics \u2022 Waves',ti:'Refractive Index Calculations',su:'Apply n = c/v and Snell\'s law in multi-step problems.',steps:[
  {lb:'Refractive index',dr:dQ9,ht:'<div class="fm">n = c / v &nbsp;&nbsp;&nbsp; n\u2081sin\u03b8\u2081 = n\u2082sin\u03b8\u2082 &nbsp;&nbsp;&nbsp; sin c = 1/n</div><p>n = refractive index, c = 3\u00d710\u2078 m/s, v = speed in medium.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var n=pick([1.5,1.33,1.9,2.42]);var v=parseFloat((3e8/n).toFixed(0));var type=pick(['n_from_v','v_from_n','critical']);if(type==='n_from_v')return{question:'Speed in medium = <b>'+v.toExponential(2)+' m/s</b>. Find n. (c=3\u00d710\u2078)',hints:['n = c/v'],ans:n,tol:0.02,unit:'',working:'n = 3\u00d710\u2078/'+v.toExponential(2)+' = '+n};if(type==='v_from_n')return{question:'n = <b>'+n+'</b>. Find speed of light in medium. (c=3\u00d710\u2078)',hints:['v = c/n'],ans:v,tol:v*0.01,unit:'m/s',working:'v = 3\u00d710\u2078/'+n+' = '+v.toExponential(2)+' m/s'};var c_ang=parseFloat((Math.asin(1/n)*180/Math.PI).toFixed(1));return{question:'n = <b>'+n+'</b>. Find critical angle.',hints:['sin c = 1/n'],ans:c_ang,tol:0.5,unit:'\u00b0',working:'sin c = 1/'+n+'. c = '+c_ang+'\u00b0'};})}
]},
{ey:'Q10 \u2022 Y11 Physics \u2022 Waves',ti:'Waves Summary',su:'All wave equations and phenomena.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>v=f\u03bb \u2022 f=1/T \u2022 n=c/v \u2022 sin c=1/n \u2022 n\u2081sin\u03b8\u2081=n\u2082sin\u03b8\u2082 \u2022 Transverse: EM+water. Longitudinal: sound. TIR above critical angle.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['v_fl','tir','type']);if(type==='v_fl'){var f=rnd(100,5000),lam=rnd(1,50)*0.01,v=parseFloat((f*lam).toFixed(2));return{question:'f=<b>'+f+' Hz</b>, \u03bb=<b>'+lam.toFixed(2)+' m</b>. Find v.',hints:['v = f\u03bb'],ans:v,tol:v*0.01,unit:'m/s',working:'v = '+f+'\u00d7'+lam.toFixed(2)+' = '+v+' m/s'};}if(type==='tir'){var n2=pick([1.5,1.9,2.42]);var c2=parseFloat((Math.asin(1/n2)*180/Math.PI).toFixed(1));return{question:'n = <b>'+n2+'</b>. Find critical angle.',hints:['sin c = 1/n'],ans:c2,tol:0.5,unit:'\u00b0',working:'c = arcsin(1/'+n2+') = '+c2+'\u00b0'};}var qs=[{q:'Light waves are transverse: 1=true, 2=false.',a:1,w:'All EM waves are transverse. Answer: 1.'},{q:'Sound waves are longitudinal: 1=true, 2=false.',a:1,w:'Sound: compressions and rarefactions parallel to travel. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['EM: transverse. Sound: longitudinal.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
];
