<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Converging (convex) lens','#1565C0',12,'middle',true));
o.push(L(240,22,240,248,'#1565C0',2));
o.push(L(10,130,470,130,'#aaa',1,'3,2'));
o.push(T(252,22,'F','#C0272D',9,'start',false));o.push(T(252,248,'F','#C0272D',9,'start',false));
o.push(L(240,22,240,248,'#333',1,'2,2'));
if(p>=1){o.push(arw(40,70,240,70,'#1565C0',1.5));o.push(arw(240,70,380,200,'#1565C0',1.5));
o.push(arw(40,130,240,130,'#2E7D32',1.5));o.push(arw(240,130,380,130,'#2E7D32',1.5));
o.push(arw(40,190,240,190,'#E65100',1.5));o.push(arw(240,190,380,70,'#E65100',1.5));
o.push(circ(380,138,6,'#C0272D'));o.push(T(390,138,'image','#C0272D',8,'start',false));}
if(p>=2){o.push(T(240,250,'Real, inverted, diminished (object beyond 2F)','#555',8,'middle',false));}
s.innerHTML=o.join('');}

o.push(T(240,22,'Lens formula and magnification','#1565C0',12,'middle',true));
o.push(R(40,40,400,56,'#e3f2fd','#1565C0',2));o.push(T(240,62,'1/f = 1/v + 1/u','#0d47a1',16,'middle',true));o.push(T(240,80,'f=focal length, v=image dist, u=object dist (all in m)','#555',8,'middle',false));
if(p>=1){o.push(R(40,106,400,40,'#e3f2fd','#1565C0',1.5));o.push(T(240,130,'m = v/u = image height / object height','#0d47a1',12,'middle',true));}
if(p>=2){o.push(R(40,158,400,40,'#e3f2fd','#1565C0',1.5));o.push(T(240,178,'P (dioptres) = 1/f (metres)','#0d47a1',12,'middle',true));}
if(p>=3){o.push(R(40,210,400,34,'#fff','#ccc',1));o.push(T(240,230,'Sign convention: real = positive, virtual = negative','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Dispersion by a prism','#1565C0',12,'middle',true));
o.push('<polygon points="240,40 80,220 400,220" fill="#e3f2fd" stroke="#1565C0" stroke-width="2"/>');
if(p>=1){o.push(arw(30,100,200,138,'#fff',2));o.push(T(20,90,'white light','#333',8,'end',false));}
if(p>=2){var cols=[['#C0272D','red',1],['#E65100','orange',2],['#C8922A','yellow',3],['#2E7D32','green',4],['#1565C0','blue',5],['#6A1B9A','violet',6]];cols.forEach(function(c){o.push(arw(310,155+c[2]*8,460,155+c[2]*12,c[0],1.5));o.push(T(468,159+c[2]*12,c[1],c[0],8,'start',false));});}
if(p>=3){o.push(T(240,248,'ROYGBV: red bends least, violet bends most','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'The eye','#1565C0',12,'middle',true));
o.push('<ellipse cx="240" cy="140" rx="120" ry="100" fill="#e3f2fd" stroke="#1565C0" stroke-width="2"/>');
if(p>=1){o.push(R(340,100,20,80,'#90caf9','#0d47a1',2));o.push(T(370,148,'retina','#0d47a1',8,'start',false));
o.push('<ellipse cx="175" cy="140" rx="20" ry="25" fill="#bbdefb" stroke="#1565C0" stroke-width="1.5"/>');o.push(T(175,184,'lens','#555',8,'middle',false));
o.push('<ellipse cx="148" cy="140" rx="8" ry="12" fill="#333"/>');o.push(T(148,172,'pupil','#555',8,'middle',false));}
if(p>=2){o.push(T(240,248,'Ciliary muscles control lens shape; retina detects light','#555',8,'middle',false));}
s.innerHTML=o.join('');}
function dQ5(p){dQ2(p);}
function dQ6(p){dQ1(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ4(p);}
function dQ9(p){dQ2(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Light summary','#1565C0',13,'middle',true));
[['Converging lens','brings parallel rays to a focal point'],['1/f = 1/v + 1/u','thin lens formula (real = +)'],['m = v/u','magnification = image/object distance'],['P = 1/f','power in dioptres (f in metres)'],['Dispersion','white light splits: ROYGBV (red least, violet most)'],['TIR','above critical angle; sin c = 1/n']].forEach(function(r,i){if(i<p+1){o.push(R(10,38+i*33,460,26,'#e3f2fd','#BBDEFB',1));o.push(T(130,55+i*33,r[0],'#1565C0',10,'middle',true));o.push(T(340,55+i*33,r[1],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y11 Physics \u2022 Light',ti:'Converging Lenses',su:'Draw and explain ray diagrams for converging lenses.',steps:[
  {lb:'Three key rays',dr:dQ1,ht:'<p>Three rays through a converging (convex) lens: (1) Parallel to axis \u2192 passes through F. (2) Through centre of lens \u2192 undeviated. (3) Through F on object side \u2192 emerges parallel to axis.</p>'},
  {lb:'Image types',dr:dQ1,ht:'<p>Object beyond 2F: real, inverted, diminished. Object at 2F: real, inverted, same size. Object between F and 2F: real, inverted, magnified. Object inside F: virtual, upright, magnified (magnifying glass).</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var qs=[{q:'Object beyond 2F of converging lens. Image is: 1=virtual, upright, magnified, 2=real, inverted, diminished.',a:2,w:'Beyond 2F: real, inverted, diminished. Answer: 2.'},{q:'Object inside F of converging lens. Image is: 1=virtual, upright, magnified, 2=real, inverted, diminished.',a:1,w:'Inside F: virtual, upright, magnified (like a magnifying glass). Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['Beyond 2F: real, inverted. Inside F: virtual, upright.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q2 \u2022 Y11 Physics \u2022 Light',ti:'Lens Formula',su:'Apply 1/f = 1/v + 1/u and m = v/u.',steps:[
  {lb:'The formula',dr:dQ2,ht:'<p>Sign convention: distances to real objects/images are positive; virtual are negative.</p><div class="fm">1/f = 1/v + 1/u</div><div class="fm">m = v / u</div><p>Power P = 1/f (dioptres, when f in metres).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var f=rnd(5,20)*0.01,u=rnd(3,8)*f*2;var v_inv=1/f-1/u,v=parseFloat((1/v_inv).toFixed(3));var type=pick(['v','f','m']);if(type==='v')return{question:'f = <b>'+f.toFixed(2)+' m</b>, u = <b>'+u.toFixed(2)+' m</b>. Find image distance v.',hints:['1/v = 1/f - 1/u'],ans:v,tol:v*0.02,unit:'m',working:'1/v = 1/'+f.toFixed(2)+' - 1/'+u.toFixed(2)+' = '+v_inv.toFixed(2)+'. v = '+v+' m'};if(type==='m'){var m=parseFloat((v/u).toFixed(2));return{question:'v = <b>'+v.toFixed(3)+' m</b>, u = <b>'+u.toFixed(2)+' m</b>. Find magnification.',hints:['m = v/u'],ans:m,tol:m*0.02,unit:'',working:'m = '+v.toFixed(3)+'/'+u.toFixed(2)+' = '+m};}var P=parseFloat((1/f).toFixed(1));return{question:'f = <b>'+f.toFixed(2)+' m</b>. Find power in dioptres.',hints:['P = 1/f'],ans:P,tol:P*0.01,unit:'D',working:'P = 1/'+f.toFixed(2)+' = '+P+' D'};})}
]},
{ey:'Q3 \u2022 Y11 Physics \u2022 Light',ti:'Dispersion',su:'Explain how prisms disperse white light into a spectrum.',steps:[
  {lb:'Dispersion',dr:dQ3,ht:'<p>White light is a mixture of all visible wavelengths. A prism separates them because different wavelengths refract by different amounts: <b>violet refracts most, red refracts least</b> (ROYGBV).</p><p>This is because the refractive index of glass is slightly different for each wavelength.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var qs=[{q:'Which colour of light refracts most in a glass prism? 1=red, 2=violet.',a:2,w:'Violet has shortest wavelength, highest refractive index in glass \u2192 refracts most. Answer: 2.'},{q:'Which colour of light has the longest wavelength in the visible spectrum? 1=red, 2=violet.',a:1,w:'Red has the longest wavelength in visible light. Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['ROYGBV: red bends least, violet bends most'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q4 \u2022 Y11 Physics \u2022 Light',ti:'The Eye',su:'Describe how the eye forms an image. Compare with a camera.',steps:[
  {lb:'The eye',dr:dQ4,ht:'<p>Cornea: main refraction. Lens: fine adjustment (accommodation). Iris/pupil: controls light entry. Retina: detects light (rods and cones). Ciliary muscles: contract \u2192 lens fatter (near objects); relax \u2192 lens thinner (far objects).</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var qs=[{q:'Looking at a near object, ciliary muscles: 1=relax, making lens thin, 2=contract, making lens fatter.',a:2,w:'Near: ciliary muscles contract \u2192 lens fat \u2192 more powerful. Answer: 2.'},{q:'Where is the image formed in a healthy eye? 1=cornea, 2=retina.',a:2,w:'Image forms on the retina. Answer: 2.'}];var qq=pick(qs);return{question:qq.q,hints:['Near: ciliary contract, lens fat. Retina: detects image.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q5 \u2022 Y11 Physics \u2022 Light',ti:'Lens Power and Defects of Vision',su:'Calculate lens power. Describe short and long sight corrections.',steps:[
  {lb:'Defects of vision',dr:dQ5,ht:'<p><b>Short sight (myopia):</b> image forms in front of retina. Corrected by diverging (concave) lens (negative power).<br><b>Long sight (hyperopia):</b> image forms behind retina. Corrected by converging (convex) lens (positive power).</p><div class="fm">P = 1/f (dioptres)</div>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var f=pick([-0.25,-0.5,0.25,0.5,0.33,0.2]);var P=parseFloat((1/f).toFixed(1));return{question:'Corrective lens focal length = <b>'+f+' m</b>. Find power.',hints:['P = 1/f'],ans:P,tol:P*0.02,unit:'D',working:'P = 1/'+f+' = '+P+' D ('+((P>0)?'converging':'diverging')+')'};})},
]},
{ey:'Q6 \u2022 Y11 Physics \u2022 Light',ti:'Magnifying Glass',su:'Explain how a magnifying glass produces a virtual image.',steps:[
  {lb:'Magnifying glass',dr:dQ6,ht:'<p>Object placed inside focal length of converging lens. Image is: virtual (behind the lens), upright, magnified. The eye looks through the lens and sees the enlarged virtual image. Angular magnification = image angle / object angle.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var f=rnd(5,20)*0.01,u=f*rnd(3,9)*0.1;var v_inv=1/f-1/u;if(v_inv>0){u=f*0.6;}v_inv=1/f-1/u;var v=parseFloat((-1/v_inv).toFixed(3));var m=parseFloat((v/u).toFixed(1));return{question:'f = <b>'+f.toFixed(2)+' m</b>, u = <b>'+u.toFixed(2)+' m</b> (inside F). Find |v| (virtual image distance).',hints:['1/v = 1/f - 1/u; image is virtual (negative v)'],ans:v,tol:v*0.05,unit:'m',working:'1/v = '+(1/f).toFixed(1)+' - '+(1/u).toFixed(1)+' = '+v_inv.toFixed(1)+'. |v| = '+v+' m'};})},
]},
{ey:'Q7 \u2022 Y11 Physics \u2022 Light',ti:'Colour and Filters',su:'Explain colour mixing and the effect of colour filters.',steps:[
  {lb:'Colour',dr:dQ7,ht:'<p>Primary colours of light: red, green, blue (RGB). Mix all three: white. Secondary colours: cyan (G+B), magenta (R+B), yellow (R+G).<br>A colour filter transmits its own colour and absorbs others. Red filter: transmits red, absorbs all others.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Red light shines on a green filter. What colour passes through? 1=red, 2=green, 3=no light.',a:3,w:'Green filter only transmits green. Red is absorbed \u2192 no light. Answer: 3.'},{q:'Primary colours of light are: 1=red, yellow, blue, 2=red, green, blue.',a:2,w:'Primary colours of light: red, green, blue (RGB). Answer: 2.'},{q:'Red + Green light = 1=yellow, 2=cyan, 3=magenta.',a:1,w:'Red + Green = Yellow (secondary colour of light). Answer: 1.'}];var qq=pick(qs);return{question:qq.q,hints:['RGB primaries. Red+Green=Yellow. Green+Blue=Cyan. Red+Blue=Magenta.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y11 Physics \u2022 Light',ti:'Plane Mirrors and Reflection',su:'Describe image characteristics in a plane mirror.',steps:[
  {lb:'Plane mirror image',dr:dQ8,ht:'<p>Image in a plane mirror: same size as object, same distance behind mirror as object is in front, laterally inverted (left-right), virtual (cannot be projected on a screen), upright.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var d=rnd(5,50);return{question:'Object is <b>'+d+' cm</b> in front of a plane mirror. How far is the image behind the mirror?',hints:['Image distance = object distance for plane mirror'],ans:d,tol:0,unit:'cm',working:'Image is '+d+' cm behind the mirror (same distance as object in front).'};})},
]},
{ey:'Q9 \u2022 Y11 Physics \u2022 Light',ti:'Optical Fibres',su:'Explain total internal reflection in optical fibres.',steps:[
  {lb:'Optical fibres',dr:dQ9,ht:'<p>Optical fibres use <b>total internal reflection</b> to transmit light signals along a glass fibre. Light hits the glass-air boundary at an angle greater than the critical angle \u2192 reflects internally. Used in: telecommunications, medical endoscopes.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var n=1.5;var c=parseFloat((Math.asin(1/n)*180/Math.PI).toFixed(1));var ang=c+rnd(5,20);return{question:'Critical angle = <b>'+c+'\u00b0</b>. A ray hits the boundary at <b>'+ang+'\u00b0</b>. Does TIR occur? 1=yes, 2=no.',hints:['TIR occurs when angle > critical angle'],ans:1,tol:0,unit:'',working:ang+'\u00b0 > '+c+'\u00b0 (critical angle) \u2192 TIR occurs. Answer: 1.'};})},
]},
{ey:'Q10 \u2022 Y11 Physics \u2022 Light',ti:'Mixed Light Questions',su:'Lenses, dispersion, colour, TIR and the eye.',steps:[
  {lb:'Summary',dr:dQ10,ht:'<p>1/f=1/v+1/u \u2022 m=v/u \u2022 P=1/f \u2022 Dispersion: violet most \u2022 RGB primaries \u2022 TIR: above critical angle \u2022 Myopia: diverging. Hyperopia: converging.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['lens','colour','tir']);if(type==='lens'){var f=rnd(5,20)*0.01,u=rnd(3,8)*f*2;var v=parseFloat((1/(1/f-1/u)).toFixed(3));return{question:'f=<b>'+f.toFixed(2)+' m</b>, u=<b>'+u.toFixed(2)+' m</b>. Find v.',hints:['1/v = 1/f - 1/u'],ans:v,tol:v*0.02,unit:'m',working:'v = '+v+' m'};}if(type==='colour'){var qs=[{q:'Which colour refracts most in a prism? 1=red, 2=violet.',a:2,w:'Violet refracts most. Answer: 2.'},{q:'Red + Blue light = 1=yellow, 2=cyan, 3=magenta.',a:3,w:'Red + Blue = Magenta. Answer: 3.'}];var qq=pick(qs);return{question:qq.q,hints:['Violet bends most. R+B=Magenta.'],ans:qq.a,tol:0,unit:'',working:qq.w};}var n=pick([1.5,1.9,2.42]);var c=parseFloat((Math.asin(1/n)*180/Math.PI).toFixed(1));return{question:'n = <b>'+n+'</b>. Critical angle?',hints:['sin c = 1/n'],ans:c,tol:0.5,unit:'\u00b0',working:'c = arcsin(1/'+n+') = '+c+'\u00b0'};})},
]},
];

render();
