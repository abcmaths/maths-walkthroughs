<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Integers, Powers &amp; Roots &middot; Year 8 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-q{font-size:15px;margin:8px 0 10px;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Integers, Powers &amp; Roots &mdash; Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]={o:o};
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">\u2714 Your Turn</div><div class="try-q">'+o.question+'</div>'+(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/><button class="ck try-ck" data-tryid="'+id+'">Check</button></div><div class="try-fb" data-tryid="'+id+'"></div><details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details></div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid'),o=ST[id].o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.5)){fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! '+o.working;}
    else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#241A17')+'" text-anchor="'+(a||'middle')+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#888')+'" stroke-width="'+(w||1.5)+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" rx="2"/>';}

/* Q1 Negative integers - BIDMAS */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(R(60,20,360,40,'#fff5f0','#C0272D',2));
  o.push(T(240,46,'\u22126 \u00d7 4 + 18 \u00f7 (\u22123)','#C0272D',17,'middle',true));
  if(p>=1){
    o.push(T(240,85,'Step 1: Multiplication and division first (BIDMAS)','#888',12,'middle',false));
    o.push(R(60,95,160,36,'#fce8d8','#C0272D',1.5));
    o.push(T(140,118,'\u22126 \u00d7 4 = \u221224','#C0272D',14,'middle',true));
  }
  if(p>=2){
    o.push(R(270,95,170,36,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(355,118,'18 \u00f7 (\u22123) = \u22126','#1a5a8a',14,'middle',true));
    o.push(T(240,148,'Different signs \u2192 negative result','#888',11,'middle',false));
  }
  if(p>=3){
    o.push(R(120,160,240,40,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,186,'\u221224 + (\u22126) = \u221230','#1a7a3a',16,'middle',true));
  }
  if(p>=4){
    o.push(T(240,230,'Same signs \u2192 +   Different signs \u2192 \u2212','#C0272D',13,'middle',true));
    o.push(T(240,248,'(applies to both \u00d7 and \u00f7)','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q2 Index laws - multiply */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,34,'2\u00b3 \u00d7 2\u2075','#C0272D',22,'middle',true));
  if(p>=1){
    o.push(T(240,70,'Same base \u2192 ADD the powers','#241A17',13,'middle',false));
    o.push(R(100,82,280,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,106,'2\u00b3 \u00d7 2\u2075 = 2\u00b3\u207a\u2075 = 2\u2078','#C0272D',16,'middle',true));
  }
  if(p>=2){
    o.push(T(240,142,'Calculate 2\u2078:','#888',12,'middle',false));
    o.push(T(240,162,'2\u2078 = 256','#241A17',18,'middle',true));
  }
  if(p>=3){
    o.push(L(40,185,440,185,'#E4D6CE',1));
    o.push(T(60,206,'Law','#888',11,'start',true));
    o.push(T(200,206,'Rule','#888',11,'start',true));
    o.push(T(60,222,'Multiply','#241A17',11,'start',false));
    o.push(T(200,222,'a\u1d50 \u00d7 a\u207f = a\u1d50\u207a\u207f','#C0272D',12,'start',true));
    o.push(T(60,238,'Divide','#241A17',11,'start',false));
    o.push(T(200,238,'a\u1d50 \u00f7 a\u207f = a\u1d50\u207b\u207f','#1a5a8a',12,'start',true));
    o.push(T(340,222,'Power of power','#241A17',11,'start',false));
    o.push(T(340,222,'','#241A17',11,'start',false));
  }
  if(p>=4){
    o.push(T(240,250,'Zero index: a\u2070 = 1 for any non-zero a','#C8922A',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q3 Index laws - divide */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,34,'3\u2074 \u00f7 3\u00b2','#C0272D',22,'middle',true));
  if(p>=1){
    o.push(T(240,70,'Same base \u2192 SUBTRACT the powers','#241A17',13,'middle',false));
    o.push(R(100,82,280,38,'#fff5f0','#C0272D',1.5));
    o.push(T(240,106,'3\u2074 \u00f7 3\u00b2 = 3\u2074\u207b\u00b2 = 3\u00b2','#C0272D',16,'middle',true));
  }
  if(p>=2){
    o.push(T(240,148,'3\u00b2 = 9','#241A17',20,'middle',true));
  }
  if(p>=3){
    o.push(T(240,195,'Verification: 3\u2074 = 81,  3\u00b2 = 9','#888',13,'middle',false));
    o.push(T(240,215,'81 \u00f7 9 = 9 \u2713','#1a7a3a',14,'middle',true));
  }
  if(p>=4){
    o.push(T(240,248,'Subtraction law only works when the BASE is the same','#C0272D',12,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q4 Prime factors */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,26,'Write 360 as a product of prime factors','#241A17',14,'middle',false));
  // Factor tree style boxes
  var steps=[
    {val:'360',div:'2',res:'180',y:50},
    {val:'180',div:'2',res:'90',y:90},
    {val:'90',div:'2',res:'45',y:130},
    {val:'45',div:'3',res:'15',y:170},
    {val:'15',div:'3',res:'5',y:210}
  ];
  steps.forEach(function(st,i){
    if(p>=i+1){
      o.push(R(40,st.y,80,30,'#fff5f0','#C0272D',1.5));
      o.push(T(80,st.y+20,st.val,'#241A17',13,'middle',true));
      o.push(T(160,st.y+20,'\u00f7 '+st.div,'#888',12,'middle',false));
      o.push(R(200,st.y,80,30,'#e8f8ee','#1a7a3a',1.5));
      o.push(T(240,st.y+20,st.res,'#1a7a3a',13,'middle',true));
    }
  });
  if(p>=6){
    o.push(R(290,50,170,160,'#fdf4e8','#C8922A',2));
    o.push(T(375,90,'Primes found:','#888',12,'middle',false));
    o.push(T(375,115,'2, 2, 2, 3, 3, 5','#C8922A',15,'middle',true));
    o.push(T(375,148,'360 = 2\u00b3 \u00d7 3\u00b2 \u00d7 5','#C0272D',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q5 HCF and LCM */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Find HCF and LCM of 24 and 36','#241A17',14,'middle',false));
  if(p>=1){
    o.push(R(20,38,200,36,'#fff5f0','#C0272D',1.5));
    o.push(T(120,61,'24 = 2\u00b3 \u00d7 3','#C0272D',14,'middle',true));
    o.push(R(260,38,200,36,'#e8f0ff','#1a5a8a',1.5));
    o.push(T(360,61,'36 = 2\u00b2 \u00d7 3\u00b2','#1a5a8a',14,'middle',true));
  }
  if(p>=2){
    o.push(T(240,100,'HCF \u2014 take LOWEST power of each shared prime','#241A17',12,'middle',false));
    o.push(R(80,110,320,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,133,'HCF = 2\u00b2 \u00d7 3 = 4 \u00d7 3 = 12','#1a7a3a',15,'middle',true));
  }
  if(p>=3){
    o.push(T(240,170,'LCM \u2014 take HIGHEST power of each prime','#241A17',12,'middle',false));
    o.push(R(80,180,320,36,'#fdf4e8','#C8922A',2));
    o.push(T(240,203,'LCM = 2\u00b3 \u00d7 3\u00b2 = 8 \u00d7 9 = 72','#C8922A',15,'middle',true));
  }
  if(p>=4){
    o.push(T(240,248,'HCF: lowest powers   LCM: highest powers','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 \u00b7 Year 8 \u00b7 Integers, Powers & Roots',ti:'Negative Number Operations',su:'Calculate: \u22126 \u00d7 4 + 18 \u00f7 (\u22123)',steps:[
    {lb:'BIDMAS first',dr:dQ1,ht:'<p>Always follow <b>BIDMAS</b>: Brackets, Indices, Division and Multiplication (left to right), Addition and Subtraction. Multiplication and division come before addition.</p>'},
    {lb:'Multiply: \u22126 \u00d7 4',dr:dQ1,ht:'<p>Different signs (negative \u00d7 positive) give a <b>negative</b> result.</p><div class="fm">\u22126 \u00d7 4 = \u221224</div>'},
    {lb:'Divide: 18 \u00f7 (\u22123)',dr:dQ1,ht:'<p>Different signs (positive \u00f7 negative) give a <b>negative</b> result.</p><div class="fm">18 \u00f7 (\u22123) = \u22126</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt({question:'Calculate: <b>\u22125 \u00d7 (\u22123) + 20 \u00f7 (\u22124)</b>',hints:['Multiply and divide first','\u22125 \u00d7 (\u22123) = +15 (same signs)','20 \u00f7 (\u22124) = \u22125 (different signs)'],ans:10,tol:0.5,unit:'',working:'\u22125 \u00d7 (\u22123) = +15;  20 \u00f7 (\u22124) = \u22125;  15 + (\u22125) = 10'})}
  ]},
  {ey:'Q2 \u00b7 Year 8 \u00b7 Integers, Powers & Roots',ti:'Index Law: Multiplication',su:'Evaluate 2\u00b3 \u00d7 2\u2075',steps:[
    {lb:'Same base rule',dr:dQ2,ht:'<p>When you multiply powers with the <b>same base</b>, add the indices.</p><div class="fm">a\u1d50 \u00d7 a\u207f = a\u1d50\u207a\u207f</div>'},
    {lb:'Add the powers',dr:dQ2,ht:'<div class="fm">2\u00b3 \u00d7 2\u2075 = 2\u00b3\u207a\u2075 = 2\u2078</div>'},
    {lb:'Calculate',dr:dQ2,ht:'<div class="fm">2\u2078 = 256</div><p>You can verify: 2\u00b3 = 8, 2\u2075 = 32, 8 \u00d7 32 = 256 \u2713</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt({question:'Simplify <b>5\u00b3 \u00d7 5\u2074</b>. Give the value.',hints:['Add the indices: 3 + 4','5\u2077 = ?'],ans:78125,tol:0.5,unit:'',working:'5\u00b3 \u00d7 5\u2074 = 5\u2077 = 78125'})}
  ]},
  {ey:'Q3 \u00b7 Year 8 \u00b7 Integers, Powers & Roots',ti:'Index Law: Division',su:'Simplify 3\u2074 \u00f7 3\u00b2',steps:[
    {lb:'Division law',dr:dQ3,ht:'<p>When you divide powers with the <b>same base</b>, subtract the indices.</p><div class="fm">a\u1d50 \u00f7 a\u207f = a\u1d50\u207b\u207f</div>'},
    {lb:'Subtract the powers',dr:dQ3,ht:'<div class="fm">3\u2074 \u00f7 3\u00b2 = 3\u2074\u207b\u00b2 = 3\u00b2</div>'},
    {lb:'Calculate and verify',dr:dQ3,ht:'<div class="fm">3\u00b2 = 9</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt({question:'Simplify <b>4\u2076 \u00f7 4\u00b3</b>. Give the value.',hints:['Subtract the indices: 6 \u2212 3','4\u00b3 = ?'],ans:64,tol:0.5,unit:'',working:'4\u2076 \u00f7 4\u00b3 = 4\u00b3 = 64'})}
  ]},
  {ey:'Q4 \u00b7 Year 8 \u00b7 Integers, Powers & Roots',ti:'Prime Factor Decomposition',su:'Write 360 as a product of prime factors.',steps:[
    {lb:'Divide by primes',dr:dQ4,ht:'<p>Keep dividing by the <b>smallest prime</b> that goes in exactly. Primes are: 2, 3, 5, 7, 11, 13&hellip;</p>'},
    {lb:'Repeated division',dr:dQ4,ht:'<p>360 \u00f7 2 = 180<br>180 \u00f7 2 = 90<br>90 \u00f7 2 = 45<br>45 \u00f7 3 = 15<br>15 \u00f7 3 = 5<br>5 \u00f7 5 = 1</p>'},
    {lb:'Stop at 1',dr:dQ4,ht:'<p>When the result reaches 1, list all the primes used.</p><div class="fm">2, 2, 2, 3, 3, 5</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt({question:'How many prime factors does 360 have in total (counting repeats)?',hints:['List: 2, 2, 2, 3, 3, 5','Count them all'],ans:6,tol:0,unit:'factors',working:'2\u00b3 \u00d7 3\u00b2 \u00d7 5 gives 3+2+1 = 6 prime factors'})}
  ]},
  {ey:'Q5 \u00b7 Year 8 \u00b7 Integers, Powers & Roots',ti:'HCF and LCM',su:'Find the HCF and LCM of 24 and 36.',steps:[
    {lb:'Prime factorise both',dr:dQ5,ht:'<p>Write both numbers as products of prime factors first.</p><div class="fm">24 = 2\u00b3 \u00d7 3 &nbsp;&nbsp;&nbsp; 36 = 2\u00b2 \u00d7 3\u00b2</div>'},
    {lb:'HCF: lowest powers',dr:dQ5,ht:'<p>For the <b>HCF</b>, take the <b>lowest</b> power of each prime that appears in <b>both</b>.</p><div class="fm">HCF = 2\u00b2 \u00d7 3\u00b9 = 4 \u00d7 3 = 12</div>'},
    {lb:'LCM: highest powers',dr:dQ5,ht:'<p>For the <b>LCM</b>, take the <b>highest</b> power of each prime that appears in <b>either</b>.</p><div class="fm">LCM = 2\u00b3 \u00d7 3\u00b2 = 8 \u00d7 9 = 72</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt({question:'Find the LCM of 12 and 18. (12 = 2\u00b2 \u00d7 3, &nbsp;18 = 2 \u00d7 3\u00b2)',hints:['Take highest power of each prime','Highest power of 2 is 2\u00b2','Highest power of 3 is 3\u00b2'],ans:36,tol:0,unit:'',working:'LCM = 2\u00b2 \u00d7 3\u00b2 = 4 \u00d7 9 = 36'})}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
</body>
</html>
