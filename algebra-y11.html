<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algebra · Year 11 · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.nq{margin-top:12px;font-size:13px;font-weight:600;padding:6px 14px;border-radius:3px;border:1px solid #aaa;background:#f5f5f5;color:#444;cursor:pointer;}
.nq:hover{background:#e0e0e0;}
.wk-ans{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Algebra &mdash; Year 11</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 260"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;
  return genTry(id,fn());
}
function genTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">✔ Your Turn</div>'+
    '<p>'+o.question+'</p>'+
    '<div class="ar">'+
      '<input type="number" step="any" placeholder="Your answer" id="'+id+'_i"/>'+
      '<button class="ck" onclick="ck(\''+id+'\')">✓ Check</button>'+
    '</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk">'+
      '<summary>Show working</summary>'+
      '<div class="wk-b">'+
        (h?'<ul class="hl">'+h+'</ul>':'')+
        '<div class="wk-ans">'+o.working+'</div>'+
      '</div>'+
    '</details>'+
    '<button class="nq" data-tryid="'+id+'">New question</button>'+
  '</div>';
}
function tryItStatic(o){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=function(){return o;};
  return genTry(id,o);
}

function ck(id){
  var fn=ST[id];
  var o=typeof fn==='function'?fn():fn;
  var v=parseFloat(document.getElementById(id+'_i').value);
  var f=document.getElementById(id+'_f');
  if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}
  var tol=o.tol!==undefined?o.tol:0.5;
  if(Math.abs(v-o.ans)<=tol){
    f.className='fb ok';f.textContent='✓ Correct! Answer: '+o.ans+(o.unit?' '+o.unit:'');
  }else{
    f.className='fb er';f.textContent='Not quite — check your working and try again.';
  }
}
document.addEventListener('click',function(e){
  var b=e.target.closest('.nq');
  if(!b)return;
  var id=b.getAttribute('data-tryid');
  var fn=ST[id];
  if(typeof fn!=='function')return;
  var wrap=b.closest('.try');
  if(wrap){
    var fresh=genTry(id,fn());
    var tmp=document.createElement('div');
    tmp.innerHTML=fresh;
    var nd=tmp.firstChild;
    wrap.parentNode.replaceChild(nd,wrap);
  }
});
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}

function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?'700':'400')+'">'+txt+'</text>';}
function B(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function LN(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

/* Q1 Quadratic formula */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,30,'2x\u00b2 + 5x \u2212 3 = 0','#C0272D',20,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){o.push(B(60,48,360,46,'#fff5f0','#C0272D',1.5));o.push(T(240,65,'a = 2,   b = 5,   c = \u22123','#241A17',14));o.push(T(240,87,'Identify a, b, c first','#888',11));}
  if(p>=2){o.push(B(60,102,360,52,'#e8f4ff','#1a5a8a',2));o.push(T(240,120,'x = [\u2212b \u00b1 \u221a(b\u00b2\u22124ac)] / 2a','#1a5a8a',15,'middle',true));o.push(T(240,147,'Quadratic Formula','#888',11));}
  if(p>=3){o.push(T(240,176,'x = [\u22125 \u00b1 \u221a(25+24)] / 4 = (\u22125 \u00b1 7) / 4','#241A17',13));}
  if(p>=4){o.push(B(110,196,260,46,'#e8f8ee','#1a7a3a',2));o.push(T(240,214,'x = \u00bd   or   x = \u22123','#1a7a3a',17,'middle',true));}
  s.innerHTML=o.join('');
}

/* Q2 Completing the square */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'x\u00b2 + 6x + 2','#C0272D',20,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){o.push(B(60,44,360,46,'#fff5f0','#C0272D',1.5));o.push(T(240,61,'Halve the x-coefficient:  6 \u00f7 2 = 3','#241A17',13));o.push(T(240,83,'Write (x + 3)\u00b2  then correct','#888',11));}
  if(p>=2){o.push(T(240,114,'(x + 3)\u00b2 = x\u00b2 + 6x + 9','#1a5a8a',14));o.push(T(240,136,'So x\u00b2 + 6x + 2 = (x+3)\u00b2 \u2212 9 + 2','#241A17',13));}
  if(p>=3){o.push(B(120,154,240,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,170,'= (x + 3)\u00b2 \u2212 7','#1a7a3a',17,'middle',true));o.push(T(240,192,'Minimum value = \u22127  when x = \u22123','#888',11));}
  if(p>=4){o.push(T(240,222,'Solve: (x+3)\u00b2=7  \u2192  x = \u22123 \u00b1 \u221a7','#C0272D',13,'middle',true));}
  s.innerHTML=o.join('');
}

/* Q3 Simultaneous: linear + quadratic */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=60,oy=210,sx=32,sy=18;
  o.push(LN(ox,20,ox,oy+10,'#ddd',1.5));o.push(LN(ox-8,oy,450,oy,'#ddd',1.5));
  for(var i=0;i<=11;i++)o.push(T(ox+i*sx,oy+14,i,'#aaa',9));
  for(var j=0;j<=10;j++)o.push(T(ox-12,oy-j*sy,j,'#aaa',9,'end'));
  if(p>=1){
    var pts=[];for(var xi=0;xi<=10;xi+=0.3){var yi=xi*xi-4*xi+4;if(yi>=0&&yi<=10)pts.push([ox+xi*sx,oy-yi*sy]);}
    var path='M';pts.forEach(function(pt,i){path+=(i?'L':'')+pt[0].toFixed(1)+','+pt[1].toFixed(1);});
    o.push('<path d="'+path+'" fill="none" stroke="#C0272D" stroke-width="2"/>');
    o.push(T(ox+10*sx+6,oy-6*sy,'y=x\u00b2-4x+4','#C0272D',10,'start'));
  }
  if(p>=2){o.push(LN(ox,oy-2*sy,ox+8*sx,oy-10*sy,'#1a5a8a',2));o.push(T(ox+8*sx+6,oy-10*sy,'y=x+2','#1a5a8a',10,'start'));}
  if(p>=3){
    [[1,3],[6,8]].forEach(function(pt){o.push('<circle cx="'+(ox+pt[0]*sx)+'" cy="'+(oy-pt[1]*sy)+'" r="5" fill="#C8922A" stroke="#fff" stroke-width="2"/>');o.push(T(ox+pt[0]*sx+8,oy-pt[1]*sy-8,'('+pt[0]+','+pt[1]+')','#C8922A',10,'start'));});
  }
  s.innerHTML=o.join('');
}

/* Q4 Functions f(x) */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(B(60,30,360,46,'#fff5f0','#C0272D',1.5));
  o.push(T(240,47,'f(x) = 3x\u00b2 \u2212 2x + 1','#C0272D',16,'middle',true));
  o.push(T(240,70,'A function maps an input x to an output f(x)','#888',12));
  if(p>=1){o.push(B(60,86,160,40,'#e8f4ff','#1a5a8a',1.5));o.push(T(140,101,'Input: x = 4','#1a5a8a',13));o.push(T(140,117,'(substitute x=4)','#888',10));}
  if(p>=2){o.push(B(260,86,160,40,'#e8f8ee','#1a7a3a',1.5));o.push(T(340,101,'f(4) = 48\u22128+1','#1a7a3a',13));o.push(T(340,117,'= 41','#1a7a3a',13,'middle',true));}
  if(p>=3){
    o.push(T(240,154,'Domain: set of allowed inputs','#241A17',12));
    o.push(T(240,174,'Range: set of possible outputs','#241A17',12));
    o.push(B(100,188,280,36,'#fff5f0','#C0272D',1.5));
    o.push(T(240,211,'f(\u22121) = 3+2+1 = 6   |   f(0) = 1','#241A17',12));
  }
  s.innerHTML=o.join('');
}

/* Q5 Composite functions */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'f(x) = 2x + 1      g(x) = x\u00b2','#C0272D',14,'middle',true));
  // function machine diagram
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push(B(40,60,120,50,'#e8f4ff','#1a5a8a',2));o.push(T(100,82,'g(x)','#1a5a8a',14,'middle',true));o.push(T(100,100,'x \u2192 x\u00b2','#888',11));
    o.push(LN(160,85,200,85,'#888',1.5));o.push('<polygon points="200,80 210,85 200,90" fill="#888"/>');
    o.push(B(210,60,120,50,'#fff5f0','#C0272D',2));o.push(T(270,82,'f(x)','#C0272D',14,'middle',true));o.push(T(270,100,'x \u2192 2x+1','#888',11));
    o.push(T(100,45,'Input x','#888',11));o.push(T(270,45,'fg(x)','#C0272D',12,'middle',true));
  }
  if(p>=2){o.push(T(240,132,'fg(x) = f(g(x)) = f(x\u00b2)','#241A17',14));o.push(T(240,154,'= 2(x\u00b2) + 1','#241A17',14));}
  if(p>=3){o.push(B(130,168,220,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,193,'fg(x) = 2x\u00b2 + 1','#1a7a3a',17,'middle',true));}
  if(p>=4){o.push(T(240,228,'gf(x) = g(f(x)) = (2x+1)\u00b2 = 4x\u00b2+4x+1  \u2260 fg(x)','#888',11));}
  s.innerHTML=o.join('');
}

/* Q6 Inverse functions */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,25,'Find f\u207b\u00b9(x)  where  f(x) = 3x \u2212 4','#C0272D',15,'middle',true));
  var steps=[
    {txt:'Write y = 3x \u2212 4',col:'#241A17',note:'Replace f(x) with y'},
    {txt:'y + 4 = 3x',col:'#1a5a8a',note:'Add 4 to both sides'},
    {txt:'x = (y + 4) / 3',col:'#241A17',note:'Divide by 3'},
    {txt:'f\u207b\u00b9(x) = (x + 4) / 3',col:'#1a7a3a',note:'Swap x and y, write as f\u207b\u00b9'}
  ];
  steps.forEach(function(st,i){
    if(p>=i+1){
      var yy=52+i*48;
      o.push(B(60,yy,360,38,i===3?'#e8f8ee':'#fff5f0',i===3?'#1a7a3a':'#C0272D',i===3?2:1.5));
      o.push(T(240,yy+16,st.txt,st.col,14,'middle',i===3));
      o.push(T(240,yy+30,st.note,'#888',10));
    }
  });
  if(p>=4){o.push(T(240,248,'Check: f(f\u207b\u00b9(x)) = 3\u00d7(x+4)/3\u22124 = x \u2713','#888',11));}
  s.innerHTML=o.join('');
}

/* Q7 nth term arithmetic */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var seq=[3,7,11,15,19];
  o.push(T(240,28,'Sequence:  3,  7,  11,  15,  19,  \u2026','#C0272D',16,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    seq.forEach(function(v,i){o.push(B(50+i*76,48,60,36,'#fff5f0','#C0272D',1.5));o.push(T(80+i*76,72,v,'#C0272D',15));});
    o.push(T(240,104,'Common difference d = +4','#1a5a8a',13));
  }
  if(p>=2){o.push(T(240,128,'nth term = a + (n\u22121)d  where a=3, d=4','#241A17',14));o.push(T(240,150,'= 3 + (n\u22121)\u00d74','#241A17',14));}
  if(p>=3){o.push(B(130,162,220,42,'#e8f8ee','#1a7a3a',2));o.push(T(240,183,'nth term = 4n \u2212 1','#1a7a3a',18,'middle',true));}
  if(p>=4){o.push(T(240,224,'Check: n=1: 4(1)\u22121=3 \u2713   n=5: 4(5)\u22121=19 \u2713','#888',12));}
  s.innerHTML=o.join('');
}

/* Q8 nth term quadratic */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var seq=[2,6,12,20,30];
  o.push(T(240,22,'Sequence:  2,  6,  12,  20,  30,  \u2026','#C0272D',16,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    seq.forEach(function(v,i){o.push(B(44+i*76,38,60,32,'#fff5f0','#C0272D',1.5));o.push(T(74+i*76,60,v,'#C0272D',14));});
    var d1=[4,6,8,10];d1.forEach(function(v,i){o.push(T(84+i*76,92,'\u0394'+v,'#1a5a8a',11));});
    o.push(T(200,92,'1st differences:','#888',10,'end'));
    var d2=[2,2,2];d2.forEach(function(v,i){o.push(T(122+i*76,112,'\u0394\u0394'+v,'#C8922A',11));});
    o.push(T(200,112,'2nd differences:','#888',10,'end'));
  }
