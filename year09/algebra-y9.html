<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Algebra · Year 9 · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.nq-btn:hover{background:var(--gold);color:#fff;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Algebra — Year 9</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 280"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Expanding double brackets: (x+3)(x+5)','#C0272D',13,'middle',true));
  var terms=['x\u00b2','+5x','+3x','+15'];
  if(p>=1){o.push(T(240,70,'FOIL: First \u00b7 Outer \u00b7 Inner \u00b7 Last','#1a5a8a',13,'middle',true));}
  if(p>=2){
    var cols=['#C0272D','#1a5a8a','#1a7a3a','#C8922A'];
    terms.forEach(function(t,i){o.push(R(50+i*96,90,88,36,i===0?'#fff5f0':i===1?'#e8f4ff':i===2?'#e8f8ee':'#fff8e8',cols[i],1.5));o.push(T(94+i*96,113,t,cols[i],15,'middle',true));});
  }
  if(p>=3){o.push(R(120,142,240,38,'#e8f4ff','#1a5a8a',2));o.push(T(240,165,'= x\u00b2 + 8x + 15','#1a5a8a',17,'middle',true));}
  s.innerHTML=o.join('');
}
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Factorising: x\u00b2 + 7x + 12','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,74,'Find two numbers that multiply to 12 and add to 7','#241A17',12,'middle',false));}
  if(p>=2){o.push(T(240,100,'Pairs: 1\u00d712, 2\u00d76, 3\u00d74','#888',12,'middle',false));o.push(T(240,120,'3+4=7 \u2713','#1a7a3a',14,'middle',true));}
  if(p>=3){o.push(R(130,138,220,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,162,'= (x+3)(x+4)','#1a7a3a',18,'middle',true));}
  if(p>=4){o.push(T(240,200,'Check by expanding: x\u00b2+4x+3x+12 = x\u00b2+7x+12 \u2713','#888',11,'middle',false));}
  s.innerHTML=o.join('');
}
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Substitution: f(x) = 3x\u00b2 \u2212 2x + 1','#C0272D',13,'middle',true));
  var xvals=[-2,-1,0,1,2,3];
  if(p>=1){o.push(T(240,68,'Substitute x = \u22122','#1a5a8a',13,'middle',false));}
  if(p>=2){o.push(T(240,92,'3(\u22122)\u00b2 \u2212 2(\u22122) + 1','#241A17',14,'middle',false));}
  if(p>=3){o.push(T(240,116,'= 3(4) + 4 + 1','#888',13,'middle',false));o.push(T(240,138,'= 12 + 4 + 1 = 17','#1a7a3a',16,'middle',true));}
  if(p>=4){o.push(R(14,158,452,32,'#f8f8f8','#888',1));o.push(T(240,178,'Note: (\u22122)\u00b2 = +4 (squaring makes it positive)','#C8922A',12,'middle',false));}
  s.innerHTML=o.join('');
}
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Solving linear equations','#C0272D',13,'middle',true));
  var steps=[['3x + 7 = 22','Subtract 7'],['3x = 15','Divide by 3'],['x = 5','Check: 3(5)+7=22 \u2713']];
  steps.forEach(function(st,i){
    if(p>=i+1){
      o.push(R(40,60+i*58,400,44,i===2?'#e8f8ee':'#f8f8f8',i===2?'#1a7a3a':'#888',i===2?2:1));
      o.push(T(250,86+i*58,st[0],i===2?'#1a7a3a':'#241A17',16,'middle',i===2));
      o.push(T(440,78+i*58,st[1],'#888',10,'end',false));
    }
  });
  if(p>=4){
    o.push(R(14,240,452,30,'#f8f8f8','#888',1));
    o.push(T(240,259,'Always check your answer by substituting back in','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Simultaneous equations: elimination','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,70,'2x + 3y = 16   \u00b7\u00b7\u00b7(1)','#241A17',13,'middle',false));o.push(T(240,90,'x + y = 6     \u00b7\u00b7\u00b7(2)','#241A17',13,'middle',false));}
  if(p>=2){o.push(T(240,118,'(2)\u00d72: 2x + 2y = 12   \u00b7\u00b7\u00b7(3)','#1a5a8a',13,'middle',false));o.push(T(240,138,'(1)\u2212(3): y = 4','#1a5a8a',14,'middle',true));}
  if(p>=3){o.push(T(240,164,'Sub y=4 into (2): x = 2','#1a7a3a',14,'middle',true));o.push(R(130,182,220,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,204,'x=2, y=4','#1a7a3a',17,'middle',true));}
  s.innerHTML=o.join('');
}
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Solving linear inequalities','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,72,'3x \u2212 2 < 10','#241A17',15,'middle',false));}
  if(p>=2){o.push(T(240,100,'3x < 12   \u2192   x < 4','#1a5a8a',15,'middle',true));}
  if(p>=3){
    var ox=50,oy=138,len=360;
    o.push(L(ox,oy,ox+len,oy,'#888',2));
    for(var i=0;i<=8;i++){o.push(L(ox+i*40,oy-5,ox+i*40,oy+5,'#888',1));o.push(T(ox+i*40,oy+18,''+( i-2),'#888',10,'middle',false));}
    o.push(C(ox+4*40,oy,7,'#fff','#C0272D',2.5));
    o.push('<path d="M '+(ox+4*40-8)+','+(oy)+' L '+(ox)+','+(oy)+'" fill="none" stroke="#C0272D" stroke-width="3"/>');
    o.push(T(ox+4*40+10,oy-14,'x < 4 (open circle = not included)','#C0272D',10,'start',false));
  }
  if(p>=4){o.push(R(14,188,452,30,'#fff8e8','#C8922A',1));o.push(T(240,207,'If dividing/multiplying by a negative: FLIP the inequality','#C8922A',11,'middle',false));}
  s.innerHTML=o.join('');
}
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'nth term of a sequence: 5, 8, 11, 14\u2026','#C0272D',13,'middle',true));
  var terms=[5,8,11,14,17];
  if(p>=1){terms.forEach(function(v,i){o.push(R(30+i*88,56,80,38,'#fff5f0','#C0272D',1.5));o.push(T(70+i*88,79,''+v,'#C0272D',18,'middle',true));o.push(T(70+i*88,50,'n='+(i+1),'#888',9,'middle',false));});}
  if(p>=2){o.push(T(240,112,'Common difference = 3 \u2192 coefficient of n is 3','#1a5a8a',12,'middle',false));o.push(T(240,130,'3\u00d71=3, but sequence starts at 5: 5\u22123=2','#888',11,'middle',false));}
  if(p>=3){o.push(R(140,148,200,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,172,'nth term = 3n + 2','#1a7a3a',18,'middle',true));}
  if(p>=4){o.push(T(240,208,'Check: n=1 \u2192 3(1)+2=5 \u2713  n=4 \u2192 3(4)+2=14 \u2713','#888',11,'middle',false));}
  s.innerHTML=o.join('');
}
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Straight line graphs: y = mx + c','#C0272D',13,'middle',true));
  var ox=60,oy=220,sx=36,sy=30;
  o.push(L(ox,oy-5*sy,ox,oy+10,'#888',1.5));o.push(L(ox-10,oy,ox+6*sx+10,oy,'#888',1.5));
  for(var i=-1;i<=6;i++){if(i!==0){o.push(T(ox+i*sx,oy+14,''+i,'#888',9));}}
  for(var j=-4;j<=5;j++){if(j!==0){o.push(T(ox-12,oy-j*sy,''+j,'#888',9,'end'));}}
  if(p>=1){
    var pts=[[0,1],[1,3],[2,5],[3,7]];
    pts.forEach(function(pt){o.push(C(ox+pt[0]*sx,oy-pt[1]*sy,4,'#C0272D','#C0272D',0));});
    var x0=ox,y0=oy-1*sy,x1=ox+3*sx,y1=oy-7*sy;
    o.push(L(x0-10,y0+(x0-10-x0)*(y1-y0)/(x1-x0),x1+10,y1+(x1+10-x1)*(y1-y0)/(x1-x0),'#C0272D',2));
    o.push(T(ox+4.5*sx,oy-9*sy,'y=2x+1','#C0272D',12,'start',true));
  }
  if(p>=2){o.push(T(ox+240,oy-4*sy,'gradient = 2','#1a5a8a',11,'start',false));o.push(T(ox+240,oy-2.5*sy,'y-intercept = 1','#1a7a3a',11,'start',false));}
  s.innerHTML=o.join('');
}

var QS=[

  {ey:'Q1 \u00b7 Year 9 \u00b7 Algebra',ti:'Expanding Double Brackets',su:'Expand (x+3)(x+5) using FOIL.',steps:[
    {lb:'FOIL method',dr:dQ1,ht:'<p><b>F</b>irst \u00b7 <b>O</b>uter \u00b7 <b>I</b>nner \u00b7 <b>L</b>ast. Multiply each term in the first bracket by each in the second.</p>'},
    {lb:'Four terms',dr:dQ1,ht:'<div class="fm">x\u00b2 + 5x + 3x + 15</div>'},
    {lb:'Collect like terms',dr:dQ1,ht:'<div class="fm">(x+3)(x+5) = x\u00b2 + 8x + 15</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var as=[-3,-2,-1,2,3,4,5];var a=pick(as),b=pick(as);var B=-(a+b),C=a*b;var Bstr=B>=0?'+'+B:(B<0?B:'');var Cstr=C>=0?'+'+C:C;return{question:'Expand <b>(x+'+a+')(x+'+b+')</b>. What is the coefficient of x?',hints:['FOIL: x\u00b2 + '+b+'x + '+a+'x + '+(a*b),'Add the x terms: '+(a+b)],ans:a+b,tol:0,unit:'',working:'x\u00b2+'+(a+b)+'x+'+(a*b)+'. Coefficient of x = '+(a+b)};} )}
  ]},
  {ey:'Q2 \u00b7 Year 9 \u00b7 Algebra',ti:'Factorising Quadratics',su:'Factorise x\u00b2 + 7x + 12.',steps:[
    {lb:'Find the factor pair',dr:dQ2,ht:'<p>Find two numbers that <b>multiply</b> to give c and <b>add</b> to give b. Here: multiply to 12, add to 7.</p>'},
    {lb:'The pair is 3 and 4',dr:dQ2,ht:'<div class="fm">3 \u00d7 4 = 12  and  3 + 4 = 7</div>'},
    {lb:'Write the factors',dr:dQ2,ht:'<div class="fm">x\u00b2 + 7x + 12 = (x+3)(x+4)</div>'},

  {ey:'Q3 \u00b7 Year 9 \u00b7 Algebra',ti:'Substitution',su:'Find f(\u22122) when f(x) = 3x\u00b2 \u2212 2x + 1.',steps:[

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
