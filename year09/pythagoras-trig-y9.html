<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}

.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}

.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Pythagoras: find the hypotenuse','#C0272D',13,'middle',true));
  var ox=80,oy=220;
  o.push(L(ox,oy,ox+180,oy,'#241A17',2));
  o.push(L(ox,oy,ox,oy-120,'#241A17',2));
  o.push(L(ox,oy-120,ox+180,oy,'#C0272D',2.5));
  o.push(R(ox,oy-12,12,12,'none','#888',1.5));
  if(p>=1){o.push(T(ox+90,oy+16,'a = 9 cm','#241A17',12,'middle',false));o.push(T(ox-20,oy-60,'b = 12','#241A17',12,'middle',false));}
  if(p>=2){o.push(T(ox+110,oy-75,'c = ?','#C0272D',13,'middle',true));}
  if(p>=3){o.push(T(300,140,'c\u00b2 = 9\u00b2 + 12\u00b2','#1a5a8a',13,'start',false));o.push(T(300,162,'= 81 + 144 = 225','#1a5a8a',13,'start',false));o.push(T(300,186,'c = \u221a225 = 15 cm','#1a7a3a',15,'start',true));}
  s.innerHTML=o.join('');
}

  if(p>=2){o.push(T(300,120,'a\u00b2 = c\u00b2 \u2212 b\u00b2','#1a5a8a',13,'start',false));o.push(T(300,142,'= 17\u00b2 \u2212 8\u00b2','#1a5a8a',13,'start',false));o.push(T(300,164,'= 289 \u2212 64 = 225','#1a5a8a',13,'start',false));}
  if(p>=3){o.push(R(280,180,160,36,'#e8f8ee','#1a7a3a',2));o.push(T(360,202,'a = 15 cm','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');
}
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Pythagorean triples and checking right angles','#C0272D',12,'middle',true));
  var triples=[[3,4,5],[5,12,13],[8,15,17],[7,24,25]];
  if(p>=1){triples.forEach(function(t,i){o.push(R(40,58+i*44,400,38,'#f8f8f8','#888',1));o.push(T(140,80+i*44,t[0]+'\u00b2 + '+t[1]+'\u00b2 = '+( t[0]*t[0]+t[1]*t[1]),'#241A17',12,'start',false));o.push(T(380,80+i*44,'\u221a'+( t[0]*t[0]+t[1]*t[1])+' = '+t[2],'#1a7a3a',12,'end',true));});}
  if(p>=2){o.push(R(14,242,452,28,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,260,'Multiples also work: 6,8,10 is a 3-4-5 triple \u00d72','#1a5a8a',10,'middle',false));}
  s.innerHTML=o.join('');
}
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Labelling sides for Trigonometry','#C0272D',13,'middle',true));
  // Vertices: theta at BL, right angle at BR, apex at TR
  // BL=(80,240), BR=(340,240), TR=(340,80)
  var BL=[80,240], BR=[340,240], TR=[340,80];
  // Adjacent: BL to BR (horizontal, blue)
  o.push(L(BL[0],BL[1],BR[0],BR[1],'#1a5a8a',2.5));
  // Opposite: BR to TR (vertical, green)
  o.push(L(BR[0],BR[1],TR[0],TR[1],'#1a7a3a',2.5));
  // Hypotenuse: BL to TR (diagonal, red)
  o.push(L(BL[0],BL[1],TR[0],TR[1],'#C0272D',2.5));
  // Right angle square at BR (bottom-right)
  o.push(L(BR[0]-14,BR[1],BR[0]-14,BR[1]-14,'#555',1.5));
  o.push(L(BR[0]-14,BR[1]-14,BR[0],BR[1]-14,'#555',1.5));
  // Theta arc at BL (bottom-left)
  var arcPts='';
  for(var a=0;a<=35;a+=2){
    var rad=a*Math.PI/180;
    arcPts+=(a===0?'M':'L')+(BL[0]+44*Math.cos(rad))+','+(BL[1]-44*Math.sin(rad))+' ';
  }
  o.push('<path d="'+arcPts+'" fill="none" stroke="#C8922A" stroke-width="2"/>');
  o.push(T(BL[0]+36,BL[1]-14,'θ','#C8922A',16,'start',true));
  // Side labels
  o.push(T((BL[0]+BR[0])/2,BR[1]+18,'Adjacent','#1a5a8a',13,'middle',true));
  o.push(T(BR[0]+28,(BR[1]+TR[1])/2,'Opposite','#1a7a3a',13,'start',true));
  o.push(T((BL[0]+TR[0])/2-16,(BL[1]+TR[1])/2-10,'Hypotenuse','#C0272D',13,'end',true));
  if(p>=1){
    o.push(R(14,258,452,34,'#f8f8f8','#888',1));
    o.push(T(240,278,'SOH: sinθ=Opp/Hyp  •  CAH: cosθ=Adj/Hyp  •  TOA: tanθ=Opp/Adj','#555',11,'middle',false));
  }
  if(p>=2){
    o.push(R(360,90,108,65,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(414,108,'θ=35°, Hyp=10','#1a5a8a',10,'middle',true));
    o.push(T(414,124,'Opp≈5.74','#1a7a3a',10,'middle',false));
    o.push(T(414,140,'Adj≈8.19','#1a5a8a',10,'middle',false));
  }
  s.innerHTML=o.join('');
}
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];

  if(p>=1){o.push(T(ox+140,oy+16,'Adj = 6 cm','#1a5a8a',12,'middle',false));o.push(T(ox-20,oy-80,'Opp = ?','#1a7a3a',12,'middle',true));o.push(T(ox+50,oy-14,'\u03b8=40\u00b0','#C8922A',12,'start',true));}
  if(p>=2){o.push(T(360,130,'tan 40\u00b0 = Opp/6','#241A17',12,'start',false));o.push(T(360,152,'Opp = 6 \u00d7 tan 40\u00b0','#241A17',12,'start',false));}
  if(p>=3){o.push(R(280,166,180,40,'#e8f8ee','#1a7a3a',2));o.push(T(370,190,'= 5\u00b703 cm','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');
}

var QS=[

  {ey:'Q1 \u00b7 Year 9 \u00b7 Pythagoras & Trig',ti:'Finding the Hypotenuse',su:'Right triangle: legs 9 cm and 12 cm. Find the hypotenuse.',steps:[
    {lb:'What is Pythagoras\u2019 Theorem?',dr:dQ1,ht:'<p>&#x1F9E0; <b>Think:</b> In any right-angled triangle, the three sides have a special relationship.</p><p>The two shorter sides are called <b>legs</b> (or a and b). The longest side \u2014 always opposite the right angle \u2014 is called the <b>hypotenuse</b> (c).</p><div class="fm">a\u00b2 + b\u00b2 = c\u00b2</div><p>This always works. No exceptions. Learn it by heart.</p>'},
    {lb:'Identify the sides',dr:dQ1,ht:'<p>&#x1F9E0; <b>Think:</b> Before I do anything, I label what I know and what I want.</p><p>I have: <b>a = 9 cm</b>, <b>b = 12 cm</b>.<br>I want: <b>c = ?</b> (the hypotenuse)</p><p>Because I want c, I use the formula as written: <b>c\u00b2 = a\u00b2 + b\u00b2</b></p>'},
    {lb:'Square both legs',dr:dQ1,ht:'<p>&#x1F9E0; <b>Think:</b> Square means \u00d7 itself. Let me work out each term.</p><div class="fm">9\u00b2 = 9 \u00d7 9 = 81</div><div class="fm">12\u00b2 = 12 \u00d7 12 = 144</div>'},
    {lb:'Add the squares',dr:dQ1,ht:'<p>&#x1F9E0; <b>Think:</b> Now I add them to get c\u00b2.</p><div class="fm">c\u00b2 = 81 + 144 = 225</div><p>So the hypotenuse <em>squared</em> is 225. I need to undo the square to find c itself.</p>'},
    {lb:'Take the square root',dr:dQ1,ht:'<p>&#x1F9E0; <b>Think:</b> The opposite of squaring is taking the square root (\u221a).</p><div class="fm">c = \u221a225 = 15 cm</div><p>\u2714 Check: does 9\u00b2 + 12\u00b2 = 15\u00b2? \u2192 81 + 144 = 225 = 225 \u2713</p><p>Always check your answer!</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var triples=[[3,4,5],[5,12,13],[8,15,17],[6,8,10],[9,12,15],[7,24,25]];var t=pick(triples);return{question:'Right triangle: legs <b>'+t[0]+' cm</b> and <b>'+t[1]+' cm</b>. Find the hypotenuse.',hints:['c\u00b2 = '+t[0]+'\u00b2 + '+t[1]+'\u00b2 = '+(t[0]*t[0]+t[1]*t[1]),'c = \u221a'+(t[0]*t[0]+t[1]*t[1])],ans:t[2],tol:0.01,unit:'cm',working:'\u221a('+(t[0]*t[0])+'+'+(t[1]*t[1])+') = \u221a'+(t[2]*t[2])+' = '+t[2]+' cm'};})}
  ]},

  {ey:'Q2 \u00b7 Year 9 \u00b7 Pythagoras & Trig',ti:'Finding a Shorter Side',su:'Hypotenuse 17 cm, one leg 8 cm. Find the other leg.',steps:[
    {lb:'Which side is missing?',dr:dQ2,ht:'<p>&#x1F9E0; <b>Think:</b> This time I know the hypotenuse and one leg. I need the other leg.</p><p>I have: <b>c = 17 cm</b> (hypotenuse), <b>b = 8 cm</b> (one leg).<br>I want: <b>a = ?</b></p><p>The full formula is a\u00b2 + b\u00b2 = c\u00b2. I need to rearrange it to make a\u00b2 the subject.</p>'},
    {lb:'Rearrange the formula',dr:dQ2,ht:'<p>&#x1F9E0; <b>Think:</b> I move b\u00b2 to the other side by subtracting.</p><div class="fm">a\u00b2 + b\u00b2 = c\u00b2</div><div class="fm">a\u00b2 = c\u00b2 \u2212 b\u00b2</div><p>Key rule: to find a <b>shorter</b> side, you always <b>subtract</b> the known leg\u00b2 from the hypotenuse\u00b2.</p>'},
    {lb:'Square the known values',dr:dQ2,ht:'<p>&#x1F9E0; <b>Think:</b> Let me work out c\u00b2 and b\u00b2 first.</p><div class="fm">17\u00b2 = 289</div><div class="fm">8\u00b2 = 64</div>'},
    {lb:'Subtract',dr:dQ2,ht:'<p>&#x1F9E0; <b>Think:</b> Now I substitute into the rearranged formula.</p><div class="fm">a\u00b2 = 289 \u2212 64 = 225</div>'},
    {lb:'Square root',dr:dQ2,ht:'<p>&#x1F9E0; <b>Think:</b> Take the square root to find a.</p><div class="fm">a = \u221a225 = 15 cm</div><p>\u2714 Check: 8\u00b2 + 15\u00b2 = 64 + 225 = 289 = 17\u00b2 \u2713</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var triples=[[3,4,5],[5,12,13],[8,15,17],[7,24,25]];var t=pick(triples);var r=rnd(0,1);var known=r?t[1]:t[0];var ans=r?t[0]:t[1];return{question:'Hypotenuse <b>'+t[2]+' cm</b>, one leg <b>'+known+' cm</b>. Find the other leg.',hints:['a\u00b2 = '+t[2]+'\u00b2 \u2212 '+known+'\u00b2 = '+(t[2]*t[2]-known*known)],ans:ans,tol:0.01,unit:'cm',working:'\u221a('+(t[2]*t[2]-known*known)+') = '+ans+' cm'};})}
  ]},

  {ey:'Q3 \u00b7 Year 9 \u00b7 Pythagoras & Trig',ti:'Pythagorean Triples',su:'Recognise 3-4-5, 5-12-13, 8-15-17 and their multiples.',steps:[
    {lb:'What is a Pythagorean triple?',dr:dQ3,ht:'<p>&#x1F9E0; <b>Think:</b> Some whole numbers fit Pythagoras\u2019 theorem exactly \u2014 no decimals, no rounding.</p><p>The most famous is <b>3, 4, 5</b>: 3\u00b2 + 4\u00b2 = 9 + 16 = 25 = 5\u00b2 \u2713</p><p>Other common triples: <b>5, 12, 13</b> and <b>8, 15, 17</b>. Memorise these \u2014 they appear constantly in exams.</p>'},
    {lb:'Multiples of triples',dr:dQ3,ht:'<p>&#x1F9E0; <b>Think:</b> If I multiply all three numbers by the same amount, I still get a valid triple.</p><p>3-4-5 \u00d72 = <b>6-8-10</b> \u2713<br>3-4-5 \u00d73 = <b>9-12-15</b> \u2713<br>3-4-5 \u00d74 = <b>12-16-20</b> \u2713</p><p>Spotting a multiple saves you from long calculations!</p>'},
    {lb:'Checking for a right angle',dr:dQ3,ht:'<p>&#x1F9E0; <b>Think:</b> If I\u2019m given three sides and asked whether it\u2019s right-angled, I check if a\u00b2 + b\u00b2 = c\u00b2.</p><p>Always put the <b>largest side</b> as c. Then check the other two.</p><p>Example: Is 5, 7, 9 right-angled?<br>5\u00b2 + 7\u00b2 = 25 + 49 = 74 \u2260 81 = 9\u00b2 \u2717 Not right-angled.</p>'},
    {lb:'Try the check yourself',dr:dQ3,ht:'<p>&#x1F9E0; <b>Think:</b> Is 6, 8, 10 right-angled?<br>6\u00b2 + 8\u00b2 = 36 + 64 = 100 = 10\u00b2 \u2713 Yes!</p><p>You can see it\u2019s just 3-4-5 doubled. Once you recognise the pattern it\u2019s instant.</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var triples=[[3,4,5],[5,12,13],[8,15,17]];var t=pick(triples);var k=rnd(2,4);var a=t[0]*k,b=t[1]*k,c=t[2]*k;return{question:'Is a triangle with sides <b>'+a+', '+b+', '+c+' cm</b> right-angled? Enter 1 for yes, 0 for no.',hints:[a+'\u00b2 + '+b+'\u00b2 = '+(a*a+b*b),c+'\u00b2 = '+(c*c)],ans:1,tol:0,unit:'',working:a+'\u00b2+'+b+'\u00b2='+(a*a+b*b)+' = '+c+'\u00b2, so yes (right-angled)'};})}
  ]},

  {ey:'Q4 \u00b7 Year 9 \u00b7 Pythagoras & Trig',ti:'Labelling for Trigonometry',su:'Label the sides of a right triangle: Hypotenuse, Opposite, Adjacent.',steps:[
    {lb:'Why do we need labels?',dr:dQ4,ht:'<p>&#x1F9E0; <b>Think:</b> Trigonometry is about the relationship between <b>angles</b> and <b>sides</b> in a right triangle.</p><p>To use trig, I need to label the three sides correctly. The labels <b>change depending on which angle I\u2019m looking at</b>.</p>'},
    {lb:'The three labels',dr:dQ4,ht:'<p>&#x1F9E0; <b>Think:</b> Pick the angle \u03b8 you care about. Then label from there.</p><ul style="margin-left:1em;margin-top:8px;line-height:2"><li><b>Hypotenuse (H)</b>: always opposite the right angle \u2014 the longest side. This never changes.</li><li><b>Opposite (O)</b>: the side directly opposite angle \u03b8.</li><li><b>Adjacent (A)</b>: the side next to \u03b8 that is NOT the hypotenuse.</li></ul>'},
    {lb:'SOH-CAH-TOA',dr:dQ4,ht:'<p>&#x1F9E0; <b>Think:</b> This is the memory aid. Say it out loud: SOH-CAH-TOA.</p><div class="fm">sin\u03b8 = Opposite \u00f7 Hypotenuse</div><div class="fm">cos\u03b8 = Adjacent \u00f7 Hypotenuse</div><div class="fm">tan\u03b8 = Opposite \u00f7 Adjacent</div><p>Each ratio compares two sides. Which one to use depends on which two sides you know (or want).</p>'},
    {lb:'Choosing the right ratio',dr:dQ4,ht:'<p>&#x1F9E0; <b>Think:</b> Ask yourself: which two sides are involved?</p><p>\u2022 Know/want O and H \u2192 use <b>sin</b><br>\u2022 Know/want A and H \u2192 use <b>cos</b><br>\u2022 Know/want O and A \u2192 use <b>tan</b></p><p>Example: \u03b8=35\u00b0, Hyp=10 cm. Want Opposite.<br>O and H \u2192 use sin. Opp = 10 \u00d7 sin35\u00b0 \u2248 5.74 cm</p>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var ang=rnd(20,70),adj=rnd(4,12);var opp=Math.round(adj*Math.tan(ang*Math.PI/180)*10)/10;return{question:'\u03b8 = '+ang+'\u00b0, adjacent = '+adj+' cm. Find the opposite side (1 d.p.).',hints:['You know Adj, want Opp \u2192 use tan','Opp = '+adj+' \u00d7 tan'+ang+'\u00b0'],ans:opp,tol:0.15,unit:'cm',working:adj+'\u00d7tan('+ang+'\u00b0) \u2248 '+opp+' cm'};})}
  ]},

  {ey:'Q5 \u00b7 Year 9 \u00b7 Pythagoras & Trig',ti:'Trigonometry Calculations',su:'Find the opposite side when \u03b8=40\u00b0 and adjacent=6 cm.',steps:[
    {lb:'Step 1: What do I know?',dr:dQ5,ht:'<p>&#x1F9E0; <b>Think:</b> Always start by writing down what you have and what you want.</p><p>I know: <b>\u03b8 = 40\u00b0</b> and <b>Adjacent = 6 cm</b>.<br>I want: <b>Opposite = ?</b></p><p>I have Adjacent and want Opposite. That points to <b>tan</b>.</p>'},
    {lb:'Step 2: Write the ratio',dr:dQ5,ht:'<p>&#x1F9E0; <b>Think:</b> Write out the formula before substituting anything.</p><div class="fm">tan\u03b8 = Opposite \u00f7 Adjacent</div><p>Now rearrange to make Opposite the subject. Multiply both sides by Adjacent:</p><div class="fm">Opposite = Adjacent \u00d7 tan\u03b8</div>'},
    {lb:'Step 3: Substitute and calculate',dr:dQ5,ht:'<p>&#x1F9E0; <b>Think:</b> Put in the numbers and use my calculator.</p><div class="fm">Opposite = 6 \u00d7 tan40\u00b0</div><div class="fm">= 6 \u00d7 0.8391\u2026 \u2248 5.03 cm</div><p>Make sure your calculator is in <b>degree mode</b> (not radians)!</p>'},
    {lb:'Finding angles (inverse trig)',dr:dQ5,ht:'<p>&#x1F9E0; <b>Think:</b> What if I know the sides but want the angle?</p><p>I use the <b>inverse</b> trig function \u2014 the \u201cundo\u201d button on my calculator.</p><div class="fm">sin\u03b8 = Opp/Hyp  \u2192  \u03b8 = sin\u207b\u00b9(Opp/Hyp)</div><div class="fm">cos\u03b8 = Adj/Hyp  \u2192  \u03b8 = cos\u207b\u00b9(Adj/Hyp)</div><div class="fm">tan\u03b8 = Opp/Adj  \u2192  \u03b8 = tan\u207b\u00b9(Opp/Adj)</div><p>Example: Opp=5, Hyp=10 \u2192 \u03b8 = sin\u207b\u00b9(0.5) = 30\u00b0</p>'},
    {lb:'Putting it all together',dr:dQ5,ht:'<p>&#x1F9E0; <b>Think:</b> Here is the process every time:</p><ol style="margin-left:1em;margin-top:8px;line-height:2.2"><li>Label the sides (H, O, A)</li><li>Identify which two are involved</li><li>Choose the correct ratio (SOH-CAH-TOA)</li><li>Rearrange to find what you want</li><li>Substitute and calculate</li><li>Check your answer makes sense</li></ol>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var ang=rnd(25,65),hyp=rnd(6,14);var opp=Math.round(hyp*Math.sin(ang*Math.PI/180)*10)/10;return{question:'\u03b8 = '+ang+'\u00b0, hypotenuse = '+hyp+' cm. Find the opposite side (1 d.p.).',hints:['O and H involved \u2192 use sin','Opp = '+hyp+' \u00d7 sin'+ang+'\u00b0'],ans:opp,tol:0.15,unit:'cm',working:hyp+'\u00d7sin('+ang+'\u00b0) \u2248 '+opp+' cm'};})}
  ]}

];
var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
