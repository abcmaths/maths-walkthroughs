<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){

}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}}

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1.5)+'"/>';}

// SDT triangle diagram helper
function sdtTriangle(cx,cy,sz,top,bl,br,revTop,revBl,revBr,p){
  var o=[];
  var tx=cx,ty=cy-sz*0.7;
  var lx=cx-sz*0.75,ly=cy+sz*0.45;
  var rx=cx+sz*0.75,ry=cy+sz*0.45;
  // Triangle outline
  o.push('<polygon points="'+tx+','+(ty-4)+' '+lx+','+ly+' '+rx+','+ry+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  // Dividing line
  o.push(L(lx,ly,rx,ry,'#C0272D',1.5));
  // Labels
  o.push(T(tx,ty-14,top,'#C0272D',15,'middle'));
  o.push(T(cx-sz*0.38,ly+16,bl,'#1a5a8a',14,'middle'));
  o.push(T(cx+sz*0.38,ly+16,br,'#1a5a8a',14,'middle'));
  // Cover highlights
  if(revTop&&p>=1)o.push('<rect x="'+(tx-30)+'" y="'+(ty-32)+'" width="60" height="26" fill="#C0272D" rx="4"/>'+T(tx,ty-14,'?','#fff',16,'middle'));
  if(revBl&&p>=1)o.push('<rect x="'+(lx-30)+'" y="'+(ly+2)+'" width="60" height="22" fill="#1a5a8a" rx="4"/>'+T(lx,ly+16,'?','#fff',14,'middle'));
  if(revBr&&p>=1)o.push('<rect x="'+(rx-30)+'" y="'+(ry+2)+'" width="60" height="22" fill="#1a5a8a" rx="4"/>'+T(rx,ry+16,'?','#fff',14,'middle'));
  return o;
}

// Q1: Speed = Distance / Time — the formula triangle
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'The Speed–Distance–Time Triangle','#C0272D',14,'middle'));
  o=o.concat(sdtTriangle(240,150,120,'S','D','T',false,false,false,p));
  if(p>=1){o.push(R(30,192,420,30,'#fff5f0','#C0272D'));o.push(T(240,212,'Cover S → D ÷ T    Cover D → S × T    Cover T → D ÷ S','#241A17',11,'middle'));}
  if(p>=2){o.push(R(30,226,420,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,245,'Units must match: km with h gives km/h; m with s gives m/s','#1a7a3a',11,'middle'));}
  s.innerHTML=o.join('');}

  o=o.concat(sdtTriangle(240,155,110,'S','D','T',true,false,false,p));
  if(p>=1){o.push(R(80,210,320,30,'#fff5f0','#C0272D'));o.push(T(240,230,'S = D ÷ T','#C0272D',14,'middle'));}
  if(p>=2){o.push(R(80,212,320,28,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,230,'S = 180 ÷ 3 = 60 km/h','#1a7a3a',14,'middle'));}

var QS=[
  {ey:'Q1 · Rates · Foundation',ti:'The Speed–Distance–Time Formula',su:'Learn the SDT triangle and the three formulas it contains.',lv:'F',steps:[
    {lb:'The triangle',dr:dQ1,ht:'<span class="lt lf">Foundation</span><p>The <b>SDT triangle</b> is a memory tool. Cover the quantity you want to find — the triangle shows the formula.</p>'},
    {lb:'Reading the triangle',dr:dQ1,ht:'<div class="fm">Speed = Distance ÷ Time</div><div class="fm">Distance = Speed × Time</div><div class="fm">Time = Distance ÷ Speed</div>'},
    {lb:'Units',dr:dQ1,ht:'<p>Units must be <b>consistent</b>: if speed is in km/h, distance must be in km and time in hours. If speed is in m/s, distance in metres and time in seconds.</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var s=pick([40,50,60,80,100]);var t=pick([2,3,4,5]);var d=s*t;return{question:'Speed = '+s+' km/h, Time = '+t+' h. Find the distance.',hints:['D = S × T'],ans:d,tol:0,unit:'km',working:'D = '+s+' × '+t+' = '+d+' km'};})}

    {lb:'Cover S',dr:dQ2,ht:'<span class="lt lf">Foundation</span><p>Cover the <b>S</b> in the triangle. What remains is D over T — so <b>Speed = Distance ÷ Time</b>.</p>'},

    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var s=pick([30,40,50,60,75,80,90,100]);var t=pick([2,3,4,5]);return{question:'Distance = '+s*t+' km, Time = '+t+' h. Find the speed.',hints:['S = D ÷ T'],ans:s,tol:0,unit:'km/h',working:'S = '+(s*t)+' ÷ '+t+' = '+s+' km/h'};})}

  {ey:'Q3 · Rates · Foundation',ti:'Finding Distance',su:'Speed = 80 km/h, Time = 2.5 hours. Find the distance.',lv:'F',steps:[

  {ey:'Q4 · Rates · Foundation',ti:'Finding Time — Decimal Hours',su:'Distance = 45 km, Speed = 60 km/h. Find the time in minutes.',lv:'F',steps:[

  {ey:'Q5 · Rates · Foundation',ti:'The Density–Mass–Volume Formula',su:'Learn the DMV triangle.',lv:'F',steps:[
    {lb:'The triangle',dr:dQ5,ht:'<span class="lt lf">Foundation</span><p>The same triangle idea works for density. The formula is given in the exam, but the triangle helps you rearrange it quickly.</p>'},

  {ey:'Q8 · Rates · Extended',ti:'The Pressure–Force–Area Formula',su:'Learn the PFA triangle and use it to find pressure.',lv:'E',steps:[

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti+'<br><span class="badge '+(q.lv==='F'?'bf':'be')+'">'+(q.lv==='F'?'Foundation':'Extended')+'</span>';b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
const _sb = createClient('https://lnwinoghbefmjpvmixzo.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxud2lub2doYmVmbWpwdm1peHpvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzODIxNzQsImV4cCI6MjA5Nzk1ODE3NH0.ubKHVLrxlxQd-w3n5pS3O6YMAI7I--ndEkI2xWM9qCo');
window._supabase = _sb;
window._abcUpdated = '2026-06-28';

// Resolve topic code from student's year group
async function resolveTopicCode() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) return null;
  const { data: profile } = await _sb.from('profiles').select('year_group').eq('id', session.user.id).maybeSingle();
  const yr = profile?.year_group;
  return yr <= 9 ? 'Y9-NUM-02' : 'Y10-NUM-03';
}

window.markComplete = async function() {
  const { data: { session } } = await _sb.auth.getSession();
  if (!session) return;
  const code = await resolveTopicCode();
  if (!code) return;
  const { data: topic } = await _sb.from('topics').select('id').eq('topic_code', code).maybeSingle();
  if (!topic) return;
  window._abcTopicId = topic.id;
  await _sb.from('walkthrough_progress').upsert({
    student_id: session.user.id, topic_id: topic.id,
    status: 'completed', completed_at: new Date().toISOString(),
    last_visited_at: new Date().toISOString(),
  }, { onConflict: 'student_id,topic_id' });
};
