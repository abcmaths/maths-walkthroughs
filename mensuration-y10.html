<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mensuration Y10 - Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Mensuration</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(o){
  var id='t'+Math.random().toString(36).slice(2);ST[id]=o;
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  if(e.target.classList.contains('try-new')){render();return;}
  if(e.target.classList.contains('try-ck')){
    var id=e.target.getAttribute('data-tryid');
    var o=ST[id];
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb||!o)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct!  '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});


/* Q2 - Compound shape */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // L-shape: outer 12x8, cut 5x4 from top-right
  var sc=22,ox=80,oy=260;
  var W=12*sc,H=8*sc,cw=5*sc,ch=4*sc;
  // Draw L-shape
  var pts=(ox)+','+(oy)+' '+(ox+W)+','+(oy)+' '+(ox+W)+','+(oy-H+ch)+' '+(ox+W-cw)+','+(oy-H+ch)+' '+(ox+W-cw)+','+(oy-H)+' '+ox+','+(oy-H);
  o.push('<polygon points="'+pts+'" fill="#fce8d8" stroke="#C0272D" stroke-width="2"/>');
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push(T(ox+W/2,oy+14,'12 cm','#C0272D',12,'middle',true));
    o.push(T(ox-18,oy-H/2,'8 cm','#C0272D',12,'middle',true));
    o.push(T(ox+W-cw/2,oy-H-10,'5 cm','#888',11,'middle',false));
    o.push(T(ox+W+12,oy-H+ch/2,'4 cm','#888',11,'start',false));
  }
  if(p>=2){
    // split line
    o.push(L(ox,oy-H+ch,ox+W-cw,oy-H+ch,'#C8922A',1.5,'5,3'));
    o.push(T(ox+(W-cw)/2,oy-H+ch-10,'Split into two rectangles','#C8922A',11,'middle',false));
  }
  if(p>=3){
    o.push(T(ox+(W-cw)/2,oy-H/2+ch/2+10,'A\u2081 = 12\u00d7(8-4) = 48','#C0272D',12,'middle',true));
    o.push(T(ox+(W-cw)/2,oy-H+ch/2,'A\u2082 = 7\u00d74 = 28','#1a5a8a',12,'middle',true));
    o.push(T(ox+W/2,oy-H-26,'Total = 48+28 = 76 cm\u00b2','#241A17',13,'middle',true));
  }
  o.push(T(240,16,'Area of a Compound Shape','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q3 - Volume and SA of cuboid */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=100,oy=230,w=180,h=100,d=60;
  // back faces
  o.push('<polygon points="'+ox+','+(oy-h)+' '+(ox+d)+','+(oy-h-d)+' '+(ox+w+d)+','+(oy-h-d)+' '+(ox+w)+','+(oy-h)+'" fill="#f0e0d0" stroke="#bbb" stroke-width="1"/>');
  o.push('<polygon points="'+(ox+w)+','+(oy)+' '+(ox+w+d)+','+(oy-d)+' '+(ox+w+d)+','+(oy-h-d)+' '+(ox+w)+','+(oy-h)+'" fill="#e8d8c8" stroke="#bbb" stroke-width="1"/>');
  // front face
  o.push(R(ox,oy-h,w,h,'#fce8d8','#C0272D'));
  o.push(L(ox,oy,ox+w,oy,'#C0272D',2));
  if(p>=1){
    o.push(T(ox+w/2,oy+14,'l = 8 cm','#C0272D',12,'middle',true));
    o.push(T(ox-18,oy-h/2,'h = 5 cm','#C0272D',12,'middle',true));
    o.push(T(ox+w+d/2+6,oy-h-d/2-4,'w = 4 cm','#888',11,'start',false));
  }
  if(p>=2){o.push(T(300,130,'V = l \u00d7 w \u00d7 h','#241A17',13,'start',true));o.push(T(300,155,'  = 8 \u00d7 4 \u00d7 5','#241A17',13,'start',false));o.push(T(300,178,'  = 160 cm\u00b3','#C0272D',14,'start',true));}
  if(p>=3){o.push(T(300,210,'SA = 2(lw+lh+wh)','#241A17',12,'start',true));o.push(T(300,230,'= 2(32+40+20)','#241A17',12,'start',false));o.push(T(300,250,'= 2 \u00d7 92 = 184 cm\u00b2','#C0272D',13,'start',true));}
  o.push(T(240,16,'Volume and Surface Area of a Cuboid','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q4 - Open box (net) */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Net of open box: base in centre, 4 sides folded out. Base 10x6, sides height 3
  var sc=20,bx=180,by=120,bw=10*sc,bh=6*sc;
  // Base
  o.push(R(bx,by,bw,bh,'#fce8d8','#C0272D'));
  o.push(T(bx+bw/2,by+bh/2,'Base\n10\u00d76','#C0272D',11,'middle',true));
  if(p>=1){
    // top flap
    o.push(R(bx,by-3*sc,bw,3*sc,'#e8f0ff','#1a5a8a'));
    o.push(T(bx+bw/2,by-1.5*sc,'10\u00d73','#1a5a8a',11,'middle',false));
    // bottom flap
    o.push(R(bx,by+bh,bw,3*sc,'#e8f0ff','#1a5a8a'));
    o.push(T(bx+bw/2,by+bh+1.5*sc,'10\u00d73','#1a5a8a',11,'middle',false));
    // left flap
    o.push(R(bx-3*sc,by,3*sc,bh,'#e8ffe8','#1a7a3a'));
    o.push(T(bx-1.5*sc,by+bh/2,'6\u00d73','#1a7a3a',11,'middle',false));
    // right flap
    o.push(R(bx+bw,by,3*sc,bh,'#e8ffe8','#1a7a3a'));
    o.push(T(bx+bw+1.5*sc,by+bh/2,'6\u00d73','#1a7a3a',11,'middle',false));
  }
  if(p>=2){
    o.push(T(50,240,'SA (open box) = base + 4 sides','#241A17',12,'start',true));
    o.push(T(50,260,'= 60 + 2(10\u00d73) + 2(6\u00d73)','#241A17',12,'start',false));
  }
  if(p>=3){o.push(T(50,280,'= 60 + 60 + 36 = 156 cm\u00b2','#C0272D',13,'start',true));}
  o.push(T(240,14,'Surface Area of an Open Box','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q5 - Volume of triangular prism */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=80,oy=240,l=220,bw=120,bh=80,d=60;
  // back triangle
  var bk=ox+d;
  o.push('<polygon points="'+(bk)+','+(oy-d)+' '+(bk+bw)+','+(oy-d)+' '+(bk+bw/2)+','+(oy-d-bh)+'" fill="#e0e8f8" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>');
  // connecting edges dashed
  o.push(L(ox,oy,bk,oy-d,'#bbb',1,'4,3'));
  o.push(L(ox+bw,oy,bk+bw,oy-d,'#bbb',1,'4,3'));
  o.push(L(ox+bw/2,oy-bh,bk+bw/2,oy-d-bh,'#bbb',1,'4,3'));
  // front triangle
  o.push('<polygon points="'+ox+','+oy+' '+(ox+bw)+','+oy+' '+(ox+bw/2)+','+(oy-bh)+'" fill="#fce8d8" stroke="#C0272D" stroke-width="2"/>');
  // bottom rect
  o.push('<polygon points="'+ox+','+oy+' '+bk+','+(oy-d)+' '+(bk+bw)+','+(oy-d)+' '+(ox+bw)+','+oy+'" fill="#f0e8e0" stroke="#C0272D" stroke-width="1.5"/>');
  if(p>=1){
    o.push(T(ox+bw/2,oy+14,'base = 10 cm','#C0272D',12,'middle',true));
    o.push(L(ox+bw/2,oy,ox+bw/2,oy-bh,'#aaa',1,'4,3'));
    o.push(T(ox+bw/2+20,oy-bh/2,'h = 6 cm','#C0272D',12,'start',true));
    o.push(T(ox+bw+d/2+4,oy-d/2+4,'l = 15 cm','#888',11,'start',false));
  }
  if(p>=2){o.push(T(340,140,'A\u25b3 = \u00bd \u00d7 10 \u00d7 6','#241A17',13,'start',true));o.push(T(340,162,'     = 30 cm\u00b2','#241A17',13,'start',false));}
  if(p>=3){o.push(T(340,196,'V = 30 \u00d7 15','#241A17',13,'start',true));o.push(T(340,218,'  = 450 cm\u00b3','#C0272D',14,'start',true));}
  o.push(T(240,16,'Volume of a Triangular Prism','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q6 - Circumference and area of circle */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=200,cy=150,r=100;
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="#fce8d8" stroke="#C0272D" stroke-width="2.5"/>');
  o.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="16" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>');
  if(p>=1){
    o.push(L(cx,cy,cx+r,cy,'#C0272D',2));
    o.push(T(cx+r/2,cy-10,'r = 9 cm','#C0272D',13,'middle',true));
  }
  if(p>=2){o.push(T(340,110,'C = 2\u03c0r','#241A17',13,'start',true));o.push(T(340,132,'  = 2\u03c0 \u00d7 9','#241A17',13,'start',false));o.push(T(340,154,'  = 56.5 cm','#C0272D',14,'start',true));}
  if(p>=3){o.push(T(340,188,'A = \u03c0r\u00b2','#241A17',13,'start',true));o.push(T(340,210,'  = \u03c0 \u00d7 81','#241A17',13,'start',false));o.push(T(340,232,'  = 254.5 cm\u00b2','#C0272D',14,'start',true));}
  o.push(T(200,16,'Circumference and Area of a Circle','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q7 - Volume of trapezoidal prism (from original Q1) */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var fx1=80,fy1=240,fx2=300,fy2=240,fx3=260,fy3=120,fx4=120,fy4=120,dx=60,dy=-30;
  var bx1=fx1+dx,by1=fy1+dy,bx2=fx2+dx,by2=fy2+dy,bx3=fx3+dx,by3=fy3+dy,bx4=fx4+dx,by4=fy4+dy;
  o.push('<polygon points="'+bx1+','+by1+' '+bx2+','+by2+' '+bx3+','+by3+' '+bx4+','+by4+'" fill="#f5e6dd" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>');
  [[fx1,fy1,bx1,by1],[fx2,fy2,bx2,by2],[fx3,fy3,bx3,by3],[fx4,fy4,bx4,by4]].forEach(function(e){o.push(L(e[0],e[1],e[2],e[3],'#aaa',1));});
  if(p>=1){o.push('<polygon points="'+fx4+','+fy4+' '+fx3+','+fy3+' '+bx3+','+by3+' '+bx4+','+by4+'" fill="#fce8d8" stroke="#C0272D" stroke-width="1.5"/>');} 
  o.push('<polygon points="'+fx1+','+fy1+' '+fx2+','+fy2+' '+fx3+','+fy3+' '+fx4+','+fy4+'" fill="'+(p>=1?'#fff0e8':'#fff')+'" stroke="#C0272D" stroke-width="2"/>');
  if(p>=1){
    o.push(T((fx4+fx3)/2,(fy4)-8,'a = 10','#C0272D',12,'middle',true));
    o.push(T((fx1+fx2)/2,fy1+16,'b = 21','#C0272D',12,'middle',true));
    o.push(T(fx2+12,(fy2+fy3)/2,'h = 8','#C0272D',12,'start',true));
  }
  if(p>=2){o.push(T((fx2+bx2)/2+5,(fy2+by2)/2+14,'l = 20','#C0272D',12,'middle',true));}
  if(p>=3){o.push(T(340,240,'A = \u00bd(10+21)\u00d78 = 124 cm\u00b2','#241A17',12,'start',true));o.push(T(340,262,'V = 124\u00d720 = 2480 cm\u00b3','#C0272D',13,'start',true));}
  o.push(T(240,14,'Volume of a Trapezoidal Prism','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q8 - Surface area of sphere from volume (from original Q6) */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=200,cy=150,r=100;
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(p>=2?'#fce8d8':'#fff5f0')+'" stroke="#C0272D" stroke-width="2"/>');
  o.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="18" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,4"/>');
  if(p>=1){o.push(L(cx,cy,cx+r,cy,'#C0272D',2));o.push(T(cx+r/2,cy-10,'r \u2248 8.38 cm','#C0272D',12,'middle',true));}
  o.push(T(cx,cy+r+18,'V = 2463 cm\u00b3','#6b5750',12,'middle',false));
  if(p>=2){o.push(T(cx,cy+r+36,'SA \u2248 881.8 cm\u00b2','#C0272D',13,'middle',true));}
  if(p>=1){
    o.push(T(330,100,'r\u00b3 = 3V \u00f7 (4\u03c0)','#241A17',13,'start',true));
    o.push(T(330,122,'   \u2248 588.1','#241A17',13,'start',false));
    o.push(T(330,144,'r \u2248 8.376 cm','#241A17',13,'start',false));
  }
  if(p>=2){o.push(T(330,178,'SA = 4\u03c0r\u00b2','#241A17',13,'start',true));o.push(T(330,200,'   = 4\u03c0 \u00d7 70.16','#241A17',13,'start',false));o.push(T(330,222,'   \u2248 881.8 cm\u00b2','#C0272D',14,'start',true));}
  o.push(T(200,16,'Surface Area of Sphere from Volume','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 \u2022 Year 10 \u2022 Foundation',ti:'Areas: Rectangle and Triangle',su:'Find the area of a rectangle (9\u00d75 cm) and a triangle (base 12 cm, height 7 cm).',steps:[
    {lb:'The shapes',dr:dQ1,ht:'<p>Two basic area formulae: <b>Rectangle</b> = length \u00d7 width. <b>Triangle</b> = \u00bd \u00d7 base \u00d7 height.</p>'},
    {lb:'Labelling the dimensions',dr:dQ1,ht:'<div class="fm">Rectangle: l = 9 cm, w = 5 cm</div><div class="fm">Triangle: b = 12 cm, h = 7 cm</div><p>The height of a triangle is always perpendicular to the base.</p>'},
    {lb:'Rectangle area',dr:dQ1,ht:'<div class="fm">A = 9 \u00d7 5 = 45 cm\u00b2</div>'},
    {lb:'Triangle area',dr:dQ1,ht:'<div class="fm">A = \u00bd \u00d7 12 \u00d7 7 = 42 cm\u00b2</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt((function(){var l=rnd(5,14),w=rnd(3,9);return{question:'Area of rectangle: length <b>'+l+' cm</b>, width <b>'+w+' cm</b>.',hints:['Area = l × w'],ans:l*w,tol:0,unit:'cm²',working:l+' × '+w+' = '+l*w+' cm²'};})())}
  ]},
  {ey:'Q2 \u2022 Year 10 \u2022 Foundation',ti:'Area of a Compound Shape',su:'Find the area of an L-shaped region (12\u00d78 cm with a 5\u00d74 cm rectangle removed).',steps:[
    {lb:'The shape',dr:dQ2,ht:'<p>A <b>compound shape</b> is made from two or more simple shapes. Split it into rectangles, find each area, then add them together.</p>'},
    {lb:'Label the dimensions',dr:dQ2,ht:'<p>The outer rectangle is 12 cm wide and 8 cm tall. A 5\u00d74 cm piece is missing from the top-right.</p>'},
    {lb:'Split into two rectangles',dr:dQ2,ht:'<p>Draw a horizontal line to divide the L-shape into two rectangles:</p><div class="fm">A\u2081 = 12 \u00d7 4 = 48 cm\u00b2</div><div class="fm">A\u2082 = 7 \u00d7 4 = 28 cm\u00b2</div>'},
    {lb:'Total area',dr:dQ2,ht:'<div class="fm">Total = 48 + 28 = 76 cm\u00b2</div><p>Alternative: outer area minus missing piece = (12\u00d78) \u2212 (5\u00d74) = 96 \u2212 20 = 76 cm\u00b2 \u2713</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt((function(){var a=rnd(6,12),b=rnd(5,10),c=rnd(2,4),d=rnd(2,4);return{question:'L-shape: outer '+a+'×'+b+' cm, cut-out '+c+'×'+d+' cm. Area?',hints:['Area = outer − cut-out'],ans:a*b-c*d,tol:0,unit:'cm²',working:a*b+' − '+c*d+' = '+(a*b-c*d)+' cm²'};})())}
  ]},
  {ey:'Q3 \u2022 Year 10 \u2022 Foundation',ti:'Volume and Surface Area of a Cuboid',su:'Cuboid: length 8 cm, width 4 cm, height 5 cm. Find volume and surface area.',steps:[
    {lb:'The cuboid',dr:dQ3,ht:'<p>A <b>cuboid</b> has 6 rectangular faces. Opposite faces are identical. We need two formulas: <b>V = lwh</b> and <b>SA = 2(lw + lh + wh)</b>.</p>'},
    {lb:'Labelling',dr:dQ3,ht:'<div class="fm">l = 8 cm,  w = 4 cm,  h = 5 cm</div>'},
    {lb:'Volume',dr:dQ3,ht:'<div class="fm">V = 8 \u00d7 4 \u00d7 5 = 160 cm\u00b3</div>'},
    {lb:'Surface area',dr:dQ3,ht:'<div class="fm">SA = 2(lw + lh + wh)</div><div class="fm">   = 2(32 + 40 + 20) = 2 \u00d7 92 = 184 cm\u00b2</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt({question:'A cuboid has length <b>6 cm</b>, width <b>3 cm</b> and height <b>4 cm</b>. Find its volume.',hints:['V = l \u00d7 w \u00d7 h','6 \u00d7 3 \u00d7 4'],ans:72,exact:0.1,unit:'cm\u00b3',working:'V = 6 \u00d7 3 \u00d7 4 = <b>72 cm\u00b3</b>'})}
  ]},
  {ey:'Q4 \u2022 Year 10 \u2022 Foundation',ti:'Surface Area of an Open Box',su:'An open box (no lid) has base 10\u00d76 cm and height 3 cm. Find its surface area.',steps:[
    {lb:'The net',dr:dQ4,ht:'<p>An <b>open box</b> has no top face. Its surface area = base + 4 sides. The net (unfolded box) shows all the faces laid flat.</p>'},
    {lb:'Label the faces',dr:dQ4,ht:'<p>Base: 10\u00d76 cm. Two long sides: 10\u00d73 cm each. Two short sides: 6\u00d73 cm each.</p>'},
    {lb:'Calculate each face',dr:dQ4,ht:'<div class="fm">Base = 10 \u00d7 6 = 60 cm\u00b2</div><div class="fm">2 long sides = 2 \u00d7 (10 \u00d7 3) = 60 cm\u00b2</div><div class="fm">2 short sides = 2 \u00d7 (6 \u00d7 3) = 36 cm\u00b2</div>'},
    {lb:'Total surface area',dr:dQ4,ht:'<div class="fm">SA = 60 + 60 + 36 = 156 cm\u00b2</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt((function(){var l=rnd(4,10),w=rnd(3,7),h=rnd(2,6);return{question:'Volume of cuboid: '+l+'×'+w+'×'+h+' cm.',hints:['V = l×w×h'],ans:l*w*h,tol:0,unit:'cm³',working:l+'×'+w+'×'+h+' = '+l*w*h+' cm³'};})())}
  ]},
  {ey:'Q5 \u2022 Year 10 \u2022 Foundation',ti:'Volume of a Triangular Prism',su:'Triangular cross-section: base 10 cm, height 6 cm. Prism length 15 cm.',steps:[
    {lb:'The prism',dr:dQ5,ht:'<p>A <b>triangular prism</b> has a triangular cross-section. Volume = area of cross-section \u00d7 length.</p>'},
    {lb:'Cross-sectional area',dr:dQ5,ht:'<div class="fm">A = \u00bd \u00d7 base \u00d7 height = \u00bd \u00d7 10 \u00d7 6 = 30 cm\u00b2</div>'},
    {lb:'Volume',dr:dQ5,ht:'<div class="fm">V = A \u00d7 l = 30 \u00d7 15 = 450 cm\u00b3</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt((function(){var l=rnd(6,12),w=rnd(4,8),h=rnd(2,5);var sa=2*(l*h+w*h)+l*w;return{question:'Open box (no lid): base '+l+'×'+w+' cm, height '+h+' cm. Surface area?',hints:['Base + 2 long sides + 2 short sides'],ans:sa,tol:0,unit:'cm²',working:l*w+'+'+2*l*h+'+'+2*w*h+' = '+sa+' cm²'};})())}
  ]},
  {ey:'Q6 \u2022 Year 10 \u2022 Foundation',ti:'Circumference and Area of a Circle',su:'Circle with radius 9 cm. Find circumference and area (to 1 d.p.).',steps:[
    {lb:'The formulae',dr:dQ6,ht:'<p>Two key formulae for a circle with radius r:</p><div class="fm">Circumference C = 2\u03c0r</div><div class="fm">Area A = \u03c0r\u00b2</div>'},
    {lb:'Label the radius',dr:dQ6,ht:'<div class="fm">r = 9 cm</div>'},
    {lb:'Circumference',dr:dQ6,ht:'<div class="fm">C = 2\u03c0 \u00d7 9 = 18\u03c0 \u2248 56.5 cm</div>'},
    {lb:'Area',dr:dQ6,ht:'<div class="fm">A = \u03c0 \u00d7 9\u00b2 = 81\u03c0 \u2248 254.5 cm\u00b2</div>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt((function(){var b=rnd(6,12),h=rnd(4,8),l=rnd(5,12);var vol=0.5*b*h*l;return{question:'Triangular prism: triangle base '+b+' cm, height '+h+' cm, length '+l+' cm. Volume?',hints:['V = ½×base×height×length'],ans:vol,tol:0,unit:'cm³',working:'½×'+b+'×'+h+'×'+l+' = '+vol+' cm³'};})())}
  ]},
  {ey:'Q7 \u2022 Year 10 \u2022 Extended',ti:'Volume of a Trapezoidal Prism',su:'Parallel sides a = 10 cm, b = 21 cm, perpendicular height 8 cm, length 20 cm.',steps:[
    {lb:'The solid',dr:dQ7,ht:'<p>A prism has a <b>trapezoidal cross-section</b>. Volume = cross-sectional area \u00d7 length.</p>'},
    {lb:'Area of the trapezium',dr:dQ7,ht:'<div class="fm">A = \u00bd \u00d7 (a + b) \u00d7 h = \u00bd \u00d7 (10 + 21) \u00d7 8 = 124 cm\u00b2</div>'},
    {lb:'Volume',dr:dQ7,ht:'<div class="fm">V = A \u00d7 l = 124 \u00d7 20 = 2480 cm\u00b3</div>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt((function(){var r=rnd(3,12);var c=round1(2*Math.PI*r);return{question:'Circumference of circle, radius <b>'+r+' cm</b> (1 d.p.).',hints:['C = 2πr'],ans:c,tol:0.2,unit:'cm',working:'2π×'+r+' = '+c+' cm'};})())}
  ]},
  {ey:'Q8 \u2022 Year 10 \u2022 Extended',ti:'Surface Area of a Sphere from its Volume',su:'A sphere has volume 2463 cm\u00b3. Find its surface area.',steps:[
    {lb:'The problem',dr:dQ8,ht:'<p>We are not given the radius directly. First use <b>V = \u2154\u03c0r\u00b3</b> to find r, then apply <b>SA = 4\u03c0r\u00b2</b>.</p>'},
    {lb:'Find the radius',dr:dQ8,ht:'<div class="fm">r\u00b3 = 3V \u00f7 (4\u03c0) = 3 \u00d7 2463 \u00f7 (4\u03c0) \u2248 588.1</div><div class="fm">r = \u00b3\u221a588.1 \u2248 8.376 cm</div>'},
    {lb:'Surface area',dr:dQ8,ht:'<div class="fm">SA = 4\u03c0r\u00b2 = 4\u03c0 \u00d7 70.16 \u2248 881.8 cm\u00b2</div>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt((function(){var a=rnd(6,12),b=rnd(8,16),h=rnd(4,8),l=rnd(5,12);var vol=0.5*(a+b)*h*l;return{question:'Trapezoidal prism: parallel sides '+a+' and '+b+' cm, height '+h+' cm, length '+l+' cm. Volume?',hints:['½(a+b)×h×l'],ans:vol,tol:0,unit:'cm³',working:'½('+a+'+'+b+')×'+h+'×'+l+' = '+vol+' cm³'};})())}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
</body>
</html>
