<meta charset="UTF-8">

<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.nq-btn:hover{background:var(--gold);color:#fff;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk{margin-top:10px;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>

<script>

var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn'
    +' <button class="nq-btn" data-tryid="'+id+'">↻ New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar">'
    +'<input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'
    +'<div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid');
    var en=ST[id]; if(!en)return;
    var o=en.fn(); en.o=o; ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var en=ST[id]; if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct!  '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}


function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,28,'Direct and Inverse Variation','#C0272D',16,'middle',true));
  if(p>=1){o.push(R(40,44,180,54,'#fff5f0','#C0272D',1.5));o.push(T(130,66,'Direct: y \u221d x','#C0272D',14,'middle',true));o.push(T(130,82,'y = kx','#241A17',13));
    o.push(R(260,44,180,54,'#e8f4ff','#1a5a8a',1.5));o.push(T(350,66,'Inverse: y \u221d 1/x','#1a5a8a',14,'middle',true));o.push(T(350,82,'y = k/x','#241A17',13));}
  if(p>=2){o.push(T(240,120,'Example: y \u221d x,  y=12 when x=4','#241A17',13));o.push(T(240,140,'k = y/x = 12/4 = 3   \u2192   y = 3x','#1a5a8a',14,'middle',true));}
  if(p>=3){o.push(T(240,172,'When x = 10:  y = 3 \u00d7 10 = 30','#241A17',13));}
  if(p>=4){o.push(R(100,188,280,42,'#e8f8ee','#1a7a3a',2));o.push(T(240,214,'y = 30','#1a7a3a',18,'middle',true));}
  s.innerHTML=o.join('');}

function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,24,'y \u221d x\u00b2.  y=45 when x=3. Find y when x=5.','#C0272D',14,'middle',true));
  if(p>=1){o.push(R(60,40,360,46,'#fff5f0','#C0272D',1.5));o.push(T(240,57,'y = kx\u00b2','#241A17',14));o.push(T(240,79,'Write the variation equation with a constant k','#888',11));}
  if(p>=2){o.push(T(240,114,'Substitute: 45 = k \u00d7 3\u00b2 = 9k  \u2192  k = 5','#1a5a8a',14,'middle',true));}
  if(p>=3){o.push(T(240,146,'y = 5x\u00b2','#241A17',15,'middle',true));o.push(T(240,168,'When x=5:  y = 5 \u00d7 25 = 125','#241A17',13));}
  if(p>=4){o.push(R(150,184,180,42,'#e8f8ee','#1a7a3a',2));o.push(T(240,210,'y = 125','#1a7a3a',18,'middle',true));}
  s.innerHTML=o.join('');}

function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,24,'Remainder Theorem','#C0272D',16,'middle',true));
  o.push(T(240,46,'f(x) = x\u00b3 + 2x\u00b2 \u2212 5x + 1.  Find remainder when \u00f7 (x\u22122).','#241A17',12));
  if(p>=1){o.push(R(60,60,360,50,'#fff5f0','#C0272D',1.5));o.push(T(240,80,'When f(x) \u00f7 (x\u2212a), remainder = f(a)','#C0272D',14,'middle',true));o.push(T(240,102,'Set x\u2212a=0  \u2192  x = a = 2','#888',11));}
  if(p>=2){o.push(T(240,130,'f(2) = 8 + 8 \u2212 10 + 1','#241A17',14));}
  if(p>=3){o.push(R(150,148,180,42,'#e8f8ee','#1a7a3a',2));o.push(T(240,174,'Remainder = 7','#1a7a3a',17,'middle',true));}
  if(p>=4){o.push(T(240,214,'Factor Theorem: if f(a) = 0, then (x\u2212a) is a factor.','#1a5a8a',12));o.push(T(240,232,'Here remainder \u2260 0, so (x\u22122) is NOT a factor.','#888',11));}
  s.innerHTML=o.join('');}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Factor Theorem: Factorise x\u00b3 + x\u00b2 \u2212 4x \u2212 4','#C0272D',14,'middle',true));
  if(p>=1){o.push(R(60,36,360,50,'#fff5f0','#C0272D',1.5));o.push(T(240,54,'Try factors of \u22124: \u00b11, \u00b12, \u00b14','#241A17',13));o.push(T(240,76,'f(2) = 8+4\u22128\u22124 = 0  \u2713  \u2192  (x\u22122) is a factor','#1a7a3a',13));}
  if(p>=2){o.push(T(240,110,'Divide: x\u00b3+x\u00b2\u22124x\u22124 \u00f7 (x\u22122)','#241A17',13));o.push(T(240,132,'= x\u00b2 + 3x + 2   (by long division or inspection)','#1a5a8a',13));}
  if(p>=3){o.push(T(240,162,'Factorise x\u00b2+3x+2 = (x+1)(x+2)','#241A17',13));}
  if(p>=4){o.push(R(80,178,320,44,'#e8f8ee','#1a7a3a',2));o.push(T(240,204,'(x\u22122)(x+1)(x+2)','#1a7a3a',17,'middle',true));}
  s.innerHTML=o.join('');}

function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,24,'AP: a=5, d=3, n=20. Find T\u2082\u2080 and S\u2082\u2080.','#C0272D',14,'middle',true));
  if(p>=1){o.push(R(60,40,360,46,'#fff5f0','#C0272D',1.5));o.push(T(240,58,'T(n) = a + (n\u22121)d','#C0272D',14,'middle',true));o.push(T(240,80,'nth term formula','#888',11));}
  if(p>=2){o.push(T(240,108,'T\u2082\u2080 = 5 + 19\u00d73 = 5 + 57 = 62','#1a5a8a',15,'middle',true));}
  if(p>=3){o.push(R(60,128,360,46,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,146,'S(n) = n/2 \u00d7 (2a + (n\u22121)d)','#1a5a8a',14,'middle',true));o.push(T(240,168,'or  S(n) = n/2 \u00d7 (first + last)','#888',11));}
  if(p>=4){o.push(T(240,198,'S\u2082\u2080 = 20/2 \u00d7 (5+62) = 10 \u00d7 67 = 670','#241A17',14));o.push(R(140,216,200,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,239,'S\u2082\u2080 = 670','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');}

function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,24,'GP: a=2, r=3, n=6. Find T\u2086 and S\u2086.','#C0272D',14,'middle',true));
  if(p>=1){o.push(R(60,40,360,46,'#fff5f0','#C0272D',1.5));o.push(T(240,58,'T(n) = ar^(n\u22121)','#C0272D',14,'middle',true));o.push(T(240,78,'nth term of geometric sequence','#888',11));}
  if(p>=2){o.push(T(240,106,'T\u2086 = 2 \u00d7 3\u2075 = 2 \u00d7 243 = 486','#1a5a8a',15,'middle',true));}
  if(p>=3){o.push(R(60,126,360,46,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,144,'S(n) = a(r\u207f \u2212 1) / (r \u2212 1)   when r > 1','#1a5a8a',14,'middle',true));o.push(T(240,164,'or  a(1 \u2212 r\u207f) / (1 \u2212 r)   when r < 1','#888',11));}
  if(p>=4){o.push(T(240,196,'S\u2086 = 2(3\u2076\u22121)/(3\u22121) = 2(729\u22121)/2 = 728','#241A17',14));o.push(R(140,214,200,38,'#e8f8ee','#1a7a3a',2));o.push(T(240,238,'S\u2086 = 728','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');}

function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Solve:  log\u2082(x\u00b2) + log\u2082(8) = 7','#C0272D',16,'middle',true));
  if(p>=1){o.push(R(60,36,360,46,'#fff5f0','#C0272D',1.5));o.push(T(240,55,'log\u2082(x\u00b2) + log\u2082(8) = log\u2082(8x\u00b2)','#C0272D',14,'middle',true));o.push(T(240,75,'Product rule: log(A)+log(B)=log(AB)','#888',11));}
  if(p>=2){o.push(T(240,106,'log\u2082(8x\u00b2) = 7  \u2192  8x\u00b2 = 2\u2077 = 128','#241A17',14));}
  if(p>=3){o.push(T(240,136,'x\u00b2 = 128/8 = 16  \u2192  x = 4','#1a5a8a',15,'middle',true));}
  if(p>=4){o.push(R(160,154,160,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,179,'x = 4','#1a7a3a',18,'middle',true));o.push(T(240,222,'Key log laws: log(AB)=log A+log B','#888',11));o.push(T(240,240,'log(A/B)=log A\u2212log B,  log(A\u207f)=n log A','#888',11));}
  s.innerHTML=o.join('');}

function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Solve:  3^(2x\u22121) = 27','#C0272D',16,'middle',true));
  if(p>=1){o.push(T(240,54,'Write 27 as a power of 3:  27 = 3\u00b3','#241A17',13));o.push(T(240,74,'3^(2x\u22121) = 3\u00b3','#C0272D',15,'middle',true));}
  if(p>=2){o.push(R(60,88,360,46,'#e8f4ff','#1a5a8a',1.5));o.push(T(240,107,'Equate the exponents (same base):','#1a5a8a',13));o.push(T(240,127,'2x \u2212 1 = 3','#1a5a8a',14,'middle',true));}
  if(p>=3){o.push(T(240,158,'2x = 4  \u2192  x = 2','#241A17',15,'middle',true));}
  if(p>=4){o.push(R(160,172,160,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,197,'x = 2','#1a7a3a',18,'middle',true));o.push(T(240,232,'If bases differ, take logs of both sides instead','#888',11));}
  s.innerHTML=o.join('');}

function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Binomial Expansion: (1 + x)\u2074','#C0272D',16,'middle',true));
  if(p>=1){o.push(R(60,36,360,50,'#fff5f0','#C0272D',1.5));o.push(T(240,56,'Pascal\'s Row 4:  1  4  6  4  1','#C0272D',14,'middle',true));o.push(T(240,78,'or use \u207f C\u1d63 coefficients','#888',11));}

    {lb:'The theorem',dr:dQ3,ht:'<span class="lt lf">Foundation</span><p>When a polynomial f(x) is divided by (x\u2212a), the <b>remainder = f(a)</b>. You substitute x=a instead of doing long division.</p>'},
    {lb:'Identify a',dr:dQ3,ht:'<div class="fm">Divisor: (x\u22122)  \u2192  a = 2</div>'},
    {lb:'Substitute',dr:dQ3,ht:'<div class="fm">f(2) = 8 + 8 \u2212 10 + 1 = 7</div>'},
    {lb:'Factor theorem bonus',dr:dQ3,ht:'<p>If the remainder is <b>zero</b>, (x\u2212a) is a factor. Here remainder = 7 \u2260 0, so (x\u22122) is not a factor.</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){
  var a = pick([2, 3, -1, -2, 1, 4, -3]);
  var b = pick([-3, -5, 2, 4, -2, 6, -4, 1]);
  var c = pick([2, -1, 3, -4, 5, -2, 1, -3]);
  // f(x) = x^3 + b*x + c, divided by (x - a)
  // remainder = f(a) = a^3 + b*a + c
  var aCubed = a * a * a;
  var bTerm = b * a;
  var ans = aCubed + bTerm + c;

  var divisorStr = a >= 0 ? '(x \u2212 ' + a + ')' : '(x + ' + Math.abs(a) + ')';
  var aStr = a >= 0 ? a : '(' + a + ')';

  var bSign = b >= 0 ? ' + ' + b + 'x' : ' \u2212 ' + Math.abs(b) + 'x';
  var cSign = c >= 0 ? ' + ' + c : ' \u2212 ' + Math.abs(c);

  var bTermStr = bTerm >= 0 ? ' + ' + bTerm : ' \u2212 ' + Math.abs(bTerm);

  return {
    question: 'f(x) = x\u00b3' + bSign + cSign + '. Find the remainder when divided by ' + divisorStr + '.',
    hints: [
      'Substitute x = ' + a,
      'f(' + a + ') = ' + aCubed + bTermStr + ' + ' + c
    ],
    ans: ans,
    tol: 0,
    unit: '',
    working: 'f(' + aStr + ') = ' + aCubed + bTermStr + (c >= 0 ? '+' : '') + c + ' = ' + ans
  };
})}

  {ey:'Q4 \u00b7 Polynomials \u00b7 WAEC',ti:'The Factor Theorem',su:'Show (x\u22122) is a factor of x\u00b3+x\u00b2\u22124x\u22124 and fully factorise.',lv:'F',steps:[
    {lb:'The factor theorem',dr:dQ4,ht:'<span class="lt lf">Foundation</span><p>If f(a) = 0, then (x\u2212a) is a factor. Try factors of the constant term (\u00b11, \u00b12, \u00b14) until you find one that gives zero.</p>'},

    {lb:'Divide to find the quotient',dr:dQ4,ht:'<div class="fm">x\u00b3+x\u00b2\u22124x\u22124 \u00f7 (x\u22122) = x\u00b2+3x+2</div>'},
    {lb:'Factorise fully',dr:dQ4,ht:'<div class="fm">(x\u22122)(x\u00b2+3x+2) = (x\u22122)(x+1)(x+2)</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){
  // Pick three distinct positive integer roots (all small, so polynomial is manageable)
  var roots = pick([
    [1,2,3],[1,2,4],[1,2,5],[1,3,4],[1,3,5],[2,3,4],[2,3,5],[1,4,5],[2,4,5]
  ]);
  var r1 = roots[0], r2 = roots[1], r3 = roots[2]; // r1 < r2 < r3
  // f(x) = (x-r1)(x-r2)(x-r3)
  // = x^3 - (r1+r2+r3)x^2 + (r1r2+r1r3+r2r3)x - r1*r2*r3
  var a = -(r1+r2+r3);
  var b = r1*r2 + r1*r3 + r2*r3;
  var c = -(r1*r2*r3);

  function signStr(n){
    if(n >= 0) return ' + ' + n;
    return ' \u2212 ' + Math.abs(n);
  }

  // quadratic after dividing by (x - r1): (x-r2)(x-r3) = x^2 - (r2+r3)x + r2*r3
  var qa = 1, qb = -(r2+r3), qc = r2*r3;

  var fStr = 'x\u00b3' + signStr(a) + 'x\u00b2' + signStr(b) + 'x' + signStr(c);
  var quadStr = 'x\u00b2' + signStr(qb) + 'x' + signStr(qc);

  return {

    ],
    ans: r3,
    tol: 0,
    unit: '(largest root)',
    working: '(x\u2212' + r1 + ')(x\u2212' + r2 + ')(x\u2212' + r3 + '). Largest root = ' + r3
  };
})}

  {ey:'Q5 \u00b7 Sequences \u00b7 WAEC',ti:'Arithmetic Progression',su:'AP: first term a=5, common difference d=3, n=20 terms. Find T\u2082\u2080 and S\u2082\u2080.',lv:'F',steps:[

    {lb:'The log laws',dr:dQ7,ht:'<span class="lt le">Extended</span><div class="fm">log(AB) = log A + log B</div><div class="fm">log(A/B) = log A \u2212 log B</div><div class="fm">log(A\u207f) = n log A</div>'},

  {ey:'Q8 \u00b7 Indices \u00b7 WAEC',ti:'Exponential Equations',su:'Solve 3^(2x\u22121) = 27.',lv:'F',steps:[
    {lb:'Same base method',dr:dQ8,ht:'<span class="lt lf">Foundation</span><p>If both sides can be written as powers of the same base, equate the exponents.</p>'},
    {lb:'Express 27 as a power of 3',dr:dQ8,ht:'<div class="fm">27 = 3\u00b3</div>'},
    {lb:'Equate exponents',dr:dQ8,ht:'<div class="fm">3^(2x\u22121) = 3\u00b3  \u2192  2x\u22121 = 3</div>'},
    {lb:'Solve',dr:dQ8,ht:'<div class="fm">2x = 4  \u2192  x = 2</div>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt(function(){
  // Pick a base and exponent for the right-hand side
  var base = pick([2, 3, 5]);
  var rhs_exp = pick([3, 4, 5, 6]);
  var rhs = Math.pow(base, rhs_exp);

  // Pick coefficients a, b for the exponent (ax + b)
  var a = pick([2, 3, 4]);
  var b = pick([-3, -2, -1, 1, 2, 3]);

  // Answer: ax + b = rhs_exp => x = (rhs_exp - b) / a
  var ans = (rhs_exp - b) / a;
  var ansRounded = Math.round(ans * 1000) / 1000;

  // Build exponent string for display
  var bStr = b >= 0 ? '+' + b : '' + b;
  var expStr = a + 'x' + bStr;

  // Build working fraction string
  var num = rhs_exp - b;
  var den = a;
  // Simplify fraction for display
  function gcd(x, y) { return y === 0 ? x : gcd(y, x % y); }
  var g = gcd(Math.abs(num), Math.abs(den));
  var sNum = num / g;
  var sDen = den / g;
  var fracStr = sDen === 1 ? '' + sNum : sNum + '/' + sDen;

  var unitStr = sDen === 1 ? '' : '(exact: ' + fracStr + ')';

  return {
    question: 'Solve ' + base + '^(' + expStr + ') = ' + rhs + '.',
    hints: [
      rhs + ' = ' + base + '\u2076'.replace('6', rhs_exp),
      expStr + ' = ' + rhs_exp
    ],
    ans: ans,
    tol: 0.01,
    unit: unitStr,
    working: expStr + ' = ' + rhs_exp + '  \u2192  ' + a + 'x = ' + num + '  \u2192  x = ' + fracStr + ' \u2248 ' + ansRounded
  };
})}

  {ey:'Q9 \u00b7 Binomial Theorem \u00b7 WAEC',ti:'Binomial Expansion',su:'Expand (1+x)\u2074 fully. Then find the first four terms of (2+x)\u2074.',lv:'E',steps:[
    {lb:'Pascal\'s triangle / \u207fC\u1d63',dr:dQ9,ht:'<span class="lt le">Extended</span><p>The coefficients in the expansion of (a+b)\u207f are given by Pascal\'s triangle or \u207fC\u1d63 = n! / (r!(n\u2212r)!).</p>'},
    {lb:'Expand (1+x)\u2074',dr:dQ9,ht:'<div class="fm">(1+x)\u2074 = 1 + 4x + 6x\u00b2 + 4x\u00b3 + x\u2074</div>'},
    {lb:'Expand (2+x)\u2074 using \u207fC\u1d63',dr:dQ9,ht:'<div class="fm">= \u2074C\u2080\u00d72\u2074 + \u2074C\u2081\u00d72\u00b3x + \u2074C\u2082\u00d72\u00b2x\u00b2 + \u2074C\u2083\u00d72x\u00b3 + x\u2074</div>'},
    {lb:'Simplify',dr:dQ9,ht:'<div class="fm">= 16 + 32x + 24x\u00b2 + 8x\u00b3 + x\u2074</div>'},
    {lb:'Your turn',dr:dQ9,ht:tryIt(function(){
  var n = pick([5,6,7,8,9]);
  var r = rnd(1, n-1);

  // Calculate nCr
  function fact(x) {
    var f = 1;
    for (var i = 2; i <= x; i++) f *= i;
    return f;
  }
  var ans = fact(n) / (fact(r) * fact(n - r));

  // Superscript digits for display
  var sup = ['\u2070','\u00b9','\u00b2','\u00b3','\u2074','\u2075','\u2076','\u2077','\u2078','\u2079'];
  var sub = ['\u2080','\u2081','\u2082','\u2083','\u2084','\u2085','\u2086','\u2087','\u2088','\u2089'];

  var nSup = sup[n];
  var rSub = sub[r];
  var nSub = sub[n];
  var nMinusRSub = sub[n - r];

  // Build numerator string for hint e.g. 5×4 for r=2
  var numParts = [];
  for (var i = n; i > n - r; i--) numParts.push(i);
  var numStr = numParts.join('\u00d7');

  var denParts = [];
  for (var i = r; i >= 1; i--) denParts.push(i);
  var denStr = denParts.join('\u00d7');

  return {
    question: 'In the expansion of (1+x)' + nSup + ', what is the coefficient of x' + sup[r] + '?',
    hints: [
      nSup + 'C' + rSub + ' = ' + n + '!/(' + r + '!' + (n - r) + '!)',
      nSup + 'C' + rSub + ' = (' + numStr + ')/(' + denStr + ')'
    ],
    ans: ans,
    tol: 0,
    unit: '',
    working: nSup + 'C' + rSub + ' = ' + ans
  };
})}
  ]},
  {ey:'Q10 \u00b7 Indices & Equations \u00b7 WAEC',ti:'Exponential Equation by Substitution',su:'Solve 4x \u2212 3(2x) + 2 = 0.',lv:'E',steps:[
    {lb:'Spot the hidden quadratic',dr:dQ10,ht:'<span class="lt le">Extended</span><p>Notice that 4x = (2\u00b2)x = (2x)\u00b2. Let <b>u = 2x</b> to convert this into a quadratic.</p>'},
    {lb:'Substitute u = 2x',dr:dQ10,ht:'<div class="fm">u\u00b2 \u2212 3u + 2 = 0</div>'},
    {lb:'Factorise and solve for u',dr:dQ10,ht:'<div class="fm">(u\u22121)(u\u22122) = 0  \u2192  u = 1  or  u = 2</div>'},
    {lb:'Reverse the substitution',dr:dQ10,ht:'<div class="fm">2x = 1 = 2\u2070  \u2192  x = 0</div><div class="fm">2x = 2 = 2\u00b9  \u2192  x = 1</div>'},
    {lb:'Your turn',dr:dQ10,ht:tryIt(function(){
  // Pick a base b, and two exponents p < q for the roots
  // Equation: b^(2x) - (p+q)*b^x + p*q = 0
  // i.e. u^2 - (p+q)u + p*q = 0, u = b^x
  // roots u = p and u = q => b^x = p => x = log_b(p), b^x = q => x = log_b(q)
  // To keep integer answers, choose p and q as powers of b
  // Let b be the base, e1 < e2 the exponents so roots are x=e1, x=e2
  var b = pick([2, 3, 5]);
  var e1 = pick([0, 1]);
  var e2 = pick([2, 3]);
  // ensure e2 > e1
  if (e2 <= e1) e2 = e1 + 2;

  var p = Math.pow(b, e1); // smaller u-root
  var q = Math.pow(b, e2); // larger u-root
  var sumPQ = p + q;
  var prodPQ = p * q;

  // Equation: b^(2x) - sumPQ * b^x + prodPQ = 0
  // Written as: (b^2)^x - sumPQ*(b^x) + prodPQ = 0
  var b2 = b * b;

  var ans = e2; // larger solution

  return {
    question: 'Solve ' + b2 + '<sup>x</sup> − ' + sumPQ + '(' + b + '<sup>x</sup>) + ' + prodPQ + ' = 0. What is the larger solution?',

      '(u − ' + p + ')(u − ' + q + ') = 0  →  u = ' + p + ' or u = ' + q,
      b + 'x = ' + q + ' = ' + b + (e2 === 1 ? '' : e2) + '  →  x = ' + e2
    ],
    ans: ans,
    tol: 0,

    working: 'u = ' + p + ': ' + b + 'x = ' + p + ' → x = ' + e1 + '. u = ' + q + ': ' + b + 'x = ' + q + ' → x = ' + e2 + '. Larger solution = ' + e2
  };
})}
