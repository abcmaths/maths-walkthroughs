<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geometry · Year 12 WAEC</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.nq-btn:hover{background:var(--gold);color:#fff;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}

@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>

<header>
  <a href="../index.html" class="back">&larr; All Topics</a>

<script>

var ST={};
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn'
    +' <button class="nq-btn" data-tryid="'+id+'">↻ New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar">'
    +'<input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'
    +'<div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid');
    var en=ST[id]; if(!en)return;
    var o=en.fn(); en.o=o; ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var en=ST[id]; if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='✓ Correct!  '+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}

/* Q2 Similar triangles */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Angle of elevation: tower 50 m away, \u03b8 = 35\u00b0','#C0272D',12,'middle',true));
  // Ground line
  o.push(L(40,230,420,230,'#241A17',2));
  // Observer point A
  o.push(T(60,248,'A','#C0272D',13,'middle',true));
  // Tower
  if(p>=1){
    o.push(L(360,230,360,110,'#1a5a8a',3));
    o.push(T(375,170,'h = ?','#1a5a8a',12,'start',true));
    o.push(T(210,248,'50 m','#241A17',12,'middle',false));
  }
  // Horizontal line from A and elevation angle
  if(p>=2){
    o.push(L(60,230,200,230,'#C8922A',1.5,'4,3'));
    // Elevation line from A to top of tower
    o.push(L(60,230,360,110,'#C0272D',2));
    // Arc for angle
    var arcPts='';
    for(var a=0;a>=(-35);a-=2){
      var rad=a*Math.PI/180;
      var ax=60+55*Math.cos(rad), ay=230+55*Math.sin(rad);
      arcPts+=(a===0?'M':'L')+ax.toFixed(1)+','+ay.toFixed(1)+' ';
    }
    o.push('<path d="'+arcPts+'" fill="none" stroke="#C8922A" stroke-width="2"/>');
    o.push(T(130,218,'35\u00b0','#C8922A',12,'middle',true));
  }
  // Working
  if(p>=3){
    o.push(R(30,56,200,64,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(130,72,'tan(35\u00b0) = h / 50','#1a5a8a',12,'middle',false));
    o.push(T(130,92,'h = 50 \u00d7 tan(35\u00b0)','#1a5a8a',12,'middle',false));
    o.push(T(130,110,'= 50 \u00d7 0.700 \u2248 35.0 m','#1a5a8a',12,'middle',true));
  }
  s.innerHTML=o.join('');
}
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Two similar triangles
  var ax=60,ay=240,bx=200,by=240,cx=120,cy=100;
  var dx=220,dy=240,ex=440,ey=240,fx=300,fy=60;
  // scale factor ~1.6
  o.push('<polygon points="'+ax+','+ay+' '+bx+','+by+' '+cx+','+cy+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push('<polygon points="'+dx+','+dy+' '+ex+','+ey+' '+fx+','+fy+'" fill="#e8f4e8" stroke="#1a7a3a" stroke-width="2"/>');
  if(p>=1){
    o.push(T((ax+bx)/2,ay+16,'6 cm','#C0272D',12,'middle',true));
    o.push(T((dx+ex)/2,dy+16,'9 cm','#1a7a3a',12,'middle',true));
    o.push(T(ax-14,(ay+cy)/2,'5 cm','#C0272D',12,'end',false));
  }
  if(p>=2){
    o.push(T(240,20,'Scale factor = 9/6 = 1.5','#241A17',13,'middle',true));
    o.push(T(dx-14,(dy+fy)/2,'?','#1a7a3a',14,'end',true));
  }
  if(p>=3){
    o.push(T(dx-14,(dy+fy)/2,'7.5 cm','#1a7a3a',12,'end',true));
    o.push(T(240,280,'Corresponding side = 5 \u00d7 1.5 = 7.5 cm','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q3 Congruent triangles */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Two congruent triangles (different orientation)
  var A=[80,240],B=[260,240],C=[140,80];
  var D=[300,240],E=[420,80],F=[460,240];
  o.push('<polygon points="'+A+' '+B+' '+C+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push('<polygon points="'+D+' '+E+' '+F+'" fill="#e8e8ff" stroke="#6050a0" stroke-width="2"/>');
  ['A','B','C'].forEach(function(lbl,i){var pt=[A,B,C][i];var off=[[-14,14],[10,14],[0,-12]][i];o.push(T(pt[0]+off[0],pt[1]+off[1],lbl,'#C0272D',12,'middle',true));});
  ['D','E','F'].forEach(function(lbl,i){var pt=[D,E,F][i];var off=[[-14,14],[0,-12],[12,14]][i];o.push(T(pt[0]+off[0],pt[1]+off[1],lbl,'#6050a0',12,'middle',true));});
  if(p>=1){
    o.push(T(170,270,'Triangle 1','#C0272D',12,'middle',true));
    o.push(T(380,270,'Triangle 2','#6050a0',12,'middle',true));
    o.push(T(240,20,'Are these triangles congruent?','#241A17',13,'middle',true));
  }
  if(p>=2){
    o.push(T(240,54,'Check: SSS, SAS, ASA, RHS','#241A17',12,'middle',false));
    o.push(T(240,72,'All corresponding sides equal \u2192 SSS','#C0272D',12,'middle',true));
  }
  if(p>=3){
    o.push(T(240,280,'Congruent: same shape AND same size (may be reflected/rotated)','#241A17',12,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q4 Properties of quadrilaterals */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Parallelogram
  var px=60,py=220,pw=140,ph=80,sk=40;
  var ppts=[[px+sk,py-ph],[px+sk+pw,py-ph],[px+pw,py],[px,py]];
  o.push('<polygon points="'+ppts.map(function(v){return v[0]+','+v[1];}).join(' ')+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push(T(px+sk+pw/2,py+16,'Parallelogram','#C0272D',11,'middle',false));
  if(p>=1){
    // tick marks on parallel sides
    [[ppts[0],ppts[1]],[ppts[3],ppts[2]]].forEach(function(seg){var mx=(seg[0][0]+seg[1][0])/2,my=(seg[0][1]+seg[1][1])/2;o.push(T(mx,my-8,'\u2713','#C8922A',10,'middle',false));});
    [[ppts[0],ppts[3]],[ppts[1],ppts[2]]].forEach(function(seg){var mx=(seg[0][0]+seg[1][0])/2,my=(seg[0][1]+seg[1][1])/2;o.push(T(mx-10,my,'\u2713\u2713','#C8922A',10,'end',false));});
    o.push(T(px+sk+pw/2,py+28,'Opp sides parallel & equal','#888',10,'middle',false));
    o.push(T(px+sk+pw/2,py+40,'Opp angles equal','#888',10,'middle',false));
  }
  // Rhombus
  var rx=280,ry=160,rd=80;
  var rpts=[[rx,ry-rd],[rx+rd,ry],[rx,ry+rd],[rx-rd,ry]];
  o.push('<polygon points="'+rpts.map(function(v){return v[0]+','+v[1];}).join(' ')+'" fill="#e8f4e8" stroke="#1a7a3a" stroke-width="2"/>');
  o.push(T(rx,ry+rd+16,'Rhombus','#1a7a3a',11,'middle',false));
  if(p>=2){
    o.push(L(rpts[0][0],rpts[0][1],rpts[2][0],rpts[2][1],'#C8922A',1.5,'4,3'));
    o.push(L(rpts[1][0],rpts[1][1],rpts[3][0],rpts[3][1],'#C8922A',1.5,'4,3'));
    o.push(T(rx,ry+rd+28,'All sides equal; diagonals bisect at 90\u00b0','#888',10,'middle',false));
  }
  if(p>=3){
    o.push(T(240,20,'Key quadrilateral properties','#241A17',13,'middle',true));
    o.push(T(240,280,'Kite: 1 axis symmetry; Trapezium: 1 pair parallel sides','#241A17',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q5 Polygon angle properties proof level */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Show triangulation of polygon
  var cx=240,cy=150,r=110,n=7;
  var verts=[];for(var i=0;i<n;i++){var a=(i*360/n-90)*Math.PI/180;verts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  o.push('<polygon points="'+verts.map(function(v){return v[0].toFixed(1)+','+v[1].toFixed(1);}).join(' ')+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    // diagonals from first vertex to create n-2 triangles
    for(var j=2;j<n-1;j++){o.push(L(verts[0][0],verts[0][1],verts[j][0],verts[j][1],'#C8922A',1,'4,3'));}
    o.push(T(cx,cy,'n=7 polygon','#241A17',12,'middle',false));
    o.push(T(cx,cy+18,'n\u22122 = 5 triangles','#C8922A',12,'middle',true));
  }
  if(p>=2){
    o.push(T(cx,cy+40,'Sum = (n\u22122)\u00d7180 = 5\u00d7180 = 900\u00b0','#C0272D',13,'middle',true));
  }
  if(p>=3){
    o.push(T(cx,cy+62,'Exterior angle sum = 360\u00b0 always','#1a5a8a',12,'middle',true));
    o.push(T(cx,cy+80,'Each exterior (regular): 360\u00f7n = 360\u00f77 \u2248 51.4\u00b0','#888',11,'middle',false));
    o.push(T(240,280,'Proof: exterior angles turn through a full revolution = 360\u00b0','#241A17',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q6 Locus */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=160,ay=200,bx=320,by=200;

    var lonA=-20,lonB=40;
    var xA=cx+rLat*Math.cos((lonA)*Math.PI/180)*Math.cos(0);
    var xB=cx+rLat*Math.cos((lonB)*Math.PI/180)*Math.cos(0);
    // approximate x positions for illustration
    var xAp=cx+rLat*Math.sin(lonA*Math.PI/180);

    o.push('<circle cx="'+xAp.toFixed(1)+'" cy="'+yLat.toFixed(1)+'" r="5" fill="#C0272D"/>');
    o.push('<circle cx="'+xBp.toFixed(1)+'" cy="'+yLat.toFixed(1)+'" r="5" fill="#C0272D"/>');

    o.push(T(xBp,yLat-14,'B (40\u00b0E)','#C0272D',10,'middle',true));
    o.push(L(xAp,yLat,xBp,yLat,'#C0272D',1.5,'4,3'));
  }
  if(p>=2){
    o.push(T(240,20,'Distance along parallel of latitude:','#241A17',13,'middle',true));
    o.push(T(240,42,'Step 1: radius of latitude circle','#241A17',12,'middle',false));
    o.push(T(240,60,'r\u2097 = R \u00d7 cos(latitude) = 6371 \u00d7 cos(50\u00b0) \u2248 4096 km','#1a5a8a',12,'middle',true));
  }
  if(p>=3){
    o.push(T(240,90,'Step 2: difference in longitude = 20 + 40 = 60\u00b0','#241A17',12,'middle',false));

  }

}
