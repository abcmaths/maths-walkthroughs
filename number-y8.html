<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Number · Year 8 · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.bc{background:#fff3cd;color:#7a5a00;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.lc{background:#fff3cd;color:#7a5a00;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">← All Topics</a>
  <div class="ht">Number — Year 8</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 280"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">← Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next →</button>
    </div>
  </div>
</div>
<script>
var ST={};
function tryIt(o){var id='t'+Math.random().toString(36).slice(2);ST[id]=o;var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');return '<div class="try"><div class="try-t">&#10002; Your Turn</div><p>'+o.question+'</p><ul class="hl">'+h+'</ul><div class="ar"><input type="number" step="any" placeholder="Answer ('+o.unit+')" id="'+id+'_i"/><button class="ck" onclick="ck(\''+id+'\')">Check</button></div><div class="fb" id="'+id+'_f"></div><details class="wk"><summary>Show full working</summary><div class="wk-b">'+o.working+'</div></details></div>';}
function ck(id){var o=ST[id],v=parseFloat(document.getElementById(id+'_i').value),f=document.getElementById(id+'_f');if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}if(Math.abs(v-o.ans)<=(o.exact||0.05)){f.className='fb ok';f.textContent='Correct! Answer: '+o.ans+' '+o.unit;}else{f.className='fb er';f.textContent='Not quite \u2014 check your working and try again.';}}
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

/* Q1 Ordering fractions */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  var fracs=[{n:3,d:4,v:0.75},{n:2,d:3,v:0.667},{n:5,d:8,v:0.625},{n:7,d:12,v:0.583}];
  o.push(T(240,20,'Order from smallest to largest: 3/4,  2/3,  5/8,  7/12','#C0272D',13,undefined,true));
  fracs.forEach(function(f,i){
    var x=58+i*96,show=(p>=1);
    o.push(R(x-36,36,72,56,show?'#fff5f0':'#f8f8f8',show?'#C0272D':'#ddd',show?2:1));
    o.push(L(x-24,64,x+24,64,show?'#C0272D':'#ddd',1.5));
    o.push(T(x,57,f.n,show?'#C0272D':'#aaa',17));
    o.push(T(x,79,f.d,show?'#C0272D':'#aaa',17));
    if(p>=2)o.push(T(x,110,f.v.toFixed(3),'#1a5a8a',13,undefined,true));
  });
  if(p>=2)o.push(T(240,132,'Convert to decimals by dividing numerator by denominator:','#888',11));
  if(p>=3){
    o.push(R(40,148,400,42,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,174,'7/12 < 5/8 < 2/3 < 3/4','#1a7a3a',16,undefined,true));
  }
  if(p>=3)o.push(T(240,212,'Or use LCM of denominators (12,8,3,4 \u2192 LCM=24) to compare','#888',11));
  s.innerHTML=o.join('');
}

/* Q2 Adding and subtracting fractions */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,20,'Calculate:  2/3 + 3/4  \u2212  1/6','#C0272D',16,undefined,true));
  if(p>=1){
    o.push(T(240,52,'LCM of 3, 4, 6 = 12 \u2192 use 12 as common denominator','#888',12));
    var conv=[{frac:'2/3',eq:'8/12',col:'#C0272D'},{frac:'3/4',eq:'9/12',col:'#1a5a8a'},{frac:'1/6',eq:'2/12',col:'#1a7a3a'}];
    conv.forEach(function(c,i){
      var x=68+i*128;
      o.push(R(x-46,64,92,48,i===2?'#e8f8f0':'#fff5f0',i===2?'#1a7a3a':i===1?'#1a5a8a':'#C0272D',1.5));
      o.push(T(x,84,c.frac,c.col,14,undefined,true));
      o.push(T(x,104,'= '+c.eq,c.col,12));
    });
  }
  if(p>=2){
    o.push(T(240,134,'8/12 + 9/12 \u2212 2/12','#241A17',15,undefined,true));
    o.push(T(240,156,'= (8 + 9 \u2212 2) / 12','#241A17',14));
  }
  if(p>=3){
    o.push(R(140,170,200,44,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,197,'= 15/12 = <b>5/4</b> = 1\u00bc','#1a7a3a',16,undefined,true));
  }
  s.innerHTML=o.join('');
}

/* Q3 Multiplying and dividing fractions */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,20,'Multiply: 3/5 \u00d7 10/9   |   Divide: 2/3 \u00f7 4/5','#C0272D',13,undefined,true));
  if(p>=1){
    o.push(R(30,38,200,90,'#fff5f0','#C0272D',2));
    o.push(T(130,56,'3/5 \u00d7 10/9','#C0272D',14,undefined,true));
    o.push(T(130,76,'= (3\u00d710)/(5\u00d79)','#241A17',13));
    o.push(T(130,92,'= 30/45','#241A17',13));
    if(p>=2)o.push(T(130,111,'= 2/3','#1a7a3a',15,undefined,true));
  }
  if(p>=1){
    o.push(R(250,38,200,90,'#e8f4ff','#1a5a8a',2));
    o.push(T(350,56,'2/3 \u00f7 4/5','#1a5a8a',14,undefined,true));
    o.push(T(350,76,'= 2/3 \u00d7 5/4','#241A17',13));
    o.push(T(350,92,'(flip 2nd fraction)','#888',10));
    if(p>=2)o.push(T(350,111,'= 10/12 = 5/6','#1a7a3a',15,undefined,true));
  }
  if(p>=3){
    o.push(R(60,148,360,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,171,'Multiply: top\u00d7top and bottom\u00d7bottom. Divide: multiply by the reciprocal.','#1a7a3a',11,undefined,true));
  }
  if(p>=3)o.push(T(240,210,'Cross-cancel before multiplying: 3\u00f73=1, 10\u00f75=2 \u2192 1\u00d72/1\u00d73 = 2/3','#C8922A',11,undefined,true));
  s.innerHTML=o.join('');
}

/* Q4 Percentage of an amount + increase/decrease */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  var bx=50,bw=380,by=70,bh=50;
  o.push(R(bx,by,bw,bh,'#e8f4ff','#1a5a8a',2));
  o.push(T(240,100,'\u00a3480  =  100%','#1a5a8a',15,undefined,true));
  if(p>=1){
    o.push(T(240,140,'Find 35% of \u00a3480','#241A17',14));
    o.push(T(240,162,'Method: 10% = \u00a348,  30% = \u00a3144,  5% = \u00a324','#888',12));
    o.push(R(bx,172,bw,44,'#fce8d8','#C0272D',1.5));
    o.push(T(240,199,'35% = \u00a3144 + \u00a324 = <b>\u00a3168</b>','#C0272D',14,undefined,true));
  }
  if(p>=2){
    o.push(T(240,232,'Or: 480 \u00d7 0.35 = \u00a3168','#888',12,undefined,true));
  }
  if(p>=3){
    o.push(R(bx,248,bw,24,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,265,'Increase \u00a3480 by 35%: 480\u00d71.35=\u00a3648  |  Decrease by 35%: 480\u00d70.65=\u00a3312','#1a7a3a',11,undefined,true));
  }
  s.innerHTML=o.join('');
}

/* Q5 Ratio */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,20,'Orange juice to water is mixed in ratio 2 : 5.','#241A17',13,undefined,true));
  o.push(T(240,38,'How much orange juice for 280 ml of water?','#C0272D',13,undefined,true));
  var pw=40,ph=50,gap=8,by=60;
  [0,1,2,3,4,5,6].forEach(function(i){
    var x=36+i*(pw+gap),oj=(i<2),show=(p>=1);
    o.push(R(x,by,pw,ph,show?(oj?'#fce8d8':'#e8f4ff'):'#f8f8f8',show?(oj?'#C0272D':'#1a5a8a'):'#ddd',show?2:1));
    if(show)o.push(T(x+pw/2,by+ph/2+5,oj?'OJ':'W',oj?'#C0272D':'#1a5a8a',11,undefined,true));
  });
  if(p>=1){
    o.push(T(240,132,'Water = 5 parts = 280 ml','#241A17',13,undefined,true));
    o.push(T(240,152,'1 part = 280 \u00f7 5 = <b>56 ml</b>','#241A17',13,undefined,true));
  }
  if(p>=2){
    o.push(R(80,168,320,42,'#fce8d8','#C0272D',2));
    o.push(T(240,194,'Orange juice = 2 \u00d7 56 = <b>112 ml</b>','#C0272D',15,undefined,true));
  }
  if(p>=3){
    o.push(T(240,232,'Check: OJ:Water = 112:280 = 2:5 \u2713','#1a7a3a',12,undefined,true));
    o.push(T(240,252,'Total drink = 112+280 = 392 ml','#888',11));
  }
  s.innerHTML=o.join('');
}

/* Q6 Rounding and significant figures */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  var nums=[{v:'34 768',r2:'34 800',r3:'34 800',sf2:'35 000',sf3:'34 800'},{v:'0.003 472',r4:'0.003 5',sf2:'0.003 5',sf3:'0.003 47'}];
  o.push(T(240,18,'Rounding: decimal places vs significant figures','#241A17',13,undefined,true));
  ['Number','2 d.p.','3 s.f.'].forEach(function(h,c){
    o.push(R(40+c*134,32,132,30,'#C0272D','#C0272D',0));
    o.push(T(106+c*134,52,h,'#fff',12,undefined,true));
  });
  nums.forEach(function(n,i){
    var y=62+i*72,show=(p>=i+1);
    o.push(R(40,y,132,58,show?'#fff5f0':'#f8f8f8',show?'#C0272D':'#ddd',show?1.5:1));
    o.push(T(106,y+32,n.v,show?'#241A17':'#aaa',12,undefined,show));
    o.push(R(174,y,132,58,show?'#fff5f0':'#f8f8f8',show?'#1a5a8a':'#ddd',show?1.5:1));
    if(show)o.push(T(240,y+32,n.r4||n.r2,'#1a5a8a',12,undefined,true));
    o.push(R(308,y,132,58,show?'#fff5f0':'#f8f8f8',show?'#1a7a3a':'#ddd',show?1.5:1));
    if(show)o.push(T(374,y+32,n.sf3,'#1a7a3a',12,undefined,true));
  });
  if(p>=3)o.push(T(240,224,'S.F. counts from first non-zero digit','#C8922A',12,undefined,true));
  if(p>=3)o.push(T(240,248,'0.003 472 rounded to 3 s.f. = 0.003 47 (digits 3,4,7)','#888',11));
  s.innerHTML=o.join('');
}

/* Q7 Negative numbers */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  var lx=40,rx=440,y=100,sx=40;
  o.push(L(lx,y,rx,y,'#ccc',2));
  for(var i=-5;i<=5;i++){o.push(L(lx+(i+5)*sx,y-8,lx+(i+5)*sx,y+8,'#888',1.5));o.push(T(lx+(i+5)*sx,y+22,i,'#888',12));}
  var calcs=[
    {q:'\u22123 + (\u22124)',a:'\u22127',show:p>=1},
    {q:'\u22125 \u2212 (\u22122)',a:'\u22123',show:p>=2},
    {q:'\u22124 \u00d7 3',a:'\u221212',show:p>=3},
    {q:'\u221215 \u00f7 (\u22123)',a:'+5',show:p>=4}
  ];
  calcs.forEach(function(c,i){
    var x=50+i*108,by=148;
    o.push(R(x,by,100,44,c.show?'#fff5f0':'#f8f8f8',c.show?'#C0272D':'#ddd',c.show?2:1));
    o.push(T(x+50,by+18,c.q,'#C0272D',13,undefined,true));
    if(c.show)o.push(T(x+50,by+36,'= '+c.a,'#1a7a3a',13,undefined,true));
  });
  if(p>=4)o.push(T(240,218,'Rules: neg\u00d7neg=pos, neg\u00d7pos=neg, pos\u00f7neg=neg, neg\u00f7neg=pos','#C8922A',11,undefined,true));
  o.push(T(240,54,'Number line helps with addition and subtraction','#888',12,undefined,true));
  s.innerHTML=o.join('');
}

/* Q8 Powers of 10 and BIDMAS */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,20,'Evaluate using BIDMAS: 3 + 4\u00b2 \u00d7 2 \u2212 (8 \u2212 3)','#C0272D',15,undefined,true));
  var steps=[
    {lbl:'B \u2014 Brackets first',expr:'3 + 4\u00b2 \u00d7 2 \u2212 <b style="color:#C0272D">(8\u22123)</b>',res:'3 + 4\u00b2 \u00d7 2 \u2212 5'},
    {lbl:'I \u2014 Indices (powers)',expr:'3 + <b style="color:#1a5a8a">4\u00b2</b> \u00d7 2 \u2212 5',res:'3 + 16 \u00d7 2 \u2212 5'},
    {lbl:'DM \u2014 Multiply',expr:'3 + <b style="color:#1a7a3a">16 \u00d7 2</b> \u2212 5',res:'3 + 32 \u2212 5'},
    {lbl:'AS \u2014 Add/Subtract',expr:'3 + 32 \u2212 5',res:'= 30'}
  ];
  steps.forEach(function(st,i){
    if(p>=i+1){
      o.push(R(30,38+i*54,180,46,'#fff5f0','#C0272D',1.5));
      o.push(T(120,55+i*54,st.lbl,'#C0272D',11,undefined,true));
      o.push(R(220,38+i*54,230,46,'#f8f8f8','#ddd',1));
      // Use innerHTML-style for bold — plain text fallback
      o.push(T(335,62+i*54,st.res,'#1a7a3a',13,undefined,i===3));
    }
  });
  s.innerHTML=o.join('');
}

/* Q9 Fractions of amounts — reverse */
function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,20,'3/5 of a number is 42. Find the number.','#C0272D',16,undefined,true));
  // bar model
  var bx=50,bw=380,bh=44,by=50,pw=bw/5;
  for(var i=0;i<5;i++){
    var filled=(p>=1&&i<3);
    o.push(R(bx+i*pw,by,pw-2,bh,filled?'#fce8d8':'#f0f0f0',filled?'#C0272D':'#ccc',filled?2:1));
    if(p>=1&&i<3)o.push(T(bx+i*pw+pw/2,by+bh/2+5,'?','#C0272D',16));
    if(p>=2&&i>=3)o.push(T(bx+i*pw+pw/2,by+bh/2+5,'?','#888',16));
  }
  if(p>=1)o.push(T(bx+3*pw/2,by+bh+16,'3 parts = 42','#C0272D',12,undefined,true));
  if(p>=2){
