<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Number · Year 9 · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.nq-btn{font-size:11px;font-weight:600;padding:3px 9px;border-radius:3px;border:1px solid var(--gold);background:#fff;color:var(--gold);cursor:pointer;font-family:inherit;}
.nq-btn:hover{background:var(--gold);color:#fff;}
.try-q{font-size:15px;line-height:1.55;margin-bottom:8px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="index.html" class="back">&larr; All Topics</a>
  <div class="ht">Number — Year 9</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 280"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,fn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn <button class="nq-btn" data-tryid="'+id+'">\u21bb New</button></div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<ul class="hl">'+(h||'')+'</ul>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary><div class="wk-b">'+o.working+'</div></details>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('nq-btn')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.fn();en.o=o;ST[id]={o:o,fn:en.fn};
    var wrap=document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid'),en=ST[id];if(!en)return;
    var o=en.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function C(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+(sw||1.5)+'"/>';}

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Squares, Cubes, Roots \u2014 index notation','#C0272D',13,'middle',true));
  var examples=[['4\u00b2',16,'4\u00d74'],['3\u00b3',27,'3\u00d73\u00d73'],['\u221a25',5,'5\u00b2=25'],['\u221b8',2,'2\u00b3=8']];
  examples.forEach(function(ex,i){
    var y=58+i*48;
    if(p>=i+1){
      o.push(R(40,y,130,38,'#fff5f0','#C0272D',1.5));o.push(T(105,y+23,ex[0],'#C0272D',18,'middle',true));
      o.push(L(185,y+19,210,y+19,'#888',1,'4,3'));
      o.push(R(220,y,80,38,'#f8f8f8','#888',1));o.push(T(260,y+23,ex[2],'#888',12,'middle',false));
      o.push(R(315,y,100,38,'#e8f8ee','#1a7a3a',1.5));o.push(T(365,y+23,'= '+ex[1],'#1a7a3a',16,'middle',true));
    }
  });
  s.innerHTML=o.join('');
}
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'HCF and LCM using prime factors','#C0272D',13,'middle',true));
  // 12 and 18
  var cols=['Factor','12','18'];
  var rows=[['2','2\u00b2','2\u00b9'],['3','3\u00b9','3\u00b2']];
  if(p>=1){
    cols.forEach(function(c,i){o.push(R(60+i*120,56,116,28,'#fff5f0','#C0272D',1.5));o.push(T(118+i*120,74,c,'#C0272D',11,'middle',true));});
    rows.forEach(function(r,ri){
      r.forEach(function(c,ci){
        o.push(R(60+ci*120,84+ri*34,116,30,'#fff','#ccc',1));o.push(T(118+ci*120,104+ri*34,c,'#241A17',13,'middle',ci>0));
      });
    });
  }
  if(p>=2){o.push(R(40,162,200,32,'#e8f4ff','#1a5a8a',2));o.push(T(140,182,'HCF = 2\u00d73 = 6','#1a5a8a',13,'middle',true));}
  if(p>=3){o.push(R(250,162,200,32,'#e8f8ee','#1a7a3a',2));o.push(T(350,182,'LCM = 2\u00b2\u00d73\u00b2 = 36','#1a7a3a',13,'middle',true));}
  if(p>=4){o.push(T(240,214,'HCF uses LOWEST powers of shared primes','#888',11,'middle',false));o.push(T(240,230,'LCM uses HIGHEST powers of all primes','#888',11,'middle',false));}
  s.innerHTML=o.join('');
}
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Rounding and significant figures','#C0272D',13,'middle',true));
  var examples=[['48\u00b7637 to 1 d.p.','48\u00b76','look at 2nd decimal: 3 < 5 \u2192 round down'],
                ['0\u00b70782 to 2 s.f.','0\u00b7078','1st s.f. is 7, 2nd is 8'],
                ['4\u00b7836 \u00d7 10\u2079 in std form','4\u00b7836\u00d710\u2079','already in std form: 1\u2264a<10']];
  examples.forEach(function(ex,i){
    if(p>=i+1){
      var y=66+i*58;
      o.push(R(20,y,440,48,'#f8f8f8','#888',1));
      o.push(T(30,y+16,ex[0],'#241A17',12,'start',false));
      o.push(T(30,y+36,ex[2],'#888',10,'start',false));
      o.push(R(340,y+4,114,40,'#e8f8ee','#1a7a3a',2));o.push(T(397,y+28,ex[1],'#1a7a3a',14,'middle',true));
    }
  });
  s.innerHTML=o.join('');
}
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Standard form: 3\u00b74\u00d710\u00b3 and 5\u00b72\u00d710\u207b\u00b2','#C0272D',13,'middle',true));
  var steps=[
    ['3\u00b74\u00d710\u00b3 = ?','Move decimal 3 right','= 3400'],
    ['5\u00b72\u00d710\u207b\u00b2 = ?','Move decimal 2 left','= 0\u00b7052'],
    ['2400 in std form','Need 1\u2264a<10: 2\u00b74','= 2\u00b74\u00d710\u00b3']
  ];
  steps.forEach(function(st,i){
    if(p>=i+1){
      var y=66+i*58;
      o.push(R(14,y,452,48,'#f8f8f8','#1a5a8a',1));
      o.push(T(30,y+18,st[0],'#1a5a8a',13,'start',true));
      o.push(T(30,y+38,st[1],'#888',10,'start',false));
      o.push(R(340,y+6,106,36,'#e8f4ff','#1a5a8a',2));o.push(T(393,y+28,st[2],'#1a5a8a',14,'middle',true));
    }
  });
  s.innerHTML=o.join('');
}
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Multiplying and dividing in standard form','#C0272D',12,'middle',true));
  if(p>=1){o.push(T(240,72,'(3\u00d710\u00b2) \u00d7 (4\u00d710\u00b3)','#241A17',15,'middle',true));}
  if(p>=2){o.push(T(240,100,'= (3\u00d74) \u00d7 (10\u00b2\u00d710\u00b3)','#888',13,'middle',false));}
  if(p>=3){o.push(T(240,126,'= 12 \u00d7 10\u2075  \u2192  not in std form!','#C8922A',13,'middle',false));o.push(T(240,150,'= 1\u00b72 \u00d7 10\u2076','#1a7a3a',16,'middle',true));}
  if(p>=4){
    o.push(R(14,168,452,96,'#f8f8f8','#888',1));
    o.push(T(240,190,'(8\u00d710\u2075) \u00f7 (2\u00d710\u00b2)','#241A17',14,'middle',true));
    o.push(T(240,212,'= (8\u00f72) \u00d7 (10\u2075\u00f710\u00b2)','#888',12,'middle',false));
    o.push(T(240,236,'= 4 \u00d7 10\u00b3','#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Fractions, decimals and percentages','#C0272D',13,'middle',true));
  var rows=[
    ['Fraction','\u00be','\u00b9/\u2088','1\u00b2/\u2085'],
    ['Decimal','0\u00b775','0\u00b7125','1\u00b74'],
    ['Percentage','75%','12\u00b75%','140%']
  ];
  if(p>=1){
    rows.forEach(function(r,ri){
      r.forEach(function(c,ci){
        var fill=ri===0&&ci>0?'#fff5f0':ri===1&&ci>0?'#e8f4ff':ri===2&&ci>0?'#e8f8ee':'#f0f0f0';
        var col=ri===0&&ci>0?'#C0272D':ri===1&&ci>0?'#1a5a8a':ri===2&&ci>0?'#1a7a3a':'#555';
        o.push(R(14+ci*118,54+ri*52,114,44,fill,col,ri===0||ci===0?1.5:1));
        o.push(T(71+ci*118,80+ri*52,c,col,ri>0&&ci>0?15:12,'middle',ri>0&&ci>0));
      });
    });
  }
  if(p>=2){o.push(T(240,218,'To convert fraction \u2192 decimal: divide numerator by denominator','#888',11,'middle',false));}
  if(p>=3){o.push(T(240,238,'Recurring decimal: \u00b9/\u2083 = 0\u00b733333\u2026 = 0\u00b73\u0307','#C8922A',11,'middle',false));}
  s.innerHTML=o.join('');
}
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Reverse percentage and compound interest','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,72,'Reverse %: price after 20% increase = \u00a3360','#241A17',13,'middle',false));o.push(T(240,92,'\u00a3360 = 120% of original','#888',12,'middle',false));}
  if(p>=2){o.push(T(240,118,'Original = 360 \u00f7 1\u00b720 = \u00a3300','#C0272D',15,'middle',true));}
  if(p>=3){
    o.push(R(14,138,452,56,'#f8f8f8','#1a5a8a',1));
    o.push(T(240,158,'Compound interest: \u00a3500 at 3% for 2 years','#1a5a8a',12,'middle',true));
    o.push(T(240,178,'A = 500 \u00d7 1\u00b703\u00b2 = \u00a3530\u00b745','#1a5a8a',14,'middle',true));
  }
  if(p>=4){o.push(R(100,206,280,40,'#e8f8ee','#1a7a3a',2));o.push(T(240,230,'Formula: A = P(1 + r/100)\u207f','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,8,452,36,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Ratio and proportion \u2014 sharing and scaling','#C0272D',13,'middle',true));
  if(p>=1){o.push(T(240,72,'Share \u00a3120 in ratio 3:5','#241A17',14,'middle',false));o.push(T(240,92,'Total parts = 8,  1 part = \u00a315','#888',12,'middle',false));}
  if(p>=2){o.push(R(50,108,180,36,'#fce8d8','#C0272D',2));o.push(T(140,130,'3 parts = \u00a345','#C0272D',14,'middle',true));o.push(R(250,108,180,36,'#e8f4ff','#1a5a8a',2));o.push(T(340,130,'5 parts = \u00a375','#1a5a8a',14,'middle',true));}
  if(p>=3){
    o.push(R(14,156,452,52,'#f8f8f8','#888',1));
    o.push(T(240,178,'Direct proportion: y \u221d x \u2192 y = kx','#241A17',12,'middle',false));
    o.push(T(240,200,'If y=12 when x=3, then k=4. When x=7, y=28.','#888',11,'middle',false));
  }
  if(p>=4){o.push(T(240,222,'Inverse: y \u221d 1/x \u2192 more x = less y','#1a5a8a',12,'middle',false));o.push(T(240,242,'Speed\u00d7time=distance, density=mass\u00f7volume','#1a5a8a',11,'middle',false));}
  s.innerHTML=o.join('');
}

var QS=[

  {ey:'Q1 \u00b7 Year 9 \u00b7 Number',ti:'Squares, Cubes and Roots',su:'Know square and cube numbers and their roots up to at least 15\u00b2.',steps:[
    {lb:'Squares and cubes',dr:dQ1,ht:'<p>A <b>square number</b> is n\u00b2 (n\u00d7n). A <b>cube number</b> is n\u00b3 (n\u00d7n\u00d7n). Roots are the reverse.</p>'},
    {lb:'Key values',dr:dQ1,ht:'<div class="fm">4\u00b2=16  \u221a25=5  3\u00b3=27  \u221b8=2</div>'},
    {lb:'Index notation',dr:dQ1,ht:'<p>2\u2074 means 2\u00d72\u00d72\u00d72 = 16. The small raised number is the <b>index</b> (or power).</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var bases=[2,3,4,5,6,7,8,9,10,12];var b=pick(bases);var types=['sq','cu','sqr','cur'];var t=pick(types);var ans,q;if(t==='sq'){ans=b*b;q='Find <b>'+b+'\u00b2</b>.';}else if(t==='cu'){ans=b*b*b;q='Find <b>'+b+'\u00b3</b>.';}else if(t==='sqr'){ans=b;q='Find <b>\u221a'+b*b+'</b>.';}else{ans=b;q='Find <b>\u221b'+b*b*b+'</b>.';}return{question:q,hints:['Work out '+b+' to the appropriate power'],ans:ans,tol:0,unit:'',working:'Answer = '+ans};})}
  ]},
  {ey:'Q2 \u00b7 Year 9 \u00b7 Number',ti:'HCF and LCM \u2014 Prime Factor Method',su:'Find HCF and LCM of 12 and 18 using prime factorisation.',steps:[
    {lb:'Prime factorise',dr:dQ2,ht:'<div class="fm">12 = 2\u00b2 \u00d7 3<br>18 = 2 \u00d7 3\u00b2</div>'},
    {lb:'HCF \u2014 lowest powers',dr:dQ2,ht:'<div class="fm">HCF = 2\u00b9 \u00d7 3\u00b9 = 6</div><p>Use the <b>lowest</b> power of each shared prime.</p>'},
    {lb:'LCM \u2014 highest powers',dr:dQ2,ht:'<div class="fm">LCM = 2\u00b2 \u00d7 3\u00b2 = 36</div><p>Use the <b>highest</b> power of every prime that appears.</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var pairs=[[6,9],[8,12],[10,15],[4,6],[9,12],[6,10],[8,10],[4,10]];var p=pick(pairs);var a=p[0],b=p[1];function gcd(a,b){return b===0?a:gcd(b,a%b);}var h=gcd(a,b),l=a*b/h;return{question:'Find the HCF of <b>'+a+'</b> and <b>'+b+'</b>.',hints:['Prime factorise both','Use lowest powers of shared primes'],ans:h,tol:0,unit:'',working:'HCF('+a+','+b+') = '+h};})}
  ]},
  {ey:'Q3 \u00b7 Year 9 \u00b7 Number',ti:'Rounding and Significant Figures',su:'Round 48.637 to 1 d.p. and 0.0782 to 2 s.f.',steps:[
    {lb:'Decimal places',dr:dQ3,ht:'<p>Count digits after the decimal point. Look at the <b>next</b> digit: \u22655 \u2192 round up, <5 \u2192 round down.</p>'},
    {lb:'Significant figures',dr:dQ3,ht:'<p>Start counting from the <b>first non-zero digit</b>. Zeros between significant figures count; trailing zeros after the decimal also count.</p>'},
    {lb:'Standard form intro',dr:dQ3,ht:'<p>Standard form: <b>a \u00d7 10\u207f</b> where 1 \u2264 a < 10. Large number \u2192 positive n. Small number \u2192 negative n.</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var n=rnd(1000,9999)/100;var dp=pick([1,2]);var ans=Math.round(n*Math.pow(10,dp))/Math.pow(10,dp);return{question:'Round <b>'+n+'</b> to <b>'+dp+' decimal place'+(dp>1?'s':'')+'</b>.',hints:['Look at the '+(dp+1)+(dp===0?'st':dp===1?'nd':'rd')+' decimal place'],ans:ans,tol:0.001,unit:'',working:n+' rounded to '+dp+' d.p. = '+ans};})}
  ]},
  {ey:'Q4 \u00b7 Year 9 \u00b7 Number',ti:'Standard Form',su:'Write 3400 in standard form. Evaluate 3.4\u00d710\u00b3 as an ordinary number.',steps:[
    {lb:'Structure',dr:dQ4,ht:'<div class="fm">a \u00d7 10\u207f  where  1 \u2264 a < 10</div>'},
    {lb:'Large numbers (positive n)',dr:dQ4,ht:'<div class="fm">3400 = 3\u00b74 \u00d7 10\u00b3</div><p>Count how many places you move the decimal left.</p>'},
    {lb:'Small numbers (negative n)',dr:dQ4,ht:'<div class="fm">0\u00b7052 = 5\u00b72 \u00d7 10\u207b\u00b2</div><p>Count how many places you move the decimal right.</p>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var mantissas=[1.2,2.4,3.6,4.8,5.5,6.3,7.1,8.4,9.2];var a=pick(mantissas);var n=rnd(1,5);var ans=a*Math.pow(10,n);return{question:'Write <b>'+a+' \u00d7 10\u207f</b> (n='+n+') as an ordinary number.',hints:['Move decimal '+n+' places right'],ans:ans,tol:0,unit:'',working:a+' \u00d7 10^'+n+' = '+ans};})}
  ]},
  {ey:'Q5 \u00b7 Year 9 \u00b7 Number',ti:'Calculating in Standard Form',su:'Evaluate (3\u00d710\u00b2)\u00d7(4\u00d710\u00b3) and (8\u00d710\u2075)\u00f7(2\u00d710\u00b2).',steps:[
    {lb:'Multiplication rule',dr:dQ5,ht:'<div class="fm">Multiply the a\u2011values, ADD the powers</div>'},
    {lb:'Check the a\u2011value',dr:dQ5,ht:'<div class="fm">(3\u00d74)\u00d7(10\u00b2\u00d710\u00b3) = 12\u00d710\u2075 = 1\u00b72\u00d710\u2076</div><p>If a\u226510, adjust: move decimal and increase power.</p>'},
    {lb:'Division rule',dr:dQ5,ht:'<div class="fm">Divide a\u2011values, SUBTRACT the powers</div><div class="fm">(8\u00f72)\u00d7(10\u2075\u00f710\u00b2) = 4\u00d710\u00b3</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var a1=pick([2,3,4,5,6]);var a2=pick([2,3,4]);var n1=rnd(2,5);var n2=rnd(1,3);var prod=a1*a2;var np=n1+n2;var ans,work;if(prod>=10){ans=parseFloat((prod/10).toFixed(1));np=np+1;work='('+a1+'\u00d7'+a2+')\u00d710^'+(n1+n2)+' = '+prod+'\u00d710^'+(n1+n2)+' = '+ans+'\u00d710^'+np;}else{ans=prod;work='('+a1+'\u00d7'+a2+')\u00d710^'+(n1+n2)+' = '+prod+'\u00d710^'+np;}return{question:'Find <b>('+a1+'\u00d710\u207f) \u00d7 ('+a2+'\u00d710\u207f)</b> (powers: '+n1+' and '+n2+'). Give the a-value.',hints:['Multiply '+a1+'\u00d7'+a2+' first','Then add the powers'],ans:ans,tol:0.01,unit:'',working:work};})}
  ]},
  {ey:'Q6 \u00b7 Year 9 \u00b7 Number',ti:'Fractions, Decimals and Percentages',su:'Convert between fractions, decimals and percentages.',steps:[
    {lb:'The equivalents',dr:dQ6,ht:'<p>Every fraction has an equivalent decimal and percentage. Learn the common ones: \u00bd=0\u00b75=50%, \u00bc=0\u00b725=25%, \u00be=0\u00b775=75%.</p>'},
    {lb:'Fraction \u2192 decimal',dr:dQ6,ht:'<div class="fm">Divide numerator by denominator<br>\u00b3/\u2084 = 3\u00f74 = 0\u00b775</div>'},
    {lb:'Recurring decimals',dr:dQ6,ht:'<div class="fm">\u00b9/\u2083 = 0\u00b73\u0307 = 0\u00b7333\u2026</div><p>A dot above a digit shows it repeats. Two dots show the start and end of a repeating block.</p>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var fracs=[[1,4,0.25],[3,4,0.75],[1,5,0.2],[2,5,0.4],[3,5,0.6],[4,5,0.8],[1,8,0.125],[3,8,0.375]];var f=pick(fracs);return{question:'Convert <b>'+f[0]+'/'+f[1]+'</b> to a decimal.',hints:['Divide '+f[0]+' by '+f[1]],ans:f[2],tol:0.001,unit:'',working:f[0]+'\u00f7'+f[1]+' = '+f[2]};})}
  ]},
  {ey:'Q7 \u00b7 Year 9 \u00b7 Number',ti:'Reverse Percentage and Compound Interest',su:'A price after 20% increase is \u00a3360. Find original. \u00a3500 at 3% p.a. for 2 years.',steps:[
    {lb:'Reverse percentage',dr:dQ7,ht:'<p>After a 20% increase, the price = <b>120%</b> of original. Divide by 1\u00b72 to reverse.</p>'},
    {lb:'Calculate original',dr:dQ7,ht:'<div class="fm">\u00a3360 \u00f7 1\u00b720 = \u00a3300</div>'},
    {lb:'Compound interest formula',dr:dQ7,ht:'<div class="fm">A = P(1 + r/100)\u207f</div><div class="fm">A = 500(1\u00b703)\u00b2 = \u00a3530\u00b745</div>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var P=pick([400,500,600,800,1000]);var r=pick([2,3,4,5]);var n=pick([2,3]);var A=Math.round(P*Math.pow(1+r/100,n)*100)/100;return{question:'\u00a3'+P+' invested at '+r+'% compound interest for '+n+' years. Find the total amount (to 2 d.p.).',hints:['A = P(1+r/100)\u207f','= '+P+'\u00d7('+( 1+r/100)+')\u207f'],ans:A,tol:0.05,unit:'\u00a3',working:''+P+'\u00d7'+(1+r/100)+'\u207f = \u00a3'+A};})}
  ]},
  {ey:'Q8 \u00b7 Year 9 \u00b7 Number',ti:'Ratio, Proportion and Rates',su:'Share \u00a3120 in ratio 3:5. Use direct proportion.',steps:[
    {lb:'Sharing in a ratio',dr:dQ8,ht:'<div class="fm">Total parts = 3+5 = 8<br>1 part = \u00a3120 \u00f7 8 = \u00a315</div>'},
    {lb:'Each share',dr:dQ8,ht:'<div class="fm">3 parts = 3\u00d7\u00a315 = \u00a345<br>5 parts = 5\u00d7\u00a315 = \u00a375</div>'},
    {lb:'Direct proportion',dr:dQ8,ht:'<div class="fm">y = kx   (y proportional to x)</div><p>Find k from given values, then use it to find unknowns. Speed, density and pressure all use this idea.</p>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var totals=[60,80,100,120,150,200];var total=pick(totals);var parts=[pick([1,2,3]),pick([2,3,4,5])];var pp=total/(parts[0]+parts[1]);var larger=Math.max(parts[0],parts[1])*pp;return{question:'Share \u00a3'+total+' in ratio <b>'+parts[0]+':'+parts[1]+'</b>. What is the larger share?',hints:['Total parts = '+(parts[0]+parts[1]),'1 part = \u00a3'+pp],ans:larger,tol:0.5,unit:'\u00a3',working:'Larger share = \u00a3'+larger};})}
  ]}

];
var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb'),lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+(typeof st.ht==='function'?st.ht():st.ht);
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next \u2192';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
