<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Geometry Y10 - Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Geometry</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn();
    entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn};
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}


/* Q2 Vertically opposite */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var cx=240,cy=160,len=180;
  // straight line
  o.push(L(cx-len,cy,cx+len,cy,'#241A17',2.5));
  // ray at 130° from positive x (measuring from right)
  var ang=130*Math.PI/180;
  var rx=cx+140*Math.cos(ang),ry=cy-140*Math.sin(ang);
  o.push(L(cx,cy,rx,ry,'#241A17',2.5));
  // problem box
  o.push(R(14,8,452,38,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Find angle x. The line is straight.','#C0272D',13,'middle',true));
  if(p>=1){
    // arc for 130°
    var arcPath='';
    for(var a=0;a<=130;a+=2){
      var rad=a*Math.PI/180;
      var ax=cx+55*Math.cos(rad),ay=cy-55*Math.sin(rad);
      arcPath+=(a===0?'M':'L')+ax.toFixed(1)+','+ay.toFixed(1)+' ';
    }
    o.push('<path d="'+arcPath+'" fill="none" stroke="#C8922A" stroke-width="2"/>');
    o.push(T(cx-20,cy-44,'130°','#C8922A',14,'middle',true));
  }
  if(p>=2){
    // arc for x
    var arcPath2='';
    for(var a=130;a<=180;a+=2){
      var rad=a*Math.PI/180;
      var ax=cx+45*Math.cos(rad),ay=cy-45*Math.sin(rad);
      arcPath2+=(a===130?'M':'L')+ax.toFixed(1)+','+ay.toFixed(1)+' ';
    }
    o.push('<path d="'+arcPath2+'" fill="none" stroke="#1a5a8a" stroke-width="2"/>');
    o.push(T(cx-60,cy-24,'x','#1a5a8a',18,'middle',true));
  }
  if(p>=3){
    o.push(R(130,198,220,40,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,222,'x = 180° − 130° = 50°','#1a7a3a',17,'middle',true));
  }
  if(p>=4){
    o.push(T(240,252,'Angles on a straight line always sum to 180°','#888',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=240,cy=150;
  o.push(L(60,240,420,60,'#241A17',2.5));
  o.push(L(60,60,420,240,'#241A17',2.5));
  if(p>=1){
    o.push(angMark(cx,cy,44,18,128,'#C0272D'));
    o.push(T(cx+28,cy-36,'70\u00b0','#C0272D',13,'middle',true));
    o.push(angMark(cx,cy,44,198,308,'#C0272D'));
    o.push(T(cx-28,cy+38,'70\u00b0','#C0272D',13,'middle',true));
  }
  if(p>=2){
    o.push(angMark(cx,cy,36,128,198,'#1a5a8a'));
    o.push(T(cx-44,cy-14,'a','#1a5a8a',14,'middle',true));
    o.push(angMark(cx,cy,36,308,378,'#1a5a8a'));
    o.push(T(cx+44,cy+14,'a','#1a5a8a',14,'middle',true));
  }
  if(p>=3){
    o.push(T(cx,cy+80,'a = 180 \u2212 70 = 110\u00b0','#1a5a8a',14,'middle',true));
    o.push(T(cx,20,'Vertically opposite angles are equal','#241A17',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q3 Parallel lines */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // two parallel horizontal lines
  o.push(L(40,100,440,100,'#241A17',2));
  o.push(L(40,220,440,220,'#241A17',2));
  // tick marks
  [[180,100],[200,100],[180,220],[200,220]].forEach(function(pt){o.push(L(pt[0],pt[1]-6,pt[0],pt[1]+6,'#888',1.5));});
  // transversal
  var tx1=100,ty1=40,tx2=340,ty2=280;
  o.push(L(tx1,ty1,tx2,ty2,'#C0272D',2));
  // intersection points
  var t=((100-ty1)/(ty2-ty1));var ix1=tx1+t*(tx2-tx1);
  var t2=((220-ty1)/(ty2-ty1));var ix2=tx1+t2*(tx2-tx1);
  if(p>=1){
    // alternate angles
    o.push(angMark(ix1,100,36,248,296,'#C8922A'));
    o.push(T(ix1-50,88,'65\u00b0','#C8922A',13,'middle',true));
  }
  if(p>=2){
    o.push(angMark(ix2,220,36,68,116,'#C8922A'));
    o.push(T(ix2+52,208,'65\u00b0','#C8922A',13,'middle',true));
    o.push(T(240,20,'Alternate angles are equal (Z-angles)','#241A17',13,'middle',true));
  }
  if(p>=3){
    o.push(angMark(ix2,220,36,248,296,'#1a5a8a'));
    o.push(T(ix2-50,232,'c','#1a5a8a',13,'middle',true));
    o.push(T(240,268,'c = 180 \u2212 65 = 115\u00b0  (co-interior / same-side)','#1a5a8a',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q4 Angles in a triangle */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=80,ay=240,bx=400,by=240,cx=300,cy=60;
  o.push('<polygon points="'+ax+','+ay+' '+bx+','+by+' '+cx+','+cy+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push(T(ax-10,ay+16,'A','#241A17',13,'end',true));
    o.push(T(bx+10,by+16,'B','#241A17',13,'start',true));
    o.push(T(cx,cy-14,'C','#241A17',13,'middle',true));
    o.push(angMark(ax,ay,36,0,52,'#C8922A'));
    o.push(T(ax+46,ay-18,'52\u00b0','#C8922A',12,'middle',true));
    o.push(angMark(bx,by,36,116,180,'#1a5a8a'));
    o.push(T(bx-46,by-18,'73\u00b0','#1a5a8a',12,'middle',true));
  }
  if(p>=2){
    o.push(angMark(cx,cy,40,232,310,'#C0272D'));
    o.push(T(cx,cy+54,'x','#C0272D',14,'middle',true));
  }
  if(p>=3){
    o.push(T(240,278,'x = 180 \u2212 52 \u2212 73 = 55\u00b0','#C0272D',14,'middle',true));
    o.push(T(240,20,'Angle sum of a triangle = 180\u00b0','#241A17',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q5 Angles in a quadrilateral */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var pts=[[80,240],[380,260],[420,80],[160,50]];
  o.push('<polygon points="'+pts.map(function(p){return p[0]+','+p[1];}).join(' ')+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  var labels=['A','B','C','D'];
  var offsets=[[-14,14],[14,14],[14,-10],[-14,-10]];
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    pts.forEach(function(pt,i){o.push(T(pt[0]+offsets[i][0],pt[1]+offsets[i][1],labels[i],'#241A17',13,'middle',true));});
    o.push(T(130,170,'85\u00b0','#C8922A',13,'middle',true));
    o.push(T(360,200,'110\u00b0','#1a5a8a',13,'middle',true));
    o.push(T(370,100,'72\u00b0','#C0272D',13,'middle',true));
  }
  if(p>=2){o.push(T(200,90,'x','#241A17',15,'middle',true));}
  if(p>=3){
    o.push(T(240,278,'x = 360 \u2212 85 \u2212 110 \u2212 72 = 93\u00b0','#C0272D',14,'middle',true));
    o.push(T(240,20,'Angle sum of a quadrilateral = 360\u00b0','#241A17',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q6 Interior/exterior angles of polygons */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Regular hexagon
  var cx=180,cy=155,r=100,n=6;
  var verts=[];for(var i=0;i<n;i++){var a=(i*360/n-90)*Math.PI/180;verts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  o.push('<polygon points="'+verts.map(function(v){return v[0].toFixed(1)+','+v[1].toFixed(1);}).join(' ')+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push(T(cx,cy,'n = 6','#241A17',13,'middle',false));
  if(p>=1){
    o.push(T(340,100,'Sum of interior angles:','#241A17',13,'start',true));
    o.push(T(340,124,'(n\u22122) \u00d7 180','#241A17',13,'start',false));
    o.push(T(340,148,'= 4 \u00d7 180 = 720\u00b0','#C0272D',14,'start',true));
  }
  if(p>=2){
    // show one interior angle
    o.push(angMark(verts[0][0],verts[0][1],30,10,110,'#C8922A'));
    o.push(T(340,190,'Each interior angle:','#241A17',13,'start',true));
    o.push(T(340,214,'720 \u00f7 6 = 120\u00b0','#C0272D',14,'start',true));
  }
  if(p>=3){
    o.push(T(340,248,'Each exterior angle:','#241A17',13,'start',true));
    o.push(T(340,270,'360 \u00f7 6 = 60\u00b0','#C8922A',14,'start',true));
  }
  s.innerHTML=o.join('');
}

/* Q7 Line symmetry */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Rectangle
  var rx=60,ry=80,rw=160,rh=120;
  o.push('<rect x="'+rx+'" y="'+ry+'" width="'+rw+'" height="'+rh+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push(T(rx+rw/2,ry+rh+20,'Rectangle','#241A17',12,'middle',false));
  if(p>=1){
    o.push(L(rx+rw/2,ry-10,rx+rw/2,ry+rh+10,'#C8922A',1.5,'6,4'));
    o.push(L(rx-10,ry+rh/2,rx+rw+10,ry+rh/2,'#C8922A',1.5,'6,4'));
    o.push(T(rx+rw/2,ry-18,'2 lines of symmetry','#C8922A',11,'middle',true));
  }
  // Equilateral triangle
  var tx=320,ty=200,ts=130;
  var tverts=[[tx,ty-ts*2/3*Math.sqrt(3)/Math.sqrt(4)*2],[tx-ts/2,ty+ts/3],[tx+ts/2,ty+ts/3]];
  // simpler: fixed coords
  var t1=[320,60],t2=[255,200],t3=[385,200];
  o.push('<polygon points="'+t1+' '+t2+' '+t3+'" fill="#e8f0ff" stroke="#1a5a8a" stroke-width="2"/>');
  o.push(T(320,220,'Equilateral \u25b3','#241A17',12,'middle',false));
  if(p>=2){
    // 3 lines of symmetry for equilateral triangle
    [[t1,[(t2[0]+t3[0])/2,(t2[1]+t3[1])/2]],[t2,[(t1[0]+t3[0])/2,(t1[1]+t3[1])/2]],[t3,[(t1[0]+t2[0])/2,(t1[1]+t2[1])/2]]].forEach(function(seg){
      o.push(L(seg[0][0],seg[0][1],seg[1][0],seg[1][1],'#1a5a8a',1.5,'6,4'));
    });
    o.push(T(320,240,'3 lines of symmetry','#1a5a8a',11,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q8 Rotational symmetry */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Regular pentagon — order 5
  var cx=150,cy=155,r=95,n=5;
  var verts=[];for(var i=0;i<n;i++){var a=(i*360/n-90)*Math.PI/180;verts.push([cx+r*Math.cos(a),cy+r*Math.sin(a)]);}
  o.push('<polygon points="'+verts.map(function(v){return v[0].toFixed(1)+','+v[1].toFixed(1);}).join(' ')+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  o.push(T(cx,cy,'Pentagon','#241A17',12,'middle',false));
  if(p>=1){
    o.push(T(cx,cy+20,'Order of rotation = 5','#C0272D',13,'middle',true));

/* Q9 Symmetry in 3D solids */
function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Triangular prism sketch
  var ox=60,oy=220,w=120,h=80,d=50;
  o.push('<polygon points="'+(ox+d)+','+(oy-h-d)+' '+(ox+w+d)+','+(oy-h-d)+' '+(ox+w/2+d)+','+(oy-h-d-80)+'" fill="#e8f0ff" stroke="#1a5a8a" stroke-width="1" stroke-dasharray="4,3"/>');
  o.push(L(ox,oy-h,ox+d,oy-h-d,'#aaa',1,'4,3'));
  o.push(L(ox+w,oy-h,ox+w+d,oy-h-d,'#aaa',1,'4,3'));
  o.push(L(ox+w/2,oy-h-80,ox+w/2+d,oy-h-d-80,'#aaa',1,'4,3'));
  o.push('<polygon points="'+ox+','+(oy-h)+' '+(ox+w)+','+(oy-h)+' '+(ox+w/2)+','+(oy-h-80)+'" fill="#fce8d8" stroke="#C0272D" stroke-width="2"/>');
  o.push('<polygon points="'+ox+','+oy+' '+(ox+w)+','+oy+' '+(ox+w)+','+(oy-h)+' '+ox+','+(oy-h)+'" fill="#fff0e8" stroke="#C0272D" stroke-width="1.5"/>');
  o.push(L(ox,oy,ox+w,oy,'#C0272D',2));
  if(p>=1){
    o.push(T(ox+w/2,oy+18,'Triangular prism','#241A17',12,'middle',false));
    o.push(T(ox+w/2,oy+34,'1 plane of symmetry','#C0272D',12,'middle',true));
    o.push(T(ox+w/2,oy+50,'(through midpoints of rectangles)','#888',11,'middle',false));
  }
  // Cone
  var ccx=340,ccy=220,cr=70,ch=140;
  o.push('<ellipse cx="'+ccx+'" cy="'+ccy+'" rx="'+cr+'" ry="13" fill="#e8d8cc" stroke="#C0272D" stroke-width="1.5"/>');
  o.push('<polygon points="'+(ccx-cr)+','+ccy+' '+(ccx+cr)+','+ccy+' '+ccx+','+(ccy-ch)+'" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  if(p>=2){
    o.push(T(ccx,ccy+28,'Cone','#241A17',12,'middle',false));

  s.innerHTML=o.join('');

/* Q10 Bearings */
function dQ10(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=180,ay=240,bx=320,by=80;
  // North line at A
  o.push(L(ax,ay,ax,ay-160,'#aaa',1.5));
  o.push(T(ax,ay-168,'N','#888',13,'middle',true));
  // line AB
  if(p>=1){o.push(L(ax,ay,bx,by,'#C0272D',2.5));}
  // bearing arc
  if(p>=2){
    // bearing of B from A
    var dx=bx-ax,dy=ay-by;
    var bearing=Math.round((Math.atan2(dx,dy)*180/Math.PI+360)%360);
    o.push(arc(ax,ay,50,90,90-Math.atan2(dx,dy)*180/Math.PI,'#C8922A',2));
    o.push(T(ax+28,ay-60,bearing+'\u00b0','#C8922A',13,'middle',true));
  }
  // labels
  o.push(T(ax-12,ay+14,'A','#241A17',13,'end',true));
  if(p>=1){o.push(T(bx+12,by-8,'B','#241A17',13,'start',true));}
  if(p>=3){
    o.push(T(240,20,'Bearing of B from A','#C0272D',13,'middle',true));
    o.push(T(240,272,'Always 3 digits, measured clockwise from North','#241A17',12,'middle',false));
    // back bearing
    o.push(L(bx,by,bx,by-60,'#aaa',1.5,'4,3'));
    o.push(T(bx,by-68,'N','#888',12,'middle',true));
    o.push(T(bx+40,by+30,'Back bearing:\n047+180=227\u00b0','#1a5a8a',11,'start',false));
  }
  s.innerHTML=o.join('');
}
