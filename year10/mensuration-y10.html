<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mensuration Y10 - Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Mensuration</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn();
    entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn};
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}


/* Q2 - Compound shape */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  // problem box
  o.push(R(14,8,452,38,'#fff5f0','#C0272D',1.5));
  o.push(T(240,30,'Rectangle 9×5 cm  and  Triangle base 12, height 7','#C0272D',12,'middle',true));
  // Rectangle (left side)
  var rx=30,ry=62,rw=180,rh=100;
  o.push(R(rx,ry,rw,rh,'#fff5f0','#C0272D',2));
  o.push(T(rx+rw/2,ry-10,'9 cm','#C0272D',12,'middle',true));
  o.push(T(rx-14,ry+rh/2,'5 cm','#C0272D',12,'middle',true));
  if(p>=1){
    o.push(T(rx+rw/2,ry+rh/2+6,'A = 9 × 5','#C0272D',14,'middle',false));
  }
  if(p>=2){
    o.push(R(rx,ry+rh+8,rw,32,'#e8f8ee','#1a7a3a',2));
    o.push(T(rx+rw/2,ry+rh+28,'= 45 cm²','#1a7a3a',16,'middle',true));
  }
  // Triangle (right side)
  var tx=270,ty=62,tw=160,th=100;
  o.push('<polygon points="'+tx+','+(ty+th)+' '+(tx+tw)+','+(ty+th)+' '+(tx+tw*0.6)+','+ty+'" fill="#e8f4ff" stroke="#1a5a8a" stroke-width="2"/>');
  o.push(T(tx+tw/2,ty+th+14,'12 cm','#1a5a8a',12,'middle',true));
  // height line
  o.push(L(tx+tw*0.6,ty,tx+tw*0.6,ty+th,'#aaa',1,'4,3'));
  o.push(T(tx+tw*0.6+10,ty+th/2,'7 cm','#1a5a8a',11,'start',false));
  if(p>=3){
    o.push(T(tx+tw/2,ty+th/2,'½×12×7','#1a5a8a',13,'middle',false));
  }
  if(p>=4){
    o.push(R(tx,ty+th+8,tw,32,'#e8f8ee','#1a7a3a',2));
    o.push(T(tx+tw/2,ty+th+28,'= 42 cm²','#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // L-shape: outer 12x8, cut 5x4 from top-right
  var sc=22,ox=80,oy=260;
  var W=12*sc,H=8*sc,cw=5*sc,ch=4*sc;
  // Draw L-shape
  var pts=(ox)+','+(oy)+' '+(ox+W)+','+(oy)+' '+(ox+W)+','+(oy-H+ch)+' '+(ox+W-cw)+','+(oy-H+ch)+' '+(ox+W-cw)+','+(oy-H)+' '+ox+','+(oy-H);
  o.push('<polygon points="'+pts+'" fill="#fce8d8" stroke="#C0272D" stroke-width="2"/>');
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push(T(ox+W/2,oy+14,'12 cm','#C0272D',12,'middle',true));
    o.push(T(ox-18,oy-H/2,'8 cm','#C0272D',12,'middle',true));
    o.push(T(ox+W-cw/2,oy-H-10,'5 cm','#888',11,'middle',false));
    o.push(T(ox+W+12,oy-H+ch/2,'4 cm','#888',11,'start',false));
  }
  if(p>=2){
    // split line
    o.push(L(ox,oy-H+ch,ox+W-cw,oy-H+ch,'#C8922A',1.5,'5,3'));
    o.push(T(ox+(W-cw)/2,oy-H+ch-10,'Split into two rectangles','#C8922A',11,'middle',false));
  }
  if(p>=3){
    o.push(T(ox+(W-cw)/2,oy-H/2+ch/2+10,'A\u2081 = 12\u00d7(8-4) = 48','#C0272D',12,'middle',true));
    o.push(T(ox+(W-cw)/2,oy-H+ch/2,'A\u2082 = 7\u00d74 = 28','#1a5a8a',12,'middle',true));
    o.push(T(ox+W/2,oy-H-26,'Total = 48+28 = 76 cm\u00b2','#241A17',13,'middle',true));
  }
  o.push(T(240,16,'Area of a Compound Shape','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q3 - Volume and SA of cuboid */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=100,oy=230,w=180,h=100,d=60;
  // back faces
  o.push('<polygon points="'+ox+','+(oy-h)+' '+(ox+d)+','+(oy-h-d)+' '+(ox+w+d)+','+(oy-h-d)+' '+(ox+w)+','+(oy-h)+'" fill="#f0e0d0" stroke="#bbb" stroke-width="1"/>');
  o.push('<polygon points="'+(ox+w)+','+(oy)+' '+(ox+w+d)+','+(oy-d)+' '+(ox+w+d)+','+(oy-h-d)+' '+(ox+w)+','+(oy-h)+'" fill="#e8d8c8" stroke="#bbb" stroke-width="1"/>');
  // front face
  o.push(R(ox,oy-h,w,h,'#fce8d8','#C0272D'));
  o.push(L(ox,oy,ox+w,oy,'#C0272D',2));
  if(p>=1){
    o.push(T(ox+w/2,oy+14,'l = 8 cm','#C0272D',12,'middle',true));
    o.push(T(ox-18,oy-h/2,'h = 5 cm','#C0272D',12,'middle',true));
    o.push(T(ox+w+d/2+6,oy-h-d/2-4,'w = 4 cm','#888',11,'start',false));
  }
  if(p>=2){o.push(T(300,130,'V = l \u00d7 w \u00d7 h','#241A17',13,'start',true));o.push(T(300,155,'  = 8 \u00d7 4 \u00d7 5','#241A17',13,'start',false));o.push(T(300,178,'  = 160 cm\u00b3','#C0272D',14,'start',true));}
  if(p>=3){o.push(T(300,210,'SA = 2(lw+lh+wh)','#241A17',12,'start',true));o.push(T(300,230,'= 2(32+40+20)','#241A17',12,'start',false));o.push(T(300,250,'= 2 \u00d7 92 = 184 cm\u00b2','#C0272D',13,'start',true));}
  o.push(T(240,16,'Volume and Surface Area of a Cuboid','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q4 - Open box (net) */
/* Q4 - Open box: 3D then net */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];

  var cBase='#fce8d8',cFront='#fce8d8',cBack='#e8d0bc';
  var cLeft='#c8b0d8',cRight='#a8d8a8',cBottom='#f0d080';

  // Title box — always on top, drawn last
  function title(txt){
    o.push(R(14,8,452,30,'#fff5f0','#C0272D',1.5));
    o.push(T(240,27,txt,'#C0272D',12,'middle',true));
  }

  if(p===0){
    // ── 3D open box ──────────────────────────────────────────────────────
    // oy=215 keeps box well below header (top of front face = oy-H = 215-70 = 145)
    var ox=30,oy=215,W=160,H=70,dxd=50,dyd=-22;

    // Back face (hidden, teal)
    o.push('<polygon points="'+(ox+dxd)+','+(oy+dyd)+' '+(ox+W+dxd)+','+(oy+dyd)+' '+(ox+W+dxd)+','+(oy-H+dyd)+' '+(ox+dxd)+','+(oy-H+dyd)+'" fill="#b8d8e8" stroke="none"/>');
    // Bottom face (amber)
    o.push('<polygon points="'+ox+','+oy+' '+(ox+W)+','+oy+' '+(ox+W+dxd)+','+(oy+dyd)+' '+(ox+dxd)+','+(oy+dyd)+'" fill="'+cBottom+'" stroke="none"/>');
    // Right face (green)
    o.push('<polygon points="'+(ox+W)+','+oy+' '+(ox+W)+','+(oy-H)+' '+(ox+W+dxd)+','+(oy-H+dyd)+' '+(ox+W+dxd)+','+(oy+dyd)+'" fill="'+cRight+'" stroke="none"/>');
    // Left face (purple)
    o.push('<polygon points="'+ox+','+oy+' '+ox+','+(oy-H)+' '+(ox+dxd)+','+(oy-H+dyd)+' '+(ox+dxd)+','+(oy+dyd)+'" fill="'+cLeft+'" stroke="none"/>');
    // Front face (cream)
    o.push('<polygon points="'+ox+','+oy+' '+(ox+W)+','+oy+' '+(ox+W)+','+(oy-H)+' '+ox+','+(oy-H)+'" fill="'+cFront+'" stroke="none"/>');

    // Visible solid edges
    o.push(L(ox,oy,ox+W,oy,'#C0272D',2));
    o.push(L(ox+W,oy,ox+W,oy-H,'#C0272D',2));
    o.push(L(ox+W,oy-H,ox,oy-H,'#C0272D',2));
    o.push(L(ox,oy-H,ox,oy,'#C0272D',2));
    o.push(L(ox+W,oy,ox+W+dxd,oy+dyd,'#241A17',2));
    o.push(L(ox+W,oy-H,ox+W+dxd,oy-H+dyd,'#241A17',2));
    o.push(L(ox+W+dxd,oy-H+dyd,ox+dxd,oy-H+dyd,'#241A17',1.5));
    o.push(L(ox+W+dxd,oy+dyd,ox+W+dxd,oy-H+dyd,'#241A17',1.5));

    // Hidden dotted edges (drawn last so visible over fills)
    o.push(L(ox,oy,ox+dxd,oy+dyd,'#555',1.5,'6,4'));
    o.push(L(ox,oy-H,ox+dxd,oy-H+dyd,'#555',1.5,'6,4'));
    o.push(L(ox+dxd,oy+dyd,ox+dxd,oy-H+dyd,'#555',1.5,'6,4'));
    o.push(L(ox+dxd,oy+dyd,ox+W+dxd,oy+dyd,'#555',1.5,'6,4'));

    // Labels
    o.push(T(ox+W/2,oy+16,'10 cm','#C0272D',11,'middle',true));
    o.push(T(ox-14,oy-H/2,'3 cm','#241A17',11,'middle',true));
    o.push(T(ox+W+dxd/2+20,oy+dyd/2+8,'6 cm','#888',11,'start',false));
    o.push(T(ox+W+2,oy-H+2,'No lid','#C8922A',10,'start',true));

    title('Open box \u2014 10\u00d76 cm base, height 3 cm, NO LID');

  } else {
    // ── NET (unfolded flat) ───────────────────────────────────────────────
    // sc=15: 10cm=150px, 6cm=90px, 3cm=45px
    // Total net height = 45+90+45 = 180px
    // ny = top of base. Top flap top = ny-45. Must clear header bottom (y=38).
    // ny-45 >= 46  →  ny >= 91. Use ny=96 → top flap top = 51, clear of header.
    // Total net bottom = ny+90+45 = 96+135 = 231. Leaves room for SA row at y=248.
    var sc=15;
    var L10=150,L6=90,L3=45;
    // Centre horizontally: total width = L3+L10+L3 = 240. Centre at 240 → nx = 240-120-45 = 75
    var nx=75, ny=96;

    // Base
    o.push('<polygon points="'+nx+','+ny+' '+(nx+L10)+','+ny+' '+(nx+L10)+','+(ny+L6)+' '+nx+','+(ny+L6)+'" fill="'+cBase+'" stroke="#C0272D" stroke-width="1.5"/>');
    // Top flap (front side)
    o.push('<polygon points="'+nx+','+(ny-L3)+' '+(nx+L10)+','+(ny-L3)+' '+(nx+L10)+','+ny+' '+nx+','+ny+'" fill="'+cFront+'" stroke="#C0272D" stroke-width="1.5"/>');
    // Bottom flap (back side)
    o.push('<polygon points="'+nx+','+(ny+L6)+' '+(nx+L10)+','+(ny+L6)+' '+(nx+L10)+','+(ny+L6+L3)+' '+nx+','+(ny+L6+L3)+'" fill="'+cBack+'" stroke="#C0272D" stroke-width="1.5"/>');
    // Left flap (purple)
    o.push('<polygon points="'+(nx-L3)+','+ny+' '+nx+','+ny+' '+nx+','+(ny+L6)+' '+(nx-L3)+','+(ny+L6)+'" fill="'+cLeft+'" stroke="#C0272D" stroke-width="1.5"/>');
    // Right flap (green)
    o.push('<polygon points="'+(nx+L10)+','+ny+' '+(nx+L10+L3)+','+ny+' '+(nx+L10+L3)+','+(ny+L6)+' '+(nx+L10)+','+(ny+L6)+'" fill="'+cRight+'" stroke="#C0272D" stroke-width="1.5"/>');

    if(p>=2){
      // Face labels (centred in each face)
      o.push(T(nx+L10/2,ny+L6/2+4,'Base: 10\u00d76','#C0272D',11,'middle',true));
      o.push(T(nx+L10/2,ny-L3/2+4,'10\u00d73  (front)','#C0272D',10,'middle',false));
      o.push(T(nx+L10/2,ny+L6+L3/2+4,'10\u00d73  (back)','#6b5750',10,'middle',false));
      o.push(T(nx-L3/2,ny+L6/2+4,'6\u00d73','#6a1b9a',10,'middle',false));

  o.push('<polygon points="'+Ax+','+Ay+' '+Cx+','+Cy+' '+Cx2+','+Cy2+' '+Ax2+','+Ay2+'" fill="#c8b0d8" stroke="none"/>');

  o.push(L(Bx2,By2,Cx2,Cy2,'#241A17',1.5));

  o.push(L(Ax,Ay,Ax2,Ay2,'#555',1.5,'6,4'));

    o.push(T((Bx+Bx2)/2+6,(By+By2)/2+6,'l = 15 cm','#555',12,'start',false));
  }

  }

  if(p>=3){
