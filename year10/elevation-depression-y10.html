<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
var D=Math.PI/180;
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1.5)+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>'; }
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function arc(cx,cy,r,a1,a2,c){c=c||'#C8922A';var x1=cx+r*Math.cos(a1*D),y1=cy+r*Math.sin(a1*D),x2=cx+r*Math.cos(a2*D),y2=cy+r*Math.sin(a2*D);var large=Math.abs(a2-a1)>180?1:0;return '<path d="M'+x1+','+y1+' A'+r+','+r+' 0 '+large+',1 '+x2+','+y2+'" fill="none" stroke="'+c+'" stroke-width="1.5"/>';}

// Q1: Angle of elevation definition
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var Ox=80,Oy=250,Tx=380,Ty=80;
  o.push(L(40,250,440,250,'#ccc',1.5)); // ground
  o.push(L(Ox,Oy,Tx,Oy,'#ccc',1,'4,3')); // horizontal dashed
  if(p>=1){o.push(L(Ox,Oy,Tx,Ty,'#C0272D',2.5));} // line of sight
  if(p>=1){o.push(L(Tx,Ty,Tx,Oy,'#1a5a8a',2));}  // height
  // Angle arc
  if(p>=2){o.push(arc(Ox,Oy,50,-30,-55,'#C8922A'));o.push(T(Ox+64,Oy-22,'θ','#C8922A',14));}
  o.push(T(Ox-16,Oy+4,'O','#C0272D',12,'end'));
  if(p>=1){o.push(T(Tx+14,Ty,'T','#1a5a8a',12,'start'));o.push(T(Tx+14,(Ty+Oy)/2,'h','#1a5a8a',12,'start'));}
  if(p>=1){o.push(T((Ox+Tx)/2,Oy-12,'d (horizontal)','#888',11));}
  if(p>=3){o.push(R(100,264,280,26,'#fff5f0','#C0272D',1));o.push(T(240,280,'Angle of elevation: measured UP from horizontal','#C0272D',11));}
  s.innerHTML=o.join('');}

// Q2: Angle of depression definition
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var Ox=80,Oy=70,Bx=380,By=240;
  o.push(L(40,70,440,70,'#ccc',1.5)); // cliff top
  o.push(L(40,240,440,240,'#ccc',1.5)); // sea level
  o.push(L(Ox,Oy,Bx,Oy,'#ccc',1,'4,3')); // horizontal dashed
  if(p>=1){o.push(L(Ox,Oy,Bx,By,'#C0272D',2.5));} // line of sight DOWN
  if(p>=1){o.push(L(Ox,Oy,Ox,By,'#1a5a8a',2));}  // height
  if(p>=2){o.push(arc(Ox,Oy,50,0,28,'#C8922A'));o.push(T(Ox+60,Oy+22,'θ','#C8922A',14));}
  o.push(T(Ox-16,Oy,'O','#C0272D',12,'end'));
  if(p>=1){o.push(T(Bx+14,By,'B','#1a5a8a',12,'start'));o.push(T(Ox-14,(Oy+By)/2,'h','#1a5a8a',12,'end'));}
  if(p>=1){o.push(T((Ox+Bx)/2,By+16,'d (horizontal)','#888',11));}
  if(p>=3){o.push(R(80,260,320,28,'#e8f4ff','#1a5a8a',1));o.push(T(240,278,'Angle of depression: measured DOWN from horizontal','#1a5a8a',11));}
  s.innerHTML=o.join('');}

// Q3: Find height using angle of elevation and distance
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var Ox=80,Oy=250,Tx=360,ang=35;
  var h=Math.round((Tx-Ox)*Math.tan(ang*D));
  var Ty=Oy-h;
  o.push(L(40,250,440,250,'#ccc',1.5));
  o.push(L(Ox,Oy,Tx,Oy,'#ccc',1,'4,3'));
  if(p>=1){o.push(L(Ox,Oy,Tx,Ty,'#C0272D',2.5));o.push(L(Tx,Ty,Tx,Oy,'#1a5a8a',2));}
  if(p>=2){o.push(arc(Ox,Oy,50,-35,-45,'#C8922A'));o.push(T(Ox+58,Oy-22,'35°','#C8922A',11));}
  o.push(T((Ox+Tx)/2,Oy+16,'280 m','#555',12));
  if(p>=1)o.push(T(Tx+18,(Ty+Oy)/2,'h = ?','#C0272D',12,'start'));
  if(p>=3){o.push(R(60,266,360,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,282,'h = 280 × tan(35°) = 280 × 0.700 = 196 m','#1a7a3a',12));}
  s.innerHTML=o.join('');}

// Q4: Find distance using angle of elevation and height
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var Ox=80,Oy=250,Ty=80,ang=50;
  var d=Math.round((Oy-Ty)/Math.tan(ang*D));
  var Tx=Ox+d;
  o.push(L(40,250,440,250,'#ccc',1.5));
  o.push(L(Ox,Oy,Tx+20,Oy,'#ccc',1,'4,3'));
  if(p>=1){o.push(L(Ox,Oy,Tx,Ty,'#C0272D',2.5));o.push(L(Tx,Ty,Tx,Oy,'#1a5a8a',2));}
  if(p>=2){o.push(arc(Ox,Oy,50,-50,-62,'#C8922A'));o.push(T(Ox+52,Oy-30,'50°','#C8922A',11));}
  o.push(T(Tx+18,(Ty+Oy)/2,'50 m','#1a5a8a',12,'start'));
  if(p>=1)o.push(T((Ox+Tx)/2,Oy+16,'d = ?','#C0272D',12));
  if(p>=3){o.push(R(60,266,360,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,282,'d = 50 ÷ tan(50°) = 50 ÷ 1.192 = 42.0 m','#1a7a3a',12));}
  s.innerHTML=o.join('');}

// Q5: Angle of depression — find distance
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var Ox=120,Oy=60,Bx=380,By=240,ang=28;
  o.push(L(40,60,440,60,'#ccc',1.5));o.push(L(40,240,440,240,'#ccc',1.5));
  o.push(L(Ox,Oy,Bx,Oy,'#ccc',1,'4,3'));
  if(p>=1){o.push(L(Ox,Oy,Bx,By,'#C0272D',2.5));o.push(L(Ox,Oy,Ox,By,'#1a5a8a',2));}
  if(p>=2){o.push(arc(Ox,Oy,50,0,22,'#C8922A'));o.push(T(Ox+58,Oy+18,'28°','#C8922A',11));}
  o.push(T(Ox-14,(Oy+By)/2,'80 m','#1a5a8a',12,'end'));
  if(p>=1)o.push(T((Ox+Bx)/2,By+16,'d = ?','#C0272D',12));
  if(p>=3){o.push(R(60,266,360,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,282,'d = 80 ÷ tan(28°) = 80 ÷ 0.532 = 150.4 m','#1a7a3a',12));}
  s.innerHTML=o.join('');}

// Q6: Find angle of elevation
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var Ox=80,Oy=250,Tx=330,h=120,Ty=Oy-h;
  o.push(L(40,250,440,250,'#ccc',1.5));
  o.push(L(Ox,Oy,Tx+20,Oy,'#ccc',1,'4,3'));
  if(p>=1){o.push(L(Ox,Oy,Tx,Ty,'#C0272D',2.5));o.push(L(Tx,Ty,Tx,Oy,'#1a5a8a',2));}
  var ang=Math.round(Math.atan(h/(Tx-Ox))*180/Math.PI);
  if(p>=2){o.push(arc(Ox,Oy,50,-ang*0.9,-ang,'#C8922A'));o.push(T(Ox+56,Oy-18,'θ = ?','#C8922A',11));}
  o.push(T((Ox+Tx)/2,Oy+16,(Tx-Ox)+' m','#555',12));
  if(p>=1)o.push(T(Tx+18,(Ty+Oy)/2,'120 m','#1a5a8a',12,'start'));
  if(p>=3){o.push(R(60,266,360,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,282,'θ = tan⁻¹(120/'+( Tx-Ox)+') = '+ang+'°','#1a7a3a',12));}
  s.innerHTML=o.join('');}

// Q7: Two observers, same object
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Tower 60m, observer A 80m away (elevation), observer B on top looking down at A
  var Ax=60,Ay=250,Tx=300,Th=150,Ty=Ay-Th;
  o.push(L(40,250,440,250,'#ccc',1.5));
  o.push(L(Tx,Ty,Tx,Ay,'#1a5a8a',2.5)); // tower
  if(p>=1){o.push(L(Ax,Ay,Tx,Ty,'#C0272D',2));} // elevation line
  if(p>=2){
    // Depression from top to A
    o.push(L(Tx,Ty,Tx+60,Ty,'#ccc',1,'4,3'));
    o.push(L(Tx,Ty,Ax,Ay,'#C8922A',1.5,'6,3'));
  }
  var elev=Math.round(Math.atan(Th/(Tx-Ax))*180/Math.PI);
  var dep=elev; // same angle (alternate angles)
  o.push(T(Ax,Ay+16,'A','#C0272D',12));o.push(T(Tx+14,Ty,'T','#1a5a8a',12,'start'));
  o.push(T(Tx+14,Ay,'B','#555',12,'start'));
  o.push(T((Ax+Tx)/2,Ay+14,(Tx-Ax)+' m','#555',11));
  o.push(T(Tx+14,(Ty+Ay)/2,Th+' m','#1a5a8a',11,'start'));
  if(p>=1){o.push(T(200,210,'Elev. from A = tan⁻¹('+Th+'/'+(Tx-Ax)+') = '+elev+'°','#C0272D',10));}
  if(p>=2){o.push(T(200,228,'Dep. from T to A = '+dep+'° (alternate angles)','#C8922A',10));}
  if(p>=3){o.push(R(40,268,400,26,'#e8f4ff','#1a5a8a',1));o.push(T(240,284,'Angle of elevation = angle of depression (alternate angles with parallel lines)','#1a5a8a',10));}
  s.innerHTML=o.join('');}

// Q8: Combined — find slant distance
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var Ox=80,Oy=260,Tx=360,ang=40,h=Math.round((Tx-Ox)*Math.tan(ang*D)),Ty=Oy-h;
  var slant=Math.round(Math.sqrt((Tx-Ox)*(Tx-Ox)+h*h));
  o.push(L(40,260,440,260,'#ccc',1.5));
  o.push(L(Ox,Oy,Tx+20,Oy,'#ccc',1,'4,3'));
  if(p>=1){o.push(L(Ox,Oy,Tx,Ty,'#C0272D',2.5));o.push(L(Tx,Ty,Tx,Oy,'#1a5a8a',2));}
  if(p>=2){o.push(arc(Ox,Oy,44,-40,-50,'#C8922A'));o.push(T(Ox+52,Oy-20,'40°','#C8922A',11));}
  o.push(T((Ox+Tx)/2,Oy+16,(Tx-Ox)+' m','#555',11));
  if(p>=1){o.push(T(Tx+18,(Ty+Oy)/2,'h','#1a5a8a',12,'start'));}
  if(p>=1){o.push(T((Ox+Tx)/2-10,(Oy+Ty)/2,'s = ?','#C0272D',12));}
  if(p>=3){o.push(R(40,272,400,24,'#e8f8ee','#1a7a3a',1));o.push(T(240,287,'h = '+( Tx-Ox)+'×tan40° = '+h+' m. s = '+(Tx-Ox)+'/cos40° = '+slant+' m','#1a7a3a',11));}
  s.innerHTML=o.join('');}

// Q9: Real context — lighthouse
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Lighthouse 45m, angle of depression to boat = 22°. Find distance.
  var Ox=200,Oy=60,ang=22,h=160,By=Oy+h,d=Math.round(h/Math.tan(ang*D));
  var Bx=Ox+d*0.45; // scaled for diagram
  o.push(L(40,220,440,220,'#88bbff',2)); // sea
  o.push(L(Ox,Oy,Ox,Oy+h,'#1a5a8a',3)); // lighthouse
  o.push(L(40,Oy,440,Oy,'#ccc',1,'4,3')); // horizontal
  if(p>=1){o.push(L(Ox,Oy,Bx+60,220,'#C0272D',2));}
  if(p>=2){o.push(arc(Ox,Oy,44,0,20,'#C8922A'));o.push(T(Ox+52,Oy+18,'22°','#C8922A',11));}
  o.push(T(Ox-14,(Oy+220)/2,'45 m','#1a5a8a',11,'end'));
  o.push(T(Ox+22,Oy,'Top','#241A17',10,'start'));
  o.push(T(Bx+80,224,'Boat','#241A17',10));
  if(p>=3){o.push(R(40,256,400,38,'#e8f8ee','#1a7a3a',1));o.push(T(240,270,'d = opp/tan(θ)','#1a7a3a',11));o.push(T(240,288,'d = 45 ÷ tan(22°) = 45 ÷ 0.404 = 111.4 m','#1a7a3a',11));}
  s.innerHTML=o.join('');}

// Q10: Two angles, find height (more complex)
function dQ10(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // From A: elev 40°. From B (60m closer): elev 55°. Find height of tower.
  // h = tan40(d) = tan55(d-60). h(1/tan40 - 1/tan55) = 60. h = 60/(1/tan40-1/tan55)
  var h=Math.round(60/(1/Math.tan(40*D)-1/Math.tan(55*D)));
  var dA=Math.round(h/Math.tan(40*D));
  var Tx=300,Oy=250,Ty=Oy-Math.min(h,170),Ax=Tx-Math.min(dA,220),Bx=Ax+60;
  o.push(L(40,250,440,250,'#ccc',1.5));
  o.push(L(Tx,Ty,Tx,Oy,'#1a5a8a',2.5));
  if(p>=1){o.push(L(Ax,Oy,Tx,Ty,'#C0272D',2));o.push(L(Bx,Oy,Tx,Ty,'#C8922A',2));}
  o.push(T(Ax,Oy+14,'A','#C0272D',11));o.push(T(Bx,Oy+14,'B','#C8922A',11));
  o.push(T((Ax+Bx)/2,Oy-6,'60 m','#888',10));
  o.push(T(Tx+14,(Ty+Oy)/2,'h','#1a5a8a',12,'start'));
  if(p>=1){o.push(T(Ax+24,Oy-12,'40°','#C0272D',10));o.push(T(Bx+14,Oy-16,'55°','#C8922A',10));}
  if(p>=2){o.push(R(30,264,420,30,'#fff5f0','#C0272D',1));o.push(T(240,282,'h = d×tan40° and h = (d−60)×tan55°  →  solve simultaneously','#C0272D',10));}
  if(p>=3){o.push(R(30,264,420,30,'#e8f8ee','#1a7a3a',1));o.push(T(240,282,'h ≈ '+h+' m   (d from A ≈ '+dA+' m)','#1a7a3a',11));}
  s.innerHTML=o.join('');}
