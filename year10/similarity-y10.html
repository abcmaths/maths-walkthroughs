<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}

.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}

.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}

.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}}
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function poly(pts,fill,stroke,sw){return '<polygon points="'+pts.map(function(p){return p[0]+','+p[1];}).join(' ')+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'" />';}

// Q1: Two similar triangles side by side
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Small triangle
  o.push(poly([[60,200],[180,200],[120,80]],'#fff5f0','#C0272D'));
  o.push(T(120,220,'6 cm','#241A17',11));o.push(T(42,145,'5 cm','#241A17',11,'end'));o.push(T(196,145,'? cm','#C0272D',11,'start'));
  // Large triangle
  o.push(poly([[250,200],[430,200],[340,50]],'#e8f4ff','#1a5a8a',2));
  o.push(T(340,220,'9 cm','#1a5a8a',11));o.push(T(230,130,'7.5 cm','#1a5a8a',11,'end'));o.push(T(450,130,'? cm','#C0272D',11,'start'));
  if(p>=1){o.push(R(10,8,300,34,'#fff5f0','#C0272D'));o.push(T(160,30,'Scale factor = 9 ÷ 6 = 1.5','#C0272D',13));}
  if(p>=2){o.push(R(10,46,300,34,'#e8f8ee','#1a7a3a'));o.push(T(160,68,'Missing side = 5 × 1.5 = 7.5 cm','#1a7a3a',13));}
  s.innerHTML=o.join('');}

  if(p>=2){o.push(R(30,54,300,30,'#e8f8ee','#1a7a3a'));o.push(T(180,74,'x = 10 × 1.5 = 15 cm','#1a7a3a',13));}

function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

function L(x1,y1,x2,y2,c,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1)+'"/>';}

// Q5: Volume ratio
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

  o.push(R(60,38,160,36,'#fff5f0','#C0272D'));o.push(T(140,61,'Small: r = 2 cm','#241A17',12));

// Q6: Find a length from volumes
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Find Length from Volume Ratio','#C0272D',14,'middle'));
  o.push(R(60,36,360,34,'#fff5f0','#C0272D'));o.push(T(240,58,'Similar cylinders: volumes 8 cm³ and 27 cm³','#241A17',12));
  if(p>=1){o.push(L(240,70,240,96));o.push(R(80,96,320,34,'#e8f4ff','#1a5a8a'));o.push(T(240,118,'Volume SF = 27 ÷ 8  →  ∛(27/8) = 3/2','#1a5a8a',12));}
  if(p>=2){o.push(L(240,130,240,156));o.push(R(80,156,320,34,'#fff5f0','#C0272D'));o.push(T(240,178,'Length SF = 3/2 = 1.5','#C0272D',13));}

// Q7: Similar triangles — proving similarity
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(poly([[60,220],[380,220],[220,60]],'#fff5f0','#C0272D'));
  o.push(poly([[140,220],[300,220],[220,140]],'#e8f4ff','#1a5a8a',2));

  if(p>=3){o.push(R(10,76,360,30,'#e8f8ee','#1a7a3a'));o.push(T(190,96,'Sides are in the same ratio (scale factor)','#1a7a3a',12));}
  s.innerHTML=o.join('');}

// Q9: Mixed — 3D
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Surface Area Ratio','#C0272D',14,'middle'));

var QS=[
  {ey:'Q1 · Similarity · Extended',ti:'Finding a Missing Side',su:'Two similar triangles. Base of small = 6 cm, base of large = 9 cm. Find the missing side.',lv:'E',steps:[
    {lb:'The two triangles',dr:dQ1,ht:'<span class="lt le">Extended</span><p>Similar shapes have the same angles and sides in the same ratio. First find the <b>scale factor</b>.</p>'},
    {lb:'Step 1 — Scale factor',dr:dQ1,ht:'<div class="fm">SF = 9 ÷ 6 = 1.5</div>'},
    {lb:'Step 2 — Scale the side',dr:dQ1,ht:'<div class="fm">Missing side = 5 × 1.5 = 7.5 cm</div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var a=rnd(2,5);var sf=pick([1.5,2,2.5,3]);var b=a*sf;var s=rnd(3,9);return{question:'Similar triangles. Bases: '+a+' cm and '+round1(b)+' cm. One side of small = '+s+' cm. Find the corresponding side of the large.',hints:['SF = '+round1(b)+' ÷ '+a+' = '+sf,'Large side = '+s+' × '+sf],ans:round1(s*sf),tol:0.1,unit:'cm',working:s+'×'+sf+' = '+round1(s*sf)+' cm'};})}
  ]},
  {ey:'Q2 · Similarity · Extended',ti:'Finding the Scale Factor',su:'Two similar triangles. A base is 8 cm and 12 cm. Find the scale factor and a missing side.',lv:'E',steps:[
    {lb:'The triangles',dr:dQ2,ht:'<span class="lt le">Extended</span><p>Always divide the <b>larger</b> corresponding measurement by the <b>smaller</b> to get the scale factor.</p>'},
    {lb:'Step 1 — Scale factor',dr:dQ2,ht:'<div class="fm">SF = 12 ÷ 8 = 1.5</div>'},
    {lb:'Step 2 — Missing side',dr:dQ2,ht:'<div class="fm">x = 10 × 1.5 = 15 cm</div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var sf=pick([2,3,1.5,2.5]);var a=rnd(3,8);var b=a*sf;var s=rnd(2,8);return{question:'Bases: '+a+' and '+round1(b)+' cm. Height of small = '+s+' cm. Find height of large.',hints:['SF = '+round1(b)+'/'+a+' = '+sf],ans:round1(s*sf),tol:0.15,unit:'cm',working:'SF = '+sf+', height = '+s+'×'+sf+' = '+round1(s*sf)+' cm'};})}
  ]},
  {ey:'Q3 · Similarity · Extended',ti:'Area of Similar Shapes',su:'Length SF = 2. Small area = 9 cm². Find the large area.',lv:'E',steps:[
    {lb:'The rule',dr:dQ3,ht:'<span class="lt le">Extended</span><p>When lengths are scaled by SF, areas are scaled by <b>SF²</b>. Think: area is 2-dimensional.</p><div class="fm">Area ratio = SF²</div>'},
    {lb:'Step 1 — Area SF',dr:dQ3,ht:'<div class="fm">Area SF = 2² = 4</div>'},
    {lb:'Step 2 — Large area',dr:dQ3,ht:'<div class="fm">Large area = 9 × 4 = 36 cm²</div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var sf=pick([2,3,4,5]);var a=pick([5,8,9,12,16,18,20]);return{question:'Length SF = '+sf+'. Small area = '+a+' cm². Find the large area.',hints:['Area SF = '+sf+'² = '+sf*sf,'Large area = '+a+' × '+sf*sf],ans:a*sf*sf,tol:0,unit:'cm²',working:a+'×'+sf*sf+' = '+a*sf*sf+' cm²'};})}
  ]},
  {ey:'Q4 · Similarity · Extended',ti:'Area Ratio — Finding the Smaller Area',su:'Length SF = 3. Large area = 135 cm². Find the small area.',lv:'E',steps:[
    {lb:'The method',dr:dQ4,ht:'<span class="lt le">Extended</span><p>If the large area is given, <b>divide</b> by SF² to find the small area.</p>'},
    {lb:'Step 1 — Area SF',dr:dQ4,ht:'<div class="fm">Area SF = 3² = 9</div>'},
    {lb:'Step 2 — Small area',dr:dQ4,ht:'<div class="fm">Small area = 135 ÷ 9 = 15 cm²</div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var sf=pick([2,3,4,5]);var small=pick([4,5,6,8,9,10,12]);var large=small*sf*sf;return{question:'Length SF = '+sf+'. Large area = '+large+' cm². Find the small area.',hints:['Area SF = '+sf*sf,'Small area = '+large+' ÷ '+sf*sf],ans:small,tol:0,unit:'cm²',working:large+' ÷ '+sf*sf+' = '+small+' cm²'};})}
  ]},
  {ey:'Q5 · Similarity · Extended',ti:'Volume of Similar Solids',su:'Length SF = 3. Small volume = 20 cm³. Find the large volume.',lv:'E',steps:[
    {lb:'The rule',dr:dQ5,ht:'<span class="lt le">Extended</span><p>When lengths are scaled by SF, volumes are scaled by <b>SF³</b>. Think: volume is 3-dimensional.</p><div class="fm">Volume ratio = SF³</div>'},
    {lb:'Step 1 — Volume SF',dr:dQ5,ht:'<div class="fm">Volume SF = 3³ = 27</div>'},
    {lb:'Step 2 — Large volume',dr:dQ5,ht:'<div class="fm">Large volume = 20 × 27 = 540 cm³</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var sf=pick([2,3,4]);var v=pick([5,8,10,12,15,20]);return{question:'Length SF = '+sf+'. Small volume = '+v+' cm³. Large volume?',hints:['Volume SF = '+sf+'³ = '+sf*sf*sf],ans:v*sf*sf*sf,tol:0,unit:'cm³',working:v+'×'+sf*sf*sf+' = '+v*sf*sf*sf+' cm³'};})}
  ]},
  {ey:'Q6 · Similarity · Extended',ti:'Finding Length from Volume Ratio',su:'Similar cylinders: volumes 8 cm³ and 27 cm³. Small height = 4 cm. Find large height.',lv:'E',steps:[
    {lb:'The method',dr:dQ6,ht:'<span class="lt le">Extended</span><p>From the volume ratio, find the <b>cube root</b> to get the length scale factor.</p>'},
    {lb:'Step 1 — Volume SF',dr:dQ6,ht:'<div class="fm">Volume ratio = 27/8  →  Length SF = ∛(27/8) = 3/2 = 1.5</div>'},
    {lb:'Step 2 — Apply to height',dr:dQ6,ht:'<div class="fm">Large height = 4 × 1.5 = 6 cm</div>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var sfData=[[8,1,2],[27,3,3],[64,4,4],[125,5,5]];var d=pick(sfData);var sf=d[2];var h=rnd(3,8);return{question:'Volume of small = 1 cm³, large = '+d[0]+' cm³. Small height = '+h+' cm. Large height?',hints:['Length SF = ∛'+d[0]+' = '+sf,'Large height = '+h+' × '+sf],ans:h*sf,tol:0,unit:'cm',working:'SF = '+sf+', height = '+h+'×'+sf+' = '+h*sf+' cm'};})}
  ]},
  {ey:'Q7 · Similarity · Extended',ti:'Proving Two Triangles are Similar',su:'A line parallel to the base cuts a triangle. Prove the two triangles are similar.',lv:'E',steps:[

    {lb:'Step 1 — Corresponding angles',dr:dQ7,ht:'<p>The parallel line means corresponding angles are equal (F-angles). The small triangle and large triangle share the apex angle.</p>'},

    {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var sf=pick([2,3,1.5,2.5]);var base=rnd(4,8);var h=rnd(5,10);return{question:'Large triangle: base '+round1(base*sf)+' cm. Similar small triangle: base '+base+' cm, height '+h+' cm. Find large height.',hints:['SF = '+round1(base*sf)+' ÷ '+base+' = '+sf],ans:round1(h*sf),tol:0.2,unit:'cm',working:'SF = '+sf+', height = '+h+'×'+sf+' = '+round1(h*sf)+' cm'};})}
  ]},
  {ey:'Q8 · Similarity · Extended',ti:'Finding Length from Area Ratio',su:'Similar shapes: areas 25 cm² and 100 cm². Small side = 7 cm. Find the large side.',lv:'E',steps:[
    {lb:'The method',dr:dQ8,ht:'<span class="lt le">Extended</span><p>From the area ratio, take the <b>square root</b> to get the length scale factor.</p>'},
    {lb:'Step 1 — Length SF from area',dr:dQ8,ht:'<div class="fm">Area ratio = 100/25 = 4  →  Length SF = √4 = 2</div>'},
    {lb:'Step 2 — Scale the side',dr:dQ8,ht:'<div class="fm">Large side = 7 × 2 = 14 cm</div>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var sf=pick([2,3,4,5]);var aSmall=pick([4,9,16,25]);var aLarge=aSmall*sf*sf;var side=rnd(3,8);return{question:'Areas: '+aSmall+' cm² (small) and '+aLarge+' cm² (large). Small side = '+side+' cm. Large side?',hints:['Area ratio = '+aLarge+'/'+aSmall+' = '+sf*sf,'Length SF = √'+sf*sf+' = '+sf],ans:side*sf,tol:0,unit:'cm',working:'SF = '+sf+', side = '+side+'×'+sf+' = '+side*sf+' cm'};})}
  ]},
  {ey:'Q9 · Similarity · Extended',ti:'Surface Area of Similar Solids',su:'Length SF = 4. Small surface area = 30 cm². Find the large surface area.',lv:'E',steps:[
    {lb:'The rule',dr:dQ9,ht:'<span class="lt le">Extended</span><p>Surface area is 2-dimensional, so the surface area ratio = <b>SF²</b>, exactly like the area ratio for flat shapes.</p>'},
    {lb:'Step 1 — SA ratio',dr:dQ9,ht:'<div class="fm">SA ratio = 4² = 16</div>'},
    {lb:'Step 2 — Large SA',dr:dQ9,ht:'<div class="fm">Large SA = 30 × 16 = 480 cm²</div>'},
    {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var sf=pick([2,3,4,5]);var sa=pick([6,8,10,12,15,18,20]);return{question:'Length SF = '+sf+'. Small surface area = '+sa+' cm². Large surface area?',hints:['SA SF = '+sf+'² = '+sf*sf],ans:sa*sf*sf,tol:0,unit:'cm²',working:sa+'×'+sf*sf+' = '+sa*sf*sf+' cm²'};})}
  ]},
  {ey:'Q10 · Similarity · Extended',ti:'Area to Volume — Full Chain',su:'Similar solids: surface areas 36 cm² and 144 cm². Small volume = 20 cm³. Find large volume.',lv:'E',steps:[
    {lb:'The method',dr:dQ10,ht:'<span class="lt le">Extended</span><p>Use the area ratio to find the length SF, then cube it for the volume ratio. This is a two-step chain.</p>'},
    {lb:'Step 1 — Length SF from areas',dr:dQ10,ht:'<div class="fm">Area ratio = 144/36 = 4  →  Length SF = √4 = 2</div>'},
    {lb:'Step 2 — Volume SF',dr:dQ10,ht:'<div class="fm">Volume SF = 2³ = 8</div>'},
    {lb:'Step 3 — Large volume',dr:dQ10,ht:'<div class="fm">Large volume = 20 × 8 = 160 cm³</div>'},
    {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var sf=pick([2,3,4]);var aSmall=pick([4,9,16]);var aLarge=aSmall*sf*sf;var vSmall=pick([5,8,10,12]);return{question:'SA ratio: '+aSmall+' cm² and '+aLarge+' cm². Small volume = '+vSmall+' cm³. Large volume?',hints:['Area ratio = '+sf*sf+', Length SF = '+sf,'Volume SF = '+sf*sf*sf],ans:vSmall*sf*sf*sf,tol:0,unit:'cm³',working:'SF = '+sf+', vol SF = '+sf*sf*sf+', large vol = '+vSmall*sf*sf*sf+' cm³'};})}
  ]}
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti+'<br><span class="badge be">Extended</span>';b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
