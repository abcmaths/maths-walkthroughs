<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Number · Year 10 · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">← All Topics</a>
  <div class="ht">Number — Year 10</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">← Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next →</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn();
    entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn};
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function circ(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'"/>';}

/* Q1 Prime factor tree for 60 */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var nodes=[
    {x:240,y:30,v:'60',fill:'#fce8d8',stroke:'#C0272D'},
    {x:140,y:90,v:'2',fill:'#e8f8ee',stroke:'#1a7a3a'},
    {x:340,y:90,v:'30',fill:'#fce8d8',stroke:'#C0272D'},
    {x:260,y:160,v:'2',fill:'#e8f8ee',stroke:'#1a7a3a'},
    {x:420,y:160,v:'15',fill:'#fce8d8',stroke:'#C0272D'},
    {x:360,y:230,v:'3',fill:'#e8f8ee',stroke:'#1a7a3a'},
    {x:460,y:230,v:'5',fill:'#e8f8ee',stroke:'#1a7a3a'}
  ];
  var edges=[[0,1],[0,2],[2,3],[2,4],[4,5],[4,6]];
  // problem always visible at step 0
    o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){edges.forEach(function(e){var a=nodes[e[0]],b=nodes[e[1]];o.push(L(a.x,a.y+18,b.x,b.y-18,'#ccc',1.5));});}
  nodes.forEach(function(n,i){
    if(p>=1||(p===0&&i===0)){
      o.push(circ(n.x,n.y,18,n.fill,n.stroke,2));
      o.push(T(n.x,n.y+5,n.v,n.stroke==='#1a7a3a'?'#1a7a3a':'#C0272D',13,undefined,true));
    }
  });
  if(p>=2)o.push(T(240,278,'60 = 2 \u00d7 2 \u00d7 3 \u00d7 5 = 2\u00b2 \u00d7 3 \u00d7 5','#C0272D',13,undefined,true));
  s.innerHTML=o.join('');
}

/* Q2 HCF and LCM using Venn */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // 36 = 2²×3²,  48 = 2⁴×3
  o.push(T(240,20,'36 = 2\u00b2 \u00d7 3\u00b2     48 = 2\u2074 \u00d7 3','#241A17',13,undefined,true));
  // two overlapping circles
  o.push('<ellipse cx="175" cy="160" rx="120" ry="90" fill="#fff5f0" stroke="#C0272D" stroke-width="2" opacity="0.7"/>');
  o.push('<ellipse cx="305" cy="160" rx="120" ry="90" fill="#e8f4ff" stroke="#1a5a8a" stroke-width="2" opacity="0.7"/>');
  o.push(T(115,50,'36','#C0272D',15,undefined,true));
  o.push(T(365,50,'48','#1a5a8a',15,undefined,true));
  if(p>=1){
    o.push(T(108,155,'3','#C0272D',18,undefined,true));
    o.push(T(240,145,'2\u00b2','#241A17',18,undefined,true));
    o.push(T(240,175,'(shared)','#888',11));
    o.push(T(370,155,'2\u00b2','#1a5a8a',18,undefined,true));
  }
  if(p>=2){
    o.push(R(30,252,185,36,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(122,275,'HCF = 2\u00b2 \u00d7 3 = 12','#1a7a3a',13,undefined,true));
  }
  if(p>=3){
    o.push(R(265,252,185,36,'#fce8d8','#C0272D',1.5));
    o.push(T(357,275,'LCM = 2\u2074 \u00d7 3\u00b2 = 144','#C0272D',13,undefined,true));
  }
  s.innerHTML=o.join('');
}

/* Q3 Powers and roots */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var items=[
    {lbl:'2\u2075',val:'32',note:'2\u00d72\u00d72\u00d72\u00d72'},
    {lbl:'\u221a144',val:'12',note:'12\u00d712=144'},
    {lbl:'3\u207b\u00b2',val:'1/9',note:'1\u00f73\u00b2'},
    {lbl:'\u221b125',val:'5',note:'5\u00d75\u00d75=125'},
    {lbl:'4\u00b9\u141f\u00b2',val:'2',note:'\u221a4=2'}
  ];
  items.forEach(function(it,i){
    var x=55+i*86,show=(p>=i+1);
    o.push(R(x-32,60,64,56,show?'#fce8d8':'#f8f8f8',show?'#C0272D':'#ddd',show?2:1));
    o.push(T(x,82,it.lbl,'#C0272D',20));
    if(show){
      o.push(R(x-32,130,64,40,'#e8f8ee','#1a7a3a',1.5));
      o.push(T(x,155,it.val,'#1a7a3a',15,undefined,true));
      o.push(T(x,192,it.note,'#888',10));
    }
  });
  o.push(T(240,28,'Evaluate each expression:','#241A17',13,undefined,true));
  if(p>=5)o.push(T(240,232,'Key rule: a^(1/n) = nth root of a','#C8922A',12,undefined,true));
  s.innerHTML=o.join('');
}

/* Q4 Standard form */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(T(240,22,'Standard form: A \u00d7 10\u207f  where 1 \u2264 A < 10','#241A17',13,undefined,true));
  var examples=[
    {orig:'4 800 000',sf:'4.8 \u00d7 10\u2076',dir:'\u2192 large: move decimal left 6'},
    {orig:'0.000 032',sf:'3.2 \u00d7 10\u207b\u2075',dir:'\u2192 small: move decimal right 5'},
    {orig:'2.7 \u00d7 10\u00b3',sf:'2 700',dir:'\u2192 multiply out'}
  ];
  examples.forEach(function(ex,i){
    var y=60+i*72,show=(p>=i+1);
    o.push(R(30,y,200,52,show?'#fff5f0':'#f8f8f8',show?'#C0272D':'#ddd',show?2:1));
    o.push(T(130,y+20,ex.orig,'#241A17',14));
    if(show){
      o.push(T(240,y+20,'\u21d2','#C8922A',18));
      o.push(R(260,y,190,52,'#e8f8ee','#1a7a3a',1.5));
      o.push(T(355,y+20,ex.sf,'#1a7a3a',14,undefined,true));
      o.push(T(355,y+38,ex.dir,'#888',10));
    }
  });
  if(p>=3){
    o.push(R(30,268,420,24,'#fce8d8','#C0272D',1.5));
    o.push(T(240,284,'(3.6\u00d710\u2074)\u00d7(2\u00d710\u00b3)=7.2\u00d710\u2077   |   (8\u00d710\u2075)\u00f7(4\u00d710\u00b2)=2\u00d710\u00b3','#C0272D',11,undefined,true));
  }
  s.innerHTML=o.join('');
}

/* Q5 FDP equivalence */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var rows=[
    {f:'3/4',d:'0.75',pc:'75%'},
    {f:'2/5',d:'0.4',pc:'40%'},
    {f:'5/8',d:'0.625',pc:'62.5%'},
    {f:'1/3',d:'0.333\u2026',pc:'33.3\u2026%'}
  ];
  // headers
  ['Fraction','Decimal','Percentage'].forEach(function(h,c){
    o.push(R(40+c*130,30,128,32,'#C0272D','#C0272D',0));
    o.push(T(104+c*130,51,h,'#fff',12,undefined,true));
  });
  rows.forEach(function(r,i){
    var y=62+i*52,show=(p>=i+1);
    var fill=show?'#fff5f0':'#f8f8f8',stroke=show?'#C0272D':'#ddd',sw=show?1.5:1;
    o.push(R(40,y,128,48,fill,stroke,sw));   o.push(T(104,y+28,r.f,'#C0272D',15,undefined,show));
    o.push(R(170,y,128,48,fill,stroke,sw));  o.push(T(234,y+28,r.d,'#1a5a8a',14,undefined,show));
    o.push(R(300,y,128,48,fill,stroke,sw));  o.push(T(364,y+28,r.pc,'#1a7a3a',14,undefined,show));
  });
  s.innerHTML=o.join('');
}

/* Q6 Percentage increase/decrease */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // bar model for 100% → 135%
  var bx=60,by=80,bw=360,bh=50;
  o.push(R(bx,by,bw,bh,'#e8f4ff','#1a5a8a',2));
  o.push(T(bx+bw/2,by+30,'Original price: £240 = 100%','#1a5a8a',13,undefined,true));
  if(p>=1){
    var iw=bw*0.35;
    o.push(R(bx,by+68,bw,bh,'#fce8d8','#C0272D',2));
    o.push(R(bx,by+68,iw,bh,'#C0272D','#C0272D',0));
    o.push(T(bx+iw/2,by+98,'35%','#fff',12,undefined,true));
    o.push(T(bx+iw+((bw-iw)/2),by+98,'100%','#C0272D',12,undefined,true));
    o.push(T(240,195,'Multiplier method: 100% + 35% = 135% = 1.35','#241A17',13,undefined,true));
  }
  if(p>=2){
    o.push(R(60,215,360,36,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,238,'New price = 240 \u00d7 1.35 = \u00a3324','#1a7a3a',15,undefined,true));
  }
  if(p>=3){
    o.push(T(240,270,'Decrease by 20%: \u00d7 0.80   |   Decrease by 7.5%: \u00d7 0.925','#888',11,undefined,true));
  }
  s.innerHTML=o.join('');
}

/* Q7 Reverse percentage */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(T(240,22,'After 30% increase, price is \u00a3325. Find original.','#241A17',13,undefined,true));
  // arrow chain
  var steps=[
    {lbl:'Original\n(100%)',col:'#1a5a8a',fill:'#e8f4ff'},
    {lbl:'\u00d71.30',col:'#C8922A',fill:'#fff8e8'},
    {lbl:'After\n(130%) = \u00a3325',col:'#C0272D',fill:'#fce8d8'}
  ];
  steps.forEach(function(st,i){
    var x=60+i*160,y=80;
    if(i===1){o.push(T(x+20,y+25,st.lbl,'#C8922A',14,undefined,true));}
    else{o.push(R(x,y,120,60,st.fill,st.col,2));st.lbl.split('\n').forEach(function(ln,j){o.push(T(x+60,y+22+j*18,ln,st.col,12,undefined,true));});}
    if(i<2)o.push(L(x+(i===0?120:60),y+30,x+(i===0?155:180),y+30,'#C8922A',2));
  });
  if(p>=1){
    var steps2=[
      {lbl:'\u00f71.30',col:'#C8922A'},
      {lbl:'Original = \u00a3?',col:'#1a5a8a',fill:'#e8f4ff'}
    ];
    o.push(T(240,168,'\u2190 Reverse: divide by the multiplier','#888',12));
    o.push(R(60,180,120,60,'#fce8d8','#C0272D',2));o.push(T(120,205,'\u00a3325','#C0272D',15,undefined,true));o.push(T(120,220,'(130%)','#C0272D',11));
    o.push(T(220,215,'\u00f71.30','#C8922A',14,undefined,true));
    o.push(R(300,180,120,60,p>=2?'#e8f8ee':'#f8f8f8',p>=2?'#1a7a3a':'#ddd',p>=2?2:1));
    if(p>=2)o.push(T(360,210,'\u00a3250','#1a7a3a',18,undefined,true));
    o.push(L(180,210,295,210,'#C8922A',2));
  }
  if(p>=2)o.push(T(240,275,'325 \u00f7 1.30 = \u00a3250','#1a7a3a',14,undefined,true));
  s.innerHTML=o.join('');
}

/* Q8 Ratio */
function dQ8(p){

    status: 'completed', completed_at: new Date().toISOString(),
    last_visited_at: new Date().toISOString(),
  }, { onConflict: 'student_id,topic_id' });
}

document.addEventListener('DOMContentLoaded', function() {
  var nb = document.getElementById('nb');
  if (!nb) return;
  nb.addEventListener('click', function() {
    if (nb.textContent.trim() === 'Restart') {
      markComplete();
      if (window.abcShowFeedback) window.abcShowFeedback();
    }
  });
});
</script>

</body>
