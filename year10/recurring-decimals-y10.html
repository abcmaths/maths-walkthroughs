<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1.5)+'"/>';}

function stepBox(x,y,w,h,label,content,col){
  col=col||'#C0272D';var lcol=col==='#C0272D'?'#fff5f0':col==='#1a5a8a'?'#e8f4ff':'#e8f8ee';
  return R(x,y,w,h,lcol,col,1.5)+T(x+w/2,y+18,label,col,10)+T(x+w/2,y+36,content,'#241A17',13);
}

// Q1: What is a recurring decimal?
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Types of Decimal','#C0272D',14,'middle'));
  var rows=[['1/4','0.25','Terminates — stops','#1a7a3a'],['1/3','0.333…','Recurs — repeats forever','#C0272D'],['1/7','0.142857142857…','Recurs — 6-digit block repeats','#C0272D'],['1/8','0.125','Terminates','#1a7a3a']];
  rows.forEach(function(r,i){
    if(p>=i){
      o.push(R(20,36+i*48,440,42,i%2===0?'#fdf7f4':'#fff','#E4D6CE',1));
      o.push(T(70,62+i*48,r[0],'#241A17',13,'middle'));
      o.push(T(210,62+i*48,r[1],'#241A17',12,'middle'));
      o.push(T(360,62+i*48,r[2],r[3],11,'middle'));
    }
  });
  s.innerHTML=o.join('');}

// Q2: Convert 1/9 using algebra
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Convert 0.1̄ (0.111…) to a fraction','#C0272D',14,'middle'));
  o.push(R(60,38,360,36,'#fff5f0','#C0272D'));o.push(T(240,62,'Let x = 0.111…','#241A17',14));
  if(p>=1){o.push(R(60,80,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,104,'10x = 1.111…','#1a5a8a',14));}
  if(p>=2){o.push(R(60,122,360,36,'#fff5f0','#C0272D'));o.push(T(240,146,'10x − x = 1.111… − 0.111… = 1','#C0272D',13));}
  if(p>=3){o.push(R(60,164,360,36,'#fff5f0','#C0272D'));o.push(T(240,188,'9x = 1  →  x = 1/9','#241A17',14));}
  if(p>=4){o.push(R(140,208,200,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,232,'0.1̄ = 1/9','#1a7a3a',16,'middle'));}
  s.innerHTML=o.join('');}

// Q3: Convert 0.7̄
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Convert 0.7̄ (0.777…) to a fraction','#C0272D',14,'middle'));
  o.push(R(60,38,360,36,'#fff5f0','#C0272D'));o.push(T(240,62,'Let x = 0.777…','#241A17',14));
  if(p>=1){o.push(R(60,80,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,104,'10x = 7.777…','#1a5a8a',14));}
  if(p>=2){o.push(R(60,122,360,36,'#fff5f0','#C0272D'));o.push(T(240,146,'9x = 7  →  x = 7/9','#C0272D',14));}
  if(p>=3){o.push(R(140,168,200,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,192,'0.7̄ = 7/9','#1a7a3a',16,'middle'));}
  if(p>=4){o.push(T(240,228,'Pattern: 0.ṅ = n/9 for any single repeating digit','#555',11,'middle'));}
  s.innerHTML=o.join('');}

// Q4: Two-digit recurrence 0.̄1̄2̄ = 0.121212...
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Convert 0.1̄2̄ (0.121212…) to a fraction','#C0272D',14,'middle'));
  o.push(R(60,38,360,36,'#fff5f0','#C0272D'));o.push(T(240,62,'Let x = 0.121212…','#241A17',14));
  if(p>=1){o.push(R(60,80,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,104,'100x = 12.1212…  (multiply by 100 — 2 recurring digits)','#1a5a8a',12));}
  if(p>=2){o.push(R(60,122,360,36,'#fff5f0','#C0272D'));o.push(T(240,146,'99x = 12  →  x = 12/99 = 4/33','#C0272D',14));}
  if(p>=3){o.push(R(140,164,200,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,188,'0.1̄2̄ = 4/33','#1a7a3a',16,'middle'));}
  if(p>=4){o.push(T(240,218,'For 2 recurring digits: multiply by 100, subtract x','#555',11,'middle'));}
  s.innerHTML=o.join('');}

// Q5: Mixed — non-recurring prefix 0.16̄
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Convert 0.16̄ (0.1666…) to a fraction','#C0272D',14,'middle'));
  o.push(T(240,42,'The 1 is not recurring — only the 6 repeats','#555',12,'middle'));
  o.push(R(60,54,360,36,'#fff5f0','#C0272D'));o.push(T(240,78,'Let x = 0.1666…','#241A17',14));
  if(p>=1){o.push(R(60,96,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,120,'10x = 1.666…  and  100x = 16.666…','#1a5a8a',13));}
  if(p>=2){o.push(R(60,138,360,36,'#fff5f0','#C0272D'));o.push(T(240,162,'100x − 10x = 16.666… − 1.666… = 15','#C0272D',13));}
  if(p>=3){o.push(R(60,180,360,36,'#fff5f0','#C0272D'));o.push(T(240,204,'90x = 15  →  x = 15/90 = 1/6','#C0272D',14));}
  if(p>=4){o.push(R(170,218,140,32,'#e8f8ee','#1a7a3a',2));o.push(T(240,240,'0.16̄ = 1/6','#1a7a3a',15,'middle'));}
  s.innerHTML=o.join('');}

// Q6: Stem-and-leaf
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,18,'Stem-and-Leaf Diagram','#C0272D',14,'middle'));
  var stems=[1,2,3,4];var leaves=[[2,5,8],[1,3,6,9],[0,4,7],[2,5]];
  o.push(R(60,30,360,20,'#C0272D','#C0272D',1));
  o.push(T(150,44,'Stem','#fff',11));o.push(T(310,44,'Leaf','#fff',11));
  o.push(L(240,30,240,220,'#C0272D',1));
  stems.forEach(function(st,i){
    var y=60+i*42;
    o.push(R(60,y,360,38,i%2===0?'#fdf7f4':'#fff','#E4D6CE',1));
    o.push(T(150,y+24,st,'#C0272D',14,'middle'));
    if(p>=1)o.push(T(310,y+24,leaves[i].join('  '),'#241A17',13,'middle'));
  });
  if(p>=2){o.push(R(30,232,420,22,'#e8f4ff','#1a5a8a',1));o.push(T(240,247,'Key: 2|3 means 23.  Median = middle value.  Range = largest − smallest.','#1a5a8a',10,'middle'));}
  s.innerHTML=o.join('');}

// Q7: Box plot
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=60,oy=130,w=360;
  // Scale: 0-100, positions
  var mn=15,q1=35,med=52,q3=68,mx=88;
  var sc=w/100;
  o.push(T(240,18,'Box Plot — Reading Key Values','#C0272D',14,'middle'));
  // Number line
  o.push(L(ox,oy+60,ox+w,oy+60,'#aaa',1.5));
  [0,20,40,60,80,100].forEach(function(v){o.push(L(ox+v*sc,oy+57,ox+v*sc,oy+63,'#aaa',1));o.push(T(ox+v*sc,oy+76,''+v,'#555',10));});
  if(p>=1){
    // Box
    o.push(R(ox+q1*sc,oy+30,( q3-q1)*sc,30,'#e8f4ff','#1a5a8a',2));
    // Median
    o.push(L(ox+med*sc,oy+30,ox+med*sc,oy+60,'#C0272D',2.5));
    // Whiskers
    o.push(L(ox+mn*sc,oy+45,ox+q1*sc,oy+45,'#1a5a8a',1.5));
    o.push(L(ox+q3*sc,oy+45,ox+mx*sc,oy+45,'#1a5a8a',1.5));
    o.push(L(ox+mn*sc,oy+38,ox+mn*sc,oy+52,'#1a5a8a',1.5));
    o.push(L(ox+mx*sc,oy+38,ox+mx*sc,oy+52,'#1a5a8a',1.5));
  }
  if(p>=2){
    o.push(T(ox+mn*sc,oy+22,'Min='+mn,'#555',9));
    o.push(T(ox+q1*sc,oy+22,'Q1='+q1,'#1a5a8a',9));
    o.push(T(ox+med*sc,oy+22,'Med='+med,'#C0272D',9));
    o.push(T(ox+q3*sc,oy+22,'Q3='+q3,'#1a5a8a',9));
    o.push(T(ox+mx*sc,oy+22,'Max='+mx,'#555',9));
  }
  if(p>=3){
    o.push(R(30,158,420,28,'#fff5f0','#C0272D'));
    o.push(T(240,176,'IQR = Q3 − Q1 = '+q3+' − '+q1+' = '+(q3-q1)+'   Range = '+mx+' − '+mn+' = '+(mx-mn),'#C0272D',12,'middle'));
  }
  s.innerHTML=o.join('');}

// Q8: Recurring to fraction — 3 digit
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Convert 0.1̄2̄3̄ (0.123123…) to a fraction','#C0272D',14,'middle'));
  o.push(R(60,38,360,36,'#fff5f0','#C0272D'));o.push(T(240,62,'Let x = 0.123123…','#241A17',14));
  if(p>=1){o.push(R(60,80,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,104,'1000x = 123.123123…  (3 recurring digits → ×1000)','#1a5a8a',12));}
  if(p>=2){o.push(R(60,122,360,36,'#fff5f0','#C0272D'));o.push(T(240,146,'999x = 123  →  x = 123/999 = 41/333','#C0272D',14));}
  if(p>=3){o.push(R(140,164,200,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,188,'0.1̄2̄3̄ = 41/333','#1a7a3a',16,'middle'));}
  if(p>=4){o.push(T(240,222,'Pattern: n recurring digits → multiply by 10ⁿ, denominator = 10ⁿ − 1','#555',11,'middle'));}
  s.innerHTML=o.join('');}

// Q9: Fraction to recurring decimal
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Convert 5/11 to a recurring decimal','#C0272D',14,'middle'));
  o.push(T(240,42,'Divide 5 by 11 using long division','#555',12,'middle'));
  if(p>=1){o.push(R(60,56,360,36,'#fff5f0','#C0272D'));o.push(T(240,80,'5 ÷ 11 = 0.454545… since 50÷11=4r6, 60÷11=5r5, repeats','#241A17',12));}
  if(p>=2){o.push(R(140,100,200,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,124,'5/11 = 0.4̄5̄','#1a7a3a',17,'middle'));}
  if(p>=3){o.push(R(30,148,420,36,'#e8f4ff','#1a5a8a'));o.push(T(240,172,'The remainder cycle gives the repeating block.','#1a5a8a',12));}
  if(p>=4){
    o.push(T(240,208,'Check: 45/99 = 5/11 ✓  (since 0.4̄5̄ = 45/99)','#555',11,'middle'));
    o.push(R(30,218,420,28,'#fef8ee','#C8922A',1));
    o.push(T(240,236,'Tip: a fraction terminates iff denominator (in lowest terms) has only 2s and 5s as factors','#C8922A',10,'middle'));
  }
