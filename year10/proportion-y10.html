<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round2(x){return Math.round(x*100)/100;}
function round1(x){return Math.round(x*10)/10;}

var ST={};
function tryIt(genFn){
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var en=ST[id];if(!en)return;var o=en.genFn();en.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:en.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var en=ST[id];if(!en)return;var o=en.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct!  '+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}}
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'"'+(b?' font-weight="700"':'')+'>'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+(stroke||'none')+'" stroke-width="'+(sw||0)+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#ccc')+'" stroke-width="'+(w||1)+'"/>';}

function propDiag(p,type,pairs,label){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  o.push(R(20,20,440,48,'#fff5f0','#C0272D',1.5));
  o.push(T(240,50,label,'#C0272D',15,'middle',true));
  if(p>=1){
    o.push(R(20,82,440,36,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(80,105,'x','#1a5a8a',14,'middle',true));
    o.push(T(240,105,'y','#1a5a8a',14,'middle',true));
    o.push(T(380,105,'k = y/x  or  y/x²  etc.','#888',12,'middle'));
  }
  pairs.forEach(function(pr,i){
    if(p>=i+2){
      var ys=130+i*34;
      o.push(T(80,ys+18,pr[0],'#241A17',14,'middle'));
      o.push(T(240,ys+18,pr[1]===null?'?':''+pr[1],'#C0272D',14,'middle',pr[1]===null));
      o.push(T(380,ys+18,pr[2],'#888',13,'middle'));
      o.push(L(20,ys+26,460,ys+26,'#E4D6CE',1));
    }
  });
  s.innerHTML=o.join('');
}

// Q1 Direct proportion y ∝ x
function dQ1(p){propDiag(p,'direct',[[2,10,'k=5'],[5,25,'k=5'],[8,null,'k=5']],'Direct proportion:  y ∝ x  means  y = kx');}
// Q2 Direct proportion y ∝ x²
function dQ2(p){propDiag(p,'direct2',[[2,12,'k=3'],[3,27,'k=3'],[5,null,'k=3']],'Direct proportion:  y ∝ x²  means  y = kx²');}
// Q3 Direct proportion y ∝ √x
function dQ3(p){propDiag(p,'sqrt',[[4,10,'k=5'],[9,15,'k=5'],[16,null,'k=5']],'Direct proportion:  y ∝ √x  means  y = k√x');}
// Q4 Inverse proportion y ∝ 1/x
function dQ4(p){propDiag(p,'inv',[[2,18,'k=36'],[3,12,'k=36'],[6,null,'k=36']],'Inverse proportion:  y ∝ 1/x  means  y = k/x');}
// Q5 Inverse proportion y ∝ 1/x²
function dQ5(p){propDiag(p,'inv2',[[2,50,'k=200'],[5,8,'k=200'],[10,null,'k=200']],'Inverse proportion:  y ∝ 1/x²  means  y = k/x²');}

function tableDiag(p,headers,rows,formula,answer){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  if(p>=1){o.push(R(20,20,440,40,'#fff5f0','#C0272D',1.5));o.push(T(240,45,formula,'#C0272D',15,'middle',true));}
  if(p>=2){
    o.push(R(20,72,440,34,'#e8f4ff','#1a5a8a',1));
    headers.forEach(function(h,i){o.push(T(60+i*130,93,h,'#1a5a8a',14,'middle',true));});
  }
  rows.forEach(function(row,ri){
    if(p>=ri+3){
      var ys=110+ri*36;
      row.forEach(function(cell,ci){
        var isQ=(cell==='?');
        o.push(T(60+ci*130,ys+22,cell,isQ?'#C0272D':'#241A17',isQ?16:14,'middle',isQ));
      });
      o.push(L(20,ys+32,460,ys+32,'#E4D6CE',1));
    }
  });
  if(p>=rows.length+3){o.push(R(20,230,440,48,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,260,answer,'#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ6(p){tableDiag(p,['t (hrs)','d (km)','Speed = d/t'],[[2,90,'45 km/h'],[3,135,'45 km/h'],['5','?','—']],'Direct proportion:  distance ∝ time  (constant speed)','d = 45 × 5 = 225 km');}
function dQ7(p){tableDiag(p,['workers','days','Product'],[[3,12,'36'],[4,9,'36'],['?',4,'—']],'Inverse proportion:  days ∝ 1/workers','workers = 36 ÷ 4 = 9');}
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  if(p>=1){o.push(R(20,20,440,44,'#fff5f0','#C0272D',1.5));o.push(T(240,48,'y ∝ x³   When x = 2, y = 24. Find y when x = 3.','#C0272D',14,'middle',true));}
  if(p>=2){o.push(T(240,110,'Step 1 — write the formula:  y = kx³','#241A17',14,'middle'));o.push(T(240,136,'Step 2 — substitute (2, 24):  24 = k × 8','#241A17',14,'middle'));}
  if(p>=3){o.push(T(240,168,'k = 24 ÷ 8 = 3','#241A17',16,'middle',true));o.push(T(240,194,'Formula:  y = 3x³','#C0272D',15,'middle'));}
  if(p>=4){o.push(R(20,210,440,48,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,228,'When x = 3:  y = 3 × 27 = 81','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');
}
function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  if(p>=1){o.push(R(20,20,440,44,'#fff5f0','#C0272D',1.5));o.push(T(240,48,'P ∝ √Q. When Q = 16, P = 20. Find P when Q = 25.','#C0272D',14,'middle',true));}
  if(p>=2){o.push(T(240,108,'P = k√Q','#241A17',14,'middle'));o.push(T(240,134,'20 = k × √16 = k × 4   →   k = 5','#241A17',14,'middle'));}
  if(p>=3){o.push(T(240,166,'P = 5√Q','#C0272D',15,'middle'));}
  if(p>=4){o.push(R(20,185,440,44,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,213,'P = 5 × √25 = 5 × 5 = 25','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');
}
function dQ10(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  if(p>=1){o.push(R(20,20,440,44,'#fff5f0','#C0272D',1.5));o.push(T(240,48,'F ∝ 1/d².  F = 36 when d = 2. Find F when d = 6.','#C0272D',14,'middle',true));}
  if(p>=2){o.push(T(240,108,'F = k/d²','#241A17',14,'middle'));o.push(T(240,134,'36 = k/4   →   k = 144','#241A17',14,'middle'));}
  if(p>=3){o.push(T(240,166,'F = 144/d²','#C0272D',15,'middle'));}
  if(p>=4){o.push(R(20,185,440,44,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,213,'F = 144/36 = 4  (when d = 6)','#1a7a3a',16,'middle',true));}
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 · Proportion · Extended',ti:'Direct Proportion  y ∝ x',su:'y is directly proportional to x. When x = 2, y = 10. Find y when x = 8.',lv:'E',steps:[
    {lb:'What does y ∝ x mean?',dr:dQ1,ht:'<span class="lt le">Extended</span><p>y ∝ x means <b>y = kx</b> for some constant k. When x doubles, y doubles. The ratio y/x is always constant.</p>'},
    {lb:'Find k',dr:dQ1,ht:'<div class="fm">y = kx  →  10 = k × 2  →  k = 5</div>'},
    {lb:'Use the formula',dr:dQ1,ht:'<div class="fm">y = 5x</div><div class="fm">When x = 8:  y = 5 × 8 = <b>40</b></div>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var k=rnd(2,8),x1=rnd(2,5),y1=k*x1,x2=rnd(x1+1,10);return{question:'y ∝ x. When x = '+x1+', y = '+y1+'. Find y when x = '+x2+'.',hints:['Find k: k = y/x = '+y1+'/'+x1,'Then y = k × x₂'],ans:k*x2,tol:0,unit:'',working:'k = '+k+', y = '+k+'×'+x2+' = '+k*x2};})},
  ]},
  {ey:'Q2 · Proportion · Extended',ti:'Direct Proportion  y ∝ x²',su:'y is proportional to x². When x = 2, y = 12. Find y when x = 5.',lv:'E',steps:[
    {lb:'Write the formula',dr:dQ2,ht:'<span class="lt le">Extended</span><p>y ∝ x² means <b>y = kx²</b>. When x doubles, y multiplies by 4.</p>'},
    {lb:'Find k',dr:dQ2,ht:'<div class="fm">12 = k × 4  →  k = 3</div>'},
    {lb:'Use the formula',dr:dQ2,ht:'<div class="fm">y = 3x²</div><div class="fm">When x = 5:  y = 3 × 25 = <b>75</b></div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var k=rnd(2,5),x1=rnd(2,4),y1=k*x1*x1,x2=rnd(x1+1,7);return{question:'y ∝ x². When x='+x1+', y='+y1+'. Find y when x='+x2+'.',hints:['y = kx², find k = '+y1+'/'+x1*x1+' = '+k],ans:k*x2*x2,tol:0,unit:'',working:'k='+k+', y='+k+'×'+x2*x2+'='+k*x2*x2};})},
  ]},
  {ey:'Q3 · Proportion · Extended',ti:'Direct Proportion  y ∝ √x',su:'y is proportional to √x. When x = 4, y = 10. Find y when x = 16.',lv:'E',steps:[
    {lb:'Write the formula',dr:dQ3,ht:'<span class="lt le">Extended</span><p>y ∝ √x means <b>y = k√x</b>. Doubling x multiplies y by √2.</p>'},
    {lb:'Find k',dr:dQ3,ht:'<div class="fm">10 = k × √4 = 2k  →  k = 5</div>'},
    {lb:'Use the formula',dr:dQ3,ht:'<div class="fm">y = 5√x</div><div class="fm">When x = 16:  y = 5 × 4 = <b>20</b></div>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var k=rnd(3,8),x1=pick([4,9,16,25]),y1=k*Math.sqrt(x1),x2=pick([9,16,25,36]);return{question:'y ∝ √x. When x='+x1+', y='+y1+'. Find y when x='+x2+'.',hints:['k = y/√x = '+y1+'/'+Math.sqrt(x1)+' = '+k],ans:k*Math.sqrt(x2),tol:0.1,unit:'',working:'k='+k+', y='+k+'×'+Math.sqrt(x2)+'='+k*Math.sqrt(x2)};})},
  ]},
  {ey:'Q4 · Proportion · Extended',ti:'Inverse Proportion  y ∝ 1/x',su:'y is inversely proportional to x. When x = 2, y = 18. Find y when x = 6.',lv:'E',steps:[
    {lb:'What does y ∝ 1/x mean?',dr:dQ4,ht:'<span class="lt le">Extended</span><p>y ∝ 1/x means <b>y = k/x</b>. When x doubles, y halves. The product xy is always constant.</p>'},
    {lb:'Find k',dr:dQ4,ht:'<div class="fm">18 = k/2  →  k = 36</div><p>Check: xy = 2 × 18 = 36 ✓</p>'},
    {lb:'Use the formula',dr:dQ4,ht:'<div class="fm">y = 36/x</div><div class="fm">When x = 6:  y = 36/6 = <b>6</b></div>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var k=rnd(12,60),x1=pick([2,3,4,5,6]),y1=k/x1;while(!Number.isInteger(y1)){k=rnd(12,60);y1=k/x1;}var x2=pick([3,4,5,6,8,10,12]).valueOf();while(k%x2!==0)x2++;return{question:'y ∝ 1/x. When x='+x1+', y='+y1+'. Find y when x='+x2+'.',hints:['k = xy = '+x1+'×'+y1+' = '+k,'y = k/x₂'],ans:k/x2,tol:0,unit:'',working:'k='+k+', y='+k+'/'+x2+'='+k/x2};})},
  ]},
  {ey:'Q5 · Proportion · Extended',ti:'Inverse Proportion  y ∝ 1/x²',su:'y ∝ 1/x². When x = 2, y = 50. Find y when x = 5.',lv:'E',steps:[
    {lb:'Write the formula',dr:dQ5,ht:'<span class="lt le">Extended</span><p>y ∝ 1/x² means <b>y = k/x²</b>. When x doubles, y is divided by 4.</p>'},
    {lb:'Find k',dr:dQ5,ht:'<div class="fm">50 = k/4  →  k = 200</div>'},
    {lb:'Use the formula',dr:dQ5,ht:'<div class="fm">y = 200/x²</div><div class="fm">When x = 5:  y = 200/25 = <b>8</b></div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var x1=rnd(2,4),k=x1*x1*pick([4,8,12,16,20]),y1=k/(x1*x1),x2=pick([5,6,10]);return{question:'y ∝ 1/x². When x='+x1+', y='+y1+'. Find y when x='+x2+'.',hints:['k = y × x² = '+y1+'×'+x1*x1+' = '+k],ans:round2(k/(x2*x2)),tol:0.05,unit:'',working:'k='+k+', y='+k+'/'+x2*x2+'='+round2(k/(x2*x2))};})},
  ]},
  {ey:'Q6 · Proportion · Foundation',ti:'Proportion in Context — Distance and Time',su:'A car travels at constant speed: 90 km in 2 hours. How far in 5 hours?',lv:'F',steps:[
    {lb:'Identify the proportion',dr:dQ6,ht:'<span class="lt lf">Foundation</span><p>At constant speed, <b>distance ∝ time</b>. This is direct proportion: d = speed × t.</p>'},
    {lb:'Find the constant (speed)',dr:dQ6,ht:'<div class="fm">Speed = 90 ÷ 2 = 45 km/h</div>'},
    {lb:'Find d when t = 5',dr:dQ6,ht:'<div class="fm">d = 45 × 5 = <b>225 km</b></div>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var spd=pick([40,50,60,80,90]),t1=rnd(2,4),d1=spd*t1,t2=rnd(t1+1,6);return{question:'A car covers '+d1+' km in '+t1+' hours at constant speed. How far in '+t2+' hours?',hints:['Speed = '+d1+'/'+t1+' = '+spd+' km/h'],ans:spd*t2,tol:0,unit:'km',working:d1+'/'+t1+'='+spd+' km/h, then '+spd+'×'+t2+'='+spd*t2+' km'};})},
  ]},
  {ey:'Q7 · Proportion · Extended',ti:'Inverse Proportion in Context — Workers and Days',su:'3 workers take 12 days to finish a job. How many workers are needed to finish in 4 days?',lv:'E',steps:[
    {lb:'Identify the proportion',dr:dQ7,ht:'<span class="lt le">Extended</span><p>More workers → fewer days. This is <b>inverse proportion</b>: workers × days = constant.</p>'},
    {lb:'Find the constant',dr:dQ7,ht:'<div class="fm">3 × 12 = 36  (worker-days)</div>'},
    {lb:'Find workers for 4 days',dr:dQ7,ht:'<div class="fm">workers = 36 ÷ 4 = <b>9 workers</b></div>'},

  ]},
  {ey:'Q8 · Proportion · Extended',ti:'Proportion y ∝ x³',su:'y ∝ x³. When x = 2, y = 24. Find y when x = 3.',lv:'E',steps:[
    {lb:'Write the formula',dr:dQ8,ht:'<span class="lt le">Extended</span><p>y ∝ x³ means <b>y = kx³</b>. When x doubles, y multiplies by 8.</p>'},
    {lb:'Find k',dr:dQ8,ht:'<div class="fm">24 = k × 8  →  k = 3</div>'},
    {lb:'Formula',dr:dQ8,ht:'<div class="fm">y = 3x³</div>'},
    {lb:'Evaluate at x = 3',dr:dQ8,ht:'<div class="fm">y = 3 × 27 = <b>81</b></div>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var k=rnd(2,4),x1=2,y1=k*8,x2=rnd(3,4);return{question:'y ∝ x³. When x=2, y='+y1+'. Find y when x='+x2+'.',hints:['k = '+y1+'/8 = '+k,'y = '+k+'×'+x2+'³ = '+k+'×'+x2*x2*x2],ans:k*x2*x2*x2,tol:0,unit:'',working:'k='+k+', y='+k+'×'+x2*x2*x2+'='+k*x2*x2*x2};})},
  ]},
  {ey:'Q9 · Proportion · Extended',ti:'Proportion y ∝ √x (Applied)',su:'P ∝ √Q. When Q = 16, P = 20. Find P when Q = 25.',lv:'E',steps:[
    {lb:'Write the formula',dr:dQ9,ht:'<span class="lt le">Extended</span><p>P ∝ √Q means <b>P = k√Q</b>.</p>'},
    {lb:'Find k',dr:dQ9,ht:'<div class="fm">20 = k × 4  →  k = 5</div>'},
    {lb:'Formula',dr:dQ9,ht:'<div class="fm">P = 5√Q</div>'},
    {lb:'Evaluate at Q = 25',dr:dQ9,ht:'<div class="fm">P = 5 × 5 = <b>25</b></div>'},
    {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var k=rnd(2,6),x1=pick([4,9,16]),y1=k*Math.sqrt(x1),x2=pick([25,36,49]);return{question:'y ∝ √x. When x='+x1+', y='+y1+'. Find y when x='+x2+'.',hints:['k = '+y1+'/'+Math.sqrt(x1)+' = '+k],ans:k*Math.sqrt(x2),tol:0.1,unit:'',working:'k='+k+', y='+k+'×'+Math.sqrt(x2)+'='+k*Math.sqrt(x2)};})},
  ]},
  {ey:'Q10 · Proportion · Extended',ti:'Inverse Square Proportion (Applied)',su:'Gravitational force F ∝ 1/d². When d = 2, F = 36. Find F when d = 6.',lv:'E',steps:[
    {lb:'Write the formula',dr:dQ10,ht:'<span class="lt le">Extended</span><p>F ∝ 1/d² means <b>F = k/d²</b>. Tripling the distance divides the force by 9.</p>'},
    {lb:'Find k',dr:dQ10,ht:'<div class="fm">36 = k/4  →  k = 144</div>'},
    {lb:'Formula',dr:dQ10,ht:'<div class="fm">F = 144/d²</div>'},
    {lb:'Evaluate at d = 6',dr:dQ10,ht:'<div class="fm">F = 144/36 = <b>4</b></div><p>Note: distance tripled (2→6), so F divides by 9: 36/9 = 4 ✓</p>'},
    {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var d1=rnd(2,3),k=d1*d1*pick([8,12,16,18,20,25]),F1=k/(d1*d1),d2=d1*rnd(2,3);return{question:'F ∝ 1/d². When d='+d1+', F='+F1+'. Find F when d='+d2+'.',hints:['k = F×d² = '+F1+'×'+d1*d1+' = '+k],ans:round2(k/(d2*d2)),tol:0.05,unit:'',working:'k='+k+', F='+k+'/'+d2*d2+'='+round2(k/(d2*d2))};})},
  ]}

function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}

document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
