<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Statistics · Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">← All Topics</a>
  <div class="ht">Statistics — Year 10</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div style="width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;">
      <div id="ey" style="font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;"></div>
      <h1 id="ti" style="font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;"></h1>
      <div id="su" style="font-size:14px;color:#6b5750;"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">← Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next →</button>
    </div>
  </div>
</div>
<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn();
    entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn};
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

/* Q1 — Mean median mode range */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var data=[4,7,3,7,9,2,7,6];
  var sorted=[2,3,4,6,7,7,7,9];
  // show data cards
  data.forEach(function(v,i){
    var x=48+i*50,y=50;
    var hi=(p>=1&&v===7);
    o.push(R(x-20,y-20,40,40,hi?'#fce8d8':'#fff5f0',hi?'#C0272D':'#ccc',hi?2:1));
    o.push(T(x,y+5,v,'#C0272D',18));
  });
  o.push(T(240,20,'Data: 4, 7, 3, 7, 9, 2, 7, 6','#241A17',13));
  if(p>=1){
    // sorted row
    sorted.forEach(function(v,i){
      var x=48+i*50,y=120;
      var med=(i===3||i===4);
      o.push(R(x-20,y-20,40,40,med?'#e8f4ff':'#f8f8f8',med?'#1a5a8a':'#ccc',med?2:1));
      o.push(T(x,y+5,v,med?'#1a5a8a':'#888',16));
    });
    o.push(T(240,85,'Sorted:','#888',12));
    o.push(T(240,148,'Median = mean of 4th and 5th values = (6+7)/2','#1a5a8a',12));
  }
  if(p>=2){
    o.push(R(30,170,420,34,'#fff5f0','#C0272D',1.5));
    o.push(T(50,192,'Mean = (4+7+3+7+9+2+7+6)/8 = 45/8 = 5.625','#C0272D',12,'start'));
  }
  if(p>=3){
    o.push(R(30,212,420,34,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(50,234,'Mode = 7   |   Median = 6.5   |   Range = 9−2 = 7','#1a7a3a',12,'start',true));
  }
  s.innerHTML=o.join('');
}

/* Q2 — Frequency table */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var rows=[['1',4],['2',7],['3',11],['4',6],['5',2]];
  var tx=80,th=36,ty=46;
  var colW=[70,80,80];
  // header row
  var hdrs=['Score (x)','Freq (f)','f \u00d7 x'];
  hdrs.forEach(function(h,c){
    var col=c===2?(p>=1?'#7A1418':'#999'):'#C0272D';
    o.push(R(tx+c*80,ty-32,78,30,col,col,0));
    o.push(T(tx+c*80+39,ty-32+20,h,'#fff',12,undefined,true));
  });
  // data rows
  rows.forEach(function(r,i){
    var y=ty+i*th;
    o.push(R(tx,y,78,th,'#fff','#ddd',1));      o.push(T(tx+39,y+th/2+5,r[0],'#241A17',14));
    o.push(R(tx+80,y,78,th,'#fff','#ddd',1));   o.push(T(tx+119,y+th/2+5,r[1],'#241A17',14));
    o.push(R(tx+160,y,78,th,p>=1?'#fff5f0':'#f8f8f8','#ddd',1));
    if(p>=1)o.push(T(tx+199,y+th/2+5,parseInt(r[0])*r[1],'#C0272D',14));
  });
  // totals row
  var totalF=30,totalFX=85;
  var ty2=ty+5*th;
  o.push(R(tx,ty2,78,th,'#fce8d8','#C0272D',2));    o.push(T(tx+39,ty2+th/2+5,'Total','#C0272D',12,undefined,true));
  o.push(R(tx+80,ty2,78,th,'#fce8d8','#C0272D',2)); o.push(T(tx+119,ty2+th/2+5,p>=1?totalF:'—','#C0272D',14,undefined,true));
  o.push(R(tx+160,ty2,78,th,'#fce8d8','#C0272D',2));o.push(T(tx+199,ty2+th/2+5,p>=1?totalFX:'—','#C0272D',14,undefined,true));
  // formula to the right — only show after totals visible
  if(p>=2)o.push(T(340,120,'Mean = \u03a3fx / \u03a3f','#C0272D',13,undefined,true));
  if(p>=2)o.push(T(340,148,'= 85 / 30','#C0272D',13,undefined,true));
  if(p>=3)o.push(T(340,176,'= 2.83','#1a7a3a',16,undefined,true));
  s.innerHTML=o.join('');
}

/* Q3 — Grouped data estimated mean */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var rows=[['10–20',15,8],['20–30',25,14],['30–40',35,11],['40–50',45,7]];
  var tw=80,ty=50;
  // headers
  ['Class','Midpt','Freq','f×mid'].forEach(function(h,i){
    o.push(R(40+i*100,ty-30,100,30,i===3&&p>=1?'#7A1418':'#C0272D','#C0272D',0));
    o.push(T(90+i*100,ty-15,h,'#fff',12,undefined,true));
  });
  rows.forEach(function(r,i){
    var y=ty+i*40;
    o.push(R(40,y,100,38,'#fff','#ccc',1));o.push(T(90,y+22,r[0],'#241A17',13));
    o.push(R(140,y,100,38,p>=1?'#fff5f0':'#fff','#ccc',1));o.push(T(190,y+22,r[1],p>=1?'#C0272D':'#aaa',13));
    o.push(R(240,y,100,38,'#fff','#ccc',1));o.push(T(290,y+22,r[2],'#241A17',13));
    o.push(R(340,y,100,38,p>=2?'#fff5f0':'#f8f8f8','#ccc',1));
    if(p>=2)o.push(T(390,y+22,r[1]*r[2],'#C0272D',13));
  });
  var totalF=40,totalFM=15*8+25*14+35*11+45*7; // =120+350+385+315=1170
  if(p>=2){
    o.push(R(240,ty+4*40,100,38,'#fce8d8','#C0272D',2));o.push(T(290,ty+4*40+22,totalF,'#C0272D',13,undefined,true));
    o.push(R(340,ty+4*40,100,38,'#fce8d8','#C0272D',2));o.push(T(390,ty+4*40+22,totalFM,'#C0272D',13,undefined,true));
  }
  if(p>=3){
    o.push(R(40,262,400,30,'#e8f8ee','#1a7a3a',2));
    o.push(T(240,282,'Estimated mean = 1170 / 40 = 29.25','#1a7a3a',13,undefined,true));
  }
  s.innerHTML=o.join('');
}

/* Q4 — Pie chart */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=180,cy=150,r=110;
  var slices=[{lbl:'Football',v:12,col:'#C0272D'},{lbl:'Basketball',v:8,col:'#1a5a8a'},{lbl:'Athletics',v:6,col:'#1a7a3a'},{lbl:'Swimming',v:4,col:'#C8922A'}];
  var total=30;
  var angle=-90;
  slices.forEach(function(sl,i){
    var deg=sl.v/total*360,rad=Math.PI/180;
    var a1=angle*rad,a2=(angle+deg)*rad;
    var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
    var lg=deg>180?1:0;
  // problem always visible at step 0
    o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
      o.push('<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+r+','+r+' 0 '+lg+',1 '+x2+','+y2+' Z" fill="'+sl.col+'" stroke="#fff" stroke-width="2" opacity="0.85"/>');
      var ma=(angle+deg/2)*rad;
      o.push(T(cx+r*0.65*Math.cos(ma),cy+r*0.65*Math.sin(ma)+4,sl.v,'#fff',13,undefined,true));
    }
    angle+=deg;
    // legend
    o.push(R(330,60+i*42,16,16,sl.col,sl.col,0));
    o.push(T(354,73+i*42,sl.lbl,'#241A17',12,'start'));
    if(p>=2)o.push(T(440,73+i*42,Math.round(sl.v/total*360)+'°','#C0272D',12,'start'));
  });
  o.push(T(180,285,'30 students — favourite sport','#888',12));
  if(p>=1&&p<2)o.push(T(180,20,'Each sector angle = (freq/total) × 360°','#C0272D',12));
  s.innerHTML=o.join('');
}

/* Q5 — Bar chart / histogram */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var bars=[{lbl:'Mon',v:8},{lbl:'Tue',v:14},{lbl:'Wed',v:11},{lbl:'Thu',v:16},{lbl:'Fri',v:20}];
  var ox=60,oy=250,bw=52,gap=18,maxH=160,maxV=20;
  // axes
  o.push(L(ox,oy-maxH-10,ox,oy,'#ccc',2));
  o.push(L(ox,oy,ox+5*(bw+gap)+10,oy,'#ccc',2));
  // y gridlines
  [0,5,10,15,20].forEach(function(v){
    var y=oy-v/maxV*maxH;
    o.push(L(ox,y,ox+5*(bw+gap),y,'#eee',1));
    o.push(T(ox-8,y+4,v,'#aaa',11,'end'));
  });
  bars.forEach(function(b,i){
    var x=ox+i*(bw+gap)+gap/2;
    var h=b.v/maxV*maxH;
    var hi=(p>=2&&b.v===Math.max.apply(null,bars.map(function(x){return x.v;})));
    o.push(R(x,oy-h,bw,h,hi?'#fce8d8':'#e8f4ff',hi?'#C0272D':'#1a5a8a',hi?2:1.5));
    if(p>=1)o.push(T(x+bw/2,oy-(h+6),b.v,'#C0272D',11,undefined,true));
    o.push(T(x+bw/2,oy+14,b.lbl,'#888',11));
  });
  o.push(T(240,16,'Daily sales for one week','#241A17',13,undefined,true));
  if(p>=2)o.push(T(240,38,'Modal day = Friday (highest bar = 20)','#C0272D',12));
  if(p>=3){
    var tot=bars.reduce(function(a,b){return a+b.v;},0);
    o.push(T(240,56,'Total = 69,  Mean daily sales = 69/5 = 13.8','#1a7a3a',12));
  }
  s.innerHTML=o.join('');
}

/* Q6 — Scatter graph */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var pts=[[2,30],[3,45],[4,40],[5,60],[6,65],[7,75],[8,85],[9,80],[10,95]];
  var ox=50,oy=260,sx=35,sy=2.2;
  // axes
  o.push(L(ox,20,ox,oy,'#ccc',1.5));o.push(L(ox,oy,440,oy,'#ccc',1.5));
  // labels
  for(var i=0;i<=10;i++)o.push(T(ox+i*sx,oy+14,i,'#aaa',10));
  [0,20,40,60,80,100].forEach(function(v){
    var y=oy-v*sy;o.push(L(ox,y,440,y,'#f0f0f0',1));o.push(T(ox-8,y+4,v,'#aaa',10,'end'));
  });
  o.push(T(240,290,'Hours studied','#888',12));
  o.push(T(20,150,'Score','#888',12,'middle'));
  // points
  pts.forEach(function(pt,i){
    var x=ox+pt[0]*sx,y=oy-pt[1]*sy;
    o.push('<circle cx="'+x+'" cy="'+y+'" r="5" fill="'+(p>=1?'#C0272D':'#ccc')+'" stroke="#fff" stroke-width="1.5"/>');
  });
  // line of best fit (approx y = 8.5x + 15)
  if(p>=2){
    var x1=ox+1*sx,y1=oy-(8.5*1+15)*sy,x2=ox+10*sx,y2=oy-(8.5*10+15)*sy;
    o.push(L(x1,y1,x2,y2,'#1a5a8a',2));
    o.push(T(380,40,'Line of best fit','#1a5a8a',11,'start'));
  }
  if(p>=3)o.push(T(240,20,'Strong positive correlation — more study → higher score','#C0272D',12,undefined,true));
  s.innerHTML=o.join('');
}

/* Q7 — Cumulative frequency */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var pts=[[10,0],[20,6],[30,18],[40,34],[50,46],[60,50]];
  var ox=60,oy=260,sx=32,sy=4.6;
  // axes
  o.push(L(ox,20,ox,oy,'#ccc',1.5));o.push(L(ox,oy,ox+5*sx*10,oy,'#ccc',1.5));
  // y axis
  [0,10,20,30,40,50].forEach(function(v){
    var y=oy-v*sy;o.push(L(ox,y,ox+5*32*10/5,y,'#f0f0f0',1));o.push(T(ox-8,y+4,v,'#aaa',10,'end'));
  });
  // x labels
  pts.forEach(function(pt){o.push(T(ox+(pt[0]-10)*sx,oy+14,pt[0],'#aaa',10));});
  // curve
  if(p>=1){
    var path='M';
    pts.forEach(function(pt,i){var x=ox+(pt[0]-10)*sx,y=oy-pt[1]*sy;path+=(i===0?'':' L')+x+','+y;});
    o.push('<path d="'+path+'" fill="none" stroke="#C0272D" stroke-width="2.5"/>');
    pts.forEach(function(pt){var x=ox+(pt[0]-10)*sx,y=oy-pt[1]*sy;o.push('<circle cx="'+x+'" cy="'+y+'" r="4" fill="#C0272D" stroke="#fff" stroke-width="1.5"/>');});
  }
  // median line at n/2 = 25
  if(p>=2){
    var medy=oy-25*sy;
    o.push(L(ox,medy,400,medy,'#C8922A',1.5,'5,4'));
    o.push(T(ox-8,medy+4,25,'#C8922A',10,'end'));
    // read off x ≈ 34
    o.push(L(ox+(34-10)*sx,medy,ox+(34-10)*sx,oy,'#C8922A',1.5,'5,4'));
    o.push(T(ox+(34-10)*sx,oy+14,'34','#C8922A',11,undefined,true));
  }
  if(p>=3)o.push(T(240,20,'Median ≈ 34  |  LQ ≈ 26  |  UQ ≈ 43  |  IQR ≈ 17','#C0272D',11,undefined,true));
  o.push(T(240,285,'Time (minutes)','#888',11));
  s.innerHTML=o.join('');
}

function dQ8(p){

  // marbles
  var positions=[[170,185],[195,200],[220,210],[245,205],[270,198],[195,175],[225,178],[255,180],[215,225],[265,222]];
  var cols=[];

  }
  if(p>=2){

    o.push(T(350,40,'P(Blue) = 3/10','#1a5a8a',13,'middle',true));

  if(p>=3){
    o.push(R(30,58,420,30,'#e8f8ee','#1a7a3a',1.5));

  }

}

/* Q9 — Combined events / sample space */
function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // two dice sample space grid 6x6
  var ox=80,oy=260,cs=28;
  o.push(T(240,16,'Sample space: sum of two dice','#241A17',13,undefined,true));
  // col headers (die 2)
  for(var c=1;c<=6;c++)o.push(T(ox+c*cs,oy-7*cs-8,c,'#1a5a8a',11));
  // row headers (die 1)
  for(var r=1;r<=6;r++)o.push(T(ox-8,oy-(7-r)*cs,r,'#C0272D',11,'end'));
  for(var r=1;r<=6;r++){
    for(var c=1;c<=6;c++){
      var sum=r+c;
      var hi=(p>=2&&sum===7);
      var x=ox+c*cs-cs/2,y=oy-(7-r)*cs-cs/2;
      o.push(R(x-12,y-12,24,24,hi?'#fce8d8':p>=1?'#f8f8f8':'#fff',hi?'#C0272D':'#ddd',hi?2:1));
      if(p>=1)o.push(T(x,y+4,sum,hi?'#C0272D':'#888',10));
    }
  }
  if(p>=2)o.push(T(240,270,'P(sum=7) = 6/36 = 1/6 (highlighted)','#C0272D',12,undefined,true));
  if(p>=3)o.push(T(240,288,'P(sum>9) = 6/36 = 1/6','#1a5a8a',12,undefined,true));
  s.innerHTML=o.join('');
}

/* Q10 — Tree diagram */
function dQ10(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Two draws without replacement from 4R 2B
  var ox=60,my=150;
  // first branches
  o.push(L(ox,my,ox+120,my-70,'#C0272D',p>=1?2:1.5));
  o.push(L(ox,my,ox+120,my+70,'#1a5a8a',p>=1?2:1.5));
  if(p>=1){
    o.push(T(ox+50,my-48,'4/6','#C0272D',12));
    o.push(T(ox+50,my+48,'2/6','#1a5a8a',12));
    o.push(T(ox+130,my-72,'R','#C0272D',13,undefined,true));
    o.push(T(ox+130,my+72,'B','#1a5a8a',13,undefined,true));
  }
  // second branches from R
  if(p>=2){
    o.push(L(ox+120,my-70,ox+240,my-110,'#C0272D',2));
    o.push(L(ox+120,my-70,ox+240,my-35,'#1a5a8a',2));
    o.push(T(ox+165,my-104,'3/5','#C0272D',11));
    o.push(T(ox+165,my-42,'2/5','#1a5a8a',11));
    o.push(T(ox+250,my-112,'R','#C0272D',12,undefined,true));
    o.push(T(ox+250,my-33,'B','#1a5a8a',12,undefined,true));
    // second branches from B
    o.push(L(ox+120,my+70,ox+240,my+35,'#C0272D',2));
    o.push(L(ox+120,my+70,ox+240,my+110,'#1a5a8a',2));
    o.push(T(ox+165,my+40,'4/5','#C0272D',11));
    o.push(T(ox+165,my+102,'1/5','#1a5a8a',11));
    o.push(T(ox+250,my+33,'R','#C0272D',12,undefined,true));
    o.push(T(ox+250,my+112,'B','#1a5a8a',12,undefined,true));
  }
  // outcomes
  if(p>=3){
    var outcomes=[['R,R','4/6 × 3/5 = 12/30',my-112],['R,B','4/6 × 2/5 = 8/30',my-33],['B,R','2/6 × 4/5 = 8/30',my+33],['B,B','2/6 × 1/5 = 2/30',my+112]];
    outcomes.forEach(function(oc){
      o.push(T(ox+330,oc[2]+4,oc[0],'#241A17',11,'start'));
      o.push(T(ox+330,oc[2]+16,oc[1],'#888',10,'start'));
    });
  }
  if(p>=4){
    o.push(R(30,268,420,24,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,284,'P(both same) = 12/30 + 2/30 = 14/30 = 7/15','#1a7a3a',12,undefined,true));
  }
  s.innerHTML=o.join('');
}

function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){
  bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;

  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';
}
