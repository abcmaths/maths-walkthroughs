<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.badge{display:inline-block;font-size:9px;font-weight:700;padding:1px 5px;border-radius:8px;margin-top:3px;}
.bf{background:#e8f4ff;color:#1a5a8a;}
.be{background:#fce8d8;color:#7A1418;}
.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}
.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:"›";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}

.lt{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;margin-bottom:8px;}
.lf{background:#e8f4ff;color:#1a5a8a;}
.le{background:#fce8d8;color:#7A1418;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn();
    entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn};
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){var el=document.getElementById('dg');el.innerHTML='';return el;}
function T(x,y,txt,c,sz,a,bold){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Georgia,serif" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?'700':'400')+'">'+txt+'</text>';}
function B(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}
function R(x,y,w,h,fill,stroke,sw){return B(x,y,w,h,fill,stroke,sw);}
function LN(x1,y1,x2,y2,c,w,d){c=c||'#C0272D';w=w||2;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(LN(80,130,400,130,'#C0272D',3));o.push(LN(240,130,240,175,'#888',2));
  o.push('<polygon points="220,195 260,195 240,175" fill="#888"/>');
  o.push(B(60,78,110,52,'#fff5f0','#C0272D',2));o.push(T(115,96,'3x + 2','#C0272D',16));
  o.push(LN(80,78,80,130,'#aaa',1.5));o.push(LN(168,78,168,130,'#aaa',1.5));
  o.push(B(310,78,110,52,'#e8f4ff','#1a5a8a',2));o.push(T(365,96,'17','#1a5a8a',16));
  o.push(LN(310,78,310,130,'#aaa',1.5));o.push(LN(420,78,420,130,'#aaa',1.5));
  o.push(T(240,230,'Both sides must stay equal','#888',12));
  if(p>=1){o.push(T(115,148,'−2','#C8922A',13));o.push(T(365,148,'−2','#C8922A',13));o.push(T(240,165,'Subtract 2 from both sides','#C8922A',11));}
  if(p>=2){o.push(B(60,30,110,40,'#fff0e8','#C0272D',2));o.push(T(115,56,'3x','#C0272D',15));o.push(B(310,30,110,40,'#e8f4ff','#1a5a8a',2));o.push(T(365,56,'15','#1a5a8a',15));}
  if(p>=3)o.push(T(240,22,'÷ 3 both sides  →  x = 5','#C0272D',13,'middle',true));
  s.innerHTML=o.join('');
}

function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=80,oy=80,W=320,H=150,mid=180,h1=75;
  o.push(B(ox,oy,W,H,'#fff5f0','#C0272D',2));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,36,'(x + 2)(x + 3)','#C0272D',16,'middle',true));
if(p>=1){o.push(LN(mid,oy,mid,oy+H,'#C0272D',1.5,'4,3'));o.push(LN(ox,oy+h1,ox+W,oy+h1,'#C0272D',1.5,'4,3'));}
  o.push(T((ox+mid)/2,oy-10,'x','#C0272D',15));o.push(T((mid+ox+W)/2,oy-10,'+3','#C0272D',15));
  o.push(T(ox-18,oy+h1/2,'x','#C0272D',15,'end'));
  if(p>=1)o.push(T(ox-18,oy+h1+h1/2,'+2','#C0272D',15,'end'));
  if(p>=2){o.push(T((ox+mid)/2,oy+h1/2+5,'x²','#1a5a8a',18));o.push(T((mid+ox+W)/2,oy+h1/2+5,'3x','#1a5a8a',18));}
  if(p>=3){o.push(T((ox+mid)/2,oy+h1+h1/2+5,'2x','#1a7a3a',18));o.push(T((mid+ox+W)/2,oy+h1+h1/2+5,'6','#1a7a3a',18));}
  if(p>=4)o.push(T(240,222,'x² + 3x + 2x + 6  =  x² + 5x + 6','#C0272D',13,'middle',true));
  s.innerHTML=o.join('');
}

function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,35,'x² + 7x + 12','#C0272D',18,'middle',true));
  o.push(T(240,55,'Find two numbers that multiply to 12 and add to 7:','#888',12));
  if(p>=1){
    o.push(B(60,65,160,44,'#fff5f0','#C0272D',1.5));o.push(T(140,82,'Multiply to: 12','#241A17',13));o.push(T(140,97,'(constant term)','#888',11));
    o.push(B(260,65,160,44,'#e8f4ff','#1a5a8a',1.5));o.push(T(340,82,'Add to: 7','#241A17',13));o.push(T(340,97,'(x coefficient)','#888',11));
  }
  if(p>=2){
    var pairs=[[1,12],[2,6],[3,4]];
    pairs.forEach(function(pr,i){var y=125+i*34,hit=(pr[0]+pr[1]===7);
      o.push(B(60,y,160,28,hit?'#e8f8ee':'#fff',hit?'#1a7a3a':'#ccc',hit?2:1));o.push(T(140,y+18,pr[0]+' × '+pr[1]+' = '+pr[0]*pr[1],hit?'#1a7a3a':'#888',13));
      o.push(B(260,y,160,28,hit?'#e8f8ee':'#fff',hit?'#1a7a3a':'#ccc',hit?2:1));o.push(T(340,y+18,pr[0]+' + '+pr[1]+' = '+(pr[0]+pr[1]),hit?'#1a7a3a':'#888',13));
    });
  }
  if(p>=3)o.push(T(240,235,'3 + 4 satisfies both  →  (x + 3)(x + 4)','#C0272D',13,'middle',true));
  s.innerHTML=o.join('');
}

function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=60,oy=220,sx=35,sy=28;
  o.push(LN(ox,20,ox,oy+10,'#ccc',1.5));o.push(LN(ox-10,oy,450,oy,'#ccc',1.5));
  for(var i=0;i<=10;i++)o.push(T(ox+i*sx,oy+16,i,'#aaa',10));
  for(var j=0;j<=7;j++)o.push(T(ox-14,oy-j*sy,j,'#aaa',10));
  if(p>=1){o.push(LN(ox,oy-1*sy,ox+8*sx,oy-9*sy,'#C0272D',2));o.push(T(ox+8*sx+5,oy-9*sy-5,'y=x+1','#C0272D',12,'start'));}
  if(p>=2){o.push(LN(ox+1*sx,oy-1*sy,ox+6*sx,oy-11*sy,'#1a5a8a',2));o.push(T(ox+6*sx+5,oy-11*sy-5,'y=2x−1','#1a5a8a',12,'start'));}
  if(p>=3){
    var ix=ox+2*sx,iy=oy-3*sy;
    o.push('<circle cx="'+ix+'" cy="'+iy+'" r="6" fill="#C8922A" stroke="#fff" stroke-width="2"/>');
    o.push(T(ix+12,iy-10,'(2, 3)','#C8922A',13,'start'));
    o.push(LN(ix,iy,ix,oy,'#C8922A',1,'3,3'));o.push(LN(ox,iy,ix,iy,'#C8922A',1,'3,3'));
  }
  s.innerHTML=o.join('');
}

function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var lx=60,y=130,sx=40;
  o.push(LN(lx,y,420,y,'#ccc',2));
  for(var i=-2;i<=8;i++){var x=lx+(i+2)*sx;o.push(LN(x,y-6,x,y+6,'#888',1.5));o.push(T(x,y+20,i,'#888',12));}
  o.push(T(240,50,'Solve:  2x − 3 > 5','#C0272D',18,'middle',true));
  if(p>=1)o.push(T(240,80,'Add 3 to both sides:  2x > 8','#241A17',14));
  if(p>=2)o.push(T(240,104,'Divide by 2:  x > 4','#241A17',14));
  if(p>=3){
    var x4=lx+(4+2)*sx;
    o.push('<circle cx="'+x4+'" cy="'+y+'" r="7" fill="none" stroke="#C0272D" stroke-width="2.5"/>');
    o.push(LN(x4+8,y,400,y,'#C0272D',3));
    o.push('<polygon points="400,'+y+' 390,'+(y-6)+' 390,'+(y+6)+'" fill="#C0272D"/>');
    o.push(T(x4,y-22,'x > 4','#C0272D',14,'middle',true));
    o.push(T(x4,y+40,'Open circle = not included','#888',11));
  }
  s.innerHTML=o.join('');
}

function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(B(100,60,280,120,'#fff5f0','#C0272D',2));
  o.push(T(240,50,'(2x + 5) cm','#C0272D',14));o.push(T(240,200,'(2x + 5) cm','#C0272D',14));
  o.push(T(400,122,'(x + 3) cm','#C0272D',13,'start'));o.push(T(82,122,'(x+3)','#C0272D',12,'end'));

  if(p>=1)o.push(T(240,36,'2(2x+5) + 2(x+3) = 62','#241A17',14,'middle',true));
  if(p>=2){o.push(T(240,22,'4x+10+2x+6 = 62','#241A17',12));o.push(T(240,8,'6x + 16 = 62','#C0272D',13,'middle',true));}
  if(p>=3)o.push(T(240,240,'6x = 46  →  x = 46/6 ≈ 7.67','#C0272D',12));
  s.innerHTML=o.join('');
}

function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,35,'Simplify:  (x² − 9) / (x + 3)','#C0272D',17,'middle',true));
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
  o.push(T(240,36,'(x + 2)(x + 3)','#C0272D',16,'middle',true));
if(p>=1){o.push(B(80,55,320,55,'#fff5f0','#C0272D',1.5));o.push(T(240,76,'x² − 9 is a difference of two squares','#241A17',13));o.push(T(240,101,'x² − 9 = (x + 3)(x − 3)','#1a5a8a',15,'middle',true));}
  if(p>=2){o.push(T(240,138,'(x+3)(x−3) / (x+3)','#241A17',15));o.push(LN(148,132,196,146,'#C8922A',2));o.push(LN(312,132,360,146,'#C8922A',2));o.push(T(240,160,'Cancel (x+3) top and bottom','#C8922A',12));}
  if(p>=3){o.push(B(160,175,160,42,'#e8f8ee','#1a7a3a',2));o.push(T(240,202,'= x − 3','#1a7a3a',18,'middle',true));o.push(T(240,235,'(valid for x ≠ −3)','#888',11));}
  s.innerHTML=o.join('');
}

function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,35,'Make x the subject:   y = 3x − 7','#C0272D',17,'middle',true));
  var steps=[{txt:'y = 3x − 7',note:'Start',col:'#241A17'},{txt:'y + 7 = 3x',note:'Add 7 to both sides',col:'#1a5a8a'},{txt:'x = (y + 7) / 3',note:'Divide both sides by 3',col:'#1a7a3a'}];
  steps.forEach(function(st,i){
    if(p>=i+1){
      o.push(B(80,55+i*58,320,46,i===2?'#e8f8ee':'#fff5f0',i===2?'#1a7a3a':'#C0272D',i===2?2:1.5));
      o.push(T(240,77+i*58,st.txt,st.col,16,'middle',i===2));
      o.push(T(240,94+i*58,'← '+st.note,'#888',11));
    }
  });
  if(p>=3)o.push(T(240,242,'Check: y=8 → x=15/3=5. Test: 3(5)−7=8 ✓','#888',12));
  s.innerHTML=o.join('');
}

function dQ9(p){
  var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti+'<br><span class="badge '+(q.lv==='F'?'bf':'be')+'">'+(q.lv==='F'?'Foundation':'Extended')+'</span>';b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});
}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){
  bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
