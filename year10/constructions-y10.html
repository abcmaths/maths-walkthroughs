:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(genOrObj){
  var genFn=typeof genOrObj==='function'?genOrObj:function(){return genOrObj;};
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">\u2714 Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn();
    entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn};
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){
      fb.className='try-fb fb ok';fb.innerHTML='\u2713 Correct! \u00a0'+o.working;
    }else{fb.className='try-fb fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function Txt(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function Ln(x1,y1,x2,y2,c,w,d){c=c||'#241A17';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function Rc(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="2"/>';}
function Ci(cx,cy,r,fill,stroke,sw){fill=fill||'none';stroke=stroke||'#C0272D';sw=sw||1.5;return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'"/>';}
function Arc(cx,cy,r,a1deg,a2deg,col,sw,dash){
  col=col||'#C0272D';sw=sw||1.5;
  var a1=a1deg*Math.PI/180,a2=a2deg*Math.PI/180;
  var x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
  var x2=cx+r*Math.cos(a2),y2=cy+r*Math.sin(a2);
  var diff=((a2deg-a1deg)+360)%360;
  var laf=diff>180?1:0;
  return '<path d="M'+x1.toFixed(1)+','+y1.toFixed(1)+' A'+r+','+r+' 0 '+laf+',1 '+x2.toFixed(1)+','+y2.toFixed(1)+'" fill="none" stroke="'+col+'" stroke-width="'+sw+'" '+(dash?'stroke-dasharray="'+dash+'"':'')+'/>';
}


/* ═══════════════════════════════════════════
   Q1  PERPENDICULAR BISECTOR
   A=(110,200)  B=(370,200)  midpoint=(240,200)
   compass radius r=160 (bigger than half of AB=130)
   intersection y-offsets: sqrt(160^2 - 130^2) = sqrt(25600-16900)=sqrt(8700)=93.3
   So intersections at (240, 200-93) and (240, 200+93)
════════════════════════════════════════════ */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=110,ay=200, bx=370,by=200;
  var mx=(ax+bx)/2, my=ay; // midpoint (240,200)
  var r=160; // compass radius - must be > half AB (130)
  // intersection points: offset from midpoint
  var halfAB=(bx-ax)/2; // 130
  var yOff=Math.round(Math.sqrt(r*r - halfAB*halfAB)); // 93
  var ix=mx, iy1=my-yOff, iy2=my+yOff; // (240,107) and (240,293)

  // base line AB
  o.push(Ln(ax,ay,bx,by,'#241A17',2.5));
  o.push(Txt(ax-16,ay+4,'A','#241A17',13,'end',true));
  o.push(Txt(bx+16,by+4,'B','#241A17',13,'start',true));
  o.push(Txt(mx,ay+20,'AB = 5 cm','#888',11,'middle',false));

  if(p>=1){
    // Arc from A - sweep from roughly top-right to bottom-right passing through both intersection points
    // Top intersection relative to A: angle = atan2(iy1-ay, ix-ax) = atan2(-93,130) ~ -35.6 deg
    // Bottom intersection: atan2(93,130) ~ +35.6 deg
    // Draw arc from -80 to +80 degrees (SVG clockwise from right)
    o.push(Arc(ax,ay,r,-75,75,'#C8922A',1.5,'5,3'));
    o.push(Txt(ax-10,ay-r-8,'r','#C8922A',11,'middle',false));
  }
  if(p>=2){
    // Arc from B - mirror: from about 105 to 255 degrees
    o.push(Arc(bx,by,r,105,255,'#C8922A',1.5,'5,3'));
    // Mark the two intersection points
    o.push(Ci(ix,iy1,5,'#C0272D','#C0272D',0));
    o.push(Ci(ix,iy2,5,'#C0272D','#C0272D',0));
  }
  if(p>=3){
    // Draw the perpendicular bisector through the two intersections
    o.push(Ln(ix,iy1-10,ix,iy2+10,'#C0272D',2.5));
    // right-angle mark at midpoint
    o.push('<rect x="'+(mx)+'" y="'+(my-12)+'" width="12" height="12" fill="none" stroke="#1a5a8a" stroke-width="1.5"/>');
    o.push(Txt(mx+16,my-28,'Perpendicular bisector','#C0272D',10,'start',true));
    o.push(Txt(mx,my+36,'Every point on this line is equidistant from A and B','#888',10,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* ═══════════════════════════════════════════
   Q2  ANGLE BISECTOR
   Vertex V=(100,250). Two rays going upper-right.
   Ray 1 at -10 deg (nearly horizontal right)
   Ray 2 at -60 deg (steeply up-right)
   Step 1: arc of r1=80 from V marks P1 on ray1, P2 on ray2
   Step 2: arcs of r2=70 from P1 and P2 - they intersect on bisector
   Bisector is at -35 deg from V
════════════════════════════════════════════ */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var vx=100, vy=250;
  var ang1=-10*D; // ray 1 angle (SVG: negative=up)
  var ang2=-60*D; // ray 2 angle
  var angBis=(-10-60)/2*D; // -35 deg
  var rayLen=320;
  var r1=80; // first compass radius

  // P1 and P2 on the two rays at distance r1 from V
  var p1x=vx+r1*Math.cos(ang1), p1y=vy+r1*Math.sin(ang1); // on ray1
  var p2x=vx+r1*Math.cos(ang2), p2y=vy+r1*Math.sin(ang2); // on ray2

  // Draw the two rays
  o.push(Ln(vx,vy,vx+rayLen*Math.cos(ang1),vy+rayLen*Math.sin(ang1),'#241A17',2.5));
  o.push(Ln(vx,vy,vx+rayLen*Math.cos(ang2),vy+rayLen*Math.sin(ang2),'#241A17',2.5));
  o.push(Txt(vx-14,vy+14,'V','#241A17',13,'end',true));

  if(p>=1){
    // Step 1: arc from V cutting both rays
    // Ray1 at -10 deg, ray2 at -60 deg — arc sweeps from -70 to 0 deg
    o.push(Arc(vx,vy,r1,-70,5,'#C8922A',2,'5,3'));
    // Mark P1 and P2
    o.push(Ci(p1x,p1y,5,'#C8922A','#C8922A',0));
    o.push(Ci(p2x,p2y,5,'#C8922A','#C8922A',0));
    o.push(Txt(p1x+8,p1y+4,'P1','#C8922A',9,'start',false));
    o.push(Txt(p2x+4,p2y-8,'P2','#C8922A',9,'start',false));
  }
  if(p>=2){
    // Step 2: equal arcs from P1 and P2
    // They must intersect on the bisector — use r2=70
    // Bisector at -35 deg, distance from V: the intersection point Q
    // Q is approx at v + ~120*(cos(-35),sin(-35))
    var r2=70;
    // From P1, sweep arc covering the bisector direction
    // P1 is at (-10 deg, r1=80 from V). Arc from P1 sweeping towards bisector region
    o.push(Arc(p1x,p1y,r2,-170,-60,'#1a5a8a',1.5,'4,3'));
    // From P2, sweep arc covering same region
    o.push(Arc(p2x,p2y,r2,-30,60,'#1a5a8a',1.5,'4,3'));

    // Calculate actual intersection: find Q where dist(Q,P1)=dist(Q,P2)=r2
    // P1=(p1x,p1y), P2=(p2x,p2y)
    // Q lies on bisector ray from V at angle angBis
    // Parametrically Q=(vx+t*cos(angBis), vy+t*sin(angBis))
    // dist(Q,P1)^2=r2^2 => (vx+t*cosB-p1x)^2+(vy+t*sinB-p1y)^2=r2^2
    var cosB=Math.cos(angBis), sinB=Math.sin(angBis);
    var dx1=vx-p1x, dy1=vy-p1y;
    // expand: (dx1+t*cosB)^2+(dy1+t*sinB)^2=r2^2
    // t^2 + 2t(dx1*cosB+dy1*sinB) + (dx1^2+dy1^2-r2^2)=0
    var a=1, bv=2*(dx1*cosB+dy1*sinB), cv=dx1*dx1+dy1*dy1-r2*r2;
    var disc=bv*bv-4*a*cv;
    var t=(-bv-Math.sqrt(disc))/(2*a); // take smaller t (closer to V)
    if(t<0) t=(-bv+Math.sqrt(disc))/(2*a);
    var qx=vx+t*cosB, qy=vy+t*sinB;
    o.push(Ci(qx,qy,6,'#C0272D','#C0272D',0));
    o.push(Txt(qx+10,qy-8,'Q','#C0272D',10,'start',true));
  }
  if(p>=3){
    // Draw the bisector line through V and Q, extended
    o.push(Ln(vx,vy,vx+260*Math.cos(angBis),vy+260*Math.sin(angBis),'#C0272D',2.5));
    o.push(Txt(vx+270*Math.cos(angBis)+8,vy+270*Math.sin(angBis),'Angle bisector','#C0272D',10,'start',true));
    o.push(Txt(vx+140,vy-30,'Angle split equally','#888',10,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* ═══════════════════════════════════════════
   Q3  TRIANGLE SSS  AB=6cm(240px) AC=5cm(200px) BC=4cm(160px)
════════════════════════════════════════════ */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=80, ay=240, bx=320, by=240;
  var AB=bx-ax, AC=200, BC=160; // pixel lengths
  // C position by cosine rule on A: cosA=(AB^2+AC^2-BC^2)/(2*AB*AC)
  var cosA=(AB*AB+AC*AC-BC*BC)/(2*AB*AC);
  var angA=Math.acos(cosA); // angle at A
  var cx=ax+AC*Math.cos(angA), cy=ay-AC*Math.sin(angA);

  o.push(Ln(ax,ay,bx,by,'#241A17',2.5));
  o.push(Txt(ax-14,ay+14,'A','#C0272D',13,'end',true));
  o.push(Txt(bx+14,by+14,'B','#C0272D',13,'start',true));
  o.push(Txt((ax+bx)/2,ay+18,'6 cm','#241A17',11,'middle',false));

  if(p>=1){
    // Arc from A radius AC=200
    o.push(Arc(ax,ay,AC,-50,10,'#C8922A',1.5,'5,3'));
    o.push(Txt(ax+60,ay-185,'5 cm','#C8922A',10,'start',false));
  }
  if(p>=2){
    // Arc from B radius BC=160
    o.push(Arc(bx,by,BC,130,195,'#1a5a8a',1.5,'5,3'));
    o.push(Txt(bx-170,ay-85,'4 cm','#1a5a8a',10,'end',false));
    // Mark intersection C
    o.push(Ci(cx,cy,6,'#C0272D','#C0272D',0));
    o.push(Txt(cx,cy-14,'C','#C0272D',13,'middle',true));
  }
  if(p>=3){
    o.push(Ln(ax,ay,cx,cy,'#C0272D',2));
    o.push(Ln(bx,by,cx,cy,'#C0272D',2));
    o.push(Txt((ax+cx)/2-12,(ay+cy)/2,'5 cm','#888',10,'end',false));
    o.push(Txt((bx+cx)/2+10,(by+cy)/2,'4 cm','#888',10,'start',false));
  }
  s.innerHTML=o.join('');
}

/* ═══════════════════════════════════════════
   Q4  TRIANGLE SAS  AB=7cm(280px) angle A=50deg AC=5cm(200px)
════════════════════════════════════════════ */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=80, ay=240, bx=360, by=240;
  var AC=200;
  var angA=50*D; // 50 degrees, going upward (SVG y flipped)
  var cx=ax+AC*Math.cos(-angA), cy=ay+AC*Math.sin(-angA); // negative because up in SVG

  o.push(Ln(ax,ay,bx,by,'#241A17',2.5));
  o.push(Txt(ax-14,ay+14,'A','#C0272D',13,'end',true));
  o.push(Txt(bx+14,by+14,'B','#C0272D',13,'start',true));
  o.push(Txt((ax+bx)/2,ay+18,'7 cm','#241A17',11,'middle',false));

  if(p>=1){
    // Show the 50 degree angle arc at A
    // Ray AB is at 0 degrees (right). Ray AC is at -50 deg (up-right). Arc from 0 to -50.
    o.push(Arc(ax,ay,60,-50,0,'#C8922A',1.5,'5,3'));
    o.push(Txt(ax+72,ay-22,'50°','#C8922A',12,'start',false));
  }
  if(p>=2){
    // Draw AC ray and mark 5cm
    o.push(Ln(ax,ay,cx,cy,'#C0272D',2.5));
    o.push(Ci(cx,cy,6,'#C0272D','#C0272D',0));

/* ═══════════════════════════════════════════
   Q5  LOCUS: equidistant from two points
   A=(140,160)  B=(340,160)  midpoint=(240,160)
   Show arcs from A and B of same radius that VISIBLY CROSS
   Use r=120 (half AB=100, so arcs will cross above and below)
   yOff = sqrt(120^2-100^2) = sqrt(14400-10000) = sqrt(4400) = 66.3
════════════════════════════════════════════ */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=140, ay=160, bx=340, by=160;
  var mx=(ax+bx)/2, my=ay; // (240,160)
  var r=120;
  var halfAB=(bx-ax)/2; // 100
  var yOff=Math.round(Math.sqrt(r*r-halfAB*halfAB)); // 66

  o.push(Ci(ax,ay,6,'#C0272D','#C0272D',0));
  o.push(Ci(bx,by,6,'#1a5a8a','#1a5a8a',0));
  o.push(Txt(ax-14,ay-12,'A','#C0272D',13,'end',true));
  o.push(Txt(bx+14,by-12,'B','#1a5a8a',13,'start',true));
  o.push(Ln(ax,ay,bx,by,'#888',1,'4,3'));
  o.push(Txt(mx,ay+16,'AB = 4 cm','#888',10,'middle',false));

  if(p>=1){
    // Arc from A — sweeps from above-right to below-right, passing through both crossings
    // Crossing above: angle from A = atan2(-(yOff), halfAB) ~ atan2(-66,100) ~ -33 deg
    // Crossing below: atan2(yOff, halfAB) ~ +33 deg
    // Sweep from -70 to +70 to show both crossings clearly
    o.push(Arc(ax,ay,r,-70,70,'#C8922A',1.5,'5,3'));
    o.push(Txt(ax+30,ay-r-10,'r','#C8922A',11,'middle',false));
  }
  if(p>=2){
    // Arc from B — sweeps from above-left to below-left
    o.push(Arc(bx,by,r,110,250,'#C8922A',1.5,'5,3'));
    // Mark the two crossing points
    o.push(Ci(mx,my-yOff,6,'#C0272D','#C0272D',0)); // top crossing
    o.push(Ci(mx,my+yOff,6,'#C0272D','#C0272D',0)); // bottom crossing
  }
  if(p>=3){
    // Draw perpendicular bisector through the two crossings
    o.push(Ln(mx,my-yOff-30,mx,my+yOff+30,'#C0272D',2.5));
    // right angle mark
    o.push('<rect x="'+mx+'" y="'+(my-12)+'" width="12" height="12" fill="none" stroke="#1a5a8a" stroke-width="1.5"/>');
    o.push(Txt(mx+16,my-40,'Perpendicular bisector of AB','#C0272D',10,'start',true));
    o.push(Rc(30,235,420,54,'#e8f8ee','#1a7a3a',1.5));
    o.push(Txt(240,255,'Locus = all points equidistant from A and B','#1a7a3a',12,'middle',true));
    o.push(Txt(240,274,'= perpendicular bisector of AB','#1a7a3a',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* ═══════════════════════════════════════════
   Q8  COMBINED LOCI
   A=(130,160)  B=(350,160)  AB=220px
   Condition 1: within 90px of A (circle around A, r=90)
   Condition 2: closer to A than B (left side of perp bisector at x=240)
   The shaded intersection is: inside the circle AND left of x=240
   Crucially the circle around A (r=90) does NOT reach B (distance=220)
   And it DOES cross the perp bisector (r=90 > halfAB=110? No! r=90 < 110)
   So the circle is entirely on A's side — shaded region = semicircle on left of bisector
   Use r=130 so it crosses the bisector: yOff=sqrt(130^2-110^2)=sqrt(16900-12100)=sqrt(4800)=69
════════════════════════════════════════════ */
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ax=130, ay=160, bx=350, by=160;
  var mx=(ax+bx)/2; // perp bisector x = 240
  var r=130; // circle radius around A (crosses midpoint bisector)
  var halfAB=(bx-ax)/2; // 110
  var yOff=Math.round(Math.sqrt(r*r-halfAB*halfAB)); // 69 — where circle crosses bisector

  o.push(Ci(ax,ay,6,'#C0272D','#C0272D',0));
  o.push(Ci(bx,by,6,'#1a5a8a','#1a5a8a',0));
  o.push(Txt(ax-14,ay+16,'A','#C0272D',13,'end',true));
  o.push(Txt(bx+14,by+16,'B','#1a5a8a',13,'start',true));
  o.push(Ln(ax,ay,bx,by,'#888',1,'4,3'));
  o.push(Txt(mx,ay+32,'AB = 5 cm','#888',10,'middle',false));

  if(p>=1){
    // Full circle around A (dashed)
    o.push(Ci(ax,ay,r,'none','#C0272D',2,'5,3'));
    o.push(Txt(ax-r-8,ay,'within r of A','#C0272D',9,'end',false));
  }
  if(p>=2){
    // Perpendicular bisector of AB (vertical line at mx=240)
    o.push(Ln(mx,20,mx,280,'#1a5a8a',2,'5,3'));
    o.push(Txt(mx+8,32,'closer to A','#1a5a8a',9,'start',false));
    o.push(Txt(mx+8,46,'(left of bisector)','#1a5a8a',9,'start',false));
    o.push(Txt(mx-8,32,'closer to B','#888',9,'end',false));
  }
  if(p>=3){
    // Shaded region: LEFT semicircle of the circle around A
    // The circle intersects the bisector at (mx, ay-yOff) and (mx, ay+yOff)
    // The left half-arc from top crossing to bottom crossing (going left, i.e. the long way)
    // In SVG terms: from top crossing going anticlockwise (sweep-flag=0) to bottom crossing
    var topX=mx, topY=ay-yOff;
    var botX=mx, botY=ay+yOff;
    // Path: start at top crossing, arc left side (large arc, anticlockwise=sweep 0) to bottom crossing, then straight line back up the bisector
    var shadePath='M '+topX+','+topY+' A '+r+','+r+' 0 1,0 '+botX+','+botY+' Z';
    o.push('<path d="'+shadePath+'" fill="#fce8d8" opacity="0.55" stroke="none"/>');
    // Redraw the circle and bisector on top so they show through
    o.push(Ci(ax,ay,r,'none','#C0272D',2,'5,3'));
    o.push(Ln(mx,20,mx,280,'#1a5a8a',2,'5,3'));
    o.push(Ci(topX,topY,5,'#C0272D','#C0272D',0));
    o.push(Ci(botX,botY,5,'#C0272D','#C0272D',0));
    o.push(Txt(ax-50,ay,'Shaded region','#C8922A',10,'middle',false));
    o.push(Txt(ax-50,ay+14,'satisfies BOTH','#C8922A',10,'middle',false));
  }
  s.innerHTML=o.join('');
}
