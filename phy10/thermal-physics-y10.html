<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}

if(p>=2){for(var j=0;j<2;j++)o.push(arw(430,90+j*40,472,90+j*40,'#E65100',1));o.push(T(438,192,'emits less','#aaa',9,'middle',false));}
if(p>=3){o.push(T(240,250,'Dark matt = best emitter AND best absorber at same temperature','#555',9,'middle',false));}

function dQ6(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');

function dQ7(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');

[['Method','Needs medium?','How?'],['Conduction','Yes (solid best)','free electrons + vibration'],['Convection','Yes (fluid only)','bulk fluid movement'],['Radiation','No (works in vacuum)','IR electromagnetic waves']].forEach(function(r,i){

var QS=[
{ey:'Q1 \u2022 Y10 Physics \u2022 Thermal',ti:'Specific Heat Capacity',su:'Apply \u0394E = mc\u0394\u03b8. Know typical values of c.',steps:[
  {lb:'What is SHC?',dr:dQ1,ht:'<p>Specific heat capacity (c) is the energy needed to raise 1 kg by 1\u00b0C.</p><div class="fm">\u0394E = m \u00d7 c \u00d7 \u0394\u03b8</div><p>Water: c = 4200 J/(kg\u00b0C). Aluminium: 900. Copper: 390.</p>'},

{ey:'Q2 \u2022 Y10 Physics \u2022 Thermal',ti:'Latent Heat',su:'Apply Q = mL for changes of state at constant temperature.',steps:[
  {lb:'What is latent heat?',dr:dQ2,ht:'<p>Latent heat is energy transferred during a change of state at constant temperature. It breaks or forms intermolecular bonds.</p><div class="fm">Q = m \u00d7 L</div><p>Fusion (melt/freeze): Lf. Vaporisation (boil/condense): Lv.</p>'},
  {lb:'Values for water',dr:dQ2,ht:'<p>Water: Lf = 334 000 J/kg. Lv = 2 260 000 J/kg. Very high Lv \u2014 steam burns are severe because a lot of energy is released on condensing.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var type=pick(['Q','m']);var L=pick([334000,2260000]);var Lname=L===334000?'fusion':'vaporisation';var m=rnd(1,5),Q=m*L;if(type==='Q')return{question:'m=<b>'+m+' kg</b>, L=<b>'+L+' J/kg</b> ('+Lname+'). Find Q.',hints:['Q = mL'],ans:Q,tol:Q*0.01,unit:'J',working:'Q = '+m+'\u00d7'+L+' = '+Q+' J'};var Q2=rnd(2,5)*L/2,m2=parseFloat((Q2/L).toFixed(3));return{question:'Q=<b>'+Q2+' J</b>, L=<b>'+L+' J/kg</b>. Find mass changing state.',hints:['m = Q/L'],ans:m2,tol:m2*0.02,unit:'kg',working:'m = '+Q2+'/'+L+' = '+m2+' kg'};})}
]},
{ey:'Q3 \u2022 Y10 Physics \u2022 Thermal',ti:'Conduction',su:'Explain conduction. Why are metals better conductors than non-metals?',steps:[
  {lb:'Mechanism',dr:dQ3,ht:'<p>Conduction is heat transfer through a material without bulk movement. Hot particles vibrate more, transferring energy to neighbours. Metals also have <b>free electrons</b> that carry energy much faster.</p>'},
  {lb:'Metals vs non-metals',dr:dQ3,ht:'<p>Metals: best conductors (free electrons).<br>Non-metals, liquids, gases: poor conductors (insulators).<br>Poor conduction \u2192 useful for insulation (double glazing, loft insulation).</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){return{question:'Why is copper a better thermal conductor than wood? 1=free electrons, 2=denser structure, 3=higher melting point.',hints:['What do metals have that non-metals lack?'],ans:1,tol:0,unit:'',working:'Copper has <b>free electrons</b> that carry energy rapidly. Answer: 1.'};})},
]},
{ey:'Q4 \u2022 Y10 Physics \u2022 Thermal',ti:'Convection',su:'Explain convection currents in liquids and gases.',steps:[
  {lb:'Mechanism',dr:dQ4,ht:'<p>Convection is heat transfer by bulk movement of a fluid. Hot fluid expands \u2192 less dense \u2192 rises. Cool fluid sinks to replace it \u2192 a <b>convection current</b> forms.</p>'},
  {lb:'Only in fluids',dr:dQ4,ht:'<p>Convection requires particles to flow. It cannot occur in solids. Applications: central heating, sea breezes, ovens.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){return{question:'In which state(s) can convection occur? 1=solids, 2=liquids only, 3=liquids and gases, 4=all states.',hints:['Convection needs bulk flow of particles'],ans:3,tol:0,unit:'',working:'Convection needs fluids (liquids and gases). Not in solids. Answer: 3.'};})},
]},
{ey:'Q5 \u2022 Y10 Physics \u2022 Thermal',ti:'Thermal Radiation',su:'Describe emission and absorption of infrared radiation.',steps:[
  {lb:'What is radiation?',dr:dQ5,ht:'<p>Thermal radiation is infrared (IR) electromagnetic waves emitted by all objects above absolute zero. It requires no medium and can travel through a vacuum.</p>'},
  {lb:'Good and poor emitters',dr:dQ5,ht:'<p>Dark, matt surfaces: best emitters AND best absorbers.<br>Shiny, light surfaces: poor emitters, good reflectors.</p><p>Applications: solar panels (dark), radiator colour, survival blankets (shiny).</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var type=pick(['emit','absorb']);if(type==='emit')return{question:'Which surface emits MORE radiation at same temperature? 1=dark matt, 2=shiny silver.',hints:['Dark surfaces are better emitters'],ans:1,tol:0,unit:'',working:'Dark matt emits more. Answer: 1.'};return{question:'Which surface ABSORBS more radiation? 1=dark matt, 2=shiny silver.',hints:['Good emitters are also good absorbers'],ans:1,tol:0,unit:'',working:'Dark matt absorbs more. Answer: 1.'};})},
]},
{ey:'Q6 \u2022 Y10 Physics \u2022 Thermal',ti:'Vacuum Flask',su:'Explain how a vacuum flask reduces heat loss by all three methods.',steps:[
  {lb:'How it works',dr:dQ6,ht:'<p><b>Conduction & convection:</b> vacuum between double glass walls removes any medium. <b>Radiation:</b> silvered walls reflect IR back in and minimise emission outward. <b>Stopper:</b> reduces conduction at top.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'How does the vacuum in a flask reduce heat loss?',a:1,w:'Vacuum has no matter so no conduction or convection. Answer: 1.'},{q:'Why are the walls of a vacuum flask silvered?',a:2,w:'Silvered walls reflect IR radiation back in and emit very little outward. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=no medium for conduction/convection, 2=reduces radiation.',hints:['Match mechanism to design feature'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q7 \u2022 Y10 Physics \u2022 Thermal',ti:'Comparing Heat Transfer',su:'Identify which method of heat transfer applies in different situations.',steps:[
  {lb:'The three methods',dr:dQ7,ht:'<p>Conduction (solids, free electrons) \u2022 Convection (fluids, bulk flow) \u2022 Radiation (EM waves, no medium).</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Heat from the Sun reaches Earth through space. Which method?',a:3,w:'Space is vacuum \u2192 radiation only. Answer: 3.'},{q:'Heat spreads through a metal spoon in hot soup. Which method?',a:1,w:'Heat flows through the solid metal by conduction. Answer: 1.'},{q:'Hot water rises in a pan, cold water sinks. Which method?',a:2,w:'Bulk fluid movement = convection. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' 1=conduction, 2=convection, 3=radiation.',hints:['Match the situation to the method'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
]},
{ey:'Q8 \u2022 Y10 Physics \u2022 Thermal',ti:'SHC Calculations',su:'Calculate \u0394E, m, c or \u0394\u03b8 using \u0394E = mc\u0394\u03b8.',steps:[
  {lb:'Strategy',dr:dQ8,ht:'<p>Identify which variable is unknown. Rearrange \u0394E = mc\u0394\u03b8 to find it. Check units: E in J, m in kg, c in J/(kg\u00b0C), \u0394\u03b8 in \u00b0C or K.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var m=rnd(1,5),c=pick([390,450,900,4200]),dT=rnd(10,50);return{question:'\u0394E = mc\u0394\u03b8. m=<b>'+m+' kg</b>, c=<b>'+c+'</b>, \u0394\u03b8=<b>'+dT+'\u00b0C</b>.',hints:['\u0394E = mc\u0394\u03b8'],ans:m*c*dT,tol:m*c*dT*0.01,unit:'J',working:'\u0394E = '+m+'\u00d7'+c+'\u00d7'+dT+' = '+(m*c*dT)+' J'};})},
]},
{ey:'Q9 \u2022 Y10 Physics \u2022 Thermal',ti:'Latent Heat Calculations',su:'Calculate Q = mL for melting ice and boiling water.',steps:[
  {lb:'Strategy',dr:dQ9,ht:'<p>Q = mL. Water: Lf = 334 000 J/kg, Lv = 2 260 000 J/kg. During change of state, temperature stays constant \u2014 all energy goes into changing bonds.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var type=pick(['melt','boil','mass']);if(type==='melt'){var m=rnd(1,4);return{question:'Energy to melt <b>'+m+' kg</b> of ice. (L = 334 000 J/kg)',hints:['Q = mL'],ans:m*334000,tol:m*334000*0.01,unit:'J',working:'Q = '+m+'\u00d7334000 = '+(m*334000)+' J'};}if(type==='boil'){var m2=rnd(1,3);return{question:'Energy to boil <b>'+m2+' kg</b> of water. (L = 2 260 000 J/kg)',hints:['Q = mL'],ans:m2*2260000,tol:m2*2260000*0.01,unit:'J',working:'Q = '+m2+'\u00d72260000 = '+(m2*2260000)+' J'};}var L=pick([334000,2260000]);var Q=rnd(2,10)*L/2;return{question:'Q=<b>'+Q+' J</b>, L=<b>'+L+' J/kg</b>. Find mass.',hints:['m = Q/L'],ans:parseFloat((Q/L).toFixed(3)),tol:parseFloat((Q/L).toFixed(3))*0.02,unit:'kg',working:'m = '+Q+'/'+L+' = '+parseFloat((Q/L).toFixed(3))+' kg'};})}
]},
{ey:'Q10 \u2022 Y10 Physics \u2022 Thermal',ti:'Mixed Thermal Problems',su:'\u0394E=mc\u0394\u03b8, Q=mL, and identifying heat transfer methods.',steps:[
  {lb:'All equations',dr:dQ10,ht:'<p>\u0394E=mc\u0394\u03b8 \u2022 Q=mL \u2022 Conduction/Convection/Radiation \u2022 Vacuum flask design.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['SHC','latent','method']);if(type==='SHC'){var m=rnd(1,4),c=pick([390,900,4200]),dT=rnd(15,50);return{question:'m=<b>'+m+' kg</b>, c=<b>'+c+'</b>, \u0394\u03b8=<b>'+dT+'\u00b0C</b>. Find \u0394E.',hints:['\u0394E = mc\u0394\u03b8'],ans:m*c*dT,tol:m*c*dT*0.01,unit:'J',working:'\u0394E = '+m+'\u00d7'+c+'\u00d7'+dT+' = '+(m*c*dT)+' J'};}if(type==='latent'){var m2=rnd(1,3);return{question:'Energy to melt <b>'+m2+' kg</b> of ice. (Lf = 334 000 J/kg)',hints:['Q = mL'],ans:m2*334000,tol:m2*334000*0.01,unit:'J',working:'Q = '+m2+'\u00d7334000 = '+(m2*334000)+' J'};}return{question:'Which method works in vacuum? 1=conduction, 2=convection, 3=radiation.',hints:['Vacuum has no matter'],ans:3,tol:0,unit:'',working:'Radiation travels as EM waves \u2014 no medium needed. Answer: 3.'};})},
]},
];

function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}

document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
