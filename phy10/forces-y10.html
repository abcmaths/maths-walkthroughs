<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});

function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');

if(p>=1){[['E','energy','J','#C0272D',80],['k','spring const','N/m','#1565C0',240],['e','extension','m','#E65100',400]].forEach(function(r){o.push(R(r[4]-48,108,104,38,'#e3f2fd','#1565C0',1));o.push(T(r[4],130,r[0],r[3],13,'middle',true));o.push(T(r[4],158,r[2],'#555',9,'middle',false));});}

[['F=ma','Newton 2nd Law'],["Hooke's Law",'F = ke (below limit)'],['Moment','F \u00d7 d (N\u00b7m)'],['Equilibrium','\u03a3CW = \u03a3ACW moments'],['Terminal v','drag = weight \u2192 a=0'],['Resultant','vector sum of all forces']].forEach(function(r,i){if(i<p+1){o.push(R(20,42+i*33,440,26,'#e3f2fd','#BBDEFB',1));o.push(T(130,59+i*33,r[0],'#1565C0',11,'middle',true));o.push(T(330,59+i*33,r[1],'#555',10,'middle',false));}});

var QS=[
{ey:'Q1 \u2022 Y10 Physics \u2022 Forces',ti:'Newton\u2019s Second Law',su:'Apply F = ma. Find force, mass or acceleration.',steps:[
  {lb:'F = ma',dr:dQ1,ht:'<p>The resultant (net) force on an object equals its mass times its acceleration.</p><div class="fm">F = m \u00d7 a</div><p>F in N, m in kg, a in m/s\u00b2. The direction of F and a are always the same.</p>'},
  {lb:'Worked example',dr:dQ1,ht:'<p>Car mass 1200 kg, driving force 4800 N (assume no friction).</p><div class="fm">a = F \u00f7 m = 4800 \u00f7 1200 = 4 m/s\u00b2</div>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var type=pick(['a','F','m']);var m=rnd(5,20)*100;var a=rnd(2,8);var F=m*a;if(type==='a')return{question:'m = <b>'+m+' kg</b>, F = <b>'+F+' N</b>. Find acceleration.',hints:['a = F/m'],ans:a,tol:0.05,unit:'m/s\u00b2',working:'a = '+F+'/'+m+' = '+a+' m/s\u00b2'};if(type==='F')return{question:'m = <b>'+m+' kg</b>, a = <b>'+a+' m/s\u00b2</b>. Find force.',hints:['F = ma'],ans:F,tol:0.5,unit:'N',working:'F = '+m+'\u00d7'+a+' = '+F+' N'};var F2=rnd(2,10)*1000;var a2=rnd(2,5);var m2=F2/a2;return{question:'F = <b>'+F2+' N</b>, a = <b>'+a2+' m/s\u00b2</b>. Find mass.',hints:['m = F/a'],ans:m2,tol:0.5,unit:'kg',working:'m = '+F2+'/'+a2+' = '+m2+' kg'};})}
]},
{ey:'Q2 \u2022 Y10 Physics \u2022 Forces',ti:'Newton\u2019s Three Laws',su:'State and apply all three of Newton\u2019s laws.',steps:[
  {lb:'The three laws',dr:dQ2,ht:'<p><b>1st:</b> no net force \u2192 constant velocity or rest (inertia).<br><b>2nd:</b> net force = mass \u00d7 acceleration.<br><b>3rd:</b> every force has an equal and opposite reaction force on a different object.</p>'},
  {lb:'3rd law examples',dr:dQ2,ht:'<p>Rocket pushes gas backward \u2192 gas pushes rocket forward. Earth pulls you down \u2192 you pull Earth up. Third-law pairs are always equal in magnitude, opposite in direction, on different objects.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){return{question:'A 70 kg person stands on Earth (g=9.81). Earth pulls person down with 686.7 N. What force does the person exert on Earth?',hints:["Newton's 3rd law: equal and opposite, on different object"],ans:686.7,tol:0.5,unit:'N',working:'687 N upward on Earth (3rd law pair). Same magnitude, opposite direction.'};})},
]},
{ey:'Q3 \u2022 Y10 Physics \u2022 Forces',ti:"Hooke's Law",su:'Apply F = ke. Identify limit of proportionality.',steps:[
  {lb:"Hooke's Law",dr:dQ3,ht:'<p>For a spring (below the limit of proportionality):</p><div class="fm">F = k \u00d7 e</div><p>F = force in N, k = spring constant in N/m, e = extension in m. Beyond the limit: permanent deformation.</p>'},
  {lb:'F-e graph',dr:dQ3,ht:'<p>Within the limit: straight line through origin (F \u221d e). Beyond the limit: curve \u2014 spring no longer returns to original length.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var type=pick(['F','k','e']);var k=rnd(20,100)*2;var e=rnd(5,20)*0.01;var F=parseFloat((k*e).toFixed(2));if(type==='F')return{question:'k = <b>'+k+' N/m</b>, e = <b>'+e.toFixed(2)+' m</b>. Find force.',hints:['F = ke'],ans:F,tol:0.05,unit:'N',working:'F = '+k+'\u00d7'+e.toFixed(2)+' = '+F+' N'};if(type==='k')return{question:'F = <b>'+F+' N</b>, e = <b>'+e.toFixed(2)+' m</b>. Find k.',hints:['k = F/e'],ans:k,tol:0.5,unit:'N/m',working:'k = '+F+'/'+e.toFixed(2)+' = '+k+' N/m'};var k2=rnd(20,80)*2;var F2=rnd(5,20)*2;var e2=parseFloat((F2/k2).toFixed(3));return{question:'k = <b>'+k2+' N/m</b>, F = <b>'+F2+' N</b>. Find extension.',hints:['e = F/k'],ans:e2,tol:0.002,unit:'m',working:'e = '+F2+'/'+k2+' = '+e2+' m'};})}
]},
{ey:'Q4 \u2022 Y10 Physics \u2022 Forces',ti:'Moments',su:'Calculate moment = F \u00d7 d. Apply principle of moments.',steps:[
  {lb:'What is a moment?',dr:dQ4,ht:'<p><b>Moment</b> = turning effect of a force about a pivot.</p><div class="fm">Moment = F \u00d7 d</div><p>F = force (N), d = perpendicular distance from pivot to force (m). Unit: N\u00b7m.</p>'},
  {lb:'Principle of moments',dr:dQ4,ht:'<p>For equilibrium (balanced): sum of clockwise moments = sum of anticlockwise moments.</p><div class="fm">\u03a3 CW moments = \u03a3 ACW moments</div>'},
  {lb:'Worked example',dr:dQ4,ht:'<p>300 N at 2 m left of pivot: ACW = 600 N\u00b7m. What force at 3 m right gives balance?</p><div class="fm">F \u00d7 3 = 600 \u2192 F = 200 N</div>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var type=pick(['moment','F','d']);var F=rnd(10,50)*5;var d=rnd(2,10)*0.2;var M=parseFloat((F*d).toFixed(1));if(type==='moment')return{question:'F = <b>'+F+' N</b>, d = <b>'+d.toFixed(1)+' m</b>. Find the moment.',hints:['Moment = F\u00d7d'],ans:M,tol:0.05,unit:'N\u00b7m',working:'M = '+F+'\u00d7'+d.toFixed(1)+' = '+M+' N\u00b7m'};if(type==='F'){var M2=rnd(20,120)*5;var d2=rnd(2,8)*0.5;return{question:'Moment = <b>'+M2+' N\u00b7m</b>, d = <b>'+d2+' m</b>. Find F.',hints:['F = M/d'],ans:M2/d2,tol:0.1,unit:'N',working:'F = '+M2+'/'+d2+' = '+M2/d2+' N'};}var M3=rnd(20,100)*5;var F3=rnd(10,50)*5;return{question:'Moment = <b>'+M3+' N\u00b7m</b>, F = <b>'+F3+' N</b>. Find d.',hints:['d = M/F'],ans:M3/F3,tol:0.05,unit:'m',working:'d = '+M3+'/'+F3+' = '+M3/F3+' m'};})}
]},
{ey:'Q5 \u2022 Y10 Physics \u2022 Forces',ti:'Resultant Forces',su:'Find resultant of parallel and perpendicular forces.',steps:[
  {lb:'Parallel forces',dr:dQ5,ht:'<p>Same direction: add. Opposite direction: subtract. The resultant has magnitude and direction.</p>'},
  {lb:'Perpendicular forces',dr:dQ5,ht:'<p>Use Pythagoras:</p><div class="fm">R = \u221a(F\u2081\u00b2 + F\u2082\u00b2)</div><p>Example: 6 N east + 8 N north \u2192 R = \u221a(36+64) = 10 N.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var type=pick(['same','opp','perp']);if(type==='same'){var a=rnd(5,20)*10,b=rnd(5,20)*10;return{question:'Forces in same direction: <b>'+a+' N</b> and <b>'+b+' N</b>. Find resultant.',hints:['Add them'],ans:a+b,tol:0.1,unit:'N',working:a+'+'+b+' = '+(a+b)+' N'};}if(type==='opp'){var c=rnd(10,30)*10,d=rnd(5,c/10-1)*10;return{question:'Forces in opposite directions: <b>'+c+' N</b> and <b>'+d+' N</b>. Find resultant.',hints:['Subtract smaller from larger'],ans:c-d,tol:0.1,unit:'N',working:c+'\u2212'+d+' = '+(c-d)+' N'};}var p=pick([[3,4,5],[5,12,13],[6,8,10],[8,15,17]]);return{question:'Two perpendicular forces: <b>'+p[0]+' N</b> and <b>'+p[1]+' N</b>. Find resultant.',hints:['R = \u221a(a\u00b2+b\u00b2)'],ans:p[2],tol:0.05,unit:'N',working:'R = \u221a'+(p[0]*p[0]+p[1]*p[1])+' = '+p[2]+' N'};})}
]},
{ey:'Q6 \u2022 Y10 Physics \u2022 Forces',ti:'Terminal Velocity',su:'Explain how drag and weight produce terminal velocity.',steps:[
  {lb:'Two forces',dr:dQ6,ht:'<p>Falling object: <b>weight</b> (constant, down) and <b>drag</b> (increases with speed, up).</p><p>Initially weight > drag \u2192 accelerates. As speed rises, drag grows until drag = weight \u2192 zero net force \u2192 terminal velocity.</p>'},
  {lb:'The v\u2013t graph',dr:dQ6,ht:'<p>The v\u2013t graph curves upward (accelerating), then flattens to a horizontal line at terminal velocity.</p><p>Parachute opens: drag suddenly > weight \u2192 deceleration \u2192 new lower terminal velocity.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var W=rnd(40,120)*10,drag=rnd(1,W/10-1)*10;return{question:'Skydiver: weight <b>'+W+' N</b>, drag <b>'+drag+' N</b>. What is the net downward force?',hints:['Net force = weight \u2212 drag'],ans:W-drag,tol:1,unit:'N',working:'Net = '+W+'\u2212'+drag+' = '+(W-drag)+' N'};})},
]},
{ey:'Q7 \u2022 Y10 Physics \u2022 Forces',ti:'Centre of Gravity',su:'Find centre of gravity experimentally. Explain stability.',steps:[
  {lb:'Centre of gravity',dr:dQ7,ht:'<p>The <b>centre of gravity (CoG)</b> is the point where the whole weight appears to act. For a uniform object it is the geometric centre.</p><p>To find CoG of a lamina: hang from three points; where plumb lines cross = CoG.</p>'},
  {lb:'Stability',dr:dQ7,ht:'<p><b>More stable</b> = lower CoG + wider base. Object topples when the line of action of weight falls outside the base.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){return{question:'Racing car vs tall van (same mass). Which is more stable? Enter 1 = racing car, 2 = tall van.',hints:['Lower CoG = more stable'],ans:1,tol:0,unit:'',working:'Racing car has lower CoG \u2192 more stable. Answer: 1.'};})},
]},
{ey:'Q8 \u2022 Y10 Physics \u2022 Forces',ti:'Friction and Newton\u2019s Laws Combined',su:'Calculate acceleration when multiple forces act.',steps:[
  {lb:'Method',dr:dQ8,ht:'<p>1. Identify all forces. 2. Find resultant (net) force. 3. Apply F = ma.</p><p>Friction always opposes motion. At constant speed: net force = 0 (drag = driving force).</p>'},
  {lb:'Worked example',dr:dQ8,ht:'<p>Box 500 kg: push 2000 N, friction 800 N.</p><div class="fm">Net F = 2000 \u2212 800 = 1200 N</div><div class="fm">a = 1200 \u00f7 500 = 2.4 m/s\u00b2</div>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var drive=rnd(2,8)*500,fric=rnd(1,4)*200,m=rnd(5,20)*100;var Fnet=drive-fric;var a=parseFloat((Fnet/m).toFixed(2));return{question:'Drive = <b>'+drive+' N</b>, friction = <b>'+fric+' N</b>, mass = <b>'+m+' kg</b>. Find acceleration.',hints:['Net F = drive \u2212 friction','a = Net F / m'],ans:a,tol:0.05,unit:'m/s\u00b2',working:'Net F = '+Fnet+' N. a = '+Fnet+'/'+m+' = '+a+' m/s\u00b2'};})},
]},
{ey:'Q9 \u2022 Y10 Physics \u2022 Forces',ti:'Elastic Potential Energy',su:'Calculate energy stored in a spring: E = \u00bdke\u00b2.',steps:[
  {lb:'Elastic PE',dr:dQ9,ht:'<p>A stretched or compressed spring stores <b>elastic potential energy</b>.</p><div class="fm">E = \u00bd \u00d7 k \u00d7 e\u00b2</div><p>E in joules (J), k in N/m, e in metres. Only valid below the limit of proportionality.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var k=rnd(20,100)*2;var e=rnd(2,10)*0.05;var E=parseFloat((0.5*k*e*e).toFixed(3));return{question:'k = <b>'+k+' N/m</b>, e = <b>'+e.toFixed(2)+' m</b>. Find elastic PE stored.',hints:['E = \u00bdke\u00b2'],ans:E,tol:E*0.02,unit:'J',working:'E = \u00bd\u00d7'+k+'\u00d7'+e.toFixed(2)+'\u00b2 = '+E+' J'};})},
]},
{ey:'Q10 \u2022 Y10 Physics \u2022 Forces',ti:'Mixed Forces Problems',su:'Combined F=ma, moments, Hooke\u2019s Law and friction questions.',steps:[
  {lb:'All equations',dr:dQ10,ht:'<p>F=ma \u2022 F=ke \u2022 Moment=F\u00d7d \u2022 \u03a3CW=\u03a3ACW \u2022 E=\u00bdke\u00b2 \u2022 Net F=ma.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['N2','moment','spring']);if(type==='N2'){var m=rnd(5,20)*100,a=rnd(2,6);return{question:'m = <b>'+m+' kg</b>, a = <b>'+a+' m/s\u00b2</b>. Find net force.',hints:['F = ma'],ans:m*a,tol:0.5,unit:'N',working:'F = '+m+'\u00d7'+a+' = '+(m*a)+' N'};}if(type==='moment'){var F=rnd(5,20)*10,d=rnd(1,5)*0.5;return{question:'F = <b>'+F+' N</b> at <b>'+d+' m</b> from pivot. Find moment.',hints:['M = F\u00d7d'],ans:F*d,tol:0.05,unit:'N\u00b7m',working:'M = '+F+'\u00d7'+d+' = '+(F*d)+' N\u00b7m'};}var k=rnd(20,80)*2,e=rnd(2,8)*0.05;return{question:'Spring k = <b>'+k+' N/m</b>, e = <b>'+e.toFixed(2)+' m</b>. Find force.',hints:['F = ke'],ans:parseFloat((k*e).toFixed(2)),tol:0.05,unit:'N',working:'F = '+k+'\u00d7'+e.toFixed(2)+' = '+(k*e).toFixed(2)+' N'};})}
]},
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
