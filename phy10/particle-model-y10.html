<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
[['Solid','#e3f2fd','#1565C0',10],['Liquid','#e8f5e9','#2E7D32',180],['Gas','#fff3e0','#E65100',350]].forEach(function(st){o.push(R(st[3],18,140,222,st[1],st[2],2));o.push(T(st[3]+70,12,st[0],st[2],11,'middle',true));});
if(p>=1){for(var r=0;r<4;r++)for(var c=0;c<3;c++)o.push(circ(36+c*28,44+r*38,11,'#90caf9','#1565C0'));}
if(p>=2){[[212,44],[238,72],[202,96],[236,52],[210,128],[246,114],[202,148],[236,156],[210,174]].forEach(function(pt){o.push(circ(pt[0],pt[1],11,'#a5d6a7','#2E7D32'));});}
if(p>=3){[[378,40],[432,74],[370,118],[444,148],[388,174],[422,50],[460,108],[374,88]].forEach(function(pt){o.push(circ(pt[0],pt[1],9,'#ffcc80','#E65100'));});}
s.innerHTML=o.join('');}

o.push(L(48,248,48,22,'#333',2));o.push(L(48,248,460,248,'#333',2));
o.push(T(254,266,'energy added','#333',9,'middle',false));o.push(T(25,130,'T (\u00b0C)','#333',9,'middle',false));
o.push(L(58,220,120,168,'#1565C0',2.5));
if(p>=1){o.push(L(120,168,198,168,'#E65100',2.5));o.push(T(159,157,'melting','#E65100',8,'middle',false));}
if(p>=2){o.push(L(198,168,288,106,'#1565C0',2.5));}
if(p>=3){o.push(L(288,106,416,106,'#E65100',2.5));o.push(T(352,94,'boiling','#E65100',8,'middle',false));}
if(p>=4){o.push(L(416,106,476,54,'#1565C0',2.5));}
o.push(T(80,208,'solid','#555',7,'middle',false));if(p>=1)o.push(T(244,192,'liquid','#555',7,'middle',false));if(p>=4)o.push(T(455,62,'gas','#555',7,'middle',false));
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Brownian motion','#1565C0',12,'middle',true));
var path=[[240,148],[212,126],[235,100],[262,118],[282,92],[254,74],[226,90],[205,106]];
for(var i=0;i<path.length-1;i++){if(i<p+1)o.push(L(path[i][0],path[i][1],path[i+1][0],path[i+1][1],'#E65100',2.5));}
o.push(circ(240,148,10,'#E65100','#bf360c'));
if(p>=2){[[180,155,215,145],[320,202,286,168],[336,118,308,132]].forEach(function(b){o.push(arw(b[0],b[1],b[2],b[3],'#1565C0',1.5));});}
if(p>=3){o.push(T(240,240,'Air molecules (invisible) hit smoke particle unevenly \u2192 random jerky motion','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Gas pressure from molecular collisions','#1565C0',12,'middle',true));
o.push(R(80,50,320,180,'#e3f2fd','#1565C0',2));
[[152,100],[218,140],[308,82],[182,168],[280,148],[348,120],[132,162],[258,110]].forEach(function(pt){if(p>=1)o.push(circ(pt[0],pt[1],7,'#90caf9','#1565C0'));});
if(p>=2){o.push(arw(82,118,122,118,'#C0272D',2));o.push(arw(398,100,358,100,'#C0272D',2));o.push(arw(198,52,198,92,'#C0272D',2));o.push(arw(310,228,310,190,'#C0272D',2));}
if(p>=3){o.push(T(240,252,'Billions of collisions/s give steady outward pressure on walls','#0d47a1',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Kelvin scale and absolute zero','#1565C0',12,'middle',true));
o.push(L(240,48,240,248,'#1565C0',3));
[['\u2212273','0 K','Absolute zero (no KE)'],['\u2212100','173 K','Very cold'],['0','273 K','Water freezes'],['100','373 K','Water boils']].forEach(function(r,i){if(i<p+1){var y=55+i*48;o.push(L(230,y,250,y,'#1565C0',2));o.push(T(222,y+4,r[0]+'\u00b0C','#555',9,'end',false));o.push(T(258,y+4,r[1],'#1565C0',10,'start',true));o.push(T(358,y+4,r[2],'#888',8,'start',false));}});
s.innerHTML=o.join('');}
function dQ6(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,"Boyle's Law: p\u2081V\u2081 = p\u2082V\u2082",'#1565C0',13,'middle',true));
o.push(R(22,40,200,180,'#e3f2fd','#1565C0',2));o.push(T(122,40,'Large V, low p','#1565C0',8,'middle',false));
if(p>=1){[[54,78],[82,120],[130,92],[160,140],[104,162],[64,152],[152,74]].forEach(function(pt){o.push(circ(pt[0],pt[1],7,'#90caf9','#1565C0'));});}
if(p>=2){o.push(arw(225,132,292,132,'#333',2));o.push(T(258,122,'compress','#333',9,'middle',false));o.push(R(298,88,122,132,'#bbdefb','#1565C0',2));o.push(T(359,88,'Small V,\nhigh p','#1565C0',8,'middle',false));[[318,108],[358,140],[398,116],[330,158],[385,158]].forEach(function(pt){o.push(circ(pt[0],pt[1],7,'#90caf9','#1565C0'));});}
if(p>=3){o.push(T(240,248,'p\u2081V\u2081 = p\u2082V\u2082 (constant temperature)','#1565C0',11,'middle',true));}
s.innerHTML=o.join('');}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ5(p);}
function dQ9(p){dQ6(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Particle model summary','#1565C0',13,'middle',true));
[['Absolute zero','0 K = \u2212273\u00b0C'],['Convert to K','T(K) = \u03b8(\u00b0C) + 273'],["Boyle's Law",'p\u2081V\u2081 = p\u2082V\u2082 (const T)'],['Gas pressure','molecule-wall collisions'],['Brownian motion','evidence for particle model'],['Change of state','T stays constant (latent heat)']].forEach(function(r,i){if(i<p+1){o.push(R(18,44+i*33,444,26,'#e3f2fd','#BBDEFB',1));o.push(T(162,60+i*33,r[0],'#555',10,'middle',false));o.push(T(355,60+i*33,r[1],'#1565C0',10,'middle',true));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Physics \u2022 Particle Model',ti:'Three States of Matter',su:'Describe solids, liquids and gases in terms of particle arrangement and motion.',steps:[
  {lb:'The three states',dr:dQ1,ht:'<p>All matter is made of particles. The state depends on how much energy the particles have and how strong the intermolecular forces are.</p>'},
  {lb:'Solid and liquid',dr:dQ1,ht:'<p><b>Solid:</b> particles in regular lattice, vibrate at fixed positions. Fixed shape and volume, incompressible.<br><b>Liquid:</b> particles close but can flow past each other. Takes shape of container; fixed volume.</p>'},
  {lb:'Gas',dr:dQ1,ht:'<p><b>Gas:</b> particles widely spaced, moving randomly at high speed. Fills any container. Easily compressed.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var q=pick([[1,'Fixed shape and cannot flow','solid'],[2,'Takes the shape of its container but has fixed volume','liquid'],[3,'Particles widely spaced and move freely at high speed','gas']]);return{question:'Which state? "'+q[1]+'". 1=solid, 2=liquid, 3=gas.',hints:['Think about particle arrangement'],ans:q[0],tol:0,unit:'',working:'"'+q[1]+'" = <b>'+q[2]+'</b>. Answer: '+q[0]+'.'};})},
]},
{ey:'Q2 \u2022 Y10 Physics \u2022 Particle Model',ti:'Changes of State',su:'Explain heating curves and why temperature stays constant during state changes.',steps:[
  {lb:'Melting and boiling',dr:dQ2,ht:'<p>Temperature rises until the <b>melting point</b>, then stays constant while melting. Rises again in the liquid, then stays constant at the <b>boiling point</b>.</p>'},
  {lb:'Why temperature stays constant',dr:dQ2,ht:'<p>During a change of state, all the energy goes into <b>breaking intermolecular bonds</b>, not into increasing kinetic energy. Temperature depends on KE, so it stays constant.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var q=pick([{q:'At what temperature does water melt (standard pressure)?',a:0,u:'\u00b0C',w:'Water melts at 0\u00b0C.'},{q:'At what temperature does water boil (standard pressure)?',a:100,u:'\u00b0C',w:'Water boils at 100\u00b0C.'}]);return{question:q.q,hints:['Standard melting point: 0\u00b0C. Boiling point: 100\u00b0C.'],ans:q.a,tol:0,unit:q.u,working:q.w};})},
]},
{ey:'Q3 \u2022 Y10 Physics \u2022 Particle Model',ti:'Brownian Motion',su:'Describe and explain Brownian motion as evidence for the particle model.',steps:[
  {lb:'What is Brownian motion?',dr:dQ3,ht:'<p>Brownian motion is the <b>random jerky movement</b> of small visible particles (e.g. smoke) suspended in a fluid, caused by unequal bombardment by invisible fluid molecules.</p>'},
  {lb:'Evidence for particles',dr:dQ3,ht:'<p>Brownian motion provides evidence that fluids consist of tiny invisible particles in continuous random motion with enough momentum to move visible objects.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){return{question:'Smoke particles in air move with a random jerky motion. What causes this? Enter 1 = air molecules colliding unevenly, 2 = gravity, 3 = friction.',hints:['Think about what is hitting the smoke particle'],ans:1,tol:0,unit:'',working:'Air molecules (invisible) bombard the smoke particle unevenly. Answer: 1.'};})},
]},
{ey:'Q4 \u2022 Y10 Physics \u2022 Particle Model',ti:'Gas Pressure',su:'Explain gas pressure in terms of molecular collisions.',steps:[
  {lb:'Origin of gas pressure',dr:dQ4,ht:'<p>Gas molecules move randomly at high speed. When they collide with container walls, they exert a tiny force. Billions of collisions per second produce a steady <b>measurable pressure</b>.</p>'},
  {lb:'Temperature and pressure',dr:dQ4,ht:'<p>Higher temperature \u2192 faster molecules \u2192 harder and more frequent wall collisions \u2192 <b>higher pressure</b> (at fixed volume). Higher volume at fixed T \u2192 fewer collisions per unit area \u2192 lower pressure.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){return{question:'A gas is heated at constant volume. Pressure: 1=increases, 2=decreases, 3=stays same.',hints:['Hotter \u2192 faster molecules \u2192 harder wall collisions'],ans:1,tol:0,unit:'',working:'Faster molecules \u2192 more frequent, harder collisions \u2192 pressure increases. Answer: 1.'};})},
]},
{ey:'Q5 \u2022 Y10 Physics \u2022 Particle Model',ti:'Absolute Zero and Kelvin Scale',su:'Convert between \u00b0C and K. Explain what absolute zero means.',steps:[
