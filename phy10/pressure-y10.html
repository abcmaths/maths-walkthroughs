<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(R(80,15,320,52,'#e3f2fd','#1565C0',2));o.push(T(240,38,'p = F / A','#0d47a1',22,'middle',true));
if(p>=1){[['p','pressure','Pa (N/m\u00b2)','#C0272D',80],['F','force','N','#1565C0',240],['A','area','m\u00b2','#2E7D32',400]].forEach(function(r){o.push(R(r[4]-48,88,104,40,'#e3f2fd','#1565C0',1));o.push(T(r[4],112,r[0],r[3],14,'middle',true));o.push(T(r[4],144,r[2],'#555',9,'middle',false));});}
if(p>=2){o.push(R(50,160,380,56,'#fff','#ccc',1));o.push(T(240,180,'F = 600 N, A = 0.03 m\u00b2:','#333',12,'middle',false));o.push(T(240,202,'p = 600 \u00f7 0.03 = 20 000 Pa','#1565C0',14,'middle',true));}
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Liquid pressure increases with depth','#1565C0',12,'middle',true));
o.push(R(88,22,304,222,'#bbdefb','#1565C0',2));
[58,100,142,184].forEach(function(d,i){var len=12+i*18;
  if(i<p+1){o.push(arw(88,d,88-len,d,'#0d47a1',1.5+i*0.3));o.push(arw(392,d,392+len,d,'#0d47a1',1.5+i*0.3));}});
if(p>=4){o.push(T(240,252,'\u0394p = \u03c1g\u0394h — deeper means more pressure in all directions','#0d47a1',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(R(80,15,320,52,'#e3f2fd','#1565C0',2));o.push(T(240,38,'\u0394p = \u03c1 \u00d7 g \u00d7 h','#0d47a1',20,'middle',true));
if(p>=1){['\u03c1 = density of liquid (kg/m\u00b3)','g = gravitational field strength (N/kg)','h = depth below surface (m)'].forEach(function(r,i){o.push(T(240,90+i*24,r,'#555',11,'middle',false));});}
if(p>=2){o.push(R(50,162,380,60,'#fff','#ccc',1));o.push(T(240,182,'\u03c1=1000, g=9.8, h=5 m:','#333',12,'middle',false));o.push(T(240,206,'\u0394p = 1000\u00d79.8\u00d75 = 49 000 Pa','#1565C0',14,'middle',true));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Atmospheric pressure','#1565C0',12,'middle',true));
[['Sea level','~101 000 Pa'],['1000 m','~90 000 Pa'],['5000 m','~54 000 Pa'],['Everest (8849 m)','~30 000 Pa']].forEach(function(r,i){if(i<p+1){var w=Math.max(10,(parseInt(r[1].replace(/[^0-9]/g,''))/101000)*400);o.push(R(50,46+i*46,w,32,'#90caf9','#1565C0',1));o.push(T(42,66+i*46,r[0],'#333',9,'end',false));o.push(T(54+w,66+i*46,r[1],'#1565C0',9,'start',false));}});
if(p>=4){o.push(T(240,240,'Pressure decreases with altitude \u2014 less air above.','#555',10,'middle',false));}
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Hydraulic system: p = F/A transmitted','#1565C0',12,'middle',true));
o.push(R(20,120,100,140,'#bbdefb','#1565C0',2));o.push(R(20,82,100,38,'#90caf9','#1565C0',2));
if(p>=1){o.push(arw(70,62,70,82,'#C0272D',2));o.push(T(108,60,'F\u2081=200 N','#C0272D',9,'start',false));o.push(T(70,158,'A\u2081=0.01','#333',8,'middle',false));}
if(p>=2){o.push(R(120,222,240,38,'#bbdefb','#1565C0',2));o.push(R(360,100,100,160,'#bbdefb','#1565C0',2));o.push(R(360,62,100,38,'#90caf9','#1565C0',2));o.push(arw(410,42,410,62,'#2E7D32',2.5));o.push(T(466,38,'F\u2082=2000 N','#2E7D32',9,'start',false));o.push(T(410,158,'A\u2082=0.1','#333',8,'middle',false));}
if(p>=3){o.push(T(240,258,'p = 200/0.01 = 20000 Pa \u2192 F\u2082 = 20000\u00d70.1 = 2000 N','#0d47a1',9,'middle',true));}
s.innerHTML=o.join('');}
function dQ6(p){dQ2(p);}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ5(p);}
function dQ9(p){dQ1(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Pressure summary','#1565C0',13,'middle',true));
[['Solid pressure','p = F/A (Pa)'],['Liquid depth','\u0394p = \u03c1gh (Pa)'],['Hydraulic','F\u2082 = F\u2081A\u2082/A\u2081'],['Atmosphere','\u223c10\u2075 Pa at sea level'],['Upthrust','= \u03c1gV (weight of fluid displaced)']].forEach(function(r,i){if(i<p+1){o.push(R(18,44+i*38,444,30,'#e3f2fd','#BBDEFB',1));o.push(T(118,63+i*38,r[0],'#555',10,'middle',false));o.push(T(340,63+i*38,r[1],'#1565C0',10,'middle',true));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Physics \u2022 Pressure',ti:'Pressure in Solids',su:'Apply p = F/A. Calculate pressure, force or area.',steps:[
  {lb:'p = F/A',dr:dQ1,ht:'<p>Pressure = force per unit area.</p><div class="fm">p = F / A</div><p>Units: pascals (Pa). 1 Pa = 1 N/m\u00b2. Larger area \u2192 smaller pressure for the same force.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var type=pick(['p','F','A']);var F=rnd(20,200)*5,A=pick([0.001,0.002,0.005,0.01,0.02,0.05,0.1,0.2]);var p=parseFloat((F/A).toFixed(0));if(type==='p')return{question:'F = <b>'+F+' N</b>, A = <b>'+A+' m\u00b2</b>. Find pressure.',hints:['p = F/A'],ans:p,tol:p*0.01,unit:'Pa',working:'p = '+F+'/'+A+' = '+p+' Pa'};if(type==='F'){var p2=rnd(1,20)*1000,A2=pick([0.01,0.02,0.05,0.1,0.2]);return{question:'p = <b>'+p2+' Pa</b>, A = <b>'+A2+' m\u00b2</b>. Find force.',hints:['F = pA'],ans:p2*A2,tol:0.5,unit:'N',working:'F = '+p2+'\u00d7'+A2+' = '+p2*A2+' N'};}var F3=rnd(100,800),p3=rnd(1,20)*1000,A3=parseFloat((F3/p3).toFixed(4));return{question:'F = <b>'+F3+' N</b>, p = <b>'+p3+' Pa</b>. Find area.',hints:['A = F/p'],ans:A3,tol:A3*0.02,unit:'m\u00b2',working:'A = '+F3+'/'+p3+' = '+A3+' m\u00b2'};})}
]},
{ey:'Q2 \u2022 Y10 Physics \u2022 Pressure',ti:'Pressure in Liquids',su:'Explain why pressure increases with depth in a fluid.',steps:[
  {lb:'Pressure and depth',dr:dQ2,ht:'<p>In a liquid, pressure acts in all directions and increases with depth because there is more liquid weight above. Dams are built thicker at the base for this reason.</p>'},
  {lb:'Formula',dr:dQ2,ht:'<div class="fm">\u0394p = \u03c1 \u00d7 g \u00d7 h</div><p>\u03c1 = density of liquid (kg/m\u00b3). g = 9.81 N/kg. h = depth (m). This gives the additional pressure due to the liquid.</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var rho=pick([1000,800,1025,13600]),h=rnd(2,20),g=9.8,dp=parseFloat((rho*g*h).toFixed(0));return{question:'\u03c1 = <b>'+rho+' kg/m\u00b3</b>, h = <b>'+h+' m</b>, g=9.8. Find \u0394p.',hints:['\u0394p = \u03c1gh'],ans:dp,tol:dp*0.01,unit:'Pa',working:'\u0394p = '+rho+'\u00d79.8\u00d7'+h+' = '+dp+' Pa'};})},
]},
{ey:'Q3 \u2022 Y10 Physics \u2022 Pressure',ti:'Liquid Pressure Calculations',su:'Use \u0394p = \u03c1gh to find pressure, depth or density.',steps:[
  {lb:'\u0394p = \u03c1gh',dr:dQ3,ht:'<p>Rearrangements: h = \u0394p/(\u03c1g) \u2022 \u03c1 = \u0394p/(gh).</p><p>Example: water at 5 m depth: \u0394p = 1000\u00d79.8\u00d75 = 49 000 Pa.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var type=pick(['p','h','rho']);var rho=pick([1000,800,1025]),h=rnd(2,15),g=9.8,dp=parseFloat((rho*g*h).toFixed(0));if(type==='p')return{question:'\u03c1=<b>'+rho+'</b>, h=<b>'+h+' m</b>, g=9.8. Find \u0394p.',hints:['\u0394p = \u03c1gh'],ans:dp,tol:dp*0.01,unit:'Pa',working:'\u0394p = '+rho+'\u00d79.8\u00d7'+h+' = '+dp+' Pa'};if(type==='h'){var dp2=rnd(5,50)*1000,h2=parseFloat((dp2/(rho*g)).toFixed(2));return{question:'\u03c1=<b>'+rho+'</b>, \u0394p=<b>'+dp2+' Pa</b>, g=9.8. Find depth.',hints:['h = \u0394p/(\u03c1g)'],ans:h2,tol:0.05,unit:'m',working:'h = '+dp2+'/('+rho+'\u00d79.8) = '+h2+' m'};}var dp3=rnd(5,40)*1000,rho2=parseFloat((dp3/(g*h)).toFixed(0));return{question:'\u0394p=<b>'+dp3+' Pa</b>, h=<b>'+h+' m</b>, g=9.8. Find \u03c1.',hints:['\u03c1 = \u0394p/(gh)'],ans:rho2,tol:rho2*0.01,unit:'kg/m\u00b3',working:'\u03c1 = '+dp3+'/(9.8\u00d7'+h+') = '+rho2+' kg/m\u00b3'};})}
]},
{ey:'Q4 \u2022 Y10 Physics \u2022 Pressure',ti:'Atmospheric Pressure',su:'Describe atmospheric pressure and how it varies with altitude.',steps:[
  {lb:'What is atmospheric pressure?',dr:dQ4,ht:'<p>The weight of the atmosphere creates <b>atmospheric pressure</b> at the surface: ~10\u2075 Pa at sea level. As altitude increases, there is less air above \u2192 lower pressure.</p>'},
  {lb:'Applications',dr:dQ4,ht:'<p>Suction cups, drinking straws, vacuum cleaners all use atmospheric pressure. Aircraft cabins are pressurised. Mountain climbers use oxygen because air pressure is low.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){return{question:'A column of water equivalent to atmospheric pressure (~100 000 Pa). Find height h. (\u03c1=1000, g=9.8)',hints:['h = p/(\u03c1g)'],ans:parseFloat((100000/(1000*9.8)).toFixed(1)),tol:0.2,unit:'m',working:'h = 100000/(1000\u00d79.8) = '+parseFloat((100000/9800).toFixed(1))+' m'};})},
]},
{ey:'Q5 \u2022 Y10 Physics \u2022 Pressure',ti:'Hydraulic Systems',su:'Apply F\u2081/A\u2081 = F\u2082/A\u2082 (Pascal\u2019s principle).',steps:[
  {lb:"Pascal's principle",dr:dQ5,ht:"<p>Liquids are incompressible. Pressure applied to an enclosed liquid is transmitted equally throughout.</p><div class='fm'>F\u2081/A\u2081 = F\u2082/A\u2082</div><p>Larger output piston \u2192 larger output force (force multiplier).</p>"},
  {lb:'Applications',dr:dQ5,ht:'<p>Car brakes, hydraulic lifts, JCB diggers, hydraulic jacks. Small input force \u2192 large output force.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var A1=pick([0.01,0.02,0.005]),A2=pick([0.1,0.2,0.05]),F1=rnd(5,30)*10;var F2=parseFloat((F1*A2/A1).toFixed(1));return{question:'F\u2081=<b>'+F1+' N</b>, A\u2081=<b>'+A1+' m\u00b2</b>, A\u2082=<b>'+A2+' m\u00b2</b>. Find F\u2082.',hints:['F\u2082 = F\u2081\u00d7A\u2082/A\u2081'],ans:F2,tol:0.5,unit:'N',working:'F\u2082 = '+F1+'\u00d7'+A2+'/'+A1+' = '+F2+' N'};})},
]},
{ey:'Q6 \u2022 Y10 Physics \u2022 Pressure',ti:'Upthrust',su:'Upthrust = weight of fluid displaced = \u03c1gV.',steps:[
  {lb:'Upthrust from pressure difference',dr:dQ6,ht:'<p>Pressure at the bottom of a submerged object > pressure at the top \u2192 net upward force = <b>upthrust</b>.</p><div class="fm">Upthrust = \u03c1\u1da0\u02e1\u1d58\u1d35\u1d30 \u00d7 g \u00d7 V</div>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var rho=pick([1000,800,1025]),V=rnd(1,10)*0.001,U=parseFloat((rho*9.8*V).toFixed(2));return{question:'\u03c1=<b>'+rho+' kg/m\u00b3</b>, V=<b>'+V.toFixed(3)+' m\u00b3</b>, g=9.8. Find upthrust.',hints:['Upthrust = \u03c1gV'],ans:U,tol:0.05,unit:'N',working:'Upthrust = '+rho+'\u00d79.8\u00d7'+V.toFixed(3)+' = '+U+' N'};})},
]},
{ey:'Q7 \u2022 Y10 Physics \u2022 Pressure',ti:'Pressure Calculations Practice',su:'Mixed p=F/A and \u0394p=\u03c1gh questions.',steps:[
  {lb:'Choose the right equation',dr:dQ7,ht:'<p>Solid pressing on surface: p = F/A. Liquid at depth: \u0394p = \u03c1gh. Hydraulic: F\u2082=F\u2081A\u2082/A\u2081. Identify which situation first.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var type=pick(['solid','liquid']);if(type==='solid'){var F=rnd(100,600),A=pick([0.01,0.02,0.05,0.1]);return{question:'F = <b>'+F+' N</b> on area <b>'+A+' m\u00b2</b>. Find pressure.',hints:['p = F/A'],ans:parseFloat((F/A).toFixed(0)),tol:2,unit:'Pa',working:'p = '+F+'/'+A+' = '+parseFloat((F/A).toFixed(0))+' Pa'};}var rho=1000,h=rnd(3,20);return{question:'\u03c1=1000, h=<b>'+h+' m</b>, g=9.8. Find \u0394p.',hints:['\u0394p = \u03c1gh'],ans:rho*9.8*h,tol:5,unit:'Pa',working:'\u0394p = 1000\u00d79.8\u00d7'+h+' = '+(rho*9.8*h)+' Pa'};})}
]},
{ey:'Q8 \u2022 Y10 Physics \u2022 Pressure',ti:'Applications of Pressure',su:'Apply pressure concepts to everyday situations.',steps:[
  {lb:'Examples',dr:dQ8,ht:'<p>Stiletto heel: tiny A \u2192 huge pressure. Snowshoe: large A \u2192 small pressure. Hydraulic car brakes multiply force. Submarine: must withstand massive depth pressure. Dam: thicker at base.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var m=rnd(50,90),W=parseFloat((m*9.8).toFixed(0)),A=pick([0.03,0.04,0.05]),p=parseFloat((W/A).toFixed(0));return{question:'Person: m=<b>'+m+' kg</b>, standing on one foot (A=<b>'+A+' m\u00b2</b>), g=9.8. Find pressure on floor.',hints:['W = mg, then p = W/A'],ans:p,tol:p*0.02,unit:'Pa',working:'W = '+m+'\u00d79.8 = '+W+' N. p = '+W+'/'+A+' = '+p+' Pa'};})},
]},
{ey:'Q9 \u2022 Y10 Physics \u2022 Pressure',ti:'Pressure Summary',su:'All pressure equations: p=F/A, \u0394p=\u03c1gh, hydraulic, upthrust.',steps:[
  {lb:'Summary',dr:dQ9,ht:'<p>p=F/A (Pa) \u2022 \u0394p=\u03c1gh \u2022 F\u2082=F\u2081A\u2082/A\u2081 \u2022 Upthrust=\u03c1gV \u2022 Atm. pressure ~10\u2075 Pa at sea level.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var type=pick(['solid','liquid','hydraulic']);if(type==='solid'){var F=rnd(100,600),A=pick([0.01,0.02,0.05,0.1]);return{question:'p = F/A. F=<b>'+F+' N</b>, A=<b>'+A+' m\u00b2</b>.',hints:['p = F/A'],ans:parseFloat((F/A).toFixed(0)),tol:2,unit:'Pa',working:'p = '+F+'/'+A+' = '+parseFloat((F/A).toFixed(0))+' Pa'};}if(type==='liquid'){var h=rnd(3,20);return{question:'\u0394p=\u03c1gh. \u03c1=1000, h=<b>'+h+' m</b>, g=9.8.',hints:['\u0394p = \u03c1gh'],ans:1000*9.8*h,tol:5,unit:'Pa',working:'\u0394p = 1000\u00d79.8\u00d7'+h+' = '+(1000*9.8*h)+' Pa'};}var F1=rnd(100,500),A1=0.01,A2=pick([0.05,0.1,0.2]);return{question:'Hydraulic: F\u2081=<b>'+F1+' N</b>, A\u2081=0.01, A\u2082=<b>'+A2+'</b>. Find F\u2082.',hints:['F\u2082 = F\u2081A\u2082/A\u2081'],ans:F1*A2/A1,tol:0.5,unit:'N',working:'F\u2082 = '+F1+'\u00d7'+A2+'/0.01 = '+(F1*A2/A1)+' N'};})}
]},
{ey:'Q10 \u2022 Y10 Physics \u2022 Pressure',ti:'Mixed Pressure Problems',su:'Multi-step problems using all pressure equations.',steps:[
  {lb:'All equations',dr:dQ10,ht:'<p>p=F/A \u2022 \u0394p=\u03c1gh \u2022 F\u2082=F\u2081A\u2082/A\u2081 \u2022 Upthrust=\u03c1gV.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var m=rnd(50,90),W=parseFloat((m*9.8).toFixed(0)),nfeet=pick([1,2]),Afoot=pick([0.02,0.025,0.03]),Atot=Afoot*nfeet,p=parseFloat((W/Atot).toFixed(0));return{question:'Person m=<b>'+m+' kg</b>, '+nfeet+' foot/feet, each A=<b>'+Afoot+' m\u00b2</b>, g=9.8. Pressure on floor?',hints:['W=mg','Total A = n\u00d7Afoot','p = W/Atotal'],ans:p,tol:p*0.02,unit:'Pa',working:'W='+W+' N. A='+Atot+' m\u00b2. p='+W+'/'+Atot+'='+p+' Pa'};})},
]},
];
