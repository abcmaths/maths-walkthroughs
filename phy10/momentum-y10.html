<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}

body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'

}
document.addEventListener('click',function(e){

    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;

    var v=parseFloat(inp.value);

{ey:'Q3 \u2022 Y10 Physics \u2022 Momentum',ti:'Impulse',su:'Calculate impulse = F\u0394t = \u0394p. Explain safety applications.',steps:[
  {lb:'Impulse',dr:dQ3,ht:'<p>Impulse = change in momentum.</p><div class="fm">F \u00d7 \u0394t = m(v \u2212 u) = \u0394p</div><p>Units: N\u00b7s. Increasing contact time reduces peak force for the same \u0394p.</p>'},
  {lb:'Safety: airbags and crumple zones',dr:dQ3,ht:'<p>Airbags and crumple zones increase collision time \u0394t. Same impulse (\u0394p) spread over longer time \u2192 smaller peak force \u2192 less injury.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var type=pick(['impulse','F','t']);var F=rnd(5,30)*100;var t=rnd(2,10)*0.01;var I=parseFloat((F*t).toFixed(2));if(type==='impulse')return{question:'F = <b>'+F+' N</b> for <b>'+t.toFixed(2)+' s</b>. Find impulse.',hints:['Impulse = F\u00d7t'],ans:I,tol:0.05,unit:'N\u00b7s',working:'Impulse = '+F+'\u00d7'+t.toFixed(2)+' = '+I+' N\u00b7s'};if(type==='F'){var I2=rnd(5,30);var t2=rnd(2,8)*0.05;return{question:'Impulse = <b>'+I2+' N\u00b7s</b>, time = <b>'+t2.toFixed(2)+' s</b>. Find average force.',hints:['F = Impulse/t'],ans:parseFloat((I2/t2).toFixed(1)),tol:0.2,unit:'N',working:'F = '+I2+'/'+t2.toFixed(2)+' = '+parseFloat((I2/t2).toFixed(1))+' N'};}var I3=rnd(10,50);var F3=rnd(200,1000);return{question:'Impulse = <b>'+I3+' N\u00b7s</b>, F = <b>'+F3+' N</b>. Find contact time.',hints:['t = Impulse/F'],ans:parseFloat((I3/F3).toFixed(4)),tol:I3/F3*0.02,unit:'s',working:'t = '+I3+'/'+F3+' = '+parseFloat((I3/F3).toFixed(4))+' s'};})}
]},
{ey:'Q4 \u2022 Y10 Physics \u2022 Momentum',ti:'Explosions',su:'Apply conservation of momentum to explosions from rest.',steps:[
  {lb:'Explosions from rest',dr:dQ4,ht:'<p>Before: total p = 0 (everything at rest). After: the two parts fly apart with equal and opposite momenta.</p><div class="fm">m\u2081v\u2081 + m\u2082v\u2082 = 0</div>'},
  {lb:'Gun recoil',dr:dQ4,ht:'<p>Gun fires bullet at +400 m/s. p\u1d35\u1d56 = 0.01\u00d7400 = 4 kg\u00b7m/s. Gun recoil: p\u1d43\u1d41\u2099 = \u22124 kg\u00b7m/s. If gun mass = 2 kg: v = \u22122 m/s.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var m1=rnd(5,20)*100,v1=rnd(2,6),m2=rnd(1,5)*10;var v2=parseFloat((m1*v1/m2).toFixed(1));return{question:'Cannon <b>'+m1+' kg</b> recoils at <b>'+v1+' m/s</b>. Shell mass <b>'+m2+' kg</b>. Find shell speed.',hints:['m\u2081v\u2081 = m\u2082v\u2082 (magnitudes)'],ans:v2,tol:0.1,unit:'m/s',working:m2+'v = '+m1+'\u00d7'+v1+' = '+m1*v1+'. v = '+v2+' m/s'};})},
]},
{ey:'Q5 \u2022 Y10 Physics \u2022 Momentum',ti:'Collisions with Signs',su:'Solve momentum problems where objects move in opposite directions.',steps:[
  {lb:'Choose a positive direction',dr:dQ5,ht:'<p>Always define positive direction first. Assign + or \u2212 to each velocity before substituting into p = mv. Then: p\u1d35\u2099 = p\u1d43\u1d41\u1d40\u2090\u1d3c.</p>'},
  {lb:'Worked example',dr:dQ5,ht:'<p>3 kg at +4 m/s hits 2 kg at \u22122 m/s. Stick together.</p><p>p\u1d35\u2099 = 3(+4)+2(\u22122) = 8 kg\u00b7m/s. v = 8/(3+2) = +1.6 m/s.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var m1=rnd(3,8),u1=rnd(3,8),m2=rnd(2,5),u2=rnd(2,6);var ptot=m1*u1-m2*u2;var v=parseFloat((ptot/(m1+m2)).toFixed(2));return{question:'<b>'+m1+' kg</b> at +<b>'+u1+' m/s</b> hits <b>'+m2+' kg</b> at \u2212<b>'+u2+' m/s</b>. They stick. Find velocity.',hints:['p\u1d35\u2099 = m\u2081u\u2081 \u2212 m\u2082u\u2082','v = p\u1d35\u2099/(m\u2081+m\u2082)'],ans:v,tol:0.05,unit:'m/s',working:'p = '+(m1*u1)+'\u2212'+(m2*u2)+' = '+ptot+'. v = '+ptot+'/'+(m1+m2)+' = '+v+' m/s'};})},
]},
{ey:'Q6 \u2022 Y10 Physics \u2022 Momentum',ti:'Force and Rate of Change of Momentum',su:'Apply F = \u0394p/\u0394t as the general form of Newton\u2019s 2nd law.',steps:[
  {lb:'F = \u0394p/\u0394t',dr:dQ6,ht:'<p>The most general form of Newton\u2019s 2nd law:</p><div class="fm">F = \u0394p / \u0394t</div><p>F=ma is the special case when mass is constant. For rockets (changing mass) use F=\u0394p/\u0394t.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var m=rnd(2,10)*0.5,dv=rnd(4,20),t=rnd(2,8)*0.05;var F=parseFloat((m*dv/t).toFixed(1));return{question:'m = <b>'+m+' kg</b>, \u0394v = <b>'+dv+' m/s</b>, \u0394t = <b>'+t.toFixed(2)+' s</b>. Find force.',hints:['\u0394p = m\u0394v','F = \u0394p/\u0394t'],ans:F,tol:0.2,unit:'N',working:'\u0394p = '+m*dv+'. F = '+(m*dv)+'/'+t.toFixed(2)+' = '+F+' N'};})},
]},
{ey:'Q7 \u2022 Y10 Physics \u2022 Momentum',ti:'Elastic and Inelastic Collisions',su:'Distinguish elastic (KE conserved) from inelastic (KE lost).',steps:[
  {lb:'Elastic collisions',dr:dQ7,ht:'<p>In an <b>elastic collision</b>, both momentum AND kinetic energy are conserved. Example: ideal billiard balls.</p>'},
  {lb:'Inelastic collisions',dr:dQ7,ht:'<p>In an <b>inelastic collision</b>, momentum is conserved but kinetic energy decreases (converted to heat/sound/deformation). Most real collisions are inelastic.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var m=rnd(2,6),u=rnd(4,10),v=rnd(1,u-1);var KEb=0.5*m*u*u,KEa=0.5*m*v*v;var loss=parseFloat((KEb-KEa).toFixed(1));return{question:'<b>'+m+' kg</b> slows from <b>'+u+' m/s</b> to <b>'+v+' m/s</b>. How much KE is lost?',hints:['KE = \u00bdmv\u00b2','Loss = KE\u1d35\u2099 \u2212 KE\u1d43\u1d41\u1d40'],ans:loss,tol:0.2,unit:'J',working:'KE\u1d35\u2099='+KEb+', KE\u1d43\u1d41\u1d40='+KEa+'. Loss='+loss+' J'};})},
]},
{ey:'Q8 \u2022 Y10 Physics \u2022 Momentum',ti:'Impulse and Safety',su:'Explain how crumple zones and airbags reduce injury.',steps:[
  {lb:'Why longer time helps',dr:dQ8,ht:'<p>Same \u0394p either way (car stops). F\u0394t = \u0394p. Longer \u0394t \u2192 smaller F. Crumple zones and airbags increase collision time \u2192 reduce peak force on occupants.</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var m=rnd(60,90),v=rnd(10,25),t1=0.05,t2=0.3;var F1=parseFloat((m*v/t1).toFixed(0)),F2=parseFloat((m*v/t2).toFixed(0));return{question:'Person <b>'+m+' kg</b> stops from <b>'+v+' m/s</b>. Without airbag: \u0394t='+t1+' s. Find force without airbag.',hints:['F = m\u0394v/\u0394t'],ans:F1,tol:5,unit:'N',working:'F = '+m+'\u00d7'+v+'/'+t1+' = '+F1+' N (with airbag: '+m+'\u00d7'+v+'/0.3 = '+F2+' N)'};})},
]},
{ey:'Q9 \u2022 Y10 Physics \u2022 Momentum',ti:'Mixed Momentum Calculations',su:'p=mv, conservation, impulse and F=\u0394p/\u0394t.',steps:[
  {lb:'Strategy',dr:dQ9,ht:'<p>Identify: conservation (two bodies)? impulse (F\u00d7t)? or F=\u0394p/\u0394t? Write what you know, apply the equation.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var type=pick(['p','cons','impulse']);if(type==='p'){var m=rnd(2,10)*0.5,v=rnd(4,20);return{question:'m = <b>'+m+' kg</b>, v = <b>'+v+' m/s</b>. Find p.',hints:['p = mv'],ans:m*v,tol:0.05,unit:'kg\u00b7m/s',working:'p = '+m+'\u00d7'+v+' = '+(m*v)+' kg\u00b7m/s'};}if(type==='cons'){var m1=rnd(3,8),u1=rnd(4,10),m2=rnd(1,4);var v=parseFloat(((m1*u1)/(m1+m2)).toFixed(2));return{question:'<b>'+m1+' kg</b> at <b>'+u1+' m/s</b> hits stationary <b>'+m2+' kg</b>. Stick. Find v.',hints:['m\u2081u\u2081 = (m\u2081+m\u2082)v'],ans:v,tol:0.05,unit:'m/s',working:'v = '+(m1*u1)+'/'+(m1+m2)+' = '+v+' m/s'};}var F=rnd(100,500),t=rnd(2,8)*0.01;return{question:'F = <b>'+F+' N</b> for <b>'+t.toFixed(2)+' s</b>. Find impulse.',hints:['Impulse = F\u00d7t'],ans:parseFloat((F*t).toFixed(2)),tol:0.05,unit:'N\u00b7s',working:'Impulse = '+F+'\u00d7'+t.toFixed(2)+' = '+parseFloat((F*t).toFixed(2))+' N\u00b7s'};})}
]},
{ey:'Q10 \u2022 Y10 Physics \u2022 Momentum',ti:'Momentum Summary',su:'Review all momentum equations and concepts.',steps:[
  {lb:'All equations',dr:dQ10,ht:'<p>p=mv \u2022 total p conserved \u2022 Impulse=F\u0394t=\u0394p \u2022 F=\u0394p/\u0394t \u2022 explosion: p\u2081+p\u2082=0.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['p','explo','F']);if(type==='p'){var m=rnd(2,10),v=rnd(3,15);return{question:'p = mv. m = <b>'+m+' kg</b>, v = <b>'+v+' m/s</b>.',hints:['p = mv'],ans:m*v,tol:0.05,unit:'kg\u00b7m/s',working:'p = '+m+'\u00d7'+v+' = '+(m*v)+' kg\u00b7m/s'};}if(type==='explo'){var m1=rnd(5,20)*100,v1=rnd(2,6),m2=rnd(1,5)*10;return{question:'Explosion: <b>'+m1+' kg</b> at <b>'+v1+' m/s</b> \u2192 speed of <b>'+m2+' kg</b> part?',hints:['m\u2081v\u2081 = m\u2082v\u2082'],ans:parseFloat((m1*v1/m2).toFixed(1)),tol:0.1,unit:'m/s',working:m2+'v = '+m1*v1+'. v = '+parseFloat((m1*v1/m2).toFixed(1))+' m/s'};}var F=rnd(100,500),t=rnd(2,8)*0.01;return{question:'F = <b>'+F+' N</b>, \u0394t = <b>'+t.toFixed(2)+' s</b>. Find \u0394p.',hints:['\u0394p = F\u0394t'],ans:parseFloat((F*t).toFixed(2)),tol:0.05,unit:'kg\u00b7m/s',working:'\u0394p = '+F+'\u00d7'+t.toFixed(2)+' = '+parseFloat((F*t).toFixed(2))+' kg\u00b7m/s'};})}
]},
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
