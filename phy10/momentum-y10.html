var qi=0,si=0;
function buildSidebar(){
  var sb=document.getElementById('sb');
  sb.innerHTML='<div class="sb-lbl">Subtopics</div>';
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}
function render(){
  var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su||'';
  document.getElementById('pn').className='pnl fi';
  document.getElementById('pn').innerHTML='<div class="sl">'+st.sl+'</div><div>'+st.p+'</div>';
  if(st.draw)st.draw();
  var dt=document.getElementById('dt');
  dt.innerHTML=q.steps.map(function(_,i){return '<div class="dot'+(i===si?' on':i<si?' dn':'')+'"></div>';}).join('');
  document.getElementById('pb').disabled=(qi===0&&si===0);
  var last=(qi===QS.length-1&&si===q.steps.length-1);
  document.getElementById('nb').textContent=last?'Mark Complete \u2713':'Next \u2192';
  document.getElementById('nb').onclick=last?markComplete:advance;
  document.getElementById('nb').disabled=false;
  document.querySelectorAll('.qb').forEach(function(b,i){b.classList.toggle('on',i===qi);});
}
function advance(){
  var q=QS[qi];
  if(si<q.steps.length-1){si++;}
  else if(qi<QS.length-1){qi++;si=0;}
  render();
}
document.getElementById('pb').onclick=function(){
  if(si>0){si--;}
  else if(qi>0){qi--;si=QS[qi].steps.length-1;}
  render();
};
buildSidebar();render();

</script>
