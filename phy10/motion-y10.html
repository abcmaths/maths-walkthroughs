<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#e8f4fd);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

var ST={};
function tryIt(genFn){
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">&#10004; Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn();
    entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div');
    tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn};
    return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.05;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite \u2014 check your working and try again.';}
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#e3f2fd';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){
  var id='m'+Math.round(x1)+Math.round(y2);
  return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs>'
    +'<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';
}

/* Q1: Speed and velocity */
function dQ1(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(R(80,18,320,54,'#e3f2fd','#1565C0',2));
  o.push(T(240,43,'v = s \u00f7 t','#0d47a1',22,'middle',true));
  if(p>=1){
    o.push(R(40,90,118,42,'#bbdefb','#1565C0',1.5));
    o.push(T(99,116,'v  (m/s)','#1565C0',13,'middle',true));
    o.push(R(181,90,118,42,'#bbdefb','#1565C0',1.5));
    o.push(T(240,116,'s  (m)','#1565C0',13,'middle',true));
    o.push(R(322,90,118,42,'#bbdefb','#1565C0',1.5));
    o.push(T(381,116,'t  (s)','#1565C0',13,'middle',true));
  }
  if(p>=2){
    o.push(T(240,160,'Speed is a scalar (magnitude only).','#555',12,'middle',false));
    o.push(T(240,180,'Velocity is a vector (magnitude + direction).','#555',12,'middle',false));
  }
  if(p>=3){
    o.push(R(50,200,380,44,'#e8f5e9','#2E7D32',1.5));
    o.push(T(240,217,'Example: 100 m in 10 s \u2192 v = 100 \u00f7 10 = 10 m/s','#2E7D32',13,'middle',false));
    o.push(T(240,234,'Average speed = total distance \u00f7 total time','#555',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q2: Distance-time graphs */
function dQ2(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(L(48,228,48,22,'#333',2));
  o.push(L(48,228,458,228,'#333',2));
  o.push(T(48,250,'time (s)','#333',10,'middle',false));
  o.push(T(25,128,'d (m)','#333',10,'middle',false));
  if(p>=1){
    o.push(L(58,218,138,218,'#888',2.5));
    o.push(T(98,208,'stationary','#888',9,'middle',false));
  }
  if(p>=2){
    o.push(L(138,218,268,148,'#1565C0',2.5));
    o.push(T(203,166,'constant speed','#1565C0',9,'middle',false));
    o.push(T(240,250,'gradient = speed','#1565C0',10,'middle',true));
  }
  if(p>=3){
    for(var i=0;i<42;i++){
      var x1=268+i*4,x2=268+(i+1)*4;
      var y1=148-i*i*0.045,y2=148-(i+1)*(i+1)*0.045;
      if(y1>24&&y2>24) o.push(L(x1,y1,x2,y2,'#C0272D',2.5));
    }
    o.push(T(390,65,'accelerating\n(curve)','#C0272D',9,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q3: Acceleration */
function dQ3(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(R(80,15,320,52,'#e3f2fd','#1565C0',2));
  o.push(T(240,38,'a = (v \u2212 u) \u00f7 t','#0d47a1',20,'middle',true));
  if(p>=1){
    o.push(T(80,82,'a = acceleration (m/s\u00b2)','#1565C0',11,'start',false));
    o.push(T(80,100,'v = final velocity (m/s)','#333',11,'start',false));
    o.push(T(80,118,'u = initial velocity (m/s)','#333',11,'start',false));
    o.push(T(80,136,'t = time (s)','#333',11,'start',false));
  }
  if(p>=2){
    o.push(R(50,155,380,50,'#fff','#ccc',1));
    o.push(T(240,173,'Example: u = 0, v = 30 m/s, t = 6 s','#333',12,'middle',false));
    o.push(T(240,197,'a = (30 \u2212 0) \u00f7 6 = 5 m/s\u00b2','#1565C0',14,'middle',true));
  }
  if(p>=3){
    o.push(T(240,228,'Deceleration = negative acceleration','#555',11,'middle',false));
    o.push(T(240,248,'g = 9.81 m/s\u00b2 (gravitational acceleration)','#555',11,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q4: Speed-time graphs */
function dQ4(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(L(48,228,48,22,'#333',2));
  o.push(L(48,228,458,228,'#333',2));
  o.push(T(253,250,'time (s)','#333',10,'middle',false));
  o.push(T(25,128,'v (m/s)','#333',10,'middle',false));

  }
  if(p>=2){
    o.push(L(168,108,308,108,'#2E7D32',2.5));
    o.push(T(238,96,'constant speed','#2E7D32',9,'middle',false));
    o.push(T(180,250,'gradient = acceleration','#1565C0',10,'middle',false));
  }
  if(p>=3){
    o.push(L(308,108,428,218,'#C0272D',2.5));
    o.push(T(368,148,'decelerating','#C0272D',9,'middle',false));
    o.push('<polygon points="168,228 168,108 308,108 308,228" fill="#c8e6c9" opacity="0.5"/>');
    o.push(T(238,195,'area = distance','#2E7D32',10,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q5: SUVAT */
function dQ5(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(T(240,22,'SUVAT equations (uniform acceleration only)','#1565C0',12,'middle',true));
  var eqs=[
    ['v = u + at','omits s'],
    ['s = ut + \u00bdat\u00b2','omits v'],
    ['v\u00b2 = u\u00b2 + 2as','omits t'],
    ['s = \u00bd(u+v)t','omits a']
  ];
  eqs.forEach(function(eq,i){
    var lit=(i<p);
    o.push(R(38,42+i*50,362,40,lit?'#e3f2fd':'#f5f5f5',lit?'#1565C0':'#ccc',lit?1.5:1));
    o.push(T(215,66+i*50,eq[0],lit?'#0d47a1':'#aaa',14,'middle',lit));
    o.push(T(416,66+i*50,eq[1],lit?'#888':'#ccc',9,'middle',false));
  });
  if(p>=4){
    o.push(T(240,250,'s=displacement  u=initial vel  v=final vel  a=accel  t=time','#555',9,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q6: Free fall */
function dQ6(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(arw(240,18,240,245,'#1565C0',2));
  o.push(T(262,130,'g = 9.81 m/s\u00b2','#1565C0',11,'start',false));
  var times=[0,1,2,3];
  times.forEach(function(t){
    if(t<=p){
      var r=11-t*2;
      o.push('<circle cx="200" cy="'+(28+t*58)+'" r="'+r+'" fill="#90caf9" stroke="#1565C0" stroke-width="1.5"/>');
      o.push(T(295,32+t*58,'t = '+t+' s','#333',10,'start',false));
      o.push(T(375,32+t*58,'v = '+(9.8*t).toFixed(1)+' m/s','#1565C0',10,'start',false));
      o.push(T(455,32+t*58,'s = '+(4.9*t*t).toFixed(1)+' m','#888',9,'start',false));
    }
  });
  if(p>=4){
    o.push(T(240,252,'All objects fall at g = 9.81 m/s\u00b2 (no air resistance)','#555',9,'middle',false));
  }
  s.innerHTML=o.join('');
}

/* Q7: Terminal velocity */
function dQ7(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(L(48,232,48,22,'#333',2));
  o.push(L(48,232,458,232,'#333',2));
  o.push(T(253,252,'time','#333',9,'middle',false));
  o.push(T(25,130,'speed','#333',9,'middle',false));
  for(var t=0;t<130;t++){
    var v1=55*(1-Math.exp(-t/24)),v2=55*(1-Math.exp(-(t+1)/24));
    o.push(L(48+t*3.1,232-v1*3.6,48+(t+1)*3.1,232-v2*3.6,'#1565C0',2.5));
  }
  if(p>=1){
    o.push(L(48,34,458,34,'#E65100',1.5));
    o.push(T(420,26,'terminal velocity','#E65100',9,'end',false));
  }
  if(p>=2){
    o.push(T(120,220,'W > drag\naccelerating','#1565C0',8,'middle',false));
    o.push(T(380,220,'W = drag\nconstant speed','#E65100',8,'middle',false));
  }
  if(p>=3){
    o.push(R(30,55,250,55,'#e3f2fd','#1565C0',1));
    o.push(T(155,72,'Weight (down, constant)','#333',10,'middle',false));
    o.push(T(155,92,'Drag (up, increases with speed)','#333',10,'middle',false));
    o.push(T(155,108,'When equal: acceleration = 0','#1565C0',10,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q8: Stopping distances */
function dQ8(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(T(240,20,'Stopping distance = thinking + braking','#1565C0',12,'middle',true));
  if(p>=1){
    o.push(R(30,42,195,44,'#ffe082','#E65100',2));
    o.push(T(127,68,'Thinking distance','#E65100',11,'middle',true));
    o.push(T(127,50,'v \u00d7 reaction time','#555',9,'middle',false));
  }
  if(p>=2){
    o.push(R(240,42,210,44,'#90caf9','#1565C0',2));
    o.push(T(345,68,'Braking distance','#1565C0',11,'middle',true));
    o.push(T(345,50,'v\u00b2 \u00f7 (2a)','#555',9,'middle',false));
  }
  if(p>=3){
    o.push(R(30,106,420,88,'#e3f2fd','#1565C0',1));
    o.push(T(240,122,'Example: v = 20 m/s, reaction = 0.3 s, a = 5 m/s\u00b2','#333',11,'middle',false));
    o.push(T(240,142,'Thinking = 20 \u00d7 0.3 = 6 m','#E65100',11,'middle',false));
    o.push(T(240,162,'Braking = 20\u00b2 \u00f7 (2\u00d75) = 40 m','#1565C0',11,'middle',false));
    o.push(T(240,182,'Total = 6 + 40 = 46 m','#0d47a1',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* Q9: Relative motion */
function dQ9(p){
  var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
  o.push(T(240,22,'Relative motion','#1565C0',13,'middle',true));
  o.push(R(30,42,420,82,'#e8f5e9','#2E7D32',1.5));
  o.push(T(56,65,'Same direction:','#2E7D32',11,'start',true));
  if(p>=1){
    o.push(arw(40,90,118,90,'#1565C0',2));
    o.push(T(79,82,'20 m/s','#1565C0',8,'middle',false));
    o.push(arw(198,90,296,90,'#2E7D32',2));
    o.push(T(247,82,'28 m/s','#2E7D32',8,'middle',false));

var QS=[
  {ey:'Q1 \u2022 Y10 Physics \u2022 Motion',ti:'Speed and Velocity',su:'Calculate speed using v = s \u00f7 t. Distinguish speed (scalar) from velocity (vector).',steps:[
    {lb:'The formula',dr:dQ1,ht:'<p><b>Speed</b> = distance \u00f7 time (scalar \u2014 magnitude only).<br><b>Velocity</b> = displacement \u00f7 time (vector \u2014 magnitude + direction).</p><div class="fm">v = s \u00f7 t</div><p>Units: metres per second (m/s). Average speed = total distance \u00f7 total time.</p>'},
    {lb:'Scalars and vectors',dr:dQ1,ht:'<p><b>Scalars:</b> speed, distance, mass, time, energy, temperature.<br><b>Vectors:</b> velocity, displacement, acceleration, force, momentum, weight.</p><p>A vector requires both a magnitude and a direction to fully describe it.</p>'},
    {lb:'Example',dr:dQ1,ht:'<p>A car travels 100 m in 10 s at constant speed.</p><div class="fm">v = 100 \u00f7 10 = 10 m/s</div><p>If it returns to the start over 10 more seconds: average speed = 200 \u00f7 20 = 10 m/s. Average velocity = 0 (same start and end point).</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){
      var d=rnd(4,40)*25, t=rnd(4,20);

    })}
  ]},
  {ey:'Q2 \u2022 Y10 Physics \u2022 Motion',ti:'Distance\u2013Time Graphs',su:'Interpret a d\u2013t graph. Gradient of d\u2013t graph = speed.',steps:[
    {lb:'Reading the graph',dr:dQ2,ht:'<p>A <b>distance\u2013time (d\u2013t) graph</b> shows how far an object has travelled over time.</p><p>Horizontal line \u2192 stationary (speed = 0).<br>Straight slope \u2192 constant speed.<br>Steeper slope \u2192 greater speed.</p>'},
    {lb:'Gradient = speed',dr:dQ2,ht:'<p>The <b>gradient</b> of a straight section gives the speed during that section.</p><div class="fm">speed = gradient = rise \u00f7 run = \u0394d \u00f7 \u0394t</div><p>A downward slope means moving back towards the start.</p>'},
    {lb:'Curved sections',dr:dQ2,ht:'<p>A <b>curve</b> on a d\u2013t graph means the speed is changing (accelerating or decelerating). A steepening curve = speeding up. A flattening curve = slowing down.</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){
      var rise=rnd(4,24)*25, run=rnd(5,20);
      return {question:'A straight line on a d\u2013t graph rises <b>'+rise+' m</b> over <b>'+run+' s</b>. What speed does it represent?',hints:['speed = rise \u00f7 run = \u0394d \u00f7 \u0394t'],ans:rise/run,tol:0.05,unit:'m/s',working:'speed = '+rise+' \u00f7 '+run+' = '+(rise/run).toFixed(2)+' m/s'};
    })}
  ]},
  {ey:'Q3 \u2022 Y10 Physics \u2022 Motion',ti:'Acceleration',su:'Calculate acceleration using a = (v \u2212 u) \u00f7 t.',steps:[
    {lb:'What is acceleration?',dr:dQ3,ht:'<p><b>Acceleration</b> is the rate of change of velocity. It is a vector (direction matters).</p><div class="fm">a = (v \u2212 u) \u00f7 t</div><p>a in m/s\u00b2. v = final velocity. u = initial velocity. t = time in seconds.<br>Negative acceleration = deceleration (slowing down).</p>'},
    {lb:'Worked example',dr:dQ3,ht:'<p>A car speeds up from rest (u = 0) to 30 m/s in 6 s.</p><div class="fm">a = (30 \u2212 0) \u00f7 6 = 5 m/s\u00b2</div><p>The car gains 5 m/s of speed every second.</p>'},
    {lb:'Deceleration',dr:dQ3,ht:'<p>A bus brakes from 15 m/s to rest in 5 s.</p><div class="fm">a = (0 \u2212 15) \u00f7 5 = \u22123 m/s\u00b2</div><p>The negative sign shows the object is slowing down (decelerating).</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){

      if(type==='v') return{question:'u = <b>'+u+' m/s</b>, a = <b>'+a+' m/s\u00b2</b>, t = <b>'+t+' s</b>. Find final velocity.',hints:['v = u + at'],ans:v,tol:0.05,unit:'m/s',working:'v = '+u+' + '+a+'\u00d7'+t+' = '+v+' m/s'};
      return{question:'v = <b>'+v+' m/s</b>, a = <b>'+a+' m/s\u00b2</b>, t = <b>'+t+' s</b>. Find initial velocity u.',hints:['u = v \u2212 at'],ans:u,tol:0.05,unit:'m/s',working:'u = '+v+' \u2212 '+a+'\u00d7'+t+' = '+u+' m/s'};
    })}
  ]},
  {ey:'Q4 \u2022 Y10 Physics \u2022 Motion',ti:'Speed\u2013Time Graphs',su:'Gradient of v\u2013t graph = acceleration. Area under v\u2013t graph = distance.',steps:[
    {lb:'Reading the graph',dr:dQ4,ht:'<p>A <b>speed\u2013time (v\u2013t) graph</b> shows how speed changes over time.</p><p>Horizontal line \u2192 constant speed. Positive slope \u2192 acceleration. Negative slope \u2192 deceleration. Steeper slope \u2192 greater acceleration.</p>'},
    {lb:'Gradient = acceleration',dr:dQ4,ht:'<p>The gradient of a straight section gives the acceleration.</p><div class="fm">acceleration = \u0394v \u00f7 \u0394t</div><p>Read the change in speed and the time interval from a straight section only.</p>'},
    {lb:'Area = distance',dr:dQ4,ht:'<p>The <b>area under a v\u2013t graph</b> equals the distance travelled.</p><p>Rectangle: area = v \u00d7 t<br>Triangle: area = \u00bd \u00d7 base \u00d7 height<br>Trapezium: area = \u00bd(v\u2081+v\u2082) \u00d7 t</p>'},

    })}
  ]},
  {ey:'Q5 \u2022 Y10 Physics \u2022 Motion',ti:'SUVAT Equations',su:'For uniform acceleration: select and apply the correct SUVAT equation.',steps:[
    {lb:'The four equations',dr:dQ5,ht:'<p>These apply only under <b>uniform (constant) acceleration</b>. Variables: s = displacement, u = initial velocity, v = final velocity, a = acceleration, t = time.</p><p>Method: write the three values you know and identify the unknown. Pick the equation that omits the variable you don\u2019t need.</p>'},
    {lb:'v = u + at',dr:dQ5,ht:'<p>Omits <b>s</b>. Use when no displacement is given or needed.</p><div class="fm">v = u + at</div><p>Example: u = 5, a = 3, t = 4 \u2192 v = 5 + 12 = 17 m/s</p>'},
    {lb:'v\u00b2 = u\u00b2 + 2as',dr:dQ5,ht:'<p>Omits <b>t</b>. Use when no time is given.</p><div class="fm">v\u00b2 = u\u00b2 + 2as</div><p>Example: u = 0, a = 5, s = 20 \u2192 v\u00b2 = 200 \u2192 v \u2248 14.1 m/s</p>'},
    {lb:'s = ut + \u00bdat\u00b2',dr:dQ5,ht:'<p>Omits <b>v</b>. Use when final velocity is not given or needed.</p><div class="fm">s = ut + \u00bdat\u00b2</div><p>Example: u = 0, a = 4, t = 3 \u2192 s = 0 + \u00bd\u00d74\u00d79 = 18 m</p>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){

      if(type==='s_from_uat2'){var a2=rnd(2,5),t2=rnd(2,6);var s=0.5*a2*t2*t2;return{question:'u = 0, a = <b>'+a2+' m/s\u00b2</b>, t = <b>'+t2+' s</b>. Find s.',hints:['s = ut + \u00bdat\u00b2','u = 0 so s = \u00bdat\u00b2'],ans:s,tol:0.1,unit:'m',working:'s = \u00bd\u00d7'+a2+'\u00d7'+t2+'\u00b2 = '+s+' m'};}
      var a3=rnd(2,6),s3=rnd(10,50)*2;var v3=parseFloat(Math.sqrt(2*a3*s3).toFixed(2));return{question:'u = 0, a = <b>'+a3+' m/s\u00b2</b>, s = <b>'+s3+' m</b>. Find v.',hints:['v\u00b2 = u\u00b2 + 2as','v = \u221a(2as) when u = 0'],ans:v3,tol:0.1,unit:'m/s',working:'v = \u221a(2\u00d7'+a3+'\u00d7'+s3+') = \u221a'+2*a3*s3+' = '+v3+' m/s'};
    })}
  ]},
  {ey:'Q6 \u2022 Y10 Physics \u2022 Motion',ti:'Free Fall',su:'Apply g = 9.81 m/s\u00b2 to objects in free fall. Use SUVAT with u = 0.',steps:[
    {lb:'What is free fall?',dr:dQ6,ht:'<p><b>Free fall</b> means falling under gravity alone, with no air resistance. All objects accelerate at the same rate regardless of mass.</p><div class="fm">g = 9.81 m/s\u00b2  (downward)</div>'},
    {lb:'Dropped from rest',dr:dQ6,ht:'<p>For an object dropped from rest, u = 0 and a = g. Using SUVAT:</p><div class="fm">v = gt &nbsp;&nbsp;&nbsp; s = \u00bdgt\u00b2</div><p>After 1 s: v = 9.8 m/s. After 2 s: v = 19.6 m/s.</p>'},
    {lb:'Finding speed at impact',dr:dQ6,ht:'<p>To find speed after falling height h from rest:</p><div class="fm">v\u00b2 = 2gh &nbsp;&rarr;&nbsp; v = \u221a(2gh)</div><p>Example: h = 20 m \u2192 v = \u221a(2\u00d79.8\u00d720) = 19.8 m/s</p>'},

      if(type==='dist_t'){var t2=rnd(1,4);var s=parseFloat((4.9*t2*t2).toFixed(1));return{question:'Object dropped from rest. How far does it fall in <b>'+t2+' s</b>? (g = 9.8)',hints:['s = \u00bdgt\u00b2'],ans:s,tol:0.2,unit:'m',working:'s = \u00bd\u00d79.8\u00d7'+t2+'\u00b2 = '+s+' m'};}
      var h=rnd(5,25)*4;var v2=parseFloat(Math.sqrt(2*9.8*h).toFixed(1));return{question:'Object dropped from <b>'+h+' m</b>. Speed at impact? (g = 9.8)',hints:['v = \u221a(2gh)'],ans:v2,tol:0.2,unit:'m/s',working:'v = \u221a(2\u00d79.8\u00d7'+h+') = '+v2+' m/s'};

  {ey:'Q7 \u2022 Y10 Physics \u2022 Motion',ti:'Terminal Velocity',su:'Explain how drag and weight produce terminal velocity.',steps:[

    {lb:'Terminal velocity',dr:dQ7,ht:'<p>As speed increases, drag increases. Eventually <b>drag = weight</b>. Net force = 0. Acceleration = 0. The object falls at constant <b>terminal velocity</b>.</p>'},
    {lb:'On a v\u2013t graph',dr:dQ7,ht:'<p>The v\u2013t graph curves upward steeply at first (large net force), then flattens as drag grows, finally becoming horizontal at terminal velocity.</p><p>Opening a parachute: drag &gt; weight \u2192 deceleration \u2192 new lower terminal velocity.</p>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt(function(){

  {ey:'Q8 \u2022 Y10 Physics \u2022 Motion',ti:'Stopping Distances',su:'Calculate thinking distance, braking distance and total stopping distance.',steps:[
    {lb:'Two components',dr:dQ8,ht:'<p><b>Total stopping distance</b> = thinking distance + braking distance.</p><p><b>Thinking distance</b> = distance covered during reaction time (typically ~0.3 s). Proportional to speed.</p><p><b>Braking distance</b> = distance while decelerating to stop. Depends on speed\u00b2.</p>'},
    {lb:'Thinking distance',dr:dQ8,ht:'<div class="fm">thinking distance = v \u00d7 t\u1d63\u1d49\u1d43\u1d3e\u1d3c\u1d35\u1d52\u207f</div><p>Example: v = 20 m/s, reaction time = 0.3 s \u2192 thinking distance = 20 \u00d7 0.3 = 6 m</p>'},
    {lb:'Braking distance',dr:dQ8,ht:'<p>Using v\u00b2 = u\u00b2 + 2as with v = 0:</p><div class="fm">braking distance = u\u00b2 \u00f7 (2a)</div><p>Example: u = 20 m/s, a = 5 m/s\u00b2 \u2192 braking distance = 400 \u00f7 10 = 40 m</p>'},

      if(type==='think') return{question:'v = <b>'+u+' m/s</b>, reaction time = 0.3 s. Find thinking distance.',hints:['thinking distance = v \u00d7 t'],ans:td,tol:0.1,unit:'m',working:u+' \u00d7 0.3 = '+td+' m'};
      return{question:'v = <b>'+u+' m/s</b>, deceleration = <b>'+a+' m/s\u00b2</b>. Find braking distance.',hints:['braking distance = v\u00b2 \u00f7 (2a)'],ans:bd,tol:0.5,unit:'m',working:u+'\u00b2 \u00f7 (2\u00d7'+a+') = '+bd+' m'};
    })}
  ]},
  {ey:'Q9 \u2022 Y10 Physics \u2022 Motion',ti:'Relative Motion',su:'Calculate the relative velocity between two moving objects.',steps:[
    {lb:'What is relative velocity?',dr:dQ9,ht:'<p>All velocities are measured relative to a reference frame. When two objects move, their <b>relative velocity</b> is the velocity of one as seen from the other.</p>'},
    {lb:'Same direction',dr:dQ9,ht:'<p>Objects moving in the <b>same direction</b>:</p><div class="fm">relative speed = |v\u2081 \u2212 v\u2082|</div><p>Example: car at 28 m/s overtakes cyclist at 8 m/s \u2192 relative speed = 20 m/s.</p>'},
    {lb:'Opposite directions',dr:dQ9,ht:'<p>Objects moving in <b>opposite directions</b>:</p><div class="fm">relative speed = v\u2081 + v\u2082</div><p>Example: two trains each at 30 m/s approaching head-on \u2192 relative speed = 60 m/s.</p>'},

      return{question:'Two vehicles approach each other: <b>'+v1+' m/s</b> and <b>'+v2+' m/s</b>. Closing speed?',hints:['Opposite directions: add'],ans:v1+v2,tol:0.1,unit:'m/s',working:v1+' + '+v2+' = '+(v1+v2)+' m/s'};
    })}
  ]},
  {ey:'Q10 \u2022 Y10 Physics \u2022 Motion',ti:'Distance vs Displacement',su:'Distinguish scalar distance from vector displacement.',steps:[
    {lb:'Definitions',dr:dQ10,ht:'<p><b>Distance</b>: total path length travelled (scalar, always positive).</p><p><b>Displacement</b>: straight-line distance from start to finish, with direction stated (vector, can be zero).</p>'},
    {lb:'Example: running track',dr:dQ10,ht:'<p>An athlete runs 400 m around a track and returns to the start.</p><p>Distance = 400 m. Displacement = 0 m (back at start).</p><p>Average speed = 400 \u00f7 t (positive). Average velocity = 0 \u00f7 t = 0 m/s.</p>'},

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb');
  var lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML='';
  sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt');
  w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');
    w.appendChild(d);
  });
}
function render(){
  bSB();
  var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi');
  void p.offsetWidth;

  bDT();
  document.getElementById('pb').disabled=si===0;

}

});
