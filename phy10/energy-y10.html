<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">&#10004; Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    if(Math.abs(v-o.ans)<=(o.tol!=null?o.tol:0.05)){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Energy stores','#1565C0',14,'middle',true));
[['Kinetic','Ek = \u00bdmv\u00b2','moving objects'],['Gravitational PE','\u0394Ep = mgh','raised objects'],['Elastic PE','E = \u00bdke\u00b2','stretched spring'],['Chemical','bonds in fuel/food','batteries, food'],['Thermal','internal energy','warm objects'],['Nuclear','E=mc\u00b2','atomic nuclei']].forEach(function(r,i){
  if(i<p+1){o.push(R(10,40+i*34,460,28,'#e3f2fd','#BBDEFB',1));o.push(T(100,58+i*34,r[0],'#1565C0',10,'middle',true));o.push(T(245,58+i*34,r[1],'#0d47a1',10,'middle',false));o.push(T(420,58+i*34,r[2],'#555',9,'end',false));}});
s.innerHTML=o.join('');}
function dQ2(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(R(80,15,320,52,'#e3f2fd','#1565C0',2));o.push(T(240,38,'W = F \u00d7 d','#0d47a1',22,'middle',true));
if(p>=1){[['W','work done','J','#C0272D',80],['F','force','N','#1565C0',240],['d','distance','m','#2E7D32',400]].forEach(function(r){o.push(R(r[4]-48,88,104,40,'#e3f2fd','#1565C0',1));o.push(T(r[4],112,r[0],r[3],14,'middle',true));o.push(T(r[4],144,r[2],'#555',9,'middle',false));});}
if(p>=2){o.push(R(50,160,380,56,'#fff','#ccc',1));o.push(T(240,180,'Push 60 N over 5 m:','#333',12,'middle',false));o.push(T(240,203,'W = 60 \u00d7 5 = 300 J','#1565C0',14,'middle',true));}
s.innerHTML=o.join('');}
function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'GPE and KE','#1565C0',14,'middle',true));
o.push(R(10,40,460,52,'#e3f2fd','#1565C0',1.5));o.push(T(240,64,'\u0394Ep = m \u00d7 g \u00d7 h','#0d47a1',16,'middle',true));o.push(T(240,80,'gravitational potential energy (J)','#555',9,'middle',false));
if(p>=1){o.push(R(10,108,460,52,'#e3f2fd','#1565C0',1.5));o.push(T(240,132,'Ek = \u00bd \u00d7 m \u00d7 v\u00b2','#0d47a1',16,'middle',true));o.push(T(240,148,'kinetic energy (J)','#555',9,'middle',false));}
if(p>=2){o.push(R(10,176,460,44,'#e8f5e9','#2E7D32',1.5));o.push(T(240,200,'At base of drop: mgh = \u00bdmv\u00b2 \u2192 v = \u221a(2gh)','#2E7D32',12,'middle',true));}
s.innerHTML=o.join('');}
function dQ4(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(R(80,15,320,52,'#e3f2fd','#1565C0',2));o.push(T(240,38,'P = W / t','#0d47a1',22,'middle',true));
if(p>=1){o.push(T(240,82,'Power (W) = Work done (J) \u00f7 time (s)','#555',11,'middle',false));o.push(T(240,100,'Also: P = F \u00d7 v (force \u00d7 velocity)','#555',11,'middle',false));}
if(p>=2){[['60 W light bulb','60 J per second'],['Person walking','~80 W'],['Family car engine','~100 kW'],['Power station','~1 GW']].forEach(function(r,i){o.push(R(10,120+i*32,460,26,'#e3f2fd','#BBDEFB',1));o.push(T(145,137+i*32,r[0],'#333',10,'middle',false));o.push(T(360,137+i*32,r[1],'#1565C0',10,'middle',false));});}
s.innerHTML=o.join('');}
function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Efficiency','#1565C0',14,'middle',true));
o.push(R(10,40,460,52,'#e3f2fd','#1565C0',1.5));o.push(T(240,60,'efficiency = useful output \u00f7 total input','#0d47a1',13,'middle',true));o.push(T(240,76,'(multiply by 100 for %)','#555',9,'middle',false));
if(p>=1){o.push(R(22,108,195,88,'#c8e6c9','#2E7D32',1.5));o.push(T(119,148,'Useful KE\n700 J','#2E7D32',11,'middle',true));}
if(p>=2){o.push(R(22,90,195,18,'#ef9a9a','#C0272D',1.5));o.push(T(119,83,'Wasted heat 300 J','#C0272D',9,'middle',false));o.push(R(10,198,460,48,'#e3f2fd','#1565C0',1));o.push(T(240,218,'Efficiency = 700/1000 = 0.7 = 70%','#0d47a1',13,'middle',true));o.push(T(240,232,'Input = 1000 J','#555',9,'middle',false));}
s.innerHTML=o.join('');}
function dQ6(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Energy resources','#1565C0',13,'middle',true));
o.push(R(10,38,222,202,'#e8f5e9','#2E7D32',1.5));o.push(T(121,58,'RENEWABLE','#2E7D32',12,'middle',true));
['Solar','Wind','Hydroelectric','Tidal / Wave','Geothermal','Biofuels'].forEach(function(x,i){if(i<p)o.push(T(121,78+i*26,x,'#333',10,'middle',false));});
o.push(R(248,38,222,202,'#fde8e8','#C0272D',1.5));o.push(T(359,58,'NON-RENEWABLE','#C0272D',12,'middle',true));
['Coal','Oil','Natural gas','Nuclear fission'].forEach(function(x,i){if(i<p-2)o.push(T(359,78+i*26,x,'#333',10,'middle',false));});
s.innerHTML=o.join('');}
function dQ7(p){dQ3(p);}
function dQ8(p){dQ2(p);}
function dQ9(p){dQ4(p);}
function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Energy summary','#1565C0',13,'middle',true));
[['Work done','W = Fd (J)'],['GPE','\u0394Ep = mgh (J)'],['KE','Ek = \u00bdmv\u00b2 (J)'],['Elastic PE','E = \u00bdke\u00b2 (J)'],['Power','P = W/t (W)'],['Efficiency','useful\u00f7input (\u00d7100%)']].forEach(function(r,i){
  if(i<p+1){o.push(R(10,42+i*33,460,26,'#e3f2fd','#BBDEFB',1));o.push(T(130,59+i*33,r[0],'#555',10,'middle',false));o.push(T(330,59+i*33,r[1],'#1565C0',11,'middle',true));}});
s.innerHTML=o.join('');}
var QS=[
{ey:'Q1 \u2022 Y10 Physics \u2022 Energy',ti:'Energy Stores',su:'Identify the eight energy stores and their equations.',steps:[
  {lb:'The stores',dr:dQ1,ht:'<p>Energy is stored in eight stores (all in joules). It is never created or destroyed \u2014 only transferred between stores.</p>'},
  {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var pairs=[['moving car',1],['book on shelf',2],['stretched spring',3],['battery',4],['hot cup of tea',5],['uranium fuel rod',6]];var p=pick(pairs);return{question:'Which store? "'+p[0]+'". Enter: 1=kinetic, 2=GPE, 3=elastic PE, 4=chemical, 5=thermal, 6=nuclear.',hints:['Match description to store type'],ans:p[1],tol:0,unit:'',working:'"'+p[0]+'" = store number <b>'+p[1]+'</b>.'};})},
]},
{ey:'Q2 \u2022 Y10 Physics \u2022 Energy',ti:'Work Done',su:'Calculate work done using W = Fd.',steps:[
  {lb:'W = Fd',dr:dQ2,ht:'<p>Work is done when a force moves an object in the direction of the force. Work done = energy transferred.</p><div class="fm">W = F \u00d7 d</div><p>W in joules (J), F in newtons (N), d in metres (m).</p>'},
  {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var type=pick(['W','F','d']);var F=rnd(10,80)*5,d=rnd(2,20),W=F*d;if(type==='W')return{question:'F = <b>'+F+' N</b>, d = <b>'+d+' m</b>. Find work done.',hints:['W = Fd'],ans:W,tol:0.5,unit:'J',working:'W = '+F+'\u00d7'+d+' = '+W+' J'};if(type==='F'){var W2=rnd(500,5000),d2=rnd(5,20);return{question:'W = <b>'+W2+' J</b>, d = <b>'+d2+' m</b>. Find force.',hints:['F = W/d'],ans:W2/d2,tol:0.5,unit:'N',working:'F = '+W2+'/'+d2+' = '+W2/d2+' N'};}var W3=rnd(500,5000),F3=rnd(20,100)*5;return{question:'W = <b>'+W3+' J</b>, F = <b>'+F3+' N</b>. Find distance.',hints:['d = W/F'],ans:W3/F3,tol:0.1,unit:'m',working:'d = '+W3+'/'+F3+' = '+W3/F3+' m'};})}
]},
{ey:'Q3 \u2022 Y10 Physics \u2022 Energy',ti:'GPE and Kinetic Energy',su:'Apply \u0394Ep=mgh and Ek=\u00bdmv\u00b2. Convert between them.',steps:[
  {lb:'The equations',dr:dQ3,ht:'<p><b>GPE change:</b> \u0394Ep = mgh (m in kg, g in N/kg, h in m).<br><b>Kinetic energy:</b> Ek = \u00bdmv\u00b2 (m in kg, v in m/s).</p>'},
  {lb:'Energy conversion',dr:dQ3,ht:'<p>Object dropped from height h (no air resistance):</p><div class="fm">mgh = \u00bdmv\u00b2 \u2192 v = \u221a(2gh)</div><p>Mass cancels \u2014 all objects reach the same speed.</p>'},
  {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var type=pick(['Ek','GPE','v']);var m=rnd(1,10),v=rnd(4,20);var Ek=parseFloat((0.5*m*v*v).toFixed(1));var h=rnd(2,15);var GPE=parseFloat((m*9.8*h).toFixed(1));var v2=parseFloat(Math.sqrt(2*9.8*h).toFixed(1));if(type==='Ek')return{question:'m = <b>'+m+' kg</b>, v = <b>'+v+' m/s</b>. Find Ek.',hints:['Ek = \u00bdmv\u00b2'],ans:Ek,tol:0.2,unit:'J',working:'Ek = 0.5\u00d7'+m+'\u00d7'+v+'\u00b2 = '+Ek+' J'};if(type==='GPE')return{question:'m = <b>'+m+' kg</b>, h = <b>'+h+' m</b>, g=9.8. Find GPE gained.',hints:['\u0394Ep = mgh'],ans:GPE,tol:0.2,unit:'J',working:'\u0394Ep = '+m+'\u00d79.8\u00d7'+h+' = '+GPE+' J'};return{question:'Dropped from <b>'+h+' m</b> (g=9.8, no air resistance). Find speed at impact.',hints:['v = \u221a(2gh)'],ans:v2,tol:0.1,unit:'m/s',working:'v = \u221a(2\u00d79.8\u00d7'+h+') = '+v2+' m/s'};})}
]},
{ey:'Q4 \u2022 Y10 Physics \u2022 Energy',ti:'Power',su:'Calculate power using P = W/t and P = Fv.',steps:[
  {lb:'What is power?',dr:dQ4,ht:'<p>Power is the rate of energy transfer.</p><div class="fm">P = W / t &nbsp;&nbsp; also &nbsp;&nbsp; P = F \u00d7 v</div><p>P in watts (W). 1 W = 1 J/s. 1 kW = 1000 W.</p>'},
  {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var type=pick(['P_Wt','P_Fv','W_from_Pt']);var W=rnd(1,20)*500,t=rnd(5,60),P=parseFloat((W/t).toFixed(1));var F=rnd(100,1000),v=rnd(5,30);if(type==='P_Wt')return{question:'W = <b>'+W+' J</b>, t = <b>'+t+' s</b>. Find power.',hints:['P = W/t'],ans:P,tol:0.2,unit:'W',working:'P = '+W+'/'+t+' = '+P+' W'};if(type==='P_Fv')return{question:'F = <b>'+F+' N</b>, v = <b>'+v+' m/s</b> (constant). Find power.',hints:['P = Fv'],ans:F*v,tol:0.5,unit:'W',working:'P = '+F+'\u00d7'+v+' = '+(F*v)+' W'};var P2=rnd(1,20)*50,t2=rnd(5,30);return{question:'P = <b>'+P2+' W</b>, t = <b>'+t2+' s</b>. Find energy transferred.',hints:['W = Pt'],ans:P2*t2,tol:0.5,unit:'J',working:'W = '+P2+'\u00d7'+t2+' = '+(P2*t2)+' J'};})}
]},
{ey:'Q5 \u2022 Y10 Physics \u2022 Energy',ti:'Efficiency',su:'Calculate efficiency = useful output \u00f7 total input.',steps:[
  {lb:'Efficiency',dr:dQ5,ht:'<p>No machine is 100% efficient \u2014 some energy is always wasted (usually as thermal energy in surroundings).</p><div class="fm">efficiency = useful energy out / total energy in (\u00d7100%)</div>'},
  {lb:'Sankey diagrams',dr:dQ5,ht:'<p>A Sankey diagram shows energy flow \u2014 arrow width is proportional to energy. Useful output goes to the right; wasted output branches off.</p>'},
  {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var type=pick(['eff','useful','input']);var Ein=rnd(4,20)*100,pct=rnd(3,9)*10,Eout=Ein*pct/100;if(type==='eff')return{question:'Input = <b>'+Ein+' J</b>, useful output = <b>'+Eout+' J</b>. Find efficiency (%).',hints:['efficiency = useful/input \u00d7 100'],ans:pct,tol:0.1,unit:'%',working:Eout+'/'+Ein+'\u00d7100 = '+pct+'%'};if(type==='useful'){var eff2=rnd(30,80),Ein2=rnd(500,2000),Eout2=parseFloat((Ein2*eff2/100).toFixed(0));return{question:'Input = <b>'+Ein2+' J</b>, efficiency = <b>'+eff2+'%</b>. Find useful output.',hints:['useful = input \u00d7 (eff/100)'],ans:Eout2,tol:1,unit:'J',working:Ein2+'\u00d7'+eff2+'/100 = '+Eout2+' J'};}var eff3=rnd(40,80),Eout3=rnd(200,1000),Ein3=parseFloat((Eout3*100/eff3).toFixed(0));return{question:'Useful output = <b>'+Eout3+' J</b>, efficiency = <b>'+eff3+'%</b>. Find total input.',hints:['input = useful/(eff/100)'],ans:Ein3,tol:2,unit:'J',working:Eout3+'\u00d7100/'+eff3+' = '+Ein3+' J'};})}
]},
{ey:'Q6 \u2022 Y10 Physics \u2022 Energy',ti:'Energy Resources',su:'Compare renewable and non-renewable energy sources.',steps:[
  {lb:'Renewable',dr:dQ6,ht:'<p><b>Renewable</b> sources will not run out: solar, wind, hydroelectric, tidal, wave, geothermal, biofuels. Most produce no CO\u2082 during generation.</p>'},
  {lb:'Non-renewable',dr:dQ6,ht:'<p><b>Non-renewable</b> sources are finite: coal, oil, natural gas (fossil fuels), nuclear. Fossil fuels release CO\u2082, contributing to climate change.</p>'},
  {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var renew=[['Solar',1],['Wind',1],['Hydroelectric',1],['Tidal',1],['Geothermal',1],['Biofuels',1]];var nonrenew=[['Coal',0],['Oil',0],['Natural gas',0],['Nuclear',0]];var o=pick(renew.concat(nonrenew));return{question:'Is "<b>'+o[0]+'</b>" renewable? 1=Yes, 0=No.',hints:['Renewable = will not run out naturally'],ans:o[1],tol:0,unit:'',working:o[0]+' is '+(o[1]?'<b>renewable</b>':'<b>non-renewable</b>')+'. Answer: '+o[1]+'.'};})},
]},
{ey:'Q7 \u2022 Y10 Physics \u2022 Energy',ti:'Energy Conservation',su:'Apply conservation of energy to solve multi-step problems.',steps:[
  {lb:'Conservation of energy',dr:dQ7,ht:'<p>Energy cannot be created or destroyed. It only transfers between stores or dissipates to the surroundings. Total energy in a closed system is always constant.</p>'},
  {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var Ein=rnd(4,20)*100,waste=rnd(1,4)*50,useful=Ein-waste;return{question:'Total input = <b>'+Ein+' J</b>. Wasted = <b>'+waste+' J</b>. Find useful output.',hints:['Useful = input \u2212 wasted'],ans:useful,tol:0.5,unit:'J',working:Ein+' \u2212 '+waste+' = '+useful+' J'};})},
]},
{ey:'Q8 \u2022 Y10 Physics \u2022 Energy',ti:'Work Done and Power Mixed',su:'Combined W=Fd and P=W/t calculations.',steps:[
  {lb:'Method',dr:dQ8,ht:'<p>W = Fd (work done = force \u00d7 distance). P = W/t (power = work \u00f7 time). P = Fv (power = force \u00d7 velocity at constant speed).</p>'},
  {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var F=rnd(20,100)*5,d=rnd(2,20),t=rnd(5,30);var W=F*d;var P=parseFloat((W/t).toFixed(1));return{question:'F = <b>'+F+' N</b>, d = <b>'+d+' m</b>, t = <b>'+t+' s</b>. Find power.',hints:['W = Fd, then P = W/t'],ans:P,tol:0.2,unit:'W',working:'W = '+W+' J. P = '+W+'/'+t+' = '+P+' W'};})},
]},
{ey:'Q9 \u2022 Y10 Physics \u2022 Energy',ti:'GPE, KE and Height',su:'Multi-step problems converting between GPE and KE.',steps:[
  {lb:'Strategy',dr:dQ9,ht:'<p>At top: all GPE = mgh. At base: all KE = \u00bdmv\u00b2. At intermediate heights: partial conversion. Energy lost to friction = GPE \u2212 KE at base.</p>'},
  {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var m=rnd(1,6),h=rnd(3,12);var GPE=parseFloat((m*9.8*h).toFixed(1));var v=parseFloat(Math.sqrt(2*9.8*h).toFixed(1));var type=pick(['GPE','v','KE_given']);if(type==='GPE')return{question:'m = <b>'+m+' kg</b>, h = <b>'+h+' m</b>, g=9.8. Find GPE at top.',hints:['GPE = mgh'],ans:GPE,tol:0.2,unit:'J',working:m+'\u00d79.8\u00d7'+h+' = '+GPE+' J'};if(type==='v')return{question:'Dropped from <b>'+h+' m</b> (g=9.8, no friction). Speed at bottom?',hints:['v = \u221a(2gh)'],ans:v,tol:0.1,unit:'m/s',working:'v = \u221a(2\u00d79.8\u00d7'+h+') = '+v+' m/s'};var KE=GPE;var v2=parseFloat(Math.sqrt(2*KE/m).toFixed(1));return{question:'KE = <b>'+KE+' J</b>, m = <b>'+m+' kg</b>. Find speed.',hints:['Ek = \u00bdmv\u00b2 \u2192 v = \u221a(2Ek/m)'],ans:v2,tol:0.1,unit:'m/s',working:'v = \u221a(2\u00d7'+KE+'/'+m+') = '+v2+' m/s'};})}
]},
{ey:'Q10 \u2022 Y10 Physics \u2022 Energy',ti:'Mixed Energy Problems',su:'All energy equations: W, P, Ek, GPE, efficiency.',steps:[
  {lb:'All equations',dr:dQ10,ht:'<p>W=Fd \u2022 \u0394Ep=mgh \u2022 Ek=\u00bdmv\u00b2 \u2022 P=W/t \u2022 P=Fv \u2022 efficiency=useful/input.</p>'},
  {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['power','Ek','GPE','eff']);if(type==='power'){var W=rnd(2,20)*500,t=rnd(10,60);return{question:'W = <b>'+W+' J</b>, t = <b>'+t+' s</b>. Find power.',hints:['P = W/t'],ans:parseFloat((W/t).toFixed(1)),tol:0.2,unit:'W',working:'P = '+W+'/'+t+' = '+parseFloat((W/t).toFixed(1))+' W'};}if(type==='Ek'){var m=rnd(1,10),v=rnd(5,20);return{question:'m = <b>'+m+' kg</b>, v = <b>'+v+' m/s</b>. Find Ek.',hints:['Ek = \u00bdmv\u00b2'],ans:parseFloat((0.5*m*v*v).toFixed(1)),tol:0.2,unit:'J',working:'Ek = 0.5\u00d7'+m+'\u00d7'+v+'\u00b2 = '+(0.5*m*v*v).toFixed(1)+' J'};}if(type==='GPE'){var m2=rnd(1,8),h=rnd(3,15);return{question:'m = <b>'+m2+' kg</b>, h = <b>'+h+' m</b>, g=9.8. Find GPE.',hints:['\u0394Ep = mgh'],ans:parseFloat((m2*9.8*h).toFixed(1)),tol:0.2,unit:'J',working:'\u0394Ep = '+m2+'\u00d79.8\u00d7'+h+' = '+(m2*9.8*h).toFixed(1)+' J'};}var Ein=rnd(4,20)*100,pct=rnd(3,9)*10,Eout=parseFloat((Ein*pct/100).toFixed(0));return{question:'Input = <b>'+Ein+' J</b>, efficiency = <b>'+pct+'%</b>. Find useful output.',hints:['useful = input\u00d7(eff/100)'],ans:Eout,tol:1,unit:'J',working:Ein+'\u00d7'+pct+'/100 = '+Eout+' J'};})}
]},
];

var qi=0,si=0;
function bSB(){var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){bSB();var q=QS[qi],st=q.steps[si];document.getElementById('ey').innerHTML=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;st.dr(si);bDT();document.getElementById('pb').disabled=si===0;document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
