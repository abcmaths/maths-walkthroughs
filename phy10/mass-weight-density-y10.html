<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">&#10004; Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn(); entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div'); tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn}; return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return; var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.05;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}

function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}

if(p>=1){o.push(R(55,85,100,55,'#e3f2fd','#1565C0',2));o.push(T(105,80,'\u03c1 < water','#1565C0',9,'middle',false));o.push(T(105,252,'FLOATS','#2E7D32',11,'middle',true));}
if(p>=2){o.push(R(225,140,100,55,'#999','#555',2));o.push(T(275,137,'\u03c1 > water','#555',9,'middle',false));o.push(T(275,252,'SINKS','#C0272D',11,'middle',true));}

[['Earth','9.81'],['Moon','1.6'],['Mars','3.7'],['Jupiter','24.8']].forEach(function(r,i){if(i<p+1){o.push(R(20,44+i*50,440,42,'#e3f2fd','#90caf9',1));o.push(T(120,68+i*50,r[0],'#1565C0',12,'middle',true));o.push(T(290,68+i*50,'g = '+r[1]+' N/kg','#333',11,'middle',false));var w=parseFloat((60*parseFloat(r[1])).toFixed(0));o.push(T(430,68+i*50,'60kg \u2192 '+w+' N','#0d47a1',10,'end',false));}});

[['g/cm\u00b3 \u2192 kg/m\u00b3','\u00d7 1000'],['kg/m\u00b3 \u2192 g/cm\u00b3','\u00f7 1000'],['cm\u00b3 \u2192 m\u00b3','\u00f7 10\u2076'],['g \u2192 kg','\u00f7 1000'],['N \u2192 kg (mass)','\u00f7 g (9.81)']].forEach(function(r,i){if(i<p+1){o.push(R(20,42+i*40,440,32,'#e3f2fd','#BBDEFB',1));o.push(T(220,62+i*40,r[0],'#1565C0',11,'middle',true));o.push(T(410,62+i*40,r[1],'#555',11,'middle',false));}});

var QS=[
  {ey:'Q1 \u2022 Y10 Physics \u2022 Mass & Density',ti:'Mass vs Weight',su:'Distinguish mass (kg) from weight (N). Explain where each changes.',steps:[
    {lb:'Mass',dr:dQ1,ht:'<p><b>Mass</b> is the amount of matter in an object. Measured in <b>kg</b>. Scalar. The same everywhere in the universe.</p>'},

    {lb:'Rearrangements',dr:dQ2,ht:'<p>m = W / g &nbsp;&nbsp; g = W / m</p><p>Example: mass = 70 kg, g = 9.81 N/kg \u2192 W = 686.7 N</p>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var type=pick(['W','m','g']);var m=rnd(5,20)*5;var g=pick([9.81,1.6,3.7,9.8,10]);var W=parseFloat((m*g).toFixed(1));if(type==='W')return{question:'m = <b>'+m+' kg</b>, g = <b>'+g+' N/kg</b>. Find weight.',hints:['W = mg'],ans:W,tol:0.2,unit:'N',working:'W = '+m+' \u00d7 '+g+' = '+W+' N'};if(type==='m'){var W2=rnd(100,800);var m2=parseFloat((W2/9.81).toFixed(1));return{question:'W = <b>'+W2+' N</b>, g = 9.81 N/kg. Find mass.',hints:['m = W/g'],ans:m2,tol:0.1,unit:'kg',working:'m = '+W2+'/9.81 = '+m2+' kg'};}var W3=rnd(100,500);var m3=rnd(10,50)*2;var g2=parseFloat((W3/m3).toFixed(2));return{question:'W = <b>'+W3+' N</b>, m = <b>'+m3+' kg</b>. Find g.',hints:['g = W/m'],ans:g2,tol:0.05,unit:'N/kg',working:'g = '+W3+'/'+m3+' = '+g2+' N/kg'};})},

    {lb:'Definition',dr:dQ3,ht:'<p><b>Density</b> is mass per unit volume.</p><div class="fm">\u03c1 = m / V</div><p>Units: kg/m\u00b3 (SI) or g/cm\u00b3. Water: 1 g/cm\u00b3 = 1000 kg/m\u00b3.</p>'},
    {lb:'Rearrangements',dr:dQ3,ht:'<p>m = \u03c1V &nbsp;&nbsp; V = m/\u03c1</p><p>Objects less dense than water float; denser ones sink.</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var type=pick(['\u03c1','m','V']);var m=rnd(10,50)*10;var V=rnd(5,25)*10;var rho=parseFloat((m/V).toFixed(2));if(type==='\u03c1')return{question:'m = <b>'+m+' g</b>, V = <b>'+V+' cm\u00b3</b>. Find density.',hints:['\u03c1 = m/V'],ans:rho,tol:0.02,unit:'g/cm\u00b3',working:'\u03c1 = '+m+'/'+V+' = '+rho+' g/cm\u00b3'};if(type==='m'){var rho2=pick([0.8,1.0,2.7,7.9]);var V2=rnd(5,20)*10;var m2=parseFloat((rho2*V2).toFixed(1));return{question:'\u03c1 = <b>'+rho2+' g/cm\u00b3</b>, V = <b>'+V2+' cm\u00b3</b>. Find mass.',hints:['m = \u03c1V'],ans:m2,tol:0.1,unit:'g',working:'m = '+rho2+'\u00d7'+V2+' = '+m2+' g'};}var rho3=pick([0.8,1.0,2.7]);var m3=rnd(8,40)*10;var V3=parseFloat((m3/rho3).toFixed(1));return{question:'\u03c1 = <b>'+rho3+' g/cm\u00b3</b>, m = <b>'+m3+' g</b>. Find volume.',hints:['V = m/\u03c1'],ans:V3,tol:0.1,unit:'cm\u00b3',working:'V = '+m3+'/'+rho3+' = '+V3+' cm\u00b3'};})},
  ]},
  {ey:'Q4 \u2022 Y10 Physics \u2022 Mass & Density',ti:'Measuring Density',su:'Describe how to find the density of a regular and irregular solid.',steps:[
    {lb:'Regular solid',dr:dQ4,ht:'<p>Measure mass on a balance. Measure dimensions (ruler/vernier/micrometer) and calculate volume from geometry. Then \u03c1 = m/V.</p>'},
    {lb:'Irregular solid',dr:dQ4,ht:'<p>Use a <b>displacement can</b> (Eureka can). Submerge the object, collect the overflow. Volume of object = volume of water displaced.</p>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var init=rnd(15,35)*10;var obj_V=rnd(2,8)*10;var fin=init+obj_V;var rho=pick([0.8,1.2,2.7,7.9]);var m=parseFloat((obj_V*rho).toFixed(0));return{question:'Water level before: <b>'+init+' cm\u00b3</b>. After submerging rock: <b>'+fin+' cm\u00b3</b>. Rock mass: <b>'+m+' g</b>. Find density.',hints:['Volume = final \u2212 initial','\u03c1 = m/V'],ans:rho,tol:0.05,unit:'g/cm\u00b3',working:'V = '+fin+'\u2212'+init+' = '+obj_V+' cm\u00b3. \u03c1 = '+m+'/'+obj_V+' = '+rho+' g/cm\u00b3'};})},
  ]},
  {ey:'Q5 \u2022 Y10 Physics \u2022 Mass & Density',ti:'Floating and Sinking',su:'Predict whether an object floats or sinks by comparing densities.',steps:[
    {lb:'The rule',dr:dQ5,ht:'<p>Object floats if \u03c1<sub>object</sub> &lt; \u03c1<sub>fluid</sub>. Object sinks if \u03c1<sub>object</sub> &gt; \u03c1<sub>fluid</sub>.</p><p>Ice (\u03c1 = 917 kg/m\u00b3) floats on water (\u03c1 = 1000 kg/m\u00b3). Steel sinks in water but floats on mercury.</p>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var objs=[['wood',700,1000,1],['iron',7900,1000,0],['ice',917,1000,1],['oil',850,1000,1],['rock',2700,1000,0],['lead',11300,13600,1]];var o=pick(objs);return{question:'Object density <b>'+o[1]+' kg/m\u00b3</b>, fluid density <b>'+o[2]+' kg/m\u00b3</b>. Does it float? 1=Yes, 0=No.',hints:['Compare \u03c1 object to \u03c1 fluid'],ans:o[3],tol:0,unit:'',working:o[0]+' (\u03c1='+o[1]+') '+(o[3]?'<':'\u2265')+' fluid (\u03c1='+o[2]+') \u2192 '+(o[3]?'floats':'sinks')+'. Answer: '+o[3]+'.'};})},
  ]},
  {ey:'Q6 \u2022 Y10 Physics \u2022 Mass & Density',ti:'Weight on Different Planets',su:'Calculate weight on different planets using W = mg.',steps:[
    {lb:'g varies by planet',dr:dQ6,ht:'<p>Mass stays the same on all planets. Weight changes because g (gravitational field strength) is different on each planet.</p><p>Earth: 9.81 N/kg. Moon: 1.6. Mars: 3.7. Jupiter: 24.8.</p>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var planets=[['Earth',9.81],['Moon',1.6],['Mars',3.7],['Jupiter',24.8]];var pl=pick(planets);var m=rnd(4,20)*5;var W=parseFloat((m*pl[1]).toFixed(1));return{question:'Mass = <b>'+m+' kg</b> on <b>'+pl[0]+'</b> (g = '+pl[1]+' N/kg). Find weight.',hints:['W = mg'],ans:W,tol:0.2,unit:'N',working:'W = '+m+' \u00d7 '+pl[1]+' = '+W+' N'};})},
  ]},
  {ey:'Q7 \u2022 Y10 Physics \u2022 Mass & Density',ti:'Upthrust',su:'Explain upthrust. Calculate upthrust = \u03c1gV.',steps:[
    {lb:'What is upthrust?',dr:dQ7,ht:'<p><b>Upthrust</b> is the upward force exerted by a fluid on a submerged object. It arises because pressure at the bottom of the object is greater than at the top.</p>'},
    {lb:'Archimedes\u2019 principle',dr:dQ7,ht:'<p>Upthrust = weight of fluid displaced.</p><div class="fm">Upthrust = \u03c1\u1da0\u02e1\u1d58\u1d35\u1d30 \u00d7 g \u00d7 V</div><p>Object floats when upthrust = weight; sinks when weight > upthrust.</p>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var rho=pick([1000,800,1025]);var V=rnd(1,10)*0.001;var U=parseFloat((rho*9.81*V).toFixed(2));return{question:'\u03c1\u1da0\u02e1\u1d58\u1d35\u1d30 = <b>'+rho+' kg/m\u00b3</b>, V = <b>'+V.toFixed(3)+' m\u00b3</b>, g = 9.81. Find upthrust.',hints:['Upthrust = \u03c1gV'],ans:U,tol:0.05,unit:'N',working:'Upthrust = '+rho+'\u00d79.81\u00d7'+V.toFixed(3)+' = '+U+' N'};})},
  ]},
  {ey:'Q8 \u2022 Y10 Physics \u2022 Mass & Density',ti:'Unit Conversions',su:'Convert between g/cm\u00b3 and kg/m\u00b3; between cm\u00b3 and m\u00b3.',steps:[
    {lb:'Density unit conversion',dr:dQ8,ht:'<p>1 g/cm\u00b3 = 1000 kg/m\u00b3. To convert g/cm\u00b3 \u2192 kg/m\u00b3: multiply by 1000. Water: 1 g/cm\u00b3 = 1000 kg/m\u00b3.</p>'},
    {lb:'Volume conversion',dr:dQ8,ht:'<p>1 m\u00b3 = 10\u2076 cm\u00b3. To convert cm\u00b3 \u2192 m\u00b3: divide by 10\u2076.</p><p>Always check units are consistent before calculating!</p>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var type=pick(['gcm_kgm','kgm_gcm','cm3_m3']);if(type==='gcm_kgm'){var x=pick([0.9,1.0,2.7,7.9,8.9]);return{question:'Convert <b>'+x+' g/cm\u00b3</b> to kg/m\u00b3.',hints:['Multiply by 1000'],ans:x*1000,tol:1,unit:'kg/m\u00b3',working:x+' \u00d7 1000 = '+x*1000+' kg/m\u00b3'};}if(type==='kgm_gcm'){var y=pick([900,1000,2700,7900]);return{question:'Convert <b>'+y+' kg/m\u00b3</b> to g/cm\u00b3.',hints:['Divide by 1000'],ans:y/1000,tol:0.001,unit:'g/cm\u00b3',working:y+' \u00f7 1000 = '+y/1000+' g/cm\u00b3'};}var z=rnd(10,500)*10;return{question:'Convert <b>'+z+' cm\u00b3</b> to m\u00b3.',hints:['Divide by 10\u2076'],ans:z/1e6,tol:z/1e6*0.01,unit:'m\u00b3',working:z+' \u00f7 10\u2076 = '+z/1e6+' m\u00b3'};})},
  ]},
  {ey:'Q9 \u2022 Y10 Physics \u2022 Mass & Density',ti:'Multi-step Density Problems',su:'Find weight from density and volume.',steps:[
    {lb:'Strategy',dr:dQ9,ht:'<p>Combined problems: find volume \u2192 find mass (m = \u03c1V) \u2192 find weight (W = mg). Keep units consistent throughout.</p>'},
    {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var rho=pick([1.0,2.7,7.9,8.9]);var V=rnd(50,500);var m_g=rho*V;var m_kg=m_g/1000;var W=parseFloat((m_kg*9.81).toFixed(2));return{question:'Block: V = <b>'+V+' cm\u00b3</b>, \u03c1 = <b>'+rho+' g/cm\u00b3</b>, g = 9.81. Find its weight.',hints:['m = \u03c1V (in grams, then convert to kg)','W = mg'],ans:W,tol:0.05,unit:'N',working:'m = '+rho+'\u00d7'+V+' = '+m_g+' g = '+m_kg.toFixed(3)+' kg. W = '+m_kg.toFixed(3)+'\u00d79.81 = '+W+' N'};})},
  ]},
  {ey:'Q10 \u2022 Y10 Physics \u2022 Mass & Density',ti:'Mixed Problems',su:'Mixed W=mg and \u03c1=m/V questions.',steps:[
    {lb:'Equations',dr:dQ10,ht:'<p>W = mg (weight). &nbsp;\u03c1 = m/V (density). &nbsp;m = \u03c1V. &nbsp;V = m/\u03c1. &nbsp;Upthrust = \u03c1gV.</p>'},
    {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['W','density','upthrust']);if(type==='W'){var m=rnd(5,20)*5;var W=parseFloat((m*9.81).toFixed(1));return{question:'m = <b>'+m+' kg</b> on Earth (g=9.81). Find weight.',hints:['W = mg'],ans:W,tol:0.2,unit:'N',working:'W = '+m+'\u00d79.81 = '+W+' N'};}if(type==='density'){var m2=rnd(10,50)*10;var V2=rnd(5,25)*10;return{question:'m = <b>'+m2+' g</b>, V = <b>'+V2+' cm\u00b3</b>. Find \u03c1.',hints:['\u03c1 = m/V'],ans:parseFloat((m2/V2).toFixed(2)),tol:0.02,unit:'g/cm\u00b3',working:'\u03c1 = '+m2+'/'+V2+' = '+parseFloat((m2/V2).toFixed(2))+' g/cm\u00b3'};}var rho=pick([1000,800]);var V3=rnd(2,8)*0.001;var U=parseFloat((rho*9.81*V3).toFixed(2));return{question:'\u03c1 = <b>'+rho+' kg/m\u00b3</b>, V = <b>'+V3.toFixed(3)+' m\u00b3</b>. Find upthrust.',hints:['Upthrust = \u03c1gV'],ans:U,tol:0.05,unit:'N',working:'Upthrust = '+rho+'\u00d79.81\u00d7'+V3.toFixed(3)+' = '+U+' N'};})},
  ]},
];

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb');
  var lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML=''; sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt'); w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');
    w.appendChild(d);
  });
}
function render(){
  bSB(); var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi'); void p.offsetWidth; p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;
  st.dr(si); bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
