<style>
:root{--red:#1565C0;--dark:#0d47a1;--cream:#E3F2FD;--ink:#0d1b2a;--line:#BBDEFB;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#555;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#E3F2FD);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.try-q{font-size:15px;margin-bottom:8px;line-height:1.5;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.try-fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.try-fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.try-fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(genFn){
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn(); ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">&#10004; Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="Answer'+(o.unit?' ('+o.unit+')':'')+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return;
    var o=entry.genFn(); entry.o=o;
    var wrap=el.closest?el.closest('.try'):document.querySelector('.try[data-tryid="'+id+'"]');
    if(!wrap)return;
    var tmp=document.createElement('div'); tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn}; return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id]; if(!entry)return; var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.05;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb ok';fb.innerHTML='&#10003; Correct! &nbsp;'+o.working;}
    else{fb.className='try-fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});
function g(){return document.getElementById('dg');}
function T(x,y,txt,c,sz,a,bold){c=c||'#0d1b2a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(bold?700:400)+'">'+txt+'</text>';}
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#E3F2FD';stroke=stroke||'#1565C0';sw=sw||1.5;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function arw(x1,y1,x2,y2,c,w){var id='m'+Math.round(x1+y2*3);return '<defs><marker id="'+id+'" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0,7 2.5,0 5" fill="'+(c||'#1565C0')+'"/></marker></defs><line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#1565C0')+'" stroke-width="'+(w||2)+'" marker-end="url(#'+id+')"/>';}
function circ(cx,cy,r,fill,stroke){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'#E3F2FD')+'" stroke="'+(stroke||'#1565C0')+'" stroke-width="1.5"/>';}

function dQ1(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(R(10,10,460,240,'#e3f2fd','#1565C0',1));
o.push(T(240,36,'SI Base Units',PHY_ACC||'#1565C0',15,'middle',true));
var rows=[['Length','metre','m'],['Mass','kilogram','kg'],['Time','second','s'],['Current','ampere','A'],['Temperature','kelvin','K']];
rows.forEach(function(r,i){if(i<p+1){o.push(R(20,50+i*38,440,32,'#fff','#BBDEFB',1));o.push(T(120,70+i*38,r[0],'#333',11,'middle',false));o.push(T(260,70+i*38,r[1],'#1565C0',11,'middle',false));o.push(T(420,70+i*38,r[2],'#0d47a1',13,'middle',true));}});

var prefixes=[['G','giga','10\u2079'],['M','mega','10\u2076'],['k','kilo','10\u00b3'],['c','centi','10\u207b\u00b2'],['m','milli','10\u207b\u00b3'],['\u03bc','micro','10\u207b\u2076'],['n','nano','10\u207b\u2079']];
prefixes.forEach(function(r,i){if(i<p+1){o.push(R(20,14+i*34,440,28,'#e3f2fd','#BBDEFB',1));o.push(T(80,32+i*34,r[0],'#1565C0',12,'middle',true));o.push(T(220,32+i*34,r[1],'#333',11,'middle',false));o.push(T(400,32+i*34,r[2],'#0d47a1',11,'middle',true));}});
s.innerHTML=o.join('');}

function dQ3(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(R(10,10,225,240,'#e3f2fd','#1565C0',2));o.push(T(122,34,'SCALAR','#1565C0',14,'middle',true));
o.push(R(245,10,225,240,'#e8f5e9','#2E7D32',2));o.push(T(358,34,'VECTOR','#2E7D32',14,'middle',true));

ex.forEach(function(r,i){if(i<p+1){o.push(R(10,42+i*40,460,34,'#e3f2fd','#BBDEFB',1));o.push(T(90,63+i*40,r[0],'#0d47a1',13,'middle',true));o.push(T(210,63+i*40,r[1],'#1565C0',11,'middle',false));o.push(T(390,63+i*40,r[2],'#555',9,'middle',false));}});
s.innerHTML=o.join('');}

function dQ5(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Adding perpendicular vectors','#1565C0',13,'middle',true));
if(p>=1){o.push(arw(60,200,260,200,'#1565C0',2.5));o.push(T(160,190,'a = 3 N \u2192','#1565C0',11,'middle',false));}
if(p>=2){o.push(arw(260,200,260,100,'#2E7D32',2.5));o.push(T(300,152,'b = 4 N \u2191','#2E7D32',11,'start',false));}
if(p>=3){o.push(arw(60,200,260,100,'#C0272D',2.5));o.push(T(140,130,'R = 5 N','#C0272D',13,'middle',true));}
if(p>=4){o.push(R(20,218,440,34,'#e3f2fd','#1565C0',1));o.push(T(240,239,'R = \u221a(a\u00b2+b\u00b2) = \u221a(9+16) = \u221a25 = 5 N','#0d47a1',12,'middle',true));}
s.innerHTML=o.join('');}

function dQ6(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Accuracy vs Precision','#1565C0',13,'middle',true));
[[130,130,'Accurate\n+ Precise','#2E7D32'],[280,130,'Precise\nnot Accurate','#1565C0'],[430,130,'Neither','#C0272D']].forEach(function(t){
  o.push('<circle cx="'+t[0]+'" cy="'+t[1]+'" r="55" fill="none" stroke="#ddd" stroke-width="1.5"/>');
  o.push('<circle cx="'+t[0]+'" cy="'+t[1]+'" r="35" fill="none" stroke="#ddd" stroke-width="1.5"/>');
  o.push('<circle cx="'+t[0]+'" cy="'+t[1]+'" r="15" fill="none" stroke="#ddd" stroke-width="1.5"/>');
  o.push(T(t[0],t[1]+76,t[2],t[3],8,'middle',true));
});
if(p>=1){[[128,128],[132,134],[126,132],[130,126]].forEach(function(pt){o.push(circ(pt[0],pt[1],4,'#2E7D32','#2E7D32'));});}
if(p>=2){[[260,128],[265,134],[274,122],[268,140]].forEach(function(pt){o.push(circ(pt[0],pt[1],4,'#1565C0','#1565C0'));});}
if(p>=3){[[408,100],[452,155],[422,162],[436,108]].forEach(function(pt){o.push(circ(pt[0],pt[1],4,'#C0272D','#C0272D'));});}
s.innerHTML=o.join('');}

function dQ7(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Measuring instruments and uncertainty','#1565C0',13,'middle',true));
var inst=[['Ruler','\u00b11 mm','length of objects'],['Vernier calliper','\u00b10.1 mm','diameter, small gaps'],['Micrometer','\u00b10.01 mm','wire, thin sheet'],['Stopwatch','\u00b10.01 s (+ reaction)','time intervals'],['Top-pan balance','\u00b10.01 g','mass']];
inst.forEach(function(r,i){if(i<p+1){o.push(R(10,40+i*40,460,34,'#e3f2fd','#BBDEFB',1));o.push(T(120,61+i*40,r[0],'#1565C0',11,'middle',true));o.push(T(265,61+i*40,r[1],'#C0272D',11,'middle',false));o.push(T(420,61+i*40,r[2],'#555',9,'end',false));}});
s.innerHTML=o.join('');}

function dQ8(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Standard form','#1565C0',13,'middle',true));
if(p>=1){o.push(R(10,40,460,50,'#e3f2fd','#1565C0',1.5));o.push(T(240,62,'A \u00d7 10\u207f where 1 \u2264 A < 10','#0d47a1',14,'middle',true));o.push(T(240,80,'n is a positive or negative integer','#555',10,'middle',false));}
var exs=[['3 400 000','3.4 \u00d7 10\u2076'],['0.000 056','5.6 \u00d7 10\u207b\u2075'],['speed of light','3.0 \u00d7 10\u2078 m/s'],['proton mass','1.67 \u00d7 10\u207b\u00b2\u2077 kg']];
exs.forEach(function(r,i){if(i<p){o.push(R(10,98+i*36,460,30,'#e3f2fd','#BBDEFB',1));o.push(T(170,117+i*36,r[0],'#333',11,'end',false));o.push(T(200,117+i*36,'\u2192 '+r[1],'#1565C0',12,'start',true));}});
s.innerHTML=o.join('');}

function dQ9(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Timing experiments \u2014 reducing error','#1565C0',13,'middle',true));
if(p>=1){o.push(R(10,40,460,60,'#e3f2fd','#1565C0',1));o.push(T(240,60,'Reaction time \u2248 0.3 s','#C0272D',12,'middle',true));o.push(T(240,80,'Makes single short-interval timing very inaccurate','#555',10,'middle',false));}
if(p>=2){o.push(R(10,112,460,60,'#e8f5e9','#2E7D32',1));o.push(T(240,132,'Time 20 oscillations, divide by 20','#2E7D32',12,'middle',true));o.push(T(240,152,'Error per period = 0.3 \u00f7 20 = 0.015 s','#555',10,'middle',false));}
if(p>=3){o.push(R(10,184,460,60,'#fff3e0','#E65100',1));o.push(T(240,206,'Repeat and average to reduce random error','#E65100',12,'middle',true));o.push(T(240,226,'Record all raw data; exclude outliers carefully','#555',10,'middle',false));}

function dQ10(p){var s=g(),o=[];s.setAttribute('viewBox','0 0 480 260');
o.push(T(240,22,'Summary: Physical Quantities','#1565C0',13,'middle',true));
var rows=[['SI unit of mass','kilogram (kg)'],['SI unit of length','metre (m)'],['SI unit of time','second (s)'],['Scalar','magnitude only'],['Vector','magnitude + direction'],['kilo (k)','10\u00b3'],['milli (m)','10\u207b\u00b3'],['Standard form','A\u00d710\u207f, 1\u2264A<10']];
rows.forEach(function(r,i){if(i<p+1){o.push(R(10,40+i*26,460,22,'#e3f2fd','#BBDEFB',1));o.push(T(170,55+i*26,r[0],'#555',10,'end',false));o.push(T(185,55+i*26,r[1],'#1565C0',10,'start',true));}});
s.innerHTML=o.join('');}

var QS=[
  {ey:'Q1 \u2022 Y10 Physics \u2022 Measurement',ti:'SI Base Units',su:'Name the SI base units for length, mass, time, current and temperature.',steps:[
    {lb:'The base units',dr:dQ1,ht:'<p>The <b>SI system</b> is the international standard for measurement. Every physical quantity is measured in units derived from seven base units. You must know the five most common.</p>'},
    {lb:'Length and mass',dr:dQ1,ht:'<p><b>Length</b>: metre (m). <b>Mass</b>: kilogram (kg). These are fundamental \u2014 all other mechanics units are built from them.</p>'},
    {lb:'Time, current, temperature',dr:dQ1,ht:'<p><b>Time</b>: second (s). <b>Electric current</b>: ampere (A). <b>Temperature</b>: kelvin (K). Note: 0 K = \u2212273\u00b0C (absolute zero).</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var q=pick([['mass','kilogram',2],['length','metre',1],['time','second',3],['current','ampere',4],['temperature','kelvin',5]]);return{question:'What is the SI base unit of <b>'+q[0]+'</b>? Enter: 1=metre, 2=kilogram, 3=second, 4=ampere, 5=kelvin.',hints:['Match quantity to its SI unit'],ans:q[2],tol:0,unit:'',working:'The SI unit of '+q[0]+' is the <b>'+q[1]+'</b>. Answer: '+q[2]+'.'};})},
  ]},
  {ey:'Q2 \u2022 Y10 Physics \u2022 Measurement',ti:'SI Prefixes',su:'Convert between units using SI prefixes: G, M, k, c, m, \u03bc, n.',steps:[
    {lb:'Prefix table',dr:dQ2,ht:'<p>Prefixes multiply the base unit by a power of 10. Most important: <b>k</b> (kilo, \u00d710\u00b3), <b>M</b> (mega, \u00d710\u2076), <b>m</b> (milli, \u00d710\u207b\u00b3), <b>\u03bc</b> (micro, \u00d710\u207b\u2076), <b>n</b> (nano, \u00d710\u207b\u2079).</p>'},
    {lb:'Converting',dr:dQ2,ht:'<p>To convert to the base unit, multiply by the prefix value.</p><div class="fm">5.2 km = 5.2 \u00d7 10\u00b3 m = 5200 m</div><div class="fm">350 mA = 350 \u00d7 10\u207b\u00b3 A = 0.35 A</div>'},
    {lb:'Your turn',dr:dQ2,ht:tryIt(function(){var cvs=[[5,'km',5000,'m','multiply by 10\u00b3'],[3.2,'mm',0.0032,'m','multiply by 10\u207b\u00b3'],[450,'mA',0.45,'A','multiply by 10\u207b\u00b3'],[2.5,'MW',2500000,'W','multiply by 10\u2076'],[800,'nm',8e-7,'m','multiply by 10\u207b\u2079']];var c=pick(cvs);return{question:'Convert <b>'+c[0]+' '+c[1]+'</b> to '+c[3]+'.',hints:[c[4]],ans:c[2],tol:Math.abs(c[2])*0.01,unit:c[3],working:c[0]+' '+c[1]+' = '+c[2]+' '+c[3]};})},
  ]},
  {ey:'Q3 \u2022 Y10 Physics \u2022 Measurement',ti:'Scalars and Vectors',su:'Classify quantities as scalar or vector. Add two perpendicular vectors.',steps:[
    {lb:'Scalars',dr:dQ3,ht:'<p>A <b>scalar</b> has magnitude (size) only. Examples: speed, distance, mass, time, energy, temperature, pressure.</p>'},
    {lb:'Vectors',dr:dQ3,ht:'<p>A <b>vector</b> has both magnitude and direction. Examples: velocity, displacement, acceleration, force, momentum, weight.</p>'},
    {lb:'Your turn',dr:dQ3,ht:tryIt(function(){var pairs=[['Speed',0],['Velocity',1],['Mass',0],['Force',1],['Distance',0],['Displacement',1],['Temperature',0],['Momentum',1]];var p=pick(pairs);return{question:'Is <b>"'+p[0]+'"</b> a vector? Enter 1 for Yes, 0 for No.',hints:['Vectors have magnitude AND direction'],ans:p[1],tol:0,unit:'',working:p[0]+' is a <b>'+(p[1]?'vector':'scalar')+'</b>. Answer: '+p[1]+'.'};})},
  ]},
  {ey:'Q4 \u2022 Y10 Physics \u2022 Measurement',ti:'Significant Figures',su:'Count significant figures and round answers correctly.',steps:[
    {lb:'Rules',dr:dQ4,ht:'<p><b>Significant figures (s.f.)</b> show the precision of a measurement. Rules: non-zero digits always count; zeros between non-zeros count; trailing zeros after a decimal point count; leading zeros do not count.</p>'},
    {lb:'Examples',dr:dQ4,ht:'<p>3400 \u2192 2 s.f. (ambiguous trailing zeros). &nbsp;3400.0 \u2192 5 s.f. (decimal point confirms). &nbsp;0.0056 \u2192 2 s.f. (leading zeros not significant). &nbsp;1.020 \u2192 4 s.f. (trailing zero after decimal counts).</p>'},
    {lb:'Your turn',dr:dQ4,ht:tryIt(function(){var nums=[[3400,2],[3400.0,5],[0.0056,2],[1.020,4],[3.50,3],[72300,3],[0.0100,3]];var n=pick(nums);return{question:'How many significant figures does <b>"'+n[0]+'"</b> have?',hints:['Leading zeros: not sig. Trailing zeros after decimal: sig.'],ans:n[1],tol:0,unit:'s.f.',working:'"'+n[0]+'" has <b>'+n[1]+' s.f.</b>'};})},
  ]},
  {ey:'Q5 \u2022 Y10 Physics \u2022 Measurement',ti:'Vector Addition',su:'Add two perpendicular vectors using Pythagoras.',steps:[
    {lb:'Perpendicular vectors',dr:dQ5,ht:'<p>When two vectors are at right angles, use Pythagoras to find the resultant magnitude.</p><div class="fm">R = \u221a(a\u00b2 + b\u00b2)</div>'},
    {lb:'Direction',dr:dQ5,ht:'<p>The direction of the resultant: \u03b8 = arctan(b/a) measured from vector a.</p><p>Example: 3 N east + 4 N north \u2192 R = 5 N at 53\u00b0 north of east.</p>'},
    {lb:'Worked example',dr:dQ5,ht:'<p>3 N east and 4 N north:</p><div class="fm">R = \u221a(3\u00b2 + 4\u00b2) = \u221a25 = 5 N</div>'},
    {lb:'Your turn',dr:dQ5,ht:tryIt(function(){var pairs=[[3,4,5],[5,12,13],[6,8,10],[8,15,17],[7,24,25]];var p=pick(pairs);return{question:'Two perpendicular forces: <b>'+p[0]+' N</b> and <b>'+p[1]+' N</b>. Find the resultant magnitude.',hints:['R = \u221a(a\u00b2 + b\u00b2)'],ans:p[2],tol:0.05,unit:'N',working:'R = \u221a('+p[0]+'\u00b2+'+p[1]+'\u00b2) = \u221a'+(p[0]*p[0]+p[1]*p[1])+' = '+p[2]+' N'};})},
  ]},
  {ey:'Q6 \u2022 Y10 Physics \u2022 Measurement',ti:'Accuracy and Precision',su:'Distinguish accuracy from precision. Identify systematic vs random error.',steps:[
    {lb:'Accuracy',dr:dQ6,ht:'<p><b>Accuracy</b>: how close a result is to the true value. Low systematic error = high accuracy.</p>'},
    {lb:'Precision',dr:dQ6,ht:'<p><b>Precision</b>: how reproducible repeated measurements are. Results clustered tightly = high precision, even if they are all wrong (systematic error).</p>'},
    {lb:'Errors',dr:dQ6,ht:'<p><b>Systematic error</b>: consistent bias in one direction (e.g. zero error, parallax). Cannot be reduced by repeating.<br><b>Random error</b>: unpredictable scatter. Reduced by repeating and averaging.</p>'},
    {lb:'Your turn',dr:dQ6,ht:tryIt(function(){var qs=[{q:'A balance always reads 5 g too high. This is which type of error?',a:1,w:'<b>Systematic error</b> \u2014 consistent bias. Answer: 1.'},{q:'Repeated measurements of the same quantity give slightly different results each time. This is which type of error?',a:2,w:'<b>Random error</b> \u2014 unpredictable scatter. Average repeated readings. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' Enter 1 = systematic, 2 = random.',hints:['Systematic: always same direction. Random: varies each time.'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
  ]},
  {ey:'Q7 \u2022 Y10 Physics \u2022 Measurement',ti:'Measuring Instruments',su:'Choose the correct instrument for a measurement.',steps:[
    {lb:'Choosing instruments',dr:dQ7,ht:'<p>Match the instrument to the required precision:</p><p>Ruler (\u00b11 mm) \u2192 everyday lengths. Vernier calliper (\u00b10.1 mm) \u2192 small dimensions. Micrometer (\u00b10.01 mm) \u2192 very thin objects. Stopwatch \u2192 time. Balance \u2192 mass.</p>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var qs=[{q:'Measuring the diameter of a wire (~0.5 mm). Which instrument?',a:3,w:'A <b>micrometer</b> (0.01 mm precision) is needed for wire diameter. Answer: 3.'},{q:'Measuring the length of a textbook (~30 cm). Which instrument?',a:1,w:'A <b>ruler</b> (1 mm precision) is fine for a textbook. Answer: 1.'},{q:'Measuring the external diameter of a metal cylinder (~25 mm). Which instrument?',a:2,w:'A <b>vernier calliper</b> (0.1 mm) is ideal for cylinder diameter. Answer: 2.'}];var qq=pick(qs);return{question:qq.q+' Enter 1 = ruler, 2 = vernier calliper, 3 = micrometer.',hints:['Match precision needed to the instrument'],ans:qq.a,tol:0,unit:'',working:qq.w};})},
  ]},
  {ey:'Q8 \u2022 Y10 Physics \u2022 Measurement',ti:'Standard Form',su:'Express very large and very small numbers in standard form A \u00d7 10\u207f.',steps:[
    {lb:'What is standard form?',dr:dQ8,ht:'<p>Standard form: <b>A \u00d7 10\u207f</b> where 1 \u2264 A < 10. Used for very large or very small numbers to avoid ambiguous zeros and to make them easier to work with.</p>'},
    {lb:'Examples',dr:dQ8,ht:'<p>3 400 000 = <b>3.4 \u00d7 10\u2076</b>. &nbsp;&nbsp;0.000 056 = <b>5.6 \u00d7 10\u207b\u2075</b>. &nbsp;&nbsp;Speed of light = <b>3.0 \u00d7 10\u2078 m/s</b>.</p>'},
    {lb:'Your turn',dr:dQ8,ht:tryIt(function(){var type=pick(['to_sf','from_sf']);if(type==='to_sf'){var m=pick([1.5,2.3,3.8,4.6,7.2]);var e=pick([-9,-6,-3,3,6,9]);var val=m*Math.pow(10,e);return{question:'What is the value of <b>'+m+' \u00d7 10^'+e+'</b> as a plain number?',hints:['Multiply: shift decimal point '+Math.abs(e)+' places'],ans:val,tol:Math.abs(val)*0.01,unit:'',working:m+' \u00d7 10^'+e+' = '+val};}var plain=pick([3400000,0.0056,25000,0.000001,980000]);var sf=parseFloat(plain.toExponential(1));var exp=parseInt(plain.toExponential(1).split('e')[1]);return{question:'Write <b>'+plain+'</b> in standard form. What is the mantissa (the A in A\u00d710\u207f)?',hints:['Move decimal so 1 \u2264 A < 10'],ans:sf,tol:0.01,unit:'',working:plain+' = '+sf+' \u00d7 10^'+exp};})},
  ]},
  {ey:'Q9 \u2022 Y10 Physics \u2022 Measurement',ti:'Timing Experiments',su:'Explain how to reduce timing error in oscillation experiments.',steps:[
    {lb:'The problem',dr:dQ9,ht:'<p>A stopwatch has precision \u00b10.01 s, but human <b>reaction time</b> is ~0.3 s. Timing a single short event is dominated by this reaction time error.</p>'},
    {lb:'The solution',dr:dQ9,ht:'<p>Time <b>many repetitions</b> (e.g. 20 oscillations) and divide. This spreads the reaction-time error across all oscillations.</p><div class="fm">T = total time \u00f7 number of oscillations</div>'},
    {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var n=pick([10,20,25,50]);var T=pick([0.8,1.0,1.2,1.4,1.6,2.0]);var total=parseFloat((n*T).toFixed(1));return{question:'<b>'+n+' complete oscillations</b> take <b>'+total+' s</b>. Find the period T.',hints:['T = total time \u00f7 number of oscillations'],ans:T,tol:0.01,unit:'s',working:'T = '+total+' \u00f7 '+n+' = '+T+' s'};})},
  ]},
  {ey:'Q10 \u2022 Y10 Physics \u2022 Measurement',ti:'Mixed Measurement Questions',su:'Combined questions on units, prefixes, s.f., vectors and standard form.',steps:[
    {lb:'Summary',dr:dQ10,ht:'<p>SI units \u2022 Prefixes (k=10\u00b3, m=10\u207b\u00b3, \u03bc=10\u207b\u2076) \u2022 Scalars vs vectors \u2022 Significant figures \u2022 Standard form \u2022 Accuracy/precision \u2022 Instruments \u2022 Vector addition (Pythagoras).</p>'},
    {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var type=pick(['prefix','sf','vector','timing']);if(type==='prefix'){var n=rnd(1,9);return{question:'Convert <b>'+n+' km</b> to metres.',hints:['k = 10\u00b3'],ans:n*1000,tol:0.1,unit:'m',working:n+' km = '+n*1000+' m'};}if(type==='sf'){var nums=[[12.50,4],[0.0300,3],[4800,2],[7.010,4]];var p=pick(nums);return{question:'How many s.f. in <b>"'+p[0]+'"</b>?',hints:['Leading zeros not sig. Trailing zeros after decimal sig.'],ans:p[1],tol:0,unit:'s.f.',working:'"'+p[0]+'" has '+p[1]+' s.f.'};}if(type==='vector'){var pairs=[[3,4,5],[5,12,13],[6,8,10]];var p2=pick(pairs);return{question:'Perpendicular forces <b>'+p2[0]+' N</b> and <b>'+p2[1]+' N</b>. Find resultant.',hints:['R = \u221a(a\u00b2+b\u00b2)'],ans:p2[2],tol:0.05,unit:'N',working:'R = \u221a'+(p2[0]*p2[0]+p2[1]*p2[1])+' = '+p2[2]+' N'};}var swings=pick([10,20,25]);var T=pick([0.8,1.0,1.2,1.4]);var total=parseFloat((swings*T).toFixed(1));return{question:'<b>'+swings+' oscillations</b> in <b>'+total+' s</b>. Find period T.',hints:['T = total \u00f7 n'],ans:T,tol:0.01,unit:'s',working:'T = '+total+'/'+swings+' = '+T+' s'};})},
  ]},
];

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb');
  var lbl=sb.querySelector('.sb-lbl');
  sb.innerHTML=''; sb.appendChild(lbl);
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}
function bDT(){
  var w=document.getElementById('dt'); w.innerHTML='';
  QS[qi].steps.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===si?' on':i<si?' dn':'');
    w.appendChild(d);
  });
}
function render(){
  bSB(); var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').innerHTML=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');
  p.classList.remove('fi'); void p.offsetWidth; p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;
  st.dr(si); bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
