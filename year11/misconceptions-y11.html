<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Common Misconceptions &middot; Year 11 &middot; Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;
  --bg:#1a1a2e;--card:#16213e;--card2:#0f3460;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:#e8e0d8;font-family:'Helvetica Neue',Arial,sans-serif;min-height:100vh;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;
  justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);
  border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.hero{text-align:center;padding:36px 20px 28px;background:linear-gradient(180deg,#0f0f23,#1a1a2e);}
.hero h1{font-size:clamp(18px,3vw,26px);font-weight:800;color:#fff;margin-bottom:6px;}
.hero p{font-size:13px;color:#a09890;max-width:480px;margin:0 auto;}
.badge-strip{display:flex;justify-content:center;gap:8px;margin-top:14px;flex-wrap:wrap;}
.topic-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;
  background:rgba(192,39,45,0.2);color:#e8a0a4;border:1px solid rgba(192,39,45,0.4);cursor:pointer;transition:.15s;}
.topic-badge:hover,.topic-badge.on{background:var(--red);color:#fff;border-color:var(--red);}
.arena{max-width:640px;margin:32px auto 60px;padding:0 16px;}
.q-card{background:var(--card);border:1px solid #2a2a4e;border-radius:8px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.4);}
.q-top{background:var(--card2);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;}
.q-tag{font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#a09890;}
.q-num{font-size:11px;color:#6a6a8a;}
.q-body{padding:28px 24px 20px;}
.q-stem{font-size:17px;line-height:1.55;color:#e8e0d8;margin-bottom:22px;}
.q-stem b{color:#fff;font-size:19px;}
.answer-area{display:flex;flex-direction:column;gap:10px;}
.choice{display:flex;align-items:flex-start;gap:14px;background:#0f0f23;border:2px solid #2a2a4e;
  border-radius:6px;padding:14px 16px;cursor:pointer;transition:.2s;font-size:14px;color:#d0c8c0;line-height:1.45;}
.choice:hover{border-color:var(--gold);color:#fff;}
.choice.selected{border-color:var(--gold);background:rgba(200,146,42,0.1);color:#fff;}
.choice.correct{border-color:#2e7d32;background:rgba(26,122,58,0.15);color:#a8e6b8;}
.choice.wrong{border-color:#a01820;background:rgba(160,24,32,0.15);color:#f0a0a8;}
.choice-lbl{min-width:28px;height:28px;border-radius:50%;background:#1a1a3e;border:2px solid #3a3a5e;
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;
  color:#888;flex-shrink:0;margin-top:1px;transition:.2s;}
.choice.selected .choice-lbl{background:var(--gold);border-color:var(--gold);color:#fff;}
.choice.correct .choice-lbl{background:#1a7a3a;border-color:#1a7a3a;color:#fff;}
.choice.wrong .choice-lbl{background:#a01820;border-color:#a01820;color:#fff;}
.submit-area{padding:0 24px 24px;display:flex;gap:10px;align-items:center;}
.submit-btn{font-size:14px;font-weight:700;padding:11px 28px;border-radius:4px;border:none;
  background:var(--red);color:#fff;cursor:pointer;transition:.15s;font-family:inherit;opacity:.4;pointer-events:none;}
.submit-btn.ready{opacity:1;pointer-events:auto;}
.submit-btn.ready:hover{background:var(--dark);}
.skip-btn{font-size:12px;color:#6a6a8a;background:none;border:none;cursor:pointer;font-family:inherit;padding:4px 8px;}
.skip-btn:hover{color:#a09890;}
.result{padding:24px;display:none;}
.result.show{display:block;}
.correct-panel{background:rgba(26,122,58,0.12);border:2px solid #2e7d32;border-radius:6px;padding:20px 22px;}
.correct-panel .icon{font-size:32px;margin-bottom:8px;}
.correct-panel h3{color:#4caf50;font-size:18px;font-weight:800;margin-bottom:8px;}
.correct-panel p{font-size:14px;color:#a8e6b8;line-height:1.6;}
.correct-panel .why{margin-top:12px;font-size:13px;background:rgba(0,0,0,.2);
  border-left:3px solid #2e7d32;padding:10px 14px;color:#c0e8c8;border-radius:0 4px 4px 0;line-height:1.6;}
.wrong-panel{border-radius:6px;overflow:hidden;}
.wrong-top{background:rgba(160,24,32,0.2);border:2px solid #a01820;border-bottom:none;
  border-radius:6px 6px 0 0;padding:18px 22px;}
.wrong-top .icon{font-size:28px;margin-bottom:6px;}
.wrong-top h3{color:#f48080;font-size:16px;font-weight:800;margin-bottom:4px;}
.wrong-top p{font-size:13px;color:#d09090;line-height:1.5;}
.breakdown{background:#0d0d20;border:2px solid #a01820;border-top:none;border-radius:0 0 6px 6px;}
.step{padding:16px 20px;border-bottom:1px solid #1a1a30;display:none;}
.step.show{display:block;}
.step-hdr{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.step-n{width:24px;height:24px;border-radius:50%;background:var(--red);color:#fff;
  font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.step-title{font-size:13px;font-weight:700;color:#e8a0a4;letter-spacing:.05em;text-transform:uppercase;}
.step-body{font-size:14px;color:#c8c0b8;line-height:1.7;}
.step-body b{color:#fff;}
.em{display:block;background:rgba(192,39,45,0.15);border:1px solid rgba(192,39,45,0.4);
  padding:8px 14px;border-radius:4px;margin:8px 0;font-family:'Cambria Math',Georgia,serif;font-size:15px;color:#ffb8b8;}
.ok{display:block;background:rgba(26,122,58,0.15);border:1px solid rgba(26,122,58,0.4);
  padding:8px 14px;border-radius:4px;margin:8px 0;font-family:'Cambria Math',Georgia,serif;font-size:15px;color:#a8e6b8;}
/* Number line */
.nl{display:flex;gap:0;margin:10px 0;border:1px solid #2a2a4e;border-radius:4px;overflow:hidden;}
.nl span{flex:1;text-align:center;padding:6px 2px;font-size:11px;border-right:1px solid #2a2a4e;}
.nl span.nneg{background:rgba(192,39,45,0.12);color:#e8a0a4;}
.nl span.npos{background:rgba(26,122,58,0.12);color:#a8e6b8;}
.nl span.nz{background:#1a1a3e;color:#888;font-weight:700;}
.nl span.nhi{outline:2px solid var(--gold);font-weight:700;color:#fff;z-index:1;position:relative;}
/* SVG diagram containers */
.diag{background:#0a0a1a;border:1px solid #2a2a4e;border-radius:6px;margin:10px 0;padding:8px;text-align:center;}
.diag svg{max-width:100%;height:auto;}
/* Place value table */
.pvt{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px;}
.pvt th{background:#1a1a4e;color:#a0a0d0;padding:6px 10px;text-align:center;border:1px solid #2a2a4e;}
.pvt td{padding:6px 10px;text-align:center;border:1px solid #2a2a4e;}
.pvt td.hi{background:rgba(192,39,45,0.2);color:#ffb8b8;font-weight:700;font-size:16px;}
.pvt td.ok2{background:rgba(26,122,58,0.2);color:#a8e6b8;font-weight:700;font-size:16px;}
.reveal-btn{margin:14px 20px 16px;display:block;font-size:13px;font-weight:600;padding:8px 18px;border-radius:4px;
  border:1px solid #a01820;background:transparent;color:#e8a0a4;cursor:pointer;font-family:inherit;transition:.15s;}
.reveal-btn:hover{background:rgba(192,39,45,0.2);}
.next-area{padding:16px 24px 24px;display:none;}
.next-area.show{display:flex;gap:10px;align-items:center;}
.next-btn{font-size:14px;font-weight:700;padding:11px 28px;border-radius:4px;
  background:var(--card2);color:#e8e0d8;border:1px solid #3a3a6e;cursor:pointer;font-family:inherit;transition:.15s;}
.next-btn:hover{background:#1a3060;border-color:var(--gold);color:#fff;}
.progress{font-size:11px;color:#6a6a8a;flex:1;text-align:right;}
@media(max-width:500px){.choice{padding:11px 12px;font-size:13px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Common Misconceptions &mdash; Year 11</div>
  <div style="width:80px"></div>
</header>
<div class="hero">
  <h1>&#x26A0;&#xFE0F; Common Misconceptions &mdash; Year 11</h1>
  <p>Answer each question first &mdash; then see <em>exactly why</em> common wrong thinking fails, with diagrams and step-by-step breakdowns.</p>
  <div class="badge-strip" id="topicStrip"></div>
</div>
<div class="arena">
  <div class="q-card" id="qcard">
    <div class="q-top">
      <span class="q-tag" id="qtag"></span>
      <span class="q-num" id="qnum"></span>
    </div>
    <div class="q-body">
      <div class="q-stem" id="qstem"></div>
      <div class="answer-area" id="choices"></div>
    </div>
    <div class="submit-area">
      <button class="submit-btn" id="submitBtn" onclick="submit()">Check my answer</button>
      <button class="skip-btn" onclick="nextQ()">Skip &rarr;</button>
    </div>
    <div class="result" id="resultPanel"></div>
    <div class="next-area" id="nextArea">
      <button class="next-btn" onclick="nextQ()">&rarr; Next misconception</button>
      <span class="progress" id="progText"></span>
    </div>
  </div>
</div>
<script>
var selectedIdx=-1,answered=false,qi=0,order=[],revealStep=0;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}
function nl(lo,hi,marks){
  var s='<div class="nl">';
  for(var v=lo;v<=hi;v++){
    var cls=(v<0?'nneg':v===0?'nz':'npos')+(marks&&marks.indexOf(v)>=0?' nhi':'');
    s+='<span class="'+cls+'">'+v+'</span>';
  }
  return s+'</div>';
}
function pvRow(cells,type){
  return '<tr>'+cells.map(function(c){return '<td class="'+(type||'')+'" >'+c+'</td>';}).join('')+'</tr>';
}
function pv(headers,wrong,right){
  return '<table class="pvt"><tr>'+headers.map(function(h){return '<th>'+h+'</th>';}).join('')+'</tr>'
    +'<tr>'+wrong.map(function(c,i){return '<td class="hi">'+c+'</td>';}).join('')+'</tr>'
    +'<tr>'+right.map(function(c,i){return '<td class="ok2">'+c+'</td>';}).join('')+'</tr></table>';
}

function buildMisconceptions(){
var M=[];
// ── QUADRATICS ──────────────────────────────────────────────────────────────
(function(){
  var a=rnd(1,4),b=rnd(1,5),c=rnd(1,4),d=rnd(1,5);
  var B=b-a, C=-a*b; // x^2 + Bx + C = (x-a)(x+b)... use simple case
  var p=rnd(1,5),q=rnd(1,5);
  var B2=-(p+q), C2=p*q; // (x-p)(x-q) = x^2 - (p+q)x + pq, both roots positive
  // Present as x^2 - B2x + C2 with sign errors
  M.push({topic:'Quadratics',tag:'Factorising \u2014 Sign Errors',
    stem:'Factorise <b>x\u00b2 \u2212 '+(p+q)+'x + '+p*q+'</b>.<br>A student writes <b>(x + '+p+')(x + '+q+')</b>. What is the error?',
    choices:[
      {text:'No error \u2014 that is correct.',correct:false,
       trap:'Expanding (x+'+p+')(x+'+q+') gives x\u00b2+'+(p+q)+'x+'+p*q+'. But the original has \u2212'+(p+q)+'x, not +'+(p+q)+'x.'},
      {text:'The signs are wrong: it should be (x \u2212 '+p+')(x \u2212 '+q+').',correct:true},
      {text:'The numbers '+p+' and '+q+' are wrong; the student should look for factors of \u2212'+p*q+'.',correct:false,
       trap:'The numbers are correct. The issue is that both bracket signs should be minus, not plus.'}
    ],
    celebrate:'<p><b>Correct!</b> (x \u2212 '+p+')(x \u2212 '+q+') = x\u00b2 \u2212 '+(p+q)+'x + '+p*q+' \u2713. Both signs inside the brackets must be negative because the middle term is \u2212'+(p+q)+'x.</p>',
    breakdown:[
      {title:'The misconception',body:'<span class="em">(x+'+p+')(x+'+q+') = x\u00b2 + '+(p+q)+'x + '+p*q+' \u2717</span>The middle term is +'+(p+q)+'x but we need \u2212'+(p+q)+'x. Wrong signs.'},
      {title:'How signs in brackets determine the middle term',body:'<table class="pvt"><tr><th>Brackets</th><th>Middle term</th><th>Constant</th></tr>'
        +'<tr><td>(x+'+p+')(x+'+q+')</td><td class="hi">+'+(p+q)+'x</td><td>+'+p*q+'</td></tr>'
        +'<tr><td>(x\u2212'+p+')(x\u2212'+q+')</td><td class="ok2">\u2212'+(p+q)+'x</td><td>+'+p*q+'</td></tr>'
        +'<tr><td>(x+'+p+')(x\u2212'+q+')</td><td class="hi">'+(p-q)+'x</td><td>\u2212'+p*q+'</td></tr></table>'},
      {title:'The check rule',body:'<span class="ok">Middle term negative, constant positive \u2192 both brackets have \u2212<br>(x\u2212'+p+')(x\u2212'+q+') = x\u00b2 \u2212'+(p+q)+'x + '+p*q+' \u2713</span>'},
      {title:'Always expand to verify',body:'<span class="ok">Expand your factorisation to check it gives the original expression.</span>'}
    ]
  });
})();

(function(){
  var p=rnd(1,5),q=rnd(1,4);
  M.push({topic:'Quadratics',tag:'Solving \u2014 Finding x Values After Factorising',
    stem:'Solve x\u00b2 \u2212 '+(p+q)+'x + '+p*q+' = 0.<br>A student factorises correctly: <b>(x \u2212 '+p+')(x \u2212 '+q+') = 0</b>, then stops and writes "factorised".',
    choices:[
      {text:'They have finished \u2014 the factorisation is the solution.',correct:false,
       trap:'Factorising is a method, not the answer. The question asks for the VALUES of x, not the factorised form.'},
      {text:'They need one more step: if (x\u2212'+p+')(x\u2212'+q+')=0 then x='+p+' or x='+q+'.',correct:true},
      {text:'They should expand and solve differently.',correct:false,
       trap:'The factorisation is correct. The issue is that they did not use the zero product property to find x.'}
    ],
    celebrate:'<p><b>Correct!</b> If AB=0 then A=0 or B=0 (zero product property). So x\u2212'+p+'=0 or x\u2212'+q+'=0, giving x=<b>'+p+'</b> or x=<b>'+q+'</b>.</p>',
    breakdown:[
      {title:'The misconception',body:'Students see factorising as the end goal. But the question says SOLVE \u2014 it wants x VALUES. The factorisation is only the method to reach the solution.'},
      {title:'The zero product property',body:'<div class="diag"><svg viewBox="0 0 300 60" xmlns="http://www.w3.org/2000/svg">'
        +'<text x="10" y="20" font-size="11" fill="#c8c0b8">If (x\u2212'+p+')(x\u2212'+q+') = 0</text>'
        +'<text x="10" y="40" font-size="11" fill="#a8e6b8">then (x\u2212'+p+') = 0  OR  (x\u2212'+q+') = 0</text>'
        +'<text x="10" y="58" font-size="11" fill="#a8e6b8">so x = '+p+'  OR  x = '+q+'</text>'
        +'</svg></div>'},
      {title:'Why this works',body:'If two things multiply to give zero, at least one of them MUST be zero. No other product gives zero.'},
      {title:'Complete solution',body:'<span class="ok">(x\u2212'+p+')(x\u2212'+q+')=0<br>x\u2212'+p+'=0 \u2192 x='+p+'<br>x\u2212'+q+'=0 \u2192 x='+q+'</span><span class="ok">Always write both solutions.</span>'}
    ]
  });
})();

// ── SIMULTANEOUS EQUATIONS ──────────────────────────────────────────────────
(function(){
  var x=rnd(1,5),y=rnd(1,5),a=rnd(1,3),b=rnd(1,3);
  var eq1l=a*x+b*y,eq2l=x+y;
  M.push({topic:'Simultaneous Equations',tag:'Forgetting to Substitute Back',
    stem:'Solving '+a+'x + '+b+'y = '+eq1l+' and x + y = '+eq2l+'.<br>A student eliminates to find <b>y = '+y+'</b>, then writes "x = '+x+', y = '+y+'" without substituting back.',
    choices:[
      {text:'Fine \u2014 if y = '+y+' then x follows automatically.',correct:false,
       trap:'x must be found by substituting y back into one of the equations. Guessing or reading it off is not a valid method.'},
      {text:'Wrong \u2014 they must substitute y = '+y+' into an equation to find x.',correct:true},
      {text:'Wrong \u2014 they should eliminate x instead and start again.',correct:false,
       trap:'There is no need to start again. Substituting y = '+y+' into either equation gives x correctly.'}
    ],
    celebrate:'<p><b>Correct!</b> Once y = '+y+' is found, substitute into x + y = '+eq2l+': x + '+y+' = '+eq2l+', so x = '+(eq2l-y)+'.</p>',
    breakdown:[
      {title:'The misconception',body:'After finding one variable, students sometimes read off the other from memory or guess. Without substitution, the second answer is unverified.'},
      {title:'The substitution step',body:'<span class="ok">Found: y = '+y+'<br>Substitute into x + y = '+eq2l+':<br>x + '+y+' = '+eq2l+'<br>x = '+(eq2l-y)+'</span>'},
      {title:'Always verify',body:'<span class="ok">Check in BOTH original equations:<br>'+a+'('+x+') + '+b+'('+y+') = '+( a*x+b*y)+' = '+eq1l+' \u2713<br>'+x+' + '+y+' = '+eq2l+' \u2713</span>'},
      {title:'Rule',body:'<span class="ok">Simultaneous equations: find one variable, then ALWAYS substitute back to find the other. Never assume the second value.</span>'}
    ]
  });
})();

// ── CIRCLE THEOREMS ─────────────────────────────────────────────────────────
(function(){
  var aoc=pick([80,100,110,120,130]);
  var abc=aoc/2;
  M.push({topic:'Circle Theorems',tag:'Using the Correct Theorem',
    stem:'In a circle, angle AOC (at the centre) = '+aoc+'\u00b0. Angle ABC (at the circumference, same arc) = ?<br>A student says '+aoc+'\u00b0 "because both are in the same circle".',
    choices:[
      {text:''+aoc+'\u00b0 \u2014 angles in the same circle are equal.',correct:false,
       trap:'There is no theorem stating all angles in a circle are equal. The angle at the centre is twice the angle at the circumference on the same arc.'},
      {text:''+abc+'\u00b0 \u2014 angle at circumference = half the angle at centre.',correct:true},
      {text:''+( 180-abc)+'\u00b0 \u2014 supplementary to the circumference angle.',correct:false,
       trap:'That would apply to opposite angles in a cyclic quadrilateral. Here, use the centre-circumference relationship.'}
    ],
    celebrate:'<p><b>Correct!</b> Angle ABC = '+abc+'\u00b0. The angle at the circumference is <b>half</b> the angle at the centre, subtended by the same arc.</p><div class="why">This is one of the most important circle theorems. The centre angle is always exactly double the circumference angle on the same arc.</div>',
    breakdown:[
      {title:'The misconception',body:'Students think "same circle = same angle" or muddle different theorems. Each circle theorem has a very specific condition.'},
      {title:'Diagram: centre vs circumference angle',body:'<div class="diag"><svg viewBox="0 0 300 130" xmlns="http://www.w3.org/2000/svg">'
        +'<circle cx="150" cy="70" r="55" fill="none" stroke="#555" stroke-width="1.5"/>'
        +'<circle cx="150" cy="70" r="4" fill="#C0272D"/><text x="155" y="66" font-size="9" fill="#f48080">O</text>'
        +'<line x1="150" y1="70" x2="105" y2="25" stroke="#C0272D" stroke-width="1.5"/>'
        +'<line x1="150" y1="70" x2="195" y2="25" stroke="#C0272D" stroke-width="1.5"/>'
        +'<circle cx="150" cy="125" r="4" fill="#1a5a8a"/><text x="145" y="120" font-size="9" fill="#a0c0e8">B</text>'
        +'<line x1="105" y1="25" x2="150" y2="125" stroke="#1a5a8a" stroke-width="1.5"/>'
        +'<line x1="195" y1="25" x2="150" y2="125" stroke="#1a5a8a" stroke-width="1.5"/>'
        +'<text x="150" y="80" font-size="9" fill="#f48080" text-anchor="middle">'+aoc+'\u00b0</text>'
        +'<text x="150" y="110" font-size="9" fill="#a0c0e8" text-anchor="middle">'+abc+'\u00b0</text>'
        +'</svg></div>Centre angle AOC = '+aoc+'\u00b0 \u2192 circumference angle ABC = '+abc+'\u00b0'},
      {title:'The theorem',body:'<span class="ok">Angle at centre = 2 \u00d7 angle at circumference (same arc)</span>'},
      {title:'Rule',body:'<span class="ok">Identify which arc (or chord) the angles stand on.<br>Match to the correct theorem before calculating.<br>Never assume angles are equal just because they are "in the same circle".</span>'}
    ]
  });
})();

// ── SIMILARITY ───────────────────────────────────────────────────────────────
(function(){
  var sf=pick([2,3,4]);
  M.push({topic:'Similarity',tag:'Length Scale Factor \u2260 Area Scale Factor',
    stem:'Two similar shapes have a length scale factor of '+sf+'.<br>A student says the area scale factor is also '+sf+'. Are they right?',
    choices:[
      {text:'Yes \u2014 if lengths scale by '+sf+', areas scale by '+sf+' too.',correct:false,
       trap:'Area scales by the SQUARE of the length scale factor.'},
      {text:'No \u2014 the area scale factor is '+sf+'\u00b2 = '+sf*sf+'.',correct:true},
      {text:'No \u2014 the area scale factor is '+sf+'/2 = '+(sf/2)+'.',correct:false,
       trap:'There is no formula dividing the scale factor by 2.'}
    ],
    celebrate:'<p><b>Correct!</b> Length scale factor = '+sf+' \u2192 area scale factor = '+sf+'\u00b2 = '+sf*sf+'.<br>Volume scale factor = '+sf+'\u00b3 = '+sf*sf*sf+'.</p>',
    breakdown:[
      {title:'The misconception',body:'Students apply the length scale factor directly to area and volume. But area is two-dimensional, so scaling by '+sf+' in each direction multiplies area by '+sf+'\u00d7'+sf+'.'},
      {title:'Diagram: scaling a square',body:'<div class="diag"><svg viewBox="0 0 300 100" xmlns="http://www.w3.org/2000/svg">'
        +'<rect x="10" y="20" width="40" height="40" fill="rgba(192,39,45,0.25)" stroke="#C0272D" stroke-width="1.5"/>'
        +'<text x="30" y="74" font-size="8" fill="#f48080" text-anchor="middle">1\u00d71=1</text>'
        +'<rect x="100" y="20" width="'+40*sf+'" height="'+40*sf+'" fill="rgba(26,90,138,0.2)" stroke="#1a5a8a" stroke-width="1.5"/>'
        +'<text x="'+(100+20*sf)+'" y="74" font-size="8" fill="#a0c0e8" text-anchor="middle">'+sf+'\u00d7'+sf+'='+sf*sf+'</text>'
        +'<text x="75" y="44" font-size="9" fill="#888">\u00d7'+sf+'</text>'
        +'</svg></div>Each side multiplies by '+sf+' \u2192 area multiplies by '+sf*sf+' ('+sf+'\u00b2)'},
      {title:'The three scale factors',body:'<span class="ok">Length scale factor: k<br>Area scale factor: k\u00b2<br>Volume scale factor: k\u00b3</span>'},
      {title:'Rule',body:'<span class="ok">Scale factor k: lengths \u00d7k, areas \u00d7k\u00b2, volumes \u00d7k\u00b3.</span>'}
    ]
  });
})();

// ── PROBABILITY TREES ────────────────────────────────────────────────────────
(function(){
  var p1n=rnd(1,3),p1d=pick([4,5,6]);
  while(p1n>=p1d)p1n=rnd(1,3);
  var p2n=rnd(1,3),p2d=p1d;
  while(p2n>=p2d)p2n=rnd(1,3);
  var correct_num=p1n*p2n, correct_den=p1d*p2d;
  var wrong_num=p1n+p2n, wrong_den=p1d;
  M.push({topic:'Probability Trees',tag:'Multiply Along Branches, Not Add',
    stem:'P(A) = '+p1n+'/'+p1d+' and P(B) = '+p2n+'/'+p2d+' (independent events).<br>A student writes P(A and B) = '+wrong_num+'/'+wrong_den+'.',
    choices:[
      {text:wrong_num+'/'+wrong_den+' \u2014 add the probabilities.',correct:false,
       trap:'Adding probabilities gives P(A or B), not P(A and B). To find both events together, multiply along the branches.'},
      {text:correct_num+'/'+correct_den+' \u2014 multiply along the branches.',correct:true},
      {text:p1n+'/'+p1d+' \u2014 use only the first probability.',correct:false,
       trap:'Both events must occur, so both probabilities must be used.'}
    ],
    celebrate:'<p><b>Correct!</b> P(A and B) = P(A) \u00d7 P(B) = '+p1n+'/'+p1d+' \u00d7 '+p2n+'/'+p2d+' = <b>'+correct_num+'/'+correct_den+'</b>.</p><div class="why">Tree diagrams: multiply ALONG branches (AND). Add ACROSS branches for the same outcome (OR).</div>',
    breakdown:[
      {title:'The misconception',body:'<span class="em">P(A and B) = '+p1n+'/'+p1d+' + '+p2n+'/'+p2d+' = '+wrong_num+'/'+wrong_den+'  \u2717</span>Addition gives the probability of A OR B (approximately), not both together.'},
      {title:'Tree diagram rule',body:'<div class="diag"><svg viewBox="0 0 300 80" xmlns="http://www.w3.org/2000/svg">'
        +'<line x1="10" y1="40" x2="100" y2="20" stroke="#C0272D" stroke-width="1.5"/>'
        +'<text x="50" y="24" font-size="9" fill="#f48080">'+p1n+'/'+p1d+'  A</text>'
        +'<line x1="100" y1="20" x2="200" y2="10" stroke="#1a7a3a" stroke-width="1.5"/>'
        +'<text x="145" y="10" font-size="9" fill="#a8e6b8">'+p2n+'/'+p2d+'  B</text>'
        +'<text x="210" y="14" font-size="9" fill="#a8e6b8">P(A and B) = '+p1n+'/'+p1d+' \u00d7 '+p2n+'/'+p2d+' = '+correct_num+'/'+correct_den+'</text>'
        +'<text x="50" y="56" font-size="9" fill="#888">\u00d7 along branches (AND)</text>'
        +'<text x="50" y="70" font-size="9" fill="#888">+ across outcomes (OR)</text>'
        +'</svg></div>'},
      {title:'Correct calculation',body:'<span class="ok">P(A and B) = '+p1n+'/'+p1d+' \u00d7 '+p2n+'/'+p2d+' = '+correct_num+'/'+correct_den+'</span>'},
      {title:'Rule',body:'<span class="ok">Multiply ALONG branches: P(A and B)<br>Add ACROSS branches: P(A or B)<br>Never add along branches.</span>'}
    ]
  });
})();

(function(){
  var r=rnd(3,6),total=rnd(r+2,10);
  M.push({topic:'Probability Trees',tag:'Dependent Events \u2014 Probabilities Change',
    stem:'A bag has '+r+' red and '+(total-r)+' blue counters. Two drawn WITHOUT replacement.<br>A student uses P(red) = '+r+'/'+total+' for BOTH draws.',
    choices:[
      {text:'Correct \u2014 the probability of red is always '+r+'/'+total+'.',correct:false,
       trap:'After the first draw (without replacement), there is one fewer counter. The probabilities change for the second draw.'},
      {text:'Wrong \u2014 after drawing one red, the second P(red) = '+(r-1)+'/'+(total-1)+'.',correct:true},
      {text:'Wrong \u2014 after drawing one red, P(red second) = '+r+'/'+(total-1)+'.',correct:false,
       trap:'If one red was already drawn, there are now only '+(r-1)+' red counters left from '+(total-1)+' total.'}
    ],
    celebrate:'<p><b>Correct!</b> P(red, red) = '+r+'/'+total+' \u00d7 '+(r-1)+'/'+(total-1)+' = '+( r*(r-1))+'/'+( total*(total-1))+'.</p><div class="why">Without replacement: each draw changes the total and possibly the count of the desired outcome.</div>',
    breakdown:[
      {title:'The misconception',body:'Using the same probability for both draws assumes <em>replacement</em>. Without replacement, drawing one counter changes what remains in the bag.'},
      {title:'First and second draw',body:'<div class="diag"><svg viewBox="0 0 300 70" xmlns="http://www.w3.org/2000/svg">'
        +'<text x="10" y="18" font-size="10" fill="#c8c0b8">Before: '+r+' red, '+(total-r)+' blue ('+total+' total)</text>'
        +'<text x="10" y="38" font-size="10" fill="#f48080">P(1st red) = '+r+'/'+total+'</text>'
        +'<text x="10" y="58" font-size="10" fill="#a8e6b8">After red drawn: '+(r-1)+' red, '+(total-r)+' blue ('+(total-1)+' total)</text>'
        +'</svg></div>'},
      {title:'Tree diagram',body:'<span class="ok">P(red then red) = '+r+'/'+total+' \u00d7 '+(r-1)+'/'+(total-1)+' = '+(r*(r-1))+'/'+(total*(total-1))+'</span>'},
      {title:'Rule',body:'<span class="ok">Without replacement: update both numerator and denominator after each draw.<br>With replacement: probabilities stay the same every draw.</span>'}
    ]
  });
})();

return M;
}

var MISCONCEPTIONS=buildMisconceptions();
var topics=[...new Set(MISCONCEPTIONS.map(function(m){return m.topic;}))]
;(function(){
  var strip=document.getElementById('topicStrip');
  function makeBtn(label,topic){
    var b=document.createElement('button');
    b.className='topic-badge'+(topic==='all'?' on':'');
    b.textContent=label;b.onclick=function(){setTopic(topic,b);};
    strip.appendChild(b);
  }
  makeBtn('All topics','all');
  topics.forEach(function(t){makeBtn(t,t);});
})();
var activeTopic='all';
function setTopic(t,btn){
  activeTopic=t;
  document.querySelectorAll('.topic-badge').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');buildOrder();loadQ();
}
function buildOrder(){
  var pool=MISCONCEPTIONS.map(function(_,i){return i;})
    .filter(function(i){return activeTopic==='all'||MISCONCEPTIONS[i].topic===activeTopic;});
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  order=pool;qi=0;
}
buildOrder();
function loadQ(){
  selectedIdx=-1;answered=false;revealStep=0;
  var m=MISCONCEPTIONS[order[qi%order.length]];
  document.getElementById('qtag').textContent=m.topic+' · '+m.tag;
  document.getElementById('qnum').textContent='Q'+(qi+1)+' of '+order.length;
  document.getElementById('qstem').innerHTML=m.stem;
  var cs=m.choices.map(function(c,i){return {c:c,i:i};});
  for(var i=cs.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=cs[i];cs[i]=cs[j];cs[j]=t;}
  var area=document.getElementById('choices');area.innerHTML='';
  var labs='ABCD';
  cs.forEach(function(ch,idx){
    var d=document.createElement('div');d.className='choice';
    d.innerHTML='<div class="choice-lbl">'+labs[idx]+'</div><div>'+ch.c.text+'</div>';
    d.dataset.correct=ch.c.correct?'1':'0';d.dataset.trap=ch.c.trap||'';
    d.onclick=function(){selectChoice(this,idx);};area.appendChild(d);
  });
  document.getElementById('submitBtn').className='submit-btn';
  document.getElementById('submitBtn').style.display='';
  document.getElementById('resultPanel').className='result';
  document.getElementById('resultPanel').innerHTML='';
  document.getElementById('nextArea').className='next-area';
}
function selectChoice(el,idx){
  if(answered)return;selectedIdx=idx;
  document.querySelectorAll('.choice').forEach(function(c){c.classList.remove('selected');});
  el.classList.add('selected');
  document.getElementById('submitBtn').className='submit-btn ready';
}
function submit(){
  if(selectedIdx<0||answered)return;answered=true;
  var m=MISCONCEPTIONS[order[qi%order.length]];
  var choices=document.querySelectorAll('.choice');
  var chosen=choices[selectedIdx];
  var isCorrect=chosen.dataset.correct==='1';
  choices.forEach(function(c){
    if(c.dataset.correct==='1')c.classList.add('correct');
    else if(c===chosen)c.classList.add('wrong');
  });
  document.getElementById('submitBtn').style.display='none';
  var panel=document.getElementById('resultPanel');
  panel.className='result show';
  if(isCorrect){
    panel.innerHTML='<div class="correct-panel"><div class="icon">&#x1F680;</div><h3>Cool maths student!</h3>'+m.celebrate+'</div>';
  }else{
    var trap=chosen.dataset.trap;
    var stepsHTML=m.breakdown.map(function(st,i){
      return '<div class="step" id="step'+i+'"><div class="step-hdr"><div class="step-n">'+(i+1)+'</div><div class="step-title">'+st.title+'</div></div><div class="step-body">'+st.body+'</div></div>';
    }).join('');
    panel.innerHTML='<div class="wrong-panel">'
      +'<div class="wrong-top"><div class="icon">⚠️</div><h3>Not quite — let’s fix that thinking</h3>'
      +(trap?'<p>“'+trap+'”</p>':'')
      +'</div><div class="breakdown">'+stepsHTML
      +'<button class="reveal-btn" id="revealBtn" onclick="revealNext()">Show step 1 →</button>'
      +'</div></div>';
    revealNext();
  }
  document.getElementById('nextArea').className='next-area show';
  document.getElementById('progText').textContent=(qi+1)+' of '+order.length+' done';
}
function revealNext(){
  var steps=document.querySelectorAll('.step');
  if(revealStep<steps.length)steps[revealStep++].classList.add('show');
  var btn=document.getElementById('revealBtn');
  if(btn){if(revealStep>=steps.length)btn.style.display='none';else btn.textContent='Show step '+(revealStep+1)+' →';}
}
function nextQ(){qi++;if(qi>=order.length){qi=0;buildOrder();}loadQ();}
loadQ();
</script>
