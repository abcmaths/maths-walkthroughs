<script>
var D=Math.PI/180;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">‚úĒ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='‚úď Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite ‚ÄĒ check your working and try again.';}}
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1)+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>'; }
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}

// Shared axes helper: 0-360 on x, -1 to 1 on y
function axes(ox,oy,sx,sy,o){
  o.push(L(ox,oy,ox+370,oy,'#aaa',1.5)); // x-axis
  o.push(L(ox,oy-sy-10,ox,oy+sy+10,'#aaa',1.5)); // y-axis
  [90,180,270,360].forEach(function(deg){var x=ox+deg*sx/90;o.push(L(x,oy-3,x,oy+3,'#aaa',1));o.push(T(x,oy+14,''+deg,'#555',9));});
  o.push(T(ox-6,oy+4,'0','#555',9,'end'));
  o.push(T(ox-8,oy-sy+4,'1','#555',9,'end'));
  o.push(T(ox-8,oy+sy+4,'-1','#555',9,'end'));
  o.push(L(ox,oy-sy,ox+370,oy-sy,'#eee',0.8,'3,2'));
  o.push(L(ox,oy+sy,ox+370,oy+sy,'#eee',0.8,'3,2'));
  o.push(T(ox+380,oy+4,'x¬į','#555',9,'start'));
}
function sinPath(ox,oy,sx,sy,c,from,to){
  var d='';for(var x=from;x<=to;x+=2){var px=ox+x*sx/90,py=oy-Math.sin(x*D)*sy;d+=(x===from?'M':'L')+Math.round(px)+','+Math.round(py)+' ';}
  return '<path d="'+d+'" fill="none" stroke="'+(c||'#C0272D')+'" stroke-width="2.5"/>';
}
function cosPath(ox,oy,sx,sy,c,from,to){
  var d='';for(var x=from;x<=to;x+=2){var px=ox+x*sx/90,py=oy-Math.cos(x*D)*sy;d+=(x===from?'M':'L')+Math.round(px)+','+Math.round(py)+' ';}
  return '<path d="'+d+'" fill="none" stroke="'+(c||'#1a5a8a')+'" stroke-width="2.5"/>';
}
function tanPath(ox,oy,sx,sy,c){
  var d='';var first=true;
  for(var x=0;x<=360;x+=1){
    if(Math.abs(x-90)<3||Math.abs(x-270)<3){first=true;continue;}
    var py=oy-Math.tan(x*D)*sy*0.5;
    if(Math.abs(py-oy)>sy*2.2){first=true;continue;}
    var px=ox+x*sx/90;
    d+=(first?'M':'L')+Math.round(px)+','+Math.round(py)+' ';first=false;
  }
  return '<path d="'+d+'" fill="none" stroke="'+(c||'#C8922A')+'" stroke-width="2.5"/>';
}

// Q1: y = sin x graph
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=44,oy=130,sx=1,sy=80;
  axes(ox,oy,sx,sy,o);
  if(p>=1)o.push(sinPath(ox,oy,sx,sy,'#C0272D',0,360));
  if(p>=2){o.push(L(ox+90,oy-sy-10,ox+90,oy+sy+10,'#C0272D',1,'4,3'));o.push(T(ox+90,oy-sy-14,'Peak: (90¬į,1)','#C0272D',10));}
  if(p>=3){o.push(L(ox+270,oy-sy-10,ox+270,oy+sy+10,'#C8922A',1,'4,3'));o.push(T(ox+270,oy+sy+24,'Trough: (270¬į,‚ąí1)','#C8922A',10));}
  o.push(T(ox+185,14,'y = sin x','#C0272D',13,'middle'));
  s.innerHTML=o.join('');}

// Q2: y = cos x
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=44,oy=130,sx=1,sy=80;
  axes(ox,oy,sx,sy,o);
  if(p>=1)o.push(cosPath(ox,oy,sx,sy,'#1a5a8a',0,360));
  if(p>=2){o.push(T(ox,oy-sy-14,'Peak: (0¬į,1)','#1a5a8a',10));o.push(T(ox+360,oy-sy-14,'and (360¬į,1)','#1a5a8a',10));}
  if(p>=3){o.push(L(ox+180,oy-sy-10,ox+180,oy+sy+10,'#C8922A',1,'4,3'));o.push(T(ox+180,oy+sy+24,'Trough: (180¬į,‚ąí1)','#C8922A',10));}
  o.push(T(ox+185,14,'y = cos x','#1a5a8a',13,'middle'));
  s.innerHTML=o.join('');}

// Q3: y = tan x
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=44,oy=130,sx=1,sy=80;
  axes(ox,oy,sx,sy,o);
  if(p>=1)o.push(tanPath(ox,oy,sx,sy,'#C8922A'));
  if(p>=2){[90,270].forEach(function(x){o.push(L(ox+x,oy-sy-10,ox+x,oy+sy+10,'#C0272D',1,'5,3'));o.push(T(ox+x,oy-sy-14,x+'¬į','#C0272D',9));});}
  if(p>=3){o.push(T(ox+185,14,'y = tan x','#C8922A',13,'middle'));o.push(T(ox+185,240,'Asymptotes at x = 90¬į and x = 270¬į','#C0272D',10,'middle'));}
  s.innerHTML=o.join('');}

// Q4: Exact values table
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var rows=[['0¬į','0','1','0'],['30¬į','¬Ĺ','‚ąö3/2','1/‚ąö3'],['45¬į','‚ąö2/2','‚ąö2/2','1'],['60¬į','‚ąö3/2','¬Ĺ','‚ąö3'],['90¬į','1','0','undefined']];
  var cols=['angle','sin','cos','tan'];
  var cw=[60,90,90,90],cx=[30,105,195,285];
  // Header
  cols.forEach(function(c,i){o.push(R(cx[i]-cw[i]/2,16,cw[i],28,'#C0272D','#C0272D',1));o.push(T(cx[i],34,c,'#fff',12));});
  rows.forEach(function(r,ri){
    var shown=p>=ri+1;
    r.forEach(function(val,ci){
      var bg=ri%2===0?'#fff5f0':'#fdf7f4';
      o.push(R(cx[ci]-cw[ci]/2,44+ri*36,cw[ci],34,shown?bg:'#f0f0f0','#E4D6CE',1));
      if(shown)o.push(T(cx[ci],66+ri*36,val,'#241A17',ci===0?12:13));
      else if(ri===0&&p===0)o.push(T(cx[ci],66+ri*36,'?','#C0272D',13));
    });
  });
  s.innerHTML=o.join('');}

// Q5: Solve sin x = 0.5 ‚Üí 30¬į and 150¬į
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=44,oy=130,sx=1,sy=80;
  axes(ox,oy,sx,sy,o);
  o.push(sinPath(ox,oy,sx,sy,'#C0272D',0,360));
  o.push(L(ox,oy-sy*0.5,ox+370,oy-sy*0.5,'#1a5a8a',1.5,'5,3'));
  o.push(T(ox+378,oy-sy*0.5+4,'y=0.5','#1a5a8a',10,'start'));
  if(p>=1){[30,150].forEach(function(x){o.push(L(ox+x,oy-sy-10,ox+x,oy+10,'#C8922A',1.5,'4,2'));o.push(T(ox+x,oy-sy-16,x+'¬į','#C8922A',10));});}
  if(p>=2){o.push(T(ox+185,240,'Two solutions: 30¬į and 180¬į‚ąí30¬į=150¬į','#C0272D',11,'middle'));}
  s.innerHTML=o.join('');}

// Q6: Solve cos x = 0.5 ‚Üí 60¬į and 300¬į
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=44,oy=130,sx=1,sy=80;
  axes(ox,oy,sx,sy,o);
  o.push(cosPath(ox,oy,sx,sy,'#1a5a8a',0,360));
  o.push(L(ox,oy-sy*0.5,ox+370,oy-sy*0.5,'#C0272D',1.5,'5,3'));
  o.push(T(ox+378,oy-sy*0.5+4,'y=0.5','#C0272D',10,'start'));
  if(p>=1){[60,300].forEach(function(x){o.push(L(ox+x,oy-sy-10,ox+x,oy+10,'#C8922A',1.5,'4,2'));o.push(T(ox+x,oy-sy-16,x+'¬į','#C8922A',10));});}
  if(p>=2){o.push(T(ox+185,240,'Solutions: 60¬į and 360¬į‚ąí60¬į=300¬į','#1a5a8a',11,'middle'));}
  s.innerHTML=o.join('');}

// Q7: Negative value ‚ÄĒ sin x = -0.5 ‚Üí 210¬į, 330¬į
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=44,oy=130,sx=1,sy=80;
  axes(ox,oy,sx,sy,o);
  o.push(sinPath(ox,oy,sx,sy,'#C0272D',0,360));
  o.push(L(ox,oy+sy*0.5,ox+370,oy+sy*0.5,'#1a5a8a',1.5,'5,3'));
  o.push(T(ox+378,oy+sy*0.5+4,'y=‚ąí0.5','#1a5a8a',10,'start'));
  if(p>=1){[210,330].forEach(function(x){o.push(L(ox+x,oy-10,ox+x,oy+sy+10,'#C8922A',1.5,'4,2'));o.push(T(ox+x,oy+sy+22,x+'¬į','#C8922A',10));});}
  if(p>=2){o.push(T(ox+185,14,'sin‚ĀĽ¬Ļ(0.5) = 30¬į  ‚Üí  180¬į+30¬į=210¬į and 360¬į‚ąí30¬į=330¬į','#C0272D',10,'middle'));}
  s.innerHTML=o.join('');}

// Q8: Solve 2cos x + 1 = 0
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=44,oy=130,sx=1,sy=80;
  axes(ox,oy,sx,sy,o);
  o.push(cosPath(ox,oy,sx,sy,'#1a5a8a',0,360));
  o.push(L(ox,oy+sy*0.5,ox+370,oy+sy*0.5,'#C0272D',1.5,'5,3'));
  o.push(T(ox+378,oy+sy*0.5+4,'y=‚ąí¬Ĺ','#C0272D',10,'start'));
  if(p>=1){o.push(R(30,8,340,26,'#fff5f0','#C0272D'));o.push(T(200,25,'2cos x + 1 = 0  ‚Üí  cos x = ‚ąí¬Ĺ','#C0272D',12));}
  if(p>=2){[120,240].forEach(function(x){o.push(L(ox+x,oy-10,ox+x,oy+sy+10,'#C8922A',1.5,'4,2'));o.push(T(ox+x,oy+sy+22,x+'¬į','#C8922A',10));});}
  if(p>=3){o.push(T(ox+185,240,'cos‚ĀĽ¬Ļ(0.5)=60¬į  ‚Üí  180¬į‚ąí60¬į=120¬į and 180¬į+60¬į=240¬į','#1a5a8a',10,'middle'));}
  s.innerHTML=o.join('');}

// Q9: tan x = 1 ‚Üí 45¬į, 225¬į
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=44,oy=130,sx=1,sy=80;
  axes(ox,oy,sx,sy,o);
  o.push(tanPath(ox,oy,sx,sy,'#C8922A'));

  if(p>=2){o.push(T(ox+185,240,'tan‚ĀĽ¬Ļ(1)=45¬į  ‚Üí  45¬į and 45¬į+180¬į=225¬į','#C8922A',10,'middle'));}
  o.push(T(ox+185,14,'y = tan x','#C8922A',12,'middle'));
