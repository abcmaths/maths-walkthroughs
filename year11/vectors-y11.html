<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vectors - Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.nq{margin-top:12px;font-size:13px;font-weight:600;padding:6px 14px;border-radius:3px;border:1px solid #aaa;background:#f5f5f5;color:#444;cursor:pointer;}
.nq:hover{background:#e0e0e0;}
.wk-ans{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Vectors</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;
  return genTry(id,fn());
}
function genTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">✔ Your Turn</div>'+
    '<p>'+o.question+'</p>'+
    '<div class="ar">'+
      '<input type="number" step="any" placeholder="Your answer" id="'+id+'_i"/>'+
      '<button class="ck" onclick="ck(\''+id+'\')">✓ Check</button>'+
    '</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk">'+
      '<summary>Show working</summary>'+
      '<div class="wk-b">'+
        (h?'<ul class="hl">'+h+'</ul>':'')+
        '<div class="wk-ans">'+o.working+'</div>'+
      '</div>'+
    '</details>'+
    '<button class="nq" data-tryid="'+id+'">New question</button>'+
  '</div>';
}
function tryItStatic(o){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=function(){return o;};
  return genTry(id,o);
}

function ck(id){
  var fn=ST[id];
  var o=typeof fn==='function'?fn():fn;
  var v=parseFloat(document.getElementById(id+'_i').value);
  var f=document.getElementById(id+'_f');
  if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}
  var tol=o.tol!==undefined?o.tol:0.5;
  if(Math.abs(v-o.ans)<=tol){
    f.className='fb ok';f.textContent='✓ Correct! Answer: '+o.ans+(o.unit?' '+o.unit:'');
  }else{
    f.className='fb er';f.textContent='Not quite — check your working and try again.';
  }
}
document.addEventListener('click',function(e){
  var b=e.target.closest('.nq');
  if(!b)return;
  var id=b.getAttribute('data-tryid');
  var fn=ST[id];
  if(typeof fn!=='function')return;
  var wrap=b.closest('.try');
  if(wrap){
    var fresh=genTry(id,fn());
    var tmp=document.createElement('div');
    tmp.innerHTML=fresh;
    var nd=tmp.firstChild;
    wrap.parentNode.replaceChild(nd,wrap);
  }
});
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}
function arr(x1,y1,x2,y2,c,w){c=c||'#C0272D';w=w||2;var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy),ux=dx/len,uy=dy/len,hs=8;var ax=x2-ux*hs+uy*hs*0.4,ay=y2-uy*hs-ux*hs*0.4,bx=x2-ux*hs-uy*hs*0.4,by=y2-uy*hs+ux*hs*0.4;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"/><polygon points="'+x2+','+y2+' '+ax.toFixed(1)+','+ay.toFixed(1)+' '+bx.toFixed(1)+','+by.toFixed(1)+'" fill="'+c+'" stroke="none"/>';}
function grid(ox,oy,cols,rows,sc){var o=[];for(var i=0;i<=cols;i++)o.push(L(ox+i*sc,oy,ox+i*sc,oy-rows*sc,'#eee',1));for(var j=0;j<=rows;j++)o.push(L(ox,oy-j*sc,ox+cols*sc,oy-j*sc,'#eee',1));o.push(L(ox,oy-rows*sc,ox,oy+10,'#ccc',1.5));o.push(L(ox-10,oy,ox+cols*sc+10,oy,'#ccc',1.5));return o;}

/* Q1 - Column vector notation */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=100,oy=220,sc=36;
  o=o.concat(grid(ox,oy,8,5,sc));
  [0,1,2,3,4,5,6,7,8].forEach(function(v){o.push(T(ox+v*sc,oy+16,v,'#aaa',9));});
  [0,1,2,3,4,5].forEach(function(v){if(v>0)o.push(T(ox-12,oy-v*sc+4,v,'#aaa',9,'end'));});
  if(p>=1){o=o.concat(arr(ox,oy,ox+4*sc,oy-3*sc,'#C0272D',2.5));o.push(T(ox+2*sc-12,oy-1.5*sc-8,'a','#C0272D',13,'middle',true));}
  if(p>=2){o.push(T(ox+4*sc+8,oy-3*sc-4,'(4, 3)','#C0272D',11,'start',true));o.push(T(300,60,'Column vector:','#241A17',12,'start',false));o.push(T(300,80,'a = (4)','#C0272D',14,'start',true));o.push(T(300,98,'    (3)','#C0272D',14,'start',true));}
  if(p>=3){
    o=o.concat(arr(ox,oy-3*sc,ox+2*sc,oy-3*sc-2*sc,'#1a5a8a',2.5));
    o.push(T(ox+sc,oy-4*sc-8,'b','#1a5a8a',13,'middle',true));
    o.push(T(300,128,'b = (2)','#1a5a8a',14,'start',true));
    o.push(T(300,146,'    (2)','#1a5a8a',14,'start',true));
  }
  o.push(T(240,16,'Column Vector Notation','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q2 - Vector addition */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=60,oy=250,sc=36;
  o=o.concat(grid(ox,oy,10,6,sc));
  [0,2,4,6,8,10].forEach(function(v){o.push(T(ox+v*sc,oy+16,v,'#aaa',9));});
  [0,2,4,6].forEach(function(v){if(v>0)o.push(T(ox-12,oy-v*sc+4,v,'#aaa',9,'end'));});
  // a=(3,2), b=(2,3), a+b=(5,5)
  if(p>=1){o=o.concat(arr(ox,oy,ox+3*sc,oy-2*sc,'#C0272D',2.5));o.push(T(ox+1.5*sc,oy-sc-8,'a','#C0272D',13,'middle',true));}
  if(p>=2){o=o.concat(arr(ox+3*sc,oy-2*sc,ox+5*sc,oy-5*sc,'#1a5a8a',2.5));o.push(T(ox+4*sc,oy-3.5*sc+8,'b','#1a5a8a',13,'middle',true));}
  if(p>=3){
    o=o.concat(arr(ox,oy,ox+5*sc,oy-5*sc,'#C8922A',2,'6,4'));
    o.push(T(ox+2.5*sc+16,oy-2.5*sc,'a+b','#C8922A',12,'start',true));
    o.push(T(ox+5*sc+6,oy-5*sc-4,'(5,5)','#C8922A',10,'start',true));
  }
  o.push(T(240,16,'Vector Addition: a + b','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q3 - Scalar multiplication */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=80,oy=240,sc=32;
  o=o.concat(grid(ox,oy,11,6,sc));
  [0,2,4,6,8,10].forEach(function(v){o.push(T(ox+v*sc,oy+16,v,'#aaa',9));});
  [0,1,2,3,4,5,6].forEach(function(v){if(v>0)o.push(T(ox-12,oy-v*sc+4,v,'#aaa',9,'end'));});
  // v=(2,1), 2v=(4,2), 3v=(6,3)
  if(p>=1){o=o.concat(arr(ox,oy,ox+2*sc,oy-1*sc,'#C0272D',2.5));o.push(T(ox+sc,oy-0.5*sc-10,'v','#C0272D',13,'middle',true));}
  if(p>=2){o=o.concat(arr(ox,oy,ox+4*sc,oy-2*sc,'#1a5a8a',2.5));o.push(T(ox+2*sc,oy-sc-10,'2v','#1a5a8a',13,'middle',true));}
  if(p>=3){
    o=o.concat(arr(ox,oy,ox+6*sc,oy-3*sc,'#C8922A',2.5));
    o.push(T(ox+3*sc,oy-1.5*sc+12,'3v','#C8922A',13,'middle',true));
    o.push(T(300,80,'v = (2)   2v = (4)   3v = (6)','#241A17',11,'start',false));
    o.push(T(300,98,'    (1)        (2)        (3)','#241A17',11,'start',false));
    o.push(T(300,124,'Scalar mult. scales the vector.','#6b5750',11,'start',false));
    o.push(T(300,142,'Direction stays the same.','#6b5750',11,'start',false));
  }
  o.push(T(240,16,'Scalar Multiplication','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q4 - Magnitude of a vector */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=100,oy=240,sc=36;
  o=o.concat(grid(ox,oy,8,5,sc));
  [0,1,2,3,4,5,6,7,8].forEach(function(v){o.push(T(ox+v*sc,oy+16,v,'#aaa',9));});
  [0,1,2,3,4,5].forEach(function(v){if(v>0)o.push(T(ox-12,oy-v*sc+4,v,'#aaa',9,'end'));});
  // v=(3,4), |v|=5
  if(p>=1){o=o.concat(arr(ox,oy,ox+3*sc,oy-4*sc,'#C0272D',2.5));o.push(T(ox+1.5*sc-12,oy-2*sc,'v=(3,4)','#C0272D',11,'end',true));}
  if(p>=2){
    o.push(L(ox+3*sc,oy,ox+3*sc,oy-4*sc,'#ccc',1,'4,3'));
    o.push(L(ox,oy,ox+3*sc,oy,'#ccc',1,'4,3'));
    o.push(T(ox+1.5*sc,oy+14,'3','#888',10,'middle',false));
    o.push(T(ox+3*sc+14,oy-2*sc,'4','#888',10,'start',false));
  }
  if(p>=3){
    o.push(T(300,100,'|v| = sqrt(3\u00b2 + 4\u00b2)','#241A17',13,'start',true));
    o.push(T(300,126,'     = sqrt(9 + 16)','#241A17',13,'start',false));
    o.push(T(300,152,'     = sqrt(25)','#241A17',13,'start',false));
    o.push(T(300,178,'     = 5','#C0272D',14,'start',true));
    o.push(T(ox+3*sc+6,oy-4*sc-4,'|v| = 5','#C0272D',11,'start',true));
  }
  o.push(T(240,16,'Magnitude: |v| = sqrt(x\u00b2 + y\u00b2)','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q5 - Vector subtraction */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=80,oy=240,sc=36;
  o=o.concat(grid(ox,oy,10,6,sc));
  [0,2,4,6,8,10].forEach(function(v){o.push(T(ox+v*sc,oy+16,v,'#aaa',9));});
  [0,2,4,6].forEach(function(v){if(v>0)o.push(T(ox-12,oy-v*sc+4,v,'#aaa',9,'end'));});
  // a=(5,4), b=(2,1), a-b=(3,3)
  if(p>=1){o=o.concat(arr(ox,oy,ox+5*sc,oy-4*sc,'#C0272D',2.5));o.push(T(ox+2.5*sc,oy-2*sc-10,'a','#C0272D',13,'middle',true));}
  if(p>=2){o=o.concat(arr(ox,oy,ox+2*sc,oy-1*sc,'#1a5a8a',2.5));o.push(T(ox+sc,oy-0.5*sc-10,'b','#1a5a8a',13,'middle',true));}
  if(p>=3){
    // -b from tip of a: (5,4)+(−2,−1)=(3,3)
    o=o.concat(arr(ox+5*sc,oy-4*sc,ox+3*sc,oy-3*sc,'#888',1.5,'5,3'));
    o.push(T(ox+4.2*sc,oy-3.3*sc+8,'-b','#888',11,'start',false));
    o=o.concat(arr(ox,oy,ox+3*sc,oy-3*sc,'#C8922A',2,'6,4'));
    o.push(T(ox+1.5*sc,oy-1.5*sc+14,'a-b','#C8922A',12,'start',true));
    o.push(T(ox+3*sc+6,oy-3*sc-4,'(3,3)','#C8922A',10,'start',true));
  }
  o.push(T(240,16,'Vector Subtraction: a \u2212 b','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q6 - Position vectors */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=60,oy=260,sc=36;
  o=o.concat(grid(ox,oy,10,6,sc));
  [0,2,4,6,8,10].forEach(function(v){o.push(T(ox+v*sc,oy+16,v,'#aaa',9));});
  [0,2,4,6].forEach(function(v){if(v>0)o.push(T(ox-12,oy-v*sc+4,v,'#aaa',9,'end'));});
  // O origin, A=(2,3), B=(6,4)
  var ax=ox+2*sc,ay=oy-3*sc,bx=ox+6*sc,by=oy-4*sc;
  o.push(T(ox-10,oy+4,'O','#888',11,'end',true));
  if(p>=1){
    o=o.concat(arr(ox,oy,ax,ay,'#C0272D',2.5));
    o.push('<circle cx="'+ax+'" cy="'+ay+'" r="5" fill="#C0272D" stroke="#fff" stroke-width="2"/>');
    o.push(T(ax-8,ay-10,'A(2,3)','#C0272D',11,'end',true));
    o.push(T(ox+sc-10,oy-1.5*sc,'OA','#C0272D',11,'end',true));
  }
  if(p>=2){
    o=o.concat(arr(ox,oy,bx,by,'#1a5a8a',2.5));
    o.push('<circle cx="'+bx+'" cy="'+by+'" r="5" fill="#1a5a8a" stroke="#fff" stroke-width="2"/>');
    o.push(T(bx+6,by-10,'B(6,4)','#1a5a8a',11,'start',true));
    o.push(T(ox+3*sc,oy-2*sc+14,'OB','#1a5a8a',11,'start',true));
  }
  if(p>=3){
    o=o.concat(arr(ax,ay,bx,by,'#C8922A',2.5));
    o.push(T((ax+bx)/2+6,(ay+by)/2-10,'AB = OB - OA','#C8922A',11,'start',true));
    o.push(T((ax+bx)/2+6,(ay+by)/2+6,'= (4,1)','#C8922A',11,'start',true));
  }
  o.push(T(240,16,'Position Vectors','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q7 - Parallel vectors */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=80,oy=250,sc=32;
  o=o.concat(grid(ox,oy,11,7,sc));
  [0,2,4,6,8,10].forEach(function(v){o.push(T(ox+v*sc,oy+16,v,'#aaa',9));});
  [0,2,4,6].forEach(function(v){if(v>0)o.push(T(ox-12,oy-v*sc+4,v,'#aaa',9,'end'));});
  // a=(2,1), b=(4,2)=2a, c=(6,3)=3a all parallel
