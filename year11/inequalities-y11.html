.be{background:#fce8d8;color:#7A1418;}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}

var ST={};
function tryIt(genFn){
  var id='t'+Math.random().toString(36).slice(2);
  var o=genFn();
  ST[id]={o:o,genFn:genFn};
  return buildTry(id,o);
}
function buildTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'">'
    +'<div class="try-t">✔ Your Turn</div>'
    +'<div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div>'
    +'</div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id];if(!entry)return;
    var o=entry.genFn();entry.o=o;
    var wrap=el.closest('.try');if(!wrap)return;
    var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);
    wrap.parentNode.replaceChild(tmp.firstChild,wrap);
    ST[id]={o:o,genFn:entry.genFn};return;
  }
  if(el.classList.contains('try-ck')){
    var id=el.getAttribute('data-tryid');
    var entry=ST[id];if(!entry)return;
    var o=entry.o;
    var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');
    var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');
    if(!inp||!fb)return;
    var v=parseFloat(inp.value);
    if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}
    var tol=o.tol!=null?o.tol:0.5;
    if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct!  '+o.working;}
    else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}
  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||13;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'"'+(b?' font-weight="700"':'')+'>'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#ccc';w=w||1;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+(stroke||'none')+'" stroke-width="'+(sw||0)+'"/>';}

// Number line helper
function numLine(p, val, op, lo, hi){
  // op: '<', '>', '<=', '>='
  var s=g(); s.setAttribute('viewBox','0 0 480 300'); var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  // axis
  var y=150, x0=60, x1=420;
  o.push(L(x0,y,x1,y,'#241A17',2));
  o.push('<polygon points="'+x1+','+(y-5)+' '+x1+','+(y+5)+' '+(x1+10)+','+y+'" fill="#241A17"/>');
  var range=hi-lo; var sc=(x1-x0)/range;
  for(var v=lo;v<=hi;v++){
    var px=x0+(v-lo)*sc;
    o.push(L(px,y-6,px,y+6,'#241A17',1.5));
    o.push(T(px,y+20,v,'#241A17',13));
  }
  if(p>=1){
    var px=x0+(val-lo)*sc;
    var closed=(op==='<='||op==='>=');
    o.push(R(0,50,480,60,'#fff5f0','#C0272D',1.5));
    o.push(T(240,88,'Solve the inequality — treat like an equation first.','#241A17',14,'middle'));
  }
  if(p>=2){
    o.push(R(0,120,480,40,'#fff5f0','#C0272D',1.5));
    o.push(T(240,145,'x '+op+' '+val,'#C0272D',18,'middle',true));
  }
  if(p>=3){
    var px=x0+(val-lo)*sc;
    var closed=(op==='<='||op==='>=');
    // shade region
    if(op==='<'||op==='<='){
      o.push(R(x0,y-8,(px-x0),16,'rgba(192,39,45,0.15)'));
      o.push(L(x0,y,px,y,'#C0272D',4));
    } else {
      o.push(R(px,y-8,(x1-px),16,'rgba(192,39,45,0.15)'));
      o.push(L(px,y,x1,y,'#C0272D',4));
    }
    // circle at val
    if(closed){
      o.push('<circle cx="'+px+'" cy="'+y+'" r="7" fill="#C0272D" stroke="#fff" stroke-width="2"/>');
    } else {
      o.push('<circle cx="'+px+'" cy="'+y+'" r="7" fill="#fff" stroke="#C0272D" stroke-width="2.5"/>');
    }
    o.push(T(px,y-20,val,'#C0272D',14,'middle',true));
    var circleNote=closed?'Filled circle (≤ or ≥, value IS included)':'Open circle (< or >, value NOT included)';
    o.push(T(240,260,circleNote,'#888',13,'middle'));
  }
  s.innerHTML=o.join('');
}

// Grid for graphical inequalities
function grid(p, lines, region){
  var s=g(); s.setAttribute('viewBox','0 0 480 320'); var o=[];
  o.push(R(0,0,480,320,'#fdf7f4'));
  var ox=200,oy=160,sc=36; // origin pixel, scale pixels per unit
  // grid lines
  for(var i=-5;i<=6;i++){
    o.push(L(ox+i*sc,20,ox+i*sc,300,'#e0d0c8',1));
    o.push(L(40,oy-i*sc,460,oy-i*sc,'#e0d0c8',1));
  }
  // axes
  o.push(L(40,oy,460,oy,'#241A17',2));
  o.push(L(ox,300,ox,20,'#241A17',2));
  // labels
  for(var i=-5;i<=6;i++){
    if(i!==0){
      o.push(T(ox+i*sc,oy+18,i,'#888',11));
      o.push(T(ox-14,oy-i*sc+4,i,'#888',11));
    }
  }
  o.push(T(455,oy+16,'x','#241A17',14));
  o.push(T(ox+8,26,'y','#241A17',14));

  if(p>=1 && lines){
    lines.forEach(function(ln){
      // ln: {m, c, solid, label}
      var y0=oy-(ln.m*(-5.5)+ln.c)*sc; // x=-5.5
      var y1=oy-(ln.m*(6.5)+ln.c)*sc;  // x=6.5
      var dash=ln.solid?'':'5,4';
      o.push(L(ox-5.5*sc,y0,ox+6.5*sc,y1,'#C0272D',2.5,dash));
      o.push(T(ox+6*sc,oy-ln.m*6*sc-ln.c*sc-10,ln.label,'#C0272D',12,'start'));
    });
  }
  if(p>=2 && region){
    // shade the valid region (simple clip rectangle)
    // region: {x0,y0,w,h} in units, or draw polygon
    if(region.poly){
      var pts=region.poly.map(function(pt){return (ox+pt[0]*sc)+','+(oy-pt[1]*sc);}).join(' ');
      o.push('<polygon points="'+pts+'" fill="rgba(192,39,45,0.18)" stroke="none"/>');
    }
  }
  if(p>=3 && region && region.testPt){
    var tp=region.testPt;
    var px=ox+tp[0]*sc, py=oy-tp[1]*sc;
    o.push('<circle cx="'+px+'" cy="'+py+'" r="7" fill="#1a7a3a" stroke="#fff" stroke-width="2"/>');
    o.push(T(px+14,py,'('+tp[0]+','+tp[1]+') ✓','#1a7a3a',12,'start',true));
  }
  s.innerHTML=o.join('');
}

// Q1 — Reading inequalities on a number line
function dQ1(p){
  var s=g(); s.setAttribute('viewBox','0 0 480 300'); var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  var y=150, x0=60, x1=420, lo=-3, hi=6, range=9, sc=(x1-x0)/range;
  o.push(L(x0,y,x1,y,'#241A17',2));
  o.push('<polygon points="'+x1+','+(y-5)+' '+x1+','+(y+5)+' '+(x1+10)+','+y+'" fill="#241A17"/>');
  for(var v=lo;v<=hi;v++){var px=x0+(v-lo)*sc;o.push(L(px,y-6,px,y+6,'#241A17',1.5));o.push(T(px,y+20,v,'#241A17',13));}
  if(p>=1){
    // Show: -3 ≤ x < 1 (closed at -3, open at 1)
    var p1=x0+(0-lo)*sc, p2=x0+(4-lo)*sc; // -3 to 1 represented as 0 to 4
    o.push(R(0,50,480,56,'#e8f4ff','#1a5a8a',1.5));
    o.push(T(240,85,'Read the number line below. What inequality is shown?','#241A17',14,'middle'));
  }
  if(p>=2){
    var pa=x0+(0-lo)*sc, pb=x0+(4-lo)*sc;
    o.push(R(pa,y-8,pb-pa,16,'rgba(192,39,45,0.15)'));
    o.push(L(pa,y,pb,y,'#C0272D',4));
    o.push('<circle cx="'+pa+'" cy="'+y+'" r="7" fill="#C0272D" stroke="#fff" stroke-width="2"/>');
    o.push('<circle cx="'+pb+'" cy="'+y+'" r="7" fill="#fff" stroke="#C0272D" stroke-width="2.5"/>');
    o.push(T(pa,y-22,'-3','#C0272D',13,'middle',true));
    o.push(T(pb,y-22,'1','#C0272D',13,'middle',true));
  }
  if(p>=3){
    o.push(R(0,200,480,56,'#e8f8ee','#1a7a3a',1.5));
    o.push(T(240,220,'Filled circle at −3: the value IS included → ≤','#241A17',13,'middle'));
    o.push(T(240,242,'Open circle at 1: the value is NOT included → <','#241A17',13,'middle'));
    o.push(T(240,264,'Answer:  −3 ≤ x < 1','#1a7a3a',16,'middle',true));
  }
  s.innerHTML=o.join('');
}

// Q2 — Solving a linear inequality
function dQ2(p){
  var s=g(); s.setAttribute('viewBox','0 0 480 300'); var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  if(p>=1){o.push(R(20,20,440,50,'#fff5f0','#C0272D',1.5));o.push(T(240,51,'Solve:  3x + 5 < 14','#C0272D',18,'middle',true));}
  if(p>=2){o.push(T(240,105,'Step 1 — subtract 5 from both sides','#241A17',14,'middle'));o.push(T(240,128,'3x < 9','#241A17',16,'middle',true));}
  if(p>=3){o.push(T(240,165,'Step 2 — divide both sides by 3','#241A17',14,'middle'));o.push(T(240,188,'x < 3','#C0272D',20,'middle',true));}
  if(p>=4){
    var y=240,x0=60,x1=420,lo=-2,hi=6,sc=(x1-x0)/8;
    o.push(L(x0,y,x1,y,'#241A17',2));
    o.push('<polygon points="'+x1+','+(y-5)+' '+x1+','+(y+5)+' '+(x1+10)+','+y+'" fill="#241A17"/>');
    for(var v=lo;v<=hi;v++){var px=x0+(v-lo)*sc;o.push(L(px,y-5,px,y+5,'#241A17',1));o.push(T(px,y+18,v,'#241A17',12));}
    var p3=x0+(3-lo)*sc;
    o.push(R(x0,y-7,p3-x0,14,'rgba(192,39,45,0.18)'));
    o.push(L(x0,y,p3,y,'#C0272D',3));
    o.push('<circle cx="'+p3+'" cy="'+y+'" r="6" fill="#fff" stroke="#C0272D" stroke-width="2.5"/>');
    o.push(T(p3,y-18,'3','#C0272D',13,'middle',true));
  }
  s.innerHTML=o.join('');
}

// Q3 — Inequality with negative division (flip sign)
function dQ3(p){
  var s=g(); s.setAttribute('viewBox','0 0 480 300'); var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  if(p>=1){o.push(R(20,20,440,50,'#fff5f0','#C0272D',1.5));o.push(T(240,51,'Solve:  8 − 2x ≥ 2','#C0272D',18,'middle',true));}
  if(p>=2){o.push(T(240,105,'Step 1 — subtract 8: −2x ≥ −6','#241A17',14,'middle'));}
  if(p>=3){
    o.push(R(20,120,440,56,'#fff8e8','#C8922A',1.5));
    o.push(T(240,143,'⚠  Dividing by a NEGATIVE flips the inequality sign','#7A1418',14,'middle',true));
    o.push(T(240,165,'Step 2 — divide by −2:  x ≤ 3','#241A17',14,'middle'));
  }
  if(p>=4){
    o.push(T(240,205,'x ≤ 3','#C0272D',22,'middle',true));
    var y=255,x0=60,x1=420,lo=-2,hi=6,sc=(x1-x0)/8;
    o.push(L(x0,y,x1,y,'#241A17',2));
    o.push('<polygon points="'+x1+','+(y-5)+' '+x1+','+(y+5)+' '+(x1+10)+','+y+'" fill="#241A17"/>');
    for(var v=lo;v<=hi;v++){var px=x0+(v-lo)*sc;o.push(L(px,y-5,px,y+5,'#241A17',1));o.push(T(px,y+16,v,'#241A17',11));}
    var p3=x0+(3-lo)*sc;
    o.push(R(x0,y-6,p3-x0,12,'rgba(192,39,45,0.18)'));
    o.push(L(x0,y,p3,y,'#C0272D',3));
    o.push('<circle cx="'+p3+'" cy="'+y+'" r="5" fill="#C0272D" stroke="#fff" stroke-width="2"/>');
  }
  s.innerHTML=o.join('');
}

// Q4 — Double inequality
function dQ4(p){
  var s=g(); s.setAttribute('viewBox','0 0 480 300'); var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  if(p>=1){o.push(R(20,20,440,50,'#fff5f0','#C0272D',1.5));o.push(T(240,51,'Solve:  −3 ≤ 2x + 1 < 9','#C0272D',18,'middle',true));}
  if(p>=2){o.push(T(240,110,'Subtract 1 from all three parts:','#241A17',14,'middle'));o.push(T(240,135,'−4 ≤ 2x < 8','#241A17',16,'middle',true));}
  if(p>=3){o.push(T(240,175,'Divide all parts by 2:','#241A17',14,'middle'));o.push(T(240,200,'−2 ≤ x < 4','#C0272D',20,'middle',true));}
  if(p>=4){
    var y=255,x0=60,x1=420,lo=-4,hi=6,sc=(x1-x0)/10;

    {lb:'Draw y = 3',dr:dQ7,ht:'<p>Draw a solid horizontal line at y = 3 across the full grid.</p>'},
    {lb:'Shade the required region',dr:dQ7,ht:'<p>y ≤ 3 means values <b>below and on</b> the line y = 3. Shade downward.<br>Check: (0, 0) → 0 ≤ 3 ✓</p>'},
    {lb:'Your turn',dr:dQ7,ht:tryIt(function(){var val=rnd(1,4);var tx=rnd(-3,3),ty=rnd(-4,4);var inR=(ty<=val);return{question:'Is the point ('+tx+', '+ty+') in the region y ≤ '+val+'? Enter 1 for yes, 0 for no.',hints:['Check: is '+ty+' ≤ '+val+'?'],ans:inR?1:0,tol:0,unit:'',working:ty+(inR?' ≤ ':' > ')+val+' → '+(inR?'YES (1)':'NO (0)')};})}

  {ey:'Q8 · Inequalities · Extended',ti:'Region Satisfying Two Inequalities',su:'Shade the region where  x ≥ 1  and  y < x + 1.',lv:'E',steps:[

  ]},
  {ey:'Q9 · Inequalities · Extended',ti:'Writing Inequalities from a Diagram',su:'A shaded region R is bounded by y = 0, x = 4 and y = x. Write the three inequalities.',lv:'E',steps:[
    {lb:'Read the boundaries',dr:dQ9,ht:'<span class="lt le">Extended</span><p>Each boundary line gives one inequality. Decide: is the shaded region above or below each line? Are the lines solid or dashed?</p>'},
    {lb:'y = 0 (x-axis)',dr:dQ9,ht:'<p>The shaded region is <b>above</b> the x-axis. Solid line → ≥.<br><div class="fm">y ≥ 0</div></p>'},
    {lb:'x = 4',dr:dQ9,ht:'<p>The shaded region is to the <b>left</b> of x = 4. Solid line → ≤.<br><div class="fm">x ≤ 4</div></p>'},
    {lb:'y = x',dr:dQ9,ht:'<p>The shaded region is <b>below</b> the line y = x. Solid line → ≤.<br><div class="fm">y ≤ x</div></p><p>Check with (2, 1): y=1 ≥ 0 ✓,  x=2 ≤ 4 ✓,  y=1 ≤ x=2 ✓</p>'},
    {lb:'Your turn',dr:dQ9,ht:tryIt(function(){var k=rnd(2,5);return{question:'A region is bounded by x=0, y=0 and x+y='+k+' (all solid). A point inside is (1,1). How many integer-coordinate points (including boundary) are in the region?',hints:['Points where x≥0, y≥0, x+y≤'+k,'Count lattice points: for x=0: y can be 0..'+k+'; x=1: 0..'+(k-1)+'; etc.'],ans:(k+1)*(k+2)/2,tol:0,unit:'points',working:'Sum from x=0 to '+k+' of ('+(k)+'-x+1) = '+(k+1)*(k+2)/2+' points'};})}

    {lb:'Draw y = −x + 5',dr:dQ10,ht:'<p>Gradient −1, y-intercept 5. Passes through (0,5) and (5,0). Draw solid (≤).</p>'},

    {lb:'Test point',dr:dQ10,ht:'<div class="fm">Test (1, 1): 1≥0 ✓  1≥0 ✓  1 ≤ −1+5=4 ✓</div><p>Point (1,1) is inside the region.</p>'},
    {lb:'Your turn',dr:dQ10,ht:tryIt(function(){var tx=rnd(1,3),ty=rnd(1,3),c=rnd(5,7);var inR=(tx>=0&&ty>=0&&ty<=-tx+c);return{question:'Is ('+tx+','+ty+') in the region x≥0, y≥0, y≤−x+'+c+'? Enter 1 for yes, 0 for no.',hints:['Check y≤−'+tx+'+'+c+' = '+(c-tx)],ans:inR?1:0,tol:0,unit:'',working:ty+(inR?' ≤ ':' > ')+(c-tx)+' → '+(inR?'YES (1)':'NO (0)')};})}
  ]}
];

var qi=0,si=0;
function bSB(){
  var sb=document.getElementById('sb');var lbl=sb.querySelector('.sb-lbl');sb.innerHTML='';sb.appendChild(lbl);
  QS.forEach(function(q,i){var b=document.createElement('button');b.className='qb'+(i===qi?' on':'');b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti+'<br><span class="badge '+(q.lv==='F'?'bf':'be')+'">'+(q.lv==='F'?'Foundation':'Extended')+'</span>';b.onclick=function(){qi=i;si=0;render();};sb.appendChild(b);});
}
function bDT(){var w=document.getElementById('dt');w.innerHTML='';QS[qi].steps.forEach(function(_,i){var d=document.createElement('div');d.className='dot'+(i===si?' on':i<si?' dn':'');w.appendChild(d);});}
function render(){
  bSB();var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;document.getElementById('ti').textContent=q.ti;document.getElementById('su').textContent=q.su;
  var p=document.getElementById('pn');p.classList.remove('fi');void p.offsetWidth;p.classList.add('fi');
  p.innerHTML='<div class="sl">'+st.lb+'</div>'+st.ht;
  st.dr(si);bDT();
  document.getElementById('pb').disabled=si===0;
  document.getElementById('nb').textContent=si===q.steps.length-1?'Restart':'Next →';
}
document.getElementById('pb').addEventListener('click',function(){if(si>0){si--;render();}});
document.getElementById('nb').addEventListener('click',function(){var q=QS[qi];si=si===q.steps.length-1?0:si+1;render();});
render();
</script>
