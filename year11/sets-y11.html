<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1.5)+'"/>';}

// Standard 2-set Venn helper
function venn2(cx1,cy,cx2,r,aOnly,both,bOnly,neither,total,labelA,labelB,p,hilite){
  var o=[];
  o.push(R(20,20,440,220,'#fdf7f4','#aaa',1)); // universal box
  o.push(T(40,38,'ξ = '+total,'#888',10,'start'));
  o.push('<ellipse cx="'+cx1+'" cy="'+cy+'" rx="'+r+'" ry="'+(r*0.72)+'" fill="rgba(192,39,45,0.12)" stroke="#C0272D" stroke-width="2"/>');
  o.push('<ellipse cx="'+cx2+'" cy="'+cy+'" rx="'+r+'" ry="'+(r*0.72)+'" fill="rgba(26,90,138,0.12)" stroke="#1a5a8a" stroke-width="2"/>');
  o.push(T(cx1-r*0.55,cy-r*0.58,labelA,'#C0272D',13));
  o.push(T(cx2+r*0.55,cy-r*0.58,labelB,'#1a5a8a',13));
  if(p>=1){
    var hiA=hilite==='aOnly',hiB=hilite==='both',hiC=hilite==='bOnly',hiN=hilite==='neither';
    o.push(T(cx1-r*0.45,cy,''+aOnly,hiA?'#C0272D':'#241A17',hiA?16:14));
    o.push(T((cx1+cx2)/2,cy,''+both,hiB?'#C0272D':'#241A17',hiB?16:14));
    o.push(T(cx2+r*0.45,cy,''+bOnly,hiC?'#1a5a8a':'#241A17',hiC?16:14));
    o.push(T(cx2+r+32,cy+r*0.5,''+neither,'#888',hiN?16:13));
  }
  return o;
}

// Q1: Set notation reference
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,18,'IGCSE Set Notation','#C0272D',14));
  var rows=[
    ['∈','is an element of','3 ∈ {1,2,3}'],
    ['∉','is not an element of','5 ∉ {1,2,3}'],
    ['ξ','universal set (everything)','ξ = {1,2,3,4,5}'],
    ["A'","complement of A (not in A)",'if A={1,3}, A\'={2,4,5}'],
    ['∅','empty set','{} — no elements'],
    ['A ∪ B','union (in A or B or both)','A∪B = {1,2,3,4}'],
    ['A ∩ B','intersection (in both A and B)','A∩B = {2,3}'],
    ['A ⊆ B','A is a subset of B','every element of A is in B']
  ];
  rows.forEach(function(r,i){
    if(i<p){
      o.push(R(14,28+i*28,452,26,i%2===0?'#fdf7f4':'#fff','#E4D6CE',1));
      o.push(T(50,46+i*28,r[0],'#C0272D',13,'middle'));
      o.push(T(195,46+i*28,r[1],'#241A17',11,'middle'));
      o.push(T(370,46+i*28,r[2],'#888',10,'middle'));
    }
  });
  s.innerHTML=o.join('');}

// Q2: Basic 2-set Venn, find n(A∪B)
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o=o.concat(venn2(175,145,305,110,12,8,15,5,40,'A','B',p,''));
  if(p>=2){o.push(R(30,248,420,26,'#fff5f0','#C0272D',1));o.push(T(240,264,'n(A∪B) = 12 + 8 + 15 = 35   (everything inside the circles)','#C0272D',12));}
  s.innerHTML=o.join('');}

// Q3: Find missing region
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  // n(A)=20, n(B)=18, n(A∩B)=7, total=50 → aOnly=13, both=7, bOnly=11, neither=19
  o=o.concat(venn2(175,145,305,110,p>=2?13:'?',p>=1?7:'?',p>=2?11:'?',p>=3?19:'?',50,'A','B',p>=1?1:0,''));
  if(p>=1){o.push(R(30,248,420,26,'#fff5f0','#C0272D',1));o.push(T(240,264,'n(A∩B) = 7  given. Fill the intersection first.','#C0272D',11));}
  if(p>=2){o.push(R(30,248,420,26,'#e8f4ff','#1a5a8a',1));o.push(T(240,264,'A only = n(A)−n(A∩B) = 20−7 = 13.  B only = 18−7 = 11.','#1a5a8a',11));}
  if(p>=3){o.push(R(30,248,420,26,'#e8f8ee','#1a7a3a',1));o.push(T(240,264,'Neither = 50 − 13 − 7 − 11 = 19.','#1a7a3a',11));}
  s.innerHTML=o.join('');}

// Q4: Shade A∩B
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(20,20,440,220,'#fdf7f4','#aaa',1));o.push(T(40,38,'ξ','#888',10,'start'));
  o.push('<ellipse cx="175" cy="145" rx="110" ry="80" fill="rgba(192,39,45,0.12)" stroke="#C0272D" stroke-width="2"/>');
  o.push('<ellipse cx="305" cy="145" rx="110" ry="80" fill="rgba(26,90,138,0.12)" stroke="#1a5a8a" stroke-width="2"/>');
  o.push(T(140,90,'A','#C0272D',13));o.push(T(340,90,'B','#1a5a8a',13));
  if(p>=1){
    // Shade intersection (clip manually with SVG)
    o.push('<clipPath id="ca"><ellipse cx="175" cy="145" rx="110" ry="80"/></clipPath>');
    o.push('<ellipse cx="305" cy="145" rx="110" ry="80" fill="rgba(192,39,45,0.5)" clip-path="url(#ca)"/>');
    o.push(T(240,150,'A ∩ B','#C0272D',14));
  }
  if(p>=2){o.push(R(30,248,420,26,'#fff5f0','#C0272D',1));o.push(T(240,264,'A ∩ B = elements in BOTH circles','#C0272D',12));}
  s.innerHTML=o.join('');}

// Q5: Shade A∪B
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(20,20,440,220,'#fdf7f4','#aaa',1));o.push(T(40,38,'ξ','#888',10,'start'));
  if(p>=1){
    o.push('<ellipse cx="175" cy="145" rx="110" ry="80" fill="rgba(192,39,45,0.4)" stroke="#C0272D" stroke-width="2"/>');
    o.push('<ellipse cx="305" cy="145" rx="110" ry="80" fill="rgba(192,39,45,0.4)" stroke="#C0272D" stroke-width="2"/>');
    o.push(T(240,150,'A ∪ B','#C0272D',14));
  } else {
    o.push('<ellipse cx="175" cy="145" rx="110" ry="80" fill="rgba(192,39,45,0.12)" stroke="#C0272D" stroke-width="2"/>');
    o.push('<ellipse cx="305" cy="145" rx="110" ry="80" fill="rgba(26,90,138,0.12)" stroke="#1a5a8a" stroke-width="2"/>');
  }
  o.push(T(140,90,'A','#fff',13));o.push(T(340,90,'B','#fff',13));
  if(p>=2){o.push(R(30,248,420,26,'#e8f4ff','#1a5a8a',1));o.push(T(240,264,'A ∪ B = everything inside EITHER circle','#1a5a8a',12));}
  s.innerHTML=o.join('');}

// Q6: Shade A' (complement)
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  if(p>=1){
    o.push(R(20,20,440,220,'rgba(192,39,45,0.25)','#aaa',1)); // shade whole box
    o.push('<ellipse cx="175" cy="145" rx="110" ry="80" fill="#fdf7f4" stroke="#C0272D" stroke-width="2"/>'); // white out A
    o.push('<ellipse cx="305" cy="145" rx="110" ry="80" fill="rgba(192,39,45,0.25)" stroke="#1a5a8a" stroke-width="2"/>');
    o.push(T(130,60,"A'  (shaded)",'#C0272D',12));
  } else {
    o.push(R(20,20,440,220,'#fdf7f4','#aaa',1));
    o.push('<ellipse cx="175" cy="145" rx="110" ry="80" fill="rgba(192,39,45,0.12)" stroke="#C0272D" stroke-width="2"/>');
    o.push('<ellipse cx="305" cy="145" rx="110" ry="80" fill="rgba(26,90,138,0.12)" stroke="#1a5a8a" stroke-width="2"/>');
  }
  o.push(T(40,38,'ξ','#888',10,'start'));o.push(T(140,90,'A','#C0272D',13));o.push(T(340,90,'B','#1a5a8a',13));
  if(p>=2){o.push(R(30,248,420,26,'#fff5f0','#C0272D',1));o.push(T(240,264,"A' = everything NOT in A (including B only and neither)",'#C0272D',11));}
  s.innerHTML=o.join('');}

// Q7: Word problem 2-set
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  // 30 students, 18 play football, 14 play cricket, x play both, 4 play neither
  // 18-x + x + 14-x + 4 = 30 → 36-x = 30 → x=6
  o=o.concat(venn2(175,140,305,105,p>=2?12:'?',p>=2?6:'?',p>=2?8:'?',4,30,'F','C',p>=1?1:0,''));
  o.push(T(240,18,'30 students: 18 play Football, 14 play Cricket, 4 play neither','#C0272D',11));
  if(p>=1){o.push(R(30,248,420,26,'#fff5f0','#C0272D',1));o.push(T(240,264,'Let x = both.  (18−x) + x + (14−x) + 4 = 30','#C0272D',11));}
  if(p>=2){o.push(R(30,248,420,26,'#e8f8ee','#1a7a3a',1));o.push(T(240,264,'36 − x = 30  →  x = 6.  So: F only=12, both=6, C only=8.','#1a7a3a',11));}
  s.innerHTML=o.join('');}

// Q8: 3-set Venn (Extended) — place numbers
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,14,452,248,'#fdf7f4','#aaa',1));o.push(T(30,30,'ξ = 50','#888',10,'start'));
  o.push('<ellipse cx="195" cy="130" rx="105" ry="80" fill="rgba(192,39,45,0.1)" stroke="#C0272D" stroke-width="1.8"/>');
  o.push('<ellipse cx="285" cy="130" rx="105" ry="80" fill="rgba(26,90,138,0.1)" stroke="#1a5a8a" stroke-width="1.8"/>');
  o.push('<ellipse cx="240" cy="185" rx="105" ry="72" fill="rgba(200,146,42,0.1)" stroke="#C8922A" stroke-width="1.8"/>');
  o.push(T(148,68,'A','#C0272D',13));o.push(T(332,68,'B','#1a5a8a',13));o.push(T(240,256,'C','#C8922A',13));
  // Regions: A only=8, B only=6, C only=7, AB only=4, AC only=3, BC only=5, ABC=2, neither=15
  if(p>=1){o.push(T(185,108,'8','#C0272D',13));o.push(T(295,108,'6','#1a5a8a',13));o.push(T(240,228,'7','#C8922A',13));}
  if(p>=2){o.push(T(240,105,'4','#555',13));o.push(T(196,172,'3','#555',13));o.push(T(284,172,'5','#555',13));}
  if(p>=3){o.push(T(240,155,'2','#C0272D',14));} // centre
  if(p>=4){o.push(T(430,28,'15','#888',13));}
  s.innerHTML=o.join('');}

// Q9: 3-set — find a missing value
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(R(14,14,452,248,'#fdf7f4','#aaa',1));o.push(T(30,30,'ξ = 40','#888',10,'start'));
  o.push('<ellipse cx="195" cy="130" rx="105" ry="80" fill="rgba(192,39,45,0.1)" stroke="#C0272D" stroke-width="1.8"/>');
  o.push('<ellipse cx="285" cy="130" rx="105" ry="80" fill="rgba(26,90,138,0.1)" stroke="#1a5a8a" stroke-width="1.8"/>');
