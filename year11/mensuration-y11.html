<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mensuration Y11 - Maths Walkthroughs</title>
<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}
.back{font-size:13px;font-weight:600;color:#fff;background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.35);padding:5px 12px;border-radius:3px;text-decoration:none;}
.ht{font-size:15px;font-weight:700;}
.layout{display:flex;max-width:1100px;margin:0 auto;padding:28px 20px 60px;gap:28px;}
.sb{width:215px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-lbl{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:#888;font-weight:700;margin-bottom:4px;}
.qb{text-align:left;background:#fff;border:1px solid var(--line);border-radius:4px;padding:9px 12px;cursor:pointer;font-size:12px;transition:.15s;color:var(--ink);}
.qb:hover{border-color:var(--red);color:var(--red);}
.qb.on{background:var(--red);color:#fff;border-color:var(--red);}
.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--red);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--red);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#6b5750;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}
.cvs svg{width:100%;max-width:520px;height:auto;}
.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}
.sl{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:6px;}
.pnl p{font-size:16px;line-height:1.55;margin:0 0 8px;}
.fm{font-family:'Cambria Math',Georgia,serif;font-size:17px;background:var(--cream);border-left:4px solid var(--red);padding:9px 13px;margin:8px 0;display:block;}
.ctrl{width:100%;max-width:760px;display:flex;justify-content:space-between;align-items:center;margin-top:16px;}
.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--red);background:#fff;color:var(--red);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--red);color:#fff;}
.btn:disabled{opacity:.3;cursor:default;}
.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}
.dots{display:flex;gap:6px;}
.dot{width:8px;height:8px;border-radius:50%;background:var(--line);}
.dot.on{background:var(--red);}.dot.dn{background:var(--gold);}
.fi{animation:fi .4s ease;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.try{background:#fff;border:2px solid var(--gold);border-radius:6px;padding:18px 20px;margin-top:4px;}
.try-t{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px;}
.hl{font-size:14px;color:#3a2a24;margin:8px 0 12px;padding-left:4px;list-style:none;}
.hl li{margin-bottom:5px;padding-left:18px;position:relative;}
.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}
.ar input:focus{border-color:var(--gold);}
.ck{font-size:14px;font-weight:600;padding:8px 16px;background:var(--gold);color:#fff;border:none;border-radius:3px;cursor:pointer;white-space:nowrap;}
.ck:hover{background:#a07018;}
.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}
.fb.ok{background:#e8f8ee;color:#1a7a3a;border:1px solid #a8dbb8;display:block;}
.fb.er{background:#fde8e8;color:#a01820;border:1px solid #f0b8b8;display:block;}
.nq{margin-top:12px;font-size:13px;font-weight:600;padding:6px 14px;border-radius:3px;border:1px solid #aaa;background:#f5f5f5;color:#444;cursor:pointer;}
.nq:hover{background:#e0e0e0;}
.wk-ans{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
.wk summary{cursor:pointer;color:var(--red);font-weight:600;font-size:14px;}
.wk-b{margin-top:8px;font-size:14px;line-height:1.6;color:#3a2a24;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}
</style>
</head>
<body>
<header>
  <a href="../index.html" class="back">&larr; All Topics</a>
  <div class="ht">Mensuration</div>
  <div style="width:80px"></div>
</header>
<div class="layout">
  <div class="sb" id="sb"><div class="sb-lbl">Questions</div></div>
  <div class="main">
    <div class="hdr">
      <div class="eyebrow" id="ey"></div>
      <h1 id="ti"></h1>
      <div class="sub" id="su"></div>
    </div>
    <div class="stage">
      <div class="cvs"><svg id="dg" viewBox="0 0 480 300"></svg></div>
      <div class="pnl fi" id="pn"></div>
    </div>
    <div class="ctrl">
      <button class="btn" id="pb">&larr; Back</button>
      <div class="dots" id="dt"></div>
      <button class="btn p" id="nb">Next &rarr;</button>
    </div>
  </div>
</div>
<script>
var ST={};
function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(a){return a[Math.floor(Math.random()*a.length)];}
function tryIt(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;
  return genTry(id,fn());
}
function genTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">✔ Your Turn</div>'+
    '<p>'+o.question+'</p>'+
    '<div class="ar">'+
      '<input type="number" step="any" placeholder="Your answer" id="'+id+'_i"/>'+
      '<button class="ck" onclick="ck(\''+id+'\')">✓ Check</button>'+
    '</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk">'+
      '<summary>Show working</summary>'+
      '<div class="wk-b">'+
        (h?'<ul class="hl">'+h+'</ul>':'')+
        '<div class="wk-ans">'+o.working+'</div>'+
      '</div>'+
    '</details>'+
    '<button class="nq" data-tryid="'+id+'">New question</button>'+
  '</div>';
}
function tryItStatic(o){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=function(){return o;};
  return genTry(id,o);
}

function ck(id){
  var fn=ST[id];
  var o=typeof fn==='function'?fn():fn;
  var v=parseFloat(document.getElementById(id+'_i').value);
  var f=document.getElementById(id+'_f');
  if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}
  var tol=o.tol!==undefined?o.tol:0.5;
  if(Math.abs(v-o.ans)<=tol){
    f.className='fb ok';f.textContent='✓ Correct! Answer: '+o.ans+(o.unit?' '+o.unit:'');
  }else{
    f.className='fb er';f.textContent='Not quite — check your working and try again.';
  }
}
document.addEventListener('click',function(e){
  var b=e.target.closest('.nq');
  if(!b)return;
  var id=b.getAttribute('data-tryid');
  var fn=ST[id];
  if(typeof fn!=='function')return;
  var wrap=b.closest('.try');
  if(wrap){
    var fresh=genTry(id,fn());
    var tmp=document.createElement('div');
    tmp.innerHTML=fresh;
    var nd=tmp.firstChild;
    wrap.parentNode.replaceChild(nd,wrap);
  }
});
function R(x,y,w,h,fill,stroke,sw){fill=fill||'#fff5f0';stroke=stroke||'#C0272D';sw=sw||2;return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+stroke+'" stroke-width="'+sw+'" rx="4"/>';}

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#6b5750';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'" '+(d?'stroke-dasharray="'+d+'"':'')+'/>';}

/* Q1 - Volume of cylinder */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=160,cy=240,r=70,h=160;
  o.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="14" fill="#e0ccc4" stroke="#bbb" stroke-width="1"/>');
  o.push('<rect x="'+(cx-r)+'" y="'+(cy-h)+'" width="'+(r*2)+'" height="'+h+'" fill="'+(p>=2?'#fce8d8':'#fff5f0')+'" stroke="#C0272D" stroke-width="2"/>');
  o.push('<ellipse cx="'+cx+'" cy="'+(cy-h)+'" rx="'+r+'" ry="14" fill="'+(p>=2?'#f4c8a8':'#ffe0d0')+'" stroke="#C0272D" stroke-width="2"/>');
  o.push(T(cx,cy+28,'r = 6 cm','#6b5750',12,'middle',false));
  if(p>=1){o.push(L(cx+r+8,cy,cx+r+8,cy-h,'#aaa',1));o.push(T(cx+r+22,cy-h/2,'h = 10 cm','#6b5750',12,'start',false));}
  if(p>=2){o.push(T(cx,cy-h/2,'V = \u03c0r\u00b2h','#C0272D',13,'middle',true));o.push(T(cx,cy-h/2+22,'= \u03c0\u00d736\u00d710','#241A17',12,'middle',false));o.push(T(cx,cy-h/2+42,'\u2248 1131 cm\u00b3','#C0272D',13,'middle',true));}
  o.push(T(340,90,'V = \u03c0r\u00b2h','#241A17',14,'start',true));
  if(p>=1){o.push(T(340,118,'r = 6,  h = 10','#6b5750',12,'start',false));}
  if(p>=2){o.push(T(340,144,'= \u03c0 \u00d7 36 \u00d7 10','#241A17',13,'start',false));o.push(T(340,168,'= 360\u03c0','#241A17',13,'start',false));o.push(T(340,192,'\u2248 1131.0 cm\u00b3','#C0272D',14,'start',true));}
  o.push(T(240,16,'Volume of a Cylinder','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q2 - Surface area of cylinder */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=150,cy=240,r=65,h=150;
  o.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="13" fill="#e0ccc4" stroke="#C0272D" stroke-width="2"/>');
  o.push('<rect x="'+(cx-r)+'" y="'+(cy-h)+'" width="'+(r*2)+'" height="'+h+'" fill="#fff5f0" stroke="#C0272D" stroke-width="1.5"/>');
  o.push('<ellipse cx="'+cx+'" cy="'+(cy-h)+'" rx="'+r+'" ry="13" fill="#ffe0d0" stroke="#C0272D" stroke-width="2"/>');
  // label faces
  if(p>=1){
    o.push(T(cx,cy+6,'Circle (r=5)','#C0272D',11,'middle',true));
    o.push(T(cx,cy-h-16,'Circle (r=5)','#C0272D',11,'middle',true));
    o.push(T(cx+r+14,cy-h/2,'Curved','#1a5a8a',11,'start',false));
    o.push(T(cx+r+14,cy-h/2+14,'surface','#1a5a8a',11,'start',false));
  }
  if(p>=2){
    o.push(T(300,80,'2 circles: 2\u03c0r\u00b2','#241A17',13,'start',true));
    o.push(T(300,102,'= 2\u03c0 \u00d7 25 = 50\u03c0','#241A17',12,'start',false));
  }
  if(p>=3){
    o.push(T(300,130,'Curved: 2\u03c0rh','#241A17',13,'start',true));
    o.push(T(300,152,'= 2\u03c0 \u00d7 5 \u00d7 8 = 80\u03c0','#241A17',12,'start',false));
  }
  if(p>=4){
    o.push(T(300,186,'SA = 50\u03c0 + 80\u03c0 = 130\u03c0','#241A17',13,'start',true));
    o.push(T(300,210,'\u2248 408.4 cm\u00b2','#C0272D',14,'start',true));
    o.push(T(cx,cy-h/2,'\u2248 408 cm\u00b2','#C0272D',12,'middle',true));
  }
  o.push(T(cx,cy-h*1.03-30,'h = 8 cm','#6b5750',12,'middle',false));
  o.push(T(240,16,'Surface Area of a Cylinder','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q3 - Volume of cone */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=180,cy=260,r=90,h=180,tipY=cy-h;
  o.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="15" fill="#e0ccc4" stroke="#C0272D" stroke-width="1.5"/>');
  o.push('<polygon points="'+(cx-r)+','+cy+' '+(cx+r)+','+cy+' '+cx+','+tipY+'" fill="'+(p>=2?'#fce8d8':'#fff5f0')+'" stroke="#C0272D" stroke-width="2"/>');
  o.push(T(cx,cy+28,'r = 8 cm','#6b5750',12,'middle',false));
  if(p>=1){
    o.push(L(cx,cy,cx,tipY,'#aaa',1,'4,3'));
    o.push(T(cx+14,cy-h/2,'h = 15 cm','#6b5750',12,'start',false));
  }
  if(p>=2){
    o.push(T(cx,cy-h/2-10,'V = \u2153\u03c0r\u00b2h','#C0272D',13,'middle',true));
    o.push(T(cx,cy-h/2+14,'\u2248 1005 cm\u00b3','#C0272D',12,'middle',true));
  }
  o.push(T(320,90,'V = \u2153\u03c0r\u00b2h','#241A17',14,'start',true));
  if(p>=1){o.push(T(320,116,'= \u2153 \u00d7 \u03c0 \u00d7 64 \u00d7 15','#241A17',13,'start',false));}
  if(p>=2){o.push(T(320,142,'= 320\u03c0','#241A17',13,'start',false));o.push(T(320,166,'\u2248 1005.3 cm\u00b3','#C0272D',14,'start',true));}
  o.push(T(240,16,'Volume of a Cone','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q4 - Surface area of cone */
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=180,cy=260,r=85,h=170,tipY=cy-h;
  var l=Math.round(Math.sqrt(r*r+h*h));// slant
  o.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="15" fill="'+(p>=2?'#e8d8f8':'#f0ecf8')+'" stroke="#6050a0" stroke-width="2"/>');
  o.push('<polygon points="'+(cx-r)+','+cy+' '+(cx+r)+','+cy+' '+cx+','+tipY+'" fill="'+(p>=3?'#fce8d8':'#fff5f0')+'" stroke="#C0272D" stroke-width="2"/>');
  o.push(T(cx,cy+28,'r = 6 cm','#6b5750',12,'middle',false));
  if(p>=1){
    // show slant height
    o.push(L(cx,cy,cx,tipY,'#aaa',1,'4,3'));
    o.push(L(cx,tipY,cx+r,cy,'#C8922A',2));
    o.push(T(cx+r/2+12,cy-h/2,'l = 10 cm','#C8922A',12,'start',true));
    o.push(T(cx+14,cy-h/2,'h = 8 cm','#aaa',11,'start',false));
  }
  if(p>=2){o.push(T(310,90,'Base circle: \u03c0r\u00b2','#241A17',13,'start',true));o.push(T(310,112,'= \u03c0 \u00d7 36 = 36\u03c0','#241A17',12,'start',false));}
  if(p>=3){o.push(T(310,140,'Curved: \u03c0rl','#241A17',13,'start',true));o.push(T(310,162,'= \u03c0 \u00d7 6 \u00d7 10 = 60\u03c0','#241A17',12,'start',false));}
  if(p>=4){o.push(T(310,196,'SA = 36\u03c0 + 60\u03c0 = 96\u03c0','#241A17',13,'start',true));o.push(T(310,220,'\u2248 301.6 cm\u00b2','#C0272D',14,'start',true));}
  o.push(T(240,16,'Surface Area of a Cone','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q5 - Volume of sphere */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=180,cy=150,r=110;
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(p>=1?'#fce8d8':'#fff5f0')+'" stroke="#C0272D" stroke-width="2.5"/>');
  o.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="18" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>');
  if(p>=1){o.push(L(cx,cy,cx+r,cy,'#C0272D',2));o.push(T(cx+r/2,cy-12,'r = 7 cm','#C0272D',13,'middle',true));}
  o.push(T(330,90,'V = \u2154\u03c0r\u00b3','#241A17',14,'start',true));
  if(p>=1){o.push(T(330,118,'= \u2154 \u00d7 \u03c0 \u00d7 343','#241A17',13,'start',false));}
  if(p>=2){o.push(T(330,146,'= \u2154 \u00d7 343\u03c0','#241A17',13,'start',false));o.push(T(330,172,'\u2248 1436.8 cm\u00b3','#C0272D',14,'start',true));o.push(T(cx,cy+20,'\u2248 1437 cm\u00b3','#C0272D',13,'middle',true));}
  o.push(T(240,16,'Volume of a Sphere','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q6 - Surface area of sphere */
function dQ6(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=180,cy=150,r=110;
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(p>=2?'#fce8d8':'#fff5f0')+'" stroke="#C0272D" stroke-width="2.5"/>');
  o.push('<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+r+'" ry="18" fill="none" stroke="#bbb" stroke-width="1" stroke-dasharray="5,3"/>');
  if(p>=1){o.push(L(cx,cy,cx+r,cy,'#C0272D',2));o.push(T(cx+r/2,cy-12,'r = 5 cm','#C0272D',13,'middle',true));}
  o.push(T(330,90,'SA = 4\u03c0r\u00b2','#241A17',14,'start',true));
  if(p>=1){o.push(T(330,118,'= 4 \u00d7 \u03c0 \u00d7 25','#241A17',13,'start',false));}
  if(p>=2){o.push(T(330,146,'= 100\u03c0','#241A17',13,'start',false));o.push(T(330,172,'\u2248 314.2 cm\u00b2','#C0272D',14,'start',true));o.push(T(cx,cy+20,'\u2248 314.2 cm\u00b2','#C0272D',13,'middle',true));}
  o.push(T(240,16,'Surface Area of a Sphere','#C0272D',12,'middle',true));
  s.innerHTML=o.join('');
}

/* Q7 - Arc length and sector area */
function dQ7(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cx=200,cy=260,r=200,ang=70,rad=ang*Math.PI/180;
  // full circle faint
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="#eee" stroke-width="1.5"/>');
  // sector fill
  var ex=cx+r*Math.sin(rad),ey=cy-r*Math.cos(rad);
  // problem always visible at step 0
  o.push(R(14,8,452,44,'#fff5f0','#C0272D',1.5));
if(p>=1){
    o.push('<path d="M '+cx+','+cy+' L '+cx+','+(cy-r)+' A '+r+','+r+' 0 0,1 '+ex.toFixed(1)+','+ey.toFixed(1)+' Z" fill="#fce8d8" stroke="#C0272D" stroke-width="2"/>');
  } else {
    o.push('<path d="M '+cx+','+cy+' L '+cx+','+(cy-r)+' A '+r+','+r+' 0 0,1 '+ex.toFixed(1)+','+ey.toFixed(1)+' Z" fill="#fff5f0" stroke="#C0272D" stroke-width="2"/>');
  }
  // arc angle label
  o.push('<path d="M '+cx+','+(cy-40)+' A 40,40 0 0,1 '+(cx+40*Math.sin(rad)).toFixed(1)+','+(cy-40*Math.cos(rad)).toFixed(1)+'" fill="none" stroke="#C8922A" stroke-width="1.5"/>');
  o.push(T(cx+26,cy-52,ang+'\u00b0','#C8922A',12,'start',true));
  // radius labels
  o.push(T(cx-12,cy-r/2,'r = 12','#C0272D',12,'end',true));
  if(p>=2){
    // arc length
    var arcL=(ang/360)*2*Math.PI*12;
    o.push(T((cx+ex)/2+20,(cy-r+ey)/2-14,'Arc = 14.66 cm','#1a5a8a',11,'start',true));
  }

    {lb:'The idea',dr:dQ7,ht:'<p>A <b>sector</b> is a slice of a circle. The arc and area are both fractions of the full circle, determined by the angle.</p><div class="fm">Arc = (\u03b8/360) \u00d7 2\u03c0r</div><div class="fm">Sector area = (\u03b8/360) \u00d7 \u03c0r\u00b2</div>'},
    {lb:'The sector',dr:dQ7,ht:'<div class="fm">r = 12 cm,  \u03b8 = 70\u00b0</div><p>The shaded region is 70/360 of the full circle.</p>'},

    {lb:'Your turn',dr:dQ7,ht:function(){return tryItStatic({question:'A sector has radius <b>9 cm</b> and angle <b>120\u00b0</b>. Find its arc length (to 1 d.p.).',hints:['Arc = (\u03b8/360) \u00d7 2\u03c0r','= (120/360) \u00d7 2\u03c0 \u00d7 9','\u2153 \u00d7 18\u03c0'],ans:18.8,exact:0.2,unit:'cm',working:'Arc = (1/3) \u00d7 18\u03c0 = 6\u03c0 \u2248 <b>18.8 cm</b>'})}}

  {ey:'Q10 \u2022 Year 11 \u2022 Extended',ti:'Area of a Kite',su:'Kite ABDC: AB = AC = r = 10 cm, \u2220BAC = 60\u00b0. Use the diagonal method.',steps:[

    {lb:'Your turn',dr:dQ11,ht:function(){return tryItStatic({question:'A frustum: large radius <b>9 cm</b>, small radius <b>3 cm</b>, height <b>8 cm</b>. Find volume (to 1 d.p.).',hints:['3/9 = H/(H+8) \u2192 H = 4 cm','Full height = 12 cm','V = \u2153\u03c0(81\u00d712 \u2212 9\u00d74)'],ans:980.2,exact:1.5,unit:'cm\u00b3',working:'V = \u2153\u03c0(972\u221236) = 312\u03c0 \u2248 <b>980.2 cm\u00b3</b>'})}}

<script type="module">
