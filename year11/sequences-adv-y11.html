<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}}
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1)+'"/>';}

// Q1: Quadratic sequence — second differences
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var terms=[2,5,10,17,26];var diffs1=[3,5,7,9];var diffs2=[2,2,2];
  var bx=40,bw=68,by=30;
  // Terms row
  o.push(T(16,by+20,'Tₙ','#C0272D',12,'start'));
  terms.forEach(function(t,i){o.push(R(bx+i*bw,by,bw-4,34,'#fff5f0','#C0272D'));o.push(T(bx+i*bw+bw/2-2,by+22,''+t,'#241A17',14));});
  if(p>=1){
    o.push(T(16,by+68,'1st diff','#1a5a8a',10,'start'));
    diffs1.forEach(function(d,i){o.push(R(bx+i*bw+bw/2-16,by+50,bw-4,28,'#e8f4ff','#1a5a8a',1));o.push(T(bx+i*bw+bw-2,by+68,''+d,'#1a5a8a',13));
      o.push(L(bx+i*bw+bw/2-2,by+34,bx+i*bw+bw-20,by+50,'#1a5a8a',1));o.push(L(bx+(i+1)*bw+bw/2-2,by+34,bx+(i+1)*bw-20,by+50,'#1a5a8a',1));
    });
  }
  if(p>=2){
    o.push(T(16,by+112,'2nd diff','#C8922A',10,'start'));
    diffs2.forEach(function(d,i){o.push(R(bx+i*bw+bw+bw/2-16,by+90,bw-4,28,'#fef8ee','#C8922A',1));o.push(T(bx+i*bw+1.5*bw+bw/2-18,by+108,''+d,'#C8922A',13));});
    o.push(R(30,140,420,26,'#fef8ee','#C8922A',1.5));
    o.push(T(240,158,'2nd difference = 2 (constant) → quadratic sequence','#C8922A',12,'middle'));
  }
  if(p>=3){o.push(R(30,170,420,32,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,192,'Coefficient of n² = 2nd diff ÷ 2 = 1  →  Tₙ = n² + 1','#1a7a3a',12,'middle'));}
  s.innerHTML=o.join('');}

// Q2: Find nth term of quadratic
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var a=1,terms=[5,8,13,20,29];
  // 5,8,13,20,29 → Tn = n²+4
  o.push(T(240,22,'Find the nth term of: 5, 8, 13, 20, 29','#C0272D',14,'middle'));
  if(p>=1){o.push(R(30,36,420,32,'#fff5f0','#C0272D'));o.push(T(240,57,'1st differences: 3, 5, 7, 9  (not constant)','#241A17',12));}
  if(p>=2){o.push(R(30,72,420,32,'#e8f4ff','#1a5a8a'));o.push(T(240,93,'2nd differences: 2, 2, 2  (constant) → quadratic','#1a5a8a',12));}
  if(p>=3){o.push(R(30,108,420,32,'#fff5f0','#C0272D'));o.push(T(240,129,'n² gives: 1, 4, 9, 16, 25  Difference from Tₙ: +4 each time','#241A17',12));}
  if(p>=4){o.push(R(80,148,320,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,172,'Tₙ = n² + 4','#1a7a3a',17,'middle'));}
  s.innerHTML=o.join('');}

// Q3: Cubic sequence
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

  o.push(T(240,22,'Cubic Sequence: 1, 8, 27, 64, 125, …','#C0272D',14,'middle'));

// Q4: Exponential sequence — recognise
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];

  o.push(T(240,22,'Exponential Sequence: 3, 6, 12, 24, 48','#C0272D',14,'middle'));

  if(p>=2){o.push(R(30,70,420,30,'#e8f4ff','#1a5a8a'));o.push(T(240,89,'Constant ratio → geometric (exponential) sequence','#1a5a8a',13));}
  if(p>=3){o.push(R(30,104,420,30,'#fef8ee','#C8922A'));o.push(T(240,123,'First term a = 3, common ratio r = 2','#C8922A',13));}
  if(p>=4){o.push(R(80,138,320,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,162,'Tₙ = 3 × 2^(n−1)','#1a7a3a',17,'middle'));}

  s.innerHTML=o.join('');}

// Q5: Mixed — identify type from differences
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var types=[['Linear','1st diff constant','Tₙ = an + b','2, 5, 8, 11, 14'],['Quadratic','2nd diff constant','Tₙ = an²+bn+c','1, 4, 9, 16, 25'],['Cubic','3rd diff constant','Tₙ = an³+…','1, 8, 27, 64'],['Exponential','constant ratio','Tₙ = arⁿ','2, 4, 8, 16, 32']];
  o.push(T(240,20,'Identifying Sequence Types','#C0272D',14,'middle'));
  types.forEach(function(t,i){
    if(p>=i+1){
      o.push(R(24,34+i*52,432,46,i%2===0?'#fff5f0':'#fdf7f4','#E4D6CE',1));
      o.push(T(90,60+i*52,t[0],'#C0272D',13,'middle'));
      o.push(T(230,52+i*52,t[1],'#1a5a8a',11,'middle'));
      o.push(T(230,68+i*52,t[2],'#1a7a3a',11,'middle'));
      o.push(T(370,60+i*52,t[3],'#241A17',10,'middle'));
    }
  });
  s.innerHTML=o.join('');}

// Q6: Quadratic — full method with a≠1
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Tn = 2n²+1 → 3, 9, 19, 33, 51
  o.push(T(240,22,'Find nth term: 3, 9, 19, 33, 51','#C0272D',14,'middle'));
  if(p>=1){o.push(R(30,36,420,30,'#fff5f0','#C0272D'));o.push(T(240,55,'1st diff: 6, 10, 14, 18  (not constant)','#241A17',12));}
  if(p>=2){o.push(R(30,70,420,30,'#e8f4ff','#1a5a8a'));o.push(T(240,89,'2nd diff: 4, 4, 4  → a = 4÷2 = 2  (coeff of n²)','#1a5a8a',12));}
  if(p>=3){o.push(R(30,104,420,30,'#fef8ee','#C8922A'));o.push(T(240,123,'Subtract 2n²: (3−2),(9−8),(19−18),(33−32),(51−50) = 1,1,1,1,1','#C8922A',11));}
  if(p>=4){o.push(R(80,140,320,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,164,'Tₙ = 2n² + 1','#1a7a3a',17,'middle'));}
  s.innerHTML=o.join('');}

// Q7: Exponential — find nth term
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // 5, 10, 20, 40, 80 → 5×2^(n-1)
  o.push(T(240,22,'Find nth term: 5, 10, 20, 40, 80','#C0272D',14,'middle'));

  if(p>=2){o.push(R(30,70,420,30,'#e8f4ff','#1a5a8a'));o.push(T(240,89,'First term a = 5','#1a5a8a',12));}
  if(p>=3){o.push(R(80,108,320,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,132,'Tₙ = 5 × 2^(n−1)','#1a7a3a',17,'middle'));}
  if(p>=4){o.push(T(240,168,'Check: T₃ = 5×2² = 5×4 = 20 ✓','#555',11,'middle'));}
  if(p>=5){o.push(T(240,190,'T₁₀ = 5×2⁹ = 5×512 = 2560','#C0272D',12,'middle'));}
  s.innerHTML=o.join('');}

// Q8: Find missing terms in quadratic sequence
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // Tn = n²+2n: 3, 8, 15, 24, 35
  o.push(T(240,22,'Complete the sequence: 3, ?, 15, 24, ?','#C0272D',14,'middle'));
  if(p>=1){o.push(R(30,36,420,30,'#fff5f0','#C0272D'));o.push(T(240,55,'From T₃=15 and T₄=24: 1st diff₃ = 9','#241A17',12));}
  if(p>=2){o.push(R(30,70,420,30,'#e8f4ff','#1a5a8a'));o.push(T(240,89,'Working backwards: 2nd diff = 2 → 1st diff₂ = 7, 1st diff₁ = 5','#1a5a8a',12));}
  if(p>=3){o.push(R(30,104,420,30,'#fef8ee','#C8922A'));o.push(T(240,123,'T₂ = T₁ + 5 = 3 + 5 = 8','#C8922A',13));}

  if(p>=5){o.push(R(60,178,360,32,'#e8f8ee','#1a7a3a',2));o.push(T(240,200,'Sequence: 3, 8, 15, 24, 35  →  Tₙ = n²+2n','#1a7a3a',12,'middle'));}

// Q9: Exponential growth/decay context
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Exponential Sequence in Context','#C0272D',14,'middle'));
  o.push(R(30,36,420,40,'#fff5f0','#C0272D'));
  o.push(T(240,52,'A bacteria colony starts with 100 cells.','#241A17',12));
  o.push(T(240,70,'It doubles every hour. How many after n hours?','#241A17',12));

  if(p>=2){o.push(R(80,122,320,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,146,'Tₙ = 100 × 2^(n−1)','#1a7a3a',17,'middle'));}
  if(p>=3){o.push(R(30,168,420,30,'#fef8ee','#C8922A'));o.push(T(240,187,'After 5 hours: T₅ = 100 × 2⁴ = 100 × 16 = 1600','#C8922A',12));}
  if(p>=4){o.push(T(240,218,'After 10 hours: 100 × 2⁹ = 51,200 cells','#555',11,'middle'));}

var QS=[
  {ey:'Q1 · Sequences · Extended',ti:'Quadratic Sequences — Second Differences',su:'Identify a quadratic sequence using second differences: 2, 5, 10, 17, 26.',lv:'E',steps:[
    {lb:'The sequence',dr:dQ1,ht:'<span class="lt le">Extended</span><p>When the <b>first differences</b> are not constant but the <b>second differences</b> are, the sequence is <b>quadratic</b> (it has an n² term).</p>'},

    {lb:'The nth term',dr:dQ1,ht:'<div class="fm">Coeff of n² = 2nd diff ÷ 2 = 1  →  Tₙ = n² + 1</div><p>Check: T₁=1+1=2 ✓, T₂=4+1=5 ✓, T₃=9+1=10 ✓</p>'},

    {lb:'The pattern',dr:dQ3,ht:'<span class="lt le">Extended</span><p>A cubic sequence (Tₙ = an³ + …) has a <b>constant third difference</b>. For n³, the third difference is always 6.</p>'},
