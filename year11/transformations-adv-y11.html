<style>
:root{--red:#C0272D;--dark:#7A1418;--cream:#FBF6F1;--ink:#241A17;--line:#E4D6CE;--gold:#C8922A;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--cream);color:var(--ink);font-family:'Helvetica Neue',Arial,sans-serif;}
header{background:var(--red);color:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:sticky;top:0;z-index:100;}

.sb{width:210px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}

.qb:hover{border-color:var(--red);color:var(--red);}.qb.on{background:var(--red);color:#fff;border-color:var(--red);}

.main{flex:1;min-width:0;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#fdf7f4);padding:14px 0 4px;display:flex;justify-content:center;}

.btn:not(:disabled):hover{background:var(--dark);color:#fff;border-color:var(--dark);}

.fi{animation:fi .4s ease;}@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}

<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round1(x){return Math.round(x*10)/10;}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}}
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||11)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1)+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>'; }
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function poly(pts,fill,stroke,sw){return '<polygon points="'+pts.map(function(p){return p[0]+','+p[1];}).join(' ')+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||2)+'"/>';}

function grid(ox,oy,sc,cols,rows){
  var o=[];
  for(var i=0;i<=cols;i++)o.push(L(ox+i*sc,oy-rows*sc,ox+i*sc,oy,'#e8e0da',0.8));
  for(var j=0;j<=rows;j++)o.push(L(ox,oy-j*sc,ox+cols*sc,oy-j*sc,'#e8e0da',0.8));
  o.push(L(ox,oy-rows*sc,ox,oy,'#aaa',1.5));
  o.push(L(ox,oy,ox+cols*sc,oy,'#aaa',1.5));
  return o;
}

// Q1: Negative SF — concept
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=240,oy=150,sc=28;
  o=o.concat(grid(ox-5*sc,oy-4*sc,sc,10,8));
  o.push(L(ox-5*sc,oy,ox+5*sc,oy,'#555',1.5));o.push(L(ox,oy-4*sc,ox,oy+4*sc,'#555',1.5));
  // A: centre O, vertices at (1,1),(3,1),(1,3)
  var A=[[ox+1*sc,oy-1*sc],[ox+3*sc,oy-1*sc],[ox+1*sc,oy-3*sc]];
  // SF=-2 image: (-2,-2),(-6,-2),(-2,-6)
  var B=[[ox-2*sc,oy+2*sc],[ox-6*sc,oy+2*sc],[ox-2*sc,oy+6*sc]];
  if(p>=1){o.push(poly(A,'#fde8e8','#C0272D'));o.push(T(ox+1.5*sc,oy-1.8*sc,'A','#C0272D',12));}
  if(p>=2){
    A.forEach(function(pt){o.push(L(pt[0],pt[1],2*ox-pt[0],2*oy-pt[1],'#C8922A',1,'4,3'));});
    o.push(T(ox+8,oy-8,'O','#888',10));
  }
  if(p>=3){o.push(poly(B,'#e8f4ff','#1a5a8a',2));o.push(T(ox-3.5*sc,oy+2.8*sc,"A'","#1a5a8a",12));}
  o.push(T(ox,oy-4*sc-14,'Negative SF: image is on the OPPOSITE side of centre','#C0272D',11));
  s.innerHTML=o.join('');}

// Q2: Negative SF calculation
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=240,oy=160,sc=26;
  o=o.concat(grid(ox-5*sc,oy-4*sc,sc,10,8));
  o.push(L(ox-5*sc,oy,ox+5*sc,oy,'#555',1.5));o.push(L(ox,oy-4*sc,ox,oy+4*sc,'#555',1.5));
  var A=[[ox+2*sc,oy-1*sc],[ox+4*sc,oy-1*sc],[ox+2*sc,oy-3*sc]];
  var B=[[ox-2*sc,oy+1*sc],[ox-4*sc,oy+1*sc],[ox-2*sc,oy+3*sc]];
  if(p>=1){o.push(poly(A,'#fde8e8','#C0272D'));o.push(T(ox+3*sc,oy-2*sc,'A','#C0272D',12));}
  if(p>=2){A.forEach(function(pt){o.push(L(pt[0],pt[1],2*ox-pt[0],2*oy-pt[1],'#C8922A',1,'4,3'));});o.push(T(ox+8,oy-8,'O','#888',10));}
  if(p>=3){o.push(poly(B,'#e8f4ff','#1a5a8a',2));o.push(T(ox-3*sc,oy+2*sc,"A'","#1a5a8a",12));}
  o.push(T(ox,oy-4*sc-14,'SF = −1: same size, rotated 180° about O','#C0272D',11));
  s.innerHTML=o.join('');}

// Q3: Negative SF from non-origin centre
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=200,oy=180,sc=26;
  o=o.concat(grid(ox-4*sc,oy-5*sc,sc,12,8));
  o.push(L(ox-4*sc,oy,ox+8*sc,oy,'#555',1.5));o.push(L(ox,oy-5*sc,ox,oy+3*sc,'#555',1.5));
  var cx=ox+1*sc,cy=oy-1*sc; // centre C(1,1)
  // A: (2,2),(4,2),(2,4). SF=-1 from C(1,1): image = 2C-A = (0,0),(−2,0),(0,−2)
  var A=[[ox+2*sc,oy-2*sc],[ox+4*sc,oy-2*sc],[ox+2*sc,oy-4*sc]];
  var B=[[ox+0*sc,oy-0*sc],[ox-2*sc,oy-0*sc],[ox+0*sc,oy+2*sc]];
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="5" fill="#888" stroke="#fff" stroke-width="2"/>');
  o.push(T(cx+12,cy+4,'C(1,1)','#888',10,'start'));
  if(p>=1){o.push(poly(A,'#fde8e8','#C0272D'));o.push(T(ox+3*sc,oy-3*sc,'A','#C0272D',12));}
  if(p>=2){A.forEach(function(pt){o.push(L(pt[0],pt[1],2*cx-pt[0],2*cy-pt[1],'#C8922A',1,'4,3'));});}
  if(p>=3){o.push(poly(B,'#e8f4ff','#1a5a8a',2));o.push(T(ox-sc,oy+sc,"A'","#1a5a8a",12));}
  o.push(T(ox+4*sc,oy-5*sc-14,'Image vertex = 2×C − original vertex','#C0272D',11));
  s.innerHTML=o.join('');}

// Q4: Combined — reflection then translation
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=200,oy=160,sc=28;
  o=o.concat(grid(ox-4*sc,oy-4*sc,sc,10,7));
  o.push(L(ox-4*sc,oy,ox+6*sc,oy,'#555',1.5));o.push(L(ox,oy-4*sc,ox,oy+3*sc,'#555',1.5));
  // A: (1,1),(3,1),(1,3)
  var A=[[ox+1*sc,oy-1*sc],[ox+3*sc,oy-1*sc],[ox+1*sc,oy-3*sc]];
  // Reflect in x-axis: (1,-1),(3,-1),(1,-3)
  var B=[[ox+1*sc,oy+1*sc],[ox+3*sc,oy+1*sc],[ox+1*sc,oy+3*sc]];
  // Translate by (−4,2): (−3,1),(−1,1),(−3,3)
  var C=[[ox-3*sc,oy-1*sc],[ox-1*sc,oy-1*sc],[ox-3*sc,oy-3*sc]];
  if(p>=1){o.push(poly(A,'#fde8e8','#C0272D'));o.push(T(ox+2*sc,oy-1.5*sc,'A','#C0272D',12));}
  if(p>=2){o.push(poly(B,'rgba(200,146,42,0.2)','#C8922A',2));o.push(T(ox+2*sc,oy+2*sc,"A'","#C8922A",12));o.push(T(ox+4*sc,oy+14,'Reflect in x-axis','#C8922A',10,'start'));}
  if(p>=3){o.push(poly(C,'#e8f4ff','#1a5a8a',2));o.push(T(ox-2*sc,oy-2*sc,"A''","#1a5a8a",12));o.push(T(ox+4*sc,oy+28,'Then translate (−4, 2)','#1a5a8a',10,'start'));}
  o.push(T(ox+1*sc,oy-4*sc-14,'Combined: Reflection then Translation','#C0272D',11));
  s.innerHTML=o.join('');}

// Q5: Combined — rotation then reflection
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=200,oy=160,sc=28;
  o=o.concat(grid(ox-4*sc,oy-4*sc,sc,10,7));
  o.push(L(ox-4*sc,oy,ox+6*sc,oy,'#555',1.5));o.push(L(ox,oy-4*sc,ox,oy+3*sc,'#555',1.5));
  // A: (1,1),(3,1),(2,3). Rotate 90° ACW: (x,y)→(−y,x): (−1,1),(−1,3),(−3,2)
  var A=[[ox+1*sc,oy-1*sc],[ox+3*sc,oy-1*sc],[ox+2*sc,oy-3*sc]];
  var B=[[ox-1*sc,oy-1*sc],[ox-1*sc,oy-3*sc],[ox-3*sc,oy-2*sc]];
  // Reflect in y-axis: (1,1),(1,3),(3,2)
  var C=[[ox+1*sc,oy-1*sc],[ox+1*sc,oy-3*sc],[ox+3*sc,oy-2*sc]];
  if(p>=1){o.push(poly(A,'#fde8e8','#C0272D'));o.push(T(ox+2*sc,oy-1.8*sc,'A','#C0272D',12));}
  if(p>=2){o.push(poly(B,'rgba(200,146,42,0.2)','#C8922A',2));o.push(T(ox-2*sc,oy-2*sc,"A'","#C8922A",12));o.push(T(ox+4*sc,oy+14,'Rotate 90° ACW','#C8922A',10,'start'));}
  if(p>=3){o.push(poly(C,'#e8f4ff','#1a5a8a',2));o.push(T(ox+2.5*sc,oy-2.5*sc,"A''","#1a5a8a",11));o.push(T(ox+4*sc,oy+28,'Then reflect in y-axis','#1a5a8a',10,'start'));}
  o.push(T(ox+1*sc,oy-4*sc-14,'Combined: Rotation then Reflection','#C0272D',11));
  s.innerHTML=o.join('');}

// Q6: Combined — two reflections = rotation
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=200,oy=160,sc=28;
  o=o.concat(grid(ox-4*sc,oy-4*sc,sc,10,7));
  o.push(L(ox-4*sc,oy,ox+6*sc,oy,'#555',1.5));o.push(L(ox,oy-4*sc,ox,oy+3*sc,'#555',1.5));
  var A=[[ox+1*sc,oy-1*sc],[ox+3*sc,oy-1*sc],[ox+1*sc,oy-3*sc]];
  // Reflect in x: (1,-1),(3,-1),(1,-3)
  var B=[[ox+1*sc,oy+1*sc],[ox+3*sc,oy+1*sc],[ox+1*sc,oy+3*sc]];
  // Reflect in y: (-1,-1),(-3,-1),(-1,-3) → same as 180° rotation
  var C=[[ox-1*sc,oy+1*sc],[ox-3*sc,oy+1*sc],[ox-1*sc,oy+3*sc]];
  if(p>=1){o.push(poly(A,'#fde8e8','#C0272D'));o.push(T(ox+1.5*sc,oy-2*sc,'A','#C0272D',12));}
  if(p>=2){o.push(poly(B,'rgba(200,146,42,0.2)','#C8922A',2));o.push(T(ox+2*sc,oy+2.5*sc,"A'","#C8922A",12));o.push(T(ox+4*sc,oy+14,'Reflect in x-axis','#C8922A',10,'start'));}
  if(p>=3){o.push(poly(C,'#e8f4ff','#1a5a8a',2));o.push(T(ox-2*sc,oy+2.5*sc,"A''","#1a5a8a",12));o.push(T(ox+4*sc,oy+28,'Then reflect in y-axis','#1a5a8a',10,'start'));}
  if(p>=4){o.push(R(30,270,420,24,'#e8f8ee','#1a7a3a',1));o.push(T(240,286,'Two reflections in perpendicular axes = Rotation of 180° about O','#1a7a3a',11));}
  s.innerHTML=o.join('');}

// Q7: Enlargement SF=-2 from centre
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var ox=240,oy=180,sc=24;
  o=o.concat(grid(ox-6*sc,oy-4*sc,sc,12,8));
  o.push(L(ox-6*sc,oy,ox+6*sc,oy,'#555',1.5));o.push(L(ox,oy-4*sc,ox,oy+4*sc,'#555',1.5));
  var cx=ox,cy=oy; // centre O
  var A=[[ox+1*sc,oy-1*sc],[ox+2*sc,oy-1*sc],[ox+1*sc,oy-2*sc]];
  // SF=-2: image = 2*C - 2*(A-C) = 3C - A... no: image = C + SF*(A-C) = O + (-2)*(A-O) = -2A
  var B=[[ox-2*sc,oy+2*sc],[ox-4*sc,oy+2*sc],[ox-2*sc,oy+4*sc]];
  o.push('<circle cx="'+cx+'" cy="'+cy+'" r="4" fill="#888" stroke="#fff" stroke-width="1.5"/>');
  o.push(T(cx+8,cy+4,'O','#888',10,'start'));
  if(p>=1){o.push(poly(A,'#fde8e8','#C0272D'));o.push(T(ox+1.5*sc,oy-1.5*sc,'A','#C0272D',12));}
