<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round2(x){return Math.round(x*100)/100;}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer'+(o.unit?' ('+o.unit+')':'');
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}  }
});
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1.5)+'"/>';}

function growthCurve(ox,oy,sx,sy,start,r,n,c){
  var d='M'+ox+','+oy;
  for(var i=0;i<=n;i++){var val=start*Math.pow(r,i);var px=ox+i*sx,py=oy-val*sy;d+=' L'+Math.round(px)+','+Math.round(py);}
  return '<path d="'+d+'" fill="none" stroke="'+(c||'#C0272D')+'" stroke-width="2.5"/>';
}

// Q1: The formula — growth
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=60,oy=220,sx=60,sy=0.8;
  o.push(L(ox,oy,ox+5*sx+20,oy,'#aaa',1.5));o.push(L(ox,10,ox,oy,'#aaa',1.5));
  for(var i=0;i<=5;i++){o.push(L(ox+i*sx,oy-3,ox+i*sx,oy+3,'#aaa',1));o.push(T(ox+i*sx,oy+14,''+i,'#555',10));}
  [50,100,150,200].forEach(function(v){o.push(L(ox-3,oy-v*sy,ox+3,oy-v*sy,'#aaa',1));o.push(T(ox-6,oy-v*sy+4,''+v,'#555',9,'end'));});
  o.push(T(ox+160,oy+28,'Time (years)','#555',11));o.push(T(ox-16,oy-110,'Value','#555',11));
  if(p>=1){o.push(growthCurve(ox,oy,sx,sy,100,1.2,5,'#C0272D'));o.push(T(ox+5*sx+14,oy-Math.pow(1.2,5)*100*sy,'×1.2','#C0272D',11,'start'));}
  if(p>=2){o.push(R(10,8,300,32,'#fff5f0','#C0272D'));o.push(T(155,30,'V = P × (1 + r/100)ⁿ','#C0272D',13));}
  s.innerHTML=o.join('');}

// Q2: Compound interest growth
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  // £2000 at 5% for 3 years
  var vals=[2000,2100,2205,2315.25];
  var ox=60,oy=220,sx=90,sy=0.08;
  o.push(L(ox,oy,ox+4*sx,oy,'#aaa',1.5));o.push(L(ox,20,ox,oy,'#aaa',1.5));
  for(var i=0;i<=3;i++){o.push(L(ox+i*sx,oy-3,ox+i*sx,oy+3,'#aaa',1));o.push(T(ox+i*sx,oy+14,'Yr '+i,'#555',10));}
  o.push(T(240,22,'Compound Interest: £2000 at 5% for 3 years','#C0272D',12));
  if(p>=1){vals.forEach(function(v,i){o.push('<circle cx="'+(ox+i*sx)+'" cy="'+(oy-v*sy)+'" r="5" fill="#C0272D"/>');o.push(T(ox+i*sx,oy-v*sy-10,'£'+v.toFixed(2),'#241A17',10));});}
  if(p>=2){o.push(R(50,200,380,30,'#e8f8ee','#1a7a3a',1));o.push(T(240,220,'2000 × 1.05³ = £2315.25','#1a7a3a',13));}
  s.innerHTML=o.join('');}

// Q3: Depreciation decay curve
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=60,oy=40,sx=70,sy=1.8;
  o.push(L(ox,oy+5*sy*50,ox+5*sx+20,oy+5*sy*50,'#aaa',1.5));o.push(L(ox,oy,ox,oy+5*sy*50+20,'#aaa',1.5));
  for(var i=0;i<=5;i++){o.push(L(ox+i*sx,oy+5*sy*50-3,ox+i*sx,oy+5*sy*50+3,'#aaa',1));o.push(T(ox+i*sx,oy+5*sy*50+14,''+i,'#555',10));}
  [0,25,50,75,100].forEach(function(v){var py=oy+(100-v)*sy;o.push(L(ox-3,py,ox+3,py,'#aaa',1));o.push(T(ox-6,py+4,''+v,'#555',9,'end'));});
  o.push(T(240,oy+5*sy*50+28,'Time (years)','#555',11));
  // Decay: 100 × 0.8^n
  if(p>=1){
    var d='M'+ox+','+(oy);
    for(var i=0;i<=5;i++){var v=100*Math.pow(0.8,i);var px=ox+i*sx,py=oy+(100-v)*sy;if(i===0)d='M'+px+','+py;else d+=' L'+Math.round(px)+','+Math.round(py);}
    o.push('<path d="'+d+'" fill="none" stroke="#1a5a8a" stroke-width="2.5"/>');
    o.push(T(ox+5*sx+14,oy+(100-100*Math.pow(0.8,5))*sy,'×0.8','#1a5a8a',11,'start'));
  }
  if(p>=2){o.push(R(10,8,300,28,'#e8f4ff','#1a5a8a'));o.push(T(155,27,'V = P × (1 − r/100)ⁿ','#1a5a8a',13));}
  s.innerHTML=o.join('');}

// Q4: Multiplier method
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'The Multiplier Method','#C0272D',14));
  var rows=[['Increase by 5%','× 1.05'],['Increase by 20%','× 1.20'],['Decrease by 10%','× 0.90'],['Decrease by 15%','× 0.85'],['Decrease by 3.5%','× 0.965']];
  rows.forEach(function(r,i){
    if(p>=i+1){
      o.push(R(40,40+i*40,400,36,i%2===0?'#fff5f0':'#fdf7f4','#E4D6CE',1));
      o.push(T(200,63+i*40,r[0],'#241A17',13,'middle'));
      o.push(T(380,63+i*40,r[1],'#C0272D',14,'middle'));
    }
  });
  if(p>=5){o.push(R(40,244,400,12,'#e8f8ee','#1a7a3a',1));o.push(T(240,252,'Growth multiplier > 1.  Decay multiplier < 1.','#1a7a3a',10));}
  s.innerHTML=o.join('');}

// Q5: Population growth
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Population Growth','#C0272D',14));
  o.push(T(240,42,'Town: 50,000 people, growing at 3% per year.','#241A17',12));
  o.push(R(60,56,360,36,'#fff5f0','#C0272D'));o.push(T(240,80,'V = 50000 × 1.03ⁿ','#C0272D',14));
  if(p>=1){o.push(L(240,92,240,112,'#aaa',1));o.push(R(60,112,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,136,'After 5 years: 50000 × 1.03⁵','#1a5a8a',13));}
  if(p>=2){o.push(L(240,148,240,168,'#aaa',1));o.push(R(60,168,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,192,'= 50000 × 1.1593 = 57,964','#1a5a8a',13));}
  if(p>=3){o.push(R(120,212,240,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,236,'≈ 57,964 people','#1a7a3a',14));}
  s.innerHTML=o.join('');}

// Q6: Depreciation
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Car Depreciation','#C0272D',14));
  o.push(T(240,42,'Car bought for £18,000. Depreciates at 12% per year.','#241A17',12));
  o.push(R(60,56,360,36,'#fff5f0','#C0272D'));o.push(T(240,80,'V = 18000 × 0.88ⁿ','#C0272D',14));
  if(p>=1){o.push(L(240,92,240,112,'#aaa',1));o.push(R(60,112,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,136,'After 4 years: 18000 × 0.88⁴','#1a5a8a',13));}
  if(p>=2){o.push(L(240,148,240,168,'#aaa',1));o.push(R(60,168,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,192,'= 18000 × 0.5997 = £10,794','#1a5a8a',13));}
  if(p>=3){o.push(R(120,212,240,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,236,'≈ £10,794 after 4 years','#1a7a3a',14));}
  s.innerHTML=o.join('');}

// Q7: Repeated percentage change
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Repeated Percentage Change','#C0272D',14));
  o.push(T(240,42,'Price rises 10% then falls 10%. Is it back to the start?','#241A17',12));
  if(p>=1){o.push(R(60,56,360,36,'#fff5f0','#C0272D'));o.push(T(240,80,'Rise 10%: £100 × 1.10 = £110','#C0272D',13));}
  if(p>=2){o.push(R(60,98,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,122,'Fall 10%: £110 × 0.90 = £99','#1a5a8a',13));}
  if(p>=3){o.push(R(60,140,360,36,'#fef8ee','#C8922A'));o.push(T(240,164,'Net multiplier: 1.10 × 0.90 = 0.99 → 1% loss overall','#C8922A',12));}
  if(p>=4){o.push(R(60,182,360,36,'#e8f8ee','#1a7a3a',1));o.push(T(240,206,'Key: % increase then same % decrease ≠ no change','#1a7a3a',12));}
  s.innerHTML=o.join('');}

// Q8: Find the original value (reverse)
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Finding the Original Value','#C0272D',14));
  o.push(T(240,42,'After 3 years at 5% growth, value = £23,152.50. Find original.','#241A17',12));
  o.push(R(60,56,360,36,'#fff5f0','#C0272D'));o.push(T(240,80,'P × 1.05³ = 23152.50','#C0272D',13));
  if(p>=1){o.push(L(240,92,240,112,'#aaa',1));o.push(R(60,112,360,36,'#e8f4ff','#1a5a8a'));o.push(T(240,136,'P = 23152.50 ÷ 1.05³ = 23152.50 ÷ 1.157625','#1a5a8a',12));}
  if(p>=2){o.push(L(240,148,240,168,'#aaa',1));o.push(R(120,168,240,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,192,'P = £20,000','#1a7a3a',16));}
  if(p>=3){o.push(T(240,222,'Always divide by the multiplier to reverse growth','#555',11));}
  s.innerHTML=o.join('');}

// Q9: Half-life (radioactive decay)
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  o.push(T(240,22,'Half-Life — Radioactive Decay','#C0272D',14));
  o.push(T(240,40,'A substance has half-life of 10 years. Start: 800g.','#241A17',12));
  // Table
  var rows=[['0','800g'],['10','400g'],['20','200g'],['30','100g'],['40','50g']];
  rows.forEach(function(r,i){
    if(p>=i){
      o.push(R(100,56+i*36,130,32,i%2===0?'#fff5f0':'#fdf7f4','#E4D6CE',1));
      o.push(T(165,77+i*36,'t = '+r[0]+' yrs','#241A17',12,'middle'));
      o.push(R(232,56+i*36,148,32,i%2===0?'#fff5f0':'#fdf7f4','#E4D6CE',1));
      o.push(T(306,77+i*36,r[1],'#C0272D',12,'middle'));
    }
  });
  if(p>=5){o.push(R(60,240,360,14,'#e8f8ee','#1a7a3a',1));o.push(T(240,250,'V = 800 × (0.5)^(t/10)','#1a7a3a',11));}
  s.innerHTML=o.join('');}

// Q10: Compare growth and decay on one graph
function dQ10(p){var s=g();s.setAttribute('viewBox','0 0 480 260');var o=[];
  var ox=60,oy=220,sx=60,sy=1.5;
  o.push(L(ox,oy,ox+5*sx+20,oy,'#aaa',1.5));o.push(L(ox,10,ox,oy,'#aaa',1.5));
  for(var i=0;i<=5;i++){o.push(L(ox+i*sx,oy-3,ox+i*sx,oy+3,'#aaa',1));o.push(T(ox+i*sx,oy+14,''+i,'#555',10));}
