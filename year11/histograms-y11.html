<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round2(x){return Math.round(x*100)/100;}

var ST={};
function tryIt(genFn){var id='t'+Math.random().toString(36).slice(2);var o=genFn();ST[id]={o:o,genFn:genFn};return buildTry(id,o);}
function buildTry(id,o){var h=(o.hints||[]).map(function(x){return'<li>'+x+'</li>';}).join('');var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';var ph='Answer'+(o.unit?' ('+o.unit+')':'');return'<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div><div class="ar"><input type="number" step="any" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/><button class="ck try-ck" data-tryid="'+id+'">Check</button></div><div class="try-fb" data-tryid="'+id+'"></div><details class="wk"><summary>Show working</summary>'+wk+'</details><div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var en=ST[id];if(!en)return;var o=en.genFn();en.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=buildTry(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:en.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var en=ST[id];if(!en)return;var o=en.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a number.';return;}var tol=o.tol!=null?o.tol:0.5;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct!  '+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}}
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#241A17';sz=sz||12;a=a||'middle';return'<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'"'+(b?' font-weight="700"':'')+'>'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return'<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+fill+'" stroke="'+(stroke||'none')+'" stroke-width="'+(sw||0)+'"/>';}
function L(x1,y1,x2,y2,c,w){return'<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#ccc')+'" stroke-width="'+(w||1)+'"/>';}

// General histogram drawer: bars = [{lo,hi,fd}], show up to p bars, maxFD for scaling
function drawHist(p,bars,maxFD,labels,title,xlab){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  var ox=60,oy=250,aw=380,ah=200;
  var xmin=bars[0].lo,xmax=bars[bars.length-1].hi;
  var xsc=aw/(xmax-xmin);
  var ysc=ah/maxFD;
  // axes
  o.push(L(ox,oy,ox+aw,oy,'#241A17',2));
  o.push(L(ox,oy,ox,oy-ah,'#241A17',2));
  // y axis ticks
  for(var fd=0;fd<=maxFD;fd++){
    if(fd%1===0){var py=oy-fd*ysc;o.push(L(ox-4,py,ox,py,'#241A17',1));o.push(T(ox-8,py+4,fd,'#888',10,'end'));}
  }
  // x axis ticks/labels
  bars.forEach(function(b,i){
    var px=ox+(b.lo-xmin)*xsc;var px2=ox+(b.hi-xmin)*xsc;
    o.push(T(px,oy+16,b.lo,'#241A17',11));
    if(i===bars.length-1)o.push(T(px2,oy+16,b.hi,'#241A17',11));
    // draw bar if p>i
    if(p>i&&b.fd>0){
      var bh=b.fd*ysc;
      o.push(R(px+1,oy-bh,px2-px-2,bh,'rgba(192,39,45,0.2)','#C0272D',1.5));
      o.push(T((px+px2)/2,oy-bh-6,b.fd,'#C0272D',11));
    }
  });
  o.push(T(ox+aw/2,oy+30,xlab||'','#241A17',12));
  o.push(T(18,oy-ah/2,'Frequency density','#241A17',11,'middle').replace('text-anchor="middle"','text-anchor="middle" transform="rotate(-90,18,'+(oy-ah/2)+')"'));
  if(title){o.push(R(0,4,480,28,'#fff5f0','#C0272D',0));o.push(T(240,22,title,'#C0272D',13,'middle',true));}
  s.innerHTML=o.join('');
}

// Q1 data: equal-width intro
var q1bars=[{lo:0,hi:10,fd:3},{lo:10,hi:20,fd:5},{lo:20,hi:30,fd:4},{lo:30,hi:40,fd:2}];
function dQ1(p){drawHist(p<1?0:p,q1bars,6,'','Frequency Density = Frequency ÷ Class Width','Age (years)');}

// Q2 data: unequal widths, read frequency from FD
var q2bars=[{lo:0,hi:5,fd:4},{lo:5,hi:10,fd:6},{lo:10,hi:20,fd:3},{lo:20,hi:40,fd:1.5}];
function dQ2(p){drawHist(p<1?0:p,q2bars,8,'','Reading a Histogram with Unequal Class Widths','Time (minutes)');}

// Q3: construct histogram from table
var q3bars=[{lo:0,hi:10,fd:2},{lo:10,hi:15,fd:6},{lo:15,hi:20,fd:8},{lo:20,hi:30,fd:3},{lo:30,hi:50,fd:1}];
function dQ3(p){drawHist(p<1?0:p,q3bars,10,'','Drawing a Histogram — Calculate FD for Each Class','Score');}

// Q4: find missing frequency
var q4bars=[{lo:0,hi:20,fd:3},{lo:20,hi:30,fd:5},{lo:30,hi:40,fd:0},{lo:40,hi:60,fd:2}];
function dQ4(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  if(p>=1){
    o.push(R(20,10,440,30,'#fff5f0','#C0272D',1.5));
    o.push(T(240,30,'The 30–40 bar has FD = 4. What is its frequency?','#C0272D',13,'middle',true));
  }
  var bars2=[{lo:0,hi:20,fd:3},{lo:20,hi:30,fd:5},{lo:30,hi:40,fd:4},{lo:40,hi:60,fd:2}];
  var ox=60,oy=240,aw=360,ah=180,xmin=0,xmax=60,maxFD=6;
  var xsc=aw/(xmax-xmin);var ysc=ah/maxFD;
  o.push(L(ox,oy,ox+aw,oy,'#241A17',2));o.push(L(ox,oy,ox,oy-ah,'#241A17',2));
  [0,2,4,6].forEach(function(fd){var py=oy-fd*ysc;o.push(L(ox-4,py,ox,py,'#241A17',1));o.push(T(ox-8,py+4,fd,'#888',10,'end'));});
  bars2.forEach(function(b,i){
    var px=ox+(b.lo-xmin)*xsc;var px2=ox+(b.hi-xmin)*xsc;
    o.push(T(px,oy+14,b.lo,'#241A17',10));
    if(i===bars2.length-1)o.push(T(px2,oy+14,b.hi,'#241A17',10));
    if(p>=1){var bh=b.fd*ysc;o.push(R(px+1,oy-bh,px2-px-2,bh,i===2?'rgba(192,39,45,0.4)':'rgba(192,39,45,0.2)','#C0272D',1.5));}
  });
  if(p>=2){o.push(R(20,256,440,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,272,'Frequency = FD × class width = 4 × 10 = 40','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}

// Q5: total frequency from histogram
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  var bars=[{lo:0,hi:10,fd:3},{lo:10,hi:20,fd:5},{lo:20,hi:30,fd:4},{lo:30,hi:50,fd:2}];
  var freqs=[30,50,40,40];
  var ox=60,oy=220,aw=360,ah=160,xmin=0,xmax=50,maxFD=6;
  var xsc=aw/(xmax-xmin);var ysc=ah/maxFD;
  if(p>=1){o.push(R(20,5,440,28,'#fff5f0','#C0272D',1.5));o.push(T(240,23,'Find the TOTAL frequency from the histogram.','#C0272D',13,'middle',true));}
  o.push(L(ox,oy,ox+aw,oy,'#241A17',2));o.push(L(ox,oy,ox,oy-ah,'#241A17',2));
  [0,2,4,6].forEach(function(fd){var py=oy-fd*ysc;o.push(L(ox-4,py,ox,py,'#241A17',1));o.push(T(ox-8,py+4,fd,'#888',10,'end'));});
  bars.forEach(function(b,i){var px=ox+(b.lo-xmin)*xsc;var px2=ox+(b.hi-xmin)*xsc;o.push(T(px,oy+14,b.lo,'#241A17',10));if(i===bars.length-1)o.push(T(px2,oy+14,b.hi,'#241A17',10));if(p>=1){var bh=b.fd*ysc;o.push(R(px+1,oy-bh,px2-px-2,bh,'rgba(192,39,45,0.2)','#C0272D',1.5));o.push(T((px+px2)/2,oy-bh-7,'f='+freqs[i],'#C0272D',10));}});
  if(p>=2){o.push(R(20,230,440,32,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,249,'Total = 30+50+40+40 = 160','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}

// Q6-Q10: use simpler approach with text tables
function tableDiag(p,title,rows,answer){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  o.push(R(20,10,440,34,'#fff5f0','#C0272D',1.5));
  o.push(T(240,31,title,'#C0272D',13,'middle',true));
  ['Class','Width','Freq','FD = f÷w'].forEach(function(h,i){o.push(T(50+i*100,70,h,'#1a5a8a',12,'middle',true));});
  rows.forEach(function(row,ri){
    if(p>=ri+1){
      row.forEach(function(cell,ci){
        var isQ=(cell==='?');
        o.push(T(50+ci*100,96+ri*30,cell,isQ?'#C0272D':'#241A17',isQ?14:12,'middle',isQ));
      });
    }
  });
  if(p>=rows.length+1){o.push(R(20,255,440,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,277,answer,'#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}

function dQ6(p){tableDiag(p,'Calculate the frequency density for each class',[['0–10','10','20','2'],['10–20','10','50','5'],['20–40','20','60','?'],['40–60','20','30','1.5']],'FD for 20–40: 60 ÷ 20 = 3');}
function dQ7(p){tableDiag(p,'Find the missing frequency (FD and width given)',[['0–5','5','?','4'],['5–15','10','40','4'],['15–25','10','30','3'],['25–50','25','50','2']],'Frequency for 0–5: FD × w = 4 × 5 = 20');}
function dQ8(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  o.push(R(20,10,440,34,'#fff5f0','#C0272D',1.5));
  o.push(T(240,31,'Estimate the MEAN from a frequency table with grouped data','#C0272D',13,'middle',true));
  ['Class','Midpt','Freq','f × mid'].forEach(function(h,i){o.push(T(50+i*100,70,h,'#1a5a8a',12,'middle',true));});
  var rows=[['0–10','5','12','60'],['10–20','15','18','270'],['20–30','25','10','250'],['30–40','35','5','175']];
  rows.forEach(function(row,ri){
    if(p>=ri+1){row.forEach(function(cell,ci){o.push(T(50+ci*100,96+ri*30,cell,'#241A17',12,'middle'));});}
  });
  if(p>=5){o.push(R(20,220,440,28,'#e8f8ee','#1a7a3a',1));o.push(T(240,238,'Σf = 45   Σ(f×mid) = 755   Mean = 755÷45 = 16.8','#1a7a3a',13,'middle',true));}
  if(p>=6){o.push(R(20,252,440,36,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,274,'Estimated mean ≈ 16.8','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}
function dQ9(p){tableDiag(p,'FD given — find class frequencies',[['0–4','4','?','3'],['4–8','4','?','5'],['8–16','8','?','2.5'],['16–20','4','?','4']],'Frequencies: 12, 20, 20, 16  (FD × class width)');}
function dQ10(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  o.push(R(0,0,480,300,'#fdf7f4'));
  o.push(R(20,10,440,34,'#fff5f0','#C0272D',1.5));
  o.push(T(240,31,'Two bars: 0–10 (FD=2), 10–20 (FD=5), 20–50 (FD=?), total freq=160','#C0272D',12,'middle',true));
  if(p>=1){o.push(T(240,90,'Step 1: find known frequencies','#241A17',14,'middle'));o.push(T(240,115,'0–10: 2×10=20    10–20: 5×10=50','#241A17',13,'middle'));}
  if(p>=2){o.push(T(240,150,'Step 2: frequency for 20–50','#241A17',14,'middle'));o.push(T(240,175,'160 − 20 − 50 = 90','#241A17',13,'middle'));}
  if(p>=3){o.push(R(20,195,440,40,'#e8f8ee','#1a7a3a',1.5));o.push(T(240,212,'FD for 20–50 = 90 ÷ 30 = 3','#1a7a3a',14,'middle',true));}
  s.innerHTML=o.join('');
}

var QS=[
  {ey:'Q1 · Histograms · Extended',ti:'What is Frequency Density?',su:'A histogram has FD on the y-axis. FD = Frequency ÷ Class Width.',lv:'E',steps:[
    {lb:'Key idea',dr:dQ1,ht:'<span class="lt le">Extended</span><p>In a histogram with <b>unequal class widths</b>, the y-axis shows <b>Frequency Density</b>, not frequency.<br><br><b>FD = Frequency ÷ Class Width</b><br><b>Frequency = FD × Class Width</b></p><p>The <b>area</b> of each bar = frequency.</p>'},
    {lb:'Equal widths example',dr:dQ1,ht:'<p>Here all widths = 10. The bar heights directly show FD. The class 10–20 has FD = 5, so frequency = 5 × 10 = <b>50</b>.</p>'},
    {lb:'Reading the bars',dr:dQ1,ht:'<p>Class 0–10: FD=3, freq=30.  Class 10–20: FD=5, freq=50.  Class 20–30: FD=4, freq=40.  Class 30–40: FD=2, freq=20.</p>'},
    {lb:'Your turn',dr:dQ1,ht:tryIt(function(){var fd=rnd(2,8),w=pick([5,10,20]);return{question:'A bar has frequency density '+fd+' and class width '+w+'. What is the frequency?',hints:['Frequency = FD × class width'],ans:fd*w,tol:0,unit:'',working:'FD × width = '+fd+'×'+w+' = '+fd*w};})}
  ]},
