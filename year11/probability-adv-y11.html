<script>
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function round2(x){return Math.round(x*100)/100;}
function frac(n,d){var g=function gcd(a,b){return b?gcd(b,a%b):a;}(Math.abs(n),Math.abs(d));return (n/g)+'/'+(d/g);}
var ST={};
function tryIt(fn){var id='t'+Math.random().toString(36).slice(2);var o=fn();ST[id]={o:o,genFn:fn};return bT(id,o);}
function bT(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  var wk=(h?'<ul class="hl">'+h+'</ul>':'')+'<div class="wk-b">'+o.working+'</div>';
  var ph='Answer (decimal, 2 d.p.)';
  return '<div class="try" data-tryid="'+id+'"><div class="try-t">✔ Your Turn</div><div class="try-q">'+o.question+'</div>'
    +'<div class="ar"><input type="number" step="0.01" placeholder="'+ph+'" class="try-inp" data-tryid="'+id+'"/>'
    +'<button class="ck try-ck" data-tryid="'+id+'">Check</button></div>'
    +'<div class="try-fb" data-tryid="'+id+'"></div>'
    +'<details class="wk"><summary>Show working</summary>'+wk+'</details>'
    +'<div style="margin-top:10px;"><button class="ck try-new" data-tryid="'+id+'" style="background:#888;">New question</button></div></div>';
}
document.addEventListener('click',function(e){
  var el=e.target;
  if(el.classList.contains('try-new')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.genFn();entry.o=o;var wrap=el.closest('.try');if(!wrap)return;var tmp=document.createElement('div');tmp.innerHTML=bT(id,o);wrap.parentNode.replaceChild(tmp.firstChild,wrap);ST[id]={o:o,genFn:entry.genFn};return;}
  if(el.classList.contains('try-ck')){var id=el.getAttribute('data-tryid');var entry=ST[id];if(!entry)return;var o=entry.o;var inp=document.querySelector('.try-inp[data-tryid="'+id+'"]');var fb=document.querySelector('.try-fb[data-tryid="'+id+'"]');if(!inp||!fb)return;var v=parseFloat(inp.value);if(isNaN(v)){fb.className='try-fb fb er';fb.textContent='Enter a decimal.';return;}var tol=o.tol!=null?o.tol:0.01;if(Math.abs(v-o.ans)<=tol){fb.className='try-fb fb ok';fb.innerHTML='✓ Correct! &nbsp;'+o.working;}else{fb.className='try-fb fb er';fb.textContent='Not quite — check your working and try again.';}  }
});

function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a){return '<text x="'+x+'" y="'+y+'" font-size="'+(sz||12)+'" font-family="Arial" fill="'+(c||'#6b5750')+'" text-anchor="'+(a||'middle')+'">'+t+'</text>';}
function R(x,y,w,h,fill,stroke,sw){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'#fff5f0')+'" stroke="'+(stroke||'#C0272D')+'" stroke-width="'+(sw||1.5)+'" rx="3"/>';}
function L(x1,y1,x2,y2,c,w){return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+(c||'#aaa')+'" stroke-width="'+(w||1.5)+'"/>';}

// Tree diagram helper
function tree(ox,oy,branches,p){
  var o=[];
  var bh=60; // branch vertical spacing
  branches.forEach(function(b,bi){
    var by=oy+(bi-(branches.length-1)/2)*bh;
    o.push(L(ox,oy,ox+120,by,'#aaa',1.5));
    if(p>=1){
      o.push(R(ox+122,by-14,80,26,(bi===0?'#fff5f0':'#e8f4ff'),(bi===0?'#C0272D':'#1a5a8a'),1.5));
      o.push(T(ox+162,by+4,b.label,(bi===0?'#C0272D':'#1a5a8a'),12));
      o.push(T(ox+60,by-10,b.prob,'#C8922A',11));
    }
    if(p>=2&&b.sub){
      b.sub.forEach(function(s,si){
        var sy=by+(si-(b.sub.length-1)/2)*30;
        o.push(L(ox+200,by,ox+320,sy,'#aaa',1));
        o.push(R(ox+322,sy-12,80,22,(si===0?'#fff5f0':'#e8f4ff'),(si===0?'#C0272D':'#1a5a8a'),1));
        o.push(T(ox+362,sy+4,s.label,(si===0?'#C0272D':'#1a5a8a'),11));
        o.push(T(ox+258,sy-8,s.prob,'#C8922A',10));
        if(p>=3&&s.result){
          o.push(T(ox+412,sy+4,s.result,'#241A17',10,'start'));
        }
      });
    }
  });
  return o;
}

// Q1: Without replacement — tree diagram
function dQ1(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,18,'Bag: 4 red, 3 blue (7 total) — draw 2 without replacement','#C0272D',12));
  o=o.concat(tree(20,140,[
    {label:'Red',prob:'4/7',sub:[{label:'Red',prob:'3/6',result:'P = 4/7 × 3/6 = 12/42'},{label:'Blue',prob:'3/6',result:'P = 4/7 × 3/6 = 12/42'}]},
    {label:'Blue',prob:'3/7',sub:[{label:'Red',prob:'4/6',result:'P = 3/7 × 4/6 = 12/42'},{label:'Blue',prob:'2/6',result:'P = 3/7 × 2/6 = 6/42'}]}
  ],p));
  s.innerHTML=o.join('');}

// Q2: Conditional — given first is red
function dQ2(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,18,'P(2nd is red | 1st was red) — conditional probability','#C0272D',12));
  if(p>=1){o.push(R(30,36,420,36,'#fff5f0','#C0272D'));o.push(T(240,60,'"Given the 1st was red, the bag now has 3R and 3B (6 total)"','#241A17',12));}
  if(p>=2){o.push(R(30,78,420,36,'#e8f4ff','#1a5a8a'));o.push(T(240,102,'P(2nd red | 1st red) = 3/6 = 1/2','#1a5a8a',14));}
  if(p>=3){o.push(R(30,122,420,64,'#fef8ee','#C8922A',1));
    o.push(T(240,144,'The condition changes the denominator.','#241A17',12));
    o.push(T(240,164,'Always ask: what is left in the bag after the condition?','#C8922A',12));}
  s.innerHTML=o.join('');}

// Q3: Two-way table for conditional probability
function dQ3(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,16,'Two-Way Table','#C0272D',13));
  var cols=['','Sport','Music','Total'],rows=[['Boys',15,10,25],['Girls',12,13,25],['Total',27,23,50]];
  var cw=90,ch=36,ox=50,oy=30;
  cols.forEach(function(c,i){o.push(R(ox+i*cw,oy,cw,ch,'#C0272D','#C0272D',1));o.push(T(ox+i*cw+cw/2,oy+22,c,'#fff',11));});
  rows.forEach(function(r,ri){
    r.forEach(function(cell,ci){
      var hilite=p>=2&&ri===0&&ci===1; // Boys+Sport
      o.push(R(ox+ci*cw,oy+(ri+1)*ch,cw,ch,hilite?'#fef3cd':ri%2===0?'#fdf7f4':'#fff','#E4D6CE',1));
      o.push(T(ox+ci*cw+cw/2,oy+(ri+1)*ch+22,''+cell,hilite?'#C8922A':'#241A17',hilite?13:11));
    });
  });
  if(p>=1){o.push(R(30,152,420,30,'#fff5f0','#C0272D'));o.push(T(240,172,'P(Sport | Boy) = P(Boy AND Sport) / P(Boy)','#C0272D',12));}
  if(p>=2){o.push(R(30,186,420,30,'#e8f4ff','#1a5a8a'));o.push(T(240,206,'= 15/25 = 3/5 = 0.6  (restrict to the Boys row)','#1a5a8a',13));}
  if(p>=3){o.push(T(240,234,'Conditional: restrict to the given row or column','#888',11));}
  s.innerHTML=o.join('');}

// Q4: Venn diagram conditional
function dQ4(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,16,'Venn Diagram — Conditional Probability','#C0272D',13));
  // Universal: 40 students. A=Algebra(22), B=Biology(18), both=8
  o.push(R(20,30,440,200,'#fdf7f4','#aaa',1));
  o.push('<ellipse cx="190" cy="140" rx="100" ry="80" fill="rgba(192,39,45,0.12)" stroke="#C0272D" stroke-width="2"/>');
  o.push('<ellipse cx="290" cy="140" rx="100" ry="80" fill="rgba(26,90,138,0.12)" stroke="#1a5a8a" stroke-width="2"/>');
  o.push(T(155,130,'A','#C0272D',14));o.push(T(325,130,'B','#1a5a8a',14));
  if(p>=1){o.push(T(155,155,'14','#C0272D',16));o.push(T(240,155,'8','#888',16));o.push(T(325,155,'10','#1a5a8a',16));o.push(T(60,50,'ξ=40','#888',11,'start'));}
  if(p>=2){o.push(R(30,238,420,30,'#fff5f0','#C0272D'));o.push(T(240,258,'P(B | A) = P(A∩B) / P(A) = 8/22 = 4/11','#C0272D',13));}
  if(p>=3){o.push(T(240,210,'Given A, restrict to circle A only (14+8=22)','#888',11));}
  s.innerHTML=o.join('');}

// Q5: Without replacement — 3 draws
function dQ5(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,18,'Three draws without replacement','#C0272D',12));
  o.push(T(240,38,'Bag: 5 red, 3 blue (8 total). P(all 3 red)?','#241A17',12));
  if(p>=1){o.push(R(30,54,420,32,'#fff5f0','#C0272D'));o.push(T(240,75,'Draw 1: P(R) = 5/8','#C0272D',13));}
  if(p>=2){o.push(R(30,90,420,32,'#e8f4ff','#1a5a8a'));o.push(T(240,111,'Draw 2: P(R|R already drawn) = 4/7','#1a5a8a',13));}
  if(p>=3){o.push(R(30,126,420,32,'#fef8ee','#C8922A'));o.push(T(240,147,'Draw 3: P(R|2R already drawn) = 3/6','#C8922A',13));}
  if(p>=4){o.push(R(80,166,320,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,190,'P(RRR) = 5/8 × 4/7 × 3/6 = 60/336 = 5/28','#1a7a3a',13));}
  s.innerHTML=o.join('');}

// Q6: P(at least one) using complement
function dQ6(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,18,'P(at least one) = 1 − P(none)','#C0272D',14));
  o.push(T(240,40,'Bag: 4 red, 6 blue. Two draws without replacement.','#241A17',12));
  o.push(T(240,58,'Find P(at least one red).','#241A17',12));
  if(p>=1){o.push(R(30,70,420,32,'#fff5f0','#C0272D'));o.push(T(240,91,'P(no red) = P(BB) = 6/10 × 5/9 = 30/90 = 1/3','#C0272D',13));}
  if(p>=2){o.push(R(80,110,320,36,'#e8f8ee','#1a7a3a',2));o.push(T(240,134,'P(at least 1 red) = 1 − 1/3 = 2/3','#1a7a3a',15));}
  if(p>=3){o.push(R(30,156,420,40,'#fef8ee','#C8922A',1));
    o.push(T(240,172,'The complement method is often quicker than','#241A17',11));
    o.push(T(240,188,'listing P(RB)+P(BR)+P(RR) separately.','#241A17',11));}
  s.innerHTML=o.join('');}

// Q7: Conditional from tree — given one colour, find next
function dQ7(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,18,'Bag: 3 red, 2 blue. Two draws without replacement.','#C0272D',12));
  o=o.concat(tree(20,140,[
    {label:'R (3/5)',prob:'3/5',sub:[{label:'R (2/4)',prob:'2/4',result:'6/20'},{label:'B (2/4)',prob:'2/4',result:'6/20'}]},
    {label:'B (2/5)',prob:'2/5',sub:[{label:'R (3/4)',prob:'3/4',result:'6/20'},{label:'B (1/4)',prob:'1/4',result:'2/20'}]}
  ],p));
  if(p>=3){o.push(R(30,252,420,22,'#e8f8ee','#1a7a3a',1));o.push(T(240,267,'P(2nd red | 1st blue) = 3/4 — read from the B branch','#1a7a3a',11));}
  s.innerHTML=o.join('');}

// Q8: Conditional from table
function dQ8(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,16,'Conditional from a Table','#C0272D',13));
  var cols=['','Pass','Fail','Total'],rows=[['Revised',36,4,40],['Did not',12,18,30],['Total',48,22,70]];
  var cw=90,ch=36,ox=50,oy=28;
  cols.forEach(function(c,i){o.push(R(ox+i*cw,oy,cw,ch,'#C0272D','#C0272D',1));o.push(T(ox+i*cw+cw/2,oy+22,c,'#fff',11));});
  rows.forEach(function(r,ri){
    r.forEach(function(cell,ci){
      var hilite=p>=2&&ri===1&&ci===1;
      o.push(R(ox+ci*cw,oy+(ri+1)*ch,cw,ch,hilite?'#fef3cd':ri%2===0?'#fdf7f4':'#fff','#E4D6CE',1));
      o.push(T(ox+ci*cw+cw/2,oy+(ri+1)*ch+22,''+cell,hilite?'#C8922A':'#241A17',11));
    });
  });
  if(p>=1){o.push(R(30,152,420,30,'#fff5f0','#C0272D'));o.push(T(240,172,'P(Fail | Did not revise) = ?','#C0272D',12));}
  if(p>=2){o.push(R(30,186,420,30,'#e8f4ff','#1a5a8a'));o.push(T(240,206,'Restrict to "Did not" row (30 total): 18/30 = 3/5 = 0.6','#1a5a8a',13));}
  s.innerHTML=o.join('');}

// Q9: Independent vs dependent
function dQ9(p){var s=g();s.setAttribute('viewBox','0 0 480 280');var o=[];
  o.push(T(240,18,'Independent vs Dependent Events','#C0272D',13));
  if(p>=1){
    o.push(R(30,32,420,56,'#fff5f0','#C0272D'));
    o.push(T(240,52,'INDEPENDENT: P(A and B) = P(A) × P(B)','#C0272D',12));
    o.push(T(240,72,'e.g. rolling a die twice — 1st roll doesn\'t affect 2nd','#241A17',11));
  }
  if(p>=2){
    o.push(R(30,96,420,56,'#e8f4ff','#1a5a8a'));
    o.push(T(240,116,'DEPENDENT: P(A and B) = P(A) × P(B|A)','#1a5a8a',12));
    o.push(T(240,136,'e.g. drawing without replacement — total changes','#241A17',11));
  }
  if(p>=3){
    o.push(R(30,160,420,36,'#e8f8ee','#1a7a3a',1));
    o.push(T(240,172,'TEST: are the conditional probabilities the same as the originals?','#241A17',11));
    o.push(T(240,188,'If P(B|A) = P(B) → independent. If different → dependent.','#1a7a3a',11));
  }
