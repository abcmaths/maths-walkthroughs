<script>
var ST={};
function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(a){return a[Math.floor(Math.random()*a.length)];}

/* Numeric tryIt */
function tryIt(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;
  return genTry(id,fn());
}
function genTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">&#10004; Your Turn</div>'+
    '<p>'+o.question+'</p>'+
    '<div class="ar">'+
      '<input type="number" step="any" placeholder="Your answer" id="'+id+'_i"/>'+
      '<button class="ck" onclick="ck(\''+id+'\')">&#10003; Check</button>'+
    '</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk">'+
      '<summary>Show working</summary>'+
      '<div class="wk-b">'+
        (h?'<ul class="hl">'+h+'</ul>':'')+
        '<div class="wk-ans">'+o.working+'</div>'+
      '</div>'+
    '</details>'+
    '<button class="nq" data-tryid="'+id+'">New question</button>'+
  '</div>';
}
function ck(id){
  var fn=ST[id];var o=typeof fn==='function'?fn():fn;
  var v=parseFloat(document.getElementById(id+'_i').value);
  var f=document.getElementById(id+'_f');
  if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}
  var tol=o.tol!==undefined?o.tol:0.5;
  if(Math.abs(v-o.ans)<=tol){
    f.className='fb ok';f.textContent='\u2713 Correct! Answer: '+o.ans+(o.unit?' '+o.unit:'');
  }else{
    f.className='fb er';f.textContent='Not quite \u2014 check your working and try again.';
  }
}

/* Multiple-choice tryIt */
function tryItMC(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;
  return genTryMC(id,fn());
}
function genTryMC(id,o){
  var opts=o.options.map(function(opt,i){
    return '<button class="mc-opt" onclick="ckMC(\''+id+'\','+i+','+o.correct+')">'+opt+'</button>';
  }).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">&#10004; Your Turn</div>'+
    '<p>'+o.question+'</p>'+
    '<div class="mc-opts" id="'+id+'_opts">'+opts+'</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk"><summary>Show answer</summary>'+
      '<div class="wk-b"><div class="wk-ans">'+o.working+'</div></div>'+
    '</details>'+
    '<button class="nq" data-tryid="'+id+'_mc">New question</button>'+
  '</div>';
}
function ckMC(id,chosen,correct){
  var opts=document.getElementById(id+'_opts').querySelectorAll('.mc-opt');
  opts.forEach(function(b,i){
    if(i===correct)b.classList.add('correct');
    else if(i===chosen)b.classList.add('wrong');
    b.disabled=true;
  });
  var f=document.getElementById(id+'_f');
  if(chosen===correct){f.className='fb ok';f.textContent='\u2713 Correct!';}
  else{f.className='fb er';f.textContent='Not quite \u2014 the correct answer is highlighted in green.';}
}
document.addEventListener('click',function(e){
  var b=e.target.closest('.nq');if(!b)return;
  var rawId=b.getAttribute('data-tryid');
  var id=rawId.replace('_mc','');
  var fn=ST[id];if(typeof fn!=='function')return;
  var wrap=b.closest('.try');if(!wrap)return;
  var isMC=(rawId.indexOf('_mc')>=0);
  var fresh=isMC?genTryMC(id,fn()):genTry(id,fn());
  var tmp=document.createElement('div');tmp.innerHTML=fresh;
  wrap.parentNode.replaceChild(tmp.firstChild,wrap);
});

/* SVG helpers */
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#1a2e1a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw,rx){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="'+(sw||2)+'" rx="'+(rx||0)+'"/>';}
function circ(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="'+(sw||2)+'"/>';}
function ellipse(cx,cy,rx,ry,fill,stroke,sw){return '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="'+(sw||2)+'"/>';}
function leader(x1,y1,x2,y2,label,c){
  c=c||'#555';
  return L(x1,y1,x2,y2,c,1)+T(x2+(x2>x1?5:-5),y2+4,label,c,11,x2>x1?'start':'end',false);
}

/* ── Q1: What is a cell? ── */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Simple animal cell outline
  o.push(ellipse(240,155,160,110,'#fff5e6','#2E7D32',2.5));
  // nucleus
  if(p>=1){
    o.push(circ(240,155,38,'#d4e8ff','#1565C0',2));
    o.push(T(240,159,'Nucleus','#1565C0',11,'middle',true));
  }
  // cytoplasm label
  if(p>=2){
    o.push(T(310,120,'Cytoplasm','#2E7D32',11,'start',true));
    o.push(L(305,120,280,130,'#2E7D32',1));
  }
  // cell membrane label
  if(p>=3){
    o.push(T(240,282,'Cell membrane','#C0272D',11,'middle',true));
    o.push(L(240,278,240,265,'#C0272D',1));
  }
  s.innerHTML=o.join('');
}

/* ── Q2: Animal vs Plant cell ── */

  o.push(circ(120,160,24,'#d4e8ff','#1565C0',1.5));
  // Plant cell (right)
  o.push(T(360,28,'Plant Cell','#2E7D32',12,'middle',true));
  o.push(R(280,80,160,160,'#f1faf1','#2E7D32',2.5,4));
  o.push(circ(360,160,24,'#d4e8ff','#1565C0',1.5));
  if(p>=1){
    // cell wall highlight
    o.push(R(278,78,164,164,'none','#1B5E20',3,4));
    o.push(T(360,272,'Cell wall','#1B5E20',11,'middle',true));
  }
  if(p>=2){
    // chloroplasts in plant cell
    var cps=[[320,120],[380,120],[320,200],[380,200],[350,160]];
    cps.forEach(function(pt){
      o.push(ellipse(pt[0],pt[1],12,7,'#a5d6a7','#2E7D32',1.5));

    o.push(T(360,295,'Chloroplasts (green)','#2E7D32',10,'middle',false));
  }
  if(p>=3){
    // vacuole in plant cell
    o.push(ellipse(360,162,30,28,'#e3f2fd','#1565C0',1.5));
    o.push(T(360,164,'Vacuole','#1565C0',10,'middle',false));

  s.innerHTML=o.join('');
}

/* ── Q4: The microscope ── */

/* ── QS array ── */
var QS=[
  {
    ey:'Y7 Biology \u2022 Q1',
    ti:'What is a cell?',
    su:'The basic unit of all living things',
    steps:[
      {
        sl:'The cell',
        p:'All living organisms are made of <b>cells</b>. The cell is the smallest unit that can carry out the basic processes of life — growing, reproducing, and responding to the environment.<br><br>This is an <b>animal cell</b>. Its boundary is called the <b>cell membrane</b>, which controls what enters and leaves.',
        draw:function(){dQ1(0);}

      {

  },
  {
    ey:'Y7 Biology \u2022 Q2',
    ti:'Animal vs Plant Cells',
    su:'Similarities and key differences',
    steps:[
      {

        p:'Both animal and plant cells have:<br><br>\u2022 A <b>cell membrane</b><br>\u2022 A <b>nucleus</b><br>\u2022 <b>Cytoplasm</b><br><br>These three structures are found in almost all living cells.',
        draw:function(){dQ2(0);}
      },
      {
        sl:'The cell wall',
        p:'Plant cells have a <b>cell wall</b> made of <b>cellulose</b> — a tough fibre that gives the cell a rigid rectangular shape and extra support. Animal cells do <b>not</b> have a cell wall, which is why they are more irregular in shape.',
        draw:function(){dQ2(1);}
      },
      {
        sl:'Chloroplasts',
        p:'Plant cells (in green parts of the plant) contain <b>chloroplasts</b>. These contain a green pigment called <b>chlorophyll</b> which absorbs sunlight to make food through <b>photosynthesis</b>.<br><br>Animal cells have <b>no</b> chloroplasts — animals must eat food rather than make it.',
        draw:function(){dQ2(2);}
      },
      {
        sl:'The permanent vacuole',
        p:'Plant cells often have a large <b>permanent vacuole</b> filled with cell sap. This keeps the cell firm (turgid) and helps support the plant.<br><br>Animal cells may have small temporary vacuoles but <b>not</b> a large permanent one.<br><br>'+
        tryItMC(function(){
          var qs=[
            {q:'Which structure is found in plant cells but NOT animal cells?',opts:['Chloroplast','Nucleus','Cell membrane','Cytoplasm'],c:0,w:'<b>Chloroplasts</b> are only in plant cells. Both cell types share a nucleus, cell membrane and cytoplasm.'},
            {q:'What is the cell wall made of?',opts:['Cellulose','Chlorophyll','Glucose','Starch'],c:0,w:'The cell wall is made of <b>cellulose</b>, a strong fibre that gives the cell its rigid shape.'},
            {q:'What is the function of chloroplasts?',opts:['Photosynthesis','Respiration','Protein synthesis','Cell division'],c:0,w:'Chloroplasts carry out <b>photosynthesis</b> — using sunlight to make glucose from carbon dioxide and water.'}
          ];
          return (function(p){return {question:p.q,options:p.opts,correct:p.c,working:p.w};})(rPick(qs));
        }),
        draw:function(){dQ2(3);}
      }
    ]
  },
  {
    ey:'Y7 Biology \u2022 Q3',
    ti:'Specialised Cells',
    su:'How cells are adapted for specific jobs',
    steps:[
      {
        sl:'Specialisation',
        p:'Multicellular organisms (like humans and plants) have many <b>different types of cells</b>, each adapted for a specific function. This is called <b>specialisation</b>.<br><br>A cell\'s structure is linked to its function — form follows function.',
        draw:function(){dQ3(0);}
      },
      {
        sl:'Red blood cells',
        p:'<b>Red blood cells</b> are adapted to carry oxygen around the body:<br><br>\u2022 <b>Biconcave disc shape</b> — large surface area for absorbing oxygen<br>\u2022 <b>No nucleus</b> — more space to carry haemoglobin<br>\u2022 Contain <b>haemoglobin</b> — binds to oxygen',
        draw:function(){dQ3(1);}
      },
      {
        sl:'Nerve cells',
        p:'<b>Nerve cells (neurones)</b> transmit electrical signals rapidly around the body:<br><br>\u2022 Very <b>long axon</b> — carries signals over long distances<br>\u2022 <b>Dendrites</b> — branch-like extensions to receive signals from other neurones<br>\u2022 <b>Myelin sheath</b> (not shown) — insulates the axon to speed up signals',
        draw:function(){dQ3(2);}
      },
      {
        sl:'Root hair cells',
        p:'<b>Root hair cells</b> absorb water and minerals from the soil:<br><br>\u2022 Long <b>root hair extension</b> — greatly increases surface area for absorption<br>\u2022 No chloroplasts — underground, so no light for photosynthesis<br><br>'+
        tryItMC(function(){
          var qs=[
            {q:'Why do red blood cells have no nucleus?',opts:['To carry more haemoglobin','To move faster','To absorb oxygen directly','To survive longer'],c:0,w:'Removing the nucleus leaves more space for <b>haemoglobin</b>, the protein that carries oxygen.'},
            {q:'What feature of root hair cells increases water absorption?',opts:['Long hair-like extension','Presence of chloroplasts','Biconcave shape','Large nucleus'],c:0,w:'The long <b>root hair extension</b> dramatically increases the surface area in contact with soil water.'},
            {q:'Which specialised cell transmits electrical signals?',opts:['Nerve cell','Red blood cell','Root hair cell','Guard cell'],c:0,w:'<b>Nerve cells (neurones)</b> are specialised to transmit electrical signals rapidly through the body.'}
          ];
          return (function(p){return {question:p.q,options:p.opts,correct:p.c,working:p.w};})(rPick(qs));
        }),
        draw:function(){dQ3(3);}
      }
    ]
  },
  {
    ey:'Y7 Biology \u2022 Q4',
    ti:'Using a Microscope',
    su:'Magnification and cell observation',
    steps:[
      {
        sl:'The light microscope',
        p:'A <b>light microscope</b> uses lenses to magnify objects too small to see with the naked eye. It allowed scientists to discover cells for the first time.<br><br>Key parts: <b>eyepiece lens</b>, <b>objective lens</b>, <b>stage</b> (where the slide goes), and focus knobs.',
        draw:function(){dQ4(0);}
      },
      {
        sl:'Objective lens',
        p:'The <b>objective lens</b> is the lens closest to the specimen. Most microscopes have several objective lenses of different magnification (e.g. \u00d74, \u00d710, \u00d740).<br><br>You start with the <b>lowest magnification</b> to find the specimen, then switch to higher magnification for detail.',
        draw:function(){dQ4(1);}
      },
      {
        sl:'The stage',
        p:'The <b>stage</b> is the flat platform where the glass slide is placed. The specimen on the slide must be thin enough for light to pass through it.<br><br>Specimens are often <b>stained</b> with dyes (e.g. iodine for plant cells) to make structures visible.',
        draw:function(){dQ4(2);}
      },
      {
        sl:'Calculating magnification',
        p:'Total magnification is calculated as:<br><span class="fm">Magnification = eyepiece lens \u00d7 objective lens</span>For example: eyepiece \u00d710, objective \u00d740 gives total magnification of <b>400\u00d7</b>.<br><br>'+
        tryIt(function(){
          var eye=rPick([10,10,10]);
          var obj=rPick([4,10,40]);
          return {
            question:'An eyepiece lens is \u00d7'+eye+' and the objective lens is \u00d7'+obj+'. What is the total magnification?',
            ans:eye*obj,
            tol:0,
            unit:'\u00d7',
            hints:['Total magnification = eyepiece \u00d7 objective','Multiply the two values together'],
            working:'Magnification = '+eye+' \u00d7 '+obj+' = <b>'+(eye*obj)+'</b>\u00d7'

        draw:function(){dQ4(3);}

    su:'Single-celled living things',
    steps:[
      {
        sl:'What is a unicellular organism?',
        p:'A <b>unicellular organism</b> is made of just <b>one cell</b>. That single cell must carry out all the functions of life: feeding, respiring, excreting, growing, and reproducing.<br><br>Examples include <b>amoeba</b>, <b>euglena</b>, and <b>bacteria</b>.',
        draw:function(){dQ5(0);}
      },
      {
        sl:'Amoeba',
        p:'An <b>amoeba</b> is a unicellular organism found in pond water. It moves and feeds using <b>pseudopods</b> (\u2018false feet\u2019) — extensions of its cytoplasm that flow outward to engulf food particles.<br><br>This process of engulfing food is called <b>phagocytosis</b>.',
        draw:function(){dQ5(1);}
      },
      {
        sl:'Euglena',
        p:'<b>Euglena</b> is unusual — it has a <b>flagellum</b> for movement (like an animal) but also <b>chloroplasts</b> to photosynthesise (like a plant).<br><br>In sunlight it makes its own food. In the dark it can absorb nutrients from its surroundings. Scientists classify it as a <b>protist</b>.',
        draw:function(){dQ5(2);}
      },
      {
        sl:'Bacteria',
        p:'<b>Bacteria</b> are the smallest unicellular organisms. Crucially, they are <b>prokaryotes</b> — they have <b>no nucleus</b>. Their DNA floats freely in the cytoplasm.<br><br>All other cells (plant, animal, fungal) are <b>eukaryotes</b> with a true nucleus.<br><br>'+
        tryItMC(function(){
          var qs=[
            {q:'What is the key difference between a prokaryote and a eukaryote?',opts:['Prokaryotes have no nucleus','Prokaryotes have no cell membrane','Eukaryotes have no nucleus','Eukaryotes are always unicellular'],c:0,w:'<b>Prokaryotes</b> (like bacteria) have no membrane-bound nucleus — their DNA floats in the cytoplasm. Eukaryotes have a true nucleus.'},
            {q:'How does an amoeba move?',opts:['Using pseudopods','Using a flagellum','Using cilia','By diffusion'],c:0,w:'An amoeba extends <b>pseudopods</b> (false feet) — projections of its cytoplasm — to move and engulf food.'},
            {q:'What makes euglena unusual compared to other unicellular organisms?',opts:['It can both photosynthesise and move','It has two nuclei','It has a cell wall and chloroplasts','It is the largest cell'],c:0,w:'Euglena is unusual because it has <b>chloroplasts</b> for photosynthesis AND a <b>flagellum</b> for movement — features normally associated with different kingdoms.'}
          ];
          return (function(p){return {question:p.q,options:p.opts,correct:p.c,working:p.w};})(rPick(qs));
        }),
        draw:function(){dQ5(3);}
      }
    ]
  }

/* ── Engine ── */
var qi=0,si=0;

function buildSidebar(){
  var sb=document.getElementById('sb');
  sb.innerHTML='<div class="sb-lbl">Topics</div>';
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}

function render(){
  var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  document.getElementById('pn').className='pnl fi';
  document.getElementById('pn').innerHTML='<div class="sl">'+st.sl+'</div><div>'+st.p+'</div>';
  st.draw();
  // dots
  var dt=document.getElementById('dt');
  dt.innerHTML=q.steps.map(function(_,i){return '<div class="dot'+(i===si?' on':i<si?' dn':'')+'"></div>';}).join('');
  // buttons
  document.getElementById('pb').disabled=(qi===0&&si===0);
  var last=(qi===QS.length-1&&si===q.steps.length-1);
  document.getElementById('nb').textContent=last?'Finished \u2713':'Next \u2192';
  document.getElementById('nb').disabled=false;
  // sidebar
  document.querySelectorAll('.qb').forEach(function(b,i){b.classList.toggle('on',i===qi);});
}

document.getElementById('nb').onclick=function(){
  var q=QS[qi];
  if(si<q.steps.length-1){si++;}
  else if(qi<QS.length-1){qi++;si=0;}
  render();
};
document.getElementById('pb').onclick=function(){
  if(si>0){si--;}
  else if(qi>0){qi--;si=QS[qi].steps.length-1;}
  render();
};

buildSidebar();
render();
</script>
