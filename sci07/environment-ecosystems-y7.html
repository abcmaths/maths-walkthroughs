:root{--bio:#2E7D32;--dark:#1B5E20;--cream:#F1F8F1;--ink:#1a2e1a;--line:#C8E6C9;--gold:#C8922A;}

.qn{font-weight:700;font-size:10px;display:block;opacity:.7;}
.main{flex:1;min-width:0;}
.hdr{width:100%;max-width:760px;border-bottom:3px solid var(--bio);padding-bottom:12px;margin-bottom:20px;}
.eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--bio);font-weight:700;}
.hdr h1{font-family:Georgia,serif;font-size:24px;margin:6px 0 4px;line-height:1.2;}
.sub{font-size:14px;color:#4a6a4a;}
.stage{background:#fff;border:1px solid var(--line);border-radius:4px;overflow:hidden;width:100%;max-width:760px;}
.cvs{background:linear-gradient(#fff,#f1f8f1);padding:14px 0 4px;display:flex;justify-content:center;}

.pnl{padding:20px 24px 24px;border-top:1px solid var(--line);min-height:160px;}

.btn{font-size:14px;font-weight:600;padding:9px 18px;border-radius:3px;border:1px solid var(--bio);background:#fff;color:var(--bio);cursor:pointer;transition:.15s;font-family:inherit;}
.btn.p{background:var(--bio);color:#fff;}

.hl li::before{content:">";position:absolute;left:0;color:var(--gold);font-weight:700;}
.ar{display:flex;gap:8px;margin-top:6px;}
.ar input{flex:1;font-size:15px;padding:8px 12px;border:1px solid var(--line);border-radius:3px;outline:none;font-family:inherit;}

.fb{margin-top:10px;font-size:14px;padding:9px 12px;border-radius:3px;display:none;}

.nq:hover{background:#e0e0e0;}
.wk-ans{margin-top:8px;font-size:14px;line-height:1.6;color:#1a2e1a;}

.mc-opt.wrong{border-color:#C0272D;background:#fde8e8;color:#a01820;}
@media(max-width:640px){.layout{flex-direction:column;}.sb{width:100%;flex-direction:row;flex-wrap:wrap;}.qb{flex:1;min-width:80px;}}

<script>
var ST={};
function rInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function rPick(a){return a[Math.floor(Math.random()*a.length)];}

/* Numeric tryIt */
function tryIt(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;
  return genTry(id,fn());
}
function genTry(id,o){
  var h=(o.hints||[]).map(function(x){return '<li>'+x+'</li>';}).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">&#10004; Your Turn</div>'+
    '<p>'+o.question+'</p>'+
    '<div class="ar">'+
      '<input type="number" step="any" placeholder="Your answer" id="'+id+'_i"/>'+
      '<button class="ck" onclick="ck(\''+id+'\')">&#10003; Check</button>'+
    '</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk">'+
      '<summary>Show working</summary>'+
      '<div class="wk-b">'+
        (h?'<ul class="hl">'+h+'</ul>':'')+
        '<div class="wk-ans">'+o.working+'</div>'+
      '</div>'+
    '</details>'+
    '<button class="nq" data-tryid="'+id+'">New question</button>'+
  '</div>';
}
function ck(id){
  var fn=ST[id];var o=typeof fn==='function'?fn():fn;
  var v=parseFloat(document.getElementById(id+'_i').value);
  var f=document.getElementById(id+'_f');
  if(isNaN(v)){f.className='fb er';f.textContent='Please enter a number.';return;}
  var tol=o.tol!==undefined?o.tol:0.5;
  if(Math.abs(v-o.ans)<=tol){
    f.className='fb ok';f.textContent='\u2713 Correct! Answer: '+o.ans+(o.unit?' '+o.unit:'');
  }else{
    f.className='fb er';f.textContent='Not quite \u2014 check your working and try again.';
  }
}

/* Multiple-choice tryIt */
function tryItMC(fn){
  var id='t'+Math.random().toString(36).slice(2);
  ST[id]=fn;
  return genTryMC(id,fn());
}
function genTryMC(id,o){
  var opts=o.options.map(function(opt,i){
    return '<button class="mc-opt" onclick="ckMC(\''+id+'\','+i+','+o.correct+')">'+opt+'</button>';
  }).join('');
  return '<div class="try" data-tryid="'+id+'">'+
    '<div class="try-t">&#10004; Your Turn</div>'+
    '<p>'+o.question+'</p>'+
    '<div class="mc-opts" id="'+id+'_opts">'+opts+'</div>'+
    '<div class="fb" id="'+id+'_f"></div>'+
    '<details class="wk"><summary>Show answer</summary>'+
      '<div class="wk-b"><div class="wk-ans">'+o.working+'</div></div>'+
    '</details>'+
    '<button class="nq" data-tryid="'+id+'_mc">New question</button>'+
  '</div>';
}
function ckMC(id,chosen,correct){
  var opts=document.getElementById(id+'_opts').querySelectorAll('.mc-opt');
  opts.forEach(function(b,i){
    if(i===correct)b.classList.add('correct');
    else if(i===chosen)b.classList.add('wrong');
    b.disabled=true;
  });
  var f=document.getElementById(id+'_f');
  if(chosen===correct){f.className='fb ok';f.textContent='\u2713 Correct!';}
  else{f.className='fb er';f.textContent='Not quite \u2014 the correct answer is highlighted in green.';}
}
document.addEventListener('click',function(e){
  var b=e.target.closest('.nq');if(!b)return;
  var rawId=b.getAttribute('data-tryid');
  var id=rawId.replace('_mc','');
  var fn=ST[id];if(typeof fn!=='function')return;
  var wrap=b.closest('.try');if(!wrap)return;
  var isMC=(rawId.indexOf('_mc')>=0);
  var fresh=isMC?genTryMC(id,fn()):genTry(id,fn());
  var tmp=document.createElement('div');tmp.innerHTML=fresh;
  wrap.parentNode.replaceChild(tmp.firstChild,wrap);
});

/* SVG helpers */
function g(){return document.getElementById('dg');}
function T(x,y,t,c,sz,a,b){c=c||'#1a2e1a';sz=sz||12;a=a||'middle';return '<text x="'+x+'" y="'+y+'" font-size="'+sz+'" font-family="Arial" fill="'+c+'" text-anchor="'+a+'" font-weight="'+(b?700:400)+'">'+t+'</text>';}
function L(x1,y1,x2,y2,c,w,d){c=c||'#888';w=w||1.5;return '<line x1="'+x1+'" y1="'+y1+'" x2="'+x2+'" y2="'+y2+'" stroke="'+c+'" stroke-width="'+w+'"'+(d?' stroke-dasharray="'+d+'"':'')+'/>';}
function R(x,y,w,h,fill,stroke,sw,rx){return '<rect x="'+x+'" y="'+y+'" width="'+w+'" height="'+h+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="'+(sw||2)+'" rx="'+(rx||0)+'"/>';}
function circ(cx,cy,r,fill,stroke,sw){return '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="'+(sw||2)+'"/>';}
function ellipse(cx,cy,rx,ry,fill,stroke,sw){return '<ellipse cx="'+cx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" fill="'+(fill||'none')+'" stroke="'+(stroke||'#2E7D32')+'" stroke-width="'+(sw||2)+'"/>';}
function leader(x1,y1,x2,y2,label,c){
  c=c||'#555';
  return L(x1,y1,x2,y2,c,1)+T(x2+(x2>x1?5:-5),y2+4,label,c,11,x2>x1?'start':'end',false);
}
function arrow(x1,y1,x2,y2,c){
  c=c||'#2E7D32';
  var ang=Math.atan2(y2-y1,x2-x1);
  var hx1=x2-10*Math.cos(ang-0.4),hy1=y2-10*Math.sin(ang-0.4);
  var hx2=x2-10*Math.cos(ang+0.4),hy2=y2-10*Math.sin(ang+0.4);
  return L(x1,y1,x2,y2,c,2)+'<polygon points="'+x2+','+y2+' '+hx1+','+hy1+' '+hx2+','+hy2+'" fill="'+c+'"/>';
}

/* ── Q1: Levels of organisation ── */
function dQ1(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var labels=['Organism','Population','Community','Ecosystem'];
  var cols=['#C0272D','#C8922A','#1565C0','#2E7D32'];
  var n=Math.min(p+1,4);
  for(var i=0;i<n;i++){
    var w=110+i*70,h=70+i*46;
    var x=240-w/2,y=270-h-10;
    o.push(R(x,y,w,h,'none',cols[i],2,8));
    o.push(T(x+8,y+14,labels[i],cols[i],11,'start',true));
  }
  // little organism icons inside innermost box
  o.push(circ(240,250,7,'#fde8e8','#C0272D',1.5));
  if(p>=1){
    o.push(circ(218,240,6,'#fde8e8','#C0272D',1.2));
    o.push(circ(262,240,6,'#fde8e8','#C0272D',1.2));
    o.push(circ(230,260,6,'#fde8e8','#C0272D',1.2));
  }
  if(p>=2){
    o.push(ellipse(190,210,9,6,'#e8f5e9','#2E7D32',1.2));
    o.push(ellipse(290,210,9,6,'#e8f5e9','#2E7D32',1.2));
  }
  s.innerHTML=o.join('');
}

/* ── Q2: Food chains ── */
function dQ2(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var stages=[
    {lb:'Grass',sub:'Producer',col:'#2E7D32',x:60},
    {lb:'Grasshopper',sub:'Primary consumer',col:'#C8922A',x:200},
    {lb:'Frog',sub:'Secondary consumer',col:'#1565C0',x:340},
    {lb:'Snake',sub:'Tertiary consumer',col:'#C0272D',x:460}
  ];
  var n=Math.min(p+1,4);
  for(var i=0;i<n;i++){
    var st=stages[i];
    o.push(circ(st.x,140,34,'#fff','#'+st.col.slice(1),2));
    o.push(T(st.x,136,st.lb,st.col,11,'middle',true));
    o.push(T(st.x,154,st.sub,'#555',8.5,'middle',false));
    if(i>0){
      o.push(arrow(stages[i-1].x+38,140,st.x-38,140,'#444'));
    }
  }
  if(p>=3){
    o.push(T(240,220,'Arrows show the direction energy flows','#444',11,'middle',false));
    o.push(T(240,236,'\u2014 from what is EATEN to what EATS it','#444',11,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* ── Q3: Food webs ── */
function dQ3(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var nodes={
    grass:[80,240],seeds:[200,240],
    mouse:[140,160],insect:[260,160],
    owl:[100,70],frog:[260,80],snake:[380,160]
  };
  function node(key,lb,col){
    var n=nodes[key];
    o.push(circ(n[0],n[1],26,'#fff',col,2));
    o.push(T(n[0],n[1]+4,lb,col,10,'middle',true));
  }
  node('grass','Grass','#2E7D32');
  node('seeds','Seeds','#2E7D32');
  if(p>=1){
    node('mouse','Mouse','#C8922A');
    node('insect','Insect','#C8922A');
    o.push(arrow(90,218,130,178,'#888'));
    o.push(arrow(195,222,255,178,'#888'));
  }
  if(p>=2){
    node('owl','Owl','#C0272D');
    node('frog','Frog','#1565C0');
    o.push(arrow(135,140,108,90,'#888'));
    o.push(arrow(255,140,260,104,'#888'));
  }
  if(p>=3){
    node('snake','Snake','#6A1B9A');
    o.push(arrow(282,150,360,155,'#888'));
    o.push(arrow(282,90,355,145,'#888'));
    o.push(T(240,290,'A food web links MANY overlapping food chains','#444',11,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* ── Q4: Pyramid of numbers ── */
function dQ4(p,vals){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  var cols=['#2E7D32','#C8922A','#1565C0','#C0272D'];
  var labs=['Producers','Primary consumers','Secondary consumers','Tertiary consumers'];
  var widths=[320,220,130,60];
  var n=Math.min(p+1,4);
  var y=260;
  for(var i=0;i<n;i++){
    var w=widths[i],x=240-w/2,h=48;
    o.push(R(x,y-h,w,h,cols[i]+'33',cols[i],2));
    o.push(T(240,y-h/2-4,labs[i],cols[i],10.5,'middle',true));
    if(vals)o.push(T(240,y-h/2+10,vals[i]+' organisms','#444',9.5,'middle',false));
    y-=h+4;
  }
  s.innerHTML=o.join('');
}

/* ── Q5: Human impact ── */
function dQ5(p){
  var s=g();s.setAttribute('viewBox','0 0 480 300');var o=[];
  // Simple tree shapes (trunk + canopy)
  for(var i=0;i<5;i++){
    var x=60+i*38;
    var faded=(p>=1 && i<3);
    var col=faded?'#ccc':'#2E7D32';
    var trunkCol=faded?'#ddd':'#6d4c2c';
    o.push('<rect x="'+(x-4)+'" y="150" width="8" height="22" fill="'+trunkCol+'"/>');
    o.push(circ(x,140,18,col+'55',col,2));
  }
  o.push(T(150,195,'Deforestation','#2E7D32',11,'middle',true));
  if(p>=1){
    o.push(T(150,211,'removes habitats & food sources','#555',10,'middle',false));
  }
  // Factory + pollution
  o.push(R(300,150,60,60,'#eee','#555',2,3));
  o.push(R(320,110,12,42,'#ccc','#555',1.5));
  if(p>=2){
    o.push(circ(326,95,10,'#ddd','#999',1));
    o.push(circ(338,85,12,'#ddd','#999',1));
    o.push(circ(316,82,9,'#ddd','#999',1));
    o.push(T(330,225,'Pollution','#C0272D',11,'middle',true));
    o.push(T(330,241,'harms organisms in the ecosystem','#555',10,'middle',false));
  }
  if(p>=3){
    o.push(R(20,260,440,28,'#fff5f0','#C0272D',1.5,4));
    o.push(T(240,278,'Conservation: protected areas, recycling, sustainable farming','#a01820',10.5,'middle',true));
  }
  s.innerHTML=o.join('');
}

/* ── QS array ── */
var QS=[
  {
    ey:'Y7 Biology \u2022 Q1',
    ti:'Levels of Organisation',
    su:'From a single organism to a whole ecosystem',
    steps:[
      {
        sl:'Organism',
        p:'An <b>organism</b> is a single living thing — one plant, one animal, one fungus. It is the smallest unit we study in ecology.',
        draw:function(){dQ1(0);}
      },
      {
        sl:'Population',
        p:'A <b>population</b> is a group of organisms of the <b>same species</b> living in the same area at the same time — for example, all the rabbits in a field.',
        draw:function(){dQ1(1);}
      },
      {
        sl:'Community',
        p:'A <b>community</b> is all the <b>different populations</b> (different species) living and interacting together in the same area — rabbits, foxes, grass, and oak trees all sharing one habitat.',
        draw:function(){dQ1(2);}
      },
      {
        sl:'Ecosystem',
        p:'An <b>ecosystem</b> is a community of living organisms <b>together with</b> the non-living (abiotic) parts of their environment — soil, water, temperature, and light — all interacting as a system.<br><br>'+
        tryItMC(function(){
          var qs=[
            {q:'What name is given to all the rabbits living in one field?',opts:['A population','A community','An ecosystem','An organism'],c:0,w:'A <b>population</b> is a group of the same species in one area — here, all the rabbits.'},
            {q:'What term describes all the different species living together in one habitat?',opts:['Community','Population','Organism','Habitat'],c:0,w:'A <b>community</b> includes every different population (species) sharing the same area.'},
            {q:'What is an ecosystem?',opts:['A community plus its non-living environment','A single organism','One species only','A type of food chain'],c:0,w:'An <b>ecosystem</b> combines the living community with the abiotic (non-living) parts of the environment, like soil and water.'}
          ];
          return (function(p){return {question:p.q,options:p.opts,correct:p.c,working:p.w};})(rPick(qs));
        }),
        draw:function(){dQ1(3);}
      }
    ]
  },
  {
    ey:'Y7 Biology \u2022 Q2',
    ti:'Food Chains',
    su:'How energy passes from organism to organism',
    steps:[
      {

/* ── Engine ── */
var qi=0,si=0;

function buildSidebar(){
  var sb=document.getElementById('sb');
  sb.innerHTML='<div class="sb-lbl">Topics</div>';
  QS.forEach(function(q,i){
    var b=document.createElement('button');
    b.className='qb'+(i===qi?' on':'');
    b.innerHTML='<span class="qn">Q'+(i+1)+'</span>'+q.ti;
    b.onclick=function(){qi=i;si=0;render();};
    sb.appendChild(b);
  });
}

function render(){
  var q=QS[qi],st=q.steps[si];
  document.getElementById('ey').textContent=q.ey;
  document.getElementById('ti').textContent=q.ti;
  document.getElementById('su').textContent=q.su;
  document.getElementById('pn').className='pnl fi';
  document.getElementById('pn').innerHTML='<div class="sl">'+st.sl+'</div><div>'+st.p+'</div>';
  st.draw();
  // dots
  var dt=document.getElementById('dt');
  dt.innerHTML=q.steps.map(function(_,i){return '<div class="dot'+(i===si?' on':i<si?' dn':'')+'"></div>';}).join('');
  // buttons
  document.getElementById('pb').disabled=(qi===0&&si===0);
  var last=(qi===QS.length-1&&si===q.steps.length-1);
  document.getElementById('nb').textContent=last?'Finished \u2713':'Next \u2192';
  document.getElementById('nb').disabled=false;
  // sidebar
  document.querySelectorAll('.qb').forEach(function(b,i){b.classList.toggle('on',i===qi);});
  if(last && window.markComplete) window.markComplete();
}

document.getElementById('nb').onclick=function(){
  var q=QS[qi];
  if(si<q.steps.length-1){si++;}
  else if(qi<QS.length-1){qi++;si=0;}
  render();
};
document.getElementById('pb').onclick=function(){
  if(si>0){si--;}
  else if(qi>0){qi--;si=QS[qi].steps.length-1;}
  render();
};

buildSidebar();
render();
</script>
